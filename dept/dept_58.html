par l'architecte Bouveault.  Au rez-de-chaussée, un salon est orné d'un papier peint en arabesque avec un beau décor floral et animalier de la manufacture de la Veuve Mader  en 1831. Les communs ont conservé leurs dispositions.                                       Retz demeure à deux niveaux  sur plan d'équerre, avec lucarnes sur toit, pavillon d'entré saillant avec toit à l'impérial et deux tourelles rondes en angles  toit en poivrières, dont celle de droite possède des mâchicoulis.","habitants":"Famille de   Jean Saulnier\r\n        \"","divers":"Château de Toury, de Retz et la Tour Malakoff","gps":"","images":["../../jctruffet.com/image/image_58/58_Toury_Lurcy_1.jpg","../../jctruffet.com/image/image_58/58_Toury_Lurcy_2.jpg","../../jctruffet.com/image/image_58/58_Toury_Lurcy_3.jpg","../../jctruffet.com/image/image_58/58_Toury_Lurcy_4.jpg","../../jctruffet.com/image/image_58/58_Toury_Lurcy_5.jpg"]},"Consult_chateau_formulaireace3":{"id":"Consult_chateau_formulaireace3","dept":"58","canton":"Pouilly sur loire","commune":"Tracy sur Loire","nom":"Tracy","type":"Château","periode":"XV","histoire":"Deux châteaux à Tracy sur Loire dont celui de Tracy du XVe siècle avec donjon et pavillons, et celui de la Roche. \r\nTRACY, les D'Estutt, famille écossaise qui combattit durant la guerre de cent ans au côté du futur roi de France, Charles VII, reçurent en récompense pour leur bravoure la nationalité française ainsi que la seigneurie d'Assay. En 1586, le mariage entre François d'Estutt et Françoise de Bar permit d'acquérir la seigneurie de Tracy,  François dEstutt, seigneur de Tracy, acquéreur en 1626 de certaines rentes sur la terre de Veaugues.  Antoine D'Estutt de Tracy (1754-1846), Victor D'Estutt de Tracy (1781-1864).  Au XVe siècle, le château est attribué à une famille dorigine écossaise.  A la fin du XVIII siècle, le domaine de Tracy fut la propriété dAntoine Louis Claude dEstutt, comte de Tracy. A la fin du XIXe Jacques de Tracy organise rigoureusement le vignoble. En 1948, Jacqueline de Tracy hérite de la propriété. En 1950, elle épouse le comte Alain dAssay. Ils décident alors de restaurer le vignoble et redonnent un nouveau souffle à la propriété. L'entreprise  \"Château de Tracy  comtesse à d'Assay\", est installée à Tracy Sur Loire. Domaine où la culture de la vigne était implantée depuis plusieurs siècles. Aujourd'hui, le domaine appartient toujours à cette même famille.","architecture":"Tracy, de style renaissance construction du XVe-XVIIe siècle,  lédifice a été remanié aux XVIIe et XIXe siècles. Le château formait un grand carré autour dune cour intérieure. Il  reste quune poterne datée de 1567 avec des décors portés de la Renaissance, et le donjon accolé dune tour, les courtines ont disparu. Lintérieur a été modifié au XIXe siècle. Laile nord est est couverte dune charpente à chevrons portant ferme élevée au XVIIe siècle.                 La Roche, composé d'un corps de logis principal de plan rectangulaire à deux niveaux avec la série de chiens assis sur toit brisé à onze travées dont trois sont comprises dans le pavillon d'entré se terminant par un fronton dépassant l'ensemble de la toiture flanqué d'un il de buf plein cintre.","habitants":"Famille de  Antoine D'Estutt de Tracy\r\n        \"","divers":"Château de Tracy et de la Roche","gps":"","images":["../../jctruffet.com/image/image_58/58_Tracy_1.jpg","../../jctruffet.com/image/image_58/58_Tracy_2.jpg","../../jctruffet.com/image/image_58/58_Tracy_3.jpg","../../jctruffet.com/image/image_58/58_Tracy_4.jpg","../../jctruffet.com/image/image_58/58_Tracy_5.jpg","../../jctruffet.com/image/image_58/58_Tracy_6.jpg"]},"Consult_chateau_formulaire4aa6":{"id":"Consult_chateau_formulaire4aa6","dept":"58","canton":"Varzy","commune":"Marcy","nom":"Trinay","type":"Château","periode":"XIX","histoire":"TRINAY, le château de Trinay est daté du XIXe siècle,  propriétaire pendant de nombreuses années la famille Boulard de Villeneuve Allix, puis en 1966 acheté par labbé Simon, devenu collège horticole-agricole jusquen 1995 ou il est transféré à Varzy. Lieutenant mitrailleur . Né en octobre 1892 a Corval-lOrgueilleux, ancien élève du collège Saint-François de Sales à Évreux membre de la Sabretache, brigadier  en Aout 1914, il est promu sous-Lieutenant, le 03 juin 1917, il rejoignit à la ferme Radey, près de Fleury-la-Rivière, sous Épernay et fut attaché à la 1° compagnie de mitrailleuses. Propriété privée .","architecture":"Trinay de plan rectangulaire à deux niveaux et lucarnes sur toit pavillon d'entré sur des bases carrées à trois niveaux  toit à l'impériale. Laile nord possède une tour, avec une horloge. Les toitures sont en ardoises. Magnifique Portail en fer forgé.","habitants":"Famille Boulard de Villeneuve Allix\r\n        \"","divers":"Château de Trinay","gps":"","images":["../../jctruffet.com/image/image_58/58_Trinay_1.jpg","../../jctruffet.com/image/image_58/58_Trinay_2.jpg"]},"Consult_chateau_formulaire7ded-2":{"id":"Consult_chateau_formulaire7ded-2","dept":"58","canton":"Guerigny","commune":"Urzy","nom":"Urzy","type":"Château","periode":"XV-XVII","histoire":"Quatre châteaux  à Urzy, celui Bordes du XVe siècle avec tourelles carrées, de Tourbas du XVIe siècle,  de Luanges  style de néo-renaissance du XIXe siècle et celui des Evêques de Nevers du XVIIe siècle.                                                                         BORDES du XVe-XVIIe siècle, la seigneurie des Bordes a appartenu aux plus illustres familles du Nivernais qui eurent très tôt des liens avec la famille royale et avec la couronne de Pologne au XVIIe siècle,   Décor peut-être réalisé quand Marie-Louise de la Grange d'Arquian,marquise de Béthune, devint propriétaire du château à la fin du XVIIe siècle. Il est acheté en 2013 par Françoise et Mathieu  Joulie                                                 LUANGES,  Paul de Lavenne, comte de Choulot est lun des plus grands paysagistes du XIXe siècle, Il est naît à Nevers le 31 janvier 1794. A lage de 20 ans, il devient garde du corps du Roi Louis XVIII, avec le rang de lieutenant de Cavalerie, une fonction quil exerce pendant dix ans, jusquà la mort du souverain en 1824, et qui lui vaut le titre de comte de Choulot. Il devient capitaine général des chasses de Chantilly et gentilhomme de la chambre du duc de Bourbon à lavènement de Charles X.  La Révolution de 1830 le rejette dans lopposition et la clandestinité. \r\nEVEQUES, au XVIIe siècle, Urzy le bourg senrichit dune résidence des évêques, dit le château des évêques. Le jeune évêque de Nevers, Édouard Vallot, fils dun célèbre docteur du roi Louis XIV, est un habitué des fastes de la cour de Versailles, il va donc trouver rapidement sinistre et inconfortable de ce  château féodal de Prémery. Il fait donc faire édifier entre 1675 et 1680, sur la rive gauche de la Nièvre, une demeure, proche de la belle église dUrzy le Bourg, cette demeure figure sur le blason des évêques de Nevers.                                                                            \r\nTourbas pas d'information historique.","architecture":"Bordes du XVe-XVIIe siècle, de plan quadrangulaire; la façade d'entrée possède deux tours rondes à mâchicoulis  crénelés une avec toit en poivrières l'autre toit arasé, un porche d'entrée saillant de plan carré avec mâchicoulis toit à l'impérial, le corps de logis  en retour d'équerre à deux niveaux toit à deux pans  le cadran solaire du XVIIIe siècle, possède un très beau portail qui date du début du XVIIe siècle et sa grille, une petite maison de gardiens, four à pain, communs importants et terrasses                                 Evêques;  du XVIIe siècle: de plan rectangulaire, rez-de-chaussée et attique, la façade dont l'avant corps central est rythmé par quatre pilastres d'ordre ionique portant sur un grand fronton triangulaire orné d'armoiries de sculptures (Apollon sur un char attelé de quatre chevaux, tenant sa Lyre et Neptune encadré de deux médaillons présentant un jeune enfant chevauchant un animal aquatique), tympan orné d'un écusson entouré de feuillages,              Luanges est de style néo gothique, il est daté du XIXe siècle, construit en 1865-1866, par larchitecte Levy Launay, sur une ancienne demeure détruite en 1864. Ce monument date du troisième quart du XIXe siècle et fait partie des quatre constructions répertoriées de Urzy.","habitants":"Evêques de Nevers Comte de Choulot\r\n        \r\n        \r\n        \"","divers":"Château de Bordes, de Luanges et des Evêques de Nevers à Urzy","gps":"","images":["../../jctruffet.com/image/image_58/58_Urzy_1.jpg","../../jctruffet.com/image/image_58/58_Urzy_2.jpg","../../jctruffet.com/image/image_58/58_Urzy_3.jpg","../../jctruffet.com/image/image_58/58_Urzy_4.jpg","../../jctruffet.com/image/image_58/58_Urzy_5.jpg","../../jctruffet.com/image/image_58/58_Urzy_6.jpg","../../jctruffet.com/image/image_58/58_Urzy_7.jpg","../../jctruffet.com/image/image_58/58_Urzy_8.jpg"]},"Consult_chateau_formulaire43f1":{"id":"Consult_chateau_formulaire43f1","dept":"58","canton":"Moulins-Engilbert","commune":"Vandenesse","nom":"Vandenesse","type":"Château","periode":"XIV","histoire":"VANDENESSE, au XIVe siècle aux Bocars. Par alliance elle passe dans les mains de la famille de Nourry. Toujours par alliance, la seigneurie passe aux des Roger-de-Beaufort.  La maison forte est achetée à la fin du XVe siècle,  et toujours par alliance elle passe à Jean Olivier, fils aîné de François Olivier, mort en 1597, marié en 1567 à Suzanne de Chabannes qui lui apporte la terre de Vandenesse, et la famille Olivier-De-Fiennes-Dubois  Jean, sa mère née de Chabannes,   Louis, fils du précédent. En 1570 les troupes de lamiral de Coligny  endommage le château. En 1663,  la terre érigée en marquisat par le roi Louis XIV. Au XVIIIe siècle, le marquisat de Vandenesse possession des Olivier-De Fiennes-Du Bois, depuis 1604, se transmet de père en fils, puis passe à Charles Léonard de Baylens de par son mariage en 1745, avec Charlotte-Louise Olivier-Du-Bois-de-Fiennes. Leur fille cadette, Marie-Charlotte-Rosalie de Baylens épouse en 1778 Hélie-Charles de Talleyrand-Périgord, et lui apporte le marquisat de Vandenesse. A la Révolution, le château est saisi comme bien national et vendu en 1796 à Bourbon-Gravière qui en abat le côté nord-ouest. Au XIXe siècle, Hélie-Louis de Talleyrand-Périgord, est propriétaire du domaine. À sa mort, le château et leurs domaines passent à Charles de Mérode. Depuis 1909, le château est la possession de la famille de la Roche-Aymon.","architecture":"Vendenesse, une maison forte est attestée en 1368, transformé à la fin du XVe siècle  en un puissant château, en 1721, le château est décrit comme un ensemble composant une cour en forme d'ovale, renfermée de fossés avec pont-levis et autres marques d'ancienneté du château. La maison forte à l'origine se présentait sous la forme d'un donjon carré massif et d'un corps de logis. Au XVe siècle, il adopta un plan circulaire,  sept tours ovales sont édifiées. Des courtines surmontées d'un chemin de ronde, les reliaient les unes aux autres ainsi que le donjon. Des fossés protégeaient l'ensemble et l'accès au donjon se faisait par un pont-levis. Au XVIIe siècle, des corps de logis percés de hautes fenêtres, reprenant le plan global de l'édifice, remplacèrent les courtines. Les communs construits, à l'extérieur de l'enceinte, autour d'une grande cour carrée date de la même époque. Au XXIe siècle, il subsiste des bâtiments du XIVe siècle le donjon couronné de mâchicoulis, deux des sept tours ovales du XVe siècle, une tour carré et les logis qui les relient. Il ne reste pas  traces des douves et du pont-levis, tout comme la partie Nord-Ouest du château démoli à la Révolution. L'intérieur, a beaucoup souffert. Des deux cheminées monumentales que l'on voit, l'une du XVe siècle provient du manoir d'Arcilly, et l'autre, du XVIe siècle du château d'Anizy. Dans le salon on peut observer un plafond à la française ainsi qu'une tapisserie du XVIIe siècle.","habitants":"Famille de Nourry,                                                                   Famille de Chabannes                                                            Hélie-Louis de Talleyrand-Périgord\r\n        \"","divers":"Château de Vandenesse à Moulins-Engilbert","gps":"","images":["../../jctruffet.com/image/image_58/58_Vandenesse_1.jpg","../../jctruffet.com/image/image_58/58_Vandenesse_2.jpg","../../jctruffet.com/image/image_58/58_Vandenesse_3.jpg"]},"Consult_chateau_formulaire665c-2":{"id":"Consult_chateau_formulaire665c-2","dept":"58","canton":"La Charité sur Loire","commune":"Varennes lès Narcy","nom":"Varennes_Narcy","type":"Château vestiges","periode":"XV-XIX","histoire":"Trois châteaux à Varennes,les Narcy, celui de Passy les Tours et de Véninges du XVe siècle; a Narcy château de Mignard.                                  PASSY- les-Tours; Au XIIIe siècle, fief des Chaudron, seigneur de Varennes-lès-Narcy, ensuite  Jean de Beaumont seigneur de Pacy,  dont la veuve Jeanne de Courtenay en fait donation en 1369 au prieuré de la Charité et en 1378  à Hervé de Sénisy.  En 1398 il est acheté par Jehan de Chevenon alors conseiller de Charles VI de France, et prétendu plus riche écuyer du royaume, c'est sûrement lui qui modifie le donjon.  Son architecture est inspirée du château de Vincennes et ses tours imposantes donne leur nom au village. Fait construire à Passy un château identique à celui de Varennes son frère Guillaume fait édifier au même moment sur le domaine ancestral de Chevenon, Pérrinet Girard occupe le château de 1422-1432, il retiendra Jeanne dArc aux portes de La Charité-sur-Loire. Pendant la guerre de cent ans, très endommagé, en 1782 le château devient  la propriété des Gravier de Vergennes , homme politique et diplomate, qui ne le restaure pas plus que ne le feront ses propriétaires successifs. En 1907   Ironie du sort un lointain descendant de la famille Chaudron qui  récupère les ruines de passy.                                                                        \r\nVENINGES pas d'information historique, hôtel restaurant.                    MIGNARD à Narcy au XIXe siècle de la famille Lasné du Colombier.","architecture":"Vestiges du château de Passy-les-Tours . Édifié sur un plan barlong d'environ 50 m de côté flanqué aux angles de quatre tours rondes, était pourvu d'un donjon de 25 m de hauteur qui dominait la voûte d'entrée. Son architecture est inspirée du château de Vincennes et ses tours imposantes donnent leur nom au village. En 1569 le château est fortement endommagé par les guerres de religion et ne sera plus entretenu Au contraire, ses pierres seront utilisées pour d'autres constructions. Il fut construit par le même architecte qui construisit le château de Chevenon.                 Mignard   quadrilatère  avec corps de logis principal  rectangulaire à deux niveaux toit en croupe deux petites tours carrées sur les côtés saillants se  reliant par une terrasse  avec escalier extérieur et deux lucarnes dans les combles en façade.                   Veninges construit au XVe siècle remanié au XIXe siècle.","habitants":"marquis de Vergennes                                                                      Famille Lasné du Colombier\r\n        \"","divers":"Vestiges de Passy les tours, le château de Mignard à Narcy et le château de Veninges à Varennes les Narcy.","gps":"","images":["../../jctruffet.com/image/image_58/58_Varennes_Narcy_1.jpg","../../jctruffet.com/image/image_58/58_Varennes_Narcy_2.jpg","../../jctruffet.com/image/image_58/58_Varennes_Narcy_3.jpg","../../jctruffet.com/image/image_58/58_Varennes_Narcy_4.jpg","../../jctruffet.com/image/image_58/58_Varennes_Narcy_5.jpg","../../jctruffet.com/image/image_58/58_Varennes_Narcy_6.jpg","../../jctruffet.com/image/image_58/58_Varennes_Narcy_7.jpg","../../jctruffet.com/image/image_58/58_Varennes_Narcy_8.jpg","../../jctruffet.com/image/image_58/58_Varennes_Narcy_9.jpg"]},"Consult_chateau_formulaire1852":{"id":"Consult_chateau_formulaire1852","dept":"58","canton":"Guérigny","commune":"Varennes-Vauzelles","nom":"Varennes_Vauzelles","type":"Château","periode":"XVIII-XIX","histoire":"Quatre châteaux à Varennes-Vauzelles le château de Murgers du XVIIIe siècle , le château de Cheugny du XVIIIe siècle, la Rocherie  et  Four de Vaux.                                                                      FOUR de VAUX;  Le château de Four de Vaux est daté du début du XIXe siècle, ses quatre tours dangles, sont édifiées par le baron Denis Durosier de Mangeux Vêpre en 1840, elles sont en pierre de taille calcaire. Aujourd'hui hôtel.                                 MURGERS, pas d'information historique.                         CHEUGNY, Pas d'information historique.                              ROCHERIE, dans un style Napoléon III, cette bâtisse transformé en hôtel restaurant par la famille Reparet, aujourd'hui propriété de  la famille Lantéri, qui  gére l'établissement pour séminaires et conférences peut accueillir 120 personnes, de nombreuses célébrités ont séjourné dans ce château tel que Charles Trénet, Michael Schumacher, François Mitterrand et Pierre Bérégovoy.","architecture":"Le château du Four de Vaux, corps de logis  de plan rectangulaire à trois niveaux avec pavillon d'entré flanqué d'une terrasse et d'un toit en coupole et escalier à double révolution. Un pavillon carré à sur flanc  droit, les deux tours dangles situés devant le château sont octogonales, tandis que les deux de larrière du bâtiment sont rondes. Elles auraient été bâties pour que le Baron dissimule ses nombreuses maîtresses aux nouvelles arrivantes ! Le bâtiment est de plan carré, lintérieur a été préservé : Les parquets, boiseries et escaliers de pierre sont dépoque. Le domaine se tient sur cinq hectares, sur lequel a été bâtie une chapelle de style roman en 1860, il possède aussi un étang.                                                    La Rocherie de plan rectangulaire à trois niveaux, balcon sur porte d'entrée porté par colonnes doriques se terminant sur toit par deux mini tourelle à toit pointu formant lucarne gothique à flamboyant et horloge centrale. De chaque côté du bâtiment deux ailes de deux niveaux balconnet deux travées avec terrasses.","habitants":"Famille Reparet\r\n        \r\n        \r\n        \r\n        \"","divers":"A Varennes-Vauzelles le château de Murgers , de Bourdons, de Cheugny, la Rocherie  et de Four à Chaux","gps":"","images":["../../jctruffet.com/image/image_58/58_Varennes_Vauzelles_1.jpg","../../jctruffet.com/image/image_58/58_Varennes_Vauzelles_2.jpg","../../jctruffet.com/image/image_58/58_Varennes_Vauzelles_3.jpg","../../jctruffet.com/image/image_58/58_Varennes_Vauzelles_4.jpg","../../jctruffet.com/image/image_58/58_Varennes_Vauzelles_5.jpg"]},"Consult_chateau_formulaire801e-2":{"id":"Consult_chateau_formulaire801e-2","dept":"58","canton":"Varzy","commune":"Varzy","nom":"Varzy","type":"Château","periode":"XV-XVIII","histoire":"A Varzy,  château des évêques d'Auxerre du XV-XVIIIe siècle. Hôtel du Gouverneur du XVe siècle. Hôtel Dieu du XVIIe siècle et hôtel de l'Ecu  du XVIIe siècle.                                                 VARZY,  seigneurs temporels et spirituels de Varzy, siège dune châtellenie dont relevaient de nombreux fiefs, les puissants évêques dAuxerre possédaient dans la localité un château. Était lieu de pèlerinage à Sainte-Eugénie d'Alexandrie et Saint-Regnobert, et étape sur le chemin de Compostelle. Le bourg était fortifié et possédait, dès le Xe siècle, une collégiale dédiée à sainte-Eugénie, disparue au temps de la Révolution, Vendu comme bien national en 1793, transformation en faïencerie de 1794 à 1803.                       EVEQUES d' AUXERRE,  forteresse ecclésiastiques fortifiées étudié   par le dernier seigneur de Varzy, siège dune châtellenie dont relevaient de nombreux fiefs, les puissants évêques dAuxerre possédaient dans la localité un château, symbole de linfluence quils exerçaient en Nivernais. Chroniqueur des évêques dAuxerre, Son successeur Hugues de Challon le transforme en château dont sempare le comte de Nevers. Puis le turbulent baron Geoffroy de Donzy devient maître des lieux de 1084 à 1087, durant la vacance du siège épiscopal. A  la Révolution, il devient la  propriété de MM. Thoulet Vauvardin et Edmée Rollin, devenu seul propriétaire, ce dernier y crée en 1794 une manufacture de faïence, qui ferme en 1803, Champion de Cicé. Propriété des familles Givry puis Petit, il est acquis en 1929 par messieurs Gilles et Pointot qui créent la colonie scolaire Jacques Amiot de 1938 à 2005. Cette activité est poursuivie par la ville de Clichy la Garenne qui en est propriétaire depuis 1946, accueil de séjours denfants et dadultes du troisième âge, puis acquisition par la commune de Varzy en 2008.","architecture":"Evêques d'Auxerre propriété de la commune,  bâtiments, une partie de la construction édifiée à partir de 1470 par Pierre de Longueil et, à gauche le pavillon bâti en 1763, Laile du XVe siècle abrite les ateliers de trituration, la tour dIrouard et le four tandis que les séchoirs se situent à lintérieur de laile longeant le boulevard Saint-Germain. Dabord locataire depuis 1938, la commune de Clichy la Garenne acquiert le château en 1946 et en entreprend la restauration sous la direction avisée de Jean Avarre, architecte clamecycois. Jusquen 2005 lancienne résidence des évêques dAuxerre accueillera les séjours dété des jeunes Clichois ou de leurs aînés du troisième âge. Réuni le 22 octobre 2007, le conseil municipal de Varzy décide dacquérir le site dont la commune est devenue propriétaire le 31 janvier 2008. De cet édifice ayant connu bien des vicissitudes au fil des siècles, subsistent dimportants vestiges des XVe, XVIe et XVIIIe siècles.","habitants":"Comte de Nevers\r\n        \"","divers":"Château des Evêques et hôtel du Gouverneur à Varzy","gps":"","images":["../../jctruffet.com/image/image_58/58_Varzy_1.jpg","../../jctruffet.com/image/image_58/58_Varzy_2.jpg","../../jctruffet.com/image/image_58/58_Varzy_3.jpg","../../jctruffet.com/image/image_58/58_Varzy_4.jpg","../../jctruffet.com/image/image_58/58_Varzy_5.jpg","../../jctruffet.com/image/image_58/58_Varzy_6.jpg"]},"Consult_chateau_formulaired399-2":{"id":"Consult_chateau_formulaired399-2","dept":"58","canton":"Lornes","commune":"Hameau Vauban Bazoches du morvan","nom":"Vauban","type":"Château","periode":"XVI","histoire":"VAUBAN, l'ancienne maison forte du XIIe siècle dont les familles de Sallenay de Bazoches, de Chastellux se succédèrent. Charles de Champignolles  devint propriétaire en 1533 et vendit le manoir en 1548 à Emery Pestre qui prit le nom de Vauban en 1558. Son arrière petit-fils le maréchal de Vauban tient son nom de cette terre.   En 1680, c'est la seigneurie de Pierre-Pertuis qui est acquise au comte de Vitteaux,  son château en ruine et son moulin de Sæuvres.  En 1684, c'est la seigneurie de Vauban à laquelle son père Urbain Le Prestre avait été contraint de renoncer en 1632, qui est rachetée à son cousin endetté Antoine Le Prestre, soit le château de Vauban,  à sa mort , le manoir passa à sa fille la marquise d'Ussé qui mourut sans postérité, puis aux Angrand d'Alleray.  Et en 1748 à Jacques Millerau petit-fils de Madelaine. Le Pestre de Vauban et petit neveu du maréchal, une descendante épousa en 1880 Gaston de la Brosse sa famille est toujours propriétaire.","architecture":"Château moderne de Vauban, corps de logis rectangulaire à deux niveaux flanqués de chaque côté de pavillons carrés à toit brisés, très agrandi récemment, mais où l'on retrouve encore une tourelle et quelques restes du manoir primitif du XVIe siècle.","habitants":"Maréchal de Vauban\r\n        \"","divers":"Château de Vauban","gps":"","images":["../../jctruffet.com/image/image_58/58_Vauban_1.jpg","../../jctruffet.com/image/image_58/58_Vauban_2.jpg","../../jctruffet.com/image/image_58/58_Vauban_3.jpg"]},"Consult_chateau_formulaire92f2":{"id":"Consult_chateau_formulaire92f2","dept":"58","canton":"Moulins-Engilbert","commune":"Moulins Engilbert","nom":"Vaudelle","type":"Château","periode":"XIX","histoire":"château de Vaudelle, fait partie des deux châteaux ou manoir de Sermages,  il était possédé à la Révolution par les Sallonyer de Varennes Simon et son épouse Rose Charlotte Robert. Leur fils Charles François né en 1767, décédé le 25 mars 1851 , est un commerçant, passionné de peinture,  lui-même est peintre amateur, il fait don à léglise de Moulins-Engilbert du tableau Saint-Jean lévangéliste, il à fait construire ce château (manoir). De son épouse Anne Joséphine du Crest , il aura deux filles. Lune delles, Césarine, mariée en 1824 avec Edouard dEnnery de La Chesnaye un noble dont la famille dEnnery originaire dÉcosse vint sétablir en France au XVIe siècle, Edouard-Jacques de la Chesnaye.","architecture":"Vaudelle, construit en 1810, sur le flanc dune colline il est situé sur la route qui va de Sermages à Mouniot. Autrefois,  il existait un domaine, était  composé de quatre corps de bâtiments,  aujourd'hui deux tours rondes en angles de la  façade.","habitants":"Famille dEnnery\r\n        \"","divers":"Château de Vaudelle à Moulins-Engilbert","gps":"","images":["../../jctruffet.com/image/image_58/58_Vaudelle_1.jpg","../../jctruffet.com/image/image_58/58_Vaudelle_2.jpg","../../jctruffet.com/image/image_58/58_Vaudelle_3.jpg"]},"Consult_chateau_formulaire66d3":{"id":"Consult_chateau_formulaire66d3","dept":"58","canton":"Pouilly sur Loire","commune":"Suilly la tour","nom":"Vergers_Suilly","type":"Château","periode":"XV-XIX","histoire":"VERGERS, une représentation gravée de l'ancien château de Vergers. Mahaud de Varigny, fille dHugues, cité à La Garde et à Donzy vers 1330, est la première citée par Marolles pour cette « maison de Suilly-Vergers. Elle aurait épousé successivement Guillaume de Champlemy, et Jean du Bois. Leur fille Jeannette du Bois apporta Vergers à Jean II dArmes vers 1450. Elle tint Vergers pendant plus dun siècle, et Valentine dArmes lapporta par mariage aux Chabannes en 1570. Puis par les Varigny, une famille nivernaise originaire dAchun, devenus seigneurs de Chassy, puis du Deffend en Bourbonnais. François de Chabannes, comte de Saignes, fut le premier seigneur de Vergers, Ils  le tinrent pendant près de deux siècles. Paul de Chabannes vendit finalement ce vieux fief, où la famille ne résidait plus depuis longtemps, et la forge qui y était associée, aux moines de la Chartreuse de Bellary en 1714.  Propriété de Céline Raimbault, épouse de Henri Parent (peintre) qui le fait reconstruire vers 1890.   Forges de Vergers, propriétaire au XIXe siècle, Pellerin Joseph Loizeau, juge de paix à Donzy, ainsi que du château du même lieu. Il était le grand-père de Céline Raimbault.  Propriété de monsieur Dulieu.","architecture":"Vergers de la fin XVe siècle et remanié début du XXe siècle, ce château forteresse du Moyen-Age  a comme particularité d'avoir une charpente métallique réalisée par Gustave Eiffel. L'architecte Charles Garnier (connu pour l'Opéra de Paris) a réalisé une partie de la décoration des salons. Remanié au XIXe siècle dans un style renaissance Une chapelle du XIXe siècle, en lhonneur de Saint-Germain, fait également partie de la propriété.  Vergers de style néogothique  et Renaissance.  On peut supposer que le château fut \"modernisé\" pendant cette période, touchant au goût de la Renaissance.  Sur l'emplacement du premier château féodal qui  aurait été construit au début du XIVe siècle par les Varigny,  quon disait issue des comtes dAngoulême. Vergers et sa forge furent vendus comme l'ensemble de ses biens. Le vieux château fut remplacé par l'édifice actuel sous le second Empire, et l'activité métallurgique cessa à la fin du XIXe siècle. Actuellement dirigée par Christian Buri, SCI château du Vergers a été fondée en octobre 2002.","habitants":"Famille de François de Chabannes\r\n        \"","divers":"Château des Vergers à Suilly la Tour","gps":"","images":["../../jctruffet.com/image/image_58/58_Vergers_Suilly_1.jpg","../../jctruffet.com/image/image_58/58_Vergers_Suilly_2.jpg","../../jctruffet.com/image/image_58/58_Vergers_Suilly_3.jpg","../../jctruffet.com/image/image_58/58_Vergers_Suilly_4.jpg","../../jctruffet.com/image/image_58/58_Vergers_Suilly_5.jpg"]},"Consult_chateau_formulairef8c7":{"id":"Consult_chateau_formulairef8c7","dept":"58","canton":"Decize","commune":"Verneuil","nom":"Verneuil_Morvan","type":"Château","periode":"XIII-XIV","histoire":"VERNEUIL, château fort du XIIIe siècle situé à Verneuil. A appartenu  aux seigneurs de La Perrière, de La Rivière, de Digoine, de Fontenay, de Babute, de Bonnay et de Maumigny. Cette dernière famille a agrandit lédifice au début du XVIIIe siècle en construisant un nouveau corps de logis. Au début du XIVe siècle, le château appartenait à Guillaume de La Perrière. Il subit d'autres aménagements au XVIe siècle, avec des nouvelles baies et au début du XVIIIe siècle, où la famille de Maumigny l'agrandit d'un nouveau corps de logis.  Aujourdhui, la demeure appartient au comte de Cordon et domine toujours le Bourg. Louis Antoine de Saint-Just, célèbre révolutionnaire français, passa sa petite enfance dans le village.","architecture":"le château fort de Verneuil date du XIIIe siècle édifice médiéval . La partie la plus ancienne composée d'un donjon quadrangulaire de trois étages date du XIIIe siècle. Au XVe siècle, une tour circulaire vient renforcer l'angle nord-est du donjon. Dans le même temps, on édifie des courtines en quadrilatère avec une tour à chaque angle. Le château a été transmis de génération en génération jusqu'à aujourd'hui et n'a jamais été vendu.   Construit au début du XIVe siècle, la tour rectangulaire domine la vallée de lAndarge, non loin dune ancienne voie romaine et de léglise du village. Au XVe siècle, elle a été renforcée par quatre tours rondes.","habitants":"Famille de Guillaume de La Perrière.\r\n        \"","divers":"Château de Verneuil","gps":"","images":["../../jctruffet.com/image/image_58/58_Verneuil_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Verneuil_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Verneuil_Morvan_3.jpg","../../jctruffet.com/image/image_58/58_Verneuil_Morvan_4.jpg","../../jctruffet.com/image/image_58/58_Verneuil_Morvan_5.jpg"]},"Consult_chateau_formulairea107-2":{"id":"Consult_chateau_formulairea107-2","dept":"58","canton":"Charité sur Loire","commune":"Chasnay","nom":"Vernière_Morvan","type":"Château","periode":"XIX","histoire":"VERNIERE  les seigneurs, en 1282 les Reynaud,  en 1333 à Guillaume des Barres. En 1528 de  Jean de Pernay, écuyer, seigneur de Chasnay, Suilly et Morigny.  E n 1532 à Jean de La Barre. En 1555 à Florent de La Barre, seigneur de Chasnay en partie et de La Vernière. En 1598 à Edme de La Barre. Et en  1604 à 1640 à  François de La Barre.  En 1650  à Edme de La Barre. En  1650  à  Charles Durand. En 1657 à 1666  à  Gabriel de la Barre, seigneur baron de Chasnay, de la Vernière, chevalier des ordres du roi  En 1667 à 1680 environ Edme de la Barre, frère et héritier de Gabriel.  En 1685 à Marie de Chéry, dont les enfants demeurent à la Vernière qui est le château dudit Chasnay et se nomme messieurs de la Barre, barons de la Vernière.  En 1687 à Nicolas de la Barre, seigneur de La Vernière et de Chasnay.  En 1693 à 1700 aux vicomte François de Reugny, baron de Chasnay, La Vernière et autres lieux. En 1704 à  Jean de Bèze, conseiller du roi au bailliage, chanoine. En 1730 à Girard de Busson. En  1775 à Etienne-Nazaire Girard de Busson, seigneur de Chasnay de la Vernière. Et en 1788 à messire Girard de Busson, seigneur de Montifault, la Vernière et Chasnay la Vernière. Le seigneur de Chasnay, Gabriel de La Barre, Il était l'époux d'Anne-Rose de Raichecourt.","architecture":"la Vernière construit au milieu XIXe siècle. Deux corps de logis en équerre à trois niveaux avec lucarnes sur toit brisé flanqué en façade de deux tours carrées à toit pointus à quatre pans, entrée par escalier à double révolution sur l'autre corps de logis trois niveaux toit à la mansart.","habitants":"Famille de  Gabriel de La Barre\r\n        \r\n        \r\n        \"","divers":"Château de Vernière à Chasnay","gps":"","images":["../../jctruffet.com/image/image_58/58_Verniere_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Verniere_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Verniere_Morvan_3.jpg","../../jctruffet.com/image/image_58/58_Verniere_Morvan_4.jpg"]},"Consult_chateau_formulaire9fc6":{"id":"Consult_chateau_formulaire9fc6","dept":"58","canton":"Saint-Saulge","commune":"Rouy","nom":"Vesvres","type":"Château","periode":"XIV","histoire":"Trois châteaux à Vesvres celui de Vesvres, de Servandet et la tour du Creuzet.                                                                  \r\n  VESVRES   confisqué par Louis XI en 1474 à  Jean de Billy au XIVe siècle après la mort de Charles le Téméraire en 1477 le château est rendu aux successeurs de Billy, passe à la maison de Rochefort,\r\nPuis à la maison de Pracomtal d'Armes,  d'Ancienville, de La Platière,  Camille Mathieu, François Dauvergne, Gilly et Philippe Este, Dalloz-Bourguignon et  Bruno Ecklé. A partir du XVIe siècle, le fief est passé entre les mains de différents propriétaires qui ne l'ont pas entretenu. A la Révolution, le bâtiment dans un état délabré, est confisqué comme bien national. En 1794, Camille Mathieu, fils aîné de Claude, achète les terres et prés faisant partie des biens confisqués à la famille de Pracomtal à Vesvres, ainsi que le château.\r\nSERVANDET est une seigneurie très ancienne, mais dont on ne trouve la trace qu'en 1476. Elle est possession de la maison Des Ulmes à partir de 1640. Par suite de soucis financiers, celle-ci la revend en 1746 à Pierre, seigneur de Saincy, dans la paroisse de Fertrève. Le fils de ce seigneur fortuné, Jacques Pierre, qui lui succède comme trésorier de France à Moulins, est guillotiné à Lyon en 1793.                                                              CREUZET Il ne reste plus rien du château qu'une vieille tour tronquée, flanquée aujourd'hui de souille à cochons. Cette seigneurie était l'apanage de la maison Le Breton au XVIe siècle et, à partir de 1706, de la maison de Champ.","architecture":"Vesvres,  en 1852,  présente une sorte de donjon carré, à murs fort épais, sans caractère, mais qui peut dater du XVe siècle, auquel est accolé un bâtiment long du XVIe siècle, muni d'une large porte, surmontée de rainures destinées à renfermer les bras d'un pont levis permettant de passer les fossés entourant le château. D'autres bâtiments et des tourelles des XVIe et XVIIe siècles, portant des écussons brisés aux armes de la famille d'Armes, se trouvent derrière le principal corps de logis. Au nord, un pigeonnier orné de frises sculptées du XVIe siècle. Ce pavillon carré à l'angle Nord-Est, est la partie subsistante de l'ancienne maison-forte qui possède un escalier à vis sur trois niveaux. Daté du XVe siècle, ce donjon carré a des murs très épais qui possèdent à sa base des archères, agrandies en canonnières. La salle basse est voûtée en berceau. Il lui fut accolé un bâtiment tout en longueur au XVIe siècle. Il ne reste que la tour de l'angle Sud-Ouest qui fut écrêtée. Dans les murs Nord et Sud subsistent des meurtrières, les courtines furent doublées au  XIIIe siècle et XIVe siècle, pour en faire des logements destinés à la garnison. La courtine Ouest fut surélevée d'un bâtiment.  Le bâtiment qui fut accolé au Nord de la cour, sur la face Ouest du donjon, comporte un large porche encadré des rainures du système de levage d'un pont levis, qui permettait de franchir les larges douves. Le porche fut surmonté d'un fronton cintré, percé d'un oculus recevant le blason des Armes, qui fut bûché à la Révolution. Il possède des ouvertures de canonnières, toujours en place.","habitants":"Famille de Camille Mathieu                                                         Famille de  Jacques Pierre\r\n        \"","divers":"Château de Vesvres à Rouy","gps":"","images":["../../jctruffet.com/image/image_58/58_Vesvres_1.jpg","../../jctruffet.com/image/image_58/58_Vesvres_2.jpg","../../jctruffet.com/image/image_58/58_Vesvres_3.jpg","../../jctruffet.com/image/image_58/58_Vesvres_4.jpg"]},"Consult_chateau_formulairecc7e":{"id":"Consult_chateau_formulairecc7e","dept":"58","canton":"Pouilly sur Loire","commune":"Vielmanay","nom":"Vieux_Moulin","type":"Maison forte","periode":"XIII","histoire":"VIEUX-MOULIN,  maison forte  assurait par  la protection de labbaye de Bellary relevant de la châtellenie de Châteauneuf. Au XIVe siècle fief de la seigneurie de aux Bureau de la rivière.  La guerre de cent ans contribua à ruiner en partie la maison-forte, passa par alliance à la famille de Marafin issu dune famille Tourangelle, proche du pouvoir royal qui fut reconstruite à la Renaissance par Guillaume de Marafin. Le château ne resta pas longtemps à lécart des querelles religieuses qui ensanglantèrent toute la région. Un des descendants de Guillaume de Marafin, François de Marafin, chef huguenot, facilita la prise de La Charité-sur-Loire par les troupes Calvinistes de Sancerre en leur révélant lexistence dun gué, qui leur permit de prendre à revers les défenses de la ville. Au cours de la nuit de la Saint Barthélémy en 1572, François de Marafin  connut le même sort que lAmiral de Coligny.  Le domaine passa aux Troussebois, puis aux Thibault, et aux Lespinasse. Au XVIIIe siècle par alliance passe à François Simon seigneur de Brinay, puis à Etienne Beaufils, conseiller du roi. En 1790 l'héritière des Beaufils  épouse Gilbert Leblanc de la Garderie, ce domaine qui à échappé à tout dommage pendant la Révolution doit-être malgré tout remanié par la famille Ponceau en 1850 qui le revende à la famille Delafontaine.  Céline et Gabriel Zulauff ont acheté le château à rénover à Vielmanay afin d'ouvrir des chambres d'hôtes, ouverture prévue en 2017.","architecture":"Vieux moulin, de lancienne maison forte médiévale de  la fin du XIIIe siècle cernée de douves,, il reste encore aujourdhui la tour massive Nord Est, la base de la tour Sud Ouest, ainsi qune partie de la tour carrée dentrée. La tour Nord Est, très massive, est couronnée de mâchicoulis et dun chemin de ronde, ses murs sont percés de deux canonnières dorigine où des archères ont été créées plus tard. La cour intérieure permet daccéder à un grand corps de logis, à un étage, construit sur les caves voûtées dorigine et entre les deux tours rondes. La façade possède des baies moulurées, elle est flanquée en son milieu dune tour hexagonale coiffée dun toiture polygonale et abritant un escalier à vis.  Au XVIIe siècle, des fenêtres ont été ouvertes dans les deux façades et deux pavillons rectangulaires ont été élevés de part et dautre du porche et sur les bases des constructions de lenceinte du XIIIe siècle.","habitants":"Famille de  Guillaume de Marafin\r\n        \"","divers":"Le manoir du Vieux Moulin à Vielmanay","gps":"","images":["../../jctruffet.com/image/image_58/58_Vieux_Moulin_1.jpg","../../jctruffet.com/image/image_58/58_Vieux_Moulin_2.jpg","../../jctruffet.com/image/image_58/58_Vieux_Moulin_3.jpg","../../jctruffet.com/image/image_58/58_Vieux_Moulin_4.jpg"]},"Consult_chateau_formulaire7fde":{"id":"Consult_chateau_formulaire7fde","dept":"58","canton":"Tannay","commune":"Neuffontaines","nom":"Vigne_Morvan","type":"Manoir","periode":"","histoire":"NEUFFONTAINES, dit de la VIGNE, manoir et fief des Barbier de Vésigneux, la terre de la Vignes échoit par alliance en 1526 aux Montmorillon puis en 1588 aux Bourbon-Busset avant d'appartenir aux Barbier de la Brosse. Vers 1850 le château est la propriété de la famille de Sermizelles.  Seigneur de Bazoches et de Vésigneux, et Jacqueline de Vésigneux, dame de Vignes, son épouse. Leur petite fille, Louise de Montmorillon, épousa César de Bourbon, comte de Busset. Les armoiries des Barbier de Vésigneux sont reconnaissables sur un blason martelé du corps d'entrée et elles figurent sur un culot de la chapelle Saint-Pierre de Mont Sabot.  La tombe de Guillaume Barbier de la Brosse, seigneur de Vignes-le-Haut et Vignes-le-Bas, mort en 1782, serait encore visible dans le cimetière de Mont Sabot.   Propriétaire du château en 2004 et décédé depuis. Son fils, Stephan Selvani, médecin, qui demeure en Suède à Jârna, au sud-ouest de Stockholm, ainsi que sa fille Silvia, également médecin à Freibourg (Allemagne) en sont par héritage les propriétaires actuels.","architecture":"Le manoir qui porte de nombreux vestiges des XVe et XVIe siècles a été très reconstruit au XVIIIe siècle, puis remanié au XIXe siècle. On accède à la cour antérieure du château par un portail dont l'arcade mutilée jouxte la chapelle implantée en bordure de la rue. Le manoir de plan en L, ne subsiste que la partie orientale abritant le logis et une vaste vinée. L'accès au logis s'effectue par une galerie ouverte dont les deux arcades en anse-de-panier reposent sur une colonne cylindrique agrémentée d'un chapiteau. Portes du logis à décor d'arcs en accolade et de blasons armoriés martelés. Tour d'escalier de plan rectangulaire dans l'angle du logis et de la vinée. Une cave couverte d'une voûte en anse-de-panier banchée et un cavron occupent le sous-sol de la vinée. La cave communique en avant avec un ancien cellier voûté en berceau plein-cintre.","habitants":"famille de Sermizelles\r\n        \r\n        \"","divers":"Manoir de la Vigne à Neuffontaines.","gps":"","images":["../../jctruffet.com/image/image_58/58_Vigne_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Vigne_Morvan_2.jpg"]},"Consult_chateau_formulaire1e88":{"id":"Consult_chateau_formulaire1e88","dept":"58","canton":"La Machine","commune":"Breugnon","nom":"Villaine","type":"château","periode":"XIV","histoire":"Le Château de Villaine est situé a Beugnon, il est daté des XIIIe et XIVe-XVIe siècles, il à été remanié style renaissance. Guillaume Chevalier le seigneur de Villaine en 1348. La famille de Bligny en 1550 entre en possession de Larrault et Villaine, en 1641 du fief de Beugnon. En 1718 le marquis dArgence achète toutes ces terres, elles vont être dispersées à la révolution. Depuis 1950 le château est privé.  Tout au long de lhistoire, le nom du village évolua de Brugnone en 1286 à Beugnon en 1638 pour devenir par la suite Breugnon qui dépendait du bailliage dAuxerre et Villaine et Latrault. Au petit château de Villaine, à deux pas du Morvan, vous serez accueillis comme des rois par Jipé et Marie-Noëlle, deux artistes peintres et sculpteurs. Aujourd'hui chambres d'hôtes.","architecture":"Villaine  il est daté du XVIe siècles, il à été remanié de style renaissance,  dont il ne reste que la tourelle et des fenêtres en partie bouchées. Ce château aurait des oubliettes et un souterrain qui, selon la légende, iraient jusqu'à Saint-Pierre-du -Mont. A la Révolution Française, les terres du château de Villaine sont dispersées et vendues au profit de l'Etat. Après avoir servi de bergerie et de grange dans les années 1950, le château devient la propriété d'un particulier. Le 24 Juin 1884, un incendie, provoqué par la foudre, se déclare à Villaine, détruisant presque entièrement le hameau. A l'exception d'un seul bâtiment, qui était couvert en tuiles, seuls les bâtiments isolés sont sauvés.","habitants":"Famille de Bligny\r\n        \r\n        \"","divers":"Château de Vilaine à Breugnon","gps":"","images":["../../jctruffet.com/image/image_58/58_Villaine_1.jpg","../../jctruffet.com/image/image_58/58_Villaine_2.jpg"]},"Consult_chateau_formulaire8087":{"id":"Consult_chateau_formulaire8087","dept":"58","canton":"Saint-Pierre le Moutier","commune":"Saint-Parize le Chatel","nom":"Villars_Morvan","type":"","periode":"","histoire":"VILLARS. Le château de Villars, le vieux château de Villars date du début du XIV siècle. Plusieurs seigneurs se succédèrent en ce lieu dont la duchesse de Clèves, les familles Dufour puis par alliance les familles de Forestier puis de Bouiller. En 1247, Bernard de Villars, chevalier détient le fief des Mahaut comtesse de Nevers, le comte de Nevers inféode le fief à Jean de Boelle seigneur de Bessay  au XIVe siècle, en 1374 Villars passe à Henriot Baudequin chambellan du comte de Nevers et Philippe le Hardi acquiert en 1393 le fief pour Marguerite de Flandres son épouse comtesse qui le transmettra à Antoine de Villars. En 1503 passe à François de Breschart chambellan du comte de Nevers, plusieurs seigneurs s'y succédèrent, François de Clèves,  en 1540 à Gilles Vaillant, prévôt, à la fin du XVIe siècle acheté par Dufour  Lanty, puis, par alliance, les familles de Forestier, toujours par alliance à Rosalie Dufour épouse en 1813 le comte Albert de Bouillé. Passera par succession à la famille Vassal-Sineuil,  Ana Sofia de Vassal. Propriétaire actuel, comme il est dans notre famille depuis le XVIe siècle.  Or, il y a quinze ans, le vieux château menaçait de  ruines. Il fallait entreprendre des travaux pour le mettre hors d'eau. Depuis 2006, Ana Sofia de Vassal et son mari, Hubert, le rénovent, la bâtisse médiévale dont ils ont hérités et qu'ils s'attachent à faire revivre.","architecture":"Le vieux château de Villars date du début du XIV siècle. C'était une forteresse de première importance que se disputèrent Français et Anglais, Armagnacs et Bourbons pendant la guerre de cent ans. Très remanié au XVe siècle, de plan barlong comporte quatre tours rondes aux angles et sur ses faces nord, sud et ouest  un pavillon occupant le centre de la courtine, entouré de fossés. Reconstruit au XIXe siècle  le pavillon ouest est percé d'un vaste porche d'entrée le pont levis changé au XVIIe siècle par un pont dormant, le donjon donc le pavillon nord été dès l'origine la vocation résidentielle, les pavillon sud consacré à la défense ont voit les archères, les tours d'angles ont été découronnées à l'exception de celle du nord-ouest.","habitants":"Familles de Forestier\r\n        \"","divers":"Château de Villars à Saint-Parize le Chatel","gps":"","images":["../../jctruffet.com/image/image_58/58_Villars_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Villars_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Villars_Morvan_3.jpg","../../jctruffet.com/image/image_58/58_Villars_Morvan_4.jpg"]},"Consult_chateau_formulaire068e":{"id":"Consult_chateau_formulaire068e","dept":"58","canton":"","commune":"Ville-Languy","nom":"Ville_Languy","type":"Château","periode":"XV-XVII","histoire":"Manoir de Chouy et château de Champy à Ville-Languy.                            CHOUY,  en 1318, Chouis est un petit fief appartenant à Alodis de Chouis. Il passe ensuite à la famille Gentils, seigneurs d'Auzon (Lucenay-lès-Aix). Il reste longtemps leur propriété avant de passer aux Chouis, aux Ecots, aux la Cave. On y retrouve en 1467 Jean, un des 100 gentilshommes de la maison du Roy, puis en 1687 Antoine. Il passe ensuite à la famille de Changy (dame Marguerite Ollivier, veuve de Changy en 1678 puis Hugues Nicolas) avant d'échoir aux Pinet des Ecots en 1884.                               \r\n  Champy l'histoire se repporte à celle de Ville-Languy.","architecture":"Ce petit manoir fortifié possède un corps de logis abrité derrière une tour ronde à 3 étages, à vocation défensive. Deux petits bâtiments ont été rajoutés de chaque côté du corps principal, dont un qui s'avance en équerre.                                                                                   Champy corps de logis rectangulaire à deux niveaux  avec lucarnes en combles sur toit brisé.","habitants":"Famille Gentils                                                                          Famille de Changy\r\n        \"","divers":"Manoir de Chouy et château de Champy  à Villa-Languy","gps":"","images":["../../jctruffet.com/image/image_58/58_Ville_Languy_1.jpg","../../jctruffet.com/image/image_58/58_Ville_Languy_2.jpg","../../jctruffet.com/image/image_58/58_Ville_Languy_3.jpg"]},"Consult_chateau_formulaire8dd0-3":{"id":"Consult_chateau_formulaire8dd0-3","dept":"58","canton":"Donzy","commune":"Menestreau","nom":"Villers","type":"Château","periode":"XIII-XIV","histoire":"VILLERS est daté des XIIIe-XIXe siècles. Il est construit au XVe siècle sur une terre formant un fief avec Nanvignes, ce château féodal, est situé dans un vallonnement, il est rebâti au XVe siècle,  Une propriété des Chabannes en 1496, puis à Guillaume Tenon, trésorier de France et conseiller du roi en 1506. En 1697, Le fief est érigé en marquisat, en faveur de François Menou de Charnisau, par Louis XIV.","architecture":"Construit au XVe siècle sur une terre formant le fief avec Nanvignes, ce château de Villers, situé dans un vallonnement contrôlait l'ancienne voie romaine menant à Entrains. Il possède une Chapelle avec des fenêtres gothiques. il est entouré du ruisseau le Nohain.  Lentrée du porche est couverte, elle est placée sous une tour carrée portant une horloge, des meneaux nous rappellent quune herse fermait lentrée. Le château contrôlait lancienne voie romaine menant à Entrains. Le château possède une chapelle. Il est de plan rectangulaire.","habitants":"Famille des  Chabannes\r\n        \"","divers":"Château de Villers à Menestreau","gps":"","images":["../../jctruffet.com/image/image_58/58_Villers_1.jpg","../../jctruffet.com/image/image_58/58_Villers_2.jpg","../../jctruffet.com/image/image_58/58_Villers_3.jpg","../../jctruffet.com/image/image_58/58_Villers_4.jpg"]},"Consult_chateau_formulaire6a6b":{"id":"Consult_chateau_formulaire6a6b","dept":"58","canton":"Lormes","commune":"Saint-Martin du Puy","nom":"Vésigneux","type":"Château","periode":"XVI-XVIII","histoire":"deux châteaux à Saint-Martin du Puy, celui de Vésigneux du XVIe siècle et celui des Gobelins du XVIIIe siècle  pas d'information.                     VESIGNEUX, fief de la maison de Chastellux, le dernier des Vésigneux épousa Saladin de Montmorillon,  la fille unique de Saladin    épousa en 1158  César de Bourbon comte de Busset et de Chalus, parmi leur petit-fils on  trouve Louise de la Fayette fille d'honneur d'Anne d'Autriche. Cette demeure a appartenu au Grand Condé, né en 1621, qui eut entre autres titres ceux de duc dEnghien, duc de Bourbon, comte de Sancerre, etc. Ce brillant général sillustra contre les espagnols à la bataille de Rocroy en 1643 et fut un meneur de la Fronde, partagé entre sa fidélité au jeune Louis XIV et son aversion pour Mazarin.  Il se raconte que Sébastien le Prestre, futur maréchal de Vauban, aurait été présenté dans sa jeunesse au Grand Condé dans les murs du château de Vésigneux. Dans la tourmente de la Révolution française, en 1793, le château fut pillé et laile nord-est détruite. Vestige de lancienne enceinte, le pigeonnier est remarquable du XVIe et XVIIe siècles, propriété du grand Condé, le fief  relevait du comté de Nevers : possession des Vésigneux, des Montmorillon, des Bourbon-Busset.  Epoque de construction : En 1793, le château a été vandalisé et une aile a été détruite au nord-est. Le domaine est racheté en 1926 par mademoiselle de Bourbon qui le fit restaurer, le propriétaire actuel est  son petit-neveu le comte de Bourbon-Chalus.","architecture":"Vésigneux du XVIe- XVIIIe siècles,  Au Moyen-Age, existait à cet endroit un château féodal qui a été détruit en grande partie au moment de la guerre de Cent ans. Pour une fois, ce nétait pas les protestants mais les anglais. Le logis lui-même a été reconstruit au XVIe siècle. Double corps de logis en équerre à deux niveaux  flanqué sur façade extérieure à l'angle droit en hors uvre le donjon à gauche une tour ronde  toit en poivrière et plein cintre un pavillon d'entrée saillant. De la place forte originelle ne subsiste que le grand et puissant donjon carré. Au XVIIe siècle un nouveau toit vient le coiffer; ce toit dit à impériale est surmonté dun lanternon. Une chapelle se trouve au rez-de-chaussée du donjon. Ses murs furent décorés de peintures au XVIIe siècle. Les douves ont été plus ou moins comblées et le pont levis a laissé place à un pont en pierre.\r\n De l'époque médiévale date le puissant donjon carré. Le château est reconstruit à la fin du XVIe siècle par les Bourbon; il est pourvu d'un décor de tapisseries des Gobelins et d'Aubusson au XVIIe siècle, puis des boiseries du XVIIIe siècle.","habitants":"Grand Condé                                                                                    Comte Philippe Bourbon-Busset de Châlus\r\n        \r\n        \"","divers":"Château de Vésigneux et des Gobelins à Saint-Martin du Puy","gps":"","images":["../../jctruffet.com/image/image_58/58_Vesigneux_1.jpg","../../jctruffet.com/image/image_58/58_Vesigneux_2.jpg","../../jctruffet.com/image/image_58/58_Vesigneux_3.jpg","../../jctruffet.com/image/image_58/58_Vesigneux_4.jpg","../../jctruffet.com/image/image_58/58_Vesigneux_5.jpg","../../jctruffet.com/image/image_58/58_Vesigneux_6.jpg","../../jctruffet.com/image/image_58/58_Vesigneux_7.jpg","../../jctruffet.com/image/image_58/58_Vesigneux_8.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','58 — Nièvre'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
