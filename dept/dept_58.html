Théodore Viel de Lunas d'Espeuilles fait construire des thermes qui ouvrent en 1855, et les sources sont déclarées d'utilité publique en 1860. La période 1855-1930 voit une clientèle bourgeoise fréquenter l'établissement thermal. Cela amène la construction d'un casino, d'un théâtre, de courts de tennis, d'un centre équestre, du golf, de la piscine, et d'un kiosque à musique. Des hôtels et des villas sont alors construits. \r\nLes Américains entrent dans Saint-Honoré le 12 décembre 1944. C'est en 1974 que la commune distingue son nom en y ajoutant la terminaison les-Bains. Et à partir de 1820 on commença à dégager les vestiges des installations antiques, sous la direction du marquis d'Espeuilles .                                                                     \r\n Manoir de La QUEUDRE grande bâtisse avec une tour et des grands bâtiments agricoles. Cette antique demeure qui possède en une de ses caves un souterrain traversant la route en direction du château. Elle servit de logement au docteur Eugène Collin, médecin inspecteur des eaux thermales de 1860 à 1883. Elle fut ensuite pendant de nombreuses années transformée en gendarmerie et prison. Il fut habité par le docteur Eugène Collin lorsqu'il avait la charge de l'inspectorat des thermes.              Manoir du GUE fut transformé en école en 1809 par l'établissement d'un soldat promu instituteur. Cet homme avait été longtemps prisonnier en Silésie. Un notaire y demeura quelque temps, puis elle fut partagée entre plusieurs propriétaires et a perdu de son cachet par des rénovations multiples et peu appropriées à ses origines. Ancien fief relevant du seigneur de la Montagne. Au XIXe siècle, cette bâtisse abrite une école. De nombreux châteaux hôtels tel que les Myosotis que tout le monde connaît. Cette structure existe depuis 1968, créée à l'origine par le docteur Largier. Établissement privé, elle est dirigée par Didier Bourlon, depuis 1987. Aujourd'hui, appelé  château.","architecture":"La station thermales, le castel des cèdres, les Myosotis, Rouveyrer, le Parc, comme dans toutes les stations thermales les constructions du XIXe siècle souvent reflètent la Renaissance néogothique des Thermes  qui sont bâtis sur l'emplacement des thermes romains, nommés Aquae Nisinei. Une première société thermale commande en 1826 à l'architecte Charles Ledru la réhabilitation des thermes à partir des structures restantes. Ce fut finalement François Agnéty qui reçut cette commande et soumit un projet différent.\r\nLes thermes sont construits en 1854 d'après les plans d'Andoche Parthiot. Le pavillon d'entrée est construit en 1898 par Honoré Pons. Gros uvre en pierre de taille, brique et calcaire. Couverture d'ardoise et de zinc. Dôme carré, toit à longs pans. Dans les années 1950, le directeur de létablissement thermal charge lartiste Christian Gerber de la création des baignoires et des mosaïques .\r\n L'établissement thermal est situé dans un parc datant de la seconde moitié du XIXe siècle, mais dont l'aspect actuel date des années 1950  par Christian Gerber. C'est l'ingénieur des mines Jules François qui se charge de la partie hydraulique. Les Thermes sont inaugurés en juillet 1855 et les sources déclarées d'utilité publique le 28 avril 1860. Ces eaux ont une origine pluviale, pénétrant dans le sol à une quinzaine de kilomètres à l'est de la station. Elles parcourent la distance en 20 ans à une profondeur de 2 500 mètres remontant à une température de 24 °C à 29 °C, chargées en minéraux : soufre et traces d'arsenic. Elles sont sulfurées et chlorurées sodiques. Elles furent commercialisées en bouteilles en 1886 et admises dans les hôpitaux parisiens, mais le succès ne dura pas.","habitants":"marquis d'Espeuilles\r\n        \r\n        \"","divers":"Station thermal de Saint-Honoré les Bains avec le château de Montagne des Cédres, de Rouveyrer et la villa Myosotis","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Honore_les_Bains_1.jpg","../../jctruffet.com/image/image_58/58_St_Honore_les_Bains_2.jpg","../../jctruffet.com/image/image_58/58_St_Honore_les_Bains_3.jpg","../../jctruffet.com/image/image_58/58_St_Honore_les_Bains_4.jpg","../../jctruffet.com/image/image_58/58_St_Honore_les_Bains_5.jpg","../../jctruffet.com/image/image_58/58_St_Honore_les_Bains_6.jpg","../../jctruffet.com/image/image_58/58_St_Honore_les_Bains_7.jpg"]},"Consult_chateau_formulaire5d4d-2":{"id":"Consult_chateau_formulaire5d4d-2","dept":"58","canton":"Château chinon","commune":"Saint-Léger du Fougeret","nom":"St_Leger_Fougeret","type":"Château","periode":"XVI-XIX","histoire":"trois châteaux à Saint-Léger-de-Fourgeret dont celui de Saint-Léger, de Bouteloin, de Clinzeau, et  une maison forte datant des XVIe et XVIIe siècles,\r\nSt-LEGER, dès 1351, Guillaume de Tailleur, écuyer, révèle au comte de Nevers sa maison à Saint-Léger-de-Fougeret.  En 1369, des compagnies de Bretons et d'Anglois écumant le Morvan en font un point de ravitaillement. Vers la fin du XVle siècle, après de nombreux affrontements dans la région, le château passe aux mains des Cottignon, c'est une famille appartenant à la noblesse dont les représentants font depuis le XIVe siècle partie des hommes de foi du comté de Nevers. Par alliance avec la famille De Champs, s'approprient le nom de De Champs de Saint-Léger. En 1624, Louis De Champs de Saint-Léger, écuyer, rend hommage au duc de Nevers pour le chastel et maison forte de Saint-Léger-de-Fougeret que ses descendants garderont jusqu'en 1890. Par la suite, la terre passe à la famille de Varey, puis à la famille Escarra, actuel propriétaire.\r\nBOUTELOIN, demeure ou château du XIXe siècle. Nous ignorons si un  tenu par Guillaume de Migné en 1504.  remanié au XXe siècle avec l'élévation de l'aile sud. A partir de 1951, acquis par  la société des compteurs de Montrouge, puis la société Schlumberger y installent des colonies de vacances. Aujourd'hui l'union des organisations islamiques de France (UOIF) y a installé un Institut européen des sciences humaines, centre de formation dimams et camp de jeunesse islamique agréé par le ministère de la santé, de la Jeunesse, des sports et de la vie associative.                  CLINZEAU, aujourd'hui sci immobilière par M David Barnhill depuis 2005.","architecture":"Saint-Léger de Fougeret  est une maison forte du XIVe siècle, attestée en 1351, profondément modifiée et agrandie au XVIIe, l'aile gauche de la façade principale ainsi que le colombier seraient de la seconde moitié du XVIIIe siècle.  A l'origine maison forte, le château se présente sous l'aspect d'un bâtiment d'un long corps de logis  flanqué  de deux pavillons légèrement saillants avec une aile en retour au sud, à l'ouest une tour carrée  plaquée au centre de la façade, d'aspect massif de modestes proportions mais aux murs très épais. Il avait pour vocation essentielle d'abriter tout le monde en cas de périr imminent. Agrandi, remanié.                                Le château de Clinzeau, de style néo-gothique: autrefois grand domaine, la propriété comprenait 308 ha dont dépendaient cinq fermes. De plan quadrangulaire construction de briques  à deux niveaux et lucarnes en combles, pavillon d'entrée plein cintre de forme arrondie bâtisse accolée de deux pavillons rectangulaires sur angle côté parc toit à l'impériale.\r\nLe château de Bouteloin manoir plus ancien existait avant sa construction au début du XIXe siècle de plan rectangulaire à un niveau sur la partie centrale avec lucarne sur comble, accolée de deux pavillons rectangulaire à deux niveaux  un avec toit en croupes l'autre à deux pans avec colombages.","habitants":"Famille de Champs,                                                                           Société Schlumberger\r\n        \"","divers":"Château de Saint-Leger de Bouteloin et de Clinzeau  à Saint-Leger de Fougeret","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Leger_Fougeret_1.jpg","../../jctruffet.com/image/image_58/58_St_Leger_Fougeret_2.jpg","../../jctruffet.com/image/image_58/58_St_Leger_Fougeret_3.jpg","../../jctruffet.com/image/image_58/58_St_Leger_Fougeret_4.jpg","../../jctruffet.com/image/image_58/58_St_Leger_Fougeret_5.jpg","../../jctruffet.com/image/image_58/58_St_Leger_Fougeret_6.jpg","../../jctruffet.com/image/image_58/58_St_Leger_Fougeret_7.jpg"]},"Consult_chateau_formulairecbcd":{"id":"Consult_chateau_formulairecbcd","dept":"58","canton":"Saint-Saulge","commune":"Sainte-Marie","nom":"St_Martin_Giverdy","type":"Château","periode":"XIV","histoire":"deux châteaux  à Sainte-Marie celui de Saint-Martin et  du XIVe siècle et le manoir de Giverdy du XVe siècle.                                SAINT-MARTIN qui à partir de 1530 fut illustré par la célèbre famille des Rapine de Sainte-Marie qui le racheta à cette date. En 1537, Jehanne de l'Espinasse, veuve de Jehan de Damas, vend la terre et la seigneurie de Sainte-Marie à Guillaume Rapine qui prendra le titre de \"comte Rapine de Sainte-Marie\". La famille gardera, en ligne directe, le château de Saint-Martin jusqu'en 1939 et par ses héritiers adoptifs jusqu'à nos jours, pour le malheur de l'édifice. En 1712, Jacques François Rapine de Sainte-Marie embellit le château en le dotant de superbes jardins dessinés par Le Nôtre et réalisés par un certain Fity qui plus tard créa le parc de Nevers. De 1940 à nos jours, les héritiers des comtes de Sainte-Marie l'ont littéralement dépouillé.\r\nGIVERDY,  à lest du château, lancienne motte féodale, premier habitat des seigneurs du lieu, citée dans les textes jusquà la fin du XIVe siècle. Giverdy a été érigée en paroisse en 1110 par Hugues IV, évêque de Nevers, sous le nom de Giverdiacum. Au XVe siècle Grégoire de Paillard  fait bâtir le manoir pour son épouse Catherine de Quarroble.  Les Seigneurs de Giverdy : Pierre de Charry (1694), Paul de Charry (1715). Une propriété dune personne privée depuis 1995 le manoir  est en cours de restauration par son propriétaire Mr Philippe Dailland.","architecture":"Saint-Martin, quand on voit ce qu'il en reste, on est bien surpris et amer ; en effet, il est immense, disparate; style rococo, baroque et romantique du XVIIIe siècle, arrangé pour une partie au XIXe siècle. Abandonné, dépouillé, parfois squatté, criant son désarroi à la face d'un pays qui ne veut rien faire pour le sauvegarder, on ne peut que déplorer cet abandon. Une chose est sûre, il a été construit sur et à l'emplacement de l'ancien château du XIVe siècle, peut-être même sur le site du vieux monastère du VIe siècle.                                                                                  Giverdy avant et après le manoir de Giverdy. On peut distinguer, à 500 mètres à lest du château, lancienne motte féodale, Joli manoir du XVe siècle accolé à une pièce deau.                                          La commune actuelle de Sainte-Marie rassemble trois paroisses réunies lors de la Révolution Française : celle de Sainte-Marie, celle de Saint-Martin-de-la-Bretonnière et celle de Giverdy.  Propriété privé depuis 1995.","habitants":"Comte Rapine de Sainte-Marie                                                Famille de  Philippe Dailland\r\n        \"","divers":"Château de Saint-Martin et manoir de Giverdy à Sainte Marie","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Martin_Giverdy_1.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Giverdy_2.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Giverdy_3.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Giverdy_4.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Giverdy_5.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Giverdy_6.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Giverdy_7.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Giverdy_8.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Giverdy_9.jpg"]},"Consult_chateau_formulairea027":{"id":"Consult_chateau_formulairea027","dept":"58","canton":"Guérigny","commune":"Saint_Martin d","nom":"St_Martin_Heuille","type":"Château","periode":"XVIII","histoire":"Plusieurs châteaux à saint-Martin d'Heuille dont celui des Quatre- Pavillons du XVIIIe siècles et celui des Montmiens.                          QUATRE-PAVILLONS, le château faisait partie de la seigneurie des Bordes dUrzy. Jehan Carpentier en devient propriétaire à la fin du XVIe siècle. Le château est commencé en 1707 par Jean-François Carpentier sur les structures dun ancien logis seigneurial, des murs denceinte enfermaient la cour du château.                                  Pas d'information sur les autres châteaux","architecture":"le château des Quatre-Pavillons de Saint-Martin dHeuille, doit son nom aux quatre tours carrées élevées aux angles, il est daté du XVIIIe siècle. Le château est terminé en 1711, corps du logis daté de 1724, le perron sur la façade arrière est mentionné au XVIIIe siècle. (un souterrain relis les quatre-Pavillons aux Bordes).  À lorigine, ces quatre pavillons sont habités, un est occupé par les filles, un autre par le cocher, un autre abrite les nécessiteux de la région, recueillis, soignés et nourris par le maître des lieux. Au XVIe siècle, deux forges sont sur la commune, elles sont alimentées par la rivière de lHeuille, une aux Quatre-Pavillons et lautre au gué dHeuillon.","habitants":"Famille de Jean-François Carpentier\r\n        \"","divers":"Château des Quatres Pavillons  et de Montmiens à Saint-Martin d'Heuille","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Martin_Heuille_1.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Heuille_2.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Heuille_3.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Heuille_4.jpg"]},"Consult_chateau_formulairefaf3":{"id":"Consult_chateau_formulairefaf3","dept":"58","canton":"Pouilly sur Loire","commune":"Saint-Martin sur Nohain","nom":"St_Martin_Nohain","type":"Château","periode":"XV-XVII","histoire":"MOCQUES,  demeure seigneuriale du XVe siècle, reconstruit au XVIIe siècle en  une demeure féodale,  cette petite seigneurie, dont le premier titulaire nommé est un puissant personnage de Bourgogne : Claude de Beauvoir, sire de Chastellux, maréchal de France,  hérita. Le plus probable est qu'elle figurait dans la dot de sa troisième épouse, Marie de Savoisy, qui descendait des anciens sires de Saint-Verain, et de ceux de Cours-les-Barres, tout proche.    Elle passa ensuite par une succession d'alliances aux Fontenay du Berry, aux Saint-Quintin, puis aux Ravan de Vieilbourg voisins , et enfin aux la Roche-Loudun, alliés des Marafin  dirigeants protestants de la région,   elle se trouvait au début du XVIIe siècle, entre les mains de la famille du Rozel, d'origine normande mais alliée en Berry et Cosnois, qui la détient pendant 4 générations, mais dont on perd ensuite la trace.   Une anecdote tragique survenue en 1677 a laissé une trace funeste dans les registres : celle de la mort du jeune Jean du Rozel, 15 ans, dévoré par la tristement célèbre \"bête sauvage de Cosne\", ce qui pourrait expliquer que ses parents aient abandonné Mocques.  Après la Révolution, la famille de Chassy est à Mocques, d'où postérité jusqu'à une époque récente.  La propriété de la famille Baucheron de Boissoudy.  \r\nLe manoir du PETIT-FAVRAY construit sous le règne dHenri IV. Propriètaire, Mr. Derouet , agent d'assurances a Paris.","architecture":"Château de Mocques du début du XVII siècle, avec pigeonnier, grange et fermette. Il est situé en mi-colline, entouré de vignes . Du château descendent 3 terrasses vers la route  présente une belle ordonnance classique. Il a remplacé au XVIIe siècle une demeure féodale,  de plan rectangulaire à deux niveaux toit en croupes, pavillon d'entrée saillant avec fronton triangulaire, oeil de buf central et sur l'arrière du bâtiment deux tours rondes en angles toits en poivrières. En 2007, il a fait l'objet d'importants travaux de restauration.","habitants":"Famille Baucheron de Boissoudy\r\n        \"","divers":"Château de Mocques et du Moulin","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Martin_Nohain_1.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Nohain_2.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Nohain_3.jpg","../../jctruffet.com/image/image_58/58_St_Martin_Nohain_4.jpg"]},"Consult_chateau_formulaire0ac0":{"id":"Consult_chateau_formulaire0ac0","dept":"58","canton":"la Machine","commune":"Saint-Ouen sur Loire","nom":"St_Ouen_Loire","type":"Château","periode":"XVI","histoire":"Deux châteaux à Saint-Ouen sur Loire dont celui de Bouy du XVIe siècle et celui de Chevret musée de la seillerie.                         BOUY  Audowin (germanique), évêque de Rouen au VIIe siècle. \r\nCHEVRET société de locations de  biens immobiliers de Xavier Mennesson  et exposition-musée de la sellerie dans le château.","architecture":"Château de Bouy XVIe siècle : logis barlong, tour d'escalier polygonale, chapelle ; vestiges très réduits d'un important ensemble A quelques centaines de mètres des Essarts, se trouve le domaine de Bouy. Les quelques vestiges de fortifications, la petite partie dun château du XVIe siècle, un ensemble de bâtiments et une petite chapelle laissent penser que ce lieu avait jadis une certaine activité. La finale du mot « uy » de Bouy est ancienne et indique lexistence dun village. Ce domaine est placé dans une cuvette au milieu dune clairière entourée par la forêt.\r\n Château de Chevret, de style néo-gothique, de plan rectangulaire  à deux niveaux et lucarnes sur combles deux pavillons de même hauteur sur les côtés.","habitants":"Des évêques de Rouen\r\n        \"","divers":"Château de Chevret et vestiges de Bouy","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Ouen_Loire_1.jpg","../../jctruffet.com/image/image_58/58_St_Ouen_Loire_2.jpg"]},"Consult_chateau_formulairec6a0":{"id":"Consult_chateau_formulairec6a0","dept":"58","canton":"Saint-Pierre le Moutier","commune":"Saint Parize le Châtel","nom":"St_Parize_Chatel","type":"Château","periode":"XV-XVI","histoire":"Quatre châteaux à Parize le Châtel, celui de Chasseigne  du XIVe siècle rebâti au XIXe siècle, de Lange  du XV-XVIe siècle, des Tâches, du Villars  du XIVe siècle( voir article) et trois manoirs  du XVIe siècle dont je n'ai pas d'information ni gravure.                                   CHASSEIGNE, ancien manoir datait du XVe siècle, il  reste plus que le porche composé de deux tours, l'ensemble est relié par une galerie au château moderne. Le château actuel est de style Renaissance et fut bâti en 1868. La famille de Montrichard, originaire de Franche-Comté dont une branche s'installe au XVIIIe siècle dans le Nivernais. TACHES, le vieux château date du XVIe siècle. Il aurait servi de rendez-vous de chasse à François Ier. Rénové depuis peu, il a été de nombreuses années laissé à l'abandon.                                                                        LANGE,  le premier seigneur de Lange connu est Regnaud de Lange, mais c'est sans doute Jean de Lange, qui fit construire le château existant aujourd'hui. À noter qu'en 1525 y naquit Nicolas de Lange, petit-fils du précédent qui devint avocat du roi au présidial de Lyon, puis lieutenant-général à la sénéchaussée, et enfin conseiller puis premier président du Parlement de Dombes.","architecture":"château de la Chasseigne L'ancien manoir datait du XVe siècle, il reste plus que le porche composé de deux tours, l'ensemble est relié par une galerie au château moderne. Le château actuel est de style Renaissance et fut bâti en 1868.\r\nLe château de Tâche, le vieux château date du XVI siècle, rénové depuis peu, il a été de nombreuses années laissé à l'abandon.  De trois niveaux toit à deux pans, avec ailes de deux niveaux et toit à deux pans également.                                                               Le château de Lange Il y avait à l'origine un petit château fort du XIIe siècle, les restes d'une de ses tours étaient encore visibles au début du XXe siècle, à l'ouest de la bâtisse actuelle. Le château actuel date du XVe siècle.","habitants":"Familles Dufour\r\n        \"","divers":"Le château de Chasseigne, de Lange, des Taches, du petit Villars, de Limoux","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Parize_Chatel_1.jpg","../../jctruffet.com/image/image_58/58_St_Parize_Chatel_2.jpg","../../jctruffet.com/image/image_58/58_St_Parize_Chatel_3.jpg","../../jctruffet.com/image/image_58/58_St_Parize_Chatel_4.jpg","../../jctruffet.com/image/image_58/58_St_Parize_Chatel_5.jpg","../../jctruffet.com/image/image_58/58_St_Parize_Chatel_6.jpg","../../jctruffet.com/image/image_58/58_St_Parize_Chatel_7.jpg"]},"Consult_chateau_formulaire2669":{"id":"Consult_chateau_formulaire2669","dept":"58","canton":"Saint-Saulge","commune":"Saint-Saulge","nom":"St_Pierre_Chapelle","type":"Château","periode":"XIX","histoire":"St-PIERRE-CHAPELLE,  Jean-Baptiste Delaveyne, fondateur en 1680, à Saint-Saulge. Marcelline Pauper, née à Saint-Saulge le 11 mars 1666, religieuse des surs de la Charité de Nevers, fondatrice de la maison de Decize et supérieure de celle de Nevers. Louis-Joseph de Thoury est né le 7 septembre 1780 à Sanizy, ce fut le premier des Thoury qui vécut à Saint-Saulge. Il fut nommé maire et chevalier de Malte de minorité le 30 octobre 1819. son fils Eugène de Thoury est né le 31 mars 1817 à Saint-Saulge  est mort le 15 janvier 1896 au château de Saint-Pierre-la-Chapelle à Saint-Saulge. Son épouse la comtesse Marie-Antoinette Aymé des Roches de Noyant ; d'ailleurs, les doubles armoiries Thoury-Noyant figurent sur le vitrail de gauche. Il est le fils de Louis-Joseph de Thoury et de Marie-Thérèse de Courvol construisit sous le Second Empire le château de Saint-Pierre-la-Chapelle. Robert de Thoury né le 3 mars 1870 à Clermont-Ferrand élu maire de Saint-Saulge le 20 mai 1899. Propriétaire du château de Saint-Pierre-la-Chapelle,  Robert est le fils de Eugène de Thoury.\r\nLouis Helion médecin résistant fusillé en 1944, a été remplacé à Saint-Saulge par le docteur Salomon Baskin  dont la première épouse Ratnieva Baskin née à Kovel en Ukraine en 1903.","architecture":"Château de Saint-Pierre la chapelle du XVIIe siècle de plan rectangulaire à deux niveaux  avec six travées flanqué aux extrémités de pavillons rectangulaires saillant mais de même hauteur de l'ensemble.                                                                                        La Villa Madeleine  classique flanquée d'une tourelle carrée avec une toiture impériale à quatre pans.","habitants":"Famille de Jean-Baptiste de Lavenne\r\n        \"","divers":"Château de St-Pierre la Chapelle et la villa Madeleine à Saint-Saulge","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Pierre_Chapelle_1.jpg","../../jctruffet.com/image/image_58/58_St_Pierre_Chapelle_2.jpg"]},"Consult_chateau_formulaire843c":{"id":"Consult_chateau_formulaire843c","dept":"58","canton":"Saint-Pierre le Moutier","commune":"Saint-Pierre le Moutier","nom":"St_Pierre_Moutiers","type":"Château","periode":"XV","histoire":"Plusieurs châteaux à Saint-Pierre le Moutier dont  l'hôtel de ville, ancien présidial. La porte gothique du presbytère du XVe siècle. le château de Dheré de Buy de Fontallier,  Les six tours médiévales de lancienne place forte, tour Berthelot du XIVe-XVIIe siècle.\r\nSAINT-PIERRE Le 4 novembre 1422 le bailliage de Saint-Pierre rendit une sentence, contraignant les habitants de la terre de Poussery au finage de Montaron à assurer le guet et garde au château de Poussery, comme le demande le seigneur des lieux : Gaucher de Couvol. Ce bailliage rendit au fils de ce dernier : Philibert de Courvol, une autre sentence le 25 mars 1451, l'autorisant à faire passer le ruisseau des Ruaux, dans son pré de Chaulgy.\r\nSaint-Pierre-le-Moûtier fut libéré par Jeanne d'Arc le 4 novembre 1429. Pas d'information historique sur les châteaux.","architecture":"Château d'Azy le Vif le Presles , corps de logis à deux niveaux,  échauguette en encorbellement dépassant l'ensemble avec toit en poivrières en façade à l'opposé trois lucarnes côte à côte, ce corps entre deux bâtiment oblong toit à deux pans.                                     Château de Champendu, corps de logis rectangulaire  à un niveau toit en croupes avec chiens assis dont une en angle en encorbellement avec toiture quatre pans et tour carrée  à deux niveaux toit à quatre pans.               Château du Buy  de plan rectangulaire à trois niveaux avec pavillon carré   d'entré saillant plein cintre en façade  à mâchicoulis dépassant le toit d'un étage.                                    Château de Moutier, corps de logis rectangulaire à cinq travées à deux  niveaux à toits brisé avec une lucarne centrale, accolé sur l'arrière de deux pavillons identique  saillant de chaque côté de deux travées.                                                                   \r\nChâteau de Beaumont, corps de logis rectangulaire à deux niveaux, pavillon d'entrée en façade à trois travées avec balcon et toiture à l'impériale, deux tours rondes sur angles à trois niveaux à toit en poivrières avec lucarnes et sur parc deux pavillons carrés à trois niveaux toit à l'impériale avec lucarnes. Château de Dhéré corps de logis rectangulaire à deux niveaux, lucarnes centrales sur toit, pavillons carrées saillant sur les quatre angles avec toit à l'impériale  et deux gros pavillons centraux,  sur la face de côtés à droite avec hors uvre avancée vitré avec balcon.                              Château Fontallier, corps de logis rectangulaire à deux niveaux avec lucarnes sur comble toit à deux pans sur partie centrale pavillon saillant surélevé d'un attique avec lucarnes et toit deux pans.","habitants":"Famille de Courvol\r\n        \"","divers":"Le château de Moutier, d'Azy le Vif-Presles, d'Azy le Vif de Lorgues, du Buy,  de Beaumont, de Champendu, de Dhéré, et de Fontallier à Saint-Pierre de Moutiers","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Pierre_Moutiers_1.jpg","../../jctruffet.com/image/image_58/58_St_Pierre_Moutiers_2.jpg","../../jctruffet.com/image/image_58/58_St_Pierre_Moutiers_3.jpg","../../jctruffet.com/image/image_58/58_St_Pierre_Moutiers_4.jpg","../../jctruffet.com/image/image_58/58_St_Pierre_Moutiers_5.jpg","../../jctruffet.com/image/image_58/58_St_Pierre_Moutiers_6.jpg","../../jctruffet.com/image/image_58/58_St_Pierre_Moutiers_7.jpg","../../jctruffet.com/image/image_58/58_St_Pierre_Moutiers_8.jpg","../../jctruffet.com/image/image_58/58_St_Pierre_Moutiers_9.jpg"]},"Consult_chateau_formulaire45e2":{"id":"Consult_chateau_formulaire45e2","dept":"58","canton":"Cosne cours sur Loire","commune":"Saint-Pére","nom":"St_Pére","type":"Château","periode":"XVII","histoire":"A Saint-Pére le château de Rameau de Saint-Pére et la commanderie. les châteaux et domaine de Saint-Père, près de Cosne sur Loire, qui avait appartenu pendant deux siècles à la famille d'origine écossaise d'Estutt.  Rameau de Saint-Père est issu d'une famille originaire de la Nièvre. Son aieul, Jean Rameau, était établi notaire à Donzy en 1660. Il eut un fils, Louis, né en 1667, médecin, secrétaire de l'intendant de Normandie puis du Poitou, celui ci  l'acheta en Juin 1712.  Son fils, Jean Louis Rameau de Chassenait, décédé en 1781, était président à l'élection de Gien, et subdélégué de l'Intendance à Cosne. Il eut un fils, François Louis Rameau de Chassenait . Né en 1742, celui-ci fut également médecin et maire de Gien. Il épousa Marie-Anne Bricon, l'héritière de la famille Bourgeois, qui avait patiemment construit les domaines des Tallot et des Beaugets à Adon. Ils eurent deux fils, Louis Benjamin et Adolphe de Saint-Père. L'ainé conserva le domaine et le château de Saint-Père dans  la Nièvre, le second s'établit à Gien. Décédé prématurément à 33 ans, il avait eu trois enfants dont François Edme Rameau de St Père, né en 1820, qui hérita du domaine familial. Il épousa en 1863, à 43 ans, Thérèse Camuzat de Brochaut, dont il eut 4 enfants: Louis Adrien, qui décéda adolescent, et trois filles, Marie Louise mariée à Pierre Dubois de la Sablonière, Jeanne qui épousa Eugène Milou, et Solange mariée à Félix Décencière-Ferrandière.  Visiblement nostalgique de la vieille demeure familiale, le château de Saint-Père, qui avait échu à son cousin, il entrepris dès son mariage, en 1863, la construction du château de Saint-Père à Adon, où le couple emménagea vers 1868.","architecture":"Le château de Saint-Pére  du XVIIe siècle  corps de logis à deux niveaux en équerre   toiture  en croupe sur corps de logis principal flanquait de tours rondes et échauguettes en encorbellement toits en poivrières, et à deux pans sur les dépendances formant la cour avec un pigeonnier en angle intérieur.  Commanderie de plan rectangulaire à deux niveaux fenêtres à meneaux,  toiture  à deux pans avec belles lucarnes à meneaux.","habitants":"Famille de Jean Rameau\r\n        \r\n        \"","divers":"Le château des Rameau à Saint -Pére et la commanderie.","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Pere_1.jpg","../../jctruffet.com/image/image_58/58_St_Pere_2.jpg","../../jctruffet.com/image/image_58/58_St_Pere_3.jpg","../../jctruffet.com/image/image_58/58_St_Pere_4.jpg","../../jctruffet.com/image/image_58/58_St_Pere_5.jpg","../../jctruffet.com/image/image_58/58_St_Pere_6.jpg"]},"Consult_chateau_formulairebeda":{"id":"Consult_chateau_formulairebeda","dept":"58","canton":"Château-Chinon","commune":"Saint-Péreuse","nom":"St_Péreuse_Besné","type":"Château","periode":"XV","histoire":"Outres les vestiges du château de Saint-Péreuse, deux châteaux,  celui de Besné du Xve siècle  et celui de Saulières du XVIIIe siècle (voir article).                                                                      BESNE, en  1520  Guillaume des Jours, époux de Catherine de Grandrye sans enfant laisse ses biens, le partage attribua la terre de la Montagne à Guillaume II de Grandrye ; en 1525  Guillaume Ier de Grandrye, écuyer, seigneur du lieu en 1549  Charles de Grandrye fils du précédent, devient propriétaire de la Montagne, et de Besné à la mort de son père, il est ambassadeur chez les Grisons, chevalier, élu de la noblesse aux états généraux de 1560 à Orléans avec Guy Coquille. Décédé sans postérité lègue à son épouse et à ses deux neveux ; en 1571 Jeanne Bolacre, veuve de Charles de Grandrye, ses neveux  Pierre de Grandrye et Guillaume II de Grandrye, seigneur de Grandchamp, chevaliers,  neveux du précédent qui en firent partage en 1571.  Guillaume II de Grandrye, seigneur de la Montagne, époux de Marie Bataille dont une fille, mariée à Jean de Chandon. Devant embrasser l'état ecclésiastique entra dans la carrière militaire. Il fut chambellan du duc d'Alençon, le frère de Charles IX. Ambassadeur à Constantinople de 1566 à 1570, il retrouva en 1571 son château entièrement ruiné.  En 1596  Jean de Chandon adjudicataire de la seigneurie de la Montagne le 22 septembre 1596, écuyer. En 1610  Anne de Chandon fille du précédent et son époux Ponthus de Cyberand, bailli du Mâconnais, sieur de Broye et de Jarnasse ; en 1699 Antoine Le Peletier de Rosambo ; en 1790  à cette date la seigneurie appartient au comte d'Aunay qui vend en 1794 ses seigneuries de Saint-Péreuse, Coeurty et Besne. En 1794  Pierre François Tassin,  devient seigneur de Saint-Péreuse, Besne et Coeurty, descendant de Jehan Tassin, un des défenseurs d'Orléans  Aujourd'hui propriété de madame de Péreuse.","architecture":"Ruines du château de Saint-Péreuse.  La terre de Saint-Péreuse avait titre de baronnie et mouvait en partie du comté de Château-Chinon et en partie du duché de Nevers. Elle jouissait de la haute, moyenne et basse justice et de tous les droits féodaux du temps. Au Moyen Age les seigneurs de Saint-Péreuse résidaient dans ce château, deux pans de murailles, et un morceau de tour sont encore visible dans le bois, un magnifique panorama est à observer. Le titre de Besne apparaît fin du Xve siècle, Guillaume de Grandrye achète les terres de Saint-Péreuse, il fera construire le nouveau château à lEst du village.                                             Besne comprend trois corps de logis accolés construit en équerre, qui avec ses quatre tours garde un aspect médiéval, le logis situé au nord, flanqué au levant d'une tour ronde avec canonnières et fentes de visées, est la partie la plus ancienne. Avec ses murs très épais percés par des baies hautes et étroites, il comprend une salle voûtée en berceau. Dans l'alignement de la façade, une bretèche .  Le bâtiment fut allongé en direction du levant afin de placer un escalier desservant les étages. Le rez-de-chaussée comporte deux pièces à voûtes en berceau.La tour de l'Horloge est en demi-hors uvre du bâtiment. Un bâtiment à deux corps,  l'un d'eux est flanqué de deux tours, percées de canonnières dans la tour nord, dont l'entrée et la fenêtre sont du XIXe siècle, avec une pièce voûtée en coupole, également transformée. L'autre tour au sud, découronnée et bien abîmée, elle fut restaurée au XIXe siècle. Un beau salon de style Restauration occupe le rez-de-chaussée de ce bâtiment, dont un couloir voûtée relie ce bâtiment à l'autre en retour d'équerre. Les façades de ses deux corps de bâtiment sont percées de fenêtres à croisillons surmontées d'arcs en accolade du côté cour.\r\nL'étage de comble est garnies de lucarnes dont l'une à des jouées en bardeaux.","habitants":"Famille de  Charles de Grandrye,\r\n        \r\n        \"","divers":"Château de Besné à Sainte-Péreuse","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Pereuse_Besne_1.jpg","../../jctruffet.com/image/image_58/58_St_Pereuse_Besne_2.jpg"]},"Consult_chateau_formulaire23c2":{"id":"Consult_chateau_formulaire23c2","dept":"58","canton":"Guérigny","commune":"Saint-Sulpice aux Amogues","nom":"St_Sulpice_58","type":"Château","periode":"XVII","histoire":"A Saint-Sulpice, le château de la Motte,  de Machigny, de la Forêt, dit le Logis.\r\nST-SULPICE, propriété de   Baptiste Claude Languinier, notaire royal, arpenteur des eaux et forêts de la maîtrise royale de Nevers, député pour le tiers-état aux état-généraux de 1789. Jean-François Languinier, reprit par la famille de Toytot.\r\n La MOTTE, c'est Paul Bernard de Lavenne, comte de Choulot qui en dessina le parc, au milieu du XIXe siècle. La propriété passa tour à tour entre les mains des familles de Lores du Moux, Flamen d'Assigny  Jean-Claude Flamen d'Assigny, seigneur de La Motte, agronome et politicien, de Sorbier, puis vendu par Jean Claude Flamen d'Assigny,  installé au  château de Sury qu'il avait acheté avec les fermes, le 5 juillet 1784, en même temps que la propriété de la Motte puis de Savigny de Moncorps. Baptiste Claude Languinier, notaire royal.\r\n MACHIGNY du XIXe siècle, construit vers 1848 par Jean-François Languinier, avocat et juge au tribunal civil de Nevers, propriétaire du château de La Forêt sur la même commune et de celui du Tremblay à Chaulgnes. Comme la Motte c'est Paul-Bernard de Lavenne, qui en dessina le parc.  La propriété passa tour à tour entre les mains des familles qui possédaient le château de La Motte.  Jean-François Languinier, avocat et juge au tribunal civil de Nevers, propriétaire du château du Tremblay à Chaulgnes et du château de la Forêt à Saint-Sulpice, il fait construire à Saint-Sulpice le château de Machigny vers 1848.                                 La FORET, le comte Hugues de Montigny (vicomte de Nevers) construisit ce château en 1010. Il devient également la propriété de : Baptiste Claude Languinier, notaire royal, Jean-François Languinier, avocat et juge au tribunal civil de Nevers, devient propriétaire du château du Tremblay à Chaulgne. La famille de Toytot.","architecture":"Saint-Sulpice; la Forêt vieux château dit de la  Forêt  Le corps de logis principal rectangulaire à deux niveaux  toit en croupes avec lucarnes et chiens assis sur pavillons d'entrée. Logis du XIe siècle. construit par Hugues de Montigny, vicomte de Nevers, il en subsiste encore plusieurs tours de nos jours.\r\nLa Motte, le château de la Motte est composé d'un pavillon rectangulaire construit au XVIIe siècle, sur l'emplacement d'un château féodal du Xe siècle, à trois niveaux avec chiens assis à toit brisé, au XVIIIe siècle, le château fut agrandi d'une aile de même hauteur mais légèrement en retrait. L'ensemble est entouré de douves sur trois côtés seulement.\r\nMachigny du XIXe siècle, construit vers 1848, composé d'un pavillon rectangulaire sans doute construit au XVIIe siècle,  on lui ajouta une aile au siècle suivant. Représentant un E à deux niveaux  toits à deux pans sur chaque habitations, les espaces entre ailes sont comblés d'un bâtiment à un niveau et de trois travées à toit incliné.","habitants":"Famille de Baptiste Claude Languinier,                                          Famille de Paul Bernard de Lavenne\r\n        \r\n        \"","divers":"A saint-Sulpice, le château de la Motte,  de Machigny, de La Forêt,","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Sulpice_58_1.jpg","../../jctruffet.com/image/image_58/58_St_Sulpice_58_2.jpg","../../jctruffet.com/image/image_58/58_St_Sulpice_58_3.jpg","../../jctruffet.com/image/image_58/58_St_Sulpice_58_4.jpg"]},"Consult_chateau_formulaire29d8":{"id":"Consult_chateau_formulaire29d8","dept":"58","canton":"Saint-Amand en Puissaye","commune":"Saint-Vérain","nom":"St_Vérain","type":"Patrimoine","periode":"XII-XIII","histoire":"Imposantes ruines féodales du XII-XIIIe siècle à saint-Verain et château de Jérusalem pas d'information historique. St-VERAIN, la porte de Cosne, monument historique du IXe siècle, permet d'accéder au site du château, dont il ne reste que des vestiges.  Seigneur de Saint-Vérain Gibaud 1er est attesté en 1000, Gibaud II  attesté en 1107, Savari  après 1107 , Gibaud III  vers 1134 -1174, Geoffroi 1er  vers 1174 ,  Hugues 1er  vers 1189 - 1190, Gibaud IV - entre 1237 et 1240, , Hugues II - entre 1249 et 1255,  Erard 1er  27 juin vers 1290,  Erard II - 27 mars 1296, 23 août 1320, Hue I d'Amboise et Anne de Saint-Vérain  vers 1320, Jean d'Amboise  vers 1325,,  Hugues  vers 1377,  Hue II d'Amboise  en 1405,  Hue III d'Amboise en 1415 à la bataille d'Azincourt, Jean de Clamecy vers 1480,  Françoise d'Albret,  Odet de Foix, sire de Lautrec 1525 et François de Clèves  jusqu'en 1601 et 14 juillet 1718 : Pierre Doudeau dit St Pierre, âgé de 61 ans, natif de Vérin en Nivernois, diocése d'Auxerre, sergent du sieur de Plemarest, régiment de Lomigny, ou il a servi 36 ans porté dans son certificat daté au 30 mai dernier et auparavant 4 ans dans les dragons de la reine, ses incommodités le mettent hors de service, il est du nombre des soldats reformés envoyés dans une compagnie d'invalides à Belleys le Marie en son pays, le 29 novembre 1732 ou il décède.","architecture":"La porte de Cosne, monument historique du IXe siècle, permet d'accéder au site du château. Les vestiges  avec son enceinte sont classés monument historique depuis 1907.  Dominant l'ensemble de la forteresse, le donjon cylindrique est situé au sommet d'une motte artificielle au point le plus élevé du village, sur une citerne où selon les dires, aurait pu tourner un attelage. Le donjon était défendu par cinq tours massives dont il ne reste que peu de choses aujourd'hui. Tout l'ensemble était entouré de douves alimentées en eau par des canalisations en poteries provenant de deux mares situées un peu plus haut au lieu dit l'Hermitage. On pouvait distinguer une première enceinte qui abritait le château, 10 tours rapprochées la défendait, la plus importante la Tour des Colons (ou Tour du Renard) était sans doute le poste de surveillance. Une porte protégée par deux tours permettait le passage à l'intérieur d'une seconde enceinte abritant notamment la maison de Justice.  Quittant cette enceinte, on pénètre dans le village par le portail du Vieux Château appelé à tort \"Porte de Cosne\". Le village était protégé par une troisième enceinte défendue par des tours espacées de 80 m environ. On pouvait y pénétrer par trois portes défendues chacune par deux tours massives ayant herse et pont-levis.\r\nLe château de Jérusalem porte le nom de Nazareth origine d'une construction médiévale destinée à protéger le seigneur et à symboliser son autorité au sein du fief, le château a la particularité, très tôt, de désigner une résidence seigneuriale ou princière.","habitants":"Sergent Pierre Doudeau\r\n        \r\n        \"","divers":"Vestiges du château de Saint-Vérain et la porte de la ville et le château de Jérusalem","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Verain_1.jpg","../../jctruffet.com/image/image_58/58_St_Verain_2.jpg","../../jctruffet.com/image/image_58/58_St_Verain_3.jpg","../../jctruffet.com/image/image_58/58_St_Verain_4.jpg","../../jctruffet.com/image/image_58/58_St_Verain_5.jpg","../../jctruffet.com/image/image_58/58_St_Verain_6.jpg"]},"Consult_chateau_formulaireffc4":{"id":"Consult_chateau_formulaireffc4","dept":"58","canton":"Pouilly sur Loire","commune":"Granges_Suilly","nom":"Suilly_Granges","type":"Château","periode":"XIV","histoire":"GRANGES construit au XIVe siècle par Bureau de La Rivière, seigneur de Champlemy.  Ce fief, qui s'appelait à l'origine \"La Rachonnière\", dont \"les Granges\" furent une extension, lui était venu de son alliance avec une héritière de Guillaume Le Paulmier, seigneur  de Nevoy et la Rachonnière, un chevalier.  Dès la seconde moitié du XVe siècle, il se trouve aux mains de Jean de Thiard, seigneur de Mont-Saint-Sulpice, puis de Jean de La Porte, lieutenant criminel à la prévôté de Paris. Ils avaient tous les deux épousé les filles de Germain Trouvé, juriste dAuxerre, qui aurait acquis les Granges vers 1450. En 1513, le fief est revendu à la famille du Broc : Edme du Broc est à la fois seigneur du Nozet  et des Granges. Son second fils Guillaume, lieutenant criminel au bailliage dAuxerre, hérita des Granges. En 1591, les héritiers de Guillaume du Broc vendent les Granges à Jacques de Forgues,  receveur des aides. Quelques années après, par alliance Granges passe par sa fille Claude qui épouse   Louis de La Chasseigne, baron de Givry, seigneur de Rosemont et dUxeloup, procureur général. Sa fille lapporta enfin à Charles de Percy, dune vieille famille de Normandie.  En 1719, la veuve de Louis-Balthazar de La Chasseigne vendait la propriété à Joseph Grassin, Acquis comme bien national par Guillaume Guillerault, notaire à Pouilly   puis au début du XIXe siècle acheté par les Guitard de Riberolle, dont l'un des descendants épousa la comtesse Dormy, sans enfant légua le domaine à son cousin Charles de Lesseps, petit-fils du maître d'uvre du canal de Suez dans la descendance ou à leurs héritiers. Aujourd'hui à la famille Meissirel.","architecture":"Le château des Granges,  féodal de la  fin  du  XIVe siècle, édifice Louis XIII, reconstruit sous le règne de Henri IV,  porte sur ses murs les traces des extensions et remaniements qui se sont succéder au cours des siècles. Entourés de douves, le pavillon central, ses dépendances. Cest un vaste édifice de style Renaissance dont la partie nord de la façade principale et le bâtiment Sud-Est en retour d'équerre sur celle-ci ont été rebâtit.  L'édifice laisse apercevoir un plan barlong flanqué de tours carrées aux angles. Les larges douves, qualimentent le Nohain subsistent toujours et en traversant le pont dormant conduisant au corps de logis, lon découvre sur la gauche une magnifique archère canonnière de style renaissance. Hormis le corps de logis qui ne se visite pas, lon peut découvrir dans le parc un colombier, très remanié, le portail dentrée, qui porte la date de 1605, et juste devant un joli puits à eau.","habitants":"Famille de Bureau de La Rivière\r\n        \"","divers":"Château de la Granges à Suilly la Tour","gps":"","images":["../../jctruffet.com/image/image_58/58_Suilly_Granges_1.jpg","../../jctruffet.com/image/image_58/58_Suilly_Granges_2.jpg","../../jctruffet.com/image/image_58/58_Suilly_Granges_3.jpg","../../jctruffet.com/image/image_58/58_Suilly_Granges_4.jpg","../../jctruffet.com/image/image_58/58_Suilly_Granges_5.jpg","../../jctruffet.com/image/image_58/58_Suilly_Granges_6.jpg"]},"Consult_chateau_formulairee1bb":{"id":"Consult_chateau_formulairee1bb","dept":"58","canton":"Pouilly sur Loire","commune":"Suilly la Tour","nom":"Suilly_Tour","type":"Château","periode":"XV-XVI-XIX","histoire":"Cinq châteaux à Suilly la Tour, de Challoy manoir du XVIe siècle , des Granges du XVe-XVIIe siècle (voir article), manoir de Magny du XVIIe siècle et des Vergers du XVe-XIXe siècle (voir article).   \r\nCHALLOY  des le XVe et XVIe siècles, ayant appartenu  à la famille de Bèze;  bijou de la fin de la Renaissance, était la maison du maître de la forge implantée sur lAccotin, affluent du Nohain. Il est bien conservé, tout de rose dans son écrin de verdure. Cest la famille du théologien protestant Théodore de Bèze, originaire de Vézelay, investie dans l'industrie métallurgique en Nivernais, qui la créé. Le domaine fut confisqué par le duc de Nevers comme bien d'hérétique, et donné à André Monnot, fils d'un de ses officiers, vers 1625. Il fut revendu près d'un siècle plus tard à Augustin de Lespinasse, seigneur des Pivotins, lui aussi maître de forge. Cet industriel  relance l'usine qui avait été délaissée sous les Monnot. En 1767, le domaine est acquis par Hugues-Cyr Chambrun, qui possédait aussi les forges des Vergers, de Prémery et de Donzy (l'Eminence). Le château a été conservé dans la même famille jusqu'en 1929. MAGNY  Il date du Xve siècle, mais le fief est beaucoup plus ancien. Ses premiers titulaires restent mal connus, comme le processus de succession qui l'amène dans les mains de la famille de Pernay au XVe siècle justement, qui le conservera jusqu'au début du XVIIIe siècle. Il aurait toutefois été dans les mains pendant quelques années au XVe siècle, en tout ou en partie, de Jean de Chevenon, puissant chevalier nivernais, et du chancelier Guillaume Jouvenel des Ursins, seigneur de la Motte-Josserand.","architecture":"Le château de Chailloy, manoir du XVIe siècle,   de plan rectangulaire à deux niveaux  toit en croupes couverts de tuiles  avec lucarnes  et accolé d'une tourelle ronde toit en poivrière.   Magny, du XVIIe siècle  de plan rectangulaire  à deux niveaux toit à deux pans avec lucarnes en comble pavillon central à trois niveaux toit à l'impérial.","habitants":"Famille de Bèze\r\n        \"","divers":"Château de Challoy et de Magny à Suilly la Tour","gps":"","images":["../../jctruffet.com/image/image_58/58_Suilly_Tour_1.jpg","../../jctruffet.com/image/image_58/58_Suilly_Tour_2.jpg","../../jctruffet.com/image/image_58/58_Suilly_Tour_3.jpg","../../jctruffet.com/image/image_58/58_Suilly_Tour_4.jpg","../../jctruffet.com/image/image_58/58_Suilly_Tour_5.jpg"]},"Consult_chateau_formulaire5c1a-2":{"id":"Consult_chateau_formulaire5c1a-2","dept":"58","canton":"Saint-Bernin d","commune":"St-Jean aux Amogues","nom":"Sury_Morvan","type":"Château","periode":"XVII","histoire":"SURY,  acheté par Jean-Claude Flamen d'Assigny, qui épousa la sur du général Sorbier, cette demeure d'inspiration classique passa par alliance, à la famille de Faverges en 1784. Les parents d'Hubert Flamen d'Assigny étaient Henri Flamen d'Assigny et Caroline du Verne. Madame Frédéric Flamen d'Assigny, était la tante d'Hubert Flamen d'Assigny. Le capitaine d'artillerie du Verne, ancien aide de camp de son oncle, prisonnier à la suite de la capitulation de Baylen, il passa six mois à Cabréra, quatre mois sur les pontons de Cadix et 2 ans en Ecosse, avant de revenir en 1812 pour prendre part aux campagnes de 1813 et 1814.  Hubert et Geneviève de Faverges, propriétaires du château de Sury, vous accueillent en chambres d'hôtes dans le château ou en gîtes de France indépendants à proximité.","architecture":"Château de Sury  du XVIIIe siècle le corps de logis principal de plan rectangulaire à deux niveaux flanqué sur les côtés de pavillons rectangulaires à même niveau prolongé sur l'arrière gauche de grandes dépendances en équerre. Le corps de logis est flanqué de deux ailes en retour d'équerre dont une se prolonge par une tour.","habitants":"Famille d'Hubert Flamen d'Assigny\r\n        \"","divers":"Châteaude Sury à Saint-Jean les Amogues","gps":"","images":["../../jctruffet.com/image/image_58/58_Sury_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Sury_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Sury_Morvan_3.jpg"]},"Consult_chateau_formulaireea95":{"id":"Consult_chateau_formulaireea95","dept":"58","canton":"Lurzy","commune":"Tazilly","nom":"Tazilly","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux à Tazilly, celui de Mansanday du XVIe siècle , de Ponay du XVIIIe siècle,de Chigy du XIXe siècle et de Mézeret.                          CHIGY du XIXe siècle. Sa châtelaine, Noëlle Vandersande et Fanny Delaire au  château du XVIIIe siècle, Noëlle Vandersande , depuis que la société familiale néerlandaise qui a racheté le premier domaine de 23 ha, la missionnée, en 1977, douvrir un camping quatre étoiles, celle qui navait alors que 19 ans, na jamais plus quitté Chigy.  En 1973, la famille acquiert le château et ses dépendances qui navaient, depuis leur création, jamais changé de main. \r\nChâteau de PONEY du XIXe siècle, en remplacement d'un édifice du XVIIIe siècle. Ce château aurait été construit en 1870 par le même architecte que celui de Chigy, situé également sur le territoire de la commune de Tazilly,","architecture":"Château de Chigy du XIXe siècle, le corps de logis principal à deux niveaux  avec lucarnes en combles, accolés de deux tours rondes à toit en poivrières et à l'opposé d'un pavillon rectangulaire de même style  formant le T.\r\nChâteau de Ponay,    l'édifice se compose d'un étage carré et d'un étage de comble, le gros-uvre : moellon ; enduit et pierre, élévation à travées surmontée de toit à longs pans ; croupe ; noue ; toit en pavillon et flèche carrée, couverts d'ardoise.                                Le château de Mézeret du XIXe siècle, constitué d'un corps de logis rectangulaire  à un niveaux avec lucarnes, encadré de deux pavillons, ce manoir abrite au cours des siècles plusieurs familles de la noblesse locale, pas d'information historique.","habitants":"Noëlle Vandersande                                                                 Fanny Delaire\r\n        \"","divers":"château de Tazilly et de Mézeret à Tazilly","gps":"","images":["../../jctruffet.com/image/image_58/58_Tazilly_1.jpg","../../jctruffet.com/image/image_58/58_Tazilly_2.jpg","../../jctruffet.com/image/image_58/58_Tazilly_3.jpg","../../jctruffet.com/image/image_58/58_Tazilly_4.jpg"]},"Consult_chateau_formulairec8dd":{"id":"Consult_chateau_formulairec8dd","dept":"58","canton":"Fours","commune":"Thaix_Coueron","nom":"Thaix_Coueron","type":"Château","periode":"XIX","histoire":"trois  châteaux à Thaix, Couëron du XIXe siècle, de l'Echelle et celui  de Poincreu pas d'information historique.             \r\n COUERON, les seigneurs successifs en furent : en 1353 Jean de Brion, qui tient sa terre du comte de Nevers ; en 1582  Philippe de Charry, fils de Martin de Charry ; en 1642  Ponthus de Couëron, écuyer, et Esmée Popillon de Ryau, dame de Couëron, Martigny et Thaix ; en 1646  Jacques de Rolland, puis sa veuve Anne d'Arcy; François de Rolland, chevalier ;  en 1688  Anne Catherine de Rolland, dame de Couëron, elle donna son nom à la troisième cloche de Cery,  en 1702  Étienne Mellon, conseiller du roi, receveur des tailles à l'élection de Nevers ; Antoinette Serpetier ; Martialle Mellon ; Anne Edme Elisabeth Perrette Mellon ; en 1773  Mlle Melon ;  et en  1818  Imbart de La Tour, époux de Rose Tissier qui construisit le château.\r\nECHELLE, construction du XIXe siècle réalisée par le marquis Alexis de Pomereu vers 1865 puis à cause de la guerre de 1870 et du décès du marquis, la construction prendra un énorme retard et ne fut achevée par David de Penarum et l'entreprise Danchaud et Peslot st rattaché à Tintury, ainsi que la commune de Fleury-la-Tour (statuée en 1790), qui a été démembrée en 1863 après une longue polémique entre les communes.","architecture":"Tintury, le château quadrangulaire à deux niveaux est attique  est bâti à lécart, à lest du village placé dans un magnifique parc, un imposant château dont la construction est datée de la période du XIXe siècle. Il Possède une façade bien symétrique avec fronton côté entrée avec des pavillons carrés en angles.  Grond de plan carré à deux niveaux  avec tourelles en angles à toits en poivrières.","habitants":"\"","divers":"Château de Tintury et de Grond à Tintury","gps":"","images":["../../jctruffet.com/image/image_58/58_Tintury_1.jpg","../../jctruffet.com/image/image_58/58_Tintury_2.jpg","../../jctruffet.com/image/image_58/58_Tintury_3.jpg","../../jctruffet.com/image/image_58/58_Tintury_4.jpg","../../jctruffet.com/image/image_58/58_Tintury_5.jpg"]},"Consult_chateau_formulaireeef8":{"id":"Consult_chateau_formulaireeef8","dept":"58","canton":"Château-Chinon","commune":"Arleuf","nom":"Tournelle_Arleuf","type":"Château","periode":"XVIII","histoire":"TOURNELLE,   Elle fut érigée en marquisat et s'étendait sur trois paroisses très étendues, de sept fiefs dont trois importants avec droit de haute, moyenne et basse justice.  Le marquisat de la Tournelle était, avant la Révolution, lune des plus belles et des plus prestigieuses seigneuries du Morvan. Au Moyen-Age, cette seigneurie avait son siège dans un château bâti sur une motte au sud du château actuel, elle a livré des témoignages dune occupation gallo-romaine antérieure à la seigneurie féodale. Est actuellement une entreprise industrielle.","architecture":"Motte, talus et fossés demeurent visibles comme seuls vestiges de la forteresse oubliée. Éventrée au début du XXe siècle par les terrassements dinstallations de la ligne du « tacot » du petit chemin de fer départemental joignant Autun à Château-Chinon, abandonné avant la guerre 39-45.","habitants":"Famille de la Tournelle\r\n        \"","divers":"Château de la Tournelle à Arleuf","gps":"","images":["../../jctruffet.com/image/image_58/58_Tournelle_Arleuf_1.jpg","../../jctruffet.com/image/image_58/58_Tournelle_Arleuf_2.jpg","../../jctruffet.com/image/image_58/58_Tournelle_Arleuf_3.jpg","../../jctruffet.com/image/image_58/58_Tournelle_Arleuf_4.jpg","../../jctruffet.com/image/image_58/58_Tournelle_Arleuf_5.jpg","../../jctruffet.com/image/image_58/58_Tournelle_Arleuf_6.jpg"]},"Consult_chateau_formulaire49b3":{"id":"Consult_chateau_formulaire49b3","dept":"58","canton":"Dornes","commune":"Toury sur Jour","nom":"Toury_Jour","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Toury sur Jour celui de Bessay du XVe siècle et le Perray.  Et à quelques kilomètres  au sud-ouest à Tresnay le château de Chavannes utilisé aujourd'hui en chambres d'hôtes et diverses activités par des particuliers. \r\nBESSAY,ruiné pendant la guerre de cent ans, au XVe siècle, il a été reconstruit par un chambellan du duc de Bourbon. Au XVIIIe siècle le propriétaire, receveur général des finances du Poitou adapta la demeure encore féodale au goût du jour : percement de baies, construction d'une terrasse en demi-lune à l'ouest et transformation de l'aile droite, suppression du pont-levis.              PERRAY, Ce lieu présente un attrait pour les vacanciers de passage dans la région pas d'autre information.","architecture":"Bessay est à l'origine une maison forte édifiée au XIVe siècle, sur un plan en fer à cheval. Cantonné de tours circulaires sommées de toits en poivrière, l'édifice était ceinturé de douves en eau alimentées par un étang voisin. Ruiné pendant la guerre de cent ans, percement de baies, construction d'une terrasse en demi-lune à l'ouest et transformation de l'aile droite, suppression du pont-levis. A cette époque furent créés un parc et un jardin, avec des allées plantées et des bassins et allées d'eau.                            Le château du Rond du Perray, est
