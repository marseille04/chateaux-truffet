age/image_58/58_Poil_1.jpg","../../jctruffet.com/image/image_58/58_Poil_2.jpg","../../jctruffet.com/image/image_58/58_Poil_3.jpg","../../jctruffet.com/image/image_58/58_Poil_4.jpg","../../jctruffet.com/image/image_58/58_Poil_5.jpg","../../jctruffet.com/image/image_58/58_Poil_6.jpg","../../jctruffet.com/image/image_58/58_Poil_7.jpg","../../jctruffet.com/image/image_58/58_Poil_8.jpg","../../jctruffet.com/image/image_58/58_Poil_9.jpg"]},"Consult_chateau_formulairea210":{"id":"Consult_chateau_formulairea210","dept":"58","canton":"Guérigny","commune":"Poiseux","nom":"Poiseux","type":"Château","periode":"XV-XVIII","histoire":"Quatre châteaux à Poiseux, dont celui de Poiseux, celui de Belouse du XV-XVIIIe siècle, de Poissons du XVIIIe siècle et le château du Vieux Poiseux du XVIe siècle.                                    BELLOUSE, cité en 1331 du chapitre de Nevers. C'est ici que la famille de Bèze, alors propriétaire de la Forge Basse située près de Guérigny, fit construire vers 1650 une forge et un fourneau sur le ruisseau de Chaillant. A la fin du XVIIIe siècle, la terre de la Belouse est partagée et vendue ; d'un côté, à la famille Andras de Marcy qui exploite le fourneau jusqu'en 1850 ; et de l'autre, à celle de Berthier-Bizy qui gère la forge jusqu'en 1822.                           POISEUX, le château de Poiseux, propriété privée appartenant à la RATP et exploité par la fondation « les enfants du métro », sert de colonie de vacances pour les enfants du personnel  depuis 1931.    Lannée 1948 voit la création de la RATP. Se pose alors la problématique de la coexistence duvres sociales antérieures à la création du comité dentreprise RATP avec ses propres institutions. Après de nombreux rapports dexperts, davis ministériels et de procédures judiciaires, les relations entre la Fondation et le comité dentreprise furent, en 1964, normalisées par de nouveaux statuts.","architecture":"BELOUSE, le château, remanié au XVIIIe et au XIXe siècle, de plan rectangulaire à deux niveaux toiture en croupe avec lucarnes, deux retour en équerre côté parc,  deux ailes perpendiculaires, possède un étage carré disposé symétriquement de part et d'autre d'un avant corps mouluré et décoré des armoiries des propriétaires du lieu, la toiture est à deux pans et à croupe. Un logement de fermiers, placé à l'entrée de la propriété, avec plusieurs appartements, est bâti à la fin du XIXe siècle, avec encadrement en briques et pierres de taille, surmonté de cinq cheminées et six lucarnes. Dans le parc, on trouve une grange et un local technique.  Poiseux corps de logis rectangulaire à deux niveaux, toiture en croupe , plein cintre sur porte d'entrée un balcon sur colonnes romanes.                                                                                  Le vieux château de Poiseux  est un bâtiment en longueur d'un niveau  avec tour carré sur la droite et un pavillon à l'est saillant dans un parc, en face porche d'entré à deux niveaux toit en croupe, l'ensemble fermé  par une enceinte.","habitants":"Famille de Bèze\r\n        \"","divers":"Château de Belouse, des Poissons, de Poisieux et le vieux château de Poiseux","gps":"","images":["../../jctruffet.com/image/image_58/58_Poiseux_1.jpg","../../jctruffet.com/image/image_58/58_Poiseux_2.jpg","../../jctruffet.com/image/image_58/58_Poiseux_3.jpg","../../jctruffet.com/image/image_58/58_Poiseux_4.jpg","../../jctruffet.com/image/image_58/58_Poiseux_5.jpg","../../jctruffet.com/image/image_58/58_Poiseux_6.jpg","../../jctruffet.com/image/image_58/58_Poiseux_7.jpg","../../jctruffet.com/image/image_58/58_Poiseux_8.jpg","../../jctruffet.com/image/image_58/58_Poiseux_9.jpg"]},"Consult_chateau_formulaire2475":{"id":"Consult_chateau_formulaire2475","dept":"58","canton":"Moulins-Engilbert","commune":"Montaron","nom":"Poussery","type":"Maison forte","periode":"XV-XVII","histoire":"POUSSERY, Jean Bidault, écuyer  en 1412, seigneur en partie de Montaron et de Poussery. Jean du Bois , écuyer, seigneur d'une partie de Poussery. Jeanne Bidault de Montaron, épouse en premières noces, Guyot de Champ-Robert, deux filles: Jeanne qui épousa Jean de Charency et Marie, Alexandre de Saint-Gratien. En secondes noces, Gaucher de Courvol, sieur d'Isenay et du Tremblay. Philibert de Courvol (1451), pour partie, époux de Jeanne de Saint-Julien, qui lui donna sept enfants qui le 12 avril 1494, se partagent ses domaines. Jean de Courvol son troisième fut seigneur de Montaron et : Guy de Courvol, Antoine de Courvol, seigneur d'Isenay et de Thaix, Antoine épousa en 1500, Jeanne de Césac, Louis de Courvol, convola en 1531 avec Philippine de Saint-Père. Charles de Reugny, époux de Catherine de Loron, laissa Poussery à son second fils : Jean de Reugny, époux de Anne Charlotte de Reignier de Guerchy, laissèrent à leur fils : George de Reugny fils des précédents, comte du Tremblay, sieur de Montaron en partie, seigneur d'Isenay, laissa Poussery.  Louis Ier de Reugny , épousa en 1688, Madeleine Garnier, fille de Jean Garnier,  deux fils: Louis Alexandre, comte de Tremblay, sieur de Montaron en partie, qui de son mariage eut une fille: Anne Elisabeth qui fit passer le Tremblay et Montaron à Nicolas Antoine François Xavier, marquis de Fussey, seigneur des Baugis et : Anne Édouard de Reugny , chevalier, seigneur de Poussery, de Montaron. Il épousa Gabrielle Millot de Monjardin,  trois enfants: Anne-Édouard; Louis, mort jeune, et Gabrielle qui épousa et porta la terre de Poussery et ses dépendances à très haut et puissant seigneur: Pierre-Étienne Bruneau, marquis de Vitry, seigneur de Champlévrier qui reprit de fief à Château-Chinon en 1777.  La marquise de Vitry fut enfermée pendant la terreur dans les prisons de Moulins-Engilbert et fut remise en liberté par le commissaire Paulmier le 19 novembre 1793, avec injonction de divorcer sous peine d'être réintégrée en deux fois vingt-quatre heures.","architecture":"Poussery, une première maison forte appelée La Guillemette,  à proximité de la maison forte que l'on voit aujourd'hui, tous lesdits bâtiments et édifices tenant ensemble et entourés de fossés plein d'eau, un château et une maison forte se composait alors d'un corps de logis, d'un pavillon, d'une grosse tour carrée, appelée tour de Champlevoix, de laquelle mouvait une partie de Montaron, d'une autre petite tour carrée, attenant aux étables, d'un portail avec porte-cochère, précédée d'un pont en pierre. Une ceinture de fossés toujours inondés, entourait l'édifice et des canaux enfermaient aussi le jardin » c'est un corps de logis du XVe siècle, remanié au XVIIe siècle de deux étages accolé en équerre à des communs du XIXe siècle. Les bâtiments s'ordonnent autour d'une cour et forment un U tronqué. Restes des fossés.","habitants":"Famille de  Jean de Courvol\r\n        \"","divers":"Maison forte de Poussery","gps":"","images":["../../jctruffet.com/image/image_58/58_Poussery_1.jpg","../../jctruffet.com/image/image_58/58_Poussery_2.jpg","../../jctruffet.com/image/image_58/58_Poussery_3.jpg","../../jctruffet.com/image/image_58/58_Poussery_4.jpg"]},"Consult_chateau_formulaire09f5":{"id":"Consult_chateau_formulaire09f5","dept":"58","canton":"St-Bernin d","commune":"La Fermeté","nom":"Prye_Fermeté","type":"Forteresse-Palais","periode":"XIV-XVII","histoire":"PRYE, imposante résidence seigneuriale des  sires de Prye dont: Jean de Prie en 1285, selon Jacques Bretel, un certain Jean de Prye seigneur,  se trouve au côté du comte de Sancerre parmi les invités du comte de Chiny à Chauvency-le-Château pour les festivités du Tournoi depuis le Moyen-Age, au XIIIe siècle la famille de Prye fait édifié une forteresse qui passe en 1462 à la famille de la Platrière qu'il la gardera jusqu'en 1603 date de sa vente à Antoine de la Grange d'Arquien gouverneur de Calais. En 1674 Jean Sobieski époux de Marie-Casimire de la Grange d'Arquien est élu roi de Pologne;    la  fille  d' Henri Albert de La Grange d'Arquien, reine de Pologne par son mariage avec Jean III Sobieski. Résidera  quelques temps à Prye, après le décès de leur père,   les enfants cèdent  le château à l'abbé de Simiane, lequel le revend en 1723 à Michel de Las, chevalier de Valotte et en 1771 par alliance de Louise-Marie de Las avec Emmanuel du Bourg marquis de Bozas originaire du Vivarais qui en serait encore propriétaire.   Chambres d'hôtes par Antoine-Emmanuel et Magdalena marquis et  marquise du Bourg de Bozas.","architecture":"Prye se trouve dans un vaste domaine classé monument historique entouré de 7 km de murs. Le château primitif du XIVe siècle une tour isolée  seul témoin des sires de saint-Prye.  Le château actuel est une construction réalisée entre le XVIIe siècle et le XIXe siècle. Deux corps de bâtiment de part et d'autre d'un passage couvert donnant accès à la cour d'honneur accessible par un pont franchissant les douves.  Corps de logis principal,  flanqué au Sud-Est d'une tour carrée et d'une plus petite de même conception sur le pignon du Nord-Ouest, agrémentée avec de faux mâchicoulis.\r\nÀ son extrémité Nord-Est, en retour d'équerre se situe une aile, accotée d'une tour hexagonale à trois niveaux dont un de combles. Elle est flanquée d'une tourelle que surplombe une flèche polygonale avec lucarnes. Les façades sont percées de fenêtres en arc surbaissé et de lucarnes respectivement cintrées et triangulaires. Le second corps de logis est de plus petite dimension et se trouve à l'Est du premier. Sa décoration est de style néo-gothique. Ses fenêtres sont surmontées d'arcs en accolade, et ses lucarnes sont à fronton aigu. Une tour carrée vient terminer l'extrémité Ouest du bâtiment, avec une base à bossages dont la plus grande partie fut reconstituée et couronnée d'un faux chemin de ronde sur faux mâchicoulis. Pas très loin sur l'ancien angle Sud-Est de l'enceinte se dresse une tour circulaire à base talutée et possédait d'origine un escalier intégré dans l'épaisseur du mur.","habitants":"Emmanuel du Bourg marquis de Bozas\r\n        \"","divers":"Château seigneuriale de Prye à la Fermeté","gps":"","images":["../../jctruffet.com/image/image_58/58_Prye_Fermet%c3%a9_1.jpg","../../jctruffet.com/image/image_58/58_Prye_Fermet%c3%a9_2.jpg","../../jctruffet.com/image/image_58/58_Prye_Fermet%c3%a9_3.jpg","../../jctruffet.com/image/image_58/58_Prye_Fermet%c3%a9_4.jpg","../../jctruffet.com/image/image_58/58_Prye_Fermet%c3%a9_5.jpg","../../jctruffet.com/image/image_58/58_Prye_Fermet%c3%a9_6.jpg","../../jctruffet.com/image/image_58/58_Prye_Fermet%c3%a9_7.jpg"]},"Consult_chateau_formulaire64e3":{"id":"Consult_chateau_formulaire64e3","dept":"58","canton":"Prémery","commune":"Prémery","nom":"Prémery_Morvan","type":"Château_Patrimoine","periode":"XIV","histoire":"A Prémery imposantes ruines féodales, château des évêques  de Nevers  du XIVe siècle, le château de Sainfoins et d'Arthel.  A quelques kilomètres  au sud ouest à Sichamps  le manoir des Terres Blanches chambres d'hôtes de Michel Ancel.                                    PREMERY,  jusqu'à la Révolution Prémery resta donc fief des évêques de Nevers, comtes de Prémery, ont fait du château leur résidence d'été. Des châteaux qu'ils y bâtirent il ne subsiste que le porche sombre et massif du début du XIVe siècle et le corps de logis reconstruit vers 1508. Cette résidence d'été fut abandonnée à la fin du XVIIe siècle au profit du château d'Urzy, nouvellement érigé et plus proche de Nevers. Vendu comme bien national à la Révolution. L'histoire «récente» de Prémery a été marquée par l'arrivée de Belgique, en 1886, de la famille Lambiotte, venue pour créer une usine de carbonisation et de distillation du bois. Toute la ville s'organise autour de cette activité industrielle jusqu'à sa disparition totale en 2002.                                               ARTHEL, fief  depuis le XIIIe siècle  Arthel est habité par la même famille. SAINFOIN du Xxe siècle pas d'information historique.                               Manoir des TERRES BLANCHES pas d'information historique.","architecture":"Arthel, corps du bâtiment du XVIIe siècle est flanqué de deux tours rondes de style Renaissance et escalier en façade en fer à cheval.   Prémery,  un vaste château avec une tour ronde et porte fortifiée  du XIIe siècle : ainsi le village compte d'imposantes ruines féodales, vestiges de l'enceinte féodales, En plus des charmes bucoliques de la cité.   La plate-forme du château actuel a été construite au début du XIIIe siècle. Le logis a été reconstruit en 1510.   Primitivement, formaient un quadrilatère  de fortes tours aux angles. Il ne reste plus actuellement que le quart de l'édifice. La porte fortifiée donnant accès à la cour, édifiée au début du XIVe siècle. Son aspect massif et sévère accentue son caractère défensif. Quelques remaniements datent des XVIIe et XVIIIe siècles. Le château est bâti sur un espace quadrangulaire de 50 à 60 m de côté. L'ensemble se compose dune plate-forme ceinte de courtines reliant  quatre tours d'angle, dont une a disparu. Adossé à la courtine nord, il  reste  le corps de logis du XVIe siècle, le porche fortifié au N.O,  De l'époque de la construction subsistent une tourelle descalier hexagonale  qui était surmontée dune pièce en encorbellement. L'autre tour construite au XVIIIe siècle, présente un décor plus classique. Le porche d'entrée est la partie la plus emblématique du château, À l'Ouest la tour ronde de la fortification primitive. À l'Est, il est flanqué d'une tourelle en encorbellement à culot mouluré sur contrefort, elle est aussi découronnée et percée d'une canonnière. Louverture du porche est surmontée d'un arc surbaissé sous un autre en tiers point.  Le pavillon surmontant ce porche ne comporte, de ce côté aucune ouverture à l'exception d'une petite niche murée. Sainfoin; manoir rectangulaire a deux niveaux toit en croupes avec lucarnes sur comble et deux tours rondes côté parc, toits en coupole hexagonal.          Manoir des Terres Blanches, bâtiment en équerre à un corps de logis à un niveaux toit à la Mansart et le deuxième à deux niveaux toit en croupe flanqué d'une tour ronde à trois niveaux en angle intérieur, toiture en  poivrière.","habitants":"Evêques  de Nevers\r\n        \"","divers":"Château des évêques,  de Sainfoins et d'Arthel et manoir des Terres Blanches à Prémery.","gps":"","images":["../../jctruffet.com/image/image_58/58_Pr%c3%a9mery_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Pr%c3%a9mery_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Pr%c3%a9mery_Morvan_3.jpg","../../jctruffet.com/image/image_58/58_Pr%c3%a9mery_Morvan_4.jpg","../../jctruffet.com/image/image_58/58_Pr%c3%a9mery_Morvan_5.jpg","../../jctruffet.com/image/image_58/58_Pr%c3%a9mery_Morvan_6.jpg","../../jctruffet.com/image/image_58/58_Pr%c3%a9mery_Morvan_7.jpg","../../jctruffet.com/image/image_58/58_Pr%c3%a9mery_Morvan_8.jpg","../../jctruffet.com/image/image_58/58_Pr%c3%a9mery_Morvan_9.jpg"]},"Consult_chateau_formulaire0f95":{"id":"Consult_chateau_formulaire0f95","dept":"58","canton":"Moulins-Engilbert","commune":"Préporché","nom":"Préporché_Montjoux","type":"Château","periode":"XVIII","histoire":"MONTJOUX, du Moyen-Age jusquau XIXe siècle,  à la famille Panné- Garriaux. Guyot de Montjou repris le fief du comte de Nevers en 1332, ses fils donnèrent dénombrement, dix sept années plus tard, vers 1349, de leur maison-forte et droits de chasse dans la châtellenie de Moulins-Engilbert. Plusieurs propriétaires se succédèrent au fil des siècles.","architecture":"Montjoux, construit au XVIIIe siècle à l'emplacement d'un château féodal, puis reconstruit au XXe siècle, est une ancienne maison forte, attestée au XIVe siècle, construite au sommet d'une butte naturelle. Elle est aujourd'hui ruinée. Une ferme en occupe l'emplacement.    Un visuel ancien de 1905 montre le château de plain pied et construit sur un plan en forme de H. Aujourd'hui, c'est une propriété comprenant le château, la chapelle du XIXe siècle, le parc avec jardin et de très nombreuses terres et dépendances. Le château sur un plan symétrique,  comprend un corps de logis et deux ailes L'ensemble sur deux étages avec combles est couvert de longs toits en tuiles plates. Un nouveau château a été bâti un peu plus bas. Du XVIIIe siècle n'indique pas de château mais deux moulins dont un foulon qui devait dépendre du vieux château.","habitants":"Famille Panné- Garriaux\r\n        \r\n        \"","divers":"Château de Préporché à Montjoux","gps":"","images":["../../jctruffet.com/image/image_58/58_Preporche_Montjoux_1.jpg","../../jctruffet.com/image/image_58/58_Preporche_Montjoux_2.jpg","../../jctruffet.com/image/image_58/58_Preporche_Montjoux_3.jpg"]},"Consult_chateau_formulairebce1":{"id":"Consult_chateau_formulairebce1","dept":"58","canton":"La Charité sur Loire","commune":"Raveau","nom":"Raveau","type":"Château","periode":"XIX","histoire":"Deux châteaux à Raveau, celui de Mouchy du XIXe siècle et de Péte-Loup.                                                                    \r\n RAVEAU, vestiges préhistoriques et antique établissement gallo-romain des prés Pillats. Trésor de monnaies romaines. En 1471, Le moulin à blé est exploité pour le compte du prieur seigneur de La Charité, en descente de l'eau venant de la Fontaine de La Vache.  Pierre Babaud de La Chaussade, fondateur des forges royales de La Chaussade dont haut-fourneau, dépendances et manoir à La Vache. La production de fonte est issue des ressources métallifères de la forêt des Bertranges. La production est destinée à fabriquer les ancres pour la marine royale. Très important centre de l'industrie du fer depuis le XVIIIe siècle, l'activité sidérurgique s'arrête sous le second Empire.   Le marquis de Vergennes, fils du ministre des affaires étrangères de Louis XVI, propriétaire du château de Mouchy, est enterré à Raveau. Babaud de La Chaussade, maître des forges royales de La Chaussade à La Vache. Baron de Vergennes, ministre des affaires étrangères sous Louis XVI. (château de Mouchy) monsieur Ferrrand, maître des forges de La Vache et maire du village. Le théologien dominicain monseigneur Michel Louis Guérard des Lauriers établi sur ses vieux jours au château de Mouchy en bordure de la forêt de Bertranges.","architecture":"le domaine des Forges de la Vache des XIVe siècle, XVIIIe et XIXe siècles : manoir et importants vestiges industriels.  Du château corps de logis rectangulaire à deux niveaux accolé de deux tours carrées une plein cintre l'autre à l'angle gauche plus importante.                                                                               Le château de Mouchy XVIII du XIXe siècle. Aujourd'hui chambres d'hôtes, de plan rectangulaire le corps de logis à deux niveaux avec une rangée de lucarne sur comble sur toit brisé, prolongé de chaque côté par des bâtiments légèrement inférieur,  de trois travées qui ces derniers rejoignent un pavillon rectangulaire à deux niveaux et lucarnes dans les combles toujours sur toit brisés.","habitants":"Pierre Babaud de La Chaussade\r\n        \"","divers":"Château des Forges et de Mouchy à Raveau","gps":"","images":["../../jctruffet.com/image/image_58/58_Raveau_1.jpg","../../jctruffet.com/image/image_58/58_Raveau_2.jpg","../../jctruffet.com/image/image_58/58_Raveau_3.jpg"]},"Consult_chateau_formulaire8e59":{"id":"Consult_chateau_formulaire8e59","dept":"58","canton":"Saint-Bernin d","commune":"Frasnay-Reugny","nom":"Ravier","type":"Vestiges","periode":"XV","histoire":"FRASNAY  La seigneurie donne son nom à la famille qui la possède à l'époque, avant d'appartenir aux familles de la Perrière. Il est remanié au XVIe siècle par Gabriel de la Perrière, lieutenant du roy au duché de Nivernais et député de la noblesse aux Etats de Blois en 1576.\r\nREUGNY Celle de Reugny appartenait aux familles Renault de Touteuille et Chambrun de Rosemont. François de Viry (vers 1615-1665), seigneur de Reugny, inhumé à Reugny. Gabriel de Thoury, écuyer, gentilhomme de Nivernais, seigneur de Malnay (actuellement sur la commune de Rouy) et de Morlot (Frasnay-le-Ravier) qu'il acquiert avec son épouse Isabelle de Brossard le 10 janvier 1630. Noël de Thoury, écuyer, gentilhomme de Nivernais, seigneur de Malnay, qu'il vend en 1683 à Anne-Henri d'Armes, de Morlot et de La Touryterie à Frasnay cette propriété était autrefois le siège de la seigneurie de Malnay, terre des Thoury de la Nièvre jusqu'en 1683.  Famille de Thoury jusqu'au début du XVIIIe siècle, seigneur de Malnay,La Touryterie et de Morlot à Frasnay.","architecture":"Ravier du XV au  XVIIe siècle,  manoir en pierre, édifié sur un coteau dominant une ancienne voie romaine, date du XVe siècle.\r\n Il possède un pavillon carré et une tourelle en encorbellement.\r\n Ses baies sont à moulures et sa lucarne est couronnée par un fronton.  Une porte en forme d'Arc de Triomphe, à trois baies, d'ordre dorique, porte un écu de la famille La Perrière, entouré du collier de Saint-Michel et supporté par deux lions. On accédait aux étages par deux escaliers à vis. Signe extérieur de richesse, réservé sous l'Ancien Régime aux nobles possédant au moins 100 arpents de terre, un colombier était installé dans la tour la plus ancienne, à deux niveaux et percée de meurtrières. Frasnay-Reugny vestiges du château.                                                     Le château de la Touryterie est une des propriétés les plus vastes du village, construite au VIIe siècle, elle reçut de nombreuses extensions. Du XVe au XVIIIe siècle, les propriétaires en sont la famille de Thoury en Nivernais dont le château tient son nom. \r\nLe château du Ravier, XVe-XVIIe siècles, aujourd'hui en ruine, au lieu-dit Viémont.","habitants":"Famille de Thoury\r\n        \"","divers":"Vestiges de Ravier à Frasnay Reugny","gps":"","images":["../../jctruffet.com/image/image_58/58_Ravier_1.jpg","../../jctruffet.com/image/image_58/58_Ravier_2.jpg","../../jctruffet.com/image/image_58/58_Ravier_3.jpg","../../jctruffet.com/image/image_58/58_Ravier_4.jpg","../../jctruffet.com/image/image_58/58_Ravier_5.jpg","../../jctruffet.com/image/image_58/58_Ravier_6.jpg"]},"Consult_chateau_formulaire48f2":{"id":"Consult_chateau_formulaire48f2","dept":"58","canton":"Tannay","commune":"Saizy","nom":"Reconfort_Saizy","type":"Château Abbaye","periode":"XVI","histoire":"RECONFORT, à la fin de l'administration de Jeanne VI de la Magdeleine de Ragny en 1633, l'abbaye est en ruine et abandonnée. Elle fut restaurée par Angélique de Viesvres de Launay qui reprend la direction de l'établissement en 1634.   La dernière abbesse, Marguerite de Seiveyrac se fit représenter. Le père Philippe Levacq, aumônier du Réconfort, fut accusé en 1793, de tenir des propos contre-révolutionnaires. Il fut condamné à mort par le Tribunal criminel de Nevers le 9 avril 1794 et il fut exécuté dans les vingt-quatre-heures sur la place Brutus de Nevers. L'abbaye est vendue à un certain Bardet qui commence à démolir l'édifice pour en vendre les matériaux. Il est stoppé par les chefs du district de Corbigny et le céde à Mr Brunier qui l'occupait en 1823.   Le Baron Pierre Charles François Dupin fit l'acquisition des ruines de l'abbaye et de ses dépendances, en 1825. Il en entreprit la restauration et en fit sa résidence. On lui doit les communs, la ferme et le parc qu'il aménagea, ainsi que l'étang et l'allée d'entrée ou il fit poser la grille d'honneur du château de Brèves, et acheva la terrasse. Pendant 25 ans de 1873 à 1898, se fut son gendre le Comte Ferdinand du Hamelle de Breuil qui entreprit de gros travaux de rétablissement de la salle capitulaire, il fit restaurer les quatre façades en style Louis XIII, fit élever le porche de la chapelle et la porte d'honneur. Son petit-fils André repris le flambeau et de 1898 à 1949 fit achever la restauration des façades, refit la décoration intérieure, agrandit les communs et rétablit la salle capitulaire qu'il transforma pour en faire la chapelle actuelle. Et enfin son arrière-petit-fils le marquis de Brazais qui décéda en 1972.","architecture":"Le bâtiment principal complètement remanié comprend un corps central à un étage avec deux corps symétriques à deux étages. De nouveaux travaux furent entrepris au XVIIIe siècle avec la surélévation du bâtiment des religieuses et la construction d'une glacière dans les bois voisins. Les seuls vestiges du XIIIe siècle, sont : La salle capitulaire et la sacristie. Le gros uvre est à plan rectangulaire à deux étages carrés en pierre calcaire, moellon et enduit. Couvrement : voûte en berceau, voûte d'ogives, voûte d'arêtes. La couverture est en ardoise sur toit à long pans en bâtière. Escaliers tournant à retours, décor de sculpture ornement végétal. \r\nEn 1793, le bâtiment nommé le vieux pavillon, tenant d'une part à l'église et à la grande cour est détruit. Ainsi que le bâtiment tenant à l'église du côté du couchant.","habitants":"Baron Pierre Charles François Dupin\r\n        \"","divers":"Le Vieux-Pavillon de Reconfort à Saizy","gps":"","images":["../../jctruffet.com/image/image_58/58_Reconfort_Saizy_1.jpg","../../jctruffet.com/image/image_58/58_Reconfort_Saizy_2.jpg","../../jctruffet.com/image/image_58/58_Reconfort_Saizy_3.jpg"]},"Consult_chateau_formulaire5923":{"id":"Consult_chateau_formulaire5923","dept":"58","canton":"Donzy","commune":"Couloutre","nom":"Rivière_Morvan","type":"Château","periode":"XIV","histoire":"RIVIERE, est daté des XIVe-XVe siècles, il est  édifié sur un ancien château fortifié du XIVe siècle, nous pouvons apercevoir la base danciennes tours, vers 1650, sur Marie-Catherine de Baudinière, écrit une nouvelle page de lhistoire, elle est la directrice dune école primaire. Château de la Rivière ayant appartenu à Bureau de la Rivière famille noble du Nivernais, ensuite à la fille unique de Hubert II, baron de la Rivière marié à François de Choiseul branche de Chevigny, nommée Choiseul de la Rivière dont elle porte les armes.  Restauré au XIXe siècle par la famille de Choiseul, Qui laménage avec des décors de stucs.  Le château, acheté il y a vingt-cinq ans par l'abbé Schaeffer est propriété de l'association Notre-Dame de Sainte-Espérance, \" rapporte la directrice\",  dans lequel ont toujours été organisés, des séminaires, des séjours de scouts, des retraites spirituelles et des réunions de jeunes  catholiques.","architecture":"La Rivière, de plan rectangulaire à trois niveaux, et série de lucarnes sur combles flanqué  de tours rondes à chaque angles à toit en poivrières et fronton triangulaire entre les tours.","habitants":"Famille de Bureau de la Rivière\r\n        \r\n        \"","divers":"Château de la Rivière à Couloutre","gps":"","images":["../../jctruffet.com/image/image_58/58_Riviere_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Riviere_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Riviere_Morvan_3.jpg"]},"Consult_chateau_formulaire7840":{"id":"Consult_chateau_formulaire7840","dept":"58","canton":"Saint-Benin d","commune":"Dienne-Aubigny","nom":"Romenay_Morvan","type":"Maison-forte","periode":"","histoire":"ROMENAY, à la fin du XIVe siècle une maison forte appartenait à Guiot-Gavard et en 1397 jean Coquille jurisconsulte, achète  le fief, ainsi que  la bâtisse  qui est très endommagée par la guerre de Cent-ans, la rénove  au XVIIe siècle rajout d'une aile en retour l'histoire du château  est liée à la mémoire de Guy Coquille, le fief reviendra pour une dizaine d'années à un écuyer Jean de Verdigny avant de retourner dans le giron familial avec Etienne Pomerol petit fils de Guy Coquille et le château passera en 1634 à Claude de Maulnoury conseiller à la cour;  et par alliance en 1756 à la famille Chéry, et en 1789 aux la Rochefoucauld-Cousanges et encore par alliance   en 1811 au  de Montrichard, descendant de Guy Coquille, lun des héros de lhistoire nivernaise, premier échevin de Nevers, député du tiers état, procureur général du duché de Nevers et sieur de Romenay. Toujours dans la descendance du comte  Gabriel de Montrichard.\r\nJoël et Catherine Boutrolle le restaurent depuis plus de trente ans.","architecture":"Romenay,les communs et les dépendances ont été construits au XVII-XVIIIe siècle et n'ont pas subi de modifications. On y trouve des fresques de l'Ecole de Padoue, illustrant le faste de l'époque des Ducs de Nevers, château en équerre à deux niveaux toitures en semi-croupe et lucarne sur l'extérieur flanqué de deux tours d'angles et douves en eau, à gardé son aspect féodal pas grandiloquent mais parfaitement enchâssé dans ce flanc de Bazois entre forêt et bocage. Porte d'entrée en encadrement à bossages avec fronton brise. Grâce à des fouilles menées par les nouveaux propriétaires, le système hydraulique, constitué de plusieurs bassins et canaux entourés de tapis verts, est aujourd'hui complètement restitué. Il redonne au site tout son charme.","habitants":"Comte de Montrichard.                                                                Jurisconsulte Guy Coquille\r\n        \"","divers":"Château de Romenay à Dienne-Aubigny","gps":"","images":["../../jctruffet.com/image/image_58/58_Romenay_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Romenay_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Romenay_Morvan_3.jpg","../../jctruffet.com/image/image_58/58_Romenay_Morvan_4.jpg","../../jctruffet.com/image/image_58/58_Romenay_Morvan_5.jpg"]},"Consult_chateau_formulaire7e6a":{"id":"Consult_chateau_formulaire7e6a","dept":"58","canton":"Luzy","commune":"Rémilly","nom":"Rémilly","type":"Château","periode":"XV-XVIII","histoire":"Quatre châteaux à Rémilly dont celui de Rémilly, de La Verrerie XIXe siècle, de la Boue ou la Bouë XVe-XVIe -XVIIIe siècle, du bourg de Remilly du XVe siècle et  la Tour, vestige du château de Bost  du XVe siècle.\r\nREMILLY,  déjà citée au XIe siècle, faisait autrefois partie de l'archiprêtre de Moulins-Engilbert. Fromond, évêque de Nevers, donna le patronage de cette cure au chapitre de sa cathédrale, qui le vendit le 13 mars 1685 à la chartreuse d'Apponay, avec obligation de nommer à la dite cure une personne suffisante et capable. En 1682 la paroisse de Saint-Michel-en-Longue-Salle ( aujourd'hui Saint-Michel) est rattachée à Rémilly. Le 6 juillet 1511, le curé de la paroisse : Guillaume Billaud, fait l'acquisition de la place de l'ancienne maison-forte pour sept deniers de rente annuelle. \r\nBOUE, château construit au début du XIVe siècle pour Guillaume de la Perrière,  la Boue précédemment appelé le château de Rémilly. Le 26 février 1609, a eu lieu le mariage du comte Eustache de Lichy, qui deviendra Eustache de Lichy, après avoir sauvé la vie d'Henri IV, lors d'une bataille, mariage avec Claude de Maumigny, fille des seigneurs du lieu, François de Maumigny et Nicole d'Ymonville. En ce temps-là le château était bien nommé château de la Boue et non château de Rémilly.  Le 29 octobre 1640, à Champvert , le second mari de la veuve de Philippe de Maumigny a vendu le château  au Comte Eustache de Lichy marié à Anne du Verne.\r\nLe domaine et les fermes qu'il comprenait appartenaient au manufacturier ardennais, banquier, propriétaire et agronome François Florentin Achille Sellière , baron romain, et à son épouse sa cousine Camille Zoé Sellière, de Paris, lorsque Louis Rousseau Salomon-Cohen en reprit la régie avant de diriger la ferme-école de Poussery, sur la commune voisine de Montaron.                                  Pas d'information pour les châteaux de la Verrerie, du bourg et du Bost.","architecture":"Le château de La Verrerie XIXe siècle.\r\nLe Château de la Boue ou la Bouë XVe -XVIe-XVIIIe siècle.\r\nLe château du bourg de Remilly du XVe-XVIe-XVIIIe siècles au nord du bourg, en bordure de la D3, domine la vallée de l'Alène. C'est une belle demeure du XVe siècle, comportant un corps de logis massif, avec fenêtres à meneaux et accolades, une tour d'angle et une tour accolée à la façade, coiffée d'une toiture conique, avec ouverture défendue par mâchicoulis.\r\nLa Tour, vestige du château de Bost XVe siècle est une grande tour ronde, vestige restant d'un puissant château démantelé sous Louis XIII par ordre de Richelieu. Pour y accéder, prendre le chemin qui passe devant le château du bourg de Remilly.                                   Boue, château bâti au début du XIVe siècle pour Guillaume de la Perrière avec tour carrée flanquée d'une tour circulaire. Au Xve siècle, construction d'une tourelle d'escalier circulaire à l'angle sud-est dont la porte fut remaniée au XVIe siècle, bretèche au dessus de la porte. Bâtiments d'exploitation en briques de la fin du XVIe siècle. La maison dite du Buisson-Guipier a longtemps fait partie des dépendances du château de la Boue. L'ancien château et fief de Trougny, sur la châtellenie de Saint-Saulge, était vassal de la Boue. En revanche la Verrerie de la Boue n'est entrée dans le domaine qu'en 1780. En 1784 construction d'un corps de logis au nord. L'édifice se compose d'un étage carré, le gros uvre en moellon et enduit, type de couverture : toit en pavillon ; toit conique ; croupe et toit à longs pans, recouverts de tuiles plates et d'ardoises.","habitants":"Abbé Guillaume Billaud                                                                 Comte Eustache de Lichy\r\n        \r\n        \"","divers":"Château de Rémilly, de la Boue et de Saint-Michel.","gps":"","images":["../../jctruffet.com/image/image_58/58_Remilly_1.jpg","../../jctruffet.com/image/image_58/58_Remilly_2.jpg","../../jctruffet.com/image/image_58/58_Remilly_3.jpg","../../jctruffet.com/image/image_58/58_Remilly_4.jpg"]},"Consult_chateau_formulairead97":{"id":"Consult_chateau_formulairead97","dept":"58","canton":"Varzy","commune":"Entrains sur Nohain","nom":"Réveillon","type":"Château","periode":"XVII","histoire":"REVEILLON, qui domine la petite ville dEntrains et le cour supérieur du Nohain, a remplacé au milieu du XIXe siècle, une vieille maison-forte, dotée de plusieurs tours, de fossés et dun pont-levis, siège dune seigneurie ancienne, détenue pendant plus de trois siècles par la famille de Veauce.  Passée vers 1550 à Edme de Chassy, qui la revendit peu après à Nicolas Bolacre, bourgeois de Nevers, qui sen dessaisit à son tour en 1579, Réveillon échut à Claude de Rochefort-Luçay, dont les descendants la conserveront jusquà la veille de la Révolution.  Le polémiste Henri Rochefort \"Victor-Henri de Rochefort-Luçay\" de son vrai nom, était leur descendant direct, mais il n'avait plus d'attaches dans la Nièvre.  Après plusieurs cessions, Réveillon est acheté en 1809 par le comte Antoine Roy, ministre sous la Restauration, est resté dans sa descendance jusquà nos jours, passant par alliance dans de grandes familles. Le comte Roy avait engagé la reconstruction complète du château, qui fut achevée sous le second empire, dans le goût néo-Louis XIII en vogue à cette époque, par son arrière-petit fils par alliance, le comte dHunolstein.   Château appartenant à la famille du duc de Mortemart.","architecture":"Lactuel château de Réveillon a été construit en 1875 sur les fondations de lancien manoir de la châtellenie dEntrains, ancienne propriété du duc de Nevers. Entrains-sur-Nohain, anciennement Intaranum, fut en effet une importante cité gallo-romaine à un carrefour routier, ville puissante et prospère qui sétend sur plusieurs centaines dhectares, avant dêtre un haut lieu du protestantisme pendant les années tumultueuses des guerres de religion. Au centre du parc,  le château du Réveillon, demeure seigneuriale, résidence dun duc et pair de France, la plus haute dignité de la noblesse sous lancien Régime. Le château a beau avoir été bâti au XIXe siècle, tout y respire le parfum raffiné du siècle des lumières. Le maniérisme anglais na pas pénétré en ces lieux, pas plus que le style troubadour ou le néo-gothique. Lenfilade des salons très lumineux a des allures de Versailles. Le décor, sans surcharge, est marqué par un équilibre élégant.","habitants":"Famille de Rochefort-Luçay                                                          Famille du Duc De Mortemart\r\n        \r\n        \"","divers":"La maison de l'amiral et le château de Réveillon à Entrains sur Nohain","gps":"","images":["../../jctruffet.com/image/image_58/58_Reveillon_1.jpg","../../jctruffet.com/image/image_58/58_Reveillon_2.jpg","../../jctruffet.com/image/image_58/58_Reveillon_3.jpg","../../jctruffet.com/image/image_58/58_Reveillon_4.jpg","../../jctruffet.com/image/image_58/58_Reveillon_5.jpg"]},"Consult_chateau_formulaireb918":{"id":"Consult_chateau_formulaireb918","dept":"58","canton":"Corbigny","commune":"Gacogne","nom":"Saugny","type":"Château","periode":"XVIII","histoire":"SAUGNY, demeure seigneuriale qui aurait appartenu en 1546 à Sébastien de Rabutin seigneur du Montal,  est reconstruit en 1862  sur des fondations datant du XVe-XIVe siècles.  Personnage ayant demeuré au château Louis Henri Victor de Chabannes, né le en 1806 à Chaumot, décédé en 1885 au château de Saugny, Pierre Victor Gaston de Chabannes Né en 1840 à Eschamps et décédé en 1905 au château de Saugny. Dans le hameau de Saugny, le château du XIXe siècle, dorigine du XVIe siècle. Au milieu du XVIe siècle, Elle aurait servi de place forte à un groupe de Huguenots. Fin XVIIe et début XVIIIe, la demeure est agrandie. Vers 1815, monsieur Bonnamour, nouveau propriétaire par alliance ayant fait fortune dans le flottage du bois, va transformer la demeure en un château, rehaussement de la charpente pour un étage, construction des deux tours, et dun colombier. En 1925, Benoît de Chabannes fait dautres aménagements, édification dune chapelle à lintérieur à lemplacement de lancien four à pain, des jardins, des terrasses, un bassin circulaire.  La famille de Chabannes est toujours propriétaire.","architecture":"Saugny, au milieu du XVIe siècle, il existait une demeure seigneuriale. Elle aurait servi de place forte à un groupe de Huguenots. Au début du XVIIIe siècle la demeure fut agrandie en doublant sa surface. Vers 1815, des remaniements sont entreprit: rehaussement de la charpente afin d'obtenir un étage supplémentaire, construction de deux tours et un colombier. Cette demeure pris l'allure d'un château. En 1925,  d'autres aménagements : édification d'une chapelle à l'intérieur, des jardins, des terrasses et un bassin circulaire. Le corps de logis et des bâtiments très remaniés aujourd'hui. Avec son corps de logis à deux niveaux couvert d'un toit avec croupe en d'ardoise et flanqué de deux hautes tourelles il a gardé toute son élégance. La propriété possède des dépendances, pigeonnier, par ces terrasses, le tout dans un cadre verdoyant. Une propriété privée.","habitants":"Famille de Sébastien de Rabutin\r\n        \r\n        \r\n        \"","divers":"Château de Saugy à Gacogne","gps":"","images":["../../jctruffet.com/image/image_58/58_Saugny_1.jpg","../../jctruffet.com/image/image_58/58_Saugny_2.jpg","../../jctruffet.com/image/image_58/58_Saugny_3.jpg","../../jctruffet.com/image/image_58/58_Saugny_4.jpg"]},"Consult_chateau_formulairec08d-2":{"id":"Consult_chateau_formulairec08d-2","dept":"58","canton":"Château-Chinon","commune":"Saint-Péreuse","nom":"Saulières","type":"Château","periode":"XVIII","histoire":"SAULIERES, en  1412  Guillaume de Marry, sieur de Montécot, dont la sur épousa Guyot de Courvol, sire du Tremblay, en 1650  Jean Sallonnyer du Perron baron de Chandiou, Solières revint à sa fille Catherine, qui en 1677  Catherine Sallonnyer, épouse Claude de La Ferté-Meun, seigneur de Solière, baron de Chandiou. Le couple eut trois garçons dont l'aîné: François Marie, reprit le fief pour Saulières.  François Marie de La Ferté-Meun épouse le 2 juillet 1701 , Anne Leroy qui lui apporta la seigneurie de Cuzy. En 1730  Jacques-Louis de La Ferté-Meun , acquit le comté de La Roche-Milay en 1735. Il décède en 1768 et son épouse Marie-Louise Françoise Pitoys de Quincize, légua aux pauvres des paroisses de son comté et à ceux de Saint-Péreuse où reposaient ses ancêtres. Ils eurent plusieurs enfants dont l'aîné fut comte de La Roche-Milay, Jacques-Louis II est dit vicomte de Saulières de 1782-1824 et de La Ferté-Meun. Dans les dernières années de sa vie, il fit construire au fond du parc, près d'un étang un tombeau où il fut déposé le 24 décembre 1824. Il légua à son neveu: en 1824  la Ferté-Champlâtreux, ce dernier  fit élever sur le tombeau de son oncle une chapelle qui n'a pas été achevée. Il vend cette terre à monsieur Grangier de La Marinière et part s'installer à Beyrouth. En 1845 Grangier de La Martinière le revend au comte Denis Benoît d'Azy, dont la fille: Claire, épouse Georges Léon René du Pré de Saint-Maur,  en 1860   il fait bâtir la chapelle où se trouve le caveau familial, et fait réaliser l'aménagement du parc. Il a fondé, près de Saulières une maison religieuse tenue par trois surs de la Providence de Portieux. En 1874, il épouse Suzanne de Bourbon-Busset, originaire de Versailles.","architecture":"Le château est construit sur une terrasse, avec en partie des matériaux de l'ancienne demeure seigneuriale de Champdioux, charpente toiture et pierres. De plan carré, avec sous-sol. Des bossages chanfreinés garnissent les chaînages d'angle. Un cordon mouluré court sur le périmètre de l'édifice au-dessus des baies de l'entresol. Sur la façade sud la partie centrale comporte un avant-corps en hémicycle dans lequel s'inscrivent trois fenêtres à chaque niveaux dont les baies de l'entresol sont dans des embrasures en demi-cercle. Au rez-de-chaussée trois portes-fenêtres donnent sur un vestibule du côté sud du bâtiment. Sur la façade opposée, une seule porte-fenêtre et deux fenêtres de chaque côté. Une corniche à modillons soutient un attique sur lequel repose le toit plat. L'aménagement intérieur fut revisité au XIXe siècle, avec la suppression du grand escalier du vestibule sud.\r\nSitués à l'est du château, le vieux logis a subi de nombreuses et importantes modifications. Reste une tour ronde d'un des angles de l'enceinte. Un bâtiment des communs, datant du XVIIIe siècle est pourvu de chaînages d'angle harpés. Il possède également des mangeoires ovales, taillées dans une pierre moulurée. Son portail est en anse de panier.","habitants":"Famille de Jacques-Louis de La Ferté-Meun\r\n        \r\n        \"","divers":"Vieux château de Saulières et le nouveau à Saint-Péreuse","gps":"","images":["../../jctruffet.com/image/image_58/58_Saulieres_1.jpg","../../jctruffet.com/image/image_58/58_Saulieres_2.jpg","../../jctruffet.com/image/image_58/58_Saulieres_3.jpg","../../jctruffet.com/image/image_58/58_Saulieres_4.jpg","../../jctruffet.com/image/image_58/58_Saulieres_5.jpg","../../jctruffet.com/image/image_58/58_Saulieres_6.jpg","../../jctruffet.com/image/image_58/58_Saulieres_7.jpg","../../jctruffet.com/image/image_58/58_Saulieres_8.jpg"]},"Consult_chateau_formulaired1ec":{"id":"Consult_chateau_formulaired1ec","dept":"58","canton":"Imphy","commune":"Sauvigny les Bois","nom":"Sauvigny_Bois","type":"Château","periode":"XIX","histoire":"Deux châteaux à Sauvigny les Bois celui de Machy du XIXe siècle et celui de Marigny du XIXe siècle.                          MARIGNY, chambres d'hôtes de  Christine et Norbert Belz, le château était dans les années 90 en possession de la Formule 1 patron Ligier, bien desservi, pourtant tranquille et protégé par le parc, ce château, ayant appartenu au pilote de formule 1 (Alain Prost). Toutes les fenêtres donnent sur le parc.                        MACHY a accueilli une école de plein air de 1943 à 1955 ainsi que des colonies de vacances puis un centre aéré de 1970 à 1981 aujourd'hui chambres d'hôtes et Sci immobiliéres.\r\nMONTJALIN, pas d'information historique.","architecture":"Marigny,  ce château, construit au XIXe siècle, a été conçu dans le style du XVIIe siècle. Il est constitué d'un corps central rectangulaire, accosté sur sa plus longue face de deux ailes, prolongées à chacune de leurs extrémités d'un pavillon carré en avancée sur les façades. L'ensemble s'élève sur deux niveaux et un niveau de comble, la façade nord du corps de logis central présente une porte encadrée de pilastres cannelés et vermiculés, ils supportent un entablement souligné de denticules sur lequel prennent appui des pilastres d'ordre ionique, soutenant une corniche à modillons. Dans la travée de cette porte, le niveau de comble offre une lucarne pigeon à trois baies et pilastres d'ordre corinthien supportant un fronton cintré, la façade méridionale présente une ornementation similaire et un large passage donne accès à la terrasse. Les pavillons sont couverts d'un toit à quatre pentes et, au nord comme au sud, leur comble est éclairé par des lucarnes-pigeons à fronton triangulaire. Les ailes et les pavillons d'angle sont éclairés de larges baies à piédroits harpés.","habitants":"Famille Ligier\r\n        \"","divers":"Château de Marigny et de Machy à Sauvigny les Bois","gps":"","images":["../../jctruffet.com/image/image_58/58_Sauvigny_Bois_1.jpg","../../jctruffet.com/image/image_58/58_Sauvigny_Bois_2.jpg","../../jctruffet.com/image/image_58/58_Sauvigny_Bois_3.jpg","../../jctruffet.com/image/image_58/58_Sauvigny_Bois_4.jpg","../../jctruffet.com/image/image_58/58_Sauvigny_Bois_5.jpg"]},"Consult_chateau_formulaire1505-2":{"id":"Consult_chateau_formulaire1505-2","dept":"58","canton":"Saint-Saulge","commune":"Saxi_Bourdon","nom":"Saxi_Bourdon","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Saxi-Bourdon, le manoir de Fourcherenne  du XIVe siècle, le château de Pontillard du XVIe siècle et le château de Trougny du XVI-XVIIIe siècle.                                    FOURCHERENNE du XIVe siècle transformé par Pierre du Verne, l'un des maîtres d'hôtel du  comte de Nevers.   La maison forte citée pour la première fois en 1394. Elle appartenait alors à Jean de La Fontenelle. Du début du XVe siècle à 1628 elle fut entre les mains des Du Verne et de leurs alliés, puis l'édifice fut acquis par Florimond de Rapine, dont les descendants la conservèrent jusqu'en 1818. passera de père en fille, des du Verne aux Fontenay puis aux Babute avant d'être acheté en 1628 par Florimond Rapine, conseiller et procureur général du duc de Mantoue. Son fils Pierre achètera en 1640 la seigneurie de Saxy réunissant ainsi les deux seigneuries. Elles demeureront dans la famille Rapine jusqu'à la Révolution. Acheté lors de la Révolution par monsieur Vincent, fut ensuite vendu à Durand de Faye et resta dans cette famille en passant à chaque génération de père en fille jusqu'à Mme Longchampt Dulignier actuelle propriétaire. Deux des propriétaires furent maires de Saxy-Bourdon, Durand la Faye et Pellecier.\r\nTROUGNY  sera transformé par Pierre du Verne, l'un des maîtres d'hôtel de Jean de Clamecy, le comte de Nevers. Ce château passera de père en fille, des du Verne aux Fontenay puis aux Babute avant d'être acheté en 1628 par Florimond Rapine, conseiller et procureur général du duc de Mantoue. Son fils Pierre achètera en 1640 la seigneurie de Saxy réunissant ainsi les deux seigneuries. Elles demeureront dans la famille Rapine jusqu'à la Révolution. Le maire Amable des Ulmes, le châtelain de Trougny.  PONTILLARD, au lendemain des \"trois Glorieuses\" le ministre Guizot avait nommé Durand de Faye. Mais les élections de 1830 portèrent un nommé Jean Grizard, meunier du Foulon de Pontillard.","architecture":"Le château de Fourcherenne, du XVe siècle, est le plus beau monument de Saxy. Le corps de logis de plan rectangulaire à trois niveaux avec lucarnes sur comble à toit brisé et en façade une tour carré dépassant l'ensemble de deux étages tour d'escalier, sur sa gauche prolongé par un bâtiment de dépendance.               Pontillard maison forte de deux étages de plan rectangulaire à toit à deux pans avec une tourelle d'escalier sur la façade toit en poivrière.                                                                         \r\n Trougny, corps de logis rectangulaire à deux niveaux avec lucarnes sur toit à deux pans, bâtiment accolé à sa droite d'une tour carrée et à sa gauche d'une tour  ronde avec toit en poivrière ce manoir  possède à l'écart d'une autre tour ronde à toit en poivrière.","habitants":"Famille Rapine                                                                                 Famille de  Pierre du Verne                                                          Famille d' Amable des Ulmes\r\n        \"","divers":"Château de Fourcherenne, de Pontillard et de Trougny.","gps":"","images":["../../jctruffet.com/image/image_58/58_Saxi_Bourdon_1.jpg","../../jctruffet.com/image/image_58/58_Saxi_Bourdon_2.jpg","../../jctruffet.com/image/image_58/58_Saxi_Bourdon_3.jpg","../../jctruffet.com/image/image_58/58_Saxi_Bourdon_4.jpg","../../jctruffet.com/image/image_58/58_Saxi_Bourdon_5.jpg","../../jctruffet.com/image/image_58/58_Saxi_Bourdon_6.jpg","../../jctruffet.com/image/image_58/58_Saxi_Bourdon_7.jpg"]},"Consult_chateau_formulaired6c6":{"id":"Consult_chateau_formulaired6c6","dept":"58","canton":"Luzy","commune":"Semelay","nom":"Semelay","type":"Château","periode":"XV-XVI-XX","histoire":"Trois châteaux à Semelay, celui de Bussières manoir du XVe siècle (voir article), du Plessis du XIXe siècle , du Matray du XVI- XXe siècle.                                                                      PLESSIS érigé sur une ruine médiévale en 1863, c'est une très belle construction de la fin du XIXe siècle, actuellement restaurée, ayant remplacé une maison forte du XVIe siècle.\r\nMATRAY refait à plusieurs reprises entre le XVIe siècle et le XIXe siècle. Il est depuis le XVIe siècle la propriété de la famille Bonneau du Martray.  La famille Bonneau du Martray, qui, dès 1859, tire son nom du domaine et du château du Martray à Sémelay dans la Nièvre, était assez bien représenté dans ce département puisqu'on la voyait, par alliance ou non, à Corbigny, Sémelay, résidence de Claude Marie Bonneau, père de Charles, qui acheta le château de Marry en 1804, transformé en logis de France par la famille d'Eté.","architecture":"Le château du Plessis, qui a remplacé une maison forte du XVIe siècle date de la fin du XIXe siècle de plan rectangulaire à deux niveaux toit en croupes avec lucarnes dont celle de la façade d'entré est balconé avec fronton. Quatre  tourelles en encorbellement à chaque angles à mâchicoulis et a toits très effilés, cet édifice possède sur ses flans deux rajouts à un niveau.   Matray,  corps de logis en équerre dont le corps principal est a  deux niveaux avec toit brisés à la Mansard avec lucarnes et pavillon surélevé en angles, l'autre aile d'un niveau avec toit brisé avec lucarnes.","habitants":"Famille Bonneau du Martray\r\n        \"","divers":"Château Matray et du Plessis à Semelay","gps":"","images":["../../jctruffet.com/image/image_58/58_Semelay_1.jpg","../../jctruffet.com/image/image_58/58_Semelay_2.jpg","../../jctruffet.com/image/image_58/58_Semelay_3.jpg","../../jctruffet.com/image/image_58/58_Semelay_4.jpg"]},"Consult_chateau_formulaire0e00":{"id":"Consult_chateau_formulaire0e00","dept":"58","canton":"Moulins Engilbert","commune":"Sermages","nom":"Sermages","type":"Manoirs","periode":"","histoire":"Sermages n'a pas de château féodal, mais deux manoirs désignés comme châteaux sont édifiés sur son territoire, Moncey et la Vaudelle.                                                                              SERMAGES  la famille le Tort, celle des Cotignon a jalonné l'histoire de notre région. Le comte de Soultrait fait remonter son histoire au XIIe siècle. On trouve à Moulins-Engilbert vers 1400, Drouin Cotignon comme garde du sceau du comte de Nevers. En 1469, Michel Cotignon est châtelain de Moulins-Engilbert et au XVIe siècle, la même fonction est assurée par Henri Cotignon. A Sermages, la famille possédait des biens au XVe siècle, possession de la famille de Champ de Saint-Léger, elle passe ensuite, vers 1680, à Gaucher de Champ Martin, écuyer. Au XVIIIe siècle, en 1774, c'est Michel de Cotignon qui en est seigneur.  VAUDELLE, construit en 1810, sur la route qui va de Sermages à Mouniot. Possédé à la Révolution par les Sallonyer de Varennes, Simon et son épouse Rose Charlotte Robert. Leur fils Charles François, commerçant, fait construire le château que nous voyons aujourd'hui. De son épouse Joséphine du Crest, il aura deux filles. L'une d'elles, Césarine, se marie en 1834, à un noble dont la famille originaire d'Ecosse vint s'établir en France au XVIe siècle, Edouard de la Chesnaye.\r\nMONCEY, bâti sur une colline dominant le Guignon, le château médiéval de Moncey fut très remanié aux XVIIIe et XIXe siècle. Des archives du château de Chastellux, cite Dame Agnès de Fontenay possédant la terre, en 1324. En 1354  Erhard de Thianges le posséda et il resta dans la famille jusqu'à la Révolution, changeant de nom selon la transmission par le mariage des demoiselles (Champs de St-Leger, de Ulmes, Gaucher de Champs Martin). La seigneurie de Moncey était mouvante du duché de Nevers, vassal du comté de Château-Chinon avant que la propriété ne soit vendu à la Révolution comme bien national.","architecture":"Vaudelle existait un domaine composé de quatre corps de bâtiments, aujourd'hui corps de logis rectangulaire à deux niveaux et lucarnes à fleur de toit , la bâtisse est accolée de deux tours rondes toit à poivrières.                                                          Moncey, l'origine et le type de construction  restent imprécis type manoir ou maison forte, peut être du XIVe siècle mais fort remaniée aux siècles suivants,  un quadrilatère avec un accès ouvert dans un angle, qui était, parait il, fermé par une grille. L'ensemble, important, comprenait deux corps de logis, une chapelle, une tour de guet, une métairie et dépendances, des caves. Aujourd'hui, intégré dans une exploitation agricole, il ne reste qu'une partie des bâtiments de ce quadrilatère: un bâtiment devenu dépendance, de longs et hauts murs de talus remplace les communs et les deux corps de logis perpendiculaires. L'un, de plan rectangulaire allongé, est de style classique du XVIIIe siècle et l'autre, sur un plan carré, a conservé des vestiges du XVe-XVIe siècle: fenêtres et portes à accolades, bases prismatiques, escalier en colimaçon.","habitants":"Famille de Champ de Saint-Léger                                               Famille de Sallonyer de Varennes\r\n        \"","divers":"Château de Moncey et de la Vaudelle à Sermages","gps":"","images":["../../jctruffet.com/image/image_58/58_Sermages_1.jpg","../../jctruffet.com/image/image_58/58_Sermages_2.jpg","../../jctruffet.com/image/image_58/58_Sermages_3.jpg","../../jctruffet.com/image/image_58/58_Sermages_4.jpg","../../jctruffet.com/image/image_58/58_Sermages_5.jpg"]},"Consult_chateau_formulairee9a0":{"id":"Consult_chateau_formulairee9a0","dept":"58","canton":"Nevers Sud","commune":"Sermoise sur Loire","nom":"Sermoise","type":"Château","periode":"XIX","histoire":"SERMOISE, bâti en trois ans, le château de Sermoise est achevé en 1753. Le premier propriétaire est Pierre-Jacques Girard de Vanne, lieutenant des maréchaux de France pour le Nivernais, puis conseiller à la chambre des comptes et grand-bailli d'épée du Nivernais. Le site a été choisi pour la vue qu'il offre sur Nevers et la vallée de la Loire. La fille de Pierre-Jacques Girard de Vanne épousa le baron Louis-César de Choiseul, ambassadeur de France à Turin auprès du royaume de Piémont-Sardaigne. La propriété passa ensuite à lune de leurs filles, la comtesse de Sérent, épouse dArmand de Sérent, député aux états-généraux, puis à sa nièce Marie-Nicolette, duchesse de Talleyrand-Périgord, et enfin à la petite fille de celle-ci, Cécile de Galard, princesse de Béarn et de Chalais. Ses héritiers vendirent en 1901 le château de Sermoise à monsieur Frédéric Blandin qui fit réaliser dans la partie nord de lédifice une très vaste bibliothèque.\r\nLe château de Sermoise, qui appartient aujourdhui à la famille de Vulpillières.","architecture":"Sermoise de plan en U, le corps de logis principal de plan carré à deux niveaux toit en croupes  ailes en retour au même niveaux avec toit brisés, en façade, le pavillon légèrement saillant de trois travées, avec fronton triangulaire  et il de buf, deux lucarnes sur comble.","habitants":"Famille de Pierre-Jacques Girard de Vanne\r\n        \"","divers":"Château de Sermoise","gps":"","images":["../../jctruffet.com/image/image_58/58_Sermoise_1.jpg","../../jctruffet.com/image/image_58/58_Sermoise_2.jpg"]},"Consult_chateau_formulairefaf2-2":{"id":"Consult_chateau_formulairefaf2-2","dept":"58","canton":"La Machine","commune":"Sougy sur Loire","nom":"Sougy","type":"Château","periode":"XVIII-XIX","histoire":"Quatre châteaux à Sougy sur loire, celui de Champrobert  du XVIIIe siècle, de Rosières du XIXe siècle  de Fontas  et du Bâteau  du XIXe siècle dit  domaine du Pouillat gites de France.             SOUGY  rebâti, en 1388, par le chambellan de Charles V Bureau de la Rivière. La ville  est saccagée, en 1434, par des mercenaires qui appartiennent au sieur d'Egreville, et pillée, en 1582, lors des guerres de religions.                                                                                                             BATEAU, ce château de style néo-Renaissance est édifié vers 1860-1870, pour le soyeux de Lyon Léon Giraud la Tour qui en confia la conception à Turbet, architecte Lyonnais.  Bateau est une propriété dun groupement agricole depuis le XXe siècle, le château est situé au nord-ouest en sortie du village, sur lemplacement dun ancien château daté du XVIIe siècle, dans un style néo-gothique. Lédifice est achevé en 1884.                             \r\n CHAMPROBERT, le château appartient à la famille du même nom du XIVe au XVIIe siècle. A la Révolution, Pierre de Champrobert émigre puis, sous la Restauration, le domaine est restitué à son neveu, Alexandre de Noury, au titre d'indemnité des émigrés.  En 1910, la propriété est louée à la famille des célèbres couteliers de Thiers, les Dumas. La demeure est alors entourée de belles dépendances et d'un parc.\r\nROZIERES,il a été construit au début du XIXe siècle, dans le style du XVIIe siècle. Son propriétaire en 1972, était monsieur de Certaine, qui l'utilisait comme résidence secondaire.\r\nFONTAS, la famille de Noury,  habitait Champrobert. Elle décida de la construction de Fontas en 1870. La guerre terminée, la construction de Fontas sacheva et la famille de Noury prit possession de la demeure.","architecture":"Sougy, cette vieille maison forte, située dans l'ancien Port de Tinte, date sans doute du XIe siècle. Elle est détruite et reconstruite au XIIIe siècle, puis à nouveau détruite au XIVe siècle et rebâtie, en 1388, elle est très modifiée aux XVIIIe et XIXe siècles. Une vieille tour ronde avec des ouvertures à chaque étage est conservée ainsi qu'un escalier en bois du XVe siècle.                                  Champrobert,  au XIXe siècle, un bâtiment de plan rectangulaire à deux ailes en retour d'équerre est construit. L'élévation sobre est rythmée par des ouvertures régulières.                                         Rosières c'est un bâtiment couvert en ardoises, deux ailes débordent, de petites tours demi-circulaires sont incluses dans l'angle intérieur des ailes. Il est entouré d'un parc.  Bateau,  ce château de style néo-Renaissance est édifié vers 1860-1870, à l'emplacement d'un ancien château du XVIIe siècle En 1860, seule une tour est construite. Le reste de l'édifice est achevé en 1884. Le château comporte deux corps de logis flanqués, à l'ouest, de deux  tours rondes, l'une couronnée de faux mâchicoulis et de créneaux, l'autre coiffée d'un toit conique. Le bâtiment s'élève sur 3 niveaux et un niveau de combles. Il est couvert d'un toit en pavillons.  A l'intérieur, la rampe d'escalier est copiée sur celle qui se trouve dans la maison natale des frères Lumière. Le parc est dessiné par le créateur des jardins du Luxembourg et conserve quelques arbres du XVIIe siècle. Fontas, la construction de Fontas en 1870, à partir de matériaux de provenance locale : pierres des carrières de Sougy. Pavillon central de plan rectangulaire à deux niveaux,  toit en croupes avec lucarnes accolé de chaque côté de pavillons rectangulaires saillant de deux niveaux, toit en croupes avec lucarnes.","habitants":"Famille de Champrobert Monsieur de Certaine                               Léon Giraud la Tour                                                                    Famille De Noury\r\n        \r\n        \"","divers":"vieux-château de Sougy, le Bateau dit aussi de Sougy, de Champrobert, de Rozières et de Fontas.","gps":"","images":["../../jctruffet.com/image/image_58/58_Sougy_1.jpg","../../jctruffet.com/image/image_58/58_Sougy_2.jpg","../../jctruffet.com/image/image_58/58_Sougy_3.jpg","../../jctruffet.com/image/image_58/58_Sougy_4.jpg","../../jctruffet.com/image/image_58/58_Sougy_5.jpg","../../jctruffet.com/image/image_58/58_Sougy_6.jpg"]},"Consult_chateau_formulaire9c51":{"id":"Consult_chateau_formulaire9c51","dept":"58","canton":"Saint-Amand en Puisaye","commune":"Saint-Amand en Puisaye","nom":"St_Amand_Puisaye","type":"Château","periode":"XVI","histoire":"Saint-AMAND  en PUISAYE,  depuis 1478 François de la Rochechouart futur chambellan du roi Louis XII en prend possession, il fut reconstruit entre 1530 et 1540 par Antoine de Rochechouart, fils d'un chambellan du roi François Ier, sur l'emplacement d'une forteresse féodale. Après avoir été acquise en 1659 par le cardinal Mazarin pour son petit neveu, Philippe Jules Mancini, Le château appartient depuis à la famille Mancini, duc de Nevers. Il a été un temps propriété du comte Nils de Barck, aristocrate suédois, sculpteur et céramiste, puis de Jules Guiraud, gouverneur de la Banque de France. Le château abrite aujourd'hui un musée consacré à la céramique.  La seigneurie est revendue en 1710 aux Guyot. Erigée en marquisat, l'édifice appartient en 1731 à Léonard Guyot, receveur général des aides et des domaines du roi, secrétaire du roi. Son successeur en 1776, est Antoine Léonard Guyot grand bailli d'épée, gouverneur d'Auxerre, en 1789, lors de la Révolution il émigre à Stuttgart. La demeure serait devenue bien national si la sur du marquis la \"citoyenne Félicité Guyot Dufraisse\" mariée à un citoyen bon teint de l'époque, n'avait établi qu'elle avait conservé son domicile en France et ne figurait pas sur la liste des émigrés, elle devint donc propriétaire du château qui ne changea pas de famille. En 1793 naquit à Stuttgart Charles François Guyot, il retrouva sous la Restauration son titre de marquis et le château de son père qu'il conserveront jusqu'en 1896 en 1898 l'ingénieur  Paul Jeanneney grand collectionneurs de grès l'acquiert et transforme les dépendances en ateliers démaillage et en 1920 passe à un aristocrate suèdois le comte Nils de Barck céramiste et artiste peintre, après la deuxième guerre mondiale est racheté par la ville  d'Anthony pour colonie de vacances et  enfin, la commune de Saint-Amand en devient propriétaire le 4 octobre 1985 et le rénove pour en faire le musée du grès de Puisaye.","architecture":"le château  de Saint-Amand  il fut reconstruit entre 1530 et 1540, dans un style Renaissance  avec fenêtres à meneaux et des lucarnes très ornementées, il met à l'honneur le matériau local dans ses façades de briques roses rythmées d'ouvertures encadrées de pierre blanche finement travaillée où se distinguent de place en place les armes des Rochechouart qui le firent construire avec son escalier à vis central ; les douves et le pont-dormant et l'architecture de la Renaissance, le nouveau château sur l'emplacement de l'ancienne forteresse restée à l'état de ruines depuis le XVe siècle, l'édifice se compose  d'un corps de logis appareillé en briques et en pierre de taille, à deux niveaux  et l'étage de combles sont munies de lucarnes  finement ornées à fronton et pinacles le bâtiment  est flanqué à chacune de ses extrémités d'une tour carrée orné de faux mâchicoulis, tandis que chaque angle est pourvu d'une tourelle abritant un escalier à Vis. Sur les pavillons d'angle, de hautes cheminées en brique formant moulures et décrochements constituent un modèle du genre. A l'intérieur, il se distingue par un bel escalier en pierre et les remarquables charpentes de ses pavillons.","habitants":"Famille Mancini                                                                               Famille  Antoine de Rochechouart                                       \r\n Famille de Antoine Léonard Guyot\r\n        \"","divers":"Château de Saint-Amand en Puisaye et le château de Boutissaint.","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Amand_Puisaye_1.jpg","../../jctruffet.com/image/image_58/58_St_Amand_Puisaye_2.jpg","../../jctruffet.com/image/image_58/58_St_Amand_Puisaye_3.jpg","../../jctruffet.com/image/image_58/58_St_Amand_Puisaye_4.jpg","../../jctruffet.com/image/image_58/58_St_Amand_Puisaye_5.jpg","../../jctruffet.com/image/image_58/58_St_Amand_Puisaye_6.jpg","../../jctruffet.com/image/image_58/58_St_Amand_Puisaye_7.jpg","../../jctruffet.com/image/image_58/58_St_Amand_Puisaye_8.jpg"]},"Consult_chateau_formulaire90ff":{"id":"Consult_chateau_formulaire90ff","dept":"58","canton":"Saint-Benin d","commune":"Saint-Benin d","nom":"St_Benin_Azy","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux à Saint-Benin d'Azy dont celui d'Azy (voir article) celui de Montgoulbin du XVIIIe siècle et le manoir de Valotte du XVIIe siècle et Vieil-Azy (voir article avec Azy).                            ST-BENIN-AZY, au XIIIe siècle, des sires d'Asnois, de cette seigneurie dépendait la plupart des fiefs de Montgoublin, Azy, Mousseaux, Segoule et Valotte.  Il englobait les fiefs du territoire de Saint-Benin. Le Vieil-Azy, le château médiéval fut construit par Gilbert de Saint-Père, puis détruit en partie au début du XVIIIe siècle par Michel de Las, seigneur de Prye . Érigée en marquisat en 1738, la terre d'Azy est passée aux du Bourg de Bozas. Léonor Brière d'Azy l'achète en 1795, et ce sont ses héritiers qui le transforment , durant le XIXe siècle. Par alliance, il devient la propriété de Denis Benoist d'Azy, qui le fit remanier à son tour en 1847.                                                                 MONTGOUBLIN, ce fief dépendait de Saint-Christophe qui fut plus tard réunie à celle de Saint-Bénin. C'est au château, qu'eurent lieu les noces de Paul de Maumigny en 1676, chevalier, seigneur de Riéjot, en 1699, avec Claude de Las, fille de Charles de Las, chevalier seigneur, et de dame Jeanne de Changy, Le château de Montgoublin, c'est une grosse maison appartenant à la famille de Saint-Phalle qui s'est illustrée à plusieurs reprises, Niki de Saint Phalle, la célèbre plasticienne cinétique, y passait de temps en temps.                                                                         VALOTTE, le manoir de Valotte est daté du XVe siècle. Il a appartenu a Michel de Las chevalier et seigneur de Valotte et à Olivier de Chasteulux. Anne de Grossouve vend Valotte en 1585 à Esme de Las seigneur de la Coudre. Julian Lennon, fils du célèbre Beatles John Lennon, à composé en 1983, son premier album, titré  Valotte  dans Le « Studio des Fines Pierres » . Manoir et ancienne forge de la commune de Saint Benin-dAzy.","architecture":"Le château de Montgoublin,  le marquisat d'Azy fut érigé par lettres patentes de Louis XV; il englobait la plupart des fiefs du territoire de Saint-Benin : Cherault, Trailles, Azy, Mousseaux et Valotte,  construit au XVIIe siècle, est une grosse demeure  de plan rectangulaire à deux niveaux  accolé de deux pavillons rectangulaires aux extrémités, hautes cheminées et lucarnes. L'édifice présente l'intérêt d'avoir de jolies écuries qui abritaient longtemps un bel équipage de chasse à courre et qui abrite aujourd'hui quelques camions de pompiers.                                 Le manoir de Valotte : depuis cinq siècles, ces vieilles pierres, posées par des gens de l'art, maintiennent debout ce manoir aux proportions simples. Corps de logis rectangulaire à deux niveaux, deux tours rondes à l'est et à l'ouest, une carrée au nord en façade qui sert d'entrée principale. Cette dernière comporte un escalier de lourdes pierres qui tourne de gauche à droite, du côté étroit des marches. Un pigeonnier, a été reconverti en petite chapelle.","habitants":"Gilbert de Saint-Père                                                                                  Famille de Saint-Phalle Esme de Las, fils du célèbre Beatles John Lennon.\r\n        \"","divers":"Château de St-Benin d'Azy  de Montgoublin et de Valotte.","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Benin_Azy_1.jpg","../../jctruffet.com/image/image_58/58_St_Benin_Azy_2.jpg","../../jctruffet.com/image/image_58/58_St_Benin_Azy_3.jpg","../../jctruffet.com/image/image_58/58_St_Benin_Azy_4.jpg","../../jctruffet.com/image/image_58/58_St_Benin_Azy_5.jpg","../../jctruffet.com/image/image_58/58_St_Benin_Azy_6.jpg"]},"Consult_chateau_formulaire9152":{"id":"Consult_chateau_formulaire9152","dept":"58","canton":"Montsauche les Settons","commune":"Saint-Brisson","nom":"St_Brisson","type":"Manoir","periode":"XVII","histoire":"A Saint-Brisson, le manoir du Parc est le centre administratif du parc naturel régional du Morvan. Attaqué en 1793 pendant la Révolution, le vieux manoir du XVIIe siècle situé près de la rivière «Vignan» fut ensuite vendu, puis démoli. La propriété, témoin dun passé nobiliaire et agricole, servit alors entre 1802 et 1803 à la construction dun nouveau château, D'avril à novembre, des expositions thématiques ainsi que des animations pédagogiques sont proposées. En 1975, le domaine est acquis grâce à lEtat, par le syndicat mixte du parc naturel régional du Morvan.","architecture":"Cet ensemble de bâtiments, a été construit dans un style original importé par un architecte anglais. La structure de la maison se compose dun bloc rectangulaire aux murs épais et aux petites fenêtres pour se protéger du climat rude et contrasté du Morvan.  Il sagit dune propriété de 40 ha qui se compose dun ensemble de bâtiments regroupant les divers services du Parc. Cette propriété a connu reconstructions et démantèlements successifs depuis le XIXe siècle. En plus du bloc central, cet ensemble se compose de deux bâtiments symétriques pour engranger céréales et foins, et loger les animaux. Enfin, face à lextrémité de chaque aile, on peut trouver une chapelle et le pavillon de chasse. \r\nLensemble se complète par une bergerie et la maison du dernier fermier qui est actuellement le centre administratif du Parc. En 1802-1803 un nouveau château est bâti aux Petites Fourches. Cet ensemble de bâtiments du XIXe siècle, centre de lactuelle Maison du parc, a été construit dans un style original, bloc rectangulaire avec petites fenêtres et murs épais dans ce pays avec un climat rude et contrasté.  Lensemble se complète par une bergerie et la maison du dernier fermier qui est actuellement le centre administratif du Parc.","habitants":"Président Paul Flandin\r\n        \"","divers":"Le manoir du parc à Saint-Brisson","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Brisson_1.jpg","../../jctruffet.com/image/image_58/58_St_Brisson_2.jpg","../../jctruffet.com/image/image_58/58_St_Brisson_3.jpg"]},"Consult_chateau_formulaire4dc9":{"id":"Consult_chateau_formulaire4dc9","dept":"58","canton":"Nevers","commune":"Saint-Eloi","nom":"St_Eloi","type":"Château","periode":"XVII","histoire":"A Saint-Eloi, le château de Trangy et son ancien moulin à vent du XIXe siècle ; le château de Venille des XVe et XVIIe siècles \r\nTRANGY, la terre de Saint-Éloi fut acquise par les ducs de Nevers en 1559, elle suivit alors les destinés du duché. Elle appartient jusqu'au XIIIe siècle semble-t-il, aux religieux de Saint-Étienne de Nevers  Maison de maître construite fin du XVIIIe siècle dans un parc. Aujourd'hui gîtes de France de Chantal et Guy de Valmont.               VENILLE, cest lancienne résidence champêtre de labbé de Saint-Martin de Nevers. La terre de Saint-Éloi fut acquise par les ducs de Nevers en 1559, elle suivit alors les destinés du duché. La propriétaire est madame Albanel Geneviève, née en 1926. La rivière de LEperon traverse cette belle propriété.","architecture":"Trangy édifice composait d'un corps de logis rectangulaire à un niveau avec toiture brisée flanqué de lucarnes dans les combles, accolé de chaque côté du corps rectangulaire à un niveau toit en croupes.                                                                                   Le château de Venille a été édifié sur lemplacement dune petite maison forte datée du XVe siècle, qui a été agrandie et remaniée aux XVIIe et XIXe siècles. Son corps central est flanqué de pavillons rectangulaires, avec une tour carrée et un escalier à vis, deux tours rondes sont placées aux angles de la façade orientale, le château possède une chapelle datée du XIXe siècle. La tour centrale est datée du XVe siècle. Le château est de plan barlong. Le bâtiment est couvert dardoises. Une propriété privée, visible de lextérieur depuis la rue du lieu dit.","habitants":"ducs de Nevers\r\n        \"","divers":"Le château de l'Orangerie, de Trangy et de la Venille à Saint-Eloi","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Eloi_1.jpg","../../jctruffet.com/image/image_58/58_St_Eloi_2.jpg","../../jctruffet.com/image/image_58/58_St_Eloi_3.jpg","../../jctruffet.com/image/image_58/58_St_Eloi_4.jpg","../../jctruffet.com/image/image_58/58_St_Eloi_5.jpg","../../jctruffet.com/image/image_58/58_St_Eloi_6.jpg"]},"Consult_chateau_formulaire3d8b-2":{"id":"Consult_chateau_formulaire3d8b-2","dept":"58","canton":"Décize","commune":"Saint-Germain Chassenay","nom":"St_Germain_Chassenay","type":"Château","periode":"XVIII-XIX","histoire":"A Saint-Germain en Chassenay deux châteaux celui de Beauvoir du XVIIIe siècle et celui de Saint-loup du XIXe siècle                                    St-LOUP, château édifié par Visconti entre 1845 et 1848.  Le parc a été dessiné par le paysagiste Paul de Lavenne comte de Choulot.                BEAUVOIR, pas d'information historique.","architecture":"Beauvoir,  quadrilatère à deux niveaux avec lucarnes sur toit, flanqué en façade de  deux tours carrées en angles. Saint-loup du XIXe siècle,  château style néo-gothique édifié par Visconti entre 1845 et 1848. à deux niveaux toit brisé à la Mansart avec rangée de lucarnes en comble et de tourelles  polygonales en angles à toits en poivrières, un fond d'archives privées fournit plans, élévations et coupes dessinés par l'architecte, dont on connaît peu l'activité en province. Château moyenâgeux par son volume et néo Louis XIII par le traitement de ses façades en brique et pierre.","habitants":"Famille de Visconti\r\n        \"","divers":"Château de Beauvoir et de Saint-Loup à Saint-Germain -Chassenay","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Germain_Chassenay_1.jpg","../../jctruffet.com/image/image_58/58_St_Germain_Chassenay_2.jpg","../../jctruffet.com/image/image_58/58_St_Germain_Chassenay_3.jpg","../../jctruffet.com/image/image_58/58_St_Germain_Chassenay_4.jpg","../../jctruffet.com/image/image_58/58_St_Germain_Chassenay_5.jpg"]},"Consult_chateau_formulaire85a1-2":{"id":"Consult_chateau_formulaire85a1-2","dept":"58","canton":"Château Chinon","commune":"Saint-Hilaire en Morvan","nom":"St_Hilaire_Morvan","type":"Château","periode":"XV6XVII","histoire":"Saint Hilaire en Morvan trois châteaux celui du l'Huis du roi du XVIIe siècle pas d'information, d'Argoulais du XIVe siècle celui de Chaligny du XVIIe siècle et de Mouasse. \r\nMOUASSE, du XVIIIe et XIXe siècles disposant d'un colombier et d'une chapelle bénite en 1836,  certains citent un premier château, construit au XVe siècle par la famille de Jean Cotignon. Alexandre de Villescot est mentionné comme seigneur en 1300, puis la famille Cotignon du XVe siècle à 1751. La famille de Champs de Saint Léger en est toujours propriétaire depuis le début du XIXe siècle.  En 1806 la famille de Champs de Saint Léger acquit la demeure et l'agrandit. Aujourd'hui SCI est active depuis 8 ans.\r\nARGOULAIS, l'ancien château détruit datant du XVIIIe siècle du XVIIIe siècle  et sa chapelle datant de 1862. Le château actuel date du XIXe siècle et a été bâti par Andoche Parthiot pour la famille de Chabannes. Le fief d'Argoulais appartenait en 1504 à Pierre de Marry, écuyer, qui le vendit à Dimanche Vaucoret, lieutenant au bailliage de Château-Chinon. A noter que Pierre de Marry possédait également le fief de la Motte Vacheresse où se trouvait une maison-forte détruite à une date indéterminée. La famille Loron est également cité comme propriétaire du fief. \r\nCHALIGNY  hôtel, Il existait un château avec deux tourelles au XVIIe siècle, appartenant à la famille Sallonyer, Il fut reconstruit au XIXe par François de  Chaligny.","architecture":"La commune de Saint-Hilaire compte sur son territoire deux manoirs,  le manoir de Courcelles du XVIIe-XIXe siècle et le manoir de Chaumotte du XVIIIe siècle et trois châteaux : le château de Mouasse du XVIIIe-XIXe siècle, le château de l'?Huis au Roi du XVIIe siècle qui possède un colombier et le château de Chaligny seconde moitié du XIXe siècle.                          \r\nMouasse du  XVIIIe siècle aile gauche bâtiment d'habitation comprend un corps de logis rectangulaire flanqué de deux ailes. L'aile gauche date du XVIIIe siècle, les autres bâtiments du corps central   portant la date de 1868 ont été bâtis par H. de Champs de Saint-léger. Sur un bâtiment, un fronton en façade porte les blasons des deux familles, surmontés de la couronne comtale. L'enceinte du château renferme un colombier carré et une belle chapelle privée consacrée en 1836, ainsi que des communs, plan régulier    élévation à travées  sous-sol; 2 étages carrés; étage de comble gros-uvre, couverture   toit à longs pans ; croupe ; toit à longs pans brisés ; flèche polygonale ; toit en pavillon ; toit conique. \r\n Ce château situé au lieu-dit L'Huis du Roi daterait du XVIIe siècle d'après la base Mérimée, ancien fief, qui se trouve à proximité. Le château présente un plan symétrique avec un sous-sol, un étage carré et un étage de comble. La propriété comporte un colombier et des communs. L'ensemble est couvert un tuiles plates.                             Argoulais,  de style néo-gothique, actuel est assez important et a été construit au XIXe siècle. L'édifice, de plan symétrique, se compose d'un étage de soubassement, de deux étages carrés et un étage de comble, le gros uvre : moellon; enduit; calcaire et granite, type de couverture : toit à longs pans brisés ; pignon découvert ; croupe ; flèche polygonale, recouverts d'ardoise.","habitants":"Famille de Jean Cotignon                                                                  Famille de Chabannes                                                                Famille Sallonyer\r\n        \"","divers":"Château d'Argoulais , de Chaligny, de Moasse , et les manoirs de Courcelles, de Chaumotte  et de l'huis","gps":"","images":["../../jctruffet.com/image/image_58/58_St_Hilaire_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_St_Hilaire_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_St_Hilaire_Morvan_3.jpg","../../jctruffet.com/image/image_58/58_St_Hilaire_Morvan_4.jpg","../../jctruffet.com/image/image_58/58_St_Hilaire_Morvan_5.jpg","../../jctruffet.com/image/image_58/58_St_Hilaire_Morvan_6.jpg","../../jctruffet.com/image/image_58/58_St_Hilaire_Morvan_7.jpg","../../jctruffet.com/image/image_58/58_St_Hilaire_Morvan_8.jpg","../../jctruffet.com/image/image_58/58_St_Hilaire_Morvan_9.jpg"]},"Consult_chateau_formulairef341":{"id":"Consult_chateau_formulairef341","dept":"58","canton":"Moulins Engilbert","commune":"Saint-Honoré les Bains","nom":"St_Honoré_les_Bains","type":"Villas-Châteaux","periode":"XVI-XVII","histoire":"Le château de la Montagne (voir article).                                            ST-HONORE, cité romaine réputée pour ses thermes, ses résidences et ses hôtelleries . Le marquis Antoine
