s de la famille des Barres. Pierre des Barres  fils de Louis chambellan du comte de Nevers, puis sénéchal du bourbonnais épouse en 1454 Marguerite Rogié demoiselle d'honneur de la reine.  Gilbert de Barres dernier descendant de cette lignée meurt en laissant à ses héritiers une mauvaise situation financière. En 1559 le château est vendu à Mouis Olivier bailli du comté d'Eu et receveur général, son fils Antoine Olivier conseillé du roi c'est à lui que l'on doit les modifications du château.  Du XVIIe au XIXe siècle la terre passe à diverses familles, le château se transmet par alliance en passant par François de Rochefort-Pleuvaut marquis de la Boulaye, puis à Nicolas de Changy comte de Roussillon maréchal des armées du roi et à Guillaume Poitreau de Vélard procureur du roi. Depuis 1835, il est la propriété de Philippe Dupin juriste et ancêtre de la famille de Nadaillac,  propriétaire.   BOUQUIN ce manoir est le seul vestige antérieur au XVIIIe siècle à Chaumot. Pas d'information historique.","architecture":"Chitry ce château rebâti au XVIIe , de plan rectangulaire. Depuis le XIVe siècle, construit sur un plan oblong, le château est constitué de trois  corps de logis en équerre flanqué de quatre tours d'angles rondes dont l'une du XIIIe siècle  à toit en poivrières et relié à deux autres par deux ailes de moindre importance datant du XVIIe siècle, ces tours étaient doublées  par une tourelle renferment un escalier à vis desservant les appartements et le chemin de ronde. Formant la partie nord de l'enceinte, cet ensemble s'articulait avec des courtines aboutissant sur le front sud, à deux autres tours. A l'est  du pont levis précédait une tour carrée avec porche d'entrée avec herse. Le corps de logis principal à trois  niveaux et une rangée de lucarnes à fronton triangulaire avec toit en croupes en tuiles écaillées, les ailes à deux niveaux dont celle de droite à arcades.   La porte de lancienne chapelle dans langle Nord-Est de la cour, la fameuse galerie des Sybilles dans laile Ouest du château,  terrasse et mur de soutènement.                                      Le château du Bouquin, est daté du XVIe siècle, dans la cour on trouve un colombier du XIXe siècle, ce manoir est le seul vestige antérieur au XVIIIe siècle à Chaumot.  Du XVIe siècle, il est flanqué de deux tourelles toutes les deux couvertes de toiture en petites tuiles plates.  La tour polygonale abrite un escalier à vis remanié au cours des siècles. De même, les fenêtres disposaient de meneaux en pierre avant d'être modifiées.  Le colombier,  date du XIXe siècle. Jusqu'à l'abolition des privilèges liés à la féodalité, le droit de posséder un pigeonnier en pied est strictement réservé aux seigneurs. Les tours circulaires dans lesquelles sont élevés les pigeons.","habitants":"Famille Chastellux\r\n        \"","divers":"Le château de Chitry et le manoir de Bouquin à Chaumot","gps":"","images":["../../jctruffet.com/image/image_58/58_Chitry_Bouquin_1.jpg","../../jctruffet.com/image/image_58/58_Chitry_Bouquin_2.jpg","../../jctruffet.com/image/image_58/58_Chitry_Bouquin_3.jpg","../../jctruffet.com/image/image_58/58_Chitry_Bouquin_4.jpg","../../jctruffet.com/image/image_58/58_Chitry_Bouquin_5.jpg","../../jctruffet.com/image/image_58/58_Chitry_Bouquin_6.jpg","../../jctruffet.com/image/image_58/58_Chitry_Bouquin_7.jpg","../../jctruffet.com/image/image_58/58_Chitry_Bouquin_8.jpg","../../jctruffet.com/image/image_58/58_Chitry_Bouquin_9.jpg"]},"Consult_chateau_formulaireba32":{"id":"Consult_chateau_formulaireba32","dept":"58","canton":"Chatillon en Bazois","commune":"Chougny","nom":"Chougny","type":"Maison forte","periode":"XV","histoire":"Trois châteaux à Chougny dont celui de Chougny du XVe siècle, de Niault  et de Cuy.                                                             CHOUGNY-CUY, le domaine était le siège des seigneurs de Cuy et ce jusquà la Révolution. Après la Révolution, Les propriétaires  ont quitté Cuy et ils l'ont loué jusqu'au début des années 1980, et se sont réinstallés et ont commencé à restaurer le château et les étangs.                                                                           \r\nNIAULT, au XVe siècle, la terre de Niaux seigneurie en toute justice appartenait à la maison d'Anglure. Puis au XVIIe siècle à celle du Cleroy et au début du XIXe siècle à Jacques Antoine de la Boulaye. Il a été rebâti après 1768 par Jacques Joseph comte du Cleroy.","architecture":"Cuy, ce château a été bâti pendant la Guerre de Cent Ans. Il fait partie d'une série de fortifications défensives, construites le long de la frontière médiévale. Les parties les plus anciennes sont la grande tour et le porche qui datent du XVe siècle.  Le Jardin de Cuy se situe au milieu du paysage bocager de la Nièvre: prés à pâture entourés de haies. Cest lun de ces prés quon a entrepris de transformer en jardin à partir de 2001. Il saxe autour dune maison forte dont les origines remontent au XIVe siècle. \r\n  Niault, reconstruit au XVIIIe siècle, sur une ancienne maison-forte, deux corps de logis rectangulaires accolées, flanqué de deux tours rondes à quatre niveaux, vers 1854, il restait une tour et la cuisine abritant une vaste cheminée avec écusson.  Le château a du être remanié au XIXe siècle.  Il a l'aspect d'une grande demeure de deux niveaux, couverte par un long toit en ardoise en croupes. La façade arrière comporte une tour. A quelques dizaines de mètres, la chapelle et son clocheton couverts en ardoise est accolée à un hangar agricole.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Cuy et de Niault à Chougny","gps":"","images":["../../jctruffet.com/image/image_58/58_Chougny_1.jpg","../../jctruffet.com/image/image_58/58_Chougny_2.jpg","../../jctruffet.com/image/image_58/58_Chougny_3.jpg","../../jctruffet.com/image/image_58/58_Chougny_4.jpg","../../jctruffet.com/image/image_58/58_Chougny_5.jpg","../../jctruffet.com/image/image_58/58_Chougny_6.jpg","../../jctruffet.com/image/image_58/58_Chougny_7.jpg"]},"Consult_chateau_formulaire2327":{"id":"Consult_chateau_formulaire2327","dept":"58","canton":"Château-Chinon","commune":"Château-Chinon","nom":"Château_Chinon","type":"patrimoine","periode":"XII-XVII","histoire":"CHÂTEAU-CHINON, fut d'abord le siège d'une seigneurie, puis d'une châtellenie, et enfin d'un comté duquel relevaient plus de 255 fiefs et seigneuries. Ces terres appartinrent aux plus grandes familles du Royaume de France.  Maison Delorme de Beauregard de 1095 à 1240. Maison de Mello de 1240 à 1323.  Le roi Charles VI érige en 1389 la châtellenie de Château-Chinon en comté avec la châtellenie d'Ouroux, les seigneuries de Brassy et des Places, ainsi qu'une partie de la baronnie de Lormes.  Maison de Brienne de 1323 à 1389. Maison de Bourbonde 1394  à 1454. Maison de Bourgogne de 1454 à 1477. Maison dAutriche de 1482 à 1517. Maison dOrléans-Longueville de 1517 à 1565. Maison de Condé de 1565 à 1644 . Maison de Savoie-Carignan de 1644  à 1719. Maison de Mascrany  de 1719 à 1790 . Les années 1950 marquent l'arrivée d'un homme politique d'origine charentaise : François Mitterrand, maire de 1959 à 1981, conseiller général, il présida le conseil général de la Nièvre puis député, il fut ministre sous la quatrième République. Candidat malheureux en 1965 et 1974 à la présidence de la République, François Mitterrand fut finalement élu le 10 mai 1981, puis réélu en 1988.","architecture":"Au sommet du Calvaire, sur le même site où l'oppidum, puis le camp romain prenait place, on remarque de nos jours quelques vestiges de l'ancien château fort : traces des anciens souterrains, d'une tour de guet et des fossés.\r\nSa construction pourrait dater du Xe ou XIe siècle. De taille très modeste, il ne disposait visiblement pas d'habitation seigneuriale, la plupart des seigneurs de Château-Chinon n'ayant de toute manière jamais logé dans la ville. Il était constitué d'un corps de logis rectangulaire d'environ 30 mètres par 25 mètres flanqué d'une tour ronde à chaque angle. Ces tours avaient un diamètre de 7 mètres et leurs murs avaient une épaisseur de 3 mètres 50. L'une d'elle, à l'angle sud-ouest, était percée d'une poterne permettant d'accéder au souterrain débouchant à l'intérieur du château. Une cinquième tour de même taille se trouvait sur la face nord ; elle faisait office de donjon et une petite chapelle dédiée à Saint-Laurent y était adossée. La porte d'entrée de la forteresse était tournée vers la ville, sur la face sud. Elle était munie d'un pont-levis et surmontée de mâchicoulis. La basse-cour se trouvait à l'est de l'édifice.\r\nLa destruction du château date  de 1478 lorsque Charles Ier d'Amboise, gouverneur de Bourgogne, fut chargé par Louis XI de « démolir, abattre et raser toutes les places, châteaux et forteresses » du Morvan.","habitants":"familles du Royaume de France\r\n        \"","divers":"A Château-Chinon le château , une porte et la préfecture.","gps":"","images":["../../jctruffet.com/image/image_58/58_Chateau_Chinon_1.jpg","../../jctruffet.com/image/image_58/58_Chateau_Chinon_2.jpg","../../jctruffet.com/image/image_58/58_Chateau_Chinon_3.jpg","../../jctruffet.com/image/image_58/58_Chateau_Chinon_4.jpg"]},"Consult_chateau_formulairebdf8":{"id":"Consult_chateau_formulairebdf8","dept":"58","canton":"Clémency","commune":"Ouagne","nom":"Château_Vert_ouagne","type":"Château","periode":"XIX","histoire":"CHATEAU-VERT est un titre seigneurial qui remonte au XIIIe siècle. Au nord d'Ambois, appelé Gros-Buisson, on remarquait les ruines d'un ancien château féodal, qui fut détruit par les protestants en 1578. Les Coinctet ayant perdu leur manoir se retirèrent à Champ-Moreau, où ils firent leur résidence, tout en conservant le droit de justice sur les habitants de Ouagne, ainsi que l'atteste un acte de 1579, signé par un sieur Louis Lemoine, greffier. Champmoreau, avant d'être habité par les seigneurs, possédait des bois d'usage, mais ces derniers s'en emparèrent vers la fin du XVIe siècle. A cette époque, cette terre était possédée par une dame Nicole Guilier, et en 1618, elle appartenait au sieur de Lys, seigneur de Champmorot et de Jully. Edmé de Longuevile, seigneur de la Maison-Blanche en prit possession en 1623 et sa famille la conserva jusqu'en 1792. \r\nLe dernier châtelain titré, Edmé de Longueville et de Sichamps, chevalier de l'ordre de Saint-Louis, ancien capitaine au régiment du Lyonnais, avait dit-on, droit de chasse jusqu'aux portes de Nevers. C'est lui qui fit construire l'ancienne habitation de Château-Vert, qui disparue pour faire place à un magnifique château que M. Charles de Rambourg a fait éléver sur le plateau de la montagne, au dessus de la vallée du Beuvron. Aujourd'hui une Sci s'est créée en septembre 2005, l'entreprise Sci Châteauvert est une entité qui bénéficie d'une forte ancienneté. Elle est actuellement dirigée par Maria Van De Ven.  C'est une société civile immobilière   Location de terrains et d'autres biens immobiliers.","architecture":"château vert construit en 1860 utilisé comme centre de vacances, de style néo renaissance à deux niveaux attiques et lucarnes. Composait d'un corps de logis rectangulaire avec à chaque angles un pavillon carré toiture à l'impériale, et plein cintre sur entrée et sur parc pavillon saillant avec toit à l'impériale.","habitants":"Famille de Charles de Rambourg\r\n        \"","divers":"Le Château-Vert à Ouange","gps":"","images":["../../jctruffet.com/image/image_58/58_Chateau_Vert_Ouagne_1.jpg","../../jctruffet.com/image/image_58/58_Chateau_Vert_Ouagne_2.jpg","../../jctruffet.com/image/image_58/58_Chateau_Vert_Ouagne_3.jpg"]},"Consult_chateau_formulaire4a54":{"id":"Consult_chateau_formulaire4a54","dept":"58","canton":"St-Bernin d","commune":"La Fermeté","nom":"Cigogne_Fermeté","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à la Fermeté celui de Prye du XV-XVIIe siècle (voir article)  et celui de Cigognes du XVe siècle.  \r\nCIGOGNES, en 1349, le fief de Cigoignes  appartenait à Louis de Mary, écuyer, fils de Dreux de Marie, chevalier, sire de Mary de Cigoignes et de Sency. Du XVe au XVIIe siècle, le fief de Sigoigne est aux mains de la famille Bolacre qui donna  au nivernais, un brigradier de l'armée du Comte, un président de la Chambre des comptes à Nevers, un lieutenant général au bailliage et un procureur du Roi. Au XVIIe siècle, Cigogne passa par alliance au marquis de Rémigny de Joux, seigneur de Dumplum, dont les descendants le possédaient encore en 1789. Jacques Vyau de Baudreuille est né en 1712 au château de Cigogne.","architecture":"Le château de Cigogne, vestiges  du XIVe siècle et XIXe siècle, ancienne maison-forte dont il ne reste qu'une tour du XVe siècle  remaniée et une tourelle d'escalier de la Renaissance, flanquée d'une bretèche.  Les linteaux des fenêtres sont en pierres sculptées et ornées de cigognes.","habitants":"Famille Bolacre\r\n        \r\n        \"","divers":"Château et vestiges de Cigogne","gps":"","images":["../../jctruffet.com/image/image_58/58_Cigogne_Fermete_1.jpg","../../jctruffet.com/image/image_58/58_Cigogne_Fermete_2.jpg","../../jctruffet.com/image/image_58/58_Cigogne_Fermete_3.jpg","../../jctruffet.com/image/image_58/58_Cigogne_Fermete_4.jpg","../../jctruffet.com/image/image_58/58_Cigogne_Fermete_5.jpg","../../jctruffet.com/image/image_58/58_Cigogne_Fermete_6.jpg","../../jctruffet.com/image/image_58/58_Cigogne_Fermete_7.jpg"]},"Consult_chateau_formulaire3911":{"id":"Consult_chateau_formulaire3911","dept":"58","canton":"Clamecy","commune":"Clamecy","nom":"Clamecy","type":"Château","periode":"XVI","histoire":"CLAMECY,  au Xe siècle, les comtes de Nevers font élever à Clamecy un château fort, devant lactuel hôtel de ville. En 1213, le comte de Nevers Hervé IV accorde aux Clamecyçois leurs premières franchises. Au XIIe siècle, le comte de Nevers Guillaume IV, qui possède lhôpital de Panténor à Clamecy, le lègue à lévêché de Bethléem. En 1223, lévêque de Bethléem, chassé de Palestine, vient sinstaller à Clamecy où il établit son siège épiscopal. Lévêché de Bethléem demeure à Clamecy jusquen 1801, et une cinquantaine dévêques sy succèdent. La collégiale Saint-Martin est bâtie au XIIIe siècle. Elle sélève en face du château ducal, au milieu dune ville protégée par des remparts. Les comtes de Nevers établissent dans la commune un atelier monétaire. Dans les années 1630 et 1640, Roger de Saint-Lary, duc de Bellegarde (1563-1646), un des grands personnages de la cour, est disgracié ; il vit alors à Entrains et à Clamecy, où un hôtel particulier lui est construit. En 1659, Mazarin achète le Nivernais au duc de Gonzague. Il devient ainsi duc de Nivernais, titre quil transmet à ses successeurs. Ceux-ci le portent jusquà Louis-Philippe-Jules Barbon Mancini Mazarini, et viennent occasionnellement visiter Clamecy.","architecture":"Clamecy, le site était habité dès la période gallo-romaine, comme en attestent quelques découvertes archéologiques. Ce château XVI-XIXe siècle en position dominante: de style néo renaissance  de plan rectangulaire à deux niveaux avec lucarnes en comble,  pavillon saillant d'entrée et pavillons carrés en angles, toit à l'impériale,  escalier à balustres, cheminées, plafonds, carrelages, il comprend une très belle galerie,salle à manger, salon, cuisine aménagée, chambre et salle de bains , dans le secteur de Clamecy en position dominante, château du début du XIXe siècle.","habitants":"Famille de Roger de Saint-Lary\r\n        \"","divers":"Château de Clamecy et château verts.","gps":"","images":["../../jctruffet.com/image/image_58/58_Clamecy_1.jpg","../../jctruffet.com/image/image_58/58_Clamecy_2.jpg","../../jctruffet.com/image/image_58/58_Clamecy_3.jpg"]},"Consult_chateau_formulaire814d":{"id":"Consult_chateau_formulaire814d","dept":"58","canton":"Varzy","commune":"Chapelle St-André","nom":"Corbelin","type":"Château","periode":"XIV-XV","histoire":"CORBELIN, en1426, le fief passe à Jean le Duc, capitaine de Varzy et en 1445 passe à la famille de Muet, Pierre de Longueil, au bailliage de Varzy en 1459 Guillaume Le Muet, fils d'Étienne en 1471. Jean Le Muet, fils de Guillaume. Hugues est bailli de Donzy chanoine d'Auxerre titulaire de la pénitencerie de 1537 à 1566 le plus puissant et le plus riche ecclésiastique de la région, Léonard et Philibert Le Muet, fils de Jean en 1550.   André Le Muet, en 1594.  Etienne Le Muet seigneur de Corbelin, lieutenant de l'évêque d'Auxerre en 1559 fait remanier et agrandir le château. En 1619  le fief passe à Edmé de Rochefort marquis de Pleuvault et de la Boulaye et conseiller du roi Louis XIII qui enrichit Corbelin d'une forge dont l'ensemble est vendu à Jacques de Saumaize et au début du XVIIIe siècle.  Le domaine passe à Léonard Breton contrôleur des mousquetaires du roi, le domaine passe ensuite  à  Baptiste Gascoing lieutenant général, puis à Auguste Guillot ingénieur des mines et maître des forges avant de passer au début du XIXe siècle  au baron Charles-François Dupin ingénieur et mathématicien, à sa mort en 1873 Corbelin revient  aux propriétaires des installations sidérurgiques et à l'arrêt de celle-ci devient une exploitation agricole, son aspect reste intact et a été entièrement restauré ces 15 dernières années.","architecture":"Le château de Corbelin,  adossé à un coteau boisé, occupe un site paisible avec un plan d'eau bordé d'arbres et alimenté par la petite rivière le Corbelin. Son agréable jardin à l'italienne est tout proche.  Le château actuel est constitué d'un logis rectangulaire du XVIe siècle à 2 niveaux, avec deux tours d'angle rondes, et de deux grosses tours rondes massives du XIVe siècle bordant l'entrée sur la cour. plus maison forte que château, date des XVe, XVIe et remanié au XVIIIe siècles. Son histoire est intimement liée à l'activité sidérurgique, qui s'est déroulée sur ce site depuis le XIIIe siècle jusque dans les années 1860. Il se compose à l'heure actuelle de quatre tours massives entourant la maison forte rectangulaire, reliées jadis par des courtines, démolies en 1559,  datant de la fin du XIVe siècle, d'un corps de logis de deux étages du XVIe siècle situé entre les tours sud-est et sud-ouest, d'un bâtiment utilitaire du XVIIIe siècle, adossé au corps de logis, et d'un commun du XIXe siècle.\r\nAujourdhui, nous voyons un corps de logis de 1513, occupant la face Sud dune petite enceinte fortifiée. Les deux grosses tours, remontant au XVe siècle, étaient initialement reliées aux deux autres par des courtines formant un quadrilatère.                             Corbelin Adossé à un coteau boisé, occupe un site paisible avec un plan d'eau bordé d'arbres et alimenté par la petite rivière le Corbelin. Son agréable jardin à l'italienne est tout proche.","habitants":"Famille de  Etienne Le Muet                                                       Baron Charles Dupin\r\n        \"","divers":"Le château de Corbelin","gps":"","images":["../../jctruffet.com/image/image_58/58_Corbelin_1.jpg","../../jctruffet.com/image/image_58/58_Corbelin_2.jpg","../../jctruffet.com/image/image_58/58_Corbelin_3.jpg","../../jctruffet.com/image/image_58/58_Corbelin_4.jpg","../../jctruffet.com/image/image_58/58_Corbelin_5.jpg"]},"Consult_chateau_formulaire3b02-2":{"id":"Consult_chateau_formulaire3b02-2","dept":"58","canton":"Corbigny","commune":"Corbigny","nom":"Corbigny","type":"Abbaye","periode":"XVIII","histoire":"A Corbigny, le château de la Chaise et l'abbaye.                          CORBIGNY,  un patrimoine intéressant à découvrir, fontaine Sainte Agathe, abbaye, logis de labbé, ancien grenier à sel, hôtel des Echevins, tour de la Madeleine.                                                    L'actuelle abbaye de Corbigny date de 1754. Une pierre de fondation, visible au pied de la façade sud du monument atteste de ce chantier que la Révolution interrompit. À partir de 1789, l'abbaye connaît des usages divers : les haras de l'Etat s'y installent pendant le consulat et l'Empire, elle est louée en 1834 à l'évêché de Nevers pour y établir le petit séminaire. En 1850, l'évêque transfère son bail à la société hospitalière, à la salle d'asile et aux frères de la doctrine chrétienne de Nancy. Huit ans plus tard, l'école normale d'instituteurs s'y installe.  L'année 1894 marque l'ouverture d'une école pratique d'agriculture dans un monument que la première guerre mondiale reconvertit en hôpital militaire. De 1962 à 1983, cours complémentaire et collège d'enseignement général se succèdent dans les murs, pour la plus grande gloire des enfants du territoire. \r\nL'abbaye, rebaptisé aujourd'hui \" Abéïcité \"abrite désormais les espaces de cultures du pays nivernais du Morvan.                      La CHAISE pas d'information  historique, transformé en chambres d'hôtes.","architecture":"L'actuelle abbaye de Corbigny date de 1754. Une pierre de fondation, visible au pied de la façade sud du monument atteste de ce chantier que la Révolution interrompit. De plan quadrangulaire à trois niveaux, un grand corps de logis  avec lucarnes,  flanqué aux angles de tours rondes à toits en poivrières.                                  La Chaise, corps de logis rectangulaire à deux niveaux avec lucarnes,  flanqué aux extrémités de deux pavillons carrés toit à l'impérial et côté rivière pavillon d'entré carré  saillant avec toiture à deux pans, tourelles en angles intérieurs avec mâchicoulis.","habitants":"Evêché de Nevers\r\n        \"","divers":"Patrimoine dans Corbigny avec maison forte et Abbaye","gps":"","images":["../../jctruffet.com/image/image_58/58_Corbigny_1.jpg","../../jctruffet.com/image/image_58/58_Corbigny_2.jpg","../../jctruffet.com/image/image_58/58_Corbigny_3.jpg","../../jctruffet.com/image/image_58/58_Corbigny_4.jpg","../../jctruffet.com/image/image_58/58_Corbigny_5.jpg","../../jctruffet.com/image/image_58/58_Corbigny_6.jpg","../../jctruffet.com/image/image_58/58_Corbigny_7.jpg","../../jctruffet.com/image/image_58/58_Corbigny_8.jpg"]},"Consult_chateau_formulaire55f5":{"id":"Consult_chateau_formulaire55f5","dept":"58","canton":"Château-Chinon","commune":"Corency Neuvelle","nom":"Corency_Neuvelle","type":"Château","periode":"XIII-XIV","histoire":"Deux châteaux à Corency la maison des Comtes du XIVe siècle transformé en exploitation agricole, le château de Neuvelle du XVIIe siècle ruines sur butte. Ruines du château du XIVe siècle au lieu-dit Maison-Comte.\r\nNEUVELLE, au lieu dit Neuvelle,  Ce fief rural appartenait du XVIIe siècle  au XIXe siècle à la famille Petitier dont l'ancêtre était conseiller de Louis XIV.                                                        SALORGUES, appartenait à Jean de Toussay et à la famille de Champs, seigneur de Saint-Léger, au début du XVIIe siècle.  Des années de 1950 à 1990, cet ensemble a abrité une colonie de vacances pour les pupilles de la Nièvre des préfabriqués furent construits à cette époque.","architecture":"Neuvelle, à flanc de colline, domine un château ou manoir dont l'origine remonterait au XVIIe siècle.  La date de construction et son architecture d'origine ainsi que les remaniements ultérieurs nous sont inconnus. Aujourd'hui, le château est de style classique, avec son corps de logis flanqué de deux ailes de dépendances.   Une ferme occupe une partie du domaine. L'ensemble est couvert en tuile et un fronton triangulaire surmonte la façade sur toute la largeur du bâtiment.  En proximité, un pigeonnier carré, arasé à mi hauteur est envahi par la végétation.                                           Salorgues, ce château daterait du XVIIIe siècle, gentilhommière ou métairie.  Nous ignorons si des remaniements sont intervenus et à quelle période aussi bien sur le château que le domaine agricole. Aujourd'hui, cet édifice en fond de vallée se compose d'un long corps central sur deux niveaux avec combles habitables flanqué d'une belle tour octogonale abritant un escalier en milieu de façade. L'ensemble est couvert en ardoises, alors que les dépendances sont en tuiles plates. Ces deux grandes dépendances derrière la demeure sont sur un plan en L et des murs avec un porche d'entrée entourent partiellement la propriété.","habitants":"Famille Petitier\r\n        \"","divers":"Château de Neuvelle et manoir de Salorgues","gps":"","images":["../../jctruffet.com/image/image_58/58_Corency_Neuvelle_1.jpg","../../jctruffet.com/image/image_58/58_Corency_Neuvelle_2.jpg","../../jctruffet.com/image/image_58/58_Corency_Neuvelle_3.jpg","../../jctruffet.com/image/image_58/58_Corency_Neuvelle_4.jpg"]},"Consult_chateau_formulairea22a":{"id":"Consult_chateau_formulairea22a","dept":"58","canton":"Varzy","commune":"Corvol et Trucy l","nom":"Corvol_Trucy","type":"Château","periode":"XVIII","histoire":"Quatre châteaux; Corvol, Vilette, Sauzay et Créneaux.                        CORVOL, en 1427 la ville fut occupée par Ferrier et par le Bâtard de Coux ; Claude de Chastellux le reprit aux Français pour le duc de Bourgogne.  Au XVIIe siècle, Corvol formait avec Billy, une châtellenie dont relevaient Laporte, La Vilette, Courcelles, Chaumont Champsimon, Rosières et Bazarches (ou Chivres dont le château date en partie du XVIe siècle) Avant la Révolution de 1789, Corvol était encore renfermée dans ses murailles. Elle faisait partie du Donziais et appartenait au diocèse dAuxerre.             VILETTE, Il a reçu lagrément Jeunesse et Sport, l'agrément Education Nationale  et lavis favorable de la commission de sécurité . Le château corvolois est le théâtre d'un drôle de cinéma : celui d'un camp de vacances de la région parisienne venu se mettre au vert dans le val du Sauzay, avec le projet de réaliser un film.                                                                                 SAUZAY,  de la famille de Toulongeon,  dont le vicomte, élu député de la noblesse aux Etats Généraux, il fait partie du comité militaire, mais passe pour un modéré. Maréchal de camp en 1792, il démissionne peu après et se retire en Nivernais dans son château de Sauzay, près de Corvol-l'Orgueilleux. Il fut, par la suite, transformée en exploitation agricole.                                  \r\n TRUCY  Le château des Créneaux de Trucy lOrgueilleux, en 1310,  une première mention de la présence dun château. En 1384, une mention est faite dune maison forte dite « Chastel des Créneaux » il ne reste que la grosse tour modifiée et aménagée au XVe siècle par Jean dArmes, famille d'Armes (1482), famille de Chabannes, famille de Torcy (Louis de Torcy de 1493 à 1509).  Entre Louis comte de Nevers et Drocco de Mello, seigneur de Lormes et Château-Chinon entre 1589 et 1610, par François de Chabanne et son épouse Valentine dArmes. En 1849, le domaine, propriété de Léonce Melchior et Charles Louis de Vogüé, est acheté par Pierre Louis Charbonneau qui, jugera les travaux à entreprendre trop coûteux pour loger dans le vieux château, il fera démolir la partie sud-ouest des courtines pour y adosser les communs actuels et construira le parc, entre 1845 et 1847  du château neuf.","architecture":"Vilette, château du XIXe siècle, sur 3 niveaux, situé au cur dun parc de quatre hectares, gîtes de France.                                   Corvols,  il existait quelques tours en ruines de la vieille enceinte militaire de Corvol au XIIIe siècle,   qui semblent justifier le surnom dOrgueilleux quon lui a donné, ce mot caractériserait la nature du terrain.   Mot qui conviendrait on ne peut mieux à la position de Corvol, situé dans un fond entouré de collines.                           Sauzay, construite au XVe siècle, cette maison forte, qui défendait la vallée du Sauzay menant au Donziois, fut incendiée par les anglo-Bourguignons en 1427. Reconstruite et remaniée au XVIIIe siècle par la famille de Toulongeon, Le château fut par la suite transformé en exploitation agricole.                                              Trucy, en 1384, une mention est faite dune maison forte dite « Chastel des Créneaux » il ne reste que la grosse tour modifiée et aménagée au XVe siècle , le reste du château visible a ce jour résulte des travaux entrepris et jamais fini, du château neuf.  À compter du XVIIIe siècle le château devient une exploitation agricole. En 1764, la grosse tour Ouest sera reconstruite et transformée en colombier. Le corps de logis, du XVIIe siècle, les bâtiments agricoles du XIXe siècle et les anciens murs de courtine sont disposés autour dune cour carrée. Lensemble est flanqué de tours circulaires. A côté du château sétend une propriété avec laquelle il formait un ensemble, à savoir une maison de maître édifiée en 1849 et de grands communs disposés en fer à cheval.","habitants":"Claude de Chastellux                                                              Famille de Toulongeon\r\n        \"","divers":"Château de la Vilette, de Saint-Marc, de Sauzay et le château des Créneaux à Trucy","gps":"","images":["../../jctruffet.com/image/image_58/58_Corvol_Trucy_1.jpg","../../jctruffet.com/image/image_58/58_Corvol_Trucy_2.jpg","../../jctruffet.com/image/image_58/58_Corvol_Trucy_3.jpg","../../jctruffet.com/image/image_58/58_Corvol_Trucy_4.jpg","../../jctruffet.com/image/image_58/58_Corvol_Trucy_5.jpg","../../jctruffet.com/image/image_58/58_Corvol_Trucy_6.jpg","../../jctruffet.com/image/image_58/58_Corvol_Trucy_7.jpg","../../jctruffet.com/image/image_58/58_Corvol_Trucy_8.jpg","../../jctruffet.com/image/image_58/58_Corvol_Trucy_9.jpg"]},"Consult_chateau_formulaire5c70":{"id":"Consult_chateau_formulaire5c70","dept":"58","canton":"Cosnes-Cours- sur-Loire","commune":"Cosnes-Cours- sur-Loire","nom":"Cosnes_Cours_Loire","type":"Patrimoine","periode":"XV","histoire":"Quatre châteaux à Cosnes-Cours sur Loire, le petit château des Granges, le Villechaud , le Villorguet, le Chanteloup pas d'information historique pour ses trois châteaux et à quelques kilomètre au nord le château féodal de Saint-Loup.        \r\nGRANGES,  Près de Cours (Cosne-Cours-sur-Loire) a été construit vers 1500 par les Ravan de Vieilbourg, qui détenaient le fief voisin de Myennes . La possession simultanée des deux fiefs paraît avoir été constante, ainsi que leur transmission aux Hinselin.            PEZEAUX, à Boulleret, de la famille de Voguë, pas d'autre information historique.                                            \r\n VILLECHAUD. La tour acccolée à la chapelle Sainte-Brigitte de Villechaud, au sud de Cosne, est l'ultime trace du château que les évêques d'Auxerre y avaient fait construire au XIIIe siècle, et qui fut, à l'instar de Régennes, au bord de l'Yonne en aval d'Auxerre, ou de Varzy, une de leurs résidences habituelles. Ils marquaient là un souci d'occupation et de défense de leur territoire, qui faisait d'eux des seigneurs temporels autant que des chefs spirituels.                               SAINT-LOUP, sa dénomination sexplique par limportante superficie boisée qui entoure le village jusquau milieu du XXe siècle. Le « château de St Loup » domine le bourg par lélégance de sa silhouette en son écrin de verdure. Il ne sagit point dune habitation jadis seigneuriale mais dune construction édifiée par les moines cisterciens aux XIIe et XVe siècles.","architecture":"Patrimoine; fortifications façades et toitures de la tour, dite tour Fraicte Palais épiscopal (ancien ) façades et toitures.                                  Hôpital, actuellement centre hospitalier Un premier établissement semble exister, au moins depuis l'an 9, sur le site d'une ancienne clouterie des forges, dont l'hôpital est encore propriétaire en 1856. Usine métallurgique dite forges de la Chaussade, puis Masson.              La forge est construite de 1666 à 1671 par Deboust et Dallies de la Tour (commissaire royal de la marine) pour la compagnie du nivernois. Elle fabrique des canons, des mousquets et surtout des ancres. En avril 1671, un bâtiment en pavillon, de vingt deux mètres sur dix, est installé à la place des moulins qui occupent la rivière. L'usine possède cinq forges différentes dont une réservée aux ancres, une fenderie et un martinet Jean Arnaud qui la reprend, en 1717 est finalement contraint de la vendre au banquier Masson et à Jean et Pierre Babaud de la Chaussade. Pezeaux, de plan en U sur la façade sud  un grand corps de logis à deux niveaux  pavillon d'entrée sur trois travées saillantes et une rangée de lucarnes sur comble  deux grosses tours rondes aux extrémités toit en poivrières et lucarnes. Une tourelle accolé entre le corps de logis et la tour ronde toiture en poivrière le retour d'équerre s'effectue par deux corps de logis de deux niveaux dont la partie gauche est complété par de hautes lucarnes sur comble et le troisième retour en équerre  bâtiment à deux niveaux avec porche d'entrée intérieure saillant et surélevé avec fronton, prolongé par un niveau d'un étage avec terrasse.","habitants":"Famille des  Hinselin\r\n        \"","divers":"Château  de Pezaux de Cosnes  Cours et des Granges  Myennes","gps":"","images":["../../jctruffet.com/image/image_58/58_Cosnes_Cours_Loire_1.jpg","../../jctruffet.com/image/image_58/58_Cosnes_Cours_Loire_2.jpg","../../jctruffet.com/image/image_58/58_Cosnes_Cours_Loire_3.jpg","../../jctruffet.com/image/image_58/58_Cosnes_Cours_Loire_4.jpg","../../jctruffet.com/image/image_58/58_Cosnes_Cours_Loire_5.jpg","../../jctruffet.com/image/image_58/58_Cosnes_Cours_Loire_6.jpg","../../jctruffet.com/image/image_58/58_Cosnes_Cours_Loire_7.jpg","../../jctruffet.com/image/image_58/58_Cosnes_Cours_Loire_8.jpg","../../jctruffet.com/image/image_58/58_Cosnes_Cours_Loire_9.jpg"]},"Consult_chateau_formulaire76fe":{"id":"Consult_chateau_formulaire76fe","dept":"58","canton":"Dornes","commune":"Cossaye","nom":"Cossaye","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Cossaye  celui de la Grange du XVIIIe siècle et celui de Goujon.                                                                COSSAYE seuls les terres et le presbytère furent estimés. Ce dernier, vendu à Claude Mathieu. Denis Claude, curé et maire de Cossaye, prête le serment constitutionnel en 1790. Desprez de Roche, prieur de Cossaye, archidiacre de Decize, fut arrêté, enfermé aux carmes et massacré avec ses deux compagnons le 2 septembre 1792. Le pape Pie XI béatifia ces martyrs de la foi en octobre 1926. \r\n GOUJON, Les seigneurs de cette famille du bas nivernais ont régné sur leur domaine à partir de cette position stratégique située sur les hauteurs d'un vallon dans lequel coule l'Acolin. Une branche de cette famille détient le moulin « de la Motte » situé en contrebas de la rivière. Le château faisait préalablement partie d'un domaine qui s'étendait sur plusieurs communes aux alentours (dont celle de Saint-Germain-Chassenay) et qui appartenait à la famille Prud'homme avant d'être divisé. Ce château a été le fief de la famille Brivet, depuis sa rénovation au XIXe siècle jusqu'à aujourd'hui.                                                                                  La GRANGE fut la propriété de Louis de Marcelange.","architecture":"Goujon  Une longue allée de marronniers mène à la première partie du parc arboré qui donne sur le château.\r\nLe bâtiment principal fut bâti lors de la première moitié du XIXe siècle.de plan rectangulaire à deux niveaux de cinq travées, toit à deux pans. Les dépendances comprennent un corps central, des écuries, un pigeonnier ainsi que d'autres bâtiments à vocation agricole.  Un monumental escalier central dessert tous les étages.    Une serre se trouve au fond du parc et permet d'exposer un panaché d'espèces locales et tropicales.  La Grange; corps de logis rectangulaire à deux niveaux à cinq travées flanqués de chaque côté de pavillons rectangulaires, toitures de l'ensemble au  même niveau flanqués de lucarnes.","habitants":"Denis Claude                                                                             Famille Brivet\r\n        \"","divers":"Château de Goujon et de la Grange à Cossaye.","gps":"","images":["../../jctruffet.com/image/image_58/58_Cossaye_1.jpg","../../jctruffet.com/image/image_58/58_Cossaye_2.jpg","../../jctruffet.com/image/image_58/58_Cossaye_3.jpg"]},"Consult_chateau_formulaireca6e":{"id":"Consult_chateau_formulaireca6e","dept":"58","canton":"Nevers","commune":"Coulanges les Nevers","nom":"Coulanges_Nevers","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Coulanges, celui de l'Hermitage et de Chevannes.                                                           COULANGES, la caserne est un monument du XIXe siècle. Cest Antoine Prosper Fouque qui a fait aménager dans ce bâtiment douze chambres pour loger les meilleurs de ses ouvriers et le concierge.                                                               \r\nHERMITAGE, le château de lHermitage est un bâtiment datant du XVIIIe siècle.  Ce sont les Jésuites de Nevers qui ont acheté cette propriété en 1621 . En 1752, le bâtiment est reconstruit et agrandi avec laide financière de la ville de Nevers. En 1762, les Jésuites refusant de s'acquitter de la taille, impôt par répartition, sont expulsés de leur résidence suite à la révolte des habitants. Il est possible de visiter ce site, lors des journées annuelles du patrimoine.                                                                    CHEVANNES,  en 1856, Théodore Meynier reconvertit les ruines de l'ancien château en une superbe maison de plaisance. En 1896, propriété de la famille Beurier, cette dernière en fait le château actuel, d'inspiration néo-gothique Renaissance.\r\nLe site a, par la suite, servi de cadre de colonie de vacances de la ville d'Arcueil (Val de Marne), de 1977 à 1994. Il est actuellement propriété privée.","architecture":"Chevannes, une demeure seigneuriale de plaisance existait déjà au XVIIe siècle sur ce domaine, situé sur une hauteur il domine la vallée de la Nièvre.  De plan en U avec corps de logis rectangulaire à deux niveaux à six travées , toit en croupes avec lucarnes avec fronton triangulaire, accolé d'un donjon à mâchicoulis à cinq niveaux, entre deux un pavillon d'entrée qui sur angle a un porche à deux niveaux avec fronton triangulaire mouluré, d'autres tours rondes sur l'arrière du bâtiment.                                               Hermitage, de plan rectangulaire à deux niveaux, toits brisés avec lucarnes.                                                                               VILLA, cette maison pittoresque a été construite au début du XIXe siècle. Son style se caractérise par la recherche de renouveau inattendu. Les matériaux, les décors, lutilisation déléments non traditionnels et les décrochements sont là pour donner sa propre identité au bâtiment.","habitants":"Théodore Meynier\r\n        \"","divers":"Château de Chevannes, château du comte de Charmele et de l'Hermitage à Coulange les Nevers","gps":"","images":["../../jctruffet.com/image/image_58/58_Coulanges_Nevers_1.jpg","../../jctruffet.com/image/image_58/58_Coulanges_Nevers_2.jpg","../../jctruffet.com/image/image_58/58_Coulanges_Nevers_3.jpg","../../jctruffet.com/image/image_58/58_Coulanges_Nevers_4.jpg","../../jctruffet.com/image/image_58/58_Coulanges_Nevers_5.jpg","../../jctruffet.com/image/image_58/58_Coulanges_Nevers_6.jpg","../../jctruffet.com/image/image_58/58_Coulanges_Nevers_7.jpg","../../jctruffet.com/image/image_58/58_Coulanges_Nevers_8.jpg"]},"Consult_chateau_formulaired039":{"id":"Consult_chateau_formulaired039","dept":"58","canton":"Dornes","commune":"Neuville lès Décize","nom":"Creuzet","type":"Château","periode":"XVII","histoire":"CREUZET, construit au XVIIe siècle, le château principal a été agrandi pendant le XVIIIe siècle pour inclure deux tours, est une ancienne habitation de vacances du roi Louis XVI, et a servi jusqu'en 2005 comme résidence privée.  Ancienne propriété du maréchal de Vauban, et plus tard habitation de vacances du roi Louis XVI. Le 15 février 1676 le domaine du Creuzet est adjugé au maréchal Vauban par décret du bailliage de Saint-Pierre-le-Moutier pour remboursement de la dette contractée par le comte de Crux en 1671. Ce château  a été rénové. Il est à louer pour les vacances avec les amis, les familles. Aujourd'hui chambre d'hôtes de luxe.","architecture":"Creuzet, château de style néo-Baroque d'un corps de logis central à trois niveaux et attiques toit en croupe, raccordé de chaque côté par une travée à deux étages reliant les tours hexagonales à toit pointu . A l'arrière du corps de logis  aile de dépendance de deux niveaux. La structure est bien située sur 14 hectares de jardins, bois et parcs. La ferme et le château composaient la totalité du domaine. Il a récemment été rénové avec le respect de l'architecture d'origine.La structure entière est bien située sur 14 hectares de jardins, bois et parcs. A côté de la propriété se trouve la plus grande ferme agricole bio de la Bourgogne, elle est connue pour son fromage et ses produits locaux.","habitants":"Maréchal de Vauban\r\n        \r\n        \"","divers":"Château du Creuset à Neuville lès Decize","gps":"","images":["../../jctruffet.com/image/image_58/58_Creuset_1.jpg","../../jctruffet.com/image/image_58/58_Creuset_2.jpg","../../jctruffet.com/image/image_58/58_Creuset_3.jpg","../../jctruffet.com/image/image_58/58_Creuset_4.jpg","../../jctruffet.com/image/image_58/58_Creuset_5.jpg","../../jctruffet.com/image/image_58/58_Creuset_6.jpg","../../jctruffet.com/image/image_58/58_Creuset_7.jpg","../../jctruffet.com/image/image_58/58_Creuset_8.jpg"]},"Consult_chateau_formulaire7139":{"id":"Consult_chateau_formulaire7139","dept":"58","canton":"Decize","commune":"Decize","nom":"Decize","type":"Vestiges","periode":"XIII","histoire":"DECIZE,  le château était la demeure permanente d'un capitaine et d'une garnison. En 1357, le capitaine se nommait Pierre de Chandiou, en 1395-1405 Jean de Vaux, la seigneurie de Germancy appartiendra longtemps à la famille de Vaux, en 1405 Etienne des Epoisses secondé par le lieutenant Jean de Ganay. Geoffroy du Boschet était gouverneur du Nivernais et Pierre de Colons receveur.  Au siècle suivant, la comtesse Marie d'Albret ordonna des embellissements : un nouveau logis plus luxueux comportant une galerie. Le château a reçu jusqu'à la fin du XVIIe siècle des hôtes illustres.  La propriété du château passe à la famille Mouzat à la suite du mariage de Marianne Douette. Lors de la Révolution les jardins furent vendus par lots. Le château devenu propriété privé, fut revendu plusieurs fois au XIXe siècle. Le Marquis de Raigecourt y installa un pensionnat de jeunes filles qu'il confia aux surs de La Charité de Nevers.","architecture":"Decize, : ruines du château des comtes puis ducs de Nevers. Remparts. La porte du marquis d'Ancre est la dernière porte à pont-levis de lenceinte fortifiée de la ville. Elle fut construite par Pierre de Courtenay, comte de Nevers, en 1194 puis remaniée en 1468. Elle faisait partie de la troisième enceinte et des tours de défense située aux extrémités du pont sur la Loire. Il s'agissait d'une des portes d'entrée de Decize. Le château primitif aurait été agrandi par Jean dit Tristan, On peut dater des XIIe et XIIIe siècles le plan du château, les soubassements et l'emplacement des tours. Deux tours sont nommées : la tour de Languine, proche de la grande salle nouvelle, et la tour de l'Espringuelle ,(une espringale ou espingole était une machine à lancer de grosses flèches), la grosse tour, ou donjon, était composée d'une salle basse (où logeait le châtelain), d'une salle haute, d'une chambre des veilleurs,  en 1736, des démolisseurs sont appelés pour tirer de la pierre à bâtir de plusieurs murailles et tours du château.  En 1778, le duc Louis Jules Barbon Mancini vend à son homme de confiance Pierre Douette ce qui reste du château de Decize. Les jardins et bâtiments agricoles sont cédés pièce par pièce.","habitants":"Famille Mouzat\r\n        \"","divers":"Vestiges à Decize, rempats et porte","gps":"","images":["../../jctruffet.com/image/image_58/58_Decize_1.jpg","../../jctruffet.com/image/image_58/58_Decize_2.jpg","../../jctruffet.com/image/image_58/58_Decize_3.jpg","../../jctruffet.com/image/image_58/58_Decize_4.jpg","../../jctruffet.com/image/image_58/58_Decize_5.jpg","../../jctruffet.com/image/image_58/58_Decize_6.jpg","../../jctruffet.com/image/image_58/58_Decize_7.jpg","../../jctruffet.com/image/image_58/58_Decize_8.jpg","../../jctruffet.com/image/image_58/58_Decize_9.jpg"]},"Consult_chateau_formulaire6f67":{"id":"Consult_chateau_formulaire6f67","dept":"58","canton":"Decize","commune":"Decize","nom":"Decize_Chateaux","type":"Château","periode":"XV-XIX","histoire":"Plusieurs châteaux à Decize, celui de Brain, des Caillots,  de Crécy de Germancy, de Bateau,  de Saulx et d'Auzon. A 10 kilomètres au sud-Est à Lamenay sur Loire un château dit de Lamenay, pas information historique.                                  BRAIN, Entre le village de Brain et l'usine céramique, un autre hameau est constitué par l'ancien château de Brain, la régie et les dépendances. Propriété des familles Bonnyneau, Rosticelly et Bricault, il a été acheté par M. Émile Boigues. Celui-ci a fait construire un second château, plus moderne, en 1848, édifice qui a été rasé en 1991.                                                           GERMANCY a été tracée sur des terrains appartenant à M. de Jumilhac, propriétaire du château de Germancy. Le fief de Germancy est resté propriété de la famille de Vaux depuis le XIIIe siècle jusqu'au milieu du XVIIIe siècle ; par mariage, il est passé au comte Gaspard-Antoine Prévost de la Croix. Les propriétaires suivants furent les familles Sallonyer de Tamnay, de Raigecourt, de Dreux-Brézé, de Jumilhac et de la Tour du Pin. Il ne subsiste rien du premier château, le bâtiment actuel ayant été édifié au XIXe siècle. Celui-ci a fait dessiner vers 1760 un atlas de toutes les terres situées au sud de la Loire, entre Decize, Toury et Lucenay, sur lesquelles il avait des droits de moyenne et basse justice.  Pas d'information sur les châteaux Caillots du XVe siècle, de Crécy du XVIIIe siècle, chambres d'hôtes et de Saulx du XIXe siècle.","architecture":"Brain; corps de logis rectangulaire de neuf travées  à trois niveaux sur soubassement surélevé  en plein cintre une tour ronde demi-hors uvre d'entrée à trois niveaux à toits brisés, avec lucarnes.                         Germancy;  de plan rectangulaire à trois niveaux flanqué de deux pavillons saillants aux extrémités formant un U. Château-Bateau corps de logis rectangulaire à trois niveaux flanqué d'une tour ronde à toit en poivrière d'une tour carrée servant d'entrée   à toit pointu avec lucarne et d'une tourelle crénelée à mâchicoulis.            \r\n Saulx; corps de logis rectangulaire à cinq travées, à deux niveaux et attiques.    Devay à cinq kilomètres à l'est le château de Devay deux corps de logis à sept travées  à trois niveaux, plein cintre fronton d'entrée légèrement saillant avec terrasse.","habitants":"Famille Bonnyneau                                                                 Famille de Vaux\r\n        \r\n        \"","divers":"Le château de Germancy, de Brain, de Bateau et de Saulx à Decize et château de Lamenay.","gps":"","images":["../../jctruffet.com/image/image_58/58_Decize_Chateaux_1.jpg","../../jctruffet.com/image/image_58/58_Decize_Chateaux_2.jpg","../../jctruffet.com/image/image_58/58_Decize_Chateaux_3.jpg","../../jctruffet.com/image/image_58/58_Decize_Chateaux_4.jpg","../../jctruffet.com/image/image_58/58_Decize_Chateaux_5.jpg","../../jctruffet.com/image/image_58/58_Decize_Chateaux_6.jpg","../../jctruffet.com/image/image_58/58_Decize_Chateaux_7.jpg","../../jctruffet.com/image/image_58/58_Decize_Chateaux_8.jpg","../../jctruffet.com/image/image_58/58_Decize_Chateaux_9.jpg"]},"Consult_chateau_formulaire5654":{"id":"Consult_chateau_formulaire5654","dept":"58","canton":"Château-Chinon","commune":"Dommartin","nom":"Dommartin","type":"Château","periode":"XVII","histoire":"Trois châteaux à Dommartin, le Montquin  le Montbracon, de Moussac.                                                                     MONTQUIN, sur un domaine où s'élevait une ancienne ferme, Hugues Claude Thévenet, avoué à Château-Chinon et arrière-grand-père de Jacques Thévenet, fait bâtir cette demeure, dans laquelle cinq générations ont vécu. Le peintre y vit la plus grande partie de l'année et y reçoit beaucoup de gens de lettres et d'artistes : Francis Carcot, Paul Claudel, Arthur Honegger, Jules Romains, Jean Giono et Le Corbusier.                           MONTBRACON, dans le parc du château, ce mégalithe de granit rose monolithe passe pour être un menhir de la fin de la préhistoire. Mais est-ce vraiment un menhir, est-ce là son milieu d'origine, ou s'agit-il d'un bloc rapporté au XIXe  siècle, époque de « celtomanie » où l'on attribue l'érection artificielle des menhirs aux Gaulois et où il est à la mode d'en avoir un dans sa propriété.","architecture":"Dommartin, l'ancien château féodal a aujourd?hui disparu et il n'en reste aucun vestige.                                                              Montquin,  est plus une grosse maison bourgeoise qu'un château, comme on l'appelle dans le pays. Sur un domaine où s'élevait une ancienne ferme.                                                             Montbracon, de plan rectangulaire à deux niveaux, pavillon saillant d'entrée à trois niveaux toiture à quatre pans et lucarnes sur toiture de du bâtiment principal.                                                    Le manoir du Pavillon, datant du XVIIIe siècle, est un ancien pavillon de chasse dépendant du château de Saint-Léger-de-Fougeret.                                 Moussac ; corps de logis rectangulaire de trois niveaux  flanqué plein cintre d'un pavillon saillant à quatre niveaux toiture en croupes.","habitants":"Famille de  Hugues Claude Thévenet\r\n        \"","divers":"Domaine de Montquin , château de Montbracon , de Moussac  à Dommartin","gps":"","images":["../../jctruffet.com/image/image_58/58_Dommartin_1.jpg","../../jctruffet.com/image/image_58/58_Dommartin_2.jpg","../../jctruffet.com/image/image_58/58_Dommartin_3.jpg","../../jctruffet.com/image/image_58/58_Dommartin_4.jpg","../../jctruffet.com/image/image_58/58_Dommartin_5.jpg"]},"Consult_chateau_formulaire5e7b-2":{"id":"Consult_chateau_formulaire5e7b-2","dept":"58","canton":"Prémery","commune":"Dompière sur Nièvre","nom":"Dompière_Nièvre","type":"Maison forte","periode":"XVII","histoire":"DOMPIERRE sur NIEVRE,  il s'agit d'un château du XVIIe siècle, construit sur les bases dun ancien château fort du XIIIe siècle. Le château Dompierre sur Nièvre, est daté des XIVe-XVIIe-XXe siècles. Une légende prétend, que le château du Néant, qui sélevait en bordure de Nièvre aurait été, au temps des croisades, le théâtre dun drame. La femme du seigneur du Néant fut séduite par le seigneur de Grenant son voisin. Le seigneur du Néant à son retour de croisade, mis le feu au château de son rival, celui-ci pour se venger détruisit une grande partie du château du Néant.","architecture":"Dompière sur Nievre il s'agit d'un château du XVIIe siècle, construit sur les bases dun ancien château fort du XIIIe siècle sur un parc arboré de 8 ha. Corps de logis rectangulaire à deux niveaux  flanqué d'une tour ronde à toit de style chapeau chinois.","habitants":"Seigneur du Néant\r\n        \r\n        \"","divers":"Plus maison forte que château à Dompière sur Nièvre.","gps":"","images":["../../jctruffet.com/image/image_58/58_Dompierre_Nievre_1.jpg","../../jctruffet.com/image/image_58/58_Dompierre_Nievre_2.jpg","../../jctruffet.com/image/image_58/58_Dompierre_Nievre_3.jpg","../../jctruffet.com/image/image_58/58_Dompierre_Nievre_4.jpg","../../jctruffet.com/image/image_58/58_Dompierre_Nievre_5.jpg"]},"Consult_chateau_formulaire2bdd":{"id":"Consult_chateau_formulaire2bdd","dept":"58","canton":"Donzy","commune":"Donzy","nom":"Donzy_Morvan","type":"Château","periode":"XV-XIX","histoire":"Plusieurs châteaux à Donzy, dont celui de Donzy, celui de Champromain, la Motte-Josserand (voir article), de Nohain et des Ormes.\r\nDONZY, au Moyen-Age, Donzy fut la capitale d'une baronnie et l'un des fiefs les plus importants des duché de Bourgogne. En foi de quoi ils ont signé de leur nom un procès-verbal sur un parchemin daté de 1612 attestant que les saintes reliques furent déposées dans une nouvelle châsse par messire Jean Hasard, chanoine régulier de Saint-Martin de Nevers, en présence des fidèles réunis dans léglise paroissiale, le 21 mars 1612. En 1616, Donzy, qui soutenait le parti de Charles de Gonzague et de Condé et qui était défendu par Pierre de Gayardon. Siège de Donzy par les troupes du roi commandée par le maréchal de Montigny. Parmi ces troupes se trouve le régiment du Bourg de Lespinasse.\r\nDonzy a été unie au comté de Nevers par le mariage du baron Hervé IV avec Mahaut de Courtenay, héritière du comte de Nevers.\r\nEn 1764, le commerce consistait en bois et en fer. Il se tenait à Donzy cinq foires par an, chacune d'une journée ; le 22 janvier, jour de Saint-Vincent ; le 25 juin, le 16 août, le 28 octobre, jour de Saint-Simon et Saint-Jude, et le 30 novembre, jour de Saint-André.  CHAMPROMAIN,NOHAIN ORMES, pas d'information historique.","architecture":"Donzy  de style maison forte,  de son passé, le village a conservé une tour ronde, vestige du château féodal, des maisons à pans de bois du XVe et XVIe siècle.                                                        Champ-Romain de style néo-gothique ,  flanqué d'un corps de logis rectangulaire de cinq travées à deux niveaux accolé de chaque côté de pavillon rectangulaire de même niveau  l'ensemble couvert d'un toit brisé avec des lucarnes, à l'opposée un majestueux donjon  à toit pointu avec lucarnes dans les combles, et une tour carrée à un angle  au niveau du bâtiment. Nohain, corps de logis  rectangulaire à deux niveaux.                                              Ormes de style néo gothiques de plan carré à deux niveaux toit à la Mansard avec lucarnes et échauguettes sur angles, à l'opposé une tour carrée formant un donjon à mâchicoulis couvert d'un toit pointu à quatre pans.                                                                        Tout proche de Donzy, on admirera les ruines de l'ancien prieuré clunisien de Donzy le Pré, au portail orné d'un tympan du XIIe siècle, véritable joyau de l'art roman bourguignon.","habitants":"Messire Jean Hasard\r\n        \"","divers":"Le château de Donzy, le Champromain, de Nohain et des Ormes.","gps":"","images":["../../jctruffet.com/image/image_58/58_Donzy_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Donzy_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Donzy_Morvan_3.jpg","../../jctruffet.com/image/image_58/58_Donzy_Morvan_4.jpg","../../jctruffet.com/image/image_58/58_Donzy_Morvan_5.jpg","../../jctruffet.com/image/image_58/58_Donzy_Morvan_6.jpg","../../jctruffet.com/image/image_58/58_Donzy_Morvan_7.jpg"]},"Consult_chateau_formulaire3a1c":{"id":"Consult_chateau_formulaire3a1c","dept":"58","canton":"Dornes","commune":"Dornes","nom":"Dornes","type":"Château","periode":"XIV","histoire":"DORNES,  cité en 1200 seigneurie d'Arnould Chauderon  et seigneur de la Ferté, passe ensuite  aux Chatel-Perron qui édifièrent le château et à la deuxième moitié du XIVe siècle à Robert Daulphin de Jaligny seigneur de la Ferté-Chauderon. Guichard I de Jaligny eut deux fils dont un naturel, Claude Dauphin dit « le bâtard de Jaligny » à qui son frère Guichard II, un fils légitime, fit le don de Dornes. Claude Dauphin de Jaligny, seigneur de Dornes eut une fille, Marguerite, dame de Dornes morte  en 1407 et qui épousa Jean de Thoury descendant du puissant seigneur Goussaut de Thoury, seigneur de Montgarnaud et donc, de Dornes. Jean eut trois fils dont Claudin qui hérita de Dornes, il épousa Jeanne de Saint-Amour et mourut bien avant 1480 laissant quatre fils. Charles de Thoury, fils de Claudin hérita donc de Dornes qu'il vendit le 5 août 1480.  Ruiné et brûlé  par la guerre de cents ans  et  en 1535 Thierry Fouet secrétaire du roi et président de la chambre des comptes de Bourgogne  achète la seigneurie,  reconstruit  le château avec son fils Florimont son fils  le vend en 1620 aux Coligny-Châtillon, puis passe aux Polatin de Dyo et aux Damas-Barbançois en 1794,  le château passe à Joseph Bon-Crépy descendant des Coligny, sa nièce  Louise-Antoinette Scholastique de Guéhéneuc épouse en 1800  le  futur maréchal Lannes.   Le général de division Lannes, futur maréchal Napoléonien et duc de Montebello. En 1814 le château est acquis par  Joseph Le Febvre, trésorier général passe à son neveu Alfred de Marne qui le transmet par alliance  en 1866 à la famille de Soultrait. Aujourd'hui au vicomte Gaspard de Soultrait.","architecture":"Le château de Dornes, le château primitif fut construit sur un plan carré. Bâtisse rectangulaire, Il présente une façade de style italien du XVe siècle entouré de fossés,  Il était alors formé dun carré avec quatre tours dangle, mais il a été dénaturé par une restauration au XVIe siècle. Ce château est lun de ceux qui, en Nivernais, apporte au XVIe siècle limage la plus élégante. Cest une agréable demeure issue de lancienne maison féodale, brûlée par les Anglais sous la guerre de cent ans. Il ne reste de la construction primitive que quatre tours qui ont perdu leur caractère, les deux de la façade principale sont réunies par une galerie, soutenues par trois arcades  à arc  plein cintre dans le style italien. Les constructions modernes sont en briques bicolores disposées en losange dans un style très bourbonnais et fort élégantes. De plan rectangulaire à deux niveaux avec lucarnes dont la centrale avec gables et deux surélevé formant un troisième étages à toit pointus, l'édifice est accolé  en façade de deux tours  rondes à toit en poivrière surmonté d'un lanternon  et tour carré sur la partie arrière  sur angle gauche. On lit sur la porte dentrée la date de 1547 et sur la façade, cette devise \"votis potior\". Le pont enjambant les douves était un pont-levis remplacé depuis par un pont dormant. Un puits au centre du château existe toujours, alimentant en eau les habitants et reste en service. Une tour isolée  à toit en poivrière avec lanternon servait de colombier,","habitants":"Famille de Jaligny\r\n        \"","divers":"Château de Dornes","gps":"","images":["../../jctruffet.com/image/image_58/58_Dornes_1.jpg","../../jctruffet.com/image/image_58/58_Dornes_2.jpg","../../jctruffet.com/image/image_58/58_Dornes_3.jpg","../../jctruffet.com/image/image_58/58_Dornes_4.jpg","../../jctruffet.com/image/image_58/58_Dornes_5.jpg","../../jctruffet.com/image/image_58/58_Dornes_6.jpg","../../jctruffet.com/image/image_58/58_Dornes_7.jpg"]},"Consult_chateau_formulaire2571":{"id":"Consult_chateau_formulaire2571","dept":"58","canton":"La Machine","commune":"Druy-Parigny","nom":"Druy_Parigny","type":"Château","periode":"XIII","histoire":"DRUY-PARIGNY, le château du Buisson.   En 1388, le nouvel édifice est fortifié par Bureau de La Rivière, premier chambellan de Charles V, il sera de nouveau incendié par les Bourguignons sous Charles VII, et reconstruit en 1463 par Jean dEtampes, évêque de Carcassonne, il est de nouveau pillé en 1562 pendant les guerres de Religion.","architecture":"Domaine le Buisson. Le château féodal  construit au XIIIe siècle, il est incendié et Pillé en 1356 par les Anglais. Une grosse tour rectangulaire, encadrée par deux autres tours, la grosse tour domine le porche dentrée. Une partie du dispositif de défense est encore visible. De nombreuses archères canonnières subsistent. Un corps de logis conserve les éléments dune pièce aménagée en chapelle. Remanié aux XVIIe et XIXe siècles. Incendié en 1945, il n'en reste que les tours qui défendaient le porche. Une grosse tour rectangulaire, encadrée par deux autres tours, domine le porche. Une partie du dispositif de défense est encore lisible. De nombreuses archères canonnières subsistent. Un corps de logis conserve les éléments d'une pièce aménagée en chapelle, avec des ogives et un décor de peintures murales.","habitants":"Evêque de Carcassonne\r\n        \"","divers":"Domaine du Buisson à Druy-Parigny","gps":"","images":["../../jctruffet.com/image/image_58/58_Druy_Parigny_1.jpg","../../jctruffet.com/image/image_58/58_Druy_Parigny_2.jpg","../../jctruffet.com/image/image_58/58_Druy_Parigny_3.jpg","../../jctruffet.com/image/image_58/58_Druy_Parigny_4.jpg","../../jctruffet.com/image/image_58/58_Druy_Parigny_5.jpg","../../jctruffet.com/image/image_58/58_Druy_Parigny_6.jpg"]},"Consult_chateau_formulairef1f3":{"id":"Consult_chateau_formulairef1f3","dept":"58","canton":"Corbigny","commune":"Epiry","nom":"Epiry_Morvan","type":"Manoir tour","periode":"XVI","histoire":"EPIRY,  Tour Vauban, ce château était celui de Claude d'Osnay, baron d'Epiry, père de Jeanne d'Osnay, qui épousa Sébastien Le Prestre de Vauban en ce lieu le 25 mars 1660. Elle a 20 ans  et orpheline de mère. Le couple s'installe dans le château d'Epiry. À peine marié depuis deux mois, Vauban est rappelé par le service du roi pour procéder au démantèlement de la place forte de Nancy rendue au duc de Lorraine. Par la suite, il ne revit plus sa femme que le temps de brefs séjours. Lorsque Jeanne, en juin 1661, met au monde une petite fille, Charlotte, son mari est à Nancy. Sa fille Charlotte épousera, le 26 mars 1680, en léglise dEpiry, en Morvan, Jacques-Louis de Mesgrigny, neveu de Jean de Mesgrigny, grand ami de Vauban, compagnon de siège, ingénieur, lieutenant général et gouverneur de la citadelle de Tournai. Jean-Charles de Mesgrigny, comte dAunay, fils de Charlotte Le Prestre de Vauban et de Jacques de Mesgrigny, reçut les papiers de Vauban en héritage, désormais propriété de la famille de Louis Le Peletier de Rosanbo, président à Mortier au parlement de Paris et héritier de Charlotte de Mesgrigny dans la mesure où il a épousé sa fille unique, Marie-Claire Edmée de Mesgrigny, en 1738.  Sa femme lui donnera deux filles, la progéniture masculine ayant prématurément disparu. Il vécurent là deux ou trois ans. La plaque noire avec inscription à la mémoire du grand homme fut placée là par ordre de Napoléon Ier qui était admiratif du maréchal.                                 Manoir de Montauté pas d'information historique.","architecture":"Tour Vauban, encastrée dans les bâtiments d'une ferme, la tour carrée dresse sa masse grise, inexpressive, percée, comme au hasard, de fenêtres grillées, de lucarnes de meurtrières, et aux quatre pans d'un toit de tuiles où une sombre floraison de lichens couronne d'une patine d'automne le roc inentamée de la forteresse. Les communs ont rejoints le château. De grands portiques de pierre attestent qu'il y eut là toute une construction féodale, avec ses vastes magasins où venaient s'entasser les redevances de la terre. En témoignage de guerre, des mâchicoulis, un grand fossé au levant, vestige de l'ancienne douve, un souterrain dont l'unique ouverture se dissimule derrière un meuble, et puis, au plus haut du donjon, sous les tuiles, une plate forme entourée de meurtrières avec le trait de visière pour les fusils de rempart.","habitants":"Sébastien Le Prestre de Vauban\r\n        \"","divers":"Tour Vauban et manoir de Montauté.","gps":"","images":["../../jctruffet.com/image/image_58/58_Epiry_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Epiry_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Epiry_Morvan_3.jpg","../../jctruffet.com/image/image_58/58_Epiry_Morvan_4.jpg"]},"Consult_chateau_formulairec61a":{"id":"Consult_chateau_formulairec61a","dept":"58","canton":"Varzy","commune":"Estrains sur Nohain","nom":"Estrains_Reveillon","type":"Château","periode":"XVII","histoire":"ETRAINS Le château de Réveillon construit entre 1607 et 1617 par Claude II dAncienville 2 et sa femme Judith Raguier, dame dEsternay. \r\nPassa à différents propriétaires : de 1640-1642 à Michel Larcher, président en la Chambre des comptes, de 1642-1672 à Jean Galland, de 16721712 à Anne Fieubet de Launay, de 1712-1719 à Philippe Millien. Achat du domaine en 1719 par René Louis Voyer de Paulmy, marquis dArgenson, acquit  en 1730 à Jules-Robert de Cotte, Architecte du roi.  Sous lEmpire, le château fut vendu au général Haber, gouverneur de la Catalogne. À la fin du XIXe siècle et au début du XXe siècle, la propriétaire Madeleine Lemaire, de la famille Haber-Coll, peintre.  En 1940, le château est occupé par larmée allemande.  De 1947 à 1992, le château a appartenu à une famille qui le laissa progressivement dépérir. Depuis 1992, les nouveaux propriétaires y ont entrepris une très importante campagne de restauration le sauvant dune ruine annoncée.\r\nREVEILLON, maison de l'Amiral du XVIIe siècle, habitée par le duc de Bellegarde, puis par l'amiral de Coligny,  par alliance avec la famille de Hunolstein à la fin du XIXe siècle, propriété des ducs de Mortemart. L'actuel propriétaire, Charles de Mortemart, a réussi en dix ans à rendre son domaine rentable, au travers d'activités agricoles, sylvicoles et cynégétiques.","architecture":"Estrains En 1640, une expertise du château effectuée nous apprend que le château nétait pas achevé : « les lucarnes nont point reçu leurs fenestres, ni les murs leur exaucements. La plombinerie est absente aux faîtages, noues, des lucarnes et chenaux. À lintérieur, on ne compte plus les carreaux manquants, les ais dentrevoûtes des planchers inachevés, les portes et les croisées de nulle valeur, le corps de logis principal avec la grande salle nest ni crépi, ni enduit. Les trous de boulins ne sont pas rebouchés.\r\nChâteau de Réveillon XIXe Siècle :   maison de lAmiral XVIIe siècle en brique et pierre, le château a été construit sur les fondations dun château féodal, dont nous ne connaissons pratiquement rien,  se distingue par un style Renaissance. Entouré de douves, son plan général en forme de U s'ouvre sur une cour pavée. Le domaine du château englobe de vastes jardins à la française, des communs et sa melonnière, ainsi qu'une ferme dont la pièce maîtresse est un colombier de 3500 nids.","habitants":"Famille de Claude II dAncienville                                            \r\n Famille de Charles de Mortemart\r\n        \"","divers":"Château d'Estrains-Réveillon à Estrains sur Nohain","gps":"","images":["../../jctruffet.com/image/image_58/58_Estrains_Reveillon_1.jpg","../../jctruffet.com/image/image_58/58_Estrains_Reveillon_2.jpg"]},"Consult_chateau_formulaired64d":{"id":"Consult_chateau_formulaired64d","dept":"58","canton":"Tannay","commune":"Flez-Cuzy","nom":"Flez_Cuzy","type":"Château","periode":"XIX","histoire":"FLEZ-CUZY, le Château de Flez-Cuzy est daté du XIXe siècle. Dont je n'ai pas d'information historique.","architecture":"Château de Flez  isolé au milieu d'un vaste parc situé en bordure du village,   bâtiment de dépendance et logis annexe à gauche de la ruelle. Château de plan rectangulaire comprenant un corps central flanqué de deux ailes, de même hauteur, en retour d'équerre sur la façade antérieure; corps bas, en terrasse, couvert d'une verrière, entre les deux ailes, à l'alignement des murs de petit pan, linteaux délardés  en arc  segmentaire et feuillures aux fenêtres. Une belle propriété privée, pas de visite du château. Laccès seffectue par un portail, précédé dune courte ruelle communale.  Il possède aussi de superbes douves humides.  Le château de Flez-Cuzy est daté du XIXe siècle, (après 1835).  Bâtiment de dépendance et logis annexe à gauche de la ruelle.","habitants":"\"","divers":"Château à Flez-Cuzy","gps":"","images":["../../jctruffet.com/image/image_58/58_Flez_Cuzy_1.jpg","../../jctruffet.com/image/image_58/58_Flez_Cuzy_2.jpg","../../jctruffet.com/image/image_58/58_Flez_Cuzy_3.jpg","../../jctruffet.com/image/image_58/58_Flez_Cuzy_4.jpg","../../jctruffet.com/image/image_58/58_Flez_Cuzy_5.jpg","../../jctruffet.com/image/image_58/58_Flez_Cuzy_6.jpg","../../jctruffet.com/image/image_58/58_Flez_Cuzy_7.jpg","../../jctruffet.com/image/image_58/58_Flez_Cuzy_8.jpg"]},"Consult_chateau_formulaire9ae8":{"id":"Consult_chateau_formulaire9ae8","dept":"58","canton":"Luzy","commune":"Fléty","nom":"Fléty","type":"Maison forte","periode":"XV","histoire":"FLETY,  ancienne seigneurie de la famille Delorme de Beauregard.   Propriété de la famille de Chargères du XVIe au XVIIIe siècles.","architecture":"Fléty, au lieu-dit la Commanderie ont subsisté jusqu'au début du XIXe siècle les vestiges d'une commanderie de l'ordre des hospitaliers de Saint-Jean de Jérusalem, fondée en 1188.\r\nIl reste toujours des vestiges du château de la Goutte sur une colline en friche à côté de l'église.\r\nChâteau de la Goutte à l'ouest du village, la hauteur boisée est couronnée d'une motte castrale, ayant 40 mètres environ de diamètre à la base et 25 au sommet, pour une hauteur de 8 mètres. Elle est entourée d'un fossé de 8 mètres de large . Au nord-est de la motte, la basse cour présente une plate-forme d'environ 50 m de côté, protégée par un fossé. Cette motte constitue l'assise de l'ancien château de la Goutte,  Il ne subsiste que la base d'un pan de mur de l'ancien donjon.","habitants":"Famille Delorme de Beauregard\r\n        \r\n        \"","divers":"Manoir de  Fléty","gps":"","images":["../../jctruffet.com/image/image_58/58_Flety_1.jpg"]},"Consult_chateau_formulaire763f":{"id":"Consult_chateau_formulaire763f","dept":"58","canton":"Charité sur Loire","commune":"St-Aubin les forges","nom":"Frasnay_Viemont","type":"Château","periode":"XIV-XVII","histoire":"FRASNAY, au XIe siècle, une collégiale composée de douze chanoines et d'un doyen s'installe dans ce hameau qui porte le nom de Frasnay les Chanoines en 1408. Ithier en était alors le seigneur  avait pour vassal le sire dOurouër, suzerain lui même à celui de Villemenant. Au XIVe siècle, le fief de Frasnay appartient à Philibert de la Platière dune des familles les plus puissantes du Nivernais. En 1696, le cardinal de Montigny, de la famille de La Grange poursuit judiciairement les habitants et les forces a se rabattre de leurs prétentions. Après lui, le château passe à sa nièce, Marie-Casimire de la Grange dArquian qui épousa en seconde noce le grand Sobiesky, roi de Pologne. Les héritiers de cette femme illustre vendirent la terre en 1729 à François de Simiane, abbé de Marcillac, maître de loratoire du Régent ; mais labbé ne jouit pas longtemps du titre de baron et en 1723 la propriété de Frasnay fut cédée par son frère à Claude Berger grainetier du grenier à sel de La Charité-sur-Loire. Cest ce dernier qui dans lespoir de découvrir un trésor fit démolir lune des tours du château.  A partir de cette époque la terre de Frasnay partagea les destinées de celle de Guérigny, achetée par lEtat en 1781 avec toutes ses dépendances. Elle a été morcelée et revendue à divers particuliers en 1845. Près du château subsistent encore lancienne demeure du charpentier et lancienne maison féodale de Montigny.","architecture":"Frasnay,  au XIe siècle,   maison-forte sur les soubassements de laquelle est construit le château, sur le versant d'un coteau qui domine la plaine où serpente la Nièvre, le manoir possède une tourelle faisant partie d'un donjon primitif bâti au XIIIe siècle, à laquelle deux tours sont ajoutées au XVe siècle, au XVIIe siècle une aile et des communs agrandissent l'ensemble. C'est dans cette demeure que naquit Imbert de la Platière, futur maréchal de Bourdillon, héros des campagnes d'Italie au XVIe siècle.","habitants":"Famille de La Grange\r\n        \"","divers":"Château de Frasnay et de Veimont","gps":"","images":["../../jctruffet.com/image/image_58/58_Frasnay_Viemont_1.jpg","../../jctruffet.com/image/image_58/58_Frasnay_Viemont_2.jpg","../../jctruffet.com/image/image_58/58_Frasnay_Viemont_3.jpg","../../jctruffet.com/image/image_58/58_Frasnay_Viemont_4.jpg","../../jctruffet.com/image/image_58/58_Frasnay_Viemont_5.jpg","../../jctruffet.com/image/image_58/58_Frasnay_Viemont_6.jpg","../../jctruffet.com/image/image_58/58_Frasnay_Viemont_7.jpg"]},"Consult_chateau_formulaire62e5":{"id":"Consult_chateau_formulaire62e5","dept":"58","canton":"Corbigny","commune":"Gacogne","nom":"Gacogne","type":"Château","periode":"XVI","histoire":"Trois châteaux à Gâcogne, celui de Raffigny du XVIe siècle, de Ruére du XVIe siècle ruiné et celui de Sauguy du XVIe siècle(Voir Article).                                                                          RAFFIGNY, a été construit au XVIe siècle. Le plus ancien propriétaire connu serait la famille Collas. Le fief appartenait à l'écuyer Edouard Camus en 1667. Après avoir appartenu à Gudin de Vallerin,   passa en 1817, par son mariage avec Marie-Geneviève Brunier, à André-Marie Dupin, juriste, conseiller de Louis-Philippe et procureur général près la Cour de cassation.  Remanié au XIXe siècle par le président André-Marie Dupin , magistrat et ancien président de la chambre des députés, qui a fait édifier une chapelle située sur la colline du Banquet, juste en face de sa propriété. La chapelle Sainte Barbe, à l'entrée du château à gauche de l'image, date du Xve siècle. Légué à son neveu, il passa par alliance à la famille de Sansal qui en est toujours propriétaire\r\nSAUGUY, reconstruit en 1862 sur des fondations datant du XIVe siècle ou du Xve siècle\r\nRUERE, édifice en ruines du XVIe siècle et lieu de naissance supposé de Vauban, situé à proximité immédiate de Saint-Léger-Vauban;  Elle appartenait en 1351 à Jean de Piémère, écuyer du seigneur de Montbaron. Plusieurs propriétaires se succédèrent dont un calviniste, maison Loron, puis à Antoine de Bretagne, baron de Marcilly.","architecture":"Raffigny; bâtie un château au XVIe siècle remanié au XIXe siècle par le célèbre président Dupin.  de plan en T, et, au crayon, les projets des remaniements réalisés par Dupin: un corps principal, au sud, flanqué de deux tourelles du XVIe siècle, d'un corps moins important, au nord,  Le corps principal fut prolongé légèrement de chaque côté et relié au bâtiment nord, lequel fut surmonté de deux étages, il redessina le parc très arboré, les jardins et terrasses ainsi que quelques dépendances. Aujourd'hui il a gardé son bel aspect. Dupin, avec ses divers titres et responsabilités nationales, comme président de la chambre des députés, et locales comme maire de Gacôgne de 1824 à 1848 uvra beaucoup pour le Morvan.                                                                           RUERE  Le château de Rhuère, datant du XVIe siècle dont les vestiges sont toutefois très difficiles à voir. Aujourd'hui, il ne reste qu'un rempart, grand mur à l'entrée du village, sur la route du bas, et un pigeonnier, seules traces de l'existence du château. Mais les anciens, suivis aujourd'hui par les plus jeunes, appellent le Rhuère du bas : « Le château ». Annexe de Gacôgne était une terre en toute justice, mouvante du comté de Château-Chinon.  La mémoire locale nous montre une enfilade de maison proche d'un pigeonnier carré (avec cheminée), comme site connu de l'emplacement du vieux château. Elle nous évoque aussi un endroit appelé \"le caveau\" où il y aurait eu un souterrain  et un éboulis d'un ancien escalier bâti en très belle pierre de granite.","habitants":"Famille Collas                                                                           Famille de  Jean de Piémère\r\n        \"","divers":"Château de Raffigny à Gacogne","gps":"","images":["../../jctruffet.com/image/image_58/58_Gacogne_1.jpg","../../jctruffet.com/image/image_58/58_Gacogne_2.jpg","../../jctruffet.com/image/image_58/58_Gacogne_3.jpg","../../jctruffet.com/image/image_58/58_Gacogne_4.jpg","../../jctruffet.com/image/image_58/58_Gacogne_5.jpg"]},"Consult_chateau_formulaire8ff5-2":{"id":"Consult_chateau_formulaire8ff5-2","dept":"58","canton":"Pougues les Eaux","commune":"Garchizy","nom":"Garchizy","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux à Garchizy, celui de Parzy du XVIe siècle, de Réveriens du XVIIIe siècle, de la Vernée, et les ruines féodales d'Azy du XVIe siècle.                                                       PARZY, ancien château  des Évêques de Nevers, il fait partie du domaine de Parzy la Vielle une ancienne paroisse. Monsieur Bruno Dagonneau, Le manoir faisait partie du fief de la châtellenie de Monceaux-le-Comte, mentionné en 1638. Le premier évêque de Nevers est saint-Eulade  qui fit ériger à lemplacement de la cathédrale actuelle, un oratoire dédié à Saint Gervais et Saint-Protais, les premiers saints patrons du diocèse. Les armoiries ont été abîmées à la Révolution.                                              REVERIENS; pas d'information historique.                     \r\n VERNEE, c'est au cur d'un parc naturel de 17 hectares, qu'un riche industriel Russe fit construire le château de la Vernée et ses dépendances au début du XIXe siècle. Il rapporta du silex de Hongrie, de la pierre naturelle de Loire et de l'ardoise d'Angers pour bâtir un joyau unique dans la région, cet E.S.A.T. est ouvert depuis 1972 et accueille 78 personnes reconnues travailleurs handicapés.                     CLAIREFONTAINE pas d'information historique, ancien Institut médico-éducatif sont inexploités depuis quil a déménagé à Varennes-Vauzelles.","architecture":"Parzy  La vieille tour est le vestige de lancien château, une tour porche datée du XVIe siècle. Il est rattaché à la province ecclésiastique de Dijon, est un ancien château, et une chapelle.  Corps de logis rectangulaire à deux niveaux toits à deux pans , une tour hexagonale mi-hors oeuvre accolé en façade.               Vernée, c'est au cur d'un parc naturel de 17 hectares  un beau château de plan en U,  un corps de logis rectangulaire à deux niveaux flanqué d'un toit à deux pans avec lucarnes à frontons triangulaires accolées sur la droite d'une tourelle à toit en poivrière et un donjon carré sur toit à quatre pans avec lucarnes  et sur la droite une avancée d'entrée saillante à fronton triangulaire angle                       Clairefontaine, bâtiment principal en forme de L, sur 3 niveaux, à toits à la Mansard avec lucarnes, les locaux de lancien Institut médico-éducatif sont inexploités depuis quil a déménagé à Varennes-Vauzelles, il y a deux ans et demi. Lensemble se composant dun château de 817 m², de dépendances et dun parc arboré est régulièrement visité.","habitants":"Monsieur Bruno Dagonneau\r\n        \"","divers":"Château de Clairefontaine , de De la Vernée et de Parzy à Garchizy.","gps":"","images":["../../jctruffet.com/image/image_58/58_Garchizy_1.jpg","../../jctruffet.com/image/image_58/58_Garchizy_2.jpg","../../jctruffet.com/image/image_58/58_Garchizy_3.jpg","../../jctruffet.com/image/image_58/58_Garchizy_4.jpg","../../jctruffet.com/image/image_58/58_Garchizy_5.jpg","../../jctruffet.com/image/image_58/58_Garchizy_6.jpg","../../jctruffet.com/image/image_58/58_Garchizy_7.jpg"]},"Consult_chateau_formulaireb418-2":{"id":"Consult_chateau_formulaireb418-2","dept":"58","canton":"Pouilly sur Loire","commune":"Garchy","nom":"Garchy","type":"Château","periode":"XVIII","histoire":"GARCHY, en 1620, le manoir de Viel-Mannay appartenait à René de Thibault, seigneur de Garchy et de Mézières. Nous continuons de suivre la vallée et nous rencontrons Garchy dont le château, en 1463, passa des mains de Jehan Regnier, bailli d'Auxerre, à celle des Marafin.                                                                             GARCHY, manoir,  fief de la châtellerie de Châteauneuf-Val-de-Bargis. François de Thibaut devient le seigneur de Garchy en 1709.","architecture":"Le vieux château de Garchy : il est composé d'une salle nature à proximité du potager, de chambres d'hébergement pour l'encadrement et d'une salle de spectacle.                                                            Le Manoir de Garchy, est daté du XVIIIe siècle, il est situé le long de la rue Albert Thomas. Constitué à l'heure d'aujourd'hui de deux corps de logis carré identique haut de trois niveaux toiture à quatre pans relié en partie central par un édifice type dépendances.","habitants":"Famille de Jehan Regnier
