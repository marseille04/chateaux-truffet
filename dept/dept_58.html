                             Famille de François de Thibaut\r\n        \"","divers":"Château et manoir  de Garchy","gps":"","images":["../../jctruffet.com/image/image_58/58_Garchy_1.jpg","../../jctruffet.com/image/image_58/58_Garchy_2.jpg","../../jctruffet.com/image/image_58/58_Garchy_3.jpg"]},"Consult_chateau_formulaire01c2":{"id":"Consult_chateau_formulaire01c2","dept":"58","canton":"Imphy","commune":"Gimouille","nom":"Gimouille","type":"Château","periode":"XV-XVIII","histoire":"Gimouille plusieurs châteaux du XIXe siècle, du Colombier du XVe siècle, de Fertot, construit au XIIIe-XIXe siècle pour le comte Choulot de Lavenne, le parc du château y compris la maison des cygnes , de  La Grâce,  de Sampanges, des Marais (voir article).\r\nSAMPANGES, appartient maintenant à madame de Villefosse fille du commandant Moret. Cest lui qui commandait le bateau qui a ramené les cendres de lempereur en France. Louis Tiersonnier est mort  dans son château de Sampanges situé dans une délicieuse position près du pont canal, face au Guitin, cest son neveu Eloi qui en a hérité, et qui la laissé à sa fille madame de Cépoy. Il a été brûlé par les allemands en 1944.                                           FERTOT qui appartenait à ce moment-là au comte de Moncorps, du colombier à la marquise de La Rochefault, maintenant à Madame de Balloy. Le château de Champrobert, commune de Sougy. Depuis lan II, cest toujours un Noury qui a été maire de cette commune jusquà nos jours, un communiste les a remplacé après la vente du château. Aujourd'hui utilisé en agence immobilière par la famille Fassier,     comme les autres châteaux dont je n'ai pas d'information historique.                                   FERTOT de Gimouille dessiné par le comte Choulot de Lavenne.                    COLOMBIER, La GRACE, pas d'information historique.","architecture":"Fertot est une propriété d'une société privée, ce monument fait partie du recensement d'immeuble. Le château bâti au XIXe siècle  de plan rectangulaire à deux niveaux toit en croupes avec rangée de Lucarnes, est complété par un parc qui a conservé des allées délimitant des clairières, la ferme du château de Fertôt, bâtiment du début du XVIIe siècle, rénovée en 1999, accueille un centre de nature et un hôtel restaurant, le bâtiment offre de nombreuses possibilités de location pour vos événements.  Colombier, corps de logis de plan rectangulaire à deux niveaux et rangée de lucarnes sur un toit en croupe, le rez-de-chaussée éclairé par de grandes baies.                                                                               Château de la Grâce corps de logis de plan rectangulaire à deux niveaux et attique toit en croupe, prolongé sur la droite d'une dépendance à un niveau.                                            \r\nSampanges, bâtisse conçut d'un corps de logis à deux niveaux toits en croupes, flanqué d'un pavillon d'entrée à trois faces et deux niveaux avec terrasse à ras le toit,  prolongé sur la droite d'un autre corps de bâtiment à trois travées et deux niveaux toit en croupe.    Sallay; de plan rectangulaire, toit à deux pans accolé d'un côté d'une tour carré et de l'autre d'une tourelle  octogonale à toit pointu.","habitants":"Commandant Moret\r\n        \"","divers":"Château de Sampanges, de Fertot, de Grace et du Colombier.","gps":"","images":["../../jctruffet.com/image/image_58/58_Gimouille_1.jpg","../../jctruffet.com/image/image_58/58_Gimouille_2.jpg","../../jctruffet.com/image/image_58/58_Gimouille_3.jpg","../../jctruffet.com/image/image_58/58_Gimouille_4.jpg","../../jctruffet.com/image/image_58/58_Gimouille_5.jpg","../../jctruffet.com/image/image_58/58_Gimouille_6.jpg","../../jctruffet.com/image/image_58/58_Gimouille_7.jpg"]},"Consult_chateau_formulairee657":{"id":"Consult_chateau_formulairee657","dept":"58","canton":"Primery","commune":"Giry","nom":"Giry","type":"Château","periode":"XIV","histoire":"GIRY,  au début du XIVe siècle, Jean de Thianges, seigneur de Rosemont édifie à flan de coteau l' ancienne forteresse, le corps de logis est du XVIe siècle  passe à la famille de Veilhan, au XVIIe siècle, il appartient à la famille de Choiseul-Praslin.  Au début du XIVe siècle, Jean de Thianges, seigneur de Rosemont édifie à flan de coteau une maison forte. Au quart du XVIe siècle, la famille de Veilhan édifie dans la cour une tour à six pans. L'ensemble fut remanié par les Choiseul qui l'acquirent vers 1680 et le gardèrent jusqu'au début du XIXe siècle.","architecture":"Château de Giry des XIVe, XVIe et XVIIe siècles, tours, ouvrages de défense, galerie, escaliers, salles, cheminées. Au début du XIVe siècle, édifie à flan de coteau une maison forte de plan barlong avec quatre tours rondes aux angles percées d'archères reliées par des courtines, et défendue par une porte fortifiée dont on distingue les rainures qui renfermaient les bras du pont levis. L'ouvrage était ceinturé par des fossés secs. Il ne subsiste de cette époque qu'un étage ou deux des tours, la courtine nord avec son chemin de ronde. Ces tours comportent un escalier intérieur, ascendant de droite à gauche, pratiqué à l'intérieur du mur. Les archères ouvrant sur l'escalier et dans les salles rondes voûtées en calotte ou sur croisées d'ogive. Deux salles de la tour sud possèdent des poutrelles sculptées qui entourent et croisillonnent la naissance de la voûte. Celles-ci devaient supporter un léger plafond de bois ou une tapisserie. La tour nord est, la pus élevée, avec une belle cheminée au dernier étage, servait probablement de tour de guet.  Les derniers remaniements, les plus importants, sont apportés au début du XVIIe siècle, les deux corps de logis sont reliés pour ne former qu'une seule et large façade extérieure orientée plein Est.\r\n Les tours remaniées et les murs sont percés de canonnières. Au sud est, une tour carré avec assommoirs est édifiée sur l'emplacement d'une tour ronde. Une deuxième tour carrée, également fortifiée, vient compléter la défense et agrandir le logis.","habitants":"Famille de Veilhan\r\n        \"","divers":"Château de Giry","gps":"","images":["../../jctruffet.com/image/image_58/58_Giry_1.jpg","../../jctruffet.com/image/image_58/58_Giry_2.jpg","../../jctruffet.com/image/image_58/58_Giry_3.jpg","../../jctruffet.com/image/image_58/58_Giry_4.jpg","../../jctruffet.com/image/image_58/58_Giry_5.jpg","../../jctruffet.com/image/image_58/58_Giry_6.jpg","../../jctruffet.com/image/image_58/58_Giry_7.jpg","../../jctruffet.com/image/image_58/58_Giry_8.jpg"]},"Consult_chateau_formulaire7373":{"id":"Consult_chateau_formulaire7373","dept":"58","canton":"Glux","commune":"Glux en Glenne","nom":"Glux","type":"Château","periode":"XIX","histoire":"GLUX, dans le bourg, ce château fut construit en 1888 par Christian d'Aboville avec le financement de son parai, Alphonse d'Aboville, pair de France.  Le château appartient actuellement à l'arrière petit-fils de Christian d'Aboville, M. de Contenson. Il nous est évoqué un château du XVIIIe siècle, château de Verclos, plus haut dans le bourg: il reste à inventorier.","architecture":"Glux, cet édifice en granit rose et calcaire de Comblanchien emprunte un style Louis XIII du XVIIe siècle. Le château fut presque entièrement détruit par un incendie en 1983: il n'en restait que les murs. Il fut alors partiellement reconstruit. Aujourd'hui le château a conservé son bel aspect, avec un bâtiment rectangulaire sur deux niveaux, flanqué de deux pavillons et d'une tour ronde hors-uvre. Le tout est couvert d'un long toit en coupe en ardoise.","habitants":"Famille de  Christian d'Aboville\r\n        \"","divers":"Château de Glux en Glenne","gps":"","images":["../../jctruffet.com/image/image_58/58_Glux_1.jpg","../../jctruffet.com/image/image_58/58_Glux_2.jpg","../../jctruffet.com/image/image_58/58_Glux_3.jpg"]},"Consult_chateau_formulaireaf49":{"id":"Consult_chateau_formulaireaf49","dept":"58","canton":"Guerigny","commune":"Guerigny","nom":"Guerigny","type":"Château","periode":"XVI-XVIII","histoire":"quatre  châteaux à Guerigny; de Chaussade hôtel de Charme du XVIIIe siècle, de Guerigny,  et le manoir de Villemenant du XVe siècle,  Aux alentours, on trouve en outre les châteaux  de Poiseux, de Mimont,  le château de Luanges néo-Renaissance (XIXe siècle), le château des Évêques (XVIIe siècle), le château de la Chaussade (XVIIIe siècle).                                      \r\n GUERIGNY est intimement liée à celle de Pierre Babaud de la Chaussade. Profitant des ressources naturelles environnantes, principalement le minerai de fer, les forêts de chênes et de nombreux cours deau, celui-ci implante et développe les forges royales. Cette manufacture, intimement liée à la construction navale, devient lune des plus importantes de France au XVIIIe siècle. En 1781, lÉtat acquiert le site. Les forges poursuivent leur activité jusquen 1971.     \r\nCHAUSSADE , château construit en 1746 pour le baron Pierre Badaud de la Chaussade, créateur des forges et auteur d'un vaste projet d'urbanisme encore lisible à Guérigny.             VILLEMENANT,  Au XIVe siècle construction de la maison forte par Gérard de Quaroble qui passera à la maison de Nevers   et par alliance passe au XVe siècle  à la famille de Veaulce qui deviendront les maîtres de forges, en 1540 à Michel de Breschard seigneur de la tour de Chevenon, en 1638   Arnaud de Lange, seigneur de Villemenant achète la terre de Guérigny et installe une forge dès 1642.  En 1681, elle est affermée à Jean Thomas. En 1722, Guillaume de Lange, petit-fils d'Arnaud, vend la terre à Jacques Masson, banquier parisien et à ses associés, Jean et Pierre Babaud de la Chaussade gendre du directeur des finances du duc de Lorraine. Pierre de  Babaud de la Chaussade, achète Villemenant est le remanie en un exemple remarquablement bien conservé d'alliance du style  Moyen-Age et Renaissance. Le château est devenu bien du domaine royal en 1781,  vendu au département de la Marine jusqu'en 1854 acquit par les familles Pastraud et Buzelin, passe ensuite aux Girerd, aux Bonvallet et aux Guimard avant d'être acheté par la famille Chesnais qui le transforme en chambres d'hôtes.","architecture":"Guerigny, construit au XIVe siècle, le château de Villemenant se situe dans un paysage typiquement nivernais. À quelques pas de la Nièvre, sa tour d'escalier polygonale à colombages et ses deux tours semi-circulaires sont très pittoresques. Le château, en cours de rénovation intérieure, est très bien entretenu et propose des chambres d'hôtes.\r\nChaussade un château inachevé les deux ailes n'ont pas été reliées entre elles.Vaste château avec cour , Il comprend deux ailes avec rez-de-chaussée et étage en comble. Une autre aile s'élève parallèlement à l'aile sud. Une partie du château logeait les collaborateurs du maître de forges. Les services administratifs se trouvaient également dans le château.                                 Villemenant, château du XIVe siècle, forteresse construite en 1360 durant la guerre de cent ans, de plan carrée flanquée de deux tours rondes, transformé à la Renaissance,  le vieux corps de logis est intégralement remanié et percé de fenêtres à croisillons finement molurés, grand toit à deux pentes une lucarne subsiste à droite du corps de logis , une tour hors uvre à été édifié  abritant  un escalier à vis flanquée d'une mince tourelle  en encorbellement hexagonale dont l'escalier permet d'accéder au comble, les deux tours rondes de défense arasées sur la partie arrière du bâtiment sont encore habitées. Les toitures sont soutenues par une très originale charpente en chêne blanc ayant la forme dune coque de bateau renversée.","habitants":"Pierre Babaud de la Chaussade                                              \r\n Famille d'Arnaud de Lange\r\n        \"","divers":"Château de Guerigny  et de Chaussade à Guerigny","gps":"","images":["../../jctruffet.com/image/image_58/58_Guerigny_1.jpg","../../jctruffet.com/image/image_58/58_Guerigny_2.jpg","../../jctruffet.com/image/image_58/58_Guerigny_3.jpg","../../jctruffet.com/image/image_58/58_Guerigny_4.jpg","../../jctruffet.com/image/image_58/58_Guerigny_5.jpg","../../jctruffet.com/image/image_58/58_Guerigny_6.jpg","../../jctruffet.com/image/image_58/58_Guerigny_7.jpg","../../jctruffet.com/image/image_58/58_Guerigny_8.jpg","../../jctruffet.com/image/image_58/58_Guerigny_9.jpg"]},"Consult_chateau_formulairea6f5":{"id":"Consult_chateau_formulairea6f5","dept":"58","canton":"Brinon sur Beuvron","commune":"Guipy","nom":"Guipy","type":"Château","periode":"XVI-XVII","histoire":"Quatre châteaux à Guipy;  celui de Vauban,  de Chanteloup du XVI-XVIIe siècle (voir article), des Prés du XVI-XVIIe siècle et la maison forte de Précy du XIV-XVIIe siècle.                         GUIPY, château Vauban à Guipy,  Linstitut médico-éducatif I.M.E Vauban est un château massif construit au début du XIXe siècle, il fut remis par un de ses propriétaires, le mécène de Chavannes, à un couvent,  afin de créer un orphelinat « la providence des enfants de Guipy » qui fut repris en 1952 par « la sauvegarde de lenfance ».  Au moment de la restauration de léglise, il fut posé un tympan sculpté, daté de 1876. Sébastien Le Prestre de Vauban, marquis de Vauban est un ingénieur, architecte militaire, urbaniste, ingénieur hydraulicien et essayiste français. Il est nommé maréchal de France par Louis XIV.                                                              PRECY, maison-forte, construite au XIVe siècle par Guillaume de Basso pour protéger un domaine agricole, a été remaniée au XVIe siècle par Balthazar de La Tournelle. La demeure passa au XVIIe siècle, à Louis de Blosset, calviniste notoire, chambellan de l'hôtel d'Henri IV. \r\n PRES, est daté du XVIIIe siècle, un ancien domaine agricole dépendant du prieuré. Le chemin des Moines permet dy accéder, par une porte ouverte dans le mur. Le propriétaire conserve son droit de passage.","architecture":"Guipy, quadrilatère à trois niveaux et série de lucarnes, Pavillons carrés en angles et plein cintre  pavillon saillant d'entrée toit à l'impériale  plusieurs bâtiments annexes de lépoque du monastère, il subsiste le gros colombier, et une partie du logis du prieur.       Précy  Le nom de Précy pourrait avoir comme origine le mot \"pasc\" pâturage, ce qui explique sans doute sa conversion en exploitation agricole. Remarquable maison-forte quadrilatère  à deux niveaux conserve laspect défensif dû à ses tours dangles situées à larrière, échauguettes en angles et sa tour carrée à quatre niveaux, toit à quatre pans, son allure massive et compacte.                     Le château du Prés est visible de la route des étangs de Vaux, lancien domaine agricole du prieuré conserve ses bâtiments oblongs, tour et son pigeonnier.","habitants":"Sébastien Le Prestre de Vauban,\r\n        \"","divers":"le château des Près, de Précy et de Guipy","gps":"","images":["../../jctruffet.com/image/image_58/58_Guipy_1.jpg","../../jctruffet.com/image/image_58/58_Guipy_2.jpg","../../jctruffet.com/image/image_58/58_Guipy_3.jpg","../../jctruffet.com/image/image_58/58_Guipy_4.jpg"]},"Consult_chateau_formulaire9810":{"id":"Consult_chateau_formulaire9810","dept":"58","canton":"Imphy","commune":"Imphy","nom":"Imphy","type":"Château","periode":"XIX","histoire":"Quatre châteaux à Imphy celui des Plauts  du XVIIIe siècle, de Chazeau, de Curty et celui de Marigny.                                 CHAZEAU est situé à la sortie dImphy, il est daté des XVe-XVIIIe-XIXe-XIXe siècles. Cette demeure appartient aux seigneurs de Prye jusquau début du XIXe siècle. La maison la plus ancienne est nommée la maison de Jeanne dArc, rien ne prouve que Jeanne dArc y ait séjourné, celle-ci est très présente dans la région entre la prise de Saint-Pierre le Moutier et le siège perdu de La Charité sur Loire. Le manoir et sa chapelle datent de la seconde moitié du XIXe siècle, la chapelle des « Minimes ». Dans le parc se trouve un portique de style jésuite qui constituait autrefois le fronton de la chapelle des Minimes à Nevers. Un jardin botanique créé en 1960 par Gabriel de Mauduit décore le manoir.                               MARIGNY, construit au XIXe siècle, a été conçu dans le style du XVIIe siècle. Aujourd'hui transformé en chambres d'hôtes.                                   PLAUTS pas d'information historique.                                         CURTY pas d'information historique mis à part qu'il est transformé en chambres d'hôtes.","architecture":"Chazeau corps de logis rectangulaire à deux niveaux et lucarnes entre deux pavillons également rectangulaires avec sur la gauche un pavillon  surmonté d'un étage à  colombages toit à quatre pans. Curty de plan rectangulaire à deux niveaux toit en croupes avec une lucarne centrale sur pavillon d'entrée légèrement saillant, deux ailes en retour côté parc un niveau  avec finitions en hexagonale  en embouts , lucarnes sur ces retours d'ailes.                                 Marigny, il est constitué d'un corps central rectangulaire, accosté sur sa plus longue face de deux ailes, prolongées à chacune de leurs extrémités d'un pavillon carré en avancée sur les façades. L'ensemble s'élève sur deux niveaux et un niveau de comble, la façade nord du corps de logis central présente une porte encadrée de pilastres cannelés et vermiculés, ils supportent un entablement souligné de denticules sur lequel prennent appui des pilastres d'ordre ionique, soutenant une corniche à modillons. Dans la travée de cette porte, le niveau de comble offre une lucarne pigeon à trois baies et pilastres d'ordre corinthien supportant un fronton cintré, la façade méridionale présente une ornementation similaire et un large émargement donne accès à la terrasse. Les pavillons sont couverts d'un toit à quatre pentes et, au nord comme au sud, leur comble est éclairé par des lucarnes-pigeons à fronton triangulaire.           Plauts de plan rectangulaire à deux niveaux avec lucarnes deux pavillons saillants aux extrémités.","habitants":"Seigneurs de Prye\r\n        \"","divers":"Château de Plauts de Marigny et de Chazeau à Imphy","gps":"","images":["../../jctruffet.com/image/image_58/58_Imphy_1.jpg","../../jctruffet.com/image/image_58/58_Imphy_2.jpg","../../jctruffet.com/image/image_58/58_Imphy_3.jpg","../../jctruffet.com/image/image_58/58_Imphy_4.jpg","../../jctruffet.com/image/image_58/58_Imphy_5.jpg","../../jctruffet.com/image/image_58/58_Imphy_6.jpg","../../jctruffet.com/image/image_58/58_Imphy_7.jpg","../../jctruffet.com/image/image_58/58_Imphy_8.jpg","../../jctruffet.com/image/image_58/58_Imphy_9.jpg"]},"Consult_chateau_formulaire8a31":{"id":"Consult_chateau_formulaire8a31","dept":"58","canton":"Cosnes cours sur Loire","commune":"Alligny sur Cosne","nom":"Insèche","type":"Château","periode":"XVIII","histoire":"INSECHE, en 1704 la famille de Foucault, lhistoire de la seigneurie dInsèche est liée à celle de Saint-Père. Elle revient au fils cadet de François de Stutt. Une grande bâtisse de la fin du XVIIIe siècle a pris la place dune demeure ancienne.  Insèche, les fiefs d'Insèche et de Vauzène appartenaient à la famille d'Estutt.\r\nUn acte de 1627 nous apprend quEtienne de Stutt, fils cadet de François, y demeurait. Insèche passa ensuite par alliance aux Foucauld du Berry, originaires du Périgord, et fut vendu en 1843 à Gabriel Renaud Provost-Dumarchais, sénateur de la Nièvre, qui fit reconstruire le château.","architecture":"Insèche, de plan rectangulaire, corps de logis à deux niveaux flanqué entre deux pavillons rectangulaires de même niveaux, pavillon d'entrée légèrement saillant plein cintre avec fronton et oculus, une série de lucarne sur le toit et à l'arrière tour de guet polygonale à balustre avec clochetons central.","habitants":"Famille d'Estutt\r\n        \r\n        \"","divers":"Château d'Inséche","gps":"","images":["../../jctruffet.com/image/image_58/58_Inseche_1.jpg","../../jctruffet.com/image/image_58/58_Inseche_2.jpg","../../jctruffet.com/image/image_58/58_Inseche_3.jpg","../../jctruffet.com/image/image_58/58_Inseche_4.jpg"]},"Consult_chateau_formulaire971b":{"id":"Consult_chateau_formulaire971b","dept":"58","canton":"Moulins Ingelbert","commune":"Isenay","nom":"Isenay","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à  Isenay  celui de Tremblay du XVe siècle et la maison forte de Montchanin du XVIe siècle.                               ISENAY En 1406, Gaucher de Corvol, seigneur du Tremblay, et Jeanne de Poussery son épouse rendent hommage au comte de Nevers pour leur fief et étang de Thaix. Puis en 1447, c'est Philippe de Courvol, seigneur du Tremblay et Thaix et ses fils en 1494, Gaucher IV et Antoine.                                 \r\n  MONTCHANIN dont le nom vient de celui qui l'acheta en 1667, Louis de Montchanin, bailli de la Nocle, qui est une maison forte construite au XVIe siècle, l'ancien fief de Ponard, et le Château des JALLUERDS, plus au Nord, qui est plus récent du XIXe siècle, propriété initiale de la famille de Montchanin, originaire d'Issy l'Evêque, puis, après le mariage en 1899 de Marie Albertine de Montchanin avec le bourbonnais Marie Joseph Ludovic Guy Jacquetot de Chantemerle de Villette, passant en 1922 à M. de Charmen, d'Autun, racheté actuellement par un mécène allemand, Helmke Reinhart.                                                              TREMBLAY, les troupes anglaises ayant quitté les terres du Tremblay qu'elles occupaient depuis 1356, ce fief est acquis en 1380 par Guy de Courvol qui y fait construire un modeste hôtel, alors que son frère tient le fief voisin d'Isenay. Les ravages que l'un et l'autre subissent durant la guerre de cent-ans, incitent leurs successeurs à construire une forteresse. Autorisation leur en ayant été donnée par Charles VII, et un des plus puissants donjons des pays nivernais est édifié à l'angle nord de l'ancienne demeure par Jean et Philippe de Courvol vers 1450. En 1553, Jeanne de Courvol s'allie à la famille de Reugny qui conservera le fief jusqu'à la Révolution. En 1827, le château sera acquis par A. Petit de Touteuille, ancêtre des propriétaires actuels, les La Forest d'Armaillé..","architecture":"Montchanin, dont le nom vient de celui qui l'acheta en 1667, Louis de Montchanin, bailli de la Nocle, qui est une maison forte construite au XVIe siècle, le bâtiment, de deux étages accédés par un escalier en vis, construit de moellon, d'enduit et de calcaire, a été restauré à la fin des années soixante-dix et porte des armoiries sculptées sur le linteau de la porte d'entrée.                                 Tremblay corps de logis construit au XIVe siècle et au XVe siècle autorisation de le transformer en forteresse, d'un donjon d'aspect redoutable de plan rectangulaire de 17 mètres sur 11 mètres sur trois étages aux angles arrondies percés à leur base d'archères et des canonnières sur la partie haute, sous les combles  très élevé  un chemin de ronde sur mâchicoulis,  les étages sont déservi  par un escalier à vis logé dans une tourelle hors uvre faisant saillies sur la façade Est. Au XIXe siècle L'hôtel des Courvol consiste dans le corps de logis orienté au sud flanqué à l'ouest d'une tour ronde et à l'est un pavillon rectangulaire, avant 1900 un nouveau corps de logis de style néo-Renaissance, celui-ci sera en grande partie détruit en 1920 par un incendie , aujourd'hui restauré est flanqué du corps de logis cantonné à son extrémité d'une grosse tour ronde sur deux étages sur rez-de-chaussée avec comble, toit en poivrière Le château le plus connu et historiquement le plus important de la commune actuelle.","habitants":"Famille de Corvol\r\n        \"","divers":"le château de Tremblay de Mazille et de Jaluerds à Isenay","gps":"","images":["../../jctruffet.com/image/image_58/58_Isenay_1.jpg","../../jctruffet.com/image/image_58/58_Isenay_2.jpg","../../jctruffet.com/image/image_58/58_Isenay_3.jpg","../../jctruffet.com/image/image_58/58_Isenay_4.jpg","../../jctruffet.com/image/image_58/58_Isenay_5.jpg","../../jctruffet.com/image/image_58/58_Isenay_6.jpg","../../jctruffet.com/image/image_58/58_Isenay_7.jpg"]},"Consult_chateau_formulaire7cef":{"id":"Consult_chateau_formulaire7cef","dept":"58","canton":"Saint-Saulge","commune":"Jailly","nom":"Jailly","type":"Manoir","periode":"XVII","histoire":"JAILLY, le château de Jailly est un joli château, manoir dit de St-Saulge qui date du XVIIe siècle. Le manoir la demeure de la famille du Verne seigneur de Jailly.","architecture":"Manoir de Jailly de conception rectangulaire à trois  niveaux toit à deux pans accolé d'une tour ronde toit en poivrière.","habitants":"Famille du Verne\r\n        \"","divers":"Manoir à Jailly","gps":"","images":["../../jctruffet.com/image/image_58/58_Jailly_1.jpg","../../jctruffet.com/image/image_58/58_Jailly_2.jpg","../../jctruffet.com/image/image_58/58_Jailly_3.jpg","../../jctruffet.com/image/image_58/58_Jailly_4.jpg"]},"Consult_chateau_formulaire45f1":{"id":"Consult_chateau_formulaire45f1","dept":"58","canton":"Saint-Pierre le Moûtier","commune":"Langeron","nom":"Langeron","type":"Château","periode":"XV","histoire":"A Langeron la tour de Langeron du XVe siècle et le château de d'Héré du XIXe siècle.                                              \r\n   LANGERON, lorsque le comté de Nevers passa dans la famille royale, la maison Andrault se rapprocha des Bourbon-Condé, dont ils devinrent clients. Devenus des proches de la famille royale et malgré leur participation à la Fronde, les Andrault verront la terre de Langeron érigée en comté par une lettre patente de Louis XIV en 1669. Les Andrault se titrèrent dès lors comte de Langeron, baron de la Ferté et de Cougny, seigneur de Monts, de Buy et d'Alligny. Bazolle fut érigée en comté et vendue aux Duzée. De leur union 1684 avec les du Gouray, la Maison Andrault acquit le marquisat de la Coste en Bretagne, ainsi que la baronnie de Sassy. Leur fulgurante assomption ils reçurent les honneurs de la Cour,  les éloignèrent de leur terres en Nivernais pour Versailles et le château de la Coste. \r\n La Maison Andrault préférera les fastes de la cour de Versailles. Les nombreuses charges militaires et civiles lieutenance générale de Bretagne par exemple,  les obligeront à préférer la Côste à Langeron qui finira par lentement décliner. Lorsque la Révolution éclate, Alexandre Louis Andrault, alors colonel au service de Louis XVI au régiment d'Armagnac, soutiendra la monarchie jusqu'à la fin. Cet acharnement à défendre le roi l'obligera à émigrer en Russie, abandonnant l'ensemble de ses biens. Le comté de Langeron fut démantelé, le château, ainsi que toutes les installations seigneuriales brulées. À leur retour en France, les descendants de la Maison Andrault s'installèrent vers Nevers et Montargis.                                                                                     D'Héré pas d'information historique.","architecture":"LANGERON, lorsque le château fort devint trop délabré, un vaste chantier de modernisation fut entrepris à Langeron et un nouveau château fut érigé au XVIe siècle, agrandi au XVIIe siècle. Il ne reste de l'ancien château, brûlé à la Révolution, qu'une tour médiévale (propriété privée) sur laquelle on peut voir en partie effacées les armoiries des Andrault avant leur alliance avec les Gentien (d'Azur aux trois étoiles d'argent avec deux anges tenant l'écu).","habitants":"Famille d'Andrault\r\n        \"","divers":"Vestiges et château de Langeron","gps":"","images":["../../jctruffet.com/image/image_58/58_Langeron_1.jpg","../../jctruffet.com/image/image_58/58_Langeron_2.jpg","../../jctruffet.com/image/image_58/58_Langeron_3.jpg","../../jctruffet.com/image/image_58/58_Langeron_4.jpg","../../jctruffet.com/image/image_58/58_Langeron_5.jpg","../../jctruffet.com/image/image_58/58_Langeron_6.jpg"]},"Consult_chateau_formulairebd26":{"id":"Consult_chateau_formulairebd26","dept":"58","canton":"Château-Chinon","commune":"Corbigny","nom":"Lantilly_Corbigny","type":"Château","periode":"XV","histoire":"LANTILLY, cette seigneurie  du comté de Château-Chinon et de la baronnie de Lormes-Chalons. Le  chevalier Grimaud était propriétaire de cette seigneurie au XIIIe siècle. Madame Pernelle Grimaud, veuve de Guyot Grimaud, chevalier de Lantilly et son fils Guy, vivaient à Lantilly entre 1320 et 1327. Guy  chevalier, seigneur de Lantilly, était le favori du comte de Nevers Louis II de Dampierre,  comte de Flandre, comte de Rethel, époux de Marguerite de France fille de Philippe V dit \"Philippe le long\".  La maison de Torcy, posséda la seigneurie du XIVe siècle au XVIIIe siècle. Cette maison, une des plus anciennes du Nivernais était au service  du roi, des comtes et ducs de Nevers. Un Michel de Torcy y fit des transformations au XIVe siècle.  Il avait pour coseigneur, en 1637, Paul Léonard de Remigny, baron de Joux, fils de Charles qui tenait ses droits de Marguerite Savary de Brèves, son épouse. Ils eurent trois enfants : Louis de Rémigny, marquis de Joux; Jean-Baptiste, comte de Torcy et Marie-Françoise mariée à Pierre de Torcy, son cousin, écuyer, seigneur de Lantilly en 1670 . Catherine de Torcy, mariée à Louis Le Bascle baron d'Argenteuil, lui porta aussi une partie de la terre de Lantilly. Louis Antoine de Torcy mourut au château le 2 mai 1765. Ne laissant pas de postérité, Lantilly passa alors à Claude Robert Dugon, son neveu, comte de Boislamy, sieur de de Monche et de Marcellange, et à Antoine François Henri, vicomte de Damas, seigneur de Guipy qui en firent aveu en 1771. De 1780 à 1802, la seigneurie et le château passèrent à la maison de Balathier, d'Ugon, et Certaines. Elie, vicomte d'Hugon, sieur de La Rochette, renouvela ce devoir au nom de Gabrielle Le Bascle, sa femme dix ans après. En 1910, le château devient la propriété de monsieur Albert Ramillon, issu d'une vieille famille nivernaise établie depuis cinq siècles dans la région de Varzy. La propriété est depuis dans la même famille. Aujourd'hui chambres d'hôtes par Marie-Josiane Ducrot.","architecture":"Lantilly,  de plan rectangulaire, dont il ne reste que l'aile Nord-Est avec une grosse tour carrée, à l'équerre, formant un bâtiment en L. Aujourd'hui l'accès se fait par un pont dormant à deux arches donnant sur une porte ouverte au centre de la façade Nord-Est sous une voûte en plein cintre. L'ensemble possède des murs très épais et comprend trois niveaux, avec les combles. Certaines ouvertures furent ajoutées au XVIIe siècle. Il possède, d'origine, une fenêtre à baies géminées avec ses arcs en accolade. Il reste des consoles sur le côté Nord-Ouest. La remarquable porte d'entrée de la façade de l'aile Sud-est, donnant sur la cour intérieure, est à jambages en bossages en harpe chanfreinés et plate bande à claveaux passant un sur deux. La tour, construite sur une butte talus, comprend deux niveaux. Son soubassement est percé de canonnières. Elle est coiffée d'un toit à quatre pentes très raides qui prend appui sur des solives formant encorbellement. Les ouvertures des anciens hourds sont conservées. La première enceinte extérieure comporte une large douve et une tour ronde qui fut aménagée au XXe siècle. En 1810, la cour est rehaussée de quelques centimètres, à la suite de la destruction de cinq des six tours d'origine, pour éviter que l'eau des douves ne l'inondent, décision du propriétaire, Louis Formé de Framicourt.","habitants":"Famille de  Michel de Torcy\r\n        \"","divers":"Château de Lantilly","gps":"","images":["../../jctruffet.com/image/image_58/58_Lantilly_Corbigny_1.jpg","../../jctruffet.com/image/image_58/58_Lantilly_Corbigny_2.jpg","../../jctruffet.com/image/image_58/58_Lantilly_Corbigny_3.jpg","../../jctruffet.com/image/image_58/58_Lantilly_Corbigny_4.jpg","../../jctruffet.com/image/image_58/58_Lantilly_Corbigny_5.jpg"]},"Consult_chateau_formulairee8b8":{"id":"Consult_chateau_formulairee8b8","dept":"58","canton":"Luzy","commune":"Lanty","nom":"Lanty","type":"Château","periode":"XII-XVIII","histoire":"Ruines féodales du fort de Lanty motte féodal du Breuillat et château de Montantaume du XVe siècle    pas d'information historique.                                                                          LANTY,  le fort de Lanty, maison seigneuriale du XIIe siècle qui a disparu sûrement au XVIIIe siècle.  Cette demeure a eu des propriétaires célèbres dont Françoise de Rabutin, fille de l'écrivain Roger de Bussy-Rabutin. Cette jeune femme devenue veuve alors qu'elle était encore jeune, épousa un ami : François de Rivière. Son père furieux vint au château, enleva sa fille et la séquestra. Un procès s'ensuivit, qui contraint le père à rendre sa liberté à sa fille, qui retrouva son mari et ses enfants.  Château du Bas-Charnay pas d'information historique.","architecture":"Le fort de Lanty, maison seigneuriale du XIIe siècle qui a disparu sûrement au XVIIIe siècle. Elle est située à quelques centaines de mètres au sud de l'église, au milieu des champs. On en voit aujourd'hui très bien les contours, d'une grande motte, entourée de fossés par la présence de quelques pans de murs peu visibles. Le Bas Charnay  corps de logis rectangulaire à sept travées deux niveaux toit en croupes.","habitants":"écrivain Roger de Bussy-Rabutin.\r\n        \"","divers":"Château du bas Charnay et de Rémilly à Lanty","gps":"","images":["../../jctruffet.com/image/image_58/58_Lanty_1.jpg","../../jctruffet.com/image/image_58/58_Lanty_2.jpg"]},"Consult_chateau_formulaire53d4":{"id":"Consult_chateau_formulaire53d4","dept":"58","canton":"Luzy","commune":"Larochemillay","nom":"Larochemillay","type":"Château","periode":"XVIII","histoire":"Deux châteaux à la Rochemillay, celui de la Roche du XVIIIe siècle  et celui de la Rivière                                                       La ROCHE, en 1381, la seigneurie et le château sont propriété de Guillaume de Mello, époux d'une héritière de la famille de Châtillon. Le château actuel fut construit à partir de 1720 par le maréchal de Villars qui avait acheté la seigneurie à un des fils du connétable de Montmorency. Le comte François de La Ferté-Meun achète la seigneurie le 15 avril 1736 et fait achever les travaux de construction. En 1760, le comte de La Roche-Millay est Jacques-Louis de La Ferté-Meun, seigneur de Solière et de Cuzy, les familles de Noailles (par mariage, à partir de 1851) puis de Montesquiou-Fezensac, furent par la suite les propriétaires successifs du château.\r\n En y accédant aujourd'hui, on coupe l'enceinte d'une fortification beaucoup plus ancienne, dont subsiste une tour. Peut-être a-t-il succédé au château de Touleur après sa destruction, ou peut-être les deux châteaux ont-ils existé  durant le Moyen-Age, leur double présence constituant une défense parfaite de la vallée. La baronnie de la Rochemillay était la seconde par son importance de tout le Nivernais. Aujourd'hui à la famille de monsieur Louis de la Ville-Beaugé.\r\nRIVIERE, le château du XVIIIe siècle aurait été construit à l'emplacement d'une maison forte ou château du XVe. Le fief a appartenu aux Lanty au XVe siècle et aux Bergers à partir du XVIe siècle.","architecture":"La Roche,  le vieux château médiéval brûla en 1412 ; il en subsiste deux tours circulaires et des murs de remparts.  Elle comporte un grand corps de logis à mansardes, flanqué de deux pavillons rectangulaires. Le tout est bâti sur une esplanade surélevée entourée d'une balustrade. On y accède par un escalier monumental à double révolution. Ce château n'est toutefois pas le premier construit sur la butte rocheuse du village. Sur ce rocher sauvage, et sans dédaigner les assises romantiques du donjon écroulé, construction d'un édifice vraiment noble par sa grandeur, par sa simplicité et par la juste harmonie de ses proportions. Il comprend un grand corps de logis à mansardes, flanqué de deux pavillons rectangulaires, reconstruit au XVIIIe siècle. Un autre remaniement, non identifié, se fit au XIXe siècle.  Un grand corps de logis de deux niveaux, flanqué d'une tour à toit conique, couvert d'un long toit en tuiles plates. Un autre bâtiment sur un plan en équerre, se trouve sur la façade arrière. Les décors intérieurs du château datent du XVIIIe siècle, mais furent remaniés au XIXe siècle. Détruit partiellement la partie Est par un incendie le 18 décembre 2008, le château est en cours de restauration en 2011.","habitants":"Famille de Guillaume de Mello\r\n        \"","divers":"Chtâteau de Larochemillay et de la Rivière","gps":"","images":["../../jctruffet.com/image/image_58/58_Larochemillay_1.jpg","../../jctruffet.com/image/image_58/58_Larochemillay_2.jpg","../../jctruffet.com/image/image_58/58_Larochemillay_3.jpg","../../jctruffet.com/image/image_58/58_Larochemillay_4.jpg","../../jctruffet.com/image/image_58/58_Larochemillay_5.jpg"]},"Consult_chateau_formulairea30a":{"id":"Consult_chateau_formulairea30a","dept":"58","canton":"Chatillon en Bazois","commune":"Limanton","nom":"Limanton","type":"Château","periode":"XVI","histoire":"LIMANTON siège d'une seigneurie attesté dès le Xe siècle, est un édifice entièrement remanié à la fin du XIXe siècle.  Résidence secondaire de monsieur Bernard  Desjardins, propriétaire par héritage en 1994.","architecture":"Le château de Limanton est daté des XVIe-XIXe siècles. Il a été bâti sur une ancienne maison forte du XIIe siècle,  lédifice est de plan symétrique se compose dun étage de soubassement, dun étage carré et dun étage de comble, surmontée de toit à longs pans recouverts dardoise, cest un édifice entièrement remanié à la fin du XIXe siècle, de plan rectangulaire à deux niveaux et rangée de lucarnes sur toits flanqué de quatre tour rondes à toit en poivrières.   Ces jardins sont inspirés des jardins «à la Française » des XVIIe et XVIIIe siècles, d'après l'école de Le Nôtre. Ses logis sont construit au XVIe siècle, puis remanié dans la deuxième moitié du XIXe siècle, ainsi que les communs et les dépendances.","habitants":"monsieur Bernard  Desjardins\r\n        \"","divers":"Château de Limanton","gps":"","images":["../../jctruffet.com/image/image_58/58_Limanton_1.jpg","../../jctruffet.com/image/image_58/58_Limanton_2.jpg","../../jctruffet.com/image/image_58/58_Limanton_3.jpg","../../jctruffet.com/image/image_58/58_Limanton_4.jpg","../../jctruffet.com/image/image_58/58_Limanton_5.jpg"]},"Consult_chateau_formulaire73f4":{"id":"Consult_chateau_formulaire73f4","dept":"58","canton":"Lormes","commune":"Lormes","nom":"Lormes_Aubues","type":"Château","periode":"XIV","histoire":"LORMES Derrière la place François Mitterrand, ou plus exactement au-dessus, le quartier du vieux-château rappelle l'origine fortifiée de la ville à l'époque où deux châteaux-forts se faisaient face et parfois s'affrontaient.                                      AUBUES, les Aubues ou les Aubuz, un des fiefs les plus importants de la baronnie de Lormes. Il possédait un manoir seigneurial armé de deux tours carrées et de deux tours rondes. Cette terre en toute justice était mouvante de la baronnie de Lormes-Châlons et appartenait, en 1480, à Guillaume de Montsaulnin, écuyer, seigneur de Coulon.  Charles de Montsaulnin, comte de Montal, général de renom pour la défenses des places, naquit au château de Aubues en 1619.","architecture":"Lormes, les Aubues ou les Aubuz, un des fiefs les plus importants de la baronnie de Lormes. Il possédait un manoir seigneurial d'un corps de logis à deux étages toits en croupes avec lucarnes, armé de deux tours carrées et de deux tours rondes. Il était en partie entouré de ses anciens fossés et se voit au pied de la montagne de la Justice, au nord-ouest.","habitants":"Charles de Montsaulnin\r\n        \"","divers":"Manoir des Arbues et de Grand-Près à Lormes","gps":"","images":["../../jctruffet.com/image/image_58/58_Lormes_Aubues_1.jpg","../../jctruffet.com/image/image_58/58_Lormes_Aubues_2.jpg"]},"Consult_chateau_formulaire1626":{"id":"Consult_chateau_formulaire1626","dept":"58","canton":"Primery","commune":"Lurcy le Bourg","nom":"Lurcy","type":"Château","periode":"XIV-XVIII","histoire":"Quatre châteaux à Lurcy, celui de Lurcy du XVIIIe siècle du Marais du XVe siècle, le château du Prieur pas d'info, et le château de Vilaine.                                                                                   LURCY, bâtisse du XVIIIe siècle construite à lemplacement dune construction du XVe siècle dont il subsiste une arcade. Le jardin est réalisé au XVIIIe siècle, il a été profondément remanié au cours de la deuxième moitié du XXe siècle. Les jardins sont remarquables par leur diversité.\r\nMARAIS, il a été construit par la famille d'Anlezy, sur une hauteur à l'écart de Lurcy,  le Marais passa par alliance à la famille de Chassy au Xve siècle dont deux représentants furent maîtres de l'hôtel du roi Charles VIII. Leurs descendants Gilles de Chassy, chevalier, baron du Marais, seigneur de Sury sur Loire, et Alexandre de Chassy, 1er du nom, chevalier, baron de Donais et du Marais, colonel général des régiments français, comptèrent parmi les cent gentilshommes des rois Henri III, Henri IV et Louis XIII. Au début du XVe siècle le château appartient à Jehan  de Bois Gibault, puis il passe dès 1423 dans la famille Le Tort. En 1523, Henri Le Tort, conseiller de Marie dAlbret, comtesse de Nevers en est propriétaire. En 1605, Henri Bolacre achète le château, puis il passe dans la famille Conrade, puis en 1631, il est de retour dans la famille Bolacre. En 1722, il devient propriété des Dupin,, des Chéry, des Rochefoucault-Couages, en 1811 à la famille de Montrichard. Le Marais est un fief tenu par la famille dAnlezy, jusquau  milieu du XIXe siècle, la famille de Chassy, a laissée ses armoiries à plusieurs endroits.                             VILLAINE Le château de Vilaine est édifié à la fin XVIIIe siècle, début XIXe siècle, construit sur lemplacement dun ancien château fort seigneurial. À cette époque vilaine était un fief. Des ruines de muraille dune épaisseur de 2.60 mètres ont été retrouvées. Beaucoup des anciens matériaux de lancien château fort ont été utilisés pour bâtir lactuel demeure.Une belle propriété privée visible de la route ainsi que son pigeonnier.","architecture":"Lurcy le bourg, le logis du prieur, massive construction de la fin du XIVe siècle est le dernier vestige des bâtiments. La gentilhommière du XVIIIe siècle  est entourée de beaux jardins aménagés en suivant les pentes descendant vers le village ou vers la rivière.     Le château du Marais est daté de la  fin du XIVe siècle, il a été remanié aux XVIIe et XIXe siècles. Deux tours flanquent le corps du logis sur la façade Nord-Ouest. Une autre sur la façade Sud-Ouest, qui abrite un escalier en spirale La façade nord possède deux tours dont les murs sont percés de canonnières, la façade sud est flanquée d'une tour à pans dont l'étage supérieur a été arasé. Deux appentis peu esthétiques, ont été accolés à cette façade. De la cour, le regard plonge sur la vallée de la petite Nièvre.                                                                                   Vilaine de plan rectangulaire a deux niveaux à cinq travées avec lucarnes en combles sur partie centrale entre les des deux pavillons carrées en angles légèrement saillants.","habitants":"Famille Conrade                                                                         Famille de Chassy\r\n        \"","divers":"Château du Bourg, du Marais à Lurcy","gps":"","images":["../../jctruffet.com/image/image_58/58_Lurcy_1.jpg","../../jctruffet.com/image/image_58/58_Lurcy_2.jpg","../../jctruffet.com/image/image_58/58_Lurcy_3.jpg","../../jctruffet.com/image/image_58/58_Lurcy_4.jpg","../../jctruffet.com/image/image_58/58_Lurcy_5.jpg","../../jctruffet.com/image/image_58/58_Lurcy_6.jpg","../../jctruffet.com/image/image_58/58_Lurcy_7.jpg","../../jctruffet.com/image/image_58/58_Lurcy_8.jpg"]},"Consult_chateau_formulaire2826":{"id":"Consult_chateau_formulaire2826","dept":"58","canton":"Saint-Pierre le Moutier","commune":"Luthenay-Uxeloup","nom":"Luthenay_Uxeloup","type":"Vestiges","periode":"XIII","histoire":"A Luthenay-Uxeloup, imposantes ruines féodales du XIIIe siècle de Rosemont, le château de Uxeloup du XVIIe siècle, de Paranche et de Marigny du XVII siècle.                                         ROSEMONT, en 1233, appartient à Guillaume de Thianges seigneur, une forteresse est bâtie sur son emplacement. Ayant tenu bon pendant la guerre de cent ans, ainsi que pendant les guerres de religion, en 1426 Perrinet Gressard obtient du sire de Toulongeon la forteresse en échange des frais qu'il a engagés et des réparations qu'il à réalisées à la Charité. En 1445  passe à la famille Trousseau, puis au duc de Nevers qui le vend en 1597 à son conseiller Christophe de la Chasseigne bailli du Nivernais, son petit-fils Jérome procureur général prend le partie de la Fronde en 1651 sur l'instigation d'Anne de Gonzague princesse palatine fille du duc de Nevers, en 1651 Mazarin fait occuper Rosemont par le lieutenant général Bussy-Rabutin qui s'achèvera un an après, délaissé par ses propriétaires successifs à partir du XVIIe siècle.  En 1782 racheté  par Claude-Laurent de Chambrun et fut vendu comme bien national à la Révolution, après l'exécution de ses propriétaires, le site devenue le siège d'une exploitation agricole qui permet un entretien de ce qui reste du château.                              Pas d'information historique pour Uxeloup, Paranches et Marigny.","architecture":"Rosemont est à l'origine une maison forte, et subit dès lors les assauts répétés des intempéries et aussi ceux des démolisseurs du XIXe siècle, couverts par la clause d'un acte de vente passé en 1825 qui autorisait l'acquéreur à enlever les matériaux de trois tours. Le propriétaire actuel s'emploie avec l'aide des autorités locales, du ministère de la culture et de la caisse des monuments et sites de la Nièvre, à sauvegarder tout ce qui est menacé. Sur un plan polygonal assez dissuasif.  Vestiges et Imposantes ruines féodales du XIIIe siècle de Rosemont qui à l'origine n'était qu'une maison forte  devenu forteresse par la suite avec des  larges fossés et protégée par une forte barbacane et une grosse tour ronde avec bretèche, d'imposantes courtines relient neuf tours de 10 mètres de diamètre dont sept subsistent encore ces tours sont percées d'archères et certaines de canonnières, l'entrée  est large pourvu de herse et deux assommoirs.","habitants":"Guillaume, sire de Thianges\r\n        \"","divers":"Vestiges de Rosemont et château de Paranche","gps":"","images":["../../jctruffet.com/image/image_58/58_Luthenay_Uxeloup_1.jpg","../../jctruffet.com/image/image_58/58_Luthenay_Uxeloup_2.jpg","../../jctruffet.com/image/image_58/58_Luthenay_Uxeloup_3.jpg","../../jctruffet.com/image/image_58/58_Luthenay_Uxeloup_4.jpg","../../jctruffet.com/image/image_58/58_Luthenay_Uxeloup_5.jpg"]},"Consult_chateau_formulairee0b1":{"id":"Consult_chateau_formulairee0b1","dept":"58","canton":"Luzy","commune":"Luzy","nom":"Luzy","type":"Château","periode":"XVIII","histoire":"LUZY,  au XIVe siècle seigneurs de Luzy,  le château construit au  XIVe siècle par un des seigneurs de château Villain, la  tour a été réparée par Xavier Garenne son propriétaire. \r\n  MAZILLES, ancien château des seigneurs de Mazille, restauré au XIXe siècle avant le château, une villa gallo-romaine se serait élevée sur cette place. La légende prétend même que Saint-Germain, le futur évêque de Paris au VIe siècle, serait né et aurait été élevé dans cette villa.  En 1467 elle appartenait à Pierre de Poiquières puis à partit de 1570 à François des Jours, seigneur de Mazilles. Il écrit, vers 1850, que le château fut rebâti au dernier siècle,   La famille Des Jours de Mazille reconstruisit donc le château au XVIIIe siècle qui fut restauré au XIXe siècle.                 MONTARMIN a été construit,  vers la fin du XVe siècle par une famille de ce nom mais a été fortement dénaturée depuis. Plus tard, le fief de Montarmin change souvent de propriétaire et, dans la seconde moitié du XVIIe siecle, appartient à la famille du Crest. Par son mariage avec Pierre Leprestre de Vauban, cousin du maréchal,  entre dans cette famille. Sa descendante, François de Leprestre de Vauban l'apporte en 1698 à la famille Desjours de Mazille qui le possédera jusqu'à la Révolution. Vendu comme bien national, Montarmin passe de mains en mains et en 1854 est propriété du docteur Jean Jadioux, un lucycois membre de l'académie royale de médecine. Dans les dernières années du XXe siècle, l'ensemble est devenu propriété de la commune de Luzy.","architecture":"Luzy,  le château construit au  XIVe siècle, à l'intérieur, des fortifications de la ville, n'avait dans ses murs que deux tours très importantes. L'une appelée le donjon renfermait trois étages de prisons. Cette tour demeure le seul vestige du château des barons de Luzy, établis dès le XIe siècle sur léperon rocheux de la vallée de lAlène. Presque en ruines au milieu du XIXe siècle, elle est ensuite reconstruite et coiffée dune lanterne. bien conservée, elle sélève sur cinq étages et abrite à présent le \"Musée de la vie locale\" de Luzy.  L'hôtel de ville est une belle construction du XVIe ou XVIIe siècle, ancien hôtel particulier restauré aux XIXe et XXe siècles et acquis par la municipalité en 1866 pour en faire la maison commune.                                                                  Mazilles  à  l'est du bourg, l'édifice actuel est composé d'un étage carré, élévation à travées surmontée de toits à longs pans et conique, et en croupe, du XVIIIe, restauré au XIXe fut sans doute le siège d'une maison forte.  Le château fut rebâti au dernier siècle, sur les ruines d'une maison-forte dont il reste encore une tour. Aujourd'hui, de style classique, le long corps de logis à deux niveaux, est flanqué d'une haute tour ronde.                                     Montarmin,  au sud-est du bourg de Luzy, proche de l'Alène , présente les vestiges d'une maison forte médiévale dont ne subsiste qu'une grosse tour carrée du XVe siècle, insérée dans une exploitation agricole.","habitants":"Seigneurs de Montarmin                                                            Famille Des Jours de Mazille\r\n        \"","divers":"Château de Mazille , le manoir de Montarmin et la tour des Barons à Luzy.","gps":"","images":["../../jctruffet.com/image/image_58/58_Luzy_1.jpg","../../jctruffet.com/image/image_58/58_Luzy_2.jpg","../../jctruffet.com/image/image_58/58_Luzy_3.jpg","../../jctruffet.com/image/image_58/58_Luzy_4.jpg"]},"Consult_chateau_formulaire9845":{"id":"Consult_chateau_formulaire9845","dept":"58","canton":"Tannay","commune":"Lys","nom":"Lys","type":"Château","periode":"XVII","histoire":"Deux châteaux à  Lys  celui de Lys et et de Lacreux.                          LYS,  le fief en 1181, appartient aux bénédictins de la Charité, et  au XIVe siècle on le retrouve aux mains de Jean de Mons, seigneur du lieu, reconstruit au XVIIe siècle sur les bases du château médiéval.  Remanié au XIXe siècle, après 1835, une réfection partielle du bâtiment et des dépendances. Nicolas-Louis Parent, avocat au conseil du roi, fils du juge royal Claude-François Parent, achète en 1812  le château et les terres de Lys, ancien fief de la famille de Bèze. Claude -François décède peut après. Sa veuve Marie-Magdeleine sinstalle à Lys. Le vicomte Élie de Pontcarré hérite du château, il loccupe en 1836, commanditaire des travaux de réfection des dépendances et de la construction de la chapelle. Le domaine reste dans la famille de Pontcarré jusquen 1906, le marquis Pontoy de Pontcarré vend à Philippe Denis. Philippe Denis est un poète, essayiste et traducteur français, né le 17 janvier 1947. Aujourdhui, cest sa petite fille qui est propriétaire.    Lacreux château du XVIIe siècle pas d'information.","architecture":"LYS Le château a été construit sur des bases médiévales aujourd'hui disparues, et reconstruit au XVIIe siècle. Le château se compose d'un logis principal complété à l'ouest par une aile en équerre et à l'est par une terrasse terminée par une chapelle. Il a conservé ses ouvertures, son volume, ses toitures du XVIIe siècle. Devant la façade prend place un vaste escalier à double révolution, orné d'une balustrade qui se poursuit sur la terrasse. Plusieurs pièces lambrissées au XVIIIe siècle ont conservé leur décor, la demeure est complétée par des dépendances qui rappellent sa vocation agricole : écurie, vacherie, atelier et maison du jardinier.","habitants":"Famille de Bèze\r\n        \"","divers":"Château de Lys","gps":"","images":["../../jctruffet.com/image/image_58/58_Lys_1.jpg","../../jctruffet.com/image/image_58/58_Lys_2.jpg","../../jctruffet.com/image/image_58/58_Lys_3.jpg","../../jctruffet.com/image/image_58/58_Lys_4.jpg","../../jctruffet.com/image/image_58/58_Lys_5.jpg","../../jctruffet.com/image/image_58/58_Lys_6.jpg","../../jctruffet.com/image/image_58/58_Lys_7.jpg"]},"Consult_chateau_formulaire6ace":{"id":"Consult_chateau_formulaire6ace","dept":"58","canton":"Imphy","commune":"Magny-Cours","nom":"Magny_Cours","type":"Château","periode":"XV","histoire":"Trois châteaux à Magny-Cours celui de Magny de Bois Vert  de Sallay, de Cussy.                                                            \r\n MAGNY-COURS,  seul élément historique ; Le prélat et diplomate français Louis-Guy de Guérapin de Vauréal, décédé à Magny le 10 juin 1760 de retour de Vichy, fut inhumé dans le caveau de la famille de Boisvert, alors seigneur de l'endroit. Pour le  château de Planchevienne,  superbe édifice des XVIIe et XIXe siècles, est un pur joyau de style Renaissance.                                           BOIS-VERT du XVe siècle,  fief de la châtellenie de Châteauneuf-sur-Allier. Puis en  1865 de Martin du Tyrac de Marcellus vicomte  propriétaire et à sa fille Mlle Marion du Rosay.                            CUSSY;  chambres d'hôtes de charme.","architecture":"Magny-Cours, manoir du XVIIe siècle de plan rectangulaire, corps de logis central à trois travées à trois niveaux flanqué  de deux pavillons de chaque côté à même niveaux  et accolé sur la partie gauche d'une tour.                                                                 Bois-vert du XVe siècle, remanié corps de logis rectangulaire à un niveau  avec lucarnes sur comble accolé d'un pavillon de deux niveaux  sur soubassement  et attique, ce dernier accolé d'une tour carrée.                                                                                 Cussy est une belle maison de maître du XIXe siècle, quadrangulaire avec une tour  porche d'entrée et tour ronde sur l'intérieur.","habitants":"Famille de Boisvert\r\n        \"","divers":"Le manoir de Magny-Cours, de Bois-verts, de Cussy et les dépendances de Plancheveinne,","gps":"","images":["../../jctruffet.com/image/image_58/58_Magny_Cours_1.jpg","../../jctruffet.com/image/image_58/58_Magny_Cours_2.jpg","../../jctruffet.com/image/image_58/58_Magny_Cours_3.jpg","../../jctruffet.com/image/image_58/58_Magny_Cours_4.jpg","../../jctruffet.com/image/image_58/58_Magny_Cours_5.jpg"]},"Consult_chateau_formulaire2e28":{"id":"Consult_chateau_formulaire2e28","dept":"58","canton":"Corbigny","commune":"Magny-Lormes","nom":"Magny_Lormes","type":"manoir","periode":"XV","histoire":"Deux châteaux à Magny-Lormes , le Bailly et le Grand prés.                      BAILLY, de  la famille Decourcelle.                                                      Le GRAND-PRES, pas d'information historique.","architecture":"Bailly est devenu manoir puis une ferme fortifiée, celui-ci possédait quatre tours, et il était alors entouré de douves humides. Le rez-de-chaussée de cette tour possède un four, au premier étage se trouve la salle des gardes qui est toujours présente avec les vestiges dune cheminée, et des latrines. Au second étage est installé un pigeonnier. La façade a été remaniée au XVIIe siècle. La base de la tour est encore dans les eaux, lon peut encore apercevoir les vestiges des anciennes douves. La tour principale du château de Bailly, est datée de la fin du XVe siècle. Elle a été rabaissée et coiffée dun toit de petites tuiles plates en terre cuite a la Révolution. Les autres tours ont toutes été détruites.                          Le Grand-Prés corps de logis rectangulaire à deux niveaux accolés sur la gauche d'un pavillon style donjon  légèrement plus haut que l'ensemble avec lucarnes sur les deux toits.","habitants":"Famille Decourcelle\r\n        \"","divers":"Manoir du Bailly et le château du Grand-Prés à Magny-Lormes","gps":"","images":["../../jctruffet.com/image/image_58/58_Magny_Lormes_1.jpg","../../jctruffet.com/image/image_58/58_Magny_Lormes_2.jpg","../../jctruffet.com/image/image_58/58_Magny_Lormes_3.jpg","../../jctruffet.com/image/image_58/58_Magny_Lormes_4.jpg","../../jctruffet.com/image/image_58/58_Magny_Lormes_5.jpg"]},"Consult_chateau_formulaire1db8":{"id":"Consult_chateau_formulaire1db8","dept":"58","canton":"Imphy","commune":"Gimouille","nom":"Marais_Gimouille","type":"Château","periode":"XIV","histoire":"MARAIS, cette seigneurie prend  les noms de Marisium en 1335, Maraitz le siècle suivant, Maretz en 1529 et Marais-les-Nevers en 1665. Le premier seigneur connu est Jehan de Bois-Gibault, fin du XIVe siècle et début du XVe siècle. Il a vécu pendant la guerre de cent ans et a été armé chevalier vers 1400,  a combattu à la guerre d'Azincourt en 1415. La seigneurie passe en 1423 à la famille Le Tort. Famille de juriste, familiers de la maison de Nevers. À partir de 1410, Guillaume le Tort a été nommé receveur des tailles et aides du Nivernais. En 1448, Le Tort  reçoit procuration de Charles de Bourgogne, comte de Nevers pour traiter son contrat de mariage avec Marie d'Albret, comtesse de Nevers. Il est aussi maître des comptes de Nevers.  Au cours du XVIIe siècle,la seigneurie passe aux Conrade, originaire d'Italie que le duc de Gonzague a fait venir en Nivernais pour y créer l'art de la faïence. C'est à Augustin, potier d'Abissola et à ses frères, Baptiste et Dominique que Nevers doit la réputation de ses faïences. En 1691, Gabrielle Conrade apporte le Marais en mariage à Henri Bolacre, commissaire au présidial de Moulin et de nouveau cette famille tient le fief jusqu'en 1722. C'est à cette date que le château échoit aux Dupin. Au cours du XVIIIe siècle, il est tenu par les Chéry, les La Rochefoucault-Cousage et en 1811 par mariage, il entre dans la famille de Montrichard. Le Marais reste dans cette famille jusqu'en 2000 ou il devient la propriété des Graillot.\r\n Aujourd'hui  chambres d'hôtes.","architecture":"le château du Marais a été construit au XIVe siècle de  plan carré entouré de douves en eau, sur l'emplacement d'une maison fortifiée édifiée en vigie au-dessus des Marais.  Mis à part quelques remaniements effectués au XVIe siècle et la récente reconstruction de la partie détruite en 1888, le Marais présente encore l'essentiel de ses structures des XIVe et XVIe siècles. Les deux façades principales sont de 2 époques différentes. La façade Nord qui regarde la Loire est flanquée sur ses angles extérieurs de deux  tours rondes avec d' assez fortes percées de meurtrières longues du XVe siècle. Elles sont reliées par un corps de logis édifié sur l'emplacement d'une ancienne courtine. Les tours datent de la construction du château. La façade Sud est composée d'un haut pavillon rectangulaire sous lequel s'ouvre l'entrée constituée d'un portail et également d'une grosse tour carrée en avancée.  Le donjon  barlong  orné de sculptures Renaissance, qui flanque le portail présente encore des canonnières mais ses murs ont été par la suite percés de fenêtre. À l'intérieur du donjon, une porte en fer décorée de motifs fermait la salle des archives.  A l'angle Est de la cour intérieure, une tourelle carrée en demi hors-uvre accolée au donjon renferme un escalier en vis qui dessert les étages.","habitants":"Famille Le Tort\r\n        \"","divers":"le manoir du Marais à Gimouille","gps":"","images":["../../jctruffet.com/image/image_58/58_Marais_Gimouille_1.jpg","../../jctruffet.com/image/image_58/58_Marais_Gimouille_2.jpg","../../jctruffet.com/image/image_58/58_Marais_Gimouille_3.jpg","../../jctruffet.com/image/image_58/58_Marais_Gimouille_4.jpg","../../jctruffet.com/image/image_58/58_Marais_Gimouille_5.jpg","../../jctruffet.com/image/image_58/58_Marais_Gimouille_6.jpg"]},"Consult_chateau_formulaire9aa5":{"id":"Consult_chateau_formulaire9aa5","dept":"58","canton":"la Charité sur Loire","commune":"La Marche","nom":"Marche_Morvan","type":"Vestiges","periode":"XI","histoire":"La MARCHE, l'histoire de ce donjon est particulièrement mouvementée, rasé la première fois sur ordre de l'évêque, puis détruit une seconde fois par les seigneurs de La Marche eux-mêmes, pour éviter qu'il ne soit à nouveau rasé par décision de l'évêque de Nevers. Celui-ci ordonna ces destructions au VIIIe siècle suite aux persécutions que les seigneurs de la Marche faisaient subir aux moines de La Charité-sur-Loire ; en effet, les seigneurs de La Marche ont été forcés par l'évêque et le comte de Nevers à donner des terres aux moines, suscitant une certaine animosité à leur égard.","architecture":"La Marche possède, au centre de son territoire, un donjon médiéval, ou plutôt ce qu'il en reste, Suite à des fouilles archéologiques menées en septembre 2008 par Sylvain Guillin, la chronologie de ce donjon est mieux connue. Ainsi, le donjon, surplombant la Loire, est élevé sur ce qui serait une nécropole mérovingienne, mais a également « emprunté » des morceaux de sarcophages pour son édification, emprunt visible dans les murs. Ce donjon semble également avoir été construit au moins sur un, voire deux édifices plus anciens, un d'époque mérovingienne, et peut-être un autre d'époque gallo-romaine.  Les restes des fortifications de la ville sont également visibles dans tout le village, avec des pans de murs que l'on peut trouver un peu partout dans le village et les jardins privés. Le donjon de La Marche est dune hauteur de plus de sept mètres, sur 43 mètres de circonférence. En juillet 1870 la commune décide denlever la butte qui se trouve dans le village, afin den faire une place publique, le donjon oublié réapparaît. Plus récemment lors de fouilles plusieurs sarcophages ont été découverts. La nécropole enfouie date du VIIe siècle, début du carolingien, le donjon entre le Ixe et XIIe siècles.","habitants":"Seigneurs de La Marche\r\n        \"","divers":"Vestiges du donjon de la Marche","gps":"","images":["../../jctruffet.com/image/image_58/58_Marche_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Marche_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Marche_Morvan_3.jpg","../../jctruffet.com/image/image_58/58_Marche_Morvan_4.jpg","../../jctruffet.com/image/image_58/58_Marche_Morvan_5.jpg"]},"Consult_chateau_formulairebf11":{"id":"Consult_chateau_formulairebf11","dept":"58","canton":"Lorme","commune":"Marigny l","nom":"Marigny_Eglise","type":"Château","periode":"XI","histoire":"Marigny l'Eglise, lorigine de ce château remonterait au moins à la fin du XIe siècle. A cette époque, le chevalier Bers (le tireur à l'arc), le tient pour le comte de Chalon. Sa famille prendra le nom de Marigny.  Propriété de la famille de Plancy, il est aujourd'hui occupé par une association d'insertion.","architecture":"Château de Marigny, remanié le long du canal du Nivernais.  En 1791, le château se présentait ainsi : une grosse tour carrée, et, à coté un corps de logis sur les deux bouts duquel, par dehors, il y a deux tours. Le tout clos de murs et entouré de fossés qui sont aboli. Le château est de style  Renaissance, il est en cours de rénovation depuis de nombreuses années, le balcon du château est maintenu par deux colonnes de marbre rose. Sa toiture à longs pans brisés en ardoises. Les baies sont entourées dornements végétaux. Lentrée est de style néo-classique. La demeure possède un magnifique portail en fer forgé.","habitants":"Famille de Marigny\r\n        \"","divers":"Château de Marigny-L'Eglise","gps":"","images":["../../jctruffet.com/image/image_58/58_Marigny_Eglise_1.jpg","../../jctruffet.com/image/image_58/58_Marigny_Eglise_2.jpg"]},"Consult_chateau_formulaireab8e":{"id":"Consult_chateau_formulaireab8e","dept":"58","canton":"Moulins-Engelbert","commune":"Maux","nom":"Maux","type":"Château","periode":"XIV","histoire":"Plusieurs châteaux à Maux, ruines grandioses du XIII-XIVe siècle de la forteresse de Champdioux (voir article), d'Abon construction du XIXe siècle, de Beunas du XVe siècle et de Charmois centre équestre.\r\n ABON , en fait une maison de maître construite en 1865 par la famille Pelletier, sur les terres dun ancien prieuré et ancien lieu de cure qui dépendait, suivant labbé Baudiau, de l'abbaye Saint Léonard de Corbigny : les bâtiments agricoles, au milieu des prés, avoisinant  lancienne chapelle Saint-Donat construite au XIIIe siècle aux sources deaux, paraît-il, miraculeuses, il appartient à la famille Laporte, qui  gère également un gîte rural.             \r\nBEUNAS, du XVe siècle, qui domine joliment le Veynon  et fait face aux bois vallonnés du même nom et fut reconstruit, la terre de Beunas fut donnée par Charles le Chauve à l'abbaye de Saint-Martin d'Autun ; plus en aval, au Sud, de lautre côté de la rivière. Au Sud, le château de  CHARMOIS, construit à la même époque, isolé dans le bocage et visible de loin dans la saignée du bois du Chapître, qui appartient actuellement à un néerlandais.","architecture":"les châteaux de Beunas  et de Charmois  du XIV-XVIe siècles, bâti sur un plan rectangulaire, avec de fortes courtines et aux angles, des tours, et corps de logis, dont un donjon carré, remanié au XVIIe siècle, et détruit en 1786,.                                                              Le manoir de Beunas est également toujours visible, démoli puis rebâti en 1867.","habitants":"Famille Pelletier\r\n        \"","divers":"Château de Charmois, d'Abon  et de Beunas à Maux","gps":"","images":["../../jctruffet.com/image/image_58/58_Maux_1.jpg","../../jctruffet.com/image/image_58/58_Maux_2.jpg","../../jctruffet.com/image/image_58/58_Maux_3.jpg"]},"Consult_chateau_formulaire0b60":{"id":"Consult_chateau_formulaire0b60","dept":"58","canton":"Imphy","commune":"Saincaize-Meauce","nom":"Meauce_Saincaize","type":"Vestiges-Châteaux","periode":"XIII-XVII","histoire":"A Saincaize le château de Meauce du XIIIe et XVIIe siècle et la maison forte de Sallay du XVIe siècle.                                        MEAUCE, au seigneur de Meauce de 1254 à 1281, Hugues III de 1296 à 1330, puis Guillaume de 1330 à 1349. En 1349, le fief passe à Étienne de Monturuc, son fils fait passer Meauce à Renaud de Roffignac, dont le fils reprendra la charge. Bonne d'Artois, comtesse de Nevers, y installera une garnison vers les années 1420, qui en 1422, sera sous les ordres de Jean de La Rivière. Trois ans après le traité d'Amiens en 1423, Guyot de Roffignac reprendra possession du fief de Meauce et sa famille le conservera pendant un siècle et demi. Meauce appartient à la famille Merigot de 1690 à 1772. Le château avait été adjugé le 28 janvier 1690 à Anne Voillaud, femme de Jean Baptiste Merigot, intendant du duc de Nevers. Il est revendu en 1772 à Benoît Moreau des Marais, maître de forges. Il passe par alliance à la famille Tiersonnier, dont certains membres sont enterrés dans la petite chapelle du village de Meauce. Il est vendu ensuite à la famille Héron de Villefosse. Il appartient ensuite à la famille de Vaivre, propriétaire du bien depuis 1969.                                      Dans la commune le manoir de SALLAY du XVIe siècle  hôtel.","architecture":"Meauce; édifié sur le rocher de Rochefort, a été construit au XIIIe siècle. En partie détruit au cours des premiers épisodes de la guerre de cent ans par les Anglais, il fut reconstruit aux environs de 1383. Un titre de cette époque fait état de lacquisition dun pré dans lenceinte des fossés de Melsia nouvellement édifié. Entouré de fossés alimentés par les eaux de lAllier et par la suite par le ruisseau de Rochefort et fortifié dune enceinte circulaire.  Sa forme circulaire et polygonale lui donne lapparence dune immense tour. Il se présente sous laspect dun château rond renfermant une cour intérieure. De la forteresse primitive, il ne reste que des murs épais de lenceinte, murs qui par endroits ont plus de 3 mètres dépaisseur et auxquels des bâtiments de diverses époques ont été appuyés. Lélément le plus élégant de la cour intérieure est une tour hexagonale à pans comportant à sa partie supérieure une pièce carrée dont les angles sont en encorbellement. Elle est flanquée dune tourelle en surplomb à cul-de-lampe mouluré, abritant un escalier qui menait à la guette.  Les anciennes archères ont été ouvertes en fenêtres carrées dont les unes sont moulurées et les autres, à moulures piriformes, offrent des croisillons. Ces fenêtres ont été ouvertes à louest et au sud. La porte de la tour est surmontée dun arc ogival orné dun écusson et de lambrequins détériorés lors de la Révolution. On peut retrouver les traces dun écusson au-dessus de lune des fenêtres extérieures du sud-est. Sallay; de plan rectangulaire, toit à deux pans accolé d'un côté d'une tour carré et de l'autre d'une tourelle  octogonale à toit pointu.","habitants":"Famille d'Étienne de Monturuc\r\n        \"","divers":"Château de Meauce  et de Sallay à Saincaize","gps":"","images":["../../jctruffet.com/image/image_58/58_Meauce_Saincaize_1.jpg","../../jctruffet.com/image/image_58/58_Meauce_Saincaize_2.jpg","../../jctruffet.com/image/image_58/58_Meauce_Saincaize_3.jpg","../../jctruffet.com/image/image_58/58_Meauce_Saincaize_4.jpg","../../jctruffet.com/image/image_58/58_Meauce_Saincaize_5.jpg","../../jctruffet.com/image/image_58/58_Meauce_Saincaize_6.jpg","../../jctruffet.com/image/image_58/58_Meauce_Saincaize_7.jpg","../../jctruffet.com/image/image_58/58_Meauce_Saincaize_8.jpg","../../jctruffet.com/image/image_58/58_Meauce_Saincaize_9.jpg"]},"Consult_chateau_formulaire75d8":{"id":"Consult_chateau_formulaire75d8","dept":"58","canton":"Varzy","commune":"Menou","nom":"Menou","type":"Château","periode":"XVII","histoire":"MENOU, au Moyen-Age une demeure seigneuriale qui dépendait des Nanvignes qui en 1625 Marie Brisson dame de Nanvignes  épousé François de Menou de Charnissay. La demeure seigneuriale ayant brûlé en 1672  reconstruction du château de 1672 à 1684  et en 1697 François de Menou est maître-d'hôtel de la reine Anne de Bretagne; Philippe est chambellan de Louis IX, ambassadeur en Espagne.  Les biens confisqués à Jean de Menou et à son fils Pierre au duc de Bourbon,  pour l'indemniser des dommages commis par Pierre de Menou contre ses châteaux de Saint-Rémy en l'Eau et  La Hérelle. Les Menou marient un des leurs, René, à Claude du Fau,   Jean-Pierre de Menou époux de Jacqueline le Normant, dame d'Herry,  Jean-Pierre de Menou appartient à la branche des seigneurs de Champlivault. Armand-François de Menou (des seigneurs de Boussay) obtient en 1697 que son fief de Nanvignes soit érigé en marquisat. En 1743 l'héritière de Menou épouse le comte louis-Alexandre de Damas-Crux  et en 1814 se  transmet par alliance d'Henriette de Montsoreau descendante des Damas au premier duc de Blacas d'Aups qui le conserveront  jusqu'en 1987, entre-temps  le château est abandonné au XXe siècle.  Et en 1987 date à laquelle il est acquis par monsieur Jean-Luc Gauzère et le décorateur Jacques Garcia qui ces derniers s'attachent à reconstituer le jardin à la française est transformé en parc à l'anglaise.","architecture":"MENOU   construit entre 1672 et 1684,  le château s'ouvre au fond d'une vaste cour d'honneur encadrée par des grands communs percés, au sud, d'arcades  cintrées . L'édifice un long corps de logis à deux niveaux flanqué de deux pavillons carrés  d'angle en légère saillie  sur lesquels  sont accolées de petits pavillons  d'angles  qui constituent l'édifice actuel, couverts de dômes à l'impériale. Le bâtiment central comporte  un avant corps en légère saillie,  terminé par un étage-attique supportant un fronton triangulaire que surmonte un dôme à pans sommé d'un lanternon. L'entrée côté cour par une porte à fronton  cintré portant des écussons. La partie centrale  du  bâtiment est coiffée d'un haut comble d'ardoise, et les pavillons à la française  porte une rangée régulière d'ils-de-buf.  En restauration depuis 1987, les douves (comblées au XVIIIe siècle) ont été restituées, le parc a été reconstitué dans son état du XVIIe siècle. Deux pièces ont gardé leur décor de panneaux peints du XVIIe siècle .","habitants":"Famille de  Armand-François  de Menou\r\n        \"","divers":"Château de Menou","gps":"","images":["../../jctruffet.com/image/image_58/58_Menou_1.jpg","../../jctruffet.com/image/image_58/58_Menou_2.jpg","../../jctruffet.com/image/image_58/58_Menou_3.jpg","../../jctruffet.com/image/image_58/58_Menou_4.jpg","../../jctruffet.com/image/image_58/58_Menou_5.jpg"]},"Consult_chateau_formulairebc45":{"id":"Consult_chateau_formulairebc45","dept":"58","canton":"Luzy","commune":"Millay","nom":"Millay","type":"Château","periode":"XVIII","histoire":"deux châteaux à Millay celui de la Planche et de Magny.                   PLANCHE , en fond de vallée, le château de La Planche, Le fief est attesté dés le début du XVe siècle. Monsieur Coujard de La Planche, conseiller général de la Nièvre, propriétaire actuel, a rebâti le château. Nous n'avons pas d'autres informations sur cet élément non visité et qui reste à dater.                                                                            MAGNY pas d'information historique.","architecture":"En fond de vallée, le château de la Planche daterait du XVIIIe siècle et fut peut-être remanié au XIXe siècle. On ignore si un château médiéval le précédait, le long et large corps de bâtiment, de plan symétrique, sur deux niveaux et combles aménageables, est flanqué de quatre tours rondes à chaque angle. La majeure partie de l'édifice existait déjà en 1844. en plein cintre en entrée pavillon sur  deux étages et sur colonnes gothiques avec fronton triangulaire fenêtre jumelée avec galbe pinacle.                                    Magny, de plan carré à deux niveaux et attiques,   en façade plein cintre pavillon saillant avec lucarne en comble et  à l'opposé deux pavillons saillants de même niveau à toitures pointue et sur le côté une tour hexagonale  dépassant l'ensemble d'un étage à toit pointu à quatre pans.","habitants":"M. Coujard de La Planche\r\n        \"","divers":"Château de Laplanche et de Magny à Millay","gps":"","images":["../../jctruffet.com/image/image_58/58_Millay_1.jpg","../../jctruffet.com/image/image_58/58_Millay_2.jpg","../../jctruffet.com/image/image_58/58_Millay_3.jpg","../../jctruffet.com/image/image_58/58_Millay_4.jpg","../../jctruffet.com/image/image_58/58_Millay_5.jpg","../../jctruffet.com/image/image_58/58_Millay_6.jpg","../../jctruffet.com/image/image_58/58_Millay_7.jpg"]},"Consult_chateau_formulaire62f1":{"id":"Consult_chateau_formulaire62f1","dept":"58","canton":"Moulins-Engilbert","commune":"Villapourcon","nom":"Moines","type":"Château","periode":"XVIII","histoire":"MOINES, occupé par des moines à l'origine ;  demeure du colonel François Marie Leblanc en 1764 , époux de Jeanne Dubois, jusqu'au premier Empire, lequel, chef de brigade,  il avait eu une fille, Anne, sa descendance Antoinette qui se maria à Villapourçon en 1818 avec Lazare Etienne Breugnot, eut une liaison avec Michel Bogros, marié avec Françoise Devoucoux,  puis François Marie Leblanc se retira comme marchand à Autun où il mourut vers 1840, vendit le château au baron Jean Marie Félix Cottu, issu d'une famille de l'ancienne noblesse du Soissonnais, fils de Jean-François et de Marie-Madeleine (Catherine Bertille César Olympe) de Fity-Patrick, époux en 1856 d'Agathe Henriette Elisabeth Le Nain, lequel le remania pour lui donner son aspect actuel mais ne l'habita qu'en été ; il eu trois enfants. Jean Marie Felix,  à sa  mort  le château des  Moynes est reprit par sa belle-sur. C'est actuellement, via un mariage contracté en 1920 entre Elisabeth (Marie Antoinette) Cottu, petite-fille de Jean Marie Félix, et Ferdinand (Henri Joseph Charles) de Larminat, une propriété des de Ganay, Roseline de Larminat (1921), une de leur fille, qui habite actuellement à Paris, s'étant mariée en 1953 à Villapourçon avec le comte Pierre-Armand-François de Ganay.","architecture":"La demeures des moines  est composé d'un corps de logis rectangulaire à douze travées la partie central comprend six travées en deux étages et un fronton en coupole sur la toiture en croupe, et les deux ailes  sur les autres côtés sont accolés au bâtiment central avec lucarnes sur combles.","habitants":"Colonel François Marie Leblanc\r\n        \"","divers":"Château des Moines à Villapourcon","gps":"","images":["../../jctruffet.com/image/image_58/58_Moines_1.jpg","../../jctruffet.com/image/image_58/58_Moines_2.jpg"]},"Consult_chateau_formulaire39bb":{"id":"Consult_chateau_formulaire39bb","dept":"58","canton":"Tannay","commune":"Moissy-Moulinot","nom":"Moissy_Moulinot","type":"Maison forte","periode":"XVII","histoire":"MOISSY, après avoir été la propriété des Chastellux, Jean de Chastellux qui meurt en 1333 était seigneur de Bazoches, Moissy et Chitry, des La Perrière puis des Veilhan, le château  échoit par alliance en 1667 à César Louis du Puy, baron d'Avrigny. En 1731 il est acquis par Barthélemi Guillaume de Sermizelles qui avait épousé en 1720  Marie-Anne, fille de Charles Mérat, substitut au procureur du Roi à Auxerre et d'Anne Bouchet de Bazoches. Une des descendantes de Barthélemi Guillaume de Sermizelles, peut-être Mlle de Goy, vend le domaine en 1831 à la famille Perrier originaire de Château-Chinon. Après la mort de Germain Perrier en 1916, le château et la terre de Moissy sont revendus à la famille Billardon qui l'a cédé depuis à M. et Mme Duffour, les actuels propriétaires.","architecture":"Le château de Moissy, comme le logis annexe, est une construction de la première moitié du XVIIe siècle. En revanche, le bâtiment nord des communs, sans doute plus tardif, a été agrandi après 1835. A la même époque fut détruite la tour ronde qui faisait pendant au colombier au sud.  Un portail couvert, précédé d'une allée axiale rectiligne bordée de tilleuls, donne accès à la cour antérieure. Le bâtiment d'habitation est de plan rectangulaire flanqué de deux pavillons sur les angles postérieurs ; le logis annexe, plus bas, est situé au même alignement, au nord. Le bâtiment allongé des communs, en retour d'équerre, ferme la cour au nord. Il abrite sous le même toit logement de domestiques, remise, granges et écuries. La porte charretière gauche est couverte d'un arc en anse-de-panier, celle de droite s'ouvre sous un arc en plein-cintre. Colombier de plan circulaire à l'ouest du château. Sous la remise ouverte implantée à gauche de la cour une échelle de meunier donne accès au comble d'un long bâtiment de dépendance contigu. Les étages du logis, simples en profondeur, sont desservis par un escalier central ; cheminée monumentale engagée dans le mur droit, au rez-de-chaussée.","habitants":"Famille de  César Louis du Puy\r\n        \"","divers":"Château de Moissy et son pigeonnier à Moissy Moulinot","gps":"","images":["../../jctruffet.com/image/image_58/58_Moissy_Moulinot_1.jpg","../../jctruffet.com/image/image_58/58_Moissy_Moulinot_2.jpg","../../jctruffet.com/image/image_58/58_Moissy_Moulinot_3.jpg"]},"Consult_chateau_formulaire740d":{"id":"Consult_chateau_formulaire740d","dept":"58","canton":"Tannay","commune":"Monceaux le Comte","nom":"Monceaux_Sermizelle","type":"Manoir","periode":"XVII","histoire":"A Monceaux le Comte, tire son nom dun château des comtes de Nevers, il était le chef-lieu de la châtellenie de Monceaux le Comte et de Neuffontaines ruines féodales et manoir de Sermizelle. SERMIZELLE  été le siège dune ancienne châtellenie formée avec la commune voisine de Neuffontaines et rattaché au XVIIe siècle au duché de Nevers, Monceaux a gardé quelques pr
