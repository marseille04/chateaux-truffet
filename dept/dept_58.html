écieux souvenirs du passé : Ancien manoir de Sermizelle qui perdit son dernier comte en 1834, le Comte Barthélémy Olivier Guillaume de Sermizelles.\r\n MONCEAUX le COMTE qui doit son nom  à l'appartenance  de la même famille possédant le fief de Metz-le-Comte, shonore davoir vu naître Colon de Montfort, célèbre médecin de Louis XV et Louis XVI et, parmi nos contemporain, le général Lorillot.","architecture":"Autour de son château, des fortifications du Moyen-Age il ne reste, que des ruines de l'enceinte et une tour découronnée, des morceaux dépaisses murailles,  et du château des comtes de Nevers une tour octogonale  avec une porte sculptée. Le manoir de Sermizelles est visible depuis la rue de la République, une imposante et belle bâtisse rectangulaire, flanquée dune magnifique tour hexagonale, de pierre couverte dune toiture de petites tuiles plates en terre cuite. Au cours de la période révolutionnaire de la convention nationale (1792-1795), la commune porta provisoirement le nom de Monceaux sur Yonne.","habitants":"Docteur Colon de Montfort\r\n        \r\n        \r\n        \"","divers":"Manoir de Sermizelle à Monceaux le Comte","gps":"","images":["../../jctruffet.com/image/image_58/58_Monceaux_Sermizelle_1.jpg","../../jctruffet.com/image/image_58/58_Monceaux_Sermizelle_2.jpg","../../jctruffet.com/image/image_58/58_Monceaux_Sermizelle_3.jpg","../../jctruffet.com/image/image_58/58_Monceaux_Sermizelle_4.jpg"]},"Consult_chateau_formulaire93ec":{"id":"Consult_chateau_formulaire93ec","dept":"58","canton":"Saint-Saulge","commune":"Saint-Franchy","nom":"Mongazon","type":"Château","periode":"XVI","histoire":"MONGAZON, il est cité dans les textes dès 1406, sous le nom de Maulgazon, puis de Montgayson.  En 1230, Mahaut, comtesse de Nevers, publie une charte en faveur des habitants des neuf paroisses du Val de Lurcy qui dépendaient du château de Montenoison. En 1316, Guillaume rend hommage pour la maison forte et la seigneurie de  Saint-Francon,  en 1327, même hommage de la part de Yolande de la Tournelle et de Guillaume de Marcy. En 1337, dans lhommage rendu par Jean de la Chaume et Alips  du fort de Saint-Franchy. En 1367, Marguerite de Frasnay, épouse de Guy de la Tournelle est appelé  Dame  de Saint-Franchy, en 1384, elle rend hommage aux comtes pour la \" Maison Fort\". Les fiefs de Mongazon et de Boulon étaient dans létendue de la paroisse de Saint-Franchy.  En 1464, le jeune Louis Ogier, écuyer, est représenté par Pierre Moreau, également écuyer, pour lhommage quil fera lui-même en 1472, sa fille ayant épousé Gibault de la Perrière ; la seigneurie de Saint-Franchy passe dans cette famille. En 1597, Léonard de la Perrière, époux dAntoinette de Pontailler.  Les fiefs de Mongazon et de Boulon étaient dans létendue de la paroisse de Saint-Franchy, ils furent donnés en 1665 à Charles de Chéry, par la dame de Quinquet. En 1741, la dernière seigneurie est achetée par Depréz de Bligny.","architecture":"Mongazon reconstruit le château sur lemplacement de lancienne maison-forte qui avait été élevée elle-même à lendroit, daprès la légende, où existait lantique ermitage de Saint-Franchy. Cest alors un petit manoir composé de deux ailes à toit élevé, disposées en équerre et entourées de larges douves où coulent les sources de la Nièvre de Saint-Franchy. Il fut brûlé par larmée allemande en août 1944.","habitants":"Famille de  Charles de Chéry\r\n        \"","divers":"Château de Mongazon à Saint-Franchy","gps":"","images":["../../jctruffet.com/image/image_58/58_Mongazon_1.jpg","../../jctruffet.com/image/image_58/58_Mongazon_2.jpg","../../jctruffet.com/image/image_58/58_Mongazon_3.jpg","../../jctruffet.com/image/image_58/58_Mongazon_4.jpg","../../jctruffet.com/image/image_58/58_Mongazon_5.jpg","../../jctruffet.com/image/image_58/58_Mongazon_6.jpg","../../jctruffet.com/image/image_58/58_Mongazon_7.jpg"]},"Consult_chateau_formulaire0ef4":{"id":"Consult_chateau_formulaire0ef4","dept":"58","canton":"Moulins Engilbert","commune":"Saint-Honoré les Bains","nom":"Montagne_Morvan","type":"Château","periode":"XVIII","histoire":"MONTAGNE,  François de Damas, baron de Digoine, seigneur de la Montagne et de Beauréduit, fut chambellan de Philippe le Bon. Il épousa en 1497, Jeanne de Saint-Palais et vendit la seigneurie de la Montagne à la maison de la Boutière. Quelques années plus tard, Charles de la Boutière revend cette terre à Guillaume des Jours, seigneur de Moutceau, lequel en 1536 épouse Catherine dame de Grandrye.  Son beau-frère, Charles de Grandrye fait saisir la terre de la Montagne  en 1545 et ses requêtes n'aboutirent qu'en 1549. Sans postérité, il légua ses biens à sa femme et à ses deux neveux. Le partage attribua la terre de la Montagne à Guillaume de Grandrye et entra dans la carrière militaire. Il fut chambellan du duc d'Alençon, le frère de Charles IX. Ambassadeur à Constantinople de 1566 à 1570, il retrouva en 1571 son château entièrement ruiné. L'adjudication de la seigneurie  en 1596 à Jean de Chandon, conseiller du roi . Il eut trois filles et c'est l'aînée Anne de Chandon qui porta en dot la Montagne à Ponthus de Cyberand, écuyer, seigneur. Sa fille: Geneviève-Antoinette de Séve, n'ayant pas de postérité vendit sa seigneurie en 1714 au sire Claude François Sallonyer de Montbaron, décéda en 1745, laissant sa seigneurie à son fils Jean-Marie Sallonyer de Montbaron. Qui décide de reconstruire un nouveau château, au décés de monsieur de Sallonyer il laissa ses biens aux enfants de sa cousine germaine qui vendirent le domaine  en 1786 à Antoine Pierre de Viel de Lunas, chevalier et à son frère Antoine Louis François de Viel de Lunas d'Espeuilles. Pierre de Viel de Lunas, resta célibataire et laissa la seigneurie à son frère. Le fils de Louis de Viel de Lunas d'Espeuilles, Antoine Théodore de Viel de Lunas d'Espeuilles, sera conseiller général de la Nièvre et sénateur de l'Empire.","architecture":"Il s'agit de la première place-forte située sur la Vieille-Montagne, au sud-est du village. D'abord oppidum gallo-romain puis château fort, La Montagne occupe une position stratégique entre Bourgogne, Nivernais et Bourbonnais. Le château est détruit par les armées italiennes et allemandes entre 1512 et 1533. Ce quil en reste et les terres y attenant sont achetés par Guillaume des Jours, qui entreprend la construction d'un nouveau château fort, à l'emplacement actuel, plus accessible et plus agréable à vivre. Il est en partie démoli par un violent orage en 1773 avant d'être reconstruit en 1776 sur les plans de l'architecte Jean-Baptiste Caristie, il avait conservé ses fossés qui étaient encore remplis d'eau en 1786. La demeure est constituée d'un grand corps de logis à trois niveaux et rangé de lucarnes dans les comble à la Mansart, flanqué de deux ailes à deux niveaux toiture à la mansart également  dont celle de gauche se termine par une chapelle.","habitants":"Famille de Jean-Marie de Sallonyer\r\n        \"","divers":"Château de Montagne à Saint-Honoré les Bains","gps":"","images":["../../jctruffet.com/image/image_58/58_Montagne_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Montagne_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Montagne_Morvan_3.jpg"]},"Consult_chateau_formulaire5b61-2":{"id":"Consult_chateau_formulaire5b61-2","dept":"58","canton":"Saint-Saulge","commune":"Montapas","nom":"Montapas","type":"Château","periode":"XVII","histoire":"MONTAPAS, château de Lucy de la seigneurie d'Espeuilles était un grand fief, relevant du comte de Nevers, à cause de la châtellenie de Saint-Saulge. Au XIIe siècle elle appartenait à la maison de Beaumont. En 1436, un démembrement de la maison de Beaumont en évoque la maison-forte, ses fosses, sa basse-cour et sa grange. Au XVIe siècle, la famille d'Anzely acquiert la seigneurie, et en 1535, Claude, Jean-Philibert et Imbert d'Anzely rendent hommage à la comtesse de Nevers, Marie d'Albret, pour Espeuilles, Sermentray, Montapas et autres lieux. En 1550, il épouse Gilberte de Rabutin et, en 1556, il achète la seigneurie de Saint Benin des Champs. C'est la famille dAnlezy qui fait construire le château actuel au début du XVIIe siècle. En 1684, Claude Girard, secrétaire du Roi et maître des eaux et forêts du Nivernais, achètent la propriété. La famille Viel de Lunas l'acquiert par mariage en 1750. Antoine Louis François Viel de Lunas d'Espeuilles, garde écossaise, gardes du corps du roi, marquis d'Espeuilles. Antoine Théodore Viel de Lunas d'Espeuilles, au château de la Montagne, marquis d'Espeuilles, agronome, conseiller général de la Nièvre, sénateur du second empire, maire de Saint-Honoré-les-Bains, créateur de la poterie de la Montagne et rénovateur des Thermes de Saint-Honoré-les-Bains.","architecture":"château de Montapas dit de Lucy dit Espeuilles construit au début du XVIIe siècle par François d'Anlezy, seigneur d'Espeuilles, quadrilatère, entrée par un porche tour carrée, Il comprend deux corps de logis à un niveau avec lucarnes, éclairés par de larges baies. Un ancien oratoire, édifié au début du XVIIe siècle, complète lensemble. Il est endommagé par un incendie en 1754, puis dévasté par les sans-culottes en 1793.","habitants":"Famille dAnlezy\r\n        \"","divers":"Château d'Espeuilles et de Lucy à Montapas","gps":"","images":["../../jctruffet.com/image/image_58/58_Montapas_1.jpg","../../jctruffet.com/image/image_58/58_Montapas_2.jpg","../../jctruffet.com/image/image_58/58_Montapas_3.jpg"]},"Consult_chateau_formulaire80b5":{"id":"Consult_chateau_formulaire80b5","dept":"58","canton":"Primery","commune":"Montenoison","nom":"Montenoison","type":"Vestiges","periode":"XIII","histoire":"Ruines féodales du XIIIe siècle du château des comtes de Nevers à Montenoison  et à quelques kilomètres au nord le château de Champlin.  MONTENOISON, en 1115, on parle de Joselinus de Montenoison; on sait d 'autre part qu'en 1119, le couvent de Bourras fut fondé par Hugues de Tily, seigneur de Champlemy et sa femme Adélaïde de Montenoison. Ce couvent de Bourras fut le lieu de sépulture des seigneurs de Montenoison, à l'exception de ceux qui furent comtes ou ducs de Nevers.  Le puissant château de Montenoison fut reconstruit en 1217 par Mahaut de Courtenay. Par la suite, il fut très mal entretenu et finit par tomber en ruine au XVIIIe siècle. De ce formidable manoir il ne reste que des débris de murs, et au nord deux tourelles en encorbellement sur de fortes ogives, ainsi que, derrière celles-ci, deux nervures croisées qui soutenaient le plafond d'un corps de garde. Du XIIIe siècle, Montenoison devient la propriété des comtes de Nevers jusqu'au XVIIIe siècle. Le dernier seigneur fut le duc du Nivernais Mazzarini Mancini. Il n'habitat jamais son duché, ministre d'état, membre de l'académie française il appartenait à la minorité libérale de la noblesse; arrêté le 13 septembre 1793, il fut libéré en août 1794. Dépouillé  de la plus grande partie de sa fortune, de son beau château ducal de Nevers, de ses forêts d'Entrains de Donzy, il avait suffisamment d'esprit pour sestimer heureux d'avoir conservé sa tête.                                                                                      CHAMPLIN pas d'information historique.","architecture":"La butte de Montenoison est une butte-témoin (altitude 417 mètres), visible à plus de 30 kilomètres à la ronde. Occupée depuis le Néolithique, elle se situe au croisement de deux voies romaines. Au XIIe siècle, Mahaut de Courtenay, comtesse de Nevers, y fit construire une forteresse, aujourd'hui ruinée.   la butte aurait été fortifiée par une enceinte de 5 tours qui renfermait un temple dédié à César. Au Moyen-Age, une cité féodale et un château appartenant aux comtes de Nevers furent construits, ainsi qu'une maladrerie. Chaque année un banquet médiéval anime la butte à la fin du mois d'août.  Au-dessous, devait se trouver la salle de justice, donnant elle-même sur une sorte de réduit supposé être les \"oubliettes\" . Des ossements humains y furent découverts lors des fouilles en 1840. L'année 1917-1918, l'archiviste départemental signale dans son rapport annuel au préfet qu'à la mairie,  les vieux actes énumérant les droits des habitants dans les bois ont été reliés en un volume intitulé \"Usages de Montenoison\".                             Champlin, de plan en U, trois corps de logis à deux niveaux avec toits en croupes avec lucarnes, pavillons carrés et rectangulaires  aux extrémités.","habitants":"comtes de Nevers\r\n        \"","divers":"Vestiges féodales à Montenoison et château de Champlin","gps":"","images":["../../jctruffet.com/image/image_58/58_Montenoison_1.jpg","../../jctruffet.com/image/image_58/58_Montenoison_2.jpg","../../jctruffet.com/image/image_58/58_Montenoison_3.jpg","../../jctruffet.com/image/image_58/58_Montenoison_4.jpg","../../jctruffet.com/image/image_58/58_Montenoison_5.jpg"]},"Consult_chateau_formulairefd56":{"id":"Consult_chateau_formulairefd56","dept":"58","canton":"Châtillon en Bazois","commune":"Montigny sur Canne","nom":"Montigny_Canne","type":"Château","periode":"XIX","histoire":"Plusieurs châteaux à Montigny sur Canne, les ruines féodales du Bois-Joly, le château du Bailly, de Montigny du XIXe siècle, de Brèche du XIXe siècle, de Bron et de Vallerins,  pas d'information historique  pour ces châteaux.                                           \r\n BAILLY,  château de style renaissance date de la fin du XIX siècle gîtes de France, pas d'information historique.  Ancien Château : Construction étagée de la fin du XVe siècle au XIXe siècle. Intéressant colombier. Deux tours rondes vers la Canne. Maison natale de Henry Foucaud.                                           \r\nMONTIGNY La paroisse de Montigny fut érigée vers lan 1110 et dépendait de larchiprêtré de Moulins Engilbert, vassal du seigneur de Cercy, le baron de Montigny avait droit de haute et basse justice. Plusieurs fiefs se sont établis à proximité : Bussière qui dépendait de la châtellenie de Decize, Pron et La Châtonnière dépendant de celle de Cercy-la-Tour, possession des familles de Montigny et Chaugy.","architecture":"Bailly, de plan rectangulaire à deux niveaux, lucarnes dans les combles très inclinés, pavillon d'entrées de trois travées saillants avec toit à l'impérial, la bâtisse est flanqué de deux tourelles rondes sur les angles en façades.   Brèche de plan rectangulaire à deux niveaux et attiques flanqué d'un pavillon rectangulaire saillant sur la gauche de deux niveaux et attiques plus lucarnes dans les combles. Le vieux château corps de logis de plan en U à deux niveaux avec lucarnes sur combles  deux tours rondes à toits coniques.","habitants":"Baron de Montigny\r\n        \"","divers":"L'ancien château , celui de Brèches et du Bailly à Montigny sur Canne.","gps":"","images":["../../jctruffet.com/image/image_58/58_Montigny_Canne_1.jpg","../../jctruffet.com/image/image_58/58_Montigny_Canne_2.jpg","../../jctruffet.com/image/image_58/58_Montigny_Canne_3.jpg","../../jctruffet.com/image/image_58/58_Montigny_Canne_4.jpg","../../jctruffet.com/image/image_58/58_Montigny_Canne_5.jpg","../../jctruffet.com/image/image_58/58_Montigny_Canne_6.jpg","../../jctruffet.com/image/image_58/58_Montigny_Canne_7.jpg"]},"Consult_chateau_formulaireec9e-2":{"id":"Consult_chateau_formulaireec9e-2","dept":"58","canton":"Château-Chinon","commune":"Lavault de Frêtoy","nom":"Montmartin_Morvan","type":"Château","periode":"XIX","histoire":"MONTMARTIN  a été bâti en 1873 par Hugues de Chambure dont le père Eugène est l'auteur du fameux Glossaire du Morvan.","architecture":"Montmartin entre Lavault-de-fretoy et Frétoy domine un château du XIXe siècle A flanc de colline il a gardé son style renaissance sur trois niveaux percés de nombreuses baies, avec sa tour hexagonale, ses dépendances, fermes et parc. Le château n'a pas été visité.  une motte cylindrique peu élevée, d'environ 30 m de diamètre et entourée d'un fossé qu'on retrouve encore, d'origine surement féodale.","habitants":"Famille de  Hugues de Chambure\r\n        \"","divers":"Château de Montmartin à Lavault de Frêtoy","gps":"","images":["../../jctruffet.com/image/image_58/58_Montmartin_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Montmartin_Morvan_2.jpg"]},"Consult_chateau_formulaire1c80":{"id":"Consult_chateau_formulaire1c80","dept":"58","canton":"Saint-Pierre le Moutier","commune":"Fleury sur Loire","nom":"Motte_Farchat","type":"Château","periode":"XV-XVI","histoire":"MOTTE-FARCHAT,  plusieurs fiefs dans les châtellenies de Moulins Engilbert et de Cercy la Tour, les chevaliers de Ferrechat  possédaient également des terres sur la rive gauche de la Loire en 1323, notamment à Magny. Dès le milieu du XIVe siècle, La Motte-Farchat appartient à la famille Saunier de Foulet, noble homme jehan, seigneur de Follet, de Thory sur Abron, de Lamotte-Ferrechat, terre et chastel de Varennes les Breschards, conseiller et chambellan du Roy notre sir, maître d'hôtel de madame Isabeau duchesse de Bourbonnais, et mourut en 1389. Ses petits-fils, Philibert de Follet, écuyer, et Jean de Follet, écuyer, maître de l'hôtel de Charles de Bourbon, archevêque, comte de Lyon, possédaient La Motte-Farchat en 1450. Le fils de Jean de Follet, Philibert de Foulet, écuyer, échanson du duc de Bourbon, était seigneur de La Motte-Farchat en 1476, il était également seigneur de Réville dans la châtellenie de Montluçon. Enfin, Anne de Follet, femme de Jean de La Rivière Bastard, était dame de La Motte-Farchat en 1496. La Motte-Farchat passe en 1505 à Louis Trousseau, puissant seigneur de Rosemont. Dix ans plus tard, sa fille l'apporte en mariage à Guillaume de Villaines, maitre des comptes du roi à Moulins et c'est à cette famille que l'on doit la construction du château renaissance. Par alliance, la seigneurie de la Motte-Farchat revient à la famille Richard de Soustrait en 1785, aux Benoist dAzy au cours du siècle suivant et enfin aux Rérolle.","architecture":"La Motte-Farchat du XVe -XVIe- XIXe Siècle, construit sur l'emplacement d'une ancienne motte féodale dans le style dAmboise, avec un étage sur rez-de-chaussée surélevé et un étage de combles. Le château fût endommagé durant la guerre de cent ans. Au XIXe siècle, la façade nord est flanquée dune tour ronde et dune tour carrée sur angles. Deux tourelles abritant les escaliers sont accolées aux pignons. La porte centrale du corps de logis est surmontée dun écusson aux armes des Villaines et dune niche ornée dune coquille. Létage de combles est éclairé par trois fenêtres lucarnes encadrées de pilastres. Elles sont surmontées de frontons sculptés et de pinacles.","habitants":"Famille Saunier de Foullet\r\n        \"","divers":"Château de la Motte-Farchat à Fleury sur Loire","gps":"","images":["../../jctruffet.com/image/image_58/58_Motte_Farchat_1.jpg","../../jctruffet.com/image/image_58/58_Motte_Farchat_2.jpg","../../jctruffet.com/image/image_58/58_Motte_Farchat_3.jpg","../../jctruffet.com/image/image_58/58_Motte_Farchat_4.jpg"]},"Consult_chateau_formulairef844":{"id":"Consult_chateau_formulairef844","dept":"58","canton":"Donzy","commune":"Perroy","nom":"Motte_Josserand","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux à Perroy celui de la Motte-Josserand du XIVe siècle et celui de la Garde du XVIe siècle.  \r\nMOTTE-JOSSERAND,  vers 1250, Josserand de La Rivière. Châtellenie des Donzy ; et  en 1332 à Gilles de Sully seigneur de Beaujeu, passe à Jean de  Melun, fidèle du roi et comte de Tancarville  et par alliance passe à Alexandre de Bazoches, son fils Jean obtient vers la fin du XIVe siècle l'autorisation du duc de Bourgogne  Jean sans Peur de construire le château pour renforcer ces défenses, avant poste du château comtal de Donzy. Il fut d'abord occupé par le routier Arnaud de Cervole en 1356, puis cédé au capitaine Perrinet Gressard vers 1426, dont la veuve le vendra en 1446 au chancelier Guillaume Juvenal des Ursins, vicomtes de Troyes.  Il échoit au XVIe siècle par un jeu d'alliances aux de L'Hôpital, qui le conservent pendant 150 ans. Le plus célèbre seigneur de la Motte-Josserand de cette lignée d'origine italienne, est Nicolas de L'Hôpital, duc de Vitry, maréchal de France.  Mais  en 1644 passe à la famille de Brancas, le fief et le château sont vendus à de riches parlementaires, et divisés en deux lots qui ne seront réunis qu'à la veille de la Révolution. Son déclin se confirmait.  En 1853 la famille Montmignault propriétaire d'une moitié du bâtiment depuis la Révolution acquiert l'ensemble.\r\nLa GARDE, On sait peu de choses des débuts du fief de la Garde. Il a pu appartenir lui aussi aux sires de Saint-Verain ou aux Varigny, qu'on rencontre à Vergers (Suilly-la-Tour) non loin en aval sur la rivière. Quoiqu'il en soit, le fief passa à Jean de La Rivière-Champlemy en 1461, par acquisition et resta dans une branche de cette famille jusqu'au début du XVIIIe siècle. Ils ont tenu ce fief des origines au XVIIe siècle, à lextinction de la lignée masculine.","architecture":"La Motte Josserand est une forteresse un de ces châteaux de plaine du Moyen-Age, dont l'emplacement ne fut pas choisi au hasard. Enfoncé dans une cuvette naturelle, la barrière d'eau lui a donné des douves de 200 à 300 mètre de large. Edifiée au XIIIe siècle pour se protéger. De plan quadrangulaire, les tours d'angles sont plus massives  et moins élevées que celle des édifices construit de l'époque. Il comportait trois éléments principaux : La basse-cour, premier enclos fortifié,. Un terre-plein entouré de murs et de fossés servant de défense avancée. Une porte que précédait un pont-levis à disparue lors du comblage des fossés, Elle protégeait le pont levis, et le château qui seul, subsiste aujourd'hui. La basse-cour à peu près intacte jusqu'en 1948, a été détruite. Le seul vestige qui reste est la cheminée qui faisait partie de la tour carrée. Elle a été reconstruite vers le chemin d'accès extérieur.  Le plan du château, comme celui de la plupart des châteaux de plaine est régulier et symétrique: quatre pavillons rectangulaires sont reliés entre eux par des chemins de ronde. Ils forment les côtés d'un vaste rectangle dont les angles sont occupés par quatre tours circulaires. L'ensemble de ces constructions entoure une cour intérieure. On y pénètre par le portail d'entrée au rez-de-chaussée du pavillon sud. Au cours des siècles, trois des quatre chemins de ronde disparaissent. Deux chemins de ronde seront transformés en galerie au XVIIIe siècle. Au XIXe siècle, à la suite d'un incendie, une petite habitation remplacera le troisième chemin de ronde.                         La Garde, le château dit « de la Rivière » quils ont sans doute fondé, plusieurs fois rebâti et transformé au fil des siècles, conserve, entouré de ses douves, une certaine majesté malgré des errances architecturales.  De style néo-gothique et de plan rectangulaire à trois niveaux flanqué de deux pavillons rectangulaires avec lucarnes sur combles et pavillon d'entrée légèrement saillant avec sur toit sortie carrée à toit à quatre pans.","habitants":"Chancelier Guillaume Jouvenel des Ursins                                       Nicolas de L'Hôpital                                                              \r\nJean de La Rivière-Champlemy\r\n        \"","divers":"Château de la Motte-Josserand et le château de la Garde","gps":"","images":["../../jctruffet.com/image/image_58/58_Motte_Josserand_1.jpg","../../jctruffet.com/image/image_58/58_Motte_Josserand_2.jpg","../../jctruffet.com/image/image_58/58_Motte_Josserand_3.jpg","../../jctruffet.com/image/image_58/58_Motte_Josserand_4.jpg","../../jctruffet.com/image/image_58/58_Motte_Josserand_5.jpg","../../jctruffet.com/image/image_58/58_Motte_Josserand_6.jpg"]},"Consult_chateau_formulairece13":{"id":"Consult_chateau_formulairece13","dept":"58","canton":"Moulins-Engilbert","commune":"Moulins-Engilbert","nom":"Moulins_Engilbert","type":"Vestiges","periode":"XIII","histoire":"Trois châteaux à Moulins-Engilbert,  dont celui de Moulins-Engilbert, celui de la Vilaine  du XIVe siècle de Mary du XIVe siècle et ses dépendances, un logis seigneuriale  dit Pavillon et les ruines féodales du XVe siècle.  Château de Villaine du XVIe siècle, propriété privée.\r\n MOULINS-ENGILBERT, au  XIIIe siècle le château passe au comte de Nevers. La  ville est fortifiée au XVe siècle.  Le château est réaménagé, le donjon est rebâti. En décembre 1290, mariage au château de Louis Ier de Nevers avec Jeanne de Rethel. De 1424 à 1440, suite au mariage de Philippe le Bon et Bonne d'Artois, les enfants ducaux y grandissent.  En 1475, les troupes royales et bourguignonnes se disputent la ville et le château.  Durant la Révolution Française, il est vendu comme bien national. En 1853, un notaire local, Victor Moreau, en fait l'acquisition et y établit des espaces de circulation, une perspective depuis l'entrée, plante un pin Laricio et d'autres arbres dans la haute-cour. Il  s'active surtout à la préservation et à la consolidation des ruines sur un mode digne du romantisme.  Est ensuite acheté par la municipalité en 2006 à la commune de Saint-Honoré qui le possédait depuis 1910. De 2008 à 2010, le mur sud du logis est rénové.\r\nVILLAINE au sud-est de Moulins-Engilbert,  le hameau de Villaine possède une maison forte avec une tour-porche carrée à assommoirs du XVe siècle.\r\nMARY et ses dépendances du XV et XVIIIe siècle.","architecture":"Moulins-Engilbert, fin du Xe siècle, début XIe siècle,  des constructions pour cette période en opus spicatum (en forme d'arêtes de poissons) dans la base du donjon et dans la haute cour.\r\nDébut XIe siècle, un bâtiment est additionné à l'est du donjon sur lequel il s'appuie. Entre 1383 et 1390, la chambre des comptes du Duché de Bourgogne indique d'importants travaux de remise en états des défenses et des bâtiments.\r\nLes vestiges  du château est une structure allongée orientée nord-sud d'environ 150 m de long. Dans la basse cour, le mur Est n'est pas tout à fait rectiligne tandis que le mur ouest a  la forme d'un arc de cercle avec une cinquantaine de mètres dans sa plus grande largeur. Une haute cour occupe le tiers nord et domine une basse-cour. Ce qui reste du donjon occupe l'angle sud-ouest de la haute cour. L'entrée depuis laquelle on voit le donjon se fait au sud par un châtelet de 15 m sur 15 m environ. L'aspect actuel est celui désiré par Victor Moreau, vers la fin des années 1870 que l'« association des amis du Vieux Château » et la municipalité font perdurer. Au XVIIIe siècle, les tours d'entrée font office de prison.   Villaine manoir  de style campagnard flanqué de deux tours carrées  à deux niveaux avec dépendances à l'arrière.  MARY, ce château médiéval reconstruit au XVIIIe siècle sur un important site gallo-romain, conduisant à St-Honoré-les-Bains est inaccessible. On peut toutefois admirer depuis la route les bâtiments du moulin de Mary, sur la Dragne, à 300 mètres au sud du château, ainsi que les culées du pont romain qui franchissait la rivière et la levée de la voie antique aboutissant à cet ancien pont.","habitants":"Les comtes de Nevers\r\n        \"","divers":"Vestiges féodales, château de Villaine et de Mary  à Moulins-Engilbert.","gps":"","images":["../../jctruffet.com/image/image_58/58_Moulins_Engilbert_1.jpg","../../jctruffet.com/image/image_58/58_Moulins_Engilbert_2.jpg","../../jctruffet.com/image/image_58/58_Moulins_Engilbert_3.jpg","../../jctruffet.com/image/image_58/58_Moulins_Engilbert_4.jpg","../../jctruffet.com/image/image_58/58_Moulins_Engilbert_5.jpg","../../jctruffet.com/image/image_58/58_Moulins_Engilbert_6.jpg"]},"Consult_chateau_formulaire6d85":{"id":"Consult_chateau_formulaire6d85","dept":"58","canton":"Corbigny","commune":"Mouron sur Yonne","nom":"Mouron_Coulon","type":"Château","periode":"XVI-XIX","histoire":"A Mouron-sur-Yonne  des ruines féodales du XVe siècle de Thaveneau, château de Coulon du XVIe siècle avec tours, les Grange aux dîmes, XIIe- XVIe siècle et château de Thaveneau du Xve siècle.\r\nMOURON du Xve siècle pas d'information historique.                           COULON, il  est facile d'imaginer le sort qui fut réservé à la forteresse de Coulon, postée en sentinelle sur le chemin du Morvan, lorsque, à une lieue de là, les troupes de Louis XI affrontèrent en 1475 celles du duc de Bourgogne qu'elles anéantirent.  Est reconstruit en 1546 par la famille de Montsaulnin sur les bases d'une ancienne forteresse médiévale. La famille huguenote de Blosset en devient propriétaire suite au mariage de Ravan de Blosset avec Marie Tixier, dame de Coulon. Le château devient l'un des lieux de la religion protestante. Au XVIIIe siècle, il passa par mariage à Claude Étignard de La Faulotte de Neuilly, secrétaire du roi près le parlement de Grenoble et grand propriétaire. Les Blosset conservèrent l'édifice jusqu'au milieu du XVIIIe siècle, ensuite de nombreux propriétaires s'y succédèrent. Actuellement c'est la famille Sancy de Rolland qui le  possède.\r\n THAVENEAU est daté des XIVe-XVe-XIXe siècles,  il doit son nom à une villa romaine située à proximité, Tavos. En 1468 la forteresse deviens manoir. Au XVe siècle il appartient à la famille de la Tournelle, puis a la famille Carreau  en 1540. En 1676 Jean Millin en  il ne lhabitera jamais. Le château est racheté en 1718 par un négociant en bois. Ancien château et hameau, de la commune de Mouron sur Yonne et fief du vassal de labbaye Saint-Léonard de Corbigny.","architecture":"Mouron, construction du XVe siècle, quadrangulaire à deux niveaux, trois corps de logis et attiques et lucarnes sur toit accolé de  tours rondes  aux angles avec toit en poivrières et échauguettes sur angles avant.                                          \r\nCoulon,  Il est facile d'imaginer le sort qui fut réservé à la forteresse de Coulon, postée en sentinelle sur le chemin du Morvan, lorsque, à une lieue de là, les troupes de Louis XI affrontèrent en 1475 celles du duc de Bourgogne qu'elles anéantirent.  Au XVIe siècle, le château de Coulon devient un des foyers les plus importants de la religion protestante en Nivernais. Le château ainsi que divers éléments de son environnement (les communs, le colombier, le parc, le portail, les terrasses,  bassins et le pressoir).                                                                        Thaveneau, style maison forte du XVe siècle à deux niveaux toit en croupes accolés de deux tours rondes sur angles  dont une à toit à deux pans. Aujourd'hui remanié avec jardin à la française.","habitants":"Famille de Montsaulnin\r\n        \"","divers":"Château de Mouron, de Thaneveau et de Coulon à Mouron sur Yonne","gps":"","images":["../../jctruffet.com/image/image_58/58_Mouron_Coulon_1.jpg","../../jctruffet.com/image/image_58/58_Mouron_Coulon_2.jpg","../../jctruffet.com/image/image_58/58_Mouron_Coulon_3.jpg","../../jctruffet.com/image/image_58/58_Mouron_Coulon_4.jpg","../../jctruffet.com/image/image_58/58_Mouron_Coulon_5.jpg","../../jctruffet.com/image/image_58/58_Mouron_Coulon_6.jpg"]},"Consult_chateau_formulaire2719":{"id":"Consult_chateau_formulaire2719","dept":"58","canton":"Pouilly sur Loire","commune":"Mesves- sur loire","nom":"Mouron_Mesves","type":"Château","periode":"XIX","histoire":"MOURON,  construction néo Renaissance commanditée par Philippe de Bourgoing, propriétaire des filatures DMC et des Compagnies transatlantique et des chemins de fer de l'Est. L'architecte Adolphe Bouveault réalise le projet en 1869 dans un style éclectique faisant référence au \"style anglais Tudor\". La collaboration entre l'architecte et son client semble étroite (importance du décor héraldique).  Aujourd'hui institut médical pédagogique Edouard Seguin, racheté en 1956 à la ville de Corbeil-Essonnes, ce château accueille aujourdhui le centre Edouard Seguin qui est devenu un institut médico-éducatif accueillant 55 jeunes jusquà 16 ans.","architecture":"Le monument commémoratif situé au sud du bourg,  Le château de Mouron date du milieu du XIXe siècle et abrite aujourdhui linstitut médico-pédagogique Edouard Seguin, abritant les enfants en internat. Corps de logis à trois niveaux rectangulaire avec des pavillons saillants sur les cotés formant ailes sur façades avant et arrière. Sur la façade avant plein cintre donjon crénelé vestibule d'escalier dépassant l'ensemble avec deux tourelles hexagonales l'une dépassant le donjon crénelée l'autre de trois niveaux crénelées également.","habitants":"Baron Philippe de Bourgoing\r\n        \"","divers":"Château de Mouron et de Villaine à Mesves sur Loire","gps":"","images":["../../jctruffet.com/image/image_58/58_Mouron_Mesves_1.jpg","../../jctruffet.com/image/image_58/58_Mouron_Mesves_2.jpg","../../jctruffet.com/image/image_58/58_Mouron_Mesves_3.jpg","../../jctruffet.com/image/image_58/58_Mouron_Mesves_4.jpg"]},"Consult_chateau_formulaire4787":{"id":"Consult_chateau_formulaire4787","dept":"58","canton":"Primery","commune":"Moussy","nom":"Moussy","type":"Château","periode":"XIV","histoire":"MOUSSY, le vieux château de Moussy fait partie dun des cent vingt et un fiefs de la châtellenie de Montenoison. En 1648 naît à Moussy Anne Henri dArmes, comte de Busseaux.   Fief de la famille Pracomtal, le château passe entre de nombreuses mains, avant dêtre racheté en 1975 par lactuel propriétaire, depuis 1992 devenu par héritage la propriété de monsieur Olivier Rolland.","architecture":"Moussy, construit en récupérant les pierres de lancien château du XIVe siècle, lépaisseur des murs est denviron 1.40 mètres. Lédifice est de plan barlong, il se présente sous la forme dun édifice modeste de deux étages, reliés par un escalier à vis. Côté jardin, des fenêtres ont été ouvertes au XIXe siècle. La cour est fermée par des murs denceinte plus anciens et de part et dautre des communs, on trouve une tour de défense du XIVe siècle. Au moment de lachat en 1975, le domaine est en piteux état, sans portes ni fenêtres, lintérieur dévasté, les communs effondrés et les deux tours denceinte partiellement arasées. Le propriétaire actuel et sa famille lance une campagne de travaux jusquen 1995, procédant à la reconstruction des communs, au ravalement des façades, à la construction dune terrasse. Deux différentes époques marquent lhistoire du lieu, le XVe siècle et la deuxième moitié du Xve siècle. Sous lécu du porche dentrée est gravée une date 1686. Devant la battisse dhabitation, une belle tourelle descalier, lenceinte du château possède encore deux belles tours. Au centre de la cour un puits avec une pompe et un abreuvoir.","habitants":"Famille Pracomtal\r\n        \"","divers":"Château de Moussy","gps":"","images":["../../jctruffet.com/image/image_58/58_Moussy_1.jpg","../../jctruffet.com/image/image_58/58_Moussy_2.jpg","../../jctruffet.com/image/image_58/58_Moussy_3.jpg","../../jctruffet.com/image/image_58/58_Moussy_4.jpg","../../jctruffet.com/image/image_58/58_Moussy_5.jpg"]},"Consult_chateau_formulaire6d4f":{"id":"Consult_chateau_formulaire6d4f","dept":"58","canton":"Cosnes sur Cours","commune":"Myennes","nom":"Myennes","type":"Château","periode":"XVII","histoire":"MYENNES, en 1661, Myennes fut érigée en marquisat en faveur de René de Vieilbourg, seigneur du lieu.                                            Myennes appartient successivement à la famille du Deffens, au début du Xve siècle, à Charles de Bourgogne, comte de Nevers, en 1450, à Henriette de Clèves, duchesse de Nevers, à la fin du XVIe siècle puis, enfin, à la famille de Vieilbourg.                                            Au Nord à la Celle-sur-Loire le château de Valkyrie sans information historique.","architecture":"Château de Myennes du XVIIe siècle, restauré au XIXe siècle, composé d'un corps de logis rectangulaire à deux niveaux  flanqué plein cintre d'un pavillon à trois travées et trois niveaux toit en croupes et sur la partie opposée une tourelle aux angles avec toit en poivrières.                                                                    \r\nValkyrie de plan rectangulaire à trois niveaux avec lucarnes sur combles flanqué sur la droite d'un pavillon rectangulaire saillant avec terrasses sur colonnes  et à gauche d'une tour ronde  à trois niveaux à toit en poivrières.","habitants":"Famille de Vieilbourg.\r\n        \"","divers":"Château de Myennes et château de Valkyrie à la Celle sur Loire","gps":"","images":["../../jctruffet.com/image/image_58/58_Myennes_1.jpg","../../jctruffet.com/image/image_58/58_Myennes_2.jpg","../../jctruffet.com/image/image_58/58_Myennes_3.jpg","../../jctruffet.com/image/image_58/58_Myennes_4.jpg","../../jctruffet.com/image/image_58/58_Myennes_5.jpg"]},"Consult_chateau_formulairec2cb":{"id":"Consult_chateau_formulairec2cb","dept":"58","canton":"Pougues les Eaux","commune":"Pougues les Eaux","nom":"Métairies_Soulagy","type":"Château","periode":"XVIII","histoire":"METAIRIES  à Pougues les eaux,  propriété de la famille  Bert de Labussière, il soutient les philosophes tels que Jean Jacques Rousseau. Le prince de Conti fréquentait Pougues-les-Eaux de manière assidue jusquen 1769. Ses venues étaient très appréciées par la population  en raison des divertissements quil organisait et de sa générosité. Nous croyons que le prince a séjourné dans son hôtel particulier qui abrite aujourdhui le centre aéré de la commune. Il fit planter une allée de tilleuls dHollande sur la route de son hôtel aux Eaux de Pougues, qui porte aujourdhui le nom dAvenue Conti,   industriel et chevalier de la légion dhonneur, Clément Marien Chapal possédait à Pougues une résidence secondaire : la villa de la Montjaie. NEUILLY La gentilhommière du XVIIIe siècle, entièrement rénovée, est classée  trois épis par gîtes de France, Chayphet et Jean-Patrick Pinet des Écots.                                  A quelques kilomètres à l'ouest à Gremagny sur Loire le château de Soulagy.","architecture":"Métairies; manoir de style néo-classique du XIXe siècle, d'un corps de logis rectangulaire de deux niveaux  flanqué plein cintre en façade d'un pavillon saillant hectogonal à deux niveaux surmonté d'un toit pointu avec lanternon sur lequel se trouve une lucarne stylé de flamboyant, et sur les côtés de la façade un pavillon carré de deux travées à trois niveaux  sur les extrémités saillant  avec lucarnes gothiques sur comble, toit à coiffe pyramidal quatre pans  très pointu.                                                                                Soulagy,  château dont le corps de logis à deux niveaux et trois travées  avec lucarnes sur toit brisés flanqué aux extrémités de pavillon carré de même hauteur mais à toit à quatre pans.","habitants":"Le Prince de Conti\r\n        \r\n        \"","divers":"Château de la Métairies à Pougues les Eaux et le château de Soulagy à Germigny sur Loire et de Neuilly.","gps":"","images":["../../jctruffet.com/image/image_58/58_Metairies_Soulagy_1.jpg","../../jctruffet.com/image/image_58/58_Metairies_Soulagy_2.jpg","../../jctruffet.com/image/image_58/58_Metairies_Soulagy_3.jpg","../../jctruffet.com/image/image_58/58_Metairies_Soulagy_4.jpg","../../jctruffet.com/image/image_58/58_Metairies_Soulagy_5.jpg","../../jctruffet.com/image/image_58/58_Metairies_Soulagy_6.jpg"]},"Consult_chateau_formulaireb491":{"id":"Consult_chateau_formulaireb491","dept":"58","canton":"Montsauche les Settons","commune":"Montsauche les Settons","nom":"Nataloup","type":"Château","periode":"XIV","histoire":"NATALOUP,  cité en 1558, Nataloux était une seigneurie en toute justice appartenant à labbesse de Rougemont, reprise en fief par Louise dAvaucourt en 1675, puis au comte de Montal, Charles de Montsaulnin. Nataloux était une seigneurie en toute justice  Le manoir appartient depuis le XVIIe siècle à la famille Pelletier. Il fut remanié en 1825. La cadastre napoléonien de  Nataloup (1825-40) semble indiqué le manoir avec deux tours Le village fut en grande partie détruit le 25 juin 1944 par les troupes allemandes qui se retiraient, puis reconstruit. Durant cette terrible tragédie la collection communale des registres paroissiaux, détenue en mairie depuis la Révolution Française disparut en fumée. 40 ans plus tard, le 25 juin 1984, le Président François Mitterrand rendit hommage au village meurtri, en dévoilant une plaque commémorative.","architecture":"Nataloup, manoir  le corps de logis avec deux tours, avec mâchicoulis disparue aujourd'hui. On peut voir une haute tour ronde demi hors-uvre engagée au centre du corps de logis à deux étages et de plan rectangulaire. Le toit à quatre pans du corps de logis est couvert en ardoises, et celui, conique, de la tour en tuiles plates de Bourgogne. Lensemble du bâtiment a conservé un bel aspect ancien.","habitants":"Charles de Montsaulnin\r\n        \"","divers":"Château de Nataloup approximité de Montsauche les Settons","gps":"","images":["../../jctruffet.com/image/image_58/58_Nataloup_1.jpg"]},"Consult_chateau_formulaire560c":{"id":"Consult_chateau_formulaire560c","dept":"58","canton":"Nevers","commune":"Nevers","nom":"Nevers_Chateaux","type":"Château","periode":"XVII","histoire":"GLORIETTE, le petit château dit de Gloriette, Marguerite de France veuve du comte Louis II donna le château de Gloriette  aux religieux en 1363, ils y vivent jusqu'en 1550 date de leurs expulsions par Lévêque de Nevers Arnauld Sorbin. Le bâtiment de style italien est construit par Charles Ier de Gonzague, son fils Charles en poursuit laménagement au début du XVIIe siècle. Il formait un cloître autour de deux cours successives. Il donnait au nord sur la rue des Ouches. Le bâtiment devient tour à tour:  siège de la justice de paix en 1815, du tribunal de commerce en 1825, de lécole denseignement mutuel en 1828, du centre départemental de documentation pédagogique de 1958 à 1973, de lécole communale du « Château » de 1836 à 1981. Le bâtiment est placé à côté des locaux de la police de la ville de Nevers, sur la place des reines de Pologne. Le 2 août 1805 la municipalité de Nevers décide laménagement dune salle de spectacle dans le château de la Gloriette.","architecture":"Gloriette, les façades et toitures du pavillon  date du début du XVIIe siècle  :  Différents types de châteaux à Nevers  de la maison forte, du manoir et châteaux néogothiques, Renaissance, contemporain.  La Gloriette a été construite au XIXe siècle sur les bases d' un ancien château du XVe siècle dont subsistent les tours. Il est constitué d' un corps principal auquel est adossé une chapelle à l' arrière, et d' une aile en retour d'équerre. Cette aile le relie au châtelet d' entrée qui donne accès à une cour autour de laquelle sont organisées les dépendances. Les façades sont en pierre enduite, et les encadrements des baies et des fenêtres à meneaux sont en pierre de Bourgogne sculptée : choux frisés, grotesques sur les retombées des linteaux, blasons, corniches. Quelques bandeaux en briques apportent une touche colorée aux façades.","habitants":"Charles Ier de Gonzague\r\n        \"","divers":"Divers châteaux à Nevers la Gloriette , les Tourettes, les Tournelles, le Four de Vaux","gps":"","images":["../../jctruffet.com/image/image_58/58_Nevers_Chateaux_1.jpg","../../jctruffet.com/image/image_58/58_Nevers_Chateaux_2.jpg","../../jctruffet.com/image/image_58/58_Nevers_Chateaux_3.jpg","../../jctruffet.com/image/image_58/58_Nevers_Chateaux_4.jpg"]},"Consult_chateau_formulaire54fe":{"id":"Consult_chateau_formulaire54fe","dept":"58","canton":"Nevers","commune":"Nevers","nom":"Nevers_Palais_Ducal","type":"Palais","periode":"XV","histoire":"NEVERS, le premier château édifié par Pierre de Courtenay, empereur latin d'Orient, époux d'Agnés de Nevers héritière du comté. En 1369 Marguerite de Flandre, comtesse de Nevers épouse Philippe le Hardi duc de Bourgogne, Jean de Bourgogne, comte de Nevers dit de Clamecy qui entreprend la construction du palais ducal en 1464,  en lieu et place de son ancienne forteresse, par alliance le comté passe au début XVIe siècle à la famille de Cléves. En 1538 François de Cléves nommé duc époux de Marguerite de Bourbon, sa fille Henriette duchesse à la mort de ses frères épouse en 1565 Louis de Gonzague, fils du duc de Mantoue. Henri III élu roi de Pologne sa descendance, Marie-Louise de Gonzague-Nevers, reine de Pologne, épouse de Ladislas IV Vasa puis de Jean II Casimir Vasa. Marie Casimire Louise de La Grange d'Arquien, reine de Pologne, épouse de Jean III Sobieski. Louis-Jules Mancini-Mazarini, duc de Nevers, ambassadeur, poète et académicien.  Madame de Cossé-Brissac, héritière du dernier duc de Nevers, vend le château et ses dépendances à la ville et au département en 1810. L'édifice est alors partagé entre la mairie et le tribunal de justice jusqu'en 1850, date à laquelle la municipalité s'installe dans le nouvel hôtel de ville édifié par Paillard. La justice investit dès lors la totalité du bâtiment et le transforme. Ce ne sont pas les premières modifications mais, en 1850, elles sont plus radicales et plus profondes. La distribution originelle des salles ne pouvant satisfaire aux besoins de l'administration judiciaire, elle est entièrement transformée dans un esprit plus fonctionnel. Restauré sur ordre de Pierre Bérégovoy dans les années 1980.","architecture":"le Palais Ducal fut construit  en 1460, résidence des comtes et des Ducs de Nevers.  D'inspiration gothique, il présente un avant-goût de la Renaissance: symétrie et régularité dans la façade, décoration des lucarnes,  un corps de logis de 50 mètres de long la façade nord est percée d'une porte, un corps de logis de 50 mètres, le splendide escalier d'honneur qui prend place dans la tourelle centrale avec sa large façade Renaissance, encadrée de tourelles polygonales et de fausses draperies. Les deux grosses tours postérieures sont les plus anciennes, à savoir du XVe siècle. Remanié au XVIe siècle,  conçu comme une façade pour affirmer le prestige de la cité des ducs pour qui la découvrait depuis la Loire. Longtemps, il a accueilli le palais de Justice. Rénové au début des années 1990, il est pour partie affecté au services municipaux dont il représente une annexe de l'hôtel de ville. Il fait face à la place de la République, sommet de la butte de Nevers et qui recèle des ruines gallo-romaines. Ainsi qu'une exposition permanente sur l'histoire et les atouts de la ville.","habitants":"Comte  Jean de Clamecy\r\n        \"","divers":"La Palais ducal et l'hôtel de ville de Nevers","gps":"","images":["../../jctruffet.com/image/image_58/58_Nevers_Palais_Ducal_1.jpg","../../jctruffet.com/image/image_58/58_Nevers_Palais_Ducal_2.jpg","../../jctruffet.com/image/image_58/58_Nevers_Palais_Ducal_3.jpg","../../jctruffet.com/image/image_58/58_Nevers_Palais_Ducal_4.jpg","../../jctruffet.com/image/image_58/58_Nevers_Palais_Ducal_5.jpg"]},"Consult_chateau_formulaire9d3c":{"id":"Consult_chateau_formulaire9d3c","dept":"58","canton":"Nevers","commune":"Nevers","nom":"Nevers_Patrimoine","type":"Patrimoine","periode":"XV","histoire":"NEVERS, le nom vient de celui de la rivière Nièvre, présence de vestiges gallo-romains sous le palais ducal. Cette cité est évangélisée au IIIe siècle, puis devient le siège de l'évêché au VIe siècle. Capitale du comté héréditaire de Nevers en 992, la ville se fortifie sous l'influence de Pierre II de Courtenay en 1194. La ville appartient successivement aux familles de Courtenay, de Bourbon, aux maisons de Flandre, de Bourgogne-Franche-Comté, de Clèves et de Gonzague. L'Abbaye de Saint-Martin d'Autun, possède en 1347, quelques murailles et quelque emplacement  de maisons dans la rue de la Parcheminerie, qu'elle donne à bail. La ville est alors fortifiée, une partie importante des remparts subsiste encore de bel exemple d'architecture militaire destiné à affirmer le pouvoir urbain. Elle réunit le concept de tour-porte placée devant la muraille afin de mieux défendre celle-ci et le symbole de tour-maîtresse se dressant contre l'intrus et contrôlant les visiteurs. Le comté fut transformé en duché en 1538 et acheté par Jules Mazarin pour son neveu Philippe Mancini en 1659.\r\nEn prévision des états généraux de 1789, Mr Larenne curé de St-Martin de Nevers  est élu député du clergé.","architecture":"La ville est alors fortifiée, une partie importante des remparts subsiste encore dont la Porte du Croux, bel exemple d'architecture militaire destiné à affirmer le pouvoir urbain. Elle réunit le concept de tour-porte placée devant la muraille afin de mieux défendre celle-ci et le symbole de tour-maîtresse se dressant contre l'intrus et contrôlant les visiteurs. Outre les aménagements traditionnels comme les échauguettes d'angles et les mâchicoulis, elle inclut des innovations plus modernes comme la séparation des accès piétonnier et charretier ainsi qu'un pont-levis à flèche. Pour faire face aux progrès de l'artillerie, la Porte du Croux est dotée d'une avant-porte désaxée par rapport à la porte principale. Porte du Croux  du XIVe siècle et tour Goguin : vestiges des anciens remparts.\r\nPorte de Paris  du XVIIIe siècle : arc de triomphe élevé pour célébrer la victoire de Fontenoy en 1745, il porte une épitaphe de Voltaire. Malheureusement, la Révolution l'a privé de toute sa décoration sculptée. \r\nL'Hôtel de Ville de 1830 à 1850 de style néo-classique.","habitants":"familles de Courtenay\r\n        \"","divers":"La porte de Paris, du Croux, remparts de la tour du Havre, des Carmelites, la tour Coffy-Gognin, la tour Saint-Eloiet la tour Saint-Trohé","gps":"","images":["../../jctruffet.com/image/image_58/58_Nevers_Patrimoine_1.jpg","../../jctruffet.com/image/image_58/58_Nevers_Patrimoine_2.jpg","../../jctruffet.com/image/image_58/58_Nevers_Patrimoine_3.jpg","../../jctruffet.com/image/image_58/58_Nevers_Patrimoine_4.jpg","../../jctruffet.com/image/image_58/58_Nevers_Patrimoine_5.jpg","../../jctruffet.com/image/image_58/58_Nevers_Patrimoine_6.jpg","../../jctruffet.com/image/image_58/58_Nevers_Patrimoine_7.jpg","../../jctruffet.com/image/image_58/58_Nevers_Patrimoine_8.jpg","../../jctruffet.com/image/image_58/58_Nevers_Patrimoine_9.jpg"]},"Consult_chateau_formulaire77a9":{"id":"Consult_chateau_formulaire77a9","dept":"58","canton":"Guerigny","commune":"Nolay","nom":"Nolay","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Nolay, celui de Prunevaux du XVIIIe siècle et de Rigny du XVIIIe siècle.                                                PRUNEVAUX,  le fief des Prunevaux   était autrefois fief de la châtellenie de Montenoison, tout comme Nolay et Martangy.  Le château a appartenu à la noble famille Leroy de Prunevaux depuis 1668. De cette période brillante de Prunevaux, subsistent le parc dessiné par Le Nôtre,  Ernest Lafond était propriétaire du château de Prunevaux, le château qui à sa mort en 1880, a été vendu.  Cest au XVIe siècle quarrivèrent, de Lorraine des maîtres-verriers qui sinstallèrent à la Verrerie, ont leur doit les vitraux du Prieuré. Une ancienne légende nous conte qua minuit chaque jour, la dame blanche vient dans lallée de Mousseaux et sy entretient avec le diable.   Aujourd'hui propriété de madame Tallon.                         RIGNY Pas d'information historique.","architecture":"Prunevaux, un château daté du XVIIIe siècle et qui est remanié au XIXe siècle. Il fut édifié sur les ruines dune maison forte, dont il ne reste que des fondations et des caves voûtées, de conception rectangulaire à deux niveaux toit en croupes.  On peut y voir un château du XVIIIe remanié au XIXe. Il fut édifié sur les ruines d'une maison forte dont il reste des fondations et des caves voûtées.  Au hameau des Gobets, a vraisemblablement existé une communauté de cultivateurs dont on retrouve la trace dans le nom de certaines familles de la commune: Cebet, Goby, Gobier. On peut encore y admirer le lavoir, d'une grande originalité, témoin de cette époque.","habitants":"Famille Leroy de Prunevaux\r\n        \"","divers":"Château de Prunevaux à Nolay et la Villacharmante","gps":"","images":["../../jctruffet.com/image/image_58/58_Nolay_1.jpg","../../jctruffet.com/image/image_58/58_Nolay_2.jpg","../../jctruffet.com/image/image_58/58_Nolay_3.jpg","../../jctruffet.com/image/image_58/58_Nolay_4.jpg"]},"Consult_chateau_formulairee857":{"id":"Consult_chateau_formulairee857","dept":"58","canton":"Pouilly sur Loire","commune":"Pouilly sur Loire","nom":"Nozet_Pouilly","type":"Château","periode":"XIX","histoire":"POUILLY,  À la fin du XIe siècle, il constitue la propriété des Bénédictins de La Charité-sur-Loire, devenus seigneurs temporels de Pouilly par suite du don que leur avait fait Humbault le Blanc avant de partir en croisade. La terre et la maison seigneuriale du Nozet a été donnés en 1234 aux bénédictins de la Charité par « Arnault.   Au XVe siècle  devient la propriété  de la famille Dubroc  qui le conservera  jusqu'en 1723, Ruiné et rebâti à plusieurs reprises, il a été réédifié une dernière fois en 1651.  À la Révolution, le château devient un bien national. Il est acquis, au début du XIXe siècle par la famille Lafond, qui avait pris possession quelques années auparavant du château du Nozet.  En 1723, Claude Vaillant de Guélis, ancien avocat au parlement. 1764 : Claude Marie Dodart, « chevalier, mestre de camp de cavalerie, chevalier de lordre royal militaire de Saint-Louis, seigneur de cette paroisse.  En 1764 la nouvelle cession intervient au profit de Claude-Marie Dodart seigneur de Saint-Andelain meurt en 1773 , Charlotte-Marguerite Menou de Chantivaut conservera le château jusquen 1792, passe à Adélaïde-Flore de Vaugny,  en 1798 sa veuve Charlotte-Marguerite de Menou  vend le Nozet à Etienne Louis Lafond, et vers 1850 reconstruction du château, de style Renaissance, par le fils d'Etienne-Louis  Lafond, Antoine-Narcisse Lafond, ancien député de la Nièvre. En 1911 la fille  de Louis comte de Lafond épouse le baron Maurice de Ladoucette, depuis 1972, le Baron Patrick de Ladoucette est le premier de sa famille à se consacrer  à la culture du vin, il appartenait autrefois à une fille illégitime du Roi Louis XV puis est devenu la propriété des Familles Ladoucette et Lafond, familles de banquiers, certains furent gouverneurs de la Banque de France, principale banque du pays à l'époque. Durant ces deux cents dernières années, le Pouilly Fumé de Ladoucette fut le vin produit pour le prestige de la famille.","architecture":"Pouilly Le vieux château,  depuis une petite rue longue et étroite montant depuis les bords de Loire jusqu'au centre bourg, se discernent les vestiges de l'ancienne forteresse médiévale qui faisait partie des défenses de la ville sur la Loire,  possédait une enceinte de forme rectangulaire,  l'enceinte était marquée à ses angles nord-est et sud-est par des tourelles et défendue par le château seigneurial   à l'intérieur de laquelle s'est développé le bourg a été construit dans le style renaissance au cours du XIXe siècle. Il est composé de deux corps de logis rectangulaires sur un plan en L. l'édifice richement ornementé est surmonté de tours aux toits d'ardoises.  Le Nozet; reconstruction du château en 1850 style néo-renaissance deux ailes en équerre sur trois niveaux dont un comble le corps de logis principal est éclairé par des fenêtres de différents types à meneaux ou simple à encadrements  moulurés. Le toit en ardoise, des lucarnes surmontées de fronton triangulaires  à  pinacles, l'édifice est flanqué à chacun de ses angles nord-est et sud-est d'une grosse tour ronde portant une couronne de faux mâchicoulis et coiffée d'une toiture en poivrière, une tour à pans coupés au centre de la  façade   sur le parc surmontée d'une flèche et d'une lanterne à l'angle sud-ouest une tourelle accolée en encorbellement sur un culot mouluré. Trois autres tourelles  deux à l'ouest et une en angle rentrant. L'aile en retour   à son angle nord d'une grosse tour identique à celle du corps principal, cette aile abrite en son centre la chapelle dont le chevet à cinq pans fait saillie  sur la façade ouest.","habitants":"Baron Patrick de Ladoucette                                                          Famille Lafond\r\n        \"","divers":"Château de Nozet-Pouilly","gps":"","images":["../../jctruffet.com/image/image_58/58_Nozet_Pouilly_1.jpg","../../jctruffet.com/image/image_58/58_Nozet_Pouilly_2.jpg","../../jctruffet.com/image/image_58/58_Nozet_Pouilly_3.jpg","../../jctruffet.com/image/image_58/58_Nozet_Pouilly_4.jpg","../../jctruffet.com/image/image_58/58_Nozet_Pouilly_5.jpg","../../jctruffet.com/image/image_58/58_Nozet_Pouilly_6.jpg"]},"Consult_chateau_formulaire606e-2":{"id":"Consult_chateau_formulaire606e-2","dept":"58","canton":"Tannay","commune":"Nuars","nom":"Nuars_Bouchet","type":"Château","periode":"XIV","histoire":"Deux châteaux à Nuars celui de Bouchet du XIVe siècle  et de Valette du deuxième Empire.                                                 BOUCHET,   fief des seigneurs du Bouchet, le château échut par alliance aux de  la Tournelle, puis aux Saint-Aubin avant d'appartenir aux la Perrière, Eglantine du Bouchet,  fille unique de Guy du Bouchet et veuve d'Etienne de la Tournelle, épousa vers 1357 Guyot de Saint Aubin, seigneur de Chalaux. Gabriel de la Perrière, fils de Claude de la Perrière et d'Anne de Rousset, et sa femme Charlotte de Montmorillon sont seigneurs du Bouchet en 1575. On retrouve la même famille dans la deuxième moitié du XVIIIe siècle avec Claude-François de la Perrière, né en 1752, écuyer, seigneur du Bouchet et de la Vergne.   En 1875, il restait deux tours assez bien conservées divisées en deux étages voûtés. Aujourd'hui à monsieur Eric Fulgueras.\r\n VALETTE  Edme Valeix, dit Valette, est âgé de 26 ans quand il arrive à Paris ; il est alors simple maçon. De chef d'équipe, il devient entrepreneur et fait très vite fortune, puisqu'en 1859 il fait un don  à la commune de Nuars, soit l'équivalent de deux années de salaire d'un terrassier. Revenu au pays, Valette entreprend la construction de ce château dans lequel il engloutit toute sa fortune, ruiné, il est contraint de vendre l'ensemble du domaine en 1895.","architecture":"Bouchet,  du château de plan  carré cantonné de puissantes tours rondes talutés ne subsistent que les deux tours orientales, ruinées en partie haute, des vestiges du mur d'enceinte et d'un bâtiment non identifié, au sud, ainsi qu'un bâtiment allongé, au nord ; ce dernier, très remanié, est constitué de deux corps d'habitation situés sous le même toit et flanqués, au même alignement, d'une grange entre deux étables. La façade antérieure du corps de logis central est en moyen appareil de pierre de taille ; un lourd bandeau sépare le rez-de-chaussée du haut comble aveugle.                                   Valette; une grande tour ornée de fleurs de lys en métal. La Tour de Nuars, le logis de plan massé, précédé d'un portail en fer forgé, est flanqué de deux corps latéraux situés en avancée sur la façade antérieure. Les deux façades ordonnancées sont distribuées par un escalier en fer à cheval. De vastes communs s'étendent au nord et la ferme du château, à l'arrière du logis, se signale par un colombier à cinq pans construit en bordure de la rue.","habitants":"Famille de Claude-François de la Perrière                                     Edme Valeix dit Valette\r\n        \"","divers":"Vestiges de Bouchet à  Nuars , manoir de la Valette et la tour de Guet","gps":"","images":["../../jctruffet.com/image/image_58/58_Nuars_Bouchet_1.jpg","../../jctruffet.com/image/image_58/58_Nuars_Bouchet_2.jpg","../../jctruffet.com/image/image_58/58_Nuars_Bouchet_3.jpg","../../jctruffet.com/image/image_58/58_Nuars_Bouchet_4.jpg","../../jctruffet.com/image/image_58/58_Nuars_Bouchet_5.jpg","../../jctruffet.com/image/image_58/58_Nuars_Bouchet_6.jpg","../../jctruffet.com/image/image_58/58_Nuars_Bouchet_7.jpg","../../jctruffet.com/image/image_58/58_Nuars_Bouchet_8.jpg"]},"Consult_chateau_formulairee615":{"id":"Consult_chateau_formulairee615","dept":"58","canton":"Moulins-Engilbert","commune":"Onlay","nom":"Onlay","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à Onlay, celui de Thard du XVe siècle,  et de Lesvault du XIXe siècle, chambres d'hôtes par madame Lee et monsieur Simonds, et de Niaux.                                       THARD, il date du XVe siècle: en 1442  à Jean de Perrigny, puis, par sa fille Marguerite, il appartient à Léonard de la Menue qui se disait seigneur de Thard, de Saint-Péreuse et de Saint Loup.  Il appartient aux familles Martin au XVIe siècle, Alloury et Gondier de la Vallée au XVIIe siècle et de nouveau à la famille Martin au XVIIIe siècle qui récupéra le domaine à travers Jean Martin de Thard du 1673  à 1729, seigneur de Thard en Nivernais, conseiller et procureur du Roi en la châtellenie de Glenne. Plus tard, à la fin du siècle, son descendant Jean Marie Martin jouera un rôle  pendant la Révolution.  Appartient au XIXe siècle, à la famille espagnole de Pascual Moreno de Mora qui épouse en 1847  Marie-Antoinette Martin de Thard.  Enfin, au XXe siècle la famille Villequetout devient propriétaire en 1890 par le mariage de Jules Louis de Villequetout avec Marie-Jeanne Moreno de Mora. Le manoir reste dans cette famille de père en fils jusquaux années cinquante. Il passera après à la famille Touraud et  en 1985, au Docteur André Dalloz Bourguignon. En janvier 2013, des nouveaux propriétaires dorigine suisse et espagnole en ont fait lacquisition. NIAUX;   fut rebâti au XVIIIe siècle, sur une ancienne maison forte ou château fort non daté,  la terre de Niaux seigneurie en toute justice appartenait au XVe à la maison d'Anglure. Puis au XVIIe siècle à celle du Cléroy et au début du XIXe siècle à Jacques Antoine de la Boulaye. Il a été rebâti après 1768 par Jacques Joseph comte du Cléroy. Le château a donc du être remanié au XIXe siècle.","architecture":"Lesvault, nous vous accueillons dans nos chambres et table d'hôtes. Situé en plein coeur du parc naturel régional du Morvan au sud de la Bourgogne, magnifique demeure du XIX siècle.               Niaux, vers 1854, il restait une tour et la cuisine abritant une vaste cheminée avec écusson.  Le château a du être remanié au XIXe siècle.  Il a l'aspect d'une grande demeure de deux niveaux, couverte par un long toit en ardoise avec croupes. La façade arrière comporte une tour.   Aujourd'hui, inséré dans une vaste exploitation agricole traversée par la route, le château n'est que peu visible. Il a l'aspect d'une grande demeure de deux niveaux, couverte par un long toit en ardoise avec croupes. La façade arrière comporte une tour. Nous n'avons pas d'autres informations de cet élément non visité.                                                                                 Thard; de plan rectangulaire à deux niveaux, toitures en croupes avec lucarnes, accolé d'une tour carrée de même niveaux à toit pointu l'édifice comporte des tours rondes un peu à l'écart à toit en poivrières.","habitants":"Famille de Pascual Moreno de Mora                                           Famille de Jacques Antoine de la Boulaye\r\n        \"","divers":"Château de Thard de Lesvault et de Niaux.","gps":"","images":["../../jctruffet.com/image/image_58/58_Onlay_1.jpg","../../jctruffet.com/image/image_58/58_Onlay_2.jpg","../../jctruffet.com/image/image_58/58_Onlay_3.jpg","../../jctruffet.com/image/image_58/58_Onlay_4.jpg","../../jctruffet.com/image/image_58/58_Onlay_5.jpg"]},"Consult_chateau_formulaire3257":{"id":"Consult_chateau_formulaire3257","dept":"58","canton":"Guérigny","commune":"ourouër","nom":"Ourouer","type":"Château","periode":"XVII","histoire":"Deux châteaux  à Ourouër, celui d'Aspiry du XVIIe siècle,de Nyon du XVIIIe siècle.                                                             \r\n ASPIRY, pas d'information historique.                                    NYON, Au milieu du XVIe siècle, la seigneurie de Nyon appartenait à Louis Olivier,  eut la seigneurie dArriaux, Antoine Olivier celle de Nyon et François du Broc la terre des Meures.  La fille d'Antoine, Étiennette épouse en 1671 François de Blanchefort, seigneur  Le 20 juin 1620, céda  à Alexandre de Pergues. Le 15 février 1642,  rachetée par leur fils Pierre Sallonyer, avocat. Il est échevin de Nevers de 1692 à 1693 et mourut en 1714, laissant la terre de Nyon à son fils Jean-Marie, à sa mort en 1756,  la transmit à son fils, Pierre. Il mourut à Nyon le 13 septembre 1797,  Il avait eu 10 enfants, parmi lesquels Louis Sallonyer, planteur à Saint-Domingue. En 1789, il vient en France,  il eut les biens de Nyon. Il avait eu une fille Marie-Jeanne-Jacques Sallonyer, dernière héritière, mariée à Antoine-Edme Rossin, receveur de domaines à Nevers. Louis Olivier et ses successeurs, les différents membres de la famille Sallonyer, appartenaient à la bourgeoisie. Du mariage Sallonyer-Rossin née Adéle en 1798, décédée en 1856 à Ourouër. Adéle Rossin épousa Joseph-Francois Moret, avocat. Il mourut  en 1826, ayant eu trois fils dont Louis-Ernest Moret, né le 5 mai 1819 à Nevers qui entra à lécole Navale en 1835. IL fit la campagne de Crimée et fut décoré de la Légion dHonneur en 1855, et promu capitaine de Frégate en 1861. Il mourut le 7 mars 1885. sa   fille, Herminie qui épousa en 1891 Marc-Marie-Etienne Héron de Villefosse. Nyon resta la propriété de la famille Moret jusquen 1918.  Ensuite, fut monsieur Boissonnet qui en devient propriétaire. Depuis 1956, il appartient à la famille Henry qui l'on transformé en chambres d'hôtes par Catherine Henry.","architecture":"NYON, petit château du XVIIIe, niché au creux dun vallon, dans un parc aux arbres centenaires.  Lancienne résidence seigneuriale, le château, édifice du XVIIe siècle a subi quelques modifications, il est bien conservée. Le corps principal du logis, qui est la partie la plus ancienne, na quun étage, elle est prolongé a louest par un pavillon de construction récente a deux étages. La façade sud, de niveau avec le parc, est précédée dune terrasse avec une belle grille. La façade nord possède un escalier semi-circulaire avec une rampe en métal dun joli travail. Au dessus de la porte de lescalier, on remarque un écusson dont les armoiries ont été abîmées. Une conduite deau, partant de la fontaine des Rapins, située à environ quinze cents mètres à lest, alimente le château de Nyon.","habitants":"Famille de Louis Sallonyer\r\n        \"","divers":"Château de Nyon à Aurouer","gps":"","images":["../../jctruffet.com/image/image_58/58_Ourouer_1.jpg","../../jctruffet.com/image/image_58/58_Ourouer_2.jpg","../../jctruffet.com/image/image_58/58_Ourouer_3.jpg","../../jctruffet.com/image/image_58/58_Ourouer_4.jpg"]},"Consult_chateau_formulaireb9f7":{"id":"Consult_chateau_formulaireb9f7","dept":"58","canton":"Pouges les Eaux","commune":"Parigny le Vaux","nom":"Parigny","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Parigny les Vaux, celui de Bizy du XVIIIe siècle et celui de Mimont.                                                                     BIZY, propriété familiale, du XVIIIe siècle.  Un premier château entre 1378 et 1460 qui a subi les ravages des anglais pendant la guerre de cent ans. Pierre Berthier, a fait construire un château en 1490 qui a été détruit par un incendie en 1702. L'actuel château a été bâti par Edouard Berthier en 1712, Jean-Jacques Rousseau y a séjourné.  \r\nSitué en pleine nature, en lisière de la forêt des Bertranges, c'est  aujourd'hui une pension pour animaux par monsieur Murard.\r\nMIMONT, le comte Paul de Lavenne de Choulot, descendant du roi Louis VI de France, par la maison capétienne de Courtenay (branche Bourbon-Courtenay, et par sa grand-mère, Marie de Quinquet de Choulot d'origine écossaise, naquit à Nevers, le 31 janvier 1794. Ses parents s'appelaient de Lavenne et c'est à lui-même qu'il fut donné d'ajouter au nom patronymique le titre de comte de Choulot, reçu du roi Louis XVIII, dont il était garde du corps avec rang de lieutenant de Cavalerie. Il mourut en 1864. Le comte de Choulot, célèbre paysagiste du XIXe siècle, vivait au château de Mimont il est inhumé dans le cimetière du village.  Transformé en exploitation agricole\r\nLa société Sarl Prégermain est dirigée par Maxime-Henri Prégermain.","architecture":"Parigny;   de plan rectangulaire à deux niveaux avec rangé de lucarnes par travées  toit brisé flanqué côté entrée d'un pavillon  formant une tour de trois niveaux avec toit à l'impériale, deux pavillons rectangulaires aux extrémités et même niveaux, la face côté parc est unifiée.                                                             \r\nBizy, il y a eut un premier château entre 1378 et 1460 qui a subi les ravages des anglais pendant la guerre de cent ans.   Deux hectares divisés en neuf parcs. De plan rectangulaire à deux niveaux  plein cintre un pavillon qui partage le corps de logis haut d'un étage supplémentaire toit brisé, aux extrémités de ce corps deux pavillons rectangulaires de même niveau avec lucarnes dans les combles.                                                                         Mimont de plan en L  à deux niveaux avec en angle un pavillon  à grande ouverture avec balcon, et une  tour crénelée d'un étage accolé à l'angle.","habitants":"Famille Berthier\r\n        \"","divers":"Château de Parigny, de  Bizy et de Mimont à Parigny","gps":"","images":["../../jctruffet.com/image/image_58/58_Parigny_1.jpg","../../jctruffet.com/image/image_58/58_Parigny_2.jpg","../../jctruffet.com/image/image_58/58_Parigny_3.jpg","../../jctruffet.com/image/image_58/58_Parigny_4.jpg","../../jctruffet.com/image/image_58/58_Parigny_5.jpg","../../jctruffet.com/image/image_58/58_Parigny_6.jpg","../../jctruffet.com/image/image_58/58_Parigny_7.jpg","../../jctruffet.com/image/image_58/58_Parigny_8.jpg","../../jctruffet.com/image/image_58/58_Parigny_9.jpg"]},"Consult_chateau_formulaire279a":{"id":"Consult_chateau_formulaire279a","dept":"58","canton":"Corbigny","commune":"Pazy","nom":"Pazy","type":"Château","periode":"XVI","histoire":"A Pazy; le château de la Chaise du XVe siècle et les ruines féodales de Prélichy du XVIe siècle.                                \r\nCHAISE,  il appartient pendant plusieurs siècles à la famille de Pagany. Cette maison-forte construite au Xve siècle était, à cette époque, aux mains de Guillemain Dufour, écuyer. Après être passée à Jehan de La Tillaye en 1438, puis aux Le Muet et aux Tortras, elle fut achetée en 1606 par la famille de Pagany dont un représentant fut conseiller du roi au bailliage royal de Saint Pierre le Moûtier. Claude de Pagany de La Chaise, dernier seigneur du lieu, fut compagnon du jeune Bonaparte à l'école militaire de Brienne.  Transformé en gites de France par Jean-Marc Bautista.               PRELICHY,  les Ormigiens : ferme près du château de Prélichy, ancienne maison du colonel Henri Gudin de Vallerin  de  1940 à 1942. Au concours hippique militaire International du Touquet, dans le Prix Louis-Bossut . Prélichy était vassaux du comté de Château-Chinon. Varennes (Varannes en 1462)  Philippe-Anne de Gannay, chevalier, seigneur de Pazy et Saint-Grémange en 1789.  Propriété privée .","architecture":"Chaise,  érigé au XVe siècle est composé d'un corps de logis rectangulaire à deux niveaux. Depuis le XVIe siècle plusieurs remaniements ont ajoutés deux tours dont une abrite une chapelle voûtée et un pavillon néo-Renaissance accolé à l'ensemble.  Ceinturé par la rivière dYonne et le canal du nivernais.              Prélichy est daté du XVIe siècle, de très rares vestiges, de ce qui était autrefois une puissante forteresse, il nen reste que les trois tours, sur les vestiges du château  et une belle maison bourgeoise a trois niveaux, un oeils de bufs sous toit par travées  et lucarnes sur comble, et rattaché à la bâtisse de chaque côté une travée d'un niveau.","habitants":"Famille de Pagany\r\n        \"","divers":"Château de la Chaise et de Prélichy à Pazy","gps":"","images":["../../jctruffet.com/image/image_58/58_Pazy_1.jpg","../../jctruffet.com/image/image_58/58_Pazy_2.jpg","../../jctruffet.com/image/image_58/58_Pazy_3.jpg","../../jctruffet.com/image/image_58/58_Pazy_4.jpg"]},"Consult_chateau_formulaireb2bf":{"id":"Consult_chateau_formulaireb2bf","dept":"58","canton":"Tannay","commune":"Tannay","nom":"Pignol_Tannay","type":"Château","periode":"XV","histoire":"A Tannay un château dont Pignol du XVIIe siècle et la maison des chanoines du XVe siècle et celle de Théodore de  Béze du XVe siècle.                                                                            \r\n PIGNOL, il y avait un ancien fief de Pignol avant 1618, date de son rachat par Claude de Bèze, contrôleur, élu à Clamecy, secrétaire de Marguerite de Valois, échevin de Tannay, mais aussi seigneur de Lys. En 1627, il acquiert le fief voisin de Talon. C'est  lui qui fit rebâtir le château actuel, toujours demeuré dans la même famille et l'actuelle propriétaire en est la descendante directe.  Pas d'information sur les maisons fortes.","architecture":"Le château de Pignol , surélevé par un important soubassement ouvert à l'est, comprend un corps central à trois travées flanqué, au nord, d'une aile à deux travées en avancée sur les deux façades. La travée sud du corps central, qui abrite, en façade, l'escalier intérieur, est en saillie à l'ouest comme à l'est ; elle est couronnée de frontons cintrés. Tympans percés d'un oculus, piédroits et chaînes d'angle harpés, linteaux agrémentés, sur l'extrados, d'un décor de plate-bande en bâtière ou à crossettes. Etage de soubassement couvert d'une voûte en berceau plein-cintre, occupé par les pièces de service. La cour antérieure est bordée par les bâtiments des dépendances adossés au mur d'enceinte : logis, près du portail d'entrée. Voûtes en berceau en anse-de-panier au rez-de-chaussée du logis. Colombier circulaire au nord-est de l'enceinte.   De l'ancienne place forte ne subsistent plus que le portail, que flanque, au nord, une grosse tour ronde, ainsi que le colombier au nord-est, seuls vestiges de l'enceinte du XVIe siècle représentée sur un plan terrier du XVIIIe siècle, ce même plan montre que les bâtiments actuels n'ont pas subi de modification importante depuis le XVIIIe siècle ce qui laisse supposer que le logis n'a jamais été achevé.","habitants":"Famille de Claude de Bèze\r\n        \"","divers":"Château de Pignol à Tannay","gps":"","images":["../../jctruffet.com/image/image_58/58_Pignol_Tannay_1.jpg","../../jctruffet.com/image/image_58/58_Pignol_Tannay_2.jpg","../../jctruffet.com/image/image_58/58_Pignol_Tannay_3.jpg","../../jctruffet.com/image/image_58/58_Pignol_Tannay_4.jpg","../../jctruffet.com/image/image_58/58_Pignol_Tannay_5.jpg"]},"Consult_chateau_formulaire6bfb":{"id":"Consult_chateau_formulaire6bfb","dept":"58","canton":"Imphy","commune":"Magny-cours","nom":"Planchevienne","type":"Château","periode":"XVII","histoire":"PLANCHEVIENNE, la construction du château a été exécutée en plusieurs phases. Elle a été commencée au XVIIe siècle  laile de lest et la ferme adjacente est finit au XIXe siècle laile de louest dans sa totalité avec la tour centrale.  Le château est daté du XVIIe siècle, ainsi que ses dépendances. Il a été entièrement rénové.  Une magnifique propriété privée. Je n'ai aucun élément historique. Aujourd'hui, hôtel restaurant.","architecture":"Le château est situé au lieu-dit Planchevienne, sortie de Magny-cours. Le château est daté du XVIIe siècle, ainsi que ses dépendances. Il a été entièrement rénové. La construction du château a commencé au XVIIe siècle par la construction de laile Est, et de la ferme, laile Ouest dans sa totalité et la tour centrale sont terminées au XIXe siècle. Il y a un siècle, la superficie du domaine recouvrait plus de 400 hectares. Au XXe siècle, le rez-de-chaussée est complètement réhabilité dans son état original. Le château a gardé son caractère original.","habitants":"Jeroen DEWULF\r\n        \"","divers":"Château de Planchevienne","gps":"","images":["../../jctruffet.com/image/image_58/58_Planchevienne_1.jpg","../../jctruffet.com/image/image_58/58_Planchevienne_2.jpg","../../jctruffet.com/image/image_58/58_Planchevienne_3.jpg","../../jctruffet.com/image/image_58/58_Planchevienne_4.jpg","../../jctruffet.com/image/image_58/58_Planchevienne_5.jpg","../../jctruffet.com/image/image_58/58_Planchevienne_6.jpg","../../jctruffet.com/image/image_58/58_Planchevienne_7.jpg","../../jctruffet.com/image/image_58/58_Planchevienne_8.jpg","../../jctruffet.com/image/image_58/58_Planchevienne_9.jpg"]},"Consult_chateau_formulairee153":{"id":"Consult_chateau_formulairee153","dept":"58","canton":"Luzy","commune":"Poil","nom":"Poil","type":"Château","periode":"XV-XVIII-XIX","histoire":"Plusieurs châteaux à Poil, celui du Mousseau du  XVIe siècle, de Pierrefitte (hôtel) ; de Concley du XVIIIe siècle ; d'Ettevaux du  XVIIIe siècle rebâti aux XIXe et XXe siècles ; de Thil du  XVe siècle remanié ; de Villette du  XVIIIe siècle ( Hôtel).\r\nThil,   Pierrefitte, Concley,  et  Vilette pas d'information historique pour ces châteaux.                                                     ETTEVAUX,  chambres d'hôtes de Charles Henri de Galembert, acheté en juillet 1748 par Zacharie Bertrand de Rivière, maire de Larochemillay, la propriété passe dans la famille de Galembert en 1852 suite au mariage de Louise-Marie-Joséphine-Bertrand de Rivière avec le vicomte Anne-Marie Charles de Bodin de Galembert.                                                                MOUSSEAU, le fief en toute justice, Girard du Monceau, seigneur de Poil, est attestée en 1374. En 1589, la demeure fut assiégée par le seigneur de la Bussière pendant plusieurs jours, forçant le seigneur du Monceau à capituler le 30 septembre 1589.                    CONCLEY, château construit au milieu du XVIIIe siècle pour François de Champeaux ; il s'y trouvait une chapelle construite en 1676, reconstruite en même temps que le château et bénite en 1764 seigneurie en toute justice, mouvant du comté de La Roche que Jean 1er de Chevannes reprit le fief en 1454.","architecture":"Mousseau, construit entre les XIIIe et XIVe siècles, dont subsistent deux tours découronnées séparées du corps de bâtiment a été reconstruit au début du XVIIIe siècle,   le manoir moderne aurait été ruiné en 1944 et était à l'abandon depuis 1945, mais très bien restaurée à partir de 1991, y compris le périmètre de défense, notamment les tours et les douves.                           Concley,  le château a été remanié au XIXe siècle pour lui donner son style médiéval actuel, l'édifice se compose d'un sous-sol, un étage carré et un étage de comble, gros-uvre en granite; toit en pavillon, couverts de tuiles plates et d'ardoise, construit à la fin du XVIIIe siècle, il a pris la suite d'un édifice plus ancien.                              Pierrefitte, est un château bâti au début du XXe siècle, dans le style chalet. Il ne semble pas y avoir eu de château précédemment, quoique la terre de Pierrefitte ait été un fief attesté depuis le XVIe siècle.                                                             Ettevaux, est une belle construction du XVIIIe siècle, édifiée sur un château beaucoup plus ancien.                                                  Villette a également été construit sur une ancienne maison forte. Son nom pourrait évoquer une ancienne villa gallo-romaine. L'actuel château est une belle construction du XVIIIe siècle, très classique, avec jardins à la française en terrasse.                                    Thil, il  reste peu d'éléments de l'ancien château , dont l'existence est attestée au XVe siècle, mais qui est beaucoup plus vieux. Le logis actuel, restauré, n'en représente qu'une partie, mais on peut voir, dans une tour intégrée dans ce bâtiment, des ouvertures en meurtrières indiquant le XIIe siècle, des pièces voûtées et des parois en torchis de même époque. La cour attenante, en terrasse, est soutenue par un mur extrêmement haut.","habitants":"Charles Henri de Galembert seigneur de la Bussière                                    François de Champeaux\r\n        \"","divers":"Les châteaux de Conclay, d'Ettevaux, de pierrefitte, de Thil et de la Vilette.","gps":"","images":["../../jctruffet.com/im
