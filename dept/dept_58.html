const FULL={"Consult_chateau_formulaire8bec":{"id":"Consult_chateau_formulaire8bec","dept":"58","canton":"Châtillon en Bazois","commune":"Achun","nom":"Achun_Chavance","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Achun celui d'Achun du XVIIIe siècle et de Chavance   du XIXe siècle, et à quelques kilomètres au Nord-Ouest la maison forte de Meuré.                                              ACHUN, c'est Joseph de Bréchard qui le fit construire, Éodore Tenaille de Saligny y vécut. Le comte Louis François de Bréchard   chevalier, seigneur d'Achun et de Pouilly, a dû épouser sous la Terreur, en 1793, sa servante. Il a laissé un testament en faveur des hospices d'Autun, d'Orléans et de Nevers, daté du 4 août 1808. C'est grâce à ce testament que fut fondé à Achun, en 1808, l'Hospice des Surs de la Charité, tenu par des religieuses venant de Nevers. Il apparaît sur la liste des membres de la noblesse de la Nièvre votant pour l'élection des députés des États Généraux de 1789. Par son testament, il institue comme héritiers partiels François Jean-Marie et Guillaume Dechamps, en leur demandant de rajouter à leur nom celui de Bréchard, ce qui fut autorisé et fut contesté en justice par Joseph Marie Bréchard de Chamort, ainsi que par Thérèse de Solange d'Assigny. Les héritiers naturels obtinrent gain de cause. Théodore Tenaille de Saligny, (1830-1889), homme politique. Adrien Laurent, (1856-1883), notaire et maire de Châtillon-en-Bazois.  Henri d'Angicourt, (1875-1961), rentier, propriétaire-exploitant de mines de phosphates, zinc, plomb et métaux connexes en Algérie et Tunisie.\r\nCHAVANCE, château XVIIe-XIXe siècles, pas d'information historique.","architecture":"château d'Achun du XVIIIe-XIXe siècles, le corps de logis central est de plan rectangulaire à deux niveaux, de chaque côté, il est flanqué de  pavillons de plan rectangulaire à trois niveaux, toit en croupes alignés sur la façade du couchant et en retour d'équerre au Levant. La façade du Levant, possède au rez-de-chaussée, une fenêtre de part et d'autre de la porte d'entrée et trois au premier étage. L'autre façade comporte trois portes fenêtres, avec au premier étage de larges baies. Les combles possèdent une lucarne double à fenêtres pendantes que surmonte un fronton triangulaire à moulures. À sa gauche on peut voir un puits à margelle engagée. Les pavillons possèdent sur le côté  une fenêtre par niveaux.                    Meuré; manoir à deux niveaux, toit à deux grands pans flanqué de deux tours rondes aux angles de la façade  Chavance; pas d'information.","habitants":"Comte Louis François de Bréchard\r\n        \"","divers":"Château d'Achun et de Meuré à Auchun.","gps":"","images":["../../jctruffet.com/image/image_58/58_Achun_Chavance_1.jpg","../../jctruffet.com/image/image_58/58_Achun_Chavance_2.jpg","../../jctruffet.com/image/image_58/58_Achun_Chavance_3.jpg","../../jctruffet.com/image/image_58/58_Achun_Chavance_4.jpg"]},"Consult_chateau_formulaire62aa":{"id":"Consult_chateau_formulaire62aa","dept":"58","canton":"Brinon Beuvron","commune":"Morache","nom":"Agriez_Morache","type":"Manoir","periode":"XV","histoire":"AGRIEZ,  la famille du Quesnay quitte ce château lorsqu'elle achète le château de Chazy à la famille Praslin au XVIIIe siècle, mais elle conserve la propriété d'Agriez. Le château fait partie en 1826 des biens qu'Hubert du Quesnay lègue à la commune à la condition qu'il y soit installé un couvent-pensionnat, mais l'école fermera en 1903. Les religieuses resteront comme surs hospitalières jusqu'en 1922. Le château est alors vendu par la commune, aux XIXe et XXe siècle, devient une fondation religieuse (hôpital, école, colonie de vacances), liée à l'histoire du manoir, est en cours de restauration, agrémenté de jardins en terrasse avec bassins. Il fut transformé en hôpital et en  fondation caritative au XIXe siècle.","architecture":"A l'origine, il s'agissait d'un manoir d'Agriez gothique de la fin du XVe siècle agrandi au XVIII siècle. Corps de logis rectangulaire à trois niveaux flanqué de pavillons saillants de même hauteur avec sur celui de droite une aile de dépendance à deux niveaux.","habitants":"Famille du Quesnay\r\n        \"","divers":"Château d'Agriez à Morache","gps":"","images":["../../jctruffet.com/image/image_58/58_Agriez_Morache_1.jpg","../../jctruffet.com/image/image_58/58_Agriez_Morache_2.jpg"]},"Consult_chateau_formulaire2d35":{"id":"Consult_chateau_formulaire2d35","dept":"58","canton":"Montsauches les Setttons","commune":"Alligny en Morvan","nom":"Alligny","type":"Château","periode":"XV-XVI","histoire":"Cinq châteaux à Alligny en Morvan, les ruines féodales du XVe siècle, de la Chaux (voir article), de la Mothe (voir article), la tour d'Ocle, le château fort de Réglois et de la Ferrière.\r\n ALLIGNY, fut remanié au XVIIe siècle. Il a remplacé d'autres maisons fortes telles que La Crémaine et la Tour d'Ocle dont subsistent quelques vestiges.  Jean assista en 1412 avec Guillaume son frère, capitaine du château d'Autun, au siège de Château-Chinon. Celui-ci reprit le fief en 1444.  Jean fut un seigneur dur et cruel. Gaspard Quarré de Château-Regnault ayant fait retrait de la baronnie en 1637 renouvela le terrier en 1649, Pierre Quarré de Château-Regnault d'Aligny, (1644- 1730), baron d'Aligny, seigneur de Fétigny, de Juilly, brigadier des armées du roi, grand bailli d'épée du Charolais et gouverneur d'Autun, premier chevalier de l'Ordre de Saint-Louis, en Bourgogne. Il fut surnommé par Louis XIV: Le Brave d'Aligny à cause de sa belle conduite à Maëstrich et à Valenciennes et le fit comte d'Aligny. Claude Quarré de Château-Regnault d'Aligny, fils aîné du second lit, chevalier, comte d'Alligny, gouverneur d'Autun, En 1743, la terre d'Alligny est acquise par François-Bernard César, marquis de Choiseul, seigneur de Montsauche, Il mourut au château, le 5 juillet 1749, à 60 ans.                                                                           \r\n  MOTHE-d'ALLIGNY.  Du XIIe-XVII siècle, dit aussi château du Puy.  Il fut édifié au XIIe siècle, par Hugues d'Aligny et restauré entre 1645 et 1660 ; Pierre Quarré d'Aligny fit « bâtir de fond en comble le corps de logis et la tour qui font face en entrant ». Du château primitif subsiste le plan hexagonal et les fossés. Il comporte un étage carré recouvert d'un toit à longs pans avec des tuiles plates, le gros uvre est en mllons et enduits. Il comporte toujours des sculptures.","architecture":"La Mothe-d'Aligny, du XIIe-XVII siècle, fut construit , dans un marais  en deux corps de logis, un pavillon et une écurie desservie de six tours, quatre rondes et deux pentagonales, le tout enfermant une cour de figure hexagonale,  entouré d'un grand fossé, la basse-cour de la dite maison est formée d'une muraille de chaux et enceinte flanquée de deux tours carrées et d'un colombier.  Au XVIIIe siècle,  au XIXe siècle, une grande partie des bâtiments élevés autour d'une cour circulaire fermée a été abattue.  Seul subsiste un corps de logis de plan concave. Les façades et la toiture de la maison forte, les douves alimentées par les sources en eau vive entourent toujours l'assise d'origine,   transformé en ferme.   À l'ouest du bourg, se trouve l'antique manoir des comtes d'Alligny, on y accède par une belle avenue d'ormes. \r\n Les ruines de lancien château de la Tour dOcle, demeure des seigneurs dAlligny, sont situées dans le hameau de Champcomeau.                                                                        Le château du Puy médiéval du XVe siècle du château primitif subsiste le plan hexagonal et les fossés. Se composait de « deux corps de logis, avec pavillon et six tours, dont quatre rondes et deux pentagones, Il comporte un étage carré recouvert d'un toit à longs pans.  Le château était entouré de fossés, toujours existant. Un pont-dormant permettait dy avoir accès.   Au XIXe siècle les bâtiments servirent de corps de ferme et étaient bien délabré. Les vestiges de deux tours rondes sont encore visibles à lest. Le  bâtiment oriental est percé d'un porche. Le manoir qui a gardé un bel aspect.                                                                               La maison forte d'Alligny : du  Moyen-Age et remaniée au XVIIe siècle. Elle fut édifiée au XIIe siècle ; au XIXe siècle, une grande partie des bâtiments élevés autour d'une cour circulaire fermée a été abattue. Seul subsiste un corps de logis de plan concave. Les façades et la toiture de la maison forte, les douves alimentées par les sources en eau vive entourent toujours l'assise d'origine.","habitants":"Famille de Pierre Quarré d'Alligny\r\n        \"","divers":"Château d'alligny, la tour Chappe  la tour d'Ocle","gps":"","images":["../../jctruffet.com/image/image_58/58_Alligny_1.jpg","../../jctruffet.com/image/image_58/58_Alligny_2.jpg","../../jctruffet.com/image/image_58/58_Alligny_3.jpg","../../jctruffet.com/image/image_58/58_Alligny_4.jpg","../../jctruffet.com/image/image_58/58_Alligny_5.jpg"]},"Consult_chateau_formulaire6a18":{"id":"Consult_chateau_formulaire6a18","dept":"58","canton":"Montsauches les Setttons","commune":"Alligny en Morvan","nom":"Alligny_Morvan","type":"Château","periode":"XIV","histoire":"ALLIGNY,   tour d'Ocles Champcomeau (1284) Il doit son second nom à l'un de ses propriétaires, Jean d'Ocle, seigneur en partie d'Alligny et faisant partie des assiégeants de Château-Chinon en 1412. Cette terre située sur la rive gauche de la rivière fut rattachée au XIIIe siècle à la baronnie d'Island-lès-Saulieu. Le patrimoine revenant au plus jeune fils de Jean Ier d'Aligny : Girard d'Aligny dit Besort, entré comme novice à l'Abbaye de Saint-Martin d'Autun en 1284. Le moulin de Champcomeau, moulait encore en 1905. Un pont en granite, au levant du hameau, enjambe la rivière. Un corps de logis antérieur à 1842, dont les dépendances sont postérieures, toitures en tuile et ardoise, escalier extérieur.                   \r\nREGLOIS appartenait au XIVe siècle à Renaud de Thoisy, receveur général. Le château est incendié en 1438 par les Écorcheurs et ne sera pas reconstruit.  En 1535, le terrier de cette seigneurie qui appartient au chapitre d'Autun, est dressé par Maître Pelletier, notaire à Autun. En 1563, l'évêque Pierre III de Marcilly, le revend à Jean Quarré, dont le fils Antoine Quarré de Réglois, épouse Marguerite Raudot, fille de Pierre, seigneur de Renève. Le nouveau château est construit à Réglois près de l'ancienne voie romaine à partir de 1602, pour Claude de Bouillard et est achevé en 1609. La devise gravée dans la pierre au-dessus de la porte de la tour est « Rien de sûr comme l'union armée »\", et est apposée au XIXe siècle par Georges Raudot. Cette seigneurie entra dans la Maison d'Alligny que l'on trouve seigneur de Réglois, de Marnay, de La Chaux, de Gouloux, de Monbroin, d'Alligny-en-Morvand. Hugues de Fontenette épousa une des héritière de la famille d'Alligny et son fils Jean de Fontenette épousa Catherine des Potots. En 1865, le château était encore la propriété de M. Claude-Marie Raudot (1801-1879), dit Claude Réglois, écrivain.","architecture":"Champcomeau, au nord du bourg vis-à-vis de ce hameau, se trouve sur un monticule dominant la rivière, les ruines du château de Champcomeau, connu sous le nom de Tour-d'Ocle. Sa position et les vestiges de ses anciens fossés montrent bien qu'il avait une certaine importance.  Ruines féodales d'Alligny du XVe siècle , manoir de la tour d'Ocle  château de Reglois et châteaux de la Chaux.                                                                                    Réglois, dans ce hameau étaient visibles en 1865 les restes d'un ancien castel, le château de Réglois, armé d'une haute tour, avec mâchicoulis, sur un petit mont, culminant à 515 mètres d'altitude et appelé Chambard.                                                                 Entre La Chaux et les Guttes Bonin, sur la colline du Grand Arbre se serait élevé une tour pour le télégraphe de Chappe. Puis en 1852, la famille de Chambure bâtit une tour carrée de style médiévale, en maçonnerie, d'environ de 15 mètres de haut. Au sommet une terrasse offrait un panoramique exceptionnel sur la Nièvre, la cote d'Or et la Saône et Loire, la colline culminant à 681 mètres. Baudiau parle d'un ancien \"signal\" et Bruneau d'un télégraphe à signaux.","habitants":"Famille de Girard d'Aligny dit Besort,                                       \r\nFamille de  Claude de Bouillard\r\n        \"","divers":"La tour d'Ocles, la tour Chappes et le château de Réglois","gps":"","images":["../../jctruffet.com/image/image_58/58_Alligny_Morvan_1.jpg","../../jctruffet.com/image/image_58/58_Alligny_Morvan_2.jpg","../../jctruffet.com/image/image_58/58_Alligny_Morvan_3.jpg"]},"Consult_chateau_formulaire0ebc":{"id":"Consult_chateau_formulaire0ebc","dept":"58","canton":"Tannay","commune":"Amazy","nom":"Amazy_Chevannes","type":"Château","periode":"XIX","histoire":"A Amazy les ruines féodales  de Saligny et le château de Chevannes du XIXe siècle.                                               CHEVANNES-AMAZY, Ancienne résidence du médecin et conseillé du roi Louis XI ou il est enterré avec sa famille. Château reconstruit au XIXe siècle, de style baroque,  après 1834, L'ancien château de Chevannes était la résidence des seigneurs d'Amazy. Après avoir appartenu à la famille d'Anjorrant, à partir de 1571, puis à celle de Gamaches, après 1661, il est acheté vers 1774 par Michel Bouez, avocat au parlement de Paris. Il reste dans la famille Bouez jusqu'en 1873, date à laquelle Ernest Ludovic Bouez, ruiné, vend l'ensemble de ses biens, château, parc, terres, prés, vignes, ainsi que la maison du fermier et les granges attenantes. C'est maître Domont, avoué à Clamecy, qui achète le château et le parc. Aujourd'hui gîtes de France de Mr et Mme Boudard Denis.","architecture":"Les bâtiments de ferme qui jouxtent le château, une des deux granges est datée de 1636. Château situé au sud-est du hameau, en bordure du plateau dominant la vallée de l'Yonne. Le logis de plan rectangulaire, avec corps central en avancée sur la façade antérieure, est flanqué de deux corps latéraux en renfoncement sur les deux façades. Pavillon d'entrée et colombier de plan circulaire dans le parc.","habitants":"Famille Bouez\r\n        \"","divers":"Château de Chevannes à Amazy","gps":"","images":["../../jctruffet.com/image/image_58/58_Amazy_Chevannes_1.jpg","../../jctruffet.com/image/image_58/58_Amazy_Chevannes_2.jpg"]},"Consult_chateau_formulaire0eff":{"id":"Consult_chateau_formulaire0eff","dept":"58","canton":"Châtillon en Bazois","commune":"Limanton","nom":"Anizy_Arcilly","type":"Château","periode":"XIV-XV","histoire":"Trois château à Limanton celui de Limanton (voir Article), du XVIe siècle, d'Arcilly du XVe siècle et le manoir d'Anizy du XVIe siècle.       ANIZY, au XIVe siècle, il était la propriété de la maison d'Anizy, puis il est passé aux de La Tournelle, et de Chandou, et vers 1450, à celle de Frasnay. C'est Charles de Frasnay, qui fait en 1571, réutiliser les pierres d'une vieille tour pour en faire rebâtir une nouvelle : « ronde en dehors et carrée à l'intérieur ». Manoir du XVIe siècle, a été érigé par Charles et Hector du Frasnay sur les bases d'une maison forte. Ce fief, qui était une baronnie, dépendait des ducs de Nevers et du seigneur de Châtillon-en-Bazois. En 1621, Hector de Frasnay y fait des rajouts, l'augmentant d'un pavillon comportant des cheminées. En 1666, il est réuni à la terre de Vandenesse par Louis du Bois de Fienne. Cette seigneurie fut saisie sur Marie Edmée de Frasnay, épouse de Joachim de Villers-la-Faye, seigneur de Vançay et adjugée en 1673, à Louis du Bois de Fiennes, marquis de Givry et de Vandenesse, lieutenant général des armées du roi.\r\nARCILLY, le château actuel fut construit par la famille de Frasnay tout comme le château d'Anizy, sur la même commune au XIVe siècle et subit des transformations au XVe siècle, construit au XIVe siècle, et remanié au Xve siècle par la famille de Frasnay,  deux mares attestent l'existence d'anciennes douves. Elle passa au XVIe siècle aux Guillier, famille de juristes. Ce domaine appartient au comte de La Roche-Aymon, d'une illustre famille qui a embrassé surtout des carrières militaires au service du Roi et, après la Révolution, au service des divers régimes qui se sont succéder.   Aujourd'hui propriété de monsieur de la Roche Aymon.","architecture":"Anizy, il est édifié sur une motte, entouré par des fossés alimentés par l'Aron que franchissaient deux ponts-levis.  Il y a un pont-levis pour entrer dans la basse-cour. Cette bâtisse devient une propriété agricole. L'ensemble des murailles fut démolie, les ponts levis supprimés et les douves comblées. Une tour ronde, trapue, la seule subsistant de l'enceinte qui entourait la totalité de la motte est relié au logis par une courtine. C'est un édifice de plan carré que flanque au sud une tour ronde à poivrières, dont on accède à la porte cintrée, au fronton triangulaire, par un escalier de neuf marches, au perron évasé défendu par un assommoir. Cette porte permet d'accéder à un escalier à vis. Les ouvertures pour les couleuvrines et mousquets, furent conservées. Des deux cheminées monumentales ornant l'intérieur du château, l'une est partie au château de Vandenesse.\r\nArcilly, maison forte du XIVe siècle, remaniée au XVe siècle.   Comme sa voisine  d'Anizy, la petite maison forte d'Arcilly, construite au XIVe siècle, et remaniée au XVe siècle, le corps principal de l'édifice est de plan carré, flanqué de deux tours rondes aux extrémités de la façade sud. Ces deux tours découronnées, sont recouvertes de toitures à poivrières. La tour ronde au sud-ouest présente au rez-de-chaussée, une belle porte mouluré, à piédroits prismatiques, donnant accès à un escalier à vis, éclairé de deux baies formant un arc en accolade. Elle est couverte d'un toit en tuiles coniques. À sa base nous trouvons deux archères-canonnières. Un cadran solaire orne sa partie supérieure. L'autre tour, au sud-est, possède également des archères-canonnières, ainsi qu'une baie en accolade.\r\nDe petits bâtiments du XXe siècle furent accolés aux façades.","habitants":"Famille de Frasnay\r\n        \"","divers":"Château d'Anizy et D'Arcilly à Limantron","gps":"","images":["../../jctruffet.com/image/image_58/58_Anizy_Arcilly_1.jpg","../../jctruffet.com/image/image_58/58_Anizy_Arcilly_2.jpg","../../jctruffet.com/image/image_58/58_Anizy_Arcilly_3.jpg","../../jctruffet.com/image/image_58/58_Anizy_Arcilly_4.jpg","../../jctruffet.com/image/image_58/58_Anizy_Arcilly_5.jpg","../../jctruffet.com/image/image_58/58_Anizy_Arcilly_6.jpg","../../jctruffet.com/image/image_58/58_Anizy_Arcilly_7.jpg","../../jctruffet.com/image/image_58/58_Anizy_Arcilly_8.jpg","../../jctruffet.com/image/image_58/58_Anizy_Arcilly_9.jpg"]},"Consult_chateau_formulaired166":{"id":"Consult_chateau_formulaired166","dept":"58","canton":"Saint-Benin d","commune":"Anlezy","nom":"Anlezy","type":"château","periode":"XVII","histoire":"ANLEZY, la seigneurie d'Anlezy a donné son nom à une ancienne famille à laquelle appartenait le Chevalier Huguenin d'Anlezy. Elle devient par alliance la propriété des maisons d'Avenières et de Damas. Cette baronnie dépendant du fief de Châtillon en Bazois, avait droit de haute Justice.  Elle est érigée en comté en 1625 et devient chef-lieu de canton entre 1790 et 1801.   On trouve sur sa façade, la croix ancrée des armes de la famille de Damas.    Camille François fit fortune, s'établit à Beaumont, y achète le château de la Cave et devient maire du pays.","architecture":"Anlezy du XVIIe siècle construit sur l'emplacement d'un ancien château féodal, quadrangulaire, trois  corps de logis de plan rectangulaire à deux niveaux flanqué de pavillons rectangulaires et plein cintre un pavillon saillant d'entrée avec toiture triangulaire, balcon et oeils de buf, flanqué de lucarnes sur toute les façades.","habitants":"Chevalier Huguenin d'Anlezy\r\n        \"","divers":"Château d'Anlezy","gps":"","images":["../../jctruffet.com/image/image_58/58_Anlezy_1.jpg","../../jctruffet.com/image/image_58/58_Anlezy_2.jpg"]},"Consult_chateau_formulairec48a":{"id":"Consult_chateau_formulairec48a","dept":"58","canton":"Cours sur Loire","commune":"Annay","nom":"Annay","type":"Château","periode":"XIX","histoire":"ANNAY;  ce château  eut différents propriétaires : au XVIIe siècle : Edme de la Bussière, époux de Françoise du Deffand.  Au XVIIIe siècle : famille la Rivière.  Au XVIIIe siècle : famille du Verne de Marancy. Philippe Louis fut le premier maire de la commune.  A la  famille de Montjoyeux. Richard de Montjoyeux, ancien maire, conseiller général et député de la Nièvre, y meurt en 1874. Il a fait gravé ses initiales R M dans un médaillon, au milieu d'une des façades du château.  Et à la famille Ginestous, originaire du Languedoc.","architecture":"Annay est reconstruit au XIXe siècle, sur les fondations de l'ancien château seigneurial, un grand corps de logis rectangulaire à deux niveaux et rangée de lucarnes, est adossé à  deux tour carrée aux extrémités, vestige de l'ancien château. L'avant-corps a été complètement détruit par les propriétaires après la seconde guerre mondiale, époque à laquelle il avait été gravement endommagé. Au XIXe siècle, un parc a été aménagé.","habitants":"Famille la Rivière                                                                        Famille de Montjoyeux\r\n        \"","divers":"Château d'Annay","gps":"","images":["../../jctruffet.com/image/image_58/58_Annay_1.jpg","../../jctruffet.com/image/image_58/58_Annay_2.jpg"]},"Consult_chateau_formulaire3914":{"id":"Consult_chateau_formulaire3914","dept":"58","canton":"Corbigny","commune":"Anthien","nom":"Anthien_Villemolin","type":"Château","periode":"XIV-XV","histoire":"A Anthien le château de Villemolin, le manoir de l'Echon et la maison forte de Charpuis du XVe siècle  (ferme).        \r\n VILLEMOLIN  cette seigneurie fut au XVe siècle, la propriété de la maison de Corcelle,  Marguerite la porta par son mariage en 1460, à Guillaume de Champignolle. Leur descendance Guillemette, épousa N. de Bascoing, dont la fille Barbe la transmit à la maison de Certaines, en 1538, par son mariage avec Etienne de Certaines et n'en est plus sortie depuis cette date,  dans la famille depuis quatre siècles. Cette seigneurie en toute justice, dans la mouvance du comté de Château-Chinon, faisait autrefois partie des domaines de Corbon. Demeure historique privée et habitée.                                   Le château de Villemolin a été le lieu du tournage du film \"le Mystère de la chambre jaune\" de Bruno Podalydes sorti au cinéma en 2003, et la visite est élargie aux souvenirs du film : locaux, décors, costumes, accessoires etc.                                            ESCHON manoir de Pierre-Charles Barbier, écuyer, seigneur d'Eschon.","architecture":"Villemolin,   Edifié au XIVe siècle à lemplacement dune villa gallo-romaine, il fut modifié et agrandi aux siècles suivants. Au XIXe siècle les tours furent coiffées de toits dans le style \"troubadour\" lui donnant un air de château de conte de fée.  Au Moyen-Age, il était constitué de deux corps de bâtiments indépendants, entourés d'un mur fortifié. Remanié aux XVII et XIXe siècle, en forme de fer à cheval il est flanqué de trois tours. Dans la chapelle construite en 1830, de style néogothique.  Après les guerres de religion puis la Fronde, au milieu du XVII e siècle, il a, comme tous les châteaux de la Renaissance, abandonné sa fonction défensive pour devenir une demeure d'agrément. L'aile sud a été édifiée, reliant les deux bâtiments initiaux et donnant à l'ensemble une forme en U.  Plus tard, une terrasse l'a agrémentée. « Au XIX e siècle, le retour au Moyen-Age était à la mode », raconte Bertrand de Certaines. « Le château a été doté, par endroits, de créneaux et mâchicoulis.                               Eschon manoir, corps de logis rectangulaire à deux niveaux toit en croupe avec à l'ouest trois  lucarnes  retour d'ailes de dépendances.","habitants":"Famille d' Etienne de Certaines                                                            Famille de Pierre-Charles Barbier\r\n        \"","divers":"Manoir d'Eschon et château de Villemolin à Athien.","gps":"","images":["../../jctruffet.com/image/image_58/58_Anthien_Villemolin_1.jpg","../../jctruffet.com/image/image_58/58_Anthien_Villemolin_2.jpg","../../jctruffet.com/image/image_58/58_Anthien_Villemolin_3.jpg","../../jctruffet.com/image/image_58/58_Anthien_Villemolin_4.jpg","../../jctruffet.com/image/image_58/58_Anthien_Villemolin_5.jpg","../../jctruffet.com/image/image_58/58_Anthien_Villemolin_6.jpg"]},"Consult_chateau_formulairef0f9":{"id":"Consult_chateau_formulairef0f9","dept":"58","canton":"Prémery","commune":"Arbourse","nom":"Arbourse_Vendome","type":"Château","periode":"XVII-XIX","histoire":"VENDOME, le château de Vendôme est construit sur lemplacement de lancienne tour Rebourse de l'ancienne maison forte, appartenant a lépoque aux chevaliers dArbouse, au XVIIe siècle les Rolland héritiers des chevaliers dArbouse font bâtir sur les ruines un château, au XIXe siècle, le comte Paul de Rolland ajoute les deux ailes ainsi quune terrasse et un escalier monumental. Le château est vendu en 1921. Arbourse fut autrefois siège dune commanderie de Templiers.","architecture":"Le château de Vendôme  construit sur l'emplacement de l'ancienne Tour Rebourse (ancienne maison forte) est l'aboutissement de remaniements des XVIIe et XIXe siècles.  Le corps de logis de plan rectangulaire à deux niveaux sur rez-de-chaussées, flanqué de deux pavillons saillant rectangulaire  de même hauteur, accolée sur la partie arrière de tour ronde à mâchicoulis et toit en poivrière avec retour en équerre et à l'angle une autre tour de niveau inférieur toit également en poivrières.","habitants":"Comte Paul de Rolland\r\n        \"","divers":"Château de Vendôme à  Arbouse","gps":"","images":["../../jctruffet.com/image/image_58/58_Arbourse_Vendome_1.jpg","../../jctruffet.com/image/image_58/58_Arbourse_Vendome_2.jpg","../../jctruffet.com/image/image_58/58_Arbourse_Vendome_3.jpg","../../jctruffet.com/image/image_58/58_Arbourse_Vendome_4.jpg"]},"Consult_chateau_formulairef756":{"id":"Consult_chateau_formulairef756","dept":"58","canton":"Clémency","commune":"Armes","nom":"Armes_Terrasses","type":"Manoir","periode":"XVIII","histoire":"TERRASSES,    La chapelle est placée sous le vocable de Saint Lazare de Clamecy est de style roman, elle est située à lintérieur de la propriété des terrasses, face à la vallée de LYonne, elle est bâtie au IXe-XIIe siècles. Elle est le seul vestige de lancienne léproserie, donnée par le Roy Louis XIV à la ville de Clamecy. Elle possède des ouvertures étroite et peu nombreuses.  La propriété est construite par le docteur Jacques-Edme Cambuzat, né à Asnières (Yonne) en 1844, Il prendra sa retraite à Clamecy en 1879, et décède le 7 juillet 1887, dans son château des Terrasses entre Clamecy et Armes.","architecture":"Terrasses, les bases du château sont du IXe-XIIe siècles,  vestiges de lancienne léproserie,    bâtie au XVIIIe siècle, elle se caractérise par sa terrasse, et part son escalier monumental à double circonvolution, de plan rectangulaire à trois niveaux, le troisième partant de la terrasse  avec un toit à deux pans, en façade deux avancés avec terrasses.    Elle possède des ouvertures étroite et peu nombreuses. Le parc de cette magnifique propriété renferme la chapelle Saint-Lazare de lancienne Maladrerie désaffectée en 1695. Dans le parc  petit manoir à trois corps de logis, deux niveaux avec lucarnes, tourelle en angles intérieur avec terrasses.","habitants":"Docteur Jacques-Edme Cambuzat\r\n        \"","divers":"Manoir des Terrasses à Armes","gps":"","images":["../../jctruffet.com/image/image_58/58_Armes_Terrasses_1.jpg","../../jctruffet.com/image/image_58/58_Armes_Terrasses_2.jpg","../../jctruffet.com/image/image_58/58_Armes_Terrasses_3.jpg","../../jctruffet.com/image/image_58/58_Armes_Terrasses_4.jpg","../../jctruffet.com/image/image_58/58_Armes_Terrasses_5.jpg"]},"Consult_chateau_formulaire4ad4":{"id":"Consult_chateau_formulaire4ad4","dept":"58","canton":"Prémery","commune":"Arthel","nom":"Arthel","type":"Château","periode":"XIV-XV","histoire":"Deux châteaux à Arthel dont celui d'Apremont du XV-XVIIIe siècle et château de la Motte du XIV-XVe siècle.                               APREMONT dit d'Arthel  était la propriété des évêques de Nevers ainsi que le château de la Motte. Passa à une famille d'Arthel dans le courant du XIIIe siècle. Puis en 1378 devient la propriété de Guillaume de Lamoignon, officier de l'hôtel du comte de Nevers : Louis de Dampierre. Au XVe siècle, le fief entre dans la maison de Jean de Chabannes, comte de Dammartin, fils dAntoine de Chabannes, capitaine des écorcheurs et pour l'autre partie des terres  à Philibert de Boutillat, trésorier général de France. Puis en 1584, le château est embellit par Imbert de Paris gentilhomme de l'hôtel d'Henri III qui y fait construire les deux grosses tours de la façade Nord. En 1722, le château est reconstruit par François Guynet, conseiller du roi. Les Fournier de Quncy qui en font l'acquisition en 1754 l'agrandirent au cours du XIXe siècle en y faisant construire un pavillon carré sur chacun des côtés Est et Ouest.   Propriétaire monsieur  Guillaume de Brondeau.                                 LA MOTTE,  la famille noble portant le nom d'Arthe l'occupe. Par la suite y naît Guillaume de Corbeil qui devait devenir Saint-Guillaume, Évêque de Bourges et bâtisseur de la cathédrale. Aux XIVe et XVe siècle différentes familles le possède Guillaume de Lamoignon, Dreux de la forrest, Pierre de Longueville, Claude de la Rivière. En 1517 Jacqueline d'Avril, apporte la seigneurie de la Motte à son époux, Jean de Paris. En 1693, François Guynet acquiert le 24 juin 1693  les terres de Paul de Paris.  En 1733, après le décès de François Guynet les terres reviennent par substitution à sa petite nièce Catherine Auguste de Baune d'Avejean. En 1754 les terres et seigneurie d'Arthel sont vendus à Pierre François Fournier, comte de Quincy. Au XIXe siècle, la propriété de la Motte est  transformée en une exploitation agricole, et passe entre les mains de la famille Métairie. Elle est vendue en 1985 à son propriétaire actuel qui entreprend alors de long travaux de restauration.","architecture":"Arthel,  porche d'entrée en fer forgé surmonté des armes et de la couronne du marquis d'Arthel. Le château rebâti  au début du XVIIIe siècle sur l'emplacement d'une maison forte du XVe siècle composé de trois bâtiments, le corps de logis central rectangulaire à deux niveaux flanqué aux nord de deux grosses tours rondes couvertes de dômes à l'impériale, datent de 1584, surmonté d'un lanternon octogonal dit à l'impériale,  le corps de logis central plus élevé que les ailes, dont le toit à deux pentes est surmonté d'une lanterne octogonale en ardoises et toit à l'impériale dont le comble est rompu par des ils de bufs à ailerons. Les deux ailes rectangulaires avancent légèrement et sont flanquées de deux tours rondes sur la face Nord.  Deux ailes rectangulaires entouré d'un carré de douves sèches au Sud.  Elles comportent de larges fenêtres avec chaînages à bossages chanfreinés.  Ces tours couvertes d'un toit, brisé et les pavillons carrés d'un toit à quatre pentes. Les combles de ces pavillons comportent de hautes lucarnes à fronton triangulaire. \r\n  La Motte; la maison forte a été édifiée au XIIe siècle sur l'emplacement d'une maison forte, un corps de logis fut construit à la fin du XVe siècle à l'emplacement de la courtine sud, accoté à la grosse tour. Il comporte un niveau et un comble, avec un toit très pentu qui fit l'objet d'une restauration au XXe siècle, avec deux fenêtres à croisillons de pierre sur la façade sud.  La façade nord fut refaite à la fin du XVIe siècle ; elle est percée d'une porte dont l'arc en anse de panier supporte un fronton brisé, que décore un écu bûché à la Révolution. L'édifice comprend un corps de logis à deux niveaux et attiques dans une enceinte rectangulaire avec plusieurs tours rondes, flanquée de tours rondes sur les angles reliant un mur qui ferme la cour.","habitants":"Famille de  François Guynet                                                                       Guillaume de Corbeil                                                               Guillaume De Brondeau\r\n        \"","divers":"Château d'Apremont et le manoir de la Motte à Arthel","gps":"","images":["../../jctruffet.com/image/image_58/58_Arthel_1.jpg","../../jctruffet.com/image/image_58/58_Arthel_2.jpg","../../jctruffet.com/image/image_58/58_Arthel_3.jpg","../../jctruffet.com/image/image_58/58_Arthel_4.jpg","../../jctruffet.com/image/image_58/58_Arthel_5.jpg","../../jctruffet.com/image/image_58/58_Arthel_6.jpg"]},"Consult_chateau_formulaire9087":{"id":"Consult_chateau_formulaire9087","dept":"58","canton":"Tannay","commune":"Asnois","nom":"Asnois","type":"Château","periode":"XV-XVIII","histoire":"A Asnois le château d'Asnois du XVIIIe siècle, de Blanchefort du  XVIIe siècle et de  Cuncy à quelques kilomètres à l'ouest à Villiers sur Yonne.                                                                          ASNOIS, de 1140 à 1403, la terre  appartient à la branche cadette des seigneurs de Saint-Vérain avant d'échoir aux Beaujeu. En 1469 à  Blain de Beaujeu, en cédant une partie des terres à Pierre de Digoine, partage le village en deux seigneuries Asnois le château passe par alliance dans les familles de Salazar, en 1496, puis de Blanchefort, en 1583, cette dernière réunissant les deux seigneuries. La terre d'Asnois échoit vers 1775, aux Lemuet de Bellombre. Les parties les plus anciennes du château de la fin du XVe siècle, les bâtiments actuels ont été reconstruits au XVIIe siècle par la famille de Blanchefort.                                          BLANCHEFORT de la famille de Blanchefort au XVIIe siècle . Le seigneur Adrien de Blanchefort y fait construire une tour carrée, semblable à celle de Saint-Jean-de-Losne, mais celle-ci est détruite pendant la Révolution. Aujourd'hui transformé en hôtel restaurant et  société civile immobilière.                                                    CUNCY; Le château, nest jamais resté longtemps au sein dune même famille, il a été acquit en 1846 par Edme Goyard et ses descendants le possèdent toujours.   Autre château de Cuncy à quelques kilomètres à Villiers sur Yonne avec tour crénelée.","architecture":"Asnois, les parties les plus anciennes du château de la fin du XVe siècle, les bâtiments actuels ont été reconstruits au XVIIe siècle, les communs datent de la première moitié du XIXe siècle.    Logis de plan en L comprenant un rez-de-chaussée de plain-pied, fortement taluté à l'ouest, un étage carré et un demi-étage. Bâtiment plus bas, sur l'angle nord-ouest, abritant une remise. Portail découvert en bordure de la rue du château, remise et écuries au même alignement, à droite du portail ; logis sur cave à gauche ; serre adossée et four à pain, à l'arrière, au même droit. Terrasse en contrebas, au sud, desservie par un escalier droit, au sud-est, et par un plan incliné, à l'ouest. Accès direct au coteau, à l'est, par un escalier rentrant interrompant le mur de soutènement de la terrasse, dans l'axe d'un kiosque en ciment armé à imitation de troncs ébranchés. Bâtiment ouest simple en profondeur avec deux salles voûtées en berceau segmentaire au rez-de-chaussée ; une cheminée monumentale en pierre de Chevroches dans le mur de refend de la salle nord.                                                          Blanchefort; du XVIe-XIXe siècle, cette maison bourgeoise est ce qui subsiste de l'ancien château féodal, autrefois ceints de murs. Incendié, le château est fortement remanié au XVIe siècle. Ce château a été la propriété de Paul-Jean Rigollot, inventeur des sinapismes.  Cuncy; est Lancienne maison forte construite au début du XIe siècle, puis remaniée aux XVe-XVIe siècles, et en partie détruite en 1592, alors que les troupes de Vézelay assiègent Clamecy.  Les douves sont comblées vers 1830 lorsque le cours de lYonne est détourné pour alimenter le canal. Il obtient en 1835 un aqueduc pour ses bassins. Reconstruit aux environs de 1610, sur lemplacement des anciennes courtines, sont ajoutée au donjon une tourelle. Il possède une tour porche impressionnante.","habitants":"Famille de Salazar                                                                      Famille de Blanchefort\r\n        \"","divers":"Le château de Blanchefort de Cuncy à Asnois et le château de Cuncy à Villiers sur Yonne","gps":"","images":["../../jctruffet.com/image/image_58/58_Asnois_1.jpg","../../jctruffet.com/image/image_58/58_Asnois_2.jpg","../../jctruffet.com/image/image_58/58_Asnois_3.jpg","../../jctruffet.com/image/image_58/58_Asnois_4.jpg","../../jctruffet.com/image/image_58/58_Asnois_5.jpg","../../jctruffet.com/image/image_58/58_Asnois_6.jpg","../../jctruffet.com/image/image_58/58_Asnois_7.jpg","../../jctruffet.com/image/image_58/58_Asnois_8.jpg","../../jctruffet.com/image/image_58/58_Asnois_9.jpg"]},"Consult_chateau_formulaire804f":{"id":"Consult_chateau_formulaire804f","dept":"58","canton":"Chatillon en Bazois","commune":"Aunay en Bazois","nom":"Aunay_Bazois","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à Aunay-en-Bazois et les vestiges féodales  à Broin du XVe siècle, le château de d'Aunay et de Beaume.                                   AUNAY, le fief est dans la famille Pioche jusqu'au milieu du XVIe siècle.   Vers 1620 : Claude d'Aunay d'Epiry épouse Urbaine de Roumiers ; vers 1640 : leur fille, Jeanne d'Aunay d'Epiry (morte en 1682), épouse Sébastien Le Prestre de Vauban (1633-1707) le 25 mars 1660 : leur fille, Charlotte Le Prestre de Vauban (1661-1709), épouse Jacques-Louis de Mesgrigny le 15 novembre 1679 ;  En 1700 : leur fils, Jean Charles de Mesgrigny (1682-1763), comte d'Aunay, aide de camp du maréchal Vauban, épouse Angélique Cécile Raguier de Poussey le 13 septembre 1713 , aux Mesgrigny succéda, en 1738, Louis Le Pelletier de Rosambo. Ce dernier épousa la fille de Jean-Charles de Mesgrigny, Aimée de Mesgrigny, qui lui apporta en dot tous les biens des Mesgrigny. Sa descendance devait tenir Aunay jusqu'en 1963.  \r\n1730 : leur fille, Claire Aimée de Mesgrigny dame d'Aunay (1719-10 juillet 1761), épouse Louis IV Le Peletier de Rosanbo en 1738 ; Louis Le Pelletier de Rosambo ; En 1780 : Charles-Louis-Marie Le Peletier, comte d'Aunay, époux de Marie Victurnienne Colbert de Maulevrier. Aux Mesgrigny succéda en 1738 Louis Le Pelletier de Rosambo dont la descendance a tenu Aunay jusqu'en 1963,  actuellement le propriétaire est la famille de Bourgoing.","architecture":"Aunay, les seigneurs résidaient, au début, dans la château qui pris nom de Bas-Fort après qu'une forteresse appelée Haut-Fort eut été édifiée dans la seconde moitié du XVe siècle. Celle-ci fut endommagée pendant les guerres de Religion, tandis que le Bas Fort était complètement détruit.  Le bâtiment principal ainsi que les tours ont été construits au XVIe siècle puis remaniés au début du XVIIe siècle. Ce qui fait que son aspect militaire a pratiquement disparu. Le corps de logis reliant les tours carrées ouest fut édifié au XVIIe siècle,  les communs datent du XVIIe siècle mais ils furent remaniés dans les années 1780.\r\nL'édifice, quadrilatère de plan régulier, se compose de deux étages La toiture est en ardoise et à longs pans. Dans l'alignement des deux tours, le bâtiment ouest fut flanqué un corps de bâtiment surmonté d'un fronton classique. Cette façade est percée de larges baies à petits carreaux dans la travée desquelles s'ouvrent des ils-de-buf.                                                                         Beaume;  corps de logis rectangulaire à deux niveaux  flanqué de pavillons rectangulaires sur les côtés de même niveau,  toit de l'ensemble à deux pans prononcés avec  lucarnes.","habitants":"Famille Pioche                                                                           Famille de Mesgrigny\r\n        \"","divers":"Chhateau d'Aunay et de la Beaume à Aunay en Bazois","gps":"","images":["../../jctruffet.com/image/image_58/58_Aunay_Bazois_1.jpg","../../jctruffet.com/image/image_58/58_Aunay_Bazois_2.jpg","../../jctruffet.com/image/image_58/58_Aunay_Bazois_3.jpg","../../jctruffet.com/image/image_58/58_Aunay_Bazois_4.jpg","../../jctruffet.com/image/image_58/58_Aunay_Bazois_5.jpg","../../jctruffet.com/image/image_58/58_Aunay_Bazois_6.jpg","../../jctruffet.com/image/image_58/58_Aunay_Bazois_7.jpg"]},"Consult_chateau_formulaire2508":{"id":"Consult_chateau_formulaire2508","dept":"58","canton":"Dornes","commune":"Lucenay lès Aix","nom":"Auzon_Lucenay","type":"Château","periode":"XVII","histoire":"AUZON, fief de la châtellenie de Decize, le château d'Auzon,  a compté jusqu'à 41 employés au service des ancêtres de Guillaume de Durat, dont 8 jardiniers. Mais ça, c'était avant.  Aujourd'hui, le jeune châtelain, qui vit à Paris la plupart du temps, se retrouve vite débordé quand il revient à sa propriété et qui doit s'en occuper, seul. Reste que la passion du lieu l'anime et il ne le lâchera pas.  La propriété est dans cette famille depuis 1802.","architecture":"Auzon : un château dont, aucun plan na été retrouvé avant la Révolution, était un château  du XIIIe siècle et  au XVIIe siècle de style empire et composé, dun corps principal  rectangulaire à deux niveaux et dune tour rectangulaire sur la droite style donjon à trois niveaux et à l'opposé d'un pavillon à trois niveaux avec clocheton sur la toiture en façade de ce pavillon une terrasse au deuxième niveau. Lucarnes côté parc avec fronton triangulaire sur les  différents toits.\r\nLe parc du château a été redessiné par le comte de Choulot au XIXe siècle et contient des essences rares.","habitants":"Famille de  Guillaume de Durat\r\n        \"","divers":"Château d'Auzon à Lucenay","gps":"","images":["../../jctruffet.com/image/image_58/58_Auzon_Lucenay_1.jpg","../../jctruffet.com/image/image_58/58_Auzon_Lucenay_2.jpg","../../jctruffet.com/image/image_58/58_Auzon_Lucenay_3.jpg"]},"Consult_chateau_formulairecd42":{"id":"Consult_chateau_formulairecd42","dept":"58","canton":"Décize","commune":"Avril sur Loire","nom":"Avril_sur_Loire","type":"Château","periode":"XV-XVI","histoire":"AVRIL-sur-Loire, motte de  Vaux fief de la Chatellenie de Decize. Château de la Croix du XVe siècle et commanderie du Feuilloux du XIIIe siècle,   les Templiers établirent la préceptorie des Loges-Feuilloux. L'ensemble des bâtiments occupait un carré dont la chapelle, édifiée en 1119, formait le côté sud. Cette chapelle est  toujours entière.  La Commanderie des Templiers fut reprise après 1307 par les Hospitaliers, puis au cours des siècles transformée en exploitation agricole. Comme le veut une légende de la région, le \"Trésor des Templiers\" serait enterré sous la Commanderie des Loges-Feuilloux.     Après le Temple, elle est tombée dans le patrimoine des Hospitaliers de Saint-Jean de Jérusalem, puis transmise aux chevaliers de Malte qui lont déclassée en simple établissement relevant dune commanderie de la Creuse, elle-même sous lautorité du prieur dAuvergne. La commanderie des Loges-Feuilloux est passée de mains en mains.","architecture":"la commanderie possède une nef non voûtée, terminée par une abside en cul-de-four. Les murs construits en bels appareils jusqu'à hauteur des contreforts et en moellons pour la nef, sont décorés par des corbeaux sculptés de masques. Érigée au XIIIe siècle, à proximité de la chapelle, la maison des chevaliers est  aussi l'uvre du Temple. La porte en accolade, dont le seuil est constitué d'une pierre tombale sur laquelle on distingue une fleur de lys et une tête, est ornée de deux écus.                                        Baugy, de plan rectangulaire à deux niveaux accolé d'une tour carrée sur la partie arrière et prolongé par un corps de logis sur la droite de style Renaissance.","habitants":"prieur dAuvergne\r\n        \"","divers":"Château de la Croix de Baugy et commanderie du Feuilloux à Avril sur Loire","gps":"","images":["../../jctruffet.com/image/image_58/58_Avril_sur_Loire_1.jpg","../../jctruffet.com/image/image_58/58_Avril_sur_Loire_2.jpg","../../jctruffet.com/image/image_58/58_Avril_sur_Loire_3.jpg"]},"Consult_chateau_formulaire2e73":{"id":"Consult_chateau_formulaire2e73","dept":"58","canton":"Saint-Benin d","commune":"Saint-Benin d","nom":"Azy_Vieil_Azy","type":"Château","periode":"XIX","histoire":"VIEIL-AZY, à l'origine fief des Saint-Père qui possédaient plusieurs domaines en Nivernais, au XVIe siècle Gilbert de Saint-Père cède le château à Charles de Girard seigneur de Passy et de Chérault chevalier de l'ordre du roi, a sa mort en 1581 son fils Gilbert le succède, son petit-fils  François décède en 1662 sans postérité sa veuve fit don à un de ses parents Pierre Filsjean seigneur de Prédefond et conseiller du roi, ses biens passent à sa mort à sa fille Catherine laquelle épouse en 1698 Michel de Las qui ce dernier au début du XVIIIe siècle, fait détruire une partie du château pour construire une aile plus confortable. Deux fils Louis-Henri et Jean-Baptiste seigneur de Prye. Louis-Henri conserve les terres d'AZY épouse Catherine-Louise Cordier de Launay trésorier général qui obtient en 1739 la nomination de ses terres en marquisat, meurt sans postérité en 1754 ses biens reviennent à un de ses neveux Michel-Mathieyu de Las  marquis d'Azy et comte de Prye fait carrière dans la cavalerie, décède en 1768 sans héritiers directes, les biens reviennent à sa sur Louise de Las, épouse  d'Emmanuel du Bourg qui cédera à son veuvage en 1788 à Léonor Brière qui se fera appeler Brière d'Azy, le château passera à son gendre Denis Benoist d'Azy suite à la construction d'un nouveau château  sur la commune de Saint-Benin, il cède le Vieil-Azy à leurs cousins dont les descendants des Brière d'Azy  son toujours propriétaires.                                                                              AZY, dit le nouvel Azy, le château  a été construit en 1847 sur  la demande du comte Denis Benoist d'Azy. De style Renaissance, il fut imaginé par l'architecte Angevin Delarue cette  imposante demeure  qui le réalise  de style néo-classique aux toits pentus  Denis Benoist d'Azy  (1796-1880), comte, député de la Nièvre, il épouse en 1822, Léontine Rose Amélie Brière d'Azy, fille de Léonor Brière d'Azy, maître de forges, propriétaire des fiefs de Chérault, Trailles, Azy, Mousseaux et Valotte et château du Vieil Azy 1881-1884 - Léontine Rose Amélie Brière d'Azy 1881 Paul Benoist d'Azy a occupé la fonction de maire de Saint-Benin-d'Azy en 1876, pendant quelques mois. Aujourd'hui propriété de la princesse Catherine de Croÿ.","architecture":"Le Château du Vieil Azy :  édifié fin XIVe siècle, seule une tour date encore de cette époque. Il est composé de trois bâtiments accolés en équerre. De style Renaissance,  protégé par des fossés et un étang aujourd'hui en partie asséché, à l'origine  un corps de logis flanqué de tours rondes   début du XVIe siècle, fait détruire une partie du château pour construire une aile plus confortable. La clef de voûte de la porte indique que les travaux s'achèvent en 1722.   La façade, est ornée de colonnes et de motifs sculptés au-dessus des portes et fenêtres. Il ne subsiste de l'édifice initial qu'une tour. De nouvelles transformations sont faites par ses héritiers. La partie la plus ancienne remonte au XVIe siècle. Le bâtiment lui faisant immédiatement suite, un peu plus élevé, semble être de la même époque mais  remanié surtout ce qui concerne la couverture et les lucarnes néogothiques.                Azy, de style renaissance comporte d'un vaste corps rectangulaire, flanqué de quatre tours octogonales aux angles à toits pentus se dressent sur trois étages  et d'une tour en fer à cheval sur le côté sud, sa façade ouest, possède un large perron prenant appui sur des arcades en anse de panier. Un escalier de pierres avec une rampe à balustres et à pilastres finement ouvragés dessert le premier étage. Les baies du second sont à fronton à moulures chantournées et fronton triangulaire. Sur la longueur de la façade court une corniche à modillons. La façade est accostée d'un avant-corps avec au premier niveau, trois portes-fenêtres en plein cintre encadrées par des colonnes jumelées et des pilastres corinthiens. La façade Est est semblable à l'occidentale.","habitants":"Comte Denis Benoist d'Azy\r\n        \"","divers":"Château d'Azy et du Vieil-Azy à Saint-Benin d'Azy","gps":"","images":["../../jctruffet.com/image/image_58/58_Azy_Viel_Azy_1.jpg","../../jctruffet.com/image/image_58/58_Azy_Viel_Azy_2.jpg","../../jctruffet.com/image/image_58/58_Azy_Viel_Azy_3.jpg","../../jctruffet.com/image/image_58/58_Azy_Viel_Azy_4.jpg","../../jctruffet.com/image/image_58/58_Azy_Viel_Azy_5.jpg","../../jctruffet.com/image/image_58/58_Azy_Viel_Azy_6.jpg","../../jctruffet.com/image/image_58/58_Azy_Viel_Azy_7.jpg"]},"Consult_chateau_formulaire175a":{"id":"Consult_chateau_formulaire175a","dept":"58","canton":"Lornes","commune":"Bazoches en Morvan","nom":"Bazoches","type":"Château","periode":"XVII","histoire":"le château de Bazoches dit de  Vauban du XVIIe siècle,                           BAZOCHES, c'est au XIIe siècle que Jean de Bazoches fait construire le château  sur l'emplacement d'un ancien poste romain. Jean-Baptiste Saladin de Montmorillon épouse Charlotte de Chastellux  vers 1485-1523, ont une fille : Charlotte Saladin de Montmorillon qui l'apporta en dot à son époux : Gabriel de La Perrière, seigneur de Billy qu'elle épousa le 22 février 1532. Elle tenait ce fief du côté de sa mère de la famille de Chastellux ; Louis de La Perrière et son épouse Jeanne de Lanty ; eut une fille Françoise  qui épouse en 1589  Jasques le Pestre de Vauban grand père de l'illustre ingénieur, puis le château passa par héritage et alliance  aux Ludovic de Vièvre , à Robert de Dormenieu et au comte de Melun,  ce dernier le vendit en 1675 à Sébastien Le Prestre de Vauban.  Qui entreprit des aménagements pour le transformer en garnison militaire.  En février 1675, le marquis de Vauban, natif de Saint-Léger-de-Foucheret, non loin de là, achète Bazoches qui avait appartenu à ses aïeux maternels.  Bazoches devient la demeure familiale de sa femme et de ses enfants, lui-même n'y fait que de rares et brefs séjours entre les campagnes militaires et le service du roi. Il profite de ces moments de repos pour parcourir la région. C'est à Bazoches qu'il rédige certains de ses ouvrages tels que ses Oisivetés et la fameuse Dîme royale (1707) ; En 1745  la fille de Vauban le vend à Denis Angran d'Alleray  qui ce dernier est guillotiné à la Révolution. Le château réintègre un siècle plus tard la famille par des alliance matrimoniales, en 1838 Ferdinand de Vibraye qui hérite  de Denis-François Agran d'Alleray, les actuels propriétaires, descendants de la fille ainée de Vauban, Charlotte de Vauban mariée au comte de Mesgrigny d'Aulnay, gardent de nombreux souvenirs de Vauban. Amaury de Sigalas et son épouse, descendants tous deux de Vauban. Il appartient aujourd'hui à madame de Mesgrigny.","architecture":"Le château de Bazoches  construit en 1180.  Il a la forme d'un trapèze irrégulier avec une tour ronde à chaque angle couronnées de mâchicoulis et un donjon carré, les logis sont disposés autour d'une cour intérieure on y pénétré par un pont-levis maintenant un pont dormant. Au XVIIe siècle, Vauban fait ouvrir une porte dans la façade arrière, afin de faciliter l'accès des voitures. Son histoire est longue, mais n'arrive sous les feux de la rampe qu'avec le Maréchal Vauban qui l'achète en 1675.  Il le fera agrandir, embellir, le rendra accueillant en y faisant installer des jardins à la rigueur militaire mais tellement reposants. Récemment restauré et remeublé, le château nous permet de mieux comprendre ce stratège militaire, ce visionnaire de la société, cet homme cultivé qui a tant marqué son temps et le notre également.  Vauban fait construire une grande galerie afin d'y installer ses ingénieurs militaires. C'est là que sont réalisés les études et les plans des nombreuses places-fortes que Vauban aménage au cours de sa carrière. Les communs du château abritent les écuries nécessaires aux chevaux des ingénieurs et des messagers.                           Neuffontaines, maison forte dont le corps de logis en équerre  englobe dans son angle intérieur la tour carrée de trois niveaux avec toit à l'impérial.","habitants":"Marquis de Sébastien le Pestre de Vauban\r\n        \"","divers":"Forteresse de Vauban à Bazoches et maison forte de Neuffontaines","gps":"","images":["../../jctruffet.com/image/image_58/58_Bazoches_1.jpg","../../jctruffet.com/image/image_58/58_Bazoches_2.jpg","../../jctruffet.com/image/image_58/58_Bazoches_3.jpg","../../jctruffet.com/image/image_58/58_Bazoches_4.jpg","../../jctruffet.com/image/image_58/58_Bazoches_5.jpg","../../jctruffet.com/image/image_58/58_Bazoches_6.jpg","../../jctruffet.com/image/image_58/58_Bazoches_7.jpg"]},"Consult_chateau_formulaire71d2":{"id":"Consult_chateau_formulaire71d2","dept":"58","canton":"Chante sur loire","commune":"Beaumont la Ferrière","nom":"Beaumont_Ferrière","type":"Château","periode":"XVI","histoire":"Trois  châteaux à Beaumont la Ferrière (article suivant ancien château et la maison des gardes)  celui de Beaumont du XVIIe siècle de Sauvages  du XVIIe siècle et  de la Ferrière XIXe siècle    BEAUMONT a été créée au XIIe siècle par les chanoines de Frasnay. En 1276  le seigneur Guillaume de Thianges. Il est bien difficile de savoir quel fut le seigneur de telle châtellenie, à quelles dates et dans quelles proportions. Beaumont n'échappe pas à la règle : Grenant, Sauvages et Choulot avaient leur propre seigneur. Au IXe siècle, Charlemagne, en rentrant d'Espagne, reste un an à Nevers. Plusieurs seigneurs se sont succédés jusqu'en 1784.  En 1406 : Jean de Saint-Palais, seigneur de Poiseux. En 1554 : Jacques d'Avantois, seigneur de Poiseux. En 1556 : Hugues d'Avantois, seigneur de Beaumont, Grenant, Sichamps. En 1587 : Benjamin d'Avantois, seigneur de Beaumont et Grenant. En 1660 : Charles Durand, seigneur en partie de Beaumont, Chasnay, Guichy, Murlinet  jusqu'en  1784 : passa à Pierre Babaud de la Chaussade, seigneur de Beaumont, Grenant, Sauvages, Sichamps, Guichy. Beaumont-la-Ferrière. Roseline de Larminat a une sur, Madeleine, née en 1924, qui se maria également à Villapourçon en 1950 avec un certain Olivier Napoléon Le Roux (1919-1988), le couple ayant eu quatre enfants. Les épouses Le Roux et de Ganay ont en commun des parcelles de forêts qu'elles valorisent à Villapourçon et environs proches. Quant à Roseline, elle continue de détenir, via la souche Cottu et de Larminat, des terres sur la commune de Limanton. le château de Sauvage est aujourd'hui, grâce au propriétaire des lieux, Jean Gondrand, un joyau du patrimoine du Pays de la Nièvre.","architecture":"Beaumont la Ferrière de style néo-classique Garde,  cette ancienne habitation, appelée château des Gardes, est située devant le porche d'entrée du château de Sauvages. Elle conserve un portail et une tourelle à pans du XVIIIe siècle.                                        La Ferrière bâti en 1859 pour le vicomte d'Anchald, de style Renaissance est composé d'un corps de logis face à la vallée de la Nièvre. La tour centrale de style Louis XIII, en saillie sur la façade, est en brique et en pierre calcaire. Les lucarnes sont ornées de candélabres sculptés. Un portail couvert, doté d'une grille, donne sur la place du bourg.                                                              Beaumont Ce manoir en pierre enduite a été bâti en 1850 au milieu du parc de l'ancien château.  Incendié en partie en 1940, il est restauré par les nouveaux propriétaires après la seconde guerre mondiale. En façade, l'escalier monumental donne accès à une terrasse et au parc.","habitants":"Famille d'Olivier Napoléon Le Roux\r\n        \r\n        \"","divers":"Château de la Férrière, des Gardes et de la Tourelle à Beaumont la Ferrière","gps":"","images":["../../jctruffet.com/image/image_58/58_Beaumont_Ferriere_1.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Ferriere_2.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Ferriere_3.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Ferriere_4.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Ferriere_5.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Ferriere_6.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Ferriere_7.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Ferriere_8.jpg"]},"Consult_chateau_formulairecf7c":{"id":"Consult_chateau_formulairecf7c","dept":"58","canton":"Charité sur Loire","commune":"Beaumont la Ferrière","nom":"Beaumont_Sauvages","type":"Château","periode":"XVI","histoire":"SAUVAGES, il crée, au cours de cette période, le fief de Sauvage, avec un bout de forêt, un clerc et un écuyer, pour mettre une garnison en place. Durant 200 à 250 ans, une famille d'écuyers jouera son rôle pour défendre la sûreté et développer la religion. Le château tombe en désuétude au XIIe siècle suite à une croisade dont les propriétaires ne réchappent pas. Durant plusieurs générations Sauvage deviendra propriété féodale, au profit du Duc de Nevers. En 1245 plusieurs habitants de Sauvages refusent de payer au seigneur la quête qu'ils étaient tenus d'acquitter à perpétuité.  Nommé gouverneur de la place de La Charité, Jacques de Morogues achètera le château, en 1579  se développent les forges de Sauvage, au point d'avoir jusqu'à cinq cents employés. Un des derniers seigneurs de Morogues se convertit au catholicisme et depuis cette époque se pratique le pèlerinage à Notre-Dame de Sauvage, encore effectué, aujourd'hui, le 15 août. Au cours du XIXe siècle, le château de Sauvage est devenu le temple de la chasse, durant une centaine d'années. Plus tard, le château restera inhabité et non entretenu pendant un peu plus d'un siècle. \r\nQuelques propriétaires identifiés: au XVe siècle: Jean Thenon, président des trésoriers de France à Bourges. En  1579 : Jacques de Morogues, seigneur de Sauvages et depuis 1987 Jean Gondrand l'a acquit.","architecture":"Sauvages, du XVIe et XVIIIe siècles,  de style baroque, Sauvages au cours du XIXe siècle, est devenu le temple de la chasse, durant une centaine d'années. Plus tard, le château restera inhabité et non entretenu, durant 108 ans. C'est alors que Jean Gondrand devient propriétaire de Sauvage, en 1987, le château s'est terriblement délabré.  Après plus de 20 années de  non habilitation, avec essentiellement des artisans locaux, la demeure s'est approchée au mieux de la réalité, dans un style rustique. Tout ce qui a pu être récupéré sur place, l'a été et, aujourd'hui c'est un joyau de patrimoine qui est offert à la vue des visiteurs.","habitants":"Famille de Jacques de Morogues\r\n        \"","divers":"Château des Sauvages à Beaumont la ferrière","gps":"","images":["../../jctruffet.com/image/image_58/58_Beaumont_Sauvages_1.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Sauvages_2.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Sauvages_3.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Sauvages_4.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Sauvages_5.jpg","../../jctruffet.com/image/image_58/58_Beaumont_Sauvages_6.jpg"]},"Consult_chateau_formulairea390":{"id":"Consult_chateau_formulairea390","dept":"58","canton":"Brinon sur Beuvron","commune":"Beuvron","nom":"Beuvron","type":"Maison forte","periode":"XV","histoire":"BEUVRON, les seigneurs de Beuvron sont successivement les familles Le Bourgoin, de Maquisson, de Faron, de Bigny, à compter du XVIIIe siècle, le château est à la famille de Charry. Hugues-Michel de Charry effectua en 1773 des transformations très contestées. Vendu comme bien national en lan III, le château est cédé en 1830 à Philibert Turgot, originaire de Vézelay, ancien garde du corps royal, chevalier de lordre royal et militaire de Saint-Louis, il ne le conserve que deux ans. Il devient la propriété de Monsieur Renduel.   Le château devient par la suite, la propriété du Maire de la commune : M. Renduel, actuellement le château nest visible que de lextérieur.","architecture":"Beuvron   est construit aux XVe siècle,  de style féodal, il est rénové aux XVII et XVIIIe siècles.  la façade principale se trouve donc à larrière. Le château présente un aspect massif. Le corps de logis rectangulaire et la tour carrée à mâchicoulis en équerre, une tour pentagonale côté entré et le bâtiment est relié à une aute tour ronde  sur la droite avec toit en poivrières.","habitants":"Famille Le Bourgoin\r\n        \"","divers":"Maison forte de Beuvron","gps":"","images":["../../jctruffet.com/image/image_58/58_Beuvron_1.jpg","../../jctruffet.com/image/image_58/58_Beuvron_2.jpg","../../jctruffet.com/image/image_58/58_Beuvron_3.jpg","../../jctruffet.com/image/image_58/58_Beuvron_4.jpg","../../jctruffet.com/image/image_58/58_Beuvron_5.jpg","../../jctruffet.com/image/image_58/58_Beuvron_6.jpg","../../jctruffet.com/image/image_58/58_Beuvron_7.jpg"]},"Consult_chateau_formulaire5433":{"id":"Consult_chateau_formulaire5433","dept":"58","canton":"Saint-Benin d","commune":"Billy_Chevannes","nom":"Billy_Chevannes","type":"Château","periode":"XIV-XV","histoire":"BILLY-CHEVANNES,   La seigneurie de Billy a appartenu aux familles de La Perrière et de Rémigny. Celle de Chevannes-Gazeau, était la propriété des familles de Pracomtal et Doreau. C'est vers 1792, que les 2 communes sont regroupées sous le nom actuel.        \r\nDUMPHLUM, au sommet d'un coteau, édifié sur un ancien château féodal construit par Philibert d'Anlezy au XIVe siècle,  et revient à la fin du XVIe siècle à l'un de ses descendants : Imbert, époux de Louise de l'Hôpital qui fera partie des 100 gentilhommes de la Maison du Roy.   Le pavillon carré est flanqué d'une tourelle à pans, abritant un escalier du XVe siècle, sculpté de 2 écussons, l'un à 3 faces frettées et l'autre d'hermine à la bordure engrêlée, représentant les armes de la famille d'Anlezy.  Il est remanié, vers 1769 par le Marquis de Rémigny de Joux,  membre de l'Assemblée de la noblesse du bailliage royal de Saint-Pierre-Le-Moutier.  Il a aussi appartenu à la famille de Lamoignon.","architecture":"Dumphlum, au sommet d'un coteau, édifié sur un ancien château féodal construit par Philibert d'Anlezy au XIVe siècle de plan en T à trois niveaux et Lucarnes sur toits brisés à la mansart, la tour ronde à trois niveaux également  toit en poivrières.  Sur la façade du corps intermédiaire pavillon d'entrée plein cintre semi hors uvre hexagonal  tourelle à pans à trois niveaux et lucarne sur toit brisé,  abrite un escalier datant du XVe siècle, sculpté de deux écussons, l'un à trois faces frettées, l'autre d'hermine à la bordure engrêlée, représentant les armes de la famille d'Anlezy. Il est remanié, en 1769.\r\n Au XIXe siècle, une aile à deux étages, couverte d'un toit à la Mansart, est ajoutée au bâtiment.","habitants":"Famille de Pracomtal                                                                       Famille de Philibert d'Anlezy\r\n        \"","divers":"A Billy-Chevannes le château de Dumphlum, de la Plaines et de Semlin","gps":"","images":["../../jctruffet.com/image/image_58/58_Billy_Chevannes_1.jpg","../../jctruffet.com/image/image_58/58_Billy_Chevannes_2.jpg","../../jctruffet.com/image/image_58/58_Billy_Chevannes_3.jpg","../../jctruffet.com/image/image_58/58_Billy_Chevannes_4.jpg","../../jctruffet.com/image/image_58/58_Billy_Chevannes_5.jpg","../../jctruffet.com/image/image_58/58_Billy_Chevannes_6.jpg","../../jctruffet.com/image/image_58/58_Billy_Chevannes_7.jpg"]},"Consult_chateau_formulaire69c4":{"id":"Consult_chateau_formulaire69c4","dept":"58","canton":"Clamecy","commune":"Billy sur Oisy","nom":"Billy_Oisy","type":"Patrimoine","periode":"XII-XV","histoire":"A Billy ruines féodales perchées de Musard du XIIIe siècle tour du XVIe siècle et vestiges des fortifications du château de Murat ou des Musard du XIIIe siècle fondé en  1215 par Hervé de Donzy. BILLY, la forteresse de Billy fut agrandie, en 1215, par Hervé de Donzy, comte de Nevers. Le chapitre fit de vives réclamations. Les évêques dAuxerre et dOrléans sempressèrent de sentremettre, et le comte consentit à échanger les propriétés quil avait au village dOisy contre celles que les chanoines dAuxerre possédaient à Billy ; cest, semble-t-il, au château dHervé que fut signé en 1250 lacte de mariage de Guy-Béchart, chevalier, avec Isabeau, fille de Geoffroy de Billy, maréchal du Nivernais.  Cette partie, il y a deux siècles ou plus, semblait moins endommagée que le reste de lédifice, ruiné complètement. Il semble que les premiers comtes de Nevers se plurent à habiter le château de Billy. Leurs successeurs le négligèrent jusquen 1214, où Hervé et la comtesse Mahaut de Courtenay, son épouse, le firent restaurer. Le comte Hervé étant décédé en 1221, la comtesse Mahaut cessa dhabiter Billy et ny revint quen 1250. Le mercredi après Pentecôte de lan 1281, Robert de Flandre, et en 1296, Louis de Flandre, comtes de Nevers, rendirent à Guillaume de Grez et à Pierre de Mornay, évêques dAuxerre, hommage pour le château de Billy. Par lettres patentes, datées de Saint-Germain-en-Laye, en mai 1544, François Ier autorisa les habitants de Billy à clore à leurs frais leur ville « de murailles, portes et poteaux, pont-levis, fossés et autres fortifications quils verront et connaîtront être requises nécessaires et convenables pour la sûreté, garde et conservation de leurs susdites personnes et de leurs biens.                                              OISY Pas d'information historique.","architecture":"Billy sur Oisy, les murailles de lancienne ville sont encore visibles en beaucoup dendroits. Le mur denceinte était flanqué de douze tours, il avait 900 mètres de circonférence. Le bourg actuel, qui occupe le même emplacement, sest considérablement étendu depuis. En 1834, on a détruit, pour la construction de ce qui fut appelé « la route n° 11 », une des anciennes portes, qui était en assez bon état. Lautre porte, du côté du faubourg Saint-Didier, avait disparu depuis fort longtemps. On voit encore figurer sur les plans cadastraux dressés en 1829 six tours debout qui, à cette époque, semblaient assez bien conservées.   Une tour en est lunique vestige.                                                                   \r\nDeux châteaux à Oisy, le château d'Oisy-Savigny de plan rectangulaire à deux niveaux du XIXe siècle toit en croupe avec trois lucarnes en façade et l'autre château d'Oisy  de plan rectangulaire un rez-de chaussée et un étage en lucarne sur comble à toit brisé en façade porte d'entrée saillante avec fronton triangulaire et à l'arrière sur parc pavillon d'entrée saillant toit à fronton  triangulaire et balconnet.","habitants":"Maréchal Geoffroy de Billy\r\n        \"","divers":"Château de Savigny et vestiges de remparts à Billy sur Oisy","gps":"","images":["../../jctruffet.com/image/image_58/58_Billy_Oisy_1.jpg","../../jctruffet.com/image/image_58/58_Billy_Oisy_2.jpg","../../jctruffet.com/image/image_58/58_Billy_Oisy_3.jpg","../../jctruffet.com/image/image_58/58_Billy_Oisy_4.jpg","../../jctruffet.com/image/image_58/58_Billy_Oisy_5.jpg","../../jctruffet.com/image/image_58/58_Billy_Oisy_6.jpg"]},"Consult_chateau_formulairec4d1":{"id":"Consult_chateau_formulairec4d1","dept":"58","canton":"Guerigny","commune":"Saint_Firmin","nom":"Bligny_St_Firmin","type":"Château","periode":"XIX","histoire":"BLIGNY  date du XIXe siècle, en 1650, sous lancien régime, la seigneurie appartenait aux familles de Boiserand et dAncienville. La famille d'Ancienville, en 1513 Guillemette d'Ancienville se marie avec Gilles de Vaudray, seigneur de Saint Phalle. En 1547 : Claude d'Ancienville devient veuve de Philippe de Boisserand. En 1592  Magdeleine d'Ancienville s'allie à Robert de Berzeau, baron de Moulins, gentilhomme. Suzanne dame de Venteuil, donne le titre à Scipion de Berzeau, son cousin germain, Baron en 1629. En 1635 : Louise d'Ancienville épouse Achille de la Grange d'Arquian ; elle est marquise d'Epoisse, comtesse des Bordes, de Bourgogne, dame de Saint-Firmin de Bussy. En 1690 : Anne de Nerville se marie à Adrien de Bongard, décédé à Saint Firmin. En 1692 : baptême de Françoise Moreau à Saint-Firmin. En 1692 : décès de Anne de Migni, épouse de Adrien Bongard, gendarme du Roy à Saint-Firmin. En 1693 : mariage de Laurence de Limoge. En  1687 le seigneur de Valotte fournit dénombrement pour sa terre de Lancray qu'il vend à Guillaume et Etienne Desprez. En octobre 1694 : décès de Catherine Desprez.\r\nEn juin 1702 : Charles Desprez, seigneur de Brozeaux, vend à sa sur Marguerite son droit de dîne de Saint Firmin de Bussy. En 1739  : Mort de Louis Desprez de Bussy marié à Françoise Brunet. Leur fille Françoise était mariée avec Pierre René de Charry.","architecture":"Le Château de Bligny du XIXe siècle.  Son corps de logis principal est encadré de deux tourelles carrées en saillie. Lucarne sur comble. Une salle supplémentaire, surmontée dune terrasse, rompt son caractère symétrique. Les dépendances sont accolées au logis.\r\nSon corps de logis principal est encadré de 2 tourelles carrées en saillie. Une salle supplémentaire, surmontée d'une terrasse, rompt son caractère symétrique. Les dépendances sont accolées au logis.","habitants":"Familles de Boiserand\r\n        \"","divers":"Château de Bligny à Saint-Firmin","gps":"","images":["../../jctruffet.com/image/image_58/58_Bligny_St_Firmin_1.jpg","../../jctruffet.com/image/image_58/58_Bligny_St_Firmin_2.jpg"]},"Consult_chateau_formulaire1942":{"id":"Consult_chateau_formulaire1942","dept":"58","canton":"Saint-Sauge","commune":"Bona","nom":"Bona","type":"Château","periode":"XV-XVIII","histoire":"Plusieurs châteaux à Bona (voir article)  vestiges du château d'Huez du XVIIIe siècle, de Charry, de Lichy du XVIe siècle et de Marancy.\r\nLICHY, Jacques Gabriel de Lichy  fait partie de l'assemblée de la noblesse du Nivernais en 1789, et son fils Joachim de Lichy est l'un des premiers maires de Bona. Nationalisé et vendu à la Révolution, il est racheté par la famille, qui le conserve jusqu'au décès, en 1980, du presque centenaire baron Guillaume Taveau de Morthemer, dernier représentant de la branche aînée par sa mère Octavie de Lichy. Son neveu par alliance, M. Antoine De Briey, qui se l'était fait donner peu avant son décès, vend le château de Lichy  qui est cède en 1997 à monsieur  André. En 1988, le dernier héritier de la famille de Lichy a vendu le château à monsieur de Luppé. Celui-ci l'a revendu en 1998 au propriétaire actuel, monsieur Vincent.\r\n  CHARRY, la première mention de Charry date, comme celle de Huez, de 1248 \"villa Chariacum\". C'était un fief relevant du château de Billy, en 1710, le curé Charlot de Bona note qu'un incendie criminel ravagea la ferme de Charry. Au XVIIe siècle, Arnaud de Charry est donné comme seigneur de Précy. En 1793, ont été vendus en bien national, la Sainte-Catherine-Bois château et la terre de Charry cédées au seigneur de Corvol qui avait émigré. Rappelons que les fiefs de Huez, la Bretonnière, Précy et Giverdy relevaient de la seigneurie de Charry. Ce fief a donné son nom à une des plus anciennes familles nobles du Nivernais. L'imposante demeure de Charry rappelle son passé historique.  \r\nMARANCY les fiefs de Giverdy, Marancy, Agland et Charry appartiennent au XVIe siècle aux familles du Verne. En 1720, eut lieu l'inventaire de la maison-forte de Françoise Challe, veuve du Verne, seigneur de Marancy, chez maître Gabriel Jean-Baptiste Coquille, notaire à St-Saulge. Le domaine a été longtemps mis sous fermage. En 1793, ont été vendus en bien national, la Ste Catherine-Bois Château et la terre de Charry cédées au seigneur de Corvol qui avait émigré. Rappelons que les fiefs de Huez, la Bretonnière, Précy et Giverdy relevaient de la seigneurie de Charry. Ce fief a donné son nom à une des plus anciennes familles nobles du Nivernais. L'imposante demeure de Charry rappelle son passé historique.","architecture":"Château de Lichy du XVIe siècle, flanqué de tours, s'est développé sur une exploitation agricole gallo-romaine située aux sources de l'Ixeure,   la maison-forte seigneuriale des Lichy a dû être reconstruite plusieurs fois, et, en dernier lieu, après les Guerres de Religion à la fin du XVIe siècle, après que le roi Henry IV l'ait fait restituer à ses propriétaires. Les fossés d'enceinte ayant été comblés au XIXe, une grosse tour du XVe siècle transformée en colombier, demeure comme seul vestige de l'ancien château,  fut endommagé pendant les guerres de religion, il ne reste que la grosse tour transformée en colombier au XVIIe siècle. La famille perdit alors ses titres et les réclama au roi Henri IV qui délivra aussitôt des lettres patentes et y traça, dit-on, de sa main: «LICHY DE LICHY, aussi noble qu'Henry».\r\nLe château actuel, édifié au début du XVIIe siècle après cette restitution du titre, comporte un corps central rectangulaire flanqué à chaque angle de tours rondes surmontées de toits coniques en ardoise. A l'angle Nord-Ouest de l'ancienne enceinte s'élève une petite tour ronde.\r\nCharry  on ne sait s'il existait un château ou un simple logis de maître dans l'enceinte de la ferme, il reste en tout cas un pigeonnier du XVIIe siècle, marque de seigneurie.","habitants":"Louis-Jacques-Henri de Chanannes de Vergers                               Comte Jean de Luppé\r\n        \"","divers":"le château de Charry, de Lichy et de Marancy à Bona","gps":"","images":["../../jctruffet.com/image/image_58/58_Bona_1.jpg","../../jctruffet.com/image/image_58/58_Bona_2.jpg","../../jctruffet.com/image/image_58/58_Bona_3.jpg","../../jctruffet.com/image/image_58/58_Bona_4.jpg","../../jctruffet.com/image/image_58/58_Bona_5.jpg","../../jctruffet.com/image/image_58/58_Bona_6.jpg","../../jctruffet.com/image/image_58/58_Bona_7.jpg","../../jctruffet.com/image/image_58/58_Bona_8.jpg"]},"Consult_chateau_formulaire4a89":{"id":"Consult_chateau_formulaire4a89","dept":"58","canton":"Saint-Sauge","commune":"Bona","nom":"Bona_II","type":"Château","periode":"XV","histoire":"BONA, le comte de Nevers abandonne au prieur de Saint-Etienne, dépendant de Cluny. Ce sont ensuite les moines de Saint-Etienne de Nevers qui reçoivent après 1088 la seigneurie de Bona. Un siècle plus tard, ils en rétrocèdent la moitié au comte de Nevers, pour échapper au \"droit de gîte et de procuration\" très onéreux que celui-ci s'était réservé. Sous la gestion de ses deux seigneurs, En 1320, le chevalier Michel de Bona, concède aux Bénédictins de Saint-Etienne de Nevers un droit de cens et de minage qu'il possède sur le moulin. De 1490 à 1676 les nouveaux seigneurs de Bona appartiennent aux familles \"de Girard\" et \"du Verne\".                           HUEZ, Hugoniet, Seigneur de Huez et de Charry. En 1678, Samuel de Charry donne Huez en dot à sa fille qui épouse Hubert de Chabannes de Vergers. En 1784, à la mort de Marie Salonnier, veuve de Paul de Chabannes. C'est à l'occasion de son mariage avec Pauline-Louise-Henriette de Chabannes (née à Huez en 1808) qu'il rachète la maison-forte d'Huez et la fait reconstruire à l'occasion de sa retraite de l'armée, après la Révolution de Juillet. Vers 1820, Louis-Jacques-Henri de Chanannes de Vergers le vend à M. de Vanoix. En 1828, Edouard Charles de Saint-Phalle, rachète la propriété, il décède en 1874, et comme ses fils sont morts avant lui, c'est son petit-fils Pierre de Saint-Phalle qui reprend la propriété d'Huez,  ce dernier sera d'ailleurs maire de Bona. Après son décès en 1937, puis celui de sa femme en 1942, passe en indivision qui dure une quinzaine d'années, un partage entre ses enfants aboutit à ce que Bernard devienne le nouveau propriétaire d'Huez. En 1957, ce sont deux de ses filles (Mme de Féligonde et Mme Wallaert) qui deviennent copropriétaires, jusqu'à ce que Mme Wallaert donne sa part d'indivision à son fils aîné, le colonel Claude Wallaert. Il appartient à une famille originaire de Champagne fixée à Cudot, depuis le XIIIe siècle et dans le Nivernais depuis le XVIIe siècle, au château de Montgoublin.","architecture":"Pas d'information sur le  de château à Bona.                                     Huez, s'agit plus exactement d'une maison forte, dont la première construction à proximité de l'église de Huez remonte sans doute aux alentours de 1316. corps de logis de deux niveaux entre deux pavillons rectangulaire à deux niveaux et lucarnes sur toit brisés. Déjà en 1303 la famille de Charry se transmettait une motte près de l'église de Vuée. En 1828 le comte de St Phalle époux d'une des héritières rachète la propriété de Huez  et entreprend en 1830 la reconstruction de la maison qui est toujours propriété de la famille. \"De l'ancienne maison démolie vers 1830, il ne reste que très peu de vestiges: une meurtrière, des pierres portant des marques de tâcherons\".","habitants":"Famille de Edouard de Saint-Phalle\r\n        \"","divers":"Château d'Huez à Bona","gps":"","images":["../../jctruffet.com/image/image_58/58_Bona_II_1.jpg","../../jctruffet.com/image/image_58/58_Bona_II_2.jpg","../../jctruffet.com/image/image_58/58_Bona_II_3.jpg"]},"Consult_chateau_formulaireab8b":{"id":"Consult_chateau_formulaireab8b","dept":"58","canton":"Chatillon en Bazois","commune":"Brinay","nom":"Brinay","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux dont celui de Brinay bâtiment fortifié du XIIIe siècle et le manoir de Palluau.                                                  BRINAY Pas d'information historique. château du XVe-fin du XVI-XIXe siècle). Si la seigneurie de Brinay est mentionnée dès le milieu du XIIIe siècle, une maison forte n'y est attestée qu'un siècle plus tard, en 1357. De l'ancienne maison forte qui défendait au XIVe siècle la vallée de l'Aron ne subsistent que trois tours d'angle et les soubassements de la quatrième tour au sud-est.        PALLUAU, ancien fief de Palluau appartient à la famille Nourry du XVe au XVIIIe siècle.","architecture":"Brinay; ancienne maison-forte du XIIIe ou XIVe siècle, située à l'extrémité Est du village, dont ne subsistent que les tours d'angle. Devenu château au fils du temps. A la fin du XVIe siècle construction d'un corps de bâtiment sur la courtine Est; au XIXe siècle communs sur la courtine nord ; château remanié aux XVIIe et XIXe siècle. L'édifice de plan régulier se compose d'un étage carré et d'un étage en surcroît, le gros-uvre : moellon ; enduit; calcaire, type de couverture : toit à longs pans, croupe et toit conique, couverts d'ardoise et de tuiles plates.                            Le manoir de Palluau,  les bâtiments actuels paraissent dater du XVIIe siècle, comprend un corps de logis de plan barlong flanqué sur les angles sud-ouest et nord-est de deux tours massives rectangulaires.","habitants":"Seigneurie de Brinay                                                                     Famille Nourry\r\n        \"","divers":"Château de Brinay et manoir de Palluau","gps":"","images":["../../jctruffet.com/image/image_58/58_Brinay_1.jpg","../../jctruffet.com/image/image_58/58_Brinay_2.jpg","../../jctruffet.com/image/image_58/58_Brinay_3.jpg","../../jctruffet.com/image/image_58/58_Brinay_4.jpg","../../jctruffet.com/image/image_58/58_Brinay_5.jpg"]},"Consult_chateau_formulairec9c5":{"id":"Consult_chateau_formulairec9c5","dept":"58","canton":"Brinon sur Beuvron","commune":"Brinon sur Beuvron","nom":"Brinon_Beuvron","type":"Maison forte","periode":"XIII","histoire":"BRINON,  le Seigneur dAunay possède le fief, construction  en maison forte au XIIIe siècle, par la Guillaume Pioche seigneur d'Aunay passa en dot à sa fille qui épouse Jean de la Rivière, ses descendants gardent
