 le fief jusqu'au milieu du XIVe siècle qui passe ensuite aux Chatel-Perron, puis en 1384 à Guillaume de Mello et par alliance passe en 1404 aux Montaigu seigneur de la Roche-de-Milay, et  à la fin du XVe siècle, par une alliance complémentaire porte le fief à Hugues de Rabutin  ancêtre de Marie-Chantal de Rabutin marquise de Sévigné, Hugues, seigneur d'Epiry, de Balorre et d'Huban et lieutement d'une armée. Sa descendance Benigne de Rabutin apporte Brinon en dot à François d'Anzely, leur fille Françoise  qui hérite de Brinon épouse en 1601 Pierre de Jaucourt seigneur de Vaux.   Conservé jusquau début du XIXe siècle par les de Jaucourt, au moment où la sur de François Arnail de Jaucourt lapporte en mariage à François de Baschi, comte de Cayla.  Cest leur belle-fille, née Zoé Victoire Talon, devenue comtesse Cayla qui devient légérie de Louis XVIII.\r\nDepuis une quarantaine dannées, une famille séjourne dans ce château, elle a entrepris une très belle restauration et prête son parc lors de différentes manifestations culturelles. Aujourd'hui propriétaire madame Allix.","architecture":"Le château de Brinon : maison forte au XIIIe siècle remanié en château au XVe-XVIIe siècles, sur les structures dune ancienne maison forte la famille de Rabutin édifie le château et fait   élever les tours d'angles, deux corps de logis sont construits, flanqués dune tour ronde et dune tour carrée. Un bâtiment avec un toit à la Mansart, prolonge une aile en retour déquerre avec belle lucarne\r\n Le colombier : du XVIIIe siècle à Courcelles.\r\nLe village de Courcelles était indépendant de Brinon, il reste un seul vestige de la châtellenie de Courcelles : un colombier qui, selon le décret de lEtat révolutionnaire, aurait dû être démoli. Il est remanié au XVIIe siècle et conservé jusquau début du XIXe siècle par les de Jaucourt.","habitants":"Famille de Rabutin\r\n        \"","divers":"Maison forte de Brinon","gps":"","images":["../../jctruffet.com/image/image_58/58_Brinon_Beuvron_1.jpg","../../jctruffet.com/image/image_58/58_Brinon_Beuvron_2.jpg","../../jctruffet.com/image/image_58/58_Brinon_Beuvron_3.jpg","../../jctruffet.com/image/image_58/58_Brinon_Beuvron_4.jpg"]},"Consult_chateau_formulaire1a2f-2":{"id":"Consult_chateau_formulaire1a2f-2","dept":"58","canton":"Pouilly sur loire","commune":"Bulcy","nom":"Bulcy","type":"Vestiges_Manoir","periode":"XIII-XVI","histoire":"Trois édifice à Bulcy dont le château ruiné de Bulcy du XIIIe siècle, le château de Neuville du XVe siècle et le manoir de Bulcy du XVIIe siècle.                                                                    \r\nBULCY, les vestiges du château féodal de Bulcy, de  Pierre de la Vigne de Bulcy, Le manoir de Bulcy, qui paraît avoir été édifié à la fin du XVIe siècle par un membre de la famille de La Vigne.  NEUVILLE, est situé au lieu-dit Neuville, château du XIVe siècle, qui a appartenu à Jean-Guillaume Hyde de Neuville au XIXe siècle. Pierre de la Vigne de Bulcy, écuyer, seigneur de Bulcy du XVIIIe siècle. Jean-Guillaume Hyde de Neuville, homme politique français, ministre de la Marine, ambassadeur aux États-Unis, député de la Nièvre.","architecture":"Bulcy,  les vestiges du château féodal de Bulcy, est un château de plan carré, il est entouré de fossés et renforcé de tours dangles. Il nest visible que des ruines dune tour ronde découronnée et deux des cinq baies datées du XVe siècle, et de la courtine ouest. Il est placé sur une propriété privée.   \r\nLe manoir de Bulcy, qui paraît avoir été édifié à la fin du XVIe siècle, corps de logis rectangulaire à deux niveaux flanqué dans sa partie centrale d'un pavillon carré  de trois niveaux avec toit à quatre pans. Sur le côté gauche un balcon sur arcade et surmontée d'une série de colonne supportant le toit de forte inclinaison.   Des modifications lui ont été apportées au XVIIe siècle.\r\nLe château de Neuville, au lieu-dit Neuville. Château du XIVe siècle, peu visible, corps de logis rectangulaire à un niveau, toit à deux pans, flanqué de deux  tours carrées  de chaque côté et une tour ronde à mâchicoulis.","habitants":"Famille Pierre de la Vigne de Bulcy,                                                    Jean-Guillaume Hyde de Neuville\r\n        \"","divers":"Vestiges du château, manoir de Bulcy et château de Neuville à Bulcy.","gps":"","images":["../../jctruffet.com/image/image_58/58_Bulcy_1.jpg","../../jctruffet.com/image/image_58/58_Bulcy_2.jpg","../../jctruffet.com/image/image_58/58_Bulcy_3.jpg","../../jctruffet.com/image/image_58/58_Bulcy_4.jpg","../../jctruffet.com/image/image_58/58_Bulcy_5.jpg","../../jctruffet.com/image/image_58/58_Bulcy_6.jpg"]},"Consult_chateau_formulaire54da":{"id":"Consult_chateau_formulaire54da","dept":"58","canton":"Cosne-Cours sur Loire","commune":"Cosne-Cours sur Loire","nom":"Buranlure","type":"Château","periode":"XV","histoire":"BURANLURE,  entre les belligérants et Buranlure accueillait alors les fidèles du roi de France Charles VI et Charles VII son fils « le roi de Bourges » à partir de 1422  pour protéger la région des incursions Anglaises.  Également en 1420, le seigneur de Buranlure recueille huit moines de Saint-Satur, seuls survivants de lincendie de leur abbaye et de la noyade organisée par des Anglais. Quelques années plus tard, Françoise de Vinon épouse Jean de Bar, reconstruit en partie après 1524 pour la famille de Vinon  À leur fils, maître des eaux et forêts du Sancerrois, succède leur petit-fils Antoine de Bar, lun des plus actif soutien du parti catholique qui en 1573, sous le règne de Henri IV (suite au massacre de la Saint-Barthélemy du 24 août 1472 étendu à plus dune vingtaine de villes de province durant les semaines suivantes) rejoint avec cent hommes le maréchal de La Châtre, dont les troupes assiègent Sancerre, et obtient le gouvernement de la ville. Propriétaire madame de Vogüé.","architecture":"Buranlure, reconstruit en partie après 1524 . Au XVIIIe siècle, un pont de pierre dune arche a remplacé lancien pont-levis et permet laccès au château. L'entrée dans la cour intérieure se fait en passant sous une tour carrée, cette cour est entourée de bâtiments construits en utilisant les restes du château féodal primitif dont il reste des vestiges. Face à lentrée, le fond de la cour est occupé par un bâtiment du XVe siècle dont la façade est coupée en deux par une tourelle descalier. Il est percé de fenêtres ornées de colonnettes ou de moulures prismatiques. Les ailes qui bordent la cour, au nord et au sud, sont postérieures, les murailles extérieures furent percées de grandes fenêtres. Au premier étage de laile sud se trouve la chapelle ainsi quune pièce dont le manteau de la cheminée est sculpté dune frise Renaissance représentant un combat de cavaliers mythologique.    Chemin de ronde, les meurtrières dans les murs de plus dun mètre dépaisseur. Le bâtiment central est du XVe siècle, laile sud du XVIe siècle. La tour octogonale de la cour qui abrite lescalier à vis et les fenêtres à meneaux ont été rajoutés au XVIe siècle, ainsi que les 7 splendides cheminées Renaissance quon retrouve dans les salles principales.\r\nLe domaine, au bord de la ruine, est mis en vente en 1718, puis en 1769, époque à laquelle le château fut transformé en métairie. Habité jusquen 1932 par des familles de fermiers, Buranlure échappe ainsi à toute restauration intempestive.","habitants":"Famille de Vinon\r\n        \"","divers":"Château de Buranlure","gps":"","images":["../../jctruffet.com/image/image_58/58_Buranlure_1.jpg","../../jctruffet.com/image/image_58/58_Buranlure_2.jpg","../../jctruffet.com/image/image_58/58_Buranlure_3.jpg","../../jctruffet.com/image/image_58/58_Buranlure_4.jpg","../../jctruffet.com/image/image_58/58_Buranlure_5.jpg"]},"Consult_chateau_formulaire4350":{"id":"Consult_chateau_formulaire4350","dept":"58","canton":"Luzy","commune":"Semelay","nom":"Bussière","type":"Manoir","periode":"XV","histoire":"BUSSIERE,  en 1146 Hugues et Guy de La Bussière, alias de Marry,  Jean Testefort, écuyer, seigneur de La Bussière,  en 1327. Guillaume de La Bussière, son fils, en 1374. Philibert Testefort  en 1408. Pierre, seigneur de La Bussière, de Marry, de Chiddes, de Las, de Buzon, Il laissa deux enfants, Jacques et Marguerite, qui firent aveu pour la maison forte de Marry, en 1464. Guillaume Ier de La Bussière, ou de Marry, son frère, écuyer, seigneur du lieu, de Chevannes-Ribaude, de La Comelle, en 1460, à René Boret. Guillaume II, seigneur de Marry, de La Bussière, de Montécot, de Solière  eut de Charlotte de Boutillat trois enfants : Léger, qui lui succéda. Jean vendit ses droits, en 1538, à Philibert de Barvault, son beau-père, seigneur de Montmort. Léger assista, en 1546, au mariage d'Antoinette de Reugny du Tremblay, et laissa une fille, Jeanne de Marry, qui porta La Bussière à noble Imbert de Paris, chevalier, seigneur d'Artay et de Bonneron. Jeanne mourut jeune, laissant trois fils, au nom desquels Imbert reprit le fief, en 1575. Jacques, seigneur de La Bussière, de Guerchy et de Charron, épousa Marie Courtois, qui lui donna cinq enfants. Les biens sont partagés en 1663. Edme de Paris, dit de La Bussière, seigneur du lieu, épousa Bénigne de Courvol, sa cousine, et en eut deux fllles : Marie, femme de François de Burdelot, sieur de Monteuille-lès-Forêts, et Marguerite, mariée, en 1669, à Antoine de Montcorps, seigneur de Chéry. Jean de Paris, se disant aussi seigneur de La Bussière, en 1703, laissa deux fils, Jean et Robert. Passa ensuite à messire Maillard. Il la vit saisir, en 1731, par les officiers de la chambre des comptes de Nevers.  Ce seigneur laissa une fille, Catherine, mariée à Étienne Aladane, lieutenant de maréchaussée, auquel elle porta La Bussière. Marie-Claude, issue de cette union, épousa, en 1769,  François de Cullon, chevalier de Saint-Louis, sieur de Chavigny. Jean-Baptiste du Gas de Martelay, aussi chevalier de Saint-Louis et gouverneur de Montbrison,  seigneur de La Bussière, â cause de Catherine-Antoinette Desbatisse, sa femme; il mourut au château, en 1778. Cet ancien fief appartient actuellement à la famille Charleuf.","architecture":"Bussière, Buxeria, sur une hauteur, près de la route de Luzy, à l'est de Sémelay, est un castel en partie du XVe siècle et en partie moderne. Sa position mérite de fixer l'attention des amis des beaux paysages. Sur la terrasse, près du manoir, on voyait, en 1721, une chapelle de quinze pieds de long, sur onze de large. Les caves du château ont été creusées dans le roc.  Bussière est un logis aux belles proportions construit sur un plan rectangulaire, avec deux avancées formant un U,  flanquée dune tour carrée au nord et dune tour hexagonale au sud, elle montre un blason sur le linteau de la porte dentrée représentant les armes des premiers  seigneurs de la Bussière. Bretèche et canonnières gardent lentrée et donnent à la Bussière toute son identité de Maisons fortes. Un magnifique escalier à vis en pierre nous accueille dans lentrée. Lappui des fenêtres à lextérieur et lentrée des portes à lintérieur de la tour sont gardées par des marmousets étranges et énigmatique.","habitants":"Guillaume Ier de La Bussière\r\n        \r\n        \"","divers":"Manoir de la Bussière à Sémelay","gps":"","images":["../../jctruffet.com/image/image_58/58_Bussiere_1.jpg","../../jctruffet.com/image/image_58/58_Bussiere_2.jpg","../../jctruffet.com/image/image_58/58_Bussiere_3.jpg"]},"Consult_chateau_formulaire9752":{"id":"Consult_chateau_formulaire9752","dept":"58","canton":"Saint-Benin d","commune":"Beaumont-Sardolles","nom":"Cave","type":"Château","periode":"XVII","histoire":"CAVE  de la famille de la Ferté Meung, vieille famille originaire de l'Orléanais depuis le XIIe siècle par mariage et héritage, au début du XVIIe siècle, le château eut pour seigneur de la Cave : Anne Achille, qui en 1767 renonça à son titre au profit de son frère Germain. Par héritage, en 1780, tout le reste de la commune tomba dans l'escarcelle familiale hormis : les domaines de la Mare, du grand Lugues et de Pinchard. Ce fut le rendez-vous de chasse des Ducs de Nevers. Germain va rester curé de Beaumont Sardolles jusqu'en 1793, date à laquelle il émigre en Suisse et s'y éteint en 1795. A la Révolution, le château de la Cave est  saisi et vendu comme bien national.  Il appartenait à Camille-François Mathieu, un éleveur de bovins très cultivé et amateur d'art, ce qui n'est pas incompatible, avant de devenir la propriété, par héritage, de sa petite fille la marquise de Saint-Vallier.  Il passe ensuite à la famille de Pracomtal, par alliance, puisque le fils du châtelain de Châtillon-en-Bazois, épousa une demoiselle de Saint-Vallier. De la famille de la Croix de Chevrières de Saint Vallier. C'est ensuite à la famille de Castellane que revient le domaine.  Le comte César Elzear Boniface de Castellane (1891-1967) sera le dernier de la lignée à occuper le château de La Cave puisque son fils Hugues César devient prêtre et en fait don à une association juive.  En 2010, il est finalement racheté par des propriétaires privés qui le renomment \"Château du Chêne\" en s'inspirant du vieux chêne proche de l'ancienne chapelle, planté il y a plus de 450 ans.","architecture":"Le Château de la Cave , est victime d'un incendie vers 1860 ; il sera reconstruit en 1862. d'un corps de logis rectangulaire à deux niveaux sur la partie central l'entrée est surélevé d'un niveau  avec toiture triangulaire idem sur la face arrière, ce corps de logis est flanqué de deux pavillons en retour d'équerre de deux niveaux également flanqué sur comble de lucarnes.  Le 26 juin 1940, un régiment de blindés allemands  avec ses camions de transport de troupes, son ravitaillement, ses véhicules légers et ses motos s'installent à Beaumont dans les Amognes. Après cette période tragique, le château de La Cave est abandonné et se délabre ; ce ne sera que vers 1980 qu'il sera racheté par un riche promoteur parisien, qui le remettra en état : toitures, planchers et les aménagements intérieurs du château avant de le donner en location en 2005 à Jean-Christophe Gigot qui l'exploitera pendant plusieurs années avec une activité de tables et chambres d'hôtes.","habitants":"Famille de la Ferté Meun                                                                  Famille de Pracomtal\r\n        \"","divers":"Château de la Cave à Beaumont Sardolles","gps":"","images":["../../jctruffet.com/image/image_58/58_Cave_1.jpg","../../jctruffet.com/image/image_58/58_Cave_2.jpg","../../jctruffet.com/image/image_58/58_Cave_3.jpg","../../jctruffet.com/image/image_58/58_Cave_4.jpg","../../jctruffet.com/image/image_58/58_Cave_5.jpg"]},"Consult_chateau_formulaire3b5f":{"id":"Consult_chateau_formulaire3b5f","dept":"58","canton":"Fours","commune":"Cercy la Tour","nom":"Cercy_la_Tour","type":"Château","periode":"XV-XVI","histoire":"Plusieurs châteaux à Cercy-la-Tour dont la Tour du XIIIe siècle  ruines féodales, de Champlevois du XV-XVIe siècle, de Briffaut du XVIIIe siècle  et de Codes du XIXe siècle, et a sept kilomètres au nord le château de Saint-Gratien-Chaumigny.                                 BRIFFAULT,  du  XVIIe siècle, ancien rendez-vous de chasse des Mazarin, ducs du Nivernais.                                                                         CHAMPLEVOIS : Une maison forte est mentionnée à Champlevois dès 1256. On sait qu'au début du XIVe siècle elle appartenait à Guillaume de la Perrière. Ruinée, elle fut remaniée vers 1475 pour Jean de Ferrières et au début du XVIe siècle pour son petit-fils. On peut y voir un blason avec des armoiries qui n'ont pas été identifiées.  C'est vers 1475 que Guillaume de Ferrières fit faire des remaniements importants à sa demeure et au début du XVIe siècle son petit-fils en fit faire d'autres. Par alliance matrimoniale cette demeure passa en 1566 à Jean de La Fin, chambellan de l'hôtel d'Henri III.\r\nCODES de 1867, au Moyen-Age, le territoire de Codes, qui est alors une paroisse, possède deux châteaux forts, désormais détruits. L'actuel château de Codes est édifié par Etienne Choumery et son fils Ambroise, maire de Cercy de 1874 à 1876.                                  MORLON  EHPAD.   A l'entrée de la ville se trouve le  château Morlon (vers 1890). Louis-Albert Morlon fait construire la villa de Chaumigny où il passe sa retraite avant de décéder en 1920. Il lègue le château à la commune afin d'y établir un hôpital et un hospice.                                                                           CHAUMIGNY utilisé par un privé en sci. Le fief de Chaumigny est important au Moyen-Age : ses seigneurs ont leur sépulture dans le choeur de l'Eglise de Cercy La Tour. La famille Cossais, installée en bordure de la rue de la Guette à Cercy, fait construire un chateau fort à Chaumigny. Une des six tours qui en défendent l'accès, parmi lesquelles le donjon, également nommé Tour du Diable, abrite une fontaine permettant d'abreuver les habitants du château. Il ne subsiste de cette forteresse qu'une des six tours. La famille Desbois fait ériger le château actuel au milieu du XIXe siècle.","architecture":"Briffaut;  Il a été remanié au XIXe siècle pour devenir une belle demeure de plan rectangulaire d'un étage carré avec des combles aménagés et percés de lucarnes. Une tourelle octogonale en pierre située au bout du bâtiment abrite un escalier tournant.                   Cercy la tour; ancien donjon dont seule la base subsiste, profiter dun remarquable panorama sur la ville et sa région,  la porte d'Aron, qui se situait en haut de la rue d'Aron, là où aujourd'hui on trouve des escaliers ;  la porte de Coulonges, qui se dressait à l'opposé, en bas de la rue Pasteur ; la porte de Bourgogne, qui avait été construite au carrefour formé par la rue Louis-Albert-Morlon et la rue des Vignes ; la porte de Paris, qui existait au carrefour de la rue de Bourgogne avec la rue Saint-Vallier. La Tour comportait autrefois des échauguettes dont subsistent les culots moulurés. Elle fut très remaniée dans sa partie haute. Champlevois; un corps de logis rectangulaire, flanqué au sud-est en retour d'angle d'une tour carrée. L'ensemble était entouré de douves aujourd'hui en grande partie comblées. Corps principal s'élevant sur deux niveaux en briques cuites, avec un soubassement taluté daté du XIVe siècle. Très épais, ce soubassement est percé de deux archères canonnières. L'ensemble est pourvu sur les deux façade de fenêtres à croisillon en pierre moulurée, ainsi que par des baies étroites à traverse dont certaines surmontées d'un arc à accolade. Une porte moulurée à piédroits prismatiques sur la façade sud, tandis que sur celle du nord se trouvent deux canonnières. Toit polygonal à longs pans, recouverts en ardoises.                                                                 Codes;  Le corps de logis est de style Renaissance, de plan rectangulaires  à deux niveaux  et lucarnes sur combles, Les oculis sont variés et ornés de sculptures, belles fenêtres à meneaux.    Chaumigny quadrilatère flanquée de corps de logis rectangulaires  avec pavillons carrés aux angles  de deux niveaux avec Lucarnes. Le fossé plein d'eau qui entoure cette vaste demeure seigneuriale se franchit alors part un pont-levis.","habitants":"Famille de  Guillaume de la Perrière                                                                     Famille de  Etienne Choumery                                                        Louis-Albert Morlon\r\n        \"","divers":"Château, de Briffault, de Champlevois, de Codes et de la Tour. Et le château de Chaumigny  à St-Gratien Servigny","gps":"","images":["../../jctruffet.com/image/image_58/58_Cercy_la_Tour_1.jpg","../../jctruffet.com/image/image_58/58_Cercy_la_Tour_2.jpg","../../jctruffet.com/image/image_58/58_Cercy_la_Tour_3.jpg","../../jctruffet.com/image/image_58/58_Cercy_la_Tour_4.jpg","../../jctruffet.com/image/image_58/58_Cercy_la_Tour_5.jpg","../../jctruffet.com/image/image_58/58_Cercy_la_Tour_6.jpg","../../jctruffet.com/image/image_58/58_Cercy_la_Tour_7.jpg","../../jctruffet.com/image/image_58/58_Cercy_la_Tour_8.jpg","../../jctruffet.com/image/image_58/58_Cercy_la_Tour_9.jpg"]},"Consult_chateau_formulaire6543":{"id":"Consult_chateau_formulaire6543","dept":"58","canton":"Corbigny","commune":"Cervon","nom":"Cervon_Cuzy","type":"Château","periode":"XVII","histoire":"CUZY, en 1500 à Paul de La Forest, sa petite-fille, Anne de La Forest, porta la seigneurie de Cuzy et de Marcilly, sur la paroisse de Cervon, à Pierre Leroy, chevalier, baron d'Alarde. Anne, veuve, épousa en secondes noces Louis de Jaucourt, sire de Dourdey et Domecy, dans la chapelle de Cuzy en présence des frères de l'époux : François, Louis, François et Elie de Jaucourt. De sa première union elle eut un fils, Nicolas-François Leroy , qui reprit le fief en 1698 du prince de Carignan qui lui reconnut le droit d'instituer juge, greffier, sergent et garde-bois. Il épousa Marguerite Le Gathelier qui lui donna un fils et une fille : Gabriel, décédé en 1699 et inhumé dans la chapelle du château. Anne, la fille, fut mariée à François Marie de Meung de La Ferté Solière, seigneur du lieu, capitaine. Il épousa  le 7 juillet 1701,  Anne Le Roy, fille majeure de Messire Nicolas-François le Roy, seigneur de Lavault, La Fay, Cusy, feu dame Marguerite le Gaftelier, demeurant au château de Cusy, paroisse de Cervon; ce contrat est signé Buffy, notaire-royal à Lonne » Il poursuit par l'indication de la descendance de deux enfants : Jacques-Louis et Jean-François de Meung, qualifié de Sieur de la Ferté, mineur en 1732; cette terre était alors en indivis la propriété de Edme de La Corcelle, écuyer, seigneur de Bailly dont le fils Nicolas se disait seigneur de Cuzy en 1717. Claude de La Corcelle, Chevalier de Saint-Louis, capitaine décéda le 24 janvier 1740. François Leroy de La Corcelle, son neveu lieutenant du régiment de La Marche, fut son légataire universel. Jacques-Louis de La Ferté-Meung, comte de La Roche-Millay, seigneur de Solière, était le propriétaire des lieux en 1760. Son fils, Jacques-Louis II dit le vicomte de Solière, le légua à la famille Guiétant de laquelle il passa par alliance à M. Bidault qui le possédait en 1865. Antonio de Cadoine de Gabriac en devient propriétaire à la fin du XIXe siècle.","architecture":"Château de Cuzy, au levant de la commune perché sur une colline cette construction du XVIIe siècle n'a jamais subi de transformation, cette bâtisse fut élevée au XVIIe siècle de style néo-Baroque . Elle était le siège d'une seigneurie, avec ses dépendances, en toute justice mouvante du Comté de Château-Chinon à cause de la baronnie de Lormes. Bâtisse rectangulaire avec un étage surmontée de combles garnis de lucarnes.  Côté entrée pavillon saillant plein cintre  et plein cintre côté parc  flanqué d'une tour ronde  (donjon) avec terrasse à créneaux et mâchicoulis  et sur les extrémités tours rondes toit en poivrières.","habitants":"Famille de Paul de La Forest\r\n        \"","divers":"Château de Cuzy à Cervon.","gps":"","images":["../../jctruffet.com/image/image_58/58_Cervon_Cuzy_1.jpg","../../jctruffet.com/image/image_58/58_Cervon_Cuzy_2.jpg","../../jctruffet.com/image/image_58/58_Cervon_Cuzy_3.jpg","../../jctruffet.com/image/image_58/58_Cervon_Cuzy_4.jpg","../../jctruffet.com/image/image_58/58_Cervon_Cuzy_5.jpg"]},"Consult_chateau_formulaire6a13":{"id":"Consult_chateau_formulaire6a13","dept":"58","canton":"Corbigny","commune":"Cervon","nom":"Cervon_Lantilly","type":"Château","periode":"XIII","histoire":"LANTILLY, au XIIIe siècle, était habité par la famille Grimaud. Dame Pernelle Grimaud, veuve de Guyot Grimaud et son fils Guy vivaient à Lantilly entre 1320 et 1327. Guy Grimaud, chevalier de Lantilly était alors le favori en titre du comte Louis II de Nevers, comte de Flandres. Du XIVe au XVIIIe siècle, Lantilly fut habité par la famille de Torcy, soit durant 450 ans. Cette famille qui figure parmi les plus anciennes du Nivernais a été au service du Roy, des comtes et ducs de Nevers. Entre 1780 et 1802 le château passa  aux familles de Balathier, d'Hugon et de Certaines. Peu après, la famille Formé de Framicourt acquit Lantilly. Madame Formé était fille de Guillaume Coustou, petite-fille de Guillaume Coustou, nièce de Nicolas Coustou dont les uvres ornent les Tuileries, Versailles et Marly, petite-nièce du grand statuaire Coysevox, directeur de l'Académie. L'une des filles épousa Nicolas de Razout, descendant de la branche illégitime mais reconnue de César de Bourbon, comte de Busset. Nicolas de Razout qui avait le grade de général fut tué, sans descendant à Metz en son quartier général à la tête de la troisième division militaire qu'il commandait. Leurs neveux se fixèrent alors au château de Lantilly en la personne du comte Alexis de Cadoine de Gabriac. Celui-ci était ministre  avait terminé sa carrière comme ambassadeur de France au Mexique sous Napoléon III.\r\nLe château devint ensuite en 1910 la propriété de monsieur Albert Ramillon, issu d'une vieille famille nivernaise établie depuis plus de cinq siècles dans la région de Varzy et est resté dans la famille depuis lors.","architecture":"Lantilly; est une bâtisse construite sur le site d'une ancienne villa gallo-romaine appelée Lentuli Villa, cette seigneurie avait haute, moyenne et basse justice. De par son implantation, ce château, situé aux limites du Nivernais et du comté de Château Chinon, était une forteresse qui contrôlait et gardait la route médiévale qui franchissait le Morvan depuis Corbigny. Est situé sur la rive droite de l'Anguison. Cette ancienne forteresse était flanquée autrefois de six tours et d'une double enceinte de fossés avec pont-levis entourant la haute-cour, la basse-cour et le donjon. Est cité comme lieu fort occupé en Nivernais par les compagnies Anglo-Navarraises en 1358 et 1359.","habitants":"Famille Grimaud\r\n        \"","divers":"Château de Lantilly","gps":"","images":["../../jctruffet.com/image/image_58/58_Cervon_Lantilly_1.jpg","../../jctruffet.com/image/image_58/58_Cervon_Lantilly_2.jpg","../../jctruffet.com/image/image_58/58_Cervon_Lantilly_3.jpg","../../jctruffet.com/image/image_58/58_Cervon_Lantilly_4.jpg","../../jctruffet.com/image/image_58/58_Cervon_Lantilly_5.jpg","../../jctruffet.com/image/image_58/58_Cervon_Lantilly_6.jpg"]},"Consult_chateau_formulaire94da":{"id":"Consult_chateau_formulaire94da","dept":"58","canton":"Corbigny","commune":"Cervon","nom":"Cervon_Marcilly","type":"Château","periode":"XIV-XVII","histoire":"Six châteaux à Cervon, une tour ruinée à Cervon, le château de Certaines du XVIIe siècle, de Cuzy du XVIIe siècle (voir article) , de Lantilly du XVe siècle (voir article suivant) du Pontot maison forte du XVe siècle (Voir article suivant), le manoir de la Chaume du XVe siècle à Précy  et le château de Marcilly.Château de Paimpoirier(ruines). Château de Tressolles (ruines).           CERVON fut autrefois clos de murs et de fossés, en vertu de la permission que le chapitre obtint, en 1334 de Louis de Crécy, comte de Nevers. Le bourg de Cervon était une seigneurie et possédait une maison-forte dite Mothe-de-Cervon, un pourpris, manoir, prés, terres, bois de mille arpents, avec haute, moyenne et basse justice. Elle appartenait au XIVe siècle à une famille qui en portait le nom. Guy de Cervon, chevalier, était seigneur du lieu en 1391.\r\nMARCILLY, ce château situé sur l'Yonne a été construit au XIVe siècle par Jean de Salazart,  et repris dans la première moitié du XVIIIe siècle très remanié aux XIXe et XXe siècles (dans les années 1915 et en 1970). Décor intérieur de qualité. Le château conserve de nombreux souvenirs du maréchal de Vauban. C'est en 1710 que l'époux de Charlotte Le Prestre, fille de Sébastien Le Prestre maréchal de Vauban, Jacques Louis De Mesgrigny comte d'Aunay l'acquiert. C'est à la fin du XIXe siècle par alliance que le château passe à  Mme Adélaïde Le Peltier d'Aunay devenue marquise de Candolle, l'apporte dans le patrimoine de la famille De Candolle toujours dans cette famille.","architecture":"Cervon; maison de la Providence : établissement de religieuses  de la Providence de Portieux fondée à Cervon en 1854 .                                Château de Certaines (ruines).                                                    Château de Marcilly, construit sur les bords de l'Yonne en 1455, il subit des transformations en 1638,  repris dans la première moitié du XVIIIe siècle en particulier construction des communs, très remanié aux XIXe et XXe siècle,  sur un plan carré, entouré de fossés, avec tours d'angle; le corps de logis sud, qui regarde la rivière d'Yonne, a conservé ses deux tours, des restes de mâchicoulis et des bases de tourelles en encorbellement, mais il a été très-remanié au XVIIe siècle; sa porte principale en fronton, surmontée d'armoiries mutilées et d'une inscription latine, est de cette époque. Le corps de logis occidental, qui relie la tour nord-ouest au bâtiment principal, a perdu ses caractères anciens, mais il est aussi de la construction primitive; le rez-de-chaussée est entièrement voûté : on y conserve de précieux souvenirs du maréchal de Vauban et des archives considérables et intéressantes pour l'histoire de la contrée.","habitants":"Famille de Guy de Cervon                                                               Famille de Jean de Salazart\r\n        \"","divers":"Château de Marcilly","gps":"","images":["../../jctruffet.com/image/image_58/58_Cervon_Marcilly_1.jpg","../../jctruffet.com/image/image_58/58_Cervon_Marcilly_2.jpg","../../jctruffet.com/image/image_58/58_Cervon_Marcilly_3.jpg","../../jctruffet.com/image/image_58/58_Cervon_Marcilly_4.jpg"]},"Consult_chateau_formulairef3d8":{"id":"Consult_chateau_formulairef3d8","dept":"58","canton":"Corbigny","commune":"Cervon","nom":"Cervon_Pontot","type":"Maison forte","periode":"XV","histoire":"PONTOT; en 1459 fief de Guillaume et Peronnet du Pontot, écuyers. Puis en 1509 Jean du Pontot, chevalier, seigneur de Cervon,  Léonard du Pontot, bailli du Nivernais, était possesseur du Pontot en 1528. Charles du Pontot, gentilhomme ordinaire de la chambre du roi, acquis du duc de Nevers, François Ier de Clèves, la haute justice de Cervon en partie, de Viry, de Maré, du Pontot et de Remilly en 1545. François-Salomon du Pontot était président en l'élection en 1607 et Barthélémy du Pontot procureur fiscal de Cervon. Jean Salomon étant décédé, sa veuve Jeanne-Françoise Moreau fut dépossédée de cette terre en 1666 par un décret rendu à la requête de Nicolas de Mesgrigny, comte de Villebertin, de Charles de La Rivière et d'Antoine de Damas comme étant aux droits d'Edmée Georgette et Françoise de Reignier, héritières de Jacques, comte d'Aunay. En 1717 Marie Panon, veuve de Stample, était dame du Pontot. Elle possédait, malgré sa religion prétendue réformée, une chapelle en l'église de Cervon. Paul Stample, son fils, laissa une héritière qui porta la seigneurie à Pierre de Paris, issu d'une famille huguenote. Marguerite de Paris, abjura le 4 août 1743 dans l'église paroissiale. Jean-Etienne vendit le Pontot en viager le 26 décembre 1799 à Nicolas-François Gueneau, homme de loi, dont les descendants le possédaient encore en 1865.","architecture":"Cette très ancienne maison forte du Pontot brûla lors de la guerre de Cent Ans. Sur son emplacement le propriétaire un seigneur du Pontot reconstruisit au XVe siècle un château. Il reste quelques quelques éléments de l'antique maison forte dans ce qui compose le long corps de logis à un étage et combles avec une tour ronde isolée avec barbacanes. Deux tours hexagonales ressortent de la façade Nord, l'une, dans laquelle se loge un escalier à vis, date du XVe siècle. L'autre est dans la partie qui fut rallongé au XIXe siècle et vient en symétrie de la première. A l'extrémité Est fut construit un bâtiment sans caractère qui vient en retour d'équerre. Une imposante tour carrée est située à l'Est. Elle fut remaniée et couverte d'un toit brisé tandis qu'à l'Ouest se trouve la grosse tour ronde qui fut rejointe par l'adjonction d'un corps de bâtiment au XIXe siècle. Les fenêtres furent percées au XVIIe siècle. La cour intérieure est bordée par des communs qui datent du XVIIe siècle. Il ne reste que la tour carrée et la tour hexagonale.","habitants":"Famille de  Guillaume et Peronnet du Pontot\r\n        \"","divers":"Château de Pontot à Cervon","gps":"","images":["../../jctruffet.com/image/image_58/58_Cervon_Pontot_1.jpg","../../jctruffet.com/image/image_58/58_Cervon_Pontot_2.jpg","../../jctruffet.com/image/image_58/58_Cervon_Pontot_3.jpg"]},"Consult_chateau_formulaire8d45":{"id":"Consult_chateau_formulaire8d45","dept":"58","canton":"St-Bernin d","commune":"Fertrève","nom":"Chailloux","type":"château","periode":"XVII","histoire":"CHAILLOUX,   cette ancienne maison forte, qui donna son nom à la famille qui la possédait,  de Jehan de Chaillou, écuyer.","architecture":"Cette ancienne maison forte de Chailloux , se compose d'un corps de logis unique à trois niveaux  toiture en croupe, flanqué d'une tour à pans engagés toiture à quatre pans. Accolé  du XIXe siècle, d'un pavillon rectangulaire à angle arrondie à deux niveaux et attiques, avec lucarnes sur comble, une autre tour à pans est ajoutée sur un angle arrondie, à l'opposée un étage servant de Terrasse.","habitants":"Famille de Jehan de Chaillou\r\n        \"","divers":"Château de Chailloux à Fertève.","gps":"","images":["../../jctruffet.com/image/image_58/58_Chailloux_1.jpg","../../jctruffet.com/image/image_58/58_Chailloux_2.jpg","../../jctruffet.com/image/image_58/58_Chailloux_3.jpg"]},"Consult_chateau_formulaire63ae":{"id":"Consult_chateau_formulaire63ae","dept":"58","canton":"Brinon sur Beuvron","commune":"Challement","nom":"Challement","type":"Vestiges","periode":"XV","histoire":"Deux édifices à Challement la tour de Rabuteau vestiges et le château de Challemant.                                                           CHALLEMENT, cette seigneurie est  gouvernée par les familles: Cizelly, Pioche, du Vierne, La Ferté Meung et la Motte-Dreuzy entre le XIIIe et le XVIIIe siècle.","architecture":"Le seul vestige du château féodal du XVe siècle de la seigneurie de Challement est la tourelle à escalier supportant un blason mutilé. Le dernier occupant fait raser le vieux château après la Révolution et fait reconstruire une demeure, en conservant la tourelle. Le bâtiment est vendu comme bien national et subit au cours du XIXe siècle dimportantes transformations. Abandonnée par son propriétaire le château est partiellement incendié, il ne reste que les ruines dun escalier en pierre blanche, de boiseries, quelques cheminées et une rampe en fer forgé.","habitants":"Famille Cizelly\r\n        \"","divers":"Château de Challemant","gps":"","images":["../../jctruffet.com/image/image_58/58_Challement_1.jpg","../../jctruffet.com/image/image_58/58_Challement_2.jpg","../../jctruffet.com/image/image_58/58_Challement_3.jpg","../../jctruffet.com/image/image_58/58_Challement_4.jpg","../../jctruffet.com/image/image_58/58_Challement_5.jpg"]},"Consult_chateau_formulaire2bad":{"id":"Consult_chateau_formulaire2bad","dept":"58","canton":"Sud Nevers","commune":"Challuy","nom":"Challuy","type":"Château","periode":"XVI","histoire":"A Challuy le châteaux du Vieux-Vernet du  XV-XVIe siècle, le Vernay du XVIIIe siècle.                                                             VERNAY, possédé d'abord par une branche cadette de Bourgoing famille de robe aux XVe siècle et XVIe siècle qui reprit son rang dans les familles d'épée  au milieu du XVIIe siècle et fournit de braves officiers. Guillaume de Bourgoing, premier seigneur connu du Vernay, prit une grande part, avec ses deux fils, Guillaume  et Noël, aux deux rédactions  de la coutume du Nivernais, en 1494 et en 1534.  Après avoir appartenu ensuite aux Simonin, passa aux de Prisye famille connu dès la fin du XVIe siècle qui posséda aussi les seigneuries de Curty-Drassy, la Marche et Froidefond. Au nombre des anciens possesseurs du Vernay, se trouve encore la branche bourbonnaise de la famille de Saint-Aubin, cet ancien manoir appartient aujourd'hui, au vicomte de Chabrol-Chaméane.   Le comité dentreprise de la SNCF est également propriétaire.","architecture":"Vieux Vernay; converti en ferme depuis longtemps, sa tour ronde remonte  au XIVe siècle; la plupart des bâtiments, entourant la cour, appartiennent, au contraire, à la moitié du siècle suivant, sa porte d'entrée à cintre                                                               Vernay; Le comité dentreprise de la SNCF est également propriétaire du magnifique château du Vernay, à Challuy, au sud de Nevers, qui comprends terrains de tennis, piscines, parc privé et forêt : corps de logis de plan rectangulaire massif, de style néo-baroque à deux niveaux et lucarnes à oeils de buf à fronton curviligne sur combles brisés à la Mansard un pavillon d'entrée légèrement saillant avec fronton gothique flamboyant, le corps est accolé au extrémité de deux pavillons rectangulaires  à deux niveaux et  toit brisés.","habitants":"Famille de Bourgoing\r\n        \r\n        \"","divers":"Château du Vieux-Vernet, du Vernay et la commanderie st-Antoine à Challuy","gps":"","images":["../../jctruffet.com/image/image_58/58_Challuy_1.jpg","../../jctruffet.com/image/image_58/58_Challuy_2.jpg","../../jctruffet.com/image/image_58/58_Challuy_3.jpg","../../jctruffet.com/image/image_58/58_Challuy_4.jpg","../../jctruffet.com/image/image_58/58_Challuy_5.jpg","../../jctruffet.com/image/image_58/58_Challuy_6.jpg","../../jctruffet.com/image/image_58/58_Challuy_7.jpg"]},"Consult_chateau_formulairef6cb":{"id":"Consult_chateau_formulairef6cb","dept":"58","canton":"Brinon sur Beuvron","commune":"Champallement","nom":"Champallement","type":"Manoir","periode":"XIII-XVI","histoire":"CHAMPALLEMENT, cité en 1060 des sires d'Allemand, passa à la famille de Champallement donna deux évêques à Nevers et un à Auxerre. Nous suivons les vicomtes jusqu'en 1178 ou 1179 date à laquelle Ebbe, qualifié de Vicomte de Nevers ou de Champallement meurt. Un peu auparavant un certain Hugues le Roux de Champallement accompagna le roi de France Louis VII à la seconde croisade prêchée à Vézelay par Saint-Bernard.  Au XIIIe siècle le château passe dans les mains des familles des Barres, de Thianges, de Lespinasse, puis au XVe siècle à Guillaume de Sercy, bailli de Chalon-sur-Saône, Guillaume de Villiers et enfin, à la fin du XVe siècle à Antoine de Chabannes connu pour avoir été capitaine d'écorcheurs pendant la guerre de 100 ans et pour avoir \"hérité\" de Jacques Cur. Il possédait, non loin, le château de Saint-Fargeau. \r\n Au XVIe siècle, tous les biens du fief de Champallement passent aux mains de la maison de Mortemart dont était issue la marquise Françoise de Montespant, maîtresse attitrée de Louis XIV.  La marquise d'Avrincourt, fille du duc et de la duchesse de Mortemart, propriétaire des lieux au milieu du XIXe siècle.   Le château et les terres sont ensuite affermés puis vendus à la famille Morlay qui en est propriétaire jusqu'en 1947, année du décès de Louis Morlay sans descendance, le bien passe donc aux mains de l'état. Le château est ensuite vendu deux fois à des particuliers qui en font leur résidence secondaire. Actuellement, il appartient à Donatienne van Caillie qui y a effectué de nombreux travaux de confort tout en respectant au mieux l'esprit des lieux.  Aujourd'hui gîtes de France.","architecture":"Champallement, château médiéval, sur une plate forme avec remparts et tours, est l'un des plus vieux de la Nièvre, fut construit dans la première moitié du XVe siècle,  au milieu du XIXe siècle, exécute de nombreux travaux au château dont l'adjonction d'un toit et le percement de fenêtres.  Corps de logis rectangulaire à deux niveaux  toit en croupes avec lucarne et deux tourelles en façades.","habitants":"la Marquise Françoise de Montespant                                      \r\n Famille Morlay\r\n        \"","divers":"Manoir de Champallement","gps":"","images":["../../jctruffet.com/image/image_58/58_Champallement_1.jpg","../../jctruffet.com/image/image_58/58_Champallement_2.jpg"]},"Consult_chateau_formulaire6079":{"id":"Consult_chateau_formulaire6079","dept":"58","canton":"Moulins-Engelbert","commune":"Maux","nom":"Champdioux","type":"Vestiges","periode":"XIV","histoire":"CHAMPDIOUX, le jeune seigneur qui lui donna son nom le fit construire au XIIIe siècle. Champdioux était le siège de l'une des plus importantes baronnies du Nivernais. La seigneurie qui s'appela Chandeau , Chandio prit son nom définitivement au XVe siècle qui détenait le domaine pendant la guerre de cent ans gouverneur du Nivernais, le fils Pierre  épouse Catherine d'Amboise puis Isabeau de la Tournelle dame d'Anizy qui hérite de Champdioux en 1382 suite à la mort de son mari. Le frère de Pierre récupère le château et échoit au XVe siècle à Guillaume de la Tournelle écuyer du duc de bourgogne et le domaine fait retour aux Chandio et par alliance le château passe à la famille de Bigny  qui le vend en 1590 à  Jean Sallonnier du Perron, il fut restauré avant de passer par héritage  au début du XVIIe siècle à la famille la Ferté Meung également seigneur de Solières. En 1736, cette dernière acquit le fief de La  Roche-de-Millay  sur cette terre s'élève un château ayant appartenu au maréchal de Villars et délaissa peu à peu  le château de Champdioux pour habiter leur nouvelle demeure, Champdioux subit les attaques irrémédiables du temps, gagnées par la végétation, coup de grâce  en 1786 Jean de la Ferté de Meung pour améliorer la construction du  château de Solières, fait extraire les charpentes et les pierres  de taille de Champdioux. Les communs sont utilisés pour les besoins d'une exploitation agricoles les ruines du château offrent au promeneur une image d'un autre temps. En 1824 le neveu de Jacques de la Ferté de Meung vend le domaine, qui appartiendrat aux Benoist d'Azy, puis aux Saint-Maur et au nouveau propriétaire  actuel.","architecture":"Vestiges du château de Champdioux, du XIVe siècle, bâti sur un plan rectangulaire, avec de fortes courtines et aux angles, des tours, au XVe siècle construction du corps de Logis, dont un donjon carré, remaniée au XVe-XVIIe siècle, détruit en 1786, cette enceinte  accessible par un châtelet d'entrée fortifié et protégé au nord par un étang. Le château de plan barlong et flanqué de quatre tours autour d'un donjon carré élevé de trois étages possédait son pont-levis dont les rainures subsistent ce donjon est flanqué à sa gauche d'une grosse tour ronde et à sa droite du corps de logis du XVe siècle qui le relie à la tour Est.","habitants":"Famille de Champdioux\r\n        \"","divers":"Vestiges du château de Champdioux à Maux","gps":"","images":["../../jctruffet.com/image/image_58/58_Champdioux_1.jpg","../../jctruffet.com/image/image_58/58_Champdioux_2.jpg","../../jctruffet.com/image/image_58/58_Champdioux_3.jpg","../../jctruffet.com/image/image_58/58_Champdioux_4.jpg","../../jctruffet.com/image/image_58/58_Champdioux_5.jpg","../../jctruffet.com/image/image_58/58_Champdioux_6.jpg","../../jctruffet.com/image/image_58/58_Champdioux_7.jpg"]},"Consult_chateau_formulaire6ff7":{"id":"Consult_chateau_formulaire6ff7","dept":"58","canton":"Luzy","commune":"Chiddes","nom":"Champlevrier","type":"Château","periode":"XVII","histoire":"CHAMPLEVRIER  était autrefois le siège d'une seigneurie en toute justice, avec fief et arrière-fief. Des titres anciens rappellent que les manants de sa dépendance étaient tenus au guet-et-garde autour de ce château en temps de guerre et d'imminent péril. Le seigneur de Chanlevrier devait, pour faire foi et hommage de son fief, se présenter devant la porte du château de La Roche-Millay, avec ses titres en main, mettre un genou à terre, et faire serment au suzerain, après quoi il était admis au baiser sur la bouche. En 1479, la veuve d'Othelin de Bourgoing affranchit un serf, François Coquillot, et cet acte d'affranchissement nous est parvenu. Charles Le Bourgoing en 1516 occupait cette seigneurie et s'acquitta de ce devoir et son petit-fils: Gabriel, seigneur de Champlevrier, de Champ-Robert, de Saint-Jean-des-Curtils, de Mirloup, de Montcharlon, 80 ans plus tard, sur une sommation du bailli de La Roche. Mais en 1674 cette seigneurie est confisquée pour « devoir non fait » et revendue à Pierre Bruneau de Vitry, chevalier d'honneur au Châtelet de Paris et transmise ensuite à ses descendants, puis par mariage, à la famille Thiroux de Saint-Félix, originaire d'Autun. Aujourd'hui chambres d'hôtes.","architecture":"Champlevrier,  vieux castel féodal, flanqué de deux ailes et bâti dans une gorge, au nord du bourg, sur une antique maison-forte,\r\n le château de Champlevrier a été bâti au XVIIe siècle sur les ruines d'une maison forte médiévale. Restauré au XIXe siècle, sa façade a belle allure. Le château comprend un corps de bâtiment principal, avec deux fines tours d'angles et deux ailes en retour, dans un cadre verdoyant. Restauré au XIXe siècle, sa façade a belle allure. Le château comprend un corps de bâtiment principal, avec deux fines tours d'angles et deux ailes en retour, dans un cadre verdoyant. Ce château fut utilisé en 1944 comme hôpital de campagne par le maquis Louis dont les cantonnements étaient dans les environs.","habitants":"Famille de Charles Le Bourgoing\r\n        \"","divers":"Château de Champlevrier","gps":"","images":["../../jctruffet.com/image/image_58/58_Champlevrier_1.jpg","../../jctruffet.com/image/image_58/58_Champlevrier_2.jpg","../../jctruffet.com/image/image_58/58_Champlevrier_3.jpg","../../jctruffet.com/image/image_58/58_Champlevrier_4.jpg","../../jctruffet.com/image/image_58/58_Champlevrier_5.jpg"]},"Consult_chateau_formulaire3215":{"id":"Consult_chateau_formulaire3215","dept":"58","canton":"Prémery","commune":"Champlémy","nom":"Champlémy","type":"Vestiges-Château","periode":"XIV","histoire":"CHAMPLEMY, Le vieux Château de Champlémy,  le fief était aux mains de Marguerite de Fontenay dès 1364. Mais, à la fin du XIVe siècle, le château, construit près d'une ancienne voie romaine, dut son importance à Bureau de La Rivière, premier chambellan de Charles V, puis de Charles VI. Ses descendants tinrent le fief jusqu'au XVIIe siècle, époque à laquelle il passa à Anne de La Guiche, femme d'Henri de Schomberg, maréchal de France. Au XIXe siècle, il appartint notamment au marquis de Tourzel, au duc de Durfort, au duc de Lorge, à la princesse de Cröy et à la famille de Bruce. C'est dans le parc du château que naît la Nièvre de Champlemy qui rejoint à Guérigny la Nièvre d'Arzembouy. En 1794, le dernier seigneur de Champlemy, Charles-Armand-Augustin de  VENERIE transformé aujourd'hui en un  centre médical société par actions simplifiée est active depuis 52 ans.","architecture":"Champlémy,  à la fin du XIVe siècle, sa porte est datée de 1606. Le château est daté des XIVe-XIXe siècles, Il fût racheté par plusieurs familles suisse qui entreprirent de restaurer les dépendances à titre de résidence secondaire, laissant le corps de logis et bastion en retrait. Il est aujourdhui à déplorer leurs dégradations. Depuis 7 ans, le maire de la commune de Champlémy a engagé des pourparlers avec nos amis suisse, sengageant corps et âme à la sauvegarde de ce monument qui marque l'histoire du terroir, aboutissant à une très faible lumière d'espoir. Les discussions continuent et le château sévanouit dans la verdure jusquà son effacement proche. Cet édifice étant du domaine privé, lIACP sengagera à trouver une solution équitable et si tout au moins l'une des deux parties (Familles Suisse) Venerie quadrilatère  de style gothique corps de logis rectangulaire à deux niveaux avec lucarne sur toit brisés deux pavillon identique à toit brisé, grandes baies et fenêtres sur ses façades, sur la droite prolongement du corps de logis de même niveau, galerie à colonnes sur rez-de-chaussée  supportant l'étage  à petites fenêtres toit à deux pans accolé à une tour ronde mis-hors uvres à deux niveaux.","habitants":"Famille de  Bureau de La Rivière\r\n        \r\n        \"","divers":"Vestiges du château de Champlémy et château de la Vennerie à Champlémy","gps":"","images":["../../jctruffet.com/image/image_58/58_Champlemy_1.jpg","../../jctruffet.com/image/image_58/58_Champlemy_2.jpg","../../jctruffet.com/image/image_58/58_Champlemy_3.jpg","../../jctruffet.com/image/image_58/58_Champlemy_4.jpg","../../jctruffet.com/image/image_58/58_Champlemy_5.jpg","../../jctruffet.com/image/image_58/58_Champlemy_6.jpg","../../jctruffet.com/image/image_58/58_Champlemy_7.jpg"]},"Consult_chateau_formulaire558e":{"id":"Consult_chateau_formulaire558e","dept":"58","canton":"Dompierre sur Héry","commune":"Dompierre sur Héry","nom":"Chanteloup","type":"","periode":"","histoire":"CHANTELOUP,reconstruit au XVIe siècle et au XVIIIe siècle.Une douzaine de familles importantes ont marqué lhistoire de la seigneurie de Chanteloup. Le dernier habitant ayant été le comte de Jouvencel.  Lors de la seconde guerre mondiale, l'édifice est occupé par les Allemands et des baraquements sont construits dans le parc. La chapelle du château construite à la fin du XIXe siècle, financée par Isabelle de Jouvencel, est dédiée à Saint-Huron. Le vitrail, situé dans le chur, est exécuté dans le genre des vitraux du Moyen-Age par le maître verrier Champagneulles. Domaine de Reugny Dès 1801, le propriétaire M. Hervieu fut le premier à cultiver en grand les prairies artificielles, transformé en logis de France par la famille Minguet.","architecture":"Chanteloup,  entre Guipy et Dompierre-sur-Héry, en un endroit dénommé au Moyen-Age le Champ de Loups, ce château, reconstruit au XVIe siècle, est situé à lécart de la route, dans ses bois aux chênes centenaires, sur lemplacement dune demeure seigneuriale. La partie centrale de plan rectangulaire à trois niveaux flanquée de deux tours, une ronde et une hexagonale accolé au donjon servant d'Escalier à vis, et un pavillon carré (donjon ) de trois niveaux avec lucarnes dans comble toit à quatre pans,  laile est ajoutée au XVIIIe siècle.   Domaine de Reugny, jadis important, conserve quelques bâtiments et son pigeonnier de l'époque pré-révolutionnaire.  Il enseigna ce mode de culture aux agriculteurs, et aida ainsi au développement au XIXe siècle de l'élevage. On lui doit le perfectionnement de divers instruments aratoires. Son fils obtint plusieurs prix au milieu du XIXe siècle, entre autres pour son système d'assolement et la diversité de son élevage.\r\nLe colombier a été implanté par le prieuré de Saint-Révérien, avant le XVIIe siècle, il marque le privilège de seigneurie. Il faisait partie des bâtiments de ferme. Ce colombier possédait deux pièces rondes l'une au-dessus de l'autre (on aperçoit l'écoulement de la pierre d'évier). L'accès aux étages se faisait par un escalier extérieur en bois.","habitants":"Comte de Jouvencel                                                              \r\nFamille Minguet                       \r\n        \r\n        \r\n        \"","divers":"Château de Chanteloup, le domaine de Reugnier et  le Colombier","gps":"","images":["../../jctruffet.com/image/image_58/58_Chanteloup_1.jpg","../../jctruffet.com/image/image_58/58_Chanteloup_2.jpg","../../jctruffet.com/image/image_58/58_Chanteloup_3.jpg","../../jctruffet.com/image/image_58/58_Chanteloup_4.jpg","../../jctruffet.com/image/image_58/58_Chanteloup_5.jpg","../../jctruffet.com/image/image_58/58_Chanteloup_6.jpg","../../jctruffet.com/image/image_58/58_Chanteloup_7.jpg","../../jctruffet.com/image/image_58/58_Chanteloup_8.jpg"]},"Consult_chateau_formulairec575":{"id":"Consult_chateau_formulairec575","dept":"58","canton":"Saint-Pierre le Moutier","commune":"Chantenay st-Imbert","nom":"Chantenay_St_Imbert","type":"Château","periode":"XIII-XV","histoire":"Plusieurs châteaux  dont celui de la Ferté-Chaudron du XVe siècle et la tour de Chaume du XIXe siècle. Autre château dans la commune ; des Genevièves, de Champlevier, de Montreuil, du Perray, de la Prée, le Reray et le noviciat des Surs.   Et à quelques kilomètres au Sud ouest Tresnay le château de Chavannes.                                                                     \r\n FERTE-CHAUDERON; la mouvance de la baronnie de La Ferté Chauderon était considérable; par un dénombrement fourni en l'an 1297, par Guichard de château le Perron, sire de la Ferté-Chauderon, du chef d'Isabeau, sa femme, il reconnut tenir en fief des comtes de Nevers; généralement tout ce qu'il tient par sa femme dès le pont de Moulins en Auvergne, jusqu'aux ponts de Decise et de Nevers, en long et en large, si comme les rivières de Loire et de l'Allier se comportent. La puissante demeure féodale qui, au début du XIIIe siècle, défendait la vallée de l'Allier, était aux mains d'Arnoul Chauderon. Elle passa à la fin du siècle suivant à Robert Dauphin de Jaligny, sénéchal du Nivernais et grand maître de l'hôtel de Charles VI. Mis à mal pendant la guerre de Cent ans, puis investi durant la Fronde par Roger de Bussy Rabutin, lieutenant général du Nivernais, menaçant ruine, le château de la Ferté Chauderon fut en partie rebâti au XIXe siècle.                         CHAVANNES du XIXe siècle  entreprise de madame Axelles Ever, est installée à Tresnay.","architecture":"Ferté-Chauderon, la puissante demeure féodale qui, au début du XIIIe siècle, défendait la vallée de l'Allier, Mis à mal pendant la guerre de cent ans, investi pendant la Fronde, et menaçant ruine, le château de La Ferté Chauderon fut en partie reconstruit au XIXe siècle. Dans un style néo-renaissance, un  corps de logis à deux niveaux entre deux pavillons dont celui de l'ouest plus étroit à trois étages avec à l'ouest deux grandes tours carrées à mâchicoulis et chemin de ronde sous un toit pointu à quatre pans et lucarnes  à toit à l'impériale.","habitants":"Famille  d'Arnoul Chauderon\r\n        \"","divers":"dans la commune de Chantenay saint-Imbert ; château de la Ferté Chaudron  des Genevièves, de Champlevier, de Montreuil, du Perray, de la Prée, le Reray et le noviciat des Surs.      Et à quelques kilomètres au Sud ouest Tresnay le château de Chavannes.","gps":"","images":["../../jctruffet.com/image/image_58/58_Chantenay_St_Imbert_1.jpg","../../jctruffet.com/image/image_58/58_Chantenay_St_Imbert_2.jpg","../../jctruffet.com/image/image_58/58_Chantenay_St_Imbert_3.jpg","../../jctruffet.com/image/image_58/58_Chantenay_St_Imbert_4.jpg","../../jctruffet.com/image/image_58/58_Chantenay_St_Imbert_5.jpg","../../jctruffet.com/image/image_58/58_Chantenay_St_Imbert_6.jpg","../../jctruffet.com/image/image_58/58_Chantenay_St_Imbert_7.jpg","../../jctruffet.com/image/image_58/58_Chantenay_St_Imbert_8.jpg","../../jctruffet.com/image/image_58/58_Chantenay_St_Imbert_9.jpg"]},"Consult_chateau_formulaired901-2":{"id":"Consult_chateau_formulaired901-2","dept":"58","canton":"Charité sur Loire","commune":"Charité sur Loire","nom":"Charité_Guérigny","type":"Vestiges","periode":"XV","histoire":"Charité sur Loire  possède des remparts du XVe siècle le château de Guérigny du XVIIe siècle et de La Pointe du XVIIe siècle.                                CHARITE-sur-Loire,  en 1365, durant la guerre de Cent Ans, est assiégée par lordre du roi Charles V de France, les Français investirent la place et les fortifications furent en partie rasées. En 1429, Jeanne d'Arc, pour le compte de Charles VII, tente de reprendre la ville contrôlée alors par le capitaine Perrinet Gressard qui la tenait depuis décembre 1423, mais elle échoue en raison des fortifications puissamment érigées qui défendent la ville.  Lamiral Gaspard de Coligny, un des chefs protestants, s'installe un temps après sa victoire lors de la bataille d'Arnay-le-Duc le 25 juin 1570. \r\n En 1576, la ville est reprise par le frère du roi, le duc dAnjou, presque sans combat. Le 19 avril 1577, Sarra Martinengo, gouverneur de Gien, est tué sous les murs de La Charité-sur-Loire alors qu'il assiégeait les Réformés qui tenaient la ville.\r\nGUERIGNY, la Motte de Gérigny,  demeure du XVe siècle par Jean de La Barre et remanié au XVIIe siècle est la première construction féodale construite à lemplacement du château, comme on en voit beaucoup en France au XIe siècle. Cest à cette époque que Guy de Thiers, comte de Chalon, lègue ses terres de Gérigny au prieuré de la Charité-sur-Loire, fondé par lAbbaye de Cluny.  Racheté par Pascal et Laurence Mallet pour des chambres d'hôtes.","architecture":"Remparts : le chemin de ronde, qui sépare la tour de Cuffy de la tour Perrinet Gressard, est accessible et permet de profiter dun magnifique panorama sur la cité médiévale et sur la Loire.\r\nPromenade des Anglais. Des fortifications puissamment érigées qui défendent la ville, des puissantes murailles de l'époque, il ne subsiste de nos jours que la partie Nord soutenue par la \"Tour Jeanne d'Arc\", la \"Tour Perrinet Gressard\", grosse tour ronde dénommée aussi \"Tour des Espagnols\" et une grande tour carrée dite \"Tour de Cuffy\" reliée à la précédente par un chemin de ronde\r\nChâteau de Guérigny, construit au XVe siècle sur une motte féodale,  Il sagissait dune tour dressée sur une élévation et protégée par une enceinte de pieux ou de pierre, comme on en voit beaucoup en France au Xie siècle. Présente un corps de logis daté du XVIIIe siècle, remanié au XIXe siècle, entouré de tours d'angle, d'un donjon et d'une tour barbacane avec escalier à vis. Cest un prototype darchitecture de lépoque : des douves en eau délimitant une « île »2 ponts dormants pour accéder à une cour dhonneur bordée du château et de ses communs, bien quabandonné et dans un état de délabrement bien avancé.","habitants":"Capitaine Perrinet Gressard                                                          Gerigny Guy de Thiers,\r\n        \r\n        \"","divers":"A la Charité sur Loire les fortifications, le domaine des Forges, le château de Guérigny, de la Pointe et le patrimoine de la ville.","gps":"","images":["../../jctruffet.com/image/image_58/58_Charite_Guerigny_1.jpg","../../jctruffet.com/image/image_58/58_Charite_Guerigny_2.jpg","../../jctruffet.com/image/image_58/58_Charite_Guerigny_3.jpg","../../jctruffet.com/image/image_58/58_Charite_Guerigny_4.jpg","../../jctruffet.com/image/image_58/58_Charite_Guerigny_5.jpg","../../jctruffet.com/image/image_58/58_Charite_Guerigny_6.jpg","../../jctruffet.com/image/image_58/58_Charite_Guerigny_7.jpg","../../jctruffet.com/image/image_58/58_Charite_Guerigny_8.jpg","../../jctruffet.com/image/image_58/58_Charite_Guerigny_9.jpg"]},"Consult_chateau_formulaire9ece":{"id":"Consult_chateau_formulaire9ece","dept":"58","canton":"Château-Chinon","commune":"Montreuillon","nom":"Chassy_Montreuillon","type":"Château","periode":"XVII","histoire":"CHASSY,  l'Abbaye de Flavigny,  en 1305 cette terre appartenait à noble Robert de Compont, dit d'Auxois, écuyer, seigneur d'Aringes, dont une fille la porta en dot à Hugues de Varigny. Jean de Varigny et Jean de Caroble, son parent, en reprirent le fief en 1424. En 1475 cette maison forte, alors propriété d'Antoine de Varigny chambellan du Comte de Nevers, Philippe de Varigny, sieur du Chemin, et Dieudonné de Caroble, écuyer, en étaient possesseurs en 1504. Louise de Varigny porta Chassy en partie à Claude d'Esguilly, issu d'une noble maison de Bourgogne, passait à Guillaume de Monsaulnin. Jacques d'Esguilly, fils du précédent, épousa en 1560 Claude de Chastellux et acquit quelques années plus tard de Guillaume de Montsaunin ses droits sur Chassy dont il reprit le fief en 1575.  Choiseul, comte de Chevigny, baron de Chassy, seigneur de Bussy, d'Enfer, de Montautier, du Chemin, des Bordes, près Anthien, en 1630 fait rebâtir le château vers 1649. Il était au XVIIIe siècle, le siège d'une des 32 châtellenies du Duché de Nevers de laquelle mouvaient 116 fiefs. Reconstruit en 1649 pour Jacques Ier de Choiseul et son épouse Madeleine de Malain, baronne de Lux. La maison de Choiseul en sera propriétaire jusqu'à la Révolution et en 1807 le château appartient à Talleyrand-Périgord. La baronnie de Chassy est une seigneurie en toute justice, mouvante du Duché de Nevers.","architecture":"Chassy, Cassiacum. Ce château était armé de 4 tours rondes. Il est posé sur la rive gauche de l'Yonne dans un joli vallon qui porte son nom et où se croisent plusieurs routes. Reconstruit en 1649, les fossés de l'ancienne maison forte subsistent. Il est constitué d'un seul bâtiment à un étage carré, avec quatre tours rondes. Les façades possèdent des fenêtres larges à petits carreaux. Les combles possèdent des lucarnes à frontons triangulaires. La couverture est en tuile brune. Une des tours a sa base percée d'embrasures de canonnières. Elle abrite une salle voûtée en coupole datant de la maison forte. Une chapelle intérieure à voûtes d'arêtes semble avoir des éléments antérieurs à la reconstruction du château.","habitants":"Jacques Ier de Choiseul\r\n        \"","divers":"Château de Chassy à Montreuillon","gps":"","images":["../../jctruffet.com/image/image_58/58_Chassy_Montreuillon_1.jpg","../../jctruffet.com/image/image_58/58_Chassy_Montreuillon_2.jpg","../../jctruffet.com/image/image_58/58_Chassy_Montreuillon_3.jpg","../../jctruffet.com/image/image_58/58_Chassy_Montreuillon_4.jpg"]},"Consult_chateau_formulaire0737":{"id":"Consult_chateau_formulaire0737","dept":"58","canton":"Châteauneuf Val de Bargis","commune":"Châteauneuf Val de Bargis","nom":"Chateauneuf_Bargis","type":"Château","periode":"XII-XVIII","histoire":"Chateauneuf; château de  Fonfaye du XVIIIe siècle et  autre château de Bourras.                                                       CHATEAUNEUF, la seigneurie  en 1014 est Hugues de Chalon, évêque d'Auxerre. Vers 1200  Evrard de Châteauneuf . Avant 1248  Gaucher de Châtillon. De 1248 à 1276  Guy de Lusignan, sire de Comgnac et de Châteauneuf-au-Val-de-Bargis. Après 1276  Robert de Flandre, comte de Nevers. En 1380  Jean Leclerc-de- Fleurigny.  En 1395  duc de Bourgogne. Vers 1450 : Anthoine de Druy. En 1478  Jeanne de Morel.  En 1483  Jean Tenon. Avant 1491  Jean de Clamecy et Françoise d'Albret. En 1525  Odet de Foix, sire de Lautrec . En 1601  François de Clèves . En 1656 Henri de Morogues. En 1685  Philippe-Julien Mancini, duc de Nevers.  En 1751  François Mancini, duc de Nevers . \r\nFONFAYE  Louise Françoise Léontine de Prunelé Thignonville née en 1725 élevée avec sa sur dans la maison royale de Saint-Louis à Saint-Cyr a épousé, François Gabriel de Morogues comte de Fonfaye, chevalier seigneur dudit lieu, la Selle Drigny, et en Nivernois, ancien capitaine d' Infanterie au régiment de la marine, mort en son château de Fonfaye le 16 décembre 1762, âgé de 78 ans II était veuf d' Elisabeth du Faur Courcelles sa première femme décédée sans enfants à Fonfaye le 7 Avril 1756 de son second mariage il a laissé pour fils unique Parfait Marie François Gabriel, dit le Marquis de Morogues, appelé depuis la mort de son père le comte de Fonfaye né audit lieu le 28 Juin 1758.        BOURRAS, fondée au début du XIIe siècle par Hugues de Thil, seigneur de Champlemy et Alix de Montenoison son épouse, l'abbaye cistercienne N.-D. de Bourras, à Saint-Malo-en-Donziais, était la première fille de Pontigny, qui envoya des moines pour cette nouvelle fondation. Elle relevait de l'évèché d'Auxerre, et on doit considérer le territoire autour de Châteauneuf comme partie intégrante du Donziais, même si le chef-lieu appartenait au comte de Nevers.","architecture":"Château-de-la-Tour (le), première mention connue en 1740. Il doit son nom au château féodal, autrefois bâti sur la motte qui domine le village. Il céda son titre à Vif, aujourd'hui Châteauneuf, et le surnom lui est venu d'un vieux donjon qui a subsisté jusqu'au commencement du XIXe siècle et dont les pierres ont aidé à la construction de la route nationale.  Le Châtelet, première mention en 1184. Le domaine appartient avant la Révolution à la chartreuse de Bellary. En 1742, il se compose ainsi : maison, grange, étable, bergerie, cour, jardin, chènevière, terres labourables et non labourables et prés.\r\nBourras, un abbé commendataire a fait construire au XVIIIe siècle une véritable gentilhommière, qui veille toujours, au cur de cette vallée isolée, sur le souvenir des valeureux moines qui l'avaient animée de leurs chants des siècles durant. Bâtisse de deux étages  toit en croupes avec lucarnes, deux retour en équerre côté jardin à deux niveaux d'une travée.                                                      Fonfaye corps de logis à un niveau sur rez-de- chaussée mi-hauteur,toit en croupe avec lucarnes,  pavillon d'entrée saillant toit à quatre pans, ce corps est inséré entre deux tours une ronde et une carrée.","habitants":"François Mancini, duc de Nevers\r\n        \"","divers":"A Chateauneuf  le Val de Bargis, le château de Bourras, de Fonfaye et la chartreuse de Bellary.","gps":"","images":["../../jctruffet.com/image/image_58/58_Chateauneuf_Bargis_1.jpg","../../jctruffet.com/image/image_58/58_Chateauneuf_Bargis_2.jpg","../../jctruffet.com/image/image_58/58_Chateauneuf_Bargis_3.jpg","../../jctruffet.com/image/image_58/58_Chateauneuf_Bargis_4.jpg","../../jctruffet.com/image/image_58/58_Chateauneuf_Bargis_5.jpg"]},"Consult_chateau_formulaired3b5":{"id":"Consult_chateau_formulaired3b5","dept":"58","canton":"Châtillon en Bazois","commune":"Châtillon en Bazois","nom":"Chatillon_Bazois","type":"Château","periode":"XV","histoire":"Plusieurs châteaux à Châtillon en Bazois, et celui de  Bouteuille  à Alluy.                                                                       \r\nCHATILLON, cité au Xe siècle, seigneurie de Guy de Châtillon qui épousa Agnès de Donzy en 1221 héritière du comte de Nevers. La famille des Châtillon s'éteint en 1350 sans héritiers mâles, passera par alliance à la famille de Rochefort dont l'un des membres, Claude, épouse en 1464 Adrienne  de Nevers, fille naturelle de son suzerain direct, le comte Charles. Le château passera ensuite  par alliance aux Chandio, aux Pontailler et au début du XVIIe siècle à Edme de Rochefort   marquis de Pleuvaut, lieutenant général et gouverneur du Nivernais, bailli d'Autun. Au XVIIIe siècle le propriétaire est   Cornille  d'Aersen de Somelsvick marquis de Béthune-Chabris  et en 1735 la famille de Pracomtal    mais ces derniers récupèrent le domaine après la Révolution. Après 1966 le domaine ayant passé une longue période d'abandon à souffert et acquit par monsieur Sribny. Aujourd'hui demeure de charme, propriétaire  madame Chantal Moreau-Sribny.                                   A quelques kilomètres au Sud à Alluy, la maison forte du XVIIe siècle de Bouteuille transformée en logis de France par la famille  Lejault, et au nord à 5 km le château de Mont-et-Marré chambres d'hôtes.","architecture":"Chatillon construit sur un piton rocheux,  la tour de défense, le cellier et des pièces souterraines du XIIIe siècle sont encore visibles. Le château du XVe siècle de la forteresse primitive ne subsiste qu'une tour ronde avec escalier de service qui assurait la défense sur la pointe nord de l'éperon occupant la place de l'ancien donjon, le corps de logis est élevé sur un étage carré et un étage de comble, une tour haute carrée en façade sur cour dont la porte s'ouvre sous un arc en accolade, fenêtres à meneaux  encadrées de moulures géminées, de part et d'autres des fenêtres à croisillons se détachent couronnées par des lucarnes à fronton triangulaire.","habitants":"Mme Chantal Moreau-Sribny\r\n        \"","divers":"Château de Châtillon , de Bouteuille à Alluy et le château de Mont-et-Marré.","gps":"","images":["../../jctruffet.com/image/image_58/58_Chatillon_Bazois_1.jpg","../../jctruffet.com/image/image_58/58_Chatillon_Bazois_2.jpg","../../jctruffet.com/image/image_58/58_Chatillon_Bazois_3.jpg","../../jctruffet.com/image/image_58/58_Chatillon_Bazois_4.jpg","../../jctruffet.com/image/image_58/58_Chatillon_Bazois_5.jpg","../../jctruffet.com/image/image_58/58_Chatillon_Bazois_6.jpg","../../jctruffet.com/image/image_58/58_Chatillon_Bazois_7.jpg","../../jctruffet.com/image/image_58/58_Chatillon_Bazois_8.jpg"]},"Consult_chateau_formulaire3b46":{"id":"Consult_chateau_formulaire3b46","dept":"58","canton":"Charité sur Loire","commune":"Chaulgnes","nom":"Chaulgnes","type":"Château","periode":"XIX","histoire":"Plusieurs châteaux à Chaulgnes celui de Tremblay du XIXe siècle aujourd'hui clinique,  le château du Petit Charly, fondations et caves du XIIe siècle ; tour du XVe siècle, le château du Vieux-Charly et son donjon du XIVe siècle, le château de Chazelles et le manoir du Chazeau et ses jardins.\r\nCHAULGNES, construite sur un ancien site Gallo Romain, elle était autrefois surnommée la Petite Suisse avec ses 7 châteaux. Jusqu'au début du XXe siècle, elle comptait une tuilerie et une huilerie. Chaulgnes fut aussi un carrefour de passage pour les pèlerins se rendant à St Jacques de Compostelle.\r\nDes ruines situées aux environs des Chaumes laissent penser à la présence d un couvent ou lieu de culte, fut également un haut lieu de la résistance durant la guerre de 1939-45.","architecture":"Tremblay;  de style néo-renaissance, constitué d'un corps de logis rectangulaire à deux niveaux  porche d'entrée saillant à trois niveaux toit à quatre pans et deux échauguettes sur encorbellement, ce corps est accolé sur les quatre angles de  pavillons hexagonale de même niveaux à toits en poivrières avec lucarnes à fronton moulurés.","habitants":"Seigneur locaux\r\n        \"","divers":"Château de Tremblay à Chaulgnes","gps":"","images":["../../jctruffet.com/image/image_58/58_Chaulgnes_1.jpg","../../jctruffet.com/image/image_58/58_Chaulgnes_2.jpg","../../jctruffet.com/image/image_58/58_Chaulgnes_3.jpg"]},"Consult_chateau_formulaire0935":{"id":"Consult_chateau_formulaire0935","dept":"58","canton":"Château-Chinon","commune":"Chaumard","nom":"Chaumard","type":"Manoir","periode":"XVII","histoire":"CHAUMARD, château de Maison-Comte, encore debout en 1560, et dont subsistent quelques ruines en 1865. Ces ruines, occupent le pic d'une haute montagne, au bas de laquelle coule l'Houssière. À côté s'élèvent deux ou trois chaumières, nommées la métairie du château et vers le sud à environ un kilomètre se voit le hameau de Maison-Comte. Dans la cour d'honneur, un puits était visible servant encore aux villageois. La légende raconte qu'un jour le château fut assailli et que pour éviter la soldatesque, les femmes se jetèrent en ce puits et que certains jours on les entend encore gémir. On pouvait encore y parcourir les souterrains obscurs où le seigneur Michel de Maison-Comte y tint longtemps renfermé en grande poureté et misère, Louis de la Tournelle, son frère et finit par l'envoyer de vie à trépas en 1443, au moyen de certaines viandes empoisonnées qu'il lui fit bailler. Chambres d'hôtes.","architecture":"Maison-Comte qui compte une trentaine de feux en cette fin de XIXe siècle. Les ruines forment un demi-cercle, dont l'extrémité méridionale était occupé par la chapelle. Il se distingue encore les amorces des voûtes. Une ceinture de fossés enveloppait le tout.                    Chaumard, corps de logis rectangulaire à deux niveaux toit en croupes avec lucarnes.","habitants":"Seigneur Michel de Maison-Comte\r\n        \"","divers":"Château de Maison-Comte à Chaumard","gps":"","images":["../../jctruffet.com/image/image_58/58_Chaumard_1.jpg","../../jctruffet.com/image/image_58/58_Chaumard_2.jpg"]},"Consult_chateau_formulaire227f":{"id":"Consult_chateau_formulaire227f","dept":"58","canton":"Montsauches les Settons","commune":"Alligny en Morvan","nom":"Chaux_Alligny","type":"Château","periode":"","histoire":"La CHAUX,  à l'origine une villa romaine. Une partie dépendait de la baronnie d'Alligny, le reste formant un fief particulier mouvant d'Island. En 1338, ce fief appartient à Jean de Bourbon, seigneur de Montperroux. Lucas de Vésigneux en fit par la suite l'acquisition et le laissa à sa nièce Jacqueline. Celle-ci l'apporta à Saladin de Montmorillon qui reprit le fief en 1398. En 1498, il est la possession de Mathurin Pelletier de Chambure, écuyer, seigneur de Saint-Léger-de-Fourches, en partie. Jeanne-Baptiste Martenne, sa petite-fille le porta par mariage à François de Maurepas.   La Dame de La Chaux, vendit son fief le 9 septembre 1750 à Pierre Serpillon, bourgeois de Saulieu, ancien lieutenant . Après avoir connu divers propriétaires ce domaine retrouva ses maîtres d'origine en la personne d'Eugène Pelletier de Chambure, conseiller général de la Nièvre, qui le racheta  et le reconstruit de la meilleure façon. Il comptait à la moitié du XIXe siècle pour être un des plus beau du Morvan.    Arnaud de Chambure, historien, géographe, passionné d'élevage y développa celui des poneys Connemara ainsi que des ovins et bovins sur une exploitation agricole de 150 hectares, plus cent hectares de bois. Des gîtes y furent créés par la suite.","architecture":"Le château de la Chaux est partiellement transformé en gîte,  Il a été reconstruit en 1860 Le corps de logis est en moellons avec un étage carré et un étage de comble, toit à longs pans, croupe, et pignon couvert, recouvert en ardoise. Est une bâtisse avec un corps de logis rectangulaire à deux niveaux avec lucarnes sur un toit brisé flanqué de deux pavillons rectangulaire à trois niveaux.","habitants":"Famille de Mathurin Pelletier de Chambure\r\n        \"","divers":"Château de la Chaux à  Alligny","gps":"","images":["../../jctruffet.com/image/image_58/58_Chaux_Alligny_1.jpg","../../jctruffet.com/image/image_58/58_Chaux_Alligny_2.jpg","../../jctruffet.com/image/image_58/58_Chaux_Alligny_3.jpg","../../jctruffet.com/image/image_58/58_Chaux_Alligny_4.jpg","../../jctruffet.com/image/image_58/58_Chaux_Alligny_5.jpg","../../jctruffet.com/image/image_58/58_Chaux_Alligny_6.jpg"]},"Consult_chateau_formulaire2f68":{"id":"Consult_chateau_formulaire2f68","dept":"58","canton":"Brinon sur Beuvron","commune":"Chevannes_Changy","nom":"Chevannes_Changy","type":"Maison forte","periode":"XVIII","histoire":"Deux châteaux  à Chevannes, de Treigny et de Changy  du XIVe siècle.                                                                         \r\n TREIGNY, en 1822, Treigny est rattachée à Chevannes, la nouvelle commune sappelle Chevannes-Treigny.  Les terres de Chevannes, bien estimées, sont en partie la possession des seigneurs de Montenoison. La comtesse Mahaut, fait don dune partie de ses terres au prieuré de Saint-Révérien qui les conserve jusquà la Révolution.  Treigny dépendait du prieuré de Saint-Révérien et Changy dépendait dAuxerre.\r\nCHANGY : du XVIIe-XVIIIe siècle,  ancien fief dépendant de la châtellerie de Montenoison. A partir du XVe siècle, la famille Andréas la possède jusquau XVIIIe siècle. Le dernier de  cette famille  lègue ses biens à lhôpital de La Charité. Ce château ou plutôt maison forte, possède un banal moulin, des bois et terres, il reste un énorme colombier arasé et éventré sur ordre, sans doute, des autorités du district à la Révolution.","architecture":"Le Château de Treigny est un château daté du XVIIIe siècle, une exploitation agricole, le château est privé, est visible de lextérieur. Il est le centre dun important domaine agricole,  son corps de logis principal rappelle les demeures classiques de plaisance de la fin du XVIIe siècle.  Le château possède trois tours, elles sont de différentes tailles.","habitants":"La Comtesse Mahaut                                                              Famille Andréas\r\n        \"","divers":"Château de Treigny et de Changy  à Chevannes","gps":"","images":["../../jctruffet.com/image/image_58/58_Chevannes_Changy_1.jpg"]},"Consult_chateau_formulaireccdf":{"id":"Consult_chateau_formulaireccdf","dept":"58","canton":"Imphy","commune":"Chevenon","nom":"Chevenon","type":"Forteresse","periode":"XIV","histoire":"CHEVENON,  les  seigneurs de Chevenon  faisaient partie de l'entourage des rois Charles V et Charles VI.  Guillaume de Chevenon  capitaine de Vincennes, fait construire le château. On peut d'ailleurs remarquer des similitudes entre le château de Chevenon et le château de Vincennes. Le style est le même. Guillaume IV de Chevenon gouverneur du château de Vincennes, aidé par ses fils  Hugueninet Jean III de Chevenon tous capitaines à la tour de Vincennes doù l'inspiration. Après le décès  de Jean et de Guillaume  en 1415, le château victime de lutte entre Armagnacs et Bourguignons occupés par des troupes de mercenaires,  passe aux Girard seigneur  de Bazoches-en-Pareds, au XVIe siècle à François Girard et en 1619 son petit-fils cède Chevenon  à la famille de la Platière, passera ensuite à divers propriétaires vers la fin du XVIIe siècle , Henry-Antoine de la Grange d'Arquian puis en 1766 à Mathieu Bernard Gondin, conseiller du roi en son grand conseil et en hôtel de ville de Paris, ce dernier fit raser les enceintes, gardant que le logis seigneurial. \r\nAu XIXe siècle, le château étant transformé en ferme, menaçait de ruine et c'est sur les pressions de George Sand, que le député de la Nièvre en 1848:  Frédéric Girard fit l'acquisition du domaine, ce dernier sera ministre sous la troisième République, fera d'importants travaux de restauration poursuivis par la famille Bardin propriétaire depuis le XIXe siècle.","architecture":"Château de Chevenon, vieux château de la fin du XIVe siècle,  de plan rectangulaire, était autrefois entouré de fossés et certainement par d'autres bâtiments et fortifications, . Cantonnées de grosses tours rondes, remanié au XVIe siècle, restauré au XIXe siècle, construit dans le style du château de Vincennes : haut logis quadrangulaire, 2 massives tours d'angle circulaires et 2 tours d'angle carrées, porche ogival flanqué de 2 tourelles semi-circulaires, haute tour d'escalier carrée, chemin de ronde à mâchicoulis ; salles voûtées, escalier à vis, plafonds à la Française XVIIe siècle.  Des courtines reliaient les tours de l'Est au corps de logis. On franchissait les fossés par une passerelle, donnant sur l'aire libre, qui était protégé par une seconde enceinte de fossés et de courtines, flanquées de tours rondes aux quatre angles. On y accédait par un châtelet. Aujourd'hui le château se présente sous la forme d'un grand bâtiment de plan rectangulaire, plus haut que large, formant un donjon. Au couchant, la façade du château à quatre étages est flanquée de deux grosses tours rondes, autrefois crénelées et aujourd'hui recouverte d'une toiture conique. La façade comporte des archères à croisillon médian et des ouvertures pour les canons, certaines d'entre elles ayant fait l'objet d'aménagement en fenêtres pour le confort des propriétaires. Les consoles d'une ancienne bretèche subsistent en sa partie supérieure. Une tête de femme orne l'une d'elle. L'emplacement de la herse et d'un assommoir sont toujours en place. De chaque côté du passage sont deux salles voûtées, en berceau brisé. L'une d'elle servit de prison et l'autre de corps de garde.","habitants":"Famille de Guillaume de Chevenon\r\n        \"","divers":"La forteresse de Chevenon","gps":"","images":["../../jctruffet.com/image/image_58/58_Chevenon_1.jpg","../../jctruffet.com/image/image_58/58_Chevenon_2.jpg","../../jctruffet.com/image/image_58/58_Chevenon_3.jpg","../../jctruffet.com/image/image_58/58_Chevenon_4.jpg","../../jctruffet.com/image/image_58/58_Chevenon_5.jpg"]},"Consult_chateau_formulaire6af0":{"id":"Consult_chateau_formulaire6af0","dept":"58","canton":"Corbigny","commune":"Chitry les Mines","nom":"Chitry_Bouquin","type":"Forteresse","periode":"XVII","histoire":"A Chitry les Mines le château et à quelques kilomètres au sud-ouest le manoir de Bouquin à Chaumot.                                       CHITRY, Depuis le XIVe siècle, les successions et les ventes le firent passer dans de nombreuses familles. Ce château appartient aux seigneurs de Bazoches avant de passer, par mariage, à la famille Chastellux, sous Louis XI, ils obtiennent lautorisation dexploiter les mines de plomb et dargent.  En 1422, le fief passe aux main
