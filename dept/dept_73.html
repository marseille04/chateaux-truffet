const FULL={"Consult_chateau_formulairef13f":{"id":"Consult_chateau_formulairef13f","dept":"73","canton":"Moutiers","commune":"Aigueblanche","nom":"Aigueblanche","type":"Maison forte","periode":"XIV","histoire":"AIGUEBLANCHE: le premier seigneur, Gérald cadet de la famille de Briançon, reçoit son fief  en 1202. Son fils Pierre d'Aigueblanche  sera évêque d'Hereford en  Angleterre en 1240.  Plus tard; en 1306, le comte de Savoie reçoit hommage et fidélité de Pierre, fils d'Aymon d'Aigueblanche, qui reçoit en 1308 l'ordre de remettre le château à Gueronnet fils de Pierre Vullien.        La dernière représentante des Briançon-Aigueblanche, Léonette, épouse Hugues de Montmayeur et l'héritage passe dans cette puissante famille jusqu'aux premières années du XVIe siècle.   Après, on voit Pierre-Louis de Beaumont Carra prêter hommage au roi de France en 1547. En 1639,  le manoir est inféodé à Guillaume-François Carron seigneur de Saint-Thomas et le fief est érigé en marquisat en 1680 en faveur de Charles Victor-Joseph de Saint-Thomas qui englobe Aigueblanche et Briancon (la Léchère). Après la Révolution la commune en devient propriétaire, puis revendu en 1884 à 1901 à Monsieur Ancenay. Aujourd'hui de retour  à la commune.","architecture":"Deux maisons fortes  cohabitent dans cette petite ville dont un manoir du XIV-XVe siècle  se trouve au centre du bourg était entouré d'une enceinte jusqu'au XIXe siècle, possède une tour carrée, d'un  corps de logis à fenêtres à meneaux et d'une tour accolée en fer à cheval contenant avec escalier.","habitants":"Famille de Saint-Thomas\r\n        \"","divers":"Château d'Aigueblanche à coté de l'église au centre du village s'apparente à une maison forte.","gps":"","images":["../../jctruffet.com/image/image_73/73_Aigueblanche_1.jpg","../../jctruffet.com/image/image_73/73_Aigueblanche_2.jpg"]},"Consult_chateau_formulairec137":{"id":"Consult_chateau_formulairec137","dept":"73","canton":"Aiguebelle","commune":"Aiton","nom":"Aiton_Beauregard","type":"Manoir","periode":"XV","histoire":"AITON-BEAUREGARD:: Les seigneurs connus les Ginod qui s'établirent à Chambéry au XVe siècle et achetèrent le fief de Beauregard à Aiton, Etienne-Ginod de Beauregard, conseiller de son altesse et médecin d'Emmanuel Philibert, Jean-Geoffroy  Genod évêque de Belley, son frère Jean devient seigneur de Beauregard à Aiton pousa en 1610 Jacqueline-Etienne de Bellegarde, fille d'Antoine  seigneur de Disonche. La famille Genod s'éteint en 1750. En 1749 le château appartenait à Pierre Philibert de Morel, Puis vendu à la famille Etellin","architecture":"A Aiton outre du manoir de Bellegard qui d'origine reste la tour ronde à toit pointu, il y a une maison forte des la Chambre du XVe siècle, une maison forte avec tour de 1634 à la Muraz, un fort du XIXe siècle sur l'emplacement de l'ancien palais épiscopal et le fort du mont perché du XIXe siècle.","habitants":"Famille de Genod de Bellegarde\r\n        \"","divers":"La Tour d'Aiton-Beauregard","gps":"","images":["../../jctruffet.com/image/image_73/73_Aiton_Beauregard_1.jpg","../../jctruffet.com/image/image_73/73_Aiton_Beauregard_2.jpg"]},"Consult_chateau_formulaire9ec6":{"id":"Consult_chateau_formulaire9ec6","dept":"73","canton":"Aix-les-Bains","commune":"Aix-les-Bains","nom":"Aix_les_Bains","type":"Patrimoine","periode":"II siècle avant JC","histoire":"AIX :  est une ville thermale depuis l'époque gallo-romain,. elle réapparaît dans l'histoire qu'en 1011, la ville devient possession du comté de Savoie. Le château féodal qui appartint à Rudolphe III roi de Bourgogne puis aux comtes de Savoie avant d'être inféodé à la maison de Seyssel, seigneur d'Aix en 1243. Le château fut détruit en 1491 par le prince Philippe de Savoie, comte de Bresse. Il fut reconstruit quelques temps après à la même place. Il fut délabré en 1757,   en 1793 transformé en hôpital militaire d'où l'on supprimera les murs crénelés et les mâchicoulis, puis en 1824 devient un lieu pour les thermes. Fut racheté par la commune en 1866 pour faire l'hôtel de ville. C'est Victor Amédée III qui fit construire le premier établissement thermal puis  Victor-Emmanuel II de Savoie y fit construire des thermes modernes avec casino en 1857 restauré en 2002 dans l'esprit de la belle époque.                                 \r\nROCHE DU ROI: Château de la Roche du Roi dont la construction est de 1900, il fut la propriété de Gilbert Duranton, il appartint également à une réfugiée de l'aristocratie russe,  puis à un industriel londonien, RW Hudson et une famille italienne en hérita en 1998 fut la propriété d'un allemand  qui le laissa à l'abandon, en mauvais état, racheté par un décorateur aixois qui le remit en état.","architecture":"AIX:  Hôtel de ville,  ce château  qui fut construit au XVI-XVIIe siècle au même emplacement que le château féodal a perdu ses remparts ses créneaux et mâchicoulis et son donjon qui fut détruit en 1873.                                                                                 ARC DE CAMPANUS: funéraire  Romain II et du IIIe siècle avant J.C.   Le temple de DIANE  du XVIe siècle et le Palais de Savoie                         ROCHE DU ROI:  Mélanges entre palais orientale et renaissance de style composite avec ses tourelles à clochetons.","habitants":"Aix: Famille Seyssel                                                                          Roche du roi;Famille de mr Duranton\r\n        \"","divers":"Arc de Campanus\r\nChâteau\r\nBâtiment Thermal\r\nChâteau de la Roche du Roi\r\nChâteau de Marlioz","gps":"","images":["../../jctruffet.com/image/image_73/73_Aix_les_Bains_1.jpg","../../jctruffet.com/image/image_73/73_Aix_les_Bains_2.jpg","../../jctruffet.com/image/image_73/73_Aix_les_Bains_3.jpg","../../jctruffet.com/image/image_73/73_Aix_les_Bains_4.jpg","../../jctruffet.com/image/image_73/73_Aix_les_Bains_5.jpg","../../jctruffet.com/image/image_73/73_Aix_les_Bains_6.jpg"]},"Consult_chateau_formulairec0ba":{"id":"Consult_chateau_formulairec0ba","dept":"73","canton":"Yenne","commune":"Cordon","nom":"Balme(73)","type":"Gentilhommière","periode":"XIV","histoire":"La BALME fut la propriété des seigneurs des Terreaux et des Longefan de la Molière, et fut possédait par la  famille de Seyssel depuis le XVIe siècle.","architecture":"Corps de logis rectangulaire a trois niveaux.","habitants":"Famille de Seyssel\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Balme_1.jpg"]},"Consult_chateau_formulaire74b2":{"id":"Consult_chateau_formulaire74b2","dept":"73","canton":"St-Alban-Leysse","commune":"Barby","nom":"Batie_Seyssel","type":"Château","periode":"XIII","histoire":"BATIE SEYSSUEL: était un poste de garde à l'origine, appartenait avant le XIIIe siècle aux seigneurs de Seyssel. Inféodée à la famille de Seyssel  au début du XIVe siècle.  A la mort  d'Humbert II, le cadet Hugues hérite et en 1517 le château revient au seigneur d'Aix et le 14 mai 1660 par procès le domaine passe à Jacques d'Allinges marquis de Coudrée, comte de Langin et de l'Henille, baron de Larringes lieutenant général des armées du duc de Savoie qui ce dernier le revend en 1670 à François d'Oncieu  président de la chambre à la cour des  comptes, baron de St-Denis, Chaffardon, la Bâtie, seigneur de Genissia et sénateur de Savoie, cette famille y habite depuis trois siècles.","architecture":"Château, construit sur un éperon rocheux, dont le corps de logis fut reconstruit au XVIe  siècle avec cinq tours  et remparts, remanié au XIXe siècle, le château garde encore d'importantes fortifications anciennes et porte d'entrée ogivale avec passage de la herse, tour ronde du XIIIe siècle crénelée à mâchicoulis, poterne et donjon. Remanié au XIXe siècle.","habitants":"Famille d'Oncieu de la Bâtie\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Batie_Seyssel_1.jpg","../../jctruffet.com/image/image_73/73_Batie_Seyssel_2.jpg","../../jctruffet.com/image/image_73/73_Batie_Seyssel_3.jpg"]},"Consult_chateau_formulairea6be":{"id":"Consult_chateau_formulairea6be","dept":"73","canton":"Albertville","commune":"Beaufort-sur-Doron","nom":"Beaufort(73)","type":"Château","periode":"XI","histoire":"BEAUFORT: appelé aussi de \"Vanches ou de Nôtre Dame\" fut construit par la famille de Beaufort. Au XIe siècle le petit fils de Barnard fortifie et construit le donjon carré et au XIIIe siècle  une partie de la forteresse  fut cédé à Béatrice de Faucigny fille du comte Pierre II de Savoie et femme du Dauphin Guigue VIII. En 1277 la famille obtient  l'autorisation de Béatrix de Faucigny de construire un autre château (Sallaz).   En 1350 après le passage du Dauphiné  à la France, la seigneurie devient la propriété du roi de France Jean II le Bon. En 1460 le duc Louis de Savoie donne cette dernière à son fils Janus, en 1556 passe à Jacques de Savoie Nemour pour être transformé  en couvent puis en 1792 vendu comme bien national,  pour devenir une exploitation agricole  et en 1871 la congrégation des Augustins achète les ruines. En 1937 après un remaniement fut transformé en maison de repos.            RANDANS; Maison-forte construite par la famille de Belletruche en 1457, à sa  mort,  passa à Bernardin Granier, cette  bâtisse  eut  la visite du roi Henri IV en lutte contre le duc de Savoie.  La maison forte fut acquise en 1901 par Pierre Brochet, puis rachetée par la commune; actuellement mairie.                                        \r\nSALLAZ: En 1277 Pierre de Beaufort après avoir vendu ses parts du château de Vanches à Béatrix  de Faucigny en 1282  les enfants de ce dernier eurent l'autorisation de construire le château de  Sallaz, qui passa au XVe siècle à Odon de Thoire-Villars et  fut récupéré en 1400 par le duc de Savoie qui le redonne à la famille de Jean de Beaufort. Au XXe siècle les vestiges appartiennent à la famille Joly.","architecture":"Beaufort: Château qui à l'origine possédait sept tours dont le donjon carré de 27 m de haut et 7 m de côté  d'origine date du XIe siècle a encore fier allure, la tour ronde de l'Est frappée par la foudre en 1730 est tronquée, le corps de logis du XVIe siècle                               Randans: château flanqué d'une tourelle du XVe siècle accolé à un corps de logis rectangulaire.","habitants":"Beaufort:Famille  de Beaufort                                               Randans:Famille Belletruche                                                 Sallaz: Famille de Faucigny\r\n        \"","divers":"Beaufort-Vanches Vestiges\r\nChateau de Randans\r\nChâteau de Sallaz","gps":"","images":["../../jctruffet.com/image/image_73/73_Beaufort_1.jpg","../../jctruffet.com/image/image_73/73_Beaufort_2.jpg","../../jctruffet.com/image/image_73/73_Beaufort_3.jpg","../../jctruffet.com/image/image_73/73_Beaufort_4.jpg"]},"Consult_chateau_formulairef9e7":{"id":"Consult_chateau_formulairef9e7","dept":"73","canton":"St-Jean-de-Maurienne","commune":"Le Chatel-Pontamafrey","nom":"Berold","type":"Vestiges","periode":"X","histoire":"BEROLD: Appelée aussi tour du \"Châtel\" une première  tour fut construite en 887 par l'évêque de Maurienne qui avait la suzeraineté temporelle sur une partie de la vallée, elle fut détruite au Xe siècle par les Sarrazins,  fut reconstruite aussitôt, son fondateur\r\n:Berold de Saxe dont  elle prit le nom,  joua un rôle militaire même habité  par des comtes de Maurienne, elle fut prise au XVIe siècle rendu à la maison de Savoie par le traité de Lyon en 1601,  fut abandonnée au XVIIe siècle, partiellement restaurée en 1828 par le roi Charles Felix dénommée \"tour Sarrasine\"  en 1708,.  Occupée par les allemands en 1944.","architecture":"Vestiges d'un donjon de 15 mètres de côté, et vingt mètres de haut avait deux portes à trois mètres du sol, joua un rôle militaire.","habitants":"Evêques de Maurienne\r\n        \"","divers":"Vestiges du Château de Berold","gps":"","images":["../../jctruffet.com/image/image_73/73_Berold_1.jpg","../../jctruffet.com/image/image_73/73_Berold_2.jpg","../../jctruffet.com/image/image_73/73_Berold_3.jpg"]},"Consult_chateau_formulaire5f8c":{"id":"Consult_chateau_formulaire5f8c","dept":"73","canton":"Yenne","commune":"Traizé","nom":"Beyrin","type":"Château","periode":"XV","histoire":"BEYRIN: Construit au XIIIe siècle au XVe siècle , a appartenu aux Seyssel, fut la propriété des Goy de Navette et par alliance passa au comte de Perron gouverneur de la Savoie à la Révolution, passa à la famille Rostaing en 1816, puis aux comte de Boigne et racheté dernièrement pour le compte du Parc Locmaria, Ferme.","architecture":"Ce château du XVe siècle possède un corps de logis rectangulaire à trois niveaux toit en tuiles et fenêtres à meneaux, tourelle carrée.","habitants":"Famille Goy de Navette\r\n        \"","divers":"Château de Beyrin","gps":"","images":["../../jctruffet.com/image/image_73/73_Beyrin_1.jpg"]},"Consult_chateau_formulairecd0c":{"id":"Consult_chateau_formulairecd0c","dept":"73","canton":"Albertville","commune":"Esserts-Blay","nom":"Blay","type":"Vestiges","periode":"XII","histoire":"BLAY:  la première partie du château  fut construite au XIIe siècle par Nicod d'Avallon, en 1300 François d'Avallon construisit les fortifications.   En 1354  le château passe par alliance de la seigneurie de  Blay à François de Salins, en 1418 à la mort de François le château passa à l'archevêque de Narbonne. En 1432 l'arrière petit fils  de François de Salins  possède toujours la seigneurie et se met sous la protection du duc de Savoie Amédée VIII. En 1536 Jean de Mermet de Riddes seigneur de Flumet et de Mégéve achète le domaine. En 1565 Antoine Gaspard de Riddes, fils de Jean hérite. Malheureusement le château subit un incendie en 1599 d'où il tomba en ruine et ne fut pas reconstruit.               En 1615 Antoine de Riddes  sans héritier direct donne par testament a Gaspard du Verger fils de sa soeur Thomasines de Riddes. Au XIXe siècle plus d'héritier mâle la famille Verger disparaît une association de sauvegarde maintienne les ruines.","architecture":"De ce château construit au XIIe siècle, donjon quadrangulaire avec logis à trois étages flanqué de trois tour d'angles en saillie, restauré au XVe siècle mais  incendié en 1599 ne fut pas restauré, il reste les vestiges de trois tours.","habitants":"Seigneur de Blay              \r\nFamille de Ribbes\r\n        \"","divers":"Vestiges du château de blay","gps":"","images":["../../jctruffet.com/image/image_73/73_Blay_1.jpg","../../jctruffet.com/image/image_73/73_Blay_2.jpg"]},"Consult_chateau_formulairedbbc":{"id":"Consult_chateau_formulairedbbc","dept":"73","canton":"Ruffieux","commune":"Chanaz","nom":"Boigne","type":"Maison forte","periode":"XVI","histoire":"BOIGNE; Le seigneur connut au XVe siècle  est Louis Mareste, seigneur de Chanaz marquis de Lucey.  En 1744, le comte de Muffat de Saint-Amour l'acquit . Après la Révolution, la châtellenie fut cédée au général de l'empire Benoit de Boigne, qui possédait déjà un château Buisson-Rond dans le voisinage revendue en 1889, elle devient l'aire vive du chef-lieu et la commune de Chanaz s'en rendit propriétaire en 1969 en 1978 réhabilitation du bâtiment pour y installer des locaux administratifs, mairie etc.","architecture":"Importante maison forte de plan carrée avec tour ronde aujourd'hui transformé en mairie fleuron architectural de Chanaz a conservée des éléments du XIIIe siècle tel que la porte en tiers point, des fenêtres à meneaux du XVIe siècle.","habitants":"Famille de Boigne\r\n        \"","divers":"Maison forte de Boigne","gps":"","images":["../../jctruffet.com/image/image_73/73_Boigne_1.jpg","../../jctruffet.com/image/image_73/73_Boigne_2.jpg"]},"Consult_chateau_formulaire0a29":{"id":"Consult_chateau_formulaire0a29","dept":"73","canton":"Yenne","commune":"Lucey","nom":"Boigne_Lucey","type":"Château","periode":"XIX","histoire":"BOIGNE_LUCEY: fut la propriété des de la Forest de Lucey, dont le premier seigneur connu en 1223 est Sigomon de la Forest, familier de la maison de Savoie, il eu cinq enfants, fonda une nouvelle branche avec Guillaume de la Forest de Lucey, ce dernier n'eut malheureusement pas d'héritier, fit don à son neveu  Jacquemet de Chevelu fils d'Isabelle de Lucey qui avait épousée le chevalier jean de Chevelu de Lucey. Ce fut Louis le Chevelu de Lucey  qui remania le château au XVe siècle et le laissa à son neveu Claude de Mareste, de cette  descendance, le dernier marquis de Lucey de Mareste mourut au XVIIIe siècle la veuve laissa le château  en 1816 au comte Carron de Gressy sur Aix et  en 1817 rachetait par Felix Cottarel qui le cède  au comte Benoit de Boigne ( né Benoit Leborgne) qui possède le château de Buisson-Rond, le général fit brillante carrière dans l'armée aux Indes, il décéda en 1830, il fit élever la fontaine des éléphants à Chambéry,. En 1920 le château est vendu par une descendante  à Jean-Baptiste Morel, industriel Iserois  dont les descendants son toujours propriétaires.","architecture":"A l'origine cette maison forte du XIIe siècle,  à la Révolution découronné de ses deux tours, endommagés, Ernest de Boigne,  le petit fils du général le fit restaurer, fit exécuter l'avant corps, la construction actuelle date du XIXe siècle.","habitants":"Famille de la Forest\r\n        \"","divers":"Château de Boigne-Lucey","gps":"","images":["../../jctruffet.com/image/image_73/73_Boigne_Lucey_1.jpg","../../jctruffet.com/image/image_73/73_Boigne_Lucey_2.jpg"]},"Consult_chateau_formulaired69a":{"id":"Consult_chateau_formulaired69a","dept":"73","canton":"Moutiers","commune":"Aigueblanche","nom":"Bois(73)","type":"Château","periode":"XV","histoire":"BOIS: En 1485, Aymon du Bois possède le château, mais en 1498 c'est Pierre de Beaufort qui en devient seigneur. En 1504 passe aux frères Trombert et en 1568 devient fief d'une baronnie en faveur de Philibert de Viliane de Laudes, que ces derniers conserveront Bois jusqu'à la fin du XVIIe siècle où il passera ensuite aux frères Chevillard de la d' Huy, puis passa aux Morand.","architecture":"Ce château possède une basse cour pentagonale entourée de mur, flanqué de trois tours rondes aux angles dans laquelle s'élevaient d'habitations, corps de logis à trois étages desservi par une tour ronde d'escalier a bien conservé arcs et accolades malgré les modifications subies est due a sa transformation paysanne aux XVe siècle.","habitants":"Famille du Bois\r\n        \"","divers":"Château de Bois avec sa tour","gps":"","images":["../../jctruffet.com/image/image_73/73_Bois_1.jpg"]},"Consult_chateau_formulaireb6d5":{"id":"Consult_chateau_formulaireb6d5","dept":"73","canton":"Grésy-sur-Aix","commune":"Tresserve","nom":"Bonport","type":"Château","periode":"XVI","histoire":"BONPORT: On trouve en 1344 Humbert de Seyssel, le château édifié  au XVIe siècle, fut invité dans ce château la duchesse d'Abranlés  (épouse de Junot) ainsi que de nombreuses personnalitées tel que la reine Hortense, Pauline Borghése, Désiré Clary, Madame Récamier et Madame de Boigne. Ce château fut acheté et reconstruit en 1889 par Ellen Willmott. A appartenu en 1901 a un lord britanique Joseph Charlton passa à la famille Gauthier et ensuite revendu à un hôtelier de Courchevel Joseph Alexandre Claret-Fournier qui le transformera en dancing \" le Bassamba\". Malgré son ravage d'un incendie en  2008 fut remanié , Aujourd'hui mairie,","architecture":"Bonport bâtiment de 400 mètres carré à quatre niveaux  en forme de croix accolé de deux tourelles sur la face Ouest dans les deux angles à l'intérieur.","habitants":"Famille de humbert de Seyssel\r\n        \"","divers":"Château de Bonport","gps":"","images":["../../jctruffet.com/image/image_73/73_Bonport_1.jpg"]},"Consult_chateau_formulaire7231":{"id":"Consult_chateau_formulaire7231","dept":"73","canton":"Aix-les-Bains","commune":"Bourdeaux","nom":"Bourdeaux(73)","type":"Château","periode":"XI","histoire":"BOURDEAU: Construit au XIe siècle sur les ruines datant de l'époque romaine par les seigneurs Seyssel, marquis d'Aix et le gardèrent jusqu'au XVIe siècle puis par alliance passa a Louis de Livron et fut légué par sa descendance  en 1670 aux jésuites de Chambéry qui ces derniers le vendirent à  l'ambassadeur Philibert Sallier de la Tour de Cordon dont le fils fut président de la chambre des comptes et la descendance garda le château jusqu'à la Révolution, vendu comme bien national, acquit en 1800 par Jean-Baptiste Viviand, en 1810 Antoine Métral avocat entreprend des travaux de restauration et Joseph Giraud (magistrat)  lui donne un aspect renaissance en 1875 et depuis 1880 il est la propriété de la famille Gigot de Villefaigne dont la famille le possède toujours.","architecture":"Château dont le corps de logis haut et rectangulaire avec tourelles en encorbellement de style troubadour domine le lac du Bourget, l'édifice d'origine date du XIe siècle, restauré au XIIe siècle, à la Révolution les tourelles et murs d'enceintes sont détruits et en 1850   l'ensemble des murailles sont couronnées de créneaux et les échauguettes reconstruites.","habitants":"Famille des seigneurs de Seyssel\r\n        \"","divers":"Château de Bourdeau","gps":"","images":["../../jctruffet.com/image/image_73/73_Bourdeau_1.jpg","../../jctruffet.com/image/image_73/73_Bourdeau_2.jpg","../../jctruffet.com/image/image_73/73_Bourdeau_3.jpg"]},"Consult_chateau_formulaire198b":{"id":"Consult_chateau_formulaire198b","dept":"73","canton":"St-Alban-Leysse","commune":"Bassens","nom":"Bressieux(73)","type":"Château","periode":"XVI","histoire":"BRESSIEUX: au XVIe siècle propriété de Louis Gallier seigneur de Bressieux, écuyer du duc de Savoie, une descendante épouse Alphonse Antoine de Rouer de Saint-Séverin, puis par alliance le château passa aux Mareschal de la Val d'Isère qui le vendit en 1753 au général François Joseph Sallier de la Tour qui le conservèrent jusqu'à la Révolution.","architecture":"Le château de Bressieux fut intégré à l'hôpital psychiatrique, façade  du XVIIIe siècle entouré de deux tours rondes, hérité de la maison forte  du XVIe siècle, château remanié au XVIIIe siècle.","habitants":"Seigneurs de Bréssieux\r\n        \"","divers":"Château de Bressieux","gps":"","images":["../../jctruffet.com/image/image_73/73_Bressieux_1.jpg","../../jctruffet.com/image/image_73/73_Bressieux_2.jpg"]},"Consult_chateau_formulairefef3":{"id":"Consult_chateau_formulairefef3","dept":"73","canton":"Moutiers","commune":"La Léchére","nom":"Briancon(73)","type":"Vestiges","periode":"XII","histoire":"BRIANCON: Seigneurs cité en 1082 Emeric sire de Briançon, la seigneurie  érigée en vicomté au XIe siècle suite a des polémiques Humbert II le fit détruire, et en 1276 reconstruit par le comte Philippe de Savoie, passa à Gaspard de Montmayeur et en 1486 fut acquit par le comte de Savoie Charles Ier puis cédé en 1528 à  Béatrice de Portugal. Occupé par les français de 1536 à 1557 puis rendu au duc de Savoie  Emmanuel-Philibert qui le revend en 1568 au noble François Ramus. Repris par les français en 1600 qui le démantèle, en 1630 a Thomas de Carignan. La seigneurie fut transformé en 1680 en Marquisat  au profit de la famille Caron de Saint-Thomas qui fut assailli par les troupes de Louis XIII et en 1690 détruit par le maréchal de Catinat.","architecture":"Il ne reste que peu de vestiges du château, reste d' un donjon carré de 8,40 m de côté.","habitants":"Comté de Savoie\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Briancon(73)_1.jpg","../../jctruffet.com/image/image_73/73_Briancon(73)_2.jpg"]},"Consult_chateau_formulaire6f52":{"id":"Consult_chateau_formulaire6f52","dept":"73","canton":"Chambéry","commune":"Barberaz","nom":"Buisson_Rond","type":"Château","periode":"XIX","histoire":"BUISSON-ROND:: Cité en 1341 ce château a appartenu au fief de Buisson Rond, puis passa à la famille de Granges de Chambéry qui s'éteignit au XVe siècle et lui succéda la famille de Luyrieu puis les Marcossay. En 1587, devient la propriété de Louis Milliet baron de Faverges, chancelier de Savoie dont le petit fils, archevêque de Tarentaise fit construire le nouveau château en 1660 . En 1729 à la famille du marquis  Fléchière d'Arvillard, c'est à cette époque que le marquis De Maistre  s'éleva en montgolfière et en 1793 le marquis d'Arvillars Laurent Justinien Milliet eu la propriété  et la   vendit l'année suivante comme bien national à monsieur Caseli qui ce dernier le vendra au docteur Bernard et qui à son tour le vendra en 1802 au  général comte de Boigne, qui fit les plantations et c'est à  son fils Ernest que l'on doit  le bâtiment actuel, Ernest avait épousé la fille du duc de Sabran. Le château resta dans le centre mondain de tout Chambéry, Madame de Staël, Madame Récamier et Benjamin Constant y vinrent. Il fut racheté par la ville de Chambéry dernièrement.","architecture":"Château construit au XVIIe siècle remanié au XIXe siècle en palais Italien pavillon centrale à trois  étages dont un sous les toits, deux pavillons réduits et en retrait sur les côtés, à l'intérieur grand salon central, deux escaliers dessert les pièces partant du hall central.","habitants":"Famille de Buisson Rond \r\nFamille du comte de Boigne\r\n        \"","divers":"Château de Buisson-Rond","gps":"","images":["../../jctruffet.com/image/image_73/73_Buisson_Rond_1.jpg","../../jctruffet.com/image/image_73/73_Buisson_Rond_2.jpg"]},"Consult_chateau_formulaire3f76":{"id":"Consult_chateau_formulaire3f76","dept":"73","canton":"Chambéry","commune":"Francin","nom":"Carron","type":"Château","periode":"XVIII","histoire":"CARRON: Appelé aussi Charron fut construit en 1768 par Joseph Rambert de Châtillon, En 1790 servit de refuge à plusieurs officiers de la maison du comte d'Artois qui fuyait la Révolution.il fut racheté en 1808 par le général Pierre Decouz qui ce dernier décède en 1814 suite aux blessures de guerre, mais le château est toujours dans la famille.","architecture":"Corps de logis rectangulaire à trois niveaux dont un sous pente flanqué de deux petits pavillons à  deux niveaux en retrait sur les côtés.","habitants":"Famille de Rambert de Châtillon                                                         Famille de Pierre Decouz\r\n        \"","divers":"Château de Carron","gps":"","images":["../../jctruffet.com/image/image_73/73_Carron_1.jpg"]},"Consult_chateau_formulaire5e0b":{"id":"Consult_chateau_formulaire5e0b","dept":"73","canton":"St-Alban-Leysse","commune":"St-Jean-d`Arvey","nom":"Chaffardon","type":"Château","periode":"XVI","histoire":"CHAFFARDON: Au XIVe siècle une maison forte de 1481 d'après le mariage de Claude de Chaffardon avec Ponette de Mareste avant 1500, puis les Chaffardon  firent construire le château, le fils de Claude  épouse Blanche de Salucés cette famille s'éteignit en 1602 par la pendaison à Genève de Jacques qui avait pris part avec François de Saunay à  l'expédition des Savoyards contre les Génevois. Le fief passa à Michel Déage de Mesme qui épousa Louise Laurentine, leur fils vend le domaine en 1633 au président Janus d'Oncieu qui agrandit le château qui fut érigé en marquisat en faveur de François d'Oncieu en 1682. L'aspect du Château actuel est dû à Joseph d'Oncieu en mariant en 1876 Marie Boch la riche héritière de Villeroy et Boch, en 1902 Antoine d'Oncieu propriétaire, en 1967 Bernard d'Oncieu marquis de Chaffardon.","architecture":"Château construit  sur l'emplacement de la M.F au XVIe siècle  remanié en 1682 en forme de U avec fausses ailes de style renaissance, la façade sud entre deux tours carrées domine la vallée.","habitants":"Famille de Chaffardon\r\n        \"","divers":"Château de Chaffardon","gps":"","images":["../../jctruffet.com/image/image_73/73_Chaffardon_1.jpg"]},"Consult_chateau_formulairec279":{"id":"Consult_chateau_formulairec279","dept":"73","canton":"Montmélian","commune":"Challes-les-Eaux","nom":"Challes_les_Eaux","type":"Château","periode":"XVII","histoire":"CHALLES: fut le château de la famille de Challes au XIIIe siècle. Louis de Challes et de Belletruche sans descendance en 1590 vendirent le château à Louis Milliet, premier président du Sénat de Savoie, dont le fils aîné, Hector Milliet de Challes et d'Arvillars, est fait marquis en 1669, cette famille gardèrent le château jusqu'à la Révolution, qui fut acheté ensuite par le juge  Jacques Antoine Balmain., par alliance passa au docteur Domenget qui découvrit la source sulfureuse qui changea la destiné de la commune, vendit le château à la société des eaux minérales de Challes qui le transforma en hôtel restaurant.  \r\nTRIVIERS: château construit vers 1550 par Henri Berthier, greffier de la chambre des comtes, par alliance passa à la famille de Claude Louis Bailly, puis passa au milieu du XIXe siècle appartient à mademoiselle Favier de la Biguerne, épouse du marquis Paul d'Oncieu, de Chaffardon et fut acheté en 1897 par le comte Stanislas de Chevron-Vilette. Fut acheté en 1921 par André Rouveyre (écrivain).","architecture":"Challes fut construit au XIIIe siècle dominant la commune eu aux cours des années des remaniements laissant un corps de logis rectangulaire dont trois tours rondes accolées en façade            Triviers: château construit vers 1550 d'un grand corps de logis carré accolé d'une tourelle à poivrière.","habitants":"Challes:Famille de Challes                                          Triviers:Famille Berthier\r\n        \"","divers":"Château de Challes \r\nManoir de Trivier\r\nCasino","gps":"","images":["../../jctruffet.com/image/image_73/73_Challes_les_Eaux_1.jpg","../../jctruffet.com/image/image_73/73_Challes_les_Eaux_2.jpg","../../jctruffet.com/image/image_73/73_Challes_les_Eaux_3.jpg","../../jctruffet.com/image/image_73/73_Challes_les_Eaux_4.jpg"]},"Consult_chateau_formulaire2976":{"id":"Consult_chateau_formulaire2976","dept":"73","canton":"Chambéry","commune":"Chambéry","nom":"Chambery","type":"Château","periode":"XVI","histoire":"CHATEAU DES DUCS:  voir article à part.                              CARAMAGNE: ce château  fut construit par Bernardino Becchi au XVIe siècle, Juriste né dans un village du Piémont nommé Caramagne. Cette famille s'allia aux Orlyé de Saint-Innocent. Puis passa à Bertrand de la Perouse en 1728 premier président du Sénat de Savoie qui le remania à son décès en 1740, ses descendants cédèrent en 1783 à Frédéric Noyel de Bellegarde. En 1817 Joseph Gillet commissaire de guerre achète le domaine. Dans cette demeure et à partir de 1820 il loue le château à la veuve de Charles Vibert de Massigny, marquise de la Pierre aristocrate britanique, cette dernière  loua le château à son amie Mrs Birch,  mère de  Mary Ann Elisa Birch qui reçu Lamartine et dans cette demeure fut signé le 25 mai 1820  le contrat de mariage d'Alphonse de Lamartine avec Mary Ann Elisa Birch.                        Au décès de madame de Lamartine le château passa en 1857 à Monsieur Charles de Guillermain, puis à Jean Cailloud, tisseur à Genève et aux Chaperonet en 1889 le domaine passa à Ernest Martin-Franklin, vice amiral son fils Albert ambassadeur d'Italie à Londres hérite en 1908. L'avocat Coppier  y mourut en 1933 et depuis 1964 à la famille Chappuis.                                   BEAUREGARD: Sur les coteaux de Bissy est dans la branche de la famille de Bissy depuis 1560 .                                               CANDIE ; fut bâtie par des chevaliers Templiers a leur retour de Croisades. château racheté par la famille Lhostis, dont monsieur Didier en 1980, le transforma en hôtel restaurant.","architecture":"Caramagne: Bâtie au XVIe siècle, cette demeure se transforma aux XVIIe siècle en une villa à l'italienne, remanié au XVIIIe siècle façade percée d'une grande loggia à l'Italienne supportée par deux colonnes de marbres roses qui mène a la porte d'entrée surmontée d'un fronton.                                                                         Beauregard :Construit à l'emplacement de l'ancien château au XVe siècle,fut agrandi au XVIIe siècle, puis remanié en 1870\r\nCandie:  Maison forte construite au XIVe siècle sur les ruines d'un édifice des templiers.","habitants":"Caramagne:Famille de Bernardino Becchi                            \r\n Famille d'Alphonse de Lamartine                                              Beauregard Famille de Bissy                                               Candie.  famille Lhostie \r\n        \"","divers":"Château de Caramagnne\r\nChâteau de Beauregard\r\nChâteau de candie","gps":"","images":["../../jctruffet.com/image/image_73/73_Chambery_1.jpg","../../jctruffet.com/image/image_73/73_Chambery_2.jpg","../../jctruffet.com/image/image_73/73_Chambery_3.jpg","../../jctruffet.com/image/image_73/73_Chambery_4.jpg"]},"Consult_chateau_formulairea3cc":{"id":"Consult_chateau_formulairea3cc","dept":"73","canton":"St-Jean-de-Maurienne","commune":"St-Etienne-de-Cuines","nom":"Chambres","type":"Maison forte","periode":"XIII","histoire":"Maison forte des GRUYERES  du XIIIe siècle de la famille de la Chambre  qui possédait aussi un puissant château sur la commune voisine de Notre- Dame de Cruet dont il ne reste aucune trace, elle possédait aussi dans le bourg un château comprenant une tour du XIII avec un corps de logis plus récent.","architecture":"Maison forte, haut corps de logis (donjon accolé d'une tour ronde).","habitants":"Famille de la Chambre\r\n        \"","divers":"Maison forte des Gruyères","gps":"","images":["../../jctruffet.com/image/image_73/73_Chambre_1.jpg"]},"Consult_chateau_formulaire7243":{"id":"Consult_chateau_formulaire7243","dept":"73","canton":"Pont-de-Beauvoisin","commune":"Lepin-le-lac-Aiguebelette","nom":"Chamost_Lepin","type":"Château","periode":"XVII","histoire":"CHAMOST: appelé aussi Lepin. sur le bord du lac d'Aiguebelette  ancien rendez-vous de chasse des comtes de Chambost,  construit au XVIIe siècle, remanié au XIXe siècle  par les comtes de Chambost.","architecture":"Ce château du XVIIe siècle corps de logis rectangulaire à trois étages.","habitants":"Comtes de Chambost\r\n        \"","divers":"Château des Chamost-Lepin","gps":"","images":["../../jctruffet.com/image/image_73/73_Chamost_Lepin_1.jpg"]},"Consult_chateau_formulaire362d":{"id":"Consult_chateau_formulaire362d","dept":"73","canton":"Chamoux-sur-Gelon","commune":"Chamoux-sur-Gelon","nom":"Chamoux","type":"Maison forte","periode":"XIII","histoire":"CHAMOUX: Cette maison forte fut construite par les seigneurs d'Aiguebelle, puis à la famille de la Rochette, puis par alliance  aux Seyssel avec Aymon seigneur de Sainte Hélène sur Isère. En 1425 à la branche des Seyssel-La Chambre qui s'éteignirent en 1623. La seigneurie est légué à Thomas de Savoie Carignan, leur fils vend le domaine en 1688 à Philibert Chapel de Rochefort.   Au XVIe siècle une collégiale fut fondée dans l'enceinte. Des chanoines y furent installés par le marquis de Seyssel-la-Chambre. En 1715 le domaine fut acheté par le ministre Pierre de Mellarède qui le cède peu après à Joseph Arestan dont la fille la baronne de Graffion épouse le général comte Hyppolyte de Gerbais de Sonnaz. Sa belle fille , Marie Gromis di- Tanengo vend le domaine en 1940 au général Chiara dont la famille est toujours propriétaire.","architecture":"Chamoux: maison forte du XIIIe siècle, dont le portail encadré de deux tours rondes,  belle ensemble rectangulaire  qui à gardé son aspect d'origine, fut remanié au XVIIIe siècle, possédait un fossé aujourd'hui remblayé.","habitants":"Seigneurs d'Aiguebelle\r\n        \"","divers":"Chateau de Chamoux","gps":"","images":["../../jctruffet.com/image/image_73/73_Chamoux_1.jpg","../../jctruffet.com/image/image_73/73_Chamoux_2.jpg"]},"Consult_chateau_formulairec2cc":{"id":"Consult_chateau_formulairec2cc","dept":"73","canton":"Albertville","commune":"La Bâtie","nom":"Chantemerle(73)","type":"Vestiges","periode":"XII","histoire":"CHANTEMERLE  appelé aussi \"Cantemerle\",  en 1196 résidence des archevêques-comtes de  Tarentaise, reconstruit au XIIIe siècle pour servir en 1200 de base militaire pour défendre la vallée, au XIVe siècle il fut remanié  perdra son allure militaire, en 1789 , les évêques ne le revendiquent pas il sera vendu comme bien national en 1792 mais le laisseront tomber en ruines, racheté en 1988 par le conseil général de la Savoie qui entretienne les ruines.","architecture":"Vestiges du château qui fut construit sur un rocher au XIIe siècle, une tour ronde de 22 mètres  de haut construite au XIIIe siècle, elle été aménagé en résidence à la fin du XVe siècle, les tours carrées dont une de 28 m de haut et de 9 m de diamètre avec logis polygonal, deux bâtiments à l'époque étaient reliés par des murs, formant une cour.","habitants":"Evêques de la Tarntaise\r\n        \"","divers":"Vestiges du château de Chantemerle","gps":"","images":["../../jctruffet.com/image/image_73/73_Chantemerle_1.jpg","../../jctruffet.com/image/image_73/73_Chantemerle_2.jpg","../../jctruffet.com/image/image_73/73_Chantemerle_3.jpg"]},"Consult_chateau_formulairec8d5":{"id":"Consult_chateau_formulairec8d5","dept":"73","canton":"Aiguebelle","commune":"Aiguebelle","nom":"Charbonnières (73)","type":"Vestiges","periode":"XVI","histoire":"CHARBONNIERES: Ancienne forteresse médiévale du XIe siècle. Première capitale  des comtes de Savoie avec Humbert Ier, puis transféré à Montmélian et à Chambéry en 1295.  En 1403 sur la colline fut construit le château de Charbonnières qui est devenu la résidence des comtes de Savoie et c'est dans ce château que naquit Humbert aux Blanches-Mains fondateur de la maison de Savoie. Aiguebelle au XIVe siècle fut une  des villes les plus importante du duché de Savoie, tenait la porte de la Maurienne fortifiée et protégée par d'autres châteaux d'Aiton et d'Argentine qui eux ont presque  disparu.  Aiguebelle subit les assauts répétés en 1536 par François Ier, en 1597 par le maréchal de Lesdigières en 1630 par le maréchal de Créqui et en 1743 dont la démolition  par les troupes espagnols. ( à Argentine une tour du XIe siècle), et à Aiton en 1694 Valperja de Masin  évêque de Maurienne fit construire un palais qui ne survivra pas à la Révolution, il fut rasé lors de la construction du fort  en 1875.","architecture":"A Aiguebelle de la forteresse médiévale il ne reste presque plus rien, des traces de fossés, citernes.                                                  Charbonnières: à  Aiguebelle ( pour les maisons forte de Beauregard  voir article sur Aiton).","habitants":"Aiguebelle; Famille Favre \r\nCharbonnières: Les Evêques de Maurienne\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Charbonnieres_1.jpg"]},"Consult_chateau_formulairef57d":{"id":"Consult_chateau_formulairef57d","dept":"73","canton":"Chambéry","commune":"Chambéry","nom":"Charmettes","type":"Villa","periode":"XVII","histoire":"CHARMETTES :  Maison qui fut acheté en 1596 par des juristes \"Favre\" anobli au XVIe siècle et en comté au XVIIe siècle, puis au sénateur Noirey, Jean-Jacques Rousseau y séjourna auprès de madame de Warens a partir de 1736, cette demeure devient après la Révolution un lieu de pèlerinage de nombreux personnages y vinrent en visite et même y habiter tel que Lamartine, Stendhal, Georges Sand. Aujourd'hui musée.","architecture":"maison construite en 1647 demeure rectangulaire à deux étages à toit pointu.","habitants":"Jean Jacques Rousseau\r\n        \"","divers":"Maison forte des Charmettes","gps":"","images":["../../jctruffet.com/image/image_73/73_Charmettes_1.jpg"]},"Consult_chateau_formulaire3893":{"id":"Consult_chateau_formulaire3893","dept":"73","canton":"Ruffieux","commune":"Chindrieux","nom":"Chatillon","type":"Château","periode":"XII","histoire":"CHATILLON: ce château  fut le siège de la seigneurie de la Chautagne dont les seigneurs de Castillionne reconstruisirent  le château vers l'an mille. Il fut le berceau de la famille de Geoffroy de Châtillon, élu pape en 1214 sous le nom de Celestin IV.             Vers le début du XIIIe siècle passa à la famille de Challant, la veuve  épousa en seconde noce épousa  le capitaine Passerin d'Entraîves,  la fille  de Jules Hyacinte de Challant âgé de sept ans en  reçu le château.  En 1485, passa par alliance à Claude de Seyssel d'Aix, en 1538 abandonné à ses fermiers jusqu'en 1687 puis acheté par les Sallier de la Tour de Cordon qui le conservèrent jusqu'en 1756, il fut acheté par le président du Sénat de Savoie Joseph Rambert  et à son neveu le baron D'Anglejan-Chatillon .                    Toujours dans la famille. C'est là que passa souvent Lamartine.","architecture":"Construit au XIIe siècle, domine le lac du Bourget, Tour (donjon bas) à l'écart du logis du XIIIe siècle en pierre calcaire et en tuf, l'enceinte qui englobe le promontoire fut édifiée au XIIIe siècle, le château subit de nombreux remaniements et agrandissements. restauré en 1769 et 1770.","habitants":"Famille de Geoffroy de Châtillon\r\n        \"","divers":"Château de Chatillon","gps":"","images":["../../jctruffet.com/image/image_73/73_Chatillon_1.jpg","../../jctruffet.com/image/image_73/73_Chatillon_2.jpg"]},"Consult_chateau_formulaire6109":{"id":"Consult_chateau_formulaire6109","dept":"73","canton":"Albertville","commune":"Mercury","nom":"Chevron_Vilette","type":"Maison forte","periode":"XIV","histoire":"CHEVRON: cette maison forte contrôlée le passage de la vallée de la Combe,  appartenait à la famille des Chevron-Vilette, originaire de Tarentaise qui firent alliance  à la maison de Savoie en 1306, Humbert IV de Chevron- Vilette devient suzerain du comte de Savoie, Mariage de Marguerite de Chevron-Vilette et Humbert Ier, passa aux Montjoie baron de l'Orme et Vilette en tarentaise, en 1325 la forteresse de Châteauvieux fut détruite et les pierres serviront à la construction du château à Mercury.      Un François Chevron-Vilette conseiller et chambellan du duc Charles III, puis gouverneur de Bretagne devint grand écuyer de Savoie puis capitaine de Chambéry et baron de Chevron-Vilette en 1486 . Le dernier Chevron-Vilette Gaspard meurt en 1630 sans postérité, sa soeur épousa le comte de Vilparga en 1630, cette famille retourna en Italie en 1755 et  vendirent le château au comte de la Tour, resta dans cette famille jusqu'à la Révolution, au XXe, une branche cadette  de cette famille du duc de sallier de la Tour Corio racheta le château et le revendit en 1945 à la famille Durand Beneteau, famille méritante par leurs actions durant la dernière guerre.","architecture":"Corps de logis rectangulaire à trois niveaux flanqué en façade plein cintre d'une tour ronde crénelée  et d'une autre tour carrée en angle sud-ouest.","habitants":"Famille de Chevron Vilette\r\n        \"","divers":"Château de Chevron Vilette","gps":"","images":["../../jctruffet.com/image/image_73/73_Chevron_Vilette_1.jpg","../../jctruffet.com/image/image_73/73_Chevron_Vilette_2.jpg"]},"Consult_chateau_formulaire6bbd":{"id":"Consult_chateau_formulaire6bbd","dept":"73","canton":"Montmélian","commune":"Chignin","nom":"Chignin","type":"Vestiges","periode":"XII","histoire":"CHIGNIN; Citadelle cité au XIIe siècle faisait parti du comté de Savoie, a flanc de colline au milieu d'une riche zone viticole,  a partir du XIVe siècle trois châteaux  entourés de  sept tours carrées éloignées de cent mètres de l'une à l'autre sont occupées par des familles seigneuriales, le premier seigneur connu  est Pierre de la Palud, qui a fait construire le château dont il reste le donjon \"la tour de Biguerne\" appelé aussi tour \"Saint-Anthelme\" cette tour fut cédée aux Pères Chartreux en 1876 après avoir été transformée en chapelle; dans cette tour au XIXe siècle où serait né Anselme évêque de Belley.   La tour des Archers ou de la Place fut vendue en 1573 à Claude Nicole qui la transforma en maison de plaisance.                                                                                 La tour Corraz en 1738 à Guillaume d'Oncieu de la Bâtie.  La tour de Bourdeau carrée érasée appartenait en 1330 à Rodolphe de Miolans mais cette tour passa à Aymar de Seyssel de la Bâtie.                                  La tour de Montagny appartenait à Amblart de Chignin passa en 1738 aux Gaspard Laurent du Bourget puis au docteur Revel en 1862.                                                                                       La tour de la Poype en 1200 aux Poypia, puis aux Verdon, aux Challes, à Louis Milliet chancelier de Savoie et en 1738 à Gaspard Laurent du Bourget  qui acquis en même temps la tour de Montagny.                                                                                   La tour de Verdun était la propriété des Verdun de Cruet,  passa aux Ramus de Charpenne, puis aux Bavoz et aux La Forest au XVIIIe siècle, Ces propriétés furent érigé en marquisat à la fin du XVIIIe siècle.                                                                       \r\n Dans la commune un autre château appelé  le \"Revel\".","architecture":"Des trois châteaux du XIe siècle il ne reste que des vestiges  avec trois tours carrées. Donjon dite \"tour de Biguerne\", converti en chapelle  appelé Saint  Anselme en 1854, deux autres donjons du XII et XIIIe siècle.","habitants":"Comté de Savoie\r\n        \"","divers":"Tour de Biguerne\r\nEt vestiges de tours seigneuriales","gps":"","images":["../../jctruffet.com/image/image_73/73_Chignin_1.jpg","../../jctruffet.com/image/image_73/73_Chignin_2.jpg","../../jctruffet.com/image/image_73/73_Chignin_3.jpg"]},"Consult_chateau_formulairecc97-2":{"id":"Consult_chateau_formulairecc97-2","dept":"73","canton":"La Motte-Servolex","commune":"Cognin","nom":"Cognin","type":"Château","periode":"XV","histoire":"CORINTHE :  On voit encore quelques vestiges  du château de Corinthe à Cognin qui  était la maison de plaisance d'un humaniste du XVIe siècle. Claude-Louis Arladet.  Elle est incorporée dans l'institut national des sourds.                                                 FOREZAN : Villa néo-classique remanié.                \r\nMONCHARVIN ; château de la famille de la Salle puis au XVe siècle passa à Janus de Duyn baron de la Val d'Isère, Vicomte de Tarantaise et grand écuyer de Savoie, une seule  fille qui épousa le comte de Valperga n'eurent pas d'enfant, passa le château à un cousin, Pierre de la Forest seigneur de la Barre duc de Nemours, cette famille garda le château jusqu'au XVIII e siècle.","architecture":"Vestiges du château de Corinthe                                                    Château Forezan villa entièrement rénovée                              Château de Moncharvin flanqué d'une grosse tour carrée découronnée.","habitants":"Corinthe: Famille Jean Louis Arladet                                         Moncharvin: Famille de la Forest\r\n        \"","divers":"Château de Corinthe \r\nVilla de Forezan \r\nChâteau de Moncharvin","gps":"","images":["../../jctruffet.com/image/image_73/73_Cognin_1.jpg","../../jctruffet.com/image/image_73/73_Cognin_2.jpg","../../jctruffet.com/image/image_73/73_Cognin_3.jpg"]},"Consult_chateau_formulaire7c69":{"id":"Consult_chateau_formulaire7c69","dept":"73","canton":"Ruffieux","commune":"Ruffieux","nom":"Collonges(73)","type":"Maison forte","periode":"XIV","histoire":"COLLONGES: Maison forte construite au XIVe siècle par la famille Collonges fut remplacé par une autre  construite au XVIIe siècle par le président du Sénat de Savoie Jean Denys d'Anière, qui passa par alliance au Gantelet, resta dans cette famille jusqu'en 1767, vendu à Joseph Girod, dont la famille acquit ensuite Mercoras, l'héritier fut en 1909  M. de Quirielle et cette maison forte transformé en hôtel en 1972.","architecture":"Corps de logis rectangulaire relié à une tour ronde crénelée à toit poivrière.","habitants":"Famille de jean Denis d'Anière\r\n        \"","divers":"Château de Collonges","gps":"","images":["../../jctruffet.com/image/image_73/73_Collonges_1.jpg"]},"Consult_chateau_formulairec9fb":{"id":"Consult_chateau_formulairec9fb","dept":"73","canton":"Albertville","commune":"Albertville","nom":"Conflans_Albertville","type":"Château","periode":"XII","histoire":"CONFLANS-ALBERTVILLE; ancienne résidence des comtes de Savoie, bourg fortifié  et fief des nobles de Conflans; passa sous le nom d'Albertville en 1835 en l'honneur du roi  de Sardaigne à Turin \" Charles-Albert\" qui donna ce nom en reliant Conflans et l'Hôpital.                Dans la cité médiéval se trouve le château de Conflans-Manuel; le château Rouge, et la maison Rouge; des vestiges tel que la porte de Savoie  en arc brisé, vestiges d'un chemin de ronde et remparts,  la tour Ramus du XVe siècle, la tour Sarrasine et la porte Tarine.                                                                \r\nCHATEAU-ROUGE:   construit à la fin du XIVe siècle dans un style vénitien  par un officier du comte-Vert Amédée VI, André de Belletruche, le château fut la résidence du comte de Savoie. Elle cite le vaillant comte-Rouge Amédée VII et d'autres comme Louis XIII et Christine de France, il fut vendu au milieu du XVIe siècle à Bernardin Granier, puis passa au XVIIe siècle à Pierre Rey, et par descendance à la famille Albert- Eugène Favier du Noyer en 1664. En 1794 vendu comme bien national,  acheté par monsieur Perrier de la Bâthie, en 1932 passa à la famille Barnier, racheté par la commune en 1973. Henri IV et Richelieu y logèrent, transformation en caserne au XVIIIe siècle.\r\nCHATEAU-CONFLANS dit MANUEL dit aussi Costaroches par sa situation construit au XVIe siècle par Jean-Antoine de Locatel, marchand enrichi et anobli, passa en 1617 par alliance au Manuel.  qui restera dans la famille jusqu'en 1970 par  Madame Geneviève Marie- Brigitte Teyssier de Savy arrière petite fille d'Alfred Auguste Manuel de Locatel dont sa fille aînée avait épousé en 1882 Augustin-Georges Teyssier Palerne de Savy, depuis 1971 propriété de la ville. Dans ce château en 1775 le roi Amédée II,  y fut reçu.                                     MAISON ROUGE; Grosse demeure construite fin XIVe siècle par Pierre Voisin secrétaire du comte-Vert Amédée VI, elle fut achetée en 1458 par Guigonnet Tondu, puis à la fin du XVIe siècle à son neveu Antoine Gaspard de Riddes et par alliance au du Verger qui vendit la bâtisse aux religieuses Bernardines qui agrandirent leur couvent, vendue comme bien national en 1793 en établissement éducatif et au XXe siècle fut utilisée pour des colonies de vacances et transformé en musée en 1936.","architecture":"Château Rouge; Château de style vénitien du XIVe siècle en briques rouges, construit à côté des remparts, reste des vestiges importants d'une potence en particulier du XIVe siècle.                            \r\nChâteau de Manuel; Château du XVIe siècle domine la ville d'Albertville,  corps de Logis flanquée de quatre tourelles à toit en poivrière.                                                                            Maison rouge: Grosse bâtisse de style Siennois du XIVe siècle en briques rouges et arcades sur la base ouverte au XXe siècle.","habitants":"Conflans Manuel: Famille de Jean Antoine de Locatel.                              Château Rouge; famille d'André de Belletruche  \r\n Maison Rouge Famille de Pierre Voisin\r\n        \"","divers":"Tour et Porche  vestiges à Conflans Château de Conflans-Manuel\r\nChâteau rouge\r\nMaison rouge","gps":"","images":["../../jctruffet.com/image/image_73/73_Conflans_Albertville_1.jpg","../../jctruffet.com/image/image_73/73_Conflans_Albertville_2.jpg","../../jctruffet.com/image/image_73/73_Conflans_Albertville_3.jpg","../../jctruffet.com/image/image_73/73_Conflans_Albertville_4.jpg","../../jctruffet.com/image/image_73/73_Conflans_Albertville_5.jpg","../../jctruffet.com/image/image_73/73_Conflans_Albertville_6.jpg","../../jctruffet.com/image/image_73/73_Conflans_Albertville_7.jpg","../../jctruffet.com/image/image_73/73_Conflans_Albertville_8.jpg"]},"Consult_chateau_formulaire1dfe":{"id":"Consult_chateau_formulaire1dfe","dept":"73","canton":"Chambéry","commune":"Chambéry","nom":"Ducs_Chambery","type":"Château","periode":"XII  XIV-XV  XIX","histoire":"Château des DUCS: Résidence des ducs de Savoie régna huit cents ans, 19 comtes 15 ducs et des roi depuis le Moyen-Age.      Au IXe siècle, la Savoie fait partie intégrante du Royaume de Bourgogne. Vers 1030, un seigneur de la cour bourguignonne Humbert surnommé \"aux blanches mains\" fondateur de la maison de Savoie et  dès le XIe siècle une place forte appartenait aux seigneurs Thomas Ier de Savoie, elle fut acquise en 1295 par la famille de Savoie, le comte Amédée V. qui à partir de 1297 fit reconstruire  le château pour en faire sa résidence principale, il deviendra ensuite le siège de la chambre des comptes lorsqu'en 1563 Chambéry perd son titre de capitale  des Etats de Savoie au profit de Turin.  En 1731  les appartements royaux sont ravagés par un incendie aussi en 1797, et la Savoie passe à la France et sa reconstruction commencée sous Napoléon Ier, se poursuivit après que Napoléon III qui hérita pour en faire une résidence. Il abrite aujourd'hui les services de la préfecture et de l'hôtel du département  d'ou siège le Conseil Général.","architecture":"Bâti sur une butte dominant la ville, au XIIIe siècle le château fut agrandi par trois tours rondes, la tour de la trésorerie et la demi-tour (encore visible) et de puissants remparts. Remanié au XIV-XV et au XIXe siècle d'allure austère d'une puissante forteresse, quadrilatère irrégulier d'ou se détache un donjon carré flanqué d'une tourelle et haute tour ronde du XVe siècle  avec des chemins de rondes à mâchicoulis qui couronnent la façade d'entrée et l'une de ses tours. La chapelle qui abrita pendant 122 ans le Saint-Suaire aujourd'hui à Turin.","habitants":"Ducs de Savoie\r\n        \"","divers":"Châreau des ducs de Savoie avec vestiges d'une porte","gps":"","images":["../../jctruffet.com/image/image_73/73_Duc_Chambery_1.jpg","../../jctruffet.com/image/image_73/73_Duc_Chambery_2.jpg","../../jctruffet.com/image/image_73/73_Duc_Chambery_3.jpg","../../jctruffet.com/image/image_73/73_Duc_Chambery_4.jpg","../../jctruffet.com/image/image_73/73_Duc_Chambery_5.jpg","../../jctruffet.com/image/image_73/73_Duc_Chambery_6.jpg"]},"Consult_chateau_formulaire16b0":{"id":"Consult_chateau_formulaire16b0","dept":"73","canton":"Aiguebelle","commune":"Epierre","nom":"Epierre","type":"Vestiges","periode":"XII","histoire":"EPIERRE; cité au XIIe siècle appartenait aux seigneurs de la Chambre, qui le dernier seigneur Gaspard de la chambre sans postérité passa  en 1454 à Aymon de Seyssel, son neveu, maréchal de Savoie, Louis son fils en fit hommage à Jean de la Chambre en 1543 fils de Louis  et de Anne de la Tour-Boulognne qui prend le titre de seigneur d'Epierre,  passa ensuite à Jeanne Louise Brunet qui épousa Jean de Livron et en seconde noce Gabriel de la Villiane leur fils Gaspard en hérita. Passa par alliance ensuite à Pierre de Tignac, sa fille par alliance transmet le château à Gaspard de Verdon et portera le titre de Baronne, elle vendra le château au juriste  Emmanuel de la Ville  qui le vendra à son tour en 1676 aux syndics, conseillers, et habitants d'Epierre. Ce qui attribua au château différent propriétaire bourgeois peu argentés qui laissèrent le château à l'abandon.","architecture":"Le château construit au XIIe-XIIIe siècle reconstruit au XIVe siècle restauré au XVI-XVIIe siècle se composait de deux bâtiments séparés par une vaste cour rectangulaire,  il ne reste qu'une tour rectangulaire et des hautes murailles crénelées et percées de baies ogivales.","habitants":"Famille de la Chambre\r\n        \"","divers":"Vestiges du château d'Epierre","gps":"","images":["../../jctruffet.com/image/image_73/73_Epierre_1.jpg","../../jctruffet.com/image/image_73/73_Epierre_2.jpg","../../jctruffet.com/image/image_73/73_Epierre_3.jpg","../../jctruffet.com/image/image_73/73_Epierre_4.jpg"]},"Consult_chateau_formulairedcd3":{"id":"Consult_chateau_formulairedcd3","dept":"73","canton":"St-Jean-de-Maurienne","commune":"St-Jean-de-Maurienne","nom":"Eveché_St_Jean","type":"Palais","periode":"XVII","histoire":"EVECHE: L'ancien palais épiscopal de Saint-Jean de Maurienne était une école militaire avant 1768 à cette date passa évêché fut reconstruit au début du XVIIIe siècle après sa destruction par le maréchal de Lesdiguières en 1597, reconstruction de la partie central  et de l'escalier. Le clergé abandonna le bâtiment en 1902 et en 1929 la municipalité  utilise ces lieux pour les  beaux arts,  envisage ensuite  un musée et autres aménagements sont venues s'ajouter pour la commune.","architecture":"Bâtiment de style militaire du XVIIIe siècle, trois corps de logis à trois étages en forme de U.","habitants":"Eveques de la Maurienne\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Eveche_St_Jean_1.jpg"]},"Consult_chateau_formulaire530a":{"id":"Consult_chateau_formulaire530a","dept":"73","canton":"Moutiers","commune":"Feissons-sur-Isère","nom":"Feissons","type":"Vestiges","periode":"XIII","histoire":"FEISSONS; cité au XIIIe siècle il appartenait à l'évêque  d'Hereford Pierre Ier d'Aigueblanche seigneur de Briançon, en 1357, le fief appartient à Amédée de Conflens, en 1379 passe aux frères Benet, puis passa aux  Duyn, puis aux de Saint-Thomas. En 1536 le château fut attaqué par les troupes de François Ier, puis par les armées d'Henri IV. Au XVIIIe siècle il est la propriété des Caron de Saint-Thomas, à la fin du XXe siècle il fut transformé en restaurant.","architecture":"Le château était constitué d'une enceinte à plan Barlong avec deux bâtiments distincts un logis et un donjon. La tour ronde crénelée du XIIIe siècle est bien conservée. Le corps de logis restant  bâtiment du XVIe siècle les quatre angles comportent de petites tours rondes  avec archères et fentes.","habitants":"Famille d'Hereford\r\n        \"","divers":"Vestiges du château de Briançon","gps":"","images":["../../jctruffet.com/image/image_73/73_Feissons_1.jpg","../../jctruffet.com/image/image_73/73_Feissons_2.jpg"]},"Consult_chateau_formulaire4134":{"id":"Consult_chateau_formulaire4134","dept":"73","canton":"Aix-les-Bains","commune":"St-Jean-le-Chevelu","nom":"Forest","type":"Château","periode":"XV","histoire":"FOREST: appelé aussi la grande Forest resta dans cette famille  jusqu'au milieu du du XVIIe siècle passa par alliance à Pierre de Grenaud,resta dans la descendance après la Révolution , Marie Victoire de Grenaud , veuve du comte de Chabod Saint-Maurice vend  la Forest à Monsieur Millon-Rousseau.","architecture":"Château qui fut l'un des plus puissant de la région est constitué de plan carré, comporte quatre tours d'angles et une cinquième au centre de la façade  Ouest qui défend l'entrée.","habitants":"Famille de Grenaud\r\n        \"","divers":"Château de la Forest","gps":"","images":["../../jctruffet.com/image/image_73/73_Forest_1.jpg","../../jctruffet.com/image/image_73/73_Forest_2.jpg","../../jctruffet.com/image/image_73/73_Forest_3.jpg"]},"Consult_chateau_formulairea743":{"id":"Consult_chateau_formulairea743","dept":"73","canton":"Savoie","commune":"Savoie","nom":"Fort_Savoie","type":"Fort Vauban","periode":"XIX","histoire":"MARIE-CHRISTINE: à Aussois Construit au lendemain de l'épopée Napoléonniéne  en 1817 et 1834 par le Royaume de Piémont-Sardaigne  cinq forts du système de Montalembert, prirent le nom  des membres de la maison de Savoie.  Dominant la vallée de la Maurienne verrouillèrent en amont de Modane cette voie de communication millénaire entre la France et l'Italie. Après la guerre de 1939 à 1945,  ils furent utilisés comme champs de manoeuvre et l'armée puis  l'abandonna définitivement en 1963.     Le sauvetage de Marie-Christine fut entreprit avec la naissance d'une association des forts de l'Esseillon en 1972. A cette époque  la municipalité d'Aussois acquiert les forts de Marie-Christine, ( aujourd'hui centre d'accueil et d'animations culturelles)  Charles-Felix,  Charles-Albert et plus tard le fort Emmanuel. La Redoute Marie-Thérése acquit par la mairie d'Arvieux pour un centre d'information de la haute Maurienne. D'autres forts ont été construit dans la Savoie tel que le fort Saint-Gobain, fort de la Tura  en haute Maurienne, fort du  Sapey, fort du Replaton, fort de la Ronce, fort du Truc, fort de la platte  et Fort du Montperché de 1875 confins d'Anton Bonvillard et Bonvillaret.","architecture":"Les forts:  Marie-Christine ( le plus élevé aux portes du parc de la Vannoise), Victor Emmanuel, (architecture étagée) Charles-Felix( qui a subit des dommages) et Charles-Albert (construit pour verrouiller l'ensemble) ainsi que la Redoute Marie-Thérése (en forme de fer à cheval est le plus petit, furent achevés entre 1825 et 1893 mais n'ont jamais eu a montrer leurs efficacités.","habitants":"L'Etat Français\r\n        \"","divers":"Fort Marie-Christine\r\nRedoute Marie-Thérése\r\nFort du Mont-Perché\r\nFort Victor-Emmanuel\r\nFort Charles-Felix                             Fort de Ronce au col du Mont-Cenis","gps":"","images":["../../jctruffet.com/image/image_73/73_Fort_Savoie_1.jpg","../../jctruffet.com/image/image_73/73_Fort_Savoie_2.jpg","../../jctruffet.com/image/image_73/73_Fort_Savoie_3.jpg","../../jctruffet.com/image/image_73/73_Fort_Savoie_4.jpg","../../jctruffet.com/image/image_73/73_Fort_Savoie_5.jpg","../../jctruffet.com/image/image_73/73_Fort_Savoie_6.jpg","../../jctruffet.com/image/image_73/73_Fort_Savoie_7.jpg","../../jctruffet.com/image/image_73/73_Fort_Savoie_8.jpg"]},"Consult_chateau_formulaire13c5":{"id":"Consult_chateau_formulaire13c5","dept":"73","canton":"Ruffieux","commune":"St-Pierre-de-Curtille","nom":"Hautecombe","type":"Abbaye","periode":"XIII","histoire":"HAUTECOMBE, au XIIe siècle fut construit un prieuré sur les terres des comtes du Genevois. Les vassaux les barons de Faucigny suzerains de Gauthier d'Aix qui firent construire le prieuré. L'abbaye commença en 1145 par les moines de Cîteaux et remanié au cours des années elle eut jusqu'à quarante moines  et il resta six moines avant la Révolution,  ils furent chassés, les bâtiments  furent vendu comme bien national sauf le monastère  acheté en 1796  par quatre personnes pour y créer une faïencerie qui fonctionnera jusqu'en 1804, puis laissé à l'abandon et à la venue du roi Charles-Félix de Savoie qui racheta le monastère, fit reconstruire l'église et en 1826 rendit le monastère aux moines cisterciens. le roi Charles Felix s'y fit enterré  parmi  les tombeaux des princes de Savoie dont le dernier Humbert II de Savoie fut inhumé en 1983.","architecture":"Les origines du monastère sont du XIIIe siècle a été remanié plusieurs fois au fils des ans mais surtout au XIXe siècle et a gardait son style gothique  troubadour.","habitants":"Seigneurs Gauthier d'Aix\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Hautecombe_1.jpg","../../jctruffet.com/image/image_73/73_Hautecombe_2.jpg","../../jctruffet.com/image/image_73/73_Hautecombe_3.jpg","../../jctruffet.com/image/image_73/73_Hautecombe_4.jpg","../../jctruffet.com/image/image_73/73_Hautecombe_5.jpg"]},"Consult_chateau_formulaire0215-2":{"id":"Consult_chateau_formulaire0215-2","dept":"73","canton":"Yenne","commune":"Yenne","nom":"Lagnieu (73)","type":"Château","periode":"XV","histoire":"LAGNIEU; Bourg fortifié remparts avec une dizaine de tours et trois portes c'est en 1309 que  Jean II dauphin du Viennois récupéra le fief, et en 1471 Claude de Montferrand qui possédait la tour de Vernay fit construire le château qui est depuis le XVe siècle dans la famille les Tarbé de Saint-Hardouin.","architecture":"De style renaissance  fenêtres à meneaux flanqué d'un donjon octogonal et d'une tour ronde et d'échauguettes.","habitants":"Famille Tarbé de Saint-Hardouin \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Lagnieu_1.jpg"]},"Consult_chateau_formulairef2e1":{"id":"Consult_chateau_formulairef2e1","dept":"73","canton":"Aix-les-Bains","commune":"Grésy-en-Aix","nom":"Loche","type":"Maison forte","periode":"XVII","histoire":"LOCHE:  Le château appartient en 1476 aux de Conzié et le vendent en 1545 à la famille  de Mouxy de Loche  qui en sont toujours propriétaire, ils reçurent d'illustres familles dont Henri IV, Louis XIII en 1630, Saint-François de Sales qui y résida. La seigneurie de Loche fut érigée en comté par le duc de Savoie en 1683.  Au XIXe siècle le comte François de Mouxy membre à l'académie de Savoie.                          Aujourd'hui appartient toujours au colonel de Mouxy de Loche.","architecture":"Maison forte à l'origine  avec pont levis, reconstruit au sud en 1638 relier à l'ancien bâtiment par une grande galerie à portiques au rez de chaussée et arcatures en plein cintre au deuxième étage,  deux  tours rondes crénelées du XIVe siècle à toit pointue inséré en façade, le château est entouré d'un mur d'enceinte, possède une cour fermée.","habitants":"Familles de Mouxy de Loche\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Loche_1.jpg","../../jctruffet.com/image/image_73/73_Loche_2.jpg"]},"Consult_chateau_formulairebc0f":{"id":"Consult_chateau_formulairebc0f","dept":"73","canton":"Montmélian","commune":"Marches","nom":"Marches","type":"Château","periode":"XIII","histoire":"MARCHES: Château fort médiéval, construit sur ordre du comte Aymon le Pacifique (Amédée V), vers 1342 fait partie de la ligne de défense définit par les comtes de Savoie en 1300 par Amédée V le Grand qui créa le bourg fortifié,  jusqu'à Amédée VII en 1390. Passa en 1403 au premier châtelain le seigneur de Cordon, puis inféodée par Amédée VIII au sire Aymon d'Apremont puis  aux seigneurs de la Balme d'Entremont  jusqu'en 1440 puis par alliance à la seigneurie des Montmayeur. En 1486 à Gilberte de Polignac, épouse d'Antelme de Miolans; Puis les Ducs de Savoie reprennent le château devenu domaine ducal en 1526 et en fit don à Béatrix de Portugal  qui elle l'attribue aux Noyel de Bellegarde, seigneur des Marches et d'Entremont de 1532 à 1830, le château fut racheté par les Costa de Beauregard pour en faire un orphelinat de jeunes filles (Les filles de la charité en son propriétaire.)","architecture":"Le château qui servit de sentinelle face au Dauphiné, clôt le bourg fortifié des Marches, construit en bois en 1300, reconstruit en pierre en 1342 a été de nombreuses fois remanié principalement au XVIIIe siècle.","habitants":"Famille de Noyel de Bellegarde\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Marches_1.jpg","../../jctruffet.com/image/image_73/73_Marches_2.jpg"]},"Consult_chateau_formulaired98f":{"id":"Consult_chateau_formulaired98f","dept":"73","canton":"Aix-les-Bains","commune":"Aix-les-Bains","nom":"Marlioz","type":"Château","periode":"XVII","histoire":"MARLIOZ: Château attesté en 1668, il appartenait à la famille de Chevillard jusqu'en 1833.  En 1813 il eut la visite de la reine Hortense et de son fils Louis Bonaparte. Ce château passa ensuite par plusieurs propriétaires pour terminer en hôtel  du groupe Accord.","architecture":"MARLIOZ: château construit au XVIIe siècle corps de logis en forme de T, fut agrandit d'une tour carrée construite sur l'angle, détruit lors de la reconstruction des thermes.","habitants":"Famille de Chevillard\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Marlioz_1.jpg"]},"Consult_chateau_formulaire25ae":{"id":"Consult_chateau_formulaire25ae","dept":"73","canton":"Ruffieux","commune":"Chindrieux","nom":"Mecoras_Grand","type":"Maison forte","periode":"XIII","histoire":"MERCORAS; Appelé aussi Grand-Mercoras construit au XIVe-XVe siècle par cette famille appelé de Mecoras, puis les Montfalcon, passa par alliance aux Clermont Mont Saint-Jean, puis Mercoras eut vingt six propriétaires dont la famille Girod au XVIIIe siècle qui le racheta à la Révolution et termina dans les mains de monsieur Laurent Feuga qui le racheta en 1964 pour le remettre en état.","architecture":"Mercoras:Château construit du XIV-XV-XVIe siècle, l' ancien donjon fut arasé en gardant le vieux logis et construisent un nouveau à trois étages, desservi par une tourelle polygonale.                  \r\nMERCORAZ: Dans le même canton à deux kilomètres de Serrières, Petit donjon carré couronné de mâchicoulis à l'extrémité d'une salle logis rectangulaire flanqué de deux hautes tourelles rondes, Porte  en arc brisé surmontée d'une bretèche du XVe siècle.","habitants":"Famille Feuga\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Mercoras_Grand_1.jpg"]},"Consult_chateau_formulaire3875-2":{"id":"Consult_chateau_formulaire3875-2","dept":"73","canton":"Albertville","commune":"St-Pierre-d`Albigny","nom":"Miolans","type":"Château","periode":"XI-XV","histoire":"MIOLANS: forteresse médiéval au carrefour de trois vallées fut plus une place militaire qu'un château de plaisance; les seigneurs de Miolans étaient proche de la famille de la maison de Savoie. \r\nAu XIIe siècle Geoffroy II de Miolans accompagna Amédée II en croisade au XIIIe siècle, Nantelme II de Miolans combattit pour défendre les droits du Comte Thomas Ier, en 1495 la seigneurie passa en baronnie. Cette baronnie de Miolans  s'éteint en 1523 sans descendance  masculine, la dernière des Miolans, Claudine, épouse de Guillaume de Poitiers  fit don du  domaine au duc de Savoie Charles III. Occupation française par François Ier  le château fut restitué à Emmanuel Philibert par le mariage du duc avec sa tante Marguerite de Valois et repris en 1600  par Lesdiguières.  \r\nEn 1694 il devient prison d'état du duché de Savoie puis du Royaume de Piémont-Sardaigne jusqu'à la Révolution, cent quatre vingt douze personnes y furent emprisonnées; les plus connues sont le père Monod ministre de Richelieu, le marquis de Sade en 1772 qui réussit à s'évader. Le château fut saccagé et pillé à la Révolution, mis en vente il ne trouva pas d'acquéreur resta à l'abandon jusqu'en  1868, reprit par monsieur Barjaud qui en fit restaurer une partie (corps de logis) et revend l'ensemble à un industriel de Chambéry M. Sorbon qui lui le vend à M.Guiter premier préfet de Savoie pour le rénover. Propriétaire actuel  Stéphane Dor.","architecture":"Cette forteresse sur un éperon  dominant la vallée, sur une surface de deux cent dix  mètres de long sur cinquante sept mètres de large  qui débuta au XIe siècle fortifié et agrandi au XVe siècle et au XVIe siècle rajout d'un donjon a contreforts de cinq étages crénelés à mâchicoulis de 23 mètres de haut.","habitants":"Seigneurs de Miolans.                                                             Les comtes de Savoie                                                       Monsieur Griter\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Miolans","gps":"","images":["../../jctruffet.com/image/image_73/73_Miolans_1.jpg","../../jctruffet.com/image/image_73/73_Miolans_2.jpg","../../jctruffet.com/image/image_73/73_Miolans_3.jpg","../../jctruffet.com/image/image_73/73_Miolans_4.jpg","../../jctruffet.com/image/image_73/73_Miolans_5.jpg"]},"Consult_chateau_formulaire74cb":{"id":"Consult_chateau_formulaire74cb","dept":"73","canton":"Montmélian","commune":"St-Pierre-d`Entremont","nom":"Montbel","type":"Vestiges","periode":"XII","histoire":"MONTBEL: En 1100 Philippe de Montbel seigneur de Montbel et d'Entremont est cité, au XII siècle ce dernier meurt , son fils Hugues lui succède et à la fin du XIIe siècle Guillaume fils de George de Montbel est le premier seigneur reconnu  d'Entremont et fortifie le château, et en 1234 ce dernier en rend hommage au Dauphin André, en 1240 le fils de Guillaume  devient vassal d'Amédée IV comte de Savoie ce qui crée des conflit entre le dauphin et le comté de Savoie qui ce dernier récupère en 1245,le passa aux sires de la Balme et en 1306 un nouveau seigneur Rollet d'Entremont remit son château et ses terres au dauphin Jean II et en 1307 le comte Amédée V attaque le château, le dauphin se rendit. Dans la même année les seigneurs d'Entremont construisirent un autre château sur la rive gauche du Guiers qui passa en 1314 au territoire de Montchal, ce château hébergea des garnissons sans entretien, il fut abandonné au XVe siècle.","architecture":"A 860 mètres d'altitude, vestiges des remparts qui entouraient le sommet du château, les pierres servirent à la construction du hameau de la Teppaz, vestige d'un donjon.","habitants":"Seigneur d'Entremonts\r\n        \"","divers":"Vestiges et motte féodal de Montbel","gps":"","images":["../../jctruffet.com/image/image_73/73_Montbel_1.jpg","../../jctruffet.com/image/image_73/73_Montbel_2.jpg"]},"Consult_chateau_formulaire80a8":{"id":"Consult_chateau_formulaire80a8","dept":"73","canton":"St-Alban-Leysse","commune":"St-Alban Leysse","nom":"Monterminod","type":"Maison forte","periode":"XIV","histoire":"MONTERMINOD: Ce fief qui est situé en plein vignoble avait une position défensive pour la Savoie, il apparaît  en 1320 avec comme seigneur  Nicolet Crochet de Monterminod, passa par alliance aux de Challes, Les Challes de Monterminod construisirent la maison forte qui  fut vendu en 1532  par Jean-Philibert de Challes petit-fils de Claude de Challes et évêque de Maurienne à Pierre Lambert seigneur de la Croix qui à son tour céda la maison forte la même année à son ami  Antoine Piochet, époux de Jeanne Dieulefils Magnin, à sa mort en 1545 la propriété revient à la famille Piochet qui la gardera jusqu'au XIXe siècle, Jean Piochet docteur en droit, fut propriétaire du château des Salins à Cognin, il vécut à Monterminod ou il mourut à l'âge de 90 ans. Rose-Marie Piochet épousa Jean-Eugène Nicolle de la Place, leur fils Alexandre épousa Joséphine-Julie-Thérèse de Tavernay, à la mort de la marquise elle légua ses biens en 1886 à sa cuisinière Mme Gautin Claudine, son fils Etienne vend en 1935 à Monsieur Boujon, en 1943 elle fut acquise par Monsieur Mazet Roger qui la reconstruit à l'origine et la vendit en 1955 à Mr Girard Joseph négociant en vins, toujours dans la famille.","architecture":"Cette maison forte du XIVe siècle a été construite sur l'emplacement d'un avant poste Burgone, occupant un poste stratégique et défensif communiquant avec les châteaux voisins. Elle fut   très restaurée malgré la foudre de 1896, corps de logis rectangulaire à fenêtres à meneaux accolé d'une tour et d'une tourelle à l'opposé.","habitants":"Famille de Monterminod                                                               Famille Girard\r\n        \"","divers":"Maison forte de Monterminod","gps":"","images":["../../jctruffet.com/image/image_73/73_Monterminod_1.jpg"]},"Consult_chateau_formulairef1d0":{"id":"Consult_chateau_formulairef1d0","dept":"73","canton":"Pont-de-Beauvoisin","commune":"Avréssieux","nom":"Montfleury","type":"Château","periode":"XVIII","histoire":"MONTFLEURY:   les  premiers seigneurs d'Avressieux cité au XIIe siècle construction de la tour Sarrazine  \"donjon du XIIIe siècle\".\r\nAu XIII appartenait aux Siboud de Châteauneuf, seigneur de Bouquéron. Puis passa en 1292 à la Dauphine Anne et revient ensuite à la mort des Siboud de Châteauneuf  à Béatrix de Faucigny, mère de la Dauphine Anne. En 1309, Béatrix cède Montfleury à son petits fils Hugues. Inféodé en 1392 à Amédée de Roccard. En 1461 appartient aux Bergier puis par alliance aux Brochard de Mondragon  passa par héritage aux Bochard de Mareste, le donjon possède  les armoiries des de Mareste.  En 1858  le vendirent à Alberte Boursault, épouse séparée du Baron de Rubempré, amie de Stendhal, y vécut au XIXe siècle, passa à la fille de la baronne de Rubempré veuve du comte de Luzerna. Vendu en 1893 à monsieur Giraud  sa veuve vendit en 1937 a des marchands  de biens qui le délapidèrent, puis occupé par des colonies de vacances.  \r\nEn 1972 le château fut acheté par monsieur Marc Prieur.                        Il abrite aujourd'hui le musée d'armes et d'outils.","architecture":"Tour sarrasine du XIIIe siècle donjon carré de trente mètres de haut coiffée d'un toit à tuiles vernissées à quatre pans, le château du XVIIe siècle flanquée d'une tour hexagonale et d'une échauguette, le corps de logis central pavillon en retour d'équerre  modifié au XIXe siècle d'un pavillon supplémentaire.","habitants":"Famille de Brochard de Mareste\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Montfleury_1.jpg","../../jctruffet.com/image/image_73/73_Montfleury_2.jpg"]},"Consult_chateau_formulairebb50":{"id":"Consult_chateau_formulairebb50","dept":"73","canton":"La Rochette","commune":"Villard-Sallet","nom":"Montmayeur","type":"Vestiges","periode":"XII","histoire":"MONTMAYEUR: mentionné pour la première fois en 1173. Au XIIIe siècle appartenait à la famille Briançon-Aigueblanche qui prit le nom de Montmayeur par Gaspard Ier de Montmayeur, cette seigneurie issue des nobles de Briançon, l'érigea en comté en 1449, mais en 1487 la famille s'éteint et le comté passe en héritage à la famille de Miolans .\r\n Le domaine fut saccagé en 1597 par Lesdiguière et fut déserté au profit de Villard Salet, possession de la commune.","architecture":"Construit sur les crêtes  de Mont  Raillant au XIIe siècle comprenant une enceinte qui englobe le village de Saint-Jullien sur une surface de 250 mètres de long et 50 mètres de large. Donjon de 7 mètres 60 et de 19,60 m de haut des murs de 2 m d'épaisseur, tour de l'est de 25 m de haut.","habitants":"Famille Briançon Aigeblanche\r\n        \"","divers":"Vestiges du château  de Montmayeur","gps":"","images":["../../jctruffet.com/image/image_73/73_Montmayeur_1.jpg","../../jctruffet.com/image/image_73/73_Montmayeur_2.jpg"]},"Consult_chateau_formulaireebf9":{"id":"Consult_chateau_formulaireebf9","dept":"73","canton":"Montmélian","commune":"Montmélian","nom":"Montmelian","type":"Vestiges","periode":"XI","histoire":"MONTMELIAN: La citadelle et le château appelés \"Pierre Forte\" cité en 1030, point stratégique de défense entre la Savoie et le Dauphiné, domaine de la famille de Savoie au Xe siècle, (Amédée IV y naquit et y mourut en 1273),  puis siège du bailliage de Chambéry et place forte militaire en 1470 qui l'entraîna à sa perte, elle fut modernisé dans les années 1570 pour l'adapter à l'artillerie, de nombreux sièges furent menés par les rois de France, François Ier, Henri IV, Louis XIII et XIV. Suite à cela un fort bastion  viendra s'installer autour du fort médiéval qui rendra cette forteresse la plus puissante de l'Europe, après plusieurs attaques a répétition et sur ordre de Louis XIV le fort fut détruit en 1705.","architecture":"MONTMELIAN: La citadelle et le château appelé \"pierre forte\" cité en 1030, point stratégique de défense entre la Savoie et le Dauphiné. il ne reste que quelques vestiges de cette place forte. Montmélian possède l'hôtel de ville du XVe siècle.","habitants":"Les Ducs de Savoie\r\n        \"","divers":"Vestige de la citadelle","gps":"","images":["../../jctruffet.com/image/image_73/73_Montmelian_1.jpg","../../jctruffet.com/image/image_73/73_Montmelian_2.jpg"]},"Consult_chateau_formulaire62a3":{"id":"Consult_chateau_formulaire62a3","dept":"73","canton":"Moutiers","commune":"Moutiers","nom":"Moutiers","type":"Château","periode":"XVII","histoire":"MOUTIERS: Saint-Marcel, deuxième archevêque de Tarentaise , établit le siège épiscopal à Moutiers vers le milieu du Ve siècle . \r\nIl ne reste malheureusement  aucune trace des constructions qui se succèdent du Ve au XIe siècle sur l'emplacement de l' évêché actuel. \r\nIl fut en parti reconstruit en 1610 par l'archevêque Anastase Germonio sur des fondements du XIe au XIVe siècle. L'archevêché de Tarentaise fut supprimé en 1793 après l'annexion de la Savoie à la France en 1860, vendu en 1972 à la commune ( office du tourisme musée de l'académie).","architecture":"Le palais fut en parti reconstruit en 1610 par l'archevêque Anastase Germonio sur des fondements du XIe au XIVe siècle , les tours élevées au XIVe siècle dans les angles  Sud-Est et Sud-Ouest du palais furent conservées et encore visibles aujourd'hui.","habitants":"Palais épiscopal\r\n        \"","dive
