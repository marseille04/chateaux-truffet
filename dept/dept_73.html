rs":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Moutiers_1.jpg","../../jctruffet.com/image/image_73/73_Moutiers_2.jpg","../../jctruffet.com/image/image_73/73_Moutiers_3.jpg"]},"Consult_chateau_formulaire27ca":{"id":"Consult_chateau_formulaire27ca","dept":"73","canton":"St-Pierre-d`Albigny","commune":"Cruet","nom":"Rive(la)","type":"Château","periode":"XV","histoire":"RIVE: (la Rive) Appelé aussi \"Verdon dessous\" Avant 1272 à Pierre de Verdon, possession de Louis et François et en 1578 entre les mains de Louis de Verdun, depuis le  XIIIe siècle dépendait de la seigneurie de Miolans, appelé aussi Verdun ou Verdon, ces seigneurs possédaient les deux châteaux de Verdun-Dessus et Dessous( la Rive) ensemble de deux châteaux, appartenait au XVe siècle aux Duverger, en 1607 aux Mouxy qui le vendirent en 1617 aux Ramus de Charpenne, qui possédait déjà la tour de Verdun à Chignin François de Ramus l'apporte en dot en 1659 avec ses biens d'Arbin à Anthelme de Mareste, puis en 1750 par alliance à monsieur de Mareste baron de Champrovent et au marquis de Lucey par héritage en 1923 à la famille Ducat  et passa aux  Challant, toujours propriétaire.","architecture":"Ce château en forme de U autour d'une grosse tour carrée du XIIIe siècle, ou son venu s'accoler différents bâtiments, remanié au début du XXe siècle.","habitants":"Famille Challant\r\n        \"","divers":"Château de la Rive","gps":"","images":["../../jctruffet.com/image/image_73/73_Rive_la_1.jpg","../../jctruffet.com/image/image_73/73_Rive_la_2.jpg","../../jctruffet.com/image/image_73/73_Rive_la_3.jpg"]},"Consult_chateau_formulairee16a-3":{"id":"Consult_chateau_formulairee16a-3","dept":"73","canton":"St-Genix-sur-Guiers","commune":"Rochefort","nom":"Rochefort(73)","type":"Manoir","periode":"XVI","histoire":"ROCHEFORT: ce manoir  fut le lieu de  capture de  Mandrin en 1755. Construit au XVe siècle fut la propriété de Jacques de Gilly, acheté en 1665 par Nicolas Deschamps, puis  par alliance aux Piolenc de Thoury qui le vende en 1770 à François Picolet avocat au Sénat de Savoie.","architecture":"Subsiste le bâtiment d'entrée entre deux tours carrées du XVe siècle, le château fut saccagé lors du supplice de Mandrin.","habitants":"Seigneur de Rochefort\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Rochefort_1.jpg","../../jctruffet.com/image/image_73/73_Rochefort_2.jpg"]},"Consult_chateau_formulaire7dac":{"id":"Consult_chateau_formulaire7dac","dept":"73","canton":"Chambéry","commune":"La Rochette","nom":"Rochette(73)","type":"Château","periode":"XVII","histoire":"ROCHETTE:   sur l'emplacement d'un ancien château qui appartenait aux seigneurs de la Rochette, qui fut cédé au comté de Savoie en 1295 en 1343 les Montmayeur puis les la Chambre. En 1597 le maréchal de Lesdiguières détruit le château.  \r\nHenriette de La Chambre épouse en 1655  Jacques d'Allinges marquis de Coudrée, leurs descendants construisent le château actuel qui fut vendu comme bien national et acquit par Claude Picollet, puis en 1842 par la famille Rey qui le cède au département en 1937. Aujourd'hui est un établissement scolaire.","architecture":"Château moderne du XVIIe siècle quadrangulaire tour carrée en angle et échauguettes.","habitants":"Famille de Jacques d'Allinges\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Rochette_1.jpg","../../jctruffet.com/image/image_73/73_Rochette_2.jpg"]},"Consult_chateau_formulairedb67-2":{"id":"Consult_chateau_formulairedb67-2","dept":"73","canton":"Chamoux-sur-Gelon","commune":"Coise-St-Jean-Pied-Gauthier","nom":"Rubaud","type":"Château","periode":"XIV","histoire":"RUBAUD: construit par les Rubaud d'Avallon, puis passa par achat au XIVe siècle à la famille de Cuynes, en 1614 Annibal de Cuynes le transmet à ses cousins et passa aux de la Chambre.      Le château fut brûlé par le maréchal de Lesdiguières en 1597, racheté par Clermont Mont-Saint-Jean cousin des de la Chambre et Jeanne de Clermont par alliance fit passer le fief a Jean Antoine de Menthon au comte d'Avernioz. Leur fils Claude Gaspard comte d'Avernioz, baron de Lornay vit ses biens confisqués à la Révolution. Son beau-frère le comte de Menthon racheta le château et le rendit a son propriétaire à son retour d'émigration. Le comte d'Avernioz baron de Lornay châtelain actuel est l'un des descendants de Claude Gaspard d'Avernioz.                                 Dans la commune; la tour verte, la tour de Lepigny,la Maison forte de Souzier, l'enceinte féodal de la MF de Rubaud,le château Feuillet, le château de la Tour du Puits et le château de Montfort.","architecture":"Ce château construit vers l'an mille incendié en 1597 fut réédifié en 1840 en forme de U en englobant les tours du XIV et XVe siècle.","habitants":"Seigneur de la Chambre                                                         Famille de Menthon\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Rubaud_1.jpg"]},"Consult_chateau_formulairea467":{"id":"Consult_chateau_formulairea467","dept":"73","canton":"Grésy-sur-Aix","commune":"Brison St-Innocent","nom":"Rupelle","type":"Château","periode":"XIII","histoire":"RUPELLE:  Château de Brison sur la commune de Brison Saint-Innocent fut construit  au XIVe siècle par les Orlyé de Saint-Innocent, il fut racheté par Humbert de Seyssel d'Aix et de retour  aux Orlyé qui le firent érigé en baronnie en 1662, puis en marquisat et cette famille conserva le domaine jusqu'à la Révolution, vendu comme bien national à Joseph Comte, passa ensuite à  Mr Moreau chirurgien major, son neveu Léonard Felix Gigot qui était déjà propriétaire de Bourdeau, le vend en 1837 au Baron de Silans qui le restaure, toujours dans cette famille à travers le comte de Rupelle qui c'est dernier possédaient  le château de Rupelle aux milieu des vignobles qui est la propriété de la Famille du Bouchet de la Rupelle.","architecture":"le château de Brison-Rupelle se compose de plusieurs bâtiments dont un corps de logis \"maison d'habitation\" et un corps de ferme  ainsi qu'un ancien donjon carré appelé tour du XIIIe siècle  avec baies géminées, corps de logis remanié en moderne au XVIIIe siècle, mur d'enceinte.","habitants":"Famille du comte de la Rupelle\r\n        \"","divers":"Château de Brison et de Rupelle.","gps":"","images":["../../jctruffet.com/image/image_73/73_Rupelle_1.jpg","../../jctruffet.com/image/image_73/73_Rupelle_2.jpg","../../jctruffet.com/image/image_73/73_Rupelle_3.jpg"]},"Consult_chateau_formulaire59b4":{"id":"Consult_chateau_formulaire59b4","dept":"73","canton":"St-Alban","commune":"St-Jean-d`Arvey","nom":"Salins","type":"Maison forte","periode":"XIV","histoire":"SALINS: Cité en 1300 époque à laquelle  elle appartient à Nanthelme d'Arvey qui la vend à Hugues  du Châtelard en 1330 à son neveu Thomasset qui en hérite et épouse Jacqueline de la Balme, sa fille Blanche épouse François Jordan, leur fille par alliance  en 1421 apporte ce domaine aux de Salins dont il prend le nom. Ce domaine fut revendu en 1515 à James Duingt de Val d'Isère, Louise Duingt hérite épouse le maréchal Pierre Contrefort de la Forest  puis revendu à sa mort en 1543 à Antoine  de Piochet seigneur de Monterminod, un de ses fils Jean Louis remanie le château,  épouse Claudine d'Arlod en 1624 et passera par alliance en 1749 par Alexandre Piochet qui deviendra comte de Salins la dernière  des de Piochet Rose  née en 1807 épouse  Jean-Eugène Nicole de la Place, leur fils sans postérité. Le château est légué  en 1886 à une amie mademoiselle Perrier de la Bâtie qui décède en 1937, le château est vendu au fermier Marius-Eugène Grangeant et à Jeanne-Lucienne André appartient en 1944 à leur fille Nicole-Berthe-Claudine Grangeant, le château est vendu  en 1969 à Claude-Gabriel Debas et à Joseph-Marie Fraud ainsi qu'à Jean-Emile Longo et à Odette-Marie Friard  ces derniers  en sont toujours propriétaire.","architecture":"Ce château possède un donjon carré du XIIIe siècle d'où s'émerge un corps de logis.","habitants":"La famille de Piochet\r\n        \"","divers":"Château de Salins","gps":"","images":["../../jctruffet.com/image/image_73/73_Salins_1.jpg","../../jctruffet.com/image/image_73/73_Salins_2.jpg","../../jctruffet.com/image/image_73/73_Salins_3.jpg"]},"Consult_chateau_formulaire3e26":{"id":"Consult_chateau_formulaire3e26","dept":"73","canton":"Bourget-du-Lac","commune":"Bourget-du-Lac","nom":"Serraz (73)","type":"Château","periode":"XIV","histoire":"SERRAZ: Au XIVe siècle  fief de l'évêque de Maurienne Aymon d'Urtières, ce dernier y  reçu le comte de Savoie qui inféoda le château à son profit et devient seigneur de Serraz, il céda le château  en 1363 à Aymar de Seyssel qui deviendra baronnie, puis érigée en 1654 en marquisat aux Seyssel; Joseph-Henri-Octave de Seyssel vendit le fief et le château à Jean-Baptiste Salteur, marquis de Samoens, le fils de celui-ci César Philibert obtient de porter le titre de marquis de Serraz ,le château toujours dans la descendance.","architecture":"De ce château situé sur une colline dominant le lac du Bourget a été remanié  au fils des ans, de style féodal à conservé un donjon  en façade centrale qui avait été décapité à la Révolution.","habitants":"Marquis de la Serraz Aymon d'Urtières\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Serraz_1.jpg","../../jctruffet.com/image/image_73/73_Serraz_2.jpg"]},"Consult_chateau_formulaire4b8b":{"id":"Consult_chateau_formulaire4b8b","dept":"73","canton":"Ruffieux","commune":"Serrieres-en-Chautagne","nom":"Serrieres_chautage","type":"Château","periode":"XVI","histoire":"DENYS: Ce château acquis  au XVIIe siècle quand il appartenait à la famille notariale les Denys.                                                     FORTIS appelé aussi Rossignol du XVIIe siècle par la famille de Fortis, Antoine  Fort greffier de justice de Châteaufort, procureur du Sénat Pierre de la Forest, seigneur de la Barre en 1536 restera dans cette famille jusqu'en 1730, puis plus d'héritier mâle la fille Charlotte de la Forest de Somont épousa François de Mareschal de Luciane. La seigneurie érigé en comté en faveur du fils Jacques de Mareschal de Somont en furent dépossédé à  la Révolution.  Le château fut acheté par Jeanne-Héléne  de Longecombe  veuve  de François César de Vignod et sa fille Marie-Barbe-Claudine- Joséphine de Vignaud épouse le comte Joseph-Hector de Mareschal de Somont ramenant les biens à cette famille leur fille Eugénie épouse le comte Charles Pullini leur fille Marie en 1879 vend le château au comte Lodoik de la Forest Divonne qui mourut quelques temps après, le château fut de nouveau vendu.","architecture":"Ce château du XVIe siècle fit l'objet, à la fin du XIXe siècle d'une restauration assez malheureuse, notamment sur ses deux tours.","habitants":"Les seigneurs de Somont\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Somont_1.jpg"]},"Consult_chateau_formulaire5e17":{"id":"Consult_chateau_formulaire5e17","dept":"73","canton":"St-Alban-Leysse","commune":"Sonnaz","nom":"Sonnaz","type":"Château","periode":"XIII","histoire":"SONNAZ: le premier château  fut construit au XIe siècle, fief des Chabod, puis  les Gerbais de Sonnaz et fut la propriété des Châtillon de Michaille en 1284,  Aleysia de Châtillon épouse Amblart de Gerbier  en 1368 qui prirent le nom de Gerbier de Sonnaz qui construisit le château et resta sept cent ans dans la même famille.","architecture":"Le premier château de Sonnaz qui fut construit au XIe siècle a été remplacé au XVe siècle par un château très remanié au XIXe siècle, possède une tourelle médiévale grosse tour carrée sur façade Est, vaste corps de logis flanqué d'une aile avec galeries à l'italienne sur trois niveaux en façade Sud du grand logis et trois tours rondes rapportées en 1860.","habitants":"Famille Gerbie de Sonnaz\r\n        \"","divers":"","gps":"" e la visitation dépendait de la seigneurie de Miolans, le château actuel construit au XVIIe siècle, vendu par les de Saluces baron de Miolans à François Rey baron du Noyer, puis fut légué en 1690 à Albert Eugène Favier du Noyer les descendants le conservèrent jusqu'au XXe siècle. Acquis ensuite par les Visitandines en 1957 qui le transformèrent en monastère des Saintes Plaies. Dans ce château Hortense Mancini, nièce de Mazarin duchesse de la Meilleraye y séjourna.","architecture":"Les Allues:Bâtisse rectangulaire au toit à quatre pans. \r\nChâteau-prieuré Saint-Philippe du XIVe sicle dont les tours furent arasées à la Révolution corps de logis en L  flanqué de minces  tourelles rondes.                                                                         Minjoud: Construit au XVIIe siècle de  style maison de plaisance toiture à la mansarde, corps de logis rectangulaire à trois étages.","habitants":"Les ALLUES:Famille de Lescheraine                                                Château prieuré St-PHILIPPE Mr Courtois          MINJOUD:Famille de Saluces \r\n        \"","divers":"Château des Allues \r\nCHâteau Saint-Philippe \r\nChâteau de Minjoud","gps":"","images":["../../jctruffet.com/image/image_73/73_St_Pierre_Albigny_1.jpg","../../jctruffet.com/image/image_73/73_St_Pierre_Albigny_2.jpg","../../jctruffet.com/image/image_73/73_St_Pierre_Albigny_3.jpg","../../jctruffet.com/image/image_73/73_St_Pierre_Albigny_4.jpg","../../jctruffet.com/image/image_73/73_St_Pierre_Albigny_5.jpg"]},"Consult_chateau_formulaire4918-2":{"id":"Consult_chateau_formulaire4918-2","dept":"73","canton":"Grésy-sur-Isére","commune":"Ste-Helene-sur-Isere","nom":"Ste_Helene","type":"Château","periode":"XIII","histoire":"SAINT-HELENE: fut construite au XIIIe siècle par Pierre d'Aigueblanche évêque d'Hereford et conseiller du roi Henri III d'Angleterre, puis passa sous la suzeraineté des comtes de Savoie en 1252 au frère d'Amédée IV Boniface  archevêque de Cantorbery.  Passa à la famille de Varax s Louis Buttet le racheta en 1849 en ruines et le vendit à la commune.","architecture":"Construit en 1248, enceinte quadrangulaire encadrant un corps de logis protégé par deux tours carrées du XIe siècle, le château conserve une architecture militaire, détruit en 1456 par un incendie n'a pas été reconstruit, vendu en 1841 servira de carrière de pierres et fut acquit en 1849 par la commune.","habitants":"Comte de Savoie\r\n        \"","divers":"Vestiges du château de thomas II au Bourget du Lac","gps":"","images":["../../jctruffet.com/image/image_73/73_Thomas_II_1.jpg","../../jctruffet.com/image/image_73/73_Thomas_II_2.jpg","../../jctruffet.com/image/image_73/73_Thomas_II_3.jpg","../../jctruffet.com/image/image_73/73_Thomas_II_4.jpg","../../jctruffet.com/image/image_73/73_Thomas_II_5.jpg"]},"Consult_chateau_formulairea7b6":{"id":"Consult_chateau_formulairea7b6","dept":"73","canton":"Aiguebelle","commune":"Coise-St-Jean-Pied-Gauthier","nom":"Tour_du_Puits","type":"Manoir","periode":"XV","histoire":"TOUR du PUITS  Manoir du Moyen-Age des  chevaliers du Puits. Du XVe siècle à 1793 appartenait à la famille des Sonziers passa ensuite à la famille de la Tour de Lepigny. Transformé depuis peu en hôtel restaurant.                                                                                              Dans la commune de Coise Saint-Jean-Pied-Gauthier; la tour Verte, la tour Lépigny, la maison forte de Sauzier, la maison forte de Montfort  et le château Feuillet.","architecture":"Manoir a trois étages  qui a  conservé la tourelle  du Moyen-Age à toit poivrière.","habitants":"Famille des Sonziers\r\n        \"","divers":"Château tour du Puits                    M.F Blanc                              Château de Monnet                        Tour Chabot","gps":"","images":["../../jctruffet.com/image/image_73/73_Tour_du_Puits_1.jpg","../../jctruffet.com/image/image_73/73_Tour_du_Puits_2.jpg","../../jctruffet.com/image/image_73/73_Tour_du_Puits_3.jpg","../../jctruffet.com/image/image_73/73_Tour_du_Puits_4.jpg"]},"Consult_chateau_formulaire8644":{"id":"Consult_chateau_formulaire8644","dept":"73","canton":"Grésy-sur-Isére","commune":"Tournon","nom":"Tournon(73)","type":"Château","periode":"XI","histoire":"TOURNON:: au XIe siècle les Ducs de Savoie en sont propriétaires et en font le chef lieu de la châtellenie qui  comprend plusieurs paroisses. Dans cette famille jusqu'en 1568, il est racheté par Pierre Maillard qui prend le titre de comte de Tournon et chevalier de l'ordre de L'Annonciade et à la fin du XVIIe siècle il appartient aux des Sallier de la Tour qui le garderont jusqu'à la Révolution, vendu comme bien national à Louis Mennier, Louis Nicomas et Jean Rieux. Passe ensuite à la famille Guigouf-Sontag puis à Charles Emmanuel Perret, puis vendu par son fils au baron Jean-Marie Angleys, toujours dans cette famille.","architecture":"Le donjon du XIIe siècle se dresse sur le Sud-  Est de la motte. La tour de Serraval du XIVe siècle, de plan carré à quatre niveaux domine le bâtiment principal ajouté au XVIIe siècle.","habitants":"Aux comtes de Savoie\r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_73/73_Tournon_1.jpg"]},"Consult_chateau_formulaire5330":{"id":"Consult_chateau_formulaire5330","dept":"73","canton":"Ugine","commune":"Ugine","nom":"Ugine","type":"Maison forte","periode":"XV","histoire":"CRESTCHEREL:  Ugine appartenait au XIIIe siècle à Boniface, comte de Savoie et archevêque de Cantorbery, qui à fait construire le château de Crest-Cherel, frère du comte Amédée IV de Savoie passa aux comtés de Savoie, puis au XVe sous le comté des Génevois, fief des seigneurs  Hollade de Crestcherel, puis au Jehan d'Urbain, passa en 1680 au Marquis de Lescheraine et le château fut vendu en 1740 à la famille Geny. \r\nVu son état la commune le récupère en 1980 et le restaure pour un musée.","architecture":"De cette bâtisse construite au XIIIe-XVe siècle possède un corps de logis rectangulaire tours arasées en faça let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','73 — Savoie'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
