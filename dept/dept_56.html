comte de Cramezel de Kerhoué, il passe par alliance au vicomte Charles de Couëssin. Il appartient maintenant à sa descendance, les familles Kowalski et Pellegrin.                                                                                                                            \r\nTROMEUR du XV-XVIes siècle et XVIIIe siècle), propriété de Jean de Sérent. La seigneurie avait autrefois un droit de haute, moyenne et basse justice. Puis le manoir est la propriété des familles Delhoaye (Symon Delhoaye en 1427), Hingant (en 1436), d'Avaugour (Julien d'Avaugour en 1536), Francheville (en 1630), Collobel du Bot-Langon (en 1664), Brébian (à la Révolution), Kergoët, Gazeau des Boucheries, La Vallée et Givry. Il est remanié en 1740 par J.F de Collobel et de l'édifice primitif, ne subsistent qu'un portail et une tour qui abrite un escalier. Le corps de logis date du XVIIIe siècle. On y trouve un puits et un colombier.                                                                                                            VILLE-QUELO, manoir. Siège d'une ancienne seigneurie ayant un droit de haute justice et appartenant à la famille de Sérent en 1770. On mentionne Guillaume de Lanvaux et Hervé Vaillant en 1427, et le sieur de Brignac en 1536. Il possédait autrefois une chapelle privée.","habitants":"Houletière; Famille de Le Couteulx du Molay.                        Rohéan ; Famille Callac                                                                                    Villegros . Famille Le Blaye                                                  La Salle ; Famille de Sérent                                                   Tromeur ; Famille d'Avaugour                                                        Villequello; Famille de Sérent\r\n        \r\n        \"","divers":"à Sérent gps 47° 49' 26\" nord, 2° 30' 16\" ouest; Houletière, la  Salle grav-1-2, Rohéan, Tromeur  grav 3-4-5 ,villegros grav-5   et ville-Quello.                                                           Tromeur gps 47° 51' 15\" N, 2° 30' 13\" Ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_S%c3%a9rent_1.jpg","../../jctruffet.com/image/image_56/56_S%c3%a9rent_2.jpg","../../jctruffet.com/image/image_56/56_S%c3%a9rent_3.jpg","../../jctruffet.com/image/image_56/56_S%c3%a9rent_4.jpg","../../jctruffet.com/image/image_56/56_S%c3%a9rent_5.jpg"]},"Consult_chateau_formulaire7e5f":{"id":"Consult_chateau_formulaire7e5f","dept":"56","canton":"Ploërmel","commune":"Cruguel","nom":"Timbrieux","type":"Château","periode":"XV","histoire":"TIMBRIEUX, mention comme manoir dès le XVe siècle; château construit vers 1735 pour les du Bot (porte la date); moulin élevé au XVIIe siècle; parties agricoles du XIXe siècle dites métairies sur le plan cadastral de 1832. L'édifice se compose d'un étage carré, le gros-oeuvre en granite et moellon, élévations à travées surmontées de toit à longs pans et toit conique recouverts d'ardoise. En 1778, terres et château sont acquis par monsieur Lesouan. Ils sont depuis demeurés dans cette famille, qui se les sont transmis par mariages successifs: Kernezne, Keranflech, Pradier, le Gauais et Maillet (actuellement). Éléments protégés MH : les façades du bâtiment principal et la chapelle : inscription par arrêté du 3 novembre 1925.","architecture":"TIMBRIEUX, l'ancien château des Timbrieux. Cette seigneurie qui appartenait à la famille L'Estimbrieux avait un droit de moyenne et basse justice. Les Timbrieux, dépendant de Guéhenno, berceau d'une famille du même nom, qui portait : d'argent à trois quintefeuilles de sable ; ce manoir, avec moyenne et basse justice, passa plus tard aux Rosmadec, aux La Chesnaye, et aux du Bot, qui le restaurèrent en 1735. C'est la famille du Bot qui fit rebâtir le château et la chapelle en 1735. En 1778, l'ensemble est vendu à la famille Lescouan, puis est transmis par alliance aux familles Kernezne, Keranflech, Pradier, Le Gallais et Maillet.","habitants":"Monsieur Lesouan\r\n        \"","divers":"château de Timbrieux à Cruguel gps  47° 52' 46\" nord, 2° 35' 39\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Timbrieux_1.jpg","../../jctruffet.com/image/image_56/56_Timbrieux_2.jpg","../../jctruffet.com/image/image_56/56_Timbrieux_3.jpg"]},"Consult_chateau_formulaire5ef4":{"id":"Consult_chateau_formulaire5ef4","dept":"56","canton":"Questembert","commune":"La Vraie Croix","nom":"Toulhouët","type":"Château","periode":"XVII","histoire":"TOULHOUET, le château de Toulhouët, dit aussi parfois de Toulgoët, a été construit vers 1610, modifié en 1667, puis restauré et agrandi au début du XXe siècle. La seigneurie appartenait aux Larré, puis aux Talhouët jusqu'en 1871. Par alliance la terre et le château passent alors aux Couëssin. Le château de Toulhouët est acheté en 1899 par M. Louis Simonnot qui le restaure et l'agrandit entre 1904 et 1909, notamment par la construction d'un pavillon rectangulaire, et d'écuries en forme de manoir néo-breton. Depuis 1977, la propriété appartient à M. Paul Augustin.","architecture":"TOULHOUET, édifice du XVIIe siècle, le château de Toulhouët est acheté en 1899 par Louis Simonnot qui le restaure et l'agrandit entre 1904 et 1909, notamment par la construction d'un grand pavillon rectangulaire, et d'écuries en forme de manoir néo-breton.","habitants":"Famille de Toulhouët\r\n        \r\n        \"","divers":"Château de Toulhouët à la Vraie Croix gps 47° 41' 26\" nord, 2° 32' 30\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Toulhou%c3%abt_1.jpg","../../jctruffet.com/image/image_56/56_Toulhou%c3%abt_2.jpg","../../jctruffet.com/image/image_56/56_Toulhou%c3%abt_3.jpg"]},"Consult_chateau_formulaire8601":{"id":"Consult_chateau_formulaire8601","dept":"56","canton":"Questembert","commune":"Berric","nom":"Tremohar","type":"Château","periode":"XIII-XIV-XIX","histoire":"TREMOHAR,   Trémohar est une ancienne seigneurie de la famille de Berric. Jeanne de Berric, par son mariage avec Jean de Quifistre, fait entrer le domaine dans la famille de Quifistre.  Un premier château bâti aux XIIIe et XIVe siècles était propriété de cette famille. Les Quifistre de Bavalan émigrent lors de la Révolution et le château est vendu comme bien national. A son retour, leur fils François-Joseph-Guy de Quifistre (1763-) rachète le bien de son père. Sa femme Rosa-Maria le Gouvello du Timat (1804-1879) est la dernière marquise de Bavalan. Leur fille Marie-Louise Joséphine de Quifistre de Bavalan (1836-1886), mariée à son oncle Joseph-François le Gouvello du Timat (1811-1881) transmet la propriété à la famille Gouvello. Trémohar reste aux mains des Gouvello pendant près d'un siècle. Vers 1950, le propriétaire Le Gouvello vend Trémohar à la famille Frances, qui y installe un camping et un centre équestre. En 1984, la famille Frances vend Trémohar à leur ami Louis Blériot, petit-fils de laviateur. La famille Breesé acquiert enfin la propriété en 2020.","architecture":"TREMOHAR, durant les guerres de la Ligue, en 1593, le château est pillé et brûlé par les Espagnols. Il a été reconstruit en 1750 et n'a subi que peu de modifications depuis. Les boiseries et quincailleries intérieures sont d'époque. Dans la cour d'honneur, un puits avec une margelle moulurée du XVIe siècle est surmonté d'une colonne en bois qui doit remonter au XIXe siècle, et les bâtiments de la porterie et des communs datent du XVIe siècle. Éléments protégés MH : les façades et les toitures du château, de la porterie, du bâtiment des communs et de la tour isolée ; le pigeonnier et le puits se trouvant dans la cour d'honneur : inscription par arrêté du 1er août 1960.","habitants":"Famille de Berric\r\n        \"","divers":"A Berric; Tremohar Gps  47° 38' 02\" nord, 2° 33' 58\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Tremohar_1.jpg","../../jctruffet.com/image/image_56/56_Tremohar_2.jpg","../../jctruffet.com/image/image_56/56_Tremohar_3.jpg","../../jctruffet.com/image/image_56/56_Tremohar_4.jpg","../../jctruffet.com/image/image_56/56_Tremohar_5.jpg"]},"Consult_chateau_formulaired683-2":{"id":"Consult_chateau_formulaired683-2","dept":"56","canton":"Gourin","commune":"Gourin","nom":"Tronjoly","type":"Château","periode":"XVIII","histoire":"TRONJOLY, les premiers seigneurs de Tronjoly  furent les Kergoët La seigneurie appartint aux Kergoët de 1426 à 1669.  Ils y possédaient alors un manoir. Les L'Olivier leur succèdent jusqu'à la fin du XVIIIe siècle, et les derniers les de Boissieu. La municipalité fait l'acquisition du domaine en 1984.  Le château conserve de beaux lambris et de beaux meubles du XVIIIe siècle. Sa façade Ouest comporte une niche pour une cloche, avec cette devise: mon timbre sonne exact à notre devoir. Le domaine est magnifique : étang, ancien moulin à eau, colombier, nombreux communs, très beau parc, propriété de la commune, abrite en été diverses expositions.","architecture":"TRONJOLY, belle construction du XVIIIe siècle, sise près d'un étang aux abords de Gourin. Un manoir, dont on pouvait encore voir les ruines au XIXe siècle, a précédé cette vaste demeure à la façade bien régulière, avec un fronton cintré et un beau balcon de ferronnerie galbé, qui porte sur le mur Ouest la date de 1768. Dans les anciens communs, situés au Nord-Ouest, on remarque un toit percé d'un oculus et des écuries avec des stalles de bois. La chapelle privée de Tronjoly a disparu après la Révolution, est aujourd'hui un espace dexpositions. De nombreuses manifestations telles que la fête de la crêpe ou le championnat de Bretagne de musique traditionnelle, s'y déroulent ponctuellement.   Château reconstruit en 1768, puis agrandi et fortement remanié au XIXe siècle : construction de l'aile  et rehaussement de la toiture et adjonction de lucarnes à fronton circulaire, construction de la façade nord; chapelle détruite. Edifice de plan irrégulier, en L, accolé à une aile de communs à l'ouest. Le corps de logis principal, de plan rectangulaire, comporte cinq travées régulières ; il est augmenté par une aile perpendiculaire formant saillie à l'est. Elévation en moellon de schiste avec soubassement, encadrements de baies, travée centrale, chaînages et corniches en pierre de taille de granit.","habitants":"Famille de Kergoët\r\n        \"","divers":"Château de Tronjoly à Gourin                 Gps ' 28\" nord, 3° 36' 21\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Tronjoly_1.jpg","../../jctruffet.com/image/image_56/56_Tronjoly_2.jpg","../../jctruffet.com/image/image_56/56_Tronjoly_3.jpg","../../jctruffet.com/image/image_56/56_Tronjoly_4.jpg","../../jctruffet.com/image/image_56/56_Tronjoly_5.jpg","../../jctruffet.com/image/image_56/56_Tronjoly_6.jpg"]},"Consult_chateau_formulaire8519":{"id":"Consult_chateau_formulaire8519","dept":"56","canton":"Gourin","commune":"Gourin Tronjoly","nom":"Tronjoly_II","type":"Château","periode":"XV-XVIII","histoire":"Plusieurs châteaux à Tronjoly; Kerbiquet, Kerambris, Menguionnet, Gwl-Kaer, Launay,et les manoirs.                                                                      KERBIQUET, ou Kerbiquet ou Kerbiged (1564-1580), est édifié par la famille Guegan à qui appartient la seigneurie (de 1445 à 1663). Puis propriété successive des familles du Fresnay, seigneurs du Faouët, et Euzenou de Kersalaün (en 1754).\r\nKERAMBRIS ou Kerbris du XVIe siècle), propriété successive des familles Le Trancher (en 1426 et en 1530, Kervenozaël de Guiscriff (de 1636 à 1773), Dresnay, Le Gorju (en 1795).\r\nMENGUIONNET, le manoir de Menguionnet  du XVe??XVIe siècles, La seigneurie avait jadis sa chapelle privée dédiée à saint Yves. Propriété successive des familles Kergoët (dès 1300), Le Moyne de Trévigny (en 1542), Michau, sieurs de Ruberzo (en 1695).\r\nGWEL-KAER  (belle vue, en breton). La première construction date de 1880. Le manoir est agrandi et aménagé dans sa forme actuelle en 1907. Ce manoir laissé à l'abandon pendant une décennie est racheté en 2015 par un particulier et reprend peu à peu ses notes de noblesse. Cette élégante bâtisse à la particularité de se trouver à quelques pas du centre-ville. Il se distingue également par une magnifique verrière de style Victorienne complètement restaurée en 2016 à l'identique de son origine de 1890 environ. Les Gourinois sont attachés à ce bâtiment qu'ils surnomment 'notre petit château  l'ancien manoir de Conveau du XVIe siècle. En 1426, Conveau (ou Convoye) dépendait de l'abbaye de Langonnet. Un manoir en ruines datant du XVIe siècle existait là en 1684.","architecture":"CRONDAL ou Cromear 'ancien manoir de  du XVe siècle. Propriété successive des familles Maitret (en 1426), Le Gentil, dame de Kerorchant (en 1542). L'édifice actuel est daté de 1735 .\r\nDROLONNE, propriété successive des sires du Faouët (de 1447 à 1644), puis des familles Bannier et Le Sech (en 1695), Gallic de Kergonan (en 1774).\r\nKERANGON, ancien manoir de seigneurie était à la famille Kergus (en 1426), puis à la famille Kergoët (en 1542) et Kerstang. Le manoir appartient à la famille Hamon des Roches, seigneurs du Diarnelez en Le Faouët (de 1778 à 1781).\r\n KERBLEZEC ou Kervleizec ancien manoir du XVIe siècle. La seigneurie appartient successivement aux familles Corre (en 1447), Kerblézec (en 1540), Coëdic (en 1637 et en 1743) .\r\n KERSTANG ancien manoir  du  XVe siècle, ruiné dès 1848. Propriété successive des familles Kergoët, Kergus (en 1500). Il avait haute, moyenne et basse justice et les seigneurs possédaient des prééminences dans l'église.\r\nLANVOELAN ou Langoelan ou Lanvolez ancien manoir  du XVe siècle. Propriété de la famille Le Trancher (en 1426 et en 1452), puis de la famille Hémery (au XVIe siècle).\r\n LAUNAY ou « le Guern » ancien château du XVIIIe siècle. Propriété successive des familles Guern-Herpin (en 1426 et en 1447), Allano (en 1500), Le Téoff (en 1662), Famille de Mascle (en 1774 et en 1795)Puis la famille de Launay avec l'alliance de Françoise Pauline de Mascle mariée avec Pierre Gabriel de Launay, dont Sophie mariée avec Louis Marie du Boüays de Couësbouc. Il possédait jadis un colombier.","habitants":"Seigneurs locaux\r\n        \"","divers":"à Tronjoly; Kerbiquet grav-1-2-3, Kerambris, Menguionnet grav 4, .   Gps ' 28\" nord, 3° 36' 21\"ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Tronjoly_II_1.jpg","../../jctruffet.com/image/image_56/56_Tronjoly_II_2.jpg","../../jctruffet.com/image/image_56/56_Tronjoly_II_3.jpg","../../jctruffet.com/image/image_56/56_Tronjoly_II_4.jpg"]},"Consult_chateau_formulaire5df2-2":{"id":"Consult_chateau_formulaire5df2-2","dept":"56","canton":"Guidel","commune":"Guidel","nom":"Trovern","type":"Manoir","periode":"XVI-XVII","histoire":"TROVERN, du manoir initial de Trovern ne subsiste que la tour d'escalier postérieure, probablement du XVIe siècle. Un château du XVIIe siècle est reconstruit sur l'emplacement du manoir : le plan cadastral de 1818 fait apparaître un corps de bâtiment orienté au sud avec deux ailes de retour et les deux dépendances isolées encore conservées l'une étant le corps de logis de la ferme : elles ont été remaniées au XIXe siècle. La tour d'escalier conservée au XVIIe siècle était prolongée par un appentis vers l'ouest, très remanié au XXe siècle. Seule la partie Est de la façade à travées avec lucarnes à fronton témoigne de cette seconde phase de construction. En 1901, un logis dit château est construit, pour la famille de Saint Pierre, sur l'emplacement de la partie ouest du logis, ce dernier est doublé d'un appentis à l'est et une grange en retour d'équerre est construite. Une chapelle et de grands communs au nord accompagnent ces nouvelles constructions. Le château, enduit, est couvert d'un toit à longs pans et pignon découvert.","architecture":"TROVERN La tour d'escalier postérieure qui abrite l'escalier à vis en pierre et bois est couvert d'un toit à croupe. La façade nord du manoir présente pour partie une élévation à travées correspondant au dédoublement du logis au début du XXe siècle, couvert en appentis. Le logis dit château est couvert d'un toit à croupe brisée, il présente une élévation ordonnancée de type ternaire. Un escalier à retours avec jour, en charpente, est rejeté latéralement dans le logis. Les dépendances anciennes, dont, à l'est, le corps de logis de ferme, sont en moellon de granite, à l'exception d'une partie de l'élévation est de la dépendance ouest, en pierre de taille.. A comble à surcroît, elles sont couvertes d'un toit à longs pans à croupes au nord, à pignon découvert au sud. La chapelle est couverte d'un toit à longs pans et pignon couvert tandis que les communs sont couverts d'un toit à longs pans et croupe.","habitants":"famille de Saint Pierre\r\n        \"","divers":"Château de Trovern à Guidel gps 47° 47' 29\" nord, 3° 29' 14\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Trovern_1.jpg","../../jctruffet.com/image/image_56/56_Trovern_2.jpg"]},"Consult_chateau_formulaire2d90":{"id":"Consult_chateau_formulaire2d90","dept":"56","canton":"Questembert","commune":"Trédion","nom":"Trédion","type":"Château","periode":"XV-XVII-XX","histoire":"Deux châteaux à Trédion celui de Trédion et Beauchêne                               BEAUCHENE, la seigneurie appartint à la famille du même nom, puis aux d'Espinay. La demeure, bâtie en 1610, possède de belles lucarnes à frontons triangulaires et une tourelle arrière. Au milieu du XXe siècle, le château était la propriété du baron Henry de Charette. Le propriétaire actuel, M. Durande, a effectué des travaux considérables de remise en état.","architecture":"TREDION,  en 1350 existence d'un manoir primitif, ancien rendez-vous de chasse devenu manoir, La seigneurie était aux seigneurs de Largoët ou d'Elven, en 1471, Jean IV de Rieux bâtit un premier château, au XVIe siècle passe  à la famille de Coligny,aux Lorraine-Elbeuf en 1605, aux Fouquet en 1683,  en 1709 passe aux Lentivy, l'édifice fut vendu plusieurs fois au cours du XVIIIe siècle avant d'être acquis par le comte Hippolyte du Fresne de Virel en 1834. Celui-ci fit transformer l'édifice entre 1854 et 1859 par l'architecte rennais Jacques Mellet. Une seconde campagne de travaux a donné lieu à la construction du pavillon sud-ouest par l'architecte parisien Ch. Lorotte et date de 1884. La plupart des bâtiments datent du XIXe siècle et englobent le manoir du XVe siècle, le domaine est vendu en 1977 par les héritiers de Virel à M. Guy Turpin, promoteur Immobilier à Vannes. Des travaux de rénovation sont entrepris dans le château et dans le parc et se poursuivent aujourd'hui. Le château s'ouvre ainsi au public, une nouvelle ère commence.","habitants":"Famille de Beauchêne                                                                  Trédion ;  Famille de Coligny\r\n        \r\n        \"","divers":"à Trédion celui de Trédion de3 à 7 et Beauchêne grav-1-2                                 gps  47° 47' 36\" nord, 2° 35' 32\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Tr%c3%a9dion_1.jpg","../../jctruffet.com/image/image_56/56_Tr%c3%a9dion_2.jpg","../../jctruffet.com/image/image_56/56_Tr%c3%a9dion_3.jpg","../../jctruffet.com/image/image_56/56_Tr%c3%a9dion_4.jpg","../../jctruffet.com/image/image_56/56_Tr%c3%a9dion_5.jpg","../../jctruffet.com/image/image_56/56_Tr%c3%a9dion_6.jpg","../../jctruffet.com/image/image_56/56_Tr%c3%a9dion_7.jpg"]},"Consult_chateau_formulaire6545":{"id":"Consult_chateau_formulaire6545","dept":"56","canton":"Ploërmel","commune":"Guégon","nom":"Trégranteur","type":"Château","periode":"XVIII","histoire":"TREGRANTEUR, la terre de Trégranteur est propriété depuis 1204 de la famille Trégarantec. Elle passe, par alliance, aux familles Quelen du Broutay en 1544 Pierre époux de Jeanne de Trégranteur, qui appartenait à une vieille famille de Bretagne Jean de Quélen premier seigneur du Broutay avait été  avec Etienne Goyon de Matignon, chargé par la noblesse bretonne de ramener en 1379 le duc jean IV réfugié en Angleterre. Puis Bonin de Courroy en 1571.  Dès 1660 Quélen avait vendu Trégranteur à M Boninde Ville Bouquais conseillé au parlement de Rennes. Le château actuel est construit en 1750 par l'architecte Hippolyte de Brilhac pour René-Jean Bonin, conseiller au parlement de Bretagne. Le parc semble être aménagé à la même époque, la grille en ferronnerie du portail, aux armes des Bonin et Saint-Pern, étant l'uvre d'Eustache Roussin dans les années 1750. Passa par alliance en 1808 aux Poulpiquet du Halgouët et à nos jours au vicomte de Halgouët.","architecture":"TREGRANTEUR, le château se présente sous la forme d'un corps central entouré de deux ailes flanquées chacune d'un pavillon en avant-corps. L'architecte l'a construit suivant le style Louis XIV, qui est moins d'actualité à l'époque de sa construction. Le château est bâti sur 3 niveaux, présentant de grandes fenêtres en arc surbaissé. L'accès principal au bâtiment se fait par un perron à double révolution. Le rez-de-chaussée est décoré selon le style Louis XV de l'époque.   La grille d'entrée est classée au titre des M.H. par arrêté du 19 mars 1943, tandis que le château et le parc sont inscrits par arrêté du 11 avril 1947. Il est réaménagé après la Révolution française, au XIXe siècle, par la famille du Halgouët qui entreprend notamment de combler les douves et démolir plusieurs dépendances, dont un colombier.","habitants":"Famille de  René-Jean Bonin\r\n        \"","divers":"A Guegon le château de Trégranteur    gps 47° 56' 19\" nord, 2° 33' 48\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Tr%c3%a9granteur_1.jpg","../../jctruffet.com/image/image_56/56_Tr%c3%a9granteur_2.jpg","../../jctruffet.com/image/image_56/56_Tr%c3%a9granteur_3.jpg"]},"Consult_chateau_formulairedebf":{"id":"Consult_chateau_formulairedebf","dept":"56","canton":"Quiberon","commune":"Quiberon","nom":"Turpault","type":"Château","periode":"XIX-XX","histoire":"TURPAULT,  dit de Berg-er-lan.  En 1910, un industriel en filature, M. Georges Turpault, de Cholet, rachète l'ancienne batterie de Beg er Lan, la fait démolir et construit à sa place un étrange manoir anglo-médiéval sur ce roc battu par les flots de l'Atlantique. La demeure, occupée par les Allemands de 1940 à 1945, est en piteux état à la Libération de la ville. Mme Turpault cède le château en 1946 à monsieur Marcel Robert, ancien maire de Quiberon. Sa veuve le revendra en 1967 à M. Ferdinand Richard. Remis en état, le bâtiment a servi de décor pour la réalisation du film Martin soldat, interprété par Robert Hirsch. Le site est magnifique et le château Turpault (nom sous lequel il est connu localement) est visible de partout, sur le rocher de Beg-er-Lan.","architecture":"TURPAULT Emblème de la ville de Quiberon, ce château, ou manoir, était nommé par les Quiberonnais et son premier propriétaire, château de la mer. Demeure, fantastique, construite dans un style moyenâgeux-anglo-saxon, de 1904 à 1910. Cette propriété privée, se laisse admirer, en extérieur, à la pointe de Beg er Lann, ou pointe de la Lande, ou le bout de la terre, qui marque lentrée de la Côte Sauvage. Un château qui trouble limaginaire avec ses élégantes flèches de pierre et ses tourelles, et qui défit la mer comme une figure de proue. Occupé, durant la seconde guerre mondiale, par larmée allemande, il fut dégradé par la construction de deux blockhaus. Son actuel propriétaire a entrepris de nombreux travaux de restauration, ainsi que les trois précédents, pour quil conserve toute sa majesté fantasmagorique. \r\nD'importants travaux de restauration sont effectués par la famille Richard. Mis en vente en 2010, le château trouve acquéreur en 2014.","habitants":"Famille de Georges Turpault\r\n        \"","divers":"A Quiberon le château de Turpault  gps 47° 28' 25\" nord, 3° 07' 49\" ouest1","gps":"","images":["../../jctruffet.com/image/image_56/56_Turpault_1.jpg","../../jctruffet.com/image/image_56/56_Turpault_2.jpg","../../jctruffet.com/image/image_56/56_Turpault_3.jpg","../../jctruffet.com/image/image_56/56_Turpault_4.jpg","../../jctruffet.com/image/image_56/56_Turpault_5.jpg"]},"Consult_chateau_formulaire9ddd":{"id":"Consult_chateau_formulaire9ddd","dept":"56","canton":"Vannes","commune":"Vannes","nom":"Vannes","type":"Château","periode":"XVII-XIX-XX","histoire":"Trois châteaux à Vannes; Arcal, Bernus et Gaillard                                  ARCAL, Siège d'une seigneurie appartenant au XVIe siècle à la famille de Callac. Demeure construite dans la seconde moitié du XIXe siècle, en remplacement d'un bâtiment disparu . La vente en 1851 à M. Le Beaupin ne semble pas pouvoir être le prétexte de la construction, qui intervient plutôt dans les années 1870. Un corps en prolongement à l'ouest, qui comporte la cuisine initialement située au sous-sol, est bâti en 1925. Un belvédère portant l'inscription Arcal est détruit en 1980 lors de l'élargissement de la route de Séné. Puits de la fin du XIXe siècle, avec balustrade plus récente. Édifice enduit à plan double en profondeur, à élévation ordonnancée à trois travées surmontée d'un toit en terrasse. Au sud, le niveau de soubassement correspond à un rez de chaussée, du fait du décalage du terrain, surmonté de deux étages carrés. Distribution classique avec couloir axial distribuant quatre pièces et un escalier dans oeuvre, en charpente, tournant à retours avec jour. Communs en moellon de granite à comble à surcroît. Puits en moellon.                                                                                                    BERNUS, date du XVIIe siècle, mais a été très remanié. Son colombier subsiste mais de l'autre côté de la route. La seigneurie et le manoir sont cités dès le XIVe siècle, exactement en 1333, à l'occasion de leur donation par Guillaume, seigneur du Ker, à son frère Henri. La propriété appartient ensuite à la famille Malestroit de 1390 à 1578, à Robert de Gaincru de 1595 à 1598, aux Aubin de 1614 à 1666, à Claude Mesmin de Sillé de 1676 à 1685, à Guillaume Bedeau en 1686, aux Chartreux d'Auray de 1694 à 1790. Vendu nationalement en 1793 au sieur Guyot, Bernus passe par la suite aux Le Guével. Le château se trouve au Sud-Ouest de la ville de Vannes, du côté extérieur du boulevard Ouest et du boulevard de la Résistance.","architecture":"GAILLARD,  le mémorial breton de la Lande de Justice de Crach date des VIIIe, IXe et Xe siècles. L'ancien hôtel est du début du XVe siècle et appartenait à Jean de Malestroit, évêque de Nantes et chancelier du duc de Bretagne. En1456, le château fut vendu au duc de Bretagne qui y installa le Parlement qui resta en fonction jusqu'à l'annexion de la Bretagne à la France en 1532. En 1554, il est vendu par le roi. L'édifice se compose de deux corps de bâtiments et conserve peintures et boiseries Renaissance, et un plafond à caissons. Les baies sont à meneaux, côté cour, une tour polygonale en pierre de taille renferme un escalier à vis. Le musée abrite une des plus belles collections préhistoriques de l'Europe occidentale, des collections d'objets du Moyen Age, une section lapidaire, et une bibliothèque. Éléments protégés MH : l'ancien hôtel : classement par arrêté du 3 janvier 1913. Le mémorial breton de la Lande de Justice de Crach, dit Pierre de Justice, transféré au musée lapidaire de la société Polymathique du Morbihan, cours du Château-Gaillard: inscription par arrêté du 25 janvier.","habitants":"Seigneurs locaux                                                                             Arcal ; Famille de Callac                                                           Bernus ;  famille Malestroit\r\n        \"","divers":"à Vannes;                                                gps47° 39' 21\" nord, 2° 45' 37\" ouest Arcal Grav-1, Bernus et Gaillard grav-2-3","gps":"","images":["../../jctruffet.com/image/image_56/56_Vannes_1.jpg","../../jctruffet.com/image/image_56/56_Vannes_2.jpg","../../jctruffet.com/image/image_56/56_Vannes_3.jpg","../../jctruffet.com/image/image_56/56_Vannes_4.jpg","../../jctruffet.com/image/image_56/56_Vannes_5.jpg","../../jctruffet.com/image/image_56/56_Vannes_6.jpg","../../jctruffet.com/image/image_56/56_Vannes_7.jpg","../../jctruffet.com/image/image_56/56_Vannes_8.jpg","../../jctruffet.com/image/image_56/56_Vannes_9.jpg"]},"Consult_chateau_formulaire5526":{"id":"Consult_chateau_formulaire5526","dept":"56","canton":"Vannes","commune":"Vannes-III","nom":"Vannes-III","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux dans cet article sur Vannes ; Meudon,  Pargo et Bot-Spermen au sud de Vannes  et Kérango aux nord.                                                                        MEUDON    L'ancien manoir du lieu est signalé en 1426 comme étant la propriété de Olivier de Boisgezel. En 1665 il appartient à M. Guy Millon et, en 1678, à Françoise Pélagie Millon, sa fille, épouse de Pierre de Guervazy. Il reste aux Guervazy jusqu'au milieu du XVIIIe siècle. Le domaine passe alors, vers 1764, à Julien de Lantivy, époux de Charlotte de Guervazy. Edmond, vicomte de Lantivy du Rest, leur fils, fait édifier le château actuel en 1847 et le vieux manoir disparaît. Edmond de Lantivy meurt sans enfant, la propriété revient à la famille de La Bourdonnaye Blossac. Une nièce l'apporte un peu plus tard au comte Harscouët de Saint-Georges. En 1899, celui-ci revend le  château et les  terres à Jean de Lantivy de Trédion, avocat. De 1940 à 1944 le château est occupé par les Allemands. Son propriétaire actuel est le comte de Lantivy. De style Renaissance, l'élégant et imposant bâtiment surplombe une prairie entourée d'arbres.                                                  KERANGO  a Plescop au nord de Vannes, propriété de la famille Desvaux en 1448, puis résidence secondaire des évêques de Vannes : logis XVIIe siècle, d'après un aveu de 1683. Le manoir est restauré vers 1720, avant d'être vendu comme bien national durant la Révolution. Logis détruit depuis la révolution. Au XVIIIe siècle le manoir est la propriété de la famille Brulon, du XIV-XVe siècle.  Pavillon nord datant du XIXe siècle, chapelle, colombier détruits.\r\nle manoir de Saint-Lucas du XVe siècle, propriété de Thomas de Saint-Durcar (en 1448), de Jehan de Noyal, seigneur de Kersapé en Theix (en 1513), puis du petit-fils d'Amaury de San Ducas (Saint Lucas) en 1536. On y trouvait jadis une chapelle privative ; A Plescop le château de Kerango et le manoir de St-Lucas.","architecture":"BOT-SPERNEN, à Séné au sud de Vannes, construit en 1850 pour le comte de Castellan, vendu vers 1916 à M. de L'Ecochère, puis vers 1922 à M. Bruneau, et ensuite au Dr Bérard, le château passe à l'évêché de Vannes peu avant la guerre de 1939. Mgr Le Bellec installe les Ermites de Marie, avant de le céder à M. Oberthur, imprimeur à Rennes. M. Hirgair propriétaire le revend aux Augustines de la Miséricorde de Jésus en 1957. Le château appartient actuellement à M. L'Haridon. L'édifice de deux étages est orienté vers le port de Montsarrac, possède au premier étage un balcon avec garde-fous ornementé. De style classique, sa façade symétrique est composée d'un corps central avec combles à la Mansart et lucarnes surmontées de frontons bombés, jouxté de deux ailes carrées aux toits d'ardoise en pavillon. Les encadrements des ouvertures sont en pierres taillées, sauf au rez-de-chaussée ou ils sont moulurés. Trois souches de cheminée émergent du pan nord-ouest de la toiture donnant sur l'anse de Mancel, avec son parc, c'est l'une des plus belles demeures de Séné.                                                                                                               PARGO, la seigneurie du Pargo appartient à la famille du Téno de 1426 à 1581, aux Thomas de 1586 à 1591, aux Kerboutier (par alliance de 1601 à 1654), aux Gibon (par les femmes de 1654 à 1790). En l'an II, il est vendu nationalernent, les propriétaires successifs sont Louis Monneron, Paul Célayeur, Dominique Vernon, Corentin Vallet en 1807, le général Guy Louis de Valmy en 1810, qui le revend au précédent propriétaire en 1814, puis Anne Chavigné et Béard du Désert en 1842. Monique Bouillé reçoit la terre en dot et l'amène à son mari, Armand Taslé, et à ses successeurs. Il est depuis dans cette famille. L'ancien manoir du XVe-XVIe siècle existe toujours, en bordure de l'étang du Pargo, le château a été construit au XVIIe siècle, avec sa chapelle domestique, par un Gibon. Le domaine est un havre de quiétude en pleine ville de Vannes.","habitants":"Meudon; Famille de La Bourdonnaye Blossac                           Kerango :  Famille Brulon                                                               Bot-Spernen ; comte de Castellan                                                Pargo ; Famille de Louis Monneron,\r\n        \"","divers":"sur Vannes 47° 39' 21\" nord, 2° 45' 37\" ouest ;                                       Meudon grav-6 et Pargo grav-7, Bot-Spermen grav-1-8  au sud deVannes   ;A Plescop le château de Kerango grav-2-3-4-5 et le manoir de St-Lucas                                                             Gps 47° 42' 09\" nord, 2° 50' 55\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Vannes_III_1.jpg","../../jctruffet.com/image/image_56/56_Vannes_III_2.jpg","../../jctruffet.com/image/image_56/56_Vannes_III_3.jpg","../../jctruffet.com/image/image_56/56_Vannes_III_4.jpg","../../jctruffet.com/image/image_56/56_Vannes_III_5.jpg","../../jctruffet.com/image/image_56/56_Vannes_III_6.jpg","../../jctruffet.com/image/image_56/56_Vannes_III_7.jpg","../../jctruffet.com/image/image_56/56_Vannes_III_8.jpg"]},"Consult_chateau_formulaire859c":{"id":"Consult_chateau_formulaire859c","dept":"56","canton":"Vannes","commune":"Vannes","nom":"Vannes_Châteaux","type":"Remparts-Tours","periode":"XVI","histoire":"VANNES,  à la fin des années 1580, Vannes sest ralliée à la cause du duc de Mercoeur, gouverneur de la province et chef du parti de La Ligue. Lors de son séjour dans la cité, au printemps 1592, il fait appel à ses architectes pour améliorer les fortifications, cest dans ce contexte que sont réalisés au sud de lenceinte, trois bastions assurant un tir croisé face au quartier du port. Celui de Gréguennic est achevé en 1593, date portée en deux endroits sous un bandeau extérieur. Bastion creux, il remplace lancienne barbacane située devant la porte médiévale condamnée. Des pièces dartillerie portatives assurent en bas un tir de flanquement, et sur le chemin de ronde, des canons à poste viennent conforter la défense passive. Un soin particulier est apporté à laménagement de cinq casemates dans lépaisseur du mur. Installées en batterie le long dun étroit couloir, chacune delles est percée dune embrasure de tir, celle du centre en possède deux, et dun trou dévent pour les fumées.Éléments protégés MH : porte-prison et tour y attenant : classement par arrêté du 2 mai 1912. Remparts (éperon de la Garenne): inscription par arrêté du 10 décembre 1925. Tour Trompette et partie des remparts : inscription par arrêté du 23 mai 1927. Tour du Connétable et parties de remparts attenantes :","architecture":"VANNES, classement par arrêté du 28 mai 1927. Tour dite Tour des Filles et portion des anciens remparts lui faisant suite vers l'Est : classement par arrêté du 29 juillet 1927. Anciens remparts ; porte Calmont: classement par arrêté du 29 juillet 1927. Partie des remparts, dont la Tour Joliette : classement par arrêté du 16 mai 1928. Porte Poterne ; terrasse et portion des remparts : classement par arrêté du 28 juillet 1928. Terrains compris entre les remparts, la rue Porte-Poterne et le ruisseau de la Garenne : classement par arrêté du 28 juillet 1928. Porte Saint-Vincent : classement par arrêté du 11 octobre 1928. Soubassement de la tour gauche qui flanque la Porte-prison : classement par arrêté du 24 mars 1936. Partie de la Porte-prison acquise par la ville : classement par arrêté du 30 novembre 1936. Partie des remparts : classement par arrêté du 15 janvier 1942. Partie des remparts allant de la Porte-prison à la Porte Saint-Jean : classement par arrêté du 26 novembre 1956. Porte Saint-Jean, rue Brizeux : classement par arrêté du 26 novembre 1956. Tour Poudrière et parties attenantes des remparts: classement par arrêté du 26 novembre 1956. Partie des remparts allant du bastion Notre-Dame à la rue Saint-Salomon : classement par arrêté du 26 novembre 1956. Murailles auxquelles est accolé le bastion dit Notre-Dame, rue Emile-Burgault : inscription par arrêté du 27 novembre 1956. Bastion dit Eperon de la Haute-Folie ; bastion dit de Gréguenic et sa porte ; courtine reliant ces deux bastions : inscription par arrêté du 7 mars 1958. Tour dite Saint-François, partie des remparts y attenant et partie des murs dits sarrazins : inscription par arrêté du 7 mars 1958.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Patrimoine à Vannes                                 gps 47° 39' 21\" nord, 2° 45' 37\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Vannes_Ch%c3%a2teaux_1.jpg","../../jctruffet.com/image/image_56/56_Vannes_Ch%c3%a2teaux_2.jpg","../../jctruffet.com/image/image_56/56_Vannes_Ch%c3%a2teaux_3.jpg","../../jctruffet.com/image/image_56/56_Vannes_Ch%c3%a2teaux_4.jpg"]},"Consult_chateau_formulairec93c":{"id":"Consult_chateau_formulairec93c","dept":"56","canton":"Vannes","commune":"Vannes","nom":"Vannes_II","type":"Château","periode":"XIV-XV-XVI-XIX","histoire":"Quatre châteaux à Vannes; Hermine; Ménimur, Limoges et Liziec                                                                                      HERMINE, également appelé Hôtel Lagorce, est situé dans le centre ville historique de Vannes. Construit entre 1380 et 1385 par Jean IV de Bretagne, le château fut la résidence principale des ducs de Bretagne au cours du Moyen-Age. Il fut détruit en partie au cours du règne de Louis XIII, puis offert à la fin du XVIIe siècle à la ville par Louis XIV. Le château fut entièrement reconstruit en 1785. Le bâtiment fut occupé par une école d'artillerie, les bureaux de la Trésorerie Générale ou encore par une école de droit. Le château de l'Hermine abrite désormais l'Institut culturel de Bretagne. Il est possible de se promener librement dans ses jardins fleuris qui vont de la Garenne jusqu'à l'étang au Duc. Le duc Jean V y naquit, le château hébergea les ducs François 1er, Pierre II, François II qui s'y maria en 1455. En 1491, mariage d'Anne de Bretagne avec le roi Charles VIII. Il servit également de résidence aux capitaines et gouverneurs de Vannes. Le roi François 1er y descendit en 1518 et 1522.                                                                                                             MENIMUR   En 1502, la seigneurie appartenait à la famille Jégat. Jacques de La Touche la vendit à Vincent Cillart en 1587. Par mariage elle passa vers 1600 aux Le Gouvello, puis aux du Fresne vers 1640. enfin aux Lescouët au milieu du XVIIe siècle. En 1791, le château est vendu nationalement, le domaine de Ménimur (ou Menemur) est acquis par la famille de Forges, qui le cède en 1832 à Pierre Eugène du Portal. En 1918, il est acquis par madame Garcia, veuve du baron Marrier de La Gâtinaie sur François de La Rochefoucaud-Bayern. En 1922, madame Garcia cède le château à la société Immobilière de Ménimur (Surs Ursulines). Édifié au XVIIe siècle, Ménimur a été peu modifié à l'abandon, démolition envisagée.","architecture":"LIMOGES,  au début du XVe siècle, la seigneurie appartient à la famille Jehenno. En 1448, elle passe par mariage aux du Collédo. Gilles du Bahuno possède le château de 1570 à 1590, puis en 1599 il est à Jean de Kerguézec, un peu plus tard à N. Phélippot. La fille de celui-ci, Julienne, l'apporte à François Peschart, qui le transmet par alliance, vers 1659, à Charles de Maillé. François de Trévégat, conseiller au Parlement, en hérite. M. Blévin de Penhouët le reçoit en legs en 1737. En 1786, le propriétaire est Pierre-Louis Charpentier de Lenvos. Le domaine passe ensuite aux Le Mintier de Léhelec vers 1830. Transmis par alliance en 1944 aux Aymar de La Chevalerie.  Le château, bâti au XVIIe siècle, sur la butte de Calmont, est à un étage surmonté de lucarnes. Au Sud un pavillon carré de trois étages est coiffé d'une toiture galbée percée d'une fenêtre cintrée. Au Nord se trouve une aile en retour assez courte.                                                                                                   LIZIEC  La seigneurie est signalée dès 1536 (aux Theys ou Thieis). Elle passe en 1591 aux Coudé, en 1690 aux du Fossé, vers 1780 aux Nouvel et aux Pérenno. Racheté au XIXe siècle par Fabre de Maupeou d'Ableiges, baron d'Empire, le château est demeuré depuis à sa descendance. Initialement, le château n'était qu'un bâtiment servant de rendez-vous de chasse. C'est la partie centrale actuelle, à lucarnes, avec un fronton cintré entouré de deux frontons triangulaires, qui date du XVIIe siècle  est flanquée à l'arrière d'une tourelle hexagonale. Ce bâtiment fut agrandi deux fois, par deux corps de logis à un étage et lucarnes situés de part et d'autre. La partie sud ouest date du XVIIIe siècle. La partie Est est du XIXe siècle, après 1864. La façade Sud a été refaite au XIXe siècle et dotée d'une terrasse.","habitants":"Limoges; Famille Jehenno                                                                                Menimur; Famille Jégat                                                                    Liziec; Famille de Theys\r\n        \"","divers":"a Vannes  Hermine grav 1-2-3-4-; Ménimur grav-8, Limoges grav-5-6 et Liziec grav-7                                        Gps 47° 39' 21\" nord, 2° 45' 37\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Vannes_II_1.jpg","../../jctruffet.com/image/image_56/56_Vannes_II_2.jpg","../../jctruffet.com/image/image_56/56_Vannes_II_3.jpg","../../jctruffet.com/image/image_56/56_Vannes_II_4.jpg"]},"Consult_chateau_formulaired1bb-2":{"id":"Consult_chateau_formulaired1bb-2","dept":"56","canton":"Ploërmel","commune":"Lantillac","nom":"Villegué","type":"Château","periode":"XV-","histoire":"VILLEGUE, la seigneurie de la Ville-Gué était, en 1427, à Airnon de Lauret. Celui-ci, quoique de très ancienne noblesse, exerçait, paraît-il, la profession de barbier au bourg de Lantillac. Par la suite la propriété passa aux Beaumanoir et enfin aux du Lys. Le château était alors, dit-on, une place forte. Le Mené indique que c'est du temps où la famille du Lys était propriétaire que les neuf tours du château furent démolies. Tout cela a actuellement disparu. Le modeste édifice actuel daterait du début du XVllle siècle et possède trois ou quatre niches à pigeons en façade.","architecture":"THALOUET, manoir ou château du 1754, propriété de la famille Cléguennec en 1550. En 1762, le manoir devient la propriété de la famille La Landelle jusqu'à la Révolution. Confisqué comme bien national, il est vendu en 1792 à la famille Le Febvrier. Louis de Cléguennec (époux de Mathurine du Cambout) parraine en 1753 la cloche de l'église paroissiale et fait reconstruire le château en 1754. La chapelle du château est détruite au XIXème siècle .\r\nVILLE-GAUTHIER, manoir du 1568), propriété successive des familles Samson, Keiron ou Keron, et La Goublaye .\r\nlBOIS DERVAL chateau du XVIIIe siècle, propriété de la famille Gosselin. Une chapelle privée y a été édifiée en 1884 .\r\nlVILLE-GUE, château. Siège d'une seigneurie qui appartenait en 1427 à la famille Aimon de Lauret, puis successivement aux familles Beaumanoir et du Lys. Ancienne place forte, le château primitif aurait possédé, dit-on, près de 9 tours. L'édifice actuel date du XVIIIe siècle l'ancien manoir de la Ville-Louet. Siège d'une seigneurie qui appartenait en 1427 à la famille Sérent, puis successivement aux familles Limonier de la Marche, Talhoet, Cintré et Tanouarn. Le manoir possédait autrefois une chapelle privée dans laquelle le seigneur du lieu avait fondé une chapellenie vers 1750 .","habitants":"Villegué; Famille du Lys\r\n        \"","divers":"A  Lentillac                                                   gps  47° 57' 27\" nord, 2° 39' 02\" ouest;  le château de Villegué","gps":"","images":["../../jctruffet.com/image/image_56/56_Villegu%c3%a9_1.jpg","../../jctruffet.com/image/image_56/56_Villegu%c3%a9_2.jpg"]},"Consult_chateau_formulaire9a24":{"id":"Consult_chateau_formulaire9a24","dept":"56","canton":"Pontivy","commune":"Baud","nom":"Villeneuve_Baud","type":"Château","periode":"XV-XVI","histoire":"A VILLENEUVE, l'origine du château de la Villeneuve remonte au XVe siècle avec la famille Guido. De cette époque il ne reste aucun vestiges. Le château est reconstruit au XVIIIe siècle, peut-être sous la famille La Coudrais, puis est démonté en 1930 pour être rebâti en retrait de la route. Il était situé perpendiculairement à la rue, en saillie sur l'alignement. Ce bâtiment n'était cependant pas concerné par les projets d'alignement figurant sur le plan de Detaille de Keroyand : le projet prévoyait de couper les façades de la rive ouest de la rue. Un corps de bâtiment à élévation ordonnancée en rez-de-chaussée surélevé était accessible par un escalier extérieur droit central. Deux pavillons latéraux en avancée encadraient ce corps central. Le puits situé au sud de l'actuel château date de 1723. En 1907, et pour quelques années seulement.                                                                                                           KERMORVANT du XVe siècle, propriété de la famille Le Brun (au XVe et XVIe siècles), puis de la famille Rimaison (XVIIe siècle), Langle, Lamandour, Jouan de Kervenoaël (vers 1825). En 1826, ce château devient la propriété de Guillaume Olivier Poignant, maire de Baud de 1836 à 1847. A la fin du XIXe siècle.                                                                                                         QUINIPILY,  la seigneurie de Quinipily appartenait autrefois à la famille Hilary (en 1360), Languès-Orcez ou Langoueouez (à partir de 1425). Cette dernière famille fit bâtir un château qui passa ensuite successivement entre les mains des familles Olivier d'Arradon (en 1550), Pierre de Lannion (en 1620), La Rochefoucault-Liancourt (en 1762) et Giraldon (en 1795) qui utilisa les pierres du château (alors en ruine) pour son entreprise de travaux publics. Les vestiges sont rachetés par la famille Kergoustin de Plumelin (maître-maçon) qui rase alors totalement le château. Le corps de logis (ancienne ferme), qui a subsisté, est restauré par le vicomte Christian de La Tullaye. Le château est surtout célèbre pour la statue , dite \"Vénus de Quinipily\" .","architecture":"KERMORVANT, à la fin du XIXe siècle  le château est en mauvais état : l'édifice est alors démoli et les douves comblées. En 1923, on pouvait encore voir quelques vestiges du pont-levis. Seuls subsistent le portail, la cave et une tourelle. Une chapelle privée existait autrefois à droite du porche. On y trouve encore un four à pain.                                                                                                             BAUD   VILLENEUVE, le château présente un plan double en profondeur et deux élévations. A la fin du XIXe siècle, le château est en mauvais état : l'édifice est alors démoli et les douves comblées. En 1923, on pouvait encore voir quelques vestiges du pont-levis. Seuls subsistent le portail, la cave et une tourelle. Une chapelle privée existait autrefois à droite du porche. On y trouve encore un four à pain. La cloche est celle de la chapelle de la frairie de Kermorvant, dédiée à la Vierge et incluse dans l'enceinte du château, ordonnancés à cinq travées : au nord les deux travées latérales sont en avancée et couvertes d'un toit en pavillon ; au sud, l'avancée est en rez-de-chaussée sur la terrasse. Sur chaque façade, des escaliers extérieurs droits desservent le rez-de-chaussée surélevé. Un escalier dans-oeuvre tournant à retours, situé dans la partie Est du bâtiment, dessert l'étage carré et l'étage de comble. Le jardin d'agrément au nord est doublé d'un jardin potager au sud aménagé dans l'axe du château, prolongé par un verger. Un mur de soutènement avec escalier et un puits marquent la limite entre ces deux derniers. Une ferme dépendant du château se trouve à l'est.                                                                                                                               \r\nL'ancien manoir de Keraudreno. La seigneurie de Keraudreno, Kerodrono ou Kerandrono appartenait autrefois à Jean de Lantivy dès 1390. On y voit un puits daté de 1766.","habitants":"Kermorvan: Famille Le Brun                                             Quilipily;  Familles Olivier d'Arradon                                                     Villeneuve;     Famille Guido\r\n        \"","divers":"Baud  47° 52' 35\" nord, 3° 01' 04\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Villeneuve_Baud_1.jpg","../../jctruffet.com/image/image_56/56_Villeneuve_Baud_2.jpg","../../jctruffet.com/image/image_56/56_Villeneuve_Baud_3.jpg"]},"Consult_chateau_formulairefb09":{"id":"Consult_chateau_formulairefb09","dept":"56","canton":"Guidel","commune":"Quistinic","nom":"Villeneuve_Jacquelot","type":"Château","periode":"XV","histoire":"VILLENEUVE-JACQUELOT,  La première preuve écrite, datée de 1411, fait état de la seigneurie de la Villeneuve dont la juridiction s'étendait sur 27 paroisses, avec haute, moyenne et basse justice. Dans les années 1950, la demeure appartenait à M. Magon de La Vieux-Ville. C'est actuellement la propriété de M. Michel de Martrin. En 1987, la Villeneuve Jacquelot servit de décor à Philippe de Broca pour son film Chouans.\r\nQUISTINIC ancien château, berceau de la famille Quistinic. La seigneurie a appartenu ensuite à la famille La Chesnaye. Le château a aujourd'hui entièrement disparu.","architecture":"VILLENEUVE-JACQUELOT, ce château possède des éléments des XVe, XVIe et XVIIe siècles. Sa principale rareté est l'escalier voûté sur croisées d'ogives en granit. Cet escalier se développe autour d'un noyau carré plein de deux mètres de côté. Volées droites encloisonnées, séparées par des paliers carrés entre les étages et un grand escalier rectangulaire aux deux étages. La mouluration des arcs et les sculptures des culots sont, par leur finesse, assez rares en Bretagne. Le manoir présente un plan rectangulaire avec une tour demi circulaire en saillie à droite de la façade sur cour, et une grosse tour carrée dans oeuvre sur la façade postérieure.  Fenêtres à meneaux, porte en accolade. Éléments protégés MH : les façades et les toitures ; l'escalier d'honneur : classement par arrêté du 28 septembre 1970.","habitants":"Villeneuve Famille de  M. Magon de La Vieux-Ville                              Qiuistinic  Famille de  Qiuistinic        \r\n        \"","divers":"A Quistinic, le château de Villeneuve-Jacquelot","gps":"","images":["../../jctruffet.com/image/image_56/56_Villeneuve_Jacquelot_1.jpg","../../jctruffet.com/image/image_56/56_Villeneuve_Jacquelot_2.jpg","../../jctruffet.com/image/image_56/56_Villeneuve_Jacquelot_3.jpg","../../jctruffet.com/image/image_56/56_Villeneuve_Jacquelot_4.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','56 — Morbihan'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
