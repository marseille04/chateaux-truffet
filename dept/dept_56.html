ncadrements de baies, les bandeaux horizontaux, la corniche, l'avant corps central et les lucarnes à gâbles. Des communs à l'est, une chapelle et l'ancien colombier au sud.                                                                                       KERLEGUEN manoir de 1427, remanié aux XVIe et XVIIe siècles. Il s'agit d'un édifice en équerre avec une tour d'angle. Jusqu'à la Révolution, il est le siège d'une cure dont les titulaires sont recteurs de Grand-Champ. Une porte d'entrée est surmontée d'une accolade dont une branche repose sur une console armoriée. On y trouve aussi deux fortes gargouilles et deux lucarnes à meneaux (XVe siècle) très dépouillées. La cheminée de la grande salle du rez-de-chaussée est sculptée d'armoiries et porte la date de 1476 .","habitants":"Penhouet;  M. Karl Lagerfeld                                                      Kermenguy; famille de Bréafort                                                    Du Reste;  famille Chohan                                                            Kerleguen\r\n        \"","divers":"Grand Champ, gps   47° 45' 33\" nord, 2° 50' 36\" ouest                          du Reste grav-1-2,  de Penhoët grav-3-4, manoir de Kermenguy-5, de Kerleguen grav-6-7.","gps":"","images":["../../jctruffet.com/image/image_56/56_Grand_Champ_1.jpg","../../jctruffet.com/image/image_56/56_Grand_Champ_2.jpg","../../jctruffet.com/image/image_56/56_Grand_Champ_3.jpg","../../jctruffet.com/image/image_56/56_Grand_Champ_4.jpg","../../jctruffet.com/image/image_56/56_Grand_Champ_5.jpg","../../jctruffet.com/image/image_56/56_Grand_Champ_6.jpg","../../jctruffet.com/image/image_56/56_Grand_Champ_7.jpg"]},"Consult_chateau_formulaire127d":{"id":"Consult_chateau_formulaire127d","dept":"56","canton":"Moréac","commune":"Guehenno","nom":"Grand_Lemay","type":"Manoir","periode":"XVI","histoire":"GRAND-LEMAY, inachevé, le manoir est construit dans les années 1570, par la famille Lesmais pour servir de pavillon de chasse. Habitation du seigneur de Le May, ayant droit de moyenne et basse justice, il relevait du comté de Porhoët. Il appartient successivement aux familles Lesmais, Duplessix, Keravéon, Cambout, Montaigu et Coutance. En ruine au XXe siècle, il est utilisé comme débarras par la ferme voisine. Son rachat par le Sivom du canton de Saint-Jean-Brévelay et sa protection au titre des M.H. en 1993 ont permis le sauvetage de cet édifice. Sa propriété passe ensuite aux communautés de communes dont relève Guéhenno : Saint-Jean Communauté et Centre Morbihan. Malgré une rénovation totale en 2002, des désordres structurels apparaissent cinq ans plus tard. Devant les frais à engager pour remettre en état le bâtiment, les élus intercommunaux décident de le mettre en vente en 2017, mettant fin à un projet de centre d'interprétation du patrimoine. Le manoir et le colombier sont classés au titre des M.H. par arrêté du 4 juin 1993. L'emprise au sol et la longère au sud sont inscrits au titre des M.H.  par arrêté du 4 juin 1993.","architecture":"GRAND-LEMAY, classé aux M.H., de style \"renaissance\", il présente de magnifiques sculptures sur les lucarnes, les linteaux et les cheminées.\r\nLe manoir de Lemay présente en outre un superbe colombier de plus de 850 nichoirs (appelés boulins), un puits et un four à pain.  Dans le verger du manoir, sont exposées les oeuvres réalisées dans le cadre du symposium international de sculpture monumentale sur granit breton en 1996. Le corps de logis est de style Renaissance. Bâti sur trois étages, comprend un bâtiment en équerre, une tourelle d'escalier et une aile.  La   façade renaissance s'ouvre par des baies encadrées par des pilastres, décorés de chapiteaux d'ordre ionique. Au-dessus de la porte on aperçoit les armoiries de la famille.  La façade du logis est plus simple puisque la décoration se concentre sur la lucarne qui présente des éléments de style gothique et renaissance.","habitants":"Famille Lesmais\r\n        \"","divers":"Château du  Grand-Lemay à Guehenno Gps 47° 53' 34\" nord, 2° 38' 18\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Grand_Lemay_1.jpg","../../jctruffet.com/image/image_56/56_Grand_Lemay_2.jpg","../../jctruffet.com/image/image_56/56_Grand_Lemay_3.jpg","../../jctruffet.com/image/image_56/56_Grand_Lemay_4.jpg"]},"Consult_chateau_formulaire0cf3":{"id":"Consult_chateau_formulaire0cf3","dept":"56","canton":"Grand-Champ","commune":"Plumelin","nom":"Guenanec","type":"Château","periode":"XVII","histoire":"Château de Guenanec, de Clinchap à Plumelin avec rempart.   A deux kilomètres à l'est  à Plumelin                                                                                                               GUENANEC, la seigneurie appartenait aux Divernaye en 1609 et aux Langle en 1712. Le château aurait été édifié pour sa partie Ouest sous Louis XIII (1620-1625), pour sa partie Sud sous Louis XIV (1680-1685) et pour sa partie Nord sous Louis XVIII (1820-1823), et la tour au début de la IIIe République vers 1880. En 1988, M. Georges Perceval a vendu le domaine à la S.C.I. Kaéno. Le 14 juillet 1990, M. Bruno Rouchy a ouvert un restaurant à l'enseigne du Coq en pâte dans le château. Édifice visible extérieurement.","architecture":"CLINCHAP, l'ancien manoir  du XVIIIe siècle. La seigneurie a appartenu autrefois à la famille Langle. On y trouve un puits.                                                                                     GUENANEC Le château aurait été en partie construit sous Louis XIII et Louis XIV (parties ouest et sud) puis entre 1820 et 1823 pour sa partie nord (corps perpendiculaire). La tour a été édifiée en 1880.                                      l'ancien château de Talanforest ou Talforest. Il est au XVe siècle, la propriété de la famille Lanvaux, puis de la famille Langle. Le château a aujourd'hui complètement disparu.","habitants":"Famille de  M. Georges Perceval\r\n        \"","divers":"Château de Guenanec, de Clinchap à Plumelin gps 47° 51' 45\" nord, 2° 53' 12\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Guenanec_1.jpg","../../jctruffet.com/image/image_56/56_Guenanec_2.jpg","../../jctruffet.com/image/image_56/56_Guenanec_3.jpg"]},"Consult_chateau_formulairead80":{"id":"Consult_chateau_formulairead80","dept":"56","canton":"Guer","commune":"Guer","nom":"Guer","type":"Château","periode":"XV-XVIIe-XVIIIe","histoire":"Trois châteaux à Guer , Coëtbo , Hattaie etTertre                                COETBO, depuis le XVe siècle. Il appartint aux Le Borgne au XVe siècle aux Avril et aux Guillery XVIe siècle, aux Troussier début XVIIe siècle et aux de Marnière, qui firent partie du milieu parlementaire jusqu'en 1792. Le bâtiment actuel serait le résultat d'une reconstruction progressive à partir de 1620. En 1647, M. et Mme de Pontchâteau s'assurèrent les services d'un architecte du roi, Pierre Hureau, pour tirer parti des édifices existants en les étoffant par un corps de bâtiment prolongeant les bâtiments primitifs. En 1685, Julien de Marnière acheta Coëtbo. Après 1685 ses successeurs firent disparaître les tours et des vestiges du bâtiment médiéval et perfectionnèrent les aménagements intérieurs et extérieurs du château. Quartier général de Puisaye en 1793, Institut agricole moderne en 1833, Ecole pratique d'Agriculture de 1835 à 1838, Coëtbo a été restauré vers 1970 par monsieur Louis Philouze son actuel propriétaire. Éléments protégés MH : le château, : classement par arrêté du 4 juin 1993.","architecture":"HATTAIE, le manoir primitif est construit par la famille Hatte à la fin du XIVe siècle, puis le manoir devient la propriété des familles de Fontenailles (Guyon de Fontenailles en 1480), Pillet au XVIe siècle, du Val en 1594 et Marnière vers 1640. Le château actuel fut édifié par la famille Marnière en 1686. ainsi que le logis et la chapelle sont contemporains, logis portant la date  de 1686  Jean de Manière fait élever la chapelle. Dans les communs, remplois sans doute plus anciens, XVIe siècle peut-être. Un \"hostel\" a préexisté au château actuel. La demeure passe ensuite entre les mains des familles Sorel en 1700, Carné au XVIIIe siècle et il est restauré en 1935. Depuis cinq générations il est dans la même famille (transmis parfois par mariages): Préaudeau, Castel, Pinczon du Sel, Nouvel de La Flèche. Un moulin à eau et une fontaine Saint-Julien complètent le domaine.                                                                                                                             TERTRE, logis et communs de construction postérieure au cadastre de 1847 par la famille La Faye ou La Foye. C'est en 1905, au décès de Georges de La Foye, que le Tertre Aubault entra dans la famille de Jacquelin-Dulphé. La mère du défunt était en effet Geneviève de Jacquelin-Duphé, sur du père de l'actuel propriétaire, le comte Jacques de Jacquelin-Dulphé qui autorise la vue extérieure du château. Le corps de logis porte la date 1851: lucarne centrale, communs à comparer avec les écuries de la Voltais en Monteneuf. Edifice de plan symétrique, le gros oeuvre en moellon, schiste et enduit, élévations ordonnancées, surmontées de toit à longs pans ; flèche carrée ; toit polygonal et pignon couvert. Deux tours se dressent du côté Sud. Placé à proximité d'un étang qui fait tourner un moulin.","habitants":"Coetbo; Famille de Marnière                                                  Touches; Famille  Du Loquet                                                   Tertre; Famille de la Foye                                     \r\n        \"","divers":"à Guer gps 47° 54' 17\" nord, 2° 07' 09\" ouest ,                           Coëtbo grav-1-2-3 , Hattaie grav-4, et Tertre grav-5 La Touche grav-6.","gps":"","images":["../../jctruffet.com/image/image_56/56_Guer_1.jpg","../../jctruffet.com/image/image_56/56_Guer_2.jpg","../../jctruffet.com/image/image_56/56_Guer_3.jpg","../../jctruffet.com/image/image_56/56_Guer_4.jpg","../../jctruffet.com/image/image_56/56_Guer_5.jpg"]},"Consult_chateau_formulaireb4bf":{"id":"Consult_chateau_formulaireb4bf","dept":"56","canton":"Guer","commune":"Guer","nom":"Guer_II","type":"Château","periode":"XIII-XV-XIX","histoire":"Quatre châteaux à Guer; Couëdor, Fléchaie, Porcaro et Ville-Hué.                                                                            COUEDOR, édifice mentionné dès 1427; l'édifice actuel conservé des éléments d'architecture, dont une cheminée à décor gothique, pouvant remonter au XVe siècle; escalier sans doute postérieur du XVIe siècle; le caractère défensif de l'oeuvre, douves et pont-levis, mentionné par deux auteurs est confirmé par les sources qui indiquent la présence d'un sergent sur place en 1514. Construit dans un des nombreux replis de l'Oyon, Couëdor, après avoir à lorigine, abrité les seigneurs de ce nom, appartenait, à la Révolution, à la famille de Marnière de Guer; vendu comme bien national à cette époque, ainsi que la métairie voisine, à un sieur Grée, il fut racheté ensuite par M. de Vitton, oncle du marquis de Guer de l'époque.                        PORCARO  du XIIIe et XIXe siècles, propriété de la famille Porcaro (en 1280 et au XVe siècle, Jehan Porcaro en 1480), puis de la famille Guiny (en 1628), de la famille Sagazan (en 1772), du vicomte Victor de La Haye de Plouër (en 1836), de la famille Mesnard de Chousy, puis Tyrac de Marcellus. Il s'agit en fait d'un ancien manoir reconstruit en 1875. L'édifice rectangulaire actuel est constitué d'une grosse aile carrée à gauche et d'une tourelle d'angle à droite. La famille de Porcaro s'appelait à l'origine La Porte de Caro. La seigneurie avait primitivement un droit de moyenne et basse justice, puis à partir de 1628 (à cause du Breil), un droit de haute justice. Le château possédait autrefois une chapelle privée dédiée à saint-Sébastien, reconstruite en 1830-1843 pour la congrégation de la Sainte-Vierge et dédiée à Notre-Dame. Le château a été restauré en 1870.","architecture":"VILLEHUE, la première construction qui subsiste dans la partie Nord de l'actuel château a vraisemblablement été érigée vers la fin du XIIIe siècle. Les plus anciens possesseurs connus de la Ville-Huë étaient les Ugues dont on connait un acte de 1380. La similitude des noms est assez grande pour que l'on puisse admettre que la terre devait son nom à ses seigneurs, les Ugues l'ont donc baptisée la Ville Ugues devenue petit à petit la Ville Huë, la famille de Raguenel, descendant des Ugues, habite toujours le château. Celui-ci a subi quelques modifications depuis sa construction. Le cadastre de 1813 le décrit comme ressemblant au bâtiment actuel auquel, manqueraient les deux tours et la dernière travée à l'Est. En outre, deux bâtiments étaient perpendiculaires au logis principal, dans ses extrémités, pour former une cour complétée par un 3ème bâtiment rond qui devait être le pigeonnier. Le cadastre de 1847 montre une disposition de bâtiment similaire avec un début d'aménagement paysagé du parc. L'accès au château se faisait encore de face, hébergement en chambres d'hôtes                                                                                                                             FLECHAIE, édifice reconstruit dans la première moitié du XIXe siècle, reconstruction postérieure au cadastre de 1813. Propriété de la famille Couëdor de 1426 à 1617. Puis propriété successive des familles Natural, Heudelor en 1625, Guyot en 1680, Moricet de 1703 à la Révolution, Du Fayel en 1848, Russon et Haëntjens en 1905. Il est composé d'un corps principal, de plan régulier, flanqué de deux ailes, il possède un étage carré et un étage de comble, le gros-oeuvre en schiste et enduit, élévations ordonnancées surmontées de toit à longs pans, croupe et flèche carrée recouverts d'ardoise.","habitants":"Couedor; Famille de Marnière de Guer                                         Porcaro;  Famille Mesnard de Chousy                                                      Ville-Hué; Famille de Raguenel,                                                           Fléchaie; Famille Couëdor \r\n        \"","divers":"à Guer; Couedor grav 1, Fléchaie grav-4,  Porcaro grav-2, et Ville-Hué grav-3.                     gps   47° 54' 37\" nord, 2° 11' 51\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Guer_II_1.jpg","../../jctruffet.com/image/image_56/56_Guer_II_2.jpg","../../jctruffet.com/image/image_56/56_Guer_II_3.jpg","../../jctruffet.com/image/image_56/56_Guer_II_4.jpg"]},"Consult_chateau_formulaired78e":{"id":"Consult_chateau_formulaired78e","dept":"56","canton":"Vannes","commune":"Ile aux moine","nom":"Guerric","type":"manoir","periode":"XVII","histoire":"GUERRIC,  mentionné en 1532, appartenant à Louise de Quélen et Olivier d'Aradon (seigneurs de Kerran en Arradon), le manoir est acquis en 1669 par Henry Daviers, marchand de Vannes et syndic de la communauté de ville. La construction actuelle, peut être due aux Guillo du Bodan qui achètent le lieu en 1711, date de la fin du XVIIIe siècle ou du début du XIXe siècle. Chapelle construite antérieurement, peut être avant 1711 pour H. Daviers. Choeur augmenté d'une abside au XIXe siècle. Bénitier vasque peut être d'époque romane, originaire d'une autre région. Fontaine du début du XIXe siècle. Communs construits vers 1800, rallongés vers le sud au milieu du XIXe siècle.\r\n le château du Guéric du XVIIIe siècle  est une ancienne propriété mentionnée en 1534 dans une vente de Jehan de Quelan (ou Quelen), épouse de Jérôme d'Arradon, à Jehan Le Cambout. Propriété successive de Henry Daviers (en 1669), puis des familles Lauzer de Larmor et Du Bodan (de 1711 au XIXe siècle), et Payen (en 1918). L'édifice a été reconstruit au XVIIIe siècle .\r\n la maison aux canons de Kergantelec du XVIIe siècle, édifiée par un capitaine corsaire du nom de Pento en 1633. Propriété de la famille Le Gris (en 1780), puis de la famille Martin-Chauffier (à partir de 1880).","architecture":"GUERRIC, logis en moellons enduits, pilastres de la travée centrale en pierre de taille, à élévation ordonnancée, à 1 étage carré et comble simple, toit à longs pans à croupes et noue, lucarnes en bois. Communs en moellon de granite, à comble à surcroît, à toit à longs pans à pignon découvert, gerbières en granite. Charretterie à l'ouest en moellons enduits, en rez de chaussée toit à longs pans à croupes. Piliers d'entrée du jardin en pierre de taille. Chapelle enduite, à un vaisseau, à toit à longs pans à pignon découvert à l'ouest, croupe ronde à l'est, lambris de recouvrement. Fontaine de dévotion en pierre de taille de granite.","habitants":"Famille de  Henry Daviers\r\n        \"","divers":"Château de Guerric à Ile aux Moines gps 47° 35' 51\" nord, 2° 50' 36\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Guerric_1.jpg","../../jctruffet.com/image/image_56/56_Guerric_2.jpg"]},"Consult_chateau_formulaired3f7":{"id":"Consult_chateau_formulaired3f7","dept":"56","canton":"Guidel","commune":"Guidel","nom":"Guidel","type":"Château","periode":"XVIII-XX","histoire":"deux châteaux à Guidel, Bothanie et Kerbastic.                             BOTHANIE, Guidel devient dès le Xe siècle, le centre religieux de la grande seigneurie du Kemenet Heboe. Après le démembrement de la seigneurie au XIIIe siècle, Guidel devient le siège d'un doyenné et ce jusqu'au concordat. Il est probable que jusqu'à la construction de Lorient, Guidel resta dans la sphère d'influence de la ville voisine de Quimperlé. De l'ancienne église reconstruite au XIXe siècle ne subsiste rien. Le cadastre de 1818 montre que l'église est le centre d'une agglomération dense. Château construit dans le quatrième quart du XIXe siècle à l'emplacement des dépendances du château de Carnoët aujourd'hui disparu. Le bâtiment d'origine, composé d'une simple maison basse, est surélevé d'un étage et transformé en château. En 1913, il est à nouveau remanié par l'architecte Maquet Petit dans un style néo Louis XIII fantaisiste. Sur la porte cochère sont sculptées, côté ouest, les armes de Ducros, ministre de la Marine sous Napoléon III et dont la fille acquiert le château en 1913, côté est, les armes du comte de Chauveau, propriétaire en 1918. Château de plan complexe comprenant un corps de logis et deux pavillons latéraux inégaux dont l'un est raccordé par une galerie formant porte cochère. Les façades sont enduites tandis que les encadrements, les pilastres, les bandeaux et les souches de cheminées sont en brique. Les angles sont renforcés par des tourelles couvertes d'un toit à l'impériale, d'un dôme circulaire à lanternon. Le campanile est couvert d'un bulbe à côtes.","architecture":"KERBASTIC, château constitué d'après le plan cadastral de 1818, d'un simple corps de bâtiment et de deux ailes non reliées en retour sur la cour. La jonction entre ces différents corps se fait probablement au cours du XIXe siècle par deux corps en avancée. Il est totalement restauré et remanié, de style Directoire, par le prince Louis de Polignac, après la seconde Guerre mondiale, la chapelle est édifiée à l'extrémité de l'aile ouest à la fin du XIXe siècle, les jardins sont dessinés dans le deuxième quart du XXe siècle par Jean-Claude-Nicolas Forestier architecte paysagiste, pour Louis de Polignac et sa femme. Du manoir primitif, mentionné à la Montre de 1447, il ne reste rien. Les terres de Kerbastic échouent aux Polignac au milieu du XIXe siècle par le jeu d'alliances successives. Sur le fronton de l'avant corps sont peintes leurs armes. La ferme du château est bâtie en 1808. Le lavoir et le séchoir sont édifiés dans la seconde moitié du XIXe siècle. Château enduit de plan régulier en U comprenant : un corps central à deux étages carrés animé d'un avant-corps et d'une élévation ordonnancée à cinq travées, couvert d'un toit à croupes ; l'escalier de distribution intérieure est en marbre, à retours avec jour. Deux ailes en retour à étage carré et élévation à une travée ont un toit à croupes et à noue. L'aile située à l'ouest, à élévation à travées, est terminée par une chapelle couverte d'un toit à pignon découvert. Un passage couvert est ménagé dans l'aile est, également à élévation à travées. La ferme du château, de type ternaire, est construite en moellons de granite comme les communs, les écuries. Elle est couverte d'un toit en ardoise à pignon découvert. Le séchoir est couvert d'un toit en tuile mécanique à croupes. Le lavoir est couvert d'un toit en ardoise à pignon couvert reposant sur des piles de bois sur deux côtés.","habitants":"Bothanie; seigneur local                                                            Kenastic: Famille de Polignac\r\n        \"","divers":"à Guidel, Bothanie grav 4- 5                  gps  47° 50' 37\" nord, 3° 31' 26\" ouest  et Kerbastic grav 1-2-3- Gps 47° 48' 02\"nord, 3° 30' 10\" ouest.","gps":"","images":["../../jctruffet.com/image/image_56/56_Guidel_1.jpg","../../jctruffet.com/image/image_56/56_Guidel_2.jpg","../../jctruffet.com/image/image_56/56_Guidel_3.jpg","../../jctruffet.com/image/image_56/56_Guidel_4.jpg","../../jctruffet.com/image/image_56/56_Guidel_5.jpg"]},"Consult_chateau_formulaire676f":{"id":"Consult_chateau_formulaire676f","dept":"56","canton":"Guidel","commune":"Guidel","nom":"Guidel_II","type":"Château","periode":"XV-XVIII-","histoire":"Deux châteaux  à Guidel;  Kerdudo et Talhouet.                           KERDUDO,  Guidel devient dès le Xe siècle, le centre religieux de la grande seigneurie du Kemenet Heboe. Après le démembrement de la seigneurie au XIIIe siècle, Guidel devient le siège d'un doyenné et ce jusqu'au concordat. Il est probable que jusqu'à la construction de Lorient, Guidel resta dans la sphère d'influence de la ville voisine de Quimperlé.  A cette époque, les routes de Lorient à l'est et Pont-Scorff au nord ne constituent pas des axes privilégiés d'implantation de l'habitat réparti au contraire sur un réseau de rues au sud et à l'est de l'église, dont il subsiste quelques vestiges.  Kerdudo est mentionné comme seigneurie dès 1447. Le château actuel est construit probablement dans la première moitié du XVIIIe siècle. Un avant-corps latéral est ajouté en 1912. A la fin du XIXe siècle, le château s'entoure de bâtiments agricoles qui lui permettent de vivre en partielle autonomie. Les écuries et la croix situées au fond du parc sont datées de 1898. Le fournil et la dépendance en retour au nord signalé sur le plan cadastral de 1818 ont disparu. Le château est composé d'un corps principal enduit, de plan allongé à étage carré, couvert d'un toit à longs pans et croupe. Il présente une élévation ordonnancée à 5 travées. L'escalier en charpente tournant à retours est rejeté latéralement, à ce corps de logis principal est venu s'ajouter un avant-corps latéral à deux travées couvert d'un toit en pavillon.","architecture":"TALHOUET, le manoir de Kerizouët du XVe siècle. Siège de la seigneurie de Kerisouet, propriété successive des familles Haultbois (en 1427), Botherel (de 1578 et jusqu'en 1688), Roscouët du Mené (au XVIIIe siècle) et Boisgelin du Roscouët-Lesturgant.  La seigneurie de Talhouët est signalée dès le XVe siècle dans les montres et réformations de la noblesse appartenant  à la famille Le Digouédec qui conserve le château jusqu'en 1675. Il est probable que le château ait été reconstruit à la fin du XVIIe siècle d'après la forme figurant sur le plan cadastral de 1818. Il est reconstruit sur le même emplacement, mais dans une orientation différente, vers 1860, au moment de son rachat par le comte de Richemont, dans le style du XVIIIe siècle, inspiré par l'oeuvre de l'architecte Jacques V Gabriel à Lorient. Le château est de plan symétrique en U, à façade sur cour et sur jardin, à étage carré et élévation à sept travées. Il présente une façade sud à faux avant-corps central rythmé par trois travées et surmonté par un fronton. Un escalier extérieur droit à perron occupe la largeur de l'avant-corps. Deux arrière-corps ferment le logis au nord sur une cour en U. Communs et écuries se disposent hors de l'ordonnance.","habitants":"Talouhet.  Famille Le Digouédec\r\n        \"","divers":"à Guidel Kerdudo  gps 47° 48' 22\" nord, 3° 28' 31\" ouest, et Talhouet grav-1-2 gps 47° 49' 46\" nord, 3° 32' 06\" ouest.","gps":"","images":["../../jctruffet.com/image/image_56/56_Guidel_II_1.jpg","../../jctruffet.com/image/image_56/56_Guidel_II_2.jpg"]},"Consult_chateau_formulaire73d7":{"id":"Consult_chateau_formulaire73d7","dept":"56","canton":"Gourin","commune":"Guiscriff","nom":"Guiscriff","type":"Château","periode":"XV-XVI-XIX","histoire":"A Guiscriff   le château de Kerandraon, Minguinionnet  et l'ancien manoir de Pénéhoc.                                                                                                          KERANDRAON,   château construit en 1853-1854 par Joseph Bigot pour M. Harrington, puis de nouveau dans les années 1890 pour le gendre de ce dernier, Paul Roussin, avec notamment la modification de la toiture et des gardes corps des fenêtres. Édifice de plan symétrique composé d'un corps central rectangulaire flanqué de deux ailes plus basses, moins profondes et couvertes en terrasse; élévation principale à cinq travées, travée centrale surmontée d'un fronton cintré recevant les armes de la famille et d'un oeil de boeuf. Maçonnerie de moellon enduit avec soubassement, bandeaux horizontaux, encadrements de baies et corniche en pierre de taille.Construit en 1853 par Joseph Bigot dans le style très classique du XVIIIe siècle, le château de Kerandraon se distingue, par son élégance, dans un corps restreint d'édifices ruraux de modeste proportion qui prolonge l'architecture de style néoclassique et traverse le XIXe siècle jusqu'à ses derniers représentants au début du XXe siècle. Propriété du comte Guy de Saint-Pierre.","architecture":"MINGUINIONNET, manoir de Mr Heymery du XVe siècle escalier dans la tourelle,  le manoir appartenait déjà à la famille de Kergoet en 1300 et resta en sa possession jusqu'au XVIIe siècle. Le manoir date du XVe siècle. En 1993, le manoir à l'abandon, et sans acquéreur potentiel devait être démonté... Son nouveau propriétaire l'a fait inscrire aux M.H. en 1999. Les dernières fouilles ont permis la découverte des verres des XVe, XVIe et XVIIe siècles, ainsi que de nombreuses poteries, vitraux, clefs, pipes, terres cuites. Il est ouvert chaque année lors des Journées du patrimoine, en fonction des travaux entrepris, à titre d'exemple, afin d'éviter de nouvelles destructions de notre patrimoine. Le manoir est restauré progressivement depuis 1998 (un projet de démontage du manoir avait failli aboutir en 1993  par son nouveau propriétaire Philbert Hémery, lequel n'utilise pour sa restauration que des techniques traditionnelles utilisées autrefois.  Du manoir, seuls subsistent le logis et une aile de dépendances en retour d'équerre. Cette aile était à la même hauteur que le logis. Ce dernier, en appareil de granite régulier pour l'élévation antérieure et en schiste pour les autres faces, était entouré de communs et une muraille clôturait la cour avec son portail monumental. Signe de noblesse et de prestige, une élégante tour d'escalier polygonale, est construite sur la façade.                                                                                                         \r\nPENEHOC,  l'ancien manoir du XVe siècle, abandonné par le seigneur de Pénéhoc  dès 1427, il est reconstruit au XVIe siècle. La seigneurie possédait un droit de haute justice, très remanié, hôtel de Ville.","habitants":"Kerandraon; Famille   M. Harrington                     Minguinionnet; Famille de Kergoet et  Philbert Hémery,                                Penehoc; seigneur Penehoc\r\n        \"","divers":"A Guiscriff gps 48° 03' 02\" nord, 3° 38' 39\" ouest                                         ;  le château de Kerandraon grav-1    Minguinionnet grav 2-3 et l'ancien manoir de Pénéhoc grav 4","gps":"","images":["../../jctruffet.com/image/image_56/56_Guiscriff_1.jpg","../../jctruffet.com/image/image_56/56_Guiscriff_2.jpg","../../jctruffet.com/image/image_56/56_Guiscriff_3.jpg","../../jctruffet.com/image/image_56/56_Guiscriff_4.jpg"]},"Consult_chateau_formulaire7308":{"id":"Consult_chateau_formulaire7308","dept":"56","canton":"Gourin","commune":"Guéméné sur scorff","nom":"Guéméné_sur_Scorff","type":"Forteresse","periode":"XI-XV-XX","histoire":"GUEMENE, contre Guémené, Mercier, un chef chouan, réunit 1500 hommes. La ville était gardée par trois cents grenadiers. À 4 heures du matin, les Chouans pénètrent dans la ville, surprennent les grenadiers. Ils restèrent dans celle-ci jusqu'à six heures. Ils repartirent en emmenant 30 morts, 50 blessés et 30 prisonniers : ceux-ci furent relâchés après avoir crié « Vive le roi ! ».  Le château devient bien national.  En 1843 le château est acquis par la famille de Launay, qui fait construire en 1860 une résidence privée, de style néo-classique (c'est l'actuelle mairie), au cur même de l'ancien château.\r\nLe philosophe Alain décrit ainsi Guémené en 1899 : « Guémené : celui qui n'a pas vécu longtemps en Bretagne ne peut pas saisir ce qu'est la terre sauvage. La culture est l'exception. Des collines couvertes d'ajoncs, de pins, des sources qui coulent à mi-côte et se réunissent au fond. Des femmes en troupes sur la route, chantant ; des hommes isolés le long de celles-ci. La femelle en société et le mâle seul et triste. Cela est loin de tout et immuable ; on n'a pas à construire le temps passé, on y est ». En 1927 un projet de construction de lotissements lancé par la municipalité entraîne le démantèlement de nombreuses parties anciennes du château. Les \"bains de la Reine\" sont démontés et vendus à un antiquaire de Vitré qui les fait remonter dans sa propriété de la Mériais.En 2001 le maire Christian Perron fait racheter les \"bains de la Reine\" qui sont réinstallés à Guémené (seule la chambre d'étuve subsiste, la salle de chauffe et la salle de bain ont disparu)","architecture":"GUEMENE,  l'ancienne forteresse de la famille Rohan-Guéméné. L'édifice s'achemine vers la ruine et ses nouveaux propriétaires font édifier, au centre de l'enceinte fortifiée, une nouvelle demeure. Cette dernière a été transformée par une adjonction dans la deuxième moitié du XXe siècle et abrite aujourd'hui la mairie de la ville.  Vendue en 1814 à un banquier  Occupée durant les cent Jours au printemps 1815, avant d'être acquise en 1843 par la famille Juttard-Lannivon. En 1885, le guide Joanne décrit les ruines du château comme offrant les traces de neuf tours dont trois carrées récemment rebâties. Le premier château de Guémené est élevé au XIe siècle par Guegant, neveu du comte de Cornouaille. Remplacé un siècle plus tard par une forteresse de pierre, qui appartient alors au vicomte de Rohan. Remaniée au XIIIe siècle, elle est donnée en dot à Mabile de Rohan en 1251, propriété de la commune, hôtel de ville.  Éléments protégés MH : la porte du XVe siècle : inscription par arrêté du 24 avril 1925. Les anciennes étuves du château dites \"les Bains de la Reine\" : inscription par arrêté du 19 janvier 2016.","habitants":"famille Rohan-Guéméné\r\n        \r\n        \"","divers":"Forteresse et rempart de Guéméné sur scorff  grav de 1à 7                    Gps48° 04' 09\" nord, 3° 12' 06\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Gu%c3%a9m%c3%a9n%c3%a9_sur_Scorff_1.jpg","../../jctruffet.com/image/image_56/56_Gu%c3%a9m%c3%a9n%c3%a9_sur_Scorff_2.jpg","../../jctruffet.com/image/image_56/56_Gu%c3%a9m%c3%a9n%c3%a9_sur_Scorff_3.jpg","../../jctruffet.com/image/image_56/56_Gu%c3%a9m%c3%a9n%c3%a9_sur_Scorff_4.jpg","../../jctruffet.com/image/image_56/56_Gu%c3%a9m%c3%a9n%c3%a9_sur_Scorff_5.jpg","../../jctruffet.com/image/image_56/56_Gu%c3%a9m%c3%a9n%c3%a9_sur_Scorff_6.jpg","../../jctruffet.com/image/image_56/56_Gu%c3%a9m%c3%a9n%c3%a9_sur_Scorff_7.jpg"]},"Consult_chateau_formulaire9a42":{"id":"Consult_chateau_formulaire9a42","dept":"56","canton":"Ploërmel","commune":"Monterrein","nom":"Haute_Touche","type":"Château","periode":"XVIII","histoire":"HAUTE-TOUCHE,   dans les années 1760, une nouvelle demeure est bâtie. Le château se présente dans son aspect architectural du XVIIIe siècle auquel l'architecte rennais Jobbé Duval a apporté une monumentalité en 1902-1903. Son intervention s'inspire de l'architecture des malouinières. Le logis, construit en rez de chaussée surélevé, comprend un étage carré et des combles. L'entrée de la demeure s'effectue par les deux façades, accessible grâce à un escalier en fer à cheval, à une volée. Sur la façade antérieure l'escalier date du XVIIIe siècle et celui de la façade opposée est une copie de Jobbé Duval.  La Haute Touche en 1427 fut la propriété des Bérard et des Lopriac de Kervignac en 1637. Depuis 1750, le domaine est à la famille du Boisbaudry. Malgré un pillage par les Bleus en 1794, le domaine a conservé sa belle harmonie avec son château, sa chapelle, et son colombier. Éléments protégés MH : le château en totalité, les façades et les toitures des éléments composant l'entrée du domaine, à savoir : la chapelle, le colombier les douves et le portail, le parc paysager et le jardin régulier, le calvaire: inscription par arrêté du 9 novembre 2001, modifiée par arrêté du 28 mars 2002.","architecture":"HAUTE-TOUCHE, est un bâtiment de 1760, mais sur le lieu existe des vestiges des XVIe et XVIIe siècles. Excepté le principe des cuisines en sous-sols, adopté depuis longtemps dans la région de Malestroit, la construction du bâtiment se rapproche plutôt du type des malouinières. Les anciens bâtiments des XVIe et XVIIe siècles servent de communs. Le portail et sa ferronnerie font partie des embellissements effectués au début du XXe siècle par l'architecte rennais Jobbé-Duval. Ces embellissements comprenaient aussi des douves, jardins à la française, nouveau perron. À cette époque, une nouvelle chapelle a été construite, qui fait pendant à un colombier du XIIIe siècle.","habitants":"Haute-Touche; Famille du Boisbaudry\r\n        \"","divers":"a Monterrein château de la HauteTouche Gps 47° 52' 52\" nord, 2° 21' 24\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Haute_Touche_1.jpg","../../jctruffet.com/image/image_56/56_Haute_Touche_2.jpg","../../jctruffet.com/image/image_56/56_Haute_Touche_3.jpg"]},"Consult_chateau_formulaire473a":{"id":"Consult_chateau_formulaire473a","dept":"56","canton":"Hennebont","commune":"Hennebont","nom":"Hennebont","type":"Château-fort","periode":"XVIII-XIX","histoire":"Six châteaux à Hennebont, Bot, Bouetiez et Kerscamp, Cour, Kerlegan et Locoyarn.                                                                                                                 BOT, en 1835, le château du Bot est un édifice important (43 ouvertures) environné de communs, d'une cour. La propriété appartient alors à Nicolas Decintré. L'édifice passe ensuite à la famille de Blignières, toujours propriétaire. En 1880, Ernest de Blignières entreprend la reconstruction de la propriété pour installer sa collection d'objets d'art arabes, collection constituée au cours de sa carrière au Caire. Il fait appel à l'architecte Ambroise Baudry, qui avait déjà travaillé pour lui en Egypte, ce dernier réalise l'aménagement et la décoration des pièces de réception dans le style orientaliste, complétant le cadre des pièces de collection par un décor réalisé en Égypte. Éléments protégés MH : les façades et les toitures, ainsi que les pièces du rez-de-chaussée décorées par Ambroise Baudry (le vestibule, l'escalier et la cage jusqu'au palier de l'étage, la salle de billard, le salon, le grand salon et la salle à manger) : inscription par arrêté du 7 mars 2007.  L'édifice actuel est bâti sur le même plan que celui qui l'a précédé, quoiqu'il ait été rehaussé d'un étage. Il est constitué d'un corps de logis qu'encadre deux ailes perpendiculaires légèrement en saillie côté sud. L'intérieur est d'un style orientalisant.                                                                                                       COUR, au XIIIe siècle, l'abbaye de Saint-Gildas de Rhuys fonda là un prieuré, avec une chapelle dédiée à Saint-Vincent. Il possédait un moulin à eau. Reconstruit vers 1560, il est vendu comme bien national en 1792. Il est acquis au XIXe siècle, par le comte Charles Guyot d'Asnières de Salins, puis en 1985 par la famille Gandon.","architecture":"KERLEGAN, propriété de la famille Gail.\r\n KERLOIS du XIXe siècle, qui a remplacé un manoir nommé \"Kerlehoez\" et dont le propriétaire était Jehan du Pou en 1448. Ancienne Maison des Pères Blancs, l'édifice abrite aujourd'hui le Collège Saint-Félix de Kerlois. BOUETIEZ, construit sur le site d'une ancienne métairie, le château de Bouétiez a été édifié dans la première moitié du XIXe siècle ; les communs remontent au XVIIIe siècle. Croix monumentale datant du XVIe siècle provenant de l'écart Saint Gilles. Édifice de plan symétrique comprenant un corps de bâtiment central à cinq travées régulières et deux corps latéraux plus bas de deux travées chacun (ajouts). Le corps central comprend deux étages carrés, la travée centrale est surmontée d'un fronton triangulaire. Elévation de maçonnerie enduite avec encadrements de baies, chaînes d'angle et bandeaux horizontaux en pierre de taille de granite.                                                                                                                  LOCOYARN, siège d'une ancienne seigneurie de la paroisse de Kervignac, maintenant en Hennebont, propriété de la famille Jaffré.                                                                       KERSCAMP, le château appartint à Pierre L'Hermite en 1620, puis à divers propriétaires. Au XVIIIe siècle, il fut aux Le Merle de Beaufond, puis aux Polignac en 1884. Le 24 octobre 1895 est né au château Pierre, fils du comte Maxence de Polignac. Pierre épouse le 19 mars 1920 la princesse Charlotte, duchesse de Valentinois, fille du Prince Louis II, alors prince Héréditaire, Pierre prit le nom et les armes des Grimaldi. De cette union naquirent S.A.S. la Princesse Antoinette et S.A.S. le Prince Rainier III. La titulaire du château, Mme de Saxcé, née Polignac, le vendit en 1984, à M. Joseph Le Déaut. Le château du XVIIe siècle a été augmenté un siècle plus tard.","habitants":"Bot ; Famille de Nicolas et de Blignières.                              Locoyarn;  Famille Jaffré.                                                       Kerscamp; Famille de Polignac.                                                    La Cour;  comte Charles Guyot \r\n        \"","divers":"A Hennebont, Bot grav 2                                                                  gps 47° 48' 41\" nord, 3° 17' 52\" ouest,                                                         Bouetiez gps 47° 48' 14\" nord, 3° 14' 50\" ouest et Kerscamp                         gps 47° 48' 22\" nord, 3° 18' 35 ouest, Cour, Kerlegan                          gps 47° 48' 11\" nord, 3° 18' 11\" ouest, Locoyarn gps  47° 47' 12\" nord, 3° 17' 15\" ouest.","gps":"","images":["../../jctruffet.com/image/image_56/56_Hennebont_1.jpg","../../jctruffet.com/image/image_56/56_Hennebont_2.jpg","../../jctruffet.com/image/image_56/56_Hennebont_3.jpg","../../jctruffet.com/image/image_56/56_Hennebont_4.jpg"]},"Consult_chateau_formulaire9ea8":{"id":"Consult_chateau_formulaire9ea8","dept":"56","canton":"Hennebont","commune":"Hennebont","nom":"Hennebont_Fort","type":"Forteresse","periode":"XVI-XVIII","histoire":"HENNEBONT, en 1250 Jean de roux  ceintura la ville, le XVIe siècle est marqué par la paix et la prospérité pour l'ensemble de la région, sauf pendant les Guerres de la Ligue. C'est au cours de ce siècle que la basilique Notre-Dame-du-Paradis est bâtie à l'initiative du maréchal-ferrant François Michart et avec l'aide de la population. Pendant les Guerres de la Ligue, le 27 octobre 1590, René d'Arradon, après avoir accueilli les troupes espagnoles débarquées à Saint-Nazaire en sa ville de Vannes, commence le 5 novembre 1590 le siège d'Hennebont avec sa compagnie de gens d'armes et trois cents arquebusiers, aidés par des troupes espagnoles ; Hennebont capitule le 22 décembre 1590. Jusqu'aux XVIIe et XVIIIe siècles, la région vit essentiellement du commerce maritime et agricole.  La ville perd son rôle de place forte militaire au XVIIIe siècle. Elle n'est plus un lieu de garnison mais une ville étape pour les troupes. La hiérarchie militaire se trouve à Lorient et à Port-Louis. Hennebont est aussi une ville commerçante et administrative de taille moyenne. Si, en 1666, la fondation de Lorient sonne le glas de sa primauté, Hennebont n'en reste pas moins, tout au long du siècle, une ville d'une grande vitalité. Les bleds sauvent l'économie locale et Hennebont restera un des plus importants ports blattier de la côte sud. Les hôtels particuliers de cette époque témoignent de cette prospérité. La prépondérance administrative et judiciaire de la sénéchaussée hennebontaise décline cependant au profit de Lorient, où s'installe la compagnie des Indes au milieu du XVIIIe siècle.","architecture":"HENNEBONT,  la  Ville-Close  conserve  aujourdhui  encore  cinq  tours  en  élévation. A  la  pointe  nord,  la  tour  circulaire  dite  « des  Carmes »,  du  nom   du   couvent   installé   dans   les   murs   en   1384,   nest   pas   antérieure au XVe siècle.La  tour  Saint-Nicolas  est  élevée  sur  le  flanc  sud-est  à  la  fin  du XVe siècle. Tour dartillerie caractéristique de cette période, elle est    disposée    face    au    Mont-Délices  afin    de    se    protéger déventuelles occupations de la colline.   La tour Rospadern, ouverte elle-aussi « à la gorge », défend le flanc nord-ouest de lenceinte face au Blavet et à Saint-Caradec. La  porte  Broerech  est  défendue  par  deux  grosses  tours  armées de canonnières et mâchicoulis. Les  remparts  de  la  Levée   :  classement  par  arrêté du 31 juillet 1941  Les restes des remparts : classement par arrêté du 24 mars 1947.  Fortifications  construites  dans  la  seconde  moitié  du  XIIIe siècle pour le duc Jean le Roux ; reconstruction seconde moitié XVe siècle pour le duc Jean V ; marques de tâcheron. Les  remparts  existent  dans  leur  quasi-totalité  autour  de  la  Ville-Close.  La  ville  avait  deux  portes  :  à  l'est,  la  porte  Broërech , appelée   aussi   Porte   Prison   ;   au   sud-ouest   la   porte   d'Embas, disparue.  Plus  au  nord  se  trouve  la  tour  Saint-Nicolas,  dont  la  partie inférieure prend la forme d'un rectangle arrondi sur le petit côté. La partie  supérieure correspond au chemin de Porte Broere'h  Porte-prison,  avec  les  tours  qui  la  flanquent  :  classement  par arrêté du 10 juin 1916. Porte appelée autrefois du Broërech, ouvrant les remparts de la Ville-Close, flanquée de deux grosses tours. L'ouvrage a toute sa partie supérieure remaniée au-dessus des mâchicoulis.                                                                                                                             En 1857, les Haras nationaux s'installent sur le site de l'ancienne abbaye de la Joye-Nôtre-Dame. Hennebont devient alors un lieu important pour le développement du cheval breton.","habitants":"Hennebont; René d'Arradon\r\n        \"","divers":"Fort de  Hennebont  gps 47° 48' 41\" nord, 3° 17' 52\" ouest,","gps":"","images":["../../jctruffet.com/image/image_56/56_Hennebont_Fort_1.jpg","../../jctruffet.com/image/image_56/56_Hennebont_Fort_2.jpg","../../jctruffet.com/image/image_56/56_Hennebont_Fort_3.jpg","../../jctruffet.com/image/image_56/56_Hennebont_Fort_4.jpg","../../jctruffet.com/image/image_56/56_Hennebont_Fort_5.jpg","../../jctruffet.com/image/image_56/56_Hennebont_Fort_6.jpg"]},"Consult_chateau_formulaire243b":{"id":"Consult_chateau_formulaire243b","dept":"56","canton":"Guidel","commune":"Inzinzac Lochrist","nom":"Inzinzac_Lochrist","type":"Château","periode":"XV-XVIII-XIX","histoire":"quatre châteaux à Inzinzac-Lochrist,  Locqueltas,  de Brangolo, de Kermat,  de Locqueltas, du Ty-Mat, et divers manoir.\r\nChâteau de KERGLAW, ancienne maison du maître des forges, actuelle médiathèque municipale (quartier de La Montagne).                                                                          KERMAT  La seigneurie de Kermat était à Henry Gourio en 1448, à Alain Gourio \"homme d'armes\" en 1464, à Henry Gourio en 1477 et 1481, avant d'échoir à Marguerite de Spinefort en 1536. Le château actuel construit aux XVIIe et XVIIIe siècles possède de beaux communs. Il est visible extérieurement à l'extrémité d'une belle allée de grands arbres, dans la trêve de Penquesten, de plan régulier  en élévation ordonnancée à un étages gros-oeuvre : granite ; enduit: toit à longs pans ; pignon couvert ; croupe couverture en  ardoise.                                                                                     TY-MAT,  avant la Révolution, c'était le siège d'une seigneurie qui appartenait en 1448 à Henry de Penhoat de Chefdubois et qui passa, par alliance, au XVIIe siècle, à la famille de Maillé. La demeure actuelle date d'ailleurs de cette époque. Le manoir de Ty Mat, restauré récemment, est visible extérieurement ainsi que son étang, à trois kilomètres à l'Est de lnzinzac,   blotti dans un parc arboré de 6 hectares, à lorée de la forêt départementale, ce manoir du XVIIIe  siècle a su préserver son cadre authentique. Catherine et Mathieu, vous réservent un accueil chaleureux et familial.","architecture":"LOCQUELTAS,  le château de Locqueltas (1898). Siège d'une ancienne seigneurie dépendant de la trève de Penquesten. Propriété successive de la famille Trottier, des Forges d'Hennebont, de la famille Langlois, les Cirages Français de Paris (1949), Coëtmen (1970), Didden (1984) . Le château actuel est moderne, puisqu'il porte la date d'avril 1898. Le domaine appartenait à la famille Trottier, des Forges d'Hennebont. Par la suite, le château changea plusieurs fois de mains: Mme la générale Langlois, les Cirages Français de Paris en 1949, M. Jean Coëtmen en 1970, et enfin M. Francis Didden en 1984. Edifié dans un beau parc boisé, sur la rive droite du Blavet.                                                                                                  BRANGOLO du XVe siècle, siège d'une seigneurie appartenant successivement à Alain Hamon (collecteur d'impôts au XVe siècle), puis aux familles Le Mézec (en 1536), Caignart (au XVIIe siècle),                                      BUNZ, propriété aujourd'hui de la commune d'Inzinzac-Lochrist.                                                                            KERGLAW siège d'une seigneurie qui a appartenu, à partir de 1274, à la famille Saint-Giffert ou Saint-Ciffert. Il a servi de domicile aux cadres supérieurs des anciennes Forges d'Hennebont. Il est aujourd'hui propriété de la commune d'Inzinzac-Lochrist.","habitants":"Kermat; Alain Gourio                                                           Locqueltas; Famille Trottier;                                                             TY-mat; famille de Maillé.                                Brangolo;familles Le Mézec\r\n        \"","divers":"A Inzinzac Lochrist  grav-1 châteaux ,  de Brangolo, de Kermat                                                                                                  gps 47° 51' 54\" nord, 3° 13' 45\" ouest,   gps 47° 49' 51\" nord, 3° 14' 25\" ouest,                                                                                      du Ty-Mat grav 3                                       gps 47° 51' 14\" nord, 3° 14' 25\" ouest, et divers manoir.","gps":"","images":["../../jctruffet.com/image/image_56/56_Inzinzac_Lochrist_1.jpg","../../jctruffet.com/image/image_56/56_Inzinzac_Lochrist_2.jpg","../../jctruffet.com/image/image_56/56_Inzinzac_Lochrist_3.jpg","../../jctruffet.com/image/image_56/56_Inzinzac_Lochrist_4.jpg"]},"Consult_chateau_formulaire6a50":{"id":"Consult_chateau_formulaire6a50","dept":"56","canton":"Ploërmel","commune":"Josselin","nom":"Josselin","type":"Château","periode":"XIII-XIV","histoire":"JOSSELIN, une première forteresse, bâtie en 1008 pour Guéthenoc, vicomte du Porhoët, détruite en 1168 par Henri II Plantagenet. Reconstruction d'une forteresse (vestiges de soubassement) pour Eudes II de Porhoët à la fin du XIIe siècle. Entre 1370 et 1400, construction de trois tours sur la rivière, de la tour aujourd'hui isolée, d'une enceinte, d'un donjon et d'un châtelet en forme de logis porté pour Olivier de Clisson connétable de France, en 1407 rentre dans la famille des Rohan. En 1488 le duc de Bretagne fait détruire le château. En 1491 construction de la façade sur cour. Logis actuel construit pour Jean II de Rohan entre 1495 et 1506, englobant les trois tours construites pour Clisson. Un des premiers logis Renaissance à escalier rampe sur rampe dans oeuvre en France. Le donjon et cinq tours  sont démoli en 1629 sur demande de Richelieu. Le châtelet est détruit en 1762. et au XIXe siècle mais la famille de Rohan entreprend la restauration. transformé en prison à la Révolution jusqu'au premier Empire, propriété aujourd'hui de la famille du duc de Rohan.","architecture":"JOSSELIN, écroulement de l'enceinte est et pointe sud portant les substructions du premier château en 1774. Vers 1860, première campagne de restauration dirigée par l'architecte départemental du Loir et Cher et élève de Viollet-le-Duc, J. de la Morandière qui signe les écuries (1870) et la porterie Est (1876). Suite des travaux entre 1888 et 1917 pour A. de Rohan dirigés par l'architecte A. Lafargue affectant le gros oeuvre (logis, tour isolée) et l'intérieur (circulations, cheminées, sols, et éclairages). Mobilier daté 1891 et 1899, exécuté par Helle de Josselin d'après les dessins de Lafargue qui signe également la porterie nord. Création d'un jardin à la Française et d'un parc à l'anglaise par A. Duchesne en 1913. Aujourd'hui nous pouvons admirer les vestiges de la forteresse de la fin du XIIe siècle en schiste et granite à assises alternées ; le logement nord en granite pierre de taille ; les tours sur la rivière, la porterie est et la tour isolée en moellon de schiste ; les écuries, la sellerie et le logement en brique et calcaire ; la tour isolée à trois étages, le logement nord à un étage, le logis principal à deux étages de comble.en totalité : classement par décret du 21 août 1928.","habitants":"Eudes II de Porhoët et famille de Rohan\r\n        \"","divers":"Château de Josselin gps  47° 57' 08\" nord, 2° 32' 50\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Josselin_1.jpg","../../jctruffet.com/image/image_56/56_Josselin_2.jpg","../../jctruffet.com/image/image_56/56_Josselin_3.jpg","../../jctruffet.com/image/image_56/56_Josselin_4.jpg","../../jctruffet.com/image/image_56/56_Josselin_5.jpg","../../jctruffet.com/image/image_56/56_Josselin_6.jpg","../../jctruffet.com/image/image_56/56_Josselin_7.jpg","../../jctruffet.com/image/image_56/56_Josselin_8.jpg"]},"Consult_chateau_formulaire9c5d":{"id":"Consult_chateau_formulaire9c5d","dept":"56","canton":"Pluvigner","commune":"Landaul","nom":"Kerambar","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux à Landaul, Kerambar'h et Kerambourg.                 KERAMBAR'H; anciennement dénommé Keralvé, le lieu eut un premier château dès le XIVe siècle qui était propriété des vicomtes de Léon, puis des vicomtes de Rohan à compter de 1363. Le domaine appartint ensuite aux Kerbot, aux Kervillars, aux locet, aux Sérent aux XVIIe-XVIIIe siècles, aux Le Gouvello, à Émile de Kermoysan en 1845, à l'imprimeur vannetais Lamarzelle en 1858, par alliance aux Le Gallais, au comte Victor de Chouzy en 1927 et à M. François Bénéat Chauvel en 1933. Il est demeuré dans cette famille depuis cette date. Blotti dans un grand parc boisé et clos, vestige de la forêt qui couvrait jadis toute la presqu'île de Rhuys, la demeure porte sur façade Nord la date de 1670 et sur la lucarne Sud, 1764. Dans sa salle se tinrent les assemblées de la Société Patriotique Bretonne, instituée par M. de Sérent peu avant la Révolution. La tribune portait cette inscription : \"Ici on sert son Dieu sans hypocrisie, son roi sans intérêt et sa patrie sans ambition\", Le château fut alors baptisé \"Temple de la Patrie\". de  M. et Mme Yann Le Sech,","architecture":"KERAMBOURG,  en 1300, Henri de Kerambourg est propriétaire de la seigneurie. La terre passe aux Guer Malestroit au début du XVIe siècle et est érigée en vicomté en 1551 en faveur de Claude de Malestroit. Les combats de la Ligue détruisent le château et ruinent le Vicomte qui se voit contraint de vendre ses biens à Jean de Robien. Le dernier noble qui en est possesseur est Christophe Paul de Robien, président au Parlement de Bretagne et archéologue. En 1851 Carlos Parmentier acquiert le domaine, qui est resté depuis lors à sa descendance. Le château actuel, date du XVIe siècle. Mur d'enceinte avec portes cochère et piétonne, colombier, belle demeure avec tourelle et pavillon carré en façade, la chapelle est désaffectée, vieux puits et grande vasque de pierre, communs importants dans la cour, forment un très bel ensemble, édifié au milieu de 33 hectares de terre. M. Pierre Parmentier, gîte d'étape et de séjour.","habitants":"Karambar; Famille;  aux Sérent                                  Karambourg; famille de Jean de Robien\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Landaul  Gps 47° 44' 57\" nord, 3° 04' 29\" ouest  ;  Kerambar'h grav 1 à 4 et Kerambourg grav-5.","gps":"","images":["../../jctruffet.com/image/image_56/56_Kerambar-H_1.jpg","../../jctruffet.com/image/image_56/56_Kerambar-H_2.jpg","../../jctruffet.com/image/image_56/56_Kerambar-H_3.jpg","../../jctruffet.com/image/image_56/56_Kerambar-H_4.jpg"]},"Consult_chateau_formulaire7f21":{"id":"Consult_chateau_formulaire7f21","dept":"56","canton":"Guidel","commune":"Inguiniel","nom":"Kerascoet","type":"Château","periode":"XIX","histoire":"KERASCOET, le château appartenait en 1865 au général Joseph Fraboulet de Kerlaédec, qui y fit alors ajouter les deux ailes latérales. Il fut racheté en 1887 par la famille Grout de Beaufort qui le possède toujours. Son isolement en fera un nid de la résistance morbihannaise pendant l'occupation allemande entre 1940 et 1944. Situé à l'orée d'un grand bois, il est éloigné de toute agglomération d'habitations. Laurence Le Troëdec dit se souvenir quil était question, dans un bulletin communal, dune visite du Général de Gaulle dans ce château à titre privé, du 25 au 26 juillet 1947.","architecture":"KERASCOET, les ailes latérales ont été rajoutées en 1865 par le propriétaire dalors. La situation très isolée du château, à lorée dun grand bois, loin de toute agglomération, Jean-Claude Le Calve rajoute quune question en rapport avec cet événement avait été posée lors dun inter-quartier, puisque le général de Beaufort, propriétaire du château, nétait autre que le maitre de camp du général De Gaulle. La voiture de ce dernier était restée embourbée quelque part sur la route menant au château lors de sa visite.","habitants":"famille Général Grout de Beaufort\r\n        \"","divers":"Château de Kerascoet à Inguiniel gps 7° 58' 37\" nord, 3° 16' 54\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Kerascoet_1.jpg"]},"Consult_chateau_formulairead13":{"id":"Consult_chateau_formulairead13","dept":"56","canton":"Pontivy","commune":"Le Sourn","nom":"Kerdisson","type":"Château","periode":"XV-XVIII","histoire":"KERDISSON, un premier château fut élevé là au XVe siècle. Il était en pierre de grand appareil. Il appartenait à Nicolas Rolland, puis à ses successeurs jusqu'en 1536. Il passa alors aux Fournoir, puis à partir de 1618 aux Bahuno. Les Bahuno du Liscouët datent de 1674. Un Dodun, marquis d'Herbault, de souche bourguignonne et parisienne, vint prendre femme dans la famille du Liscouët et s'établir à Kerdisson. Ses arrières-petites-nièces vendirent Kerdisson en 1962 à M. Roland de Verdun, qui le cèda en 1982.","architecture":"KERDISSON, entouré de bois touffus, le château est un édifice du XVIIe siècle, remanié au XVIIIe siècle (un linteau de fenêtre daté de 1756). Une tourelle carrée, contenant un superbe escalier, agrémente la demeure qui conserve ses belles boiseries intérieures et de fort belles cheminées. Au Sud, l'ancien manoir a une façade armoriée en grand appareil et de très grandes cheminées. L'ensemble a été modifié au XIXe siècle et bien restauré du XVII-XVIIIe siècle, et restauré de nouveau au XIXe siècle. Un linteau de fenêtre est daté de 1756.  Les ruines dun colombier, dun moulin et dun lavoir sont visibles à proximité du château .                                                       \r\nKERDANET, de 1817, édifié par Patern Le Mouël et Marie Le Penesarm, propriétaires du château de Rimaison en Bieuzy. La demeure passe successivement entre les mains des famille du Liscouët, Le Beller et Belzic.","habitants":"Kerdisson; famille du Liscouët                                                   Kerdanet; Famille  de Liscouët\r\n        \"","divers":"A le Sourn  gps  48° 02' 37\" nord, 2° 59' 19\" ouest                                                    château de  Kerdisson grav 1-2-3 et de Kerdanet-4","gps":"","images":["../../jctruffet.com/image/image_56/56_Kerdisson_1.jpg","../../jctruffet.com/image/image_56/56_Kerdisson_2.jpg","../../jctruffet.com/image/image_56/56_Kerdisson_3.jpg","../../jctruffet.com/image/image_56/56_Kerdisson_4.jpg"]},"Consult_chateau_formulaireca96":{"id":"Consult_chateau_formulaireca96","dept":"56","canton":"Pontivy","commune":"Naizin-Remungol","nom":"Kerdréan","type":"Château","periode":"XVII--XIX","histoire":"KERDREAN, la seigneurie de Kerdréan les Bois a été longtemps aux mains des Cléguennec. En 1631 Louis de Cléguennec est sieur de Kerdréan, Talhouët, Lantillac, Moustoirlan, le Guerne, Culleac et autres lieux. Au milieu du XVIIe siècle, elle revient aux Langle (qui possédaient au XIXe siècle les sept huitièmes de la commune). On affirme qu'à la fin du siècle dernier, un guetteur veillait le dimanche matin dans la tour de l'église paroissiale, surveillant la route du château, à l'arrivée du marquis de Langle ou de sa famille, venant assister à la grand-messe, les cloches sonnaient à toute volée. Par la suite, Kerdréan fut au comte Maingard et demeure dans sa famille de nos jours. Le manoir a été complété par un château au XIXe siècle. La chapelle privée, dédiée à Saint-Nicolas, existe toujours (Mathurine de Cléguennec, fille de Jacques et d'Anne du Liscoët, fut baptisée en 1651, en la chapelle Saint-Nicolas du manoir de Kerdréan).","architecture":"KERGUEZANGOR, seigneurie à Naizin,  l'ancien manoir de Kerguzangor. Il était le siège d'une seigneurie qui a appartenu successivement aux familles Kerguzangor ou Kerguezengor, Le Métaer et Langle. Le manoir possédait autrefois une chapelle privée, ruinée dès 1890 .                                                                                                                KERGROIX  à Remungol à cinq kilomètres au nord Est, la seigneurie de Kergroix (ou Kergrois) appartenait en 1280 aux d'Avaugour, puis passe par alliance aux Marchecoul. Un manoir existait là dès 1400 et était au sieur de Kergrois. Il avait une chapelle privée dédiée à Saint Julien. Les Kergrois étaient une branche des d'Avaugour, qui se fondra plus tard dans les Bellouan.Puis le château passe entre les mains de la famille Marchecoul  En 1651, les Lambilly acquièrent la propriété (qu'ils possédaient encore à la fin du XIXe siècle). Le château brûle pendant la Révolution et c'est Thomas Hippolyte, marquis de Lambilly et baron de Kergrois qui reconstruit le château actuel vers 1840. La chapelle du parc sera restaurée en 1946. Actuellement une belle allée forestière mène au château (entouré du bois de Kergroix) qui est habité par la comtesse Emmanuel de Lantivy, sa propriétaire.","habitants":"Kerdréan; famille de  Louis de Cléguennec                           Kerguzangor;  famille Kerguzangor                                           Kergroix ;   famille Marchecoul      \r\n        \r\n        \"","divers":"A Naizin, hâteau de  Kerdrean et Kerguezangor                                              Gps 47° 59' 24\" nord, 2° 49' 50\" ouest                                                               Kergroix; Grav 6","gps":"","images":["../../jctruffet.com/image/image_56/56_Kerdr%c3%a9an_1.jpg","../../jctruffet.com/image/image_56/56_Kerdr%c3%a9an_2.jpg","../../jctruffet.com/image/image_56/56_Kerdr%c3%a9an_3.jpg","../../jctruffet.com/image/image_56/56_Kerdr%c3%a9an_4.jpg","../../jctruffet.com/image/image_56/56_Kerdr%c3%a9an_5.jpg","../../jctruffet.com/image/image_56/56_Kerdr%c3%a9an_6.jpg"]},"Consult_chateau_formulaireb852":{"id":"Consult_chateau_formulaireb852","dept":"56","canton":"Pluvigner","commune":"Brandérion","nom":"Kerlivio","type":"Château","periode":"XV-XVII","histoire":"KERLIVIO,  le domaine de Kerlivio se caractérise par la présence, au milieu d'un parc clos de murs créé au XIXe siècle des trois châteaux qui se sont succéder sur le site : un manoir du XVe siècle dont ne subsistent que les fondations et un pigeonnier, le château actuel, construit entre 1820 et 1850 par le comte de Perrien de Crenan. Le beau parc paysager, aménagé vers 1850, autour du château, est attribué aux frères Bühler et en présente toutes les caractéristiques, tant dans son tracé que dans le choix des plantations. La coexistence d'architectures plus anciennes et d'un château et d'un parc purement XIXe siècle, constitue l'originalité de cet ensemble.","architecture":"KERLIVIO,  manoir des XVIIe et XVIIIe siècles  construit en deux temps sur les ruines du précédent flanqué d'écuries, d'une tour hexagonale dite de l'Horloge du XVIIIe et d'une orangerie également du XVIIIe siècle, enfin, le château actuel, construit entre 1820 et 1850 par le comte de Perrien de Crenan. Le beau parc paysager, aménagé vers 1850, autour du château,  et en présente toutes les caractéristiques, tant dans son tracé que dans le choix des plantations. La coexistence d'architectures plus anciennes et d'un château  d'un parc du  XIXe siècle, constitue l'originalité de cet ensemble. Éléments protégés MH : les façades et les toitures des châteaux neufs et vieux et des communs ; le colombier, l'orangerie, la fontaine, le mur d'enceinte avec ses portails, le parc (également sur commune de Kervignac) : inscription par arrêté du 19 novembre 1992.","habitants":"comte de Perrien de Crenan\r\n        \"","divers":"A Brandérion  gps   47° 47' 39\" nord, 3° 11' 36\" ouest                          château de Kerlivio","gps":"","images":["../../jctruffet.com/image/image_56/56_Kerlivio_1.jpg","../../jctruffet.com/image/image_56/56_Kerlivio_2.jpg"]},"Consult_chateau_formulaire9081":{"id":"Consult_chateau_formulaire9081","dept":"56","canton":"Guidel","commune":"Bubry","nom":"Kernivinen","type":"Château","periode":"XIX","histoire":"KERNIVINEN,  le château de Kernivinen du XVe siècle, édifié vers 1400 par Henri de Saint-Nouan (ou Saint-Nouay, Saint-Nonan, Saint Noay) et siège de la seigneurie de Keringuinen ou Kerniguinen. Propriété successive de Henri de Saint Noay (en 1448), de la famille Le Luhandre (en 1481), Louis de Baud et Isabelle de Camzon (en 1511), Maurice de Baud (en 1536), Jacob de Cancoët et Isabelle de Kerouallan (en 1608), Jérôme de Cancoët (de 1630 à 1648), Yves de Rosmar et Maurice de Rosmar (en 1655 et jusqu'à 1676), Claude de Rosmar (de 1676 à 1681), Marie de Rosmar (en 1691), Jean de La Pierre de La Forêt et Jeanne de Rosmar (de 1697 à 1726), François de La Pierre (de 1727 à 1761), François Hyacinthe de La Pierre (en 1771), Marie Nicole de La Pierre et Louis du Couëdic (de 1785 à 1789), Jacques Lalau de Keraly. Il est aujourd'hui la propriété de Mme Lalau-Keraly.En 1400, le manoir de la seigneurie de Keringuinen ou Kerniguinen (maintenant Kernivinen) appartenait à Henri de Saint-Nouay (ou Saint-Nonan). Au XVIIIe siècle, il appartenait aux La Pierre de La Forêt.","architecture":"KERNIVIVIEN, l'édifice actuel possède un corps central et une seule aile. Le moulin de Boconan appartenait jadis aux châtelains de Kernivine   l'édifice présente  plusieurs phases de construction dont la première pouvant se situer au début du XIXe siècle (corps principal) et la deuxième à la fin du siècle (pavillon latéral ouest). Les communs sont aménagés dans des bâtiments plus anciens, à l'emplacement du manoir d'origine. Corps de logis principal de plan rectangulaire ; élévation ordonnancée à cinq travées, un étage carré et un étage de comble. Le pavillon latéral ouest, à une travée, est surélevé d'un étage. Maçonnerie enduite avec encadrements de baies, bandeaux horizontaux, pilastres, corniches, lucarnes en pierre de taille de granite.","habitants":"Kernivinen; Famille de Jacques Lalau de Keraly\r\n        \r\n        \"","divers":"A   Bubry  gps 47° 57' 52\" nord, 3° 10' 19\" ouest château de Kernivinen","gps":"","images":["../../jctruffet.com/image/image_56/56_Kernivinen_1.jpg","../../jctruffet.com/image/image_56/56_Kernivinen_2.jpg"]},"Consult_chateau_formulairece00":{"id":"Consult_chateau_formulairece00","dept":"56","canton":"Ploërmel","commune":"Taupont","nom":"Lambilly","type":"Château","periode":"XVII","histoire":"LAMBILY, c'était le siège de la principale seigneurie de la paroisse, qui avait haute, moyenne et basse justice. Le domaine est dans la même famille de Lambilly depuis, au moins, l'an 1180  (Payen de Lambilly). Elle a produit un Croisé en 1248, un chambellan du duc de Bretagne, en 1415, Jean 1° de Lambilly est nommé grand chambellan   (officier principal chargé du service intérieur), premier écuyer (intendant général des écuries) et gentilhomme de la maison.   En 1693 Pierre  devint  lieutenant des Maréchaux de France. En 1695 Pierre-Joseph est reçu page du roi Louis XIV et nommé en 1707 conseiller au parlement de Bretagne, et trois pages du roi de France entre 1695 et 1721.","architecture":"LAMBILY, la seigneurie de Lambilly était la plus ancienne et la principale de Taupont.  Elle possédait haute, moyenne et basse justice.  Le moine Bily y fonda à la fin du IX°siècle un lann (monastère), le lann de bily.  En 1248, nous découvrons un de Lambilly qui accompagne Saint Louis à sa croisade. Le château est  reconstruit vers la fin du XIXe siècle. Il appartient toujours à la famille de Lambilly.  Edifice de plan allongé, composé d'un corps principal rectangulaire à travées ordonnancées encadré d'une chapelle à abside polygonale à l'est et d'un corps de bâtiment à l'ouest. La façade nord donne sur les bâtiments des communs, la façade sur le parc. Château construit au XVIIe siècle ; chapelle et partie gauche du logis de la deuxième moitié du XIXe siècle, vitrail par Meuret et Lemoiné en 1877, date portée ; croix monumentale du XVIe siècle.","habitants":"famille de Lambilly\r\n        \"","divers":"A Taupont gps 47° 57' 34\" nord, 2° 26' 15\" ouest; Lambily","gps":"","images":["../../jctruffet.com/image/image_56/56_Lambilly_1.jpg","../../jctruffet.com/image/image_56/56_Lambilly_2.jpg","../../jctruffet.com/image/image_56/56_Lambilly_3.jpg"]},"Consult_chateau_formulaireb5d7":{"id":"Consult_chateau_formulaireb5d7","dept":"56","canton":"Gourin","commune":"Langonnet","nom":"Langonnet","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux à Langonnet ; Langonnet , Keraudrenic, Kermain et les manoirs de Bourlogot et de Gouleis.                                                   KERAUDRENIC  Édifice situé sur le site d'une ancienne seigneurie ayant appartenu à l'abbaye cistercienne de Langonnet et dont les terres furent vendues nationalement à la Révolution. Par la suite, la demeure actuelle, construite à la fin du XIXe siècle, appartint à M. Charles Michel, maire de Langonnet, qui légua le château à la commune en 1959. Actuellement, il abrite le siège d'un élevage de poneys Welsh, avec manège couvert, cross et carrières,  centre équestre.                                                                                                 KERMAIN,  le manoir actuel a été construit au XVIe siècle, alors que les seigneurs du lieu délaissaient la motte castrale voisine, le manoir de Kermain (XVI-XVIIe siècle). La seigneurie qui avait droit de haute justice est détenue par la famille Kermain (en 1426), par la famille Tinmiel ou Touësnel (en 1448) et par la famille Lopriac (entre 1481 et 1780). Il possédait autrefois une chapelle privative ; Les façades et toitures sont inscrites, à l'exception des communs, au titre des monuments historiques par arrêté du 2 février 1980. Le manoir est constitué d'une cour entourée de plusieurs bâtiments: logis au sud encadré de dépendances et une chapelle au nord. Le logis possède une belle tour d'escalier circulaire en demi-hors-uvre au milieu de sa façade.","architecture":"BOURLOGOT, manoir , un ancien presbytère cité dès 1448. Le logis sud date de 1656. Il a été pillé par les chouans puis reconstruit. Il sert à nouveau de presbytère entre 1808 à 1888.\r\nGOULEIS, le manoir du  XVIIe siècle. Il porte trois dates : 1686 (sur fenêtre du deuxième niveau), 1693 (sur le cadran solaire de la cheminée) et 1694 (sur la lucarne). On y voit un cadran solaire. Le puits est daté de  1866 .\r\nKERAUDRENIC,   château construit entre 1893 et 1897, dont les plans ont été dessinés par le père Le Bot. La seigneurie appartenait jadis à l'abbaye cistercienne de Langonnet.","habitants":"Kéraudrenic;  M. Charles Michel,\r\n        \"","divers":"A Langonnet gps      48° 06' 23\" nord, 3° 29' 32\" ouest; Langonnet, Kermain; manoir de Bourlogot, de Goudéis et de Keraudernic","gps":"","images":["../../jctruffet.com/image/image_56/56_Langonnet_1.jpg","../../jctruffet.com/image/image_56/56_Langonnet_2.jpg","../../jctruffet.com/image/image_56/56_Langonnet_3.jpg","../../jctruffet.com/image/image_56/56_Langonnet_4.jpg"]},"Consult_chateau_formulaireb391":{"id":"Consult_chateau_formulaireb391","dept":"56","canton":"Hennebont","commune":"Languidic","nom":"Languidic","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Languidic; Kerroux et Kerveno.    Plusieurs châteaux de Kerrous (XIXe siècle),  du Quellenec (XVe siècle-XVIIIe siècle)  La Forest (XVIIe?-XIXe siècles). Ce dernier a peut-être appartenu aux ducs de Bretagne ou seigneurs du Léon .                                                                LA FOREST, construit vers 1625, achevé vers 1692, L'édifice de plan régulier se compose d'un étage carré, escalier dans-oeuvre, le gros oeuvre en granite, élévations ordonnancées, surmontés de toit à longs pans ; croupe et noue recouverts d'ardoises. C'était autrefois la principale seigneurie de Languidic. On prétend qu'elle a appartenu au duc de Bretagne Jean 1er (1237-1286). En 1400, la Forest qui avait haute, moyenne et basse justice, était à une famille qui en portait le nom et qui possédait dans la même paroisse les maisons de Kerbrevet et Sebrevet, qui possédaient également une haute, moyenne et basse justice. Cette famille se fondit vers 1538 dans les Kermavan ou Carman.                                                                                                                               KERROUX,  de 1850-1854), propriété de la famille Bouays de Couebouc  L'édifice date dans le troisième quart du XIXe siècle, il est situé à proximité de la rive gauche du Blavet. Il appartient au comte Yves du Bouays de Couesbouc. Edifice de plan massé cantonné de quatre tours aux angles ; le corps principal comporte trois travées. La façade principale est marquée par une travée centrale forte (perron et ornementation plus dense) est encadrée de deux tours polygonales couvertes de hautes toitures. Les deux tours arrières sont rondes et crénelées; un corps en appentis est construit entre. L'élévation est en maçonnerie enduite avec encadrement de baies, corniche et éléments décoratifs de style néo-Renaissance en pierre de taille de calcaire.","architecture":"KERVENO, du XVIIe siècle, propriété de la famille Lantivy, puis de la famille Angier de Lohéac. Ce château possédait autrefois une chapelle privée   parfois dénommée Kervenaux. Actuellement c'est la propriété de Mme Angier de Lohéac qui y réside. Une très belle façade du XVIIe siècle, avec portes cochère et piétonne, a souffert de la tempête de 1987. Cette partie qui constitue les communs, est suivie d'un corps de logis en équerre, en bon état, précédé de jardins en terrasse. L'ensemble forme une agréable et intéressante résidence, visible extérieurement, à 2 km de Languidic l'ancien château de KERCADIC de 1546, propriété de la famille Cadeville en 1789. Il ne subsiste, aujourd'hui, qu'une simple ferme ;  l'ancien château de la VIGNE  de 1380,  siège de la seigneurie de la Vigne, avec droit de haute, moyenne et basse justice. Propriété de la famille Baud (en 1400), puis de la famille Marboeuf. Près du château, aujourd'hui en ruine, se trouvait autrefois la chapelle Saint-Aubin (mentionnée dans un titre de 1527) ; l'ancien château de SPINEFORT de 1342. Ancien château fort ayant haute, moyenne et basse justice. Propriété de la famille Spinefort (citée au XIVe siècle), puis de la famille Marboeuf. Aujourd'hui, il ne subsiste que quelques ruines du château. On trouve à proximité de l'ancien château une fontaine dédiée à saint Aubin .","habitants":"La foret; famille Cadeville                                                     Kerroux; comte Yves du Bouays de Couesbouc.           Kerveno; famille Lantivy\r\n        \"","divers":"Château de la Forest, de Languidic, gps 47° 50' 03\" nord, 3° 09' 243 ouest de Kercadic grav-1-2-3 de  Kerroux de Kernevo grav-4 de la vigne et Spinefort.","gps":"","images":["../../jctruffet.com/image/image_56/56_Languidic_1.jpg","../../jctruffet.com/image/image_56/56_Languidic_2.jpg","../../jctruffet.com/image/image_56/56_Languidic_3.jpg","../../jctruffet.com/image/image_56/56_Languidic_4.jpg"]},"Consult_chateau_formulaire5b78":{"id":"Consult_chateau_formulaire5b78","dept":"56","canton":"Pluvigner","commune":"Landévant","nom":"Lannouan","type":"Château","periode":"XVIII","histoire":"LANNOUAN, la seigneurie de Lannouan ou Lanuan fut le berceau d'une famille de ce nom,  Hervé Lanuan en 1664, avant d'appartenir aux Keraudren, puis par alliance aux Kermeno et enfin en 1701 aux Penien. En 1778, le château était au sieur du Garo, ainsi que sa chapelle domestique. Plus récemment il fut au comte de Beaumont et depuis 1981 à l'Athens Drearn Cornpania Naviera. La demeure a souffert de l'occupation allemande en 1942. Il existait à Lannouan un édifice du XVe siècle qui fit place au château actuel au début du XVIIIe siècle,","architecture":"LANNOUAN, l'édifice traverse tranquillement le temps dans son bois dissimulateur, derrière un portail imposant digne des belles demeures et des murs d'enceinte de vieilles pierres recouvertes par la végétation. Schématiquement, il se situe entre la route de Baud et celle de Pluvigner, au Nord-Est de la commune, une rue portant son nom. Le château a fière allure, bâti à proximité d'un étang et au milieu d'un parc boisé de 10 hectares, qui a beaucoup souffert lors de la tempête d'octobre 1987, ce parc est clos d'un haut mur de pierre. Le château de Lannouan possède de très belles caves voûtées.","habitants":"Famille de Lannouan\r\n        \r\n        \"","divers":"Château de Lannouan gps 47° 46' 21\" nord, 3° 06' 24\" ouest à Landévant","gps":"","images":["../../jctruffet.com/image/image_56/56_Lannouan_1.jpg","../../jctruffet.com/image/image_56/56_Lannouan_2.jpg"]},"Consult_chateau_formulaire9c49":{"id":"Consult_chateau_formulaire9c49","dept":"56","canton":"Ploërmel","commune":"Lanouée","nom":"Lanouée","type":"Château","periode":"XIX-XX","histoire":"Trois châteaux à Lanouée dont les Forges, Aulnais, Tertraie et Quelneuf.                                                                                                               FORGES de LANOUEE, il s'agit de la transformation d'un site industriel en un domaine agricole et paysager autour de l'ancienne maison du maître des forges construite dans les années 1760, et transformée en château néo-Louis XIII au XIXe siècle. Un premier agrandissement en profondeur et en longueur s'est fait dans les années 1850, auquel ont été ajoutés deux pavillons latéraux symétriques à la fin du siècle. A l'intérieur les pièces de réception et salle à manger se répartissent autour d'un hall central dans lequel se place un escalier en bois. En 1888, l'architecte paysagiste Killian dessine un projet de jardin qui ne sera pas réalisé. Un jardin en parterres de broderies de buis est réalisé pour donner du travail aux ouvriers demeurés sans emploi. L'ensemble est complété par un vaste bassin bordé d'un nymphée, l'ancien haut fourneau sert de réservoir d'eau. La chapelle est agrandie en 1895 et prend un plan en croix latine.Au début du XXe siècle, le site industriel est reconverti en domaine agricole avec la construction d'une cité ouvrière et de bâtiments annexes ; le jardin et son nymphée sont aménagés à cette période (vers 1910), le haut-fourneau étant transformé en château d'eau. En 1932, M. Levesque installe une usine hydro-électrique à l'emplacement de l'ancien moulin des forges. La construction du château est antérieure à 1883 et remonte probablement au début du 3e quart du XIXe siècle (vers 1860), avant la fermeture des forges en 1864.","architecture":"FORGES, l'édifice affecte un style néo-Louis XIII. Il s'ouvre sur un vaste vestibule central, où trône l'escalier en bois desservant les étages, autour duquel sont disposés les salles de réception et la salle à manger, la cuisine étant reléguée au sous-sol.                                                                                               \r\nAULNAIS,  manoir du XVII-XVIIIe siècle. Siège d'une seigneurie ayant appartenu successivement aux familles Keradreux (ou Kerardreux ou Caradreux), Lantivy, Le Mintier. Le manoir possédait jadis une chapelle privée, datée du XVIIe siècle et dédiée à Notre-Dame.\r\n TERTRAIE ou La Tertrée du XVIIe siècle. Siège de la seigneurie de la Tertraie qui possédait autrefois un droit de moyenne justice et qui appartient successivement aux familles Boteuc, Bot des Timbreux et La Landelle. On y trouve une chapelle privée .\r\n QUELNEUF, manoir ou Queleneuf du XVe et XVIe siècles. Siège d'une seigneurie qui possédait autrefois un droit de moyenne et basse justice. Propriété successive des familles Guitté (en 1410), Tiercent (en 1780) et Pocard. Ce manoir a été brûlé pendant la Révolution, puis restauré au XIXe siècle.   La seigneurie était aussi parfois désignée sous le nom de Quelenneuc. Elle avait moyenne et basse justice. Le manoir de Quelneufl était en 1410, à Jean Guitté et en 1780 à M. de Tiercent. C'est maintenant la propriété de M. Pocard. Le manoir actuel date du XVe siècle. Il fut brûlé pendant la Révolution puis restauré à une date inconnue. Il a été habité jusqu'en 1974. Construit en bel appareillage, avec fenêtres à meneaux, il possédait une tour à l'arrière, maintenant ruinée. L'intérieur est garni de belles boiseries et de grandes cheminées de granit.","habitants":"M. Levesque                                                                                Aulnais;  famille Keradreux                                                         Tertraie; famille Boteuc                                                         Quelneuf;  famille Tercent                                           \r\n        \"","divers":"A Lanouée gps   48° 00' 10\" nord, 2° 34' 50\" ouest ; les Forges, grav 1-2-3-4-5. Aulnay Tertraie grav-5-6 et Quelneuc. Pas de grav pour ces derniers","gps":"","images":["../../jctruffet.com/image/image_56/56_Lanou%c3%a9e_1.jpg","../../jctruffet.com/image/image_56/56_Lanou%c3%a9e_2.jpg","../../jctruffet.com/image/image_56/56_Lanou%c3%a9e_3.jpg","../../jctruffet.com/image/image_56/56_Lanou%c3%a9e_4.jpg","../../jctruffet.com/image/image_56/56_Lanou%c3%a9e_5.jpg","../../jctruffet.com/image/image_56/56_Lanou%c3%a9e_6.jpg"]},"Consult_chateau_for
