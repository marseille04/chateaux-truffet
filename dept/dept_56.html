mémorial des fusillés du Fort Penthièvre se dresse à lentrée de la presquîle de Quiberon, sur le territoire de la commune de Saint-Pierre-Quiberon. Intégré au dispositif du Mur de lAtlantique, ce fort se trouvait dans le périmètre de la Poche de Lorient  tenue par la Wehrmacht jusquau 7 mai 1945, date de la signature de la capitulation de lAllemagne nazie à Reims (Marne) et de la reddition à Étel des troupes allemandes qui tenaient la Poche de Lorient. Le Fort Penthièvre a servi jusquà cette date de lieu de détention et dexécution.","architecture":"Le fort PENTHIEVE du XVIIIe siècle est constitué d'un bastion flanqué de deux ailerons, un tracé désapprouvé en 1747 par le Directeur des Fortifications de Bretagne Frézier et jugé \"bizarre\" par les ingénieurs postérieurs. Ses escarpes sont en maçonnerie de pierres sèches, il n'y a pas de véritable fossé. De ce fort, seul le magasin à poudre a subsisté. Le fort actuel, qui doit son emplacement et sa forme générale au XVIIIe siècle, ne garde cependant que la trace des travaux du XIXe siècle.\r\nLe fossé est profond de sept mètres et large de huit mètres, et précédé d'un chemin couvert. Il est flanqué depuis l'escarpe et par des casemates de tir établies sous la contrescarpe. L'entrée se fait via un pont-levis. La caserne défensive est adossée à l'escarpement rocheux à la gorge du fort. Elle sert de réduit au reste de l'ouvrage  est séparée par deux coupures, l'une d'elles franchissable par un pont-levis. L'intérieur du bastion principal est actuellement occupé par les casemates et les massifs terrassés des emplacements de tir aménagés dans les années 1880. Un autre emplacement de tir avec traverse situé dans la partie nord du fort a disparu. Le magasin à poudre de 1885 subsiste sous le front nord-ouest. Les constructions allemandes et celles liées au centre d'entraînement actuel s'intègrent dans les espaces du XIXe siècle.","habitants":"Mémorial militaire\r\n        \"","divers":"Le fort de Penthiève à Saint-Pierre de Quiberon gps 47° 31' 06\" nord, 3° 07' 56\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Penthi%c3%a8ve_Fort_1.jpg","../../jctruffet.com/image/image_56/56_Penthi%c3%a8ve_Fort_2.jpg","../../jctruffet.com/image/image_56/56_Penthi%c3%a8ve_Fort_3.jpg"]},"Consult_chateau_formulairee4cd":{"id":"Consult_chateau_formulairee4cd","dept":"56","canton":"Grand-Champ","commune":"Plaudren","nom":"Plaudren","type":"Château","periode":"XV-XVI-XIX","histoire":"Trois châteaux à Plaudren; Nedo, Kergoler et Kergurion.                    NEDO,  la seigneurie appartint aux Lorveloux, puis aux Giquel, qui y avaient un manoir. La chapelle domestique, dédiée à Saint Pierre, date de 1688. Le château de style néo-gothique a été commencé en 1881 et terminé en 1886. Le baron Lemarie de la Gatinerie en est maître de l'ouvrage et architecte. L'édifice se compose de deux étages carrés et d'un étage de comble, le gros-oeuvre en granite, pierre de taille et moellon, type de couverture : toit à longs pans ; croupe ; noue ; pignon découvert; toit conique et toit polygonal, recouverts d'ardoise et zinc en couverture. Depuis 1920, le lieu appartient à la famille Kersabiec. Le moulin du Nédo se trouve à proximité, sur le ruisseau de Kergolher.                                                                                 KERGOLER, le manoir de Kergohler du XV-XVIe siècle. Siège d'une ancienne seigneurie appartenant successivement aux familles La Nas (Lucas Nas en 1464, et Jehan Nas en 1481), Le Clerc, Dibart et Cassel. Le manoir est remanié aux XVIe - XVIIe et XIXe siècles. On y trouve un colombier qui date du XVIIe siècle. L'ancienne chapelle privée, qui date de 1687, est dédiée à la Sainte-Famille. Propriété de la famille Le Moué (au XIXe siècle), puis du marquis de Cussé (vers 1870) et de la famille Franco de Vannes.","architecture":"NEDO, édifice de plan massé dissymétrique au sud ; les communs sont situés au nord du logis. Rez-de-chaussée fortement surélevé au-dessus d'un niveau de sous-sol, un étage carré, 2 étages de comble. Elévation en moellon de granite régulièrement appareillé avec encadrements de baies, bandeaux, lucarnes, avant-corps d'entrée, lucarnes en pierre de taille. Sur le site d'un ancien manoir, un château néogothique est commencé en 1881 et terminé en 1886. Baron Lemarie de la Gatinerie maître de l'ouvrage et architecte.                                                                                                                                                       KERGURION, le lieu est habité depuis l'occupation romaine (Camps de Kerfloch, Kerifaux et Kerrio). Son nom vient de Ker en guerrion: village des cordonniers. La seigneurie appartenait à Gilles d'Auray en 1420. Acquise ensuite par la famille Derval, elle est cédée en 1742 à la famille La Choue, qui portait d'argent à trois chenettes de sable. Vendu nationalement pendant la Révolution, le domaine est partiellement acquis par un marchand drapier de Vannes, qui fait assècher l'étang voisin. Par la suite les bâtiments sont rachetés par la famille La Choue, qui les transmet à leur neveu Caris de Montesfort (qui en est toujours propriétaire). Les anciens bâtiments étaient ruinés dès le XVe siècle. Reconstruits, ils seront à nouveau très remaniés entre 1742 et 1763 par la famille La Choue, qui conserve l'ancien rez-de-chaussée.","habitants":"Nédo; famille de Giquel                                                            Kergoler; Famille de La Nas                                      Kergurion; Famille de la Choue,\r\n        \"","divers":"à Plaudren gps 47° 46' 47\" nord, 2° 41' 29\" ouest; Nedo grav 2-3-4, Kergoler grav-1  et Kergurion grav-5","gps":"","images":["../../jctruffet.com/image/image_56/56_Plaudren_1.jpg","../../jctruffet.com/image/image_56/56_Plaudren_2.jpg","../../jctruffet.com/image/image_56/56_Plaudren_3.jpg","../../jctruffet.com/image/image_56/56_Plaudren_4.jpg","../../jctruffet.com/image/image_56/56_Plaudren_5.jpg","../../jctruffet.com/image/image_56/56_Plaudren_6.jpg"]},"Consult_chateau_formulaireceda":{"id":"Consult_chateau_formulaireceda","dept":"56","canton":"Séné","commune":"Theix","nom":"Plessis_Josso","type":"Château","periode":"XVI-XVI-XVII","histoire":"PLESSIS-JOSSO, bâti vers 1330 par Sylvestre Josso, écuyer ducal, qui épousa  Martine de Carré pendant la période agitée de la guerre de Succession de Bretagne, l'édifice passa par alliance dans la puissante famille Rosmadec et servit de résidence à des personnages importants tels qu'un évêque, des sénéchaux et des gouverneurs de villes bretonnes. A la fin du XVIIIe siècle, le château devint la propriété de la famille Le Mintier de Léhélec qui l'habite encore aujourd'hui. Le château du Plessis-Josso, comme tous les manoirs de Bretagne au XVe siècle, avait une fonction agricole à la tête d'un domaine de 1500 hectares s'étendant sur plusieurs paroisses et une population de plus de 500 habitants. La propriété possédait plusieurs moulins, des fours, une chapelle et un port privé dans le golfe du Morbihan. Son rôle était donc à la fois, politique, économique et administratif, appartient aujourd'hui à madame Emmanuel-Salomon-Legagneur née Eliane le Mintier de Léhélec.","architecture":"PLESSIS-JOSSO, siège d'une ancienne et importante seigneurie, au XIVe siècle les Josso entreprennent la construction du manoir, réalisent le type complet du château du XVIe siècle par l'agrandissement du corps de logis, il est l'un des rares à avoir conservé son enceinte extérieure. L'édifice à plan rectangulaire, inclus dans une enceinte fortifiée présente une tourelle polygonale sur sa façade sud, elle est ouverte de lucarnes triangulaires, l'une a gardé sa décoration gothique et ses fenêtres à meneaux de pierre et à linteaux en accolade. La tourelle d'escalier polygonale protège la porte d'entrée entourée d'un arc brisé qui retombe sur des colonnettes. A l'est du bâtiment se trouve un pavillon carré ajouté sous Louis XIII. A la fin du XVIIe siècle construction du pavillon d'angle.  De l'ancienne avenue, on aperçoit la haute et longue courtine à parapet crênelé qui se développe depuis l'étang jusqu'à l'entrée. Du côté de l'étang, la tour d'angle flanque les courtines du sud et de l'ouest, à l'est le mur a disparu. Le moulin du XVIIIe siècle, transformé en habitation, a conservé sa distribution d'époque et la circulation verticale s'effectue à l'aide de petits escaliers en bois. Les murs qui clôturent les anciens jardins à l'est constituent une seconde enceinte fortifiée. Éléments protégés MH : le château (à l'exception des parties classées) : inscription par arrêté du 16 février 1929. Les façades et la toiture sur cour du château proprement dit , les façades et les toitures du pavillon du XVIIe siècle , la façade sur cour du bâtiment sud-est des communs , le rempart crénelé au sud-est et au sud-ouest, classement par arrêté du 23 avril 1981. Le moulin et la grange sur l'ancienne aire à battre pour leurs façades et toitures, les murs ouest et nord de l'enceinte fortifiée du château, les murs de clôture des anciens jardins à l'est, inscription par arrêté du 9 novembre 2001.","habitants":"Famille de Sylvestre Josso, et famille Rosmadec\r\n        \"","divers":"Château de Plessis-Josso à Theix-Noyalo   Gps 47° 37' 47\" nord, 2° 39' 17\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Plessis_Josso_1.jpg","../../jctruffet.com/image/image_56/56_Plessis_Josso_2.jpg","../../jctruffet.com/image/image_56/56_Plessis_Josso_3.jpg","../../jctruffet.com/image/image_56/56_Plessis_Josso_4.jpg"]},"Consult_chateau_formulaired5a7":{"id":"Consult_chateau_formulaired5a7","dept":"56","canton":"Moréac","commune":"Pleucadeuc","nom":"Pleucadeuc","type":"Château","periode":"XV-XVIII-XIX","histoire":"cinq châteaux à Pleucadeuc; Combe d'en Haut, Grouays, le Morinais,   Prévostais  et Villeneuve.                                                                                                       COMBE d'en HAUT, c'était le siège d'une seigneurie mentionnée depuis le XVe siècle, le château de la Combe-d'en-Haut est reconstruit  au XIXe siècle. Le château avec son plan d'eau et entouré d'un beau parc appartient actuellement à M. Fleury.                                                                                             VILLENEUVE, la seigneurie appartint un moment aux Henry de Bohal; elle avait château et chapelle privée. En 1426, le lieu était aux Perrot Boulebart, au XVIe siècle aux Careil, au XVIIe siècle aux Séréac, puis aux du Bot et aux Mahé. En 1824, le domaine se compose d'un château avec étang, chaussée, avenue, jardin, futaie, colombier, parc, tour, chapelle, écurie et cour; il appartient à Louis Joseph Hyacinthe Ponsard. Le château de Villeneuve est reconstruit à partir de 1923 par l'architecte parisien Chatenay pour M. de Sivry, avec des matériaux provenant de son château de Trégoët, et Le Cours, les travaux de décoration intérieure se poursuivent jusqu'en 1926. Il est depuis dans sa famille représenté par le comte Philippe de Chabannes actuellement.  Villeneuve fut occupé par les allemands durant la dernière guerre mondiale. Il est, avec son étang, entouré d'un parc de 160 hectares, clos par un mur de 5 km de longueur.","architecture":"GROUAYS, la seigneurie était jadis aux Bayon, puis aux Henry. La famille du Bot y édifia vers 1760 un relais de chasse. La demeure fut rachetée en 1860 par la famille de Montfort qui y ajouta deux ailes et des dépendances.                                                                                                                                                                La MORINAIS, sège d'une ancienne seigneurie qui appartenait jadis aux La Houssaye. Le château de la Morinais figure sur le cadastre de 1824 ; il s'agit  d'un manoir entouré d'une cour, de communs, d'un colombier et d'un jardin. Le domaine est acheté en 1870 par M. Cossé qui y fit édifier le château actuel. Chapelle datant du XIXe siècle. Edifice de plan rectangulaire, dont les extrémités en légère saillie forment de faux pavillons. Elévation à sept travées; maçonnerie enduite avec encadrements de baies, chaînes d'angle, bandeaux horizontaux en pierre de taille, la travée centrale de la façade principale et celles des façades latérales sont marquées par un fronton cintré à lucarne pendante.                                                                          PREVOSTAIS, le manoir de la Prévostais (1905). Encore surnommé Prévôtaye ou Prévostais ou Provotais. Propriété des familles Chasteigneraye (Houisete de la Chasteigneraye en 1427), Sérent et La Houssaye. Lédifice actuel a été bâti par la famille Cossé.","habitants":"Combe; Famille de M. Fleury                                     Villeneuve; famille des aux Mahé                                            Grouays: famille de Montfor                                                     Morinais; famille de la Houssaye                              Prévostais; famille de la Chasteigneraye\r\n        \"","divers":"à Pleucadeuc gps 47° 45' 35\" nord, 2° 22' 29\" ouest grav-1; Combe d'en Haut-grav-2, Grouays grav-3, le Morinais grav-4 Prévostais grav_5-6 et Villeneuve grav 7-8-9.","gps":"","images":["../../jctruffet.com/image/image_56/56_Pleucadeuc_1.jpg","../../jctruffet.com/image/image_56/56_Pleucadeuc_2.jpg","../../jctruffet.com/image/image_56/56_Pleucadeuc_3.jpg","../../jctruffet.com/image/image_56/56_Pleucadeuc_4.jpg","../../jctruffet.com/image/image_56/56_Pleucadeuc_5.jpg","../../jctruffet.com/image/image_56/56_Pleucadeuc_6.jpg","../../jctruffet.com/image/image_56/56_Pleucadeuc_7.jpg","../../jctruffet.com/image/image_56/56_Pleucadeuc_8.jpg","../../jctruffet.com/image/image_56/56_Pleucadeuc_9.jpg"]},"Consult_chateau_formulaire98a7":{"id":"Consult_chateau_formulaire98a7","dept":"56","canton":"Ploemeur","commune":"Ploemeur","nom":"Ploemeur","type":"Château","periode":"XVI-XVIII-XIX","histoire":"Deux châteaux dans cet article à Ploemeur dont de Soye et Terplus le fort dit fort -Bloqué.                                                                                                                 De SOYE, tout a commencé lorsque Laurent Esnoul des Châtelets, maire de Lorient de 1774 à 1789, achète, le 26 juillet 1782, au prince de Rohan, les moulins de Soye et d'Étang-Biais, ainsi que les chaussées, écluses et le fonds de la tenue de Soye, et deux ans plus tard, il acquiert des époux Le Ricousse les bâtiments de la terre de Soye. En 1786, il fait construire le château actuel et sa superbe orangerie. Par mariage, Soye est apporté à Claude Henry Dupuy de Lôme en 1837, mais il l'habitait auparavant puisque son fils, le célèbre ingénieur naval, y est né le 15 octobre 1816. Soye est vendu à M. Terrier de Laistre en 1842, et par alliance il passe, en 1874, à Louis Charles de Solminihac. Les descendants de celui-ci le cèdent, en 1925, à la Ville de Lorient, qui le possède depuis lors. Affecté à l'origine aux loisirs de plein-air, le domaine fut transformé en 1945 en une cité de relogement pour les sinistrés de la ville qui ces derniers on fait restaurer l'orangerie afin d'y accueillir les centres aérés. D'autres projets sociaux concernant le château et l'ancienne ferme sont à l'étude.","architecture":"FORT-BLOQUE,  l'ouvrage a été construit en 1748,   le petit fort de Kéragan, plus connu sous le nom de Fort Bloqué, c'est finalement un couple de commerçants installé à Caen qui vient d'acheter le Fort Bloqué, planté sur un îlot rocheux, au large de Ploemeur, appartenait depuis quelques années à un propriétaire allemand, du nom de Wolf.   Le domaine habitable est répartis entre deux bâtisses : le fort (quatre pièces et une cuisine) et une petite maison bâtie, dans les remparts (trois pièces, une cuisine).                                                                                                                                  TER, la seigneurie du Ter, du Terre ou du Tertre, appartenait à Louis Le Terre en 1448. Le manoir du lieu était alors habité par Geoffroy Thoumelin. Il passa aux Le Gouvello au XVIIe siècle : en 1642, à Vincent Le Gouvello, sieur du Terre et de Rosgrand, puis au XVIIIe siècle, aux Léziard : Jean Léziard est sieur de Terre en 1707. Par mariage, le Ter revient, en 1745, à Armand François de La Pierre, sieur de Talhouët, puis, en 1758, et toujours par mariage, à Henri Dubois de La Rongère, qui fait carrière dans l'armée, et le conserve jusqu'en 1783. Le château, qui a remplacé le vieux manoir, avait sa chapelle privée. Il est situé à la limité du Grand Bois, non loin de la rive droite de l'Etang du Ter, à l'extrémité d'une superbe avenue bordée de grands arbres,  abrite l'école secondaire privée N-D du Ter, des frères des écoles chrétiennes.","habitants":"Fort; de Wolf                                                                          De Soye; Famille du prince de Rohan                                            Ter; famille de Henri Dubois de La Rongère\r\n        \"","divers":"à Ploemeur ; la Soye grav-5-6                 gps 47° 44' 31\" nord, 3° 24' 37\" ouest et Ter grav 7-8                          gps 47° 43' 56\" nord, 3° 24' 38\" ouest et le fort-Bloqué-grav-1-2-3-4.","gps":"","images":["../../jctruffet.com/image/image_56/56_Ploemeur_1.jpg","../../jctruffet.com/image/image_56/56_Ploemeur_2.jpg","../../jctruffet.com/image/image_56/56_Ploemeur_3.jpg","../../jctruffet.com/image/image_56/56_Ploemeur_4.jpg","../../jctruffet.com/image/image_56/56_Ploemeur_5.jpg","../../jctruffet.com/image/image_56/56_Ploemeur_6.jpg","../../jctruffet.com/image/image_56/56_Ploemeur_7.jpg","../../jctruffet.com/image/image_56/56_Ploemeur_8.jpg"]},"Consult_chateau_formulaire10f7-2":{"id":"Consult_chateau_formulaire10f7-2","dept":"56","canton":"Gourin","commune":"Ploerdut","nom":"Ploeren_Ploerdut","type":"Château","periode":"XV-XVIII-XIX-XX","histoire":"Six Châteaux à Ploedut; Mezo, Garo, Kerservant, Launay,  Kerverec et Porh-Priando.                                                                                                 MEZO  le château du Mézo ou Maezo du XIXe siècle, propriété successive des familles Le Douarain du XVe au XVIIe siècle), Goyon de Vaudurand (ou Gouyon), Felix-André Lafosse (en 1855) et Cremer. Propriété de Perrot Kermarquer en 1427. Première mention du lieu en 1427, appartenant à Perrot Kermarquer. Château actuel construit dans la deuxième moitié du XVIIIe siècle, les corps latéraux datant  du début du XIXe siècle. Escalier de la fin du XIXe siècle. Communs et serre construits dans la deuxième moitié du XIXe siècle (les communs Est inserrent un bâtiment plus ancien). Remise et logement, à l'ouest construits avant 1852. Pierre d'assise de rampant sculptée, provenant de la chapelle détruite datant peut être du XVIe siècle, serre en rez-de-chaussée à toit bombé. Le château est actuellement à M. Georges Cremer.                                                                                                                                                       GARO, encore visible en 1863. On y trouvait les écussons de Kermeno et de Garo. Il ne subsiste aujourd'hui qu'une cave et un four à pain. La famille du Garo est citée au XIe siècle. Propriétaire de Pierre du Garo en 1427. Son château et sa seigneurie sont vendus vers 1500 à la famille Kermeno de Moréac.                                                                                 PORH-PRIANDO, siège de l'ancienne seigneurie de Propiando appartenant successivement aux familles Baud, Launay et Touzé. Propriété de Guillot Droillard et Jehan Le Pil en 1427. Le manoir possédait autrefois une chapelle privée.","architecture":"KERSERVANT, à l'époque féodale, plusieurs seigneuries règnent sur le territoire de Ploërdut, dont celle de Lorans Le Moyne, demeurant au manoir de Barac'h et exécuté à Nantes en 1720. Un petit château fut construit par M. de Pontbriand vers 1890 à quelques centaines de mètres au Nord-Ouest du manoir du même nom. Blotti au milieu des fleurs et d'un bois, il appartient maintenant à M. Henri d'Aubert.                                                                                                                       LAUNAY, le château a été reconstruit au début du XXe siècle à l'emplacement d'un bâtiment datant probablement des XVIIIe et XIXe siècles, ce dernier a été vendu en 1909 par Henri Edouard Jonglez de Ligne à M. de Monti de Rézé, qui le remplace par une construction néo-XVIIIe. Des vestiges d'un ancien manoir subsistent dans le parc. Le château de Launay est un pastiche d'architecture de style Louis XVI construit , par ses proportions monumentales, il est l'une des demeures de ce type les plus remarquables à l'échelle régionale. Si le grand hall d'entrée avec péristyle et escalier est conservé, le décor intérieur semble avoir été très épuré à l'occasion d'un réaménagement récent. Monsieur Bopart l'a transformé en chambres d'hôtes.                                                                                                    KERVEREC du XV-XVIe siècle, propriété de la famille Kerverec (Olivier Kerberrec ou Kerverret en 1427, Guillaume de Kerverrec en 1481), de la famille Collédo (de 1522 à 1611), de Paul Tristan Joannic, seigneur dAssénac (en 1683), puis de la famille Rougé (XVIIIe siècle) .","habitants":"Mezo; famille  de Perrot Kermarquer                                          Garo ; famille de Kermeno de Moréac                                              Porh-Priando; famille de Guillot Droillard                           Launay; famille de M. de Monti de Rézé                   Kerverec; famille Rougé\r\n        \"","divers":"Quatre châteaux à Ploerdut gps 48° 05' 19\" nord, 3° 17' 14\" ouest grav-1-2-5-8-9 ; Mezo grav-6-7 , Garo, Kerservant grav 3 et Launay-grav-4,  Kerverec.","gps":"","images":["../../jctruffet.com/image/image_56/56_Ploeren_Ploerdut_1.jpg","../../jctruffet.com/image/image_56/56_Ploeren_Ploerdut_2.jpg","../../jctruffet.com/image/image_56/56_Ploeren_Ploerdut_3.jpg","../../jctruffet.com/image/image_56/56_Ploeren_Ploerdut_4.jpg","../../jctruffet.com/image/image_56/56_Ploeren_Ploerdut_5.jpg","../../jctruffet.com/image/image_56/56_Ploeren_Ploerdut_6.jpg","../../jctruffet.com/image/image_56/56_Ploeren_Ploerdut_7.jpg","../../jctruffet.com/image/image_56/56_Ploeren_Ploerdut_8.jpg","../../jctruffet.com/image/image_56/56_Ploeren_Ploerdut_9.jpg"]},"Consult_chateau_formulaire9197":{"id":"Consult_chateau_formulaire9197","dept":"56","canton":"Ploërmel","commune":"Ploërmel","nom":"Ploermel","type":"Château","periode":"XV-XIV-XVII-XX","histoire":"Six châteaux à Ploërmel; Boyac, Ker-Armel, la Motte, Malleville (voir article) st-Malo et Quehéon.                                                                                     BOYAC,  construit dans la première moitié du XVIIe siècle. Le manoir a été acheté en 1826 par l'abbé de la Mennais,  La demeure de plan régulier est composée d'un étage carré, gros-oeuvre; granite, schiste et moellon, élévation à travées surmontée de toit à longs pans, pignon couvert ; toit en pavillon recouverts d'ardoise. Armoiries aux armes de l'abbé de la Mennais. C'était le siège d'une seigneurie citée dès le XIIe siècle. Au XVe siècle, elle appartenait aux Thébaud (1440) aux Luxembourg (1599), puis aux Le Goaesbe de Bellée (famille de magistrats) jusqu'à la Révolution.                                                                                                                 La MOTTE, cette antique demeure daterait du XIVe siècle. En 1480, 1513 et 1600, elle appartenait aux Henry, seigneurs du Quengo. au XVIIIe siècle, elle était aux Fablet, qui se faisaient appeler Fablet de La Motte, ou encore La Motte Fablet. A la Révolution, elle échut aux Portal. Achetée en 1864 par M. Alexis Peschart, notaire, qui la lègue à sa fille Berthet épouse de Me Pelletier, notaire, la demeure passe ensuite à leurs filles, qui la transmettent, en 1978, à M. Jean Bahier, leur cousin. Édifice hétérogène édifié au XVIe siècle; agrandi et remanié aux XVIIIe et XIXe siècles; chapelle datant du XVIIIe siècle, restaurée en 1898, sous le vocable de saint Nicodème. Le bâtiment se compose d'un étage carré, gros oeuvre, en granite, schiste et moellon, type de couverture: toit à longs pans; croupe; toit polygonal; toit conique, couverts d'ardoise.","architecture":"KER-ARMEL, construit entre 1906 et 1908 (date portée sur le logis). L'édifice abrite un hôtel en 1927 avant de devenir une maison de retraite. Edifice de plan allongé composé d'un corps de logis principal encadré de deux pavillons et d'une tour d'escalier dans-oeuvre sur la façade principale. Le château est composé d'un étage carré et un étage de comble, élévation en pierre de taille de granite, surmontée de toit à longs pans; toit à l'impériale et croupe recouverts d'ardoise.                                                                                                                                    QUEHEON,  aux Quéhéon en 1373 et 1495, aux Guiny en 1436, la terre est vendue aux Rogier en 1560. Par alliance elle passe aux Picaud en 1590 et ceux-ci la cèdent, en 1807, aux du Breil de Pontbriand de La Caulnelaye. Château construit au début XVIIe siècle pour les Picaud; pavillons nord et sud construits à la fin du XVIIe ou au début du XVIIIe siècle; dépendances construites fin XVIIIe siècle; chapelle et colombier détruits. Le bâtiment est composé d'un étage carré, le gros oeuvre en granite, schiste et moellon, type de couverture: toit à longs pans toit à longs pans brisés; toit en pavillon; pignon couvert et croupe, recouverts d'ardoise. C'est  actuellement la propriété de la comtesse François de Roquefeuil.                       ST-MALO,  en 1900, le docteur Mesny, fait bâtir le château actuel,  En 1914, le château est racheté par le marquis de La Boessière; en 1934, il appartient à sa fille, marquise de La Bourdonnaye et, depuis 1988, à M. Pierre Simon. Celui-ci a aménagé dans le parc un manège \"Équitation Les Ducs\". Le château de Saint Malo est donc visible, il se trouve à cent mètres du manoir. Le lieu dit Saint Malo est situé au bord de l'étang au Duc, créé vers l'an 1000 par les moines de l'abbaye de Saint Gildas de Rhuys, de Taupont. Les Ducs de Bretagne ont fait construire en cette place un château qui dominait le lac, trois chambres d'hôtes.","habitants":"Boyac; famille de Goaesbe de Bellée                                             la Motte; M. Alexis Peschart,                                                       Queheon: la comtesse François de Roquefeuil.                              St-Malo;  le marquis de La Boessière\r\n        \r\n        \"","divers":"à Ploërmel  gps  47° 55' 57\" nord, 2° 23' 46\" ouest ; Boya Grav-1-2-3,  Ker-Armel- grav-9, la Motte grav-4,  Queheon grav-7-8 , st-Malo grav 5-6.","gps":"","images":["../../jctruffet.com/image/image_56/56_Ploermel_1.jpg","../../jctruffet.com/image/image_56/56_Ploermel_2.jpg","../../jctruffet.com/image/image_56/56_Ploermel_3.jpg","../../jctruffet.com/image/image_56/56_Ploermel_4.jpg","../../jctruffet.com/image/image_56/56_Ploermel_5.jpg","../../jctruffet.com/image/image_56/56_Ploermel_6.jpg","../../jctruffet.com/image/image_56/56_Ploermel_7.jpg","../../jctruffet.com/image/image_56/56_Ploermel_8.jpg","../../jctruffet.com/image/image_56/56_Ploermel_9.jpg"]},"Consult_chateau_formulaire8ad6":{"id":"Consult_chateau_formulaire8ad6","dept":"56","canton":"Guidel","commune":"Plouay","nom":"Plouay","type":"Château","periode":"XV-XVII-XIX","histoire":"Trois châteaux à Plouay, Kredreho, Kersily, Menehouarn, et Kerollin à Lanvaudan.                                                                                                       KREDREHO, le château est dans la même famille depuis 1456, à cette date, Payen de Pluvié acquiert manoir, moulins, étangs et dépendances de Pierre Cadiou. En 1754 Louis I du Botdéru, époux de Catherine de Pluvié, commence à bâtir le château actuel, qui sera achevé par sa veuve en 1784, l'ancien manoir est un élément des communs actuels. Une chapelle privée placée à l'arrière, dessert la demeure, le portail daté de 1789. La famille du Botdéru reste à Kerdreho jusqu'à son extinction en la personne de Victor du Botdéru, député du Morbihan, pair de France. Neveu et nièce héritent : Ernest de Fournas et Paule de Bougainville, petite fille de Louis Antoine de Bougainville, célèbre navigateur. L'actuel propriétaire est l'un de leurs descendants. L'intérieur du château, remanié au XIXe siècle, a été saccagé en 1943 par l'occupant allemand qui, au surplus, l'a vidé de tout son mobilier. Enfin, son allée forestière et son parc ont beaucoup souffert de la tempête de 1987.                                                                       KEROLLIN à Lanvaudan   la seigneurie de Kerollin (Kerolain) était à Jehan Jegado en 1447, au moment où il fut anobli par le duc François 1er de Bretagne. Parmi ses successeurs, notons Jean Jegado qui était lieutenant du Roi à Port Louis en 1614, puis représentant de la Noblesse aux États Généraux tenus à Paris en 1624, et qui mourut en 1640 en son château de Kerollin. A la famille Jegado succédèrent les Bahuno. Il subsiste deux piliers du portail principal, une bâtisse en arc de cercle (qui serait l'entrée d'un souterrain), l'ancienne écurie et quelques ruines de la chapelle.","architecture":"KERSILY, la seigneurie de Kerstilly ou Kersily était à Henry Le Porchien en 1430 et, bizarrement, le manoir a un autre propriétaire au même moment: Jean Rouxeau. En 1481 le lieu était à Guillaume de Kergourhin puis à Annette de Kergourhin en 1514. Par la suite il passa aux Langourlan et, de nos jours à Madame Chenet. Château construit aux XIXe et XXe siècles, peut-être sur un édifice plus ancien, comme le suggère l'implantation des bâtiments. L'analyse du bâti permet de supposer que l'aile ouest a été ajoutée à la fin du XIXe siècle ou au début du XXe siècle à un bâtiment existant construit dans la deuxième moitié du XIXe siècle. Le corps de logis principal de plan allongé, quatre travées régulières, est accosté de pavillons dissymétriques: pavillon rectangulaire au sud-est, aile en retour d'équerre formant saillie au sud-ouest. Les communs sont disposés dans une aile au nord du logis. Elévation en moellon avec encadrements de baies, chaînes d'angle et lucarnes en pierre de taille.                                                MENEHOUARN, la seigneurie et le château appartinrent à la famille de Pluvié durant plus de cinq siècles, de 1460 à 1985. Les Pluvié furent seigneurs de Ménéhouarn et de Kerdrého, de Kervio, de Kerléau, du Moustoir et de la Ville Martel. C'est Jean-Toussaint de Pluvié, Capitaine de Cavalerie au régiment de Clermont-Tonerre, qui fit édifier, au XVIIIe siècle, le château et sa chapelle. Une chapellenie avait été fondée en 1705 par Anne du Bouëtiez, dame du lieu. En 1985 le domaine de Ménéhouarn est acquis par la ville de Plouay, qui a entrepris sa restauration et réfléchit à son utilisation. Actuellement l'édifice est hors d'eau, ainsi que la belle chapelle domestique placée en face de la façade principale. Il existe de vastes dépendances et des communs. Le parc est inscrit dans un large espace, dont le mur d'enceinte est partiellement conservé; il est en cours de rénovation.","habitants":"Kerdreho ;  famille du Botdéru                                             Kerollin ; la famille Jegado                                                        Kersily ; famille des    Langourlan                             Menehouarn; famille de Jean-Toussaint de Pluvié\r\n        \r\n        \"","divers":"à Plouay gps  47° 54' 56\" nord, 3° 20' 02\" ouest, Kredreho grav 1-2, Kersily grav-3-4,  Menehouarn grav-5-6-7-8-9 et Kerollin à Lanvaudan (pas de Grav)","gps":"","images":["../../jctruffet.com/image/image_56/56_Plouay_1.jpg","../../jctruffet.com/image/image_56/56_Plouay_2.jpg","../../jctruffet.com/image/image_56/56_Plouay_3.jpg","../../jctruffet.com/image/image_56/56_Plouay_4.jpg","../../jctruffet.com/image/image_56/56_Plouay_5.jpg","../../jctruffet.com/image/image_56/56_Plouay_6.jpg","../../jctruffet.com/image/image_56/56_Plouay_7.jpg","../../jctruffet.com/image/image_56/56_Plouay_8.jpg","../../jctruffet.com/image/image_56/56_Plouay_9.jpg"]},"Consult_chateau_formulaire2be3":{"id":"Consult_chateau_formulaire2be3","dept":"56","canton":"Gourin","commune":"Plouray","nom":"Plouray","type":"Château","periode":"XVI-XVII","histoire":"deux châteaux dans cet article sur Plouray; Pinguilly et Kernevez.                                                                     PINGUILLY, le manoir de Penguily  du XVIe siècle. Propriété successive des familles Le Scanff  aux XVe et XVIe siècles, Le Grant, Bahuno et Bouetiez. Propriété d'Alain Le Scanff en 1464 ; ce manoir relevait en seigneurie du Dréorz,  qui rendait aveu à Charles Le Scanff, sieur du Dréorz. Allain Le Scanff avait épousé Thomasse de Kerourhin (ou Kourhin), et Jean, leur fils, posséda Penguilly après eux. En 1532, ce manoir était la propriété de Vincent Le Scanff qui rend aveu en 1540 et qui mourut vers 1560, laissant un fils, Alain, et une fille, Louise, mariée à Jean Le Grant. Celui-ci recueillit lhéritage de son beau-frère, et laissa Penguilly à sa fille Marie Le Grant dont il était tuteur en 1571. Guillaume du Bahuno, sieur de Kerdisson, Bérien et Penguilly, tenait ce dernier manoir en 1646 ; son fils, François, épousa Anne de la Coudraye qui rendit aveu en 1669. Vingt-six ans plus tard, Penguilly appartenait à Jacques du Boétié (ou Boétie), sieur de Kerorguen, et à lépoque de la Révolution il était entre les mains dun du Boétié de Kerorguen, sieur de Quellenec.","architecture":"KERNEVEZ-KERNEVO l'ancien manoir de Kerveno. La seigneurie appartient  aux familles Geoffroi de Kerancourhin  en 1514, Le Bahezre (en 1570), baron de Mauron, Yvon de Kerourhin rendit aveu en 1540 pour le manoir de Kerguénou. Ce manoir appartenait, en 1570, à Pierre Le Bahezre qui mourut deux ou trois ans après ainsi que son fils nommé aussi Pierre, puisque nous trouvons, en 1574, Béatrice Thépault, veuve de Pierre laîné, tutrice de ses deux petits-enfants : Pierre-Louis et Catherine. Pierre Le Bahezre et Béatrice Thépault avaient eu deux autres fils : Jean, sieur du Gollou, et Vincent. Pierre-Louis Le Bahezre rendit aveu en 1613 et mourut sans enfants. Son héritage passa à son cousin Michel Olymant dont la veuve, Margillie Guillaume, fournit aveu pour Kervéno en 1638. Ce Michel Olymant était fils dun autre Michel Olymant qui avait épousé une fille de Jean ou de Vincent Le Bahezre. Nous navons pu trouver la suite des possesseurs de Kervéno jusquen lannée 1695 où ce manoir appartenait à Jean-René-François-Almaric de Bréhan, comte de Moron, et en 1733, année de la mort de Toussaint-Maurice Le Bigot, comte de Neubourg, qui laissa Kervéno à son gendre, Joseph Raison, sieur de la Ville-Basse, par représentation de son épouse décédée, Marie-Louise Le Bigot. En 1753, le manoir de Kervéno passa à Agathe Raison, femme de Pierre-Marie Le Veneur, sieur de la Ville-Chapron, le Bouillen et la Ville-Dely ; Agathe Raison mourut en 1748 ; son mari posséda Kervéno après elle et en rendit aveu en 1788 à M. L. Galles. L'ancien château datait, semble-t-il, de la seconde moitié du XVIIe siècle. Seuls ses communs ont subsisté. Le logis a disparu à une époque ignorée et remplacé par une construction moderne qui fut la résidence de Madame la Maréchale Franchet d'Esperey jusqu'en 1968. Le château est actuellement la propriété de Mlle Hélène de Méhérenc de Saint-Pierre, l'ancien château de Kernevez du XVIIe siècle, remplacé par une construction moderne.","habitants":"Kernevez;  familles Geoffroi de Kerancourhin                     Pinguilly; famille ; familles Le Scanff                                             Kernevo ;\r\n        \"","divers":"A Plouray gps  48° 08' 47\" nord, 3° 23' 12\"  ouest ; Kernevez-Grav-3-4, Kernevo grav-1-2, Pinguilly-Grav-5","gps":"","images":["../../jctruffet.com/image/image_56/56_Plouray_1.jpg","../../jctruffet.com/image/image_56/56_Plouray_2.jpg","../../jctruffet.com/image/image_56/56_Plouray_3.jpg","../../jctruffet.com/image/image_56/56_Plouray_4.jpg","../../jctruffet.com/image/image_56/56_Plouray_5.jpg"]},"Consult_chateau_formulaire6df2":{"id":"Consult_chateau_formulaire6df2","dept":"56","canton":"Questembert","commune":"Pluherlint","nom":"Pluherlin","type":"Château","periode":"XIV-XVI-XIX","histoire":"Deux châteaux à Pluherlin; Gouverna et Talhouët.                                                     GOUVERNA, un manoir est attesté à Gournava au XVIIe siècle, propriété en 1680 de la famille Ermar. Vers 1845, le comte de Tinguy aurait acquis 17 hectares pour créer l'étang du grand Gournava afin d'alimenter un moulin. Au sud des ruines de l'ancienne maison noble, le château de Gournava est reconstruit en 1895 par le comte Louis-Henri de Béru, puis appartient au comte Louis-Henri de Tinguy. \r\nDates 1895, daté par travaux historiques  Auteur(s) Personnalité : Le Court de Béru Louis-Henri commanditaire attribution par travaux historiques. Personnalité : Tinguy, Louis-Henri de.  propriétaire attribution par travaux historiques.                                                                           TALHOUET, un premier manoir, berceau de la famille de Talhouët, est établi à cet emplacement à la fin du XIVe ou au début du XVe siècle.  Passé par mariage à la famille du Bot, il est remplacé au siècle suivant par un nouvel édifice, dont la construction s'étale entre 1580 et 1582. La chapelle, dédiée à saint Jean, est construite au début du XVIIe siècle. Une deuxième phase de travaux est réalisée en 1647, qui a pour conséquence principale l'agrandissement du corps de logis vers l'est. Il devient ensuite la propriété successive des familles Rado de Courson, Huchet de La Bédoyère, Juchault de Lorme et Quénétain. À la Restauration, il passe à la comtesse de Danne, qui engage une troisième phase de travaux en 1850. Cette nouvelle campagne voit le logis s'étendre vers l'ouest, avec l'adjonction d'un pavillon servant de jardin d'hiver, et le décor intérieur remis au goût du jour. Le manoir médiéval et la plupart des ses dépendances sont détruits à la fin du XIXe siècle.Le château est revendu en 1989, et transformé en 1990 pour accueillir des chambres d'hôtes.","architecture":"GOUVERNA, construit en granite, pierre importée, avec encadrement des ouvertures, chaînes d'angle et bandeaux en granite gris éclaté contrastant, il compose un plan symétrique avec corps latéraux en avancée sur la façade principale sud, à l'angle intérieur desquels s'insèrent deux pavillons carrés couverts de flèches carrées. Établi sur un soubassement qui abrite cuisine et pièces de service, le rez-de-chaussée surélevé est surmonté d'un étage carré, les combles n'étant pas habitables. Les deux élévations sont ordonnancées. La façade principale est rythmée par les avancées latérales à deux travées et les pavillons ouverts d'une travée de petites ouvertures, indiquant un usage de service. On accède au logis par un escalier droit perpendiculaire à la façade qui dessert la large porte de la travée axiale. Sur l'étang (élévation nord), la façade est animée par le léger ressaut des deux travées extrêmes, tandis que la travée axiale de l'élévation antérieure est ici remplacée par deux travées jumelées de fenêtres qui doivent au rez-de-chaussée éclairer le salon ouvert vers l'étang.                                                                                         TALHOUET, le château du XVIe siècle, orienté nord-sud, affecte un plan en « L » et relève du style gothique, comme l'attestent des restes de décor (porte monumentale, escalier). Lors des interventions du milieu du XIXe siècle, l'architecture et le décor sont remis aux goûts de l'époque, avec intervention sur les boiseries et les plafonds principalement.\r\nLes dépendances comprennent notamment une grange, des étables, un fournil, une citerne à eau et une chapelle. Le corps de logis, la chapelle, les façades et toitures des communs, les jardins en terrasses (avec ses murets et structures maçonnées) et les murs de clôture sont inscrits au titre des M.H. par arrêté du 29 septembre 2000.","habitants":"Gouverna; le comte Louis-Henri de Béru                                 Talhouet; Famille Rado de Courson\r\n        \r\n        \r\n        \"","divers":"à Pluherlin Gouverna grav 1-2 et Talhouët grav-3-4.                                                                     Gps 47° 43' 11\" N, 2° 22' 28\" Ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Pluherlin_1.jpg","../../jctruffet.com/image/image_56/56_Pluherlin_2.jpg","../../jctruffet.com/image/image_56/56_Pluherlin_3.jpg","../../jctruffet.com/image/image_56/56_Pluherlin_4.jpg"]},"Consult_chateau_formulaire6705":{"id":"Consult_chateau_formulaire6705","dept":"56","canton":"Moréac","commune":"Plumelec","nom":"Plumelec","type":"Château","periode":"X-XVII-XIX","histoire":"Trois châteaux à Plumelec; Callac , Kérangat et Sauldraye.                CALLAC, la demeure est la propriété de M.Callac, le château d'origine a été érigé en partie au Xe siècle,  et de Montaignac. La demeure est la propriété de MM. Henri Collin de La Bellière et de Montaignac.Elle abrite une importante collection de portraits historiques. Le château servit de point de ralliement aux parachutistes français largués en juin 1944                                                             KERANGAT, propriété d'une association.                                                                                                                SAULDRAYE, la seigneurie de la Sauldraye a donné son nom à une famille qui a transmis cette terre aux Callac. Jean de Callac et son épouse Jacquette de Kermeno rebâtirent le château au début du XVIe siècle. Ce château était occupé en 1644 par la famille La Poterie.  Depuis 1870, la Sauldraye appartient à la famille Le Blanc.","architecture":"CALLAC, le château d'origine a été érigé en partie au Xe siècle, sur une voie romaine, en remplacement d'un château primitif en bois, brûlé par les Normands. Le château joua un rôle important pendant la Révolution puis dans le cadre de la résistance. L'édifice présente un corps de logis en équerre dont l'une des ailes à l'Est flanquée de quatre tours rondes. L'autre aile comprend une tour carrée. Des escaliers, l'un à l'ange et l'autre en colimaçon, mènent au premier étage. Dans les pièces de beaux parquets anciens. Dans le grand salon le plafond a été peint au début du XVIIe siècle, les pièces possèdent des boiseries de cette époque. L'ensemble est entouré de terrasses bâties au XVIIe siècle. Les communs ont été élevés autour de l'avant-cour.                                                          KERANGAT, le château de Kerangal a été reconstruit après 1872 sur le site d'un édifice ancien et de ses dépendances agricoles. Edifice de plan massé. La façade sur jardin présente deux légers avant corps et une échauguette sur l'angle. Ornementation de style néo-gothique. Propriété d'une association qui a pour activité principale de le restaurer, l'embellir et élargir le château, le parc et l'arborétum de Kerangat.                                                                                                                 SAULDRAYE,  ce château était occupé en 1644 par la famille La Poterie. Vers 1850, il était en ruines: porte d'entrée à mâchicoulis sur corbelets et tourelle polygonale à gauche, corps de logis du XVIe, fenêtre carrée, trois écussons aux armes de Callac et de La Sauldraye, de Sérent et de Brignac. On peut encore voir une porte et porterne en plein cintre mouluré, surmontées de mâchicoulis et accostées d'une tourelle polygonale avec meurtrière pour couleuvrine à la base. Le corps de logis est orné de personnages, animaux et écussons. Éléments protégés MH : les restes du château de la Sauldraye : inscription par arrêté du 25 septembre 1928.","habitants":"Callac; M. Henri Collin de La Bellière                                 Souldraye; Famille de le Blanc\r\n        \"","divers":"à Plumelec gps 47° 50' 19\" nord, 2° 38' 22\" ouest ; Callac grav-1-2-3-4 , Sauldraye grav-5-6-7.  Kérangat grav-8","gps":"","images":["../../jctruffet.com/image/image_56/56_Plumelec_1.jpg","../../jctruffet.com/image/image_56/56_Plumelec_2.jpg","../../jctruffet.com/image/image_56/56_Plumelec_3.jpg","../../jctruffet.com/image/image_56/56_Plumelec_4.jpg","../../jctruffet.com/image/image_56/56_Plumelec_5.jpg","../../jctruffet.com/image/image_56/56_Plumelec_6.jpg","../../jctruffet.com/image/image_56/56_Plumelec_7.jpg","../../jctruffet.com/image/image_56/56_Plumelec_8.jpg"]},"Consult_chateau_formulairef9db":{"id":"Consult_chateau_formulairef9db","dept":"56","canton":"Auray","commune":"Pluneret","nom":"Pluneret","type":"Château","periode":"XV-XVIII-XIX","histoire":"trois châteaux à Pluneret; Treulan, Kérisper et Kermadio.                                                                                             TREULAN es Robien. En 1850, le nouveau propriétaire du domaine, M. Bonnement, entreprit d'y exploiter les 120 hectares de terre. Il le revend cependant en 1857 à M. le Comte Espivent de La Villeboisnet, qui poursuit cette exploitation.                                                                                                                     KERISPER   c'était une importante seigneurie que celle de Kerisper. En 1426, elle était aux mains des Sires de Kerisper Lestrelin; à la fin du XVe siècle aux Cadoret; en 1601 aux Montigny, qui la conservent jusqu'à la Révolution. Au XIXe et XXe siècles, le domaine appartient  à la famille Montaigu, aux Saint-Pern en 1876, aux Grand en 1897, aux Douault en 1900 et enfin aux Pommois en 1979. L'ancien château a été partiellement détruit. La demeure a été modernisée au début du XXe siècle. Octave Mirbeau y aurait séjourné en 1887-1888 et aurait écrit \"L'abbé Jules\". En 1990 le château abrite le Théâtre de l'Écume et une exposition d'art floral. Entouré d'un grand parc.","architecture":"KERMADIO  du XVIII-XIXe siècle), propriété de la comtesse de Ségur (1799-1874). La seigneurie de Kermadio appartenait autrefois aux familles Auray (en 1380), Coetdro, Fremeur et Hélène Fresneau, fille de la comtesse de Ségur qui se nommait de son vrai nom Sophie Rostopchine (en 1860). Il devient en 1890, la propriété de la famille Montaigu, puis en 1962, la propriété de la Compagnie des Forges de Chatillon qui va le transformer en centre de vacances ;\nKERISPER du XVe siècle, situé à Kerisper. Siège d'une ancienne seigneurie et propriété successive des familles de Lestrelin (en 1426), Cadoret (à la fin du XVe siècle), Montigny (en 1601 et jusqu'à la Révolution), Montaigu (au XIXème siècle), Saint-Pern (1876), Grand (1897), Douault (1900), Pommois (en 1979). Il possédait autrefois une chapelle privée, ainsi qu'un vaste étang. Modernisé au début du XXème siècle, il abrite aujourd'hui le théâtre de l'Ecume.                                                                                                     TREULAN, le lieu est demeuré depuis dans sa famille. Le château est une très belle demeure bâtie au XIXe siècle, avec un grand pavilIon carré à l'arrière. A côté s'élèvent de nombreux et importants communs. Le parc est clos de hauts murs percés d'une grille vis-à-vis de la façade et d'une allée forestière.","habitants":"Treulan; Famille  des Talouët                                Krisper;  Famille Montaigu                           Kermadio;  famille Montaigu,\"","divers":"à Pluneret gps 47° 40' 35? nord, 2° 57' 22? ouest;                                           Kérisper grav-1-2 et Kermadio grav-3    Treulan grav 4","gps":"","images":["../../jctruffet.com/image/image_56/56_Pluneret_1.jpg","../../jctruffet.com/image/image_56/56_Pluneret_2.jpg","../../jctruffet.com/image/image_56/56_Pluneret_3.jpg","../../jctruffet.com/image/image_56/56_Pluneret_4.jpg"]},"Consult_chateau_formulaire5618":{"id":"Consult_chateau_formulaire5618","dept":"56","canton":"Pluvigner","commune":"Pluvigner","nom":"Pluvigner","type":"Château","periode":"XV-","histoire":"Deux châteaux à Pluvigner, Kerlois et Kéronic.                                                                                                     KERLOIS,  la seigneurie appartenait en 1407 à Éon de Kernigues, écuyer du duc Jean V. Elle passa ensuite aux Lestrin de Saint-Avé, aux Gouvello de Keriolet (Pierre Le Gouvello y est né. Converti, il est mort en 1660), à M. de Moncan, aux La Ville-Gonan. Vers 1800, Armand Le Bobinnec acquit le domaine. La demeure est maintenant la propriété de ses descendants, la famille Bourjac.                                                                KERONIC, la seigneurie de Queronic ou Keronic était à Henry de Launay en 1427, à Eudo de Kervilio en 1536 et dans sa famille au XVIIe siècle. En 1717 l'édifice passa par mariage aux Charpentier de Lenvos, qui le conservèrent jusqu'à la Révolution. Au XIXe siècle, le château entra dans la famille Harscouët de Saint Georges, il est toujours dans cette famille.","architecture":"KERLOIS, le château édifié au XVe siècle a été transformé au XVIIe siècle. À cette époque, Pierre de Keriolet y vivait. Le jardin était planté de plantes médicinales et d'un potager. Il faut dire qu'à la fin de sa vie l'homme, sans foi ni loi, abritait un hospice à l'arrière du château. Le XVIIe siècle a marqué la transformation du parc en un jardin à la française. Les 2 points forts de ce parc sont les camélias avec plus de 15 variétés et les charmes remarquables, on peut admirer un cèdre du Liban bicentenaire ramené par l'aïeul de l'actuelle propriétaire, qui était capitaine dans la Marine royale. La chapelle a été restaurée au XVIIIe siècle ainsi que la belle écurie.                                                                                                                        KERONIC, cette belle demeure des XVe et XVIIe siècles (grosse tour circulaire à l'arrière, deux pavillons de chaque côté de l'entrée de la cour d'honneur) plusieurs fois restaurée, possède un étang et une chapelle privée, et est entourée d'un grand bois. Le parc de Keronic dessiné par Legendre vers 1880, est remarquable avec ses rhododendrons, plantes de terre de bruyère, camélias, hortensias et ses arbres exotiques, séquoias, araucarias, etc. Il est agrémenté d'un étang et d'un jardin à la française.","habitants":"Kerlois; Famille de  Pierre de Keriolet                                             Keronic ; aux Charpentier de Lenvos\r\n        \"","divers":"à Pluvigner  gps  47° 46' 00\" nord, 3° 01' 00\" ouest , Kerlois grav-4-5 et Kéronic grav-1-2-3","gps":"","images":["../../jctruffet.com/image/image_56/56_Pluvigner_1.jpg","../../jctruffet.com/image/image_56/56_Pluvigner_2.jpg","../../jctruffet.com/image/image_56/56_Pluvigner_3.jpg","../../jctruffet.com/image/image_56/56_Pluvigner_4.jpg","../../jctruffet.com/image/image_56/56_Pluvigner_5.jpg"]},"Consult_chateau_formulaire7212":{"id":"Consult_chateau_formulaire7212","dept":"56","canton":"Gourin","commune":"Berné","nom":"Pont_Calleck","type":"Château","periode":"XVII_XIX","histoire":"Deux châteaux à Berné , Pont Calleck et Bolbaye à Meslan.                                                                                    PONT-CALLECK, le château actuel, l'aile occidentale exceptée, est une reconstruction de 1882, due au fils du comte de Brissac qui avait racheté le château en 1833. Deux constructions antérieures au moins se sont succéder sur une ancienne place forte, siège d'une importance seigneurie, et partiellement détruite par les troupes de Mercoeur en 1591. Si cette enceinte a subsisté jusqu'à une date avancée, le logis a été reconstruit au XVIIe siècle comme en témoigne le pavillon ouest. Cet important ensemble a été presque entièrement brûlé en 1796. Au cours des travaux du XIXe siècle, la majeure partie du pavillon ouest, flanqué de la tourelle carrée au sud-est, a été gardée, les parties hautes, lucarnes comprises, ont été refaites et un bâtiment cubique à deux niveaux a été ajouté en avant du pavillon ouest. Vendu vers 1956 à une communauté de Dominicaines qui y dirige un orphelinat, l'ensemble a été augmenté en 1966 par une chapelle et un cloître, la chapelle remployant des matériaux de la chapelle Sainte-Anne de Pluméliau.","architecture":"A deux kiklomètres à l'ouest à Meslan le château de Boblaye.                      BOBLAYE,  lorsque la famille Le Puillon de Boblaye, après plus de trois siècles de présence, décida d'abandonner à leur fermier le vieux manoir du lieu, devenu vétuste, elle fit construire le petit château actuel au XIXe siècle. Demeuré depuis dans cette famille, il se trouve en contrebas du manoir qui a appartenu à l'importante maison de Rohan, il est devenu demeure fermière.","habitants":"Pont Calleck; Famille du  comte de Brissac                 Boblaye; Famille Le Puillon de Boblaye\r\n        \"","divers":"Deux châteaux à Berné gps 47° 59' 44\" nord, 3° 23' 28\" ouest, Pont-Calleck grav -1     et Boblaye","gps":"","images":["../../jctruffet.com/image/image_56/56_Pont_Calleck_1.jpg"]},"Consult_chateau_formulairea220":{"id":"Consult_chateau_formulairea220","dept":"56","canton":"Guidel","commune":"Pont-Scorff","nom":"Pont_Scoff","type":"Château","periode":"XVI-XVIII","histoire":"A Pont-Scorff cinq châteaux;  Leslé , Nelhouet, de Pen-Malé, Princes de Rohan  et de St-Urchaud.                                                                                 LESLE, le château du Leslé et ses dépendances constituaient, jusqu'en 1985, un ensemble architectural de la deuxième moitié du XVIIIe siècle. Il a subi, depuis cette date, de nombreuses restaurations et destructions. La seigneurie du Leslé est mentionnée du XVe siècle avec son manoir et la métairie qui en dépend. Dans la seconde moitié du XVIIIe siècle, le manoir est remplacé par un château. Ce dernier est partiellement détruit après la Révolution : il figure encore en entier sur la plan cadastral de 1818. L'avant-corps sud et une partie de l'aile sud seront restaurés en 1830, puis démolis à leur tour en 1985.  l'orangerie, transformée en habitation. La fabrique de jardin a été détruite, puis reconstruite à l'identique. Le corps de bâtiment de la ferme, qui comprenait des éléments du XVIIe siècle, a été remanié au XIXe siècle et totalement restauré en 1985. De l'ancien ensemble formé par les remises, les écuries du XVIIIe siècle et le logis de ferme de la fin du XIXe siècle, ne subsiste que le passage couvert.                                          NELHOUET  du 1769, construit pour un directeur de la Compagnie des Indes .\r\nST-URCHAUT, du XVII-XVIIIe siècle, siège de la seigneurie de Saint-Truchau et propriété de Jean Grasset, maître charpentier (en 1650) .","architecture":"LESLE,  ses dépendances sont construits dans un parc clos, de part et d'autre d'une avenue dont l'entrée en hémicycle est marquée par un portail. Le potager et la métairie situés à l'écart, respectivement au nord et à l'est de l'ancien château, sont également enclos de murs.\r\nEn 1830, il est réduit à un plan massé en L, à rez-de-chaussée et étage carré. La toiture en ardoise à longs pans se croisant en noue possédait deux croupes. Corniche et lucarne étaient en calcaire La chapelle à élévation partiellement en pierre de taille, l'orangerie et le passage couvert à porte cochère en moellon ont un toit à croupes, tandis que la fabrique de jardin a un toit en pavillon. La ferme et les communs en moellon, surmontés d'un comble à surcroît, sont couverts d'un toit à longs pans et pignon couvert.                                                                                     PRINCES DE ROHAN, cette ancienne demeure de style Seconde Renaissance bretonne, aurait été construite en 1511 par Jean de Rohan-Guéméné, grand maître de Bretagne, pour servir de maison de justice et de gabelle. Elle abritait lancien auditoire de la juridiction et une prison encore visible. Son nom viendrait de Louis VI de Guéméné, élevé en 1567 au rang de prince par Charles IX, qui en aurait fait un pied-à-terre.\r\nLa façade est en granite, biseautée aux angles, éclairée de lucarnes très sculptées. Le rampant du pignon est orné de chimères et de fleurons. De petites ouvertures, rondes pour la plupart, servaient à la surveillance des alentours. Dans cette maison bourgeoise subsistent des cheminées très sculptées et des plafonds à poutres apparentes. Une légende raconte qu'un souterrain, reliant la cave au château de Leslé au Bas-Pont-Scorff, permettait d'acheminer ici, en toute sécurité, des prisonniers promis à la pendaison.La maison a été achetée par la commune en 1921 et abrite la mairie depuis 1924.","habitants":"Leslé;seigneurie du Leslé                                                                      St-Urchaud; Famille de Jean Grasset                                                        Prince Rohan:Famille de Jean de Rohan-Guéméné\r\n        \r\n        \"","divers":"A Pont-Scorff  gps   47° 50' 06\" nord, 3° 24' 07\" ouest                                          cinq châteaux;  Leslé , Nelhouet, de Pen Malé, Princes de Rohan grav-1 à 6  et de St-Urchaud-grav-8-9.                          Gps 47° 50' 22\" nord, 3° 24' 12\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Pont_Scoff_1.jpg","../../jctruffet.com/image/image_56/56_Pont_Scoff_2.jpg","../../jctruffet.com/image/image_56/56_Pont_Scoff_3.jpg","../../jctruffet.com/image/image_56/56_Pont_Scoff_4.jpg","../../jctruffet.com/image/image_56/56_Pont_Scoff_5.jpg","../../jctruffet.com/image/image_56/56_Pont_Scoff_6.jpg","../../jctruffet.com/image/image_56/56_Pont_Scoff_7.jpg","../../jctruffet.com/image/image_56/56_Pont_Scoff_8.jpg","../../jctruffet.com/image/image_56/56_Pont_Scoff_9.jpg"]},"Consult_chateau_formulaire017f":{"id":"Consult_chateau_formulaire017f","dept":"56","canton":"Pontivy","commune":"Pontivy","nom":"Pontivy","type":"Château","periode":"XVI-XVIII","histoire":"deux châteaux  à Pontivy, celui des Rohans et Talhouet.                          ROHANS, situé à l'extrémité nord de la vieille ville, le château de Pontivy a été construit du milieu du XVe siècle au début du XVIe siècle. L'essentiel de la construction fut réalisé à l'initiative de Jean II de Rohan dit le « Grand Vicomte ». Pontivy étant devenue, en 1396, la capitale de la vicomté de Rohan, il fallait à Jean II un château digne de son rang.                                                                                                                                                                TALHOUET,  c''est un joli édifice construit sur une colline dominant le Blavet. Il a été bâti par M. de Kervenoaël à partir de 1868, sur l'emplacement de deux précédents châteaux (le dernier exista de 1583 à 1860), suivant les plans de M. Leray, prix de Rome. En 1480 et jusqu'en 1524, le château appartenait aux Rolland. Il fut la propriété des Lantivy de 1524 à 1790. Par la suite, il reste à la descendance féminine de la famille Kervenoaël. Talhouët appartient à M. Antoine de l'Escale Jouan de Kervenoaël aujourd'hui. Pendant l'occupation de 1940 à 1944, le château hébergea l'État-Major des troupes allemandes. Cette élégante demeure, aux murailles claires, aux lignes élancées, à la haute toiture, et au fin campanile entourée d'un écrin de verdure.","architecture":"ROHANS, avec ses murs épais, ses larges fossés et ses tours massives en forte saillie sur les courtines, le château de Pontivy est le témoin d'une architecture militaire qui, à la fin du XVe siècle, tente de s'adapter au développement de l'artillerie à feu. La présence de « mâchicoulis bretons » ou l'utilisation de schiste et de granit pour la construction sont caractéristiques des châteaux forts de la péninsule. A la fonction défensive s'adjoint une attention soutenue pour le confort et la décoration : lucarnes sculptées, descentes d'eau ouvragées, cheminées et latrines sont encore là pour en témoigner. Le château est ouvert du début des vacances de février (zone A) à la fin des vacances de novembre (toutes zones). Il abrite de manière permanente une installation contemporaine de l'artiste japonais Koki Watanabe ainsi qu'une exposition dédiée au sculpteur Gaston Schweitzer (Montreuil-sous-Bois, 1879 - Paris, 1962). Chaque été, le château accueille une (ou des) exposition(s) temporaire(s) sur des thèmes variés.","habitants":"Rohans; Famille de Jean II de Rohan                                    Talhouet ;  M. de Kervenoaël \r\n        \"","divers":"à Pontivy  gps 48° 04' nord, 2° 59' ouest         , celui des Rohans grav de 1 à 7, et Talhouet grav 8-9","gps":"","images":["../../jctruffet.com/image/image_56/56_Pontivy_1.jpg","../../jctruffet.com/image/image_56/56_Pontivy_2.jpg","../../jctruffet.com/image/image_56/56_Pontivy_3.jpg","../../jctruffet.com/image/image_56/56_Pontivy_4.jpg","../../jctruffet.com/image/image_56/56_Pontivy_5.jpg","../../jctruffet.com/image/image_56/56_Pontivy_6.jpg","../../jctruffet.com/image/image_56/56_Pontivy_7.jpg","../../jctruffet.com/image/image_56/56_Pontivy_8.jpg","../../jctruffet.com/image/image_56/56_Pontivy_9.jpg"]},"Consult_chateau_formulaire3ae7":{"id":"Consult_chateau_formulaire3ae7","dept":"56","canton":"Grand-Champ","commune":"Réguiny","nom":"Porhman","type":"Château","periode":"XVIII","histoire":"PORHMAN,  château en granit construit à la fin du XVIIe siècle dans le style XVIIe siècle. Un seul corps de bâtiment comprenant rez de chaussée, étage et comble, flanqué aux extrémités de deux pavillons légèrement saillants sur les deux faces. Un pavillon central surmonté d'un clocheton fait saillie du côté de la cour d'honneur. L'entrée est accusée par un fronton. A l'autre extrémité de la cour d'honneur, deux pilastres surmontés de motifs sculptés accusent l'entrée. Une aile de communs de même construction borde un côté de la cour. A l'intérieur, occupant tout le pavillon central, un escalier en granit dont les marches reposent sur des arcs supportés par quatre piliers. La seigneurie de Porhman ou Porman, appartenait au XVe siècle à la famille Eudoux. En 1427, Guillaume Eudoux édifie un manoir avec tourelle. Dès le XVIe siècle, le lieu est passé aux Le Veneur, originaires de Loyat. En 1631, Toussaint Le Veneur est marié à Françoise de Guébriac. Veuve, celle-ci épouse, en secondes noces, Julien de La Touche. Tous deux bâtissent le château actuel.","architecture":"PORHMAN  Le château actuel est construit entre 1685 et 1710,3 à la demande de Françoise de Guébriac et son mari Julien de La Touche, peut-être d'après les plans de l'architecte Olivier Delourme. Il appartient ensuite successivement aux familles de Cuy et de Longeaux.\r\nLes façades, toitures et escalier intérieur du château, ainsi que les façades et toitures des communs et la cour d'honneur sont inscrits au titre des monuments historiques par arrêté du 15 juillet 1964.                                             L'édifice, en granite, se présente comme un corps de bâtiment unique sur trois niveaux (dont un de combles) qu'entourent deux pavillons en légère saillie. Au milieu du corps central, un autre pavillon portant un clocheton se détache légèrement. Un escalier monumental granitique, reposant sur des arcs que soutiennent quatre piliers, est logé dans le pavillon central. Une cour d'honneur s'étale devant ce bâtiment principal, bordant les communs à l'est. Cette cour s'ouvre par une entrée formée de deux pilastres sculptés. Éléments protégés MH : les façades et les toitures du château lui-même ; l'escalier intérieur, les façades et les toitures des communs, la cour d'honneur avec les piliers qui marquent l'entrée : inscription par arrêté du 15 juillet 1964.","habitants":"famille Eudoux\r\n        \"","divers":"château de Porhman à Réguiny gps 47° 58' 39\" nord, 2° 44' 42\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Porhman_1.jpg","../../jctruffet.com/image/image_56/56_Porhman_2.jpg","../../jctruffet.com/image/image_56/56_Porhman_3.jpg"]},"Consult_chateau_formulaired01f":{"id":"Consult_chateau_formulaired01f","dept":"56","canton":"Hennebont","commune":"Port-Louis_Riantec","nom":"Port_Louis","type":"Citadelle","periode":"XVI-XVII","histoire":"A  Port Louis la citadelle le manoir de Kerzo et à un km au nord à Riantec Kerdurand.                                                                                              PORT-LOUIS,  construite au XVIe siècle par les Espagnols, puis modifiée au XVIIe siècle par les Français. Elle est  située dans la ville de Port-Louis en France, et ferme l'accès de la rade de Lorient. Elle abrite actuellement un musée de la compagnie des Indes, le musée national de la Marine et des annexes consacrées au sauvetage en mer. La citadelle, ainsi que les remparts, font lobjet dun classement au titre des M.H. depuis le 29 avril 1948.   Un premier projet de fortification à l'entrée de la rade de Lorient est fait en 1486 par le duc de Bretagne François II, et deux émissaires sont envoyés dans la ville pour étudier la situation. L'importance commerciale et stratégique du lieu font que le financement de celui-ci est soutenu.  Le lieu prend de l'importance au moment des guerres de la Ligue. Les troupes du duc de Mercur occupent Hennebont dès septembre 1589 et commencent à attaquer Blavet (l'actuel Port-Louis) à partir du mois suivant. La ville ne tombe que le 11 juin 1590 après avoir subi une attaque par terre et par mer. Des troupes espagnoles, alliées au duc de Mercur, arrivent en Bretagne le 12 octobre 1590 et sont conduites dans la ville pour y prendre garnison. Les Espagnols continuent à occuper la place jusqu'au traité de Vervins en 1598, et le maréchal de Brissac fait détruire la citadelle à partir d'août 1598 après une demande en ce sens des États de Bretagne. Cependant tout n'est pas détruit, et deux bastions, une courtine, les piles du pont ainsi que les casernes sont conservés.","architecture":"KERDURAND, à Riantec, Le fief appartenait initialement à Joachim de La Faudrière du Baudry. Le château devient ensuite la propriété de Jean-Pierre Maquaire (en 1740), François Stéphan (en 1745) et Jean Rousse (en 1762).datant du XVIII e siècle, c'est la propriété de campagne de Jean Durand, sieur de La Feuillade, le château de Kerdurand (XVIIIe siècle), et édifié après 1730 par Jean Durand,  marchand et bourgeois à Port-Louis, qui baptise son domaine Kerdurand et le revend dix ans plus tard  en 1745, à François Stéphan, négociant, prend le titre de \"sieur de Kerdurand\", puis le cède en 1762 à Jean Rousse, chirurgien de la Compagnie des Indes. Après 1775, la société du Serpent d'Or, qui réunit des bourgeois et des militaires, y tient ses assemblées. Il appartient aujourd'hui à la ville de Riantec. Le portail et les grilles datent du milieu du XIXe siècle.                                         KERZO,  de 1427. Siège d'une ancienne seigneurie appartenant aux familles Vivien, Le Cozec (Jehan Le Cozec en 1427), Du Pallays (Jehan du Pallays en 1536), Theix (Viviane de Theix au XVIIe siècle), Lauzer (au XVIIIe siècle), Flandrois, Pommois (en 1964). Une lucarne porte la date de 1712, date qui correspond à un remaniement de l'édifice.                                                                                                                       PORT-LOUIS, la citadelle est reconstruite entre 1618 et 1621, lorsque Louis XIII décide de donner à Port-Louis le statut de ville royale. L'aspect actuel de la citadelle date de cette époque et malgré les apparences, on ne doit à Vauban que les édifices construits dans la basse-cour (arsenal et parc à boulet) à une date plus tardive. En 1666, la Compagnie des Indes orientales s'implante dans la rade de Port-Louis. La ville de Lorient est créée à cette époque, et la citadelle est considérée comme un poste avancé dans la défense de la rade. Les quelques modifications qu'elle subit pendant cette période lui permettent de soutenir un siège Jusqu'à la fin de la Seconde Guerre mondiale, elle sera contrôlée par les Allemands de 1940 à 1945,  puis elle sera affectée à la surveillance du trafic maritime.","habitants":"le duc de Bretagne François II                                                      Kerzo; Famille des  Flandroi                                                        Kerdurand; Famille de Jean Durand                                       \r\n        \"","divers":"Citadelle de Port-Louis  gps 47° 42' 26\" nord, 3° 21' 07\" ouest                       grav 1-2-3-4      Kerzo grav_5   Gps  47° 42' 52\" nord, 3° 21' 04\" ouest         Kerdurand  grav 6-7","gps":"","images":["../../jctruffet.com/image/image_56/56_Port_Louis_1.jpg","../../jctruffet.com/image/image_56/56_Port_Louis_2.jpg","../../jctruffet.com/image/image_56/56_Port_Louis_3.jpg","../../jctruffet.com/image/image_56/56_Port_Louis_4.jpg","../../jctruffet.com/image/image_56/56_Port_Louis_5.jpg","../../jctruffet.com/image/image_56/56_Port_Louis_6.jpg","../../jctruffet.com/image/image_56/56_Port_Louis_7.jpg"]},"Consult_chateau_formulaire7eee-2":{"id":"Consult_chateau_formulaire7eee-2","dept":"56","canton":"Gourin","commune":"Presquen","nom":"Presquen","type":"Château","periode":"XIV-XVII-XVIII","histoire":"trois châteaux à Presquen; Kerohel et Pervern et Tenuel.                                   KEROHEL, la seigneurie de Kerohel (ou Ker-Roël) appartenait à Jeanne Huby en 1633, mais on pense qu'un manoir existait là dès le XIe siècle. (Le duc Roël III régnait en Bretagne de 1066 à 1084 et aurait visité le lieu) Marion du Faouët s'y serait réfugiée vers 1735-1740. Le manoir fut remplacé par le château actuel, édifié en partie au XVIIIe siècle (partie Est), en partie au tournant du XIXe siècle (partie Ouest avec sa tour carrée achevée en 1902 par le baron Laudren). Des restes de constructions plus anciennes (XVIe et XVIIe siècles) subsistent, noyées dans des corps de bâtiments situés à l'entrée Sud-Ouest du parc d'agrément. Actuellement le château appartient à M. François Blin, qui en a réalisé la restauration.","architecture":"PENVERN,  le château de Penvern est construit pour François du Perenno dans les années 1750-1770, sur les bases du manoir primitif du XVe siècle. L'aspect sévère de la façade antérieure évoque l'influence des ingénieurs militaires oeuvrant à Lorient. Le logis occupe le fond d'une cour close de murets à piliers au sud et à l'ouest, une chapelle et un pavillon de garde cantonnent la cour à l'ouest et à l'est. L'édifice conserve son jardin en terrasses, jardin régulier, allées en patte d'oie, étang et lavoir. Un château existe à cet endroit dès le XIVe siècle. Il est vendu en 1377 par Jehan, sire de Longueval, à M. Jean, vicomte de Rohan. Il passe ensuite aux cadets des Rohan-Guémené, les Le Perenno, qui le possèdent dès 1426. Il ne subsiste aucun vestige de ce premier édifice Seigneurie et manoir en la paroisse de Persquen, évêché de Vannes. Le seigneur était en (1634-1640) Louis du Pérenno dont la veuve, Catherine Couppé, épousa Jacques de Lantivy, seigneur de Kervéno. La Réformation de 1426 mentionne en lad. Paroisse Guillaume, fils d'Alain Guillaume, autrement dit Pérennou, « armé ès mandements du duc». En 1666, François du Pérenno était seigneur de Persquen et de Penvern et résidait au manoir. Le château de Penvern fut reconstruit en 1771 par le comte François du Pérenno de Penvern et Paul-Romain-Guy du Penvern, son fils (Théodore Courtaux, 1899).Éléments protégés MH : l'ensemble des éléments bâtis qui composent la cour d'honneur du château, à savoir la chapelle, la maison de garde pour les façades et les toitures et les murets à piliers ceinturant la cour, les façades et toitures du logis : inscription par arrêté du 22 octobre 2009.","habitants":"Kerohel ;M. François Blin,                                                        Penvern; Famille de  François du Perenno\r\n        \"","divers":"à Presquen; Kerohel grav-1 et Pervern grav 2-3 et Tenuel grav 4-5","gps":"","images":["../../jctruffet.com/image/image_56/56_Presquen_1.jpg","../../jctruffet.com/image/image_56/56_Presquen_2.jpg","../../jctruffet.com/image/image_56/56_Presquen_3.jpg","../../jctruffet.com/image/image_56/56_Presquen_4.jpg","../../jctruffet.com/image/image_56/56_Presquen_5.jpg"]},"Consult_chateau_formulaire33d7":{"id":"Consult_chateau_formulaire33d7","dept":"56","canton":"Gourin","commune":"Priziac","nom":"Priziac","type":"Château","periode":"XIV-XVII","histoire":"Trois châteaux à Prizac; Dréors, Crémenec  et Kercado. A cinq kilomètre àl'ouest  a St-Caradec le château de Kermérien.                                                                              Château de la Roche Piriou, déjà détruit au XVIe siècle, des vestiges d'une tour ronde furent mis au jour en 1907, du Cremenec. manoir de Plascaër .                                                                                                     DREORS, vestiges, la seigneurie, avec haute, moyenne et basse justice, est connue dès le XIVe siècle. En 1363 et 1448, elle appartient aux Le Scanff. En 1591 le Dréorz ou Dréors passe aux Talhouët de Kerservant, en 1660 aux Volvire, en 1684 aux Lopriac, et ensuite aux Kerhoent, qui la conservent jusqu'à la Révolution. En 1827, le logis, la chapelle et le colombier sont encore debout. Au début du XXe siècle, l'ensemble est en ruine. Par la suite le logis seigneurial est démonté et transféré à Pluvigner. La chapelle privée disparaît également. Des communs (remaniés) subsistent, vestiges en mauvais état.                                 CREMENEC, le château de Cremenec en Priziac servit pendant un temps de repaire au célèbre brigand La Fontenelle qui s'en était emparé le 10 février 1595. Ce château était alors la propriété de Nicolas de Talhouët Kerservant, qui venait de passer au parti du roi. Le brigand y enfermait dans les cachots des prisonniers qu'il n'hésitait pas à torturer pour obtenir d'eux en échange de leur libération une plus forte rançon. Le chanoine Jean Moreau rapporte dans ses Mémoires sur les guerres de la ligue en Bretagne que les prisonniers qui avaient la chance d'être libérés contre rançon sortaient demi-morts, semblant plutôt à des anatomies ou spectres hideux.","architecture":"KERCADO, parfois jadis dénommé Kergado, le lieu était le siège d'une seigneurie dont les titulaires étaient les Herman en 1630, suivis des Le Mézec alliés aux Wolbock. Le domaine est acheté en 1865 par le Baron de Wolbock. Le Vicomte de Perrien de Crenan l'acheta en 1890, il est resté depuis dans cette famille. Il est maintenant passé par mariage à la famille de Chavagnac. On accède au château par une belle allée. L'ensemble est clos de murs. Une porterie fortifiée portant les armes de Le Mézec et en-dessous des Wolbock, mène à la cour d'honneur où se trouve un vieux puits. Une tour carrée est adossée à l'arrière de cette belle demeure. La chapelle, actuellement désaffectée, se trouve à droite de l'entrée. Si l'on ne peut admirer la façade du château, on peut depuis la porte monumentale, en voir l'arrière, ainsi que la chapelle et les communs. Les communs sont le point de départ pour la visite du superbe tumulus de Kercado. Le tumulus de Kercado est un mégalithes très ancien, le plus complet et le mieux conservé de la région de Carnac.                                       KERMERIEN, à  St-Caradec du XVe et XVIIe siècles. La seigneurie citée dès 1398, appartenait successivement aux familles Pierre de Kermerien (de 1448 à 1481), Le Gal (vers 1500), Hervé du Quelennec (vers 1520), Rouxel du Crano (ou Cranno) en Lignol (en 1536), Cosmoal, sieurs de Saint-Georges (en 1595), Farcy (en 1754), Marnière. Certaines parties de l'édifice existent déjà en 1464 : il appartient alors à la famille de La Villeneuve. A l'arrière de l'édifice s'élève une tour abritant un escalier.   Château de Kermerien du XVIe siècle. Ce château à la ligne sobre et racée, possède une superbe porte ogivale surmontée d'un guerrier armée d'une hache. Il appartenait à une famille venue d'Angleterre, les de Cosnoal. L'un des membres de cette famille était René Paul de Cosnoal, lieutenant de la maréchaussée de Bretagne à la résidence de Vannes en 1748.","habitants":"Dreors ; Famille de Talhouët de Kerservant,                                          Kercado ; Baron de Wolbock.                                                  Kermérien ; Rouxel du Crano\r\n        \"","divers":"à Prizac  Dréors grav-1; crémenec  et Kercado grav 2-3,et  a St-Caradec Kermérien grav -4-5.                                                   Priziac gps  48° 03' 43\" nord, 3° 24' 29\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Priziac_1.jpg","../../jctruffet.com/image/image_56/56_Priziac_2.jpg","../../jctruffet.com/image/image_56/56_Priziac_3.jpg","../../jctruffet.com/image/image_56/56_Priziac_4.jpg","../../jctruffet.com/image/image_56/56_Priziac_5.jpg"]},"Consult_chateau_formulaire3f65":{"id":"Consult_chateau_formulaire3f65","dept":"56","canton":"Guer","commune":"Quelneuc-Carentoir","nom":"Quelneuc","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux dans cet article, Quelneuc et la Ville Queno.                                                                                                              VILLE-QUENO,  ce manoir jouissait d'une haute, moyenne et basse justice. A la fin du XIVe siècle vivait Guillaume Couppu, seigneur de La Ville-Queno, dont naquit autre Guillaume Couppu, seigneur de la Couppuaye et de La Ville-Queno. Jeanne Couppu, fille de ce dernier, épousa Jean Raguenel, vicomte de La Bellière, et lui apporta la seigneurie de La Ville-Queno. Elle mourut en 1407. Son fils fut Jean Raguenel II, seigneur de Malestroit et de La Ville Queno, marié à Jeanne de Malestroit. Puis vinrent deux enfant de ces derniers, Jean III et Jean IV, successivement seigneurs de La Ville-Queno. Ce Jean IV, baron de Malestroit, épousa Gillette de Châteaugiron dont il eut Françoise, dame de Malestroit, mariée au sire de Rieux, et Jeanne, dame de La Ville-Queno, mariée à Tanguy du Chastel, seigneur de Renac. De cette dernière union naquit une fille unique, Jeanne du Chastel, dame de La Ville-Queno, qui épousa Louis de Montejean. Leurs fils, Jacques et René de Montejean, successivement seigneurs de Renac et de La Ville-Queno, moururent sans postérité dans la première moitié du XVIe siècle. En 1536, François Thierry possédait le manoir de La Ville-Queno. Georges Méhaud, seigneur de Trébrun, et Louise Renard, sa femme, l'habitaient en 1582. Ce manoir passa ensuite entre les mains de la famille de Talouhët, qui le possédait encore à la fin du XIXe siècle. En 1767, à la famille de Talouhët vivait Jean de Talhouët, seigneur de La Ville-Queno, marié à Françoise Le Mezec, dont naquit Joseph de Talhouët, seigneur de La Ville-Queno, en 1778.","architecture":"QUELNEUC du XV-XVIe siècle. Siège d'une ancienne seigneurie ayant appartenu  aux familles Quelneuc (en 1402), Pontrouand (Guillaume de Pontrouand en 1427), Champagné (Gohier de Champagné en 1536), Boisorhand et Talhouët. Une tour hélicoïdale, adossée à l'édifice, possède à son sommet un colombier, percé d'une centaine de boulins. Sur l'une des cheminées figurent les armoiries de la famille de Quelneuc et celles de la famille de Pontrouaud.","habitants":"Ville-Queno;  famille de Talouhët\r\n        \"","divers":"Quelneuc et la Ville Queno.","gps":"","images":["../../jctruffet.com/image/image_56/56_Quelneuc_1.jpg","../../jctruffet.com/image/image_56/56_Quelneuc_2.jpg","../../jctruffet.com/image/image_56/56_Quelneuc_3.jpg","../../jctruffet.com/image/image_56/56_Quelneuc_4.jpg","../../jctruffet.com/image/image_56/56_Quelneuc_5.jpg","../../jctruffet.com/image/image_56/56_Quelneuc_6.jpg"]},"Consult_chateau_formulaire5b6b":{"id":"Consult_chateau_formulaire5b6b","dept":"56","canton":"Questembert","commune":"Questembert","nom":"Questembert","type":"Château","periode":"XVI","histoire":"Deux châteaux à Questembert, D'Ereck et Keredren.                     DERECK, en 490, Erech, fils d'Audren, roi de Bretagne, fit bâtir un château dont il ne reste rien.
