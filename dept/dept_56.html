                                    KEREDREN   L'ancienne seigneurie appartint successivement à la famille Keredren, aux Talhoët, puis aux Levier. La demeure est restée dans la famille du constructeur depuis cette époque. Elle est actuellement habitée par Mme Gilette Pillet.","architecture":"DERECK,  l'édifice du XVIe siècle est une longue construction rectangulaire avec un toit à la Mansard orné de deux lucarnes Renaissance, jambages à cariatides avec fronton, la partie intéressante se compose d'un ensemble de trois cheminées monumentales. Au rez-de-chaussée, cheminée en granit à mouluration et encoignures rectilignes, au centre, écusson avec heaume et supports en animaux héraldiques. Au premier étage, une belle cheminée avec piedroits à chapiteau ionique, forte architrave surmontée d'une composition Renaissance. Même principe d'armoiries au milieu d'entrelacs de rinceaux, limités aux extrémités par des gaines et cariatides, la chambre sud renferme une cheminée analogue avec consoles sur griffes, cariatides en pied, cartouche centrale avec chimères assises dos à dos. La cour d'honneur conserve un puits octogonal du XVIe. Au nord de la cour, un portail met en communication avec les communs. Des arcades en plein cintre s'ouvrent au sud pour remise ou fournil.\r\nÉléments protégés MH : les dépendances, à savoir : la cour d'honneur y compris le puits du XVIe siècle, les communs, les parterres et les jardins, les douves : inscription par arrêté du 14 octobre 1946.                                                 KEREDREN, le château du lieu était assez important et avait une chapelle privée. Ces deux édifices étaient en ruine à la fin du XIXe siècle. Le château fut alors reconstruit par le nouveau propriétaire, en 1908, sur l'ancien emplacement. Un grand nombre de pierres taillées et sculptées sont remployées pour orner fenêtres et portes de la nouvelle construction. La demeure est restée dans la famille du constructeur depuis cette époque. Elle est actuellement habitée par Mme Gilette Pillet.","habitants":"Dereck ; Famille Dereck                                                           Keredren;; Famille de  Keredren\r\n        \r\n        \"","divers":"à Questembert gps  47° 39' 44\" nord, 2° 27' 06\" ouest, D'Ereck grav-1 et Keredren grav-2.","gps":"","images":["../../jctruffet.com/image/image_56/56_Questembert_1.jpg","../../jctruffet.com/image/image_56/56_Questembert_2.jpg","../../jctruffet.com/image/image_56/56_Questembert_3.jpg","../../jctruffet.com/image/image_56/56_Questembert_4.jpg"]},"Consult_chateau_formulaired2b4":{"id":"Consult_chateau_formulaired2b4","dept":"56","canton":"Ploemeur","commune":"Queven","nom":"Queven","type":"Château","periode":"XVII","histoire":"Deux châteaux à Queven  Kerlebert et Kerousseau.                                 KERLEBERT en 1427, les seigneurs de Kerlébert sont les Ligouffrin (apparentés aux Jubin de Kerousseau). Le manoir était, en 1624, la propriété de Louis du Perenno, sieur de Kerlebertz.","architecture":"KEROUSSEAU, du XVIIe siècle, édifié à l'emplacement de l'ancien manoir. Le nom de la plus importante seigneurie de Quéven a beaucoup varié : Kerousseau, Kerhussoc, Kerfussault, Kerfoussaults, Kerussot. Siège de la seigneurie de Kerrousseau, propriété successive des familles Rousseau, Jubin (au XVe siècle), Lopriac (en 1536), Guimarho (au début du XVIIe siècle), Hyacinthe de Kerpaen (en 1690), Marnière de Guer (aux XVIIIe et XIXe siècles). Ce château possédait autrefois une chapelle privée dédiée à Saint-Maudé. Il ne subsiste aujourd'hui qu'une ferme, des caves, un puits et une fontaine-lavoir (XVIIIe siècle).","habitants":"Kerlebert, Famille de Ligouffrin                                         Kerousseau; Famille Rousseau\r\n        \"","divers":"à Queven gps   47° 47' 22\" nord, 3° 24' 50\" ouest  Kerlebert grav 1-2 et Kerousseau grav-3.","gps":"","images":["../../jctruffet.com/image/image_56/56_Queven_1.jpg","../../jctruffet.com/image/image_56/56_Queven_2.jpg","../../jctruffet.com/image/image_56/56_Queven_3.jpg"]},"Consult_chateau_formulaire1b58-2":{"id":"Consult_chateau_formulaire1b58-2","dept":"56","canton":"Grand-Champ","commune":"Moustoir ac","nom":"Resto","type":"Chateaux","periode":"XV","histoire":"Du RESTO, du XVe siècle, propriété de la famille Philippe en 1429,   Il devient en 1609 ou 1624, la propriété de la famille Grignart de Champsavoy, puis en 1798 la propriété d'Ambroise Caradec qui le restaure en 1800. Racheté, par la famille Champsavoy, ses descendants le conserveront jusqu'en 1795,  en 1802, il deviendra successivement la propriété des familles Limousinière, La Fruglaye, Castellan (en 1884), , au XVe siècle, le château revient ensuite à sa fille, Rosalie-Cécile qui est marié à Claude de La Touche-Limouzinière  qui meurt le 1er décembre 1837 au Resto. Leur fille aînée, Angélique, se marie le 20 juin 1838 à Casimir François Amat de La Fruglaye  qui devient le nouveau propriétaire du domaine. Les  Kersabiec (en 1898)  le Resto était une seigneurie qui avait moyenne et basse justice, avec prééminence, banc et enfeus dans le chur de l'église paroissiale. Château construit quelques années auparavant,  à M. de Kersabiec. Les descendants de celui-ci y résident encore. Ils ont aménagé des chambres d'hôtes dans la demeure familiale.","architecture":"RESTO, du XVe siècle,  le nouveau propriétaire du domaine est un passionné d'archéologies qui entreprend de nombreuses fouilles sur le territoire de Moustoir-Ac et qui révélera de nombreux sites tel le dolmen du Resto, des restes de villa et d'un camp romain. Angélique et de la Fruglaye font des travaux au château et à ses dépendances. Lorsque Angélique décède le 1er janvier 1871, leur fille aînée, Marie-Henriette, et leur fille la plus jeune, Claude-Louise, héritent du château et de ses métairies. En 1879, Marie-Henriette entreprend d'importants travaux sur le château et sur son domaine. Au milieu du XVIIIe siècle, le château du Resto possède de nombreuses appartenances et dépendances : maison, chapelle, granges, écuries, colombier, verger, futaie, rabine, avenue, garennes, étangs, viviers, prés et prairies, landes. Le château du Resto possède plusieurs parcs dont un de sept hectares. Il possède également de nombreuses métairies, de trois moulins à eau et un moulin à vent et de nombreux vassaux à Moustoir-Ac et Bignan.","habitants":"famille Grignart de Champsavoy\r\n        \"","divers":"Château du Resto et de Quistinic gps 47° 54' 21\"  nord, 3° 07' 59\" ouest                                                       à Moustoir  gps 47° 50' 53\" N, 2° 51' 13\" Ouest.","gps":"","images":["../../jctruffet.com/image/image_56/56_Resto_1.jpg"]},"Consult_chateau_formulaire8a44":{"id":"Consult_chateau_formulaire8a44","dept":"56","canton":"Pontivy","commune":"Bieuzy","nom":"Rimaison","type":"Château","periode":"XV-XVII","histoire":"RIMAISON, Un premier manoir est mentionné en 1427, appartenant aux enfants d'Eon de Rimaison. Le château est construit dans le dernier quart du XVIe siècle, peut-être en 1579, pour Michel de Rimaison. La famille de Rimaison est éteinte vers 1653. Le château est vendu comme bien national en 1794, mais il était déjà inhabité et  en ruines, tel qu'il figure sur le plan cadastral de 1828, de même que le colombier dans la cour (aujourd'hui disparu), et le bâtiment à l'entrée à l'extérieur de l'enclos. En 1817, les ruines sont achetées par Patern Le Mouel qui en utilise une partie pour construire une ferme à Kerdanet sur la commune voisine du Sourn. Une porte est également remployée dans une ferme construite en 1826 au bourg de Bieuzy. Un corps de ferme, construit dans le premier quart du XIXe siècle à l'ouest immédiat du logis, remploie deux cheminées et un escalier secondaire en vis du château. Le puits qui l'accompagne est daté 1814 sur sa superstructure, cependant, sa base paraît plus ancienne, du XVIIe siècle. Les ruines subsistantes du grand corps de logis sont protégées au titre des M.H. en 1925. En 1951 ou 1952, une cheminée encore en place est vendue et remontée au fort de Locmaria à Belle-Isle-en-mer. Enfin, le classement du vestibule en 1958 n'empêche pas la vente des ruines de l'aile nord, remontée au bourg de Pluvigner.","architecture":"RIMAISON, ces quatre portes et le départ de l'escalier sont aujourd'hui les seuls vestiges du grand corps de logis. La chapelle  est située sur la clôture, une position habituelle ; en pierre de taille de granite, elle est en ruines. Non orientée et éclairée au chevet de fenêtres jumelées, elle est peu conforme à la forme habituelle d'une chapelle, si ce n'est son emplacement, adossé à la clôture. Communs en moellon de granite et de schiste, à comble à surcroît, couverts en ardoise d'un toit à croupes, remployant deux blasons en granite portant les armes des Rimaison et la date de 1581. Ferme construite en pierre de taille de granite, couverte en ardoise avec toiture à pignon découvert ; elle possède un comble à surcroît desservi par un escalier en vis en pierre remployé de l'ancien château, et regroupe sous le même toit salle, chambre et étable. Les cheminées sont également remployées, celle de la chambre porte en décor deux bustes en ronde-bosse d'un homme et d'une femme. Dans un enclos en moellon étaient regroupés le corps de logis, les communs, le colombier (disparu) et plus tard, ferme, puits, four. Le corps de logis principal construit en pierre de taille de granite était prévu avec un plan symétrique avec corps d'escalier central, ailes terminées par des pavillons avec tourelle en hors-oeuvre aux angles nord-est et sud-est : seule l'aile nord et son pavillon ont été réalisés. L'accès à l'escalier axial dans-oeuvre tournant à retours sans jour, en maçonnerie, se faisait par un vestibule avec quatre portes, deux donnant sur l'extérieur, deux dans les pièces latérales. Identiques, ces portes se différencient par leurs clefs sculptées de masques. Eléments protégés MH : les ruines: inscription par arrêté du 14 mai 1925. Les ruines de la façade du vestibule: classement par arrêté du 29 mars 1958.","habitants":"famille de Rimaison \r\n        \"","divers":"Château de Rimaison à Bieuzy gps 47° 59' 00\" nord, 3° 03' 46\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Rimaison_1.jpg","../../jctruffet.com/image/image_56/56_Rimaison_2.jpg"]},"Consult_chateau_formulaired9b9":{"id":"Consult_chateau_formulaired9b9","dept":"56","canton":"Moréac","commune":"Le Roc-Saint-André","nom":"Roc_st_André","type":"Château","periode":"XVI","histoire":"deux châteaux à Roc Saint-André dont Villeder et Touche Carné. VILLEDER  La seigneurie est attestée au XVIe siècle. A l'origine, le domaine se composait d'une grande maison avec, de chaque côté, des dépendances. L'entrée était limitée par deux piliers en granit sur un pont surmontant les douves. A l'intérieur les pièces étaient établies en enfilade. Ce manoir correspondait aux reprises des XVII et XVIIIe siècles d'un logis fortifié du XVe siècle dont subsiste la tour octogonale et un escalier à vis intérieur. Entre 1896 et 1900, l'ensemble est transformé en un domaine de style classique. L'élévation antérieure est complètement recomposée. Un pavillon saillant rectangulaire est ajouté à l'élévation postérieure ouest, auquel est accolé dans l'angle intérieur nord une tourelle de latrines. Une galerie fermée relie l'aile nord et la tourelle d'escalier du XVe siècle. Deux pavillons sont construits au nord et au sud, reliés à l'édifice par une porte qui ferme la cour et dans le prolongement desquels s'établissent les deux ailes de communs recomposés. Création d'un jardin à la française dans la cour d'honneur. Le décor intérieur comprend cheminée monumentale, lambris et plafond peint. Le remaniement du domaine illustre un type de restauration visant à monumentaliser le bâtiment par un agrandissement symétrique et une composition générale s'inspirant de l'architecture du XVIIe siècle. Éléments protégés MH : le château, à savoir le logis en totalité, ainsi que les façades et les toitures des communs, des pavillons latéraux de liaison, le portail d'entrée, les douves et le sol de la cour d'honneur : inscription au M.H. par arrêté du 4 juin 2007.","architecture":"TOUCHE-CARNE Le manoir de la Touche-Carné reflète ce qu'était la vie seigneuriale aux alentours de 1440 seigneurie dépendait de la famille de Carré. Au XVIe siècle passa aux Rogier en 1644 séjour de René Descartes. Cette ancienne seigneurie possédait un droit de haute justice s'exerçant dans la vaste salle du rez-de-chaussée. Les salles hautes, sous les combles, ont disparu au XVIe siècle. La porte en arc brisé date du XVe siècle.                                              Le logis principal est aujourd'hui amputé d'une aile en retour d'équerre à droite : la porte de la tour d'escalier en commandait l'entrée. Au rez-de-chaussée, les deux baies éclairent une unique et très vaste salle qui servait entre autre à l'exercice des fonctions administratives et judiciaires du seigneur, chef de cette châtellenie. À l'étage, les baies séparées par de très larges trumeaux éclairent deux zones réservées à la vie privée et pourvues chacune d'une cheminée. La salle sous charpente et les lucarnes qui l'éclairaient ont disparu lors d'une réfection de la charpente au XVIIe siècle. Le bâtiment au sud de la cour, du XVe siècle, servait de métairie. L'ensemble de la Touche-Carné évoque encore fortement le mode de vie seigneurial autour des années 1400. En 1994 achat par M. Claude Lefèvre.","habitants":"Touche Carné ; Famille de Carré.                                             Villeder ; Seigneur locaux\r\n        \"","divers":"à Roc Saint-André dont Villeder grav 3-4-5-6 et Touche Carné. grav-1-2","gps":"","images":["../../jctruffet.com/image/image_56/56_Roc_st_Andr%c3%a9_1.jpg","../../jctruffet.com/image/image_56/56_Roc_st_Andr%c3%a9_2.jpg","../../jctruffet.com/image/image_56/56_Roc_st_Andr%c3%a9_3.jpg","../../jctruffet.com/image/image_56/56_Roc_st_Andr%c3%a9_4.jpg","../../jctruffet.com/image/image_56/56_Roc_st_Andr%c3%a9_5.jpg","../../jctruffet.com/image/image_56/56_Roc_st_Andr%c3%a9_6.jpg"]},"Consult_chateau_formulaire1336":{"id":"Consult_chateau_formulaire1336","dept":"56","canton":"Questembert","commune":"Rochefort en terre","nom":"Rochefort_en_Terre","type":"Château","periode":"XII-XIV-XVII","histoire":"ROCHEFORT en TERRE,  le premier château était l'oeuvre des seigneurs de Rochefort apparus au XIIe siècle. Tenu à partir de 1374 par les Rieux, l'une des plus puissantes familles de la Bretagne ducale, le château présente un plan pentagonal allongé dont les quatre côtés subsistent. En grande partie détruit en 1488 sur l'ordre du Roi Charles VIII, la reconstruction est entreprise par Jean IV de Rieux en 1490 et y adjoint le châtelet et la tour sud. Ce deuxième château est pillé une première fois durant les guerres de la Ligue en 1594 par les troupes du duc de Mercur. Partiellement reconstruit par la famille Larlan au début du XVIIe siècle, il est pillé une seconde fois en juillet 1793 après le combat de mars, le laissant presque entièrement détruit. Seul bâtiment subsistant, l'écurie du XVIIe siècle  est transformée en habitation. Le site est acquis par la famille Juhel en 1843 et en restera la propriété jusqu'à sa vente en 1907 au peintre américain Alfred Klots. Celui-ci entreprend de transformer les ruines en un manoir néogothique en réemployant, en partie, les matériaux d'origine. Éloignée des combats, la propriété est utilisée comme hôpital de campagne pendant les deux guerres mondiales. La propriété est vendue en viager au conseil général du Morbihan en 1978 par la belle-fille du peintre Isabel. Celle-ci renonce à l'usufruit en 2009, prélude à la cession du bâtiment à la commune le 30 janvier 2013. L'ensemble des vestiges, y compris les façades et toitures du manoir et de la chapelle, fait lobjet dune inscription au titre des M.H. depuis le 20 décembre 1990. Le manoir d'Alfred Klots est par ailleurs labellisé « Patrimoine du XXe siècle » . Éléments protégés MH : les façades et les toitures du manoir et de la chapelle.","architecture":"A deux kilomètres au nord ouest de Rochefort en Terre   TALHOUET,   Le manoir probablement bâti au XIVe-XVe siècle, est remplacé par une nouvelle demeure en 1580-1582 de plan en L. Une seconde phase de travaux a lieu en 1647, avec agrandissement du corps de logis vers l'est. Dans les années 1850, la demeure est agrandie vers l'ouest (ajout d'un pavillon au corps de logis principal, destiné à abriter un jardin d'hiver communs). Il subsiste des restes d'architecture des XVIe et XVIIe siècles , crédence en granite de la fin du XVIe sculptée d'un décor de style gothique, porte en granit, escalier de pierre à paliers droits du XVIIe siècle. Dans la seconde moitié du XIXe siècle, le décor est mis au goût de l'époque, boiseries, décor sculpté et peint des plafonds à la française de la salle de billard et du grand salon vers 1860. Le manoir médiéval, avec dépendances et colombier, a été détruit à la fin du XIXe siècle. Eléments protégés MH : le logis, la chapelle, les façades et les toitures des communs, les jardins en terrasses avec leurs murets et structures maçonnées, les murs de clôture, location chambres d'hôtes près de Rochefort en Terre.","habitants":"Rochefort; Famille Larlan                                                            Talhouet ;Famille de Talhouet\r\n        \"","divers":"le fort de Rochefort Grav-4-5                              gps 47° 42' 01\" nord, 2° 20' 07\" ouest et Talhouët grav -1-2-3","gps":"","images":["../../jctruffet.com/image/image_56/56_Rochefort_en_Terre_1.jpg","../../jctruffet.com/image/image_56/56_Rochefort_en_Terre_2.jpg","../../jctruffet.com/image/image_56/56_Rochefort_en_Terre_3.jpg","../../jctruffet.com/image/image_56/56_Rochefort_en_Terre_4.jpg","../../jctruffet.com/image/image_56/56_Rochefort_en_Terre_5.jpg","../../jctruffet.com/image/image_56/56_Rochefort_en_Terre_6.jpg"]},"Consult_chateau_formulairee59c":{"id":"Consult_chateau_formulairee59c","dept":"56","canton":"Pontivy","commune":"Pontivy","nom":"Rohans_Pontivy","type":"forteresse","periode":"XV-XVII","histoire":"DUC de ROHAN, le château occupe l'extrémité d'un promontoire et forme un quadrilatère avec tours d'angle, le tout entouré de fossés secs. Construction du château à flanc de colline, sous Jean II de Rohan, de 1479 à 1488. En 1502-1503 percement des lucarnes de l'élévation ouest. En 1560, Henri II de Rohan fonde l'Eglise réformée de Pontivy. En 1603, la vicomté est érigée en duché-pairie, en 1621 Henri de Rohan est élu général des huguenots de France. Pendant les guerres de Religion, le château est occupé par les troupes de Mercoeur. C'est  à  cette époque que date la ruine de la tour sud-est (un inventaire de 1621 ne mentionne que trois tours). Déchu de ses biens et de ses titres en 1627, Henri II les retrouve avec l'édit de Grâce de 1629 et Pontivy est la seule forteresse des Rohan qui n'ait pas été démantelée. Au XVIIIe siècle, les fossés sont transformés en promenade. Un plan de 1781 signale que la tour nord est menacé  de ruine. Sous la Révolution et l'Empire, le château abrite le tribunal et les instances administratives de la nouvelle ville en attendant la construction des bâtiments prévus par le décret de 1802.\r\nAu XIXe siècle, une communauté religieuse occupe le château des Rohan, et agrandissement de la chapelle. Les soeurs quittent le bâtiment en 1884. La demeure est ensuite louée par la famille de Rohan, à la fin XIXe du siècle, à M. Jérôme Le Brigand qui y fonde un musée breton, puis en 1909 à la société sportive de la Garde Saint Ivy. En septembre 1939, le château est réquisitionné par l'armée française et sert de caserne à des troupes polonaises.","architecture":"DUC de ROHAN, par lettre datée du 24 octobre 1951, adressée à la municipalité de Pontivy, Madame la duchesse de Rohan fait savoir qu'elle consent tant en son nom qu'au nom de son fils Monsieur le duc de Rohan, à la location à la ville, pour une durée de 99 ans, et moyennant un loyer de un franc par an, du château des Rohan. La location stipule que la ville de Pontivy prend en charge les travaux de restauration, de réfection et d'entretiens. Le château est restauré de 1955 à 1972 et classé Monument Historique le 30 décembre 1953.Les statues, exposées dans la grande galerie sont celles de la Vierge, de saint Maurice à cheval, de Sainte Catherine, de Saint Germain, de Sainte Marguerite, de Saint Isidore, de Saint-Louis et de Saint Jean-Baptiste. Sur la cheminée monumentale, haute de 5,5 mètres et large de plus de 3 mètres, qui provient du manoir de Coëtcandec, figure le blason de la famille des Chohan propriétaire du manoir de Coëtcandec. L'escalier en pierre et fer forgé date du XVIIIe siècle.  Éléments protégés MH : le château (à l'exception des parties classées) : inscription par arrêté du 26 octobre 1925. Les façades et les toitures, les cours et les fossés : classement par arrêté du 30 décembre 1953.","habitants":"la famille de Rohan\r\n        \"","divers":"Château des Rohans à Pontivy                                                             gps  48° 04' nord, 2° 59' ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Rohan_Pontivy_1.jpg","../../jctruffet.com/image/image_56/56_Rohan_Pontivy_2.jpg","../../jctruffet.com/image/image_56/56_Rohan_Pontivy_3.jpg","../../jctruffet.com/image/image_56/56_Rohan_Pontivy_4.jpg"]},"Consult_chateau_formulairea13e":{"id":"Consult_chateau_formulairea13e","dept":"56","canton":"Moréac","commune":"Ruffiac","nom":"Ruffiac_56","type":"Château","periode":"XV_XVII","histoire":"A Ruffiac le château de Ruée, de Balangard.                                              RUEE, manoir construit vers 1667, selon la date portée sur un pavillon, par Jean de la Bourdonnaye et sa femme Louise de la Ruée, comme l'indiquent les armoiries d'alliance sculptées au-dessus du portail ; agrandissement pendant la 2e moitié du XIXe siècle. La métairie de la Ruée est mentionnée dans le texte de réformation (recensement) de la noblesse ; cette métairie, \"acquise depuis XI ans de Robert Jacquet et Robert Chanu par Raoul Pibourt\" appartient, en 1513, à Jehan de la Bourdonnaye. En 1536, elle appartient à Louis de la Bourdonnaye dont les différents successeurs sont : Jean de la Bourdonnaye et sa femme Louise de la Ruée (mentionnés entre 1670 et 1677), Yves-Nicolas de la Bourdonnaye et sa femme Françoise Le Breton (mentionnés entre 1680 et 1694), Louis de la Bourdonnaye et sa femme Jeanne de la Landelle (mentionnés entre 1756 et 1780). À cette époque, la métairie est sur le territoire de Tréal. la seigneurie de la Ruée, berceau de la famille de ce nom, passa plus tard aux La Bourdonnaye, puis aux Castel et aux Préaudeau. La demeure actuelle est datée de 1632 sur une fenêtre, avec un remaniement moderne en 1930. Depuis cette date, la propriété appartient à la famille Pinczon du Sel. à un étage carré,  Escaliers : escalier hors-oeuvre   gros-oeuvre : schiste ; moellon sans chaîne en pierre de taille  à  toit à longs pans ; toit en pavillon ; croupe  en  ardoise.","architecture":"BALANGARD, le manoir de Balangeard (1634), récemment restauré et situé à La Rivière. L'ancienne seigneurie était autrefois la propriété de la famille Agaisse (Guillaume Agaisse en 1481, Guillaume et Gilles Agaisse en 1536), La Chesnaye, puis de la famille Noblet. Le manoir possédait autrefois une chapelle privée. La date de 1634 est inscrite sur le linteau de la porte d'entrée. On y trouve deux statues datées de 1625 et représentant les propriétaires de l'époque : Alain Chesnaye (avocat au parlement de Bretagne) et son épouse Françoise Bressel. Ces statues, qui se dressaient jusqu'en 1840 sur les lucarnes, se trouvent aujourd'hui sur les piliers du portail d'entrée . Au XVIIe siècle le fief passe à la famille de la Rivière qui acquerra en 1664 la seigneurie voisine du Ploeuc, le domaine échoit aux Noblet et aux Lapallec. Aujourd'hui René Lepallec mène la restauration de l'édifice, devenu l'association du Glad, qui fédère plusieurs associations du pays de Redon. L'édifice le corps de logis coiffé d'un toit en croupe, façade principale côté sud à trois travées. Au XVIIe siècle est ajoutée à la façade nord une tour hors-oeuvre, coiffée d'un toit en pyramide tronquée.  Cette tour abrite  un escalier à volées droites, est flanquée d'une petite tour ronde renfermant les latrines et d'une tourelle en saillie dont l'escalier donne accès à une pièce rappelant les chambres hautes des donjons.","habitants":"Balangard ; Famille Agaisse                                                         Ruée ;Famille de Ruée\r\n        \"","divers":"A Ruffiac gps 47° 49' 09\" nord, 2° 16' 50\" ouest le château de Ruée grav-3, de Balangard grav-1-2","gps":"","images":["../../jctruffet.com/image/image_56/56_Ruffiac_56_1.jpg","../../jctruffet.com/image/image_56/56_Ruffiac_56_2.jpg","../../jctruffet.com/image/image_56/56_Ruffiac_56_3.jpg"]},"Consult_chateau_formulaire57ef-2":{"id":"Consult_chateau_formulaire57ef-2","dept":"56","canton":"Séné","commune":"Theix","nom":"Salarun","type":"Manoir","periode":"XV","histoire":"SALARUN,  berceau de la famille du même nom, fondatrice de la chapelle Notre-Dame-Blanche à Theix en 1239. L'enclos et le logis ouest datent de la première moitié du XVe siècle, la salle haute sous charpente, les cheminées sur gouttereaux portant les armoiries des Sallarun. Remaniements des baies aux XVIe et XVIIe siècles, pente de la toiture modifiée au milieu XVIe siècle. Corps principal en équerre.  Milieu du XVIe siècle  un incendie vers 1734 (information orale) apporta un remaniement des ouvertures, la reprise du pignon sud, la reconstruction d'un appentis au sud, la construction de l'escalier central en bois.","architecture":"SALARUN,  changement de propriétaire en 1890 d'où remaniement total de l'élévation est avec remploi partiel du linteau de la cheminée du rez-de-chaussée de l'aile sud comme linteau de la porte, adjonction de lucarnes néo-gothique, construction d'une tour carrée au nord-est remplaçant un corps en légère saillie (escalier) visible sur le cadastre de 1844. Porte bouchée et fenêtre ouverte au rez-de-chaussée du pignon sud. Grange carrée au nord en ruine (visible en 1844). Colombier peut-être  du  XVIe siècle signalé en ruine dès 1844 (partie supérieure). Puits entièrement remonté à la fin du XIXe siècle. Construction d'une ferme de type ferme modèle à l'extérieur de la clôture vers 1890. Grange datée de 1827.\r\nLogis ouest à comble à surcroît, pignon découvert, cheminées à linteau sculpté, escalier de distribution extérieur droit ; corps principal à étage carré et comble à surcroît, escalier dans-oeuvre, pignons découverts sauf pignon nord, à ruellée, aile ouest à toit à noue, corps d'angle à la jonction de l'aile ouest et du corps principal couvert en appentis.","habitants":"Famille de Salarun\r\n        \"","divers":"Château de Salarun à Theix gps 47° 37' 47\" nord, 2° 39' 17\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Salarun_1.jpg","../../jctruffet.com/image/image_56/56_Salarun_2.jpg","../../jctruffet.com/image/image_56/56_Salarun_3.jpg"]},"Consult_chateau_formulaire5e3e-2":{"id":"Consult_chateau_formulaire5e3e-2","dept":"56","canton":"Vannes","commune":"Sarzeau","nom":"Sarzeau","type":"Château","periode":"XV-XVI-XVII","histoire":"Trois châteaux à Sarzeau, Coetihuel, Kéralier Kerbot et Kérampoul,                                                                      COETIHUEL, le développement de la ville aux XIVe et XVe siècles est dû à l'installation de la cour ducale à Suscinio, fondation en 1341 par le duc Jean III d'un hôpital tenu par des trinitaires. A la fin du XVIe siècle, création de la communauté de Rhuys par les marchands et notaires royaux, communauté de ville qui gère également les intérêts d'Arzon et de Saint-Gildas. En 1616, création par Louis XIII d'un marché par semaine et de six foires par an, puis, par Louis XIV en 1658, d'un autre marché hebdomadaire et de quatre nouvelles foires. En 1668, naissance d'Alain René Lesage. En 1727, création d'une capitainerie de garde-côtes. En 1727, Pierre de Francheville fonde un hôpital tenu par les filles de la Sagesse. Désaffecté à la Révolution, il fut rétabli comme hospice en 1828. La seigneurie de Coëtihuel était aux Sieurs du Lien en 1578, et aux Thomas en 1660. Un premier manoir du XVIe siècle a été rasé vers 1870.  D'un deuxième manoir, il subsiste un pavillon  de 1830 et la porte des communs. La demeure actuelle date de 1908. Le château de Coëtihuel a été réalisé pour M. Roussin-Harrington dans le style anglo-normand, d'après les plans de l'architecte parisien Courcoux. Près de la chapelle on a trouvé un cercueil de pierre de 2,10 m de long, avec la place de la tête taillée à angles droits. Coëtihuel, appartient à la famille Massiet du Biest depuis 1935.","architecture":"KERALIER,   anciennement dénommé Keralvé, le lieu eut un premier Sérent château dès le XIVe siècle qui était propriété des vicomtes de Léon, puis des vicomtes de Rohan à compter de 1363. Le domaine appartint ensuite aux Kerbot, aux Kervillars, aux Locet, aux Sérent aux XVIIe-XVIIIe siècles, aux Le Gouvello, à Émile de Kermoysan en 1845, aux Lamarzelle en 1858, par alliance aux Le Gallais, au comte Victor de Chouzy en 1927 et à M. François Bénéat Chauvel en 1933. Il est demeuré dans cette famille depuis cette date. Blotti dans un grand parc boisé et clos, vestige de la forêt, la demeure porte sur façade Nord la date de 1670 et sur la lucarne Sud, 1764. Dans sa salle se tinrent les assemblées de la Société Patriotique Bretonne, instituée par M. de Sérent peu avant la Révolution. La tribune portait cette inscription : \"Ici on sert son Dieu sans hypocrisie, son roi sans intérêt et sa patrie sans ambition\", Le château fut alors baptisé \"Temple de la Patrie\".                                                                                                                   KERAMPOUL, édifice du XVe siècle, dont subsiste une cheminée.  le bâtiment dont elle dépend, sans doute du XVIe siècle, ayant été très modifié: reprise de la partie supérieure de la façade sur cour, avec abaissement au XIXe siècle. Logis au sud de la première moitié du XVIIe siècle, bâti sur un édifice plus ancien. Portail d'entrée fin  du XVIe siècle ou début XVIIe siècle. Nombreux remaniements au XIXe siècle (logis, aile ouest). Bâtiment ouest en moellon de granite couvert en ardoise à pignon découvert avec tour d'angle à un étage carré avec toit conique ; logis en moellon de granite à comble à surcroît, avec toit en ardoise à pignon découvert. La seigneurie appartenait aux Francheville au XVIe siècle, puis aux Cillart. L'édifice appartient maintenant au marquis de Gouvello de Keriaval. Éléments protégés MH : les façades et les toitures du bâtiment rectangulaire flanqué d'une tour d'angle : inscription par arrêté du 24 septembre 1968.","habitants":"Coetihuel ;    M. Roussin-Harrington                                       Keralier ;Famille de Kerbot                                                             Kérampoul ; Famille des Francheville \r\n        \"","divers":"à Sarzeau, Coetihuel grav-1, Kéralier grav-2-3  et Kérampoul grav-4-5        Kerbot-Grav-6-7                                             Sarzeau Gps 47° 31' 41\" nord, 2° 46' 07\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Sarzeau_1.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_2.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_3.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_4.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_5.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_6.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_7.jpg"]},"Consult_chateau_formulaire01fc":{"id":"Consult_chateau_formulaire01fc","dept":"56","canton":"Vannes","commune":"Sarzeau","nom":"Sarzeau_II","type":"Château","periode":"XVI-XVII-XVIII","histoire":"Deux châteaux à Sarzeau; Kergeorget et Kerlevenan.                   KERGEORGET,  la cour ducale à Suscinio est installé au XVe siècle : création d'une sénéchaussée, fondation en 1341 par le duc Jean III d'un hôpital tenu par des trinitaires. A la fin du XVIe siècle, création de la communauté de Rhuys par les marchands et notaires royaux, communauté de ville qui gère également les intérêts d'Arzon et de Saint-Gildas.  En 1668, naissance d'Alain René Lesage. En 1727, création d'une capitainerie de garde-côtes. En 1727, Pierre de Francheville fonde un hôpital tenu par les filles de la Sagesse. Désaffecté à la Révolution, il fut rétabli comme hospice en 1828. Érection en commune en 1790, en chef lieu de canton en 1801. Ce château aurait été construit vers 1860 pour Amédée de Francheville, peut-être par Jacques Mellet, architecte rennais. Le bâtiment a été restauré en 1992 avec ajout d'une véranda surmontée d'une terrasse. Remploi d'une cheminée du XVIIe siècle. Château en moellon enduit, lucarnes, ouvertures et balcons en calcaire ; toit à pignon découvert, sauf tours antérieures à toit conique, corps postérieur à toit polygonal. Armes des Francheville sur la tour d'escalier et armes des picot de Plédran sur la tour d'escalier ouest. Il est actuellement la propriété de M. Françis Le Manchec qui vient de restaurer entièrement l'édifice, élévation ordonnancée ; un étage carré ; étage de comble escalier hors-oeuvre ; escalier en vis sans jour ; en charpente, gros-oeuvre : granite ; en calcaire ; pierre de taille,  toit à longs pans ; pignon découvert ; noue ; toit conique ; toit polygonal, couverture en  ardoise.","architecture":"KERLEVENAN, en 1641 par alliance passe aux Gouvello,  a été construit  en style pretit trianon vers 1780 par l'archictecte Johannes, pour la famille de Gouvello sur l'emplacement d'un ancien manoir. En 1780 mariage de Joseph-Armand  marquis de de Gouvello avec Catherine-Charlotte de Peyrac  et entreprennent en 1782  la reconstruction du château. Le domaine a été vendu durant la Révolution comme bien national. Parmi les fabriques de jardin prévues par le marquis, deux ont été réalisées, le Temple de l'Amour et le pavillon chinois, un bassin et des escaliers. Au XIXe siècle, le château, très abîmé, a été racheté par la famille de Gouvello qui a fait refaire le perron et dessiner un jardin à l'anglaise, le Temple de l'Amour a été transformé en chapelle et une serre a été construite. Château en moellon de granite enduit, baies, colonnade, pilastres et balustrade en calcaire, un étage carré et étage de comble, escalier tournant à retours avec jour, toit à croupes, noue (lucarnes, fronton) ; écuries en moellon enduit, ouvertures en brique, à un étage carré et étage de comble, escalier tournant à retours avec jour, toit à croupes, noue (lucarnes, fronton); pavillon chinois en torchis enduit, en rez-de-chaussée, toit polygonal (à la chinoise); temple en moellon enduit et pierre de taille, en rez-de-chaussée, toit à longs pans, à croupes, à noue, fausse voûte en berceau plein-cintre ; communs en moellon enduit, à comble à surcroît, toit à longs pans à pignon couvert.\r\nÉléments protégés MH : les façades et les toitures du château et des écuries ; les pièces suivantes du rez-de-chaussée avec leur décor : la grande et la petite salles à manger, le boudoir ; la chapelle et le pavillon chinois : classement par arrêté du 4 novembre 1982.","habitants":"Kergorget; Famille de Francheville                             Kerlevenan ;  famille de Gouvello\r\n        \r\n        \"","divers":"à Sarzeau gps 47° 31' 41\" nord, 2° 46' 07\" ouest; Kergeorget grav 1-2-3  et Kerlevenan grav -4-5-6-.","gps":"","images":["../../jctruffet.com/image/image_56/56_Sarzeau_II_1.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_II_2.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_II_3.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_II_4.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_II_5.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_II_6.jpg"]},"Consult_chateau_formulaire2b97":{"id":"Consult_chateau_formulaire2b97","dept":"56","canton":"Vannes","commune":"Sarzeau","nom":"Sarzeau_III","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux dans cet article sur Sarzeau, Kerthomas, Kervert et Neret.                                                                                                                                                 KERTHOMAS, manoir déclaré maison noble en 1688, attesté en ruine en 1709. Restauré par François Jouchet, acquéreur en 1715 : le cadastre de 1827 montre une forme en équerre avec un logis et des communs en retours. Acheté en 1857 par Jules de Francheville, l'édifice fut restauré et agrandi ou entièrement reconstruit de 1855 à 1859 sur des plans de Jacques Mellet, architecte rennais. Remploi de la fenêtre est du XVe siècle provenant de la chapelle de Kerguet. Ecuries et remise réalisées sur un plan de 1866 de Mayeux, entrepreneur, pour Jules Dumoulin de Paillard. Enclos du jardin, du potager et du verger de 1866. Fabrique de jardin de 1876, château en moellon enduit, ouvertures en calcaire, souches de cheminées en calcaire ou en brique, couvert en ardoise ; corps principal à un étage carré et étage de comble, couvert d'un toit à pignon découvert, tours et châtelet d'entrée à un étage carré et étage en surcroît, couverts d'un toit conique (sauf partie centrale du châtelet à toit en pavillon), pavillon nord-ouest à un étage carré et étage en surcroît, toit en pavillon, sa tourelle d'escalier couverte d'un toit polygonal, escaliers hors-oeuvre dans tours en vis sans jour ; écuries et remise en moellon enduit, tympan en brique, en rez-de-chaussée avec comble à surcroît, couvertes d'un toit à longs pans à pignon couvert et à noue ; fabrique de jardin en rez-de-chaussée avec base en moellon de granite, partie haute à pan de bois, couverte en chaume avec toit en pavillon.","architecture":"NERET, enclos XVIIe siècle avec portail portant blason à croix de Malte  inséré au début du XIXe siècle. Château construit vers 1830 pour la famille Renaud, peut-être par Louis Richelot, architecte rennais, logement avec remise à voitures édifié en 1887 (date portée). Puits daté 1898. Blason déposé dans la cour  avec croix de Malte. Colombier du XVIIe siècle, datation incertaine. Cette propriété était autrefois au sire de Senna, Chevalier de Malte, qui habitait un manoir très ancien. Elle fut réaménagée par la famille Renaud, d'Auray, puis acquise par le comte Auguste de Montaigu. Château de plan allongé, double en profondeur, à cinq travées, avant corps, à cinq pièces par étage, loggia, pièces en enfilade, château en moellon enduit et calcaire (travée centrale, loggia, ouvertures, lucarnes), à un étage carré et étage de comble, élévation ordonnancée, toit à longs pans à croupes et noue (lucarnes), escalier dans-oeuvre tournant à retours avec jour en charpente avec rampe en fer forge,  puits en moellon.                                                                                                      KERVERT, à  Saint Gildas de Rhuys, situé au sud-ouest de Sarzeau  dans un beau parc boisé et fait face à la baie d'Abraham sur l'Atlantique. Ses communs abritent les bureaux du Golf voisin, à gauche de la route qui mène vers Le Net. Construit en 1827 par la famille Langlais, le domaine était la propriété du Général Masselin jusqu'en 1910. Celui-ci y avait ajouté une aile identique à celle existant déjà. La partie centrale a été, semble-t-il, construite sur l'emplacement d'un bâtiment plus ancien. Acquis par M. Louis Jamont en 1910, l'édifice est resté depuis dans sa famille.","habitants":"Berthomas ; Famille de François Jouchet                                                     Neret ; Famille Renaud                                                                               Kervert ; Famille Langlais\r\n        \"","divers":"sur Sarzeau  gps 47° 31' 41\" nord, 2° 46' 07\" ouest, Kerthomas grav-1 et Neret grav -2-3.","gps":"","images":["../../jctruffet.com/image/image_56/56_Sarzeau_III_1.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_III_2.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_III_3.jpg"]},"Consult_chateau_formulaire8295":{"id":"Consult_chateau_formulaire8295","dept":"56","canton":"Vannes","commune":"Sarzeau","nom":"Sarzeau_IIII","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet aricle à Sarzeau; Truscat et Ste-Margueritte.                                                                                                 TRUSCAT, le premiert est Jean Maubec, qui occupa les fonctions de secrétaire ducal sous François II, ce personnage, très proche de lentourage du prince, transmis ses biens à sa fille Olive, épouse d'Olivier de Levenoy, à qui Anne de Bretagne confia la charge de forestier et garde des bois, parcs et forêts de la juridiction de Rhuys. Les héritiers de Jean Maubec sendettèrent et durent hypothéquer les salines de Truscat, quils vendirent finalement à un riche négociant, Etienne Francheville entre 1507 et 1515. Il fut le premier à sintituler sieur de Truscat, c'était le fils de Pierre Francheville, officier des finances très dévoué à la cause de François II, sa fortune était alimentée par le commerce des vins et épices. Les Francheville durent attendre 1643 pour obtenir lanoblissement de la terre de Truscat, mesure qui consacre lascension de la famille de Francheville dans la noblesse de robe au cours du XVIIe siècle. C'est Gervais de Francheville qui fit reconstruire le manoir à partir de 1702. La destruction du manoir primitif, dont ne subsistent que les dépendances et la chapelle du XVIe siècle, symbolise un peu le nouveau départ de la famille de Francheville, dont Gervais devint alors \"Chef de nom et darmes\". Le cadastre établi en 1828 conserve le plan dun bâtiment rectangulaire, dont la façade nord, côté golfe, était primitivement linéaire. Seule la façade sud, tournée vers une cour et de vastes pelouses, était agrémentée de deux avant-corps à peine marqués. Elle fut conçue à lorigine comme la façade principale. Un peu délaissé dans la deuxième moitié du XVIIIe siècle par les Francheville (la branche aînée) qui séjournaient plus souvent dans leur Hôtel Renaissance que dans le Vannetais,","architecture":"STE-MARGUERITE, premier manoir détruit avant 1670. Château construit en 1670 (date portée sur l'élévation nord), probablement pour la famille Jocet. Remaniement de l'élévation sud en 1764, pour la famille de Sérent. Lucarnes nord cimentées fin XIXe siècle. Chapelle Sainte-Marguerite deuxième moitié du XVIIe siècle, clocher refait à la fin du XIXe siècle. Puits et colombier du XVIIe siècle. Colombier détruit au début du XXe siècle. Communs datés 1872 et 1874. Distillerie fondée en 1886 par G. de Lamarzelle, propriétaire. Château enduit à un étage carré et étage de comble, lucarnes et corniche en calcaire, toit à croupes, noue, appentis, escalier dans-oeuvre tournant à retours sans jour en maçonnerie ; chapelle enduite à un vaisseau, toit à pignon découvert à l'est, à croupe à l'ouest; colombier enduit, toit conique ; puits en moellon ; communs enduit, en rez-de-chaussée avec comble à surcroît, toit à pignon découvert, noue.                                                                                                                                          TRUSCAT  le château fit lobjet dune véritable restauration au XIXe siècle, par le Comte Gabriel de Francheville, puis par son fils Jules, qui renforça, par deux pavillons dangle, laspect lourd et massif de lensemble. De cette époque date également laménagement des extérieurs en jardin paysager. Gabriel de Francheville procéda à de nombreuses plantations et sintéressa passionnément à la culture du mûrier et lélevage des vers à soie vers 1840. Cette entreprise lui valut un certain renom à léchelon national, mais ne put dépasser le stade expérimental, malgré les atouts climatiques de la presquîle de Rhuys. Aujourd'hui aux héritiers M. Charles Dumoulin de Paillart.","habitants":"Truscat ;Famille de  Jean Maubec                                                          Ste Marguerite ; Famille de Sérent\r\n        \"","divers":"à Sarzeau gps 47° 31' 41\" nord, 2° 46' 07\" ouest; Truscat grav 1 à 4 et ste-Margueritte notre dame Grav-5.","gps":"","images":["../../jctruffet.com/image/image_56/56_Sarzeau_IIII_1.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_IIII_2.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_IIII_3.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_IIII_4.jpg","../../jctruffet.com/image/image_56/56_Sarzeau_IIII_5.jpg"]},"Consult_chateau_formulaire96cf":{"id":"Consult_chateau_formulaire96cf","dept":"56","canton":"Vannes","commune":"Saint Avé","nom":"St_Avé","type":"Château","periode":"XVI-XVII-XIX","histoire":"Trois châteaux  à St Avé, Beauregard, Kérozer et Coédigo.                     BEAUREGARD, premier manoir existant en 1514 et appartenant à Pierre Rolland, peut-être rebâti au XVIIe siècle et subsistant encore en 1840 (corps nord). Corps principal actuel construit vers 1750 pour la famille de Montigny. Partie en hémicycle au sud, datée 1783. Achat vers 1860 par Lucien Douillard, architecte: destruction d'une grande partie de l'aile nord avec disparition des vestiges du manoir, et surélévation d'un étage, création d'un avant corps central, reconstruction de l'escalier. Reconstruction des communs au XIXe siècle et vers 1900. Logement de gardien et puits bâtis au XVIIIe siècle, enclos avec fossés détruit à la fin XIXe siècle, jardin dessiné par André Le Nôtre. Logis à plan en L ; corps principal enduit à deux étages carrés toit à longs pans terminés par une croupe ronde au sud, noue au nord, escalier tournant à retours avec jour ; corps en retour enduit à deux étages carrés, toit à longs pans, croupe ronde à l'ouest, noue à l'est ; maison de gardien enduit, un étage carré, toit à longs pans, croupe ; écuries enduites, comble à surcroît, chenil, pigeonnier en moellon et brique, toit à longs pans, appentis, toit en pavillon.","architecture":"KEROZER, (jadis Kerozet) était une seigneurie citée en 1427 comme propriété des Clerigo. En 1515, elle est dans la famille La Bourdonnaye, en 1710 dans celle de Kermoysan. La baronne de L'Espée achète le domaine en 1865 et fait transformer le manoir en véritable château en 1895, d'après des plans dûs à l'architecte Bourdillat. En 1919 M. d'Unienville l'achète et le vend dix ans plus tard à François Romieu. Celui-ci le cède vers 1946 aux Frères des Écoles Chrétiennes, qui installent leur maison de retraite en 1949. Château et domaine (chapelle, colombier, étang, bois et vieux moulin) sont parfaitement entretenus et constituent un ensemble calme et reposant.                                                                                                                COEDIGO, la seigneurie appartint à la famille Quelen, aux Trévégat puis aux Cillart. Le superbe logis à tourelle a été construit au XVIe siècle par Jacques Colombel, drapier de Vannes, l'entablement supérieur d'une lucarne porte la date de 1588. En 1719, le château fut habité par Olivier Delourrne, architecte de Vannes. Par succession il échoit à M. Cornulier, avocat au Parlement de Bretagne. Au XIXe siècle, il passe aux Ménardeau, La Bourdonnaye et Botherel. Depuis 1974, c'est la demeure du comte Jacques de Courcy qui y aménage un beau parc planté d'arbres. Le logis principal est constitué de deux pièces au rez-de-chaussée et à l'étage et d'une tour contenant l'escalier; un second bâtiment a été ajouté au nord, sans doute au XVIIe siècle..  Éléments protégés MH : les façades, les toitures et les deux cheminées de l'étage du logis du XVIe siècle : inscription par arrêté du 18 octobre 1990.","habitants":"Beauregard ; Famille de Montigny                                                 Coedigo  ;  Famille de Jacques Colombel,                                 Kerozer ; Famille La Bourdonnaye,\r\n        \"","divers":"à St-Avé,gps 47° 41' 14\" nord, 2° 44' 00\" ouest   Beauregard grav-1-2-3, Kérozer grav-4-5 et Coédigo  Grav-7. GPS : 47° 41' 25\" Nord, 2° 43' 14\" Ouest","gps":"47° 41' 25\" Nord, 2° 43' 14\" Ouest","images":["../../jctruffet.com/image/image_56/56_St_Av%c3%a9_1.jpg","../../jctruffet.com/image/image_56/56_St_Av%c3%a9_2.jpg","../../jctruffet.com/image/image_56/56_St_Av%c3%a9_3.jpg","../../jctruffet.com/image/image_56/56_St_Av%c3%a9_4.jpg","../../jctruffet.com/image/image_56/56_St_Av%c3%a9_5.jpg","../../jctruffet.com/image/image_56/56_St_Av%c3%a9_6.jpg","../../jctruffet.com/image/image_56/56_St_Av%c3%a9_7.jpg"]},"Consult_chateau_formulaire2e27":{"id":"Consult_chateau_formulaire2e27","dept":"56","canton":"Vannes","commune":"St-Avé","nom":"St_Avé_II","type":"Château","periode":"XV-XVI-XVII","histoire":"Deux châteaux dans cet article de sainte-Avé,  ste Anne et Rulliac.                                                                                      STE-ANNE, la seigneurie appartient en 1427 à la famille Le Clérigo jusqu'en 1515, puis aux la Bourdonnaye jusqu'en 1753 : de cette époque subsistait un corps de logis à étage du XVIe siècle, peut-être logis de l'ancien manoir, devenu dépendance, puis détruit lors de la construction des communs au XIXe siècle. Corps principal construit peut être au XVIIe siècle, dont reste une cheminée à la cave, la base d'une autre cheminée et une tour d'escalier circulaire. Chapelle mentionnée en 1691, détruite. Construction de la fontaine de dévotion en 1766 déplacée au XXe siècle, du pigeonnier en 1768, pour Jean Baptiste de Kermoysan. Le château fut reconstruit en 1895 pour la baronne de l'Epée par l'architecte Bourdillat, avec conservation ou réutilisation d'éléments anciens, selon le schéma de l'ancien château : pavillon nord et partie haute de la tour d'escalier nord reconstruits, construction des écuries, à l'emplacement du bâtiment du XVIe siècle, construction de la chapelle Sainte-Anne avec sablières imitées de celles de la chapelle Notre Dame du Loc (Saint Avé). Vers 1960, transformation en maison de retraite : allongement de la demeure vers l'est, communs surélevés et modifiés, ferme à l'est reconstruite. abrite une maison de retraite.","architecture":"Ste-ANNE, logis principal en pierre de taille sur cave, un étage carré, escalier central dans-oeuvre, tournant à retours avec jour, escalier dans tourelle hors-oeuvre en vis sans jour en maçonnerie, salon à l'italienne à l'ouest avec escalier en vis suspendu avec cage ouverte; toit de la partie centrale à longs pans à croupes; tour d'escalier et tour sud: toit conique ; pavillons nord et sud couverts en pavillon ; partie nord enduite, toit à croupes, étage de comble ; chapelle à vaisseau unique, toit à longs pans à pignon découvert, ardoise, pierre de taille et enduit ; communs enduit, en rez-de-chaussée, toit à longs pans à pignon découvert, excepté le pavillon central couvert en pavillon ; colombier en moellon ; granite en couverture, extrados de voûte.                                                                                                         RULLIAC, connu dès 1425, il était aux Lestrelin, puis aux d'Arz au XVe siècle, avant de passer aux Brodeven, aux Rolland et aux d'Arradon au XVIIe siècle, puis aux Lantivy et aux La Haye par alliance. Vendu aux Viel de Poulpry, il revient ensuite par mariage aux d'Argence, puis à Jean de Filhol de Camas (1767). La dernière fille de cette famille, Cécile Le Diberder, hérite du château. Ses enfants le vendent en 1967 à M. Maurice Dubois. Ses fils, Alain et Jean Marc, en sont aujourd'hui propriétaires. Le château est une construction Renaissance (façade 1555), porte à anse de panier avec pilastres et fronton triangulaire, fenêtres également ornées de pilastres et frontons triangulaires ou demi-circulaires avec coquille, animaux sculptés, figures, personnages et écussons. La chapelle domestique a disparu. Une grosse tour carrée a été ajoutée à l'arrière du corps de logis à l'époque moderne. L'ensemble (château et parc) est clos de murs de pierre. Éléments protégés MH : la façade sur la cour d'honneur : inscription par arrêté du 8 juin 1925.","habitants":"Ste-Anne ; Famille Le Clérigo                                                    Rulliac; Famille de Jean de Filhol de Camas\r\n        \r\n        \"","divers":"sainte-Avé gps 47° 41' 14\" nord, 2° 44' 00\" ouest château de   Ste-Anne et Rulliac grav-1-2_3.","gps":"","images":["../../jctruffet.com/image/image_56/56_St_Av%c3%a9_II_1.jpg","../../jctruffet.com/image/image_56/56_St_Av%c3%a9_II_2.jpg","../../jctruffet.com/image/image_56/56_St_Av%c3%a9_II_3.jpg"]},"Consult_chateau_formulaire8ecb":{"id":"Consult_chateau_formulaire8ecb","dept":"56","canton":"Muzillac","commune":"St-Dolay","nom":"St_Dolay","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Saint-Dolay, Cadouzan et le Plessis.                              CADOUZAN, c'était autrefois un château fortifié, siège d'une seigneurie qui était aux Beizit dès 1280, aux Rogon en 1557, aux Quelo en 1623, aux Cramezel, puis à nouveau aux Quelo au XVIIIe siècle. En 1880, le vicomte Charles Le Gouvello de La Porte achète le domaine, mais le revend peu après à M. Lechat-Boilève qui à son tour le cède en 1897 à M. Paul de Berthou. Le château a été occupé par des officiers allemands du Q.G. de la poche de Saint Nazaire en 1944. C'est actuellement la propriété de M. Michel Marion de Procé descendant des Berthou, qui conserve fidèlement ses vieux murs, respecte leur passé, s'efforce de le faire aimer et revivre... L'entrée de la cour est flanquée de deux grosses tours rondes du XVe siècle (portes cochère et piétonne). Le puits date aussi du XVe siècle. Le logis principal a été édifié à la fin du XVIe siècle, dominé par une tour centrale qui aurait servi de donjon au château précédent. L'aile Nord a été ajoutée au XIXe siècle. La chapelle domestique est désaffectée.","architecture":"PLESSIS,   la seigneurie du Plessis était à la famille de ce nom en 1447. Au XVIIe siècle, elle appartenait aux Gouret, aux du Guesclin de La Roberie, puis à la famille de Talhouët Bonamour, qui émigre durant la Révolution. La propriété est en 1802 à la famille Thomas de Kercado, et passe ensuite par alliance aux Levesque du Rostu, actuels propriétaires la famille Levesque du Rostu, branche cadette des Levesque de La Roche-Bernard, s'est enrichie dans le commerce au cours du XVIIIe siècle et a acquise un certain nombre de terres nobles de la région. L'ancienne demeure du XVe siècle sert maintenant de communs au château édifié au XIXe siècle.","habitants":"Cadouzan  Famille de  Quelo                                                    Plessis; Famille de Plessis\r\n        \"","divers":"à Saint-Dolay gps 47° 32' 44\" nord, 2° 09' 12\" ouest, Cadouzan grav-1-2   et le Plessis    grav-3-4.","gps":"","images":["../../jctruffet.com/image/image_56/56_St_Dolay_1.jpg","../../jctruffet.com/image/image_56/56_St_Dolay_2.jpg","../../jctruffet.com/image/image_56/56_St_Dolay_3.jpg","../../jctruffet.com/image/image_56/56_St_Dolay_4.jpg"]},"Consult_chateau_formulaire5cea":{"id":"Consult_chateau_formulaire5cea","dept":"56","canton":"Moréac","commune":"St-Guyomard","nom":"St_Guyomard","type":"Château","periode":"XV-XVI-XVIII","histoire":"Deux châteux dans cet article; cour de Bovrel  ey Brignac.                  COUR de BOVREL, ce château ou Cour de Bovrel (XVe-XVIe siècle) était le siège de la seigneurie du Bovrel ou Botvrel, ayant autrefois droit de haute, moyenne et basse justice. Le domaine a été construit et devenue  la propriété successive des familles Comenan, Rosmadec (1500) et Ollivier (1681). Lors de la Réformation de 1536, la seigneurie est passée aux familles de Quistinic puis, par alliance,aux  Rosmadec. En 1681, Anne de Goulaine cède sa seigneurie de Bovrel à Sébastien de L'Ollivier dont lune des descendantes, Marie Philippe de Lollivier de Saint-Maur, sera décapitée à Paris en juin 1794. Après la Révolution, le domaine, passa aux mains des familles Trégouet, Gousset, Le Brusq, voit la naissance de l'écrivain Joseph Marie Loaisel de Tréogate (1752-1812). À partir des années 1970, le lieu deviendra un foyer culturel d'Art et d'Artisanat. Sa belle porte est couronnée d'une accolade à crochet et de part et d'autre, de hauts pinacles sculptés. Le portail en anse de panier est fermé par une porte en fer forgé : à son sommet trône un blason.","architecture":"BRIGNAC, le château de Brignac fut le siège d'une ancienne seigneurie ayant appartenu aux familles Brignac au XVe siècle, Papin en 1573, suite au mariage de Marie de Brignac  héritière du château avec Jean Papin  qui entreprénent  l'extension du bâtiment principal . Le domaine passe aux   Kerguézec,  aux Quistinic en 1642, aux Rosmadec, et aux Talhouët en 1697 conseillers au parlement de Bretagne, ils ajoutent au bâtiment un pavillon en saillie ,puis par alliance  au comte de Montgermont en 1861 et à la comtesse de Neuchèze en 1930. Au XVe siècle construction de la grosse tour d'angle, en 1509 construction de la tour d'escalier, au milieu du XVIIe siècle extension du bâtiment principal.  Ensemble de constructions s'échelonnant du XVe au XVIIIe siècle. La partie la plus remarquable est la tour du XVe siècle, avec son escalier d'accès. Escalier en pierre à vis. Accès par une porte en anse de panier avec divers motifs sculptés. De chaque côté du fleuron, une inscription mentionne \"fait par P. de Brignac et Pétronille de Robien, l'an 1509, la porte en menuiserie est à petits compartiments. A la partie supérieure, huit panneaux sculptés à petits personnages. A chaque révolution, une baie donne sur la cour. La tour comporte trois salles superposées, les deux inférieures à poutres sculptées. Aux trois étages des cheminées monumentales, celle du premier est la plus ornée avec corniche sculptée avec trace de colonnes dégagées. Chemin de ronde et mâchicoulis. Au XVIIe siècle est édifié un nouveau corps de logis s'articulant en équerre avec le bâtiment principal, ses deux étages abritent chacun un appartement pourvu d'une vaste cheminée. Avec ses travées régulières terminées par des lucarnes passantes à frontons circulaires Éléments protégés MH : la tour et les façades et les toitures du château : classement par arrêté du 5 mai 1975.","habitants":"Brignac ;Familles Brignac                                                                           Cour de Brovel; Famille Comenan,\r\n        \"","divers":"a St-Guyomard,                                                                          gps 47° 46' 54\" nord, 2° 30' 45\" ouest.                                                             château  de Cour de Bovrel grav -1-2-3 et de Brignac grav -4-5-6-7-8-9","gps":"","images":["../../jctruffet.com/image/image_56/56_St_Guyomard_1.jpg","../../jctruffet.com/image/image_56/56_St_Guyomard_2.jpg","../../jctruffet.com/image/image_56/56_St_Guyomard_3.jpg","../../jctruffet.com/image/image_56/56_St_Guyomard_4.jpg","../../jctruffet.com/image/image_56/56_St_Guyomard_5.jpg","../../jctruffet.com/image/image_56/56_St_Guyomard_6.jpg","../../jctruffet.com/image/image_56/56_St_Guyomard_7.jpg","../../jctruffet.com/image/image_56/56_St_Guyomard_8.jpg","../../jctruffet.com/image/image_56/56_St_Guyomard_9.jpg"]},"Consult_chateau_formulaire14aa":{"id":"Consult_chateau_formulaire14aa","dept":"56","canton":"Ploërmel","commune":"St-Servant sur Oust","nom":"St_Servant","type":"Château","periode":"XVII-XIXe","histoire":"Deux châteaux à St-Servant, Castel, Guermahia et Kergras.                                                                            CASTEL, le site de Castel est d'occupation très ancienne puisque y subsistent à l'heure actuelle les vestiges d'une motte castrale. Le château actuel est isolé au sein d'un domaine boisé comprenant quatre ensembles distincts. Le premier correspond au château. Il comprend le logis, construit en deux campagnes (1759-1761, puis à partir de 1783), composé d'un corps central rectangulaire flanqué par deux corps de dépendances. L'intérieur a conservé ses dispositions et boiseries d'origine, et les deux escaliers en bois situés aux angles du corps central. Deux autres bâtiments de dépendances sont situés un peu plus loin, dans l'alignement des précédents : il s'agit d'écuries et de granges de la première moitié du XVIIe siècle, une basse-cour comprenant le colombier (du début du XVIIe siècle) a conservé son système d'échelle tournante, une métairie et une grange datent de 1860, au nord, un jardin du XVIIe siècle a été aménagé vers 1800 en parc à l'anglaise, et un potager à l'est vers 1800. Les trois autres ensembles sont constitués par la ferme, située à l'est du château et composée de deux corps de bâtiments parallèles, le moulin, daté 1809, désaffecté et en mauvais état, situé au nord Est du domaine, et enfin, la motte castrale située au nord du château. Éléments protégés MH : le logis et les communs qui le prolongent ; les deux autres corps de communs situés au sud sur la même parcelle ; le colombier ; la chapelle et le jardin avec son mur de clôture : inscription par arrêté du 30 septembre 1997.","architecture":"GUERMAHIA, manoir  de la fin du XVe siècle, propriété de la seigneurie de Guermahéas (ou Guermahia) qui possédait un droit de moyenne justice et qui appartenait à la famille Trégouët, puis à la famille Bonin. On trouve un Jehan Tregoet (ou Trégouët) en 1481.                                                                            KERGRAS,   la seigneurie du Gras (devenu Kergras) appartenait en 1544 à Magdeleine Jarnigon, dame du Gra, qui épousa cette même année maître Guillaume Ruaud, sieur de La Hélouaye. En 1587, Olive Ruaud est aussi dite dame du Graz. Puis, en 1596, cette terre est à la famille Picaud qui la conserve au XVIIe siècle. (Jacques Picaud et Louis de Langle sont qualifiés, en 1636, de seigneur et dame de Morfouace, du Gras, de Locmana, de Kerdennis, etc. L'ancien manoir a été remplacé au XIXe siècle par un château moderne qui s'élève dans un site ravissant et d'où l'on jouit d'une superbe vue sur la vallée de l'Oust et le pays de Ploërmel. Les pelouses valonnées qui l'entourent sont d'un très joli effet. A l'abandon, il a été acquis en 1986 par le Colonel Claude Lavoivre qui en a entrepris sa restauration.","habitants":"Castel ;Seigneur local                                                          Kergras ; Famille Picaud \r\n        \"","divers":"à St-Servant gps  47° 54' 58\" nord, 2° 30' 41\" ouest , Castel grav-1-2 et Kergas grav 3-4.","gps":"","images":["../../jctruffet.com/image/image_56/56_St_Servant_1.jpg","../../jctruffet.com/image/image_56/56_St_Servant_2.jpg","../../jctruffet.com/image/image_56/56_St_Servant_3.jpg","../../jctruffet.com/image/image_56/56_St_Servant_4.jpg"]},"Consult_chateau_formulaire4d22":{"id":"Consult_chateau_formulaire4d22","dept":"56","canton":"Guer","commune":"St-Vincent de-Oust","nom":"St_Vincent_Oust","type":"Château","periode":"XV-XVII-XVIII-XIX","histoire":"Deux châteaux à Boro celui de Boro et Launay et entre St-Vincent et à  Malensac le château de Bodéan .                                                                                         BODEAN, sur le site d'une ancienne seigneurie, un château neuf est construit sur une hauteur, au-dessus de l'emplacement de l'ancien manoir. Le style de l'édifice permet de proposer une datation du troisième quart du XIXe siècle. La propriété appartient à Monsieur de Coutances, maire de la commune, au début du XXe siècle. L'analyse stylistique de l'édifice permet de proposer son attribution à l'architecte rennais Jacques Mellet et une datation plus précise autour de 1860. La seigneurie était à la famille Bodéan puis aux Gouro. Le château appartient actuellement à Mlle de Rodellec.                                                                                                        BORO, la châtellenie provenait d'un démembrement des terres du sire de Molac et relevait directement du duc de Bretagne, puis du roi de France, alors qu'à peu près tout le pays dépendait du comté de Rieux. La seigneurie était aux Castellan en 1539, aux Davy en 1668, puis aux Pioger en 1700. Boro est resté dans la même famille depuis 1677 actuellement représentée par le lieutenant-colonel Le Bastart de Villeneuve. Le bâtiment en façade a été construit au XVIIIe siècle, alors que les deux pavillons datent respectivement de 1840 et 1890 et la chapelle dédiée à Saint Guillaume existe toujours, bien que désaffectée. Un oratoire dédié à N-D de Liesse a été aménagé en 1855 dans le grenier de la demeure par Marie Thérèse de Gibon, épouse de Frédérie de Pioger. Le site de prés et de bois, non loin du canal de Nantes à Brest, est très agréable.","architecture":"LAUNAY, la seigneurie de Launay était à la famille Launay, puis aux Lantivy et aux Couessin. Le manoir fut racheté en 1850 par la famille Pioger, qui fit alors construire le château actuel ainsi que l'oratoire qui a remplacé l'ancienne chapelle domestique. Plus récemment le château appartenait à M. Pierre Simon, écuyer du Roi Hussein de Jordanie.                                                                                                                    Cinq kilomètres au sud ouest à St Just les Pins CALLEON , le recensement des terres nobles effectué en 1427 signale le manoir ou hébergement de Caléon, qui appartient à Pierre de Saint Martin, qui y réside. On trouve d'ailleurs la trace de ses ancêtres dès 1139 (Geoffroy de Saint-Martin). Au début du XVIe siècle, Caléon passe dans la famille Le Vicomte par alliance. Toujours par mariage il devient la demeure de plusieurs \"noms\" : Christophe de Chauvais épouse Françoise Le Vicomte en 1554, Gilles de Talhouët épouse Jeanne de Chauvais en 1692, la famille Charpentier à la fin XVIIe siècle, famille Dondel à la fin du XVIIIe siècle. En 1987, le Dr André Viaud a cédé la propriété au Dr Jean-Pierre Cado. Au XIXe siècle, le château actuel a remplacé l'ancien édifice qui avait sa chapelle domestique, et datait probablement du XVIe siècle.","habitants":"Bodéan; Famille de Monsieur de Coutances                                       Boro ;Famille de Pioger                                                                                   Launay ; Famille Launay\r\n        \r\n        \r\n        \"","divers":"à Boro celui de Boro grav-1-2-3 et Launay grav 4-5-6 et entre St-Vincent et à  Malensac le château de Bodéan grav-7.Gps 47° 42' 02\" nord, 2° 08' 43\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_St_Vincent_Oust_1.jpg","../../jctruffet.com/image/image_56/56_St_Vincent_Oust_2.jpg","../../jctruffet.com/image/image_56/56_St_Vincent_Oust_3.jpg","../../jctruffet.com/image/image_56/56_St_Vincent_Oust_4.jpg","../../jctruffet.com/image/image_56/56_St_Vincent_Oust_5.jpg","../../jctruffet.com/image/image_56/56_St_Vincent_Oust_6.jpg","../../jctruffet.com/image/image_56/56_St_Vincent_Oust_7.jpg"]},"Consult_chateau_formulairee9fa":{"id":"Consult_chateau_formulairee9fa","dept":"56","canton":"Gourin","commune":"Sainte-Brigitte","nom":"Ste_Brigitte","type":"Vestiges_Château","periode":"XIII-XVIII","histoire":"Deux châteaux à Sainte-Brigitte ; Forges et le fort des Salles.                                                                                       FORGES, ancienne propriété des vicomtes, puis des ducs de Rohan, le lieu fut vendu le 25 août 1802 par Louis Antoine de Rohan Chabot à Louis Henri Janzé. A l'époque de l'exploitation des forges, le château était occupé par le logis du maître de forges. La partie centrale et la partie gauche datent du XVIIIe sicle. L'aile droite a été ajoutée en 1920. le château passa par la suite aux du Luart et aux Pontavice, qui le possèdent encore aujourd'hui, avec ses nombreuses dépendances, ses étangs et sa vaste forêt. Le logis des Forges des Salles est visible extérieurement, en effet les abords sont ouverts aux groupes sur demande, ia Bon-Repos-Sainte-Brigitte.","architecture":"FORT DES SALLES, vestiges en mauvais état  construction à l'emplacement d'une villa gallo-romaine, place forte attestée en 1232 et 1298, berceau de la seigneurie de Rohan, vestiges de fortifications du XIIIe siècle, et existence d'un haut fourneau pour l'exploitation du minerai de fer avant 1440. Logis, moulins, forges détruites attestés en 1471, chapelle protestante du XVIIe siècle ruinée. Logements, communs et four à pain XIXe siècle, parties hautes du logis modifiées au XIXe siècle, château construit en schiste sur les bords d'un étang où l'on trouve des pierres maclées (origine des armes de la Salles famille de Rohan), sa vaste enceinte est presque totalement ruinée. Subsistent une terrasse donnant sur l'étang, un corps de logis, avec des fenêtres à meneaux flanqué de deux tours sans toit, les murs de la chapelle et d'autres vestiges épars. Propriété privée, ce qui reste du château n'est pas visible, le danger d'écroulement étant permanent, (les vestiges ont en effet beaucoup souffert de la tempête de 1987.","habitants":"Forges ; Famille de Louis Henri Janzé.\r\n        \"","divers":"à Sainte-Brigitte gps  48° 09' 48\" nord, 3° 07' 40\" ouest; Forges et le fort des Salles","gps":"","images":["../../jctruffet.com/image/image_56/56_Ste_Brigitte_1.jpg","../../jctruffet.com/image/image_56/56_Ste_Brigitte_2.jpg"]},"Consult_chateau_formulairec3ff":{"id":"Consult_chateau_formulairec3ff","dept":"56","canton":"Séné","commune":"Surzur","nom":"Surzur","type":"Château","periode":"XVI-XVII","histoire":"plusieurs châteaux à Surzur; Cohanno, Perenese et Grego et la Cour à le Hézo.                                                                                                          COHANNO, le château est à lorigine la résidence de la famille de Malestroit au XVe siècle, avant dêtre acheté par le seigneur de Kerguisé qui sy installe en 1607. La seigneurie appartient aux Francheville puis aux Sénéchal en 1677. La demeure passa par alliance aux La Ville Orion en 1799, avant d'être acquise en 1857 par M. de La Morinière. Le château édifié au XVIIe siècle était très délabré lorsque M. Xavier de Langlais en hérita vers 1900. Celui-ci fit alors reconstruire la demeure en 1905. Cohanno est depuis dans sa famille. Accessible seulement par une route privée, le château demeure invisible, même extérieurement, blotti au milieu d'un vaste espace boisé. Éléments protégés MH : les façades et les toitures, inscription par arrêté du 8 octobre 1968.                                                                                                      PERENESE, datant sans doute du XIVe siècle. Le domaine appartint successivement aux familles de Rosnharou, de Lescouble, de Lescoet et enfin Garaby de Pierrepont. L'armée allemande s'y installa pendant la Seconde Guerre mondiale et l'incendia partiellement lors de sa retraite. Propriété de la famille Garaby de Pierrepont depuis 1900. Le domaine conserve l'ancienne chapelle signalée par un clocheton peu courant dans la région.","architecture":"GREGO, seigneurie possédée par les Beaumont dès 1448 et jusqu'à la fin du XVIe siècle. Château construit vers 1750 pour la famille du Bot. De nombreux remaniements dans la deuxième moitié du XIXe siècle: création d'avant-corps latéraux et adjonctions de lucarnes, pour le logis, destruction de l'ancienne chapelle liée au logis et de la plus grande partie des communs encadrant la cour à l'est, communs du XVIIIe siècle subsistant au nord dotés d'un avant-corps central à étage, reconstruction d'une chapelle isolée, modification de la couverture du colombier du XVIIe siècle. Logis en moellon, lucarne en calcaire, escalier dans-oeuvre, toit à longs pans, noue (partie centrale) , toit à longs pans brisés, croupes (pavillons latéraux), communs à comble à surcroît (côté nord) , à étage de comble (côté sud) , en rez-de-chaussée (avant corps latéraux) , toit à longs pans, pignon couvert sauf pavillon central à toit brisé couvert en pavillon, avant corps latéraux couvert en zinc ; colombier en moellon enduit de granite, toit conique ; chapelle en moellon enduit, toit à longs pans à pignon découvert à l'ouest et croupe à l'est.                                                             La COUR,  à le Hézo à cinq km à l'ouest  de Surzur. Au XIIIe siècle, les moines de Saint-Gildas de Rhuys fondèrent là un prieuré, avec une chapelle dédiée à Saint Vincent. Il fut rebâti vers 1560. L'ensemble fut vendu nationalement en décembre 1792, avec jardin, vignes et moulin à eau. Acquis au XIXe siècle par le comte Charles Guyot d'Asnières de Salins, la propriété fut revendue en 1985 à M. Jean-Paul Gandon, qui en a fait sa résidence.","habitants":"Cohanno;  Famille de Malestroit                                                                      Perenese ;  Famille Garaby de Pierrepont                                                            Grego ; Famille du Bo                                                                                   La Cour ; Famille du comte Charles Guyot\r\n        \r\n        \"","divers":"à Surzur gps   47° 34' 44\" nord, 2° 37' 43\" ouest; Cohanno grav-1-2 et Grego grav-3-4, Perenese grav_6-7 -8 et la Cour  grav-5 à le Hézo","gps":"","images":["../../jctruffet.com/image/image_56/56_Surzur_1.jpg","../../jctruffet.com/image/image_56/56_Surzur_2.jpg","../../jctruffet.com/image/image_56/56_Surzur_3.jpg","../../jctruffet.com/image/image_56/56_Surzur_4.jpg","../../jctruffet.com/image/image_56/56_Surzur_5.jpg","../../jctruffet.com/image/image_56/56_Surzur_6.jpg","../../jctruffet.com/image/image_56/56_Surzur_7.jpg","../../jctruffet.com/image/image_56/56_Surzur_8.jpg"]},"Consult_chateau_formulairebd37":{"id":"Consult_chateau_formulairebd37","dept":"56","canton":"Vannes","commune":"Sarzeau","nom":"Suscinio","type":"Forteresse","periode":"XIII-XV","histoire":"SUSCINIO, après 1380, construction pour le duc Jean IV du logis et vers 1430, construction pour le duc Jean V du logis ouest. Dès la seconde moitié du XVe siècle s'amorce le déclin. Aménagement des jardins entre 1450 et 1480 pour la duchesse douairière Isabeau d'Ecosse et don du château en 1488 par François II à Jean de Châlons, prince d'Orange. Destruction de la grande salle nord et construction du mur gouttereau en prolongement du logis ouest au début du XVIe siècle. Au XVIe siècle, durant les guerres de la Ligue, construction des bastions sud par le duc de Mercoeur. Louis XIV fit don de l'usufruit de Sucinio à Mlle de Blois, princesse de Conti. Cette dame était fille du roi et de la duchesse de la Vallière. Au décès de la princesse, le souverain donna la seigneurie au duc de la Vallière. Le comte de Sérant fut le dernier capitaine de la forteresse. Sa nomination porte la date de 1780. En 1793, le château fut mis en vente comme propriété nationale,  brièvement occupé par les chouans de Cadoudal vendu tombe entre les mains de récupérateurs de matériaux qui entreprènent la démolition. En 1795, il fut pris à cette époque par un détachement de l'expédition de Quiberon, commandé par le marquis de Tinténiac. A la fin du XVIIIe siècle, alors que les derniers feuillets de ses annales étaient tracés avec du sang. En 1965 racheté par le conseil général du Morbihan, fait l'objet de travaux des restauration.","architecture":"SUSCINIO, en 1218, construction d'une enceinte peut être quadrangulaire dont subsiste la courtine nord et la tour nord-est. Au milieu du XIVe siècle, construction d'une grande salle appuyée sur la courtine nord, de la tour quadrangulaire plaquée contre le mur ouest de la première enceinte, et de la courtine sud. Pendant la guerre de succession de Bretagne, le château est attaqué par du Guesclin, la courtine sud est en partie détruite, elle est reconstruite au début du XVe siècle. Le château était une forteresse imposante. Encore intact et solide à l'extérieur, il était, vers le milieu du XIXe siècle, complètement ruiné à l'intérieur. Aujourd'hui il est restauré et a retrouvé son allure de forteresse médiévale intacte, même si les travaux continuent. Il abrite des expositions et des manifestations estivales. Le  logis est en moellon de granite, à deux étages carrés et étage de comble, escaliers dans-oeuvre en vis sans jour, cheminées incorporées, étuve et chapelle voûtée d'ogives au second étage, salle sous charpente et toit à longs pans à pignon découvert disparus, de même que les toits coniques des tours,  logis ouest en moellon de granite (partie nord du mur gouttereau est en pierre de taille), à deux étages carrés et étage de comble, escalier hors-oeuvre en vis sans jour dans la tour est, escalier dans la tour neuve dans-oeuvre en vis sans jour en maçonnerie, toit à longs pans, pièces sous charpente du logis et toit coniques des tours disparus, en cours de restitution ; courtine sud en moellon de granite, à l'exception de la partie centrale, relevée en pierre de taille ; bastions sud en terre et moellon ; colombier en moellon de granite, couvert en granite à extrados de voûte, coupole. Éléments protégés MH : les ruines du château Saint-Nicolas de Suscinio : classement par liste de 1840.","habitants":"Duc de la Vallière\r\n        \"","divers":"A Sarzeau le château de Suscinio gps 47° 31' 41\" nord, 2° 46' 07\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Suscinio_1.jpg","../../jctruffet.com/image/image_56/56_Suscinio_2.jpg","../../jctruffet.com/image/image_56/56_Suscinio_3.jpg","../../jctruffet.com/image/image_56/56_Suscinio_4.jpg","../../jctruffet.com/image/image_56/56_Suscinio_5.jpg","../../jctruffet.com/image/image_56/56_Suscinio_6.jpg","../../jctruffet.com/image/image_56/56_Suscinio_7.jpg","../../jctruffet.com/image/image_56/56_Suscinio_8.jpg"]},"Consult_chateau_formulaireff09":{"id":"Consult_chateau_formulaireff09","dept":"56","canton":"Moréac","commune":"Sérent","nom":"Sérent","type":"Château","periode":"XV-XVI-XVII","histoire":"Trois châteaux à Sérent; Houletière, la  Salle, Rohéan  et Tromeur.                                                                       HOULETIERE, la seigneurie de la Ville-Raix et du Ruscouart avait haute, moyenne et basse justice. Au XIVe siècle, elle était aux Sérent, en 1460 à Guillaume des Forges, en 1660 à Jean des Prés de La Bourdonnaye et, en 1770, à l'abbé de Brignac. Le château du lieu porte maintenant le nom de la Houletière et appartient à Mlle Le Couteulx du Molay.                                                                                      ROHEAN l'ancienne seigneurie de Rohéan avec droit de moyenne justice ayant appartenu successivement aux familles Callac (Guyon Callac en 1464, et la famille Callac est mentionnée aussi en 1513), Le Carné, seigneurs de Castelan-Rohéan (en 1680), du Bot, Boisset (en 1770). Au XXème siècle, Mlle de Brellé fit don de la demeure à l'évêché qui le revendit vers 1914 à la famille Payen. Il devient en 1919, la propriété de la famille Briand .                                                                                                                                  VILLEGROS, le manoir  du XVIIe siècle. La seigneurie de la Villegros  est la propriété successive des familles Le Blaye ou Blay (au XV-XVIe siècle, Eon Le Blay en 1464 et en 1481, Raoul Le Blay ou Le Bloy en 1536), Bruban (en 1639), Beaucamp, Maitrot de Varenne (en 1812), Kerarmel, La Villetanet et Buteau. Un bâtiment supplémentaire est ajouté au manoir au XIXe siècle.","architecture":"La SALLE,  logis datant du XVIIe siècle, partiellement reconstruit à la fin du XIXe siècle, croix fin XIXe siècle dans le style du XVe siècle. L'édifice se compose d'un étage carré, gros oeuvre : granite; schiste; moellon ; enduit partiel, élévation à travées surmontée de toit à longs pans croupe ; pignon découvert et toit en pavillon recouverts d'ardoise. La terre et le fief de la Salle avec haute justice, étaient un démembrement de la baronnie de Sérent, donnée en juveignerie par N. de Sérent, dont les descendants l'ont conservé jusqu'au milieu du XVIIIe siècle. A ce moment, Mlle de Sérent vendit le domaine à M. de Guerri, conseiller au Parlement de Bretagne. Vendu nationalement à la Révolution il est acquis par le
