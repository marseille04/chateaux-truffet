mulaire601f":{"id":"Consult_chateau_formulaire601f","dept":"56","canton":"Gourin","commune":"Lanvénègen","nom":"Lanvénègen","type":"Château","periode":"XV-XVII-XVIII","histoire":"Trois châteaux dans cet article  à Lavénégen; Rozangat, St-Quijeau et Kerduel.                                                                                                                ROZANGAT, la seigneurie était aux Kervenozaël (armes à l'église paroissiale Saint-Conogan), puis successivement aux Kergoët en 1540, aux Bahezre de Lanlay en 1580, aux Saint-Pezran (armes à l'église) de 1638 à 1761. Le vieux manoir est alors en très mauvais état. Deux ans après l'avoir acquis, Pierre de Canne fait bâtir le château actuel en 1763, avec les matériaux du précédent. Par la suite l'intérieur est modifié en 1850, une nouvelle modification en 1903 (portes piétonnes et cochères). L'ancien moulin, au bord du Rest, a été transformé en maison d'habitation. Rozangat appartient actuellement à M. Jacques Le Masne de Chermont.                                                                                             KERDUEL, il a été construit en trois campagnes et se compose de plusieurs bâtiments. D' une part, l'ancien manoir du XVIe siècle, formé de deux ailes articulées autour de l'escalier à vis. D'autre part, accolé à l'ouest de ce manoir, un pavillon du XVIIe siècle à haute toiture à quatre pans et corniche sur gros modillons. Enfin, à l'arrière de ces constructions, dans l'angle formé par les deux ailes du XVIe siècle et au revers du pavillon du XVIIe siècle, un grand appentis construit ultérieurement.","architecture":"ST-QUIJEAU, au XVe siècle, le château de Saint Quijeau appartenait à la famille Rest, puis au XVIIe siècle aux Guégant, aux Kervenozaël avant d'échoir au XVIIIe siècle à la famille Botdéru. L'édifice actuel date de la première moitié du XVIIIe siècle, remarquable par son homogénéité, on n'y relève aucune trace de reprise. Le corps de logis très allongé, est flanqué à l'arrière d'un pavillon carré renfermant l'escalier. La chapelle domestique est en ruine et le colombier a disparu. L'accès à la cour se fait par un portail (portes piétonne et cochère). Habité par Mlle Lucie Le Gall.","habitants":"Rozangat;   Pierre de Canne.                                                                    St-Quinjeau; Famille Rest   et Famille Botdéru                          \r\n        \r\n        \"","divers":"A Lanvénègen,                                                                                   gps   47° 59' 56\" nord, 3° 32' 25\" ouest                                                     Rozangat, St-Quinjeau grav -1 -2-3-4-5  et Kerduel grav-6","gps":"","images":["../../jctruffet.com/image/image_56/56_Lanv%c3%a9n%c3%a8gen_1.jpg","../../jctruffet.com/image/image_56/56_Lanv%c3%a9n%c3%a8gen_2.jpg","../../jctruffet.com/image/image_56/56_Lanv%c3%a9n%c3%a8gen_3.jpg","../../jctruffet.com/image/image_56/56_Lanv%c3%a9n%c3%a8gen_4.jpg","../../jctruffet.com/image/image_56/56_Lanv%c3%a9n%c3%a8gen_5.jpg","../../jctruffet.com/image/image_56/56_Lanv%c3%a9n%c3%a8gen_6.jpg"]},"Consult_chateau_formulaire8c19":{"id":"Consult_chateau_formulaire8c19","dept":"56","canton":"Questembert","commune":"Elven","nom":"Largoét","type":"Vestiges-Fort","periode":"X-XIII","histoire":"LARGOET, le château de Largoët  est situé à 2 Km d'Elven, au milieu d'un grand bois et d'un parc enclos de murs. Un premier bâtiment devait appartenir au seigneur dElven, Derrien Ier mais celui que lon peut admirer a été édifié à partir du XIIe siècle. Appartenant à la famille Malestroit, il fut âprement disputé lors de la guerre de succession de Bretagne par les seigneurs de Blois et de Montfort. Il devint possession de la famille des Rieux au XVe siècle. Jean IV y fit enfermer Henri Tudor, le futur Henri VII dAngleterre. Il fut démantelé par Charles VIII avant dêtre restauré sur ordre dAnne de Bretagne. Possession de Nicolas Fouquet en 1656, le château fut vendu à Michel de Trémeurec mais ses descendants le délaissèrent aux Cornulier en 1689 le conservèrent jusqu'en 1793 date de la transmission aux le Mailler les du Bot de la Grée de Caillac en son propriétaire à partir de 1840. passa à la famille du Bréon qui le possède toujours. Il fut sauvé in extremis de la démolition grâce à Prosper Mérimée, cest lui qui le fit classer M.H.  en 1862 et le château fut restauré dans les années 1970. Il devint un lieu de spectacles son et lumière durant lesquels des restitutions historiques étaient entreprises. Aujourdhui, on peut visiter tous les jours cet édifice imposant, qui est devenu propriété privée, avec son donjon du XIVe qui est lun des plus hauts de France puisquil mesure 45 mètres. On peut encore y voir la pièce où séjourna Henri Tudor, coincé dans des murs épais de 6 à 9 mètres ainsi que deux escaliers à vis, lun menant à la salle de réception, lautre aux étages. A proximité se trouve la tour ronde de trois étages du XVe siècle, percée de canonnières et aménagée en pavillon de chasse.","architecture":"LARGOET, le domaine de Largoët comprend également un châtelet du XVe siècle et les vestiges de la muraille denceinte et de la glacière. Une légende veut quun souterrain reliait le château au bourg sans que lon ait jamais trouvé son entrée. Éléments protégés MH : la tour : classement par liste de 1862. L'ensemble des ruines : classement par arrêté du 11 août 1932. Les parties non classées, à savoir : la basse-cour (sols et vestiges qui s'y trouvent) ; les douves ; l'étang ; la digue de l'étang ; les ruines de la chapelle ; la maison de garde, dite la porterie, pour ses façades et ses toitures ; le portail à double entrée cochère et piétonne ; le puits ; les quatre piliers placés au carrefour des deux allées principales du bois ; les deux piliers placés à l'entrée du domaine en bordure du chemin rural, dit des Tours d'Elven ; les murs de clôture du domaine : inscription par arrêté du 11 février 2000.","habitants":"Largoet; famille du Bréon\r\n        \"","divers":"Château de Largoét à Elven gps 47° 43' 56\" nord, 2° 35' 22\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Largo%c3%a9t_1.jpg","../../jctruffet.com/image/image_56/56_Largo%c3%a9t_2.jpg","../../jctruffet.com/image/image_56/56_Largo%c3%a9t_3.jpg","../../jctruffet.com/image/image_56/56_Largo%c3%a9t_4.jpg","../../jctruffet.com/image/image_56/56_Largo%c3%a9t_5.jpg","../../jctruffet.com/image/image_56/56_Largo%c3%a9t_6.jpg","../../jctruffet.com/image/image_56/56_Largo%c3%a9t_7.jpg"]},"Consult_chateau_formulairee1b0":{"id":"Consult_chateau_formulairee1b0","dept":"56","canton":"Ploemeur","commune":"Larmor_plage","nom":"Larmor_Plage","type":"Château","periode":"XIX","histoire":"Trois manoirs à l'ile de Berder; Amirauté,Marguaret et Kérillon.                                                                                          ILE DE BERDER, en 1750 à appartenu à une demoiselle Dubreuil-Janoet à sa familles frères et soeurs  En 1879, l'île de Berder est achetée par le comte Arthur Dillon qui y fait construire un château moderne. Puis la propriété est achetée en 1920 par la duchesse d'Uzés et ensuite par la congrégation des frères Oblats de Marie Immaculée en 1927, et un second édifice est construit puis transformé en maison de repos. Vers 1937, l'ensemble devient la propriété des Petites Soeurs de Saint François, il est loué à partir de 1984 à un organisme de vacances et tourisme.                                                                                                                  Les villas de Kernevel à Larmor plage,                                                      AMIRAUTE, c'est un château de la fin du XIXe siècle. Résidence de l'amiral allemand Doenitz pendant la guerre de 1939 à 1945, C'est actuellement le siège de l'Amirauté de la Marine Nationale à Lorient. Il occupe une situation exceptionnelle, à la pointe de Kernevel, face aux rades de Port-Louis et de Lorient, à l'île Saint-Michel et à la pointe de Keroman. A ses côtés, le château du cercle Naval, belle demeure toute blanche du début du XXe siècle, abrite le Cercle de la Marine Nationale. Son jardin est mitoyen de celui de l'Amirauté. Situé également à côté de l'Amirauté, le château MARGARET, bâti à la fin du XIXe siècle par M. G. Ouizille, il héberge actuellement la Direction du Port de Lorient, il est face à la rade et visible dans la rue des châteaux de Kernevel.  \r\nLa villa KERILLON,  a été construite en 1899 par l'architecte Amand Charier (ainsi que l'hôtel de ville de Vannes, et l'ex-hôpital Bodélio).","architecture":"MARGARET  est la plus occidentale des trois villas qui surplombent le port et qui portent le nom de Château des Sardines. La légende veut que, enrichi par l´activité sardinière, Auguste Ouizille a construit à chacune de ses trois filles une villa. Cette histoire est fausse. Chronologiquement, la villa Margaret est la deuxième villa construite, en 1896, mais Auguste Ouizille est déjà mort, depuis 1881. Son constructeur se nomme Georges Ouizille, son fils, marié à Françoise Marguerite Boulaire. Georges est négociant à Lorient et fait construire sur le terrain appartenant à sa mère la villa Margaret,  la villa est aujourd´hui occupée par le bar Le Margaret.                                    Pour cela, il s'est choisi un poste de commandement idéal. Les hauts dignitaires nazis aiment s'accaparer les plus luxueuses demeures françaises. Edifiées dans la seconde partie du XIXe siècle, les trois majestueuses villas surplombent le port de plaisance du Kernevel. La première est construite en 1849 par Augustin Gillet, un industriel qui a fait fortune dans la sardine. Kerozen, avec sa façade rectangulaire, s'apparente au Petit Trianon de Versailles. Après le décès de son propriétaire, Auguste Ouizille reprend le domaine. A la fin des années 1890, ses enfants bâtissent les deux autres demeures, Margaret puis Kerlilon. Ce trio forme ce que les locaux ont plaisir à surnommer le \"Château des Sardines\".  Kerlilon Villa a été bâtie au XIXe siècle, dans le style néo-Louis XIII. Devenue la tanière de l'état major Allemand.","habitants":"Ile de Berger; Famille  Dubreuil-Janoet \r\n        \"","divers":"A Larmor-Plage sur l'ile de Berger, grav-7         la villa de L'Amirauté , Kernevel grav -1-2-3  gps 47° 43' 05\" nord, 3° 22' 09\" ouest (L'Amirauté), de Marguaret  grav -4-5     et la villa Kerillon grav-6.           Gps  47° 34' 45\" N, 2° 53' 15\" O","gps":"","images":["../../jctruffet.com/image/image_56/56_Larmor_Plage_1.jpg","../../jctruffet.com/image/image_56/56_Larmor_Plage_2.jpg","../../jctruffet.com/image/image_56/56_Larmor_Plage_3.jpg","../../jctruffet.com/image/image_56/56_Larmor_Plage_4.jpg","../../jctruffet.com/image/image_56/56_Larmor_Plage_5.jpg","../../jctruffet.com/image/image_56/56_Larmor_Plage_6.jpg","../../jctruffet.com/image/image_56/56_Larmor_Plage_7.jpg","../../jctruffet.com/image/image_56/56_Larmor_Plage_8.jpg","../../jctruffet.com/image/image_56/56_Larmor_Plage_9.jpg"]},"Consult_chateau_formulairece09":{"id":"Consult_chateau_formulairece09","dept":"56","canton":"Quiberon","commune":"Trinité sur mer","nom":"Laz","type":"Château","periode":"XVII","histoire":"LAZ, le premier château du lieu fut édifié au XIVe siècle, avec une chapelle privée. C'était le siège d'une seigneurie qui appartint à la famille Vitré, puis aux Champion, aux Larlan, aux Sorel, aux Jégou. Ces seigneurs du Laz étaient vassaux du sieur de Largoët, en Elven. Le manoir (manoër ar Laz), édifié le long de la ria de Crach, constituait une défense contre les incursions des pirates qui résidaient dans les îles. Depuis 1960, il appartient à M. Paul Houdart.","architecture":"LAZ, le château actuel date du XVIIe siècle. Avec ses deux importants corps de bâtiment (tour carrée, tourelle d'escalier cylindrique) et son vaste enclos ouvert sur un beau porche, l'ensemble est particulièrement agréable.  Caché par sa haute enceinte, le Laz peut cependant être aperçu extérieurement.","habitants":"famille Vitré\r\n        \"","divers":"A la Trinité sur mer château  de Laz gps 47° 36' 26\" nord, 3° 01' 55\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Laz_1.jpg","../../jctruffet.com/image/image_56/56_Laz_2.jpg"]},"Consult_chateau_formulairea9c7":{"id":"Consult_chateau_formulairea9c7","dept":"56","canton":"Gourin","commune":"Lignol","nom":"Lignol","type":"Château","periode":"XV-XVII-XX","histoire":"Trois  châteaux à Lignol; Gosco et Cravial et Kerouallan.                                             GROSCO, le château est l'oeuvre d'une famille de parlementaires du XVIIe siècle, les Lantivy. C'est une construction homogène, caractérisée par la régularité et la symétrie de son plan et de ses élévations, que le décor de boiseries et l'escalier permettent de dater des années 1660-1680. Les dépendances de la cour et du jardin datent de la même époque et le jardin semble être contemporain du château. \r\nCRAVIAL,  le château actuel date de 1905 et conserve des vestiges de l'édifice précédent. A une centaine de mètres de là, une butte féodale d'une trentaine de mètres, au sommet entourée de fossés sur deux côtés., que l'on peut voir de l'entrée de la propriété. Linda et François Brown, l'on transformé en quatre chambres d'hôtes.","architecture":"GROSCO, maison, parc et jardins sont issus d'une remise au goût de la mode classique dans la première moitié du XVIIe siècle. L'ensemble très ordonnancé reprend le dispositif avec cour d'honneur, grand jardin au sud, jardin de l'orangerie, verger, terrasse et basse-cour au nord, le tout entouré de bois. L'ensemble répond, ainsi que l'étude archéologique l'a révélé, au souci de mise en symétrie et de perspectives à partir d'un axe central et des allées d'accès qui mettaient en scène l'environnement bocager. Éléments protégés MH : les façades et les toitures du château et des quatre pavillons ; l'escalier intérieur du château : inscription par arrêté du 29 mars 1972. Les parties suivantes avec leurs structures maçonnées : le verger, la cour d'honneur, le potager, la terrasse et le grand jardin, la grande allée, le bois et la fontaine : inscription par arrêté du 22 octobre 1997.                                                                                                                      CRAVIAL, il existe un château à cet endroit, sur un coude du Scorff, en 1251. Il s'appelle Craviar  est propriété de la famille de Beaumer. En 1380, le propriétaire est Bouchard de Vendôme dont le duc de Bretagne, Jean VI, confisque les biens à la suite des guerres. Peu après, le duc cède Cravial à Jean 1er de Rohan qui le transmet à son fils cadet Charles de Rohan Guémené en 1384. Le château est reconstruit au XVe siècle et demeure dans cette famille jusqu'à la Révolution.                                                                                                            KEROUALLAN,  le manoir de Kerouallan du XVe siècle, propriété de Philippe Dando (en 1478). Puis par alliance, il devient la propriété successive des familles Mur, Kermellec, Forsanz, Boutouillic de Kergonan et Kerret. Ce manoir est vendu en 1974 par la comtesse de Kerouallan à la famille Moreau qui le cède vers 1982 à la famille Le Corre.","habitants":"Grosco;famille de Lantivy                                                                Cravial;  famille de Rohan  Guémené                                     Kérouallan: famille Mur\r\n        \"","divers":"à Lignol gps   48° 02' 18\" nord, 3° 16' 10\" ouest                                          ;   Grosco grav  4-5-, Cravial grav 1-2-3-  et Kerouallan  grav 6","gps":"","images":["../../jctruffet.com/image/image_56/56_Lignol_1.jpg","../../jctruffet.com/image/image_56/56_Lignol_2.jpg","../../jctruffet.com/image/image_56/56_Lignol_3.jpg","../../jctruffet.com/image/image_56/56_Lignol_4.jpg","../../jctruffet.com/image/image_56/56_Lignol_5.jpg","../../jctruffet.com/image/image_56/56_Lignol_6.jpg"]},"Consult_chateau_formulaired760":{"id":"Consult_chateau_formulaired760","dept":"56","canton":"Questembert","commune":"Limerzel","nom":"Limerzel","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux à Limerzel, Bois de Ros, Kerfaz et Pinieux.                           BOIS de ROS, seigneurie avec haute, moyenne et basse justice, fut donnée aux Cisterciens de l'abbaye de Prières vers 1423 par le duc Jean IV (1399-1442). Les Cisterciens y édifient une chapelle et en 1576, cèdent le domaine aux Rieux. Puis les moines rachètent l'édifice en 1633. Acquis en 1887 par M. Pierre Lequen d'Entremeuse, celui-ci le cède en 1901, à M. Henri Espitalié de La Peyrade qui le restaure. Partie de l'élévation Est dont la tour d'escalier remontent au XVIe siècle ; chapelle peut-être élevée au XVIIe siècle ; reconstruction et remaniements au XIXe siècle du logis, de la ferme et des communs. Le bâtiment se compose d'un étage carré, gros-oeuvre en granite et moellon, élévations à travées, surmontées de toit à longs pans; noue; croupe et toit polygonal recouverts d'ardoise.Manoir du XVe siècle, en partie remanié et reconstruit au XVIIe siècle et dont l'extrémité sud a été reconstruite au XIXe siècle. Restauration en 1901-1902 par Henri Espitalié de la Peyrade, suite à un incendie de l'aile sud en 1885. Partie de l'élévation est dont la tour d'escalier XVIe siècle ; chapelle XVIIe siècle ; reconstruction et remaniements au XIXe siècle concernant le logis, la ferme et les communs.","architecture":"KERFAZ, la seigneurie de Kerfaz (ou Kerface), avec moyenne justice, appartenait au XVIe siècle à la famille Coëtlogon. C'est l'écuyer Louis de Coëtlogon, seigneur de la Sauldraye et de Kerfaz, qui fit édifier le château, à la fin du XVIe siècle. Une chapelle privée y fut élevée en 1630, par Madeleine de La Touche, sa veuve. Ensuite la seigneurie et le château passèrent par héritages aux familles la Houlle de Casset, Lévèque de La Ferrière, du Feigna de Keranforest, Aubrée du Rhun, et du Cosquer de Kerviler, dont Madame Hardy, l'actuelle propriétaire, est l'héritière directe. Kerfaz se trouve à la limite Ouest de la commune.                                                                                PINIEUX , logis et chapelle construits à la fin du XVe ou au début du XVIe siècle ; cheminée du rez-de-chaussée porte la date 1586; aile gauche de communs construite en 1834; élévation sud du logis remaniée en 1930, les baies. L'édifice se compose d'un étage carré et d'un étage de comble, le gros-oeuvre en granite, la demeure est inscrite monument historique partiellement. Pinieux  était la principale seigneurie de Limerzel, le château fut le berceau de la famille de ce nom. Il était habité en 1413, par Jean de Couëdro de Pinieux. Par la suite, il fut aux Cybouault, puis par mariage, passa en 1656 à Louis du Bouëxic. En 1681, ce fief avait tout droit de justice, haute, moyenne et basse. Les seigneurs de Pinieux avaient une chapellenie desservie dans l'église paroissiale Saint Sixte, dans leur chapelle prohibitive, à raison d'une messe de Requiem chaque vendredi, dotée d'une rente annuelle.","habitants":"Bois due Ros; M. Pierre Lequen d'Entremeuse,                          Kerfaz ; famille Coëtlogon.                                                               Pinieux; famille de Louis du Bouëxic\r\n        \"","divers":"à Limerzel   gps  47° 38' 15\"nord, 2° 21' 09\" ouest                              , Bois de Ros  gracv-1, Kerfaz grav 4-5 et Pinieux grav 2-3.","gps":"","images":["../../jctruffet.com/image/image_56/56_Limerzel_1.jpg","../../jctruffet.com/image/image_56/56_Limerzel_2.jpg","../../jctruffet.com/image/image_56/56_Limerzel_3.jpg","../../jctruffet.com/image/image_56/56_Limerzel_4.jpg","../../jctruffet.com/image/image_56/56_Limerzel_5.jpg"]},"Consult_chateau_formulaire26ee":{"id":"Consult_chateau_formulaire26ee","dept":"56","canton":"Séné","commune":"Séné","nom":"Limur","type":"Château","periode":"XVIII","histoire":"A Séné château de Limur,  de Lestrenis, de Bot-Spernen et de Cantizac.                                                                    LIMUR,  château dont subsiste les communs, le puits et la chapelle construits dans la deuxième moitié du XVIIIe siècle pour Noël bourgeois, lieutenant général de l'amirauté ; le logis principal ne semble pas avoir été construit ; ferme en ruines sur le cadastre de 1844, détruite. Chapelle en moellon de granite avec fenêtres et calcaire, porte sud en granite couvert d'un toit à croupes et lambris de recouvrement; communs ouest  en moellon enduit, ouvertures en granite, lucarnes et gerbières en calcaire avec toit à croupes ; communs, logis en moellon enduit, baies tuffeau et granite avec toit à croupes; puits en pierre de taille. Jadis siège d'une seigneurie qui appartint aux Limur puis aux Bourgeois au XVIIIe siècle, le lieu fut ensuite aux Chanu.                                                                                         LESTRENIS, le manoir de Lestrénis ou Lestrenic  du XVIIe siècle, restauré au XIXe siècle. Il est aussi surnommé \"Saint-Laurent\". Ancienne possession des ducs de Bretagne. Cette propriété est vendue en 1450 par Jehan de Vannes au duc Pierre II. Certains écrits prétendent aussi que le château a été édifié par Pierre II en 1431. Abandonné, ses ruines sont rasées en 1614 et Louis XIII donne ses pierres aux Capucins de Vannes afin de pouvoir édifier leur couvent de Calmont-Haut. Le manoir est cédé en 1634, sous le nom de Saint-Laurent, aux jésuites du collège de Vannes. L'édifice est vendu comme bien national en 1793 à un négociant de Lorient. Il devient, par la suite, la propriété successive des familles Bastide, Boulard et Eudon de Rohan Chabot depuis 1975 .","architecture":"BOT-SPERNEN, le château  (1850), édifié par le comte de Castellan. Il est vendu vers 1916 à la famille de L'Ecochère, puis en 1922 à la famille Bruneau, et enfin à la famille Bérard. Vers 1939, il devient la propriété successive de l'évêché de Vannes, de la famille Oberthur (imprimeur à Rennes), de la famille Hirglair, puis des Augustines de la Miséricorde de Jésus (en 1957 et jusqu'en 1983) et de la famille L'Haridon.\r\nCANTIZAC, siège de l'ancienne seigneurie de Quentifac ou Cantizac. On mentionne Guillaume de Coetlagat en 1424, Renault de Coetlagast en 1464 et Prigent de Coetlagat en 1481 ; siège de l'ancienne seigneurie de Quentifac ou Cantizac appartenant à la famille Coetlagat (en 1400 et en 1530), puis à la Visitation (en 1714). A la Révolution, le bien devient national. La terre de Cantizac et ses dépendances sont acquises, le 20 avril 1791, par M. Perier, directeur de la Compagnie des Indes à Lorient,. Jacques Paul Augustin Perier [26/05/1746-1793] s'était marié en 1777 à Marie-Charlotte Carier. Issu d'une noblesse récente, Périer est inquiété pendant la Terreur. Il se suicide à Lorient en 1793, durant, ou juste après son incarcération. En 1794, son épouse et sa fille seront assassinées par les Chouans sur la route de Lorient en allant recueillir sa succession.","habitants":"Limur; Famille des Chanu                                                      Lestrenis ; famille Bastide                                                                                      Cantizac; famille Coetlagat\r\n        \"","divers":"A Séné gps 47° 37' 14\" nord, 2° 44' 09\" ouest                                                ; le château de Limur grav-1-2,  de Lestrenis grav 8, de Bot-Spernen--5-6-7 et de Cantizac grav 3-4","gps":"","images":["../../jctruffet.com/image/image_56/56_Limur_1.jpg","../../jctruffet.com/image/image_56/56_Limur_2.jpg","../../jctruffet.com/image/image_56/56_Limur_3.jpg","../../jctruffet.com/image/image_56/56_Limur_4.jpg","../../jctruffet.com/image/image_56/56_Limur_5.jpg","../../jctruffet.com/image/image_56/56_Limur_6.jpg","../../jctruffet.com/image/image_56/56_Limur_7.jpg","../../jctruffet.com/image/image_56/56_Limur_8.jpg"]},"Consult_chateau_formulaire66e7":{"id":"Consult_chateau_formulaire66e7","dept":"56","canton":"Hennebont","commune":"Kervignac","nom":"Locguénolé","type":"Château","periode":"XVIII-XIX","histoire":"LOCGUENOLE, est signalé comme lieu noble en 1427 lors de la réformation du domaine ducal : \"l'hébergement de Locquenollay appartenant à Guyon, fils de Morice de Kerguiris, auquel manoir est métayer Perros Le Grallon\". Guyon de Kerguiris possède deux autres lieux nobles dans la paroisse (Coatrivas, Kericu). La famille de Kerguiris est présente à Locguénolé pendant le XVe siècle. Mais en 1536, elle paraît avoir cédé le lieu à Jean Lody et habite Coatrivas ; le manoir passa ensuite aux Baëllec au XVIe siècle, puis aux Eudo. Le manoir est ensuite la propriété de la famille de Perrien, également propriétaire de Lannoan en Landévant. Au XVe siècle, la seigneurie et le manoir appartenaient à la famille Chef du Bois. Depuis les Perrien, le domaine est resté dans la même famille, transmis parfois par les femmes. Il passa ainsi aux La Tour-Maubourg au XIXe siècle, puis aux La Sablière. Transformé en chambres d'hôtes de charme.","architecture":"LOCGUENOLE, le château actuel a été édifié au milieu du XIXe siècle (après 1837, car il ne figure pas sur le plan cadastral) pour la famille de Perrien, en remplacement de l'ancien manoir. Le parc est dessiné au XIXe siècle par le paysagiste Edouard André. Les communs et les écuries sont respectivement construits au milieu et à la fin du XIXe siècle. Avec sa façade ouest à avant-corps polygonaux largement ouverte sur la rivière, sa haute toiture, le château ressort encore de l'architecture néoclassique quoique sa construction ne soit pas antérieure à 1837, date du plan cadastral ancien sur lequel il ne figure pas. On soulignera l'adaptation au relief, le jeu de terrasse et d'escaliers latéraux ayant permis à l'architecte de tirer parti du terrain pour profiter de la vue sur le Blavet.","habitants":"famille Chef du Bois.\r\n        \"","divers":"A Kervignac gps 47° 45' 51\" nord, 3° 14' 15\" ouest.       château de Locguénolé","gps":"","images":["../../jctruffet.com/image/image_56/56_Locgu%c3%a9nol%c3%a9_1.jpg","../../jctruffet.com/image/image_56/56_Locgu%c3%a9nol%c3%a9_2.jpg","../../jctruffet.com/image/image_56/56_Locgu%c3%a9nol%c3%a9_3.jpg","../../jctruffet.com/image/image_56/56_Locgu%c3%a9nol%c3%a9_4.jpg","../../jctruffet.com/image/image_56/56_Locgu%c3%a9nol%c3%a9_5.jpg","../../jctruffet.com/image/image_56/56_Locgu%c3%a9nol%c3%a9_6.jpg"]},"Consult_chateau_formulaire273e":{"id":"Consult_chateau_formulaire273e","dept":"56","canton":"Gourin","commune":"Locmalo","nom":"Locmalo","type":"Château","periode":"XVII-XVIII-XX","histoire":"Deux chateaux dans cet article sur Locmalo; Ménoray et Quenven. MENORAY, la seigneurie de Ménoray est connue dès le XIVe siècle et appartient à un nommé Jehan Caron. Par la suite elle change souvent de propriétaires. C'est un Cadillac qui fit bâtir le château actuel.Le bâtiment passa aux Volvire par alliance en 1652, puis fut acheté par le marquis d'Assérac en 1680, avant d'être revendu en 1680 à Louis le Gall du Cunfiou, sieur du Palevart. Guillaume, Louis-Marie et Guillemette lui succédèrent, celle-ci mourut ruinée en 1809 et laissa Ménoray à Joseph de Kermarec, son neveu, qui le perdit au jeu. Racheté en 1851 par M. Chéreil de la Rivière, il fut revendu une nouvelle fois, en 1867, à M. Le Gallic de Kerizouët, et il est resté depuis dans cette famille. Propriétaire actuel un des fils de M. Antoine de Kerizouet qui fit un élevage de Chiens.","architecture":"MENORAY, le château actuel au XVIIe siècle (le corps principal daterait de 1620). L'édifice comporte une salle inhabituelle dans ce genre de demeure. Il s'agit d'une galerie de 26 mètres de long sur 6,50 mètres de large et 5 mètres de hauteur sous plafond, qui servait de salle de bal.   Le propriétaire actuel, a aménagé un élevage de chiens dans les communs. Bois, terrasses, muret surmonté de balustres entourant la cour d'honneur, colombier, jardin, maison aux agréables proportions et chapelle font de Ménoray une très belle résidence.                                                                                                              QUENVEN,  c'est le château d'un domaine qui comprend deux fermes et une centaine d'hectares de terres. Edifiée au XVIIIe siècle par M. Modille de Villeneuve, une de ses lucarnes porte l'inscription \"Nec spe nec meter\" (Ni par espoir ni par crainte). Ancienne propriété de Mgr de Villeneuve, protonotaire de Monaco et historien de Guémené sur Scorff ( laissant des Notes sur les ruines du château de Guémené 1925-1931), il a légué, à sa mort survenue en 1946, le château de Quenven à Mme de Gentil, sa petite nièce, épouse de M. Cyril de Brunhoff, dont c'est actuellement la résidence secondaire.","habitants":"Ménoray ; marquis d'Assérac                                             Quenven;  Mgr de Villeneuve,                          \r\n        \"","divers":"A Locmalo   gps 48° 04' 24\" nord, 3° 11' 07\" ouest ; Ménoray  grav-1-2-3-4 et Quenven grav-5  et Guemené grav-6 à Saint-Scott gps 48° 04' 09\" nord, 3° 12' 06\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Locmalo_1.jpg","../../jctruffet.com/image/image_56/56_Locmalo_2.jpg","../../jctruffet.com/image/image_56/56_Locmalo_3.jpg","../../jctruffet.com/image/image_56/56_Locmalo_4.jpg","../../jctruffet.com/image/image_56/56_Locmalo_5.jpg","../../jctruffet.com/image/image_56/56_Locmalo_6.jpg"]},"Consult_chateau_formulaire6c13":{"id":"Consult_chateau_formulaire6c13","dept":"56","canton":"Auray","commune":"Locmariaquer","nom":"Locmariaquer","type":"forteresse","periode":"XIX","histoire":"Trois châteaux à Locmariaquer; Floriot, Renaud  et le manoir sur la pesqu'ile du Rhyus.                                                                                                                            FLEURIOT,   la seigneurie de Kaer est très ancienne, citée en XIIIe siècle. Le castel étant ruiné, ses propriétaires (qui portaient son nom) s'établirent au Plessis en Crach, qu'ils nommèrent le Plessis-Kaër, en souvenir de leur origine. La demeure actuelle est connue localement sous le nom de \"Château des Fleuriot\", car édifié dans les premières années du XIXe siècle par la poétesse Zénaïde Fleuriot. Vendue en 1953 à M. Léon Querné, armurier à Vannes, le château appartient depuis 1981 à Mme Andrée Kerharo, qui l'a magnifiquement remis en état. Tout en granit, il a fière allure, avec sa tour carrée à créneaux et sa tourelle d'escalier au toit en poivrière. Il est situé au milieu d'un écrin de verdure, face au golfe du Morbihan.                                                                                                  RENAUD, à la réformation de 1427, on comptabilise la présence de plusieurs nobles de Locmariaquer : Henry et Guillot Le Pezrennec et le sieur de Kaer (Kereré), Jehan Pastou, Ollivier Le Sombart (Kerdréan), Eon de Coeaigoursout (Kerdréan, Coetcourso), Jouhan Lodic et Jehan son fils (le Moustoir)                                                                                         COET-COURZO, le manoir, siège d'une ancienne seigneurie. Propriété d'Eon de Coët-Consout en 1420. Il possédait autrefois une chapelle privée ;","architecture":"FLEURIOT le manoir de 1876, édifié par la famille Fleuriot ; L'édifice actuel château Fleuriot date du XIXe siècle et a été édifié par la poétesse Zénaïde Fleuriot ; de style forteresse de trois niveaux, donjon carré avec créneaux mâchicoulis  accolé d'une tourelle à escalier sur angle , toit en poivrière,le corps de logis de plan rectangulaire à deux niveaux .\r\nKERIGUER, le château, siège de l'ancienne seigneurie de Kaer, citée dès le XIIIe siècle. Le castel du lieu étant ruiné, les seigneurs  s'établirent au Plessis en Crac'h, ils avaient haute justice.","habitants":"Fleuriot ; Famille Fleuriot\r\n        \"","divers":"à Locmariaquer gps  47° 34' 12\" nord, 2° 56' 39\" ouest; Floriot grav-1-2, Renaud  grav-3  et le manoir sur la presqu'ile du Rhyus  grav-4  et le castel de Keriguer .","gps":"","images":["../../jctruffet.com/image/image_56/56_Locmariaquer_1.jpg","../../jctruffet.com/image/image_56/56_Locmariaquer_2.jpg","../../jctruffet.com/image/image_56/56_Locmariaquer_3.jpg","../../jctruffet.com/image/image_56/56_Locmariaquer_4.jpg"]},"Consult_chateau_formulairefd29":{"id":"Consult_chateau_formulairefd29","dept":"56","canton":"Grand-Champ","commune":"Locqueltas","nom":"Locqueltas","type":"Château","periode":"XV-XVI-XIX","histoire":"Deux châteaux à Locqueltas, Camzon et Coet-Candec.                             CAMZON, siège de l'ancienne seigneurie appelée Canizon en 1420, et propriété de Louis de La Forêt. Le château passe ensuite et jusqu'à la Révolution entre les mains de la famille Robien qui construit le pigeonnier et la chapelle privée en 1699. Château élevé vers 1870, à la place de l'ancien château, en ruines depuis 1760 environ. Les communs (ancien logement) portant la date 1647, reconstruit en 1860 par M. Chevallier qui avait acheté la propriété en 1839 .                                                                                                                 BODALIC,  ou Botdaly  du XVe siècle, propriété de Jean Du Helen (en 1427 et 1464), de Jacques de Lohan (au XVIe siècle), de Kervasic (au XVIIe siècle), de la famille Lantivy. A la Révolution, Bodalic est saisi aux Lantivy ;\r\n TREDEC du XVe siècle, propriété de Sylvestre du Tressay, époux de Jeanne Du Helen, fille du seigneur de Bodalic (en 1427), de Jean du Tressay (en 1448 et en 1477), de Charles de Kerméno, fils d'André Robien (en 1673), puis du frère de Mirabeau (durant la Révolution). Le manoir est reconstruit au XVIIe siècle et remanié au cours du XIXe siècle ;","architecture":"A un Kilomètre à l'ouest Locmaria Grand-Champ les vestiges de  COET-CANDEC, le château est une juxtaposition d'habitations successives dont chacune a subi des transformations au cours du temps, au XIXe siècle, suppression des meneaux des baies, élargissement des ouvertures primitives, murs, poutres et poutrelles des plafonds recouverts de plâtre, dallages remplacés par des parquets point de Hongrie. Le château comporte une enceinte entourée de murs et de fossés. Certaines tours ont été conservées. L'entrée était au nord et devait comporter des fortifications importantes. Sans doute après une deuxième enceinte, accès au château dont la partie la plus ancienne doit se trouver au nord (du XIIIe ou XIVe siècle). La partie centrale date du XVe siècle. La façade Est conserve une tour d'escalier polygonale et un avant-corps qui renferme de petites dépendances. Une troisième partie achève le château vers le sud, comprenant une grosse tour à l'angle sud-ouest. A l'intérieur, cheminées sculptées d'armoiries peintes. Éléments protégés MH :inscription par arrêté du 8 mai 1939.                                                                                                 CAMZON, l'ancien château était en ruines depuis 1760 environ ; communs (ancien logement) portant la date 1647 ; chapelle disparue depuis 1864 ; blason non identifié sur une pierre provenant de l'ancien château déposée dans le jardin.Edifice de plan massé composé d'un corps de logis rectangulaire accosté au sud de deux tours polygonales encadrant la façade principale. Rez-de-chaussée surélevé au-dessus d'un sous-sol semi-enterré, 1 étage carré, 1 étage de comble. Maçonnerie enduite avec encadrements de baies, corniche à modillons, lucarnes en pierre de taille de tuffeau. Ensemble de communs disposé en L au sud du nouveau logis ; colombier au nord.","habitants":"Camzon ; Famille Robien                                                          Bodalic; famille Lantivy\r\n        \"","divers":"à Locqueltas gps 47° 45' 28\" nord, 2° 45' 54\" ouest,                                          Camzon grav-1 et Coet-Candec grav de 2 à 5, Bodalic et Trédec","gps":"","images":["../../jctruffet.com/image/image_56/56_Locqueltas_1.jpg","../../jctruffet.com/image/image_56/56_Locqueltas_2.jpg","../../jctruffet.com/image/image_56/56_Locqueltas_3.jpg","../../jctruffet.com/image/image_56/56_Locqueltas_4.jpg","../../jctruffet.com/image/image_56/56_Locqueltas_5.jpg","../../jctruffet.com/image/image_56/56_Locqueltas_6.jpg","../../jctruffet.com/image/image_56/56_Locqueltas_7.jpg"]},"Consult_chateau_formulaire0c58":{"id":"Consult_chateau_formulaire0c58","dept":"56","canton":"ploërmel","commune":"Loyat","nom":"Loyat","type":"Château","periode":"XII-XVII","histoire":"LOYAT, château construit au XIIe siècle et en 1500 construction  du nouveau château commandé  par Béatrice de Rostrenen  veuve de jean d'Acigné qui fut acheté en 1676 par la famille de Coëtlogon sous la direction de l'architecte Olivier Delourme pour le comte de Coëlogon que la seigneurie passa définitivement  à cette famille en 1676, et en 1792 extinction de la branche Coëtlogon de Loyat  avec Louis qui meurt accidentellement noyé dans l'étang du domaine, qui connaîtra plusieurs propriètaires avant d'être acquit  au XIXe siècle par un filleul de Napoléon  M. de Champagny conseiller  général et député du Morbihan, et en 1888 la famille de Premesnil acquiert le domaine à la famille du général Delprat de Prémesnil  appartient aujourd'hui à la famille Dargnies.","architecture":"LOYAT, la façade postérieure, en raison de la dénivellation du terrain, n'a qu'un étage. La richesse intérieure se manifeste dans les salles de réception et les appartements. Un premier château avait été bâti entre 1153 et 1185. De cette forteresse restent des douves au sud. Un second château a été bâti à l'emplacement du premier au début du XIVe. C'était une grande maison forte, fermée de murailles et possédant chapelle et fuie. A la fin du XVIIe siècle ce manoir menaçant ruine, sa reconstruction fut envisagée et commença par la basse-cour, la clôture et les deux pavillons d'entrée. L'édifice actuel fut élevé à partir de 1718. Le domaine comprend, le château construit au fond de la cour d'honneur, deux pavillons d'entrée servant l'un de chapelle et l'autre de logement au régisseur, la ferme et le potager. Le cadre se complète d'étangs, de terrasses et d'allées. En maçonnerie de moellons enduite et chaînes d'angle, le château comporte un rez de chaussée et deux étages côté de la cour d'honneur.","habitants":"Loyat; Famille de Coëtlogon \r\n        \"","divers":"Château de Loyat à Loyat gps 47° 59' 27\" nord, 2° 22' 56\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Loyat_1.jpg","../../jctruffet.com/image/image_56/56_Loyat_2.jpg","../../jctruffet.com/image/image_56/56_Loyat_3.jpg"]},"Consult_chateau_formulaireb32f":{"id":"Consult_chateau_formulaireb32f","dept":"56","canton":"Questembert","commune":"Malansac","nom":"Malansac","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Malansac ; Grationnaye et Bodelio.                         BODELO, appartenant à la compagnie du chemin de fer de Paris à Orléans en 1842, le domaine est acquis en 1850 par la famille Simon, qui en modernise les activités et fait aménager un parc paysager à proximité du manoir. Les fermes du Val-Simon et de Kerdrio datent de cette époque. François Forest, futur maire de Malansac, l'achète en 1890 et y entreprend d'importants travaux de drainage. L'ensemble du domaine, y compris sa rabine d'accès, sont inscrits au titre des M.H.par arrêté du 23 décembre 1992.                                                                   GRATIONNAYE,  le château joue un rôle lors de la prise de Rochefort en Terre par les Blancs, en 1793 et il fut occupé par les Chouans qui y partagèrent les armes et le produit du dépouillement des caisses publiques de Rochefort. En 1425, Olivier Philippot, sieur de la Grationnaye, résidait dans l'aile Nord, que François de Talhouët achète en 1581. Sa famille va conserver la Seigneurie jusqu'en 1792, et apporter de nombreuses améliorations à la demeure. C'est François de Talhouët qui construit le grand pavillon de l'Ouest, de 1581 à 1585.","architecture":"BODELIO, le domaine de Bodelio est un ancien domaine féodal érigé au plus tard au début du XVe siècle, époque dont est datée la construction du mur d'enceinte. Un manoir, servant alors de pavillon de chasse est construit au XVIIe siècle. Dans le courant du siècle suivant, il se transforme en exploitation forestière et agricole. En parallèle, sont aussi exploitées des activités d'extraction d'ardoises, de saboterie, de sciage et de charbonnerie.  Le domaine, d'une surface d'environ 375 ha, est enclos d'un mur de schiste de 11 km de long et 3 m de haut. Trois portes d'entrée (à l'ouest, à l'est et au sud) y sont percées pour permettre les échanges avec l'extérieur. Le manoir est construit suivant un plan rectangulaire et de style néoclassique. Élevé sur trois travées, il est coiffé, sur sa façade principale, d'un fronton triangulaire et d'un lanternon.                                                                       GRATONNAYE initialement, il s'agissait d'un bâtiment rectangulaire qui forme actuellement l'aile nord du château en 1427. Ajout d'un bâtiment de transition et d'une tour carrée. Nouvel ajout d'un corps de bâtiment perpendiculaire avec des lucarnes Renaissance surmontées d'une forme de pin, une chapelle et un pigeonnier. En 1863, ce bâtiment est prolongé par un pavillon carré et une aile parallèle. le château est organisé autour d'une cour d'honneur, autour de laquelle se dressent les différents bâtiments. L'aile nord, historiquement la première bâtie, constitue un bâtiment rectangulaire, auquel s'est greffée une aile perpendiculaire à l'ouest (XVIIe siècle), puis une aile parallèle au sud (XIXe siècle). L'aile occidentale est construite dans le style Renaissance de l'époque, qui se retrouve notamment dans ses lucarnes surmontées d'une forme de pin. Éléments protégés MH : les façades et les toitures de l'aile Nord, du pavillon d'angle Nord-Ouest, du corps central Ouest et du pavillon du parc ; la chapelle : inscription par arrêté du 6 décembre 1984.","habitants":"Bodelio;  famille Simon                                                           Gratonnaye; Famille de Talhouët \r\n        \"","divers":"à Malansac gps47° 40' 43\" nord, 2° 17' 37\" ouest ; Grationnaye grav-2 et Bodelio grav-4.","gps":"","images":["../../jctruffet.com/image/image_56/56_Malansac_1.jpg","../../jctruffet.com/image/image_56/56_Malansac_2.jpg","../../jctruffet.com/image/image_56/56_Malansac_3.jpg","../../jctruffet.com/image/image_56/56_Malansac_4.jpg"]},"Consult_chateau_formulaire9ba4":{"id":"Consult_chateau_formulaire9ba4","dept":"56","canton":"Guerin","commune":"Malguénac","nom":"Malguénac","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article à Malguénac  Lesturgant et Moustoirlan.                                                                                                      LESTURGANT, le château a été édifié à la demande de M. Narcisse Laudren (fils de l'acheteur du domaine) en 1885, par l'entreprise Vernery de Pontivy, suivant des plans qui ont malheureusement disparu. La crémaillère fut pendue le dimanche 27 juin 1886 en présence de M. Rostaing, sous-préfet de Pontivy. La demeure n'était alors qu'une résidence d'été, au confort très moderne pour l'époque. Le château a été placé devant la balustrade Renaissance, face à la vallée du Blavet et à l'endroit même où se trouvait l'ancienne métairie, rasée à cette occasion. Lesturgant est resté depuis dans la famille Laudren, est actuellement habité par M. Hubert Laudren.                    MOUSTOIRLAN,  on retrouve trace de la seigneurie en 1448 lorsqu'elle appartient à Jean de Kerriec. Elle relève du domaine des Rohan dans la chatellenie de Pontivy. En 1765, date de son rachat par J. B. Le Cam, maire de Pontivy, la construction du château est commencée.","architecture":"MALGUENAC, façades et toitures du corps de logis et des deux bâtiments des communs ; grille d'honneur et douves ; chapelle ; décor de lambris du grand salon  : inscription par arrêté du 14 avril 1986.                                                MOUSTOIRLAN,  le château de Moustoirlan est l'un des édifices classiques les plus réussis du Morbihan. Cette demeure, où la symétrie la plus rigoureuse, l'organisation générale du programme, la perfection de la stéréotomie, ne manquent pas d'étonner dans ce secteur rural où le XVIIIe siècle n'a laissé aucune trace notable. Elle se poursuit jusqu'à la date de la bénédiction de la cloche de la chapelle en 1781. Le plan général du logis est ramassé et non allongé comme c'est alors la mode. Le salon n'occupe pas l'espace central, au bénéfice de l'escalier placé dans le vestibule axial. C'est ici la pratique régionale qui l'emporte par l'absence de décor (quelques boiseries assez sèches), qui renvoie à un modèle proche de celui de la malouinière de la Ville Bague, bâtie vers 1715. Eléments protégés MH : les façades et les toitures du corps de logis et des deux bâtiments des communs ; la grille d'honneur et les douves ; la chapelle ; le décor de lambris du grand salon : inscription par arrêté du 14 avril 1986.","habitants":"Lesturgant ; M. Narcisse Laudren                                          Moustoirlan; Jean de Kerriec\r\n        \r\n        \"","divers":"à Malguénac gps 48° 04' 53\" nord, 3° 03' 39\" ouest                grav-1-2-3  Lesturgant grav-4 et Moustoirlan grav-5","gps":"","images":["../../jctruffet.com/image/image_56/56_Malgu%c3%a9nac_1.jpg","../../jctruffet.com/image/image_56/56_Malgu%c3%a9nac_2.jpg","../../jctruffet.com/image/image_56/56_Malgu%c3%a9nac_3.jpg","../../jctruffet.com/image/image_56/56_Malgu%c3%a9nac_4.jpg","../../jctruffet.com/image/image_56/56_Malgu%c3%a9nac_5.jpg"]},"Consult_chateau_formulaire399b":{"id":"Consult_chateau_formulaire399b","dept":"56","canton":"Ploërmel","commune":"Ploërmel","nom":"Malleville","type":"Château","periode":"XV-XVI-XIX","histoire":"MALLEVILLE, l'ensemble du domaine de Malleville a été très remanié au cours des siècles. Le château est reconstruit vers 1840 pour le général de la Boissière ainsi que les parties agricoles, mis à part le colombier construit au XVIIIe siècle. La chapelle a été construite vers 1520 pour Yvon Audran en expiation du meurtre de son frère Marc ; une croix porte la date 1742. l'édifice de Plan général en U comportant un corps principal, une aile en retour d'équerre à l'ouest et un corps moins allongé à l'est. Élévation ordonnancée à travées. La façade sud, à 5 travées, est marquée en son centre par une légère saillie individualisée au niveau de la toiture. Maçonnerie de moellon de schiste enduit avec encadrement de baies, chaînes d'angle, bandeaux horizontaux et lucarnes en pierre de taille de granite. Au sud, la tour est couverte en poivrière. Le château de Malleville est inscrit partiellement aux M.H. depuis le 27/12/1973","architecture":"MALLEVILLE, il date du XVIe siècle. La majeure partie des bâtiments fut remanié au XIXe siècle. Le château de Malleville présente un plan général en U, avec une façade régulière. Au Sud, un pavillon est pris dans l'aile Est et une tourelle datant du XVe siècle, engagée dans le grand corps central. D'origine médiévale, la tourelle est circulaire et découronnée. La chapelle est composée d'une petite nef terminée par un chevet à 3 pans coupés. Les verrières datent de 1520. Le château de Malleville possède aussi une chapelle et un calvaire. Créé en 1905 dans le parc du château de Malleville, un hippodrome ouvert au galop, a été créé, à l'obstacle et au trot avec une piste de 2 900 m en herbe avec corde à droite. Sa saison de course a lieu traditionnellement sur 3 jours, en Septembre.","habitants":"général de la Boissière\r\n        \"","divers":"Château de Malleville à Ploërmel GPS : 47° 55' 28\" Nord, 2° 22' 39\" Ouest","gps":"47° 55' 28\" Nord, 2° 22' 39\" Ouest","images":["../../jctruffet.com/image/image_56/56_Malleville_1.jpg","../../jctruffet.com/image/image_56/56_Malleville_2.jpg","../../jctruffet.com/image/image_56/56_Malleville_3.jpg","../../jctruffet.com/image/image_56/56_Malleville_4.jpg"]},"Consult_chateau_formulaire991f":{"id":"Consult_chateau_formulaire991f","dept":"56","canton":"Lanester","commune":"Lanester","nom":"Mané_Lanester","type":"Château","periode":"XVII","histoire":"MANE,Le siège de la seigneurie du Mané était constitué, à la fin du XVIIe siècle, par un manoir proche de l'estuaire du Blavet. En 1726, le lieu est habité par Mathurin Le Nesec, sieur de Penhouët. Acquis en 1854 par François Le Guerre, capitaine au commerce (mais plutôt corsaire), il est transformé quelques années plus tard par ce propriétaire, avec remploi des matériaux du précédent bâtiment. Le colonel Geoffroy l'achète en 1882 et ajoute la tour carrée à l'Est et la tourelle à l'ouest. Légué aux Pères Blancs au début du XXe siècle, puis revendu en 1910 à M. Émile Marcesche, industriel et armateur lorientais, la demeure est restée depuis dans cette famille (Guillerot, puis Martinie). Occupé de 1940 à 1945 par les troupes allemandes.","architecture":"MANE,  a beaucoup souffert de  l'ouragan de 1987 a également causé d'énormes dégâts. Il conserve une très belle cheminée surmontée d'un linteau monolithique armorié, ainsi qu'une belle porte intérieure du XVIIe siècle, en chêne sculpté. C'est en 1921 que la municipalité acquiert cette ancienne boulangerie pour abriter ses services jusqu'alors logés dans deux pièces. Agrandie et remaniée à partir de 1934, la mairie est finalement transférée dans un bâtiment neuf en 1992. L'édifice abrite aujourd'hui des associations.","habitants":"François Le Guerre\r\n        \"","divers":"Château de Mané à Lanester gps 47° 45' 53\" nord, 3° 20' 32\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Man%c3%a9_Lanester_1.jpg"]},"Consult_chateau_formulaireb2f3-2":{"id":"Consult_chateau_formulaireb2f3-2","dept":"56","canton":"Muzillac","commune":"Marzan","nom":"Marzan","type":"Château","periode":"XVI","histoire":"MARZAN,  la seigneurie de Marzan (ou de la Cour de Marzan) avait haute, moyenne et basse justice, du XVIe siècle, situé à La Cour et propriété des seigneurs de Marzan du  XVIe siècle qui relevaient du comté de Rochefort. On trouve en 1269 un Guillaume de Marzan mentionné dans les comptes du duc de Bretagne, Jean Ier, dit le Roux.  Il est à l'origine propriété des seigneurs de Marzan, puis du comte de Lorges et ensuite des Du Breil. Le château possède aujourd'hui des écuries de 1863. En 1381, Olivier de Marzan signe le traité de Guérande et en 1420, un Olivier de Marzan, avec son frère Robert, font partie d'une montre du sire de Rieux. Au XVe siècle elle est aux mains de la famille Jehan de la Châteigneraie, puis de la famille Bézic et dès 1610 propriété de la famille Butault (Jehan Butault). Au XVIIIe siècle (et dès 1750), ce château est la propriété du comte de Lorges, puis de la famille Du Breil (en 1807).","architecture":"MARZA, la propriété avait une chapelle domestique et un moulin à eau privé. La demeure a été rénovée. Elle possède un toit à crochets et animaux sculptés, des fenêtres ornées de crosses ou surmontées d'un fronton triangulaire ou demi-circulaire et possède un pavillon carré à corbelets. On voit tout auprès du château quatre cercueils en pierre trouvés à la ferme de Saint-André, à côté des ruines de la petite chapelle du même nom. La Cour de Marzan se trouve à proximité de la rive droite de la Vilaine. Daté du XVIe siècle, il est à l'origine  la propriété des seigneurs de Marzan, puis du comte de Lorges et ensuite des Du Breil. Le château possède aujourd'hui des écuries de 1863, une chapelle et un pavillon de chasse.                                                                 \r\nPORSAC, elle est à la fin du XVIIe siècle, la propriété d'Yves Chaignard, sieur de Porsac, avocat et sénéchal de la ville de Redon.                                                                             Vestiges du château du Prédit, visible depuis la voie publique les différents vestiges du château, datant du Moyen Âge, sont actuellement des propriétés privées.  On y trouve une chapelle privée et un moulin à eau.  Près du château, se trouvent quatre cercueils en pierre trouvés non loin de l'ancienne chapelle Saint-André.","habitants":"Famille de Butault\r\n        \"","divers":"Château de Marzan à Marzangrav 1-2-3  gps 47° 32' 30\" nord, 2° 19' 21\" ouest. Et vestiges de Prédit","gps":"","images":["../../jctruffet.com/image/image_56/56_Marzan_1.jpg","../../jctruffet.com/image/image_56/56_Marzan_2.jpg","../../jctruffet.com/image/image_56/56_Marzan_3.jpg","../../jctruffet.com/image/image_56/56_Marzan_4.jpg"]},"Consult_chateau_formulairedbd6":{"id":"Consult_chateau_formulairedbd6","dept":"56","canton":"Ploërmel","commune":"Mauron","nom":"Mauron","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Mauron , Boyer et Ville Davy, Plessis  et Lou à st-Lery.                                                               BOYER,   c'est une belle demeure commencée au XVe siècle par Pierre Loret ou son fils François. Les Loret conservent château et seigneurie au moins jusqu'en 1636. Par succession, le lieu passe ensuite à la famille Huchet, et ensuite par mariage aux Haouissée de La Villéan et aux  La Monneraye, qui en sont toujours propriétaires. Le Boyer est donc resté dans la même famille depuis le XVe siècle. La deuxième tourelle de l'édifice a été édifiée à la fin du XVIIIe ou au début du XIXe siècle. La chapelle date de 1850. Un très beau pigeonnier et des communs à tourelles agrémentent les abords. Le bâtiment reste invisible, seulement accessible par un chemin privé.                                 \r\n PLESSIS  le château du Plessis du XIIe siècle, propriété de la famille Du Plessis. En 1190, la seigneurie du Plessis est la propriété de Guillaume Ier, sire du Plessis. Propriété de Jehan du Plessix en 1480. Cette seigneurie passe dans la famille de Bréhant en 1592, suite au mariage de Jeanne du Plessis-Mauron. La seigneurie du Plessis est érigée en baronnie par Louis XIV en 1655 sous le nom de Mauron. Le château primitif fait place à plusieurs édifices : celui construit au XVIIIe siècle, est rasé au XXe siècle. On y trouve une chapelle privative qui date du XVIIe siècle.","architecture":"VILLE DAVY, la seigneurie, qui avait une chapelle privée, était jadis à la famille Loret. Elle passa successivement aux La Jouyère, aux La Haye, et enfin aux Noday au XVIIIe siècle. La Ville Davy est resté depuis cette époque dans cette famille. Le château actuel date du XVIIIe siècle et a pu échapper à la dévastation de la Révolution. Le plan cadastral levé dans les années 1820 figure un édifice de plan en H, implanté au centre d'un dispositif avec des communs, une terrasse et un jardin symétrique, une tour et une chapelle. Seul le corps de logis semble avoir été reconstruit ultérieurement. Occupé occasionnellement pendant 30 ans, la demeure a été rachetée en 2012 par la famille Vachon qui le remet en état ainsi que la chapelle avec l'aide des scouts unitaires de France.                                          LOU  à st-Lery , la seigneurie appartenait à Pierre Thomas en 1400, puis à la famille Avril, aux du Blé, aux Perrault en 1514, aux du Fail à la fin du XVIe siècle et, à partir de 1655 aux Desgrées, qui adoptent le nom du lieu. M. Jean Desgrées du Lou est toujours propriétaire du domaine. Au XIXe siècle siècle, à proximité du château on pouvait voir une motte féodale, où l'on trouva une cotte de mailles et une longue épée espagnole de l'époque de la Ligue. Le château du Lou est proche d'un bel étang entouré d'un grand bois. Il se trouve à environ 800 mètres au Nord du bourg. Cette famille possède également un manoir du XVe siècle qui fait face à l'église du bourg. C'est la propriété de M. Yves Desgrées du Lou. Il existe un deuxième manoir près de l'église paroissiale, qui appartient à Mme Thébault.","habitants":"Boyer;  famille Huchet                                                                   Ville d'Avy; famille de Noday                                               Lou; M. Jean Desgrées du Lou                                      Plessis; famille du Plessis\r\n        \"","divers":"à Mauron  gps 48° 04' 59\" nord, 2° 17' 05\" ouest ,  château de Boyer grav-1  , Ferron grav-2 Ville Davy Lou  grav-3 à 4, et à st-Lery grav-5-6--7_8.","gps":"","images":["../../jctruffet.com/image/image_56/56_Mauron_1.jpg","../../jctruffet.com/image/image_56/56_Mauron_2.jpg","../../jctruffet.com/image/image_56/56_Mauron_3.jpg","../../jctruffet.com/image/image_56/56_Mauron_4.jpg","../../jctruffet.com/image/image_56/56_Mauron_5.jpg","../../jctruffet.com/image/image_56/56_Mauron_6.jpg","../../jctruffet.com/image/image_56/56_Mauron_7.jpg","../../jctruffet.com/image/image_56/56_Mauron_8.jpg"]},"Consult_chateau_formulairefdf2":{"id":"Consult_chateau_formulairefdf2","dept":"56","canton":"Guidel","commune":"Cléguer","nom":"Meslien","type":"Château","periode":"XIII-XVIII","histoire":"Trois châteaux à Meslien dont celui de  Meslien, de Tronchateau et de Keryard.                                                                                                       MESLIEN, Propriété de Jehan Le Pavec en 1464, édifié de 1783 à 1789 par Charles de Robecq, au sud d'un manoir déclaré en ruines en 1793 et aujourd'hui disparu dont il ne reste que le colombier en ruines, et la métairie noble, peut-être Ty Glas, du XVIIe siècle.  Le château de Meslien (1783-1789), édifié par Guy de Robecq à lemplacement dun édifice primitif qui dépend au XVIIe siècle de la châtellenie de Pont-Callec. A noter qu'un cadran solaire, situé au-dessus de l'entrée principale, porte la date de 1566. Siège de la seigneurie de Meslien ou Mélion, propriété successive des familles Le Pavec de 1418 à 1632, Cléguennec de 1632 à 1721, Robecq de 1721 à 1799, Huon de Kermadec de 1799 à 1893  et Huchet de Cintré à partir de 1893.                                                    \r\nTRONCHATEAU, Le lieu est cité dans les preuves de Dom Morice en 1009 sous le nom de Truncus Castri. La seigneurie de Tronchâteau est attestée au XIIIe siècle comme appartenant à Pierre de Bretagne. Au XIVe siècle le duc de Bretagne Jean III la cède à son fils Jean. En 1455, le duc Pierre II la donne à Jean de Malestroit. Le lieu est attesté comme une forteresse avec rempart et flanquée de grosses tours sur un éperon dominant le Scorff, accompagné d'un moulin toujours visible sur les cartes postales anciennes du début du siècle, au débouché de l'étang de Tronchâteau. Ruiné à la Révolution, un nouvel édifice a été édifié sur l'emplacement de l'ancien château en 1812, demeure qui est, depuis 1977, la propriété de M. Hervé Pierre.","architecture":"MESLEIN, château enduit, de plan régulier, composé d'un corps de logis à étage carré et étage de comble à élévation ordonnancée à cinq travées, encadré de deux avant-corps latéraux légèrement saillants. La distribution est assurée par un escalier dans-oeuvre à retours avec jour en charpente. Adossée au mur nord de l'enclos, l'orangerie en rez-de-chaussée, partiellement enduite, est couverte d'un toit à longs pans en ardoise. Le colombier est en moellon. Le bassin quadrilobe est en pierre de taille de granite. A l'est du château, un second enclos regroupe la chapelle et la ferme. La chapelle non orientée, à vaisseau unique est en moellon partiellement enduit à toit à longs pans à croupe polygonale à l'ouest, à pignon découvert à l'est, le clocher étant couvert d'un toit à l'impériale. Le corps de ferme, regroupant logement et étable, est en moellon, à comble à surcroît ouvert de lucarne à pignon. La dépendance en retour est également en moellon, à comble à surcroît à pignon couvert. Le corps de ferme au sud de l'enclos, peut-être Ty Glas, possède une structure à pièce unique avec haut comble à surcroît ; il est en moellon de granite et arbore cinq rangs de boulins en façade. Les piliers d'entrée, en pierre de taille, sont ornés de lions couchés portant les armes des Robecq alliées à celles des Le Grand.                                                                                                           \r\n KERYARD  l'ancien château de Tronchâteau. Siège d'une seigneurie qui possédait un droit de haute, moyenne et basse justice. La famille de Tronchâteau est mentionnée dès le XIIIe siècle : en 1272 et 1280, est mentionné Pierre de Tronchâteau. Le château devient la propriété du Duc de Bretagne, Jean III, qui le donne à son fils bâtard, Jean, en 1334. En 1455, le duc Pierre II le cède à Hervé de Malestroit. Il possédait des moulins et une chapelle privée. L'édifice est en ruine depuis plusieurs siècles. Une nouvelle demeure a été édifiée en 1812 à l'emplacement de l'ancien château.","habitants":"Meslien ; famille Le Pavec                                                       Tronchâteau;  duc de Bretagne Jean III.                                          Keryard; famille de Tronchâteau \r\n        \"","divers":"A Meslien gps 47° 59' 423 nord, 3° 25' 49\" ouest, château de Meslien grav-1 ,de Tronchateau et de Keryard","gps":"","images":["../../jctruffet.com/image/image_56/56_Meslien_1.jpg","../../jctruffet.com/image/image_56/56_Meslien_2.jpg"]},"Consult_chateau_formulaire34b3":{"id":"Consult_chateau_formulaire34b3","dept":"56","canton":"Moréac","commune":"Missiriac","nom":"Missiriac","type":"Château","periode":"XVIII-XIX-XX","histoire":"Deux châteaux dans cet article sur Missiriac dont Guen,  Lourmes et la Morlaye.                                                                                                        LOURMES, la seigneurie appartenait à la famille Kerhoent du Bois Ruault. Le cadastre de 1840 présente un ensemble implanté autour d'une cour, peut-être un ancien manoir, et comprenant un corps de logis, des communs et une chapelle. Le château neuf a été construit sur le site,  au cours du quatrième quart du XIXe siècle. Le château du lieu est actuellement à M. Yves Arneil.                                                      GUEN, le château était autrefois le siège d'une seigneurie qui appartint aux Bouczo et aux Castel. C'était la propriété de M. Henri de la Richerie au XXe siècle. Château de plan en H, puits couvert en ferronnerie. Aujourd'hui, la demeure appartient à la famille de Coatparquet. Un petit pavillon construit au XVIIe siècle, ancienne garderie du château, et récemment restauré abrite un gîte.","architecture":"LA MORLAYE,  la seigneurie était aux Birague en 1612, construit au XVIIIe siècle pour le dernier Baron de Malestroit, Louis de Sérent, qui utilisa les pierres des remparts de Malestroit. Au milieu du XXe siècle la demeure appartenait à Mmes Larmet et Michel. Depuis 1998 le château de la Morlaye est la propriété et la résidence de la famille Castillon. Sa restauration a permis de préserver une architecture typique du XVIIIe siècle avec des pièces de réception transversantes au rez-de-chaussée et des appartements d'habitation à l'étage. La propriété possède un parc avec de très beaux arbres, des douves et les vestiges de l'ancien manoir.","habitants":"Lourmes ;M. Yves Arneil.                                                       Guen;    M. Henri de la Richerie                                                           La Morlaye;  Baron de Malestroit\r\n        \"","divers":"A Missiriac gps 47° 50' 12\" nord, 2° 20' 58\" ouest;   dont Guen grav-5 ,  Lourmes grav 1-2 et la Morlaye-grav- 3-4.","gps":"","images":["../../jctruffet.com/image/image_56/56_Missiriac_1.jpg","../../jctruffet.com/image/image_56/56_Missiriac_2.jpg","../../jctruffet.com/image/image_56/56_Missiriac_3.jpg","../../jctruffet.com/image/image_56/56_Missiriac_4.jpg","../../jctruffet.com/image/image_56/56_Missiriac_5.jpg"]},"Consult_chateau_formulaire01cb":{"id":"Consult_chateau_formulaire01cb","dept":"56","canton":"Guer","commune":"Monteneuf","nom":"Monteneuf","type":"Château","periode":"XVII-XIX","histoire":"GREE DE CALLAC Ce château, construit par Frédéric Jobbé-Duval pour le compte du Bot est lun des derniers grands châteaux construits au XIXe siècle. Ce château est un accessoire de style néo-renaissance, aux proportions grandioses, est construite en granit et recouvert d'ardoise. Jobbé-Duval, né dune célèbre famille de rennes peintres et décorateurs, a été inspiré par le château de dAncy-le-Franc et de la Moussaye en Plénée-Jugon. Il a également conçu les intérieurs et les meubles.Bien que le château lui-même a été construit dans la ville de Monteneuf, une grande partie du parc et les dépendances, y compris la chapelle, le musée de l'orangerie et le pavillon de chasse est situé dans la commune de Augan.À la fin des années 1980, le château a été brièvement loué par une société à un jeu vidéo dUbisoft, qui a été installé programmeurs.                                                                                      VOLTAIES à Monteneuf, au sud de Porcaro, le château de la Voltais du XVe siècle, modifié entre 1721 et 1737 par la famille Le Provost de La Voltais, propriétaire du château depuis 1721. La seigneurie a appartenu autrefois à la famille Robelot (Guillaume Robelot en 1480), Porcaro, Lauzanne et enfin Le Provost. Ce château conserve à l'arrière le souvenir d'un édifice plus ancien. La façade date du XVIIIe siècle.","architecture":"Le château de la Grée de Callac est un château construit à partir de 1892 à 1908, dans la ville de Monteneuf, le parc et les dépendances s'étendent sur la commune voisine de Augan.\r\nIl est l'objet dune inscription au titre des M.H. depuis le 20 décembre 1990.","habitants":"Grée; Famille de Jobbé-Duval                                                         Voltais; Famille Le Provost de La Voltais\r\n        \r\n        \"","divers":"Château de Grée de Callac grav 2-3 et Voltaies grav-1    et Voltais à Monteneuf                                                                          gps   47° 52' 25\" nord, 2° 12' 30\"  ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Monteneuf_1.jpg","../../jctruffet.com/image/image_56/56_Monteneuf_2.jpg","../../jctruffet.com/image/image_56/56_Monteneuf_3.jpg"]},"Consult_chateau_formulaire5d55":{"id":"Consult_chateau_formulaire5d55","dept":"56","canton":"Muzillac","commune":"Muzillac","nom":"Muzillac","type":"Château","periode":"XIII-XIV- XVI","histoire":"Trois châteaux dans cet article de Muzillac ; Kervezo, Pen-Mur et Séreac.                                                                                                                            KERVEZO,  est une ancienne seigneurie de la paroisse de Muzillac, sur laquelle on sait peu de choses. Il est fait mention de Jehan de Tréal en 1427. Jadis propriété de la famille Francheville, de la famille Hay des Nétumières, le lieu passe en 1850 à la famille d'Andigné, qui en est toujours possesseur et dont le représentant actuel habite le château. La demeure possède une façade principale construite au XVIIe siècle, mais conserve des parties plus anciennes à l'arrière de la demeure.                                                                                                                   SEREAC, appartenait en 1250 à la famille de Musullac ou Muzillac, qui la transmit à ses descendants. Par la suite, il appartint au duc de Bretagne, puis, au début du XVIe siècle aux Guemadeuc qui, par mariage, l'apportent, vers 1530, aux Le Vallois (qui le conserveront jusqu'à la Révolution). Il y avait là haute, moyenne et basse justice. Saccagé en 1795, le château a été très bien restauré depuis 1976, par M. Philippe van den Broek d'Obrenan, son propriétaire. Il est placé à l'angle d'un vaste terrain rectangulaire boisé, presque entièrement entouré de hauts murs. Une tour du XVe siècle est reliée au corps de logis principal et aux bâtiments voisins qui datent des XVIIe et XVIIIe siècle, et sont réalisés en petit appareil de granit. A proximité, une chapelle domestique est dédiée à Saint Yves et un beau pigeonnier comporte de nombreuses cases.","architecture":"PEN-MUR,  la seigneurie de Pen-Mur ou Prenmeur, fut le berceau de la famille homonyme qui y résidait au XIIIe siècle. C'était une forteresse qui avait succédé à un camp romain. Elle servit en 1363 de prison aux otages donnés par Charles de Blois à Jean de Montfort lors du traité d'Evran, pendant la guerre de Succession de Bretagne. Ce 1er château fut détruit par un incendie à une date indéterminée (avant 1425). En 1805 la place fut acquise par J .B. Burgault. Son fils Emile, entreprit à partir de 1858 la construction du château actuel. Les substructions de l'ancien bâtiment furent mises au jour et l'on découvrit divers objets de fer (mors, armes, serrures) ainsi que des pièces de monnaie et des boulets de pierre. De 1891 à 1980, l'édifice appartint aux barons Fabre. Depuis 1980 c'est la propriété de M. E. Renoul. Bâti sur une langue de terre qui s'avance au Sud dans l'étang de Pen-Mur, son environnement est très agréable.","habitants":"Kervezo ; famille Francheville                                                 Sereac ; famille de Guemandeuc                                                  Pen-mur;  J .B. Burgault\r\n        \"","divers":"A Muzillac gps 47° 33' 14\" nord, 2° 28' 50\" ouest; Kervezo-grav-1, Pen-Mur  grav-6-7 et Séreac-grav 2 à 5.","gps":"","images":["../../jctruffet.com/image/image_56/56_Muzillac_1.jpg","../../jctruffet.com/image/image_56/56_Muzillac_2.jpg","../../jctruffet.com/image/image_56/56_Muzillac_3.jpg","../../jctruffet.com/image/image_56/56_Muzillac_4.jpg","../../jctruffet.com/image/image_56/56_Muzillac_5.jpg","../../jctruffet.com/image/image_56/56_Muzillac_6.jpg","../../jctruffet.com/image/image_56/56_Muzillac_7.jpg"]},"Consult_chateau_formulairea780":{"id":"Consult_chateau_formulairea780","dept":"56","canton":"Ploërmel","commune":"Ménéac","nom":"Ménéac","type":"Château","periode":"XVII-XX","histoire":"Deux châteaux à Ménéac ; Bellouan et Riaye.                                   BELLOUAN, la seigneurie de Bellouan, avec moyenne justice, fut le berceau de la famille de ce nom. Elle a donné Olivier, croisé en 1248 puis Robert en 1350, Jean chevalier de l'Hermine en 1454 et Isabeau abbesse de la Joie en 1469. Bellouan passa ensuite aux Derval en 1648, aux Talhouët-Keravéon en 1703, aux Cintré en 1763 puis aux Apuril en1841. Le corps logis, de plan allongé, est couronné d'un toit à longs pans, percé de cinq lucarnes. La façade présente de larges fenêtres disposées irrégulièrement. La chapelle domestique était jadis dédiée à saint-Méen et aujourd'hui au Sacré-Cur. Elle a été bâtie en 1617 par Gabriel de Montbourcher, sieur de Trémereuc, fils du troisième mariage de Bonne de Bellouan. A la fin du XIXe siècle, elle était ouverte au service paroissial, on y disait la messe de temps en temps et on y allait en procession à la Saint-Marc et aux Rogations.","architecture":"RIAYE,  c'était le siège d'une importante seigneurie, propriété de la famille des Caler, et  des Bodégat de Mohon, des La Châtaigneraie, des Apuril, des Vollant, des Cervon et des Montesson. En 1732, elle fut acquise par Charles-Marje du Plessis-Mauron, Vicomte de Grénédan. Son héritier, Jean du Plessis, mourut en déportation en 1943, le domaine passa à son neveu, le comte Guy de L'Estourbeillon. Le château date, pour la partie centrale , tour octogonale et logis voisin, de la fin du XVe siècle. Un second pavillon a été ajouté au XVIIe siècle et un troisième au XIXe siècle, Les douves qui entouraient entièrement l'ensembie sont aujourd'hui en partie comblées. Quant à la chapelle Sainte-Anne toute proche, inscrite à l'inventaire des M.H., elle fut bâtie en 1504 par Karo de Botdegat.","habitants":"Bellouan:famille de Bellouan.                                                     Riaye; famille des Caler\r\n        \"","divers":"à Ménéac gps 48° 08' 25\" nord, 2° 27' 34\" ouest ; Bellouan grav 1-2-3 et Riaye Grav_4.","gps":"","images":["../../jctruffet.com/image/image_56/56_M%c3%a9n%c3%a9ac_1.jpg","../../jctruffet.com/image/image_56/56_M%c3%a9n%c3%a9ac_2.jpg","../../jctruffet.com/image/image_56/56_M%c3%a9n%c3%a9ac_3.jpg","../../jctruffet.com/image/image_56/56_M%c3%a9n%c3%a9ac_4.jpg"]},"Consult_chateau_formulaire4ac2":{"id":"Consult_chateau_formulaire4ac2","dept":"56","canton":"Ploërmel","commune":"Néant sur Yvel","nom":"Néant_sur_Yvel","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Néant sur Yvel; Bois de la Roche et Fresne.                                                                                    BOIS de la ROCHE, une première forteresse est bâtie à la fin du XVe siècle  pour Philippe de Montauban, chancelier de Bretagne  fait vicomte du Bois de la Roche par Anne de Bretagne. Occupé par les Ligueurs jusqu'en 1598, il subit de nombreux pillages. Les terres du Bois de la Roche sont érigées en comté en 1607 par Henri IV pour Henri de Volvire. Anne-Toussainte de Volvire, dite la « Sainte de Néant » y naît en 1653 et y meurt en 1694. Au XXe siècle, le château sert de protection à un camp de naturistes. En 2015, il est acheté par Nicolas Marceau, qui en entreprend la restauration. La forteresse médiévale affecte un plan en « V », que l'édifice actuel a perdu après destruction de l'aile sud-est. La forteresse médiévale était protégée par 9 tours et de profondes douves avec pont-levis au nord. De ces tours, n'en subsistent qu'une, une tour du châtelet. La deuxième tour, à l'ouest, est construite après la Révolution pour faire pendant à la tour subsistante. Le domaine s'étend sur 110 ha. Du château du XVe siècle ne demeure donc qu'un corps de logis, avec pavillons couverts en carène, et flanqués de deux tours cylindriques. Treize fenêtres s'ouvrent sur la façade. Transformé en un centre de vacances.","architecture":"FRESNE, en 1426, la seigneurie du Fresne-Daniel appartient à Olivier Jolivet, noble du Duc. Sa famille prend plus tard le nom du Fresne et se maintient sur les lieux jusqu'au XVIIe siècle. La seigneurie passe alors aux La Corbinière, puis au XVIIIe siècle à la famille La Haye du Cartier. Le domaine est vendu en 1752 à la veuve de Claude Martin, sieur du Buisson, et passe par alliance aux Pommereul, et de ceux-ci, en juin 1837, aux Moncuit par le mariage d'Anaïs de Pommereul et d'Hippolyte de Moncuit, qui en sont toujours propriétaires. Un premier château est cité en 1426 et 1459. Au début du XIXe siècle, les ailes sont supprimées, tandis que la partie centrale est surélevée. Le Dr Alphonse Guérin, inventeur du pansement ouaté, a vécu au Fresne de 1854 à 1895.","habitants":"Bois des roches  ;famille d'Henri de Volvire                             Fresne; famille La Haye du Cartier\r\n        \r\n        \"","divers":"à Néant sur Yvel gps 48° 00' 51\" nord, 2° 19' 40\" ouest; Bois de la Roche grav 1 à 6 et Fresne grav-7.","gps":"","images":["../../jctruffet.com/image/image_56/56_N%c3%a9ant_sur_Yvel_1.jpg","../../jctruffet.com/image/image_56/56_N%c3%a9ant_sur_Yvel_2.jpg","../../jctruffet.com/image/image_56/56_N%c3%a9ant_sur_Yvel_3.jpg","../../jctruffet.com/image/image_56/56_N%c3%a9ant_sur_Yvel_4.jpg","../../jctruffet.com/image/image_56/56_N%c3%a9ant_sur_Yvel_5.jpg","../../jctruffet.com/image/image_56/56_N%c3%a9ant_sur_Yvel_6.jpg","../../jctruffet.com/image/image_56/56_N%c3%a9ant_sur_Yvel_7.jpg"]},"Consult_chateau_formulaire6223-2":{"id":"Consult_chateau_formulaire6223-2","dept":"56","canton":"Pontivy","commune":"Saint-Barthélemy","nom":"Pen_Mané","type":"Château","periode":"XIX","histoire":"PEN-MANE,  Le château est édifié par une famille de gros propriétaires terriens à la fin du XIXe siècle, à l'emplacement d'un manoir qui figure sur le cadastre ancien de 1826. Ce dernier est mentionné dans les  réformations de la noblesse dès 1448 et en 1536 comme manoir de Louis Soudan. La remise et l'étable sont contemporaines du château. Un moulin à eau et un moulin à vent dépendaient du manoir. Le corps principal du château, de plan massé à étage, est couvert d'un toit à croupe.  Le château de Pen-Mané est édifié par une famille de gros propriétaires terriens à la fin du XIXe siècle, à l'emplacement d'un ancien manoir qui figure encore sur le cadastre ancien de 1826.","architecture":"PEN-MANE,  de la fin du XIXe siècle). L'ancien manoir appartenait autrefois à la famille La Fuglaie. Racheté par la famille Le Courrierec de Talnay vers 1850, le manoir est reconstruit vers 1885-1890 ;\r\nl'ancien manoir de Kerhuilic. Le château de Kerhuelic ou Kerhuilic était jadis une importante maison noble qui possédait un moulin et une chapelle privée aujourd'hui désaffectée , le corps principal du château, de plan massé à étage, est couvert d'un toit à croupe. Il est accosté de deux corps latéraux d'inégale importance, respectivement à un et deux étages, couverts d'un toit en pavillon. Une tourelle d'escalier en pierre de taille coiffée d'un toit conique est placée sur l'angle antérieur du corps principal, devant le corps latéral gauche. L'ensemble est construit sur un rez-de-chaussée surélevé auquel on accède par trois escaliers droits extérieurs situés en façade, en pignon et sur le mur postérieur. A l'exception de la tour, la façade sud est entièrement enduite tandis que la façade nord est en moellon. Remise et étable à chevaux sont construites en moellon de granite et couvertes d'un toit à longs pans et pignon couvert. La façade de la remise est en partie ouverte par des piliers en bois.","habitants":"Pen-Mané; de Louis Soudan\r\n        \r\n        \"","divers":"Château de Pen-Mané Saint-Barthélemy gps 47° 55' 36\" nord, 3° 02' 38\" ouest et manoir de Kerhuilic","gps":"","images":["../../jctruffet.com/image/image_56/56_Pen_Man%c3%a9_1.jpg","../../jctruffet.com/image/image_56/56_Pen_Man%c3%a9_2.jpg"]},"Consult_chateau_formulaire9674":{"id":"Consult_chateau_formulaire9674","dept":"56","canton":"Ploërmel","commune":"La Croix-Helléan","nom":"Penhoët","type":"Château","periode":"XV-XVIII","histoire":"PENHOËT,  En 1514, « la maison et métairie de Penhouët » appartient à Jacob Regnauld, quil tient de son père Jehan Regnaud, décédé en 1479 , et de son aïeul Jehan Regnaud. En 1632, Jean Régnault est sieur de Penhouët, marié à Sébastienne de Bréhaut. En 1682, leur fille Jeanne de Bréhaut épouse Joseph Hyacinthe. Le Pioufle en la chapelle de Penhoët. La seigneurie de Penhoët, parvenue en possession de la famille Le Guennec, vers 1678, passe aux Rolland du Noday en 1752 par le mariage de Cyrille-René Rolland du Noday avec Anne-Josèphe Le Guennec, dame de Trévran ; par ce mariage, les du Noday deviennent du même coup propriétaires des autres possessions des Le Guennec, à savoir la seigneurie de Trévran en Lanouée, Pengréal en Plumieux, la Ville Briand en La Croix-Helléan ; ils profitent de lagrandissement important du domaine de cette famille Le Guennec au cours des XVIIe et XVIIIe siècles.  En 1775, les du Noday acquièrent la seigneurie de Lescouet par cession de Françoise Levrault de la Motte et la revendent en 1826 à Joseph-Marie Le Monnier, docteur en chirurgie.","architecture":"PENHOET; château construit au XVIIIe siècle pour les Le Guennec. Agrandi au XIXe siècle pour les du Noday, et aménagement du parc également au XIXe siècle. La chapelle mentionnée en 1682 est détruite. Parties agricoles détruites lors de l'aménagement du parc. L'édifice se compose d'un étage carré et un étage de comble, gros oeuvre: schiste; moellon; granite et appareil mixte, élévations à travées surmontées de toit à longs pans ; toit en pavillon ; croupe ; noue ; toit conique, recouverts d'ardoise. Cette splendide demeure  à belles lucarnes, tour carrée à l'avant, tours carrée et ronde à l'arrière  est précédée d'une vaste prairie.","habitants":"Penhoet; famille de Guennec\r\n        \"","divers":"Château de Penhoët à la  Croix-Helléan gps 47° 57' 28\" nord, 2° 29' 59\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Penho%c3%abt_1.jpg","../../jctruffet.com/image/image_56/56_Penho%c3%abt_2.jpg","../../jctruffet.com/image/image_56/56_Penho%c3%abt_3.jpg"]},"Consult_chateau_formulairee6a2":{"id":"Consult_chateau_formulairee6a2","dept":"56","canton":"Quiberon","commune":"Saint-Pierre de Quiberon","nom":"Penthiève_Fort","type":"Fort","periode":"XVIII","histoire":"Fort-PENTHIEVE Le
