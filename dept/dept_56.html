dance des Sivry Alice de Prerrien de Crenan épouse en premières noces  du baron Jean de Secondat de Montesquieu qui trouva la mort à la grande guerre. Le château toujours dans la descendance second mariage de l'héritière de Trécesson avec le comte Antoine de Prunelé.                                                                                                        VILLE-AUBERT, adopte un plan en H, l'un des pavillons latéraux étant prolongé par une aile dotée d'un passage vers la cour des communs situés à proximité. Le corps de logis rectangulaire est encadré de deux pavillons saillants, avec une tour d'escalier semi hors uvre dans l'angle de la façade sur cour, et de l'autre côté, un corps d'entrée en légère saillie. Le bâtiment comprend un rez-de-chaussée surélevé sur un niveau de sous-sol, un étage carré et un étage de comble.","habitants":"Quejeau, famille de Tuault                                                           Touche-Larcher, Famille de Larcher.                                     Ville-Aubert; famille Dubourg.                                                   Trécesson; famille de Trécesson.                            \r\n        \"","divers":"Campénéac   gps 47° 57' 30\" nord, 2° 17' 36\" ouest ;       Quejeau grav 5-6, Touche-Larcher grav-6, Trécesson grav-1 à 4 et Ville Aubert grav -7","gps":"","images":["../../jctruffet.com/image/image_56/56_Camp%c3%a9n%c3%a9ac_1.jpg","../../jctruffet.com/image/image_56/56_Camp%c3%a9n%c3%a9ac_2.jpg","../../jctruffet.com/image/image_56/56_Camp%c3%a9n%c3%a9ac_3.jpg","../../jctruffet.com/image/image_56/56_Camp%c3%a9n%c3%a9ac_4.jpg","../../jctruffet.com/image/image_56/56_Camp%c3%a9n%c3%a9ac_5.jpg","../../jctruffet.com/image/image_56/56_Camp%c3%a9n%c3%a9ac_6.jpg","../../jctruffet.com/image/image_56/56_Camp%c3%a9n%c3%a9ac_7.jpg"]},"Consult_chateau_formulairec029":{"id":"Consult_chateau_formulairec029","dept":"56","canton":"Guer","commune":"Carentoir","nom":"Carentoir","type":"Château","periode":"XV-XIX-XX","histoire":"Cinq châteaux à Carentoir; Bourdonnais, la Guichardais, la Herblinaye, Mur, le Trélo.                                                                                                                                       GUICHARDAIS, a été occupée par trois édifices successifs, le dernier ayant été construit entre 1847 et 1850; le bâtiment appartient à la famille de Careil depuis le XVIe siècle, dont plusieurs représentants furent maires de la commune aux XIXe et XXe siècles. , seigneur du Bouexic, obtint l'érection des seigneuries de La Bouexière, La Gacilly et Couëtion en marquisat, sous le nom de La Bourdonnaye. Edifice de plan allongé composé d'un corps central encadré de deux ailes symétriques. Elévation en maçonnerie enduite avec encadrements de baies, chaînes d'angle et corniche en pierre de taille, de Plan : plan régulier  élévation à travées  un étage carré,  escalier dans-oeuvre : escalier en vis avec jour,  gros-oeuvre : schiste ; grès ; calcaire ; moellon ; enduit: toit à longs pans ; croupe ; toit en pavillon  couverture en ardoise.       BOURDONNAYE, Bourdonnaye ou Bouexières  du XVe siècle. Il y avait au XVIe siècle deux manoirs du nom de La Bouexière dans la paroisse de Carentoir. En 1536, La Basse-Bouexière appartenait au sire de Rohan, seigneur de La Gacilly. A la même époque, Jean de La Bourdonnaye possédait la Haute-Bouexière. En 1698, Gilles du Houx, seigneur de La Gacilly, et Marie de Porcaro, sa femme, habitaient le manoir de La Bouexière. Ce seigneur y mourut en 1707. Peu après, en 1717, Yves Marie de La Bourdonnaye L'ancienne seigneurie était la propriété successive des familles Bouexière, Rohan, Houx, La Bourdonnaye (en 1714). Elle possédait autrefois un droit de haute, moyenne et basse justice et elle est érigée en marquisat en 1717. Depuis cette époque, la famille de La Bourdonnaye de Blossac continue de posséder ce château. Le château a été reconstruit à la fin du XIXe siècle et conserve quatre tourelles du XV-XVIe siècle.","architecture":"HERBLINAYE, la seigneurie de Herblinaye avait jadis moyenne et basse justice et appartenait successivement à la famille Lhostelier au XIVe siècle, Bobitel, Bégasson, et Danet au XVIIIe siècle. Au logis du XVIIe siècle, est ajouté une tour d'escalier à vis. Cette maison noble appartenait en 1536 aux enfants de feu Pierre des Robitel. Guillaume Robitel marié à Françoise Le Berruyer, eut une fille Julienne Robitel mariée à Jean V, seigneur de Bégasson. Celui-ci, par son mariage devint seigneur de la Herblinaye et fut père de Jean VI, seigneur de Bégasson, et de Magdeleine de Bégasson. Au XVIIIe siècle, le château passa à la famille Danet qui le possédait en 1778. A la fin du XIXe siècle, la demeure appartenait à la famille de Behr. Le petit château du lieu appartient de nos jours à M. Jean Andran. La Herblinaye se trouve à 2,5 km à l'Ouest de Carentoir, et on y accède par la petite route qui mène à Clazeul.                                                                                    MUR du XX siècle. Siège d'une ancienne seigneurie ayant appartenu à la famille Le Mur en 1481 et en 1707. Le manoir possédait autrefois une chapelle privée. Pierre du Mur, vivant en 1481, épousa Guillemette de Trévaly. En 1707, vivait Bernard du Mur, seigneur dudit lieu. A la fin du XIXe siècle, le domaine est la propriété de la famille Anger de Kernisan                                                                                                                                      TRELO,  appartenait jadis à la famille Pucy, aux La Motte, puis aux Fournier. Au XVIIIe siècle, Ogée nomme le propriétaire seulement M. de Trélo et indique qu'il possède là haute, moyenne et basse justice, ainsi qu'une chapelle domestique. Au début du XXe siècle la demeure appartenait au Marquis de Bruc, la propriété est maintenant à M. le général Max Thoux.","habitants":"Guichardais, famille de Careil                                      Bourdonnaye; famille Bouexière                           Herbilinaye;  famille de Robitel                                                  Mur; famille Le Mur                                                                     Trelo; Famillez de Trélo\r\n        \r\n        \"","divers":"à Carentoir;grav-1                                                                          Gps 47° 49' 03\" nord, 2° 07' 59\" ouest                                                   Bourdonnaye grav  2-3, la Guichardais grav-4-5-, la Herblinaye grav-7,                                                               Mur grav-6, le Trélo grav_7.","gps":"","images":["../../jctruffet.com/image/image_56/56_Carentoir_1.jpg","../../jctruffet.com/image/image_56/56_Carentoir_2.jpg","../../jctruffet.com/image/image_56/56_Carentoir_3.jpg","../../jctruffet.com/image/image_56/56_Carentoir_4.jpg","../../jctruffet.com/image/image_56/56_Carentoir_5.jpg","../../jctruffet.com/image/image_56/56_Carentoir_6.jpg","../../jctruffet.com/image/image_56/56_Carentoir_7.jpg"]},"Consult_chateau_formulaire7bba":{"id":"Consult_chateau_formulaire7bba","dept":"56","canton":"","commune":"Carnac","nom":"Carnac","type":"Château","periode":"XVII-XIX","histoire":"quatre châteaux à Carnac; Crocalan, Kercado, Kermalvezin et Kervihan.                                                                                                             CROCALAN, siège d'une seigneurie,  construit en 1865 par la famille Martin, originaire d'Auray. C'est un bel édifice flanqué d'une tour ronde à l'arrière, situé en bordure de la rive droite de la rivière de Crach. La chapelle domestique date de la fin du XIXe siècle. A proximité se trouvent quelques vestiges de l'ancien château seigneurial : la porterie en partie détruite, la tourelle cylindrique de défense et les très beaux communs habités. Madame Martin d'Auray conserve au château un superbe dallage mosaïque provenant de cette demeure précédente. Le château et l'ancien manoir demeurent invisibles, même extérieurement.                                                                             KERCADO, le lieu était le siège d'une seigneurie dont les titulaires étaient les Herman en 1630, suivis des Le Mézec alliés aux Wolbock. Le domaine est acheté en 1865 par le baron de Wolbock. Le vicomte de Perrien de Crenan l'acheta en 1890, il est resté depuis dans cette famille. Il est maintenant passé par mariage à la famille de Chavagnac. On accède au château par une belle allée. L'ensemble est clos de murs. Une porterie fortifiée portant les armes de Le Mézec et en-dessous des Wolbock, mène à la cour d'honneur où se trouve un vieux puits. Une tour carrée est adossée à l'arrière de cette belle demeure. La chapelle, actuellement désaffectée, se trouve à droite de l'entrée. Si l'on ne peut admirer la façade du château, on peut depuis la porte monumentale, en voir l'arrière, ainsi que la chapelle et les communs. Les communs sont le point de départ pour la visite du superbe tumulus de Kercado. Le tumulus de Kercado est un mégalithes très ancien, le plus complet et le mieux conservé de la région de Carnac.","architecture":"KERMALVEZIN, le lieu était le siège d'une seigneurie appelée Kermalhuezen au XVIe siècle. Mais la terre est citée dès 1444 comme appartenant alors à Guillaume de Mauguen. Par alliance elle passe ensuite à la famille Le Couriault puis au XVIIIe siècle le lieu est aux Le Boutoullic. Il est acquis en 1868 par le fils de la comtesse de Ségur, vers 1883, par M. Charles Langlais, magistrat. Il revient ensuite, par mariage, à la famille Babron. Enfin, depuis 1949 il est propriété de la famille Pastré. Le château, avec ses lucarnes sculptées, a été construit vers 1570, ainsi que sa chapelle. C'est actuellement la demeure privée d'un propriétaire qui y gère une exploitation agricole.                                                          KERVIHAN, édifié dans le beau site de la rive gauche de la rivière de Crach reste totalement invisible, ainsi que sa chapelle  blottis tous deux au milieu d'un vaste espace boisé. Cette chapelle privée de style néo-gothique, remplace une chapelle détruite durant la Révolution ou du moins très endommagée. Au XIXe siècle le château appartenait à la famille Guyot d'Asnières de Salins, Christophe Marie Auguste Guyot, conseiller général du Morbihan pour le canton d'Auray, y décéda le 9 avril 1906.","habitants":"Crocalan;   famille Martin,                                                                   Kercado;  Baron de Wolbock  famille de Chavagnac                                                 Kermalvevin; famille Le Couriault                                 Kervihan; famille Guyot \r\n        \"","divers":"à Carnac;  gps    47° 35' 05\" nord, 3° 04' 46\" ouest                                      Crocalan grav-1, Kercado grav-2-3, Kermalvezin grav-4 et Kervihan  grav-5.                                                                              Gps  47° 37' 13\" nord, 3° 02' 15\" ouest                                     Kercado gps  47° 35' 47\" nord, 3° 03' 08\" ouest                               Kermalvezin 47° 37' 23\" nord, 3° 05' 37\" ouest                      Kervihan  47° 38' 02\" nord, 3° 02' 21\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Carnac_1.jpg","../../jctruffet.com/image/image_56/56_Carnac_2.jpg","../../jctruffet.com/image/image_56/56_Carnac_3.jpg","../../jctruffet.com/image/image_56/56_Carnac_4.jpg","../../jctruffet.com/image/image_56/56_Carnac_5.jpg"]},"Consult_chateau_formulaire356d":{"id":"Consult_chateau_formulaire356d","dept":"56","canton":"Moréac","commune":"Caro","nom":"Caro_Clyo","type":"Château","periode":"XVIe-XIXe","histoire":"Quatre châteaux à Caro, Clyo, Guyondais, et Lobo.                                                      CLYO, la seigneurie du Cleyo se divisait en deux parties. Le Bas Cleyo appartenait aux Levesque de 1400 à 1560, puis aux Boisguéhenneuc qui la réunirent au Haut Cleyo. Le Haut Cleyo était aux Castellan qui la portèrent, par alliance en 1370, aux Boisguéhenneuc. Le château qui fut bâti à partir de 1560, avait sa chapelle domestique. Il passa aux La Monneraye en 1760 (ceux-ci firent agrandir la demeure en 1860), puis aux L'Espinay de Pancy en 1904 et enfin à la famille Ruel en 1977.                                                                                                 GUYONDAIS, autrefois la Guyardaye en 1438 ou la Quyondaye ou encore la Guiaudais. Anciennement propriété de la famille Levesque, le lieu se transmit par alliances successives aux Jouchet en 1495, aux Lézenet en 1560, aux Rio en 1580, aux Jano en 1595, aux Mezières en 1602, aux Guihard en 1626, aux du Bois de Beauregard en 1739 qui y demeurèrent jusqu'à la Révolution. La propriété appartient actuellement à M. d'Aviau de Ternay.","architecture":"CLEYO, la partie gauche du château du Cleyo manifeste, dès la deuxième moitié du XVIe siècle, une recherche de symétrie, alors précoce en milieu rural de même que la situation des cuisines en sous-sol. L'ancienne entrée, dans l'axe, murée, est encore bien visible. La tourelle d'angle en surplomb, décorative et symbolique, avait son pendant à droite avant que le XIXe siècle n'apporte dissymétrie et variété des volumes.                                                                                                                                 LOBO, cette très ancienne seigneurie du Loho ou Lobeau appartenait à la famille Dainches en 1427, aux Vivien en 1513, aux Canno en 1540. Par alliances le château du Lobo échut aux Buisnart en 1589, puis aux Cazdre en 1635, aux Jouasneaux en 1720. Au XIXe siècle, le château était aux Moisan de La Touche, puis aux Montfort. De nos jours la propriété appartient au comte Antoine Drouet d'Aubigny;  élévation à travées\r\n un étage carré ; deux étages carrés ; étage de comble, gros-oeuvre : schiste ; moellon ; toit à longs pans ; croupe ; pignon couvert ; toit en pavillon couvert en  ardoise.","habitants":"Clyo; Famillle  L'Espinay de Pancy                              Guyondais; famille de  Bois de Beauregard                                       Lobo, Moisan de La Touche\r\n        \"","divers":"à Caro grav-1 gps                                47° 51' 53\" nord, 2° 19' 05\" ouest, Clyo_2-3-4, Guyondais_Grav_5, et Lobo grav 6.","gps":"","images":["../../jctruffet.com/image/image_56/56_Caro_Clyo_1.jpg","../../jctruffet.com/image/image_56/56_Caro_Clyo_2.jpg","../../jctruffet.com/image/image_56/56_Caro_Clyo_3.jpg","../../jctruffet.com/image/image_56/56_Caro_Clyo_4.jpg","../../jctruffet.com/image/image_56/56_Caro_Clyo_5.jpg","../../jctruffet.com/image/image_56/56_Caro_Clyo_6.jpg"]},"Consult_chateau_formulaire3abd":{"id":"Consult_chateau_formulaire3abd","dept":"56","canton":"Guer","commune":"Saint-Martin-sur-Oust","nom":"Castellan","type":"Château","periode":"XV-XVIIe-XIXe","histoire":"CASTELLAN, les terres appartenaient à la famille Castellan depuis 1375. Propriété de Pierre Castellan en 1427, de Jehan Castellan en 1464 et de Jacques Castellan en 1536, la seigneurie avait un droit de haute, moyenne et basse justice.  Transformé en hôtel restaurant par monsieur Case.                                                                                                                   VILLE CHAUVE  aux Fougerets, laa Ville Chauve était une seigneurie qui appartenait aux Huchet, puis aux Freslon (qui possèdent toujours le château). L'édifice ancien a été agrandi et doublé par un corps de bâtiment longitudinal de style régionaliste. Le style de la construction permet de proposer une attribution à l'architecte Frédéric Jobbé-Duval. Le château, de plan régulier, se compose d'un étage carré, élévation à travées, surmontée d'un toit à long pans, couvert en ardoise.","architecture":"CASTELLAN, édifié à la fin du XVIIe et du début du XVIIIe siècle, de plan rectangulaire, est flanquée de deux pavillons aux extrémités. Il est composé d'un rez-de-chaussée surélevé, un étage et des combles. Les seuls éléments décorés sont les lucarnes des combles. Un bâtiment de communs accompagne le château. Il est couronné par une corniche à modillon et par une toiture avec une couverture à coyaux. Éléments protégés MH : les façades et les toitures du château, la chambre à alcôve avec son décor, les façades et les toitures des communs : inscription par arrêté du 6 juin 1980.                                                                                                         VILLE-JANVIER, à Cournon cinq kilomètres à l'est.  Siège d'une ancienne seigneurie, le site de la Ville Janvier a vu se succéder plusieurs édifices depuis le XVe siècle. Le manoir du XVIIe siècle est restauré et agrandi pour M. Joseph de Gouyon, d'abord sous la direction de l'architecte rennais Arthur Regnault qui réalise des études et des travaux intérieurs de 1888 à 1890, puis à partir de 1895, par l'architecte angevin Auguste Beignet. Ce dernier restaure des parties existantes et procède à l'agrandissement du corps de bâtiment et construit les communs et les parties agricoles. L'agrandissement du bâtiment d'origine consiste en la construction d'une aile vers le nord, d'une tour d'escalier à l'ouest, d'un pavillon au sud-est et d'un jardin d'hiver surmonté d'une galerie couverte éclairée par des vitraux à l'est. Un nouvel escalier est construit dans la tour ronde et un escalier de service dans l'aile nord. L'ancienne cage, fermée, est aménagée en débarras. Le décor remploie des lambris des XVIIe et XVIIIe siècles. La chapelle ancienne subsiste au sud-ouest.","habitants":"Castellan; famille Castellan                                                            Ville-Chauve ;Famille de Huchet,                                                      Ville Janvier; Famille de M. Joseph de Gouyon\r\n        \r\n        \"","divers":"A Saint-Martin-sur-Oust gps 47° 44' 48\" nord, 2° 15' 09\" ouest                             le château de Castellan grav 1-2-3 et Ville-Chauve grav 7-8 aux Fougerets   Ville-Janvier grav -4-5-6","gps":"","images":["../../jctruffet.com/image/image_56/56_Castellan_1.jpg","../../jctruffet.com/image/image_56/56_Castellan_2.jpg","../../jctruffet.com/image/image_56/56_Castellan_3.jpg","../../jctruffet.com/image/image_56/56_Castellan_4.jpg","../../jctruffet.com/image/image_56/56_Castellan_5.jpg","../../jctruffet.com/image/image_56/56_Castellan_6.jpg","../../jctruffet.com/image/image_56/56_Castellan_7.jpg","../../jctruffet.com/image/image_56/56_Castellan_8.jpg"]},"Consult_chateau_formulaire1727":{"id":"Consult_chateau_formulaire1727","dept":"56","canton":"Lanester","commune":"Caudan","nom":"Caudan","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Caudan; Bois-Joly, Kerdronquis et Kelhouet.                                                                                            BOIS-JOLY,  le château du Bois Joly est construit sur le site d'un manoir éponyme. Ce dernier était à Guillaume de Baud en 1420. De 1598 à 1790, il est aux Carmes (qui l'ont obtenu sous forme de legs). Vendu nationalement à la Révolution, il est acquis en 1790 par la famille Le Beau de Trésidy dont le descendant, François, le lègue à sa fille naturelle,  Françoise Bonnamy. Celle-ci abandonne l'ancien manoir qui portera désormais le nom de \"Vieux Bois Joly\",  pour faire construire un château neuf. Sa construction est entreprise en 1852, selon les plans de l'architecte, agent Voyer d'Hennebont, Hallouis. Des modifications sont intervenues par rapport au plan d'origine, au niveau des toitures : le belvédère avec horloge au centre du toit a disparu ou n'a pas été réalisé, sur l'élévation antérieure, les lucarnes latérales sont devenues cheminées avec niche. La grille du parc en fer forgé est dessinée par Hallouis le 8 octobre 1853. Le mausolée, érigé en 1873 au cimetière de Carnel à Lorient, est ensuite transféré à Bois Joly le 15 mars 1882. Il porte sur trois de ses faces les initiales F. B. (pour Françoise Bonamy). Le château est construit en pierre de taille de tufeau, avec soubassement de granite. Il est couvert d'un toit à longs pans brisés en ardoise. L'élévation principale est ordonnancée, à faux avant-corps central et latéraux tandis que l'élévation postérieure présente un avant-corps central à pans coupés et avant-corps latéraux sans étage à toit terrasse. L'escalier principal est axial situé dans un corps polygonal en hors-oeuvre, en charpente à rampe métallique.","architecture":"KERDRONQUIS, la seigneurie est la propriété de la famille Coerhin (Kercoerhin ou Courhin) en 1420 ; elle est représentée par Charles de Courhin en 1448. Ses armes sont \"d'or à l'aigle éployée de sable, becquée et membrée d'azur\". En 1536 le propriétaire du lieu est Pierre du Combout. Le château actuel a été construit au XVIIIe siècle à l'emplacement du manoir attesté en 1420. Il appartenait aux Gaillard de La Touche et servait de pavillon de chasse à la compagnie des Indes.                                                                                                               BOIS-JOLY   la métairie du château est construite en moellon enduit, à un étage carré, élévation à travées, et toit à pignon couvert. Le puits en moellon possède une superstructure en fer forgé. Le mausolée est en marbre de Carrare  encadré de deux chimères. Une frise de rinceaux court le long de l'entablement. En dessous, le balcon est supporté par deux caryatides engainées dans une feuille d'acanthe. Les pilastres cannelés de l'élévation sud sont ornés de chapiteaux composites.\r\nNELHOUET, il n'y avait pas de seigneurie au Nelhouët  aujourd'hui entièrement restaurée est également nommée chapelle Notre Dame de Vérité, elle est associée à la fontaine de Kerblaye. Le château, édifié en 1769, fut la demeure du général Pontivyen, baron de l'Empire, François Faverot de Kerbrech (1773-1853) à partir de 1831. Son père, avocat au Parlement, fut maire de Pontivy en 1793. Au XXe siècle, la propriété appartint à M. Petit Détroyat avant d'être acquise, vers 1955, par le Dr Branthomme. Le parc est clos de murs mais le Nelhouët est visible de la route.","habitants":"Bois-Joly:  la famille Le Beau de Trésidy               Kerdronquis;  la famille Coerhin,                                                   Nelhouet; famille de  François Faverot de Kerbrech \r\n        \"","divers":"A Caudan gps  47° 48' 41\" nord, 3° 20' 21\" ouest                                               ; Bois-Joly  grav -1            gps 47° 48' 32\" nord, 3° 18' 28\" ouest, Kerdronquis et Nelhouet grav 2.","gps":"","images":["../../jctruffet.com/image/image_56/56_Caudan_1.jpg","../../jctruffet.com/image/image_56/56_Caudan_2.jpg"]},"Consult_chateau_formulaireab55":{"id":"Consult_chateau_formulaireab55","dept":"56","canton":"Moréac","commune":"La Chapelle Caro","nom":"Chapelle_Caro","type":"Château","periode":"XV-XVI-XVIII","histoire":"Deux châteaux à la Chapelle Caro; Bignon et Crevy .                                CREVY, propriété successive des familles Bonabes (vers 1149), Derval, Rougé (au XIVe siècle), Châteaugiron, alias de Malestroit (au XVe siècle), Chastel, Montejean, Tournemine, Quelenec (en 1563), Rogier (en 1602), Descartes (en 1644), Brilhac (en 1741), Humbert, Brilhac (en 1809), Poulpiquet du Halgouët (en 1812), Breil de Pontbriand de La Caunelaye (en 1816). La seigneurie est érigée en comté, en 1697, au profit de François Rogier. Le château est au cur du conflit (durant les guerres de religion) qui oppose la famille Malestroit qui est catholique à la famille de Rohan de Josselin qui est protestante. Le duc de Mercur y avait garnison ; le parti du roi tenta vainement de s'en emparer. L'ensemble, restauré en 1966 par Monique Dunan (déjà créatrice de costumes pour Sacha Guitry, Marcel Carné, Jean Renoir, Claude Autant-Lara, et pour la série télévisée (version 1972) Les Rois maudits), a abrité un musée du Costume, disparu à la suite du décès des propriétaires,  ce château à appartenu aux Brilhac à la veille de la Révolution, vendu comme bien national puis racheté par les Brilhac. sert aujourd'hui de musée du costume.","architecture":"BIGNON,  le manoir de Bignon XVe et XVIe siècles. On y trouve un pigeonnier. Le plus ancien bâtiment date du XVe siècle et le second bâtiment date du XVIe siècle. Le revers de ce dernier est percé de larges baies et d'une porte en plein cintre. Le second logis, plus haut et plus orné, du commencement du XVIe siècle, présente un appareillage de schiste d'une grande qualité dexécution ; le granite à grain serré utilisé ici pour les baies a permis une sculpture en haut relief impossible dans le schiste. La pièce haute au sommet de la tour est desservie par un escalier secondaire escamoté dans un prolongement du pignon.                                                                                                                        CREVY  Il s'agit d'un ancien oppidum romain.  Le château a été très remanié au XVIIIe siècle par la famille de Brilhac et en 1855 par l'architecte Jacques Mellet (ajout d'un corps de logis à l'Ouest, encadré de deux tours).   Le corps principal date du XVIIe siècle. Il s'appuie à l'est sur une grosse tour du XIVe siècle et un escalier à la française en granit accompagné de quelques constructions annexes. La partie ouest comprenant deux tourelles et une entrée a été refaite au XIXe siècle sous Charles X, dans le style gothique. Les deux façades du XVIIe siècle sont inscrites au titre des M.H. en 1925,  La tour d'angle sud-est étant, quant à elle, inscrite en 1970.","habitants":"Crevy; famille Malestroit                                \r\n        \"","divers":"à la Chapelle Caro; Bignon grav-4 et Crevy grav 1-2-3.                                                    gps 47° 52' 18\" N, 2° 25' 31\" Ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Chapelle_Caro_1.jpg","../../jctruffet.com/image/image_56/56_Chapelle_Caro_2.jpg","../../jctruffet.com/image/image_56/56_Chapelle_Caro_3.jpg","../../jctruffet.com/image/image_56/56_Chapelle_Caro_4.jpg"]},"Consult_chateau_formulairefb35":{"id":"Consult_chateau_formulairefb35","dept":"56","canton":"Vannes","commune":"La Chapelle Gaceline","nom":"Chapelle_Gaceline","type":"Château","periode":"XIX","histoire":"Cinq châteaux  à la Chapelle-Gaceline; Glenac, Boschet, Foret-Neuve  et Sourdeac.                                                                                                    BOSCHET, jadis siège d'une seigneurie importante, avec haute justice, appartenant à la famille du Bouschet du XIVe au XVIIe siècle, puis en 1758 à Jean de Talhoët, seigneur de la Ville-Quéno. La chapelle privée du manoir, dédiée à Saint-Joseph, subsiste, ainsi qu'une grosse tour isolée plus ancienne que le Château. Le Boschet fut la propriété de M. Ganzin et depuis 1996 il appartient à Madame Praud Bernadette.                                                                                                FORET-NEUVE, en 1427 : « Le manoir et l'hébergement de la Forest-Neuve appartenant au sire Rieux auquel il y a métairie ancienne et exempte ». En 1448, « l'hébergement de la Forest Neuve appartenant au sire de Rieux, ses  métayers Denis Orain et Jehan Guiot ». En 1514, « la Forest neuve au sieur de Rieux. » En 1666 : « Le château Neuve et la forêt en dépendant avec le fief. »Le château de la Forêt Neuve est implanté sur une colline dominant les marais de Glénac. Édifié à la fin du XVe siècle par le maréchal de Rieux comme château de chasse, il reçut la visite de la famille royale au XVIe siècle (le roi Charles IX, Catherine de Médicis...). Incendié à la Révolution, l'édifice est ruiné en 1790 ; il est racheté en 1819 par MM. Bellamy et Dumoustier, puis en 1825 par le comte Auguste de Foucher de Careil. Celui-ci le reconstruit en 1826 en remployant des éléments de l'édifice détruit. Cette famille reste propriétaire jusqu'en 1947. La propriété est aujourd'hui celle de M. Yves Rocher, industriel à La Gacilly.","architecture":"SOURDEAC, le corps de logis et la chapelle ont été démolis ou remaniés. Il ne reste d'intéressant que la tourelle d'escalier. Elle est en saillie sur la façade principale et en occupe à peu près le centre. Escalier à vis, marches en pierre, extérieur sur plan polygonal. Trois fenêtres à meneaux s'ouvrent à mi-étages. A l'intérieur se trouvent quatre cheminées du XVIe siècle, construites en matériaux divers.  C'était le siège de la principale seigneurie de la paroisse, qui avait haute justice. Elle appartint au XIVe siècle aux Soual, puis aux La Motte, aux Perrier, et aux La Feuillée par alliances successives. Dès le XIVe siècle un manoir existait à Sourdéac. La terre fut acquise, en 1531, par Jean de Rieux, troisième fils du maréchal de Bretagne, qui y édifia le château actuel vers 1550. Sa terre est érigée en marquisat en 1597. deux chambres d'hôtes et gîte rural                                                           FORET-NEUVE, édifice de plan en L comprenant un rez-de-chaussée sur caves, un étage carré et un étage de comble. Le gros uvre est en moellon de schiste rouge sans chaîne en pierre de taille ; les encadrements de baies, les meneaux et la corniche sont en pierre de taille de calcaire, les lucarnes surmontées de gâble et de pinacles, ainsi que la balustrade couronnant les trois travées centrales de la façade principale sont en pierre de taille de granite. Toit à longs pans et croupe en ardoise.                                                                                                                       GLENAC, la châtellenie de La Gacilly sera du Xe au XVe siècle la propriété de grandes familles seigneuriales bretonnes. En 1465 elle appartient à Françoise dAmboise épouse de Pierre II, duc de Bretagne. À la veille de la révolution elle est un fief du marquisat de la Bourdonnaye. Lors de la révolution la commune est investie plusieurs fois par les Chouans.","habitants":"Boschet, famille du Bouschet                                                            Foret-Neuve; maréchal de Rieux                                Sourdéac; Famille de Jean de Rieux                                    Glenac; Françoise dAmboise\r\n        \r\n        \"","divers":"à la Chapelle-Gaceline; Boschet grav -1-2, Foret-Neuve grav 6  et Sourdeac grav-3-4-5.                                                                              gps 47° 47' 03 nord, 2° 06' 19\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Chapelle_Gaceline_1.jpg","../../jctruffet.com/image/image_56/56_Chapelle_Gaceline_2.jpg","../../jctruffet.com/image/image_56/56_Chapelle_Gaceline_3.jpg","../../jctruffet.com/image/image_56/56_Chapelle_Gaceline_4.jpg","../../jctruffet.com/image/image_56/56_Chapelle_Gaceline_5.jpg","../../jctruffet.com/image/image_56/56_Chapelle_Gaceline_6.jpg"]},"Consult_chateau_formulaire42bb":{"id":"Consult_chateau_formulaire42bb","dept":"56","canton":"Guer","commune":"Coëtquidan","nom":"Coetquidan","type":"Château","periode":"XIX","histoire":"Grée de Callac à Monteneuf  et Bois du loup à Coetquidan   et Grée de Callac à Monteneuf                                                                                                                                                                                    BOIS DU LOUP, vestiges. Lors de la réformation de 1440 à 1536. du domaine royal de Ploërmel en 1679, Le 1er château fut édifié en 1686, avec les matériaux de celui de lEscoublière, par Jean-François Larcher, seigneur du Bois du Loup,  furent propriétaires du domaine de 1660 à 1732. Son père, Jean Larcher, seigneur de lEscoublière avait épousé en 1632 Madeleine Riou, demoiselle du Bois du Loup, et eurent 12 enfants, il devint propriétaire de tout le domaine en 1660. Le deuxième château a été construit de 1871 à 1874 par le propriétaire des lieux, le comte Roland des Clos de la Fonchais. Son père Adolphe des Clos de la Fonchais, capitaine au 21e régiment de ligne, dont la famille originaire de Bavière sétait établie en Bretagne au XVIe siècle, avait acheté le domaine du Bois du Loup, en 1805. En 1880, pour la création du champ de tir dartillerie, Suite à cette première expropriation, le domaine a subi une forte dépréciation. En 1898 par acte de donation de sa mère, monsieur Raymond de la Fonchais en devient propriétaire. Cest lui qui conduira les négociations, mais sa mère en gardera lusufruit. Une décision ministérielle du 16 avril 1910 ordonne la vente des terres, du château, de la chapelle, des dépendances et différents matériaux entrant dans sa construction sont mis également en vente, trouveront preneur, mais pas le gros uvre. Occupé par lautorité militaire de juin 1911 à juin 1940 soit pendant 29 ans, le bâtiment a été régulièrement entretenu. Il accueillait pendant les grandes manuvres, les généraux commandants les divisions et leurs état-majors. De 1935 à 1938, il sert de cantonnement à la compagnie daérostiers de Toulouse. Puis aux Espagnols et aux Polonais jusquà loccupation allemande. Ils le laissèrent tous en bon état. Il fut détruit par les américains lors de leur séjour au camp de Coëtquidan, il servit de cible pour leurs exercices de tir. Les pierres en granit ont servi à renforcer la digue de létang de la Prée-neuve.","architecture":"PORCARO  du XIIIe et XIXe siècles), propriété de la famille Porcaro (en 1280 et au XVe siècle, Jehan Porcaro en 1480), puis de la famille Guiny (en 1628), de la famille Sagazan (en 1772), du vicomte Victor de La Haye de Plouër (en 1836), de la famille Mesnard de Chousy, puis Tyrac de Marcellus. Il s'agit en fait d'un ancien manoir reconstruit en 1875. L'édifice rectangulaire actuel est constitué d'une grosse aile carrée à gauche et d'une tourelle d'angle à droite. La famille de Porcaro s'appelait à l'origine La Porte de Caro. La seigneurie avait primitivement un droit de moyenne et basse justice, puis à partir de 1628, un droit de haute justice.Le château a été restauré en 1870 ;                                                                                              GREE de CALLAC à Augan , construit pour le comte du Bot de 1892 à 1908, le château est un des derniers grands châteaux reconstruits au XIXe siècle, oeuvre de l'architecte Frédéric Jobbé Duval, frère d'un peintre parisien de renom et membre d'une famille de peintres décorateurs actifs à Rennes depuis le milieu du XIXe siècle. Bel exemple de réalisation grandiose (parti général, matériaux, décor) en style néo-Renaissance, le château est parfaitement adapté à une vie sociale fondée sur l'apparat.  L'architecture du château s'inspire du château d'Ancy le Franc et également du château de La Moussaye .                                                                                                                TOUCHES à Porcaro  du XIVe siècle. La seigneurie possédai jadis un droit de moyenne et basse justice. Propriété successive des familles Du Pont (au début du XIVe siècle), Guillot Lucas et Alix de Trécesson, fille de Jean et Catherine Montauban (en 1350), Des Touches, Jean Du Loquet ou Locquet (en 1387 et au XVe siècle, Bertrand du Locquet en 1480), Porcaro (en 1655), Théhillac (en 1715), La Tousche-Limousinière (en 1717), Le Provost de La Voltais, Bellouan et L'Estourbeillon (en 1866). Le château actuel est un édifice de forme rectangulaire, flanqué d'une tour carrée, et date en grande partie du XVe siècle.","habitants":"Bois du loup; Famille de Larcher\r\n        \"","divers":"Bois du loup grav 1 à 5   Château de Grée-de-Callac grav-6 à Monteneuf     Gps   47° 52' 25\" nord, 2° 12' 30\" ouest                                                      Porcaro grav-7-8 gps 47° 54' 37\" nord, 2° 11' 51\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Coetquidan_1.jpg","../../jctruffet.com/image/image_56/56_Coetquidan_2.jpg","../../jctruffet.com/image/image_56/56_Coetquidan_3.jpg","../../jctruffet.com/image/image_56/56_Coetquidan_4.jpg","../../jctruffet.com/image/image_56/56_Coetquidan_5.jpg","../../jctruffet.com/image/image_56/56_Coetquidan_6.jpg","../../jctruffet.com/image/image_56/56_Coetquidan_7.jpg","../../jctruffet.com/image/image_56/56_Coetquidan_8.jpg"]},"Consult_chateau_formulaire99e5":{"id":"Consult_chateau_formulaire99e5","dept":"56","canton":"Auray","commune":"Plumergat","nom":"Coetsal","type":"Château","periode":"XVII-XVIII","histoire":"A Plumergat le château de Coetsal et les manoirs  de Centaine de Bojust et de Trongroff.                                                                                                           COETSAL, la seigneurie appartint à la famille homonyme  Sylvestre de Coëtsal en 1448. Elle passa ensuite à la famille Botherel, aux Loaisel, aux Brie, aux Robien et aux Mirabeau en 1788. Après la Révolution, Victor de Mirabeau bâtit le château actuel sur l'emplacement d'un édifice précédent. Le lieu est ensuite à la comtesse de Martel (connue pour ses tableaux signés Gyp) avant de connaître d'autres propriétaires. En 1913, il est acquis par le vicomte Hervé du Halgouët, historien de la maison de Rohan. Actuellement le château est au Comte Jean de Fontaines de La Gournerie, son petit neveu. La demeure ne peut qu'être aperçue de loin, au bout de la belle allée privée qui traverse le parc. Sibylle Gabrielle Riquetti de Mirabeau, plus connue sous son pseudonyme Gyp, née en 1849 au château de Coétsal, femme de lettres (décédée en 1932).","architecture":"CENTAINE, manoir, siège de l'ancienne seigneurie de Centaine ou Saintain appartenant successivement aux familles Le Mordant (en 1600), Trépezec (en 1618), Launay (en 1716). Il possédait autrefois une chapelle privée ;                                                                                                                             BOJUST, manoir, siège de l'ancienne seigneurie du Bojust ou Bois-Juste appartenant successivement aux chanoines de Saint-Michel du Champ (en 1383), aux Chartreux (en 1482), à la famille Kermeno du Garo (en 1577), aux Carmes de Sainte-Anne (en 1636). Il possédait autrefois une chapelle privée.                                                                                                                                                                                                             TRONGROFF, manoir du XVIe siècle, propriété de la famille de Rosnarho au XVIIe siècle.","habitants":"Coestal;   vicomte Hervé du Halgouët                                      Centaine, famille de Launay,                                                     Bojust;   famille Kermeno du Garo                                                 Trongroff; famille de Rosnarho                             \r\n        \r\n        \"","divers":"A Plumergat le château de Coetsal grav 1-2-3 et les manoirs de de Centaine de Bojust et de Trongroff.         Gps 47° 44' 32\" nord, 2° 55' 00\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Coetsal_1.jpg","../../jctruffet.com/image/image_56/56_Coetsal_2.jpg","../../jctruffet.com/image/image_56/56_Coetsal_3.jpg"]},"Consult_chateau_formulaire939a":{"id":"Consult_chateau_formulaire939a","dept":"56","canton":"Ploëmel","commune":"Concoret","nom":"Concoret","type":"Château","periode":"XII-XIV-XVII","histoire":"Deux châteaux à Concoret; Comper et Rox.                                     COMPER,  se trouve aux confins de la forêt de Paimpont, est entouré de cinq étangs, dont le grand étang qui alimentait les douves du château. Première mention historique en 1301, suite à l'avènement de Jean de Montfort au duché de Bretagne sous le nom de Jean IV. Sous la conduite de du Guesclin, soutenu par le roi de France, des seigneurs bretons détruisent les châteaux de Mauron, Gaël, Comper, Bontavant et Montfort. En 1375, Montfort et Comper sont relevés par les comtes de Gaël-Montfort.                                                                                                       ROX, dès le XIIe siècle, les Le Rox (ou Le Roz) y ont moyenne et basse justice. Par alliance, en 1420, la seigneurie est à Guillaume de Lavallée; en 1610 aux Rosmadec; puis aux Begasson à partir de 1685. Le château, construit à partir de 1140, est dans la même famille depuis cette date, elle est représentée actuellement par M. Michel de Genouillac.","architecture":"COMPER, les ruines de l'édifice qui subsistent dateraient de cette reconstruction. Le château est composé de deux parties: l'enceinte et le manoir. De cette enceinte, il subsiste les deux tours encadrant l'entrée, une partie de la tour Est et la substructure de la tour sud à côté du pont. Le manoir a été construit à l'emplacement de la courtine sud-est après 1620 par Mathurin de Rosmadec. La terrasse près de l'étang a été réalisée en 1699, l'escalier et la partie sud du manoir ont été reconstruit en 1866 par la famille Charette. Aujourd'hui encore, Comper est un rendez-vous de chasse et de pêche et la ferme, la forêt et les étangs sont toujours exploités. Éléments protégés MH : l'enceinte, le manoir, la cour, la digue et les douves : inscription par arrêté du 21 mai 1996.                                                                                                    ROX,   la demeure, entourée de douves remplies d'eau, aurait été construite avec les pierres de schiste rouge violet du monastère d'Eon de l'Etoile, détruit après la condamnation de ce moine hérétique au XIIe siècle. Il possède une chapelle privée et le corps de logis rectangulaire est flanqué de deux pavillons qui délimitent une terrasse. L'un des pavillons date sans doute du XVIe siècle siècle et le reste des bâtiments du XVIIIe siècle, aménagements de la chapelle du XIXe siècle.","habitants":"Comper; famille des comtes de Gaël-Montfort                           Rox;  Famille de  Begasson \r\n        \"","divers":"à Concoret gps  48° 03' 54\" nord, 2° 12' 18\" ouest; Comper  grav 1-2-3           et Rox grav -4-5-6.","gps":"","images":["../../jctruffet.com/image/image_56/56_Concoret_1.jpg","../../jctruffet.com/image/image_56/56_Concoret_2.jpg","../../jctruffet.com/image/image_56/56_Concoret_3.jpg","../../jctruffet.com/image/image_56/56_Concoret_4.jpg","../../jctruffet.com/image/image_56/56_Concoret_5.jpg","../../jctruffet.com/image/image_56/56_Concoret_6.jpg"]},"Consult_chateau_formulaire27ce":{"id":"Consult_chateau_formulaire27ce","dept":"56","canton":"Grand-Champ","commune":"Colpo","nom":"Corn_er_Houët","type":"Château","periode":"XVIII-XIX","histoire":"CORN  ER HOUET, a été également construit pour la princesse Bacciochi entre 1858 et 1866. Elisa Bacciochi est née en 1806 en Italie, fille de la grande duchesse de Toscane, nièce et filleule de Napoléon Ier, cousine de Napoléon III. Les initiales de la princesse sont sculptées dans la pierre au-dessus de l'entrée. La propriété est vendue à la mort d'Elisa Bacciochi le 3 février 1869, au prince impérial, qui le cède à son tour au général comte de Courcy, qui fait ajouter la partie nord à la fin du XIXe siècle. C'est aujourd'hui la propriété d'un traiteur qui assure des réceptions dans un cadre de prestige, le château de Korn-er-Houët ou Corn-ar-Houët (XIXe siècle). Les initiales de la princesse sont sculptées dans la pierre au-dessus de l'entrée. Le domaine de Korn-er-Houët est cédé à la mort de Elisa Bacciochi au prince impérial, qui le cède à son tour au général Comte de Courcy. Il est acheté en 1938 au duc de Gramont (petit-fils de Courcy), par la caisse primaire d'Assurance Maladie du Morbihan et devient, sous le nom d'Aérium, une maison pour enfants. L'Aérium est ensuite reconverti en maison de repos et de convalescence pour adultes.","architecture":"QUENHOUET ;  manoir de Quenhouët ou Quesnouet ou Quenoet (XIIIe siècle), remanié au XVII-XVIIIe siècle avec l'édification d'un manoir qui succède à la forteresse. Le manoir reprend des éléments anciens : une échauguette et une guérite en pierre placées en saillie à l'angle des murs. Cette ancienne seigneurie, qui avait droit de haute justice, se trouvait jadis dans la paroisse de Saint-Jean de Cantorbie (devenue Saint-Jean Brévelay en 1557). Il possédait autrefois une chapelle privée. Propriété successive des familles Fresnay (au XVIe siècle), La Haye (au XVIIe siècle), Kervazic de Malestroit et Nicolas Le Mintier (en 1718).","habitants":"Corn et Houét Famille de la princesse Bacciochi                                     Quenhouet; famille Fresnay\r\n        \"","divers":"château de Corn-er-Houet grav 1-2 et Quenhouët à  Colpo gps  47° 49' 12\" nord, 2° 48' 32\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Corn_er_Hou%c3%abt_1.jpg","../../jctruffet.com/image/image_56/56_Corn_er_Hou%c3%abt_2.jpg"]},"Consult_chateau_formulairec1ea":{"id":"Consult_chateau_formulairec1ea","dept":"56","canton":"Guer","commune":"Théhillac","nom":"Cour_Théhillac","type":"Château","periode":"XVIII","histoire":"La COUR, les Théhillac avaient dès 1354 haute justice et portaient \"de gueules à trois croissants d'argent\". En 1400, Jeanne de Théhillac épousa Tristan de La Lande, leurs enfants prirent le nom et les armes de Théhillac. Le château fut vendu en 1629 à Jean Gabard de Rollieux, des descendants duquel il passa, par vente aux Becdelièvre en 1702 puis par alliance en 1773 aux Derval, enfin, par héritages aux Trogoff en 1877 et aux Saint-Germain qui sauvèrent la tour centrale en 1950. Depuis 1977, La Cour appartient à M. Yves Le Verger, qui a repris sa restauration.","architecture":"La COUR Le château est un édifice bâti au milieu du XVIIe siècle (ainsi que sa chapelle privée). Il a remplacé un manoir du XIVe siècle, jadis défendu par de profondes douves remplies d'eau, avec pont-levis. Restauré intérieurement en 1830, Il fut transformé en métairie en 1850 et connut alors un siècle de déclin. Il était méconnaissable en 1945.   Éléments protégés MH : les façades et les toitures du logis et des communs ; les douves : inscription par arrêté du 2 novembre 1979.","habitants":"La cour; Jean Gabard de Rollieux,\r\n        \"","divers":"Château de Cour à Théhillac  gps 47° 34' 07\" nord, 2° 06' 55\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Cour_Th%c3%a9hillac_1.jpg","../../jctruffet.com/image/image_56/56_Cour_Th%c3%a9hillac_2.jpg","../../jctruffet.com/image/image_56/56_Cour_Th%c3%a9hillac_3.jpg"]},"Consult_chateau_formulaire276e":{"id":"Consult_chateau_formulaire276e","dept":"56","canton":"Grand-Champ","commune":"Crédin","nom":"Couédic","type":"Château","periode":"XVII","histoire":"COUEDIC, le château de Couëdic  de 1747, édifié par la famille Le Moyne de Talhouët. Puis propriété successive des familles Villiers, Le Moyne, Briot, Lignière et Montaignac, Cette maison noble a appartenu aux Villiers, aux le Moyne, aux Briot, aux Lignières, et actuellement à M. Emmanuel de Montaignac.","architecture":"COUEDIC, en 1732, lors de la démolition d'un pignon du château, on découvrit un morceau de bois mesurant quinze cm de long sur huit de large et 1,5 cm d'épaisseur. Il était chargé sur les deux faces, de points, de caractères et de figures si extraordinaires, que ceux auxquels on le montra en conclurent qu'on ne pouvait le jeter au feu, et le seigneur du lieu, mieux avisé, l'envoya à M. de Sainte Palaye, qui y vit un Almanach dont M. Lancelot donna l'explication dans les Mémoires de l'Académie des Inscriptions. Ce calendrier a été fait pour le diocèse de Vannes, c'est ce que prouvent d'une manière sensible certaines fêtes particulières à ce diocèse.                                                                                                                          KERTEL,  le manoir de Kértel  de 1740, édifié par la famille de Kérel. Propriété de la famille Lahorie au XIXe siècle. On y voit les armes de la famille de Kérel : \"deux lions debout, supportant une forme héraldique ornée d'une croix\"","habitants":"Couedic;  famille Le Moyne de Talhouët                                                                 Kertel; famille de Kértel \r\n        \"","divers":"Château de Couédic à  Crédin grav 1 et 2 gps 48° 02' 07\" nord, 2° 45' 56\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Cou%c3%a9dic_1.jpg","../../jctruffet.com/image/image_56/56_Cou%c3%a9dic_2.jpg"]},"Consult_chateau_formulairec86a":{"id":"Consult_chateau_formulairec86a","dept":"56","canton":"Auray","commune":"Crach","nom":"Crach","type":"Château","periode":"XVI-XVIII-","histoire":"Quatre châteaux à Crach; Kerantré, Kergurionne; Plessis-Kaer  et Rosnarho                                                                                                           KERANTRE, il fut construit à la fin du XVIIIe siècle en remplacement d'un manoir antérieur détruit par un incendie en 1788. Le lieu servit d'asile aux émigrés évadés à la suite de l'affaire de Quiberon en 1795. La chapelle domestique fut dédiée à Sainte-Anne. Aux Gouvello depuis 1620, le château passa, par mariage, en 1871, à la famille d'Aboville, qui en est toujours propriétaire. Le grand édifice rectangulaire percé de fenêtres à meneaux, s'ouvre par une porte monumentale perchée sur un perron à balustres et enserrée dans un trumeau de pierre que prolonge un fronton triangulaire posé sur le toit.                                                                                                         PLESSIS-KAER, le mot Kaër serait un condensé de Keraêr ou Maison du Serpent. La famille de Kaër exista du milieu du XIIIe à la fin du XVIe siècle. Elle possédait alors la principale seigneurie de Crach, celle du Plessis. Le château a été construit au XVe siècle par François de Malestroit, puis restauré au XVIe siècle, ensuite agrandi au XVIIIe siècle et modifié au XIXe siècle. En 1533, le roi Henri II érige le fief en baronnie qui s'étendra en 1784 sur 14 paroisses. Pendant la Révolution, le Plessis-Kaër est vendu comme bien national à François Josse, qui le cède, en l'an XI, à M. Cauzique. La tourelle d'escalier s'ouvre par une porte à deux vantaux logée dans une baie circulaire. Elle se compose de quatre panneaux à serviette en bas et quatre autres au-dessus en bois sculpté, séparés par des colonnettes. Les deux panneaux supérieurs du centre représentent chacun un médaillon contenant un profil masculin et féminin, agrémentant une végétation sortant d'un vase, les panneaux du côté s'ornent d'une décoration florale. Propriété de la famille Jacquemin.","architecture":"KERGURIONNE, l'ancien château, édifice du XVIe siècle, est détruit par un incendie vers 1820 ; ses vestiges se situent dans le parc, au sud de la nouvelle construction et de ses dépendances. Le domaine passe au XIXe siècle à la famille Martin; en 1861, Alphonse Martin crée les 1ers établissements ostréicoles de Crac'h. La construction d'un nouvel édifice s'échelonne entre 1840 et 1870 et remploie de nombreux éléments provenant de l'ancien édifice, tels les lucarnes, les escaliers, ou encore des boiseries (grand salon). Chapelle de la fin du XIXe avec porte en accolade. Edifice de plan massé, présentant deux légers avant-corps saillant en façade, selon une disposition en H. Une tour polygonale accostée d'une tourelle circulaire occupe l'une des façades latérales. La maçonnerie est enduite avec encadrements de baies, chaînes d'angles, bandeaux en pierre de taille de granite ; les couvertures sont en ardoises.                                                                              ROSNARHO,   le nom de cette ancienne seigneurie a varié au cours des siècles: Rosnareu, Roc'h Nareu, Roc'h Naro, Ros Nerho. Elle appartint aux familles Rosnarho, puis par alliance, aux La Haye. Aux XVIe et XVIIe siècles, elle était aux Chohan, puis aux La Bourdonnaye. Plusieurs propriétaires se succèdent au XIXe siècle, dont l'amiral Bénard et la famille Faure. L'ancien château du lieu devait être important. En 1834 le chevalier de Fréminville indique l'existence de ses ruines: \"quelques pans de murs, et deux ou trois tourelles à demi-écroulées\". On retrouve alors la devise des Chohan sur le mur de la ferme et sur la fontaine voisine, un écusson de la même famille (un cerf passant). La chapelle en ruine porte cet écusson. La demeure actuelle a été édifiée vers 1830 et  la propriété de M. Guy Jomier.","habitants":"Kérentré;  famille d'Aboville                                                       Plessis -Kaer;  famille de Kaër                                        Kergurionne;  famille Martin                                   Rosnarho; famille Rosnarho\r\n        \"","divers":"à Crach; Kerantré  grav 1                                                              gps 47° 37' 46\" nord, 2° 57' 52\" ouest, Kergurione  grav 2-3-4                                 gps  47° 36' 25\" nord, 3° 01' 32\" ouest; Plessis-Kaer  grav  5-6                      gps 47° 38' 41\" nord, 2° 58' 33\" ouest  et Rosnarho grav-7                                               gps 47° 37' 56\" nord, 2° 58' 34\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Crach_1.jpg","../../jctruffet.com/image/image_56/56_Crach_2.jpg","../../jctruffet.com/image/image_56/56_Crach_3.jpg","../../jctruffet.com/image/image_56/56_Crach_4.jpg","../../jctruffet.com/image/image_56/56_Crach_5.jpg","../../jctruffet.com/image/image_56/56_Crach_6.jpg","../../jctruffet.com/image/image_56/56_Crach_7.jpg"]},"Consult_chateau_formulairee488":{"id":"Consult_chateau_formulairee488","dept":"56","canton":"Questembert","commune":"Elven","nom":"Elven","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Elven; Bezit, Krerfily et Kerlo.  Largoét (voir article)                                                                          KRERFILY, siège d'une ancienne seigneurie mentionnée depuis le XVe siècle, Kerfily appartient à la famille de Narbonne en 1830. A cette époque, le château datant des XVIIe et XVIIIe siècles est entouré d'un jardin, d'avenues, d'un pigeonnier et de communs. La propriété passe par héritage à Armand de Charrette vers 1850, qui entreprend la construction d'un château et de sa chapelle entre 1858 et 1863. Le parc abrite les vestiges de l'édifice antérieur et d'une ancienne porterie. La chapelle privative est dédiée au Sacré-Coeur. L'important ensemble du château est homogène et caractéristique de la production du troisième quart du XIXe siècle dans cette région, il se rattache à un ensemble d'édifices dont l'architecture sévère mêle une composition classique à un vocabulaire ornemental néo-gothique.                                                                                       BEZIT,  siège d'une seigneurie dont les titulaires, les Gourvinec, sont connus dès le XVe siècle. Olivier de Gourvinec, seigneur du Bézit, fit construire, en 1493, la chapelle Sainte-Anne, au bourg. D'un ancien édifice, il ne subsiste que quelques pierres sculptées : lévrier, hippocampe. Il a fait place, dans la première moitié du XIXe siècle, à l'élégante construction actuelle, avec sa façade flanquée de deux tourelles aux toits coniques.","architecture":"KERLO, Kerlo ou Kerleau est une très ancienne seigneurie qui appatenait en 1426 à Eon du Lay, en 1506 aux Quifistre puis aux Chohan au XVIe siècle. Au siècle suivant, elle passe, par alliance, à la famille du philosophe Descartes qui y séjourne vers 1625. Par la suite le lieu est aux Le Prestre de Châteaugiron puis au XIXe siècle, à la famille La Noé et enfin à la famille Bredoux, qui en est toujours propriétaire. Il y a là deux demeures: la plus ancienne, ruinée dès le XIXe siècle, et une seconde, plus récente. Toutes deux se trouvent au fond d'une même cour d'honneur. L'ancien édifice des XVe-XVIe siècles comporte des tourelles circulaires à encorbellements, des portes en anses de panier et des cheminées intérieures à pilastres et consoles. Un étang et une magnifique chapelle privée. L'édifice moderne et ses trois tours circulaires du XIXe siècle complètent la partie bâtie du superbe parc boisé clos de murs. Très beau porche d'entrée ainsi que d'importants communs à fenêtres à frontons triangulaires.","habitants":"Kerfily: famille de Narbonne                                                              Bézit; Famille d'Olivier de Gourvinec                                                  Kerlo; Famille Descartes\r\n        \"","divers":"à Elven  Gps 47° 43' 56\" nord, 2° 35' 22\" ouest; Bezit grav-1, Krerfily grav 2-3-4 et Kerlo grav 5-6-7.","gps":"","images":["../../jctruffet.com/image/image_56/56_Elven_1.jpg","../../jctruffet.com/image/image_56/56_Elven_2.jpg","../../jctruffet.com/image/image_56/56_Elven_3.jpg","../../jctruffet.com/image/image_56/56_Elven_4.jpg","../../jctruffet.com/image/image_56/56_Elven_5.jpg","../../jctruffet.com/image/image_56/56_Elven_6.jpg","../../jctruffet.com/image/image_56/56_Elven_7.jpg"]},"Consult_chateau_formulaired9fc":{"id":"Consult_chateau_formulaired9fc","dept":"56","canton":"Quiberon","commune":"Erdeven","nom":"Erdeven","type":"Château","periode":"XIV-XVII-XIX","histoire":"Deux châteaux à Erdeven; Kercadio et Kéraveon.                            KERCADIO, siège d'une seigneurie qui apparaît dans les sources de la fin du Moyen Âge, Kercadio doit son nom à la famille de Kercadiou, dont Alain est nommé lors de la réformation du domaine ducal en 1427. A compter de 1466, ce sont les de Larlan qui deviennent seigneurs de Kercadio et de Coëtquintin en Ploëmel et le resteront jusqu'à la fin du XVIIe siècle. En 1595, le seigneur écuyer de Larlan . En 1625, Pierre de Larlan est conseiller au Parlement de Bretagne. Au XVIIIe siècle rénové à l'époque des Gouyon de Vaudurant. A la Révolution le domaine appartient au marquis de Rougé.                                                                                                               KERAVEON   la seigneurie de Keravéon (ou Kervaviou), citée dès 1275, était alors entre les mains du chevalier Guillaume de Talhouët, qui y construit un premier manoir. C'est probablement Georges-René de Talhouët qui édifia le grand château (dont il reste le donjon) vers la fin du XVIIe siècle. Le cadastre de 1845 figure un ensemble important délimité par des fossés selon un plan quadrangulaire, il comporte une grande avenue, un parc avec pièce d'eau, une île, un jardin régulier, une cour, des terrasses, des communs, des douves et une chapelle. Le corps de logis a été construit autour de 1800 à côté d'une tour plus ancienne.","architecture":"KERCADIO, l'ancien logis-tour, probablement construit sur les bases d'un édifice médiéval, remonte à la fin du XVIe siècle, début XVIIe siècle. Cette partie de l'actuel château est la plus ancienne, en élévation, probable vestige du manoir de Kercadio, cité dès 1427 dans la paroisse d´Erdeven . Cependant, bien qu'elle reprenne le plan d'un logis-tour de la fin du Moyen Âge, cette construction date de la fin du XVIe début du XVIIe siècle, comme l'indique les cheminées des trois salles superposées, les ouvertures du rez-de-chaussée et les portes de la tour d'escalier, dont les meurtrières pour armes à feu légères sont sans doute des aménagements liés aux conséquences de la Ligue.                                                                      KERAVEON, à la fin du XIXe siècle cette tour est doublée et rhabillée, une tour d'escalier ajoutée à la jonction des deux édifices, le corps de logis est également agrandi à l'autre extrémité à cette époque. L'accès du parc se fait par la porte monumentale, les appartements de grand confort ont été aménagés dans le corps de logis, le donjon et l'orangerie. Porte circulaire surmontée d'un très grand fronton elliptique portant, dans son tympan, la trace d'un grand écusson encadré de palmes, accoté de deux tours cylindriques. Le colombier est un édifice circulaire situé dans la ferme, en dehors des murs du potager. Niches formées entre des pierres taillées et disposées régulièrement. Rebords ou promenoirs au pourtour, à hauteurs régulières. Voûte en pierre, avec ajouration aux quatre points cardinaux. Sur l'ajouration de la coupole, petit campanile sur six fûts en pierre. Les douves n'existent plus qu'à l'ouest. Cette partie, d'une cinquantaine de mètres de long, est limitée aux angles par deux échauguettes. Au centre, motif de porte à pont-levis. La courtine est coupée par des dés portant diverses armoiries. le colombier et le portail d'entrée : inscription par arrêté du 19 novembre 1941.","habitants":"Kercadio; famille de Kercadiou                                               Kéravéon ; Georges-René de Talhouët \r\n        \"","divers":"à Erdeven; gps 7° 38' 35\" nord, 3° 09' 19\" ouest .  Kéraveon grav-1-2-gps 47° 38' 55\" nord, 3° 08' 48\" ouest.  Gps Kercadio grav-3-4-5-6           Gps 47° 38' 30\" nord, 3° 08' 16\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Erdeven_1.jpg","../../jctruffet.com/image/image_56/56_Erdeven_2.jpg","../../jctruffet.com/image/image_56/56_Erdeven_3.jpg","../../jctruffet.com/image/image_56/56_Erdeven_4.jpg","../../jctruffet.com/image/image_56/56_Erdeven_5.jpg","../../jctruffet.com/image/image_56/56_Erdeven_6.jpg"]},"Consult_chateau_formulaire5afd":{"id":"Consult_chateau_formulaire5afd","dept":"56","canton":"Guer","commune":"Béganne","nom":"Estier","type":"Château","periode":"XV-XVIII","histoire":"ESTIER, le corps de logis est bâti en 1441 pour Guyon de Carné, le seigneur du lieu, membre du conseil ducal,  sur l'emplacement d'un édifice des seigneurs de Rieux qui l'a précédé dès 1380. La tourelle d'angle est probablement reconstruite au siècle suivant par les Guyon de Carré. au XVe siècle  Eustache de l'Espinay fit élever la tour d'escalier ouest En 1633 est ajoutée une nouvelle construction à l'aile principale. Le château est restauré au XVIIe siècle et les communs pourraient être du XVIIIe siècle.\r\nAprès la famille de L'Estier, le château est successivement la propriété des familles de Rieux, Maigné, Rochier, La Houssaye, Bouleuc, Gouyon de Beaucorps amiral de Tétrel (depuis 1975) et Blanchard industriel nantais depuis 1987.","architecture":"ESTIER Le corps de logis est composé de trois ailes, deux ailes à angle droit encadrant le corps principal. Une tourelle d'escalier polygonale occupe le retrait d'une aile. L'intérieur est occupé par de vastes salles d'inspiration médiévale. Une niche gothique est présente dans le vestibule d'entrée. Les cheminées sont sculptées de colonnettes et de chapiteaux à feuilles. La porte d'honneur étaient sculptée de choux frisés et de vigne, reliefs ensuite supprimés au ciseau.  Le corps de logis principal remonte au XVe siècle et présente deux ailes en angle droit dont le retrait est occupé par une tour d'escalier polygonale. La tourelle polygonale doit avoir été édifiée au XVIe siècle pour remplacer une tourelle qui occupait le même emplacement. Au XVIIe siècle, l'aile formant la façade principale est augmentée d'une construction. De vastes salles moyenâgeuses occupent les différents étages de l'édifice. Dans le vestibule d'entrée se trouve une niche gothique, les colonnettes rondes des piedroits des cheminées sont couronnées de chapiteaux autrefois sculptés de feuillages qui ont été enlevés au ciseau. De même pour les choux frisés et le réseau de vigne qui ornait la porte de la façade. Le soin apporté à l'enlèvement laisse penser qu'il s'agit d'une évolution du goût. Éléments protégés MH : les façades et les toitures : inscription par arrêté du 6 octobre 1976.","habitants":"Estier; Famille de Guyon de Carné\r\n        \"","divers":"A Beganne gps 47° 35' 49\" nord, 2° 14' 20\" ouest                                                le château d'Estier","gps":"","images":["../../jctruffet.com/image/image_56/56_Estier_1.jpg","../../jctruffet.com/image/image_56/56_Estier_2.jpg","../../jctruffet.com/image/image_56/56_Estier_3.jpg","../../jctruffet.com/image/image_56/56_Estier_4.jpg"]},"Consult_chateau_formulaire8488":{"id":"Consult_chateau_formulaire8488","dept":"56","canton":"Plouay","commune":"Keryhuel","nom":"Faouet","type":"Château","periode":"XIX","histoire":"FAOUET, il est en excellent état, dans un cadre reposant sur 36ha de parc. A mi-chemin entre Lorient et Saint-Brieuc, profitant d'une situation dominante et d'une magnifique vue dégagée, ce château a été construit en 1890. Il a fait l'objet d'une rénovation minutieuse et de grande qualité ; de l'époque hausmanienne on apprécie l'architecture équilibrée et l'agencement intelligent, des pièces de réception spacieuses et très lumineuses, deux escaliers desservant l'un les suites privées l'autre les chambres de service et de magnifiques greniers ; 623 m2 habitables environ sur trois niveaux avec désormais tout le confort contemporain. Des communs remarquables datant du XVIIe siècle, une chapelle, une maison de gardien et deux dépendances en pierres agrémentent la propriété, implantée sur un parc de 36 hectares d'un seul tenant dont 18 de bois d'essences précieuses.","architecture":"KERYHUEL l'ancien manoir  propriété de la famille Brizeux du XVIIIe siècle. Le poète (1803-1858) y passa fréquemment ses vacances. Reconstruit au XIXe siècle. Propriété de la famille Maruelle, puis de la famille Saindrenan (en 1985) .","habitants":"Faouet; Seigneur locaux                                                       Keryhuel : famille Brizeux \r\n        \"","divers":"Château de Faouet    grav 2                                                         gps  48° 02' 02 nord, 3° 29' 25\" ouest                                               Keryhuel  grav-1     GPS : 48° 02' 02\" Nord, 3° 29' 25\" Ouest","gps":"48° 02' 02\" Nord, 3° 29' 25\" Ouest","images":["../../jctruffet.com/image/image_56/56_Faouet_1.jpg","../../jctruffet.com/image/image_56/56_Faouet_2.jpg"]},"Consult_chateau_formulairee816":{"id":"Consult_chateau_formulairee816","dept":"56","canton":"Questembert","commune":"Sulniac","nom":"Ferrireres_Sulniac","type":"Château","periode":"XVI","histoire":"FERRIERES, le château, propriété de la famille de Rosmadec est daté du XVIe siècle le château est une ancienne propriété des Rosmadec, Le château n'est plus en bon état de conservation, des éboulements s'y étant produits au cours du XIXe siècle. A voir dans cette commune, l'église Saint Jean-Baptiste de Gorvello en forme de T, la nef se détachant à peine des deux bras du transept. Au chevet, verrière accompagnée de moulures. Au transept sud, fenestrage à meneaux. Le pignon d'entrée ouest est orné d'une baie en anse de panier avec encadrement de pinacles, accolade et fleurons.","architecture":"FERRIERES  dont il reste des ouvertures moulurées et sculptées dans le granit, ainsi qu'un pennon armorié. Le château est construit dans le style Louis XIII2 et en granite local. Du château originel, ne subsiste que quelques ouvertures sculptées en granite, un pennon armorié et des cheminées sculptées. Des rampants à chevronière et acrotère sont également présents en façade occidentale. : les vestiges du château de Ferrières et le château est inscrit au titre des M.H. par arrêté du 16 février 1929.","habitants":"famille de Rosmadec\r\n        \r\n        \"","divers":"Château de la Ferrières à Sulniac gps  47° 40' 35\" nord, 2° 34' 14\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Ferri%c3%a8res_Sulniac_1.jpg"]},"Consult_chateau_formulairee5a0":{"id":"Consult_chateau_formulairee5a0","dept":"56","canton":"Moréac","commune":"Buleon","nom":"Ferrière_Buléon","type":"Château","periode":"XVIII-XIX","histoire":"FERRIERE, la seigneurie était aux Lantivy dès 1400. En 1653, Bernard de Lantivy en était encore le seigneur. Au XVIIIe siècle, Mlle Françoise Rose de Lantivy porta la terre dans la famille de Kersauson, en épousant François Joseph de Kersauson, seigneur du Vieux-Châtel. Les seigneurs de la Ferrière avaient jadis leurs enfeus et leurs écussons dans l'église paroissiale Sainte-Brigitte.                                                             SEIGNEURIE DE LA FERRIERE. paroisse de Buléon, évêché de Vannes. François-Joseph de Kersauson, seigneur de Vieux-Chastel et de Kerjaouen, reçut, vers le commencement du XVIIIe siècle, cette terre de sa première femme, Françoise-Rose de Lantivy. Honorat, leur fils, y habita ; nous avons vu qu'il y fit même inhumer ses trois premières femmes dans le caveau seigneurial. Lors de la Révolution, la Ferrière fut vendue par la Nation, mais la comtesse de Kersauson, quatrième femme d'Honorat, racheta la terre de ses deniers. Depuis cette époque, les descendants de ce quatrième mariage ont continué à habiter la Ferrière (J. de Kersauson). Yves Perdreau entend faire un hôtel-restaurant.","architecture":"FERRIERE,  le château a été rebâti dans la seconde moitié du XIXe siècle. Une tour ronde s'appuie sur son arrière. Tout près s'élève la façade et les communs de l'ancien manoir. La cour est entourée de trois côtés. La belle porterie piétonne et cochère fait face à un petit étang. Au XXe siècle, la Ferrière fut rachetée aux Kersauson par \"l'Association des Maisons Familiales de Vannes\" qui semble en avoir délaissé l'usage depuis 1985 environ.","habitants":"Ferrière ; famille de Kersauson\r\n        \r\n        \"","divers":"Château de la Ferrière à Buléon Gps 47° 56' 08\" nord, 2° 40' 32\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Ferri%c3%a8re_Bul%c3%a9on_1.jpg","../../jctruffet.com/image/image_56/56_Ferri%c3%a8re_Bul%c3%a9on_2.jpg"]},"Consult_chateau_formulairef264":{"id":"Consult_chateau_formulairef264","dept":"56","canton":"Muzillac","commune":"Péaule","nom":"Fescal","type":"Château","periode":"XV-XVII","histoire":"FESCAL, l'existence d'une famille de Fescal, détentrice de la seigneurie, est mentionnée dès le XVe siècle. Jehan, Olivier et Eon de Fescal possèdent alors un droit d'enfeu prohibitif dans une chapelle de l'église paroissiale dédiée à Saint-Gaudens. Le domaine passe ensuite, par héritage ou par alliance, aux familles Coëtdro, Bézy, Bégasson, Saint Martin.  l'édifice actuel a été bâti vers 1760. Acheté au XVIIIe siècle par le sieur Champion de Cicé, il appartient par la suite aux Jean de Bellefontaine et aux du Plessis de Grénédan. Plus près de nous, l'édifice abrite, à partir des années 1930, un foyer d'orphelins fondé par l'abbé pontivyen Victor Alain Berto. Depuis 1965, il est la propriété de Madame la baronne Edouard Serot Almeras Latour. l'édifice actuel a été bâti vers 1760.  Après l'arrestation de son père, sa mère s'enfuit avec ses deux enfants et cherche un refuge. Léonard est amené à l'orphelinat de la Bousselaie à Rieux et y restera caché sous le nom de \"Louis Durand\". Denise est cachée à Redon chez les Soeurs de Saint-Vincent-de-Paul. En juin 1944, il faut déplacer les enfants qui seront emmenés à l'orphelinat du château de Fescal à Péaule où ils resteront jusqu'en janvier 1945.","architecture":"FESCAL,  siège d'une ancienne seigneurie ayant appartenu, semble-t-il, à la famille Fescal au XVe siècle (Eon de Fesqual en 1427 et Pierre de Fescal en 1481). Bellefontaine et Plessis de Grenédan (au XIXe siècle). Il héberge un orphelinat fondé par l'abbé Bertho de 1939 à 1955.                                                                                             DOYENE, du XVe siècle, cet édifice sert de presbytère jusqu'en 1912. La maison d'habitation, à portes et fenêtres décorées dans le goût de la Renaissance italienne, a été exécutée par ordre et sous la direction de Jean Danielo, archidiacre de Vannes, recteur et doyen de Péaule en 1534, qui fait remanier l'ancien manoir du 15ème siècle, dont il conserve l'escalier en vis. Le porche est orné de deux médaillons. La tourelle, située à l'un des angles intérieurs, est datée du 16ème siècle. Le colombier, comprenant 991 niches, date des 16-17ème siècles. On y voit aussi une fontaine.                                                                                                                         La SALLE,  manoir du XVe siècle, siège et berceau de la famille Bois-de-la-Salle. Propriété de Raoullet Bois de la Salle en 1464 et en 1481. Il devient ensuite la propriété de la famille Sorel et du Vicomte Guy de Mentque.                                                                                                                                 COETGUEL, manoir du XV-XVIIIe siècles)Propriété d'Olivier de Saint-Guedas en 1427 et de Jehan de Coetquel en 1464 et 1481. Siège de l'ancienne seigneurie de Coasquel ou Coesquel ayant appartenu à Jeanne de Coesquel, veuve de Jean, bâtard de Rieux (en 1500), puis des familles Rogon et Fabre. On y trouve une chapelle privée. A l'entrée de la chapelle figure un blason avec les armes d'Anne de Bretagne. Le lieu porte maintenant le nom de Couéguel ou Couéguello.","habitants":"Fescal:  famille de Coëtdro                                                                          Coetguel; famille de Rognon \r\n        \"","divers":"Château de la Fescal  grav 4-à Péaule et Doyenne grav 1-2-3            Gps 47° 34' 57\" nord, 2° 21' 18\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Fescal_1.jpg","../../jctruffet.com/image/image_56/56_Fescal_2.jpg","../../jctruffet.com/image/image_56/56_Fescal_3.jpg"]},"Consult_chateau_formulaireadf9":{"id":"Consult_chateau_formulaireadf9","dept":"56","canton":"Guidel","commune":"Gestel","nom":"Gestel","type":"Château","periode":"XVI","histoire":"Deux châteaux dans cet aricle sur Gestel ; Lain et Verger.                    LAIN, la seigneurie du Lain appartient à la fin du XVIe siècle à la famille Guyardet par le jeu d'une alliance avec les Lantivy. Les corps de logis figurant sur le cadastre de 1818  pourraient être ceux de l'ancien manoir dont ils subsistent les communs à l'ouest, probablement de la fin du XVIIe siècle, et peut être le vivier au sud. Le château est vendu en 1809 à François Buret, dont la fille fait construire en 1840 la maison du gardien (date portée sur le linteau de la porte), située près de la route de Quéven. En 1871 Théophile Viollet du Breuil, inspecteur général des Ponts et Chaussées, acquiert le château, c'est lui qui fait dessiner, à partir de 1875, le jardin du parc paysager, et sans doute les plans du château bâti à la fin du XIXe siècle sur l'emplacement de l'ancien manoir. En 1992, à la suite d'un incendie, le château est en ruines. Le château est composé d'un corps principal enduit à cinq travées et de deux corps latéraux inégaux à une et deux travées enduits, couverts d'un toit en pavillon, et d'un large corps postérieur d'escalier, couvert d'un toit à longs pans. La maçonnerie des communs est en moellons de granite enduits avec chaînes d'angles et bandeau peints. Le plan en L est régulier : à étage carré couvert d'un toit à croupe pour la partie en retour correspondant au logement des domestiques, à haut surcroît couvert d'un toit à longs pans et pignon couvert pour l'autre partie correspondant aux écuries. La maison de gardien en moellon est de type logis double à comble à surcroît, couverte d'un toit à longs pans et pignon couvert. Un vivier situé au nord du château est partiellement maçonné. Il est associé à un lavoir double en moellon et pierre de taille.","architecture":"VERGER, le château du Verger se situe à quelques mètres au nord-ouest du manoir du même nom, il est édifié vers le milieu du XIXe siècle dans un style néo-gothique. Une échauguette sur l'angle sud-est est ajoutée entre 1867 et 1870 par l'architecte quimpérois Joseph Bigot. Le château de plan en L très peu saillant avec un corps principal, double en profondeur, à étage carré et étage de comble couvert d'un toit à croupe et un corps latéral couvert d'un toit en pavillon. Les deux corps de bâtiment présentent une élévation ordonnancée. L'échauguette sur l'angle Est en pierre de taille, le reste de l'édifice est enduit. Des armes non identifiées sont sculptées au-dessus de la porte d'entrée. Celle-ci est surmontée d'une accolade ornée de choux frisés et d'un fleuron. La seigneurie du lieu était en 1281 à Henry du Verger, en 1396 à Pierre du Verger, puis en 1448 à Silvestre du Verger. En 1536, elle passa à Louis du Leslay et, par la suite aux Le Prestre de Lezonnet, de Chateaugiron. En 1773, le propriétaire, Louis Le Prestre, marquis de Chateaugiron et du Verger, le conserva jusqu'à la Révolution.Le manoir primitif possédait une salle basse sous charpente qui fut remplacée au XIXe siècle par un bâtiment à étage de comble avec conservation de la cheminée d'origine. La partie médiane comportait cuisine et chambre peut-être sous charpente : dans la deuxième moitié du XVe siècle, elle est plafonnée & rehaussée de même que la tour d'escalier. Un nouveau corps de logis est construit en alignement vers l'ouest après 1818. Un colombier aujourd'hui détruit figure sur le cadastre de 1818. Le moulin à déversoir est situé à quelques mètres au sud du manoir, sur le Scaff. Il est bâti en 1656, date portée à deux reprises. Il est remonté d'un étage en 1770 et augmenté vers l'est en 1846, date partiellement lisible.","habitants":"Lain; famille Guyardet                                                                              Verger; famille verger\r\n        \"","divers":"Château de Lain  grav-1                   gps 47° 48' 11\" nord, 3° 26' 15\" ouest et de Verger  grav-2        gps 47° 49' 17\" nord, 3° 26' 04\" ouest à Gestel","gps":"","images":["../../jctruffet.com/image/image_56/56_Gestel_1.jpg","../../jctruffet.com/image/image_56/56_Gestel_2.jpg"]},"Consult_chateau_formulaire2e9c":{"id":"Consult_chateau_formulaire2e9c","dept":"56","canton":"Grand-Champ","commune":"Grand-champ","nom":"Grand_Champ","type":"Château","periode":"XV-XVII-XIX","histoire":"quatre  châteaux dans cet aticle de Grand-Champ,  du Reste,  de Penhoët, manoir de Kermenguy, de Kerleguen.                                                                                              PENHOUËT; la seigneurie de Penhouët est connue comme propriété de la famille d'Arradon dès le XVIe siècle. Elle passa ensuite aux Drouet et aux Blévin, et est érigée en marquisat en 1620. Le château actuel, construit à proximité du Loch, porte la date de 1759. le château de Penhouët ou Penhoët (1756 ou 1759). Siège de l'ancienne seigneurie  et propriété successive des familles d'Arradon (au XVIe siècle), Drouet et Blévin. La seigneurie est érigée en marquisat en 1620. Un manoir y est mentionné au XVe siècle. Le château actuel a été construit vers 1756 par Blévin, sieur de Penhoët (la date de 1756 est gravée sur le fronton). Les jardins sont attribués à Le Nôtre.Chapelle domestique dédiée à Notre-Dame. Cette magnifique demeure a retrouvé sa toute splendeur d'antan, grâce aux soins vigilants de M. Karl Lagerfeld, son propriétaire actuel. Après avoir rénové le corps de logis principal Sud et l'aile en retour d'équerre du côté Nord, il a achevé de rendre son éclat au jardin à la Française de la façade et de réaménager les bassins à jets d'eau des terrasses Est et Ouest.                                                                                                               KERMENGUY, manoir du XV siècle, propriété de Jehan de Muzillac (au XVème siècle, vers 1464), de Cyprienne de Rohan, fille de François de Rohan et épouse de François de La Feuillée (en 1520), de Jacques de Sémaisons (en 1538), de la famille de Bréafort (au XVIIe siècle) et de la famille Monty (en 1705) qui conserve le manoir jusqu'à la Révolution. L'édifice se compose de trois niveaux desservis par un escalier à vis contenu dans une tourelle polygonale,  appartient à M. Gérard Audran.","architecture":"Du RESTE,  du XVe siècle, reconstruit dans la seconde moitié du XIXe siècle. Siège de l'ancienne seigneurie du Reste (ou Resto) et propriété successive des familles Bino (au XVe siècle), Chohan (en 1502), Guido (en 1615), Le Meilleur (en 1687), Malo de Guerry (au XVIII siècle). On y trouve un colombier qui date du XV-XVI siècle.  Château construit dans la deuxième moitié du XIXe siècle. Chapelle du XVIIe siècle remaniée au XIXe siècle. Blason non identifié sauf les armes de la famille Chohan. Bâtiment de plan rectangulaire comportant un avant-corps légèrement saillant au centre de la façade principale  aspecté au sud. Chaque ouverture est surmontée en toiture de lucarnes au pignon aigu.Les travées de fenêtres sont enduites et séparées par des ressauts en pierre de taille, comme les e
