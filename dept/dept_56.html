const FULL={"Consult_chateau_formulaired3cb":{"id":"Consult_chateau_formulaired3cb","dept":"56","canton":"Guer","commune":"Allaire","nom":"Allaire","type":"Château","periode":"XV-XVI-XVII","histoire":"trois châteaux à Allaire; Plessis Rivault, Deil ,et de Vaudequip.                                                                         PLESSIS-RIVAULT,   la seigneurie, avec moyenne justice, est connue dès le XVe siècle. Propriété de Guillaume Rivault en 1427. Le lieu a conservé le nom des propriétaires de l'époque, les Rivault. Le bâtiment actuel a été construit par les Le Provost de La Voltais vers 1830. L'implantation du château se situe au nord-ouest d'un édifice ruiné. Plus tard au XIXe siècle, il fut la propriété de la comtesse des Forges, alors poétesse appréciée. La demeure appartient à M. Antoine Rémy-Zéphir, elle est visible de l'extérieur au Nord-Est d'Allaire à gauche de la route de Saint-Perreux à proximité de l'Arz.                                       VAU-DEQUIP  le manoir ou château de Vaudequip (1450), édifié par Guillaume de Bogier, grand argentier du duc François II de Bretagne (1458-1488), et remanié au XVIIe siècle. Siège de l'ancienne seigneurie du Vaudequip. Propriété des familles Kervérien et Caunelaye. La charpente est refaite au XVIIIe siècle. Les lucarnes portent des armoiries. On y voit une tour. A l'intérieur du manoir se trouve une cheminée portant les armes des seigneurs Bogier et Téhillac (ou Théhillac). Le château fut transformé au début du XXe siècle en ferme par la famille Garnier.","architecture":"DEIL, l'origine de la construction du manoir remonte au XVe siècle. En témoigne une tour d'angle de plan circulaire nord-est et une seconde tour, ruinée, au sud-est, composé de plusieurs corps de bâtiments organisés autour d'une grande cour rectangulaire, l'édifice est remanié et embelli au XVIIe siècle. Sont construits un pavillon de style Louis XIII, qui a perdu son usage d'habitation, un imposant pigeonnier octogonal, une curieuse fontaine passant du plan carré à l'octogone lié à un lavoir. L'établissement d'un mail témoigne d'un aménagement paysager de cette partie ouest du domaine. Le XIXe siècle a recomposé la partie sud de la demeure en établissant une symétrie des bâtiments de communs établis de part et d'autre du porche à double entrée cochère et piétonne.\r\nÉléments protégés MH : les façades et les toitures ; le portail d'entrée : inscription par arrêté du 15 juin 1976. Le pavillon dit Louis XIII ; la fontaine ; le vivier ; les murs de clôture et les sols du jardin clos contenant le mail et les vestiges des anciennes terrasses et le colombier : inscription par arrêté du 29 mars 2004.","habitants":"Plessis; famille des Le Provost de la Voltais.                              Deil, seigneur local                                                             Vaudequip;  familles Kervérien et Caunelaye\r\n        \"","divers":"à Allaire; Plessi- Rivault  grav 3-4 et Deil grav-1 gps 47° 39' 35\" nord, 2° 11' 50\" ouest.                                                                       Gps 47° 39' 54\" nord, 2° 08' 19\" ouest                                                                       Vau de Quip   grav-2                                                                       Gps  47° 40' 05\" nord, 2° 10' 54\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Allaire_1.jpg","../../jctruffet.com/image/image_56/56_Allaire_2.jpg","../../jctruffet.com/image/image_56/56_Allaire_3.jpg","../../jctruffet.com/image/image_56/56_Allaire_4.jpg"]},"Consult_chateau_formulaire2663":{"id":"Consult_chateau_formulaire2663","dept":"56","canton":"Vannes","commune":"Arradon","nom":"Arradon","type":"Château","periode":"XV-","histoire":"Trois châteaux dans cet article, à Arradon Kéran , Kérat et Porcé.                                                                                       KERAN,   bâti au lieu-dit Kéran, La construction  date du XVe, XVIe et XVIIe siècle. Sa tour située nord-est daterait du XVe siècle, ainsi que la grange nord-ouest, mais a été remaniée. Ces bâtiments forment, avec l'escalier et le couloir du bâtiment sud, une cour intérieure, autour de laquelle, un premier édifice aurait été construit. Le volume extérieur d'un pavillon du XVIe siècle subsiste au sud-est de la cour. Le principal agrandissement serait attribué à Jérôme d'Arradon, au début du XVIIe siècle, et présente un corps de bâtiment, plus large avec des lucarnes. Les remaniements de façades et le percement de ses baies ont eu lieu jusqu'au XIXe siècle. Le pavillon dans le parc, de style premier Empire, aurait été construit de 1809 à 1816, pour Luc-Edmond de Stappleton. Le château de Kéran appartient à une société privée, il est inscrit aux M.H. partiellement depuis le 2/03/1973, pour ses façades et toitures du château ainsi que celles du pavillon isolé, situé dans le jardin .\r\n KERAT, un premier édifice fut bâti à l'emplacement au XIIIe siècle, dont il ne reste que ses soubassements. Devenu le siège d'une ancienne seigneurie, le manoir et son aile nord-est auraient été rebâti au XVe siècle. Ses lucarnes ont été refaites au XVIIe siècle. Le manoir de Kérat devient la propriété de la famille Redoret, au milieu du XVe siècle puis il passera en 1481, dans les mains de la famille d'Arradon. Les façades et toitures sont inscrites aux M.H. depuis le 20/08/1974. Le manoir de Kérat appartient, depuis 2004, à Frédéric Baschet.","architecture":"PORCE, manoir attesté en 1443 appartenant à Jehan Sigalo, demeurant en son hostel de Kervoyer. Chapelle datant peut-être du XVIIIe siècle, détruite puis reconstruite en 1911. Château édifié en 1885 pour le marquis de La Révellière, s'appuyant sur le manoir antérieur, détruit par les allemands en 1944. Ferme et colombier datant de la fin du XIXe siècle. Colombier, chapelle et ferme conservés, château en moellon enduit, ouvertures en calcaire, à un étage carré et deux étages de comble, toit à longs pans à pignon découvert, noue, croupes, toit conique sur les tours. Ferme en moellon enduit, à rez-de-chaussée et comble à surcroît, toit à longs pans à pignon couvert, pigeonnier enduit, toit conique, chapelle en moellon, à un vaisseau à lambris de recouvrement, à toit à longs pans à pignon découvert et noue.                                                                                        l'ancien château de PORCE aujourd'hui disparu. Il s'agit en fait de l'ancien manoir de Kervoyer appartenant à la famille La Revellière. Il possédait autrefois une chapelle privée dédiée à Sainte-Marguerite, démolie, et remplacée par une chapelle édifiée en 1911. Il a servi de dépôt de munitions entre 1940 et 1944. Il est détruit par le feu en 1944.","habitants":"Kéran de Jérôme d'Arradon.                                                                 Kerat, famille Redoret                                                                     Porcé; marquis de La Révellière.\r\n        \r\n        \"","divers":"à Arrandon Kéran Grav-1                                                                 gps   47° 37' 19\" nord, 2° 50' 41\" ouest ,                                              Kérat-  Grav-3                                                                            et Porcé   Grav-2  gps 7° 37' 11\" nord, 2° 47' 52\" ouest         Keran                                                                                                 GPS : 47° 37' 19\" Nord, 2° 50' 41\" Ouest                                                    Kerat GPS : 47° 37' 08\" Nord, 2° 49' 25\" Oues","gps":"47° 37' 19\" Nord, 2° 50' 41\" Ouest","images":["../../jctruffet.com/image/image_56/56_Arradon_1.jpg","../../jctruffet.com/image/image_56/56_Arradon_2.jpg"]},"Consult_chateau_formulaire6e4c":{"id":"Consult_chateau_formulaire6e4c","dept":"56","canton":"Vannes","commune":"Arradon","nom":"Arradon_II","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article sur Arradon; Roguedas et Thevelin.                                                                                           ROGUEDAS , la seigneurie est ancienne. De 1390 à 1581, elle était aux Malestroit, puis passa aux du Bois de la Salle. En 1677, elle échut, par alliance, aux La Bourdonnaye, puis aux Gibon de Keralbeau, qui conservèrent le lieu jusqu'à la Révolution. Les propriétaires suivants sont: Arouin-Foulon, le graveur Panckouke (1867). Bolloré, industriel à Quimperlé (1919). le comte Hubert de Kernavanois (1932) et. depuis 1959, M. Jean Leroux. Edifié au XVIIe siècle, sur l'emplacement d'un édifice des XVe et XVIe siècles, dans un site magnifique, face au Sud et au golfe du Morbihan, le château, restauré au XIXe siècle, la chapelle également de la première moitié du XIXe et qui a remplacé un édifice plus ancien. Occupé par les troupes allemandes entre 1940 et 1944, Roguédas aurait reçu la visite du maréchal Rommel. Il a été restauré en 1985. De son parc, on peut voir les îles Boëdic, d'Arz, Drenec et Logoden. Par contre Roguédas reste invisible, abrité derrière une enceinte bien close.","architecture":"ROGUEDAS, château en moellon autrefois enduit, à un étage carré et comble habitable, à élévation ordonnancée, à toit à longs pans à pignon découvert, avancée à croupe ronde. Linteau des fenêtres en calcaire à décor de volute, de palmette, d'acanthe et blason. Ferme avec logement en moellon, à comble à surcroît, à toit à longs pans à pignon couvert ; hangar et écurie en rez de chaussée, en moellon en partie enduit, ouvertures en granite, corniche en calcaire, à toit à longs pans à pignon couvert et noue. Serre en brique, toit en appentis, volière à toit en pavillon. Colombier en moellon de granite et de calcaire (base), partie haute en briques alternées en damier, toit conique.                                                                                            TREVELIN, le manoir ou château de Truhélin ou Trévelin (XIXe siècle), reconstruit par la famille Jollivet. Siège d'une ancienne seigneurie nommée Truélin et appartenant successivement aux familles Le Hen ou Lehen (de 1407 à 1513), La Forêt et Luco, puis à de La Landelle. On mentionne un Geffroy Lehen en 1464. L'ancien édifice avait hébergé saint Vincent Ferrier en 1419 ;  La paroisse est mentionnée au XIe siècle lors de la réformation religieuse château autrefois siège d'une seigneurie de Truélin, l'ancien bâtiment avait hébergé Saint-Vincent Ferrier en 1419. Le château fut reconstruit par la famille Jollivet, il appartint successivement à la famille Le Hen, aux La Forêt, aux Luco, puis à de La Landelle, le château était en bon état en 1840. Il est situé à l'est d'Arradon.","habitants":"Roguédas; famille des  Gibon de Keralbeau                                      Trevelin, famille Jollivet.\r\n        \"","divers":"sur Arrandon; Roguedas grav 1-2  gps 47° 37' 11\" nord, 2° 47' 30\" ouest  et Thevelin grav-3.","gps":"","images":["../../jctruffet.com/image/image_56/56_Arradon_II_1.jpg","../../jctruffet.com/image/image_56/56_Arradon_II_2.jpg","../../jctruffet.com/image/image_56/56_Arradon_II_3.jpg"]},"Consult_chateau_formulairea518":{"id":"Consult_chateau_formulairea518","dept":"56","canton":"Muzillac","commune":"Arzal","nom":"Arzal_Silz","type":"Château","periode":"XVII-XVIII","histoire":"A Arzal le château de Slizet le manoir de Broël, de la Sénéchaussées et le domaine Abbatiale.                                                                                                SILZ,  le château de Silz du XVIIIe siècle, berceau de la famille du comte Sébastien de la Haye de Silz. Ce dernier était à la tête des chouans des districts de La Roche-Bernard et de Rochefort-en-Terre à partir de 1793 et jusqu'en 1795. Propriété de Jehan Rhuis en 1427 et en 1481.    La seigneurie de Silz, basse et moyenne justice exercée au port de Vieille-Roche, a donné son nom à une branche cadette des La Haye de Larré.  En 1760, Auguste-Marie, chevalier de Silz, chevalier de lOrdre Royal et Militaire de Saint-Louis est né à Silz. Le château a abrité les insurgés chouans des districts de La Roche Bernard et de Rochefort en Terre. Son châtelain, le comte Sébastien de la Haye de Silz, a commandé plusieurs soulèvements dans la région, afin de mieux contrôler le littoral. Construit à proximité de la rive droite de la Vilaine, face au barrage d'Arzal, Silz appartient actuellement à M. Marcel Poisson.","architecture":"BROEL, du XIV-XVIIe siècle, berceau de la famille Broël. La seigneurie avait haute, moyenne et basse justice. Elle possédait autrefois une chapelle privée. Propriété successive des familles Hule (Pierre Hule en 1427), Coudray, du Bois de La Motte (XVIIIe siècle), Lorois (en 1799) et Pluyette (en 1866) ;  Le manoir constitue le siège de la seigneurie de Broël, dont la famille a détenu les droits de haute, moyenne et basse justice sur ses terres. Il semble dater du XIVe siècle (quelques parties subsistantes), mais l'essentiel de l'architecture date du XVIIe siècle. Le manoir appartient successivement aux familles Hule du XVe siècle, Coudray, du Bois de la Motte du XVIIIe siècle. Déclaré bien national lors de la Révolution française il est acquis par M. Lorois (père du futur préfet Édouard Lorois) en 1799. Il passe à la famille Pluyette en 1866, qui le possède encore au début du XXIe siècle. Le manoir fait partie du site de Broël-sur-Vilaine, site naturel classé depuis le 13 août 1962.                                                                                                 DOMAINE ABBATIALE, à quelques encablures de Vannes et dAuray, le domaine des Abbatiales sétend sur un magnifique parc de plusieurs hectares, paisible et verdoyant bénéficiant dun cadre idyllique. Il  est composé dun manoir du XIIIe et XVIIe  siècle et dune partie plus moderne.","habitants":"Silz; comte Sébastien de la Haye de Silz                                     Broël; famille Broël.\r\n        \"","divers":"A Arzal le château de Sliz grav-3, le manoir de Broël-Grav-4 et de la Sénéchaussées grav-5 et le domaine abbatiales grav-1-2.                                                                                          Gps-Arzal 47° 31' 03\" nord, 2° 22' 30\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Arzal_Silz_1.jpg","../../jctruffet.com/image/image_56/56_Arzal_Silz_2.jpg","../../jctruffet.com/image/image_56/56_Arzal_Silz_3.jpg","../../jctruffet.com/image/image_56/56_Arzal_Silz_4.jpg","../../jctruffet.com/image/image_56/56_Arzal_Silz_5.jpg"]},"Consult_chateau_formulairea164":{"id":"Consult_chateau_formulairea164","dept":"56","canton":"Guer","commune":"Augan","nom":"Augan","type":"Château","periode":"XV-XVIII-XIX","histoire":"Trois châteaux dans cet article sur Augan ; dont Beaurepaire, Lemo.                                                                    BEAUREPAIRE, sur le site d'une seigneurie mentionnée depuis le XIVe siècle et dont le manoir existait au XVe siècle, un château neuf est construit en 1835 ; la propriété appartient aux Savignac à partir de 1844, aux du Boisdaudry en 1887, puis aux Frotier de la Messelière. Implanté dans une zone boisée assez élevée, le logis n'a pas d'orientation privilégiée et présente un plan carré. Il est construit en moellon enduit avec encadrements de baies et bandeaux en pierre de taille de granite. Les dépendances se situent au nord du logis, la ferme étant plus éloignée, au nord-est.                                                                      LEMO,   première campagne au XVIIIe siècle avec remplois du XVIe siècle (baies de l'aile sud ouest, tourelle sud-ouest). Deuxième campagne vers 1872 pour Frotier de la Messelière. , alors propriétaires : aile et tourelle sud-Est et reprise des parties hautes de la tourelle sud-ouest ; armoiries sur le fronton central : à gauche Moisan, à droite Le Douarain propriétaire en 1667. Après 1848, le logis existant est doublé de manière symétrique. Le corps de bâtiment ancien présente un plan en équerre avec tourelle dans l'angle; l'agrandissement permet la constitution d'un plan régulier, en U; les communs sont nettement isolés à l'ouest du logis. L'élévation est en moellon de schiste avec encadrement de baies, chaînages et plinthe en pierre de taille de granit.","architecture":"VILLEVOISIN, logis conservant des éléments de la fin du XVIIe siècle ou du début du XVIIIe siècle; remanié à la fin du XIXe ou début du XXe siècle par adjonction d'un corps carré contre l'élévation sud et modification des parties hautes, en même temps construction des communs  et du portail les reliant au logis. Corps principal de plan rectangulaire avec corps saillant carré sur l'élévation antérieure; un deuxième corps carré, en pavillon, sur l'élévation postérieure accosté d'une tourelle carrée dans-oeuvre de l'alignement du corps principal. Corps central à un étage carré et un étage de comble. Maçonnerie de moellon de schiste sans chaîne en pierre de taille, encadrements de baies, porche de l'élévation antérieure, corniche et rampants des pignons en granite.                                                                            La TOURAILLE,  les propriétaires du lieu furent successivement les Desgrées, Le Douarain (1622), Liger (1109), Larcher (1716), Le Douarain (1765), La Villirouët (1832), Bellevue (1874). Le château actuellement appartient au vicomte Pierre de La Guerrande.    le corps de logis d'origine peut dater de la fin du XVIIIe siècle. Agrandissement par adjonction d'un important doublage à l'arrière au cours du premier quart du XIXe siècle. Demeure de plan en T; la façade antérieure, à six travées comporte un fronton triangulaire avec oculus au-dessus des deux travées centrales encadrées de pilastres ; la façade postérieure présente un important avant corps rapporté de trois travées surmonté d'un fronton-pignon triangulaire percé de trois baies semi-circulaire. Maçonnerie enduite avec encadrement de baies, chaînes et corniches en pierre de taille.","habitants":"Beaurepaire; Famille de Frotier de la Messelière.                         Lemo; famille des Moissan.                                                             Bois du loup; Famille de Larcher\r\n        \r\n        \"","divers":"Augan ;  Beaurepaire Grav-1, Lemo grav 2-3 et Bois du Loup Grav-4   47° 55' 14\" nord, 2° 16' 37\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Augan_1.jpg","../../jctruffet.com/image/image_56/56_Augan_2.jpg","../../jctruffet.com/image/image_56/56_Augan_3.jpg"]},"Consult_chateau_formulairec5bc":{"id":"Consult_chateau_formulairec5bc","dept":"56","canton":"Guer","commune":"Augan","nom":"Augan_II","type":"Château","periode":"XVI-XVII-XIX","histoire":"Trois châteaux à Augan; Hardouin, et Villevoisin.                                                                                                     HARDOUIN, un bâtiment ancien, daté du XVIe siècle, a été fortement restauré après 1848, sans doute par la famille de Carheil. L'édifice a été agrandi par l'adjonction de deux tours circulaires en façade et totalement restauré à l'intérieur. Les communs, situés dans l'alignement au sud du château neuf, sont antérieurs à la reconstruction. L'enduit qui recouvrait l'édifice a été supprimé. Le château est construit à proximité de la rivière Oyon, à partir de laquelle a été aménagée un plan d'eau devant le logis aspecté à l'est. Les communs et dépendances sont situés au sud du logis. Ce dernier est un édifice de plan allongé, flanqué de deux tours circulaires sur la façade principale et un pavillon central à l'arrière. Décor néo-gothique, fleurons des lucarnes et faîtage.","architecture":"VILLEVOISIN, logis conservant des éléments de la fin du XVIIe siècle ou du début du XVIIIe siècle; remanié à la fin du XIXe ou début du XXe siècle par adjonction d'un corps carré contre l'élévation sud et modification des parties hautes, en même temps construction des communs  et du portail les reliant au logis. Corps principal de plan rectangulaire avec corps saillant carré sur l'élévation antérieure; un deuxième corps carré, en pavillon, sur l'élévation postérieure accosté d'une tourelle carrée dans-oeuvre de l'alignement du corps principal. Corps central à un étage carré et un étage de comble. Maçonnerie de moellon de schiste sans chaîne en pierre de taille, encadrements de baies, porche de l'élévation antérieure, corniche et rampants des pignons en granite.","habitants":"Hardouin; famille de Carheil.                                                 Villevoisin, seigneur locaux                                                        La Touraille  Famille de Larcher.                                                                  Grée de Callac; comte du Bot                        \r\n        \"","divers":"Trois châteaux à Augan; Hardouin grav-1-2, la Touraille -Grav-3   et Villevoisin grav-4-.   Château de Grée-de-Callac grav-5  Monteneuf-Augan","gps":"","images":["../../jctruffet.com/image/image_56/56_Augan_II_1.jpg","../../jctruffet.com/image/image_56/56_Augan_II_2.jpg","../../jctruffet.com/image/image_56/56_Augan_II_3.jpg","../../jctruffet.com/image/image_56/56_Augan_II_4.jpg","../../jctruffet.com/image/image_56/56_Augan_II_5.jpg"]},"Consult_chateau_formulaire5d14":{"id":"Consult_chateau_formulaire5d14","dept":"56","canton":"Auray","commune":"Auray","nom":"Auray","type":"Château","periode":"XIV-XIX-XX","histoire":"six châteaux à Auray, dont Auray; Kerplouz, Kerleano, Moncan, Kergurioné et de Kerdrain.                                                                                                            AURAY,  un château fort, de style Médiéval qui  fut ensuite le lieu de séjour de plusieurs ducs de Bretagne. Le 29/09/1364, le duc Jean IV lassiégea, mettant fin aux prétentions de son rival Charles de Blois, au Duché de Bretagne. Après avoir été pris d'assaut, en 1560, par l'armée du roi Henri II, et ses pierres furent vendues aux enchères. Aujourdhui, il ne reste que quelques vestiges du château d'Auray, sur la rive droite du Loch : la « tour du Talus » qui est une tour ronde, 3 contreforts qui supportaient le corps de logis, et 2 rampes en descente vers le port de Saint-Goustan. Le château d'Auray était ducal, pris et démoli, en 1570. L'actuelle rue du château a été établie la même année sur son ancien fossé comblé. Les vestiges ont été classés aux M.H. depuis 1986.                                          KERDRAIN, propriété de la famille de Villiers aux XVIe et XVIIe siècles, des familles Pezron puis Moëlien au XIXe siècle. Le manoir, de plan rectangulaire en pierre de taille possède un rez-de-chaussée qui comprend deux pièces séparées par un couloir donnant accès à l'escalier. La pièce ouest a conservé une grande cheminée décorative avec pilastres. Celle donnant à l'Est est aménagée pour le logement du fermier. La porte d'entrée principale est à anse de panier avec accolade. Le premier étage était autrefois percé de fenêtres à meneaux.                                                                                                         CHATEAU ROUGE,   a été construit dans les années 1920 pour Hautemayou, ami du peintre Maufra. Architecte, il avait voulu cette maison face à l'océan, très peu inspirée du patrimoine local, mais avait utilisé du schiste rose, typique du pays de Ploërmel. Le monument a rapidement été associé à la couleur peu commune de ses ardoises.","architecture":"KERLEANO, la maison date du XVIIIe siècle et vit naître en 1771, la  famille Dufort Civrac de Lorges. Entre le plancher du 1er étage et la cheminée du rez-de-chaussée se trouve une cachette de Chouans. Le monument commémoratif a été exécuté par Lussault en 1830 grâce à une souscription royaliste. Edifié sur les ruines d'un monastère, l'ouvrage de style néo-classique est surélevé et entouré de terre rapportée soutenue par un muret. Son plan est circulaire ; il est couvert par une coupole surmontée d'un lanterneau.  Ce mausolée abrite les restes du général royaliste, exécuté en 1804 sur ordre de Napoléon Bonaparte qu'il avait voulu renverser pour rétablir les Bourbon. Le manoir de Kerléano est inscrit aux M.H. depuis 1948.                                                                                                           KERPLOUZ, château construit en 1855 par un britannique nommé Henri Talbot qui travaillait au canal de Briare, sur le site d'un bâtiment ancien (pas de vestige), siège de la seigneurie de Talhouët-Salo. Le domaine et ses 33 ha sont ensuite passés à la famille Dufort Civrac de Lorges. Vers 1880 une chapelle est bâtie à côté de la demeure qui est aujourd'hui transformé en maison de retraite. Aujourdhui les 25 hectares du domaine sont occupés par les Frères des écoles chrétiennes, le lycée agricole.                                                                                                                    MONCAN  est une belle demeure du XVIIe siècle (une des lucarnes est datée 1688), bâtie sur l'emplacement d'une ancienne léproserie par Jean Marin de Mopcan, seigneur de Beauvoisin, chevalier de Montcan, marié à Françoise Le Goubellon en 1620, mort en 1652, dont la famille conserve le lieu jusqu'en 1781. Le château de Moncan passe alors à un neveu Gouvello. Puis, au XIXe et au XXe, les propriétaires sont nombreux: Toussaint (maire d'Auray), Kerviler, Mme de Brisay, Théophile Martin de Kergurioné et Joseph Martin (1914), le Comité d'assistance aux militaires réformés pour la tuberculose qui transforme le château en hôpital provisoire en 1918, par Mme Marie-Thérèse Riou. Entouré d'un agréable parc clos.","habitants":"Kerdrain,  famille de Villiers.                                             Château-Rouge famille de Hautemayou                    Kerplouz,   famille Dufort Civrac de Lorges                                     Moncan; famille de Moncan                                                      Kerleano;   famille Dufort Civrac de Lorges\r\n        \"","divers":"à Auray, dont Auray grav 1-2; Kerplouz, Moncan  grav-8-9, Château-Rouge  grav-3,  Kergurioné Grav-5 et de Kerdrain. grav 4              GPS : 47° 39' 59\" Nord, 2° 58' 49\" Ouest                                                   Korléano grav-6                                                                                GPS : 47° 39' 40,96\" Nord, 2° 59' 39,54\" Ouest                                  gps Kerplouz   grav-7                                                                                                    gps   47° 39' 22? nord, 2° 58' 25? ouest","gps":"47° 39' 59\" Nord, 2° 58' 49\" Ouest","images":["../../jctruffet.com/image/image_56/56_Auray_1.jpg","../../jctruffet.com/image/image_56/56_Auray_2.jpg","../../jctruffet.com/image/image_56/56_Auray_3.jpg","../../jctruffet.com/image/image_56/56_Auray_4.jpg","../../jctruffet.com/image/image_56/56_Auray_5.jpg","../../jctruffet.com/image/image_56/56_Auray_6.jpg","../../jctruffet.com/image/image_56/56_Auray_7.jpg","../../jctruffet.com/image/image_56/56_Auray_8.jpg","../../jctruffet.com/image/image_56/56_Auray_9.jpg"]},"Consult_chateau_formulaire758b":{"id":"Consult_chateau_formulaire758b","dept":"56","canton":"Vannes","commune":"Baden","nom":"Baden","type":"Château","periode":"XV-XIX","histoire":"trois châteaux à Baden dont Rohello, Kergonano et de Toulven                                                                    ROHELLO , manoir existant sans doute en 1455 d'après la mention de la famille  Rochello (ou Rochellou), disparu. Première ferme datant du XVIIe siècle. Logis actuel bâti en 1853, date portée pour le maître d'ouvrage nommé Le Gouvello. Communs construits à la fin du XIXe siècle. Pavillon dit de musique construit au bord de la rivière d'Auray dans la deuxième moitié du XIXe siècle. Château en moellon enduit, à deux étages carrés à élévation ordonnancée, aile est en rez de chaussée; toit en terrasse, escalier dans une tourelle hors-oeuvre tournant à retours, en charpente. Ferme en moellon, à rez de chaussée et comble à surcroît, toit à longs pans à pignon couvert. Communs enduits, ouvertures en brique avec pavillon central (logement) à un étage carré et un étage de comble, aile est (écurie) et ouest (charretterie) en rez-de-chaussée, toit en tuiles à longs pans à pignon couvert. Pavillon dit de musique bâti en moellon enduit, à un étage carré, à élévation à travées, à toit en ardoise en pavillon.                                                                                                                TOULVEN  Siège d'une ancienne seigneurie appartenant à la famille Loénan ou Laouënan de 1426 à 1536. Il est remplacé entre 1809 et 1852 par un logis de ferme ;                                                                               St-BRENDAN, manoir  est une superbe maison familiale située à Baden (Pointe du Blair), donnant directement sur le Golfe du Morbihan.","architecture":"KERGONANO,  seigneurie mentionnée en 1309, appartenant à Guillaume de Baden. En 1544, elle appartient à Vincent de Louénan, famille noble demeurant à Baden dès 1427. En 1680, la seigneurie passe par mariage à Pierre Dondel, à qui l'on doit la construction de la partie centrale du château actuel. Pavillon latéral Est construit avant 1852. Pavillon central élargi et surélevé avant 1862 (date sur charpente: 5 septembre 1862). Fenêtres sud du second étage de la tour centrale bouchées après 1900. Lambris datant des XVIIIe et XIXe siècles. L'escalier du pavillon est construit à la fin du XIXe siècle. Chapelle datant peut-être du XVIIIe siècle, détruite après 1900. Communs au nord construits au XVIIe siècle, surélevés au XIXe siècle. Château à plan symétrique, enduit, à un étage carré et étage de comble, pavillon central à deux étages carrés, à élévation ordonnancée, à toit à longs pans à pignon découvert, à toit à longs pans pour les ailes médianes, en pavillon avec noue pour les pavillons latéraux ; toit du pavillon central à longs pans brisés à croupes. Pignon couvert ; escalier dans oeuvre tournant à retours avec jour dans l'aile ouest et dans le comble de la tour centrale ; escalier droit en charpente dans le pavillon Est. Communs en moellon de granite, à comble à surcroît, couvert en ardoise et fibro-ciment d'un toit à longs pans à croupes. Communs ouest en moellon, en rez de chaussée, à toit à longs pans avec pavillon à l'Est couvert d'un toit en pavillon.","habitants":"Rohello; famille le Rochello .                                                 Toulven; famille Loénan.                                                                                                         Kergonano;  Guillaume de Baden\r\n        \"","divers":"à Baden dont Rohello grav-1-2-3 et Kergonano Grav 4-5 et Toulven grav 7  St-Brendan grav-6                                               Baden gps 47° 37' 10\" nord, 2° 55' 08\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Baden_1.jpg","../../jctruffet.com/image/image_56/56_Baden_2.jpg","../../jctruffet.com/image/image_56/56_Baden_3.jpg","../../jctruffet.com/image/image_56/56_Baden_4.jpg","../../jctruffet.com/image/image_56/56_Baden_5.jpg","../../jctruffet.com/image/image_56/56_Baden_6.jpg","../../jctruffet.com/image/image_56/56_Baden_7.jpg"]},"Consult_chateau_formulaire384b":{"id":"Consult_chateau_formulaire384b","dept":"56","canton":"Muzillac","commune":"La Roche Bernard","nom":"Basses_Fosses","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à la Roche-Bernard dont celui de la Roche et des Basses-Fosses.                                                                                                      BASSES-FOSSES ,   le château, construit aux XVIe et XVIIe siècles, fut jadis entouré de douves, et possède une grosse tour carrée. Dominant le Ruicard, la demeure à l'aplomb du rocher, doit son nom au contraste existant entre ses deux façades , le nord à deux niveaux, et sud à cinq niveaux. L'importance des caves et des greniers fait penser à la maison d'un très riche bourgeois ayant fondé sa fortune sur le négoce. Elle appartint avec la baronnie, à la famille Bernard, aux Laval, aux Rieux, aux Coislin au XVIIe siècle et aux Boisgelin. Par la suite la demeure fut aux Rouxel, aux Morice et, depuis 1983 elle abrite le Musée de la Vilaine Maritime. En estuaire de Vilaine, les hommes ont su exploiter les ressources du fleuve et de la mer, la pêche, la construction navale sont autant dactivités qui ont marqué la cité. Découvrez leur histoire en visitant les 8 salles dexposition et la salle de vidéo. Visitez la salle consacrée à la Bataille des Cardinaux, bataille navale ayant opposée les flottes françaises et britanniques en 1759. transformé en un hôtel et musée.","architecture":"La ROCHE BERNARD, au début du 10ème siècle, un normand nommé Bernhard, s'établit en ce lieu et fortifie le rocher (certains historiens contestent cette hypothèse). Vers 936, après son retour d'Angleterre, Alain Barbe Torte, duc de Bretagne, combat les Normands. Vers 939, le duc de Bretagne signe une paix avec les normands. Les bourgs sont récupérés par les Bretons, puis de nombreux sites sont fortifiés, dont La Roche Bernard. Au XIVe siècle, après l'avènement de Jean de Montfort à la tête de la Bretagne, il semble que le château de La Roche Bernard soit détruit. Au XXIe siècle, la découverte du village est agréable, ainsi que les rochers surplombant le port. Mais il n'y a pas de ruine castrale à voir. Dans la commune au hameau de Nivillac le château hôtel de Bodeuc.","habitants":"Basses-Fosses; famille Bernard                                                      Roche-Bernard : famille Bernard \r\n        \"","divers":"la Roche-Bernard, gps                                                                          47° 31' 08\" nord, 2° 17' 51\" ouest celui de Baudeuc grav-1-2 et des Basses-Fosses grav 3-4-5.","gps":"","images":["../../jctruffet.com/image/image_56/56_Basses_Fosses_1.jpg","../../jctruffet.com/image/image_56/56_Basses_Fosses_2.jpg","../../jctruffet.com/image/image_56/56_Basses_Fosses_3.jpg","../../jctruffet.com/image/image_56/56_Basses_Fosses_4.jpg","../../jctruffet.com/image/image_56/56_Basses_Fosses_5.jpg"]},"Consult_chateau_formulaire6747":{"id":"Consult_chateau_formulaire6747","dept":"56","canton":"Pontivy","commune":"Baud","nom":"Baud","type":"Château","periode":"XV-XVII","histoire":"quatre château à Baud, Baudeuc, Kermorvant, Quinipily et Villeneuve                                                                                     VILLENEUVE, l'origine du château remonte au XVe siècle avec la famille Guido.Le château est reconstruit au XVIIIe siècle, peut-être sous la famille La Coudrais, puis démonté en 1930 pour être rebâti en retrait de la route. Le puits situé au sud de l'actuel château date de 1723. En 1907, et pour quelques années seulement, ce château est le siège d'une école d'apiculture  il présente un plan double en profondeur et deux élévations ordonnancées à cinq travées : au nord les deux travées latérales sont en avancée et couvertes d'un toit en pavillon; au sud, l'avancée se trouve en rez-de-chaussée sur la terrasse. Un escalier dans oeuvre tournant à retours, situé dans la partie Est du bâtiment, dessert l'étage carré et l'étage de comble. Un jardin d'agrément au nord est doublé d'un jardin potager au sud aménagé dans l'axe du château, prolongé par un verger. Une ferme dépendant du château se trouve à l'est.le château de la Villeneuve (XVIIe siècle), restauré au XXe siècle. La seigneurie de  Villeneuve a appartenu successivement aux familles Guydo ou Guidon ou Guidou (entre 1426 et 1610), La Couldraye (en 1738), Edoison ou Doison (vers 1775). Le château est construit à l'emplacement d'un ancien édifice attesté en 1448. Une première reconstruction date probablement du XVIIe siècle. Le château actuel aurait été rebâti ou restauré vers 1930 par la famille Le Crom. En 1907, il  est le siège d'une école d'apiculture.","architecture":"BAUDEUC, l'ancien château de Bodeuc  du XVIIe siècle. Siège de l'ancienne seigneurie de Bodeuc (avec moyenne et basse justice) ayant appartenu successivement aux familles Joulin, Kermeno, puis Talhouët. Le château primitif avait été rasé sur ordre de Richelieu et remplacé par un manoir, puis, vers 1840, par le château actuel.                                                                                                  KERMORVANT ou Kermorvan  du XVe siècle, propriété de la famille Le Brun au XVe et XVIe siècles), puis de la famille Rimaison  au XVIIe siècle, Langle, Lamandour, Jouan de Kervenoaël (vers 1825). En 1826, ce château devient la propriété de Guillaume Olivier Poignant, maire de Baud de 1836 à 1847. A la fin du XIXe siècle, le château est en mauvais état : l'édifice est alors démoli et les douves comblées. En 1923, on pouvait encore voir quelques vestiges du pont-levis. Seuls subsistent le portail, la cave et une tourelle. Une chapelle privée existait autrefois à droite du porche. On y trouve encore un four à pain.\r\nQUINIPILY, la seigneurie de Quinipily appartenait autrefois à la famille Hilary (en 1360), Languès-Orcez ou Langoueouez (à partir de 1425). Cette dernière famille fit bâtir un château qui passa ensuite successivement entre les mains des familles Olivier d'Arradon (en 1550), Pierre de Lannion (en 1620), La Rochefoucault-Liancourt (en 1762) et Giraldon (en 1795) qui utilisa les pierres du château (alors en ruine) pour son entreprise de travaux publics. Les vestiges sont rachetés par la famille Kergoustin de Plumelin (maître-maçon) qui rase alors totalement le château. Le corps de logis (ancienne ferme), qui a subsisté, est restauré par le vicomte Christian de La Tullaye. Le château est surtout célèbre pour la statue , dite \"Vénus de Quinipily\".","habitants":"Villeneuve;  famille La Coudrais                                             Baudeuc, famille Joulin Kermorvan;de Guillaume Olivier Poignant                                                                                      Quinipily; famille Olivier d'Arradon\r\n        \"","divers":"à Baud    Gps 47° 52' 35\" nord, 3° 01' 04\" ouest                                                 Baudeuc  grav-7, Chardonnet grav-1,Kermorvant grav-2, Quinipily grav-3-4                                                                            gps 47° 52' 06\" nord, 3° 02' 07\" ouest  et Villeneuve grav-5-6               gps 47° 52' 28\" nord, 3° 00' 41\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Baud_1.jpg","../../jctruffet.com/image/image_56/56_Baud_2.jpg","../../jctruffet.com/image/image_56/56_Baud_3.jpg","../../jctruffet.com/image/image_56/56_Baud_4.jpg","../../jctruffet.com/image/image_56/56_Baud_5.jpg","../../jctruffet.com/image/image_56/56_Baud_6.jpg","../../jctruffet.com/image/image_56/56_Baud_7.jpg"]},"Consult_chateau_formulairefc3a":{"id":"Consult_chateau_formulairefc3a","dept":"56","canton":"Gourin","commune":"Cléguérec","nom":"Beauregard_56","type":"Château","periode":"XX","histoire":"BEAUREGARD, lieu noble attesté en 1400, appartient aux Charpentier en 1700. Logis daté 1703. Détruit en 1975. Communs datés 1702, 1716, 1739. Chapelle à clocher médian consacrée en 1730. Actuellement maison de la congrégation de Saint-Joseph de Cluny appelée Ty Mamm Doué reconstruite en 1977 sur l'emplacement de l'ancien logis, le château de Beauregard a été construit en 1907 par l'architecte Lucien Roy pour l'ingénieur agronome Fernand Ridel, qui avait acquis l'ancien domaine du comte de Kergariou en 1903. Le maître d'ouvrage modernise l'exploitation agricole et se fait bâtir un \"château neuf\" à côté de l'ancien manoir. L'architecte conçoit un bâtiment de plan dissymétrique, marqué par un éclectisme des influences alliant néo-gothique, formes classiques et régionalisme.","architecture":"BEAUREGARD  communs ouest et colombier figurant sur le cadastre de 1836 détruits,  en élévation à travées, à un étage carré, escalier dans oeuvre ; escalier droit gros oeuvre en  granite ; schiste ; appareil mixte,  Couverture en  croupe ; flèche carrée  en ardoise. L'édifice est élevé sur un étage à partir d'un rez-de-chaussée surélevé en appareillage de granite, avec des chaînes d'angle harpées en pierre de taille. Il est couvert d'un toit à deux pans en ardoise, percé de lucarne rampantes, abritant deux étages de combles et alternant croupes et pignons à crossettes. La façade principale, rythmée de baies en plein cintre, est divisée par deux avant-corps encadrant l'entrée. Le corps central, auquel on accède par un grand degré convexe, est abrité par un auvent et coiffé d'une lucarne pignon. Le rez-de-chaussée accueille les pièces de service à l'est, séparées des pièces de réception de l'autre côté. A l'extrémité ouest du château, est accolée une serre à toit bombé, dont le volume entièrement vitré contraste avec la pierre du château. L'ensemble de l'édifice est orné de ferronneries avec un raffinement des détails des rampes d'escalier ou des grilles d'impostes par exemple. Les pavillons d'entrée du parc montrent des inspirations art nouveau : porche couvert d'un auvent à croupe ronde et lignes en courbes et contre-courbes du portail. Le domaine, légué par la fille du commanditaire à une communauté religieuse, est devenu une maison de convalescence dans les années 1970.","habitants":"Beauregard ; Fernand Ridel\r\n        \"","divers":"A Cléguérec   gps 48° 07' 30\" nord, 3° 04' 10\" ouest                                  château de Beauregard grav-1-2       gps 48° 06' 18\" nord, 3° 01' 41\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Beauregard_56_1.jpg","../../jctruffet.com/image/image_56/56_Beauregard_56_2.jpg"]},"Consult_chateau_formulaire9699":{"id":"Consult_chateau_formulaire9699","dept":"56","canton":"Quiberon","commune":"Belle_ile_en_mer","nom":"Belle_ile_en_mer","type":"Palais-Citadelle","periode":"XI-XVII","histoire":"BELLE-ILE-EN-MER. citadelle construite par les bénédictins après 1029 ; reconstruction à partir de 1558 avec des matériaux provenant de la destruction du château d'Auray ; de 1658 à 1661 travaux par Daigremont et Dieulaman ; intervention de Vauban de 1683 à 1689. A la suite de la révolution socialiste du printemps 1848, des manifestations populaires, des révoltes ouvrières, des insurrections et des répressions, ordre est donné au Génie d'aménager à Belle-Île-en-Mer, sur les glacis de la citadelle, au lieu dit Haut-Boulogne, des baraquements pouvant recevoir 3000 détenus. Ces baraquements devaient être entourés de palissades. Le 21 septembre 1848 est créé le Dépôt de Belle-Ile, dont Antony Béraud est nommé directeur. En mars 1849 débute à Bourges le procès en Haute-Cour d'Armand Barbès, d'Auguste Blanqui et de leurs co-inculpés. En avril 1849, le Colonel Pierre, officier de gendarmerie, est nommé commandant du Dépôt de Belle-Ile. Il fait construire le mur d'enceinte de Haute-Boulogne pour remplacer les palissades. Le 30 octobre 1850, Auguste Blanqui arrive à Belle-Ile où il retrouve au Dépôt les déportés de mai 1848 et ceux de juin 1849. Parmi ceux-ci se trouvent Armand Barbès et 300 autres révolutionnaires. En 1850, le Dépôt devient maison de détention et de déportation. De 1858 à 1976, la maison de détention de Haute-Boulogne a changé bien des fois de nom et de règlement et a vécu de nombreux drames. De tout ce grand passé d'héroïsme philosophique, il ne reste plus à Belle-Ile que ce mur de Haute-Boulogne, illustré par Barbès et Blanqui. Destiné à enclore la maison de détention de Haute-Boulogne, ce mur délimitait autrefois la propriété du Ministère de la Justice et celle de l'armée, c'est-à-dire le territoire de la citadelle.","architecture":"BELLE-ILE-EN-MER, a l'origine, le mur de Haute-Boulogne avait une longueur de 670 mètres et délimitait un vaste quadrilatère sur trois côtés, le quatrième étant occupé par le fossé de la citadelle. Aujourd'hui, après des destructions successives, il ne reste plus que 338 mètres de ce mur, mais toute la partie longeant la côte est demeurée pratiquement intacte. C'est une construction simple, en pierres de schiste, recouvertes d'un crépi ocre fait de sable et de chaux. Sa hauteur moyenne est de quatre mètres et son épaisseur de 60 centimètres. Il est renforcé, du côté de la mer, tous les 12 mètres environ, de 26 contreforts triangulaires ayant une petite arche à leur pied pour enjamber le fossé d'écoulement des eaux. La crête du mur est inclinée, du côté de la mer, donc du côté du domaine de la citadelle, et conserve à certains endroits une armature de tessons de verre. Éléments protégés MH : le mur de Haute-Boulogne: inscription par arrêté du 9 mars 1994. La citadelle, à savoir les façades et les toitures de l'ensemble de ses éléments constitutifs et parmi ceux-ci, la totalité de la poudrière circulaire, des vestiges des casemates et de la poudrière souterraine de l'Enveloppe : classement par arrêté du 22 juin 2007.               Le Manoir de PENHOET  était la propriété de  Sarah Bennhardt. Le fort Sarah Bernhardt est un fortin militaire du XIXe siècle de Belle-Île-en-Mer, où la célèbre comédienne française Sarah Bernhardt (1844-1923) passe ses vacances d'été durant 30 ans, entre 1894 et 1922. Il est transformé en musée dans les années 2000. Propriété du conservatoire du littoral, le fort est inscrit aux M.H.depuis 2000, et labellisé Maisons des Illustres en 2011, et une importante partie du domaine de 46 hectares est transformé depuis 1984 en golf de Belle-Île-en-Mer.                                                                                 Sur Belle-ile le domaine de GOUPHAR- Bangor hôtel restaurant, relais et châteaux.","habitants":"Vauban et  Sarah Bennhardt\r\n        \"","divers":"A Bel-ile en Mer  la citadelle de Vauban grav -1-2 gps 47° 19' 59\" N, 3° 11' 13\" Ouest                                                                 manoir de Penhoet grav-4 et de Gouphal grav-5-6.  Musée de Sarah grav 7-8                                                                                       gps 47° 23' 09\" N, 3° 14' 58\" Ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Belle_ile_en_mer_1.jpg","../../jctruffet.com/image/image_56/56_Belle_ile_en_mer_2.jpg","../../jctruffet.com/image/image_56/56_Belle_ile_en_mer_3.jpg","../../jctruffet.com/image/image_56/56_Belle_ile_en_mer_4.jpg","../../jctruffet.com/image/image_56/56_Belle_ile_en_mer_5.jpg","../../jctruffet.com/image/image_56/56_Belle_ile_en_mer_6.jpg","../../jctruffet.com/image/image_56/56_Belle_ile_en_mer_7.jpg","../../jctruffet.com/image/image_56/56_Belle_ile_en_mer_8.jpg"]},"Consult_chateau_formulaire19a8":{"id":"Consult_chateau_formulaire19a8","dept":"56","canton":"Moréac","commune":"Bignan","nom":"Bignan","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à Bignan  dont Beaulieu et Kerguehennec.                BEAULIEU,  il appartenait à la famille de Lanvaux. Au début du XVe siècle, passa à Guillaume, puis à Olivier de Lanvaux. Après 1580, l'édifice passe aux Cahideuc. Le château fut ensuite propriété des La Chesnaye d'Estimbrieuc, qui le cédèrent, en 1662, aux La Touche de Porhman. Ceux-ci le revendirent en 1778, aux Lesquen. Le lieu passe ensuite, par alliance, aux Kernezne, et aux Keranflech au XIXe siècle. En 1910, il appartient à l'archéologue Aveneau de La Grancière. A ce moment, il ne subsiste rien de l'ancien manoir féodal sauf quelques traces des douves. Trois pièces du rez-de-chaussée du château bâti au XIXe siècle abritent un temps les collections de M. de La Grancière. Placé sur une hauteur dominant l'étang, le château est très visible, il appartient à M. Alain Guillot, qui l'habite.                                                                                                                     KERGUEHENNEC, sur les vestiges d'un ancien manoir (la seigneurie est attestée en 1476), en 1703 achat de la vicomté  par les frères Hogguer, le château est propriété d'un banquier, qui y séjourne pour ses affaires. en 1732 le domaine est céder au Rohan-Chabot De 1873 à 1876, le comte Lanjuinais, député du Conseil général du Morbihan, confie à l'architecte Trilhe de très importants travaux de restauration, toutes les parties hautes sont reprises. Le décor intérieur est refait selon un goût influencé par les grandes restaurations des châteaux de la Loire et à la mode à la Mansart. Le domaine appartient de nos jours au Conseil général du Morbihan. Le parc, aménagé d'après un projet de Buhler, fait partie d'un tout qui témoigne de l'activité artistique des débuts de la IIIe République.","architecture":"KERGUEHENNEC,  l''apparence du château est changée par l'adjonction d'un relief sur le fronton, d'un campanile, d'un perron encadré de deux colonnes supportant un balcon, et par la modification du portail d'honneur, tandis que la décoration intérieure est reprise dans le goût Renaissance du moment et certains détails largement inspirés des châteaux de Blois et de Fontainebleau, dont la restauration fut assurée par Félix Duban. Denis Bühler rendra un plan que le commanditaire va appliquer, aplanissement et percement de l'allée cavalière au sud, création du bassin de style Louis XIV, jardin à la française dans la cour au sud et le long de la façade nord du château, jardin anglais au parcours sinueux plus au nord. Le comte de Lanjuinais, aidé de son chef-jardinier Jarry, apportera sa touche personnelle. Le domaine de Kerguéhennec, qui appartient de nos jours au Conseil général du Morbihan, ne se limite pas à cet ensemble architectural, car le parc, aménagé d'après un projet de E. Buhler, ancien collaborateur d'Alphand, fait partie d'un tout qui témoigne de l'activité artistique des débuts de la IIIe République. A noter l'intérêt du site forestier et en particulier de l'arboretum, où ont été plantées des espèces originaires d'Amérique du nord et d'Amérique du sud. Éléments protégés MH : le château et ses communs le parc  classement par arrêté du 24 octobre 1988.","habitants":"Beaulieu;; famille de   Keranflech.                       Kerguehennec;  Rohan-Chabot \r\n        \r\n        \"","divers":"à Bignan  dont Beaulieu grav-1-2                                                   gps 47° 53' 48\" nord, 2° 48' 45\" ouest et Kerguehennec  grav--3-4-5-6-7-8                  gps 47° 53' 09\" nord, 2° 44' 04\" ouest.","gps":"","images":["../../jctruffet.com/image/image_56/56_Bignan_1.jpg","../../jctruffet.com/image/image_56/56_Bignan_2.jpg","../../jctruffet.com/image/image_56/56_Bignan_3.jpg","../../jctruffet.com/image/image_56/56_Bignan_4.jpg","../../jctruffet.com/image/image_56/56_Bignan_5.jpg","../../jctruffet.com/image/image_56/56_Bignan_6.jpg","../../jctruffet.com/image/image_56/56_Bignan_7.jpg","../../jctruffet.com/image/image_56/56_Bignan_8.jpg"]},"Consult_chateau_formulaireb29c":{"id":"Consult_chateau_formulaireb29c","dept":"56","canton":"Moréac","commune":"Bohal","nom":"Bohal","type":"Château","periode":"XVI-XIX","histoire":"deux châteaux à Bohal , l'abbaye et Rocarant                                                     ABBAYE, le nom de l'Abbaye, associé au château de Rocarant, évoque certainement l'époque très ancienne où, en 1060, la paroisse fut concédée à la puissante abbaye de Marmoutiers. L'orientation d'un manoir très simple, du XVIe siècle, a été inversée : la tour d'escalier visible ici se trouvait à l'origine en façade arrière.                                    ROCARANT la seigneurie appartenait à Jean Bourdin en 1504, à Robert Le Moine en 1640, à Pierre Henry, seigneur de la Nouë en 1665, puis à Madame la comtesse douairière du Fou en 1775. La demeure est actuellement à M. Alain Ribot.","architecture":"ABBAYE,   au début de notre siècle, un nouveau corps de logis tourné vers la vallée, fut accolé au mur pignon sud. Le principe du toit polygonal coiffant une tour circulaire semble traditionnel dans le canton ; l'ouverture carrée que protège le coyau est ici l'entrée d'un pigeonnier. L'ancien manoir, avec sa tour circulaire à toit pointu, est accolé à un bâtiment construit au XIXe siècle, qui possède également une tourelle ronde à l'arrière, le parc clos englobe les communs et la chapelle désaffectée.                                                                                                                ROCARANT,  tour d'escalier datant du XVIe siècle ; ancien logis construit au XVIIe siècle ; nouveau logis élevé à la fin du XIXe ou au début du XXe siècle. L'édifice se compose d'un étage carré, gros oeuvre : granite; schiste; enduit, élévations à travées surmontées de toit à longs pans; pignon couvert; croupe; toit polygonal recouverts d'ardoise.","habitants":"Abbaye; Rocarant; Madame la comtesse douairière du Fou                                         \r\n        \"","divers":"A Bohal , l'abbaye grav-1-2 et Rocarant  grav-3  Gps 47° 46' 56\" nord, 2° 26' 10\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Bohal_1.jpg","../../jctruffet.com/image/image_56/56_Bohal_2.jpg","../../jctruffet.com/image/image_56/56_Bohal_3.jpg"]},"Consult_chateau_formulairee9e5":{"id":"Consult_chateau_formulairee9e5","dept":"56","canton":"Vannes","commune":"Le Bonno","nom":"Bonno","type":"Château","periode":"XV","histoire":"Deux châteaux à le Bonno, Kerdréan  et Kervillo. A deux kilomètres au  nord-est à Plougoumelen le château de Pont-Sal.                                                                                                                   KERDREAN, la seigneurie de Kerdréan se trouvait jadis dans la paroisse de Plougoumelen et appartenait aux Muzillac. Le château du XVe siècle et ses deux tourelles carrées sont entourés de murs agrémentés de tourelles rondes à archères. L'enceinte est franchie par deux portes cochères et une porte piétonne. La demeure a été aménagée en hôtel par les soins de M. Leclerc, son propriétaire, qui a édifié dans l'ancien verger, des bâtiments modernes, mitoyens de la vieille demeure. Le complexe touristique de \"l'Hostellerie de l'Abbatiale\" a ouvert ses portes en 1990. Kerdréan est visible à 2 km au sud-est du Bono,hôtel et salles pour réceptions et séminaires.                                                            PONT-SAL, c'était le siège de la principale seigneurie  Elle appartenait à la famille de Pont-Sal aux XIVe et XVe siècles, à cette époque le manoir vit naitre Yves de Pont-Sal, futur evêque de Vannes. En 1536, le manoir appartenait à Henry de Launay, en 1598 à la famille Talhouët de Kerservant et par la suite aux Botherel de Quintin. Son architecture actuelle date de 1785, la tante de Napoléon et la Comtesse de Ségur y séjournèrent. Un très beau parc de cinq hectares entoure le château. Plus récemment il fut transformé en restaurant-auberge géré par M. Jean-Marie Blanchot.trois chambres d'hôtes et table d'hôtes.","architecture":"KERVILIO, le château jadis dans la paroisse de Plougoumelen, était aux Jouhannic en 1713, au marquis d'Héricourt (plus tard évêque d'Autun) en 1820, et actuellement au vicomte Bertrand de Noüe. Kervilio se trouve à deux kilomètres au Nord-Est du Bono, à proximité de la rivière du même nom. Edifice de plan rectangulaire à trois niveaux  avec pavillon central à cinq travées, pavillon d'entrée légèrement saillant avec fronton triangulaire sur toit en croupes recouvert d'ardoise, accolé sur les flancs droit et gauche de pavillon rectangulaire à deux niveaux à trois travées toit en croupes recouvert d'ardoise.","habitants":"Kerdéan; famille de M. Muzillac                                               Kervillio; vicomte Bertrand de Noüe.                                                    Pont-Sal ;   Famille de Pont-Sal\r\n        \"","divers":"à le Bonno, gps 47° 38' 28\" nord, 2° 56' 58\" ouest Kerdréan grav-1-2 et Kervilio grav-3-4. Pont-Sal grav 5-6","gps":"","images":["../../jctruffet.com/image/image_56/56_Bonno_1.jpg","../../jctruffet.com/image/image_56/56_Bonno_2.jpg","../../jctruffet.com/image/image_56/56_Bonno_3.jpg","../../jctruffet.com/image/image_56/56_Bonno_4.jpg","../../jctruffet.com/image/image_56/56_Bonno_5.jpg","../../jctruffet.com/image/image_56/56_Bonno_6.jpg"]},"Consult_chateau_formulaire78b5":{"id":"Consult_chateau_formulaire78b5","dept":"56","canton":"Guer","commune":"Rieux","nom":"Bousselaie","type":"Château","periode":"XVIII-XIX","histoire":"BOUSSELAIE, la seigneurie, citée en 1380, appartenait à la famille homonyme, puis passa par alliances successives aux La Haye au XVe siècle, du Matz en 1649, et de Forges en 1678. En 1870, Mgr de Forges loua le château à une colonie franciscaine, puis en 1890 un scholasticat mariste s'y installa, et en 1930, il abrita un orphelinat fondé par Mlle de Constance  et  institut médico-professionnel.","architecture":"BOUSSELAIE, un premier château existait là au XIVe siècle. Il fut reconstruit au XVIIIe siècle puis agrandi et modernisé à la fin du XIXe siècle. Depuis 1963, la demeure appartient à l'Association des Amis de l'orphelinat de la Bousselaie qui y a installé un Institut médico-professionnel. La Boucelaye, avec ses murs roses est visible extérieurement au bord d'un étang, l'édifice rectangulaire à deux niveaux sur soubassement et série de lucarnes sur un toit en croupe accolé d'un bâtiment de style grec d'un niveau à grande ouverture toit en croupe.","habitants":"Bousselaie; Famille de Bousselaie\r\n        \"","divers":"A Rieux gps   47° 35' 55\" nord, 2° 06' 21\" ouest                                                   le château de Bousselaie","gps":"","images":["../../jctruffet.com/image/image_56/56_Bousselaie_1.jpg","../../jctruffet.com/image/image_56/56_Bousselaie_2.jpg"]},"Consult_chateau_formulaire5629":{"id":"Consult_chateau_formulaire5629","dept":"56","canton":"Grand-Champ","commune":"Brandivy","nom":"Brandivy","type":"Château","periode":"XIII-XV-XIX","histoire":"trois châteaux à Brandivy; Granville,  Lanvaux et  Kergal.                        GRANDVILLE,   l'origine de la construction peut être située autour de 1500, époque à laquelle la seigneurie appartient à la famille de Gouyon de la Grandville. Le château fut entièrement remanié à la fin du XIXe ou au début du XXe siècle, avec la construction de l'aile en retour nord-ouest, la recomposition de la façade sud et la redistribution des intérieurs. Edifice de plan en L correspond à la demeure ancienne, augmenté d'une aile en retour d'équerre au nord-ouest. Décor de style néo-gothique. Il était autrefois désigné par l'appellation bretonne Kermeur, la seigneurie appartint aux Guyon vers 1500, aux Gueho au XVIe siècle, aux Arradon par mariage en 1558 et aux Bidé qui conservent la propriété du XVIIe siècle au début du XXe siècle, et passe aux Cuverville.","architecture":"LANVAUX, vestiges du  château de la Forêt, dénommé fréquemment château de Lanvaux, du nom de ses anciens propriétaires, fut saisi dès 1238 par le duc Jean 1er le Roux et réuni, avec les terres, au corps du duché de Bretagne. Plus tard, en 1463, le duc François II donna Lanvaux et son château à André de Laval, maréchal de France. Vingt ans plus tard, Laval étant très âgé et sans descendant, le duc octroya Lanvaux à Louis de Rohan-Guémené. Mais, comme le château était ruiné, le duc autorisait le nouveau propriétaire à construire château et forteresse au dit lieu de Lanvaux, avec droit de guet de la place. D'après Ogée, Rohan-Guémené aurait profité de cette autorisation, mais le château aurait été a nouveau ruiné un siècle plus tard (1593) lors des guerres de la Ligue. Actuellement les ruines sont encore visibles, avec leur enceinte principale et leurs douves profondes, mais envahies par la végétation.                               KERGAL,  appartenait, en 1400, à Pierre de Lantivy sieur de Talhouët ; en 1482, daprès certains textes, à Olivier dArradon. Lensemble de lédifice ne saurait donc être attribué à Pierre Danièlo. Lorsque Pierre Danièlo résolut dagrandir le manoir, il ne manqua pas de suivre le genre darchitecture usité en son temps. Les fenêtres du rez-de-chaussée et des chambres conservent la forme carrée longue et des grillages protègent celles du bas ; mais des pilastres décorent celles des chambres et un fronton circulaire muni de crochets couronne la lucarne.","habitants":"Grandville; Famille de Bidé                                                        Lanvaux; famille de Rohan-Guémené                                                                Kergal, Famille de Pierre Danièlo \r\n        \"","divers":"à Brandivy; Granville grav1-2-3-,  Lanvaux grav-56 et  Kergal grav-4-5.                                                     Gps 47° 46' 29\" nord, 2° 56' 39\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Brandivy_1.jpg","../../jctruffet.com/image/image_56/56_Brandivy_2.jpg","../../jctruffet.com/image/image_56/56_Brandivy_3.jpg","../../jctruffet.com/image/image_56/56_Brandivy_4.jpg","../../jctruffet.com/image/image_56/56_Brandivy_5.jpg","../../jctruffet.com/image/image_56/56_Brandivy_6.jpg"]},"Consult_chateau_formulairebcdc":{"id":"Consult_chateau_formulairebcdc","dept":"56","canton":"Muzillac","commune":"Le Guerno","nom":"Branféré","type":"Château","periode":"XVIII-XIX","histoire":"BRANFERE,   au Camarec depuis 1427 était  la seigneurie de Branféré et passa  en 1578 aux Francheville, en 1677 à Jean-Baptiste Freslon de La Freslonnière . Un château médiéval, reconstruit au début du XVIIe siècle, fut détruit par la Révolution. En 1850 ce château fut vendu au Marquis de Barbeyrac de Saint-Maurice, puis, une dizaine d'années plus tard, à M. Casimir  Jourde, ancien planteur en Argentine. On organise au château des expositions de peintres animaliers, tandis que le parc de 50 hectares qui l'entoure est devenu un parc zoologique planté d'arbres exotiques et parsemé de plans d'eau, au milieu desquels on peut admirer, s'ébattant en liberté, des oiseaux et des mammifères (appartenant à une centaine d'espèces animales provenant des cinq continents). A la mort de Casimir son fils  Gaston devient propriétaire jusqu'en 1930, en 1948  Nelly veuve depuis 1932, s'éteint, Paul Jourde et son épouse Hélène qui séjourné à l'étranger depuis la guerre regagnent la France et s'installe au château et aménage un parc animalier, il était entouré dès le début du XVIIIe siècle, par une réserve botanique. Depuis 1986, propriété de la Fondation de France.","architecture":"BRANFERE, le château actuel fut édifié dès le début de la Restauration en 1815, l'aile Nord, du début du XVIIe siècle, ayant été conservée.  Un château médiéval reconstruit au début du XVIIe siècle a été détruit à la Révolution. Le château actuel se présente comme un long corps de logis rectangulaire à deux niveaux , coiffé d'ardoise et flanquées de deux tours rondes, la façade principale à sept travées, est régulièrement percées de grandes fenêtres, au rez-de-chaussée, réemploie que l'aile nord de l'ancien édifice, au rez-de-chaussée, ouvrant sur le parc  accueille aujourd'hui un zoo.","habitants":"Branféré; Famille de Jourde\r\n        \"","divers":"Le Guerno le château de Branféré                  Gps 47° 35' 02\" nord, 2° 24' 25\" ouest","gps":"","images":["../../jctruffet.com/image/image_56/56_Branf%c3%a9r%c3%a9_1.jpg","../../jctruffet.com/image/image_56/56_Branf%c3%a9r%c3%a9_2.jpg"]},"Consult_chateau_formulaireb4d6":{"id":"Consult_chateau_formulaireb4d6","dept":"56","canton":"Questembert","commune":"St_Gravé","nom":"Brossais","type":"Château","periode":"XIV-XVIII-XIX","histoire":"BROSSAIS, siège d'un fief important depuis le XIVe siècle, la propriété est vendue comme bien national à la Révolution, puis rachetée par ses anciens possesseurs à la Restauration, qui s'attachent, au cours du siècle, à reconstituer le domaine et à transformer le château. La famille du Brossay, en la personne de Guillaume, possesseur du fief à la fin du XIVe siècle, donne son nom à la seigneurie,le château du Brossais (XIXe siècle). Un premier manoir existait dès 1383. Le château actuel a été édifié vers 1600 et agrandi en 1780. La seigneurie appartenait au XIVe siècle à la famille Brossais. Propriété, par alliance, des familles Eder (Pierre Eder en 1427 et Jehan Eder en 1464) et Du Matz (Gilles du Mas en 1481 et Jacques du Mas en 1536), de 1383 jusqu'au XVIIe siècle. Puis propriété de la famille Moulin (en 1680), Le Mallier, comte de Chassonville ou Charsonville (en 1741). A la Révolution, le château est vendu comme bien national à François-Yves Faverot, puis racheté le 26 nivôse an VII par les descendants de la famille du Moulin (Gouyguet de Bienassis) et revendu le 15 vendémiaire an XII à Mlle de Charsonville. Il passe ensuite entre les mains des familles La Bouëssière, Kerdrel et La Bouillerie (depuis 1929). Le général Audren de Kerdrel le restaure à la fin du XIXe siècle. La tour d'angle hexagonale a été reconstruite en 1854 et le pavillon Volvire a été restauré en 1890. Les dépendances portent les armes des familles Chassonville et Cornulier.                                                                                      CANCOUET   du XVe siècle, siège d'une ancienne seigneurie Les bâtiments sont ceints d'un mur daté de 1643. On y trouve un colombier.","architecture":"BROSSAIS, lédifice reprend le plan en équerre des grands manoirs bretons médiévaux, laccent étant mis sur la tour dangle dont le décor gothique flamboyant et une partie des pierres sont remployées du premier manoir. le château du Brossais, la plus importante seigneurie de Saint-Gravé, révèle une structure complexe qui résulte des nombreuses campagnes de travaux qui ont accompagné son développement, la plus remarquable étant laile sud, basse, composée de salons en enfilade. Les traces de son évolution, de grand manoir médiéval au château historiciste du XIXe siècle en passant par le classique plan du château XVIIe siècle à cour close limitée par un pavillon et sans doute la chapelle sont encore perceptibles. Les bâtiments des communs à louest construits en moellon de schiste et couverts dardoises se composent dun alignement à lest et dun bâtiment abritant le four au sud. Lalignement comprend deux logis à étage encadrant des parties basses à usage détable.                                                                                                                          \r\nMONTREL ou Montret, siège d'une ancienne seigneurie ayant appartenu à la famille Montret.en 1427, Pierre du Montret en 1464 et en 1481), puis à la famille Théhillac en 1680. Le Montret était un très vieux château ; nous trouvons, en 1418, Guillaume du Montret au nombre des gentilshommes qui doivent suivre le duc de Bretagne en France. Il fit une fondation en faveur de l'église de Saint-Gravé, fondation qui fut confirmée en 1470 par son fils Jean. Aux XVIe et XVIIe siècles, le château du Montret est occupé par la famille de Théhillac, sieur de Maupas et de Montret. En 1669, Jeanne de Théhillac, fille de Charles de Théhillac et de Raoulette Labbé, dame de la Lande, épousa Mathurin Bosserel. En 1680, mourut Jacques de Théhillac, sieur du Montret ; il fut enterré dans la chapelle du Montret, adhérente à l'église. Cette famille disparut de Saint-Gravé vers le commencement du XVIIIe siècle, et le château du Montret cessa d'être habité.","habitants":"famille Brossais.                                                                             Montrel ;    Falmille de Montret         \r\n        \"","divers":"A St-Gravé, gps     47° 43' 36\" nord, 2° 16' 46\" ouest                               château de Brossais grav-1-2-3, Cancouet  grav-4","gps":"","images":["../../jctruffet.com/image/image_56/56_Brossais_1.jpg","../../jctruffet.com/image/image_56/56_Brossais_2.jpg","../../jctruffet.com/image/image_56/56_Brossais_3.jpg","../../jctruffet.com/image/image_56/56_Brossais_4.jpg"]},"Consult_chateau_formulaire9e7e":{"id":"Consult_chateau_formulaire9e7e","dept":"56","canton":"Guidel","commune":"Bubry","nom":"Bubry","type":"Château","periode":"XV-XIX","histoire":"A Bubry le château de Perros                                                                           PERROS,  du XVe siècle, édifié par les seigneurs de Perros (ou Penroz, Penros) et restauré au XIXe siècle. Propriété successive des familles De Perros (de 1448 à 1542), Couriault du XVIIe siècle, Quillio (en 1775). En 1789, le château est occupé par Marc Antoine Le Gouriant. Il devient ensuite la propriété de la famille Mazurier de Villeneuve, puis, de 1856 à 1942, de Louis Franchet d'Espérey (maréchal de France en 1921), puis de la famille Gastines. L'ancienne chapelle dédiée à l'Immaculée-Conception, était le siège, avant la Révolution, d'une chapellenie de la Trinité, fondée par les seigneurs du lieu. Un souterrain permet de relier le château à Persquen. Pendant la Révolution, des prêtres comme Benjamin Videlo (recteur de Bubry), Louis Videlo, Le Fellic, Le Goff, Duparc (recteur de Melrand), Le May (recteur de Guern) venaient s'y cacher ;  En 1420, le lieu appartenait à Guillaume, seigneur de Penros (Penroz ou Perros). Sa famille le conserva aux XVe et XVIe siècles. Par la suite, le manoir de Perros passa aux Couriault et en 1775 il était à M. de Quillio. En 1922, il fut acheté par le maréchal Franchet d'Esperey (1856-1942) qui aimait à y séjourner. Par la suite il passa aux Gastines par alliance. Il appartient actuellement à M. Christian et Marie-Antoinette de Gastines.","architecture":"PERROS  La chapelle dédiée à l'Immaculée-Conception, était le siège d'une chapellenie de la Trinité, fondée par les seigneurs du lieu mais elle tomba en ruine après la Révolution. Le manoir était très délabré au XIXe siècle, à l'époque où il fut restauré sobrement. C'est une belle propriété, avec un parc, un puits, des communs, etc. Elle est visible extérieurement depuis la grille qui ferme la cour, au bout d'une brève allée forestière.                                        A BUBRY, manoir de Coëtdiquel  du  XVIIe siècle ; colombier construit en 1739,  Manoir de Kéraly, 1702, pas d'information  historique pour ces deux manoirs.","habitants":"Perros, famille de Perros                                                         Kernivivnen; Famille de Rosmar\r\n        \r\n        \"","divers":"A Bubry  gps   47° 57' 52\" nord, 3° 10' 19\" ouest                                        le château de Perros grav 5-6  de Coëtdiquel gra-1-2.   Gps 47° 57' 53\" nord, 3° 11' 21\" ouest                                          Perros gps 47° 58' 42\" nord, 3° 11' 37\" ouest                             Kéraly  grav-3 Kerniven grav 4","gps":"","images":["../../jctruffet.com/image/image_56/56_Bubry_1.jpg","../../jctruffet.com/image/image_56/56_Bubry_2.jpg","../../jctruffet.com/image/image_56/56_Bubry_3.jpg","../../jctruffet.com/image/image_56/56_Bubry_4.jpg","../../jctruffet.com/image/image_56/56_Bubry_5.jpg","../../jctruffet.com/image/image_56/56_Bubry_6.jpg"]},"Consult_chateau_formulaire12ad":{"id":"Consult_chateau_formulaire12ad","dept":"56","canton":"Guer","commune":"Béganne","nom":"Béganne","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article à Béganne dont Estier (voir article ) Lehelec  et Trégouet.                                                                                                            LEHELEC,  en 1554 construction du manoir et par alliance passe à la famille le Mintier, puis au à la famille de la Touche, et  la seigneurie de Léhélec est au XVIe siècle la propriété de la famille Bocan qui y possède un petit manoir, bâti vers 1554. En 1578, Marie Bocan, dernière descendante des seigneurs de Léhélec, épouse François Le Mintier, Gouverneur de Redon. Ils habitaient alors le manoir qui existe toujours actuellement. Cest Jean Le Mintier qui a fait bâtir le château, seigneur de Léhélec, capitaine de la Cie, Gouverneur de Compiègne. La Maison Le Mintier, Maison Chevaleresque de Bretagne, par son ancienneté et le nombre de ses branches, est lune des plus importantes de la noblesse de Bretagne. Elle est originaire de Moncontour ou elle possédait de nombreuses seigneuries dont le château des Granges en Hénon qui était le berceau de la famille. C'est Thérèse Le Mintier, Marquise de Léhélec qui a créé la section des Vieilles Maisons Françaises Morbihannaise dont elle a été la Présidente durant de nombreuses années. Elle fut la première dans le Morbihan a organiser des concerts dans sa propriété et à y accueillir des visiteurs car elle considérait quil était de son devoir de contribuer à la mise en valeur du M.H.du Morbihan.","architecture":"LEHELEC, le château de Léhélec, toujours habité, offre un bel exemple darchitecture Louis XIII. Construite sur une terrasse, la demeure domine, du coté Sud, la perspective offerte par trois cours successives, bordées par des bâtiments de service datant du XVIe siècle et que vient fermer un vaste étang. Bâtis sur un niveau, les constructions coiffées de toits à la Pagode, présentent une ordonnance régulière de lucarnes Renaissances dont les frontons  alternent le triangle et le plein cintre, dont la répétition confère à lensemble son unité. Le tout était entouré autrefois de murs avec porte cochère et porte piétonne, de Marc Le Mintier de Léhélec.\r\nÉléments protégés MH : les façades et les toitures du château et des communs, la cour et les terrasses situées devant le château, l'escalier et sa rampe en fer forgé : inscription par arrêté du 4 octobre 1966.                 TREGOUET, la seigneurie de Trégouët (avec haute justice et chapelle privée) était, en 1375, à Roland de Saint Martin, écuyer d'Olivier de Clisson. Par alliance elle passe aux Chamballan, La Vallée, puis de Rieux. Vendu en 1547 aux Apuril, le château est aux Forest, Champeaux, Sécillon, et vendu nationalement à Toussaint Richard. Racheté par Mme Rado du Matz, il échoit, par alliance, aux Le Mintier de Léhélec. L'édifice actuel fut édifié au XVIe siècle par Simon Apuril, la terrasse réalisée par René de Champeaux. La chapelle a été incendiée pendant la Révolution tandis que le château abritait le quartier général de Sol de Grisolles. En février 1945, lors de la poche de Saint-Nazaire, il était occupé par une Compagnie de fusiliers-marins. Bombardé par une batterie allemande, il est totalement incendié. C'est à Gonzague Le Mintier de Léhélec que l'on doit la reconstruction actuelle, réalisée à partir de 1953. Le résultat est magnifique.","habitants":"Lehelec;  Jean Le Mintier                                                         Trégouet; famille de  Simon Apuril.\r\n        \"","divers":"à Béganne 47° 35' 49\" nord, 2° 14' 20\" ouest                              Lehelec grav1-2-3 et Trégouet grav-4-5","gps":"","images":["../../jctruffet.com/image/image_56/56_B%c3%a9ganne_1.jpg","../../jctruffet.com/image/image_56/56_B%c3%a9ganne_2.jpg","../../jctruffet.com/image/image_56/56_B%c3%a9ganne_3.jpg","../../jctruffet.com/image/image_56/56_B%c3%a9ganne_4.jpg","../../jctruffet.com/image/image_56/56_B%c3%a9ganne_5.jpg"]},"Consult_chateau_formulaire698f":{"id":"Consult_chateau_formulaire698f","dept":"56","canton":"Questembert","commune":"Caden","nom":"Caden","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Caden; celui de Berraye et de Hindreuff.                             BERRAYE; le château appartenait jadis aux Bodrual, au XVe siècle à Guillaume du Hindreuff puis à partir de 1580 aux Couëssin, qui le conservent jusqu'à la Révolution. (Jean de Couëssin fut décapité en effigie à Nantes à la suite de la conspiration de Cellamare et l'édifice fut un repère chouan à l'époque de Cadoudal). En 1815, le Morbihan avait repris les armes et Armand Bon Louis Maudet de Penhouët, propriétaire du château, prit le commandement dune division dans le corps darmée aux ordres du général de Sol de Grisolles. Il paya cher son dévouement à la cause royale, La Berraye fut pillée et les manuscrits furent déchirés. Louis XVIII le récompensa de son dévouement en le nommant Colonel de Gendarmerie. Le château actuel a été bâti aux XVIe et XVIIe siècles, puis remanié au XVIIIe siècle, La tour dangle est munie dune meurtrière. Il est habité par son propriétaire, M. Guy Rondot.","architecture":"HINDREUFF,  la seigneurie était jadis appelée le Hindreau du nom de ses propriétaires. En 1721, elle appartenait aux Gouvello avec chapelle. Sur le site de l'ancien manoir et de ses dépendances, un bâtiment est reconstruit dans la deuxième moitié du XIXe siècle. Actuellement c'est la résidence de M. René Provost, agriculteur éleveur. \r\nCorps central du logis XVIIe ou XVIIIe siècle; ailes latérales fin XIXe siècle; parties agricoles XIXe siècle; étable en 1823; intérieur du logis remanié, escalier détruit.","habitants":"Berraye; général de Sol de Grisolles                          Hindreuff; famille de Gouvello\r\n        \"","divers":"à caden  Gps 47° 37' 54\" nord, 2° 17' 11\" ouest                                                   ; celui de Berraye grav-2 et de Hindreuff grav-1.","gps":"","images":["../../jctruffet.com/image/image_56/56_Caden_1.jpg","../../jctruffet.com/image/image_56/56_Caden_2.jpg"]},"Consult_chateau_formulairedee8":{"id":"Consult_chateau_formulairedee8","dept":"56","canton":"Ploëmel","commune":"Campénéac","nom":"Campénéac","type":"Forteresse","periode":"XIV-XV","histoire":"quatre châteaux dans cet article sur Campénéac ; Quejeau, Touche-Larcher, Trécesson et Ville Aubert.                                                                                                   QUEJEAU,  anciennement dénommée Kerjeau, la seigneurie était jadis à la famille Quéjau, puis passa, par alliance, aux Desgrées en 1567. Elle appartint ensuite aux Abillan en 1619 et aux Tuault en 1769. Le château demeura dans cette famille jusqu'au début du XXe siècle. Il avait autrefois une chapelle domestique (Sainte-Anne). L'édifice construit au XVIe siècle est actuellement la propriété de Monsieur Luc de Saint Sernin, qui exploite à proximité un élevage avicole.                                                                                         TOUCHE-LARCHER,  construit sur le site d'une ancienne seigneurie; en 1826, lors de la levée du cadastre ancien, le lieu-dit est occupé par deux propriétés, dont les logis sont des maisons de peu d'envergure. En 1880, Henry Marie Joseph Annibal de Busnel achète un bâtiment et entreprend des travaux, le château paraît procéder du rhabillage et de l'agrandissement d'un corps de logis rectangulaire ancien. Corps de logis rectangulaire accosté d'une tour circulaire sur un angle et d'un pavillon saillant latéral. Ornementation néo-gothique. La seigneurie demeura aux mains des Larcher jusqu'au XVIIe siècle. Ensuite le lieu appartint aux Boscher, aux La Soullaye, aux La Corbinière, aux de France et aux Busnel.  appartient actuellement à M. Gérard de Coquereaumont.                                                                                                    VILLE-AUBERT, en 1826, le domaine appartient à la famille Dubourg ; il comprend des courtils, un verger, un bois, un étang et une maison, vraisemblablement un ancien manoir. Incendié en 1900, cet édifice a été reconstruit peu après. Le nouveau bâtiment, avec ses communs, est très proche du point de vue stylistique des travaux de l'architecte rennais Frédéric Jobbé-Duval.","architecture":"TRECESSON,  du XVe siècle. Il se compose de deux bâtiments disposés en équerre. La porte d'entrée principale, en ogive, est flanquée de deux tourelles élevées en encorbellement sur des contreforts, et reliées à la partie supérieure par un chemin de ronde à mâchicoulis, 2 tours polygonales accompagnent les autres bâtiments. La demeure est entièrement en schiste, sans aucune décoration. A l'intérieur, il existe une salle voûtée dont les murs seraient décorés de fresques. Boiseries Louis XIII et Louis XIV. Face à ces bâtiments se trouve une ferme rectangulaire auquel est adossée la chapelle. Jean, seigneur de Trécesson, vivait en 1250. Jeanne, dernière héritière de la famille, épousa en 1440 Éon de Carné, qui reprit le nom de Trécesson. C'est leur fils François qui a construit le château actuel.  La seigneurie fut érigée en comté en 1681. Le château passe ensuite aux Le Prestre de Châteaugiron en 1773. En 1793, il fut vendu à Nicolas Bourelle de Sivry et transmis dans la descen
