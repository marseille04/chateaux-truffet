, au lieu-dit « Les Forges ». En 1066, Guimont d'Ouézy combattit aux côtés de Guillaume à Hastings.  En 1650, subsistent à Canon, en direction d'Ouézy, en 1669. En 1764, de petites écoles sont attestées à Ouézy sous la baguette de maître Pierre  en 1790 : la baronnie d'Ouézy va bientôt échapper à l'abbaye de Jumièges. Elle est affermée à Jean Morière. En 1863, M. Adigard, propriétaire à Ouézy-sur-Laizon, fait don au département du Calvados d'un important fonds de parchemins illustrant l'histoire de la localité.  Dix-sept enfants d'Ouézy perdent la vie durant la première Guerre mondiale.","architecture":"BREUIL en AUGE, aux tuiles roses, se dresse fièrement au milieu d'un parc aux arbres centenaires, construit au XVIe et XVIIe siècle, il a été la propriété de grandes familles nobles qui y séjournèrent, telles les Bouquetot, les Montgomery, les Bence et le jeune Tancrède de Rohan. Le château du Breuil a été entièrement restauré par les propriétaires actuels. Aujourd'hui, le château est aussi une des plus prestigieuses distilleries du Calvados créée en 1954. Tous les jours de l'année, il offre à ses visiteurs des visites guidées et une dégustation de vieux Calvados. Éléments protégés MH : les façades et les toitures du corps de logis et des dépendances, la porte d'entrée, les douves : inscription par arrêté du 9 septembre 1933.                                                                                             CAUVIGNY, édifice à un étage carré, étage de comble, étage de soubassement, avec escalier dans-oeuvre, escalier tournant, en calcaire, moellon, enduit et couverture: toit à longs pans, croupe. Douves et canal figurés sur le cadastre de 1810 détruits. Manoir du XVIe siècle. complètement transformé à la fin du XVIIIe siècle. construit en colombage. Forme avec ses bâtiments un ensemble cohérent d'une exploitation normande du Pays d'Auge.","habitants":"Cauvigny;  famille de Corday                                                Ouiezy;  M. Adigard                                                                      Breuil ; famille de Montgomery\r\n        \r\n        \"","divers":"Trois édifice dans cet article; Breuil grav-1, Magny la Campagne grav-3, Ouezy grav-4, Cauvigny grav 2 .                                       GPS : 49° 04' 25\" Nord, 0° 04' 12\" Ouest                                                             Magny GPS : 49° 02' 59\" Nord, 0° 06' 09\" Ouest","gps":"49° 04' 25\" Nord, 0° 04' 12\" Ouest","images":["../image/image_14/14_M%c3%a9zidon_Canon_II_1.jpg","../image/image_14/14_M%c3%a9zidon_Canon_II_2.jpg","../image/image_14/14_M%c3%a9zidon_Canon_II_3.jpg","../image/image_14/14_M%c3%a9zidon_Canon_II_4.jpg"]},"Consult_chateau_formulaire06e0":{"id":"Consult_chateau_formulaire06e0","dept":"14","canton":"Trévières","commune":"Neuilly la Forêt","nom":"Neuilly_la_Forèt","type":"Manoir","periode":"XIV-XVI","histoire":"NEUILLY LA FORET, ancienne résidence des évêques de Bayeux dès la fin du XIe siècle, forteresse à l'origine, résidence épiscopale aux XIIe et XIIIe siècles, occupée au début du XVe siècle par les anglais. L'édifice appartient initialement aux évêques de Bayeux au XIe siècle, comme résidence rurale ou lieu de repli lors des périodes de troubles. Le château a appartenu à Odon. Après une première tentative infructueuse au printemps 1343, Geoffroy d'Harcourt prend et incendie l'édifice en 1346. L'éfifice fait l'objet de plusieurs sièges de la part des forces militaires anglaises durant la Guerre de Cent Ans, qui l'occupent au XVe siècle puis subit également de nouvelles dégradations pendant les Guerres de Religion. L'évêque de Bayeux François de Nesmond est le dernier prélat à l'occuper au début du XVIIIe siècle. L'édifice est vendu aux enchères comme bien national en 1791, et subit encore de graves prédations au milieu du XIXe siècle. L'évêque Pierre de Villaines y meurt le 3 septembre 1360. Son corps y reste 70 ans car l'intéressé n'avait pas payé les anates au pape.","architecture":"NEUILLY,  date du XII, XIIIe au XIVe et au XVIe siècle. Il est d'architecture normande. L'édifice a conservé des éléments romans et gothiques, croisées, arcades et baies. Le château de Neuilly est implanté sur un site stratégique cumulant les intérêts économiques et son rôle défensif. C'était une forteresse à l'origine. Elle devint la résidence épiscopale aux XIIe et XIIIe siècles, puis fut occupée au début du XVe siècle par les Anglais. Le château de Neuilly-la-Forêt a conservé des éléments architecturaux datant de l'époque romane et du début de l'ère gothique dont une grande croisée à lancette et les arcades d'une ancienne tour du logis, des baies gothiques de la chapelle. La grange a également conservé ses dispositions du XIVe siècle, avec ses grandes arcades de la façade. D'autres vestiges affleurent au sol : les anciennes tours, les courtines, les galets de la haute cour, etc. Le site constitue une réserve archéologique de grande valeur pour l'architecture civile médiévale. Éléments protégés MH : les façades et les toitures du logis, avec les vestiges intérieurs du logis médiéval (arcades, baies, escalier), les façades et les toitures de la chapelle, les façades et les toitures de la grange : le château de Neuilly-la-Forêt est inscrit aux M.H. depuis le 9/11/1999.","habitants":"Geoffroy d'Harcourt \r\n        \"","divers":"Château de Neuilly_la_Forêt","gps":"","images":["../image/image_14/14_Neuilly_la_For%c3%a8t_1.jpg","../image/image_14/14_Neuilly_la_For%c3%a8t_2.jpg","../image/image_14/14_Neuilly_la_For%c3%a8t_3.jpg","../image/image_14/14_Neuilly_la_For%c3%a8t_4.jpg"]},"Consult_chateau_formulaire8e55":{"id":"Consult_chateau_formulaire8e55","dept":"14","canton":"Bayeux","commune":"Tracy-sur-Mer","nom":"Noé_Tracy","type":"Château","periode":"XVIII-XIX","histoire":"La NOE, paroisse mentionnée en 1243 ; le bourg renferme les bâtiments les plus anciens :  fermes du XVIe et du XVIIe siècle ; les autres hameaux : la Croix de l'An et la Noë, la Rosière et le Gouley ne présentent pas de vestiges antérieurs au XVIIIe siècle; en 1860 1870 création et développement rapide du hameau de la Brèche. Fief de Tracy dépendant de celui de Magny-en-Bessin, acquis de Nicolas Joseph Foucault par Pierre Gaucher, sieur de La Noë vers 1742 .                                                                                                    ARROMANCHES- château de  PETIT-FONTAINE   En bord de mer, village existant au XIIe siècle (témoin l'architecture de l'ancienne église). Au XVIIIe siècle,  à cette époque existent deux agglomérations, l'une de pêcheurs en bord de mer, l'autre avec quelques agriculteurs et surtout des pêcheurs autour de l'église. Première moitié du XIXe siècle, développement de l'activité de la pêche et naissance de la station balnéaire dans le deuxième quart du siècle : agrandissement des deux agglomérations et à partir de 1854 construction des quais, de la Grande et de la Petite Cale. A partir des années 1860, développement de la station balnéaire et édifications de villas : extension de tous côtés et jonction des deux agglomérations.","architecture":"La NOE et les deux fermes l'encadrant sont construites à la suite de cet achat : le portail de la ferme nord porte la date 1761; ensemble restauré en 1890 pour le baron Delort de Gléon, aménagement de la remise deux, fontaine du jardin portant ses armoiries, disparition de la grande allée transversale et de deux portails à fossés la barrant de part et d'autre de la ferme nord, décor architectural peut-être réalisé à cette époque. Le salon est décoré de sculptures animalières en bois peint ornant les lambris du XVIIIe siècle.\r\nÉléments protégés MH : le logis, y compris son décor intérieur, les façades et les toitures des communs du château, les façades et les toitures des bâtiments anciens de la ferme de La Grande Noë, la grange avec son porche, la maison d'habitation, la charretterie, le parc avec ses sauts-de-loup et sa douve : inscription par arrêté du 11 mai 1994. Le salon Frémiet : classement par arrêté du 20 octobre 1995.                                                              ARROMANCHES-PETIT-FONTAINE,  a été édifié à la fin du XVIIIe siècle. Communs construits dans la deuxième moitié du XIXe siècle. Charretterie de la ferme élevée  au XVIIe siècle. Autres corps de la ferme bâtis au XVIIIe siècle, aile droite portant la date 1764. Logis allongé à l'est de deux travées par l'architecte Jacquelin, vers 1920-1930, témoignage oral. Corps de logis en moellon enduit, à un étage, couvert d'un toit à croupes, façades sud et nord ordonnancées avant l'allongement; ferme en U dans l'axe du corps de logis principal, édifiée en moellon, couverte de toits à longs pans avec pignons couverts et découverts, contenant un pigeonnier en corniche et charretterie, communs construits en moellon avec chaînes d'angle en brique, couverts de toits à longs pans avec pignons couverts.","habitants":"Noé;  Nicolas Joseph Foucault\r\n        \r\n        \"","divers":"Châteaux Petit_Fontaine à Arromanches gra-1-2                                        Château  de la Noé Tracy, grav -3-4                                    GPS : 49° 20' 00\" Nord, 0° 38' 13\" Ouest","gps":"49° 20' 00\" Nord, 0° 38' 13\" Ouest","images":["../image/image_14/14_No%c3%a9_Tracy_1.jpg","../image/image_14/14_No%c3%a9_Tracy_2.jpg","../image/image_14/14_No%c3%a9_Tracy_3.jpg","../image/image_14/14_No%c3%a9_Tracy_4.jpg"]},"Consult_chateau_formulaire7979":{"id":"Consult_chateau_formulaire7979","dept":"14","canton":"Livarot","commune":"L","nom":"Oudon_Calvados","type":"Château","periode":"XV-XVI-XVII","histoire":"Deux châteaux à Oudon, Robillard et la Roque.                           ROBILLARD, le château du Robillard est une construction commanditée pour le maréchal de Montesquiou, comte dArtagnan, situé entre pays dAuge et plaine de Caen,   Il fut construit vers 1654 par la famille LHermite et il abrita le maréchal de Montesquiou dArtagnan, cousin du fameux héros dAlexandre Dumas. Mort en 1725, sans héritiers. Son épouse, Catherine-Elisabeth de LHermite dHiéville, issue dune ancienne famille de la contrée, meurt quelques années après, et les terres du Robillard sont cédées à la famille dInfreville, puis propriété de Frank Jay Gould. L'édifice de style Louis XIII est devenu le premier lycée agricole français en 1962, sur l'emplacement probable d'un ancien domaine médiévial avec des douves qui contrôlait le passage de Gronde. d'Auge, confié aux bons soins du Conseil Régional Basse Normandie, il offre un ensemble harmonieux qui continue à évoluer et à répondre à ses nombreuses missions. Aujourd'hui il est occupé par le lycée agricole départemental.","architecture":"la ROQUE, se situe sur le territoire de la commune de Saint-Pierre-en-Augen, à la frontière entre les régions naturelles du pays d'Auge et de la campagne de Falaise. Il s'élève au sud de l'Aubette (petit ruisseau qui se jette dans L'Oudon à environ un kilomètre à l'ouest,  L'édifice a été construit à l'emplacement du château fortifié des seigneurs de Montpinçon dont la motte castrale et une partie des fossés sont encore visible.  Le logis seigneurial, qui occupe la partie sud de la cour, date du XVIe siècle. Construit en grande partie en pans de bois, il s'élève sur deux niveaux et présente une symétrie très travaillée. Sur la façade principale, les colombages sont essentiellement verticaux et les entre colombages sont faits d'un hourdis couvert de mortier de chaux. À l'inverse, la façade arrière présente un aspect différent car elle est intégralement recouverte d'ardoises. Le toit est à quatre versants, couvert de vieilles tuiles, il se trouve encadré par deux imposantes cheminées et  du côté de la façade principale, il est orné de deux petites lucarnes.  Le logis seigneurial est discrètement prolongé, vers l'est, par un bâtiment à l'architecture identique. Celui-ci, légèrement en retrait et moins haut que le corps principal du logis, est, en réalité, l'édifice d'origine dont le niveau inférieur remonte au XVe siècle. Il date en partie de la fin du XVe siècle puis a été agrandi et remanié aux deux siècles suivants. Au XVIe siècle, le propriétaire des lieux était un Marguerie. Au début du XVIIIe siècle, Françoise de Marguerie épousa Omer de la Roque qui donna son nom au manoir.","habitants":"Famille LHermite 'et de   Frank Jay Gould\r\n        \r\n        \"","divers":"Deux châteaux à Oudon, Robillard grav 2-3-4 et la Roque grav-1.","gps":"","images":["../image/image_14/14_Oudon_Calvados_1.jpg","../image/image_14/14_Oudon_Calvados_2.jpg","../image/image_14/14_Oudon_Calvados_3.jpg","../image/image_14/14_Oudon_Calvados_4.jpg"]},"Consult_chateau_formulaire080b":{"id":"Consult_chateau_formulaire080b","dept":"14","canton":"Thury-Harcourt","commune":"Gouvix","nom":"Outrelaise","type":"Château","periode":"XVII","histoire":"OUTRELAISE, fief acquit à monsieur d'Outrelaize en 1569 par Gaspard le Marchant  qui décédera en en 1621 le château est  construit par M. Le Bourgeois, architecte à Lisieux, pour Gaspard le Marchand de 1584 à 1604.  le domaine passe à son neveu Pierre le Marchant seigneur de St-Mauvieu, passe ensuite aux Blondel   de Tilly et par alliance aux Le Petit d'Aveine, en 1754 Marie-Thérése le Petit d'Aveine  l'apporte par alliance à Yves de la Boissière comtes de Chambors. celui-ci meurt accidentellement lors d'une partie de chasse avec le fils de Louis XV,  la comtesse de Chambors veuve Au XVIIIe siècle effectues  des aménagements intérieurs, le domaine échoit à sa petite fille  qui épouse le comte  Héracle de Polignac exécute, entre 1822 et 1827 avec les paysagistes Châtelain frères, le parc à l'anglaise qui modifie celui du XVIIIe siècle et une reprise de l'ancien logis achève les rénovations de l'édifice en 1894 au XXe siècle le domaine entre dans la famille  de Sainte-Aldegonde, aux Champagne de Bouzey, et à la famille d'Olliamson  et acquis par M.Jean-Luc Mennesson.","architecture":"OUTRELAISE, deux corps de logis placé en équerre  avec pavillons central à trois niveaux toit à l'impérial avec clocheton, l'ensemble à deux niveaux, toit en croupes recouvert de  tuiles. l'autre bâtiment style gentilhommière à deux niveaux décalés avec retour en équerre toit en croupe recouvert d'ardoises.  Eléments protégés MH : la façade nord et la toiture correspondante de l'aile Henri IV, le grand salon, son décor, la rampe d'escalier dans le bâtiment principal : vestiges: pavillon d'entrée, colombier, ainsi que les ailes sud et du logis datant milieu XVIIIe siècle. L'édifice d'origine subit des modifications considérables entre 1584 et 1620. Le vieux manoir est restauré, une galerie de circulation est ajoutée perpendiculairement pour relier le logis à un pavillon d'angle. Un pavillon d'entrée est crée. Au XVIIIe siècle, un parc à la française agrémente le site et les distributions intérieures sont revues au goût du jour  inscription par arrêté du 18 octobre 1971. Les façades et les toitures du bâtiment principal et la cheminée de la bibliothèque au rez-de-chaussée, le décor de poutraison des chambres du premier étage de l'aile Henri IV, ainsi que les éléments de décor de l'ancienne chapelle,  le parc, en totalité, comprenant l'allée d'accès plantée, l'obélisque de la forêt et les huit allées rayonnantes, les murs de soutènement, les ponts, la grotte artificielle, l'ensemble des aménagements hydrauliques, y compris la pièce d'eau et le lavoir : inscription par arrêté du 29 mars 2005. Le pavillon d'entrée en totalité, ainsi que les façades et les toitures de ses deux ailes, le colombier en totalité : classement par arrêté du 23 mai 2005.","habitants":"Pierre le Marchant \r\n        \"","divers":"Château  d'Outrelaise grav 1à 7","gps":"","images":["../image/image_14/14_Outrelaise_1.jpg","../image/image_14/14_Outrelaise_2.jpg","../image/image_14/14_Outrelaise_3.jpg","../image/image_14/14_Outrelaise_4.jpg","../image/image_14/14_Outrelaise_5.jpg","../image/image_14/14_Outrelaise_6.jpg","../image/image_14/14_Outrelaise_7.jpg"]},"Consult_chateau_formulairebd16":{"id":"Consult_chateau_formulairebd16","dept":"14","canton":"Pont-l","commune":"Le Pin","nom":"Pin_Calvados","type":"Château","periode":"XVI-XVII","histoire":"PIN, cest  la famille Achard, propriétaire des terres sous lancien régime, qui fait construire une demeure seigneuriale au XVIIe siècle. A lorée des années 2000, un nouveau propriétaire entreprend de restaurer le parc. Le château date du XVIIe siècle-XVIIIe siècle,  la construction a débuté vers 1620 pour François Achard, gentilhomme de la Chambre du Roi et son épouse Madeleine de Mailloc. La famille Le Conte de Nonant possède le domaine pendant trois siècles à partir de la fin du XVIIe siècle. Les deux pavillons de l'entrée du domaine sont datés pour leur part du XVIIIe siècle, l'un sert de chapelle, l'autre d'écurie. Jules-Basile Ferron de La Ferronnays, dernier évêque de Lisieux, y trouve refuge en 1791.","architecture":"PIN, en 1445, le château possède sa physionomie actuelle. Il se compose d'un donjon rectangulaire, d'un corps de bâtiment et d'une courtine pentagonale flanquée de tours demi-circulaires protégeant une cour intérieure, le bourg fortifié et la basse-cour sont abandonnés au milieu du XVIIe siècle. Le corps de logis, avec deux pavillons formant ailes, est bâti en briques chaînées de pierres calcaires. Deux petits bâtiments à usage de communs forment deux ailes séparées de chaque côté de la cour dhonneur. En face, la perspective se prolonge vers louest. Au sud du domaine, au carrefour de la route de Blangy-le-Château, une hêtraie marque lentrée de la propriété. Ces deux hêtraies, peu fréquentes en Pays dAuge, sont classées parmi les sites en novembre 1943. A cette époque, les arbres, qui sont alors âgés de 200 ans, sont lobjet de convoitises pour servir de bois de chauffage. Arrivés à maturité, ils sont abattus en 1980.  Devant le château, une longue perspective souvre dans le prolongement de lallée dhonneur encadrée de deux alignements. Toute la perspective présente la même unité mais seule la moitié de sa longueur est protégée (la plus proche du château). Le pigeonnier, tout comme le château, est construit en briques et pierres. Il est bâti sur une base octogonale. Les angles sont en briques.","habitants":"famille Achard et famille Le Conte de Nonant\r\n        \"","divers":"Château de le Pin  gps 49° 13' 14\" nord, 0° 19' 42\" est","gps":"","images":["../image/image_14/14_Pin_Calvados_1.jpg","../image/image_14/14_Pin_Calvados_2.jpg"]},"Consult_chateau_formulairef24a":{"id":"Consult_chateau_formulairef24a","dept":"14","canton":"Pont L","commune":"Pont L","nom":"Pont_Lévèque","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Pont-l'Evêque; Betteville et Montpensier.     BETTEVILLE   il accueille dans ses murs le musée de l'Automobile se situe à la sortie de Pont-l'Évêque, face au plan d'eau. Les 100 véhicules anciens du Musée sont présentés dans d'anciennes dépendances du château. Les dépendances ont été construites entre le XIIe et XVIIe siècle. Diverses collections sont exposées dont 5 000 modèles réduits de voitures, et différents costumes, provenant du monde entier mis dans les salons du château. Endettée, lassociation aurait finalement dû abandonner les lieux pour sinstaller à Caen. Cest la famille dun garagiste, Michel Dubec, passionné par les voitures de collections, qui reprend alors la propriété, en 1985. « Lendroit était magique, confie Bruno Dubec, fils de Michel Dubec. Mon père était simplement garagiste, on a fait tout ça avec nos bras et nos sous. » Souvre alors le musée La belle époque de lautomobile de Pont lEvêque, dans lancienne ferme à côté du château.  Selon plusieurs sources, cest un émir dArabie Saoudite, lié à la famille Al Thani  émir du Qatar et propriétaire du PSG (Paris Saint-Germain football-club)  qui serait lactuel propriétaire du domaine de Betteville.","architecture":"MONTPENSIER, cet hôtel particulier fut construit en 1624, par Nicolas Chéron, sieur Du Fresnay, juge au tribunal financier. Le 30 décembre 1710, la maison était vendue par contrat notarié à Isaac Joseph Chauffer, conseiller du roi, receveur des tailles en lélection de Pont-lEvêque. La Révolution dispersa cette famille et le bâtiment du Fresnay fut abandonné par ses possesseurs. Pierre Le Cordier de la Porte  conservateur des hypothèques en devient le propriétaire en 1837, suite à une annonce parue dans la presse. Cette dernière stipulait que l'hôtel avait été bâti pour servir de pied-à-terre à la duchesse de Montpensier. Le nom est resté, certes, mais cette histoire est inventée de toute pièce par le notaire chargé de la vente. Il est remarquable par lélégance de son architecture, mélange de pierres et de briques. Sa façade assymétrique comporte un décor en damier typique de la région à la Renaissance, qui met en valeur la polychromie. Le petit porche au toit dardoises, avec son auvent à 3 pans de tuiles rappelle le bâti régional et lecture plutôt verticale (caractéristique du gothique), en témoigne la présence de 2 ailes en retour aux toits effilés. Les façades côté cour et côté jardin sont totalement différentes.  La construction de l'Hôtel Montpensier date du XVIIe siècle. C'est devenu un musée et une bibliothèque. L'Hôtel  est inscrit aux M.H. depuis le 24/04/1926. Il est ouvert au public et se visite. En août 1944, un incendie ravage l'édifice. Il sera reconstruit dans son gros oeuvre ; il accueille désormais la bibliothèque intercommunale.","habitants":"Michel Dubec\r\n        \r\n        \"","divers":"Château à Pont-L'évêque Betteville grav_3_4 et Montpensier grav _1_2                                                                                  Glanville grav-5-6  GPS : 49° 16' 18,41\" Nord, 0° 11' 43,57\" Est                                                                                  Montpensier GPS : 49° 17' 07,8\" Nord, 0° 11' 4,56\" Est","gps":"49° 16' 18,41\" Nord, 0° 11' 43,57\" Est","images":["../image/image_14/14_Pont_L%c3%a9v%c3%a8que_1.jpg","../image/image_14/14_Pont_L%c3%a9v%c3%a8que_2.jpg","../image/image_14/14_Pont_L%c3%a9v%c3%a8que_3.jpg","../image/image_14/14_Pont_L%c3%a9v%c3%a8que_4.jpg","../image/image_14/14_Pont_L%c3%a9v%c3%a8que_5.jpg","../image/image_14/14_Pont_L%c3%a9v%c3%a8que_6.jpg"]},"Consult_chateau_formulaire9e90":{"id":"Consult_chateau_formulaire9e90","dept":"14","canton":"Condé-sur-Noireau","commune":"Pontecoulant","nom":"Pontécoulant","type":"Château","periode":"XIV-XVI","histoire":"PONTECOULANT, au XIVe siècle, une maison forte est bâtie sur une ancienne motte féodale dans la vallée de la Druance. La place appartient à Jean Doulcet, seigneur du quart de fief de Pontécoulant. Ce premier logis est sans doute reconstruit après sa destruction par les protestants, en 1562 (partie sud du château actuel). Il est accompagné, au nord, par un édifice plus bas.  Le château est de nouveau agrandi et réaménagé vers 1777 pour devenir la résidence dété de la famille Doulcet de Pontécoulant qui vit alors à Caen et à Paris.  Madame de Barrère dernière descendante de cette famille le Légua en 1908 au  conseil général, en 1940-1944  occupation par les Allemands.","architecture":"PONTECOULANT, dans laxe du château, au pied du colombier perché sur une colline, la vue plongeante sur le parc et le château est superbe. Les deux pavillons du jardinier et du garde-chasse, carrés et massifs, se dressent près de lentrée, à chaque angle. Ils sont reliés par une fausse douve.  Au début du XVIIe siècle, des travaux d'agrandissement sont entrepris avec le prolongement de la façade et la construction de deux pavillons en retour dangle à larrière. La tour nord-est est bâtie pour faire pendant à lancienne tour descalier conservée. La façade Est est entièrement reconstruite ainsi que les deux pavillons, logements du jardinier et du garde-chasse, qui marquent lentrée du domaine.  Le colombier, dans laxe du château, est érigé selon les mêmes proportions. Les trois tours reçoivent une couverture identique en dôme. Au bout de lallée, le château trône en majesté, solide construction asymétrique de schiste et de granit coiffée dardoises.  Depuis sa création, les ambiances du parc paysager ont été estompées par le temps et la croissance des végétaux puis effacées par limpact de la tempête de 1999. Une étude paysagère en 2001, a permis détablir un projet de restauration et de mise en valeur de lensemble du domaine. Si la mise en valeur du parc se poursuit encore, il a déjà retrouvé tout lesprit romantique quil possédait jadis.  Si la tempête a été une véritable catastrophe, elle a néanmoins permis (sans doute un peu brutalement) dentreprendre des travaux jusquici reportés, avec des lignes directrices restituant lesprit du parc tel quil a été défini par le comte Louis-Gustave.  Au sud du site, létang de 1960, sest peu à peu comblé.","habitants":"Famille Doulcet de Pontécoulant \r\n        \"","divers":"Château de Pontécoulant  gps 48° 52' 42\" nord, 0° 35' 17\" ouest","gps":"","images":["../image/image_14/14_Pont%c3%a9coulant_1.jpg","../image/image_14/14_Pont%c3%a9coulant_2.jpg","../image/image_14/14_Pont%c3%a9coulant_3.jpg"]},"Consult_chateau_formulaired239":{"id":"Consult_chateau_formulaired239","dept":"14","canton":"Bayeux","commune":"Port-en-Bessin-Huppain","nom":"Port_Bessin","type":"Château","periode":"XV-XVI-XVIII","histoire":"trois châteaux à Port en Bessin; Chenevrière, Maisons et Villiers.                                                                                                            CHENEVIERE, le manoir seigneurial et une léproserie. Première moitié du XIXe siècle, développement d'une petite station balnéaire ; stoppé à partir de 1845 par la construction de l'avant-port qui fait disparaître la plus grande partie de la plage. L'âme d'une vieille famille du XVIIIe siècle habite ce délicieux château de la Chenevière. Tout d'abord manoir et exploitation agricole importante, le bâtiment d'origine subit des travaux d'amélioration dès la fin du XIXe siècle, un étage est ajouté ainsi que les balcons en bois et la véranda (aujourd'hui disparus). Pendant la deuxième guerre mondiale,  est occupé par les Allemands et ensuite par les Alliés après le débarquement de juin 1944. Entièrement restauré en 1988 par madame et monsieur  Dicker, le château devient un hôtel restaurant de charme, aujourd'hui à la famille Esprabens.                                                                                                                              A 3 K.M.au sud  le château de MAISONS Lorigine est avérée au XVe siècle. Il nen subsiste aujourdhui quune tour carrée au mur à damier. Cette tour domine la façade qui donne sur le plan deau. Le château dans sa forme actuelle date principalement du XVIIe siècle. Souvent appelée « Demeure au miroir », elle se signale par son architecture régulière et symétrique. Au XVIIIe siècle il appartient au marquis Bazin de Bezons. Son gendre, le marquis de Nettancourt en devient ensuite le propriétaire. En 1884, le baron Gérard y fera quelques aménagement avant quil passe dans la famille dHarcourt. Pendant loccupation, le château est le siège de létat major allemand du secteur côtier. Il est libéré le 8 juin 1944. Propriété du comte d'Harcourt.","architecture":"Au Nord en bord de mer PORT EN BESSIN du XIII au XVIe siècle; corps de logis centrale à deux niveaux flanqués  pavillons d'entrées saillant à toit à l'impérial, l'édifice est accolé de deux gros pavillons carrées aux extrémités de trois niveaux, toits à l'impérial toutes les fenêtres son sommet de fronton ainsi que les lucarnes sur combles.                                   SULLY a deux K.M à l'ouest de Bayeux hôtel de luxe du XVIIIe siècle. VILLIERS SUR PORT, construit pour les Villiers, puissante famille du Bessin du XIIe au XVIe siècle. Au XIIe ou début XIIIe siècle, édification de la porte de la cour du XIIIe siècle, du corps la jouxtant à l'est, du XIVe siècle, du corps ouest, fin XVe ou début XVIe siècle construction du corps de logis sud, de la tour sur l'angle sud-est, de la tour d'escalier et de la tourelle des latrines, et aménagement d'un étage dans le corps du XIVe siècle, un peu plus tard dans le XVIe siècle ouverture d'une fenêtre à l'étage sur la façade sud du logis, château transformé en ferme dès le XVIIIe siècle, au début du XIXe siècle, avant le cadastre de 1823, remaniement du bâtiment du XIIIe siècle, comblement d'une grande partie des douves et ouverture de la porte fenêtre au rez-de-chaussée de la façade sud du logis, adjonction d'un bâtiment en appentis contre la façade nord, reconstruction des bâtiments au nord et à l'est de la cour et des corps entourant la basse-cour,  hangar construit récemment. Façade sud du corps de logis, tour d'angle et tourelle des latrines en pierre de taille, tour d'angle couverte d'un toit conique en pierre, tourelle des latrines d'un toit à demi pavillon en pierre, toits en bâtière sur la tour et la tourelle de l'escalier.  Éléments protégés MH : le château de Villiers-sur-Port,  inscription par arrêté du 2 juillet 1927.","habitants":"Famille Dicker                                                                                         famille dHarcourt                                                                    Famille de  Villiers\r\n        \"","divers":"trois châteaux à Port en Bessin; Chenevrière grav-3-4, Maisons_Grav-1-2 et Villiers sur Port Huppain  grav 5-6.  Tour Vauban grav-7       \r\nVilliers gps 49° 20' 18\" N, 0° 47' 09\" Ouest.","gps":"","images":["../image/image_14/14_Port_Bessin_1.jpg","../image/image_14/14_Port_Bessin_2.jpg","../image/image_14/14_Port_Bessin_3.jpg","../image/image_14/14_Port_Bessin_4.jpg","../image/image_14/14_Port_Bessin_5.jpg","../image/image_14/14_Port_Bessin_6.jpg","../image/image_14/14_Port_Bessin_7.jpg"]},"Consult_chateau_formulaireefb3":{"id":"Consult_chateau_formulaireefb3","dept":"14","canton":"Livarot","commune":"Préaux st-Sebastien","nom":"Préaux_st_Sebastien","type":"Manoir","periode":"XVII","histoire":"Deux châteaux dans cet article; Cauvinière et Préaux.                        CAUVINIERE, manoir XVIe siècle, bâtie en équerre, deux pavillons, façades, douves.                                                                                                                PREAUX -St-SEBASTIEN, date du XVIe au XVIIIe siècle., comporte un corps de logis date du règne de Louis XV. Arcisse de Caumont évoque le XVIe siècle pour les tourelles. L'édifice est composé d'un corps d'habitation du XVIIIe siècle et de deux tours cylindriques du XVIIe siècle, sur le pignon Nord. Les dépendances comprennent un pigeonnier monumental. Propriété de M. Y. Lucas.","architecture":"PREAUX-St-SEBASTIEN,  évoque le XVIe siècle pour les tourelles. Dautres sources évoquent pour les tours cylindriques une construction au XVIIe siècle. Arcisse de Caumont évoque un ancien statut de prieuré pour lédifice du fait du nom local. La Moinerie donnée par les habitants aux lieux. C'est un haras, le château de Préaux est une construction rectangulaire avec tours d'angle. La partie la plus ancienne, construite au XVIe siècle, appartenait aux Baudouin; la partie centrale, ornée d'un fronton classique, fut construite par les Le Bas seigneurs de Préaux aux XVIIe et XVIIIe siècles, cette famille a joué un rôle important dans la région de Lisieux. Le colombier présente harmonieusement l'utilisation décorative des matériaux.  Éléments protégés MH : le château en totalité : inscription par arrêté du 7 novembre 1927.","habitants":"Préaux de M. Y. Lucas                                                                               Famille des  Baudouin\r\n        \r\n        \"","divers":"Deux châteaux dans cet article; Cauvinière grav 4 et Préaux.                       Préaux GPS : 48° 59' 12\" Nord, 0° 18' 24,89\" Est                                                           Cauvinière gps  49° 00' 20\" N, 0° 17' 41\" Est","gps":"48° 59' 12\" Nord, 0° 18' 24,89\" Est","images":["../image/image_14/14_Pr%c3%a9aux_st_S%c3%a9bastien_1.jpg","../image/image_14/14_Pr%c3%a9aux_st_S%c3%a9bastien_2.jpg","../image/image_14/14_Pr%c3%a9aux_st_S%c3%a9bastien_3.jpg","../image/image_14/14_Pr%c3%a9aux_st_S%c3%a9bastien_4.jpg"]},"Consult_chateau_formulaire97d4":{"id":"Consult_chateau_formulaire97d4","dept":"14","canton":"Thury-Harcourt","commune":"Bretteville","nom":"Quilly","type":"Château","periode":"XIII-XIV-XIX","histoire":"Deux châteaux dans cet article Riflets et Quilly.                               RIFLETS,  les Bateste propriétaire du fief depuis le XIIIe siècle font rebâtir au XVe siècle qui passe  par alliance aux Le Verrier , aux Sallet puis aux Moucel, marquis de Torcy, avant de devenir par héritage de sa belle-mère à la duchesse  de FItz-James veuve du dernier marquis de Torcy.  Au décès de la duchesse en 1862, le domaine de Quilly vendu par licitation, est  acquis par Pauline Madeleine Ximenès comtesse de Helfenstein, fille naturelle du prince Paul de Wurtemberg, nièce du roi Guillaume Ier et par alliance de Jérôme Bonaparte ancien roi de Westphalie. Cette grande Dame est depuis 1843 l'épouse de Rodolphe-Auguste comte de Montessuy se délaisant du château madame de Montessuy  fait rebâtir au XIXe siècle le château de Riflets, à son décès ses héritiers  les Botherel et aujourd'hui à la famille de Cantel qui l'on transformé en chambres d'hôtes, classé aux M.H., le site témoigne d'un passé historique important.                                                                                                            QUILLY, appartient à la famille de Bateste depuis la fin du XIVe siècle. Au cours des siècles, le fief de Quilly se transmet par alliance puis par ventes à différents propriétaires. Un parc clos de murs entoure les constructions au sud-ouest. Du reste, lintérieur en a été négligé, ainsi que les habitations où les propriétaires ne résident plus depuis longtemps. Les bâtiments ont tous été transformés en ferme.  Dans cette seconde moitié du XIXe siècle, la comtesse de Montessuy décide dy construire une belle demeure, dominant la vallée de Bretteville. Le hameau de Quilly et le bois des Riffets sont classés parmi les sites en janvier 1942.","architecture":"RIFLETS, se compose d'un corps de logis central à trois niveaux dont un sous combles avec série de lucarnes, qu'accostent deux pavillons en légère saillie côté cour. La façade perron à balustrade. Le château des Riffets est invisible, masqué par la végétation de son parc qui occupe le flanc du vallon. Propriété privée, il accueille aujourdhui des chambres dhôtes et se remet lentement des dégâts provoqués par la tempête de 1999.                                                                                                                            QUILLY, le pavillon, le petit corps de logis en retour d'équerre et les deux tourelles sont classés au titre de monuments historiques depuis le 22 janvier 1922, les bâtiments du XVIIe siècle comprenant le bâtiment en équerre sur le pavillon et l'habitation de fermier avec une rampe d'escalier extérieur en fer forgé sont classés depuis le 31 mai 1927, les façades et toitures de tous les bâtiments, le petit cabinet orné de boiseries au premier étage du pavillon du fermier, le portail et les murs de clôture couronnés de balustres à l'entrée de la cour et le pressoir et le broyeur du XVIIe siècle dans les bâtiments sud-ouest sont classés depuis le 14 juin 1946. Propriété du comte du Chesne.  Au début du XVIIe siècle, le logis est complété par un pressoir charretterie et un portail encadré dun mur à balustrade. La ferme, construite au XVIIIe siècle, vient fermer la cour dun ensemble déjà voué à lagriculture. A louest, la rue de la Dîme grimpe en pente raide en longeant prairies et champs cultivés. La rue derrière le parc marque la limite ouest des terres de Quilly.","habitants":"Riflets; Pauline-Madeleine Ximenès                                                Quilly  famille de Bateste\r\n        \"","divers":"Château de Quilly grav-3   et de Rifflets grav-1  à Bretteville grav -2-3\r\ngps 49° 02' 59\" Nord, 0° 18' 56\" Ouest","gps":"","images":["../image/image_14/14_Quilly_1.jpg","../image/image_14/14_Quilly_2.jpg","../image/image_14/14_Quilly_3.jpg"]},"Consult_chateau_formulairebc02":{"id":"Consult_chateau_formulairebc02","dept":"14","canton":"Bretteville-l","commune":"Reviers","nom":"Reviers","type":"Château","periode":"XIX","histoire":"REVIERS, du XIXe siècle, aurait été construit à l'emplacement d'une motte féodale qui aurait appartenu aux seigneurs de Reviers. Au fil des siècles les descendants de ces seigneurs auraient transformé l'édifice en manoir. Le nouveau seigneur, Henry Carbonnel de Canisy, laissa dépérir la demeure qu'il n'habita jamais et fit transporter au château de Fontaine-Henry, son lieu de résidence, une superbe rampe en fer forgé et une collection d'armes du XIVe siècle. En 1875, son héritier Henry de Canisy après avoir fait de grandes améliorations au château vend celui-ci ainsi que la grande ferme à M. Albert Michel, négociant à Couceulles. Ce dernier le cède à un anglais en 1919, il est aujourd'hui le siège de la communauté des communes d'Orival, abrite un centre de loisirs.","architecture":"REVIERS, date de 1918. Il abrite aujourd'hui la communauté de communes, Action Théâtre, Vert Lézard et l'Aéromodel club. Le château de Reviers près de Courseulles-sur-Mer,  a été mis en vente  par la communauté de communes.  Nous nen avions plus lutilité puisque tous les services ont déménagé à Creully fin septembre. Des parties du château avaient été aménagées pour en faire des bureaux pour la communauté de communes. «Il a été acquis en 1996 par la communauté de communes Amblie-Bény-sur-Mer-Fontaine-Henry, Reviers, devenue Orival puis Seulles terre et mer. Dimportants travaux de restauration sont à prévoir. Un compromis pourrait bientôt être signé avec un particulier qui souhaite y installer son entreprise. Au château, une plaque avec un texte explique quil aurait été construit au XIXe siècle à lemplacement dune motte féodale appartenant aux seigneurs de Reviers. Les descendants de ces seigneurs auraient transformé lédifice en manoir.","habitants":"Henry Carbonnel de Canisy\r\n        \"","divers":"Château à Réviers    GPS : 49° 18' 06\" Nord, 0° 27' 51\" Ouest","gps":"49° 18' 06\" Nord, 0° 27' 51\" Ouest","images":["../image/image_14/14_Reviers_1.jpg"]},"Consult_chateau_formulaired630":{"id":"Consult_chateau_formulaired630","dept":"14","canton":"Lisieux","commune":"Rivière_Pres Auge","nom":"Rivière_Près_Auge","type":"Château","periode":"XVII","histoire":"RIVIERE prés AUGE.  Fief de la famille La Rivière, le lieu est d'abord dénommé la Rivière-Pré-d'Auge. C'est au XVIIe siècle que la famille La Rivière fait construire le château actuel, en haut de la colline au-dessus de l'église. En juin 1943, l'administration des Beaux-Arts, soucieuse de préserver ce paysage typique du pays d'Auge, classe parmi les sites le château avec son parc et les prairies où coule la source jusqu'au ruisseau des Vattiers au fond du vallon. Entouré d'une haie champêtre taillée, le parc du château dresse ses frondaisons tout autour de la demeure. C'est une élégante construction symétrique avec deux courtes ailes en retour sur la façade ouest. L'ocre des pierres se marie avec bonheur au rouge des briques de chaînage et aux tuiles plates de la couverture. La toiture, à la Mansart, est animée de belles lucarnes à fronton en bois et de quatre souches de cheminées en briques.","architecture":"RIVIERE prés AUGE, c'est, depuis le Moyen-Age, un centre de poteries renommé, spécialisé dans les épis de faîtage et les tuiles vernissés. A partir du XVIIe siècle, cette petite industrie s'étend à la fabrication de carreaux : les pavés émaillés (ou pavés de Lisieux), qui ne cessera qu'au XIXe siècle. l'espace est plus intimiste avec des vues courtes et des arbres isolés ou en bouquet, ne ménageant aucune vue. Un bois occupe presque tout le parc au sud, seuls les abords du château sont dégagés et laissent des vues lointaines vers les prairies, le vallon et les hauteurs couronnées de bois. A mi-pente de la prairie, la fontaine Saint-Méen est aisément repérable avec son haut chêne et son enclos de lisses blanches. Dans l'enceinte circulaire, un chêne vigoureux, ombrage le tronc mort de son ancêtre où sont encore accrochés les linges des pèlerins. La fontaine est matérialisée par une petite pyramide de pierre percée d'une porte. L'eau s'écoule dans une vasque maçonnée située plus bas. Le corps d'un serpent en pierre s'enroule autour de la cuvette et la tête se redresse face à la vasque, au pied du chêne. L'eau poursuit son chemin, à travers une rigole, vers un petit étang en contrebas avant de dévaler la pente par un ru qui rejoint le ruisseau des Vattiers. Le château et son parc composent, avec les prairies pâturées et l'église, un paysage d'une grande harmonie parmi ceux du Pays d'Auge en collines aux versants bocagers où prairies et vergers sont surmontés de boisements.","habitants":"Famille La Rivière\r\n        \r\n        \"","divers":"Château à Rivière près Auge gps 49° 09' 07\" nord, 0° 08' 08\" est","gps":"","images":["../image/image_14/14_Rivi%c3%a8re_Pr%c3%a8s_Auge_1.jpg","../image/image_14/14_Rivi%c3%a8re_Pr%c3%a8s_Auge_2.jpg"]},"Consult_chateau_formulaire5d01":{"id":"Consult_chateau_formulaire5d01","dept":"14","canton":"Mézidon-Canon","commune":"La Roque-Baignard","nom":"Roque_Baignard","type":"Château","periode":"XVI-XVII","histoire":"ROQUE-BAIGNARD, le château de La Roque est situé sur la gauche de la route de La Boissière à Bonnebosq. On y voit des blasons chargés d'alliances de la famille Labbey de La Roque, a appartenu à la famille Labbey, unie au Rocca, premier seigneur de La Roque Baignard, puis par mariage Catherine Baignard fait partie de la lignée des possesseurs du château, avant que le grand-père d'André Gide, M. Rondeau, la rachète. André Gide a souvent séjourné à La Roque.","architecture":"ROQUE-BAIGNARD , la cour qui précède le château est entourée de bâtiments d'exploitation au milieu desquels s'élève une chapelle moderne, surmontée d'une double coupole d'un effet peu gracieux. Cette chapelle, d'ordre ionique, a été construite en 1830 et consacrée en 1833. Les statues en pierre qui ornaient les niches, à l'intérieur et à l'extérieur, étaient fort belles. A l'entrée de la cour on peut voir un très beau pigeonnier dont le toit était couronné d'un épi en terre cuite émaillée. L'enceinte du château a la forme d'un polygone irrégulier. Elle est entourée de fossés très profonds dont les bords sont maintenus, du côté du château, par des murs en pierre avec parapet construit en briques plates, des tourelles en pierre sont placées aux angles. La porte qui donne entrée dans la cour d'honneur présente des rainures, qui étaient destinées à recevoir les chaînes d'un pont-levis. La maison de maître, située en face la porte, a été modernisée. Elle porte l'écusson de La Roque. Au couchant est un bâtiment assez considérable dont une partie est actuellement à usage de cuisine.","habitants":"Famille, Labbey de La Roque\r\n        \"","divers":"Château de la Roque-Baignard\r\ngps 49° 10' 44\" nord, 0° 05' 57\" est","gps":"","images":["../image/image_14/14_Roque_Baignard_1.jpg","../image/image_14/14_Roque_Baignard_2.jpg","../image/image_14/14_Roque_Baignard_3.jpg","../image/image_14/14_Roque_Baignard_4.jpg","../image/image_14/14_Roque_Baignard_5.jpg"]},"Consult_chateau_formulaire6221":{"id":"Consult_chateau_formulaire6221","dept":"14","canton":"Bayeux","commune":"Reys","nom":"Ryes","type":"Château","periode":"XI-XIV-XVIII-XIX","histoire":"Trois châteaux dans cet article; Ryes, Sente, et Pavillon.                   RYES, première mention du village au début du XIe siècle, liée à celle du premier possesseur connu du domaine, Goffredus. château, aujourd'hui disparu, mentionné alors près de l'église, aurait été le noyau du premier village. Puis, à une époque indéterminée, le centre du village se serait déplacé au carrefour des deux routes venant de Bayeux.                                                                                         A deux K.M. au nord ouest SENTE à Tracy sur Mer Paroisse mentionnée en 1243 ; le bourg renferme les bâtiments les plus anciens au XVIe et du XVIIe siècle ; les autres hameaux, la Croix de l'An et la Noë, la Rosière et le Gouley ne présentent pas de vestiges antérieurs au XVIIIe siècle, en 1860-1870 création et développement rapide du hameau de la Brèche. Le château de la Sente fut aménagé dans une ancienne ferme autour de 1809, le logis construit  remanié en 1809, date gravée sur la porte principale, construction du portail de la cour, démolition du corps nord-est et transformation de celui du sud-est en remise et écuries, construction d'une nouvelle ferme au nord-est du château. A la fin du XIXe siècle, pavillon et divers petits bâtiments rapportés contre le logis,  destruction récente de ces ajouts.","architecture":"Manoir le PAVILLON   du XVIIe siècle vestiges de la porte.                                                                                                                RYES, château du fief principal reconstruit dans ce nouveau centre. Devenu chef-lieu de canton après la Révolution, au XIXe siècle, les notables font construire ou restaurer leurs maisons le long des rues de Bayeux et d'Asnelles. Le château actuel occupe l'emplacement d'un ancien manoir figurant avec son colombier sur le cadastre de 1809 et démoli en 1865. Subsiste le gros-oeuvre d'une dépendance aménagée en remise. D'après la matrice cadastrale, logis du nouveau château achevé en 1867 pour Alexandre François André du Homme. Acquis par la commune en 1955, le logis est transformé en école primaire, écuries et remise en salle des fêtes et stade aménagé dans une partie du jardin paysager. Percement de nouvelles fenêtres sur les façades latérales du logis à l'emplacement des cheminées déposées et démontage des souches correspondantes. Logis en moellon enduit, avant-corps des façades en pierre avec brique en remplissage, façades primitivement ordonnancées, corps de logement, moellon enduit, baies en brique, galeries en bois sur la façade ouest, écuries en moellon enduit.","habitants":"Alexandre François et André du Homme\r\n        \"","divers":"Trois châteaux dans cet article; Ryes grav 3-4-5, Sente, et Pavillon grav 1-2.","gps":"","images":["../image/image_14/14_Ryes_1.jpg","../image/image_14/14_Ryes_2.jpg","../image/image_14/14_Ryes_3.jpg","../image/image_14/14_Ryes_4.jpg","../image/image_14/14_Ryes_5.jpg"]},"Consult_chateau_formulairedba8-2":{"id":"Consult_chateau_formulairedba8-2","dept":"14","canton":"Bayeux","commune":"Sommervieu","nom":"Sommervieu","type":"Château","periode":"XVII-XIX","histoire":"SOMMERVIEU,  première mention du château en 1371. Fief acquis en 1477 par l'évêque de Bayeux et devient sa résidence d'été au XVIIIe siècle: reconstruction du logis et creusement des douves pour Paul Albert de Luynes, évêque de 1729 à 1753 ; vers 1770, réaménagement intérieur et embellissement des jardins pour Pierre Jules de Rochechouart. En 1791, il est vendu comme bien national ; transformé en annexe du grand séminaire de Bayeux, édification de nouveaux bâtiments dédiés au Saint Coeur de la Vierge à l'emplacement des communs par Edouard Le Forestier, architecte à Bayeux : de 1838 à 1844 corps principal, octobre 1843 mis en service, à partir de 1844 cloître (jamais achevé) et en 1851 mort de l'architecte; Alexandre Noget-Lacoudre, supérieur de l'établissement, lui succède comme architecte.","architecture":"SOMMERVIEU, le  29 juin 1851 pose de la 1ère pierre de la chapelle, 25 octobre 1862 consécration  1864-1865 corps du réfectoire d'après un projet de 1853, 1873 et 1874, sacristie d'après un projet vers 1850. Communs agrandis vers 1880, achèvement des sculptures de la chapelle, 1889 pavage du sanctuaire, 1891 du choeur liturgique. En 1906, fermeture du séminaire et dans les années 1950 démolition du logis du château. Logis du château en moellon enduit, plan régulier en U, entouré de douves franchies par deux ponts en pierre, corps central à deux étages carrés, élévation à travées; corps principal du séminaire, cloître et chapelle formant un plan rectangulaire symétrique; chapelle : pierre de taille, plan allongé, vaisseau unique, crypte sous la 1ère travée, voûtes d'ogives, façade ordonnancée sans travées, escalier en vis dans la tour sud est; corps principal.","habitants":"Evêque Paul Albert de Luynes\r\n        \"","divers":"Sommervieu","gps":"","images":["../image/image_14/14_Sommervieu_1.jpg"]},"Consult_chateau_formulairee459-2":{"id":"Consult_chateau_formulairee459-2","dept":"14","canton":"Bretteville-l","commune":"Saint-Gabriel-Brécy","nom":"St_Gabriel_Brécy","type":"Château","periode":"XVII-XVIII","histoire":"Quatre châteaux dans cet article, Brecy, Buisson, Trepel et la Martinique.                                                                                                          BRECY, le jardin a été aménagé entre 1646 date d'achat du château par Jacques Ier Le Bas, et  en 1697 date de l'aménagement de l'allée d'accès. Les pavillons ont été batis au XVIIIe siècle, au XVIIIe siècle passe à Pierre-François  de la Bernières puis à sa soeur  madame d'Angerville qui fait passer à  sa nièce  la marquise de Lamoignon ses héritiers s'en défont en 1827 à 1903.  En 1912 Première restauration  du manoir  et des jardins par l'actrice Rachel Boyer. Tombé dans l'oubli après son décès endommagé dans la seconde guerre mondiale. Tantôt abandonné, tantôt choyé, le parc du château de Brécy est sauvé en 1955 grâce à  l'achat par Jacques de Lacretelle écrivain qui entreprend la restauration avec son épouse  aménagent le parterre de broderies, installent les topiaires et creusent les bassins. En 1992, Didier et Barbara Wirth reprennent les travaux avec la restauration des éléments d'architecture.                                                                                                             TREPEL, date du 4ème quart du XVIIIe siècle. Le château de Tréprel, bâti vers 1780, par l'architecte Nicolas Gondouin, est une construction de style néo-classique, l'élévation antérieure est en maçonnerie de brique, remplacée par la pierre pour l'élévation postérieure. Le logis principal est cantonné par des pavillons d'angle tandis que ceux de l'élévation antérieure sont pourvus, à chaque extrémité, d'une tourelle surmontée d'une toiture en poivrière. L'ensemble présente un caractère authentique, a été inscrit aux M.H. le 20/12/2013.","architecture":"BRECY, l'accès se fait par un portail monumental de 10 mètres de haut, attribué à François Mansart, qui donne sur la cour d'honneur bordée par les communs. Au fond, le logis principal aux lignes sobres est typique du XVIIe siècle. Une porte sur la droite permet de pénétrer dans le jardin, la vue porte sur un jardin à l'italienne. Le jardin a été aménagé entre 1646 date d'achat du château, sa construction a débuté au XVIIe et s'est achevée au XVIIIe siècle. Longtemps attribué à Mansart,  il s'étale sur quatre terrasses qui s'élèvent au-dessus du parterre, à l'arrière de la maison. Le jardin mélange les influences du Moyen-Age et de la Renaissance, tout en annonçant un jardin classique français. Tantôt abandonné, tantôt choyé.                                                                                                                             BUISSON  est privé, fermé au public.                                                                  A 2 K.M  à l'ouest à Brécy le château de la MARTINIQUE, c'est ainsi que s'élève cette élégante demeure de style Viollet-Le-Duc, modifiée en 1866. Dès 1683, les terres de la Martinique appartiennent à la famille le Maître. Le domaine de la ferme de la Martinique arrive dans la famille Delacour en 1824 lorsque Angélique le Maître épouse Alexandre Delacour. Leur fils Albert modifie le château, le sépare de la ferme et dessine le parc. Éléments protégés MH : le portail formant l'entrée de la cour, les façades du corps de logis, les dispositions architectoniques et décoratives du jardin : classement par arrêté du 26 septembre.","habitants":"Famille Pierre                                                                                 Famille de François  de la Bernières                                                 Famille le Maître.\r\n        \r\n        \"","divers":"Quatre châteaux dans cet article; Brecy, Buisson et la Martinique grav 7.                                                                                      Saint-Gabriel-Brécy grav 1-2-3-4-5-6                                                 GPS : 49° 15' 49\" Nord, 0° 34' 27\" Ouest                                                           Buisson GPS : 49° 17' 04\" Nord, 0° 32' 22\" Ouest                                             Trepel grav_8","gps":"49° 15' 49\" Nord, 0° 34' 27\" Ouest","images":["../image/image_14/14_St_Gabriel_Br%c3%a9cy_1.jpg","../image/image_14/14_St_Gabriel_Br%c3%a9cy_2.jpg","../image/image_14/14_St_Gabriel_Br%c3%a9cy_3.jpg","../image/image_14/14_St_Gabriel_Br%c3%a9cy_4.jpg","../image/image_14/14_St_Gabriel_Br%c3%a9cy_5.jpg","../image/image_14/14_St_Gabriel_Br%c3%a9cy_6.jpg","../image/image_14/14_St_Gabriel_Br%c3%a9cy_7.jpg","../image/image_14/14_St_Gabriel_Br%c3%a9cy_8.jpg"]},"Consult_chateau_formulaire7442":{"id":"Consult_chateau_formulaire7442","dept":"14","canton":"Lisieux","commune":"Marolles","nom":"St_Germain_Langot","type":"Château","periode":"XVII","histoire":"ST-GERMAIN, en 1658, est vendu à la famille Piperey. Puis abandonné, la famille Piperey, émigrée en Angleterre. De retour sur ses terres en 1820, Louis-Frédéric de Piperey transforme le domaine pour y créer un parc à l'anglaise sur une emprise plus vaste. Une dépendance est construite à l'ouest de la demeure qui perd ainsi sa belle symétrie. En 1822, Jules-Bertrand de Baglion de la Dufferie acquiert le château et fait construire une extension sur la façade arrière. La famille Bucci devient propriétaire des lieux en 1889 et le domaine est toujours dans la famille lors de son classement parmi les sites en octobre 1943. Comme bien d'autres sites protégés à cette époque, l'administration des Beaux-Arts a souhaité préserver de l'effort de guerre un parc magnifique dont les arbres auraient été transformés en bois d'uvre ou en bois de chauffage. Le rapport de classement de 1943 nous décrit brièvement le domaine.  En 1997, la propriété est divisée et le château et son parc sont achetés par M et Mme Blackie,  et la famille d'Oilliamson.","architecture":"St-GERMAIN, son élégante demeure du XVIIe siècle est située au bout d'une large allée centrale bordée de tilleuls taillés. La composition, symétrique dans l'axe du château, dessine alors une belle perspective depuis le chemin de Lisieux à Bernay. Pendant la période révolutionnaire, le château fut abandonné, à l'exception de l'adjonction ouest de 1822, les bâtiments sont en assez mauvais état, une campagne de rénovation tant sur le château que sur les communs devrait prochainement débuter.","habitants":"Famille Piperey\r\n        \r\n        \"","divers":"Château de St Germain   GPS : 49° 05' 20,4\" Nord, 0° 12' 53,28\" Est","gps":"49° 05' 20,4\" Nord, 0° 12' 53,28\" Est","images":["../image/image_14/14_St_Germain_Langot_1.jpg","../image/image_14/14_St_Germain_Langot_2.jpg"]},"Consult_chateau_formulaire0699-2":{"id":"Consult_chateau_formulaire0699-2","dept":"14","canton":"Mézidon-Canon","commune":"St-Germain de  Livet","nom":"St_Germain_Livet","type":"Château","periode":"XV-XVI-XVII","histoire":"Deux châteaux dans cet article, St-Germain et Querville.                ST-GERMAIN de LIVET, au XIIe siècle propriété des premiers seigneurs de Tyrel passera aux Louvet. Au XVe siècle, mariage de  Jeanne Louvet avec  Robert de Tournebu, seigneur de Livet, qui le fit reconstruire, avec une façade en damiers de briques et de pierres. Le château fut la propriété de la famille de Tournebu jusqu'au décès de Marie-Pierre de Tournebu (décédée en 1810) et la dernière de sa branche, passa à la famille de Foucault. Passa par  succession en 1879  et vendu  à Mme Gobley, aux Pillault en 1920. au décès de Mme Pillault. Le château appartient depuis à l'Intercom de Lisieux depuis 1957. Il a été classé aux M.H. en 1924 et 1959.  les poètes de Hérédia et de Régnier, Delacroix le peintre, les Riesener, ébéniste et peintres. Le Musée présente lameublement et les collections d'uvres dart de la famille du légataire du domaine, Julien Pillaut et, des tableaux de son grand-père, le peintre Léon Riesener (1808-1878), lui-même petit-fils de lébéniste Jean-Henri Riesener et cousin dEugène Delacroix.","architecture":"ST-GERMAIN de LIVET, le château actuel a été construit sur le site d'un château d'époque médiévale, est une très pittoresque construction entourée de douves. Il comporte deux parties, un manoir à pans de bois de la fin du XVe siècle, et une construction en pierre et brique vernissée du Pré d'Auge, de la fin du XVIe siècle. Le château mêle avec beaucoup de charme des traditions médiévales (des douves et meurtrières pour se protéger des ennemis) et des traditions Renaissance qui suggèrent un nouvel art de vivre, galerie à arcades et peintures murale. Le château, le Musée d'art et d'histoire et l'Ecole dArts Plastiques de Lisieux sont les 3 établissements culturels intégrés dans le « Pôle Muséal » de la communauté de communes de Lisieux.                                                                                                                                          Au sud à trois K.M. à  Prêteville le château de QUERVILLE  est édifié au XVIe siècle, et remanié au XVIIe siècle. Il est construit par la famille de Querville, à l'emplacement du château qu'ils possédaient depuis 1300. En 1652, le manoir est acheté par Guillaume de Mauduit. Il est inscrit aux M.H. en septembre 1933. Sont ainsi protégés les façades et les toitures des bâtiments principaux, le pavillon d'entrée et le colombier. Outre le corps de logis principal, le manoir comporte un pavillon d'entrée, et a pour annexes des communs et un colombier. François-Régis et Françoise Courtemanche, les parents dHubert, achètent donc le manoir,en 1958  en piteux état.","habitants":"famille de Tournebu              famille de Querville\r\n        \"","divers":"Deux châteaux dans cet article, St-Germain grav 1 à 7 et Querville grav-8-9.  GPS : 49° 05' 20,4\" Nord, 0° 12' 53,28\" Est","gps":"49° 05' 20,4\" Nord, 0° 12' 53,28\" Est","images":["../image/image_14/14_St_Germain_Livet_1.jpg","../image/image_14/14_St_Germain_Livet_2.jpg","../image/image_14/14_St_Germain_Livet_3.jpg","../image/image_14/14_St_Germain_Livet_4.jpg","../image/image_14/14_St_Germain_Livet_5.jpg","../image/image_14/14_St_Germain_Livet_6.jpg","../image/image_14/14_St_Germain_Livet_7.jpg","../image/image_14/14_St_Germain_Livet_8.jpg","../image/image_14/14_St_Germain_Livet_9.jpg"]},"Consult_chateau_formulaired71d":{"id":"Consult_chateau_formulaired71d","dept":"14","canton":"Isigny-sur-Mer","commune":"St-Pierre du Mont","nom":"St_Pierre_du_Mont","type":"Château","periode":"XVI","histoire":"St-PIERRE du MONT, le château a été construit dans la deuxième moité du XVIe siècle, par François du Mesnil, qui le modifie au XVIIe siècle ce dernier se marie  en 1583 avec Suzanne de Grosourdy, passe à son fils Jean-Louis Du Mesnil qui meurt  aux Etats-Unis. Les propriétés échoient à Victoire  du Mesnil qui épouse  en 1784 Daniel marquis de Frotté, le fils de Victoire du Mesnil Charles-Henri-Gabriel de Frotté fait carrière de mousquetaire du roi député de l'Orne en 1815 et sous préfet à Cherbourg, il mourat dans son château de Couterne en 1858, en 1876 les héritiers cèdent Saint-Pierre à la famille Beaurepaire-Louvagny  qui le consrvera jusqu'a sa cession en 1921 qui passe à monsieur Gérard Bodot-Descours, il est habité aujourd'hui par la famille Beck.","architecture":"St-PIERRE du MONT, plusieurs éléments caractérisent les châteaux du Bessin, la Renaissance marque le style architectural des édifices de cette époque, le corps de logis tout en hauteur à quatres niveaux avec lucarnes sur combles, flanqué d'une tour rectangulaire disposée  perpendiculairement cette tour possède un étage supplémentaire,  on y accède par un escalier en vis logé dans une tourelle en encorbellement, les portails d'entrée doubles, souvent triples, sont très travaillés. Une entrée est réservée aux charrettes et les deux autres étant destinées aux piétons. Des tours aux château de Saint-Pierre-du-Mont, des échauguettes, ou des bretèches viennent accompagner ces portails pour assurer la défense de la ferme. L'ensemble est souvent monumental, composant ainsi l'élément le plus significatif des châteaux fermes. Ces porches avaient pour vocation première de défendre la ferme contre les intrus mais le soin qui y était apporté témoignait de l'importance du seigneur des lieux, location chambres d'hôtes.  Le château de Saint-Pierre-Oursin est devenu une maison de convalescence. Éléments protégés MH : les façades du château : inscription par arrêté du 15 juin 1927.","habitants":"François du Mesnil\r\n        \"","divers":"Château de St-Pierre-du-Mont                                                        GPS : 49° 08' 53,91\" Nord, 0° 12' 37,47\" Ouest","gps":"49° 08' 53,91\" Nord, 0° 12' 37,47\" Ouest","images":["../image/image_14/14_St_Pierre_du_Mont_1.jpg","../image/image_14/14_St_Pierre_du_Mont_2.jpg","../image/image_14/14_St_Pierre_du_Mont_3.jpg","../image/image_14/14_St_Pierre_du_Mont_4.jpg"]},"Consult_chateau_formulairea500-2":{"id":"Consult_chateau_formulairea500-2","dept":"14","canton":"Troarn","commune":"Saint-Pierre-du-Jonquet","nom":"St_Pierre_Jonquet","type":"Château","periode":"XVIII","histoire":"JONQUET,  elle a conservé l'intégralité de ses dispositions intérieures et son décor du milieu du XVIIIe siècle : cheminées, lambris, dallages, et plafonds. Le seul aménagement réalisé au XIXe siècle est la salle de billard, qui a gardé l'ensemble de son papier peint de 1818 de la manufacture Dufour, représentant les Fêtes de la Grèce et Jeux Olympiques.","architecture":"JONQUET,  le château est bâti au milieu du XVIIIe siècle pour l'armateur honfleurais Leroi-Beaulieu, il a conservé l'intégralité de ses dispositions intérieures et son décor du milieu du XVIIIe siècle : cheminées, lambris, dallages, plafonds. La salle de billard a été réaménagée, en 1818, avec un papier peint de la manufacture Dufour, représentant les Fêtes de la Grèce et des Jeux olympiques. L'édifice fait l'objet de deux inscriptions comme monument historique : le château en totalité, la cour dhonneur et ses murs de clôture, ainsi que le jardin et ses fossés.  La salle de billard avec son décor et son papier peint, du XIXe siècle, sont classés aux M.H. le 12/12/1996.","habitants":"Seigneur local\r\n        \"","divers":"Châteaue Jonquet  GPS : 49° 10' 07\" Nord, 0° 07' 38\" Ouest","gps":"49° 10' 07\" Nord, 0° 07' 38\" Ouest","images":["../image/image_14/14_St_Pierre_Jonquet_1.jpg","../image/image_14/14_St_Pierre_Jonquet_2.jpg"]},"Consult_chateau_formulairea9b1":{"id":"Consult_chateau_formulairea9b1","dept":"14","canton":"","commune":"Sainte-Croix-Grand-Tonne,","nom":"Ste_Croix_Gd_Tonne","type":"Château","periode":"XIV-XV","histoire":"STE-CROIX GRAND-TONNE BRECY, construit entre la fin du XIVe et le début du XVe siècle sous la forme d'un château fort médiéval entouré de rivières et de plan deau, le château de Sainte-Croix Grand-Tonne (à l'origine Santa-Crux de Grentonia) devint rapidement un marquisat dont le seigneur des lieux devait donc être chargé par le roi de défendre les frontières du royaume. Les seigneurs qui s'y succédèrent furent nombreux pendant les 1000 ans d'histoire du fief de Sainte-Croix Grand-Tonne. Parmi les plus légendaires, au XIe siècle Corbin d Aigneaux, au XIIIe siècle seigneur Scelles de Prévalon, au XVe siècle Guillaume de Briqueville, au XVIIe siècle Guy de Briqueville et enfin au XVIIIe siècle le marquis et la marquise de Chastenay, à qui l'on doit l'aspect actuel du château surélevé d'un étage et à la façade néoclassique typique des châteaux de Dame du XVIIIe siècle. La marquise ramena également de Paris des miroirs identiques à ceux de la comédie-Française. En 1786 le roi Louis XVI sy arrêta pour le seul et unique voyage officiel de son règne, à Cherbourg. De la fin du XIXe siècle à 1927,  le château et son domaine appartenaient à Mr et Mme Passega. Etant commandant dans la Marine marchande.  En 1927 il fut légué à la ville de Caen afin den faire une colonie de vacances. Plus près de nous, en juin 1944 après la victoire du débarquement allié, le haut état-major Canadien sinstalla au château de Sainte-Croix et un très grand campement de soldats fût installé dans le parc.","architecture":"BRECY STE-CROIX GRAND-TONNE, après un XXe siècle très chaotique où le château de Brécy connu des heures sombres, le château vient de retrouver son faste, comme lors de ses plus belles heures du Moyen-Age. De plus, un tournoi de Chevalerie y est organisé par les propriétaires, chaque année, au mois daoût.  Le château de Sainte-Croix Grand-Tonne est une construction ancienne, complètement transformée dans le style néoclassique sous le second Empire. La façade est décorée de trois frontons courbes où se trouvent les armoiries des anciens propriétaires; La Guiche, Chastenay et Clermont-Tonnerre. La propriété appartient à M. Triboulet.  Éléments protégés MH : les façades et les toitures du pavillon nord, du bâtiment situé au sud de ce pavillon y compris le porche d'entrée qu'il renferme : inscription par arrêté du 26 septembre 1969.","habitants":"Famille de Guy de Briqueville \r\n        \"","divers":"Château de Ste-Croix-Gd-Tonne GPS : 49° 13' 54\" Nord, 0° 33' 48\" Ouest","gps":"49° 13' 54\" Nord, 0° 33' 48\" Ouest","images":["../image/image_14/14_Ste_Croix_Gd_Tonne_1.jpg","../image/image_14/14_Ste_Croix_Gd_Tonne_2.jpg","../image/image_14/14_Ste_Croix_Gd_Tonne_3.jpg","../image/image_14/14_Ste_Croix_Gd_Tonne_4.jpg"]},"Consult_chateau_formulaire399b-2":{"id":"Consult_chateau_formulaire399b-2","dept":"14","canton":"Bretteville-l","commune":"Thaon","nom":"Thaon","type":"Château","periode":"XVII-XVIII","histoire":"THAON, en 1624, Pierre Blouet, devenu seigneur des lieux, achève une demeure plus confortable de lautre côté de la Mue. Ce petit château à deux étages est établi au milieu dun parc. En 1732, Jacques Blouet ajoute un logis plus important formant une aile en retour du château initial.  A lest, le terrain descend vers un miroir deau alimenté par les rivières. Parallèlement à cet axe ouest-est, une allée de hêtres conduit jusquà un pont franchissant la Mue puis, au-delà par une sente, à la grille dentrée à l'Est de la propriété. Autour du parc, les terres sont à lusage de prairies, basse vallée humide où la Mue et le Chironne déroulent leurs cours parallèles en un large méandre, jusquaux abords de la vieille église. Demeuré dans la famille Blouet de Thaon jusquau XIXe siècle, la propriété est finalement vendue par le comte de Saint-Pol à un ingénieur de la région, Emile Mauger. Vers 1914, un marchand de bien achète le domaine quil morcelle en 15 ha pour le château et plus de 100 ha pour les fermes et le moulin de la Vallée. Acheté en 1926 par Louis Massieu de Clerval, le château est occupé par les troupes allemandes pendant la seconde guerre mondiale. Durant tout le XXe siècle, la propriété demeure dans la famille Massieu de Clerval avant dêtre vendue, en 1997, au propriétaire actuel.","architecture":"THAON, lélégante façade du château XVIIIe en point de fuite, attire les regards. De lentrée, le vieux château du XVIIe siècle est encore invisible, masqué par les grands arbres de lavenue. Près de la cour dhonneur, une aile basse de communs, percée de deux portes charretières, précède deux gigantesques séquoias. La façade, en pierres calcaires blondes, sélève sur deux niveaux percés de hautes fenêtres. Lavant-corps central, en légère saillie est coiffé dun fronton triangulaire qui sélève au niveau de la toiture dardoises. De chaque côté, deux pavillons savancent en deux ailes légèrement débordantes. A droite, le château du XVIIe forme un retour avec ses bâtiments de modénature et de hauteurs différentes. Lancienne chapelle y est en saillie, reliée au château XVIIIe par une petite aile en retrait (sans doute du XVIIe siècle). Le parc a souffert du temps, des années de guerre et des tempêtes. Si tous les éléments sont demeurés en place, ils sont aujourdhui à demi effacés, témoins de la beauté ancienne du parc.","habitants":"famille  de Jacques Blouet\r\n        \"","divers":"Thaon GPS : 49° 15' 42\" Nord, 0° 26' 52\" Ouest","gps":"49° 15' 42\" Nord, 0° 26' 52\" Ouest","images":["../image/image_14/14_Thaon_1.jpg","../image/image_14/14_Thaon_2.jpg","../image/image_14/14_Thaon_3.jpg"]},"Consult_chateau_formulaire45d0":{"id":"Consult_chateau_formulaire45d0","dept":"14","canton":"Thury-Harcourt","commune":"Thury-Harcourt","nom":"Thury_Harcourt","type":"Château","periode":"XVII-XVIII","histoire":"THURY-HARCOURT, du XVIIe et XVIIIe siècles, aujourd'hui ruinée. Jeanne Tesson apporte la baronne de Thury à son époux, Jean Crespin. Leur petite fille, Blanche Crespin hérite de la baronnie de Thury et épouse Pierre de Préaux. De ce mariage, est issue une fille, Marguerite de Préaux, mariée en secondes noces, vers 1367, avec Jacques de Bourbon-Préaux, grand bouteiller de France. La descendance issue de ce mariage s'étant éteinte, la baronnie de Thury fait retour à la Maison de Préaux, en la personne de Jeanne de Préaux, épouse de Gauvain de Ferrières. Ces derniers laissèrent un fils, Jean de Ferrières, dont la fille Françoise de Ferrières, dame de Thury, épousa Ferry, seigneur d'Aumont. De ce mariage, est issue une fille, Anne d'Aumont, mariée en 1522 avec Claude de Montmorency, seigneur de Fosseux. Alors siège d'une baronnie, dont relevaient des fiefs situés sur 70 paroisses, la seigneurie de Thury fut érigée en marquisat en 1578 en faveur de leur fils, Pierre Ier de Montmorency-Fosseux, capitaine de 50 hommes d'armes, gentilhomme de la chambre du Roi Henri III et chevalier de son Ordre. À ce dernier, succède comme marquis de Thury, son fils, Anne de Montmorency-Fosseux, mort en 1592, puis le fils de celui-ci, Pierre II de Montmorency-Fosseux, mort en 1615, et le fils de ce dernier, François de Montmorency-Fosseux (1614-1684).  En 1635, le marquisat de Thury est acheté par Odet d'Harcourt, qui fait construire la partie la plus ancienne du château, la façade d'arrivée, prolongée sur l'arrière par une aile en retour. Son petit-fils, Henri d'Harcourt, vend Thury à son cousin, autre Henri d'Harcourt, alors marquis de Beuvron, plus tard 1er duc d'Harcourt et maréchal de France.","architecture":"THURY-HARCOURT, créé par le  duc d'Harcourt après la réussite de son ambassade en Espagne, en 1700, obtient en 1710 l'érection en duché-pairie des marquisats de La Motte-Harcourt et Thury, sous le nom d'Harcourt. Il fait alors agrandir le château, en prolongeant l'aile la plus proche de l'Orne par un long corps de logis couvert d'un toit mansardé. Interrompus par sa mort, en 1718, les travaux sont achevés par sa veuve, Marie Anne Claude Brulart de Genlis, qui installe ses appartements à l'extrémité nord de cette nouvelle aile.  Au XVIIIe siècle, le duché d'Harcourt reste dans leur descendance, la lignée des duc d'Harcourt, jusqu'au 5eime du nom, François Henri d'Harcourt, père seulement d'une fille, la duchesse de Mortemart. Dans la nuit du 21 au 22 juin 1786, le roi Louis XVI et sa suite, font étape au château de Thury-Harcourt pendant leur voyage à Cherbourg. Venant de Falaise, ils y sont reçus par le duc et la duchesse d'Harcourt, y dînent puis reprennent la route au matin pour Caen. À la Révolution, François Henri d'Harcourt émigre et son duché d'Harcourt est saisi. Il meurt près de Londres en 1802, après sa fille unique. Ses petits-enfants parviennent à reprendre possession du domaine dans les premières années du XIXe siècle. La mort de la fille de la duchesse de Mortemart, la princesse de Beauvau, en 1854, les enfants de celle-ci vendent le château d'Harcourt et les souvenirs de famille qu'il contenait, en 1856, à leur cousin, Eugène, 8e duc d'Harcourt, dont la descendance le conserve depuis. Le château de Thury-Harcourt a été incendié par les occupants allemands, avant leur retraite, en août 1944. Il en subsiste les murs de la partie centrale du XVIIe siècle, où se trouvaient un vaste vestibule et l'escalier principal ; la cour d'honneur, à laquelle on accède par un pont dormant, cantonné par deux pavillons, surplombant des fossés secs.","habitants":"Famille de  Jean Crespin et  François de Montmorency-Fosseux\r\n        \r\n        \"","divers":"Château de Thury-Harcourt \r\nThury gps 48° 59' 15\" N, 0° 28' 50\" Ouest","gps":"","images":["../image/image_14/14_Thury_Harcourt_1.jpg","../image/image_14/14_Thury_Harcourt_2.jpg","../image/image_14/14_Thury_Harcourt_3.jpg","../image/image_14/14_Thury_Harcourt_4.jpg","../image/image_14/14_Thury_Harcourt_5.jpg"]},"Consult_chateau_formulairece17":{"id":"Consult_chateau_formulairece17","dept":"14","canton":"Bretteville-l","commune":"Tierceville","nom":"Tierceville","type":"Château","periode":"XVII","histoire":"TIERCEVILLE,  château médiéval peut-être établi dans la partie ouest du domaine, près de l'église , la tour, probablement un colombier, vestige d'un portail et grange datant de la fin du moyen âge. Début XVIIe siècle, appartenait aux seigneurs de Tierceville, construction d'un nouveau château plus à l'est, comprenant logis, galeries, ferme et jardin régulier en terrasses, peut-être pour François de Néel, seigneur de Tierceville, gentilhomme ordinaire de la chambre du roi capitaine de 50 hommes d'arme, gouverneur de la ville et du château de Coutances. Edifice resté inachevé, courant XVIIe siècle, des éléments préparés pour le chantier sont utilisés à l'édification d'un corps d'habitation reliant la partie construite du logis au corps des galeries: modénature, lucarnes, tourelles en encorbellement (destinées primitivement à encadrer l'entrée de la cour d'honneur). Milieu du XIXe siècle, destruction du corps d'habitation, du pavillon d'entrée, construction d'une nouvelle grange et du logement du fermier, remaniement des autres corps de la ferme. En 1877, la ferme est primée au concours agricole, les bâtiments sont considérés comme remarquables, en particulier la grange.","architecture":"TIERCEVILLE,  logis, aile nord à deux étages, une travée construite, aile est seulement amorcée, à un étage, peut-être destinée à être couverte en terrasse, tour sur l'angle nord-est comprenant des départs de voûtes de forme indéterminable, toit à croupe sur l'aile nord, corps des galeries, ouvert au rez-de-chaussée, fermé à l'étage, pierre de taille pour le 1er niveau, moellon enduit pour le deuxième, escalier dans-oeuvre en pierre, tournant à retours sans jour, les contreforts, la tourelle et le mur pignon Est ont été ajoutés après coup ; ferme en moellon, ardoise et tôle ondulée en couverture, pignon découvert, logement d'un étage en moellon enduit ; colombier : moellon, toit en pavillon.","habitants":"François de Néel,\r\n        \"","divers":"Château de Tierceville                                                            GPS : 49° 17' 34,6\" Nord, 0° 31' 39,9\" Ouest","gps":"49° 17' 34,6\" Nord, 0° 31' 39,9\" Ouest","images":["../image/image_14/14_Tierceville_1.jpg","../image/image_14/14_Tierceville_2.jpg"]},"Consult_chateau_formulairee292":{"id":"Consult_chateau_formulairee292","dept":"14","canton":"Trévières","commune":"Tour en Bessin","nom":"Tour_en_Bessin","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux à la tour; la Tour et Vaulaville. Tour de St-Pierre de Cannivet.                                                                                                               TOUR en BESSIN,  fut construit en 1750, est remarquable par son fronton délicatement orné et par les motifs sculptés au dessus des fenêtres. L'intérieur conserve d'intéressantes boiseries de la même époque. Celle belle demeure était l'uvre de la famille d'Albignac. Aujourd'hui propriété du vicomte et de la vicomtesse Jean de Kervénoaël.  Éléments protégés MH : les façades et les toitures ; le salon avec ses boiseries ; allée du parc dans l'axe du château : inscription par arrêté du 31 août 1967.                                                                            VAULAVILLE, a été édifié en 1720 pour Morin de Banneville, seigneur du lieu et président du bureau des finances de Caen, en 1727 décès  d'Adrien Morin. Vaulaville,  échoit à son cinquième fils Bernadin-Adrien  seigneur de Litteau par alliance, passe par succession à Joseph-Morin de Litteau  dont la fille Marie-Jeanne-Pauline receuillera tous les biens.  Mariée à Adrien-Michel-Achard de Vacognes et en 1888 transmet  Vaulaville à sa fille la vicomtesse de Vaulogé. En 1961, l'arrière-petite-fille la vicomtesse de  Michel-Rolland de Roscoat  cède Vaulaville à sa cousine germaine  aux Picot de Vaulogé  puis acquit par Mme Corblet de  Fallerans née  Livry-Level.","architecture":"VAULAVILLE, petit château, à l'image de ce qui est rare et précieux. La famille Corblet veille au maintien du château XVIIIe siècle style \"Folie Régence\" depuis de nombreuses années. Historique du domaine et anecdotes multiples, (des célébrités y ont logé, la maîtresse des lieux fut une résistante lors de la dernière guerre), rendent originale la visite qui lest encore plus, lorsque lon entre dans le musée des jouets anciens. Dans le parc, une chapelle du XVIIIe siècle qui séduit par sa simplicité. Les façades et les toitures, la chapelle. D'autres éléments du complexe font l'objet d'une inscription : la perspective d'entrée, les façades et les toitures des communs, certaines pièces du château avec leur décor de boiseries (grand salon, chambre de l'évêque, petit salon, piliers des porches du jardin, douves et terrain les entourant  est une demeure construite au XVIIIe siècle, une adorable folie Régence, inscription par arrêté du 3 février 1971.","habitants":"famille d'Albignac     Joseph-Morin de Litteau           \r\n        \r\n        \"","divers":"Deux châteaux à la tour grav-1-2; dont la Tour et Vaulaville grav-3-4-5-6-. \r\ngps 49° 18' 39\" nord, 0° 46' 17\" ouest","gps":"","images":["../image/image_14/14_Tour_en_Bessin_1.jpg","../image/image_14/14_Tour_en_Bessin_2.jpg","../image/image_14/14_Tour_en_Bessin_3.jpg","../image/image_14/14_Tour_en_Bessin_4.jpg","../image/image_14/14_Tour_en_Bessin_5.jpg"]},"Consult_chateau_formulairecee1":{"id":"Consult_chateau_formulairecee1","dept":"14","canton":"Thury-Harcourt","commune":"Thury-Harcourt","nom":"Tournebu","type":"Château","periode":"XIII-XVIII","histoire":"A quelques K.M.  à l'ouest  FRESNEY le PUCEUX   édifice construit pour Pierre d'Harcourt entre 1578 et 1584.  Armes de Charles de Fiesque deuxième époux de Gilonne d'Harcourt, en 1643, puis Fresney passa à la Famille de Guerchy jusqu'au XIXe siècle.                                                                                            TOURNEBU, la propriété appartenant jadis à l'illustre famille de Tournebu, la paroisse est le berceau de cette famille et le siège de sa principale baronnie. L'ensemble des constructions s'est effectué entre le XIIe et le XVIIIe siècle. Le donjon est le seul vestige dun château plus ancien détruit après la Révolution. Construit au XIIIe siècle, puis remanié, il est coiffé d'un toit au XVIe siècle. Il est directement construit sur une motte de terre féodale plus ancienne. Au début du XVIIe siècle, la motte est transformée en fortification avec l'ajout de quatre bastions selon un plan en étoile. Des souterrains sont créés pour relier les bastions à la tour. La cave creusée sous la tour et les fossés datent
