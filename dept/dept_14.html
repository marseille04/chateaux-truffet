1470. Au cours des siècles, le manoir subit plusieurs transformations :  au XVe siècle,   l'étage originellement à pans de bois est reconstruit en appareillage de briques et de silex,  le bâtiment est allongé par un porche couvert, au XVIIe siècle, sont construits  un grand escalier, ouvert sur la cour qui sera clos par la suite, un bâtiment en retour. Les façades et les toitures, ainsi que la cage d'escalier principale avec l'escalier et sa rampe en bois sont classés au titre des monuments historiques depuis le 13 septembre 1990 alors que le reste du manoir est inscrit depuis le 19 décembre 1985.","habitants":"duc de Bourbon\r\n        \"","divers":"Trois châteaux à Honfleur dont Honfleur grav-1 et 8 la porte de la lieutenance, Gonneville grav-2, Preteville  grav-3-4-5 et Roncheville grav-6-7.   Honfleur GPS : 49° 25' 15\" Nord, 0° 13' 58\" Est                                                                                     Preteville grav-3-4-5  GPS : 49° 23' 01\" Nord, 0° 14' 39\" Est","gps":"49° 25' 15\" Nord, 0° 13' 58\" Est","images":["../image/image_14/14_Honfleur_1.jpg","../image/image_14/14_Honfleur_2.jpg","../image/image_14/14_Honfleur_3.jpg","../image/image_14/14_Honfleur_4.jpg","../image/image_14/14_Honfleur_5.jpg","../image/image_14/14_Honfleur_6.jpg","../image/image_14/14_Honfleur_7.jpg","../image/image_14/14_Honfleur_8.jpg"]},"Consult_chateau_formulaire1040":{"id":"Consult_chateau_formulaire1040","dept":"14","canton":"Pont-l","commune":"Saint-André-d","nom":"Hébertot","type":"Château","periode":"XVI-XVII","histoire":"HEBERTOT, le château actuel fut construit dans les premières années du XVIIe siècle par Jacques de Nollent qui avait acquis la terre en 1596 de Jean du Bosc, seigneur de Saint-Léger. L'Héritière Françoise-Marthe-Angélique de Nollent épousa  Henri-François d'Aguesseau en 1729  et hérita du domaine qu'il vendit en 1780 au comte de Blangy. Le château fut en 1791, acquis par un banquier de Rouen, M. Duhamel, et resta aux mains de ses descendants jusqu'en 1852. Au cours de la seconde guerre mondiale, le château fut le siège dun état-major de larmée allemande et reçut la visite du maréchal Göring venu se reposer quelques jours en octobre 1940. Après le Débarquement, le 25 août 1944, alors que les Allemands lont quitté la veille, le 224e parachute Airborne Field  transforme le château en hôpital de campagne.\r\nDepuis ce jour, le domaine s'est transformé en chambres d'hôtes et accueille de nombreux visiteurs en quête d'histoire ou du grand air. Hébertot fut restauré plus tard par Ruprich Robert. M. Guillaume Roblot en est l'actuel propriétaire.","architecture":"HEBERTOT, construit sur un terre-plein entouré de douves d'eau vive, le château a été construit en trois étapes successives. Le gros pavillon au fond de la cour d'honneur, date du début du XVIIe siècle. L'édifice actuel, avec son pavillon central couvert d'un comble et orné d'un fronton aux armes des Nollent et des d'Aguesseau date du premier quart du XVIIIe siècle. Le pavillon bas qui clôt, à droite, l'ordonnance, est une addition du milieu du XIXe siècle.  Éléments protégés MH : les façades et les toitures des bâtiments des communs : inscription par arrêté du 7 juillet 1948. Les façades et les couvertures du château, les douves, le parterre à la française : classement par arrêté du 2 mai 1961.","habitants":"Henri-François d'Aguesseau \r\n        \"","divers":"Hébertot gps 49° 18' 48\" N, 0° 16' 52\" Est","gps":"","images":["../image/image_14/14_H%c3%a9bertot_1.jpg","../image/image_14/14_H%c3%a9bertot_2.jpg","../image/image_14/14_H%c3%a9bertot_3.jpg"]},"Consult_chateau_formulaire7dc6":{"id":"Consult_chateau_formulaire7dc6","dept":"14","canton":"Bayeux","commune":"Juaye-Mondaye","nom":"Juaye","type":"château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Juay et Bernières  et à cinq K.M. au sud ouest à Condé sur Seulles                                                                  CONDE SUR SEULLES, mentionnée dès le XIe siècle, cette famille de Condé donna un évêque à Évreux et un archevêque à York. Très longtemps propriété des Longaunay, barons de Nonant, la seigneurie fut acquise au XVIIIe siècle par Louis Vincent Canteil, Conseiller et Secrétaire du Roi. A la fin du XVIIIe siècle, son petit-fils, Xavier de Canteil apporte quelques modifications au bâtiment. L'édifice a également appartenu à M. le Prince de Broglies avec la terre qui en dépend.                                                                                   JUAYE-MONDAYE, est une belle construction bâtie au XVIIIe siècle et remaniée dans le quatrième quart du XIXe siècle, avec un avant-corps précédé d'un large perron. Le domaine appartient à Madame Septime Humann. Construite «au temps de Louis XIII ou de Henri IV» selon Arcisse de Caumont, cette vaste ferme-manoir, emblématique des grandes propriétés rurales du Bessin, reflète la richesse du terroir. Autour dune cour carrée fermée de hauts murs aveugles et ouverte par un double portail, sorganisent bâtiments agricoles et logis. Ce dernier, sans doute habitat noble à lorigine, présente deux pavillons latéraux carrés en saillie sur la façade. Si les percements ont été remaniés à la fin du XVIIIe siècle, les fausses lucarnes ornant les pignons des pavillons sont typiques du début du XVIIe siècle. Éléments protégés MH : les façades et les toitures y compris les deux perrons et leur balustrade, l'escalier et sa rampe en fer forgé, le vestibule, le salon gris et le salon vert au rez-de-chaussée avec leur décor : inscription par arrêté du 14 avril 1988.","architecture":"BERNIERES, le château actuel de Juaye a été construit sur l'emplacement d'un ancien castel, occupé par noble homme Gilles Le Chanoine, sieur Du Manoir, conseiller du roi, lequel fut vicomte de Bayeux en 1712.  Ce château fut commencé, vers 1740, par Charles-Louis Le Chanoine, écuyer, sieur Du Manoir, seigneur et patron de Juaye, conseiller du roi. Il fut achevé par Jean-Louis Le Chanoine, comte Du Manoir, seigneur et patron de Juaye, seigneur de Trungy, Vesley, La Londe, maréchal de camp, colonel commandant le régiment de mestre de camp-cavalerie.  Son petit-fils, le comte Du Manoir de Juaye, propriétaire actuel de la terre de Juaye, inspecteur de l'Association normande, maire de Juaye depuis 27 ans, a fait, autour du château, un parc anglais, après d'assez grands travaux il a réuni de grands herbages, au milieu desquels sont de magnifiques ormes et chênes plus que séculaires, et qui font le plus bel ornement de ce parc.                                                                                        CONDE SUR SEULLES, jusqu'au Second Empire le château présentait une symétrie parfaite, le corps de logis central était flanqué de deux pavillons latéraux. Les chaînages en refends aux angles sont caractéristiques du style Louis XVI. Très belle façade principale et escalier intérieur, salon de boiseries et jardins en terrasse.","habitants":"Condé; Louis Vincent Canteil                                               Juaye;  Madame Septime Humann.                                    Bernières;  Jean-Louis Le Chanoine,\r\n        \"","divers":"Deux châteaux dans cet article; Juaygrav 3-4 et Bernières grav-1-2. Condé-Seulles.","gps":"","images":["../image/image_14/14_Juaye_1.jpg","../image/image_14/14_Juaye_2.jpg","../image/image_14/14_Juaye_3.jpg","../image/image_14/14_Juaye_4.jpg","../image/image_14/14_Juaye_5.jpg"]},"Consult_chateau_formulairef9a2":{"id":"Consult_chateau_formulairef9a2","dept":"14","canton":"Bretteville-l","commune":"Juvigny sur Seulles","nom":"Juvigny_sur_Seulles","type":"Château","periode":"XVIII","histoire":"JUVIGNY sur SEULLES,   le château a été reconstruit en 1743 par Augustin-François de Malherbe, sur les plans de Jean-François Blondel. Il s'agit d'un édifice très représentatif des demeures élevées en Bessin et en plaine de Caen. Elle longe ensuite l'allée de la perspective dite allée du poète Malherbe pour aboutir dans la clairière où se trouvait la statue du poète, disparue aujourd'hui. Une grande allée latérale ouvre une perspective secondaire à l'ouest. L'obélisque, construit en 1785, est l'oeuvre d'André Le Play. Éléments protégés MH : le château : inscription par arrêté du 6 janvier 1930. Le parc avec l'ensemble de ses aménagements hydrauliques et l'obélisque, ainsi que l'allée d'accès : inscription par arrêté du 9 juin 2008.","architecture":"JUVIGNY sur SEULLES, bien que le château ait subi des dommages de guerre l'intérieur a conservé ses parquets, ses décors de boiseries d'époque avec trumeaux peints et alcôves. Le vaste parc est caractéristique de l'époque avec des allées rayonnantes formant des carrefours en étoile. La grande allée aboutit à une avant cour ovoïde dont le dessin a été bouleversé au début du XIXe siècle par la route qui la traverse. L'avant-cour est bordée de douves qui donnent accès à la cour d'honneur rectangulaire. La perspective traverse le château par le vestibule et la salle de réception, et se développe au sud avec l'axe principal composé d'un grand parterre rectangulaire et d'une pièce d'eau.","habitants":"Augustin-François de Malherbe\r\n        \"","divers":"Château de Juvigny_sur_Seulles","gps":"","images":["../image/image_14/14_Juvigny_sur_Seulles_1.jpg","../image/image_14/14_Juvigny_sur_Seulles_2.jpg"]},"Consult_chateau_formulaired254":{"id":"Consult_chateau_formulaired254","dept":"14","canton":"Thury-Harcourt","commune":"Acqueville","nom":"La_Motte_Calvados","type":"Château","periode":"XVII","histoire":"La MOTTE; construit de 1598 à 1614 pour Nicolas Grimoult, conseiller au parlement de Normandie et lieutenant au bailliage d'Alençon, en 1660  le domaine est vendu à Louis Berryer, qui fit construire deux ailes basses, en 1726 achat du château par les Beaudran, le comte de Beaudran aménage le parc, le domaine à la veille de l'Empire entre par alliance dans la famille de Folleville qui le conservera  jusqu'en  1865  à cette date Auguste Thibault se porte acquéreur du domaine, ce château a servit d'hôpital pendant la guerre et en 1944 est resté dans la descendance d'Auguste Thibault.","architecture":"La MOTTE, le château de la Motte est remanié en 1694.  composé d'un corps de logis principal, simple en profondeur flanqué en façade postérieure de deux pavillons en forte saillie, du côté de la cour d'Honneur, il s'encadre entre deux minces tourelles, des douves aujourd'hui asséchées ceinturent l'édifice et délimitent la cour d'honneur dont les angles sont marqués  par deux pavillons isolés;  leurs murs percés  de meurtrières. La porte d'entrée encadrée par deux colonnes supportant l'entablement L'intérieur a été très modifié sous le Second Empire, puis vers 1890 (seuls quelques éléments des XVIIe et XVIIIe siècles subsistent, la charpente, la cheminée provenant de l'abbaye de Villers Canivet, etc.). Le parc du XVIIe siècle (douves) et du XVIIIe siècle (avenues), a été transformé au début du XIXe siècle en parc à l'anglaise, et en 1890 construction de la serre. Cette belle demeure, remarquable par lélégance de son architecture et lharmonie de ses volumes. Les avenues menant au château et le quinconce de la Roquette (600 mètres à lest) sont classés parmi les sites en décembre 1943. Au-delà de la protection dun écrin de château, ladministration des Beaux-Arts souhaite alors préserver les deux sites, très boisés, de toute exploitation pour soutenir \"leffort de guerre\" . La perspective vers le château de la Motte est magnifique.  A partir de la grille, flanquée dun ravissant petit pavillon dentrée, lallée conduit au château.","habitants":"Famille de Folleville\r\n        \r\n        \"","divers":"château de la Motte","gps":"","images":["../image/image_14/14_Motte_Calvados_1.jpg","../image/image_14/14_Motte_Calvados_2.jpg"]},"Consult_chateau_formulaire72d9":{"id":"Consult_chateau_formulaire72d9","dept":"14","canton":"Ouistreham","commune":"Biéville-Beuville","nom":"LaLonde","type":"Manoir","periode":"XVIII","histoire":"La LONDE, depuis sa construction, en 1749, la propriété a été transmise par héritage jusqu'à M. de Formigny de La Londe, son propriétaire actuel. A noter que le 7 juin 1944 : au lendemain du Jour J, les Anglais semparent sans coup férir du petit village de Matthieu et progressent plein sud vers Caen. En 1944 le château était occupé par les Allemands et a fait l'objet d'une bataille acharnée et sanglante après le débarquement allié, lors de l'opération Mitten les 27 et 28 juin 1944.","architecture":"La LONDE,   château du XVIIIe siècle est une demeure classique avec, sur chaque façade, un avant-corps central marqué par un fronton; en avant se détachent deux pavillons qui encadrent la grille, précédée d'un saut de loup. Les dégâts occasionnés par la seconde guerre mondiale ont été réparés entre 1954 et 1959. Occupé par les allemands lors de la seconde guerre mondiale, il a été le théâtre de violents combats lors de la bataille de Normandie en juin 1944. Restauré dans les années 1950, inscrit aux MH en 1947.Éléments protégés MH : le château de la Londe et ses pavillons d'entrée et son parc : inscription par arrêté du 28 août 1947.","habitants":"M. de Formigny de La Londe\r\n        \"","divers":"manoir de la Londe gps  49° 13' 50\" N, 0° 21' 57\" Ouest","gps":"","images":["../image/image_14/14_LaLonde_1.jpg","../image/image_14/14_LaLonde_2.jpg"]},"Consult_chateau_formulairece3a":{"id":"Consult_chateau_formulairece3a","dept":"14","canton":"Bretteville-l","commune":"Lantheuil","nom":"Lantheuil","type":"Château","periode":"XV-XVI-XVII","histoire":"Trois châteaux dans cet article ; Lantheuil, Pierrepont, et Maneville.                                                                                                            LANTHEUIL, acquis en 1613 par Antoine Turgot de Saint Clair. La construction du château a été entreprise par son fils Jacques, conseiller au parlement de Rouen, maître des requêtes et intendant de Rouen, qui fit élever le corps central ; son petit-fils fit adjoindre les deux ailes avant la fin du XVIIe siècle. Au début du siècle suivant, son arrière-petit-fils, Benoît-Antoine, aménagea les terrasses. La famille Turgot va conserver le château au fil des siècles et procède à bien des aménagements. Au sud, un jardin à lItalienne, longé dune terrasse, est agrémenté de statues.  en 1827 légué à Louis Félix marquis de Turgot issu de la branche de Soumont. Alliance avec la famille de Naurois relève le nom de Turgot  En 1885, le domaine est encore fort beau et linstituteur du village, M. Leboucher, pendant la seconde guerre mondiale, un état-major allemand occupe les lieux, le domaine est inscrit parmi les sites en mai 1943.  La paix revenue, la famille Turgot sattache à remettre en état la propriété familiale malmenée par la guerre.                                                                                                               PIERREPONT, date du XVIIIe siècle. Le château était la demeure de la famille de Saint-John de Crèvecur, un normand nationalisé américain, consul de France à New York, célèbre pour ses « lettres dun cultivateur américain » en 1792, considéré comme un texte fondateur de la littérature américaine. Le château de Pierrepont est aujourd'hui une maison d'hôtes et de prestige.","architecture":"LANTHEUIL, le corps central du château apparaît, niché dans le bas du vallon. Le pavillon coiffé d'un haut comble marque le centre de la façade sur le parc ; il est flanqué de deux ailes dont l'une aboutit à un autre pavillon à droite, le pavillon central est comme renforcé de 9 ouvertures toutes proches les unes des autres et qui étendent sa juridiction architecturale et décorative. Au sud, le jardin à la française existe toujours avec, près du château, quelques marches mènent vers un niveau supérieur où buis, ifs taillés, vasques et statues ponctuent des pelouses à lordonnancement classique. A louest, une terrasse où court une balustrade domine ce charmant jardin qui sachève tout au sud par un saut de loup.                                                                                      MANNEVILLE, le domaine est lié à la famille Turgot. Jacques Turgot entreprend la construction du château au début du XVIIe siècle. Louis-Félix Etienne, marquis de Turgot, pair de France sous la monarchie de Juillet, contribua au renouveau du domaine par la reconstruction de l'aile orientale du château. Éléments protégés MH : le domaine comprenant le château et la chapelle en totalité, la cour d'honneur, les douves, la terrasse nord avec la balustrade, les façades et les toitures de l'ensemble des bâtiments ainsi que la ferme, les jardins, l'assise foncière avec le parc, le potager, les allées d'accès, la grille d'entrée et les murs de clôture : classement par arrêté du 22 décembre 2008.","habitants":"Famille Turgot  de Saint Clair\r\n        \"","divers":"Trois châteaux dans cet article ; Lantheuil, Pierrepont grav 3-4, et Maneville grav 1-2.  Pierrepont GPS : 49° 16' 26,29\" Nord 0° 30' 19,57\" Ouest","gps":"49° 16' 26,29\" Nord 0° 30' 19,57\" Ouest","images":["../image/image_14/14_Lantheuil_1.jpg","../image/image_14/14_Lantheuil_2.jpg","../image/image_14/14_Lantheuil_3.jpg","../image/image_14/14_Lantheuil_4.jpg"]},"Consult_chateau_formulaireb8a9":{"id":"Consult_chateau_formulaireb8a9","dept":"14","canton":"Bretteville-l","commune":"Lasson","nom":"Lasson","type":"Château","periode":"XVI-XVII","histoire":"LASSON, le château de Lasson appartenait à la famille Vermès. Au XVIe siècle, les seigneurs du lieu étaient les Thésart, qui le firent construire,  dont les armoiries surmontent la porte d'entrée. Il passa ensuite en 1628 aux Croismare,  par mariage, Louis de Croismare plaquera sur l'extrémité Est, un étroit corps de bâtiment composé, sur chaque niveau, de deux pièces encadrant une terrasse.  Croismare, dans cette famille  plusieurs personnages le fils Louis de Croismare conseiller au parlement,  Nicolas de Croismare mathématicien, le petit fils Marc-Antoine ami de Diderot, de d'Alembert et de Grimm et par mariage passe aux Montalembert et  en 1874  à la mort d'Etienne-Alexandre s'arrête la ligné des Crosmare. Lhoste marquis de Livry à la fin du XIXe siècle, à la marquise de Livry qui met en vente le château divers propriétaire se succèderont.  Il a été acquis en 1979 par l'Association des Amis du château de Lasson.                                                                         ROTS, ce château est situé le long de la route de Bayeux. Sophronyme Beaujour, président de la chambre des notaires, fait construire ce château entre 1854 et 1860, à côté de lancien manoir Louis XV édifié vers 1720 et aujourdhui totalement disparu. Les plans et les élévations sont dus à larchitecte Charles Laisné, également auteur du Lycée Janson de Sailly, instigateur de la poursuite des travaux du Sacré-Cur de Montmartre et chargé de la restauration du Pont du Gard. Les deux pavillons dentrée ont été construits à la même époque. Les plus vieux arbres de lavenue datent du XVIIIe siècle. Le parc de 35 hectares est ceinturé par un mur de pierre de près de 3 km.","architecture":"LASSON, date du XIVe au XVIIe siècle. composé de deux corps de bâtiment principaux. Il a été remanié au XIXe siècle. Les communs du château datent du XVIIe siècle. Construit vers 1520, vaut moins par sa ligne générale, qui manque un peu d'unité, que par la magnificence de ses sculptures. Lucarnes, corniches, encadrements de fenêtres sont revêtus d'ornements ciselés dans la pierre avec une extraordinaire minutie. La porte d'entrée est ornée de pilastres et surmontée d'un fronton où se déploie un réseau de fines arabesques dans le style de la première Renaissance, d'une extrême élégance. Les battants de la porte sont ornés de masques de lions. Une inscription orne la façade de Lasson : \"Spero lacon by asses perlen\". Le latin, l'anglais, le français et l'allemand ont été utilisé pour son déchiffrage, et l'on est arrivé à la traduction suivante : \"j'espère que Lasson est assez orné\", le château, à l'exception du bâtiment des dépendances compris dans le pavillon carré établi au sud-ouest de l'édifice : classement par arrêté du 17 juillet 1917. Les façades et les toitures du bâtiment des communs : inscription par arrêté du 7 avril 1975. Le château, à l'exception du bâtiment des dépendances compris dans le pavillon carré établi au sud-ouest de l'édifice a été classé aux M.H.depuis le 17/07/1917, les façades et les toitures du bâtiment des communs sont inscrites depuis le 7/04/1975. Au début du XVIe siècle, dans le nouveau style Renaissance. Aux XVIIe et XVIIIe siècles, il y aura l'intégration des communs et la refonte des tours Est. La structure actuelle de l'intérieur du château date de la fin XIXe. Le château n'a pas été entretenu pendant de longues années, il a été classé aux M.H.","habitants":"Famille Vermès\r\n        \"","divers":"Château de Lasson  GPS : 49° 14' 03,84\" Nord, 0° 27' 39,96\" Ouest Lasson gps  49° 14' 04\" N, 0° 27' 40\" Ouest","gps":"49° 14' 03,84\" Nord, 0° 27' 39,96\" Ouest Lasson gps  49° 14'","images":["../image/image_14/14_Lasson_1.jpg","../image/image_14/14_Lasson_2.jpg","../image/image_14/14_Lasson_3.jpg"]},"Consult_chateau_formulaire9e03":{"id":"Consult_chateau_formulaire9e03","dept":"14","canton":"Ouistreham","commune":"Lion sur mer","nom":"Lion_sur_Mer","type":"Château","periode":"XVII","histoire":"LION sur MER, Jean le Sens accède à la noblesse en 1470 qui acheta le fief de Lion, c'était un château fort, bâti pour la famille de Moyon. Le \"grand fief de Lion\" entre, au XVIe siècle, en possession de ce même François Roger après avoir appartenu à la famille de Meullent du milieu XIIIe et de leurs descendants, lui est confisqué par les Anglais de 1418 à 1450 pendant la guerre de cent ans. Il est ensuite occupé par les de Folligny, Le fief de Baally aussi dit \"fief du chasteau de Lyon\". La famille Le Sens en fait l'acquisition en 1505. Robert Roger, descendant de François Roger, et André Le Sens se disputent le titre de seigneur de Lion en 1588. En 1557 décès d'Andrè Le Sens, en 1847 après le décès d'Armande-Henriette Le Sens de Folleville épouse le contre-amiral Gaspard  Morel de Than, le château est vendu à Auguste Massieu de Clerval puis transmit par succession à la famille, de Moncault  Il est encore occupé au XXIe siècle par des descendants de cette famille. Occupation  allemande durant la seconde guerre mondiale.","architecture":"LION SUR MER, se compose d'un corps de logis des XVIIe et XVIIIe siècles, et d'un pavillon en retour d'équerre vers le midi, bâti vers 1540, restaurée en 1863. Sur le plan du domaine établi en 1761, se trouve une basse-cour, une charretterie pressoir encore en place et un parc. Le pavillon renaissance est flanqué de deux échauguettes percées de trois ouvertures en plein cintre et surmonté d'un toit d'ardoises de grande hauteur. De remarquables lucarnes, à contreforts et arcs boutants, ornent la base du toit. Le corps de logis ouest, commencé au XVIe siècle, a été terminé au XVIIe siècle. La tour : Flanquée au sud d'une tourelle couronnée d'un  dôme et d'un lanternon et à l'est d'une tour élancée coiffée d'un toit conique, la tour a été bâtie au XVIe siècle à la même époque que le pavillon. Au sud un mur à pan coupé est rattrapé par une trompe qui soutient les murs à angle droit du deuxième étage. L'escalier à vis, qui permettait la communication entre la partie carrée centrale et le pavillon, a disparu remplacé au XVIIIe siècle par un escalier à trois volées. La porte plein-cintre et la fenêtre qui la surplombe ont été rajoutées au XVIIIe siècle.  La partie carrée : La partie centrale carrée de la seconde moitié du XVIe siècle est percée de deux rangées de deux fenêtres et couverte d'un toit à quatre pans muni de hautes lucarnes à frontons triangulaires du XVIIe siècle. La partie la moins élevée : À l'ouest, rebâti au XVIIIe siècle, un rez-de-chaussée percé de trois fenêtres est surmonté d'un étage aux trois lucarnes pendantes sous un toit brisé à la Mansart. Il est précédé d'un petit avant-corps et couvre une cave dont la voûte est soutenue par des arcs-doubleaux. Cette cave voûtée, partie la plus ancienne de la propriété, faisait partie du premier corps de logis du XVe siècle  qui n'existe plus.","habitants":"Famille Le Sens de Folleville  et de Roger\r\n        \"","divers":"Château de Lion-sur-Mer  GPS : 49° 18' 09\" Nord, 0° 19' 57\" Ouest","gps":"49° 18' 09\" Nord, 0° 19' 57\" Ouest","images":["../image/image_14/14_Lion_sur_Mer_1.jpg","../image/image_14/14_Lion_sur_Mer_2.jpg","../image/image_14/14_Lion_sur_Mer_3.jpg","../image/image_14/14_Lion_sur_Mer_4.jpg","../image/image_14/14_Lion_sur_Mer_5.jpg","../image/image_14/14_Lion_sur_Mer_6.jpg","../image/image_14/14_Lion_sur_Mer_7.jpg"]},"Consult_chateau_formulairefcba":{"id":"Consult_chateau_formulairefcba","dept":"14","canton":"Lisieux","commune":"Lisieux","nom":"Lisieux","type":"Château","periode":"XVI-XVII","histoire":"Cinq édifices à Lisieux ; la tour Lambert, l'ancien palais, Bray, la Houblonnière et Ouilly.                                                                              TOUR LAMBERT à Lisieux, la construction de la Tour Lambert date de 1491, de 1510 et de 1587. C'était un édifice fortifié. Le maitre d'oeuvre était Samaison Guillemot. La Tour Lambert est inscrite aux M.H. depuis le 19/05/1927.                                                                   PALAIS épiscopal de Lisieux fut construit, en 1680, pour Léonor II Goyon de Matignon, Evêque de Lisieux, de l'évêché de Lisieux. En brique et en pierre, Après la séparation de l'Église et de l'État, l'ancien palais épiscopal , après la Révolution, il abrite depuis le Palais de Justice. De 1864 à 2002, il abrita également les fonds de la Bibliothèque municipale. L'Ancien Palais épiscopal est composé de briques et de pierres.                                                                           A 4 K.M au sud est le manoir de BRAY à Glos, l'édifice est daté du XVIe siècle ou la fin du XVe siècle. Le site de la commune indique une construction au XVIIIe siècle et de larges remaniements au début du XXe siècle. propriété de M.N.B Dehshayes. Le manoir est inscrit au titre des M.H. depuis le 26 décembre 1928 en particulier les éléments suivants : élévation, toiture. Le manoir, légèrement asymétrique, s'organise autour d'une tour polygonale. Les deux ailes sont des constructions à pans de bois sur un premier niveau en pierre. L'étage est en encorbellement.","architecture":"A 10 K.M à l'ouest, la HOUBLONNIERE  Il s'agit d'un ancien château-fort remanié aux XVe et XVIe siècles, appartenait à la famille de Guérin au XVe siècle. On entre par une poterne en pierre de taille flanquée de deux échauguettes sur culots moulurés. La porte charretière et la porte piétonne sont surmontées de gâbles en accolade. Le donjon découronné dont l'appareil comprend des lits de brique disposés dans les murs en blocage défendait l'entrée, il est éclairé par des fenêtres à meneaux. Par la poterne on accède à la cour d'honneur fermée par un haut bâtiment en pierres de taille, percé d'un porche et épaulé de contrefort. Le logis en brique et pierre a conservé également ses fenêtres à meneaux. Cette habitation seigneuriale est aujourd'hui une ferme. Éléments protégés MH le château en totalité,  inscription par arrêté du 19 janvier 1927.                                                                                                         OUILLY DU HOULLEY A l'est de lisieux à 10 K.M.  à Ouilly du Houlley, « Martin d'Ouillie, qui figure dans les rôles de l'échiquier de Normandie, à la date de 1180, fut, des plus lointains seigneurs de ce lieu, le seul dont on ait conservé le nom  A la fin du XIIe siècle, le fief d'Ouilly-le-Ribauld devint la propriété de la puissante famille des Crespin qui possédait aussi la baronnie de Tillières.  Reconstruit vers 1450, il cède une seconde fois pendant les guerres de religions. « C'était un 15 août 1592 et la garnison avait le droit de boire ce jour-là. » Reconstruit vers 1605 le château sera ensuite épargné Dans la cour intérieure au style renaissance avec sa tour octogonale, Le château offre un très grand intérêt. Il est construit sur la croupe d'un mamelon assez élevé, et sa masse carrée, vue des coteaux voisins, est fort imposante. François-Xavier Lebon.","habitants":"Houblonnière,famille de Guérin                                                       Bray; M.N.B Dehshayes.                                                    Ouilly, famille des Crespin\r\n        \"","divers":"Cinq édifice à lisieux ; la tour Lambert, l'ancien palais grav 6, Brais grav-4, la Houblonnière grav-3 et Ouilly grav-5.   Tour GPS : 49° 08' 44,05\" Nord, 0° 13' 17,18\" Est                                                       PalaisGPS : 49° 08' 48\" Nord, 0° 13' 34\" Est                               Houblonniere   GPS : 49° 07' 28\" Nord, 0° 06' 15\" Est                                Ouilly; \r\n gps 49° 10' 17\" Nord , 0° 19' 44\" Est","gps":"49° 08' 44,05\" Nord, 0° 13' 17,18\" Est","images":["../image/image_14/14_Lisieux_1.jpg","../image/image_14/14_Lisieux_2.jpg","../image/image_14/14_Lisieux_3.jpg","../image/image_14/14_Lisieux_4.jpg","../image/image_14/14_Lisieux_5.jpg","../image/image_14/14_Lisieux_6.jpg"]},"Consult_chateau_formulaireaf98":{"id":"Consult_chateau_formulaireaf98","dept":"14","canton":"Bayeux","commune":"Longues sur Mer","nom":"Longues_sur_Mer","type":"Château","periode":"XVI-XVII-XVIII","histoire":"Deux châteaux à Longues  dont celui de Longues et Manvieux. entre deux Commes château d'Escurès.                                                                            ESCURES, château figurant sur le cadastre de 1809 dont il ne reste qu'un corps secondaire difficilement datable, bordant à l'ouest la cour des communs. Ensemble reconstruit autour de 1869 par l'architecte parisien Jean Louis Pascal pour Mr Gosset. Galerie nord et véranda édifiées en 1873. En 1909, transformation dans l'aménagement du deuxième étage par Lair architecte à Bayeux. LONGUES sur MER, édifice mentionné en 1651,  date où il est acquis par Richard Bunouf Bunouville. D'après deux tableaux de 1887, le corps de logis parait avoir été reconstruit, ou entièrement transformé au XVIIIe siècle. En 1910, travaux de remodelage réalisés par Laiviel, architecte à Bayeux, d'après les dessins du propriétaire de la demeure, René Desclosières (archives privées).                                                                                                   MANVIEUX A  trois K.M. à l'est le château de à Manvieux, corps de logis bâti ou rebâti au XVIe ou XVIIe siècle ; entièrement remanié en 1717 (date sur la souche de cheminée sud du logis); à la même époque, édification des bâtiments agricoles autour de la cour (1718 sur l'ancienne grange), une nouvelle charretterie construite au XIXe siècle; grange et étable près de l'angle est démolies en 1990 ; restauration générale des autres bâtiments en cours. Corps de logis édifié en moellon enduit, à façade principale ordonnancée, comprenant deux caves voûtées en berceau plein cintre et un pavillon d'escalier dont la cage est couverte d'une fausse voûte en arc-de-cloître ; bâtiments agricoles bâtis en moellon.","architecture":"ESCURES, transformation dans l'aménagement du deuxième étage par Lair architecte à Bayeux. Probablement à la même époque, construction de nouvelles écuries en bordure du jardin potager. Véranda détruite dans le courant du XXe siècle. Travaux récents pour l'aménagement d'un hôtel de charme, galerie fermée et augmentée d'un toit brisé, dédoublement de la toiture du pavillon. Corps principal du logis : un étage carré et un étage de comble, façade ordonnancée, comble brisé, en moellon enduit. Pavillon du logis : sous-sol, deux étages carrés, un étage de comble, façades à travées, en moellon enduit, toit brisé en pavillon. Galerie nord : rez-de-chaussée en pierre de taille, étage en bois, toit primitivement en appentis. Serre : toit en verre et en appentis.                                                                                   LONGUES sur MER  corps de logis totalement remanié mais les pavillons prévus aux extrémités n'ont pas été réalisés, construction d'une aile de communs. Gravement endommagé par des bombardements en 1944 le corps de logis a été restauré et la travée nord reconstruite. En 1956 construction du logement du jardinier. Corps de logis en moellon enduit, avant corps en pierre de taille ; aile des communs : moellon, chambranles des ouvertures, corniche et souches en brique, toit brisé.","habitants":"Escurès ; Mr Gosset                                                                              Longues; Richard Bunouf Bunouville\r\n        \"","divers":"Deux châteaux à Longues  dont celui de Longues et Manvieux grav-3 escurés grav-2\r\n49° 20' 09\" nord, 0° 41' 44\" ouest\r\nManvieux gps 49° 20' 13\" nord, 0° 39' 17\" ouest","gps":"","images":["../image/image_14/14_Longues_sur_Mer_1.jpg","../image/image_14/14_Longues_sur_Mer_2.jpg","../image/image_14/14_Longues_sur_Mer_3.jpg"]},"Consult_chateau_formulaire0082":{"id":"Consult_chateau_formulaire0082","dept":"14","canton":"Falaise","commune":"Louvagny","nom":"Louvagny_Barou","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article, Louvagny, Barou et Vicques.                                                                                         LOUVAGNY, en 1651 fief de Haubert en faveur de François de Beaurepaire.  La famille porte depuis le nom de Beaurepaire de Louvagny. Tous les descendants portent le titre de vicomte, le titre de comte continuant à être porté par le chef de famille, descendant de la branche ainé. Le titre de marquis, accordé par Louis XV à Marc Antoine de Beaurepaire  ne fut pas relevé. Le château cessa d'être la propriété de la famille de Beaurepaire par succession et filiation Joseph, Alexandre, Reine de Beaurepaire, né à Louvagny le 1er octobre 1783, épousa en 1833 N. de Robillard. De cette union, naquirent quatre filles. Aucune des trois premières ne se marièrent. La quatrième, Marie, Élisabeth (5 août 183822 mars 1899) épousa M. de Postel, qui hérita du château.  Enfin, Éliane (1931-1995), la petite-fille de M. de Postel, devenue seule héritière du château, épousa le 3 mars 1955, le capitaine Jean Chavane de Dalmassy, dont un des descendants est actuellement en 2011 le propriétaire.»                                                  A deux K.M. au sud  BAROU, le château féodal passait pour le plus remarquable de toute la contrée, il fut sans doute bâti par les Harcourt, qui possédaient alors le domaine. La demeure appartenait en 1674 à Charles de Morel. L'ancien logis, du XVe siècle, avec tours d'angle et échauguettes, était en ruine en 1813, il fut détruit dans la même année par M. de Colomby qui éleva le château actuel en 1816, et d'après les statistiques d'arrondissement de Falaise \"le château moderne est petit, mais de bon goût et très bien bâti. Une jolie rotonde est au centre, vers les bosquets. Nous n'en connaissons pas de plus gracieux dans tout le canton\".","architecture":"LOUVAGNY, le corps de logis le plus ancien du château remonte au XVIIe siècle, cette partie, comportant l'aile en retour nord terminée par un pavillon carré, a été bâtie de 1651 à 1664. Le corps en retour, accolé à une tourelle en demi hors-uvre, fut élevé au début du XVIIIe siècle. Les bouches à feu qui flanquent l'ensemble rappellent la vocation défensive du site. Entre 1830 et 1840 les douves qui ceinturaient l'ensemble ont été comblées. Un pont dormant permettait le franchissement. Un parterre conforme aux canons du XVIIIe siècle, prolonge la façade sud. Dans le parc un pavillon du XVIIe siècle pourrait avoir servi de maison de garde. Au XIXe siècle, un pont-levis a été ajouté dans la cour d'honneur. La glacière située dans le parc sert depuis le XXe siècle, au captage de la source qui alimentait les douves. Éléments protégés MH : les façades et les toitures du château et du bâtiment du XVIIe siècle dans le parc, la porte de l'ancien pont levis, l'escalier intérieur avec sa rampe en fer forgé, la salle à manger avec leur décor et le grand salon. La porte romane dans le parc: inscription par arrêté du 10 août 1977. L'assiette des sols avec le réseau hydraulique, la cour d'honneur, les façades et les toitures des communs la bordant : inscription par arrêté du 6 avril 2006.                                                                                      A trois K.M à l'est le château de VICQUES  l' actuel est bâti dans la seconde moitié du XVIe siècle et la première moitié du XVIIe siècle. Il a été construit au XVIe au XVIIe siècle, et au XIXe siècle, sur l'emplacement d'un ancien château fort du XIIe siècle. Le colombier date de la fin du XVIe siècle. Les communs datent de 1744 et témoignent de l'importance agricole du domaine seigneurial. Le château fit l'objet d'importants travaux au XIXe siècle. Situés sur la rive droite de la Dives.","habitants":"Louvagny; famille de Louvagny.                                                               Barou; M. de Colomby   Vicques;\r\n        \"","divers":"Trois châteaux dans cet article, Louvagny, Barou et Vicques. Barpou GPS : 48° 56' 56\" Nord, 0° 02' 57\" Ouest                                                          Vicques GPS : 48° 56' 42\" Nord, 0° 04' 43\" Ouest","gps":"48° 56' 56\" Nord, 0° 02' 57\" Ouest","images":["../image/image_14/14_Louvagny_Barou_1.jpg","../image/image_14/14_Louvagny_Barou_2.jpg","../image/image_14/14_Louvagny_Barou_3.jpg","../image/image_14/14_Louvagny_Barou_4.jpg"]},"Consult_chateau_formulaire0554":{"id":"Consult_chateau_formulaire0554","dept":"14","canton":"Caen","commune":"Louvigny","nom":"Louvigny","type":"Château","periode":"XVI","histoire":"LOUVIGNY, cest la famille de Bernières de Louvigny qui fait édifier le château à la fin du règne dHenri IV.  On distingue trois cours, la première était limitée par lOdon quon franchissait par un pont qui existe encore ; la seconde, fermée par un mur de clôture souvrait sur une belle porte,  un des pavillons qui cantonnait cette cour existe encore dans la cour du château ; la troisième était encadrée par les ailes du bâtiment principal dont il reste quelques éléments dans le château actuel.  Le parc est dessiné avant la Révolution pour les Hautefeuille. Le plan napoléonien montre les grandes structures du parc : alignements le long des voies au sud et à louest, masses boisées, prairies. Y figurent également des espaces jardinés et des promenades boisées à proximité des bâtiments. Le dessin des canaux est semblable à celui daujourdhui. Trois îles sont représentées, sur lune delle la sépulture des Hautefeuille est symbolisée par un obélisque. Les bombardements de 1944 ont gravement mutilé le château et ses jardins qui ont souffert ensuite dun manque dentretien. Les canaux qui entouraient les trois îles ont été asséchés par des modifications dans le système dalimentation en eau de la ville de Caen et des régimes hydriques des rivières.","architecture":"LOUVIGNY, à proximité des canaux et du château, les boisements ont permis dy aménager des promenades ombragées aux vues variées. En opposition à ces espaces fermés, de larges prairies sétendent vers lOdon. Un espace ouvert existe également devant le château avec des vues vers les canaux. Les magnifiques arbres qui sont encore présents aujourdhui (platanes, noyers dAmérique) témoignent de plantations dornement isolées ou en bosquet. Lentrée nord du château seffectue par une allée bordée dalignements de pins. A lest du site des parcelles agricoles complètent le parc\".  Lancienne entrée ouest, doù ont disparu les alignements darbres, mène aux bâtiments agricoles de la ferme, dissimulés derrière une haute haie. Lentrée sud est aujourdhui lentrée principale, au centre du site. Lavenue de léglise longée de murs de pierres est bordée de chaque côté de magnifiques tilleuls centenaires. Elle conduit à une grille dentrée au-delà de laquelle les alignements de pins de lentrée nord subsistent toujours. Sur la moitié Est sétend le parc du château où le logis principal (aile restaurée de lancien château) sélève au milieu dune prairie bordée par des boisements de feuillus qui suivent, à lOuest le tracé des anciens canaux, où subsiste une porte du XVIIe siècle.","habitants":"Famille des Hautefeuille\r\n        \"","divers":"Château de Louvigny\r\ngps 49° 09' 37\" nord, 0° 23' 06\" ouest","gps":"","images":["../image/image_14/14_Louvigny_1.jpg","../image/image_14/14_Louvigny_2.jpg","../image/image_14/14_Louvigny_3.jpg"]},"Consult_chateau_formulaire3188":{"id":"Consult_chateau_formulaire3188","dept":"14","canton":"Bayeux","commune":"Magny en Bessin","nom":"Magny_en_Bessin","type":"Château","periode":"XIV-XVII","histoire":"MAGNY en BESSIN,  au XIVe siècle mention d'un château fort ; fief acquis par Nicolas Joseph Foucault, intendant de la généralité de Caen de 1689 à 1706 : obtient pendant l'hiver 1694 1695 l'érection en marquisat avec haute Justice s'étendant sur les paroisses de Magny, Ryes, Manvieux, Tracy et Arromanches; il fait construire le château actuel : inscription sur la charpente du corps de l'horloge : \"Jules Gnesnet âgé de 18 ans et mon père âgé de 45 ans a fait ce bâti en l'an 1715\". En janvier 1773 il est vendu au marquis de La Rivière, seigneur de Courseulles, commanditaire probable du nouveau décor intérieur; vers 1840, réaménagement paysager des abords pour le comte Charles de Bonvouloir; vendu en 1939, devient usine de teillage:  en 1960 édification  ; l'usine ayant cessé son activité, le logis a été vendu séparément depuis 1986. Abandonné depuis le XXe siècle, il est partiellement détruit par deux incendies successifs en mars 2016. Le château a été sélectionné par Stéphane Bern, à la tête de la Mission d'identification et de sauvegarde du patrimoine en péril, en vue de bénéficier d'une aide financière d'urgence issue du loto du patrimoine dont le tirage a eu lieu les 15 et 16 septembre 2018, à l'occasion des journées européennes du patrimoine.","architecture":"MAGNY en BESSIN, vendu en 1939, devient usine de teillage:  en 1960 édification  ; l'usine ayant cessé son activité, le logis a été vendu séparément depuis 1986.   en moellon enduit, pierre de taille pour les deux perrons et les trois avant corps de la façade postérieure, bossage continu en table sur le rez-de-chaussée des avant corps de la façade postérieure ; sous-sol du logis : partie correspondant aux avant corps centraux voûtées en berceau en anse de panier, voûte d'arêtes sous le perron de la façade antérieure, voûte en arc de cloître pour le palier du grand escalier, sanctuaire de la chapelle formant un édicule hors-oeuvre ; grand escalier du logis tournant avec jour, avant corps en pierre de taille, façade principale ordonnancée, voûtées en arc de cloître, escalier tournant avec jour ; grande remise : moellon enduit, rez-de-chaussée sur cour en pierre de taille, remise divisée en deux vaisseaux par une file de colonnes toscanes ; corps de l'horloge : moellon enduit, façade sud-est en pierre de taille, façades sud-est et sud-ouest , escalier tournant sans jour, au sous-sol ancienne cuisine voûtée en arc de cloître, rez-de-chaussée surélevé et étage de comble, corps accolé en appentis au nord-est, vestiges d'un passage en fossé reliant ce corps au logis.","habitants":"Nicolas Joseph Foucault\r\n        \"","divers":"Château de Magny en Bessin.                                                   Gps 49° 18' 27\" nord, 0° 39' 54\" ouest","gps":"","images":["../image/image_14/14_Magny_en_Bessin_1.jpg","../image/image_14/14_Magny_en_Bessin_2.jpg"]},"Consult_chateau_formulaire803c":{"id":"Consult_chateau_formulaire803c","dept":"14","canton":"Livarot","commune":"Saint-Julien-de-Mailloc","nom":"Mailloc_14","type":"Vestiges","periode":"XVII","histoire":"MAILLOC, autrefois existait une forteresse entourée de douves et détruite durant la guerre de Cent Ans. Cest à la fin du XVe, voir début du XVIe siècle, que fut reconstruit un château rectangulaire en pierre de taille. Flanqué de quatre tours massives avec mâchicoulis et meurtrières. La tradition a longtemps voulu que chacune des quatre tours fût située sur le territoire de Saint Julien de Mailloc, de Saint Pierre  de Saint Martin et de St Denis . Ce qui faisait de cette bâtisse \"le château des Quatre Mailloc\", mais la demeure sinscrit tout entière sur la commune de Saint Julien de Mailloc. Au XVIIe siècle, Gabriel de Mailloc, opéra quelques modifications afin datténuer laustérité des lieux (nouveau logis, pavillons, perron). Mailloc devint un ensemble sobre mais très racé. En 1693, la Baronnie de Mailloc fut érigée en Marquisat. A cette époque, par lalliance de Gabriel René de Mailloc et de Lydie dHarcourt, les châteaux de Mailloc et du Champ-de-Bataille appartenaient à la même famille. La dynastie des Mailloc possédait la terre depuis le XIe siècle lorsque décéda en 1724, Gabriel René de Mailloc. Lydie dHarcourt hérita, mais ses héritiers durent vendre afin de faire face à des problèmes financiers, Mailloc fut acheté en 1760 par la comtesse dHoudetot amie de J-J Rousseau, qui souhaitait installer là lauteur, mais celui-ci refusa. Achetée en 1785 par la famille Couvert de Coulombs, la demeure fut pillée durant la Révolution. En 1813, Pierre Simon de Laplace, physicien et mathématicien se porte acquéreur du domaine. La propriété appartint au marquis de Portes, puis à la famille Colbert Chabannais dont une branche, toujours propriétaire, a pris le nom de Colbert Laplace.","architecture":"MAILLOC . Dans la nuit du 10 au 11 décembre 1925, un incendie se déclara dans les quatre tours. Devenu un amas de ruines calcinées, le château autrefois ceinturé de jardins à la française, davenues darbres et de pelouses, fut enseveli sous un linceul de lierre et de ronces. Le château de Mailloc a été restauré et à nouveau habité.  Même sil a perdu ses tours Renaissance, il conserve quelques chose de farouchement superbe, le nom de Laplace y résonne encore. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 17 mai 1933.                                                                St-PIERRE de MAILLOC, siège des barons de Mailloc, le château passe ensuite à la famille d'Harcourt puis à la famille Colbert-Laplace en 1813 La sépulture de Laplace, en forme de temple grec à colonnes doriques, se trouve dans un pré à l'écart du village de Saint-Julien-de-Mailloc. L'édifice est victime d'un incendie accidentel dans la nuit du 10 au 11 décembre 1925 du fait d'un feu allumé par une cuisinière logée dans les parties supérieures d'une tour pour se prémunir du froid en dépit d'une interdiction formelle des propriétaires.  Flanqués de tours rondes, le château de Mailloc est un édifice en ruines situé sur lancienne commune de Saint-Julien-de-Mailloc et la commune nouvelle de Valorbiquet dans le département français du Calvados. Il était qualifié d'une des merveilles monumentales de la Normandie.","habitants":"Gabriel de Mailloc, Comtesse dHoudetot                                          ST-Pierre :famille d'Harcourt\r\n        \"","divers":"Château de Mailloc  Gps  49° 04' 26\" nord, 0° 19' 04\" est                           St-Pierre de Mailloc gps 49° 04' 06\" nord, 0° 19' 08\" est","gps":"","images":["../image/image_14/14_Mailloc_14_1.jpg","../image/image_14/14_Mailloc_14_2.jpg","../image/image_14/14_Mailloc_14_3.jpg","../image/image_14/14_Mailloc_14_4.jpg"]},"Consult_chateau_formulaire509d":{"id":"Consult_chateau_formulaire509d","dept":"14","canton":"Pont-l","commune":"Norolles","nom":"Malou","type":"Château","periode":"XVI","histoire":"MALOU « Norolles s'enorgueillit de son manoir de Malou, du XVIe ou XVIIe siècle, d'aspect plus militaire. Il appartenait avant 1789 à la famille de Foye (Foë) et son fief dépendait de la seigneurie de Fauguernon. En pierre et briques à chaînes harpées de pierre, il fait appel également aux damiers et pans de bois. Si le manoir voisin de la Pelletière est du XVIIe, la ferme de la Vallée remonte au XVIe. Propriété de M. Houdoin.","architecture":"MALOU, a été construit au XVIe siècle. L'élévation antérieure est cantonnée de deux tourelles à poivrière, en calcaire. Les élévations latérales sont constituées d'un appareillage mixte, brique et pierre pour la partie gauche, et en pan de bois en partie supérieure pour l'aile droite. L'élévation postérieure, reprise au XVIIIe siècle au moment du réaménagement intérieur, comprend une partie en pan de bois à gauche, et une partie maçonnée au centre et sur l'aile droite. La porte est flanquée de deux petites tours. Éléments protégés MH : la façade avec la porte d'entrée et la toiture : inscription par arrêté du 11 octobre 1930. La façade arrière du logis et la toiture correspondante, la terrasse et l'escalier (lieudit Cour de Malou) : inscription par arrêté du 22 novembre 2006. Les tours sont en calcaire. Les ailes sont bâties selon un mode de construction différencié : tandis qu'une d'entre elles est en brique et pierres, l'autre est à pans de bois. La partie de l'édifice reprise au XVIIIe siècle reprend cette dichotomie entre un espace à pans de bois et une partie en maçonnerie.  Le château était muni autrefois d'un pont-levis et d'un fossé.","habitants":"Famille de Foye \r\n        \"","divers":"château de Malou gps 49° 12' 08\" nord, 0° 14' 20\" est","gps":"","images":["../image/image_14/14_Malou_1.jpg","../image/image_14/14_Malou_2.jpg"]},"Consult_chateau_formulaire7132":{"id":"Consult_chateau_formulaire7132","dept":"14","canton":"Bayeux","commune":"Ponts de Seulles et Creully","nom":"Manneville","type":"Château","periode":"XVII-XVIII","histoire":"MANNEVILLE, il date du XVIIe et XVIIIe siècle, provenant des descendants du ministre du roi Louis XVI. L'état  la rachetées  de quoi restaurer le château de Manneville dont la toiture à la Mansart a grand besoin d'être restaurée. En 1613, Antoine Turgot de Saint Clair acquiert la propriété où son fils, Jacques Turgot, érige le château de style Louis XIII. Quelques années avant la fin du XVIIe siècle, le petit-fils d'Antoine Turgot fait construire 2 ailes en retour qui encadrent le corps central.","architecture":"MANNEVILLE, depuis le XVIIIe siècle, l'accès au château s'effectue par une avenue d'honneur de 800 mètres environ, L'intérieur abrite une coiffeuse en maroquinerie Louis XVI, une pendule de la même époque avec un régulateur et une bibliothèque, où sont conservés de nombreux volumes rares du XVIIIe et XIXe siècles, dont un brouillon de Jacques Turgot acceptant la nomination de contrôleur général des finances. Le corps central est composé d'un pavillon surélevé d'un étage, dont les façades sont en pierre d'Orival. Des pilastres ioniques encadrent les baies du perron donnant accès à la porte-fenêtre. Au-dessus du pavillon central, un campanile abrite la cloche de l'horloge. La toiture à la Mansart percée de lucarnes a été dégradée durant la Seconde Guerre mondiale. Après avoir été occupée par un état-major dès juin 1940, puis pillé, le bâtiment subit quelques dégâts à la suite de l'explosion d'une bombe. Quelques marques de rafales de mitrailleuse subsistent encore sur les murs. L'ensemble du domaine de Manneville est classé aux M.H. depuis le 22/12/2008.","habitants":"Antoine Turgot de Saint-Clair \r\n        \"","divers":"Manneville GPS : 49° 16' 01\" Nord, 0° 31' 42\" Ouest","gps":"49° 16' 01\" Nord, 0° 31' 42\" Ouest","images":["../image/image_14/14_Manneville_1.jpg"]},"Consult_chateau_formulairea270":{"id":"Consult_chateau_formulairea270","dept":"14","canton":"Courseulles-sur-Mer","commune":"Meuvaines","nom":"Maronnes","type":"Château","periode":"XVII-XVIII","histoire":"MARONNES, du XVIIIe siècle, au XIIIe siècle peuplé de riches propriétaires terriens  d'où les sept manoirs figurant sur le cadastre de 1809 dont quatre occupent encore la partie nord du bourg ; en 1390, première mention du havre d'Heurtault, petit port a l'embouchure de la Gronde qui connaît une activité intense au XVIe siècle ; il disparaît en 1676 entraînant le déclin progressif des hameaux du Marais et des Roquettes dont les dernières demeures ont été détruites pendant la guerre de 1940-1945 ; du hameau de Maronnes, qui était encore assez étendu en 1809 et dont la chapelle fut fermée à la Révolution, ne subsistent plus que quelques maisons et le château. Le fief de Maronnes dépendait au XVIIe siècle de celui de Meuvaines, de cette époque subsiste un corps de logement secondaire; logis reconstruit pour la famille de Grimouville, attribuable à Jacques Moussard architecte bayeusain (1747 sur la façade arrière), à la même époque édification du corps des remises et écuries, des douves et peut-être creusement du canal; au XIXe siècle, ce dernier est comblé, un nouveau corps de remise et d'écuries est construit, le corps de logement secondaire est remanié, le jardin transformé en parc paysager et les douves en étang; en 1924  le bâtiment en rez de chaussée accostant le logis au sud est est converti en pavillon d'un étage ; hangar ajouté en 1936 ou 1937 contre le mur extérieur du potager, deuxième hangar ajouté plus tard à l'intérieur de ce dernier.","architecture":"MEUVAINES,  du XVIIe siècle, château fort est mentionné à Meuvaines au XIVe siècle. Le château actuel a été bâti pour la famille de la Niepce, noblesse de robe à Caen : corps de logis portant la date 1669, corps de communs dit le petit château élevé au même moment; tout le domaine semble avoir alors été restructuré autour de la grande avenue axiale. Au XVIIIe siècle modification du logis pour la famille de la Rivière qui réalise l'élévation d'un étage et la reconstruction du perron. Travaux pour la famille de Savignac: communs en cours de transformation en 1809 d'après les matrices cadastrales, avec la surélévation du logement central d'un étage attique puis le remaniement complet des remises et écuries latérales, c'est probablement à ce moment qu'ils reçoivent l'enduit rouge qui leur vaudra l'appellation de petit château rouge; entre 1809 et 1834, quinconce planté devant l'entrée, cour d'honneur aménagée en jardin paysager et douves latérales comblées, la douve séparant le jardin de l'avenue simplifiée en hémicycle. Vers 1960 construction de deux pavillons en bordure de la douve d'entrée; la grille d'entrée a été installée en 1978; logis et anciens communs forment aujourd'hui deux propriétés différentes. Corps de logis : cuisine voûtée en sous-sol, escalier rampe sur rampe dans-oeuvre, façades nord et sud ordonnancées, fenêtres du sous-sol et du rez-de-chaussée à plate bande en bossage extradossée en escalier ; communs : corps central de logement à un étage carré plus un étage attique, corps latéraux contenant remises et écuries au rez-de-chaussée et logements à l'étage, escalier dans-oeuvre tournant à retours avec jour renforcé par des colonnes dans le corps latéral est, façades nord et sud ordonnancées.","habitants":"Maronnes, famille de Grimouville,                                                     Meuvaines famille de la Niepce\r\n        \"","divers":"Château de Maronnes trav-1-2 à Meuvaines gps 49° 19' 41\" nord, 0° 33' 55\" ouest","gps":"","images":["../image/image_14/14_Maronnes_1.jpg","../image/image_14/14_Maronnes_2.jpg","../image/image_14/14_Maronnes_3.jpg","../image/image_14/14_Maronnes_4.jpg","../image/image_14/14_Maronnes_5.jpg"]},"Consult_chateau_formulaire5782":{"id":"Consult_chateau_formulaire5782","dept":"14","canton":"Bretteville-l","commune":"Martragny","nom":"Martragny","type":"Château","periode":"XVIII","histoire":"MARTRAGNY, construit en 1747 par le marquis de Grangues,  en 1755  le domaine est cédé à Henri de Grimouville, en 1766  leur fille  Henriette par alliance avec Louis-François-Auguste de Cyresme chevalier de St-Louis  héritier de la seigneurie de Blainville sur mer,  le ménage aura  plusieurs enfants le fils  Charles-François (1770-1838) chevalier de Malte habite au château à l'époque de la Révolution, le domaine revient  à son neveu Gabriel époux d'Isabelle Ogier d'Ivry puis à leur fille Marie mariée en 1867   avec Rudolphe de Mons de Carantilly  en 1925  par obligation de droits de succession cède le domaine à un marchand de bien de Caen qui le dépouille, à la famille Livry-Leve Philippe, achète le château pour établir une de  leur fille cette dernière décède prématurément,  il cède le château à un ménage d'agriculteurs la famille Simonet. Utilisé comme hôpital de campagne en 1944 , en 1956 repris par la famille Buon et en 1971, le domaine acheté par la famille de Saint-Victor, qui a aménagé un camping international 4 étoiles dans le parc pour en assurer les frais d'entretien du château, en 1989  acquis par  la famille de Buretel de Chassey.","architecture":"MARTRAGNY,  se compose d'un corps central que prolongent deux pavillons bas coiffé de toits à la mansart, le corps central double en profondeur est coiffé d'un haut comble à forte pente. Sa façade postérieure donne sur le jardin  à six travées trois d'entre elles sont groupées sous un grand fronton  triangulaire  percé d'un oculus.  Après le débarquement allié en Normandie du 6 juin 1944, le château de Martragny, libéré le 6 juin au soir, a servi d'hôpital. Une grande croix rouge était placée sur le toit pour protéger le site des bombardements. Les blessés étaient soignés dans les pièces du château. Dans l'allée, les morts étaient enterrés provisoirement en attendant d'être transférés par la suite dans des cimetières militaires.","habitants":"Henri de Grimouville\r\n        \"","divers":"Martragny, gps 49° 15' 06\" nord, 0° 35' 45\" ouest","gps":"","images":["../image/image_14/14_Martragny_1.jpg","../image/image_14/14_Martragny_2.jpg"]},"Consult_chateau_formulaire2eb3":{"id":"Consult_chateau_formulaire2eb3","dept":"14","canton":"Ouistreham","commune":"Mathieu","nom":"Mathieu","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article; Mathieu, Mesnil  et Vauville.                         MATHIEU; fut construit par le marquis de Fresnel, à partir de la seconde moitié du XVIIIe siècle, mais les travaux furent stoppés par la Révolution française, ce château était habité par les seigneurs qui possédaient le fief de Saint-Ouen. Après 1789, le domaine devient bien national. Tous les biens du marquis sont alors saisi. Lors de la restitution des biens en 1802, sa fille rachète le château. Elle consacrera sa vie à récupérer les biens dispersés. Ce lourd achat l'a ruiné et elle est contrainte de vendre.  Situé au quartier de la Capelle, le château actuel a été construit au XVIIIe siècle, et bien restauré au XXe siècle après les dégâts subis au cours de la dernière guerre mondiale. Rachel racheta la part de la propriété de sa soeur en 1888. Le couple aura une fille Emma qui se mariera avec Alexandre Bigot, élu doyen de la faculté des sciences de Caen. Il fit partie des scientifiques qui découvrirent la baleine de Luc », précise Paul Henry. Emma et Alexandre eurent deux filles, Jeanne et Louise et un fils. « Le fils est décédé lors de la guerre 14-18.  Jeanne épousa Pierre Henry, ils eurent 5 enfants et à la suite du décès de Jeanne, Louise se maria avec son beau-frère Pierre Henry, devenant ainsi mère adoptive des cinq jeunes enfants de sa soeur. « Quatre enfants naîtront de cette union ».","architecture":"MATHIEU situé à la Capelle, le château actuel date du XVIIIe siècle,\r\nconstruit en pierres de taille et moellons avec enduit, il possède une façade symétrique, avec avant-corps central et fronton triangulaire. \r\nLa chapelle de style rocaille et le logement du concierge sont visibles de part et d'autre de l'entrée. Le parc rassemble des arbres d'essences rares dont un noyer d'Amérique d'une circonférence de 3,70m.                                                                                                                     MESNIL, le corps principal, construit au XVIIIe siècle sur un soubassement, est constitué d'un rez-de-chaussée, sa façade orientale s'ouvre sur une large avenue menant à la route de Caen. Le motif central avec pilastres doriques est surmonté d'un fronton arrondi précédé d'un perron en fer à cheval. La façade ouest, très jolie, ouvre sur une terrasse coupée par un escalier encadré de deux sphinx. A droite de l'entrée du château, se trouve l'oratoire Saint-Jacques. Le parc est agrémenté d'une belle orangerie construite au XVIIIe siècle.                                                                                                                            VAUVILLE, situé route d'Anisy, quartier du Carel, le château de Vauville a été construit au XVIIe siècle, mais l'aile en retour date du XIXe siècle. Après les dégâts subis au cours de la dernière guerre mondiale le château a été très bien restauré. Une allée mène vers un portail d'entrée majestueux : deux piliers surmontés de deux lions encadrent une grille élevée, belle uvre de ferronnerie. Deux lucarnes rectangulaires et deux ils-de-buf éclairent les combles.\r\nÉléments protégés MH : la façade principale et la toiture correspondante : inscription par arrêté du 7 décembre 1972.","habitants":"Mathieu; Marquis de Fresnel\r\n        \"","divers":"Trois châteaux dans cet article; Mathieu grav-1, Mesnil grav-2  et Vauville grav 3 à 5.            \r\nVauville gps  49° 18' 44\" nord, 0° 03' 10\" est","gps":"","images":["../image/image_14/14_Mathieu_1.jpg","../image/image_14/14_Mathieu_2.jpg","../image/image_14/14_Mathieu_3.jpg","../image/image_14/14_Mathieu_4.jpg","../image/image_14/14_Mathieu_5.jpg"]},"Consult_chateau_formulaire0481":{"id":"Consult_chateau_formulaire0481","dept":"14","canton":"Cabourg","commune":"Merville Franceville","nom":"Merville_Calvados","type":"Château","periode":"XVII","histoire":"MERVILLE, l'actuel château de Merville fut construit au XVIIe siècle et remanié au XVIIIe siècle.                                                                       Au Sud Ouest à l'opposée du canal à  Ouistreham  la redoute,  des vestiges de la redoute sont encore visibles au « Petit Château de la Redoute » au 38 boulevard Boivin-Champeaux. Au lieu-dit le Maresquier, on peut trouver une petite maison en pierre, rénovée, sur la berge ouest du canal de Caen à la mer, c'est l'ancienne résidence de vacances d'Aristide Briand.","architecture":"MERVILLE, il subsiste aujourd'hui des granges dont la construction remonte à 1610. Le bâtiment est situé au hameau de Descanneville, non loin de la mer. D'origine ancienne, Merville apparaît dans les écrits à partir du milieu du XIe siècle, le château est détruit par les bretons. La mer joue un rôle important puisqu'on y extrait le sel jusqu'au XVIIe siècle. Les guerres maritimes avec l'Angleterre entraînent la construction de la Redoute en 1779. Le château de Merville fut occupé pendant quatre années par les allemands durant la deuxième guerre mondiale. A proximité des batteries de Merville, il a souffert des bombardements alliés et de ses occupants.","habitants":"Aristide Briand. \r\n        \r\n        \"","divers":"château de Merville grav 1 à 5","gps":"","images":["../image/image_14/14_Merville_Calvados_1.jpg","../image/image_14/14_Merville_Calvados_2.jpg","../image/image_14/14_Merville_Calvados_3.jpg","../image/image_14/14_Merville_Calvados_4.jpg","../image/image_14/14_Merville_Calvados_5.jpg"]},"Consult_chateau_formulaire8335":{"id":"Consult_chateau_formulaire8335","dept":"14","canton":"Lisieux","commune":"Mesnil-Guillaume","nom":"Mesnil_Guillaume","type":"Château","periode":"XVI","histoire":"MESNIL GUILLAUME, la terre du Mesnil Guillaume avait été acquise à la fin du XVe siècle par Nicolas Le Vallois, riche marchand de Lisieux. Le château actuel fut élevé par son fils, Jean, tandis que son petit-fils devait faire construire à Caen le bel hôtel d'Escoville. Marie Le Vallois apporte le domaine à son époux Charles Le Gouez  seigneur du Port. Leur fils, Louis, tuteur, de sa nièce  Marie de Raveton, riche héritière  dont la mère le mit en procès, les biens furent confiés à une abesse de Lisieux ce qui entraîna des problèmes de meurtres qui aboutirent à l'échafaud. Le fils aîné Louis de Gouez, innocent hérita du domaine et le vendit en 1646 avant de rentrer dans les ordres à Louis de Rabodanges, passa ensuite aux Mailloc, les Durey de Sauroy et avant la Révolution à M. Lemercier ancien commandant de l'artillerie du Canada.  L'édifice appartint au XIXe siècle à la famille de Margeot, qui y résida peu, préférant le louer l'été à divers locataires puis changea souvent de mains ensuite.  Le château du sénateur français Charles Humbert à Mesnil-Guillaume près de Lisieux, où il fut arrêté dans l'affaire Bolo.","architecture":"MESNIL GUILLAUME, château de plaisance mais susceptible néanmoins de résister, sinon à un siège en règle, en tout cas a un coup de main, le château élevé à la fin du XVIe siècle est formé de quatre corps de bâtiment limitant une cour intérieure. Il était d'ailleurs entièrement entouré de douves, aujourd'hui remblayées du côté de l'entrée. Cette dernière façade est marquée en son centre d'un gros pavillon formant poterne. Toute la construction est réalisée en pierre calcaire à l'exception des échauguettes, coiffées de gracieux dômes à lanternons, où la brique vient ajouter une touche de couleur.Éléments protégés MH : le château en totalité : inscription par arrêté du 19 janvier 1927.","habitants":"Charles Le Gouez \r\n        \"","divers":"Mesnil_Guillaume                                     gps 49° 06' 40\" Nord, 0° 16' 57\" Est","gps":"","images":["../image/image_14/14_Mesnil_Guillaume_1.jpg","../image/image_14/14_Mesnil_Guillaume_2.jpg","../image/image_14/14_Mesnil_Guillaume_3.jpg"]},"Consult_chateau_formulaireccb5":{"id":"Consult_chateau_formulaireccb5","dept":"14","canton":"Thury-Harcourt","commune":"Fresney-le-Vieux","nom":"Mesnil_Saulce","type":"Château","periode":"XVIII_","histoire":"MESNIL-SAULCE, château bâti à la fin du quatrième quart du XVIIIe siècle pour la famille de Gosmesnils. Le jardin anglais et les plantations créés en 1780 par Geoffroy de Gosmesnils, horticulteur; bâtiments sud de la ferme du XIXe siècle. Ce sont les bois qui forment surtout l'ornement de la commune de Fresné, et ces bois sont adossés à la forêt ou ils servent d'entourage au château du Mesnil-Sauce, résidence du maire en 1828.","architecture":"MESNIL-SAULCE, une avenue que l'on reconnait de plusieurs points très éloignés de l'horizon, et notamment de la route de Caen, s'étend devant l'édifice. Sur ses côtés a été tracé un jardin anglais à larges sentiers, au milieu des beaux chênes et des magnifiques hêtres que la nature et les soins de l'homme ont élevés dans ce vieux sol pierreux et assez ingrat. Depuis cette époque on n'a point négligé ces belles plantations que le voyageur s'arrête pour admirer.","habitants":"Famille de Gosmesnils\r\n        \"","divers":"un châteaux dans cet article Mesnil-Saulce  .","gps":"","images":["../image/image_14/14_Mesnil_Saulce_1.jpg"]},"Consult_chateau_formulaire2932":{"id":"Consult_chateau_formulaire2932","dept":"14","canton":"Pont-l","commune":"Le Mesnil-sur-Blangy","nom":"Morainville","type":"Château","periode":"","histoire":"MORAINVILLE, au XVIe siècle, Jacques de Dreux est le premier seigneur de Morainville. Son fils aîné François, gouverneur du Perche pour Henri IV, meurt sans descendance et la terre revient à sa sur, mariée à Guillaume d'Houel. Un de ses descendants fait construire le château actuel, à la fin du règne de Louis XIII. Morainville demeure dans la famille jusqu'en 1732 où il devient la propriété de M. de Franqueville avant d'échoir, par héritage, au marquis de Trémouville, en 1829. M. de Beaucourt, son petit-fils, en est propriétaire lorsque Arcisse de Caumont visite le domaine pour sa statistique monumentale du Calvados: \" La façade principale est accompagnée de deux pavillons, dont l'un est placé à l'une des extrémités. Le pavillon central est construit en marqueterie et orné de losanges formés par la brique. le propriétaire du château, M. de Beaucourt, membre de la société française d'archéologie, y a fait faire de nombreuses transformations, toutes de bon goût.  Un des frères Bülher y aurait même dessiné les allées du petit bois sous les frondaisons des chênes. Depuis la route de Blangy, une allée de tilleuls conduit au château installé dans un petit vallon traversé du ruisseau de Vitrebec. Moranville offre un cadre romantique à souhait où Charles Gounot aurait composé ses opéras Faust et Roméo et Juliette. Le parc est inscrit parmi les sites en novembre 1943.","architecture":"MORAINVILLE, en contrebas, l'entrée de la propriété s'ouvre dans une trouée de haie champêtre, comme une porte ogivale de verdure. Une grande prairie s'étend le long de la route de Blangy. A mi-chemin, le rideau d'arbres s'ouvre pour laisser apparaître l'élégante demeure de briques chainées de pierres calcaire et coiffée d'une haute toiture en ardoises. Une aile à pans de bois y est accolée au nord.  Près du chemin, elle se creuse avec le ruisseau qui alimente une mare d'où émergent des iris. Après une charmante maison de briques, l'allée tourne à angle droit et descend vers un petit pont de briques. De part et d'autre, deux superbes marronniers marquent l'entrée du château. Les communs de briques et de pierres ferment la cour du château, espace réduit au sol gravillonné. Vers le sud, deux parterres de gazon s'étendent jusqu'à la grille qui clôt le parc. Au-delà, une vaste prairie, plantée de pommiers, laisse apercevoir les vestiges d'un ancien alignement. Seul, derrière les communs, le bois demeure avec sa végétation dense. Il est précédé de pelouses ponctuées d'arbustes à fleurs et de buis taillés. Isolé dans sa campagne augeronne, Morainville a conservé un peu du charme romantique qui a inspiré Gounot. Il aurait pu tout aussi bien attirer des peintres tant la lumière et les couleurs y sont douces camaïeu des verts de la végétation rehaussé des roses, des ocres et des gris bleutés des bâtiments.","habitants":"M. de Beaucourt                                                                                  M. de Franqueville    \r\n        \"","divers":"Châteazu de Morainville  gps  49° 15' 37\" nord, 0° 15' 52\" est","gps":"","images":["../image/image_14/14_Morainville_1.jpg","../image/image_14/14_Morainville_2.jpg"]},"Consult_chateau_formulaire8785":{"id":"Consult_chateau_formulaire8785","dept":"14","canton":"Thury-Harcourt","commune":"Les Moutiers-en-Cinglais","nom":"Moutiers_Cinglais","type":"Château","periode":"XVII-XVIII,","histoire":"Cinq  châteaux dans cet article dont Cinglais, Bagotière, Villeray, Villy-Bocage et Parfouru.                                                                                 CINGLAIS: du XVIIIe siècle de style classique italien, balustre en pierre, cheminées, plafonds à caissons ou à soliveaux décorés. Rénové en 1993. Il appartenait à la famille d'Harcourt.\r\nBAGOTIERE (XIXe siècle) de Saint-Laurent-de-Condel, construit ultérieurement sur le territoire de la commune.                                                                                                            VILLERAY, si le château de Villeray conserve des éléments du XVIIe siècle, la demeure a été complètement rhabillée au XVIIIe siècle, deux pavillons d'entrée ont été bâtis et un jardin à la française aménagé. Logis actuel construit entre 1808 et 1830 pour M. de la Choltière qui aménagea le parc et les avenues.  \r\nÉléments protégés MH : les façades et les toitures des deux pavillons, les sphinges. propriété de M. J . Le Roy Ladurie.                                                                                     VILLY-BOCAGE à deux K.M.au nord est Villy bocage. La construction du château de Villy-Bocage date du XVII siècle.","architecture":"VILLERAY, date du XVIIIe au XIXe siècle. Le logement du gardien, la remise et une partie de la ferme datent du XVIIIe siècle, est bâti en calcaire qui provient de la chapelle Saint-Jean-de-Moutiers-en-Cinglais. Il fut le modèle pour le château de la Bagottière construit ultérieurement sur le territoire de la commune. Le rampant sculpté de la lucarne provient du manoir de Saint-Laurent-de-Condel.  Vers 1840, l'aile ouest est rajoutée, perpendiculaire au château, l'intérieur garde les aménagements des XVIIIe et XIXe siècles. La salle à manger présente une cheminée remontant à l'époque du premier logis. Le château de Villeray est inscrit aux M.H. le 25/08/2005.                                                                                         PARFOURU-l'ECLIN  date du XIXe siècle, la construction du château de Parfouru date du XVIIe siècle. C'était la résidence de Philippe-François-Henri Abaquesné, Seigneur de Parfouru en 1767. Philippe Abaquesné de Parfouru devint Président du Canton de Villers-Bocage, en 1808. Il est décédé, en 1827, en l'Hôtel de Parfouru, à Valognes. Le château  est aujourd'hui la résidence privée de la famille Périer de Féral de Schwarz, depuis 1983.","habitants":"Cinglais; famille d'Harcourt                                                    Villeray; M. de la Choltière                                                                                   Parfouru; Philippe-François-Henri Abaquesné,\r\n        \r\n        \"","divers":"Cinq  châteaux dans cet article dont Cinglais grav-8  Villeray grav-1-2-3-, Villy-Bocage-grav-4-5 et Parfouru grav-8-9. Villers-6  Bagotière grav-7                                  GPS : 49° 1' 11,28\" Nord, 0° 26' 19,68\" Ouest\r\nCinglais 49° 01' 52\" nord, 0° 25' 22\" ouest\r\nVilly GPS : 49° 05' 43\" Nord, 0° 38' 33\" Ouest                                                             Villers GPS : 49° 04' 44\" Nord, 0° 39' 23\" Ouest                                      Eclin GPS : 49° 06' 29\" Nord, 0° 45' 57\" Ouest                                                                 odon GPS : 49° 05' 27\" Nord, 0° 36' 33\" Ouest","gps":"49° 1' 11,28\" Nord, 0° 26' 19,68\" Ouest","images":["../image/image_14/14_Moutiers_Cinglais_1.jpg","../image/image_14/14_Moutiers_Cinglais_2.jpg","../image/image_14/14_Moutiers_Cinglais_3.jpg","../image/image_14/14_Moutiers_Cinglais_4.jpg","../image/image_14/14_Moutiers_Cinglais_5.jpg","../image/image_14/14_Moutiers_Cinglais_6.jpg","../image/image_14/14_Moutiers_Cinglais_7.jpg","../image/image_14/14_Moutiers_Cinglais_8.jpg","../image/image_14/14_Moutiers_Cinglais_9.jpg"]},"Consult_chateau_formulairee050":{"id":"Consult_chateau_formulairee050","dept":"14","canton":"Mézidon-Canon","commune":"Mézidon-Canon","nom":"Mézidon_Canon","type":"Château","periode":"XVII-XVIII","histoire":"Quatre édifices dans cet article; Canon, Mesnil d'O, Cesny et Ifs.                                                                                              CANON,  date le 2ème moitié du XVIIIe siècle. La seigneurie de Canon, était la propriété dEudes de Canon, au Moyen-Age. Elle passa suite à diverses alliances et successions, dans les mains des familles Franqueville, Sarcilly, Le Sueur puis à Thomas de Berenger, en 1689. Son fils, Robert de Berenger fuira le régime et ira se réfugier en Angleterre, en 1727, vendant le château de Canon au seigneur de La Roque, fortuné, receveur des Tailles de Valognes, qui fit bâtir une nouvelle demeure, fit creuser la pièce deau et commencer à installer des avenues. Jean-Baptiste de Beaumont épousa, en 1760, Anne-Louise du Mesnil, unique héritière de la Famille de Berenger et sintéressa, en tant quavocat, aux conditions critiquables de la vente de Canon menée, en 1727. Après 10 ans de procédure, à laquelle sintéressa son grand ami Voltaire, il gagna son procès et fit engager, immédiatement, dimmenses travaux, qui le ruinèrent. Le domaine créé et entretenu par la famille de Beaumont parvint presque intact à leurs descendants actuels, malgré le Révolution, guerres et autres événements. Très apprécié dans la région, Jean-Baptiste de Beaumont évita, au château de Canon, les désordres de la Révolution,  est classé aux M.H. depuis 1931. devenu aujourd'hui hôtel de ville","architecture":"MESNIL DO , a été construit vers 1751 pour Jacques Morin du Mesnil, sur une terre ayant appartenu à la famille d'O. Il a été classé au M.H.par arrêté du 7 octobre 1975. Les bâtiments annexes et le parc ont été restaurés en 1962 par le major Crampton. En 1981, Guy de Chabaneix le rachète à la succession du major Crampton et rénove entièrement l'intérieur du château. Parc de cinq hectares entièrement clos de murs.                                                                                                                                                    CESNY à deux K.M. à l'ouest à Cesny les vignes château date du XVIIe, XVIIIe et XIXe siècle. Les communs sont du XVIIe siècle.  Les éléments protégés aux M.H. sont les façades et toitures,  les façades et toitures des communs sont inscrites aux M.H. aux 24/10/1977. Le château de Cesny-aux-Vignes vous propose ses chambres d'hôtes.                                                                     IFS SUR LAIZON, à cinq K. M. au sud  a été construit fin XVIIIe siècle pour Lostard, homme de lettres caennais; pavillons remaniés après 1810.  le château est une habitation agréable, et disposée entre une cour. La vue y est bornée de toutes parts. A l'une des extrémités du jardin se voit un emplacement d'un cimetière protestant. Dans le dernier siècle, le château fut habité par un homme de lettre, Costard d'Ifs, qui fut à Caen, l'un des fondateurs d'une académie. Ses relations s'étendirent en dehors, on prétend qu'il entretenait une correspondance avec Voltaire. On conservait au château d'Ifs-sur-Laizon ses manuscrits, parmi lesquels se trouvaient des lettres écrites de la main du prince des écrivains Français du XVIIIe siècle. Ce trésor littéraire a été égaré depuis quelque temps.","habitants":"Canon,famille Franqueville                                                                 famille d'O\r\n        \"","divers":"Quatre édifice dans cet article; Canon grav 1-2-3-4_5, Mesnil d'O grav-8, Cesny grav 6-7 et Ifs grav-9. GPS: 49° 04' 42,6\" Nord, 0° 05' 40,92\" Ouest                                                                 IFS gps 49° 02' 03\" nord, 0° 07' 20\" ouest","gps":"49° 04' 42,6\" Nord, 0° 05' 40,92\" Ouest","images":["../image/image_14/14_M%c3%a9zidon_Canon_1.jpg","../image/image_14/14_M%c3%a9zidon_Canon_2.jpg","../image/image_14/14_M%c3%a9zidon_Canon_3.jpg","../image/image_14/14_M%c3%a9zidon_Canon_4.jpg","../image/image_14/14_M%c3%a9zidon_Canon_5.jpg","../image/image_14/14_M%c3%a9zidon_Canon_6.jpg","../image/image_14/14_M%c3%a9zidon_Canon_7.jpg","../image/image_14/14_M%c3%a9zidon_Canon_8.jpg","../image/image_14/14_M%c3%a9zidon_Canon_9.jpg"]},"Consult_chateau_formulaire6f3a":{"id":"Consult_chateau_formulaire6f3a","dept":"14","canton":"Mézidon-Canon","commune":"Mézidon vallée d","nom":"Mézidon_Canon_II","type":"Château","periode":"XVI-XVII-XVIII","histoire":"Trois édifices dans cet article; Breuil, Magny la Campagne, Ouezy. Cauvigny, à deux K.M. au sud-ouest.                                                      Du BREUIL, la construction du château du Breuil date du XVIIIe siècle, abrite dans ses murs la mairie de Mézidon-Canon.                                                                                                       CAUVIGNY, a été construit au  XVIIIe, il appartenait en 1830 au baron Laigre de Grainville.  Manoir ayant appartenu à la famille de Corday ; où Charlotte, héroïne de la Révolution, a résidé dans sa jeunesse  jusqu'en 1875, date où il fut acquis par la famille du propriétaire actuel.                                                                               MAGNY la CAMPAGNE, est privé, fermé au public.                                                                                  OUEZY, en été 1047, le roi Henri 1er, venu prêter main forte au jeune duc Guillaume « le bâtard », établit son campement au bord du Laizon
