au-fort. La tour d'angle est bâtie à la fin du XVe siècle, le logis date de 1767, le colombier remonte au début du XVIe siècle et le pavillon a été construit en 1845.","habitants":"Famille le chevalier de Brévedent\r\n        \"","divers":"GPS : 49° 23' 18\" Nord, 0° 18' 04\" Est","gps":"49° 23' 18\" Nord, 0° 18' 04\" Est","images":["../image/image_14/14_Ablon_Calvados_1.jpg","../image/image_14/14_Ablon_Calvados_2.jpg"]},"Consult_chateau_formulairef2a8":{"id":"Consult_chateau_formulairef2a8","dept":"14","canton":"Bretteville-l","commune":"Amblie","nom":"Amblie","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article; Amblie et Polanche.                           AMBLIE,  au XVIe siècle, le domaine appartient à la famille des Planches. En 1738, la propriété passe par mariage aux du Buisson de Courson.  Le château de la famille Achard de Bonvouloir, construit au XIXe siècle, appartient à des descendants de l'un des compagnons de Guillaume le Conquérant durant la bataille d'Hastings. L'édifice est entouré d'un grand parc. Durant la deuxième guerre mondiale un camp destiné à accueillir des milliers de sinistrés et de blessés de la ville de Caen est installé dans le bâtiment. Ce village pittoresque ne manque pas de charmes: ses vieilles pierres, ses rues étroites, son pont du XVIe siècle.  Mademoiselle Jocelyne de Bonvouloir, propose trois salles de réceptions dans l'esprit du XVIIIe siècle avec boiseries anciennes, cheminées en marbre.                                                                    P0LANCHE, le château des Polanche a été construit par Dominique-Nicolas du Buisson de Courson entre 1785 et 1789 en remplacement dune construction plus ancienne. Il a été remanié sous la Restauration. Il présente une façade de style classique. Il bénéficie d'un arrêté d'inscription le 17 mai 1982.","architecture":"AMBLIE, de 1785 à 1788, cette année étant inscrite sur une souche de cheminée, Nicolas du Buisson de Courson fait construire ce château à la place d'une construction vétuste. Décorée sobrement, la nouvelle demeure est composée d'un corps de bâtiment central couronné d'un fronton triangulaire sur chacune des façades et flanqué de deux pavillons. Éléments protégés MH : les façades et les toitures du château, des communs, des deux pavillons, de la fuie et du puits: inscription par arrêté du 17 mai 1982.","habitants":"Amblie; Famille Achard de Bonvouloir.                                    Polanche; Dominique-Nicolas du Buisson\r\n        \"","divers":"Gps  Polanche grav-2                                                                                       Gps  49° 17' 22? N, 0° 30' 48? Ouest","gps":"","images":["../image/image_14/14_Amblie_1.jpg","../image/image_14/14_Amblie_2.jpg"]},"Consult_chateau_formulaireb30d":{"id":"Consult_chateau_formulaireb30d","dept":"14","canton":"Bayeux","commune":"Vaux sur Aures Mosles","nom":"Argouges","type":"Château","periode":"XVI","histoire":"ARGOUGES,  le château dArgouges a été reconstruit par la famille Guilbert en 1880 sur danciennes fondations. Avec sa Chapelle et son Presbytère, ils appartenaient à lancienne paroisse dArgouges-sous-Mosles. Depuis notre arrivée en 2002, le Château nétait jamais sorti de la famille dorigine.  Le château de grand confort, entièrement restauré, avec cinq chambres d'hôtes de charme, propriété de Bertrand Levasseur depuis 1983.                                    Manoir d'ARGOUGES  lors de la guerre de Cent Ans, le manoir est pillé et en partie détruit. Une garnison anglaise y sera massacrée par du Guesclin. Le manoir est reconstruit à la fin du XVe siècle par Pierre d'Argouges. En 1632, Joachim d'Argouges, vend la seigneurie à Madelaine de Choisy, sur de Jean de Choisy, comte , seigneur de Balleroy et de Beaumont-le-Richard. Quasi-abandonné dès 1524, le déclin fait son uvre. Joachim dArgouges, dernier seigneur des lieux, vend le fief sous Louis XIII. Lacquéreur, Jean de Choisy, seigneur de Balleroy, fait préciser dans son état des lieux que « lédifice est déjà devenu définitivement impropre à lhabitation » et installe seulement un métayer dans une partie secondaire. Cette seule présence évite cependant les habituels pillages de ce type de demeure délaissée et ce ne sont pas moins de onze cheminées monumentales que lon peut encore aujourdhui contemplé  En 1722, le manoir est acquis par Claude Olivier Regnault, président trésorier de France à Caen. Laure et Bertrand Levasseur, en 1983 en font l'acquisition.","architecture":"ARGOUGES   Le château d'Argouges reste un étonnant manoir élevé aux XVe et XVIe siècles. La porte crénelée donne accès à la cour où se dresse le logis qui a conservé deux très belles tourelles, des fenêtres à meneaux, et des lucarnes à gables de Pierre: c'est l'uvre d'une vieille famille normande, les d'Argouges. Propriété de dix hectares, le château de grand confort, entièrement restauré, avec cinq chambres d'hôtes de charme, la demeure comprend une salle de billard, un salon bibliothèque avec une belle cheminée  et une salle à manger.                                                                                     Manoir d'ARGOURGES guère remanié depuis sa construction, c'est sa partie droite, enceinte de la cour et tour sud-est, qui seraient les plus anciennes, et remonteraient à la fin du XIVe siècle.La partie gauche comprend notamment le pavillon d'entrée, avec porte charretière à arc surbaissé et porte piétonne, surmonté de trois créneaux. Un modillon sculpté figurant la tête d'un homme est apposé au dessus et à gauche de la porte charretière. À côté du porche se trouve un four à pain. Le logis seigneurial, ceint de douves et d'un petit mur d'enceinte, se présente sous la forme de deux pavillons bâti en pierre de Caen. Le pavillon de droite, a en son centre une tour polygonale, et celui de gauche, une tour hexagonale avec une fenêtre centrale surmontée d'un fronton sculpté, plus basse que la précédente car inachevée. Le logis s'éclaire  pas des fenêtres à meneaux. Autour se dressent des dépendances ainsi qu'une tour d'angle couronnée de mâchicoulis et percée d'embrasures de tir, et une grosse tour. Les communs, dont un à usage de pressoir, accessible grâce à un escalier en pierre, prennent place à l'extérieur des douves.","habitants":"Famille Guilbert\r\n        \"","divers":"Manoir d'argouges \r\ngps 49° 19' 17? N, 0° 43' 13? Ouest","gps":"","images":["../image/image_14/14_Argouges_1.jpg","../image/image_14/14_Argouges_2.jpg","../image/image_14/14_Argouges_3.jpg","../image/image_14/14_Argouges_4.jpg"]},"Consult_chateau_formulaireb342":{"id":"Consult_chateau_formulaireb342","dept":"14","canton":"Bayeux","commune":"Asnelles","nom":"Asnelles_Crépon","type":"Château","periode":"XVII-XIX","histoire":"ASNELLES ; 1ère moitié du XIXe siècle,  vers 1860, création de la station balnéaire sous l'impulsion du maire Théodore Labbey : développement considérable du Hamel en une vingtaine d'années. Le château d'Asnelles a été construit  entre 1840 et 1865, à l'emplacement d'une maison de pêcheur, pour Théodore Labbey, médecin, maire d'Asnelles et promoteur de la station balnéaire. Acquis en 1890 par Louis Barrault,  maire d'Asnelles  de 1888 à 1907, qui le fait reconstruire aussitôt en remployant les armes sculptées de T. Labbey.                                                                    Au environ d'Asnelles; CREPON, logis et écuries construits à la fin du XVIIe siècle ou dans les premières années du XVIIIe siècle  par l'architecte non identifié du château de la Perquette à Bellengreville (les façades identiques); en 1801, édification du corps des communs, et de la remise pour Michel Costé de Donveville, juge de paix du canton, et pour son épouse Marguerite Amie (porte date et inscription).","architecture":"ASNELLES, corps de logis à façade principale ordonnancée en brique et pierre et l'avant corps en pierre de taille. Façade nord asymétrique à travées, en brique et pierre, façade ouest également asymétrique à travées, en pierre de taille avec avant corps en brique et pierre, façade sud asymétrique à travées, en brique et pierre, avec tourelle en pierre de taille. On peut voir les armes de Théodore Labbey avec sa devise Labore et Virtute, sur l'arc de l'entrée principale, l'oculi de la façade nord, et les lucarnes de l'étage de comble et tourelle de la façade sud. des bâtiments secondaires ont été ajoutés pour l'usage actuel de colonie de vacances de la S.N.C.F.                                                                                        CREPON, c'est  eux qui rajoutent à cette époque, avant le cadastre de 1809, les ailes du logis portent le monogramme A.D. sur l'aile est, A.C. sur l'aile ouest; courant du XIXe siècle suppression de la cour d'honneur, aménagement d'un jardin paysager et au XXe siècle destruction du mur de clôture lors de l'élargissement des voies au nord est et au sud.  Logis : sous sol partiel, avant corps en pierre de taille, enduit d'origine à petits galets sur la façade principale, sable pour le soubassement, rouge pour la partie supérieure, façades nord-ouest et sud-est ordonnancées ; puits en pierre de taille.","habitants":"Asnelles; Théodore Labbey                                                      Crépon;  Michel Costé de Donveville, \r\n        \"","divers":"Deux château dans cet article; Asnelles grav-1 et Crépon grav 2-3.                                                                                                                         GPS : 49° 20' 18' Nord, 0° 34' 58\" Ouest                                                 Crépon 49° 18' 58? nord, 0° 33' 02? ouest","gps":"49° 20' 18' Nord, 0° 34' 58\" Ouest","images":["../image/image_14/14_Asnelles_Cr%c3%a9pon_1.jpg","../image/image_14/14_Asnelles_Cr%c3%a9pon_2.jpg","../image/image_14/14_Asnelles_Cr%c3%a9pon_3.jpg"]},"Consult_chateau_formulaireb5a0":{"id":"Consult_chateau_formulaireb5a0","dept":"14","canton":"Trévières","commune":"Asnières-en- Bessin","nom":"Asnières_en_Bessin","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Asnières et la Magdeleine. ASNIERES en Bessin, construit en 1693, puis remanié en 1783, le château d'Asnières-en-Bessin se trouve dans un ravissant petit village de 75 habitants, entouré dherbages et de fermes.                                                                         Le château d'Asnières-en-Bessin se situe à 3 km de la plage dOmaha Beach. Vous y trouverez des chambres d'hôtes. Vous y recevrez un accueil chaleureux de ses propriétaires,  Aujourd'hui chambres d'hôtes.","architecture":"A cinq K.M. au sud à Longueville le château de la MAGDELEINE a débuté de 1776 à 1777. Elle fut entreprise, pour Michel de Tallevast de la Magdeleine, son propriétaire mais fut interrompue, à la Révolution Française. Il s'agit d'un bâtiment qui n'a jamais été achevé.","habitants":"Magdeleine; Michel de Tallevast\r\n        \r\n        \r\n        \"","divers":"Deux châteaux dans cet article; Asnières grav-1 et la Magdeleine grav-2                                                                                                                                                                                                                                                                                                GPS : 49° 22' 04\" Nord, 0° 56' 18\" Ouest                                                        Magdeleine   GPS : 49° 20' 21,84\" Nord, 0° 57' 46,8\" Ouest","gps":"49° 22' 04\" Nord, 0° 56' 18\" Ouest","images":["../image/image_14/14_Asni%c3%a8res_en_Bessin_1.jpg","../image/image_14/14_Asni%c3%a8res_en_Bessin_2.jpg"]},"Consult_chateau_formulaire436d":{"id":"Consult_chateau_formulaire436d","dept":"14","canton":"Falaise","commune":"Ouilly-le-Tesson","nom":"Assy","type":"Château","periode":"XVII","histoire":"Deux châteaux à Ouilly le Tesson; Assy et Olendon.                       ASSY  Oeuvre majeure de l'architecture civile néo-classique de Basse-Normandie. La chapelle a été fondée par Jacques d'Assy en 1513; l'ancien manoir a été construit en 1537 en remplacement d'une forteresse médiévale (vestiges : aile ouest ; détruite en 1944, mais reconstruite, caves voûtées). Le château actuel d'Assy a été construit en 1788, par Nicolas Gondouin pour le vicomté d'Aubigny d'Assy. Les communs forment une cour d'honneur en U ; le bassin et le canal figurés sur le cadastre de 1810, sont détruits.\r\nA cinq  K.M. au sud  OLENDON,  a été construit en 1614 (architecture bas-normande du début du XVIIe siècle), par Guillaume d'Ouézy dont les armes figurent sur la cheminée; la façade principale reconstruite en 1715, date portée, pour commémorer le baptême de Louis d'Ouézy dont le parrain était le grand dauphin (mort en 1711), Claude d'Ouézy fit couler trois plaques de cheminée dont les armoiries sont supportées par un dauphin.","architecture":"ASSY Construction de style Louis XVI avec un avant-corps à péristyle très majestueux Éléments protégés MH : la chapelle : inscription par arrêté du 13 juin 1929. Les façades et les toitures du château, l'aile en retour et ses caves voûtées, le vestibule d'entrée, l'escalier avec sa cage en rotonde, le bief et les pièces d'eau (lieudit les Petits Bosquets, et lieudit Rue du château ; pour le bief, non cadastré: inscription par arrêté du 3 octobre 2005.                                                                                                        OLENDON;  la ferme fut édifiée aux XVIIIe et XIXe siècles. Le parc à l'anglaise a été aménagé au XIXe siècle.  Éléments protégés MH : les façades et les toitures du château, l'escalier central, le salon avec sa cheminée et ses boiseries, les cheminées des trois chambres à l'étage : inscription par arrêté du 1er août 1997.","habitants":"Assy; vicomté d'Aubigny d'Assy                                       Olendon;  Famille de Guillaume d'Ouézy \r\n        \"","divers":"Deux châteaux à Ouilly le Tesson; Assy grav 3-4-5 et Olendon grav-1-2                                                                      .Assy GPS : 48° 59' 36,16\" Nord, 0° 12' 6,02\" Ouest                                                      Olendo  GPS : 48° 58' 9,73\" Nord, 0° 09' 48,38\" Ouest","gps":"48° 59' 36,16\" Nord, 0° 12' 6,02\" Ouest","images":["../image/image_14/14_Assy_1.jpg","../image/image_14/14_Assy_2.jpg","../image/image_14/14_Assy_3.jpg","../image/image_14/14_Assy_4.jpg","../image/image_14/14_Assy_5.jpg"]},"Consult_chateau_formulaire4f7c":{"id":"Consult_chateau_formulaire4f7c","dept":"14","canton":"Aunay-sur-Odon","commune":"Cahagnes","nom":"Aubigny_Cahagnes","type":"Château","periode":"XV-XVII","histoire":"AUBIGNY- Cahagnes, le château d'Aubigny est l'ancien siège du fief de la famille du même nom, anoblie en 1568.  Le logis date du XVe siècle. L'édifice connait des transformations profondes dans la première moitié du XVIIe siècle , en particulier le logis central qui est refait.","architecture":"AUBIGNY,  à Cahagnes, La demeure actuelle, édifiée dans la première moitié du XVIIe siècle, est le résultat d'un remaniement total d'un logis datant du XVe siècle comme l'atteste la présence de deux des quatre tours en élévation postérieure (bouches à feu dans deux des quatre tours). Une cour d'honneur, balisée à l'ouest par un vaste plan d'eau ainsi que par la grange datant du XVe siècle, précède le château proprement dit. Selon le cadastre de 1811, il apparait que seul le profil de l'allée d'accès a été modifié dans sa largeur. Le corps de bâtiment affiche une structure allongée, avec un rez-de-chaussée en hauteur et un étage à usage de caves. Un fronton triangulaire orne la façade sur cour. Accolés par deux, les pavillons d'angle, manifestement du XVe siècle et munis chacun d'un toit en pavillon achèvent la composition de l'ensemble. Éléments protégés MH : les façades et les toitures, la grande salle du rez-de-chaussée avec sa cheminée, et la pièce attenante avec sa cheminée et la pièce de la tour nord-est avec sa cheminée : inscription par arrêté du 15 novembre 2010.","habitants":"Famille d'Aubigny\r\n        \"","divers":"Château Aubigny à Cahagnes grav  -1-2                                       gps 49° 03' 52? N, 0° 47' 38? O","gps":"","images":["../image/image_14/14_Aubigny_Cahagnes_1.jpg","../image/image_14/14_Aubigny_Cahagnes_2.jpg"]},"Consult_chateau_formulairedc39":{"id":"Consult_chateau_formulairedc39","dept":"14","canton":"Falaise","commune":"Aubigny","nom":"Aubigny_Calvados","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet arrticle; Aubigny et Longpré, et Tour Canivet                                                                                                       AUBIGNY, fut construit dans la première moitié du XVIIe siècle pour la famille de Morell d'Aubigny d'Assy. Antoine de Morell, comte d'Aubigny demeurant en son château d'Aubigny fait subsister une chapelle qu'il a trouvé élevée sur sa terre du lieu d'Aubigny.                                                                                                                 LONGPRE, au début du XIXe siècle il appartenait à M. Lebourgeois Prébois, qui en a fait restaurer l'intérieur avec soin. Il fut habité au XVIIIe par la romancière Adèle de Souza, mère du général de Flahaut et grand-mère du duc de Momy. C'est dans ces mêmes lieux que naquit sa soeur, la comtesse de Marigny-Ménars, l'amie et la rivale de beauté de Madame de Séran.                                       TOUR, St PIERRE de CANIVET  le château a été construit en 1769 par l'architecte Antoine Matthieu. Le Carpentier pour le comte Louis-François-Anne de Séran et son épouse depuis 1757, Adélaïde de Bullioud, une des maîtresses de Louis XV, ils sont les ancêtres du comte Alain de La Moussaye. La comtesse de Séran en fit très vite l'un des rendez-vous les plus célèbres des écrivains du temps (voir les Mémoires de Marmontel). Le domaine de la Tour est occupé en majeure partie par les bois du Roi, achetés au cours du XIXe siècle, qui ont été réunis au bois de la Tour.  Les façades et les toitures du château, la cour d'honneur, les douves entourant la cour d'honneur et le décor intérieur de la salle à manger, du salon et de la chambre dite de madame de Séran sont inscrits au titre des M.H. depuis le 13 décembre 1967.","architecture":"AUBIGNY, en 1838, le domaine patrimonial d'Aubigny comprenait : Le corps de logis du château d'Aubigny affiche une structure allongée, avec un rez-de-chaussée en hauteur et un étage à usage de caves. Un fronton triangulaire orne la façade sur cour. Accolés par deux, les pavillons d'angle, manifestement du XVe siècle et munis chacun d'un toit en pavillon achèvent la composition de l'ensemble. Le pavillon nord date du premier quart du XIXe siècle. Éléments protégés MH : le château et ses dépendances (chapelle, pigeonnier, bretèches, communs); les douves qui entourent le château, les allées de hêtres conduisant de la route de Caen au château: classement par arrêté du 30 avril 1948.                                                                                                                              LONGPRE, la propriété a conservé un joli pavillon d'entrée; le château de Longpré, construit au XVIe siècle, possède une tour carrée et l'autre cylindrique, l'édifice a été remanié au XVIIIe siècle et nouveaux remaniements et reconstruction des communs dans la deuxième moitié du XIXe siècles. On voit la date  de 1752 gravée au-dessus d'une fenêtre du côté nord; sur une lucarne le millésime 1770. Toutes les fenêtres ont été élargies à cette époque.","habitants":"Aubigny; Antoine de Morell                                                   Longpré;  comtesse de Marigny-Ménars                                     Tour-St-Pierre ;Louis-François-Anne de Séran\r\n        \"","divers":"Deux châteaux dans cet arrticle; Aubigny grav-1-2 et Longpré grav -3-4-5.   Tour a st-pierre de Canivet 6--7-8                                                       GPS : 48° 54' 53,18\" Nord, 0° 12' 59,57\" Ouest","gps":"48° 54' 53,18\" Nord, 0° 12' 59,57\" Ouest","images":["../image/image_14/14_Aubigny_Calvados_1.jpg","../image/image_14/14_Aubigny_Calvados_2.jpg","../image/image_14/14_Aubigny_Calvados_3.jpg","../image/image_14/14_Aubigny_Calvados_4.jpg","../image/image_14/14_Aubigny_Calvados_5.jpg","../image/image_14/14_Aubigny_Calvados_6.jpg","../image/image_14/14_Aubigny_Calvados_7.jpg","../image/image_14/14_Aubigny_Calvados_8.jpg"]},"Consult_chateau_formulaire8c15":{"id":"Consult_chateau_formulaire8c15","dept":"14","canton":"Bretteville-l","commune":"Audrieu","nom":"Audrieu","type":"Château","periode":"XVI","histoire":"AUDRIEU, le château d'Audrieu appartient à la famille Martel Massignac. La seigneurie d'Audrieu est à l'origine à la famille de Percy. À la suite du mariage de Marguerite de Percy avec le comte Guillaume de Séran en 1595, le château passe dans la famille de Séran. En 1615, la terre est érigée en baronnie par lettres patentes, Le château passe ensuite au fils de Guillaume, Pierre-Léonor de Séran, qui partira en émigration et prendra du service dans l'armée des princes  vendu comme bien national. Camille -Léonor parvient  à récupérer le château sous la restauration puis à la descendance de Pierre-Edmond et au général de Séran. Après son décès le domaine est transmis à sa fille unique Henriette qui le transmet par mariage à la famille Saillard du Boisberthe,  à la suite du mariage de Nicole Saillard de Boisberthe avec Philippe Livry-Level.   La terre seigneuriale d'Audrieu était détenue par la famille de Percy. En 1595, le mariage de Marguerite de Percy avec Guillaume, comte de Séran, fit rentrer Audrieu dans la famille de Séran.  Elle fut érigée en baronnie par lettres patentes du mois d'avril 1615 à son profit. Son fils Pierre Léonor de Séran lui succéda, puis la descendance de Pierre Edmond et le général de Séran. Le domaine passa par mariage à la famille Saillard du Boisberthe, puis par transmission aux Livry level, les actuels propriétaires.","architecture":"AUDRIEU,  l'édifice consiste dans un corps central, pourvu d'un avant-corps à trois travées dont les extrémités sont soulignées par des chaînes de refends, et sommé d'un fronton triangulaire sculpté d'armoiries. De part  et d'autre se déploient deux courtes ailes, flanquées de pavillons en saillie à comble pyramidal. l'ensemble sobre, s'articule du côté de la cour avec deux ailes en retour, remplois de la construction précédente. La façade sur le parc reproduit les mêmes dispositions, à cette exception près des deux ailes latérales  apparaissent en léger retrait.  Le château a été transformé en relais-château depuis 1976.    Éléments protégés MH : les façades et les toitures du château et des communs, la cour d'honneur : classement par arrêté du 28 décembre 1967   hôtel de charme. Le château a été transformé en relais-château depuis 1976. Éléments protégés MH : les façades et les toitures du château et des communs, la cour d'honneur : classement par arrêté du 28 décembre 1967.","habitants":"Audrieu, famille de Percy et famille de Séran\r\n        \"","divers":"Audrieu GPS : 49° 12' 14,5\" Nord, 0° 35' 40\" Ouest","gps":"49° 12' 14,5\" Nord, 0° 35' 40\" Ouest","images":["../image/image_14/14_Audrieu_1.jpg","../image/image_14/14_Audrieu_2.jpg"]},"Consult_chateau_formulairef7fe":{"id":"Consult_chateau_formulairef7fe","dept":"14","canton":"Trévières","commune":"Balleroy","nom":"Balleroy","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article ; Balleroy et Vaubadon.       BALLEROY, durant les premières décennies du siècle, Jean de Choisy, nommé secrétaire général des finances de Caen en 1603, agrandit son domaine par lachat de terres. Il ne réside pas encore à Balleroy quand il décide, en 1630, de la construction dun château. Il fait alors appel à un jeune architecte de talent; François Mansart. Le lieu dimplantation du château est choisi avec soin. La topographie du lieu retenu se prête à merveille pour la mise en perspective de lédifice. A la mort de Jean de Choisy, le domaine revient à son fils puis, par héritage, à Jacques de La Cour, premier marquis de Balleroy en 1700, qui décède sans héritier, vendu  à Françoise de Brancas  princesse d'harcourt. En 1704 érigé en marquisat en faveur de Louis de la Cour, cousin de l'abbé de Choisy exerce ces droits de reprise, en 1828-1872  le comte Albert de Balleroy député du Calvados. Balleroy est acquis en 1970 par Malcom S. Forbes  homme d'affaire américain qui le lègue à une fondation administrée par ses héritiers.                                                                                              VAUBADON,  construit en 1739, fut achevé en 1779. Un vaste parc paysager fut créé au XIXe siècle. L'ensemble forme un bel exemple de construction classique avec une distribution intérieure encore archaïsante comme en témoignent les pièces de réception en enfilade. Une vaste pièce d'eau aménagée dans le parc sert de transition avec la campagne environnante. Le château de Vaubadon a été construit en 1778 puis racheté et agrandi, en 1869, pour le Prince Raymond de Broglie, est inscrit aux M.H. depuis le 14/04/2012.","architecture":"BALLEROY, une allée conduit à une première avant-cour triangulaire close, flanquée de deux tours rondes (colombier et logis des gardes). Une seconde cour rectangulaire, longée des écuries et des remises à carrosses, est réservée aux manuvres des attelages. Dans laxe de la composition, un pont dormant en pierre franchit les douves sèches pour accéder à la plate-forme du château. Une troisième cour est flanquée de deux pavillons détachés en avant de la cour dhonneur à laquelle monte un escalier en degrés convexes contrepartis. De part et dautre, des terrasses en surélévation matérialisent au sol lemplacement habituel des bâtiments qui, dans les anciennes constructions, fermaient la cour dhonneur. Le château, de schiste brun violacé chaîné de pierres calcaires blanches, sinscrit dans une composition pyramidale. Le haut pavillon central, sur trois niveaux, est coiffé dune haute toiture dardoises coupée dune plate-forme dont le lanternon forme signal. Il est épaulé de deux ailes en retrait de deux étages. Aux extrémités, deux petits pavillons, en rez-de-chaussée, sont couverts en terrasses. Des perrons de quelques marches descendent dans les allées à la croisée desquelles se situe un grand rond deau. Au nord, en contrebas de la cour des écuries, sélèvent quelques communs. Près de lentrée, la chapelle du château est construite à partir de 1650.","habitants":"Balleroy, comte Albert de Balleroy                                                    Vaubadon; Prince Raymond de Broglie,\r\n        \"","divers":"Deux châteaux dans cet article ; Balleroy; grav 1 à 4  et Vaubadon grav-5.    GPS : 49° 10' 45\" Nord, 0° 50' 33\" Ouest                                                             Vaubadon GPS : 49° 12' 23\" Nord, 0° 50' 17\" Ouest","gps":"49° 10' 45\" Nord, 0° 50' 33\" Ouest","images":["../image/image_14/14_Balleroy_1.jpg","../image/image_14/14_Balleroy_2.jpg","../image/image_14/14_Balleroy_3.jpg","../image/image_14/14_Balleroy_4.jpg","../image/image_14/14_Balleroy_5.jpg"]},"Consult_chateau_formulairef557":{"id":"Consult_chateau_formulairef557","dept":"14","canton":"Bretteville-l","commune":"Villiers-le-Sec","nom":"Banville_Villiers","type":"Château","periode":"XV-XVII","histoire":"BANVILLE, en Villiers, ancien château du fief de Banville en Villiers, principal fief de la commune. En 1371, mention d'un château-fort situé au même emplacement, 1er colombier et pièce voûtée du logis datant du XVe siècle, château reconstruit pour Pierre Boutin, gentilhomme ordinaire de la chambre du Roi, bailli de Caen en 1609, seigneur de Banville en Villiers (de 1595 à 1627). Inscription au-dessus des portes de la petite grange, et de la grande grange, commence le 15 mars 1621, entre 1749, date où le château est mentionné en mauvais état,   travaux de restauration pour Olivier d'Amours.","architecture":"BANVILLE, en Villiers, logis modifié (avant-corps, baies) allongé vers le nord et vers le sud au delà des deux grosses souches de cheminée, édification de la deuxième remise, du portail de la cour d'honneur et du poulailler. Dans la deuxième moitié du XXe siècle : percement d'un nouveau portail des communs reconstruction du corps des écuries, nombreuses baies ouvertes dans les bâtiments agricoles.\r\nLogis : moellon enduit, pignon découvert, pièce au rez-de-chaussée voûtée d'ogives avec retombée sur colonne centrale, grand portail en pierre de taille, bossage un sur deux, deux portes piétonnes, deux échauguettes couvertes en calcaire en pavillon,  logement à un étage, première remise avec bossage un sur deux sur les arcs, en deuxième remise un  rez-de-chaussée en pierre de taille, étage en moellon enduit.","habitants":"Famille de Pierre Boutin et Olivier d'Amours \r\n        \"","divers":"Château de Banville                                                                        GPS : 49° 17' 32,64\" Nord, 0° 33' 36,72\" Ouest","gps":"49° 17' 32,64\" Nord, 0° 33' 36,72\" Ouest","images":["../image/image_14/14_Banville_Villiers_1.jpg","../image/image_14/14_Banville_Villiers_2.jpg"]},"Consult_chateau_formulaire51a9":{"id":"Consult_chateau_formulaire51a9","dept":"14","canton":"Bayeux","commune":"Barbeville","nom":"Barbeville","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article; Barbeville, des Monts et Bas de Cottun.                                                                                               BARBEVILLE, situé sur le site dun ancien château féodal, comme en témoigne la présence de douves, le château de Barbeville fut construit,  après lacquisition de la seigneurie en 1753, par Jean Baptiste Marc Antoine Joseph de Courseulles. Sa façade méridionale, très soignée, se compose dun corps de logis central, rectangulaire et flanqué de deux ailes. Agrémentée de sculptures Louis XV.  La famille de Courseulles a racheté le domaine au seigneur de Léaupartie le 29/05/1753. La même famille le marquis de Courseulles possède toujours le domaine. \r\nÉléments protégés MH , les façades et les toitures du château : inscription par arrêté du 12 octobre 1972.                                                Au sud ouest à trois K.M. à Cottin  BAS DE COTTUN, longtemps propriété dune grande famille locale, la famille Molandé, lensemble,  construit par Le Pelletier de Molandé au XIXe siècle, dont lun des membres fut officier de la garde royale et maire de Cottun, ce château fut prêté à plusieurs reprises aux moines de labbaye de Mondaye à la fin du XIXe et au début du XXe siècle.","architecture":"BAS DE COTTUN, flanqué de deux tours largement restaurées, cet élégant édifice est typique des châteaux de la Restauration, notamment dans la manière dont le dessin épuré de la façade anoblit le parc. Un avant-corps constitué de quatre travées et surmonté dun fronton triangulaire percé dun oculus, se détache nettement de lensemble.  Une chapelle avait été aménagée au rez-de-chaussée de la tour occidentale. La tour Est, quant à elle, servit de colombier.                                                                                                                              Château des MONTS, de style classique a été construit au XIXe siècle.  La famille de Courseulles a acheté le domaine au seigneur de Léaupartie le 29/05/1753. Les façades et les toitures  font l'objet d'une inscription comme M.H. depuis le 12/10/1972, est construit en calcaire. L'édifice est construit en style Louis XV et possède deux ailes de part et d'autre d'un corps central sur sa façade la plus soignée, la méridionale. Un jardin à la Française agrémente le domaine. La même famille possède toujours le château des Monts ou château de Barbeville.  Sa façade nord est particulièrement remarquable. Un avant corps élégant, souligné par un balcon à la ferronnerie ouvragée, est surmonté dun fronton triangulaire. Les belles proportions de cette demeure ne sont pas sans rappeler celles de lHôtel de Royville à Bayeux. Parmi les nombreux propriétaires de ce domaine, dillustres familles ont occupé les lieux dont la famille Pillet-Will, fondatrice notamment de la première Caisse dÉpargne à Paris, en 1818, la famille de la Vallée de Pimodan et le Comte Fernand Foy, conseiller général du Calvados au XIXe siècle.","habitants":"Barbeville; famille de Courseulles                                      Bas  Cottun; famille Molandé                                                  Monts; famille de Courseulles \r\n        \"","divers":"Deux châteaux dans cet article; Barbeville grav-1, des Monts  et Cottin  grav-2. GPS : 49° 16' 38\" Nord, 0° 44' 48\" Ouest                                                              Barbeville GPS : 49° 7' 11,25\" Nord, 0° 37' 5,42\" Ouest                       Cottun: 48° 56' 33,21\" Nord, 0° 04' 57,13\" Ouest","gps":"49° 16' 38\" Nord, 0° 44' 48\" Ouest","images":["../image/image_14/14_Barbeville_1.jpg","../image/image_14/14_Barbeville_2.jpg"]},"Consult_chateau_formulairea15c":{"id":"Consult_chateau_formulairea15c","dept":"14","canton":"Honfleur-Deauville","commune":"Barneville-la-Bertran","nom":"Barneville","type":"Château","periode":"XVIII-XX","histoire":"Deux châteaux dans cet article; Banneville et Champ-Vert à Villervill à l'ouest en bord de mer.                                                     BARNEVILLE, à quelque distance du village, au pied d'un coteau boisé, s'élève au milieu d'un magnifique parc dessiné à l'anglaise, le château de Barneville, dont la construction est antérieure à la Révolution. C'est dans ce château que Monsieur d'Equemauville, seigneur de Pennedepie et de Barneville eut les pieds chauffés par une de ces bandes de brigands connus sous le nom de \"chauffeurs\", qui à l'époque de la Révolution, envahissaient les maisons isolées et les châteaux et chauffaient les pieds de leurs victimes jusqu'à ce qu'elles eussent fait connaître la cachette où était placé leur argent.                                                                            MANOIR des Vallées; Il fut l'objet de nombreux sondages et relevés archéologiques à la fin du XXe siècle. Le manoir fut bâti pour la famille de Barneville, famille cadette des Bertran, grande famille de la noblesse normande .  L'emploi de la pierre de travertin ainsi que son style d'architecture anglo-normand  il associe une salle de réception  à l'ouest à un logis principal à l'est  suggère que le manoir fut bâti au XIIe siècle ou au début du XIIIe siècle.","architecture":"Il existe un autre château à découvrir sur la commune : le château de Champ-Vert  construction de 1913 plus villa que château, pas d'historique,   et le manoir . MANOIR 1875).    L'édifice est composé de trois parties principales qui furent construites à des périodes distinctes. La première partie le logis principal ainsi que le rez de chaussée de la seconde partie l'aula furent édifiés au XIIe siècle ou au début du XIIIe siècle. Le deuxième étage de la seconde partie fut construit au XVe siècle. La troisième partie fut construite au XVIIe siècle.","habitants":"Barneville , famille de Monsieur d'Equemauville                Manoir; famille de Barneville\r\n        \"","divers":"Deux châteaux dans cet article; Barneville grav -1-2-3 et Champ-Vert grav-4-.                                                                      GPS : 49° 24' 03\" Nord, 0° 07' 43\" Est                                                             Champ-vert GPS : 49° 01' 52\" Nord, 0° 25' 22\" Ouest","gps":"49° 24' 03\" Nord, 0° 07' 43\" Est","images":["../image/image_14/14_Barneville_1.jpg","../image/image_14/14_Barneville_2.jpg","../image/image_14/14_Barneville_3.jpg","../image/image_14/14_Barneville_4.jpg"]},"Consult_chateau_formulaire0da5":{"id":"Consult_chateau_formulaire0da5","dept":"14","canton":"Caen","commune":"Bretteville sur Odon","nom":"Baronnie_Calvados","type":"Château","periode":"XV-XVII","histoire":"BARONNIE; c'est une ancienne seigneurie de l'abbaye du Mont-Saint-Michel. Le centre du domaine de la Baronnie comprend les vestiges d'une église, une grange aux dîmes, un manoir de style Médiéval et plusieurs bâtiments agricoles. Le domaine date du VIIe et VIIIe siècle. Des sondages autour de l'église Saint-Pierre et de son cimetière ont permis de mettre au jour les vestiges de la première abside de l'église. Gunnor de Normandie reçoit le domaine en douaire avant son mariage avec le duc de Normandie Richard Ier qui meurt en 996. Vers les années 1015 ou 1025, la veuve lègue le domaine à l'abbaye du Mont-Saint-Michel.","architecture":"BARONNIE, le domaine fait 600 ha qui s'étendent sur Bretteville-sur-Odon et sur Verson. À partir du XVe siècle, le domaine est administré par un fermier général. Le domaine est peu touché par les conflits qui dévastent la Normandie (Guerre de Cent Ans ou guerres de religion), mais ne résista pas à la Révolution française. Il est démantelé entre 1790 et 1793. Le Centre de la baronnie devint une exploitation agricole. Au XIXe siècle, l'église Saint-Pierre, abandonnée, tombe en ruine et la porterie disparait à son tour en 1966. En 1989, la commune de Bretteville-sur-Odon a racheté le domaine. Il est alors restauré et transformé en un centre culturel et de réception. Il est inscrit aux M.H. en 1990 et classé en 1993.","habitants":"Famille du duc de Normandie Richard Ier\r\n        \"","divers":"Château de la Baronnie                                                                              GPS : 49° 09' 50\" Nord, 0° 25' 00\" Ouest","gps":"49° 09' 50\" Nord, 0° 25' 00\" Ouest","images":["../image/image_14/14_Baronnie_Calvados_1.jpg"]},"Consult_chateau_formulaire5a90":{"id":"Consult_chateau_formulaire5a90","dept":"14","canton":"Bayeux","commune":"Bayeux","nom":"Bayeux_Palais","type":"Château","periode":"XVIII","histoire":"Cinq châteaux dans cet article, Agy, Bellefontaine (hôtel), Fresnes, Sully et le Palais.                                                                                                                                                                         Palais à BAYEUX, il abrite aujourd'hui dans ses murs, l'Hôtel de ville de Bayeux et le musée Baron Gérard. l'architecture est de style classique. Sa destination initiale était réservée à l'Évêché de Bayeux. Le palais est construit au nord de la cathédrale. Il faisait partie de l'ensemble canonial qui abritait la cathédrale, la résidence de l'évêque, le cloître canonial, la salle capitulaire, la bibliothèque et l'officialité. La chapelle de plan octogonal a été construite au début du XVIe siècle sous l'épiscopat de Louis de Canossa (1516  1531). Le Palais épiscopal de Bayeux a été reconstruit en 1770-1771. Le 30/03/1797, un platane fut planté comme arbre de la liberté dans la cour du palais actuellement place de la Liberté. il est classé parmi les sites comme monument naturel remarquable. En octobre 2000, il obtient le label « Arbre remarquable de France.  Au XIXe siècle, l'ancien évêché est en partie affecté au tribunal d'instance et la chapelle servit de salle de délibération. La salle Saint-Regnobert qui reliait le transept nord de la cathédrale à lévêché est détruite pour percer le passage Flachat. En 1833, une des ailes est détruite, puis reconstruite pour servir de maison d'arrêt. En 1900, le musée Baron Gérard est transféré dans l'aile la plus ancienne du palais. Aujourd'hui musée.","architecture":"FRESNES, à cinq K.M. au sud-Ouest de Bayeux, Campigny, conservant des éléments du XVIIe siècle, cet élégant château remplaça un manoir Renaissance comme résidence des seigneurs de Campigny. Il fut en grande partie reconstruit au XVIIIe siècle pour la famille Bauquet-Surville, marquis de Campigny depuis 1772,  est resté la propriété de leurs descendants. Le magnifique colombier, élevé dans la deuxième moitié du XVIIe siècle, présente une disposition originale : sous son lanternon une énorme cheminée centrale dispensait aux pigeons une chaleur confortable,  inscription par arrêté du 2 juillet 1927.                                                                                                                                                            AGY,  à quelque K.M. au sud est de Bayeux à AGY  date du XVIIIe siècle et le manoir seigneurial du XVIe siècle, appartenant à la même famille, depuis 1805. Il a été transmis depuis à plusieurs générations par les femmes (Dragon de Gomiécourt, d'Isoard de Chénerilles, de la Poëze d'Harambure).                                                                                                                         SULLY l'hôtel, château De Sully occupe un bâtiment datant du XVIIe siècle à Bayeux, par la famille Breult.","habitants":"Évêché de Bayeux                                                                  Fresnes; famille Bauquet-Surville\r\n        \"","divers":"trois châteaux dans cet article Fresnes grav-5-6 , Agy grav 1 et le palais grav 4.  Agy.  Gps 49° 14' 28\" Nord, 0° 45' 40\" Ouest                                                                                                     Bayeux    GPS : 49° 16' 34\" Nord, 0° 42' 10\" Ouest                                                 Port en bessin GPS : 49° 20' 42\" Nord, 0° 45' 14\" Ouest                             Sully grav 2-3 GPS : 49° 18' 01\" Nord 0° 44' 09\" Ouest","gps":"49° 16' 34\" Nord, 0° 42' 10\" Ouest","images":["../image/image_14/14_Bayeux_Palais_1.jpg","../image/image_14/14_Bayeux_Palais_2.jpg","../image/image_14/14_Bayeux_Palais_3.jpg","../image/image_14/14_Bayeux_Palais_4.jpg","../image/image_14/14_Bayeux_Palais_5.jpg","../image/image_14/14_Bayeux_Palais_6.jpg","../image/image_14/14_Bayeux_Palais_7.jpg","../image/image_14/14_Bayeux_Palais_8.jpg","../image/image_14/14_Bayeux_Palais_9.jpg"]},"Consult_chateau_formulaire0c1c":{"id":"Consult_chateau_formulaire0c1c","dept":"14","canton":"Courseulles-sur-Mer","commune":"Bazenville","nom":"Bazenville","type":"Château","periode":"XVII-XVIII","histoire":"BAZENVILLE, château de l'ancien fief de Crèvecoeur, ou de celui de Saint-Jean-de-Jérusalem, siège d'une haute justice. Petit corps de l'ancienne cour des communs correspondant au pavillon de la haute Justice cité par du Buisson de Courson, datant du XVIIe siècle, en1725 : acquis par Jean-François de Grimouville. Ce dernier, ou son fils Louis, fait reconstruire le logis dans le deuxième quart du siècle, oeuvre attribuable à l'architecte bayeusain Jacques Moussard. Le corps de la haute justice est repris entièrement à cette époque. La ferme, les communs et le colombier sont démolis dans le premier tiers du XXe siècle. En Juin 1944, les bombardements alliés détruisent le portail principal et endommagent le logis, ce dernier est restauré après la guerre.","architecture":"BAZENVILLE, LA CROIX  le château de la Croix est construit autour de 1727 pour Jean-Baptiste Ouzouf de Beaumont, fronton du logis posé le 10 mars 1727 (porte une inscription) ; au XIXe siècle construction du portail ; l'aile orientale est démolie par les bombardements de 1944. Ferme dans les ailes en retour du logis; plan symétrique avant destruction de l'aile est: arrachements d'une remise faisant pendant à celle conservée en pierre de taille: avant corps du logis et remise; fabriques couvertes en pavillon; la serre est couverte en appentis de verre et escalier à volée unique, tournant en demi-cercle. L'édifice en pierre de taille : les travées de fenêtres et les deux avant corps du logis, les deux avant corps de la haute Justice; façades ordonnancées: élévations sur cour et sur jardin du logis.","habitants":"Famille de Jean-François de Grimouville\r\n        \"","divers":"Bazenville  GPS : 49° 18' 13\" Nord, 0° 35' 06\" Ouest","gps":"49° 18' 13\" Nord, 0° 35' 06\" Ouest","images":["../image/image_14/14_Bazenville_1.jpg","../image/image_14/14_Bazenville_2.jpg","../image/image_14/14_Bazenville_3.jpg"]},"Consult_chateau_formulaire13ab":{"id":"Consult_chateau_formulaire13ab","dept":"14","canton":"Falaise","commune":"Beaumais","nom":"Beaumais_Couliboeuf","type":"château","periode":"XVI","histoire":"BEAUMAIS, construit au début du XVIe siècle, sur l'emplacement d'un château fort; appartenant en 1674 à Me Le Camus, lieutenant civil de Paris. La demeure possède un corps de logis flanqué de deux tours et prolongé par deux ailes. De belles lucarnes se détachent sur les hauts toits. Le domaine comprend un bel ouvrage d'entrée, un enclos, des communs et des parties agricoles. Edifice inscrit MH en 1933. La propriété appartient à Mlle de Postel de Lenteuil. A noter sur la commune de Beaumais, la très belle église, reconstruite après un incendie vers 1107 par Richard de Beauvais évêque de Londres, elle est classée protégés MH : le château de Beaumais en totalité : inscription par arrêté du 23 juin 1933.","architecture":"A  trois K.M. au nord à Morteaux-Coulibuf, château  chambres d'hôtes.                                                                                                               BLANC, ainsi nommé depuis 1892, date de la fin du XVIIIe siècle  début XIXe siècle, appartient depuis plusieurs générations à la famille le Tellier de Blanchard. Cette famille est originaire de Colleville où un Jean de Blanchard résidait en 1380. En 1789, Françoise de Bras de Fer (1760-1812) épousa Jacques de Blanchard du Rozel (1750-1819), de cette union naquit Joséphine de  Blanchard. Elle épouse en 1812 Armand Le Tellier. Leurs descendants purent prendre le nom de Le Tellier de Blanchard. Leur fils Charles fut conseiller général du canton et Maire. Il fit de brillantes études à St-Cyr et à lécole de létat major. Il devint colonel de gendarmerie, général de brigade et fut nommé inspecteur général de gendarmerie. Il décède à lâge de 88 ans. Il reçut de nombreuses distinctions. Il fut commandeur de la Légion dHonneur. Son buste en plâtre fut donné en 1907 par Mme de Blanchard pour quil soit exposé dans la maison commune. Depuis 1900 jusquen 2008, quatre générations de cette famille ont été tour à tour maires et certains conseillers généraux. Dans les années 1900, des travaux modernisèrent le château à lélégance désuète et charmante. Ces travaux modifièrent la façade et lintérieur. Une longue galerie et une tour furent ajoutées.","habitants":"Beaumais; Mlle de Postel de Lenteuil\r\n        \r\n        \"","divers":"Beaumais GPS : 48' 53' 40,53\" Nord, 0° 4' 25,27\" Ouest                       Blanc","gps":"48' 53' 40,53\" Nord, 0° 4' 25,27\" Ouest","images":["../image/image_14/14_Beaumais_Couliboeuf_1.jpg","../image/image_14/14_Beaumais_Couliboeuf_2.jpg"]},"Consult_chateau_formulaire1bd6":{"id":"Consult_chateau_formulaire1bd6","dept":"14","canton":"Bayeux","commune":"Le  Manoir","nom":"Beaupigny","type":"Manoir","periode":"XVIII-XIX","histoire":"BEAUPIGNY, ensemble comprenant deux parties, ferme et résidence, ayant chacune un portail au sud; ferme: grange et partie orientale du corps de logement édifiées au XVIIe siècle, la partie occidentale du corps de logement, actuel pressoir à cidre et portail, portant un graffiti de 1729, construits ou entièrement remaniés au XVIIIe siècle. Au XIXe siècle, destruction de l'ancien pressoir qui fermait la cour à l'ouest et  aménagement d'un nouveau dans l'aile sud, édification d'une charretterie; résidence : logis construit dans la première moitié du XVIIIe siècle, et resté à demi inachevé, pour les d'Arclais de Beaupigny, seigneurs de Saint-Célerin, fief sis sur la commune de Vienne-en-Bessin (porte armoiries remployées sur l'accès au jardin) ; un corps accolé à la chapelle porte les dates 1729 et 1767 ; la chapelle du XVIIIe siècle comportant un portail remployé de la même époque; à la fin du XVIIIe siècle construction des écuries ; au XIXe siècle aménagement du fournil dans le corps de la chapelle.  L'accès à la ferme et à la résidence par les deux portails au sud a été supprimé au profit du nouvel accès unique côté nord. Sur la porte du jardin et la porte de la chapelle armes de la famille d'Arclais de Beaupigny jumelées avec d'autres armes non identifiées.","architecture":"le MANOIR, territoire de la commune habité dès l'époque romaine : milliaire découverte en 1819 près de la voie Bayeux-Bénouville, vestiges de construction trouvés sur une pièce de terre dite la Grande Mionne, à côté du château de Beaupigny, lors de fouilles pratiquées par Arcisse de Caumont en 1829. Le village actuel a été établi sur le chemin longeant la Seulles qui double la voie romaine au haut Moyen Age. Première mention en 1025 sous Richard II, duc de Normandie, lorsque celui-ci donne l'église à l'abbaye de Jumièges. Le château du Manoir sis sur un terrain dépendant d'un ancien manoir comme en témoigne, sur le cadastre ancien, la présence d'un colombier; bâtiment du pressoir à cidre et des écuries datant du XVIe ou du XVIIe siècle; bâtiment accolé à l'est portant la date 1765; le logis et le portails d'entrée du domaine édifiés en 1830. Le logis est agrandi d'un pavillon au milieu du XIXe siècle (témoignage du propriétaire) et remises édifiées dans le courant du XIXe siècle. Logis en moellon enduit, un étage carré, façade principale de la partie édifiée vers 1830 ordonnancée.","habitants":"Famille d'Arclais de Beaupigny\r\n        \"","divers":"Beaupigny grav 1-2                                                                          GPS : 49° 16' 55\" Nord, 0° 35' 52,7\" Ouest","gps":"49° 16' 55\" Nord, 0° 35' 52,7\" Ouest","images":["../image/image_14/14_Beaupigny_1.jpg","../image/image_14/14_Beaupigny_2.jpg"]},"Consult_chateau_formulaireecb1":{"id":"Consult_chateau_formulaireecb1","dept":"14","canton":"Caen","commune":"Hérouville -St-Clair","nom":"Beauregard_14","type":"Palais","periode":"XIX","histoire":"BEAUREGARD, le domaine de Beauregard appartenait au fief de Colbert. Au milieu du XIXe siècle, la propriété fut acquise par un armateur du Havre, Jules Lecesne, qui en fit un lieu de villégiature. \r\nRacheté par la commune d'Hérouville Saint-Clair en 1977 et peu utilisé hormis quelques événements ponctuels, ainsi un certain nombre de « fêtes de la Rose » jusqu'en 1988, date à laquelle est créée l'association qui porte son nom, il est devenu  un lieu d'activités culturelles et sportives. Depuis juillet 2009, le parc du château accueille le Festival Beauregard avec en tête d'affiche pour les premières éditions : Mika, Pete Doherty, Arthur H, Iggy Pop & The Stooges, Ay, Gossip, Phoenix Il a réuni 20 000 festivaliers pour sa première édition.","architecture":"BEAUREGARD, il est de style Troubadour, il a été achevée au milieu du XIXe siècle,  qui en fit un lieu de villégiature. Durant la Seconde Guerre Mondiale, le Domaine va subir d'importants dégâts, chaque été, pour ses colonies de vacances. Racheté en 1977, par la commune d'Hérouville Saint-Clair, le château de Beauregard devient un centre de Loisirs.  Le domaine a subi de lourds dégâts pendant la Seconde Guerre mondiale après laquelle il a été racheté par l'État et mis à la disposition de l'ORTF qui l'occupait l'été pour ses colonies de vacances. En 1999, lors de la tempête, certains dégâts furent à déplorer en particulier des chutes d'arbres centenaires.","habitants":"Beauregard; fief de Colbert                                                        Famille de  Jules Nicolas Le Cesne.\r\n        \"","divers":"Gps 49° 12' 50,5\" nord, 0° 18' 43,5\" ouest","gps":"","images":["../image/image_14/14_Beauregard_14_1.jpg","../image/image_14/14_Beauregard_14_2.jpg","../image/image_14/14_Beauregard_14_3.jpg"]},"Consult_chateau_formulairee37c":{"id":"Consult_chateau_formulairee37c","dept":"14","canton":"Livarot","commune":"Livarot_Moustiers-Hubert","nom":"Bellou_Chiffretot","type":"Manoir","periode":"XVI-XVII","histoire":"Trois châteaux à Bellou, Chiffretot , Livarot,                                                                                   BELLOU; à la famille le Michel, le manoir de Bellou est classé aux M.H. depuis le 5/02/1923, le bâtiment du pressoir, avec ses mécanismes, et la cave attenante, datent, du 2/11/2004. Propriété de monsieur Goy.                                                                         CHIFFRETOT  le manoir a été réquisitionné par le maréchal Rommel pendant le débarquement allié et la bataille de Normandie en 1944. C'est à quelques kilomètres de là (à proximité de Vimoutiers qu'il a été blessé par une attaque aérienne lors d'un déplacement en automobile. Son état-major avait réquisitionné une maison du village qui avait autrefois servi d'hôtellerie aux représentants de commerce de la Fabrique de papiers d'emballage, disparue dans un incendie accidentel en 1928.  Le manoir a eu pour propriétaire Robert Halley, créateur du groupe Promodès et maire du village de 1978 à 2001.                                                                                                              LIVAROT, construction d'un manoir moderne à deux niveaux sur soubassement et un étage dans combles flanqué de pavillon carré sur angle.","architecture":"BELLOU, la construction du manoir en 1560  corps de logis rectangulaire est adjoint, côté Est un pavillon légèrement en saillie et son colombier du XVIe siècle. Le manoir date du XVIe et XVIIe siècles en pans de bois, deux tours carrées ornent l'une des façade, tandis que la façade postérieure est flanquée de deux tourelles rondes. Parmi les communs, le pressoir, du XVe siècle, est une construction à longs poteaux de 7 travées, à 2 niveaux. A l'étage, une lisse relie les poteaux entre eux et sert d'appui à des baies. Le pressoir contient un tour, un moteur électrique et deux presses. Au Nord-Ouest du logis se trouve une ancienne écurie construite en 1720, prolongée par une charretterie en pan de bois. Le manoir de Bellou possède 2 lucarnes dont les pièces de bois ont reçu un décor sculpté, de style Renaissance.                                                                                                      CHIFFRETOT,  le manoir de Chiffretot est composé de deux éléments bien distincts:  le corps principal, du XVIe siècle, de forme rectangulaire et à deux niveaux, ce logis est dominé par un toit à quatre versants sur lequel se dressent, en pignon, deux imposantes cheminées. Il présente des façades à pans de bois et au hourdis tuilé particulièrement remarquable. Sur la façade principal, les pièces de bois sont légèrement décorées, notamment la sablière d'étage et le linteau de la porte.  La tourelle octogonale, du XVIIe siècle, située à l'angle sud-est du logis, cette tourelle repose sur une base en pierre calcaire ocrée sur laquelle s'élèvent des facettes à pans de bois, chacune de ces facettes est percée d'une étroite ouverture correspondant à une ancienne meurtrière. Par ailleurs, dans le parc entourant le manoir, se dresse un colombier carré en pierre de taille qui porte la date de 1605.","habitants":"Bellou; famille le Michel                                                                  Chiffretot; Famille Robert Halley\r\n        \"","divers":"Trois châteaux à Bellou grav 1-2-3 Chiffretot grav-4 , Livarot grav-5,      GPS : 49° 02' 27,6\" Nord, 0° 15' 04,02\" Est                                                      Isles Livarot gps  49° 00' 24\" nord, 0° 09' 09\" est","gps":"49° 02' 27,6\" Nord, 0° 15' 04,02\" Est","images":["../image/image_14/14_Bellou_Chiffretot_1.jpg","../image/image_14/14_Bellou_Chiffretot_2.jpg","../image/image_14/14_Bellou_Chiffretot_3.jpg","../image/image_14/14_Bellou_Chiffretot_4.jpg","../image/image_14/14_Bellou_Chiffretot_5.jpg"]},"Consult_chateau_formulaire8ab7":{"id":"Consult_chateau_formulaire8ab7","dept":"14","canton":"Cabourg","commune":"Bavent_Chicheboville","nom":"Beneauville","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article ; Beneauville et  Bavent. BENEAUVILLE, la construction commence en 1589 et elle sachève en 1592, cest Louis de Touchet, sieur de Béneauville, gentilhomme converti au protestantisme qui fait construire la demeure « en fortification et assurance de lui et de sa famille, à raison des guerres civiles en France avec dautres afflictions, tourments à lui advenus.  En 1782, Jean-Louis de Touchet cède le château à M. Housset de Catteville. Il est ensuite revendu plusieurs fois jusquà son huitième et actuel propriétaire. En 1982, Mme de Hauteville déclarait le jardin, au début du siècle était à langlaise. Les Hautteville lont francisé. Cest son fils, Adrien, qui parachève luvre paternelle avec les aménagements intérieurs. Béneauville reste dans la famille de Touchet pendant près de deux siècles, location chambres d'hôtes.","architecture":"BAVENT, construit dans la première moitié du XVIIe siècle, est inscrit à linventaire supplémentaire des monuments historiques en 1972. Son originalité est de présenter une façade du XVIe siècle au nord avec une large tour carrée et une façade sud-est du plus pur style louis XIV. Éléments protégés MH : les façades et les toitures, le grand salon et son décor, la cheminée de la salle à manger,  inscription par arrêté du 11 avril 1975.                                                                                                    BENEAUVILLE, durant cette période, le château se transforme peu, la toiture trop haute est un peu abaissée, la lucarne centrale et les meneaux des fenêtres disparaissent, deux pavillons sont édifiés aux extrémités, du XVIIe au XVIIIe siècles, ainsi quun perron sur la façade. Il y avait une serre et une orangerie le long du mur qui borde la route dAmfreville. Occupée par les troupes allemandes.  En cette période troublée de la fin des guerres de religion, Béneauville est un logis fortifié entouré de douves, gros donjon carré flanqué à larrière de deux tourelles. Louis de Touchet est un esprit curieux et original, féru déconomie domestique. Ayant remarqué la qualité exceptionnelle de largile de Bavent, il a inventé en ces environs, à faire la chaux, briques, tuiles sur le lieu pour la perfection du bâtiment. Cest avec une rigueur toute protestante, mais empreinte de lesprit Renaissance, que le château est construit en assises alternées de briques et de pierres calcaires et couronné dune haute toiture.","habitants":"Beneauville;  Louis de Touchet\r\n        \"","divers":"Deux châteaux dans cet article ; Beneauville grav 1-2 et  Bavent grav-3-4                                                                                                     GPS : 49° 13' 46,23\" Nord, 0° 11' 4,57\" Ouest","gps":"49° 13' 46,23\" Nord, 0° 11' 4,57\" Ouest","images":["../image/image_14/14_Beneauville_1.jpg","../image/image_14/14_Beneauville_2.jpg","../image/image_14/14_Beneauville_3.jpg","../image/image_14/14_Beneauville_4.jpg"]},"Consult_chateau_formulaire7945":{"id":"Consult_chateau_formulaire7945","dept":"14","canton":"Trévières","commune":"Bernesq-Saonnet","nom":"Berne_Bernesq","type":"Château","periode":"XV-","histoire":"BERNESQ , le château de Bernesq a été construit au XVe siècle par le roi François Ier, une plaque disposée dans la cheminée principale où est sculptée son sigle :  Il a offert ce château ainsi que tout ce qui s'y rattachait à une de ses maitresses. En effet, le château était à l'époque, à l'origine des principales activités du village. Par exemple, à 500 m du château, se trouvent des vestiges de cette époque chez le boulanger. Le haras de Bernesq n'est pas ouvert aux visites en dehors de périodes bien définies.\r\nÉléments protégés MH : les façades du château de Bernesq : inscription par arrêté du 2 juillet 1927.","architecture":"BERNESQ, sur la cheminée principale se trouve une plaque, sculptée du sigle du roi. C'est une salamandre, entourée de lys en fleurs. Le château de Bernesq fut offert par le roi, à l'une de ses maitresses. A 500 m du château se trouve encore une ancienne roue a broyer des pommes, pour fabriquer le cidre. Depuis 1982, le château de Bernesq est devenu un domaine privé, racheté par son propriétaire, un éleveur de chevaux de courses. Il est reconnu comme un des plus grands et plus beaux haras du pays.","habitants":"roi François Ier\r\n        \r\n        \"","divers":"Bernesq-Saonnet                                                                               GPS : 49° 16' 20,34\" Nord, 0° 56' 31,28\" Est","gps":"49° 16' 20,34\" Nord, 0° 56' 31,28\" Est","images":["../image/image_14/14_Berne_Bernesq_1.jpg","../image/image_14/14_Berne_Bernesq_2.jpg"]},"Consult_chateau_formulaire740e":{"id":"Consult_chateau_formulaire740e","dept":"14","canton":"Caen","commune":"Bernières-sur-Mer","nom":"Bernières_sur_Mer","type":"Château","periode":"XV-XVI-XVII-XIX","histoire":"Quatre châteaux à Bernières; la Luzerne, Quintefeuille, Rochelle et  Semilly.                                                                                                          LA LUZERNE;  manoir XVIe siècle, logis,  de plan rectangulaire sur un rez-de-chaussée un étage et un étage de comble et au XVe siècle, Thioult de Rucqueville possède le fief racheté en 1652 par Jacques de Moissant de Brieux, en 1789 le domaine appartient  à la famille Touchet, le docteur Michel de Pontville propriétaire actuel.                                                                                                                    QUINTEFEUILLE.  en 1630 est acquit par Thomas de Morant  baron de Courseulles, passa aux Perthuis-Lecocq-Beaux amis alliés aux Cauvcigny, possesseur du domaine voisin Semilly, passa aux Brouard.   En 1885 Gabrielle de Milhau lacquiert et il portera ce nom pendant plusieurs décennies avant dêtre appelé château de Quintefeuille au début du XXe siècle. La famille de Milhau le conserve jusquà laube de la seconde guerre mondiale où il est vendu par adjudication afin de couvrir les dettes du dernier héritier. A la fin du XXe siècle restauré par le peintre Albert Zavaro.                                                                                                                 SEMILLY, date du XVIIe siècle, a été très remanié. Possession de la famille de Semilly, passa par alliance aux Cauvigny et aux Roussel au XXe siècle. Les deux pavillons inscrits datent de la même époque et marquaient les extrémités Sud du domaine, les pavillons du XVIIe siècle, furent construits, l'un, en bordure de la mer, l'autre, en bordure de la rue des Ormes, Ils sont inscrits partiellement aux M.H. depuis le  16/09/1937. Aujourd'hui propriété des Hayaux De Tilly.","architecture":"QUINTEFEUILLE, est édifié à la fin du XVIIe siècle ou au début du XVIIIe siècle.  Dans laxe le château ferme la cour entourée de deux communs et dun colombier. Au nord du château, une cour en demi-cercle ouvre la perspective vers la mer. Avec le débarquement allié de 1944, le château et le parc subissent quelques dommages. Après-guerre, le propriétaire effectue les réparations nécessaires. Des douves sont créées de part et dautre de la grille dentrée. Devant le château, la cour est réaménagée avec une composition rectangulaire classique,  sorganise autour dun bassin circulaire central accompagnés dune fontaine, de vases Médicis et de bancs en pierre. En 1961, le propriétaire, M. de Brouard, demande la protection du parc menacé par lurbanisation de Bernières et le projet dune route qui amputerait le domaine. Le parc du château est classé parmi les sites en décembre 1963. Peu entretenu par la suite, il est morcelé en trois bandes parallèles en 1986. Un nouvel acquéreur achète le château et les terrains de la perspective au sud et au nord. Le château et son parc intègrent la zone de protection du patrimoine architectural urbain et paysager, créée à Bernières en 1992.                                                                                                            ROCHELLE, fut bâti dans la première moitié du XIXe siècle pour Louis-Philippe Dumont de la Rochelle, député. Le bâtiment présentait les caractéristiques d'un château néo-classique. Dans la deuxième moitié du XIXe siècle, sont menées des extensions et une rénovation intérieure. Sur la façade antérieure ajout d'une tour hexagonale demi hors-oeuvre. Les deux pavillons sont prolongés pour accueillir des pièces de service.","habitants":"Luzerne ;Thioult de Rucqueville                              Quintefeuille; famille de Milhau,                                             Sémilly; famille de Semilly                                                    Rochelle;  Louis-Philippe Dumont\r\n        \"","divers":"Quatre châteaux à Bernières; la Luzerne grav-1, Quintefeuille grav-2, Rochelle grav 5-6 et  Semilly grav 3-4 .                                  Quintefeuille, GPS : 49° 19' 56\" Nord, 0° 25' 19\" Ouest                           Sémilly GPS : 49° 19' 59\" Nord, 0° 25' 25\" Ouest                                                Rochelle 48° 49' 10\" nord, 0° 45' 10\" ouest","gps":"49° 19' 56\" Nord, 0° 25' 19\" Ouest","images":["../image/image_14/14_Berni%c3%a8res_sur_Mer_1.jpg","../image/image_14/14_Berni%c3%a8res_sur_Mer_2.jpg","../image/image_14/14_Berni%c3%a8res_sur_Mer_3.jpg","../image/image_14/14_Berni%c3%a8res_sur_Mer_4.jpg","../image/image_14/14_Berni%c3%a8res_sur_Mer_5.jpg","../image/image_14/14_Berni%c3%a8res_sur_Mer_6.jpg"]},"Consult_chateau_formulaire50a5":{"id":"Consult_chateau_formulaire50a5","dept":"14","canton":"Livarot","commune":"Saint-Martin-de-Bienfaite-","nom":"Bienfaite","type":"Château","periode":"XV-XVII","histoire":"BIENFAITE, la maison de Bienfaite remonte  à lan mil, aux temps des premiers ducs de Normandie. Une antique motte féodale, dressée sur un éperon naturel, veille alors sur la vallée de lOrbiquet. Les seigneurs de Bienfaite bâtissent une demeure médiévale non loin delle, près du ruisseau de la Cressonière, abandonnée à la Révolution, la propriété est rachetée au Chaumont-Quitry par le comte de Noinville en 1840. Il aménage les abords et crée un parc à langlaise comme un écrin autour du château. Le ruisseau de la Cressonnière, qui coule à quelques mètres, reflète limage de la demeure. A la fin du XIXe siècle une aile de style Renaissance est accolée au nord du bâtiment. Le château et son parc sont classés parmi les sites en août 1943. Comme bien dautres sites protégés à cette époque, le classement correspond à la volonté de ladministration des beaux-Arts de préserver les magnifiques plantations de \"leffort de guerre\" : bois duvre ou de chauffage.","architecture":"BiIENFAITE,  ce premier château est démantelé au XVe siècle  est remplacé par une nouvelle construction, remaniée au XVIIe siècle. Coiffé de toitures à la Mansart, le château présente une façade classique de pierres de taille et de briques. Seule une tour du XVe siècle subsiste à lextrémité sud,  le château de Bienfaite, entouré de grands arbres, est blotti en fond de vallée entre léglise et le village. Sur le versant orienté plein ouest, lensemble compose un charmant tableau parmi les collines rondes et verdoyantes aux sommets couronnés de bois. Devant la façade ouest, une large échancrure  du ruisseau ménage des vues sur les prairies de fond de vallée et les champs cultivés qui occupent le bas des pentes. A lest, le parc est longé par un mur en argile à silex chaîné et couronné de briques, à lintérieur des communs sy appuient. Le portail dentrée, massive ferronnerie du XIXe siècle, souvre entre deux piliers de pierres calcaires en bossage alternées de briques. Depuis 1850 le parc et le château ne semblent pas avoir beaucoup changés. Lentretien du domaine est effectué sans excès et les magnifiques arbres ombragent toujours la propriété. Seuls les massifs floraux du comte de Noinville qui ornaient la façade dentrée ont été remplacés par une pelouse circulaire bordée dallées.","habitants":"Famille ; Chaumont-Quitry \r\n        \"","divers":"Château de Bienfaite grav 1-2-3  GPS : 49° 02' 43\" Nord, 0° 21' 44\" Est","gps":"49° 02' 43\" Nord, 0° 21' 44\" Est","images":["../image/image_14/14_Bienfaite_1.jpg","../image/image_14/14_Bienfaite_2.jpg","../image/image_14/14_Bienfaite_3.jpg"]},"Consult_chateau_formulairedc7f":{"id":"Consult_chateau_formulairedc7f","dept":"14","canton":"Ouistreham","commune":"Bieville-Beuville","nom":"Bieville","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article Bieville et Beuville.                                             BIEVILLE, ce fief est alors tenu par Jehan Cordhomme, écuyer. Il est acheté ou apporté en dot à Jacques 1er de Baillhache à la fin du XVIe siècle. Cest ce dernier, seigneur de Rubercy et dOutreval qui fait bâtir le manoir seigneurial, « sur une parcelle sise en la delle des dix acres, était assis le manoir seigneurial avec lun des colombiers, le tout clos de murailles et de doubles fossés» Lélégant pavillon de Baillehache, avec sa haute toiture pyramidale et ses cheminées élancées, borde le « chemin du Roi ». Le manoir demeure dans la famille jusquà son acquisition, en 1752, par Nicolas-François Le Coq, seigneur de Beuville. A sa mort en 1770, la terre de Biéville revient à son fils cadet qui commence la construction dun nouveau château près de lancien logis seigneurial dOutreval. Il décède en 1786 sans lavoir achevé. Cinq années plus tard, son fils, Le chevalier de Rubercy, vend tout le domaine de Biéville au comte de Sourdeval. Le château est toujours dans le même état et seuls les murs et la toiture sont terminés. Victime de la Terreur, le comte na pas le temps de parachever la construction. Sa veuve ny réalise que quelques travaux indispensables. Au début du XXe siècle, devenu une ferme avec des communs bâtis autour de la cour. Les propriétaires du château lont laissé dans létat où ils lont trouvé. La famille Vogt acquiert le domaine en 1917 et loccupe jusquà la seconde guerre mondiale où le château est réquisitionné par les troupes doccupation. Sinistré en 1944, il est restauré par ses propriétaires qui habitent le pavillon Bailllehache. Le parc est classé parmi les sites en juin 1987.","architecture":"BEUVILLE, la seigneurie de Beuville demeura entre les mains de la famille éponyme jusqu'au milieu du XVIe siècle. Cette famille de chevaliers s'illustra sur les champs de bataille et contracta de belles alliances notamment avec la famille d'Harcourt. Le talentueux costumier David Belugou vient dacquérir le château de Biéville-Beuville au nord de Caen. Le rez-de-chaussée sera consacré à des ateliers darts et dexpositions.                                                                  BIEVILLE, peu après lentrée sud du bourg, le château de Biéville est une superbe construction classique en pierre de taille, sur deux niveaux, coiffée dune toiture à la Mansart où des lucarnes à il de buf souvrent dans le brisis. Sur son avant corps central, quatre colonnes ioniques sélèvent pour supporter un fronton triangulaire inachevé. Au-dessus, le haut comble à la Mansart, à deux étages de lucarnes, na pas été reconstitué après-guerre et désormais la toiture ne présente plus quun volume unique. Au pied de lélégant perron en fer à cheval, sétend une pelouse au dessin classique ornée en son centre dune sculpture.  La façade arrière, plus sobre, a conservé sa modénature dorigine. Un large perron central conduit à un avant-corps droit surmonté dun étage attique et dune terrasse à balustrade. Devant la façade, vers louest, il ne subsiste plus rien.  Le pavillon Baillehache sélève en bordure de la route de Caen. Seul le dernier étage, couvert de vigne vierge, et la haute toiture émergent au-dessus du mur de clôture. Le corps dhabitation est composé du pavillon Renaissance suivi de trois corps de bâtiment qui semblent rangés par ordre de taille. A larrière, le bâtiment na guère changé et il a conservé ses ouvertures étroites surmontées déchauguettes.","habitants":"Bieville, Nicolas-François Le Coq\r\n        \r\n        \"","divers":"Deux châteaux dans cet article Bieville et Beuville. Grav 3                                 Château de Bieville grav 1-2.","gps":"","images":["../image/image_14/14_Bieville_1.jpg","../image/image_14/14_Bieville_2.jpg","../image/image_14/14_Bieville_3.jpg"]},"Consult_chateau_formulaire8edd":{"id":"Consult_chateau_formulaire8edd","dept":"14","canton":"Trévières","commune":"Blay","nom":"Blay_Breuil","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Cléronde à Blay et Goville à le Breuil.                                                                                                           CLERONDE date de 1639. Il est de style Louis XIII. Renée de Fromont, sieur de Cléronde, le constructeur du manoir occupa une importante charge. Les Fromont, dont beaucoup furent juristes, au Parlement de Rouen, étaient en possession des terres de Cléronde, au milieu du XVe siècle. Construit en 1639, dans le style Louis XIII, et restauré à la fin du XIXe siècle par le baron Maurice Gérard, Cléronde se compose d'un corps central flanqué de deux pavillons d'importance inégale. Le pavillon Sud est de même architecture et de même hauteur que le corps principal. Le pavillon-tourelle Nord, dans lequel figure la date de 1639, flanquée d'un escalier monumental, est nettement plus large et plus haut. En 1792, Philippe de Fromont vendit son domaine avant d'émigrer. L'ensemble passa, de mains en mains, dont celles du Baron Maurice Gérard, grand mécène, petit-neveu du peintre François Gérard, dans la seconde moitié du XIXe siècle                                                                       Dans un village voisin à Breuil en Bessin château de GOVILLE du XVIIIe siècle édifié par les seigneurs de Royvillz, l'acquéreur  Gilles-Germain Gosset meurt en 1813 léguant le domaine à sa filleule Angélique le François qui épouse en 1822 à Saon Auguste Carite en 1876 à la mort de ses parents Léon Carite hérité et meurt en 1905, la propriété revient à l'une de ses filles Thérése, qui épouse  Léon Vallée en 1920. La demeure est occupé par les allemands, Thérése s'éteint  en 1978, l'année suivante son petit-fils Jean-Paul Vallée associé à Gilles Mignot réunit le domaine et le transforme en chambres d'Hôtes.","architecture":"CLERONDE, construit au milieu du XVIIe siècle, On peut apercevoir la porte du pavillon-tourelle avec ses armoiries sculptées sur le fronton.    les autres portes sont encadrées de piédroits moulurés et surmontées d'un fronton triangulaire sculpté. Une petite échauguette en encorbellement orne l'angle Sud. Le toit en ardoise, qui repose sur une corniche à modillons est sur lequel se dressent plusieurs lucarnes est surmonté par de nombreuses grandes cheminées, se couvre d'épis de faîtage en céramique, hérissés de fer de lance. Le logis s'éclaire quant à lui par de nombreuses fenêtres.  Lors de la Bataille de Normandie, en 1944, le Manoir de Cléronde a beaucoup souffert, il fut le témoin d'une grande bataille le 8/06/1944, dans le Bois de Gruchy. Le manoir est situé, près de la limite de Mosles, au cur d'herbages, à l'orée du bois de Gruchy, au pied de l'étang de Cléronde, sur le toit d'une des tourelles, on peut voir la silhouette d'un personnage revêtu d'une armure et d'une culotte bouffante, surnommé  Mr de Cléronde.                                                                                                       GOVILLE, du XVIIIe siècle, est une demeure historique appartenant à la même famille depuis deux siècles. Corps de logis de plan rectangulaire un rez-de-chausées et un étages couvert d'un toit en batières. Aujourd'hui surélevé d'un attique doublé en profondeur coiffé d'un toit en croupes, l'édifice est flanqué de deux ailes Basses, sur ses façades sept travées dans lesquelles s'encadrent des fenêtres à linteaux cintrées. Aujourd'hui hôtel de Charme.","habitants":"Cléronde; baron Maurice Gérard                             Goville, Gilles-Germain Gosset\r\n        \"","divers":"Deux châteaux dans cet article; Cléronde grav--4-5 à Blay grav 1- et Goville    grav-2-6- à le Breuil  grav 2-3 .                                             Cléronde gps 49° 17' 43\" N, 0° 50' 13\" Ouest","gps":"","images":["../image/image_14/14_Blay_Breuil_1.jpg","../image/image_14/14_Blay_Breuil_2.jpg","../image/image_14/14_Blay_Breuil_3.jpg","../image/image_14/14_Blay_Breuil_4.jpg","../image/image_14/14_Blay_Breuil_5.jpg","../image/image_14/14_Blay_Breuil_6.jpg"]},"Consult_chateau_formulaireaee7":{"id":"Consult_chateau_formulaireaee7","dept":"14","canton":"Falaise","commune":"Morteaux-Couliboeuf","nom":"Blocqueville","type":"Château","periode":"XVII-XVIII","histoire":"Trois, châteaux dans cet article ; Blanc,  Blocqueville et Madeleine. Le château BLANC, ainsi nommé depuis 1892, date de la fin du XVIIIe siècle  début XIXe. Ce château appartient depuis plusieurs générations à la famille de Blanchard. Cette famille est originaire de Colleville où un Jean de Blanchard résidait en 1380. En 1789, Françoise de Bras de Fer (1760-1812) épousa Jacques de Blanchard du Rozel (1750-1819), de cette union naquit Joséphine de  Blanchard.  Elle épouse en 1812 Armand Le Tellier. Leurs descendants purent prendre le nom de Le Tellier de Blanchard.                         BLOCQUEVILLE, au XVIIe siècle, le fief de Blocqueville était entre les mains de Jacques de Colboeuf, Sieur de Blocqueville. Adélaïde, fille du Maréchal Davout (1770-1823) fidèle lieutenant de lempereur épousa Edmond de Coulibuf de Blocqueville de 26 ans son ainé. Après son divorce, elle se retira à Paris et conserva le titre de Marquise de Blocqueville. Par legs testamentaire, elle consacra une somme à la construction dun phare : le phare dEckmühl en mémoire de son père qui fut fait prince dEckmühl par lempereur Napoléon 1er en récompense de la victoire remportée par lui sur les Autrichiens en 1809. Devenu marquis de Blocqueville en 1854, Edmond de Coulibuf fit carrière dans larmée, et carrière politique comme maire de Coulibuf puis de Morteaux-Coulibuf puis comme conseiller général du canton. Il mourut en 1861.  M. Lagrange de Langre, chevalier de la légion dhonneur et préfet des Alpes-Maritimes devint ensuite propriétaire. Au début de la 2ème guerre mondiale cest M. de Laferanderie qui était alors propriétaire; après-guerre cest M. Legrand des usines Legrand qui devient à son tour propriétaire du château. Cest en mai 1964 que les propriétaires actuels, la famille Guilmin acquièrent la propriété.","architecture":"BLOCQUEVILLE, il rajouta le dernier étage en briques afin dy mettre son blason de dimension conséquente (la hauteur dune fenêtre), juste sous lhorloge. Il fut ensuite dans lobligation de vendre le château pour faire face aux frais engendrés par les travaux et le procès quil avait intenté pour sopposer au tracé de la ligne de chemin de fer et à limplantation de la gare. La propriété dans un état avancé de délabrement, le château menaçait de sécrouler, les terres étaient en friches. Le château fut alors rasé et les pierres utilisées par les Ets Ronco Nique sur différents chantiers des environs, a été construit en 1858 sur lemplacement dun ancien château féodal, le portail date de cette époque là.                                                                                                                       MADELEINE, pendant 4 siècles, la famille dOilliamson dorigine écossaise a possédé la seigneurie de Coulibuf. Gabriel dOilliamson, marquis de Courcy fit abattre les différents bâtiments du château féodal pour faire construire le château Louis XVI La Madeleine était une de leur ferme. Dans les années 1780, le marquis de Courcy fit construire le manoir pour servir de résidence à sa mère. A la Révolution, les trois fils de Mme de Courcy furent déclarés émigrés et leurs biens confisqués comme biens nationaux. Elle dut racheter la Madeleine et quelques terres attenantes. Les dOilliamson conservèrent la Madeleine jusquen 1862. Il ny a plus de membre de cette famille à Coulibuf. Labbé Thomas Hardouin , fils de Mme de Courcy revint en 1803 sinstaller à la Madeleine et géra la propriété.  Il sattacha à agrandir à la fois la maison et le domaine. Cest lui qui fit con
