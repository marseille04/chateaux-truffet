 de cette époque. La basse cour en U et ses dépendances sont réparties sur une surface de presque 3 hectares de pâture et de jardin. Elle abrite deux logis d'habitation et trois granges sur deux niveaux, construites entre 1828 et 1890. Éléments protégés MH : les restes du château de Tournebu : inscription par arrêté du 21 juin 1927.","architecture":"FRESNEY, il offrait un grand carré de bâtiments, flanqué de hauts pavillons, dont la porte d'entrée, crénelée et garnie de rainures, recevait un pont levis qui s'abaissait sur les douves. Entre les pavillons, de grandes galeries, dont la principale était ornée des écussons de tous les seigneurs, celui de Charles Léon de Fiesque, prince et vicaire du Saint Empire, portait un aigle éployée.  Le colombier figurant sur cadastre 1808 fut détruit. Éléments protégés MH : le château en totalité : classement par arrêté du 9 octobre 1930.                                                                                                     TOURNEBU Sa construction date du XIIIe siècle. Il appartenait à la famille de Tournebu qui en avait fait sa résidence familiale. Construit par les premiers barons de Tournebu au XIIIe siècle, il passera dans les mains de plusieurs familles avant d'être racheté, à nouveau, par Pierre III de Tournebu, marquis de Livet aux comtes du Rhin. En 1806, le château est légué par Marie-Pierre de Tournebu (née en 1725 et décédée en 1810 sans postérité de son mariage en premières noces avec Pierre François Jean-Baptiste de Bernières seigneur de Mondrainville, puis, en secondes noces, avec Louis-François-Pierre Louvel de Janville) à René-Jacques de Foucault (1717-1799) qui descendait en ligne féminine de la famille de Tournebu. Le donjon et les dépendances sont en très mauvais état. La Famille de Foucault a conservé le château jusqu'en 2012.","habitants":"Famille de Tournebu\r\n        \"","divers":"Château de Tournebu  GPS : 48° 58' 18\" Nord, 0° 20' 35\" Ouest, Fresney grav 3-4","gps":"48° 58' 18\" Nord, 0° 20' 35\" Ouest, Fresney grav 3-4","images":["../image/image_14/14_Tournebu_1.jpg","../image/image_14/14_Tournebu_2.jpg","../image/image_14/14_Tournebu_3.jpg","../image/image_14/14_Tournebu_4.jpg"]},"Consult_chateau_formulairebee8":{"id":"Consult_chateau_formulairebee8","dept":"14","canton":"Honfleur-Deauville","commune":"Trouville sur Mer-Deauville","nom":"Trouville_Deauviller","type":"Château","periode":"XVI","histoire":"trois châteaux dans cet article Aguesseau, Bonneville, Fougère et les Roches noires                                                                                    BONNEVILLES SUR TOUQUES, appelé aussi le château de Guillaume le Conquérant  date du XIe siècle. Le château a été classé aux M.H. depuis le 16/11/1964.                                                          FOUGERES, c'est un château agé de plus de 1000 ans. La construction date du XIIe siècle. Il appartenait à Raou II.                                                                                              Les ROCHES NOIRES, hôtel, Il appartenait à Alphonse-Nicolas Crépinet. Il est de style Second Empire. Le hall d'entrée fut décoré par Robert Mallet-Stevens. L'hôtel fut peint par le Peintre Claude Monet, en 1870. est le second grand hôtel de luxe  construit par l'architecte Alphonse-Nicolas Crépinet, devint le lieu de villégiature de Marcel Proust puis de Marguerite Duras.  De grands bourgeois et aristocrates français côtoyaient alors, sur la côte normande, des milliardaires américains, des aristocrates russes, des industriels allemands ou des financiers anglais. Rénové en 1924 et transformé, par l'architecte Robert Mallet-Stevens, Durant la Seconde Guerre mondiale, il est réquisitionné, en 1939, par les forces armées françaises, comme hôpital complémentaire, puis il fut occupé par l'Armée allemande.  Le Palace cessa son activité hôtelière en 1959 et fut mis en vente, sous forme d'appartements privés.","architecture":"AGUESSEAU, en 1599, Hélie de Nollent est désigné comme seigneur de la paroisse de Saint-Jean de Trouville. Son fils Robert de Nollent fait bâtir au milieu du XVIIe siècle, un château au sommet d'une colline dominant la vallée du ruisseau de Callanville. Transmis par héritage, le domaine échoit, en 1729, à Henri-François d'Aguesseau, fils aîné du Chancelier de France. A son décès, faute d'héritiers directs, la propriété est divisée puis vendue à maints propriétaires. Au milieu du siècle la demeure est occupée par la famille du ministre Guizot elle est appelée parfois villa Guizot. aujourd'hui propriété de la baronne Léonce de Curières de Castelneau. Ce bel édifice en briques et en pierres, bâti dans le style Louis XIII, comprend un rez-de-chaussée et un étage surmonté d'un toit d'ardoises très élevé et du plus grand effet, aux angles sont quatre tourelles en poivrière. Les deux façades du nord et du sud sont très sobres d'ouvertures, deux ailes de construction plus moderne, formant terrasses, se trouvent aux extrémités. Sous le second Empire, le Prince Murat acquiert le château qu'il transforme en y accolant deux ailes basses en terrasse et en construisant de superbes écuries.  A cette époque. En 1940, le château est occupé par les troupes allemandes qui mettent à mal la propriété. Le château est pillé, le plan d'eau comblé, la terrasse et le jardin détruits. Le château est vendu en 1949 et les propriétaires s'efforcent de lui redonner son lustre d'antan.  Sur les hauteurs à l'Est de Trouville.  La grille d'entrée est gardée d'un élégant pavillon du XIXe siècle en pierres calcaires et briques blanches et rouges.","habitants":"Roches; Alphonse-Nicolas Crépinet.  Marcel Proust, Marguerite Duras,    Henri-François d'Aguesseau\r\n        \"","divers":"trois châteaux dans cet article Aguesseau grav-2, Bonneville-Touques , Fougères grav 3 ,  Montebello grav-5-6                                        Arguesseau GPS : 49° 21\" 50\" Nord, 0° 06' 13\" Est                                                                               Bonneville GPS : 49° 20' 15\" Nord, 0° 07' 03\" Est                                                 Fougères  GPS : 48° 21' 13\" Nord 1° 12' 34\" Ouest\r\nHôtel GPS : 49° 22' 20\" Nord, 0° 05' 02\" Est                         Trouville mairie grav-1","gps":"49° 21\" 50\" Nord, 0° 06' 13\" Est","images":["../image/image_14/14_Trouville_Deauviller_1.jpg","../image/image_14/14_Trouville_Deauviller_2.jpg","../image/image_14/14_Trouville_Deauviller_3.jpg","../image/image_14/14_Trouville_Deauviller_4.jpg","../image/image_14/14_Trouville_Deauviller_5.jpg","../image/image_14/14_Trouville_Deauviller_6.jpg"]},"Consult_chateau_formulaire7190":{"id":"Consult_chateau_formulaire7190","dept":"14","canton":"Mézidon-Canon","commune":"Saint-Ouen-le-Pin","nom":"Val_Richer","type":"Château","periode":"XII-XVI","histoire":"Deux châteaux dans cet article, Val-Richer et Bruyères.                                   VAL-RICHER, labbaye cistercienne du Val-Richer est fondée en 1150 sur des terres données à Philippe dHarcourt, évêque de Bayeux, par divers propriétaires dont Richer de Montreuil. La charte de fondation, dHenri II Roi dAngleterre, est signée de Thomas Becket, chancelier du Roi. Le Val-Richer traverse le Moyen-Age dans la prospérité et le rayonnement avant de connaître les heures sombres de la guerre de 100 ans puis, au XVIe siècle, des Guerres de Religion. La paix revenue, labbaye est négligée par son abbé commendataire et, en 1613, elle se trouve dans un état déplorable. Le XVIIe siècle marque le renouveau du monastère avec larrivée, en 1627, de Dominique Georges, prêtre lorrain chargé par labbé de réformer la communauté. Sa mort, en 1693, sonne le glas de labbaye qui survit péniblement jusquen 1789 où seulement six moines vivent au monastère. Abandonnée en 1790, labbaye est vendue comme bien national en 1797. Léglise abbatiale et le cloître sont démantelés, le logis de labbé, reconstruit au milieu du siècle, est abandonné. En 1836, le ministre de linstruction publique de Louis-Philippe, François Guizot, qui cherche une résidence dans la circonscription de Lisieux, où il est élu député, achète le domaine. La vie familiale continue avec sa fille Henriette et son gendre Conrad de Witt, puis sa petite fille Marguerite qui épouse Paul Schlumberger, un industriel alsacien.","architecture":"BRUYERES à Cambremer à deux K.M au nord-Est a été construit du XIIIe au XIXe siècle, le château Les Bruyères appartenait au début du XXe siècle à la Famille Petit. Cest à cette époque que lon mentionne les séjours de Marcel Proust. De 1904 à 1914, Marcel Proust vint en cure à Cabourg, généralement durant lété d'août à septembre. Séjournant le plus souvent au grand hôtel de Cabourg, il aimait aussi se retirer dans les terres pour bénéficier de lair de la campagne plus propice à son sommeil. Cest ainsi quil séjourna au château les Bruyères. Madame et Monsieur Chady-Bollack, parfumeurs parisiens acquirent lensemble vers 1925. Ils créèrent limposante allée bordée de hêtres et de châtaigniers qui mène aux marches dhonneur du château. A cette époque, le couple Émile Langlois et Marcelle Mansuis y séjourna. Lui célèbre écrivain parisien de lentre-deux-guerres ; elle, secrétaire de Georges Clemenceau de 1920 à 1929, année de la mort du « Tigre ». Elle recueillit nombre de souvenirs et de confidences de lhomme dÉtat, et laissa après sa mort un manuscrit inédit qui donna un éclairage particulier sur la dernière partie de la vie du « Tigre » . Vendu en 1992, date à laquelle le château fut transformé pour accueillir des hôtes, le château nécessita de très importants travaux de rénovation, tout en respectant larchitecture existante,  seuls les parements denduit à la chaux disparurent pour laisser apparaître lappareillage de briques de la façade, la toiture fut refaite à lidentique, ainsi que les façades du manoir, sont inscrits aux M.H. depuis le 9/09/1933.","habitants":"Val-Philippe dHarcourt,                                                                                                  Bruyères Monsieur Chady-Bollack\r\n        \"","divers":"Deux châteaux  dont Val-Richer grav 2-3-4 et Bruyéres grav-1                                GPS : 49° 08' 42\" Nord, 0° 03' 42\" Est","gps":"49° 08' 42\" Nord, 0° 03' 42\" Est","images":["../image/image_14/14_Val_Richer_1.jpg","../image/image_14/14_Val_Richer_2.jpg","../image/image_14/14_Val_Richer_3.jpg","../image/image_14/14_Val_Richer_4.jpg"]},"Consult_chateau_formulaire0dc5":{"id":"Consult_chateau_formulaire0dc5","dept":"14","canton":"Bayeux","commune":"Vaucelles","nom":"Vaucelles","type":"Château","periode":"XIV_XVII","histoire":"VAUCELLES, aux le Vaillant seigneurs du lieu succédèrent en 1739, les Morin de la Rivière et à nos jours la famille Seré.","architecture":"VAUCELLES, son existence est attestée au XIVe siècle. Les puissants contreforts appartiennent au bâtiment dorigine.  Le château était autrefois entièrement ceinturé de douves en eaux vives qui permettaient disoler la demeure fortifiée.  La poterne date de la première moitié du XVIIe siècle. Élégante demeure dont la base souvre par un passage charretier, voûté en anse de panier. La corniche de létage est constituée dune suite de modillons. Elle souligne la naissance de la toiture recouverte dardoises. Le corps du logis sétend vers le sud. Il comporte un étage noble surmonté dun niveau réservé autrefois au personnel de service.\r\nÉléments protégés MH : le pavillon d'entrée et les annexes latérales : inscription par arrêté du 15 janvier 1929.  du Château de Vaucelles date du XIVe siècle. Les éléments protégés sont le Pavillon d'entrée et les annexes latérales inscrits aux M.H. depuis le 15/01/1929.","habitants":"les Morin de la Rivière\r\n        \"","divers":"Château de Vaucelles GPS : 49° 17' 08\" Nord, 0° 44' 09\" Ouest","gps":"49° 17' 08\" Nord, 0° 44' 09\" Ouest","images":["../image/image_14/14_Vaucelles_1.jpg","../image/image_14/14_Vaucelles_2.jpg","../image/image_14/14_Vaucelles_3.jpg"]},"Consult_chateau_formulaire2624":{"id":"Consult_chateau_formulaire2624","dept":"14","canton":"Trévières","commune":"Vierville sur Mer","nom":"Vaumicel","type":"Château","periode":"XVI","histoire":"VAUMICEL, le manoir de Vaumicel anciennement Valmisset, puis Vaumisset, est une ancienne demeure fortifiée, qui se dresse sur la commune de Vierville-sur-Mer. Le manoir a été bâti au XVIe siècle,  vers 1551, par Guillaume Canivet, partisan d'Henri IV, anobli en 1543. En 1589, lors des guerres de Religion, le manoir est incendié. Entre 1606 et 1808. La famille de Canivet conservera le manoir jusqu'en 1755. À cette date, il est vendu à Jean-Nicolas de Pleurre, conseiller honoraire à la grande chambre du parlement de Paris, puis de nouveau cédé par alliance aux Marguerie, descendant des Canivet, en 1820,  Marie-Caroline de Marguerie épouse du comte de Hautefeuille, se défait du domaine au profit  d'Antoine -Pierre Dragonde Gomiécourt, passe en 1859  aux Serin de Lepesse et en 1879 aux Solange, et en 1903, quand le vicomte François de Bellaigue de Bughas en fait l'acquisition. Ce dernier sera tué sur le front le 13 octobre 1915.  Aujourd'hui  à Valérie de Bellaigue.","architecture":"VAUMICEL, le manoir construit en pierres calcaires et couvert d'ardoises dans le style Renaissance se présente sous la forme d'une enceinte carrée flanquée à ses quatre angles par une tour. Deux rondes coiffées en poivrières au sud, qui défendaient l'entrée principale ainsi que celle donnant sur la campagne, celle côté ouest faisant office de tour de guet est accolée d'une tourelle d'escalier avec mâchicoulis permettant d'y accéder, et d'un pigeonnier dans sa partie supérieure, et deux tourelles en encorbellement au nord. Une des tourelles arbore des fenêtres avec des pilastres et des chapiteaux ioniques, dont une avec un décor de coquille, et une autre décorée d'animaux fantastiques. Du portail double, avec porte piétonne et porte charretière, il n'en subsiste que des traces. La porte piétonne est de nos jours murée, et la porte charretière a disparu. On en conserve le souvenir par d'anciennes gravures. Le logis est ceinturé par les communs dont une grange servant à abriter les charrettes. À l'écart, une tour indépendante abrite un ancien four à pain.","habitants":"Famille de Canivet   M. Lefrançois   M. Eugène Hausermann\r\n        \"","divers":"Vaumicel grav 3-4-6                   \r\ngps 49° 22' 06\" N, 0° 54' 34\" Oueszt","gps":"","images":["../image/image_14/14_Vaumicel_1.jpg","../image/image_14/14_Vaumicel_2.jpg","../image/image_14/14_Vaumicel_3.jpg","../image/image_14/14_Vaumicel_4.jpg"]},"Consult_chateau_formulairedf11":{"id":"Consult_chateau_formulairedf11","dept":"14","canton":"Bayeux","commune":"Vaux sur Seulle","nom":"Vaussieux_Vaux","type":"Château","periode":"XV-XVI-XVIII","histoire":"Trois châteaux dans cet article St-Clair, Vaussieux et Vaux.                                   St-CLAIR, du XVe siècle de Gervais de Larchamp  chanoine du chapitre de Bayeux,  en 1438 passe aux Grimouville leur descendance le conserveront jusqu'à la Révolution, acquis  en 1970 par ses propriétaires actuels  les Alexandre. St-Clair à conserve ses éléments fortifiés, occupe une cour  carrée entourée de bâtiments et haut murs, les portes subsistent des  vestiges d'un escalier à vis qui permettait d'accéder à un chemin de ronde dont-il reste une plate forme crénelée. Le bâtiment se compose de deux corps disposées en équerre, le toit reposant sur deux pignons et chevauché par trois lucarnes ornés de volutes, dans le prolongement de cette façade, à droite un bâtiment récent  à permis d'agrandir l'habitation, un corps en retour possède sur l'une de ses faces latérales une lucarne.                                                                                                                        VAUX, ceinturé de douves, occupe lemplacement dune ancienne place forte construite en 1345 avec lautorisation du Roi, par Jean de Creully dit de Villers. Propriété de la famille dÉcajeul aux XVe et XVIe siècle, le domaine passe aux le Bedey, sieurs de la Fosse et vicomtes de Bayeux. Il fut reconstruit par Jacques Le Bedey ou son fils Olivier. Le château, précédé dune cour entourée de communs, présente une toiture à la Mansart et délégantes lucarnes.","architecture":"VAUSSIEUX, date de la fin du XVIIIe siècle. Un premier château, édifié, en 1345, pour Jean de Creully, dit de Villers, Il fut reconstruit une première fois dans le style Henri IV. Il subsiste de cette première reconstruction une partie des communs.  En 1413 Germaine de Larchamps acquit de Catherine de la Luzerne la seigneurie, qui passa par mariage aux Grimonville. Les Thiout en firent l'acquisition en 1605. Mme de Thiout la légua à son neveu d'Hérécy. Reconstruit une seconde fois, en 1771, pour le marquis d'Héricy, ce vaste château devint, en septembre 1778, le quartier général du camp militaire de Vaussieux. Le commandement supérieur du camp fut confié, par Louis XVI, au général Victor-François de Broglie, vétéran de la guerre de Sept Ans, ami du marquis d'Héricy. Le château se présente sous la forme d'un long bâtiment avec un pavillon central, et de deux ailes en avant-corps. Le pavillon est orné d'un balcon surmonté d'un fronton orné de sculptures de style Louis XVI et arborant des armes parlantes où figurent 3 hérissons. Au XIXe siècle passa aux Fournès, puis aux Charmel, vendu pendant la guerre occupé par une colonie de Vacances, à été récemment acquis par M.Huntington-Wilson. Les écuries, incendiées en 1866, ont été reconstruite, dans un style néo-normand. Éléments protégés MH : les façades et les toitures du château, inscription par arrêté du 16 juillet 1970.","habitants":"St-Clair; les Alexandre                                                                            Vaux; famille dÉcajeul et Jacques Le Bedey .                                     Vaussieux:  marquis d'Héricy\r\n        \r\n        \"","divers":"Trois châteaux dans cet article St-Clair grav-1-2-3-4, Vaussieux grav 5-6  \r\ngps 49° 16' 06\" N, 0° 37' 26\" Ouest et Vaux.    Vaux GPS : 49° 16' 6,24\" Nord, 0° 37' 26,04\" Ouest","gps":"49° 16' 6,24\" Nord, 0° 37' 26,04\" Ouest","images":["../image/image_14/14_Vaussieux_Vaux_St_Clair_1.jpg","../image/image_14/14_Vaussieux_Vaux_St_Clair_2.jpg","../image/image_14/14_Vaussieux_Vaux_St_Clair_3.jpg","../image/image_14/14_Vaussieux_Vaux_St_Clair_4.jpg","../image/image_14/14_Vaussieux_Vaux_St_Clair_5.jpg","../image/image_14/14_Vaussieux_Vaux_St_Clair_6.jpg"]},"Consult_chateau_formulaireecab":{"id":"Consult_chateau_formulaireecab","dept":"14","canton":"Courseulles-sur-Mer","commune":"Graye sur Mer","nom":"Vaux_Graye","type":"Château","periode":"XIX","histoire":"VAUX, du château du XVIIe siècle de plan régulier en U, subsistent une des deux tours encadrant l'entrée, couverte d'un dôme ovale, charpente d'origine, rez-de-chaussée voûté en berceau et le départ de l'aile Est contenant un escalier en vis.","architecture":"VAUX, château du XIXe siècle, logis et communs présentant chacun un plan régulier en U, logis, corps principal à deux étage en surcroît, tours dans les angles couvertes d'un toit conique, pavillon central couvert d'un dôme carré amorti par un campanile à toit à l'impériale en zinc, la chapelle funéraire, aménagée dans une ancienne carrière intégrée au parc paysager, voûte en berceau plein-cintre. Parc paysager avec une chapelle funéraire dans un jardin considérablement agrandi. Ces travaux auraient été réalisés pour mademoiselle Ratcliffe, d'origine anglaise. Le domaine est acquis par le département pour installer un préventorium antituberculeux et subit de nombreuses adjonctions de bâtiments.","habitants":"seigneur local\r\n        \"","divers":"Château de Vaux à Graye","gps":"","images":["../image/image_14/14_Vaux_Graye_1.jpg","../image/image_14/14_Vaux_Graye_2.jpg"]},"Consult_chateau_formulaire762c":{"id":"Consult_chateau_formulaire762c","dept":"14","canton":"Livarot","commune":"Vendeuvre","nom":"Vendeuvre_14","type":"Château","periode":"XVI","histoire":"VENDEUVRE, en 1585 Julien de Paulmier devient seigneur de Vendeuvre, le fief échoit  en 1675 aux Beaurepaire-Lonvagny, passe par alliance d'Antoinette  de Beaurepaire-Louvagny avec Alexandre le Forestier d'Osseville et en 1750  l'architecte Jacques-François Blondel construit le château actuel en 1830 aménagement du parc à L'anglaise par Augustin de Vendeuvre.                                                                                                         A cinq K.M au sud à   Bernières-d'Ailly  AILLY,  Le château appartient aux familles d'Ailly, de Courseulles, Vauquelin et, par mariage, passa aux Vigneral qui le possèdent toujours.  aujourd'hui gîtes d'hôtes de  Mr Gérard Trémoletle château, a conservé deux tours du  XVIe siècle coiffés d'un toit en dôme encadrant un corps de logis refait au XVIIIe siècle avec deux oeils-de-boeufs s'ouvrant dans la toiture,  château de plan allongé symétrique, composé d'un étage carré et étage de comble, le gros-oeuvre en calcaire de pierre de taille et moellon et enduit, élévation ordonnancée, surmontée de toit à longs pans couvert de tuile plate. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 21 octobre 1970.","architecture":"VENDEUVRE, château du comte de Vendeuvre se démarque des autres châteaux, par ses jardins sur le thème de l'eau, inspiré des jardins facétieux du XVIIIe siècle. Un des jardins remarquables du Calvados avec ses Jardins à la Française et à l'Anglaise, jardin d'utilité et les surprenants Jardins d'eaux \"surprises\" représentent un véritable écrin du château de Vendeuvre,  du XVIIIe siècle, sa dernière création est exotique.  Les jardins sont ponctués d'éléments architecturaux insolites comme la grotte aux coquillages, temple, kiosque et cascade. Avec les enfants, amusez-vous à vous perdre dans le labyrinthe des champs et rechercher le lapin perdu. Le château de Vendeuvre et du Musée du Mobilier miniature se visitent, est ouvert au public depuis 1983 et abrite le musée du mobilier miniature, première collection au monde de mobilier miniature. Lenfilade de salons est un bel exemple de l'art de vivre au XVIIIe siècle. Il existe d'autres châteaux à découvrir sur la commune : le château de Grisy (XVIe siècle) voir article, inscrit aux M.H.","habitants":"Vendoeuvre; Alexandre le Forestier d'Osseville Familles d'Ailly,\r\n        \"","divers":"Château de  Vendeuvre  grav-1-2-3                                                  Ally grav 4 GPS : 48° 56' 33,21\" Nord, 0° 04' 57,13\" Ouest","gps":"48° 56' 33,21\" Nord, 0° 04' 57,13\" Ouest","images":["../image/image_14/14_Vendeuvre_14_1.jpg","../image/image_14/14_Vendeuvre_14_2.jpg","../image/image_14/14_Vendeuvre_14_3.jpg","../image/image_14/14_Vendeuvre_14_4.jpg"]},"Consult_chateau_formulaire474d":{"id":"Consult_chateau_formulaire474d","dept":"14","canton":"Courseulles-sur-Mer","commune":"Ver-sur-Mer","nom":"Ver_sur_Mer","type":"Château","periode":"XVII-XVIII-XIX","histoire":"trois châteaux à Ver sur Mer, dont celui de  Ver sur Mer, La Barre,  Mésanges .                                                                                                         La BARRE, château construit en 1882, date sur la façade nord du logis, à l'emplacement d'un autre figurant sur le cadastre de 1809 ; jardin paysager restauré et transformé depuis la révision cadastrale de 1983 : création d'un grand bassin. L'édifice possède quatre façades ordonnancées, composé d'un sous-sol, d'un rez-de-chaussée surélevé, d'un étage carré et étage de comble. Le gros-oeuvre : calcaire ; moellon et enduit. Élévation surmontée d'un toit à longs pans et croupe couverts d'ardoise, un logement de domestiques et un bassin. Ferme du château de la BARRE  avec corps du cellier construit en 1635, date sur la lucarne ; colombier datant peut-être de la même époque ; portail édifié en 1725, date sur la porte piétonne, autres bâtiments reconstruits dans le dernier quart du XIXe siècle, colombier restauré et corps de cellier remanié au même moment, afin d'en faire une ferme spécialisée dans l'élevage du cheval, arc du passage cocher du portail détruit au XXe siècle.","architecture":"MESANGES, château édifié au XVIIIe siècle; ancien logement de gardien reconstruit au XIXe siècle; à la même époque ou au début du XXe siècle, transformation du jardin régulier en jardin paysager avec conservation des anciennes fabriques. Au début du XXe siècle, adjonction de balustrades et de balconnets aux fenêtres du logis provenant, selon une tradition orale, de l'hôtel d'Harcourt à Paris. Corps des écuries et remise en moellon; orangerie en pierre de taille couverte en quart de cône ; pavillons de jardin, et de resserre primitivement couverts en pavillon.                                                                    VER sur MER, château et ferme édifiés dans la deuxième moitié du XVIIe siècle. Au XIXe siècle l'aile du logement du fermier est remaniée et réduite de moitié en longueur; A la fin du XIXe ou au début XXe siècle, construction du corps de la remise dans la cour des communs; portail principal démoli par la chute d'un arbre en 1987 et reconstruit peu après. Logis en moellon enduit couvert d'ardoise, façade principale ordonnancée avec alternance de grandes lucarnes et de lucarnes à ouverture en oculus ; corps de la remise en brique.","habitants":"Responsables locaux\r\n        \"","divers":"Quatre châteaux à Ver sur Mer, La Barre grav-4, Mésanges et Ver sur Mer grav 1-2-3                                                             La Barre ; GPS : 49° 19' 52\" Nord, 0° 31' 46\" Ouest","gps":"49° 19' 52\" Nord, 0° 31' 46\" Ouest","images":["../image/image_14/14_Ver_sur_Mer_1.jpg","../image/image_14/14_Ver_sur_Mer_2.jpg","../image/image_14/14_Ver_sur_Mer_3.jpg","../image/image_14/14_Ver_sur_Mer_4.jpg","../image/image_14/14_Ver_sur_Mer_5.jpg","../image/image_14/14_Ver_sur_Mer_6.jpg"]},"Consult_chateau_formulairef0c7":{"id":"Consult_chateau_formulairef0c7","dept":"14","canton":"Falaise","commune":"Versainville","nom":"Versainville","type":"château","periode":"XVIII-XIX","histoire":"VERSAINVILLE, il date du XVIIIe-XIXe siècle. La construction  a été décidée par François-Joseph de Marguerit au XVIIIe siècle. La présence de sa famille en Normandie remonte à limplantation locale, au début du XVIe siècle, dun ancien compagnon dexpédition de Christophe Colomb. Les premiers Marguerit construisent à Versainville un château, érigé en seigneurie. Parmi les ascendants de François-Joseph figurent plusieurs conseillers au Parlement de Rouen, et lui-même en 1711, est président en la Cour des comptes, aides et finances de Normandie.  Versainville passa  en 1859, à la mort du dernier Marguerit de Versainville  à sa soeur, la comtesse Odoard du Hazey, le petit-fils de cette dernière François-Gaston releva le titre de Marquis de Versainville, fait élever  l'aile sud en 1912 et légua le domaine à sa fille, Gildippe épouse d'Antoine de la Rochefoucauld duc de la Rocheguyon. Et acquis  par PSA Peugeot-Citroën, en 2002.","architecture":"VERSAINVILLE, est constitué d'un corps de logis à 9 travées et d'un pavillon d'angle. Le château de Versainville a été complété, en 1912, d'une aile à l'Ouest. L'édifice est percé en son centre d'un vestibule que clôt  un portique  d'ordre toscan. Le corps du bâtiment principal se prolonge à gauche par une aile basse  menant à un pavillon carré, cette partie de l'édifice  fut élevée vers 1715, l'aile symétrique , sur la droite ne fut construite sans le pavillon terminal, en 1912, complétant ainsi le rythme admirable  de cette longue façade.","habitants":"François-Joseph de Marguerit \r\n        \"","divers":"Château de   Versainville    GPS : 48° 54' 50\" Nord, 0° 10' 49\" Ouest","gps":"48° 54' 50\" Nord, 0° 10' 49\" Ouest","images":["../image/image_14/14_Versainville_1.jpg"]},"Consult_chateau_formulaire7658":{"id":"Consult_chateau_formulaire7658","dept":"14","canton":"Livarot","commune":"Orbec","nom":"Vespière","type":"Vespière","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article; Vespière, Vieux Manoir.             VESPIERE, date de 1823, pour Pierre du Merle, fils de Claude, seigneur de La Vespière. Le château domine le parc et létang d'où jaillit la source résurgence du ruisseau de La Vespière. Louise et Esther d'Orbec, héritières de la baronnie d'Orbec, épouses respectives au début du XVIIe siècle de Jean du Merle seigneur du Blanc-Buisson et de Jean de Bouquetot.                                                                              VIEUX-MANOIR, l'édifice est une maison à pans de bois du XVIe siècle. Il est bâti en 1568 selon une inscription présente dans un cartouche à destination d'un tanneur Le Portier.\r\nLa maison est sauvée par la société d'études historiques d'Orbec et donnée à la mairie. La restauration accomplie par les services de lÉtat, la région, le département et la commune permet d'en rétablir l'aspect originel.\r\nL'édifice est classé au titre des M.H.  depuis le 21 février 1941. Est converti en musée depuis 1980, qui est consacré aux arts et traditions populaires et à l'histoire locale. Depuis 1873, le musée était dans l'hôtel de Ville.","architecture":"VESPIERE, un long procès de succession entre ces deux branches se conclura par le transfert du titre de baron dOrbec au roi de France. Le ruisseau traverse Orbec, le long des rues des Osiers, des Religieuses et des Moulins, alimentait des tanneries, teintureries et blanchisseries avant de rejoindre lOrbiquet au Moulin à tan du Pont-de-Pierre. Son architecture est simple et agréable aux regards. Le château de La Vespière se pare de murs de briques cantonnées entre de larges pilastres de pierre. Lentrée principale est marquée dun fronton triangulaire avec oculus, au niveau de laxe de la façade. Son parc, avec son colombier, son ancienne grange du XVe siècle et les chevaux présents aux alentours attirent indéniablement les visiteurs. C'est un gîte d'hôtes agréable où vous pourrez réserver une salle pour fêter vos évènements privés et festifs ou passer un week-end ou quelques jours de vacances.                                                                                        VIEUX-MANOIR, L'édifice est bâti en silex, en pierre de la Vespière et à pans de bois.  Les façades sont ornées d'un entre-colombage de tuileaux, silex et triangles de pierre et exposent des personnages sculptés.  Il possède deux pièces par niveau selon un plan répandu pour les manoirs du pays d'Auge séparées par un massif de maçonnerie abritant des cheminées.","habitants":"Louise et Esther d'Orbec,\r\n        \r\n        \"","divers":"Trois châteaux dans cet article; Vespiere grav-1-2, Vieux Manoir grav-3. GPS : 49° 01' 20\" Nord, 0° 24' 27\" Est","gps":"49° 01' 20\" Nord, 0° 24' 27\" Est","images":["../image/image_14/14_Vespiere_1.jpg","../image/image_14/14_Vespiere_2.jpg","../image/image_14/14_Vespiere_3.jpg"]},"Consult_chateau_formulaireecad":{"id":"Consult_chateau_formulaireecad","dept":"14","canton":"Mézidon-Canon","commune":"Victot-Pontfol","nom":"Victot","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Victot et Hotot en auge.                    VICTOT,  en 1160, le fief de Victot est entre les mains dHugues de Victot, demeure dans la même famille jusquau XVe siècle où Jeanne Gosse, dernière de la lignée, épouse Guillaume Boutin  complètement reconstruit en 1570-1574. Son constructeur, Philippe Boutin, fait édifier deux châteaux sur lesplanade de la vieille forteresse, sans doute pour y loger toute sa famille. En 1798, le château est vendu à Pierre Aumont, issu dune famille réputée pour ses compétences dans lélevage du cheval. Fournisseur général des chevaux de la Grande Armée, sous le premier Empire, il fait bâtir les écuries qui encadrent la cour daccès, au début du XIXe siècle  Son troisième fils, Alexandre, est un passionné délevage qui fait la renommée du haras de Victot tout au long du XIXe siècle. Ses descendants maintiennent la réputation du célèbre élevage.  Depuis Pierre Aumont, le château de Victot est la propriété de la même famille. Le haras, toujours réputé pour la qualité de ses chevaux, est loué à un éleveur, propriété de Mme Aumont.","architecture":"VICTOT,  en cette période de guerre, la demeure conserve une fonction défensive avec douves, pont-levis et meurtrières. Mais cest également une agréable demeure de la Renaissance avec ses grandes fenêtres à meneaux et la richesse colorée de son décor, damiers de briques roses et de pierres calcaires. Les hautes toitures sont constituées de tuiles vernissées aux tons jaunes, bruns et verts avec des épis de faîtage en faïence. Deux ailes en équerre ferment le côté nord et ouest dune cour carrée. On y accède en franchissant un pont-levis qui aboutit à la porte dentrée de laile nord. Cest sans doute la partie la plus ancienne, en damiers de briques et de pierres sur deux niveaux, elle est encadrée de deux tours l'une ronde, l'autre polygonale formant pavillons. Laile Est est construite en bandes alternées de briques et de pierres, tandis que des communs sétendent au nord, sur trois côtés dune cour carrée. Des murs denceinte longent probablement les douves qui se prolongent au sud par des plans deau. Au XVIIe siècle, les deux châteaux sont réunis par un bâtiment à colombages, aujourdhui exempté dardoises.  En 1943, le rapport dinspection pour le classement au titre des sites décrit le château et ses abords, le château en brique et chaînage de pierres, est recouvert de tuiles émaillées, c'est un des plus purs joyaux du Pays dAuge. Planté au milieu dune douve qui sinsinue dans tout le domaine, et dans laquelle il se mire, font un charmant effet.                                                    A cinq k.m à l'ouest le château de la haute justice à HOTOT en AUGE  la construction du château de la Haute-Justice date du XVe siècle. Une grande partie du château fut détruit en 1944.","habitants":"Famille Philippe Boutin\r\n        \"","divers":"Deux châteaux dans cet article; Victot grav-1 et Hotot en auge grav-2.                                                                                               Haute justice  GPS : 49° 10' 2,07\" Nord, 0° 3' 14,36\" Ouest","gps":"49° 10' 2,07\" Nord, 0° 3' 14,36\" Ouest","images":["../image/image_14/14_Victot_1.jpg","../image/image_14/14_Victot_2.jpg"]},"Consult_chateau_formulaire1497":{"id":"Consult_chateau_formulaire1497","dept":"14","canton":"Bayeux","commune":"Vienne en Bessin","nom":"Vienne_en_Bessin","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Vienne en Bessin, Capelles, Mesnils.                          VIENNE en BESSIN,  en 1860, démolition du nouveau logis par les héritiers de Mme de Crux, matériaux achetés par le couvent des dames de la Charité à Saint-Vigor-le-Grand, et utilisés pour édifier un nouveau bâtiment dans leur parc; dans les années 1940-1950, démolition du bâtiment au sud de la cour, puis construction de nouveaux bâtiments d'exploitation à l'ouest des anciens  bâtiments. Le château date des XVe et du XVIIe siècles, La ferme-manoir est datée du XVe siècle. La seigneurie appartenait aux seigneurs de Creully. Un descendant de la famille, Pierre d'Harcourt cède le complexe à la famille Sillans en 1643.                                                                                                               CAPELLES, au XVIIe siècle, grande période de construction sur toute la commune qui se poursuit au XVIIIe siècle. Le logis de la ferme du château des Capelles fut construit à la fin du XVIIe siècle ou au début du XVIIIe siècle. Les autres bâtiments de la ferme et le logis  furent élevés au XVIIIe siècle, et la laiterie ajoutée au XIXe siècle. Vers 1932 remontage de l'orangerie datant de la première moitié du XIXe siècle, provenant du château des Mesnils dans la même commune ; vers 1960, construction d'un corps de remise à automobiles et de logements.                                                                                                     MESNILS, château construit à l'emplacement d'un manoir étudié par l'archéologue A. de Caumont, construit dans la première moitié du XVIIe siècle pour la famille de la Caillerie, armes au-dessus de la porte piétonne. En 1780, reconstruction du logis pour le grand-père de A. de Caumont, en 1802, arbres de l'avenue abattus.","architecture":"VIENNE en BESSIN,  du XVe ou début XVIe siècle, édification du logis, du corps de logement à l'est de la cour, de la grange à l'ouest, d'un corps au sud et de la porte piétonne le joignant ; milieu XVIIe siècle, première campagne : logis entièrement remanié et agrandi d'une travée au delà de la tour d'escalier ouest, elle-même rhabillée extérieurement, adjonction d'un corps de logement au bâtiment Est,  milieu XVIIe siècle, deuxième campagne : nouvelle prolongation du logis vers l'ouest par la construction d'un corps à trois travées et d'un colombier porche ; 1759 aménagement de la porte piétonne à l'ouest du colombier (porte la date), courant XVIIIe siècle, édification d'un nouveau logis à l'écart des anciens bâtiments qui, transformés en ferme, prennent le nom de vieux château.  Logis : moellon partiellement enduit, voûte en berceau au rez-de-chaussée de la partie occidentale, dans les anciennes écuries, voûte d'arêtes au sommet de la cage de l'escalier principal, élévation à travées dans la partie orientale de la façade sur cour et sur la façade postérieure, dans la partie occidentale sur cour ; colombier en moellon, porche en rez-de-chaussée voûté en berceau, façade sur cour , toit en pavillon.                                                                                                                            MESNILS, dans la première moitié du XIXe siècle construction d'une orangerie. Vers 1840 démolition des bâtiments du XVIIe siècle à l'exception du puits. Au milieu XIXe siècle agrandissement du logis par deux avant-corps latéraux et construction du porche de la façade nord, édification de nouveaux communs répartis en trois corps de bâtiment, en 1932, logis ruiné par un incendie et ensemble abandonné depuis. Orangerie transportée au château des Capelles sis dans la même commune.","habitants":"famille Sillans\r\n        \"","divers":"Trois châteaux dont Vienne en Bessin grav -1-2-3, Capelle  Grav-4 et Mesnils.","gps":"","images":["../image/image_14/14_Vienne_en_Bessin_1.jpg","../image/image_14/14_Vienne_en_Bessin_2.jpg","../image/image_14/14_Vienne_en_Bessin_3.jpg","../image/image_14/14_Vienne_en_Bessin_4.jpg"]},"Consult_chateau_formulaire8e37":{"id":"Consult_chateau_formulaire8e37","dept":"14","canton":"Pont-l","commune":"Villers sur mer","nom":"Villers_Bocage","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article, Villers et Bertrangles.                 VILLERS, sous Louis XV, le propriétaire est Jean Pâris de Monmartel, financier écouté du roi et parrain de la marquise de Pompadour. Son fils, connu sous le nom de marquis de Brunoy, se rendit célèbre par ses excentricités fastueuses. Sa famille le fit interdire pour avoir dilapidé en quelques années la somme fabuleuse pour l'époque, de quarante millions or. A la mort du marquis, la propriété revient à un cousin, Antoine de Pâris d'Illins, dont le fils Raoul prendra une place importante à l'essor de la station balnéaire; il fut le maire de Villers pendant près de 20 ans. Éléments protégés MH : les façades et les toitures du château, les boiseries de la bibliothèque, et le jardin potager : inscription par arrêté du 28 août 2003.","architecture":"VILLERS, bocage construction de brique et pierre qui conserve la silhouette qui était la sienne au XVIIIe siècle. L'intérieur conserve un décor Louis XVI. Vers 1770, restructuration architecturale avec une nouvelle distribution des pièces.  Le château se compose de deux parties accolées: l'une, dans le style Louis XIII, avec deux pavillons et un corps central étroit, l'autre du XVIIIe siècle, avec un avant-corps en pierre blanche couronné d'un fronton triangulaire. Les intérieurs conservent d'intéressantes collections. Au début de juillet 1940, les Allemands réquisitionnent le château. A partir du 30 juin 1944, il ny a plus personne à Villers Bocage à l'exception du château ou Madame de Clermont Tonnerre organise les secours, on enterre les morts dans le parc, une salle de soins et de chirurgie est aménagée dans les sous sols du château, on installe, dans trois chambres au deuxième étage de la demeure une maternité. Elle y restera jusquen 1948 à 1957.                                                                                                                         BERTRANGLES, le château XVIIe et XVIIIe est loué uniquement à un groupe de personnes désirant y séjourner ensemble : famille, amis pour des vacances ou une célébration, collègues pour un séminaire, château  entièrement restauré en 2015-2016 proposant un étage entier dédié au bien-être. L'ensemble du château sera à disposition des invités, avec la possibilité d'héberger jusqu'à 40 personnes avec des prestations de très haut niveau.","habitants":"Villers, Madame de Clermont-Tonnerre \r\n        \"","divers":"Deux châteaux dans cet article, Villers grav 2-3 et Bertrangles grav 1.                                                                                                           Villers  gps 49° 18' 22\" N, 0° 00' 57\" Est","gps":"","images":["../image/image_14/14_Villers_Bocage_1.jpg","../image/image_14/14_Villers_Bocage_2.jpg","../image/image_14/14_Villers_Bocage_3.jpg"]},"Consult_chateau_formulaireedb3":{"id":"Consult_chateau_formulaireedb3","dept":"14","canton":"Falaise","commune":"Villers-Canivet","nom":"Villers_Canivet_Tour","type":"Château","periode":"XVI-XVIII","histoire":"Trois édifice à Villers-Canivet, Torp, Turgot et la tour de St Pierre.                                                                                                                                TORP, la famille de Torp est citée au XIe siècle comme bienfaiteurs de l'abbaye de Saint-Evroult. Au XVIe siècle, la ferme seigneuriale appartenait aux Morel, les seuls vestiges de cette époque sont le portail de la ferme et la tour d'escalier du château actuel; château et ferme construits deuxième moitié du XVIIe siècle; aile en retour d'équerre, aménagements intérieurs du château, communs et portail au XIXe siècle. Un document de 1978, nous apprend que le château constitue un remarquable ensemble, caractéristique des temps où la vie nobiliaire restait étroitement liée à la vie agricole. Le château et la ferme constituent deux propriétés distinctes aujourd'hui. Les plus anciens éléments architecturaux datent du XVIe siècle époque où la terre appartenait à la famille Morel, que nous retrouvons à Aubigny et à Assy. La chapelle de Torp était l'ancienne église paroissiale de la commune, rattachée depuis le XIXe siècle à la commune de Villers-Canivet. Elle était placée sous l'invocation de la Vierge, selon l'historien local Galeron. En 1828, la paroisse était déjà réunie à celle de Villers-Canivet. Éléments protégés MH : la chapelle, ainsi que le sol : inscription par arrêté du 17 juin 2003.                                                                                                  A deux K.M.au nord à Bons-Tassily TURGOT, date du XVIIe siècle. Chaque gite a une superficie de 85 m2. Le château Turgot est situé dans la campagne et proche de l'autoroute et les commerces.","architecture":"La TOUR ST PIERRE DE CANIVET, château de la Tour fut construit en 1769 pour le comte Louis-François-Anne de Séran ancêtre du comte Alain de la Moussaye. Madame de Séran en fit très vite l'un des rendez-vous les plus célèbres des écrivains du temps. Les façades, la toiture, la cour d'honneur ainsi que les douves entourant la cour d'honneur, le décor intérieur de la salle à manger, du salon et de la chambre dite de madame de Séran sont inscrits aux M.H. depuis le 13/12/1967. De nos jours. Le plan porte la signature d'un nommé Basché dont on ignore tout, encore qu'à cette époque plusieurs ingénieurs des Ponts et chaussées de ce nom aient fait oeuvre d'architecte dans la région. D'un bel équilibre dans ses façades de pierre blanche qui se détachent à l'orée d'un vaste domaine boisé, le château évoque déjà le style Louis XVI par sa sobriété et son dépouillement. A la fin du XVIIIe siècle, madame de Séran fit du château de la Tour l'un des rendez-vous les plus célèbres des écrivains du temps. Le domaine de la Tour est occupé en majeure partie par  les bois du Roi, achetés au cour du XIXe siècle, ont été réunis aux bois de la Tour proprement dits. Les uns et les autres s'étendent au sud et à l'ouest du château sur 430 ha.","habitants":"famille Morel,   Comte Alain de la Moussaye\r\n        \"","divers":"Trois édifice à Villers-Canivet, Torp Turgot et la tour de St Pierre. GPS : 48° 55' 9,16\" Nord, 0° 14' 35,16\" Ouest                                                Turgot GPS : 48° 57' 36\" Nord, 0° 13' 48\" Ouest","gps":"48° 55' 9,16\" Nord, 0° 14' 35,16\" Ouest","images":["../image/image_14/14_Villers_Canivet_Tour_1.jpg","../image/image_14/14_Villers_Canivet_Tour_2.jpg","../image/image_14/14_Villers_Canivet_Tour_3.jpg","../image/image_14/14_Villers_Canivet_Tour_4.jpg","../image/image_14/14_Villers_Canivet_Tour_5.jpg","../image/image_14/14_Villers_Canivet_Tour_6.jpg"]},"Consult_chateau_formulaire7dae":{"id":"Consult_chateau_formulaire7dae","dept":"14","canton":"Bayeux","commune":"Hurpain","nom":"Villiers_sur_Port","type":"Château","periode":"Seigneur local","histoire":"VILLIERS sur PORT  Château construit pour les Villiers, puissante famille du Bessin du XIIe au XVIe siècle.","architecture":"VILLIERS sur PORT, au XIIe ou début XIIIe siècle, édification de la porte de la cour, du XIIIe siècle, du corps la jouxtant à l'est ; XIVe siècle, du corps ouest ; fin XVe ou début XVIe siècle construction du corps de logis sud, de la tour sur l'angle sud-est, de la tour d'escalier et de la tourelle des latrines, et aménagement d'un étage dans le corps du XIVe siècle, un peu plus tard dans le XVIe siècle ouverture d'une fenêtre à l'étage sur la façade sud du logis, château transformé en ferme dès le XVIIIe siècle ; au début du XIXe siècle, avant le cadastre de 1823, remaniement du bâtiment du XIIIe siècle, comblement d'une grande partie des douves et ouverture de la porte fenêtre au rez de chaussée de la façade sud du logis, adjonction d'un bâtiment en appentis contre la façade nord, reconstruction des bâtiments au nord et à l'est de la cour et des corps entourant la basse-cour; hangar construit récemment. Façade sud du corps de logis, tour d'angle et tourelle des latrines en pierre de taille ; tour d'angle couverte d'un toit conique en pierre, tourelle des latrines d'un toit à demi pavillon en pierre, toits en bâtière sur la tour et la tourelle de l'escalier.  Éléments protégés MH : le château de Villiers-sur-Port : inscription par arrêté du 2 juillet 1927.","habitants":"Famille de Villiers\r\n        \r\n        \"","divers":"Château de Villers sur port.                 GPS : 49° 20' 42\" Nord, 0° 45' 14\" Ouest","gps":"49° 20' 42\" Nord, 0° 45' 14\" Ouest","images":["../image/image_14/14_Villiers_sur_Port_1.jpg","../image/image_14/14_Villiers_sur_Port_2.jpg","../image/image_14/14_Villiers_sur_Port_3.jpg","../image/image_14/14_Villiers_sur_Port_4.jpg"]},"Consult_chateau_formulaire3ed0":{"id":"Consult_chateau_formulaire3ed0","dept":"14","canton":"Toam","commune":"Vimont","nom":"Vimont","type":"Château","periode":"XVIII","histoire":"VIMONT  La famille de Saffrey possédait la seigneurie de Vimont au XIVe siècle, et l'a conservée très longtemps. Le château de Vimont a été construit au XVIIIe siècle de 1750 à 1780. Au XIXe siècle, le château a été possédé successivement, par M. Delaunay et par M. le comte de Saint-Cricq et ensuite il a appartenu a M. Baudot, juge au tribunal de commerce de la Seine,  date du 1750 au 1780. Mr de Mezy, Gouverneur du Canada sous Louis XIV, fils de Saffray, Seigneur de Vimont.","architecture":"VIMONT est inscrit aux M.H. avec ses grilles d'entrée avec leurs piliers, sa salle de billard avec son décor au rez-de-chaussée depuis le 29/12/1978.   Éléments protégés MH :  les grilles d'entrée avec leurs piliers et la salle de billard avec son décor au rez-de-chaussée : inscription par arrêté du 29 décembre 1978.                                                                                                             A deux K.M. à l'Est à a  Argences le château de Saint-Gilles.","habitants":"Famille de Saffrey    le comte de Saint-Cricq \r\n        \"","divers":"Deux Châteaux dans cet article Vimont grav 1à 4  et St-Gilles grav 5 GPS : 49° 08' 04,7\" Nord, 0° 08' 23,5\" Ouest                                                 Vimont GPS : 49° 07' 33,29\" Nord, 0° 12' 31,79\" Ouest","gps":"49° 08' 04,7\" Nord, 0° 08' 23,5\" Ouest","images":["../image/image_14/14_Vimont_1.jpg","../image/image_14/14_Vimont_2.jpg","../image/image_14/14_Vimont_3.jpg","../image/image_14/14_Vimont_4.jpg","../image/image_14/14_Vimont_5.jpg"]},"Consult_chateau_formulaired6cc":{"id":"Consult_chateau_formulaired6cc","dept":"14","canton":"Viré","commune":"Viré","nom":"Viré_Cotin","type":"Forteresse","periode":"XII-XIV","histoire":"Deux châteaux dans cet articles; Viré et Cotin.                                               COTIN  Mentionnée dès le XIe siècle, cette famille de Condé donna un évêque à Évreux et un archevêque à York. Très longtemps propriété des Longaunay, barons de Nonant, la seigneurie fut acquise au XVIIIe siècle par Louis Vincent Canteil, conseiller et secrétaire du Roi. A la fin du XVIIIe siècle, son petit-fils, Xavier de Canteil apporte quelques modifications au bâtiment. Embelli par la famille de Rogrer Sorrière. L'édifice a également appartenu à M. le Prince de Broglies avec la terre qui en dépend, Jusqu'au Second-Empire le château présentait une symétrie parfaite, le corps de logis central était flanqué de deux pavillons latéraux. Les chaînages en refends aux angles sont caractéristiques du style Louis XVI. Très belle façade principale et escalier intérieur, salon de boiseries et jardins en terrasse, propriété de la commune, et par les religieuses dominicaines.                                                                                            VIRE, cest en 1123 que le fils de Guillaume le Conquérant, Henri 1er Beauclerc, Roi dAngleterre et Duc de Normandie, fait construire un donjon carré et une première enceinte sur le promontoire rocheux dominant la Vire. Le duché de Normandie doit alors se prémunir contre les menaces de ses opposants de Bretagne et du Maine. Au milieu du XIIe siècle, Saint-Louis décide de compléter lensemble par une seconde enceinte qui ne sera achevée quau début du XIVe siècle. Sous le règne de Louis XIII, le château et son enceinte sont démantelés sur ordre de Richelieu.","architecture":"VIRE,  comme bien dautres constructions défensives, il pouvait abriter déventuelles rebellions contre le Roi de France et son ministre.  la Tour aux Raines date de la 1ère moitié du XIVe siècle,  faisait partie des remparts de la ville,qui furent construits sur l'ordre du roi de France Saint Louis, en 1250. Les murailles sont détruites, le donjon à demi abattu et la place, nivelée, est aménagée en vaste esplanade. Au XVIIIe siècle, elle est plantée dun quadruple alignement de tilleuls qui la borde de tous côtés. Lesplanade du château est classée parmi les sites le 16 novembre 1918, cest la toute première protection du Calvados. A cette époque, cest un vaste espace réservé aux fêtes et aux marchés. Le 6 juin 1944, vers 20h, la ville est détruite à 95% sous les bombardements stratégiques alliés. Sur lesplanade, les arbres reçoivent de multiples éclats. Lors de la reconstruction de la ville des baraques en bois y sont édifiées pour loger les habitants sans abri. La municipalité décide alors de remplacer la quadruple rangée par un double alignement de jeunes tilleuls qui sinterrompt aux abords du donjon pour mieux le mettre en valeur. Les arbres non dangereux, en limite de la place, sont conservés à titre provisoire ainsi que les hêtres, toile de fond de lantique donjon. Autrefois, il comprenait un rez-de-chaussée à usage de cellier, deux étages où séjournaient le chef de la place et sa famille. Le troisième étage était réservé à la troupe et le quatrième servait de chemin de ronde. Aujourd'hui, il reste une des façades avec ses puissants contreforts plats et ses trois niveaux, le donjon (ruines) : classement par arrêté du 10 février 1913.","habitants":"Cotin,  M. le Prince de Broglies                                               Viré; Henri 1er Beauclerc\r\n        \r\n        \"","divers":"deux château ;Viré,et Cotin grav 3-4 .Tour  grav 1-2  GPS : 48° 50' 12\" Nord, 0° 53' 22\" Ouest","gps":"48° 50' 12\" Nord, 0° 53' 22\" Ouest","images":["../image/image_14/14_Vir%c3%a9_Cotin_1.jpg","../image/image_14/14_Vir%c3%a9_Cotin_2.jpg","../image/image_14/14_Vir%c3%a9_Cotin_3.jpg","../image/image_14/14_Vir%c3%a9_Cotin_4.jpg"]},"Consult_chateau_formulaire4f53":{"id":"Consult_chateau_formulaire4f53","dept":"14","canton":"","commune":"","nom":"Vouilly_14","type":"Château","periode":"XIV-XV-XVIII","histoire":"VOUILLY, le château a un rôle durant la bataille de Normandie de 1944 car est placé dans l'orangerie l'émetteur qui envoie les messages des journalistes alliés couvrant les opérations. Ce rôle sera tenu jusqu'au 18 juillet 1944. Le château a été durant cette période également le siège de conférences de presse tenues par le général Bradley, commandant de la 1ière armée américaine. La salle à manger de l'édifice est attribuée aux correspondants de guerre, une pièce voisine servant à la censure. Certains éléments du château font l'objet d'une inscription comme M.H.  les correspondants de guerre a peu changé. Le fief de Vouilly appartenait au XIVe siècle aux Montfliquet qui construisirent le château en 1450.   Vers 1750 la famille de François de Cussy modernise la veille demeure.                                                                                                                   Les éléments protégés sont l'orangerie, le jardin, le pavillon, l'élévation, la toiture et son décor intérieur.  Est un château qui vous propose ses chambres d'hôtes. Marie-Josée et James Hamel seront très heureux de vous y accueillir, il  est inscrit aux M.H. depuis 1970.                                                                                        A deux K.M. au sud,   CASTILLY, en 1683, la terre est érigée en marquisat et le propriétaire, Philippe de Boran, décide la construction du château près de l'ancienne maison manable.\r\nÉléments protégés MH : les façades et les toitures de l'ensemble des bâtiments, l'assiette du jardin et les douves et les sauts-de-loup, les murs du potager, l'allée d'accès avec les herbages situés de part et d'autre, inscription par arrêté du 23 novembre 2005.","architecture":"VOUILLY, l'orangerie est typique de l'architecture du milieu du XVIIIe siècle, avec une porte présentant une tête féminine, un fronton pourvu des armoiries de la famille de Cussy et une balustrade.\r\nLes pavillons de fantaisie conservent un décor de gypseries.\r\nL'édifice conserve des douves, il est attesté dès le XIe siècle change de mains à plusieurs reprises dont après la guerre de Cent Ans. Il est reconstruit au XVIe siècle mais à nouveau cédé à la famille de Cussy qui procède à de nombreux aménagements dans la seconde moitié du XVIIIe siècle : une orangerie, des pavillons et un jardin à la française sont alors aménagés. Le complexe perd des tours et des éléments de pont-levis au cours du XIXe siècle. Les façades et les toitures de l'orangerie et du pavillon situé au sud de celle-ci, ainsi que son jardin, pavillon de fantaisie situé au nord et son décor intérieur de gypseries. Une plaque commémorative rappelle le rôle du château pendant la seconde guerre mondiale. Une machine à écrire Underwood y est conservée et la salle des correspondants de guerre a peu changé.                                                                                           CASTILLY, date du XVIIe au XVIIIe siècle. Il a été remanié au XIXe siècle.   De cette époque datent l'allée d'accès, le château, la cour d'honneur, les douves, le canal latéral Nord, les bâtiments de la basse-cour. Sous la Restauration, l'architecte Harou-Romain fait agrandir et décorer le château de Castilly. En 1849, le parc français classique est recomposé en parc paysager par Châtelain. Au début du XXe siècle, les parterres sont restructurés à la Française, ainsi qu'une partie du canal latéral. Le château de Castilly est entouré d'un parc à la Française, de 4 hectares et de 1200 mètres de douves, est inscrit partiellement aux M.H. depuis le 23/11/2005.","habitants":"Vouilly; famille de Cussy                                                                        Castilly; Philippe de Boran\r\n        \r\n        \"","divers":"Château de Castilly  GPS : 49° 22' 13\" Nord, 0° 58' 00\" Ouest               Château de Vouilly   GPS : 49° 17' 45\" Nord, 1° 01' 15\" Ouest","gps":"49° 22' 13\" Nord, 0° 58' 00\" Ouest               Château de","images":["../image/image_14/14_Vouilly_14_1.jpg","../image/image_14/14_Vouilly_14_2.jpg","../image/image_14/14_Vouilly_14_3.jpg","../image/image_14/14_Vouilly_14_4.jpg","../image/image_14/14_Vouilly_14_5.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','14 — Calvados'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
