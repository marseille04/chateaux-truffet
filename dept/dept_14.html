struire les deux pavillons pour encadrer le logis du XVIIIe donnant au manoir son aspect actuel. Après avoir été en vente plusieurs fois, le manoir est depuis 1976 la propriété de M et Mme Dufay.","habitants":"Blocqueville; famille dOilliamson Maréchal Davout                               Tellier de Blanchard     \r\n        \"","divers":"Bloquelle grav 1, Morteaux grav-2 Madeleine grav 3, Blanc grav-4","gps":"","images":["../image/image_14/14_Blocqueville_1.jpg","../image/image_14/14_Blocqueville_2.jpg","../image/image_14/14_Blocqueville_3.jpg","../image/image_14/14_Blocqueville_4.jpg"]},"Consult_chateau_formulaire29ff":{"id":"Consult_chateau_formulaire29ff","dept":"14","canton":"Cabourg","commune":"Dives sur Mer_Cabourg","nom":"Bois_Hibou_Cabourg","type":"Château","periode":"XVII","histoire":"Deux château dans cet article, Bois-Hibou et Cabourg.                                             BOIS-HIBOU, la vieille cité de Dives également dénommé la Lieutenance.  Aux origines incertaines, ce bâtiment fut la résidence dArthur Le duc de la Falaise, lieutenant de lAmirauté de Dives. Il est ensuite notamment propriété dun sieur de Bois-Hibou puis, au XIXe siècle, le logement de la gendarmerie                                                                                                              CABOURG  Henri Durand-Morimbau (père d'Henri des Houx), homme daffaires et avocat parisien, décide dans les années 1850 de créer une station balnéaire à proximité du petit village de pêcheurs. Pour ce faire, il fonde une Société thermale. Doté d'un capital de 12 millions de francs par actions au porteur, de 500 francs chacune, l'organisme achète les terrains riverains de la mer constitués de dunes et d'herbages.  En 1861, un grand hôtel est construit en bordure du rivage. Il est détruit puis reconstruit en 1907 par les architectes Virault et Mauclerc. Le casino en bois est remplacé en 1867 par un nouveau bâtiment en pierre plus fonctionnel.","architecture":"BOIS HIBOU, lensemble présente des caractéristiques architecturales qui situent sa construction en belles pierres de taille au XVIIe siècle. Il se présente comme une maison fortifiée, sur cinq niveaux dans sa partie la plus élevée. Chaque niveau est souligné de pierres en ressaut et un escalier saillant repose sur une trompeuse au premier étage. Les façades sont inscrites au titre des Monuments historiques depuis le 18 mars 1927                                                                                                             CABOURG, le grand hôtel de Cabourg : en grande partie, ce bâtiment est inscrit depuis 1993 à l'inventaire supplémentaire des monuments historiques. Marcel Proust y a séjourné et il fut occupé par les Allemands lors de la seconde guerre mondiale.","habitants":"sieur de Bois-Hibout                                                                       Cabourg, Henri Durand-Morimbau\r\n        \"","divers":"Deux château dans cet article, Bois-Hibou grav 1-2  et Cabourg grav 3-4\r\n49° 17' 21\" nord, 0° 06' 55\" ouest","gps":"","images":["../image/image_14/14_Bois_Hibou_Cabourg_1.jpg","../image/image_14/14_Bois_Hibou_Cabourg_2.jpg","../image/image_14/14_Bois_Hibou_Cabourg_3.jpg","../image/image_14/14_Bois_Hibou_Cabourg_4.jpg"]},"Consult_chateau_formulaire2e1c":{"id":"Consult_chateau_formulaire2e1c","dept":"14","canton":"Pont-l","commune":"Bonneville sur_Touques","nom":"Bonneville_Touques","type":"Manoir","periode":"XIX","histoire":"Quatre châteaux dans cet article; Boneville-Touques, Gabriel, Grenier, et  Meautry                                                                                                             GABRIEL, est construit de 1874 à 1883, une commande de Paul Gallimard héritée par son fils Gaston est une somptueuse villa du XIXe siècle. Elle est acquise, en 1983, par Yves Saint Laurent et Pierre Bergé et, décorée par Jacques Grange. La villa de style néogothique avec sa datcha est arborée de plantations variées et d'arbustes à hauts jets en délimitation de la propriété ou d'autres répartis et regroupés sur l'ensemble du site.  Le château Gabriel fut vendu en septembre 2008 à la Russe Irina Povarenkina et la SARL Sjato Gabriel, aujourd'hui à Brad Pit et Angelina Jollie.                                                                               A Touques village voisin  manoir du GRENIER  à Sel pour les façades, la toiture et la grande cheminée du rez de chaussée (1969) Construit au milieu du XVIIe siècle, sa façade mêlant pierre de Caen, silex blanc et silex noir, son toit à forte pente, son imposante cheminée et ses chaînages de pierre sont typiques du style architectural Louis XIII .\r\nA Touques Le manoir de MEAUTRY inscrit à linventaire des monuments historiques en 1933, il possède un portail monumental.\r\nOn trouve la trace du nom de Meautry au XVe siècle à Touques, où Guillaume Carel de Meautry et de Mercy possédait son fief. Cette terre est aujourdhui celle du haras de galopeurs de la famille Rothschild appelé  Meautry.  Jean-François Bonnet fera construire le premier bâtiment aux environs de 1750 grâce à la fortune de sa femme, Louise Aimée de Malherbe de Malicorne. Il meurt à trente ans laissant ces travaux inachevés en totalité ainsi que le portail dentrée et les toitures des bâtiments attenants (1933).","architecture":"A 6 K.M. au sud ouest à Glanville le château Médiévale de GLANVILLE  pas d'information historique. \r\nBONNEVILLE-TOUQUES, est construit aux XIe et XIIe siècles. Il appartient à Guillaume le Conquérant (1027-1087), d'où la dénomination château de Guillaume le Conquérant qui lui est parfois donnée localement. Au milieu du XIXe siècle, le château offrait encore une enceinte de murailles garnie de plusieurs tours et une porte en ogive assez belle, qui pourrait dater de la fin du XIIe siècle ou du commencement du XIIIe siècle ; elle était précédée d'un pont-levis. Les fossés, autrefois pleins d'eau, étaient encore profonds du côté du Nord et du Nord- Ouest. Les murs d'enceinte, qui avaient 8 à 10 pieds d'épaisseur, étaient, en 1780, bien plus élevés qu'au XIXe siècle; les débris ont été dispersés et jetés en partie dans la cour du château. La tour la mieux conservée dominait la riche vallée de la Touque et l'embouchure de cette rivière, où les ducs s'embarquaient pour l'Angleterre et débarquaient si souvent, lorsqu'ils revenaient sur le continent.   \r\nÉléments protégés MH : les restes du château de Guillaume-le-Conquérant : classement par arrêté du 16 novembre 1964                                                                                                GABRIEL, c'est à l'architecte Ernest Saintin que Paul Gallimard, collectionneur d'uvres d'art confie la mission de construire le bâtiment et concevoir ses aménagements extérieurs. La construction de la villa débute en 1874, l'ensemble du chantier est achevé en 1883. Le château Gabriel entre-temps fut cédé au groupe de textile Bidermann.  qui en confia la décoration à Jacques Grange. Le château Gabriel était une maison studieuse consacrée à la lecture et à la promenade.  Paul en sera le propriétaire jusqu'à sa mort, en 1929. Son fils Gaston en héritera et en restera propriétaire jusqu'en 1975. Dominant les hauteurs des coteaux, le domaine Gabriel offre une vue panoramique privilégiée.","habitants":"Gabriel;  Paul Gallimard                                                             Meautry  famille Rothschild \r\n        \"","divers":"Quatre châteaux dans cet article; Boneville-Touques grav  1-2, Gabriel  grav-4 , Grenier grav 3, et  Meautry grav 5   Château de  Gabriel grav-4                                                                   GPS : 49° 20' 24\" Nord, 0° 03' 03\" Est                            Glanville-49° 16' 59\" nord, 0° 04' 17\" est","gps":"49° 20' 24\" Nord, 0° 03' 03\" Est","images":["../image/image_14/14_Bonneville_Touques_1.jpg","../image/image_14/14_Bonneville_Touques_2.jpg","../image/image_14/14_Bonneville_Touques_3.jpg","../image/image_14/14_Bonneville_Touques_4.jpg","../image/image_14/14_Bonneville_Touques_5.jpg"]},"Consult_chateau_formulaire6a46":{"id":"Consult_chateau_formulaire6a46","dept":"14","canton":"Bayeux","commune":"Commes","nom":"Bosq_Commes","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article; Bosq et Commes.                            BOSQ, ancien fief du Bosq et de Moon relevant de la baronnie de Saint-Vigor; château édifié à une date indéterminée à la fin du moyen âge. Au XVIIIe siècle, pour la famille d'Isigny, le logis fut remanié, aménagement d'une avant cour entourée de communs et un jardin ; acquis vers 1890 par le comte de Potigny qui le fait restaurer de 1893 à 1896 par J. Jean, architecte au Vésinet : remodelage du logis, édification de la tour de l'horloge, démolition de l'aile sud de l'avant cour, transformation des ailes est et ouest, espace de l'avant cour aménagé en jardin régulier, création de la cour des écuries, et établissement d'un jardin paysager; vers 1975, installation d'une deuxième cour des écuries dans la partie nord de l'ancien jardin; communs divisés en plusieurs propriétés. Logis en moellon couvert d'un enduit imitant la pierre de taille et la brique, avant corps sur jardin à faux bossages, avant corps sur cour et lucarnes en pierre de taille ; composé d'un sous-sol, d'un rez-de-chaussée surélevé et d'un étage de comble ; élévations à travées ; toit conique en zinc terminé par un campanile sur la tour de l'horloge, toit polygonal sur le pavillon sud-ouest ; ailes des communs : moellon enduit et faux pan de bois, plan régulier en U primitivement, toits à demi-croupe sur les hangars sud ; toit en pavillon sur le pavillon de l'ancien jardin.","architecture":"COMMES, durant la période médiévale le village s'est développé en plusieurs hameaux ayant chacun sa spécificité : bourg de l'église constituant le fief de l'évêque de Bayeux, grandes fermes à Escurès, tête d'un pont important sur la route de port en Bessin au pont Fatu, pêcheurs et journaliers au Bouffay ; fin XVIIIe siècle à la suite de la création de la nouvelle route Bayeux-Port-en-Bessin, le hameau d'Escurès s'étend vers l'ouest où se crée un quartier commerçant. Le château de Commes a été construit dans la première moitié ou au milieu du XVIIIe siècle. A la fin du XVIIIe siècle ou dans les premières années du XIXe siècle, avant le cadastre de 1809, agrandissement du corps de logis par l'édification de deux pavillons. Au milieu du XIXe siècle, avant 1878, adjonction d'une tour et, peut-être à cette époque, transformation des communs. En 1878, le château est acquis  par la famille Manneville qui fait transformer le jardin régulier, en jardin paysager, édifier la chapelle dédiée à Saint-Michel en 1891 et,  de la même époque, la fabrique de jardin et le logement du gardien.  Logis en moellon enduit, tour en pierre de taille couverte en terrasse, façade principale ordonnancée ; chapelle en moellon enduit, voûtée d'ogives, abside à croupe polygonale, clocher mur à baie unique en façade ; logement du gardien et fabrique de jardin en brique avec pierre en remplissage.","habitants":"Bosq, famille d'Isigny                                                              Commes,  famille Manneville \r\n        \"","divers":"Deux châteaux dans cet article; Bosq grav-2 et Commes grav-1.   \r\n49° 20' 16\" nord, 0° 44' 10\" ouest","gps":"","images":["../image/image_14/14_Bosq_Commes_1.jpg","../image/image_14/14_Bosq_Commes_2.jpg"]},"Consult_chateau_formulaireb431":{"id":"Consult_chateau_formulaireb431","dept":"14","canton":"Évrecy","commune":"Bougy","nom":"Bougy","type":"Château","periode":"XVII","histoire":"BOUGY, c'est à la famille Le Révérend, noblesse protestante, que l'on doit l'élévation de l'ancienne seigneurie de Bougy en marquisat au XVIIe siècle, au début du règne du roi Louis XIV. De l'historique des constructions du château de Bougy, le silence est trop présent. Si certains communs, de par leur style, pourraient remonter à l'époque des Le Révérend, le château fut reconstruit au siècle suivant, par la famille Hue de Carpiquet (blasons sur le fronton du château en élévation principale), sur les bases du château XVIIe siècle en conservant l'assiette d'origine avec les douves et la cour d'honneur.","architecture":"BOUGY,  des adjonctions diverses affectèrent la demeure au cours du siècle suivant, dont le pavillon étroit au sud ouest et le pavillon carré au nord est. Le parc du château date du XVIIIe siècle et présente diverses parties fort variées dans leur esprit. De chaque côté de l'allée d'accès sont implantés les bâtiments nécessaires à l'exploitation du domaine. Des murs de soutènement sont implantés dans ses extrémités nord et sud compte tenu de la déclivité du site. Une avenue en surplomb règne au nord et dégage les perspectives intéressantes, le parterre se termine par un bassin maçonné d'où se mire la silhouette du château. A la suite du bassin, un étang est implanté, désaxé vers le nord. Un petit canal assure l'écoulement hydraulique vers l'Odon en passant par un réceptacle octogonale parc, dans sa partie occidentale, est entouré de part et d'autre par des futaies formant écrin paysager, il en constitue en fait l'intérêt majeur, exemple vivant de la capacité d'adaptation des paysagistes du XVIIIe siècle à un terrain où la présence hydraulique a permis des aménagements dignes de ceux de Canon. Éléments protégés MH : les façades et les toitures du château, la cour d'honneur et les douves, les façades et les toitures du logis du régisseur, des écuries, de la remise à voitures, du colombier et du lavoir, le parc, tel qu'il est délimité sur le plan annexé à l'arrêté, avec ses aménagements hydrauliques, ses murs de clôture, le potager et la serre : inscription par arrêté du 25 septembre 2000.","habitants":"Famille  Hue de Carpiquet \r\n        \"","divers":"Château de Bougy            GPS : 49° 06' 53,9\" Nord, 0° 31' 22,5\" Ouest","gps":"49° 06' 53,9\" Nord, 0° 31' 22,5\" Ouest","images":["../image/image_14/14_Bougy_1.jpg"]},"Consult_chateau_formulaire1963":{"id":"Consult_chateau_formulaire1963","dept":"14","canton":"Pont-l","commune":"Ouilly-le-Vicomte,","nom":"Boutemont","type":"Château","periode":"XIV-XVI","histoire":"BOUTEMONT,  ce sublime château bien restauré du XVIe siècle est une ancienne forteresse médiévale. Jusqu'à cette période, le domaine appartenait à la famille Boutemont. Au siècle suivant, il passa aux Servain, puis aux Borel. En 1529, il devint la propriété de Philippe Plaisant. Celui-ci érigea, en 1538, le château de Boutemont, actuel. Il a été transformé au fil des siècles, en une belle demeure de plaisance. Vous pourriez passer 100 fois à Ouilly-le-Vicomte, sans même soupçonner sa présence. Mais la plus grande fierté de ses propriétaires est le Jardin extravagant. C'est à lui seul un voyage dans la pure tradition des jardins de propriétaires. Conçu par le chapelier Drouilly, entre les 2 guerres, doté d'une imagination fertile, il fit venir au château de Boutemont, le Tout Paris de l'époque. Si l'art paysager britannique qui gagna la France au XIXe siècle, Achille Duchêne, le grand architecte et paysagiste des jardins de la haute société, imposa le retour des jardins à la française. Il conçut plus de 6000 jardins dans le monde entier. En 1976, les nouveaux propriétaires Hélène et Armand Sarfati restaurèrent et réinventèrent ce lieu unique.","architecture":"BOUTEMONT, cette maison-forte a été construite à la fin du XIVe siècle ou au début du siècle suivant. Le château actuel a été construit à partir de 1538. Le pavillon d'entrée et l'aile nord ont été édifiés au début du XVIIe siècle, et l'aile ouest et la cour d'honneur à la fin du XVIIe siècle, la galerie à pans de bois a été élevée sur l'aile ouest vers 1770. La serre a été réhabilitée est toujours en activité. Du mobilier de jardin grand siècle ainsi que des sculptures et poteries toscane agrémentent ce merveilleux espace vert. Une balade de deux heures où pour partager la passion des propriétaires et de leurs jardiniers. Un jardin à voir absolument en Normandie. Visites guidées sur demande. Éléments protégés MH : le château en totalité : inscription par arrêté du 19 janvier 1927. La cour d'honneur, les douves sèches avec les murs de soutènement et le pont dormant : inscription par arrêté du 2 octobre 1995.","habitants":"famille Boutemont\r\n        \"","divers":"Château de Boutemont gps  , 0° 13' 17\" Est","gps":"","images":["../image/image_14/14_Boutemont_1.jpg","../image/image_14/14_Boutemont_2.jpg","../image/image_14/14_Boutemont_3.jpg","../image/image_14/14_Boutemont_4.jpg","../image/image_14/14_Boutemont_5.jpg","../image/image_14/14_Boutemont_6.jpg"]},"Consult_chateau_formulairec03d":{"id":"Consult_chateau_formulairec03d","dept":"14","canton":"Thury-Harcourt","commune":"Bretteville-sur-Laize","nom":"Bretteville_Laize","type":"Château","periode":"XVI-XIX","histoire":"six châteaux dans cet article; Bretteville, Gournerie, Motte Rouvrou, Hospital, Fresnay  et Thuit.                                                    BRETTEVILLE, construit au XIXe siècle pour M. Harel de Bretteville. un étage avec un corps central plat, couronné dun fronton triangulaire. Elle est flanquée de deux petits pavillons en rez-de-chaussée, avec une toiture terrasse et balustrade. Le château est précédé de deux communs, de part et dautre de la cour dhonneur. Il se termine par un bassin près duquel sélève une orangerie. Derrière elle, le coteau ensoleillé est aménagé en terrasses avec des allées, promenades en belvédère sur le parc.  Au mois daoût 1944, les bombardements de lopération de la Bataille de Normandie détruisent les trois quarts de la ville et endommagent le parc et le château.                                                                              GOURNERIE   On peut visiter juste le parc du château de la Gournerie.  Il appartient aux héritiers de Mme. Harel de Bretteville.                                                                                                                          la Motte de ROUVROU Il est appelé depuis la Motte de Rouvrou a été construit au XIe siècle, fait l'objet d'un recensement à l'Inventaire général du patrimoine culturel.                                   HOSPITAL à Bretteville le Rabet à 8 KM au Nord -Est,  Acte de donation de Pierre et Guillaume de Gouvix en 1148. Confirmation de Charles Robert de Gouvis en 1203. Confirmation des biens donnés à l'ordre du Temple en La salle voûtée, est le seul vestige d'un bâtiment du XIIIe siècle; incorporée dans le logis du château édifié par M. Saint -Jean entre 1850 et 1860; commanderie fondée au XIIe siècle par les Rabel de Bretteville réunie en 1325 à la commanderie de Voismer à Fontaine le Pin.","architecture":"A deux K.M au nord à FRESNAY le Puceux;  édifice construit pour Pierre d'Harcourt entre 1578 et 1584. Il offrait un grand carré de bâtiments, flanqué de hauts pavillons, dont la porte d'entrée, crénelée et garnie de rainures, recevait un pont levis qui s'abaissait sur les douves. Entre les pavillons, de grandes galeries, dont la principale était ornée des écussons de tous les seigneurs, celui de Charles Léon de Fiesque, prince et vicaire du Saint Empire, portait un aigle éployée. Armes de Charles de Fiesque deuxième époux de Gilonne d'Harcourt en 1643, puis Fresney passa à la famille de Guerchy jusqu'au XIXe siècle. Le colombier figurant sur le cadastre en 1808 fut détruit.                                                                                                                                                                                                                                A l'ouest à Boulon, le château de THUIT, siège de la baronnie du Thuit créée en 1080 pour Raoul Tesson de Cinglais ; en 1342 sont signalés le manoir, deux chapelles, deux moulins. Baronnie incorporée au comté d'Alençon en 1379 ; chapelle carrée avec arcades XVIe siècle signalée en 1830, détruite ; vestiges : deux enceintes, quelques pans de murs.","habitants":"M. Harel de Bretteville. Fresnay, Charles Léon de Fiesque, \r\n        \"","divers":"six châteaux dans cet article; Bretteville grav 2-8, Gournerie grav -7, Motte Rouvrou grav-3, Hospital grav-4, Fresnay grav 1-8 et Thuit grav-5-6.                                                        Fresnay  GPS : 49° 3' 42,92\" Nord, 0° 22' 12,75\" Ouest                                 Gournerie GPS : 49° 02' 42\" Nord 0° 19' 30\" Ouest                                                                              Rouvrou GPS : 49° 02' 42\" Nord, 0° 19' 30\" Ouest                                                                                                                        Riflets    GPS : 49° 02' 42\" Nord, 0° 19' 30\" Ouest","gps":"49° 3' 42,92\" Nord, 0° 22' 12,75\" Ouest","images":["../image/image_14/14_Bretteville_Laize_1.jpg","../image/image_14/14_Bretteville_Laize_2.jpg","../image/image_14/14_Bretteville_Laize_3.jpg","../image/image_14/14_Bretteville_Laize_4.jpg","../image/image_14/14_Bretteville_Laize_5.jpg","../image/image_14/14_Bretteville_Laize_6.jpg","../image/image_14/14_Bretteville_Laize_7.jpg","../image/image_14/14_Bretteville_Laize_8.jpg","../image/image_14/14_Bretteville_Laize_9.jpg"]},"Consult_chateau_formulairee83e":{"id":"Consult_chateau_formulairee83e","dept":"14","canton":"Pont-l","commune":"Breuil en Auge","nom":"Breuil_en_Auge","type":"Château","periode":"XVI","histoire":"BREUIL, de 1300 à 1611,  les Bouquetot sont les seigneurs, les Montgomery propriétaire de 1611 à 1658  et en 1696 le domaine passe aux Bence qui le garderont jusqu'en 1734.  Le corps de logis, les dépendances, la porte d'entrée et la douve sont inscrits aux M.H. depuis le 9/09/1933. propriété  de la société anonyme B.D.B.","architecture":"BREUIL, date du XVIe siècle. chaque bâtiments  de plan rectangulaire, on accède à la cour par un portail   de pierre encadrant  une porte surmontée d'un arc en plein cintre. Ce  portail  est précédé d'un pont   qui marque l'emplacement d'un ancien pont levis, aujourd'hui disparu. Le corps central du logis long rectangle de brique et pierre, à été  flanqué de deux pavillons parés de colombages, l'ensemble est coiffé d'une toiture en tuiles roses, sur la façade côté douves, le corps central se décline sur deux niveaux plus un niveau de combles percé de trois lucarnes. Le rez-de-chaussée  accessible par une volée   de marches est éclairé par cinq hautes fenêtres à meneaux, tout comme l'étage. Les deux pavillons à pans de bois parfaitement symétriques sont plus larges  et plus élevés que le corps central  le colombages réalisés en bois très courts, ces pavillons s'élèvent sur deux niveaux. de l'autre côté de la cour bâtiment des communs face  au corps de logis principal.  C'est devenu une distillerie de Calvados, Avec près de 40 000 visiteurs par an, ce nouveau classement confirme que cette maison offre un véritable moment de partage et de savoir,  le château et le domaine se visitent.","habitants":"Famille des Bence\r\n        \r\n        \"","divers":"Château du Breuil grav 1-2-3-4    GPS : 49° 13' 52\" Nord, 0° 12' 51\" Est","gps":"49° 13' 52\" Nord, 0° 12' 51\" Est","images":["../image/image_14/14_Breuil_en_Auge_1.jpg","../image/image_14/14_Breuil_en_Auge_2.jpg"]},"Consult_chateau_formulaire053c":{"id":"Consult_chateau_formulaire053c","dept":"14","canton":"Ouistreham","commune":"Bénouville","nom":"Bénouville","type":"Château","periode":"XVIII","histoire":"BENOUVILLE,  en 1672  la seigneurie appartenait aux Mauvoisin  puis aux Panthou avant d'être acquis par  les Guillain, Antoine Guillain fit ériger  en comté en 1672 et en marquisat trois ans plus tard. Après la démolition de l'ancien château,  le marquis de Livry  et de sa femme Thérèse-Bonne Gillain de Bénouville entreprennent un nouvel édifice est construit à partir de 1769, sur les plans de l'architecte Claude Nicolas Ledoux.  en 1792 le château est cédé à François-Marie-Mesnage de Préssigny  ce dernier  périt sous l'échafaud un an après, le fils du défunt ayant émigré en Autriche. Sous le consulat la baronne d'Aubigny née Mesnage de Préssigny parvient à récupérer le château, qui passera en héritage aux Janzé, aux Lelasseur et aux Dampierre  avant d'être acquis par le conseil général du Calvados qui y  installe une maternité et une maison maternelle  départementale.  Gérard Lenorman est né à la maternité en 1945 et Raymonde Girardot, la mère d'Annie Girardot, y était sage-femme. Le château  logea des enfants de lAssistance Publique jusquà la fin des années 1970.  En 1983, restauration de la demeure entreprise pour l'installation de la chambre régionale des Comptes. Le château a accueilli le déjeuner des Chefs d'État et de gouvernement lors des Commémorations du 70 eime anniversaire du Débarquement allié, le 6/06/2014","architecture":"BENOUVILLE, fut bâti de 1765 à 1785. Il est de style néoclassique, est un château construit par l'architecte Claude Nicolas Ledoux entre 1765 et 1785, Nouveauté de la  partie architecturale avec la disparition des mansardes traditionnelles et la dissimulation des toitures derrière l'attique. En 1771, le gros-oeuvre est en voie d'achèvement. En 1774, l'aménagement intérieur est mené par l'architecte Joseph Devilliers de Maison-Rouge. Et, jusqu'en 1779, en 1927, cette affectation entraîne des travaux qui remodèlent les aménagements intérieurs. En 1944, les façades et les toitures sont endommagées par les bombardements, la décoration est reprise par le décorateur Jean François Etienne Gilet. Le château  logea des enfants de lAssistance publique jusquà la fin des années 1970. En 1980, il est réhabilité puis restauré pour ouvrir ses portes au public, depuis mai 2013, il est devenu le siège de l'Institut européen des jardins et paysages, dédié à la préservation de la mémoire des jardins, au développement des connaissances et à la promotion de l'art des jardins. Éléments protégés MH : le château de Bénouville et la chapelle, la balustrade du XVIIIe siècle bordant la terrasse et le parterre contigüe au château du côté nord : classement par arrêté du 12 décembre 1930.","habitants":"François-Marie-Mesnage de Préssigny\r\n        \r\n        \"","divers":"Château de Bénouville                                                                         GPS : 49° 14' 11\" Nord, 0° 16' 52\" Ouest","gps":"49° 14' 11\" Nord, 0° 16' 52\" Ouest","images":["../image/image_14/14_Benouville_1.jpg","../image/image_14/14_Benouville_2.jpg"]},"Consult_chateau_formulaireff02":{"id":"Consult_chateau_formulaireff02","dept":"14","canton":"Bretteville-l","commune":"Beny sur Mer","nom":"Bény_sur_Mer","type":"Château","periode":"XVII","histoire":"BENY sur Mer, le château de Bény-sur-Mer a été construit en 1685 par Fallet de Bernières, trésorier de la fabrique de Bény, sur une demeure plus ancienne. Dans la deuxième moitié du XVIIIe siècle, son fils Claude-François Fallet de Bernières a agrandi le château, avec l'ajout de deux travées.","architecture":"BENY sur MER;   un retour d'équerre sur la cour d'honneur et la construction des communs, il conserve son dessin d'origine avec une orangerie bordée d'une galerie à usage de serre et surmontée d'une balustrade à l'italienne a également été construite. Les ailes rajoutées au logis principal au début du XVIIIe siècle respectent la symétrie rigoureuse de l'ensemble. On aperçoit le corps de logis,  il comporte six travées en façade, les communs ainsi que les latrines curieusement adossées à la chapelle du XVIIIe siècle à travers la grille de fer forgé encadrée par deux piliers surmontés de pots à feu. L'orangerie, construite en 1745. Les balustres qui ornent les murs de part et d'autre du portail ainsi que la chapelle et les murs de l'orangerie, donnent encore un peu plus de majesté et d'élégance à l'ensemble des bâtiments. On peut encore voir les tombes de la famille de Tournebu et Fallet de Bernières dans le cimetière paroissial; éléments protégés MH : les façades et les toitures du logis ; les façades et les toitures des communs avec sa remise, le pressoir, la boulangerie et l'ancienne pompe ; les façades et les toitures des anciennes écuries, de la chapelle, avec son aménagement intérieur ; les façades et les toitures de l'orangerie et de la serre attenante ; la cour d'honneur ; le jardin potager ; le jardin d'agrément et le parc, avec les murs de clôture ; le portail d'entrée et le portail donnant sur la voie du Cornu avec la porte piétonne : inscription par arrêté du 28 octobre 1998.","habitants":"Fallet de Bernières,\r\n        \r\n        \"","divers":"Bény-sur-Mer GPS : 49° 17' 17\" Nord, 0° 26' 06\" Ouest","gps":"49° 17' 17\" Nord, 0° 26' 06\" Ouest","images":["../image/image_14/14_B%c3%a9ny_sur_Mer_1.jpg","../image/image_14/14_B%c3%a9ny_sur_Mer_2.jpg"]},"Consult_chateau_formulairea46a":{"id":"Consult_chateau_formulairea46a","dept":"14","canton":"Caen","commune":"Caen","nom":"Caen","type":"Forteresse","periode":"XII-XVI","histoire":"CAEN    Cest vers 1060 que Guillaume-le-Batard, duc de Normandie, installe sa citadelle sur un éperon rocheux. Quelques habitations sy regroupent déjà près de la petite chapelle Saint-Georges. Le site est protégé par la falaise et des fossés taillés dans la roche doù lon extrait les pierres de construction. Lélément le plus important du château est le palais au nord de lenceinte, près de la seule porte daccès. Il est composé dappartements, dune chapelle et dune salle dapparat. Une simple palissade en bois entoure alors la vaste enceinte de 5 hectares, elle est remplacée par des murailles en pierre  à la fin du règne de Guillaume-le-Conquérant, son fils, Henri 1er Beauclerc, roi dAngleterre et duc de Normandie, fait édifier, en 1120, le donjon près de la tour-porte du nord, cest un véritable château à lintérieur du domaine. Une nouvelle aula plus vaste est bâtie (actuelle salle de léchiquier), Henri II dAngleterre et ses deux fils, Richard-Cur-de-Lion et Jean-sans-terre, y organisent, en 1182, une fastueuse réception pour les fêtes de Noël. En 1204, le château est pris par Philippe Auguste qui fait réaliser dimportants travaux pour moderniser la forteresse. Le donjon est entouré dune courtine protégée à chaque angle par une tour circulaire et entourée dun profond fossé. Lensemble est doublé au nord par une autre tranchée abrupte. Laccès seffectue par la porte fortifiée dite des champs ou de secours. Enfin, deux tours circulaires (Mathilde et Puchot) sont édifiées à lest et à louest, à la jonction des fortifications de la ville. Le représentant du Roi réside dans la forteresse, dans le logis du Roi (logis des gouverneurs). Au XIVe siècle, lors de la guerre de cent ans, le château de Caen retrouve tout lintérêt stratégique quil avait perdu lors de lannexion du duché de Normandie au trône de France.","architecture":"CAEN, il devient un élément clé de la défense de la province. Après la prise de la ville par les anglais en 1346, les travaux reprennent, la poterne sud est transformée en véritable entrée fortifiée vers la ville et la porte des champs est pourvue dune barbacane. Reconquis par le Roi de France, en 1450, le château perd tout intérêt stratégique. A partir du XVIe siècle, lusage purement militaire du château se confirme et il nabrite plus quune garnison de 50 à 250 hommes selon les troubles du temps. La population civile de la paroisse de Saint-Georges déserte lenceinte pour la ville qui sétend jusquaux pieds des remparts. Le 18 juillet 1789, le peuple sempare du château et le futur général Dumouriez, gouverneur de la place, se rallie aux révolutionnaires. Après léchec de linsurrection fédéraliste, en 1793, la Convention ordonne la destruction du château. Transformée en prison jusquen 1881, la forteresse devient ensuite une caserne. Lesplanade est alors profondément remaniée, des bâtiments de casernements y sont bâtis, les restes du donjon sont abattus, les fossés comblés et le terrain aplani pour créer une place darmes. Avant la guerre de 1914-1918, 1600 hommes sont cantonnés dans la caserne Lefebvre, les derniers militaires quittent le château en septembre 1940. Pendant le débarquement et la bataille de Caen, la ville est durement touchée par les bombardements et le château néchappe pas aux destructions. A la fin du déblaiement des ruines en 1946, le château réapparaît à la vue des caennais. Lenceinte et ses tours sont restaurées dans les années 1950-1960. En 1963 le logis du gouverneur, refait à neuf, accueille les premiers visiteurs du musée de Normandie. En 1967, le musée des Beaux-Arts, construit à lemplacement des casernes, ouvre ses portes. A partir de 2004, la Ville de Caen entreprend la réhabilitation des remparts nord-ouest du XIIe siècle. La terrasse dartillerie est restaurée et permet linstallation des salles dexpositions en dessous.","habitants":"Richard-Cur-de-Lion et Jean-sans-terre\r\n        \"","divers":"GPS: 49° 11' 14,23\" Nord, 0° 21' 51,22\" Ouest                                          tour Leroy  grav 4   GPS : 49° 11' 03\" Nord, 0° 21' 33\" Ouest","gps":"49° 11' 14,23\" Nord, 0° 21' 51,22\" Ouest","images":["../image/image_14/14_Caen_1.jpg","../image/image_14/14_Caen_2.jpg","../image/image_14/14_Caen_3.jpg","../image/image_14/14_Caen_4.jpg","../image/image_14/14_Caen_5.jpg","../image/image_14/14_Caen_6.jpg","../image/image_14/14_Caen_7.jpg","../image/image_14/14_Caen_8.jpg","../image/image_14/14_Caen_9.jpg"]},"Consult_chateau_formulaire8716":{"id":"Consult_chateau_formulaire8716","dept":"14","canton":"Caen","commune":"Caen","nom":"Caen_II","type":"Château","periode":"XVI-XVIII","histoire":"Six châteaux cité à Caen dont Caen, Maltot, Rots, Bû,  Cairon, Fleury et Banneville.  Au sud-ouest à deux K.M  château de FLEURY sur Orne pas d'information historique. A cinq K.M. au sud ouest MALTOT date de 1740. Il a été bâti sur les plans de Philippe de la Guêpière, architecte du Roi Louis XV et de son Académie Royale d'Architecte. Le Château de Maltot est devenu un Centre de Formation.  ROTS au nord-ouest à deux K.M.   date du XIXe siècle de  Emmanuel Grandsire.                                                                      En banlieue à Anctioville le château de BÛ transformé en hôtel restaurant, les nouveaux châtelains, Se Ma et Andy Lee, sont coréens. Ils ont acquis la demeure en 2014, le château du Bû à Orbois, datant du XVIIIe siècle, a été occupé par les Allemands pendant la seconde guerre mondiale. Il a été partiellement détruit et racheté par M. Helleboid qui la restauré.                               \r\nTour  LEROY, mentionnée pour la première fois en 1497, a  été construite après la prise de Caen en 1346. Érigée non loin du château de Caen, elle faisait partie des fortifications de Bourg-le-Roi ; on y accédait depuis la muraille de la ville par un escalier extérieur. Elle était reliée par une chaîne à la tour aux Landais située sur la rive droite de l'Odon. Ce dispositif défendait l'entrée du port médiéval de Caen. Elle est transformée en maison d'habitations avant d'être utilisée comme prison pour les contrebandiers. La tour aux Landais a été détruite et, en 1860, la rivière a été recouverte. Le conseil municipal décide le 20 octobre 1879 de la conserver et de la restaurer. La restauration est effectuée par Gustave Auvray, architecte municipal.","architecture":"BANNEVILLE à quelques K.M à l'Est on retrouve sur ces terres des vestiges de loccupation humaine remontant presque à la préhistoire. Plus proche de nous lorigine du nom serait de lanthroponyme scandinave Biarn et du latin villa domaine, Située à la limite de la plaine de Caen et du Pays dAuge, Banneville-la-Campagne est une commune au territoire étendu. En 1828 les hameaux de Guillerville et de Manneville sont rattachés à Banneville lui donnant ses limites actuelles. Le château de Banneville, construit au XVIIIe siècle, est l'ancienne demeure du marquis de Banneville.                                                                                             \r\nCAIRON, au nord de Caen a été construit au XVIe siècle et remanié au XIXe siècle. Pendant la deuxième Guerre mondiale, il servit d'hôpital, de résidence aux Allemands, puis aux Alliés. On peut encore y voir des trous d'hommes et des trous de chars, où les soldats se tapissaient pour éviter les éclats d'obus horizontaux. Il accueillit ensuite le Général de Gaulle.\r\n Il est inscrit aux M.H. depuis le 13/04/1933. Le corps de logis, qui, date du XVIIIe siècle.  \r\nTOUR LEROY  Légèrement endommagée pendant la bataille de Caen, elle a fait l'objet d'une seconde restauration dans le seconde partie du XXe siècle.  L'édifice est construit en pierre de Caen, matériau calcaire extrait du sous-sol de la ville. L'emprise au sol de la tour est de 79 m2. Elle comprend quatre niveaux : une salle basse, deux étages et une plateforme au sommet.","habitants":"Philippe de la Guêpière                                                                                          Se Ma et Andy Lee                                                                        marquis de Banneville \r\n        \"","divers":"Six châteaux cité à Caen dont Caen, Maltot grav 1, Rots grav 4-5 Bû grav-2,  Cairon grav-4, Fleury grav 6 et Banneville grav-6-7-8                                                                                Fleury GPS : 49° 08' 20,1\" Nord, 0° 23' 28,3\" Ouest                                        tour Leroy  grav-4 GPS : 49° 11' 03\" Nord, 0° 21' 33\" Ouest                                            Maltot  PS : 49° 07' 50,02\" Nord, 0° 24' 48,72\" Ouest                                       Cairon GPS : 49° 14' 20,41\" Nord, 0° 27' 7,5\" Ouest","gps":"49° 08' 20,1\" Nord, 0° 23' 28,3\" Ouest","images":["../image/image_14/14_Caen_II_1.jpg","../image/image_14/14_Caen_II_2.jpg","../image/image_14/14_Caen_II_3.jpg","../image/image_14/14_Caen_II_4.jpg","../image/image_14/14_Caen_II_5.jpg","../image/image_14/14_Caen_II_6.jpg","../image/image_14/14_Caen_II_7.jpg","../image/image_14/14_Caen_II_8.jpg","../image/image_14/14_Caen_II_9.jpg"]},"Consult_chateau_formulaire2b59":{"id":"Consult_chateau_formulaire2b59","dept":"14","canton":"Mézidon-Canon","commune":"Cambremer","nom":"Cambremer","type":"Château","periode":"XV-XVII-XVIII","histoire":"Trois châteaux à Cambremer, Bruyères, Bais et Cantepie.  BRUYERES, il faut attendre le cadastre de 1811 pour voir apparaître quatre maisons à lemplacement actuel des habitations et bâtiments entourant le château. Il semblerait donc quil fut édifié vers 1815-1816. Dune architecture typique de la fin de lépoque napoléonienne, il présentait un élégant appareil de briques et de parement de pierre et denduit à la chaux qui encadrait baies et portes. Cette propriété appartenait au début du XXe siècle à la famille Petit. Mme et M. Chady Bollack, parfumeurs parisiens, acquirent lensemble vers 1925, ils réalisèrent limposante allée bordée de hêtres et de châtaigniers qui mène aux marches dhonneur du château. Vendu en 1992, il fut transformé pour accueillir des hôtes, le château nécessita d'importants travaux de rénovation. En 2004, le parc a été complété par un verger domestique, et une nouvelle pommeraie destinée à produire le cidre du château. Le porche dhonneur a été reconstruit. Le haras situés derrière complète lensemble.   Hôtel de charme et restaurant gastronomique.                                                                                            BAIS, Le Manoir appartient à la famille de Monts depuis 1629. Antoine de Monts actuel propriétaire se passionne pour la restauration de cet édifice. Propriété du comte B. de Monts de Savasse.","architecture":"BAIS,  comprend aujourd'hui trois bâtiments entourés de douves. Parmi ces bâtiments figurent un corps de logis à pans de bois de la fin du XVe siècle, transformé au XVIIIe siècle, du début du XVIe siècle un colombier octogonal à pans de bois transformé en pavillon à la fin du XVIIIe siècle et une poterne défensive de la fin du XVIe siècle en damiers de briques et de pierres.                                                                                                               CANTEPIE, manoir construit sur une seigneurie octroyée à un seigneur par son roi. Le bâtiment d'origine a été construit à la fin du XVIe siècle ou au début du XVIIe siècle pour des membres de la famille Le Gouez, détentrice de la seigneurie du Bais à Cambremer, de 1455 à 1629. Le fief ira ensuite aux mains de Gui de l'Epée, écuyer, vers 1714. En 1747, le manoir de Cantepie appartient à Jacques Denis, également écuyer. Aux alentours de 1870, Alfred Swann, riche pharmacien, propriétaire d'une boutique rue de Castiglione à Paris, se porte acquéreur du manoir de Cantepie. Marcel Proust a emprunté le patronyme de Swann, ami de la famille Proust, pour un des personnages de \"À la recherche du temps perdu\". Le titre du premier tome de cette uvre : Du côté de chez Swann, repris dans une chanson à succès en 1975, donne une dimension particulière à ce nom, en le rendant familier au grand public. Les boiseries qui comportent des portes, des panneaux ainsi que 4 aisseliers sculptés de cariatides et de personnages masculins datent du début du XXe siècle. La dépendance au Nord du logis a été construite également au XIXe siècle dans un style néo-normand. En pans de bois et hourdis de brique, elle abrite à la fois les logements. Propriété de monsieur  Gherrack.","habitants":"Bruyères; famille Petit                                                      Monts: famille de Monts                                                                Cantepie: famille Le Gouez\r\n        \"","divers":"Trois châteaux à Cambremer, Bruyères grav-5, Bais grav-2-3 et Cantepie grav-1-4.                                                                        Cantepie GPS : 49°8' 21,98\" Nord, 0° 3' 52,84\" Est\r\nBruyères  49° 08' 42\" nord, 0° 03' 42\" est","gps":"49°8' 21,98\" Nord, 0° 3' 52,84\" Est","images":["../image/image_14/14_Cambremer_1.jpg","../image/image_14/14_Cambremer_2.jpg","../image/image_14/14_Cambremer_3.jpg","../image/image_14/14_Cambremer_4.jpg","../image/image_14/14_Cambremer_5.jpg"]},"Consult_chateau_formulaireb05c":{"id":"Consult_chateau_formulaireb05c","dept":"14","canton":"Pont-l","commune":"Canapville","nom":"Canapville","type":"Château","periode":"XV-XVI-XVII","histoire":"Trois châteaux à Canapville, Evêques, Prétot et les portes de Canapville.                                                                                                          EVEQUES, élevé par la famille du Fossey, de père en fils restera longtemps dans cette lignée. le petit-fils pierre époux de Marie de Montpongnant mourut le même jour que son mari fut inhumée dans l'église paroissiale, leur fils Jacques prend possession des lieux en 1655. Au XVe siècle à un Benoit de Launoy qui le céda deux ans après à Jean du Fossey dont la famille devait le conserver plus de deux siècles, 1677 extention de la Branche des du Fossey de Canapville en ligne masculine, en 1749 Nicolas-François de Costard  seigneur de la Chapelle, descendant de Judith du Fossey et de Nicolas de Carel, en rend aveu au duc d'Orléans. Par héritages et partages le domaine passe ensuite entre le XVIII-XXe siècle  aux familles de Tesson, de Franqueville et le courtois du Manoir. Connu sous le nom de manoir des Evêques de Lisieux, et semblant dater du XVIe siècle, a été utilisé comme ferme. Racheté en 1944 par Alain Saint-Loubert-Bié et appartient maintenant à Mme de Rufz de Lavison.                                                                                                                           PORTES CANAPVILLE, l'hôtel les manoirs des Portes de Deauville vous propose une expérience unique exceptionnelle alliant le charme d'un vrai manoir du XVIe siècle où entre 1638 et 1668 Pierre Corneille passait ses vacances, associé à toutes les facilités d'un hôtel chaleureux et intimiste, ainsi qu'une salle de réunion de 45m2 pour tous vos événements professionnels.","architecture":"EVEQUES, manoir du XIIIe siècle de style augeron, avec une tourelle d'escalier en Pierre, des corps de logis en pans de bois et de curieux toits. Il se compose de trois bâtiments situés à droite dans la cour: le premier en pans de bois se termine par une tourelle d'escalier octogonale bâtie en pierre; l'édifice du fond, couvert de pierre, serait la partie la plus ancienne du manoir, au-dessus de la porte, cachée par la verdure, se trouve une sculpture sur bois représentant une tête d'évêque. Éléments protégés MH : les deux logis en totalité et le bâtiment attenant à usage de pressoir, les communs, le portail ainsi que le mur de clôture : inscription par arrêté du 2 novembre 2004.                                                                                  PRETOT, le manoir est daté des XVIe et XVIIe siècles. À cette époque, le domaine était la propriété de la famille Ballan. La sur du dramaturge était alors mariée à un membre de cette famille, à savoir Guillaume Ballan. Le manoir présente une façade principale entièrement en colombages et qui s'appuie sur un muret fait de pierres et de briques. Cette façade se divise en six sections dans lesquelles l'orientation verticale domine. Seuls les croix de Saint-André ornant les allèges de fenêtres de l'étage et les écharpes étayant les poteaux corniers viennent casser cette verticalité. À l'arrière, la façade présente quelques différences. En effet, le mur du rez-de-chaussée est entièrement en pierres tandis que celui de l'étage est en colombages. De plus , une tour carré est accolée à cette partie du manoir. Cette tour, qui devait, à l'origine, contenir un escalier, repose sur une basse en pierre dominée par des colombages couverts d'essentes de châtaignier. Elle possède d'étroites meurtrières, avec trous à feu et se trouve surmontée par une chambre d'observation.","habitants":"Evéques; famille du Fossey                                                      Pretot; famille Ballan                                                                                Canapville; Famille du Fossey et du Rufs de Lavison\r\n        \"","divers":"Trois châteaux à Canapville, Evêques grav -1-2-3, prétot grav-4-5 et les portes de Canapville grav 6.","gps":"","images":["../image/image_14/14_Canapville_1.jpg","../image/image_14/14_Canapville_2.jpg","../image/image_14/14_Canapville_3.jpg","../image/image_14/14_Canapville_4.jpg","../image/image_14/14_Canapville_5.jpg","../image/image_14/14_Canapville_6.jpg"]},"Consult_chateau_formulaire8652":{"id":"Consult_chateau_formulaire8652","dept":"14","canton":"Livarot","commune":"Saint-Pierre-sur-Dives,","nom":"Carel_St_Pierre","type":"Château","periode":"XVI","histoire":"CAREL, au Moyen-Âge, le château appartient à la famille de Carel qui y demeure jusquau début du XVIe siècle. Cest alors un manoir fortifié, en forme de carré, construit sur une île formée par la Dives et des fossés de dix mètres de large. Au début du XVIIIe siècle, il appartient à la famille de Motteville qui le revend en 1724 à Mme Laillier. Cest à deux de ses fils que lon doit le château actuel dont la construction sachève vers 1730. Dhéritages successifs en ventes nombreuses le domaine devient, en 1830, la propriété du Baron Brunet qui sattache à le restaurer et à laménager. Au XIXe siècle, la grande route Lisieux-Falaise traverse la perspective. Cest seulement après 1881 que la large allée centrale est tracée après avoir arasée une dénivellation qui masquait lédifice aux regards \"quand les blés étaient murs\". Le château demeure dans la famille du Baron Brunet, depuis 1941, cest la propriété de sa petite fille : la comtesse dAntin de Vaillac. Siège dun état-major allemand durant la dernière guerre, le château subit de graves dégradations. Ses perspectives sont classées parmi les sites en juin 1967, depuis la ligne de crête à lest jusquà lancien lit de la Dives à louest.  Le 26 décembre 1999, trente minutes de tempête suffisent pour coucher en tous sens plus dune centaine darbres vénérables.","architecture":"CAREL, dans l'axe du château, lallée dhonneur gravillonnée conduit jusquau saut de loup que franchit un pont en pierre. De part et dautre, des murets ferment lavant-cour où, de chaque côté, sélèvent de beaux communs et un ancien colombier (seul vestige de lancien manoir) derrière deux alignements de tilleuls taillés au carré. Un petit pont de bois traverse les douves en eau pour accéder à la cour dhonneur. Le château se compose dun corps de logis principal et deux ailes importantes en retour. Cest une construction magnifique mais un peu déconcertante, on a édifié sous Louis XV un bâtiment au caractère du XVIIe siècle, Louis XVI et parfois Louis XIII ; le colombier, les communs symétriquement disposés. Au nord, le long de la Dives, lancien jardin, en herbe souligné de plates-bandes fleuries, est bordé de murs en pierre. Un magnifique charme sélève près de la rivière. Au-delà de la Dives des prairies sétendent jusquà lancien lit du cours deau. De lautre côté de la route de Falaise une vaste esplanade en herbe est longée de deux doubles alignements de jeunes tilleuls qui rejoignent les anciens, rescapés de la tempête.","habitants":"famille de Carel                                                                                                        famille de Motteville                                                                                  Baron Brunet                                                                      Comtesse dAntin de Vaillac                            \r\n        \"","divers":"Châteaux de Carel à St-Pierre-sur-Dives","gps":"","images":["../image/image_14/14_Carel_St_Pierre_1.jpg","../image/image_14/14_Carel_St_Pierre_2.jpg","../image/image_14/14_Carel_St_Pierre_3.jpg"]},"Consult_chateau_formulaire76cd":{"id":"Consult_chateau_formulaire76cd","dept":"14","canton":"Courseulles-sur-Mer","commune":"Saint-Côme-de-Fresné","nom":"Carrefour","type":"Château","periode":"XVIII","histoire":"CARREFOUR, village mentionné en 1154 dans une charte d'Henri II, roi d'Angleterre, donnant confirmation des biens aumônes à l'abbaye de saint-Julien de Tours ; en 1809, le village est composé de trois hameaux : l'un constituant le centre avec l'église, le carrefour, plus quelques cabanes de pêcheurs sur le littoral ; dans la deuxième moitié du XIXe siècle, construction d'un ensemble de villas au lieu-dit la guerre, prolongeant la station d'Asnelles. Château construit dans la première moitié du XVIIIe siècle pour la famille de Saint-Ouen, seigneurs de Fresne sur la mer en 1881.","architecture":"CARREFOUR: construit dans la première moitié du XVIIIe siècle reconstruction du pavillon oriental du logis (porte la date), oeuvre attribuable à Charles Le Verrier, architecte à Bayeux ; puis dans le courant du XIXe siècle, remplacement du grand escalier et de la clôture d'entrée, transformation du jardin régulier en jardin paysager, transformation des communs. Logis en moellon enduit, avant corps central et tourelle d'escalier Est en pierre de taille, un étage carré et un étage de comble, deux étages pour le pavillon est, grand escalier central et un escalier de service à chaque extrémité,  communs, moellon enduit, un étage, escalier droit en pierre. Colombier construit dans la première moitié du XVIIe siècle,  ensemble des bâtiments de la ferme du château élevés dans la première moitié du XVIIIe siècle,  bâtiments remaniés au XIXe siècle et aménagement d'un nouveau logis à la fin du siècle.","habitants":"Famille de Saint-Ouen\r\n        \r\n        \"","divers":"Château de Carrefour  Saint-Côme-de-Fresné","gps":"","images":["../image/image_14/14_Carefour_1.jpg","../image/image_14/14_Carefour_2.jpg"]},"Consult_chateau_formulaire252a":{"id":"Consult_chateau_formulaire252a","dept":"14","canton":"Condé-sur-Noireau","commune":"Carville","nom":"Carville","type":"Château","periode":"XVI-XVIII","histoire":"deux châteaux à Carville ; Castillon et Carville.                          CASTILLON, à Carville, ce site historique s'est maintenu de l'Age du Fer à nos jours. Situé à l'emplacement d'un ancien oppidum, où l'on a découvert un dépôt monétaire, le château est un bâtiment classique reconstruit en 1762, de style Louis XVI sur sa façade sud et directoire sur sa façade nord, il a conservé de nombreux lambris sculptés et des panneaux peints intégrés aux boiseries. L'ancien parc à la française du XVIIIe siècle fut en partie transformé par Gabriel Bellier de la Borie, procureur du roi à Bayeux, en parc à l'anglaise entre 1831 et 1866. Le moulin à farine dépendant du château de Castillon, est attesté en 1832 et a cessé son activité en 1963. La roue hydraulique en place a été rénovée en 1944. Depuis la fermeture du moulin, une partie du matériel de mouture a été démontée,  mais il reste cependant des mécanismes de transmission du mouvement de la roue hydraulique, un double rouet de volée, une bluterie, une chambre à farine et une paire de meules. Avec le logement du meunier, le moulin de Castillon offre une intéressante illustration de l'organisation d'un site meunier en milieu rural.","architecture":"CARVILLE,  la construction  date de la fin du XVIIIe siècle. Léonard-Louis-Gabriel Gaultier de Carville, l'aîné, naquit le 20 avril 1744. D'abord mousquetaire, il prit une part active à la chouannerie sous les ordres de Frotté. En raison de son arme d'origine, les mousquetaires rouges, il portait le sobriquet de « Cadet-Roussel ». Une balle lui cassa la cuisse à l'affaire de l'Auberge Neuve, sur la route d'Alençon, entre Mayenne et Le Ribay, le 7 avril 1796, et il mourut, deux jours après, à Montreuil où une cache lui avait été procurée à la Roussardière. Une plaque en son souvenir est posée dans la commune de Montreuil-Poulay (Mayenne), ainsi qu'une autre au cimetière de Carville, sur une tombe d'un ancêtre de la famille. Il existe aussi un manoir à découvrir dans le village de 342 habitations (2015): le Manoir de Montfragon (XVe siècle) qui est privé.","habitants":"Castillon; Gabriel Bellier de la Borie                                                Carville; Gabriel Gaultier de Carville\r\n        \r\n        \"","divers":"deux châteaux à Carville ; castillon grac -1-2 et Carville grav 3.     Carville GPS : 48° 55' 47\" Nord, 0° 51' 33\" Ouest                                             Castillon GPS : 49° 16' 26,83\" Nord, 1° 1' 23,06\" Ouest","gps":"48° 55' 47\" Nord, 0° 51' 33\" Ouest","images":["../image/image_14/14_Carville_1.jpg","../image/image_14/14_Carville_2.jpg","../image/image_14/14_Carville_3.jpg"]},"Consult_chateau_formulairea249":{"id":"Consult_chateau_formulairea249","dept":"14","canton":"Thury-Harcourt","commune":"Moutiers en Cinglais","nom":"Cinglais","type":"Château","periode":"XVI-XVII-XVIII","histoire":"Trois châteaux dans cet article Cinglais, Val et  Champ-Vert. CINGLAIS, les Moutiers en Cinglais est situé entre la forêt de Grimbosq et la forêt de Cinglais. Le nom évoque la présence autrefois de plusieurs églises, dont deux subsistent encore au moyen-âge. Lhabitation nest pas concentrée en bourg, les maisons étant dispersées au milieu des anciennes exploitations agricoles. Une grosse tour au nord de l'enclos, le colombier du château. Le pavillon du logis date de 1780.  De plan régulier\r\nà élévation ordonnancée  à deux étages carrés, étage de comble\r\net escalier dans oeuvre  en calcaire, moellon, enduit à  toit à longs pans, croupe en ardoise.                                                                                                                 A cinq K.M au sud à Espins château du VAL  construit au XVIIe siècle et remanié au XIXe siècle. Dans cette commune on trouve également l'ancien manoir de l'abbaye du Val Richer, dit ferme de Foudenpant. Ce manoir ecclésiastique, ne comportant pas de chapelle, a été donné aux religieux de Souleuvre dès le XIIe siècle. Le logis prioral a été reconstruit au XVIe siècle, puis remanié au XIXe siècle (la cheminée date du XVIe siècle). de plan régulier, élévation à travées,un étage carré et un étage de comble, avec  escalier dans oeuvre, en calcaire, schiste, moellon, appareil mixte, enduit couverture, toit à longs pans en ardoise.","architecture":"A cinq K.M. au nord est le château de CHAMP-VERT est un château bâti à Villerville,  date du XVIIIe siècle. Il est de style classique italien, décoré de balustre en pierre, de cheminées, de plafonds à caissons ou à soliveaux décorés. Il a été rénové en 1993. Le château de Cinglais appartenait à la famille d'Harcourt. Il existe 2 autres châteaux à découvrir sur la commune, château de Villeray (XVIIIe-XIXe siècles) et le château de la Bagottière (XIXe siècle). La construction date de 1913. Il est mis en vente. Il existe un autre château à découvrir sur la commune. Le château du Manoir (1875).","habitants":"Famille d'Harcourt.\r\n        \"","divers":"Trois châteaux dans cet article Cinglais, grav-1 Val grav-2. Champ-vert grav-3 Vierville grav-5-6                                                                              GPS : 49° 01' 52\" Nord, 0° 25' 22\" Ouest","gps":"49° 01' 52\" Nord, 0° 25' 22\" Ouest","images":["../image/image_14/14_Cinglais_1.jpg","../image/image_14/14_Cinglais_2.jpg","../image/image_14/14_Cinglais_3.jpg","../image/image_14/14_Cinglais_4.jpg","../image/image_14/14_Cinglais_5.jpg","../image/image_14/14_Cinglais_6.jpg"]},"Consult_chateau_formulaire93a9":{"id":"Consult_chateau_formulaire93a9","dept":"14","canton":"Bretteville-l","commune":"Colombiers sur Seulles","nom":"Colombiers_Baffy","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article; Colombiers et Baffy           . COLOMBIERS, de l'époque préhistorique subsiste, à l'est de la commune, un menhir, abattu en 1845 et remonte en 1872,  un tumulus date du néolithique moyen, époque gauloise, fermes et sanctuaire reconnus récemment au nord de la commune par prospection aérienne; époque romaine, traverse d'ouest en est de la voie Bayeux-Bénouville, traces de villas,  nécropole du Bas-Empire, située près du calvaire de part et d'autre de la voie romaine, fouillée au début du XIXe siècle: boucle datée des environs de 400 conservée au musée de Saint-Germain-en-Laye, haut moyen âge,  établissement du village actuel en bordure de la Seulles et peut-être d'une deuxième agglomération au nord-est de la commune, autour d'une motte féodale, aujourd'hui détruite, \r\nchâteau de l'ancien fief de Colombiers-sur-Seulles ; mention d'un château fort en 1371; reconstruit dans le deuxième quart du XVIIIe siècle, d'après les registres paroissiaux, pour la famille d'Argouges, Comte de Gratot. Logis de 1736, la grande grange et les étables en suivant, de 1737, le logement supposé du régisseur, le grand portail et la petite grange sont peut-être légèrement antérieurs; dans un aveu de 1754, mention de trois colombiers aujourd'hui détruits; et entre 1868 et 1880, travaux pour le comte Louis Boula du Colombiers, maire du bourg: transformation du logis et construction du pavillon, édification du corps de la ferme , démolition du moulin dont les ruines sont intégrées comme fabrique dans le jardin. Au XXe siècle transformation de la petite grange en charretterie.","architecture":"BAFFY, situé entre Bayeux et Caen, le château Baffy se trouve à 6 km des plages du débarquement en Normandie de la seconde guerre mondiale, alors centre de communication de la BBC. Installé dans un jardin de 1 hectare, cet établissement dispose d'une terrasse et d'un salon avec télévision. Le château de Baffy se compose de 2 bâtiments, dont la Villa Mathilde adjacente, qui comporte sa propre cour. Décorées avec simplicité, les chambres comprennent une salle de bains privative pourvue d'une douche ou d'une baignoire. Le château de Baffy vous propose, chaque matin, un petit-déjeuner buffet que vous pourrez déguster sur la terrasse.                                                                                                                           COLOMBIERS, le logis est bâti en moellon enduit, et possède un étage et un étage de comble, le pavillon à deux étages et étage de comble. Les bâtiments agricoles en moellon renforcé à espaces réguliers par des chaînes en pierre de taille, petite grange couverte de tuiles plates.","habitants":"famille d'Argouges\r\n        \r\n        \"","divers":"deux châteaux dans cet article; Colombiers-Baffy.                                   GPS : 49° 17' 35\" Nord, 0° 30' 42\" Ouest","gps":"49° 17' 35\" Nord, 0° 30' 42\" Ouest","images":["../image/image_14/14_Colombier_Baffy_1.jpg"]},"Consult_chateau_formulaire911b":{"id":"Consult_chateau_formulaire911b","dept":"14","canton":"Trévières","commune":"Colombières","nom":"Colombières","type":"Château","periode":"XIV-XV","histoire":"COLOMBIERES, les luttes reprennent cette fois-ci entre catholiques et protestants, et le seigneur de Colombières, François de Bricqueville adhère à la religion réformée et devient un chef protestant redoutable qui n'épargne rien de tout ce qui touche au catholicisme : destruction par le feu du trésor de la cathédrale de Bayeux, siège de Saint Lô, où l'évêque de Coutances, monseigneur de Cossé-Brissac est fait prisonnier. La fin du XVIIe siècle voit un certain nombre de transformations dans le château, mais aussi bien des dégradations: courtines et tours s'effondrent en partie; les propriétaires se succèdent pendant une cinquantaine d'années: ils n'ont ni le temps ni le goût d'entretenir, en 1706 le château est acquis par les Hatte ancêtres des propriétaire actuels. Vers 1770, les Girardin prennent possession du site (l'un d'eux René, également propriétaire du château d'Ermenonville n'est autre que le protecteur de Jean-Jacques Rousseau). La famille de Girardin, par ses descendants et alliés (Berthelot de Baye, Ludre Frolois, Cossé-Brissac) aujourd'hui Maupeou d'Ableiges est toujours présente. Comte et Comtesse Charles de Maupeou-d'Ableiges.","architecture":"COLOMBIERES. le château de Colombières justement et joliment dénommé : \"la vigie des marais\" est toujours là pour nous remémorer par son architecture et son histoire, les grands moments de la France. Les parties les plus anciennes datent de la fin du XIVe et XVe siècle: architecture de défense imposée par les troubles du temps. Colombières s'illustre au moment de la guerre de Cent Ans. A cette époque furent construites les grosses tours, les courtines, la galerie à mâchicoulis, les douves en eau. Forteresse imprenable raconte la chronique de l'époque; murs de 2,70 m d'épaisseur et hauts de 11 m, échauguettes, meurtrières.  En 1453, la bataille de Formigny met fin à cette période dangereuse, il n'est plus besoin de se protéger. Aussi la famille de Bricqueville bâtit-elle deux petites tours Renaissance, très décoratives. Au XVIIIe siècle, la forteresse se transforme en une ravissante demeure à l'ordonnance classique qui surprend le visiteur non averti, il faut encore agrandir pour loger la famille et les amis qui aiment, au XIXe et XXe siècle, profiter de la mer et de la campagne, loin des bruits de la ville; on transforme les écuries, les étables et la grange médiévale en logis, avec tous les agréments des jardins en bordure des douves.","habitants":"famille de Girardin,                                                                      famille de Bricqueville\r\n        \r\n        \"","divers":"La Colombières                                                                         GPS : 49° 18' 11\" Nord, 0° 58' 31,8\" Ouest","gps":"49° 18' 11\" Nord, 0° 58' 31,8\" Ouest","images":["../image/image_14/14_Colombi%c3%a8res_1.jpg","../image/image_14/14_Colombi%c3%a8res_2.jpg","../image/image_14/14_Colombi%c3%a8res_3.jpg","../image/image_14/14_Colombi%c3%a8res_4.jpg","../image/image_14/14_Colombi%c3%a8res_5.jpg","../image/image_14/14_Colombi%c3%a8res_6.jpg"]},"Consult_chateau_formulaire86e6":{"id":"Consult_chateau_formulaire86e6","dept":"14","canton":"Falaise","commune":"Corday","nom":"Corday","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article; Carabillon et Rapilly.                                   CARABILLON,  le château fut démoli en 1833 et 1837, vestiges des communs et logement daté 1760. Remplois de la grille remontée devant le portail sud de l'église de Saint-Gervais-de-Falaise, lambris remployés au château de Fourreaux le Val.                                                                             A cinq K.M à l'ouest RAPILLY, la construction du Château de Rapilly date du XVIIIe siècle. Il appartient depuis 2015 à Mr Xavier d'Alençon","architecture":"CARABILLON, a été élevé vers 1752 avec jardin et parc pour le comte de Mathan sur l'emplacement d'un ancien fief du même nom. Dans les statistiques de l'arrondissement de falaise, la propriété est décrite ainsi: \"on y arrive par une cour d'honneur que précède une longue grille. Sur l'arrière est un jardin en terrasse, régulier, semé de charmilles, et embelli de vases et de corbeilles sculptés, d'un assez beau travail. La façade du château simple et de bon goût est surmontée par les armes du comte de Mathan. L'édifice a deux étages au dessus du rez-de-chaussée, les cuisines sont au sous sol, les appartements sont doubles. Au pied des terrasses sont les basses cours, les remises, les écuries, les jardins, le parc et le petit étang. Le château a beaucoup été négligé dans les derniers temps\". Le colombier figurait sur le cadastre de 1829.","habitants":"Comte de Mathan\r\n        \r\n        \"","divers":"Deux châteaux dans cet article; Carabillon grav-3 et Rapilly grav 1-2.                                                                                             Rapilly  GPS : 48° 51' 29,7\" Nord, 0° 19' 58,7\" Ouest","gps":"48° 51' 29,7\" Nord, 0° 19' 58,7\" Ouest","images":["../image/image_14/14_Corday_1.jpg","../image/image_14/14_Corday_2.jpg","../image/image_14/14_Corday_3.jpg"]},"Consult_chateau_formulaire9b22":{"id":"Consult_chateau_formulaire9b22","dept":"14","canton":"Troarn","commune":"Airan","nom":"Coupigny","type":"Château","periode":"XVIII","histoire":"COUPIGNY, date du XVIIIe siècle. René Heuderie, seigneur d'Airan, avait fondé cette chapelle par contrat passé devant les tabellions de Saint-Sylvain, le 11 décembre 1672; elle était dotée de 20 acres de terre situées à Secqueville-la-Campagne. M. de Nesmoud, évêque de Bayeux, avait autorisé la fondation à condition qu'un prêtre y serait présenté par le seigneur. Un château assez remarquable s'élève au milieu de ce hameau; il appartient à M. le comte Borgarelly-d'Ison, ancien colonel, membre du Conseil général du Calvados. M. d'Ison a créé un très-joli parc sur le coteau qui domine la cour et les jardins du château. La chapelle dont je viens de parler se trouve enclavée dans ce parc et sert d'orangerie.","architecture":"COUPIGNY Le château fut construit à la fin du XVIIIe siècle pour Jean-Louis de Fribois, seigneur de Coupigny. Ruiné, celui-ci ne put en achevé l'édification, ses façades et ses toitures font lobjet dune inscription au titre des M.H.depuis le 21 juin 1927. Le parc du château de Coupigny fait également l'objet d'un recensement à l'inventaire général du patrimoine culturel. Le parc et sa belle allée de tilleuls, sont aussi inscrits aux M.H. le 21.06.1927.","habitants":"M. le comte Borgarelly-d'Ison\r\n        \"","divers":"Château de Coupigny GPS : 49° 05' 13\" Nord, 0° 09' 51\" Ouest","gps":"49° 05' 13\" Nord, 0° 09' 51\" Ouest","images":["../image/image_14/14_Coupigny_1.jpg"]},"Consult_chateau_formulaire26e2":{"id":"Consult_chateau_formulaire26e2","dept":"14","canton":"Falaise","commune":"Courcy","nom":"Courcy","type":"Vestiges","periode":"XIII-XVI","histoire":"COURCY, la fondation de la seigneurie de Courcy est attribuée à un certain Robert de Courcy, fils de Baudry le Teutonique (Baudric le Teuton), chevalier allemand entré au début du XIe siècle au service du duc de Normandie Richard II.  En 1091 ou 1092 a lieu le siège du château possession de Richard de Courcy, par son ennemi Robert II de Bellême que soutient son suzerain Robert Courteheuse dans le cadre de la guerre de succession qui l'oppose à son frère cadet Henri Ier Beauclerc. À la fin du XIVe siècle, la baronnie est entre les mains de Guillaume de Courcy, capitaine de Carentan puis de Parisnote. Au début du XVIe siècle, le château échoit à l'évêque de Coutances, Geoffroy Herbert, où il meurt en 1510, et le laisse à son frère Louis Herbert. Au début du XVIIe siècle, il passe par mariage aux Carbonel de Canisy. En 1619, ces derniers obtiennent le droit de réunir en marquisat leurs terres de Canisy, du Hommet et de Courcy.  C'est à la suite de la déclaration de Nantes, du 31 juillet 1626, par laquelle Louis XIII, sur le conseil de Richelieu, publie l'ordonnance « pour le rasement et démolition de toutes sortes de fortifications des villes et châteaux qui sont aux frontières et importants au royaume », que le château de Courcy est démantelé. Ayant perdu tout rôle militaire, il devient peu à peu une exploitation agricole.","architecture":"COURCY, c'est un ancien château fort du XIe siècle, aujourd'hui en ruine, dont les vestiges se dressent sur la commune française de Courcy dans le sud du département du Calvados, en région Normandie.L'ancien château fort, caractéristique de l'architecture militaire des XIIe??XIIIe siècles, est en danger du fait de l'absence de mesures de protection, alors même qu'il fait l'objet d'une inscription au titre des monuments historiques par arrêté du 7 février 1975. Il ne reste que des vestiges des deux enceintes du château féodal. Le premier château de Courcy fut probablement bâti de terre et de bois. La structure de la fortification était conçue avec une succession de trois enceintes (une enceinte entourant le village, une autre la basse-cour et la dernière constituant le cur de la forteresse) dont il ne subsiste que la dernière.  Entourée de fossés, la dernière enceinte de plan carrée était haute d'environ 10 mètres et flanqué par douze tours fortement talutés, dont il ne subsiste que neuf tours rondes et une tour carrée ayant  servi de donjon. Deux des tours formant l'entrée. En outre dans l'enceinte se situent les vestiges d'une chapelle Sainte-Catherine datable du XIe siècle,  ayant été  remaniée aux XVe?- XVIe siècles.","habitants":"Guillaume de Courcy\r\n        \"","divers":"Château de Courcy","gps":"","images":["../image/image_14/14_Courcy_1.jpg","../image/image_14/14_Courcy_2.jpg","../image/image_14/14_Courcy_3.jpg","../image/image_14/14_Courcy_4.jpg","../image/image_14/14_Courcy_5.jpg"]},"Consult_chateau_formulaire15d6":{"id":"Consult_chateau_formulaire15d6","dept":"14","canton":"Courseulles-sur-Mer","commune":"Courseulles sur mer","nom":"Courseulles","type":"Château","periode":"XIII-XVI","histoire":"Deux châteaux dans cet article, Courseulles et d'O. COURSEULLES, la construction  date du XIIe au XVIIe siècle. Initialement, c'était un château fort. Le château de Courseulles est de style Louis XIII puis Renaissance. Le château se situe à l'Ouest de l'agglomération de Courseulles-sur-Mer. C'est devenu un château de plaisance. Le corps de logis principal y compris la cheminée située au premier étage du pavillon de droite, est classé aux M.H. depuis 1910. Ancien château-fort du IXe siècle, il fut transformé à la fin du XVIe par François d'O et fin XVIIe siècle par Anne Morant. Classé monument historique en 1910. Anne et Michel Novoa ont décidé douvrir les portes de leur demeure aux visiteurs après quelques restaurations dans le bâtiment et les annexes, ceux ci ayant fortement souffert des outrages du temps et des bombardements de 1944. Leur reconstruction, dix ans plus tard, n'a cependant pas permis de récupérer nombre de remarquables éléments architecturaux, témoins pittoresques du premier château que François dO fit élever sur les bases de lancien édifice, ou encore des embellissements du XVIIe siècle.  Après de considérables investissements la demeure revit désormais au rythme des concerts et des galas qui y sont organisés. Vous pourrez admirer les magnifiques façades et les lucarnes sculptées au coeur d'un parc boisé d'un hectare.Propriété de monsieur Bouchon.\r\nÉléments protégés MH : le corps de logis principal y compris la cheminée située au premier étage du pavillon de droite : classement par arrêté du 19 novembre 1910.","architecture":"Le Château d'O est un château bâti à Courseulles-sur-Mer,  de style Louis XIII,  est devenu aujourd'hui un château résidentiel, qui vous propose des chambres d'hôtes agréables. Le château d'O est classé aux M.H. depuis le 19/11/1910. Le corps de logis principal y compris la cheminée située au 1er étage du pavillon de droite, est classé aux M.H.","habitants":"Famille de  François d'O                                                                                  Famille d'Anne Morant.\r\n        \"","divers":"Deux châteaux dans cet article, Courseulles et d'O grav 6.                                   GPS: 49° 19' 47,71\" Nord, 0° 27' 34,83\" Ouest","gps":"49° 19' 47,71\" Nord, 0° 27' 34,83\" Ouest","images":["../image/image_14/14_Courseulles_1.jpg","../image/image_14/14_Courseulles_2.jpg","../image/image_14/14_Courseulles_3.jpg","../image/image_14/14_Courseulles_4.jpg","../image/image_14/14_Courseulles_5.jpg"]},"Consult_chateau_formulaireea6a":{"id":"Consult_chateau_formulaireea6a","dept":"14","canton":"Caen","commune":"Creully","nom":"Creullet_Creully","type":"Château","periode":"XVII","histoire":"CREULLET,  ce château possède un seul étage et une haute toiture dans laquelle sencastre un fronton triangulaire. Cest avant tout une demeure de plaisance construite au début du XVIIe siècle, transformée quelques décennies plus tard et remaniée à plusieurs reprises. De vieux communs du XVe siècle subsistent, bien à part, mais compris cependant dans un bel ensemble, limités par une murette ornée de vases et de guirlandes de roses,  une balustrade court entre deux portiques, seulement interrompue dans sa partie centrale pour prolonger la perspective bien au-delà de la pièce deau, longue de 200 mètres. De toute la lignée des possesseurs du château, il est malaisé dattribuer à tel ou tel la part prise dans lélaboration de la délicieuse ordonnance du domaine que nous admirons aujourdhui. Ce fut oeuvre de longue haleine. Si certaines parties intérieures du château peuvent remonter au temps des derniers Le Héricy (début XVIIe siècle), puis par alliance passe au Quincé, leurs colonnes surmontées de pots à feu, pourraient être du temps des Quincé  passa aux Turgot et aux Crevel et en 1762 à Jacques-Thomas de Vauquelin, une de ses filles  épouse  Nicolas-Anne Morin de la Rivière, en 1829 le marquis cède Creullet à Casimir Guyon de Montlivault préfet du Calvados et conserve le domaine jusq'en 1841 date de l'acquisition pa la famille Rozée d'Infreville, dix ans plus tard achat de Creullet par les Labbey de Druval  et à sa soeur  madame  Adam de la Pommeraie et par héritage Creullet est  passé aux Moustier de Canchy.","architecture":"CREULLY, est un édifice construit entre le XIe et XVIIe siècle. Il connut tout au long des siècles de multiples transformations et aménagements. Vers 1050 le château ne ressemble pas à une forteresse défensive. C'est à la guerre de Cent Ans que le château de Creully se modifie en place forte, vers 1360. Son architecture va subir des démolition en reconstructions à chaque occupation anglaise ou française, au cours de cette période. La tour carrée est surélevée au XIVe siècle et construction de la tour de guet au XVe siècle, pont-levis devant lentrée du donjon, qui sera détruit plus tard (XVIe et XVIIe siècle), fortification de la façade et destruction dautres bâtiments susceptibles de mettre en danger les habitants en étant assiégés. Quand finit la guerre, vers 1450, le château retourne aux mains du baron de Creully. Le château est ensuite démoli, sur ordre de Louis XI en 1461, par simple jalousie. Aux XVIe et XVIIe siècle, les barons laménagent. Comblement du fossé intérieur et destruction du pont-levis, construction de la tourelle Renaissance et des grandes fenêtres sur la façade en période de paix. Les communs qui sont danciennes écuries datent du XVIIe siècle, 22 barons de la même famille vont se succéder dans la demeure de 1035 à 1682. En 1682, le dernier baron de Creully, Antoine V de Sillans, vend le château à Colbert, ministre de Louis XIV, qui meurt l'année suivante sans l'habiter. En 1682, occupation du site par la descendance de Colbert. A la Révolution, celui ci sera confisqué et vendu à différents riches propriétaires terriens. En 1946 achat par la commune.","habitants":"Creullet  Jacques-Thomas de Vauquelin,                                 Creully;  baron de Creully\r\n        \"","divers":"Creullet grav-1-2 Creully  grav 3 à 7 GPS : 47° 17' 10\" Nord, 0° 32' 22\" Ouest                                                                                   GPS : 49° 16' 41,9\" Nord, 0° 34' 40\" Ouest","gps":"47° 17' 10\" Nord, 0° 32' 22\" Ouest","images":["../image/image_14/14_Creullet_Creully_1.jpg","../image/image_14/14_Creullet_Creully_2.jpg","../image/image_14/14_Creullet_Creully_3.jpg","../image/image_14/14_Creullet_Creully_4.jpg","../image/image_14/14_Creullet_Creully_5.jpg","../image/image_14/14_Creullet_Creully_6.jpg","../image/image_14/14_Creullet_Creully_7.jpg","../image/image_14/14_Creullet_Creully_8.jpg"]},"Consult_chateau_formulaire76a7":{"id":"Consult_chateau_formulaire76a7","dept":"14","canton":"Mézidon-Canon","commune":"Crevecoeur en Auge","nom":"Crevecoeur","type":"Château","periode":"XII-XV-XVI","histoire":"CREVECOEUR,  en 1195, Jehan de Crèvecur est le premier seigneur connu du lieu. Au XIIe siècle,  la place est prise pendant la guerre de cent ans (1417) par le Duc de Clarence qui démantèle le donjon. Crèvecur passe alors sous domination anglaise et sir Kirkeley en devient le seigneur. En 1448, Dunois aidé des comtes de Clermont et de Nevers, reprend la forteresse aux anglais. Par le biais des alliances, le domaine échoit, en 1522, à la famille Montmorency qui le conservera jusquà la Révolution. Les seigneurs du lieu relèvent le donjon et, au XVe siècle, un nouveau logis remplace celui détruit par les anglais. Au XVIe siècle, une grange est ajoutée à louest près des fossés. A la Révolution, le donjon est à nouveau détruit et Crèvecur est vendu comme bien national. La famille Masqurerier  à partir de 1794. Ses divers propriétaires laissent ensuite le domaine tomber en désuétude.  Le logis est occupé jusquen 1970 où le château est acheté par la fondation Schlumberger qui entreprend la restauration du domaine. Le logis seigneurial et ses dépendances restaurés abritent un espace muséographique dont une grande partie est consacrée à luvre de Conrad et Marcel Schlumberger pionniers de nouvelles techniques de prospection pétrolière quils expérimentèrent dans la propriété familiale du Val Richer, non loin de Crèvecur.","architecture":"CREVECOEUR, la forteresse primitive, entre la cité ducale de Caen et Paris, est un endroit stratégique important. Au XIIe siècle, elle se présente comme une place forte de lépoque avec ses deux enceintes entourées de fossés. La basse-cour, enclose dune palissade de bois, est défendue par une poterne et un pont-levis. Elle abrite les communs du château. Entourée de douves qui ont retrouvé leur aspect originel, la deuxième enceinte dessine un carré de 25 m de côté que dominent encore les vestiges des remparts. Les fossés se franchissent par un pont dormant, remplaçant le pont-levis dautrefois flanqué de deux hauts murs parallèles. A lintérieur, le logis seigneurial du XVe siècle est adossé au mur ouest. Portées par un premier niveau en maçonnerie, cinq travées à pans de bois sélèvent sur deux étages, coiffées dune haute toiture en tuiles plates. Le rez-de-chaussée accueille une exposition sur lhistoire du château tandis que le premier étage est consacré à la vie dun seigneur au moyen-âge. Dans la cour, le vieux puits qui a perdu sa couv
