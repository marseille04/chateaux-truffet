erture trône toujours accompagné dun vieil érable ceinturé dune margelle en pierre. Sur les murs tout autour, se devinent les traces danciennes constructions : donjon au sud ou logements de part et dautre de la porte dentrée. A lextérieur de lenceinte, à lest, la chapelle romane abrite aujourdhui une exposition dédiée aux collaborateurs des frères Schlumberger. La fondation Schlumberger a magnifiquement sauvé le château. Les bâtiments sont un exemple de restauration, les douves ont été recreusées et renforcées de palplanches en bois et tout lensemble est aménagé pour la visite.","habitants":"famille Montmorency\r\n        \"","divers":"Crevecoeur gps 49° 07' 21\" N, 0° 00' 42\" Est","gps":"","images":["../image/image_14/14_Crevecoeur_1.jpg","../image/image_14/14_Crevecoeur_2.jpg","../image/image_14/14_Crevecoeur_3.jpg","../image/image_14/14_Crevecoeur_4.jpg","../image/image_14/14_Crevecoeur_5.jpg"]},"Consult_chateau_formulaire97ae":{"id":"Consult_chateau_formulaire97ae","dept":"14","canton":"Cabourg","commune":"Criqueville en Auge","nom":"Cricqueville","type":"Forteresse","periode":"XVII","histoire":"CRICQUEVILLE en AUGE, la seigneurie de Criqueville passe au XVe siècle dans la famille de Launay , Robert de Launay reconstruit  à la fin du XVIe siècle (date 1584 sur une cheminée) au XVIIe siècle le château passe dans la famille de Bence  et échoit par héritage en 1773 à Philippe-Guillaume Jacquier  de Vieils-Maisons, en  1819 acquis par Jean-François Goupil qui revent le château en 1847 à monsieur Chevalier dont ses descendants, Raoul Lecoeur le possède toujours.","architecture":"CRICQUEVILLE,  dans le goût de la Renaissance finissante (appareillage de briques et pierres de taille disposées en échiquier). Deux des trois tours sont reliées par une galerie ouverte. La façade sud a été modifiée à la fin du XVIIIe siècle. L'intérieur conserve un ensemble exceptionnel de cheminées datant de la fin du XVIe siècle (décor de cariatides aux allures exotiques). Éléments protégés MH : le château, à l'exclusion des parties classées : inscription par arrêté du 9 février 1927. Les façades, à l'exclusion de la façade postérieure, et des toitures correspondantes : classement par arrêté du 9 septembre 1965. Les façades et les toitures des communs : inscription par arrêté du 16 décembre 1996. Les quatre cheminées du XVIe siècle (l'une au rez-de-chaussée adossée au mur pignon et les trois autres à l'étage) : classement par arrêté du 17 juillet 1997.","habitants":"Famille de Launay\r\n        \"","divers":"Cricqueville grav -1-2-  GPS : 49° 14' 28,65\" Nord, 0° 03' 50,38\" Ouest\r\n49° 14' 29\" N, 0° 03' 50\" Ouest","gps":"49° 14' 28,65\" Nord, 0° 03' 50,38\" Ouest","images":["../image/image_14/14_Cricqueville_1.jpg","../image/image_14/14_Cricqueville_2.jpg"]},"Consult_chateau_formulairead4f":{"id":"Consult_chateau_formulairead4f","dept":"14","canton":"Bayeux","commune":"Monceaux-en-Bessin","nom":"Crémel","type":"Manoir","periode":"XVII","histoire":"CREMEL, manoir actuel à Jean Le Patou, sieur de la Montagne, président en lélection de Bayeux. Jean Le Patou est devenu propriétaire du domaine aux portes de Bayeux le 20 avril 1638, en garantie dun prêt quil avait octroyé et qui navait pu être remboursé. Il reste quelques éléments datant de la construction précédente. C'est son fils, également nommé Jean le Patou, sieur de Crémel et comme son père conseiller en la cour des aides de Rouen. À sa mort en 1670, à la suite de ses soucis judiciaires, Crémel fut adjugé par le bailliage de Bayeux le 3 novembre 1674 au profit de Bernardin Gigault de Bellefonds (1630-1694), maréchal de France, marquis de Bellefonds. Son fils Louis Christophe, mort au combat en 1692, a épousé Marie Olympe Mazarin, fille dHortense Mancini. La cinquième génération, au travers de Charles Paul de Beauvilliers, grand d'Espagne, dernier duc de Saint-Aignan, comte de Buzançais (1746-1828) vendra Crémel le 5 juillet 1771 à Hervé Guillaume dAigneaux (1748-1816). Selon Bernard Gourbin, c'est la famille de la Bigne qui est au XVIIIe siècle en possession du manoir et qui le conservera jusque dans la première moitié du XIXe siècle. À son décès, Crémel sera attribué à sa fille, Césarine dAigneaux (1784-1804), par un tirage au sort le 21 février 1818. De son union avec Charles François Louis, baron de Sallen, naîtra en 1804 Charles Guillaume Léon de Sallen. Ce dernier vendra Crémel le 4 août 1846, à Guillaume Mayet. Crémel est resté depuis dans la même famille.  De 1670 à 2000, la ferme-manoir a toujours été donnée en fermage et na donc jamais été habitée par ses propriétaires.","architecture":"CREMEL  laccès seffectue par un porche monumental constitué dune entrée charretière et dune entrée piétonnière surveillées par deux bretèches pour assurer sa  défense. Sur le corps du logis, une fenêtre est surmontée dun linteau à bossages, portant couronne et rubans dessinant un coeur sur un fond de sculpture en nid dabeilles. La toiture est agrémentée de cheminées sur lesquelles on retrouve le décor à frontons triangulaires représentatif de larchitecture du XVIIe siècle dans le Bessin. La construction du château date de 1642. Édifié à lest de la cour, le manoir permettait de surveiller lensemble des bâtiments annexes. Ce logis à un étage est percé de six baies irrégulièrement disposées. Cette importante construction en moellons calcaires est de plan rectangulaire, flanquée à larrière dune massive tour carrée ceinturée de cinq bandeaux de pierre horizontaux, et couverte dun très haut toit indépendant en hache à quatre versants très inclinés avec à larrière une petite échauguette permettant de surveiller les champs. Outre les bandeaux de pierre et la corniche à modillons, le décor est principalement constitué par les cheminées et les lucarnes. Le toit présente dimportantes proportions avec quatre souches de cheminées qui dominent le faîtage. Ces dernières sont hautes et solides, ornées aux angles dun bel appareil en harpe et pourvues au sommet de quatre petits frontons. Laustérité de lardoise est relevée par des crêtes, des épis de faîtage en céramique.","habitants":"Jean le Patou,  Famille de Charles François Louis, baron de Sallen,\r\n        \"","divers":"Châteaux de Crémel gps49° 15' 55\" N, 0° 41' 41\" Ouest","gps":"","images":["../image/image_14/14_Cr%c3%a9mel_1.jpg","../image/image_14/14_Cr%c3%a9mel_2.jpg"]},"Consult_chateau_formulaire2bf1":{"id":"Consult_chateau_formulaire2bf1","dept":"14","canton":"Courseulles-sur-Mer","commune":"Crépon","nom":"Crépon","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article; Crépon, Blais et Nathan.                                 BLAIS, au nord est de Bayeux le château occupant  le site du château-fort de la baronnie de Crépon fondée par Osbern de Crépon, sénéchal de Normandie, assassiné vers 1040. Logis construit au XVIIe siècle, au XVIIIe siècle, il est entièrement repris pour la famille de Blais (nom gravé au-dessus de la porte), remploi d'un décor datant peut-être du XVIe siècle sur la travée centrale, édification des ailes et aménagement du jardin régulier. Fin du XVIIIe ou début XIXe siècle établissement d'un logement à l'extrémité Est de l'aile du pressoir. Au XIXe siècle, réaménagement intérieur du logis, comblement des douves fermant la cour à l'ouest, aile sud restaurée récemment à la suite d'un incendie. Logis en moellon enduit, élévations sur cour et sur jardin à travées, logement: en moellon enduit, chaîne à bossage, élévations sud et est à travées.                                                                             CREPON, logis et écuries construits à la fin du XVIIe siècle ou dans les premières années du XVIIIe siècle  par l'architecte non identifié du château de la Perquette à Bellengreville (les façades identiques); en 1801, édification du corps des communs, et de la remise pour Michel Costé de Donveville, juge de paix du canton, et pour son épouse Marguerite Amie (porte date et inscription).","architecture":"NATHAN, date de la 1re moitié du XVIIe au 1re moitié du XVIIIe siècle. La construction initiale remonte à 1605, où le premier corps de bâtiment fut construit, avec un passage cocher, aujourd'hui, disparu. Le manoir de Mathan appartenait alors à la Famille Hüe de Mathan, qui lui donna son nom. Il était composé d'un logis, et d'un cellier. Un bassin, alimenté par un ruisseau, coulait sur ses terres, complétant l'ensemble. Ce bâtiment se caractérise par un escalier en pierre monumental, ainsi que par des frontons surbaissés (en forme de triangles aplatis) qui surmontent les portes et l'entrée principale. Un siècle après sa construction, Manoir de Mathan fut doublé en longueur sur la partie Ouest. Puis on lui rajouta une grange, une remise et des écuries afin de l'organiser autour d'une cour carrée qui est sa structure actuelle. Il fut ensuite surélevé et le nouveau porche d'entrée fut construit. Au milieu de la cour, une fontaine à pompe a été conservée. Le manoir de Mathan est signalé dans l'inventaire général du patrimoine culturel de Basse-Normandie,  se situe route de Bayeux, appartient à Koen et Isabelle Sileghem. C'est devenu un Hôtel de Charme.                                                                                                                     CREPON, c'est les Crépon qui rajoutent à cette époque, les ailes du logis portent le monogramme A.D. sur l'aile est, A.C. sur l'aile ouest; courant du XIXe siècle suppression de la cour d'honneur, aménagement d'un jardin paysager et au XXe siècle destruction du mur de clôture lors de l'élargissement des voies au nord est et au sud. Logis, sous sol partiel, avant corps en pierre de taille, enduit d'origine à petits galets sur la façade principale, sable pour le soubassement, rouge pour la partie supérieure, façades nord-ouest et sud-est ordonnancées ; puits en pierre de taille.","habitants":"famille de Blais                                                                             Crépon Michel Costé de Donveville                                       Famille Hüe de Mathan\r\n        \r\n        \"","divers":"deux châteaux dans cet article; Blais grav -1 et Nathan grav 2-3-4.     Nathan GPS : 49° 18' 52\" Nord, 0° 33' 08\" Ouest     Crépon grav-5   GPS : 49° 18' 45,35\" Nord, 0° 32' 57,42\" Ouest","gps":"49° 18' 52\" Nord, 0° 33' 08\" Ouest     Crépon grav-5   GPS :","images":["../image/image_14/14_Cr%c3%a9pon_1.jpg","../image/image_14/14_Cr%c3%a9pon_2.jpg","../image/image_14/14_Cr%c3%a9pon_3.jpg","../image/image_14/14_Cr%c3%a9pon_4.jpg","../image/image_14/14_Cr%c3%a9pon_5.jpg"]},"Consult_chateau_formulaire15f8":{"id":"Consult_chateau_formulaire15f8","dept":"14","canton":"Aunay-sur-Odon","commune":"Dampierre","nom":"Dampierre_14","type":"Château","periode":"XVI-XVII","histoire":"DAMPIERRE,  fief des  des Longaunay seigneur de Dampierre et d'autres, mourut en 1590 tué à la bataille  d'Yvry, Hervé de Longaunay fidèle à Henri IV  et autre rois  devenu lieutenant de basse Normandie, il eu deux fils  avec  Catherine de Surreau.  Au XIVe siècle, Girette  de Dampierre, apporte par mariage la seigneurie de Dampierre à Hébert Thésart. Au XVe siècle, Marie Thésart leurs arrière-petite-fille, apporte par mariage la seigneurie de Dampierre à Nicolas de Silly. Au XVIe siècle, après leur fils François de Silly et leur petite-fille Jacqueline, la seigneurie de Dampierre passe au main de Hervé de Longaulnay (demi-frère de François de Silly) et elle restera dans cette famille jusqu'au XIXe siècle. Depuis le 1er janvier 2017, la commune de Dampierre s'est regroupée avec celles de La Lande-sur-Drôme, Saint-Jean-des-Essartiers et Sept-Vents pour former la commune nouvelle de Val de Drôme, dont le chef-lieu se situe à Sept-Vents, oeuvre de l'architecte François Gabriel, le premier de la lignée des Gabriel, architectes royaux, Le château est au XIXe siècle la possession du marquis de Briges, d'une ancienne famille de Lozère, qui possède en Basse-Normandie de nombreuses propriétés.\r\nÉléments protégés MH : le château de Dampierre, les dépendances, les accès, la porterie et le colombier : classement par arrêté du 26 septembre 2000.","architecture":"DAMPIERRE, date du XVIIe siècle. Le château forme avec sa porterie et son colombier un ensemble architectural du début du XVIIe siècle, parfaitement équilibré et original par l'association des ses matériaux colorés, pierre, brique, granit  qui composent une architecture en filigrane, très maniériste, de style italien. La porterie et le colombier sont  l'oeuvre de l'architecte François Gabriel, le premier de la lignée des Gabriel, architectes royaux, comme l'atteste une procuration du 19.07.1610,  passée devant les tabellions de Torigni. Situés à l'est du château en bordure de la cour dite du fer à cheval, ils étaient autrefois rattachés par des bâtiments. La porterie  en fait une fabrique de jardin, au rôle purement décoratif  comprenait trois portes, une charretière et deux piétonnières, délimitant trois travées surmontées de trois lucarnes. Le colombier est constitué de lits de brique et de grès rouge en alternance, finissant par une corniche à modillons ; il a conservé l'ensemble de ses boulins. Le château de Dampierre a été très remanié au début du XIXe siècle reconstruction du pavillon central dans les années 1970.","habitants":"Famille d'Hébert Thésart.\r\n        \"","divers":"Dampierre  GPS : 49° 02' 21\" Nord, 0° 51' 49\" Ouest","gps":"49° 02' 21\" Nord, 0° 51' 49\" Ouest","images":["../image/image_14/14_Dampierre_14_1.jpg","../image/image_14/14_Dampierre_14_2.jpg"]},"Consult_chateau_formulaire0ea4":{"id":"Consult_chateau_formulaire0ea4","dept":"14","canton":"Bayeux","commune":"Esquay sur Seulles","nom":"Esquay","type":"Château","periode":"XVII","histoire":"ESQUAY,  ancien fief de la famille d'Esquay, passé à celle de Pierrepont vers 1529, Pierre de Pierrepont épouse Jeanne de la Servaisière en 1626. Château  construit par la famille de Pierrepont au début du XVIIe siècle: salle portant leurs initiales.  Au XVIIIe siècle, passe aux Marguerie, échue ensuite au marquis de Bricqueville qui acceuille en 1778  le futur duc de Coigny , vendu au début de la Révolution aux les Creps qui le cèdent au grand séminaire de Saint-Sulpice et en 1860,  restauration du château par le baron Gustave Dauger qui l'acquiert vers 1861, ancêtre des propriétaires actuels, le domaine est resté dans la descendance et appartient depuis quatre générations aux Beaudenet d'Annoux.","architecture":"ESQUAY, sa construction date du XVIIe siècle,  nouveaux décors intérieurs, modifications des allégés des fenêtres, Logis en moellon, enduit sur la façade principale, jambes, chaînes et travées de fenêtres de la façade principale en pierre de taille ordonnancée, sous-sol voûté en berceau, excepté la cuisine voûtée d'arêtes. Partie centrale du logis couverte d'un toit en carène avant les transformations du XIXe siècle et dominée par un campanile à toit à l'impériale ; perron en fer à cheval, porté par une voûte en berceau en pierre de taille à deux niches en pénétration, grand escalier, volées voûtées en berceau, repos voûtés d'arêtes en pierre de taille, paliers couverts de voûtes en pierre de taille combinant berceau, arêtes et voûte plate, escalier secondaire en vis. Suppression du toit en carène du logis et établissement d'un toit continu, destruction des balustrades du perron, dans les années 1980 rétablissement de la division tripartite du toit du logis. Eléments de fortification :pont-levis remplacé par un pont dormant, construction des pavillons, au cour du XIXe siècle démolition d'une partie des communs puis restauration du château par le baron Gustave Dauger qui l'acquiert vers 1861 fossé contre la façade postérieure, meurtrières à rotule, mâchicoulis sur les façades latérales dont deux seulement par côté sont réelles, premières ailes latérales, façades principales en moellon enduit avec jambes et chaînes en pierre de taille, échauguettes couvertes d'un dôme carré en pierre, moellon enduit et pierre de taille, toit à l'impériale. Inscription par arrêté du 2 juillet 1927.","habitants":"famille de Pierrepont.   marquis de Bricqueville\r\n        \"","divers":"Esquay GPS : 49° 16' 22,88\" Nord, 0° 37' 1,77\" Ouest","gps":"49° 16' 22,88\" Nord, 0° 37' 1,77\" Ouest","images":["../image/image_14/14_Esquay_1.jpg","../image/image_14/14_Esquay_2.jpg"]},"Consult_chateau_formulaire6bc9":{"id":"Consult_chateau_formulaire6bc9","dept":"14","canton":"Falaise","commune":"Falaise","nom":"Falaise","type":"Château","periode":"XIII-XVII","histoire":"Cinq châteaux dans cet article dont Falaise, Fresnaye, Mesnil-Besnard ,  Rives.                                                                                               FALAISE, se situe Place Guillaume le Conquérant, date du XIIIe et XVIIe siècle. C'est un ancien château, restauré, de style médiéval, anglo-normand. Il est classé aux M.H. depuis 1840.                                                                                                     FRESNAYE, en 1640, Nicolas Vauquelin seigneur de Nécy achète la Fresnaye \"consistant en une maison manable et autres bâtiments\", en 1678 la Fresnaye comprend trois corps de logis dont un seul subsiste, devant lequel a été construit vers 1750 le château actuel; augmenté d'une travée à l'est au XXe siècle; commun des XVIIe et XVIIIe siècles. Extrait de statistique arrondissement de Falaise : le quartier de la Fresnaye se compose presque uniquement, pour ainsi dire, du joli château de ce nom, qui se trouve sur le bord de la grande voie publique, entre Falaise et Guibray, et qui s'élève sur un vaste emplacement de plus de 14 hectares, Éléments protégés MH : le château sauf les parties classées : inscription par arrêté du 7 septembre 1945. La façade principale et la couverture, au rez-de-chaussée la bibliothèque et l'escalier, au premier étage la salle à manger, le premier salon, les trois pièces à décor Louis XV, à savoir le grand salon avec les deux consoles,  classement par arrêté du 5 août 1958, a été habité, fin du XIXe siècle, par Charles Ernest Paulmier, Député de la circonscription de Falaise, de 1885 à 1907.","architecture":"MESNIL-BESNARD, l'édifice est daté du XVIe siècle-XVIIe siècle;                                                                                                              A 3 K.M. au sud à  CORDEY,  le manoir dotée d'un sauna et d'une piscine intérieure saisonnière, la Ferme-château de Cordey est située à Cordey, à 8 minutes de la route de Falaise. C'est un château magnifique et restauré avec beaucoup de goût. Ses hôtes sont chaleureux. C'est un endroit charmant, rempli d'histoire.                                                                                   Porte des CORDELIERS est une porte de ville, bâtie Rue des Cordeliers à Falaise, dans le département du Calvados, en région Normandie, en France. Elle permettait d'entrer dans la ville. La Porte des Cordeliers a été classée aux M.H. en 1930.                                                                              RIVES, au IXe siècle, fondation de la paroisse Sainte-Trinité et tous les saints à Falaise ; Guibray, bourg indépendant avec sa propre église: Sainte-Marie. Aux XIe et XIIe siècles, développement de la ville devenue ducale : création d'une enceinte, d'une nouvelle paroisse Saint-Gervais Saint-Protais à l'intérieur des murs, développement du faubourg Saint-Laurent dès 1123, construction du château et de son enceinte ; au début du XIIIe siècle, la ville est à l'apogée de son développement, Guibray est le siège de foires importantes, au XVIe siècle, nouvel essor après la guerre de Cent Ans. Le château de Rives a été construit dans le quatrième quart du XVIIIe siècle, les parties agricoles datent du troisième quart du XVIIe siècle, baie datée de 1674, remaniées en 1786. Le château est inscrit au  MH en 1967.","habitants":"\"","divers":"Cinq châteaux dans cet article dont Cordey, grav 3 Falaise grav-1, Fresnaye grav-2, Mesnil-Besnard grav-4 ,Rives  grav-5.                                                                                           Falaise  gps: 48° 53' 35,52\" Nord, 0° 12' 14,04\" Ouest     \r\nGps 48° 53' 36? N, 0° 12' 14 Ouest                                        Cordey  GPS : 48° 51' 03\" Nord, 0° 13' 43\" Ouest                                                                                 porte des cordeliers grav 1 gps : 48° 53' 51,95\" Nord, 0° 12' 4,02\" Ouest","gps":"48° 53' 35,52\" Nord, 0° 12' 14,04\" Ouest","images":["../image/image_14/14_Falaise_1.jpg","../image/image_14/14_Falaise_2.jpg","../image/image_14/14_Falaise_3.jpg","../image/image_14/14_Falaise_4.jpg","../image/image_14/14_Falaise_5.jpg","../image/image_14/14_Falaise_6.jpg","../image/image_14/14_Falaise_7.jpg"]},"Consult_chateau_formulaire104e":{"id":"Consult_chateau_formulaire104e","dept":"14","canton":"Falaise","commune":"Falaise","nom":"Falaise_II","type":"Forteresse","periode":"XII-XV","histoire":"FALAISE, il ne subsiste aujourdhui que de faibles traces du donjon de Guillaume et cest à Henry Ier \"Beauclerc\", son dernier fils, que nous devons la construction du plus ancien des bâtiments en 1123. Ce bâtiment constitue aujourdhui la place forte de la haute cour. Devenu roi dAngleterre, il sinspire directement des forteresses anglaises pour rénover le château familial de Falaise: il en reproduit le plan carré, avec la partition par étage, laménagement despaces intérieurs voués à la résidence du seigneur et laccès bien défendu par un escalier menant à létage et protégé par un avant corps, le grand donjon de Falaise est une forteresse anglo-normande. A la mort d'Henry Ier, de nouveaux conflits secouent le royaume pendant vingt ans. Mathilde, sa fille et Etienne de Blois, son neveu disparaissent à leur tour, et cest Henry II Plantagenêt, le fils de Mathilde qui hérite  du titre de duc et de roi. Son mariage avec Aliénor dAquitaine le place à la tête dun vaste domaine. Nous sommes en 1154, jamais le royaume anglo-normand, quon appelle aussi lempire Plantagenêt, na été aussi fort. Ce territoire va  susciter la convoitise du Roi de France, dont le propre domaine est bien moindre. A cette même période, le château de Falaise sagrandit du petit donjon. Il protège le front ouest de la forteresse et il est aménagé en résidence. A la fin du XIIe siècle, le Roi de France Philippe Auguste soppose aux ducs normands, Henry II tout dabord, puis ses fils, Richard Cur de Lion et Jean sans Terre, cest contre ce dernier quil obtiendra une victoire décisive, la Normandie devient française. En 1204, lannexion du duché Normand au royaume de France met donc fin à la saga des ducs. Le nouveau maître de Normandie a besoin dappuis locaux,  il se montre très conciliant avec les falaisiens et reconstruit nombre de bâtiments détruits pendant le siège.","architecture":"FALAISE,  dans lenceinte, Philippe Auguste aménage un châtelet qui remplace lancienne tour qui mène aux donjons. Il flanque les remparts de tours et fait construire un logis vicomtal le long du rempart nord. loccupation anglaise qui débute en 1418 relance un important programme de restaurations et daménagements militaires dans lenceinte, ainsi que la construction de salles attribuées aux nouveaux administrateurs de la ville et de la vicomté. 15 tours de flanquement protègent les remparts du château-fort. On aménage des ouvertures adaptées aux nouvelles techniques de combat, des canonnières. Le XVIe siècle est durement marqué par les guerres de Religion, le couronnement de Henri IV, Roi de France, protestant, va provoquer des conflits en Normandie, la ville de Falaise, hostile au nouveau Roi, subit un siège sévère, en janvier 1590, les armées royales détruisent le rempart ouest de lenceinte castrale. Quelques jours après, le gouverneur de Falaise se rend; en même temps que le rôle militaire du château disparaît. Le déclin amorcé se confirme, les bâtiments se dégradent. Les XVIIe et XVIIIe siècles, sont ceux dun développement général de léconomie de la ville. Les portes de lenceinte urbaine, symboles des défenses médiévales, sont rasées, on aménage de nouveaux espaces urbains. Au XVIIIe siècle, on procède à dimportants travaux. Les fossés sont comblés. Les toitures des donjons seffondrent, il est envisagé de les faire raser, mais le coût des travaux est si élevé quon y renonce, en 1790, on élève des arcades dans le vestibule du logis, la chapelle castrale est partiellement détruite et les donjons sont abandonnés. Le troisième des donjons du château, voit le jour, cest une tour de défense cylindrique, plus adaptée au siège, et qui, haute de trente mètres, symbolise son pouvoir. Ce ne sera quen 1840, par la volonté du premier ministre des \"Beaux Arts\", Prosper Mérimée, on classe le château.","habitants":"Roi de France\r\n        \"","divers":"Forteresse de Falaise GPS : 48° 53' 36\" Nord, 0° 12' 14\" Ouest","gps":"48° 53' 36\" Nord, 0° 12' 14\" Ouest","images":["../image/image_14/14_Falaise_II_1.jpg","../image/image_14/14_Falaise_II_2.jpg","../image/image_14/14_Falaise_II_3.jpg","../image/image_14/14_Falaise_II_4.jpg","../image/image_14/14_Falaise_II_5.jpg","../image/image_14/14_Falaise_II_6.jpg","../image/image_14/14_Falaise_II_7.jpg","../image/image_14/14_Falaise_II_8.jpg"]},"Consult_chateau_formulairef2da":{"id":"Consult_chateau_formulairef2da","dept":"14","canton":"Pont-l","commune":"Fauguernon","nom":"Fauguernon","type":"Château","periode":"XVI","histoire":"COMBRAY, le château primitif de Combray a été construit au XVIe siècle. Le château actuel, de style Louis XIII, date du milieu du XIXe siècle. Après 1965, le propriétaire du château, mort, décidait de léguer à l'institut Pasteur cet important domaine de 140 ha.  Il appartient aujourd'hui à un propriétaire privé.  Éléments protégés MH : le portail d'entrée et sa tourelle, les façades et les toitures du colombier de la ferme du château : inscription par arrêté du 4 octobre 1972.","architecture":"FAUGUERNON, dès le IXe siècle le site de Fauguernon, situé à un point stratégique entre le plateau du Lieuvin et la vallée de la Touques, est fortifié contre les invasions scandinaves. Un siècle plus tard, Fauguernon est un grand fief du duché mais le château fut en partie démantelé au XIIe siècle par Geoffroy Plantagenêt, puis au XVIe siècle par le gouverneur de Normandie. Les ruines de la forteresse conservent les vestiges d'une double enceinte dont la basse-cour est occupée par une exploitation agricole. L'enceinte intérieure formée d'épaisses murailles renforcées de sept tours est construite sur un éperon rocheux et entourée de profonds fossés. Elle est accessible au nord par une tour-porte. Parmi les vestiges du château, on remarque encore des pans de murs fort épais, les restes d'une tour et des souterrains.\r\nÉléments protégés MH : les restes du château : inscription par arrêté du 16 octobre 1930.","habitants":"Famille de Fauguernon\r\n        \"","divers":"Combray grav 1-2-3  Fauguernon grav 4\r\nGps 49° 11' 29\" nord, 0° 16' 06\" est","gps":"","images":["../image/image_14/14_Fauguernon_1.jpg","../image/image_14/14_Fauguernon_2.jpg","../image/image_14/14_Fauguernon_3.jpg","../image/image_14/14_Fauguernon_4.jpg"]},"Consult_chateau_formulaire6ad6":{"id":"Consult_chateau_formulaire6ad6","dept":"14","canton":"Bayeux","commune":"Vaux sur aure","nom":"Ferrière_14","type":"Château","periode":"XVIII","histoire":"FERRIERE, est un bel et simple édifice classique d'époque Louis XV, en pierre blonde de Creully, encadré de grandes ailes de communs de la même époque, au cur d'un parc paysager et le pont sur l'Aure. Il a été bâti en 1735 sur les vestiges d'un château féodal du XVe siècle, par Jacqueline Piedoue de Nerval, veuve d'un écuyer de Louis XV. Il fut de 1762 à 1788, la propriété d'un botaniste de Caen, Gabriel Moisson, qui y mena d'intéressantes expériences botaniques:  Moisson de Vaux cultiva aussi la pomme de terre dans le secret de son immense jardin potager clos de murs. Aimé et respecté de la population, il ne fut pas inquiété durant la Révolution, élu Président du district de Bayeux, député du Calvados avant de s'installer à Caen, dont il devint maire. La société d'agriculture de Caen, dont il était vice président, publia un magnifique éloge funéraire de Moisson de Vaux, en 1807. En tant que botaniste, on doit à Moisson de Vaux la plantation du \"platane de la Liberté\" à Bayeux sous la Révolution (les multiples frères jumeaux de ce platane sont encore en place, intacts dans le parc de la Ferrière) ainsi que le noyau des collections de l'actuel jardin Botanique de Bayeux. Au XIXe siècle, le château fut la propriété du Comte François-Joseph de Toustain de Richebourg puis de son fils Henri Marie, historien proche de Viollet-le-Duc et ami d'Arcisse de Caumont.","architecture":"FERRIERE, ils agrandirent le parc entre 1819 et 1855 en annexant la route de Vaux, qu'ils déplacèrent 50 m plus au nord . Cela leur permit de créer un vaste parc à l'anglaise. Le comte restaura l'église de Vaux sur Aure dans le style roman remis à l'honneur par Arcisse de Caumont. Il remodela la vallée de l'Aure qui entoure cette église pour englober le village tout entier dans le parc du château, abolissant la frontière entre le parc botanique, le village et les champs. A la fin du XIXe siècle, le château devint la propriété du Baron Alfred Issaverdens, né à Smyrne en Turquie et conseiller du Khédive d'Egypte. Son fils le Baron Georges fut maire de Vaux sur Aure.  Le château de la Ferrière fut ensuite acquis par Monsieur Bauer, dont les héritiers le vendirent après la dernière guerre aux soeurs Bénédictines de Caen qui fuyaient les bombardements. Elles y demeurèrent jusqu'en 1958.  La MSA l'acheta à cette date, le loua à l'ADAPT de 1966 à 2007 puis le revendit. C'est à nouveau, depuis 2008, une propriété privée. Le parc botanique de dix-sept hectares, en cours de restauration, renoue avec son histoire en s'ouvrant désormais à la visite. En 2011, un jardin du nouveau monde est planté pour perpétuer les liens d'amitié entre la France et les Etats Unis. Ce jardin, encore dans son enfance, présente sur un ha un choix de végétaux importés d'Amérique entre 1776 et 1945. Situés à 3 kilomètres des falaises du débarquement, le château présente deux visages assez contrastés.","habitants":"Comte François Joseph de Toustain de Richebourg \r\n        \"","divers":"château de la Ferrière gps  49° 18' 15\" N, 0° 41' 59\" Ouest","gps":"","images":["../image/image_14/14_Ferri%c3%a8re_14_1.jpg","../image/image_14/14_Ferri%c3%a8re_14_2.jpg","../image/image_14/14_Ferri%c3%a8re_14_3.jpg","../image/image_14/14_Ferri%c3%a8re_14_4.jpg"]},"Consult_chateau_formulaire225c":{"id":"Consult_chateau_formulaire225c","dept":"14","canton":"Livarot","commune":"Fervaques","nom":"Fervaques","type":"Château","periode":"XIV-XVI-XVII","histoire":"Deux châteaux à Fervaques ; Kinnor ou Fervaques.                      KINNOR, ce Joyau archéologique est l'oeuvre du grand architecte d'Argentan, construit de 1597 à 1602 à l'emplacement d'un ancien manoir. L'édifice comprend un long corps de logis flanqué de deux pavillons très allégés par les pierres en bossage qui s'impriment sur la brique et l'enduit rose. Il se divise donc en deux périodes distinctes, l'aile en retour dit le manoir des XIVe et XVe siècles avec sa façade Renaissance et le château de la fin du XVIe siècle. Le manoir abrite la chambre où séjourna Henri IV en 1590. En 1803, le domaine se trouvant sans héritier, Chateaubriand, demanda à l'une de ses égéries, Delphine de Custine, marquise de Sabran, d'acheter cette demeure. \"La Reine des Roses\", appelée ainsi à la cour de Louis XV à Versailles, tant sa grâce était radieuse, admirait, adulait Chateaubriand.  La modernisation du décor intérieur et l'ajout de l'escalier à double révolution sont intervenus pendant le XIXe siècle. Malgré ces modifications au XIXe siècle, l'importance de l'édifice a été soulignée par Ruprich-Robert dès 1925.\r\nÉléments protégés MH : le château, la poterne, les vestiges du colombier, le pont sur la Touques, le parc avec ses douves et son système hydraulique, à l'exception des bâtiments modernes : classement par arrêté du 2 mai 1995.","architecture":"FERVAQUES, se situe sur 2 communes ; à Cheffreville-Tonnencourt et Fervaques. Au XIIe siècle fief de la famille de Brucourt, au XVe siècle à Guillaume de Hautemer qui construit le manoir gothique  aux XVIe et XVIIe siècles, les intérieurs ont été remaniés au XIXe siècle. L'élégance de l'ensemble conservé confère au domaine un rôle de « témoignage d'un art de bâtir en Normandie, aux prémices de l'âge classique », Cependant, une bâtisse existe au même endroit dès le XVe siècle, dont le logis est en partie conservé. La fortune de Guillaume de Hautemer est due à son mariage, ses fonctions et aussi de ses pillages. Elle lui permit de faire appel pour la construction envisagée à un architecte déjà réputé, menée à bien de 1595 à 1602. François Gabriel a déjà uvré au château de Carrouges. En 1611 à la mort du duc de Grancey Fervaques passe à sa fille, épouse de d'Aymond de Prie, puis aux Bullion prenant le titre de marquis  de Fervaques qui échoit ensuite à la  duchesse de Montmorency-Laval puis aux enfants de cette dernière, le duc et la duchesse de Luynes se défond de Fervaques en 1803 achat  par Delphine de Sabran, marquise de Castine, en 1804 Châteaubriand y fit un séjour, le fils de  la marquise Alstophe conserve quelques années le domaine avant de le revendre  en 1831 à la marquise de porte, la fille de l'astronome Laplace et à divers propriétaires  avant d'être acquit par une caisse de sécurité sociale aujourd'hui centre de vacances.                                                                              L'entrée du château est précédée par un haut pavillon commandant le passage sur la Touques du XVIIe siècle  ce pavillon a toutes les caractéristiques du châtelet médiéval avec ses mâchicoulis et ses rainures destinées à guider les chaines du pont-levis.","habitants":"Duc de Grancey Fervaques\r\n        \r\n        \"","divers":"Deux châteaux à Fervaques ; Kinnor ou Fervaques.  Fervaques GPS : 49° 2' 27,6\" Nord, 0° 15' 4,02\" Est","gps":"49° 2' 27,6\" Nord, 0° 15' 4,02\" Est","images":["../image/image_14/14_Fervaques_1.jpg","../image/image_14/14_Fervaques_2.jpg","../image/image_14/14_Fervaques_3.jpg","../image/image_14/14_Fervaques_4.jpg"]},"Consult_chateau_formulaire83b7":{"id":"Consult_chateau_formulaire83b7","dept":"14","canton":"Évrecy","commune":"Avenay","nom":"Fierville","type":"Château","periode":"XVI","histoire":"FIERVILLE-Bray, à 7 km au sud-est de Caen date du XVIe siècle.   Il appartient à Mr des Rotours. Le château de Fierville fut reconstruit de fond en comble, il y a quelques années, pour Mr le marquis de Saint-Clou, ainsi que ses dépendances. Il existe aussi sur la commune à découvrir le manoir Pompierre (XVe siècle)                                                                                                                        \"Le château seigneurial de Fierville, possédé longtemps par la famille le Hérissy. Le style de la renaissance se montre dans les fenêtres des greniers, les autres fenêtres ont été élargies et défigurées, ce château se compose d'un grand corps-de-logis aux extrémités duquel sont deux tours ou pavillons semi-circulaires, il occupe le fond d'une grande cour autour de laquelle sont rangés de nombreux bâtiments d'exploitation, il relevait de la châtellenie d'Amayé-sur-Orne.\r\nLe fief de Fierville appartenait avant la Révolution aux religieuses de la Visitation de Caen qui l'avaient acheté.","architecture":"FIERVILLE-Bray date du XVIe au XIXe siècle. Le château fut construit vers 1840, par Guy, architecte à Caen, pour le marquis de Saint-Clou. Le seul vestige du château antérieur, qui figure encore sur le cadastre, de 1810, est un pavillon. Il appartient à Mr des Rotours. Le château de Fierville fut reconstruit de fond en comble, il y a quelques années, pour Mr le marquis de Saint-Clou, ainsi que ses dépendances. Il y a aussi un manoir sur la commun à découvrir : le manoir Pompierre (du XVe siècle).                                                                                                                          POMPIERRE, on voit à peu de distance du château une autre maison qui doit dater en partie du XVIe. siècle ou de la fin du XVe.","habitants":"Mr le Marquis de Saint-Clou\r\n        \"","divers":"Fierville Grav-1  GPS : 49° 04' 11\" Nord, 0° 10' 55\" Ouest                                                                        GPS : 49° 06\" 07?\" nord, 0° 27' 32\" Ouest                                 Pompierre grav-3","gps":"49° 04' 11\" Nord, 0° 10' 55\" Ouest","images":["../image/image_14/14_Fierville_1.jpg","../image/image_14/14_Fierville_2.jpg","../image/image_14/14_Fierville_3.jpg"]},"Consult_chateau_formulairefb0e":{"id":"Consult_chateau_formulairefb0e","dept":"14","canton":"Évrecy","commune":"Fontaine_Etoupetour","nom":"Fontaine_Etoupetour","type":"Château","periode":"XV-XVI","histoire":"FONTAINE-ETOUPETOUR,  château datant du 4ème quart du XVe siècle, du 4ème quart du XVIe siècle et du XVIIIe siècle. La poterne date de la fin du XVe siècle. Le logis est daté 1583 (il a été en partie incendié sous le second Empire). Les communs sont du XVIIIe siècle. le château de Fontaine Etoupefour, acquis en 1538 par le célèbre mécène caennais Nicolas Le Vallois d'Escoville, ancêtre du propriétaire, son petit-fils Jean le Valois gentilhomme de  la chambre du roi  fait construire le château passa aux le vicomte de Blangy en 1736, suite à un incendie sous au XIXe siècle le château ne sera plus habité.","architecture":"FONTAINE-ETOUPETOUR,  les éléments classés aux M.H. sont les vestiges du château, depuis le 23/09/1911, et les vestiges qu'elle renferme, les douves et leurs murs, le système hydraulique et le lavoir, le bâtiment de commun du XVIIIe siècle par arrêté du 10/04/1995. Sur une île anciennement fortifiée par deux ponts d'accès, comporte une très altière poterne à pont-levis du XVe siècle, parfaitement restaurée, faisant face aux vestiges d'un élégant château du XVIe siècle. Le site fut dévasté au cours de la bataille de la cote 112 en juillet 1944. Le château est en restauration progressive depuis 37 ans. Abords fleuris bordés de grandes douves d'eau vive.  Éléments protégés MH : les restes du château, l'île et les vestiges qu'elle renferme, les douves et leurs murs, le système hydraulique et le lavoir, le bâtiment de commun du XVIIIe siècle : inscription par arrêté du 10 avril 1995.","habitants":"Nicolas Le Vallois d'Escoville,\r\n        \r\n        \"","divers":"Château de Fontaine-Etoupetour GPS : 49° 08' 16,27\" Nord, 0° 26' 32,87\" Ouest","gps":"49° 08' 16,27\" Nord, 0° 26' 32,87\" Ouest","images":["../image/image_14/14_Fontaine_Etoupetour_1.jpg","../image/image_14/14_Fontaine_Etoupetour_2.jpg"]},"Consult_chateau_formulaire2e1d":{"id":"Consult_chateau_formulaire2e1d","dept":"14","canton":"Bretteville-l","commune":"Fontaine-Henry","nom":"Fontaine_Henry","type":"Château","periode":"XVI","histoire":"FONTAINE-HENRY,  cest au XIe siècle quest construite une première forteresse sur le flanc dune colline dominant la vallée de la Mue. Entre 1200 et 1220, Henri de Tilly remplace lantique demeure par un nouveau château accompagné dune chapelle seigneuriale. Le fief sera désormais connu sous le nom de Fontaines-le-Henry puis de Fontaine-Henry. En 1374, Jeanne de Tilly épouse Philippe dHarcourt qui devient seigneur du lieu. Après la guerre de cent ans, Jean dHarcourt puis son fils Pierre entreprennent de reconstruire le château dans lesprit nouveau de la Renaissance française. Les travaux durent pratiquement un siècle, entre la fin du XVe siècle et les années 1560. Le château dresse sur lune des faces du puissant pavillon carré du donjon (désormais décoré de pilastres et de frises) une composition de colonnes classiques encadrant de hautes fenêtres. La toiture, dune hauteur de 15 m, possède une pente si accentuée que, longtemps, elle sera connue comme le plus haut toit de France. Depuis son origine, le château est demeuré dans la même famille sans jamais être vendu, se transmettant de générations en générations par les femmes. Après les familles de Tilly et dHarcourt, celles de Morais, Boutier de château dAssy, de Montécler, de Marguerie, de Carbonnel, de Cornulier et dOilliamson ont tour à tour possédé le domaine par voie dhéritage.","architecture":"FONTAINE-HENRY,  cest Henri de Canisy qui réalise le parc à langlaise au XIXe siècle. Son tracé avec de belles pelouses onduleuses est un écrin pour le château qui demeure un des plus beaux monuments français de la Renaissance. Depuis la grille dentrée, les massifs boisés sont judicieusement disposés pour créer des zones hautes et sombres encadrant la partie plus claire de la façade merveilleusement ciselée du château. Tout autour, des perspectives savantes sans effet tapageur mettent en valeur le chef-duvre darchitecture et sa chapelle, traitée comme une « fabrique » à la mode en ce temps-là. Le parc se prolonge à lest et au sud, sur le flanc escarpé de la vallée et dans une prairie humide où serpente la Mue. Des étangs sétendent aux pieds du château, lun deux possède même une île surmontée dun kiosque. Le parc est classé parmi les sites en août 1959. Sa façade claire se détache sur le vert des frondaisons des arbres majestueux qui lentourent, tel un joyau révélé par son écrin. Au sud du château, la chapelle précède le parc. Si celui-ci a souffert des années, des coups de vent et des maladies, il nen demeure pas moins tel que son créateur, Henri de Canisy, la voulu.    Classement par arrêté du 22 novembre 2011.","habitants":"familles de Tilly et dHarcourt\r\n        \"","divers":"Fontaine_Henry GPS : 49° 16' 29,6\" Nord, 0° 27' 05\" Ouest","gps":"49° 16' 29,6\" Nord, 0° 27' 05\" Ouest","images":["../image/image_14/14_Fontaine_Henry_1.jpg","../image/image_14/14_Fontaine_Henry_2.jpg","../image/image_14/14_Fontaine_Henry_3.jpg","../image/image_14/14_Fontaine_Henry_4.jpg","../image/image_14/14_Fontaine_Henry_5.jpg"]},"Consult_chateau_formulaired118":{"id":"Consult_chateau_formulaired118","dept":"14","canton":"Bayeux","commune":"Campigny","nom":"Fresnes_14","type":"Manoir","periode":"XVII-XIX","histoire":"FRESNES, l'édifice est construit dans la première moitié du XVIIe siècle pour la famille Blouet de Camilly, et remplace un édifice médiéval. Il est incendié pendant la Révolution française en 1792. Il est reconstruit au tout début du XIXe siècle pour le comte Leforestier d'Osseville. Certains éléments du château font l'objet d'une inscription comme monument historique depuis le 26 mars 1973,  les façades et les toitures, la chapelle, la grille d'entrée, le pigeonnier ainsi que les restes des fossés de l'ancien château.    Propriété  du comte Jean d'André.                                             Conservant des éléments du XVIIe siècle, cet élégant château remplaça un manoir Renaissance comme résidence des seigneurs de Campigny. Il fut en grande partie reconstruit au XVIIIe siècle pour la famille Bauquet-Surville, marquis de Campigny depuis 1772, et est resté la propriété de leurs descendants. Le magnifique colombier, élevé dans la deuxième moitié du XVIIe siècle, présente une disposition originale,  sous son lanternon une énorme cheminée centrale dispensait aux pigeons une chaleur confortable. Éléments protégés MH : le colombier : inscription par arrêté du 2 juillet 1927.","architecture":"FRESNES du XVIIIe siècle, comprend un corps principal et deux ailes, la porte  s'orne d'un fronton, L'édifice est édifié en calcaire de Creully. Le colombier, la chapelle, les caves et les douves sont antérieurs à l'édifice du XIXe siècle.\r\nLe colombier, important, a perdu sa toiture ; il est cependant bien conservé.","habitants":"Comte Leforestier d'Osseville\r\n        \"","divers":"Château de Fresnes gps 49° 15' 01\" nord, 0° 29' 05\" ouest","gps":"","images":["../image/image_14/14_Fresnes_14_1.jpg","../image/image_14/14_Fresnes_14_2.jpg"]},"Consult_chateau_formulaire34d5":{"id":"Consult_chateau_formulaire34d5","dept":"14","canton":"Pont-l","commune":"Fumichon","nom":"Fumichon","type":"Château","periode":"XV-XVII","histoire":"FUMICHON, les premiers seigneurs de Fumichon sont signalés au début du XIIe siècle. Au XVe siècle, le fief passa à la famille de Longchamp. En 1733 il fut acquis par jean-Marie Herment, fils d'un médecin ordinaire du roi, qui, à sa mort en 1739, laissa le domaine à sa sur Fumichon passa ensuite par héritage aux Loynes qui le vendirent en 1816 à Mme Thulon de La Bectière, femme du président du tribunal civil de Bernay. Plusieurs fois vendu depuis, il appartient aujourd'hui à M. Bernard Mommers.","architecture":"FUMICHON, le château se compose de bâtiments bas, couverts de hautes toitures et flanqués de lourds pavillons carrés. Il fut élevé dans la seconde moitié du XVIe siècle. Le bâtiment principal, au fond de la cour, a été modifié au XIXe siècle. Précédé d'une cour d'honneur. C'est alors que fut ajouté le pavillon en saillie qui en marque le centre. Dans le grand salon, console et miroirs de bois doré, élégamment contourné, apportent leurs éclats aux boiseries peintes de deux tons de perle au XVIIIe siècle.\r\nÉléments protégés MH : le château en totalité : inscription par arrêté du 19 janvier 1927.","habitants":"jean-Marie Herment\r\n        \"","divers":"Château de Fumichon   gps 49° 10' 00\" N, 0° 22' 05\" Est","gps":"","images":["../image/image_14/14_Fumichon_1.jpg","../image/image_14/14_Fumichon_2.jpg","../image/image_14/14_Fumichon_3.jpg","../image/image_14/14_Fumichon_4.jpg"]},"Consult_chateau_formulairebd2b":{"id":"Consult_chateau_formulairebd2b","dept":"14","canton":"Thury-Harcourt","commune":"La Pommeraye","nom":"Ganne","type":"Chateaux","periode":"XVII-XIX","histoire":"deux châteaux dans cet article, Ganne et la Pommeraye.              GANNE, vestiges, situé entre Thury-Harcourt et Pont d'Ouilly, sur un promontoire qui contrôlait le chemin de Bretagne passant par l'Orne sur la commune du Vey, le château de Ganne comprend les vestiges d'une tour-porche des XIe-XIIe siècles trois enceintes de terre entourées de remparts et de fossés. Les deux premiers enclos constitueraient des basses cours, tandis que la dernière enceinte supportant le donjon muni d'une tour porche serait la partie résidentielle du château. Depuis le début du XIXe siècle ce site prestigieux, qui a fait l'objet de nombreuses études, a été saccagé par la tempête du 26 décembre 1999.\r\nÉléments protégés MH : les vestiges enfouis et en élévation, inscription par arrêté du 25 septembre 2000.","architecture":"POMMERAYE, depuis le XIe siècle, ce haut lieu dhistoire a toujours eu une vocation défensive, comme en témoignent sa motte, ses douves, ses deux porches daccès, son étang défensif, ses bouches à feu et ses murs denceinte. La propriété architecturée en U sarticule de la manière suivante, accès par la voie romaine, cour dhonneur délimitée par deux pavillons Louis XIII ainsi que des communs. Le château de 1646 fondé sur des vestiges médiévaux a été remanié voire reconstruit en 1850, son style \"Restauration\", cache derrière ses façades une distribution, assez rare, sur le modèle romain de latrium, ce qui lui confère originalité et élégance. En 1876, la chapelle fut bénite par l'évêque de Bayeux, Flavien Hugonin, celui là même qui accepta lentrée anticipée au carmel de Thérèse de Lisieux. La famille Le Tellier de Vauville fit construire un presbytère vers 1870, et l'offrit au clergé afin d'assurer des offices dans le village retiré de La Pommeraye. Depuis 1850, plusieurs familles s'y sont succédé; les Le Tellier de Vauville, les Pollet, les Michelon et les Rollot. Aujourdhui, la famille Boudnikoff restaure progressivement la demeure. Gîtes d'hôtes.","habitants":"Le Tellier de Vauville,\r\n        \"","divers":"deux châteaux dans cet article, Ganne et la Pommeraye.  GPS : 48° 54' 07\" Nord 0° 24' 41\" Ouest                                                                              Pommeraye GPS : 48° 54' 33\" Nord, 0° 25' 13\" Ouest","gps":"48° 54' 07\" Nord 0° 24' 41\" Ouest","images":["../image/image_14/14_Ganne_1.jpg","../image/image_14/14_Ganne_2.jpg","../image/image_14/14_Ganne_3.jpg"]},"Consult_chateau_formulairea56e":{"id":"Consult_chateau_formulairea56e","dept":"14","canton":"Evrecy","commune":"Garcelles Secqueville","nom":"Garcelles_Secqueville","type":"Manoir","periode":"XVIII","histoire":"GARCELLES-SECQUEVILLE, au XIIIe siècle, le domaine de Garcelles est partagé en deux fiefs : le fief du haut et le fief du bas. Ils sont réunis, en 1614, sous le nom de fief de Haubert. En 1704, Jean-Joseph Gosselin, seigneur de Tourville, devient seigneur de Garcelles et fait bâtir le château actuel en 1721. Vers 1780, la famille Doynel de Saint-Quentin acquiert le domaine qui se transmet ensuite par héritage. Aucune archive ne décrit la composition du parc dorigine. Le parc à langlaise, au sud du château, est  créé à la fin du XVIIIe ou au début du XIXe siècle. En 1944, lors de la Bataille de Normandie, des bombardements causent de graves dommages au château. Un plan densemble du domaine, établi après la guerre, représente le parc sur son axe nord-sud (Tilly-Crasmesnil). Devant la façade principale, une allée rectiligne de plus de 700 mètres file vers Tilly.","architecture":"GARCELLE-SECQUEVILLE, sobre construction classique et élégante, sa façade chaînée de pierre est percée de hautes ouvertures entre des tableaux enduits. Le pavillon central, plat, est précédé dun perron et surmonté dun fronton triangulaire armorié. Une rangée de lucarnes, vient découper la haute toiture dardoises. La cour dhonneur est fermée dune grille flanquée dune balustrade. Elle a été installée par les propriétaires actuels, tout comme les ornements (statues, vases, urnes, bancs) . Derrière le château, sétend le parc à langlaise. A mi-distance, lallée, coupée par une transversale, se rétrécit pour accentuer leffet de profondeur. Dans la seconde partie,  vers le sud, les bois qui semblent avoir été conservés ne sont plus que de minces rideaux darbres cloisonnant les parcours. Ils forment cependant une toile de fond au golf et, de la plaine, maintiennent la présence visuelle de cet élément boisé dans la campagne agricole très ouverte.","habitants":"Jean-Joseph Gosselin\r\n        \"","divers":"château de Garcelles-Secqueville","gps":"","images":["../image/image_14/14_Garcelles_Secqueville_1.jpg"]},"Consult_chateau_formulaire3c2d":{"id":"Consult_chateau_formulaire3c2d","dept":"14","canton":"lisieux","commune":"Saint-Hymer","nom":"Gassart","type":"Château","periode":"XV-XVII-XIX","histoire":"Deux châteaux dans cet article; Gassart et Parcs-Fontaine.   GASSART,  dans la vallée de l'Yvie se détache le château de Gassart, entouré de hautes futaies, la demeure présente un corps de logis style Louis XIII flanqué au nord d'une belle chapelle. Il fut pillé pendant la deuxième guerre mondiale et privé ainsi de son ancien mobilier. Le domaine n'a jamais cessé, depuis des siècles, d'appartenir aux comtes des Hayes de Gassart. Saint-Hymer doit en grande partie sa notoriété à son Prieuré qui fût fondé par Hugues de Montfort entre 1066 et 1077. Revenant dun pèlerinage en terre sainte, il se serait arrêté au \"val Saint-Imier\", dans le diocèse de Bâle en Suisse. De retour en Normandie, et retrouvant dans ce vallon une ressemblance avec le val Saint-Imier, Hugues de Montfort fonda ici cette pieuse maison.","architecture":"A trois K.M. au sud est PARCS FONTAINE   Il ne reste plus de l'ancien château des Parcs-Fontaines que quelques pans de murs délabrés. La perle n'est point regrettable au point de vue de l'art: ce n'était qu'une grosse maison en bois, avec bases en briques et pierres, qui pouvait remonter tout au plus à la première moitié du XVIIe siècle. Sa situation était agréable. Maintenant, un gros colombier qui dépend de la ferme voisine est la seule preuve que l'on puisse invoquer de la présence, en cet endroit, d'un grand domaine féodal. Les registres de l'échiquier nous ont conservé le nom de Vautier d'Éparfontaine, qui vivait en 1195. Il nous faut ensuite franchir jusqu'au XVe siècle pour retrouver les noms des seigneurs de cette terre. L'édifice actuel a été construit au XIXe siècle. location  chambres d'hôtes.","habitants":"Gassart; Hugues de Montfort                                                     Vautier d'Éparfontaine\r\n        \"","divers":"Deux châteaux dans cet article; Gassart  grav 1-2 et Parcs-Fotaine grav 3-4-5.","gps":"","images":["../image/image_14/14_Gassart_1.jpg","../image/image_14/14_Gassart_2.jpg","../image/image_14/14_Gassart_3.jpg","../image/image_14/14_Gassart_4.jpg","../image/image_14/14_Gassart_5.jpg"]},"Consult_chateau_formulaire646b":{"id":"Consult_chateau_formulaire646b","dept":"14","canton":"Pont-l","commune":"Tourgeville","nom":"Glatigny_Tourgeville","type":"Château","periode":"XVI","histoire":"GLATIGNY;  Jean Faulcon construit au XVIe siècle le manoir, possède un beau pressoir construit à cette même époque, manoir en colombages. Sa fille, Suzanne, et le mari de celle-ci, Gilles de Giverville,  écuyer sont les bâtisseurs des deux ailes en pierres et briques. Le bâtiment du pressoir, couvert en chaume, est en pan de bois hourdis de torchis reposant sur une assise en pierre. Il abrite un tour à pommes à traction animale et une presse à longue étreinte.","architecture":"GLATIGNY,  le premier manoir présente un plan rectangulaire de huit travées. La largeur de ces travées peut  varier. Les plus étroites, environ 1.00m à 1.20 m. correspondent généralement à des passages. Les autres peuvent mesurer de 1.30 m. à 2.50 m. sans quil soit possible jusquà présent de déterminer la raison de ces écarts. Au milieu des six premières, en partant de la droite, est implanté un puissant massif de cheminées adossées tandis quaux deux dernières correspond un second massif placé sur le pignon. On accède au premier de ces trois \"aistres\" par une porte située en extrémité du mur gouttereau tandis que laccès aux deuxième et troisième se fait par deux portes géminées entre la sixième et la septième travée. La partie en pan de bois fut agrandie au XVIIe siècle par la construction, vers le nord, de deux ailes en retour qui encadrent une cour intérieure. Les ailes sont constituées par des alternances de chaînages et harpes de pierre calcaire avec de larges panneaux en briques Saint-Jean. Ces panneaux sont ornés de briques noires vernissées organisées en losanges. Un couloir en arrière du manoir primitif relie les deux ailes. Enfin une tour carrée contient l'escalier.  Le Château; La partie en pan de bois fut agrandie au XVIIe siècle par la construction, vers le nord, de deux ailes en retour qui encadrent une cour intérieure. Les ailes sont constituées par des alternances de chaînages et harpes de pierre calcaire avec de larges panneaux en briques Saint-Jean. Ces panneaux sont ornés de briques noires vernissées organisées en losanges. Un couloir en arrière du manoir primitif relie les deux ailes. Enfin une tour carrée contient l'escalier.","habitants":"Gilles de Giverville\r\n        \"","divers":"Château de Glatigny à Tourgeville","gps":"","images":["../image/image_14/14_Glatigny_Tourgeville_1.jpg","../image/image_14/14_Glatigny_Tourgeville_2.jpg","../image/image_14/14_Glatigny_Tourgeville_3.jpg"]},"Consult_chateau_formulaire5b5f-2":{"id":"Consult_chateau_formulaire5b5f-2","dept":"14","canton":"Cabourg","commune":"Gonneville-sur-Mer-Hougate","nom":"Gonneville_sur_Mer","type":"Château","periode":"XIX","histoire":"Trois châteaux à Gonneville sur mer; Beuzeval, Foucher de Careil. BEUZEVAL, date du XIXe siècle, pour Victor Lecesne, armateur et homme politique. Il fut ensuite acquis par Henri Viguier, a été construit sur le site d'un ancien château médiéval. Bâti en 1825, après la reconsidération des terres du château, que les limites communales furent retracées et la bâtisse, placée à Beuzeval. Entre 1620 et 1640,  Beuzeval faisait partie du fief des Aché. Jean d'Aché, le seigneur du Manoir à l'époque, accompagna Guillaume-le-Conquérant, en 1066, à la conquête de l'Angleterre. Le 6/08/1066, quelques jours avant le départ pour l'Angleterre, Guillaume se réfugia au château de Beuzeval à cause dune tempête. Le lendemain matin, Guillaume remercia son hôte Pierre de Sinvillex pour son hospitalité et lui ordonna de l'accompagner en Angleterre. Pierre mourut lors de la Bataille de Hastings. Le château de Beuzeval resta sans utilisation avant le XIXe siècle quand la structure fut construite. Après la défaite, en 1815, à la bataille de Waterloo et la chute du Premier Empire, la région fut occupée par les troupes Prussiennes. Pendant la seconde guerre mondiale, les Allemands occupèrent, à nouveau, le manoir et y installèrent leur quartier général. On trouve de nombreux vestiges de leur présence avec des bunkers et des tranchées. Le maréchal Rommel en avait fait un de ses lieux de passage lorsqu'il effectuait son contrôle du mur de l'Atlantique. Souvent pris pour cible, par l'aviation alliée, un planeur s'y égara, le jour du débarquement.","architecture":"DRAMARD à Gonneville, chambres d'hôtes.\r\nFOUCHER de CAREIL, ou château de CAUMONT\" château style Louis XIII, construit en 1863 pour Louis Alex Foucher de Careil à l'endroit même où Guillaume le Conquérant campa avec son armée en 1066 avant d'envahir l'Angleterre. Propriété privée appartenant à la commune de La Garenne-Colombes, le domaine n'est pas ouvert au public et ne présente pas d'intérêt touristique du fait de la reconversion des lieux pour accueillir les jeunes Garennois.                                                                              BEUZEVAL, en 1986, le domaine est divisé, la plus grande partie devient un golf et le château subit une réhabilitation pour l'intérieur. L'architecte a plagié la demeure de plaisance brique et pierre néo Louis XIII, en y ajoutant les références gothiques et Renaissance avec emprunts à l'architecture anglaise et normande. L'élévation antérieure évoque le style Tudor tandis que l'élévation principale reprend l'idée de la maison noble à la française. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 21 juin 2004, chambres d'hôtes.                                                                                      GD HOTEL, a été construit en plusieurs étapes le corps central est construit par Jacques Claude Baumier en 1859. En 1896-1897, son fils, René-Jacques Baumier, fit enserrer le bâtiment de deux pavillons légèrement en sailli, reprenant le style d'origine, mais avec une décoration extérieure, plus riche. Enfin l'ensemble a été complété par René-Jacques Baumier, en 1904, par l'édification, à l'angle Ouest, d'une rotonde, surmontée d'un dôme. Le Grand Hôtel est inscrit aux M.H. depuis 2000. Il est devenu un immeuble d'habitations privées.","habitants":"Beuzeval; Victor Lecesne                                                           Louis Alex Foucher de Careil \r\n        \"","divers":"Trois châteaux à Gonneville sur mer; Beuzeval   grav 2-3-4                                       Gps 49° 17' 38\" N, 0° 02' 47\" Ouest,                                                   Foucher de Carel grav-1 GPS : 49° 17' 37,68\" Nord, 0° 02' 47,4\" Ouest                                                                                                           GD Hötel  GPS : 49° 15,84' 16\" Nord, 0° 04' 26,4\" Ouest","gps":"49° 17' 37,68\" Nord, 0° 02' 47,4\" Ouest","images":["../image/image_14/14_Gonneville_sur_Mer_1.jpg","../image/image_14/14_Gonneville_sur_Mer_2.jpg","../image/image_14/14_Gonneville_sur_Mer_3.jpg"]},"Consult_chateau_formulairee8c7":{"id":"Consult_chateau_formulairee8c7","dept":"14","canton":"Mézidon-Canon","commune":"Grandchamp  le château","nom":"Grandchamp_Coupesarte","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux à Grandchamp,  Coupesarte et Hermerel.                                                                                                                                                                                                  GRANDCHAMP, se compose d'un corps de logis principal en brique et pierre, demeure classique du XVIIe siècle, à laquelle vient s'accoler une curieuse construction à pans de bois avec deux tours d'angle à dôme et lanternon. Grandchamp fut la propriété des familles d'Annesy, Le Prévost et de Montault. Éléments protégés MH : les façades et les toitures, l'escalier du corps de bâtiment en pans de bois du château, faisant suite au bâtiment en pans de bois déjà classé : inscription par arrêté du 10 octobre 1960.                                                                                                           HERMEREL, à Gefosse-Fontenay, ce premier château fortifié de Géfosse permettait de verrouiller l'accès à la baie. Le château est détruit pendant la guerre de Cent Ans par les Anglais débarqués au Havre de la Dune, port naturel de la baie, aujourd'hui comblé, le plus proche du château. En 1346, c'est dans ce havre que la flotte Édouard III fera relâche. La ferme-manoir présente deux corps de logis construit en pierre calcaire et en ardoise, d'époque différente découlant d'un remaniement. La partie classique du logis principal, datant de 1676, est flanquée de deux pavillons. De forme rectangulaire, elle fait la liaison avec les vestiges de l'ancien château. La porte principale est surmontée d'un tympan simple. Le toit est surmonté de quatre hautes cheminées moulurées dont deux en alignement de pignon sur les pavillons. Logis de France M.r  Lemarié.","architecture":"A 8 K.M au sud COUPESARTE, la demeure fut une habitation seigneuriale dont les propriétaires furent, les Anisy, les Tilly, les Caulaincourt et les d'Urbal. Fin du XVIe siècle à la famille le Prévost et en 1767 à la famille le Viconte, se dresse sur la commune délégué de Coupesarte au sein de la commune nouvelle de Mézidon. Le manoir et ses dépendances  et ses douves font l'objet d'un classement au titre des M.H. par arrêté du 21 octobre 1947.  Les dépendances sont datées du XVIIe siècle. Bien que propriété privée, les extérieurs sont accessibles au public en permanence. Le manoir n'a pas été remanié au fil du temps et a conservé son ossature bois, et possède « une unité architecturale exceptionnelle en pays dAuge ». Le petit manoir, transformé en ferme, qui se dresse sur un terre-plein entouré d'eau, se compose de deux bâtiments à pans de bois en équerre flanqués de trois échauguettes, du même matériau, en encorbellement dans les angles des façades extérieures , cernée de douves en eau, présente une double identité; dun côté un long corps de logis de pierre au classicisme parfait, et de lautre, dans les fossés en eau se reflètent les façades avec les deux tourelles dangle à colombages coiffées de lanternons originaux. Les décors intérieurs, cartouches, pochoir et trompe-lil ont été conservés depuis le XVIIe siècle et les pavés de terre cuite originaux, laissent imaginer la richesse intérieure du manoir à la Renaissance.  Éléments protégés MH : le manoir, les dépendances et les douves : classement par arrêté du 21 octobre 1947.","habitants":"Coupesarte; famille le Viconte                                                  Hermerel; M.r  Lemarié                                                   Grandchamp ;  famille d'Annesy\r\n        \"","divers":"Trois châteaux à Grandchamp dont Grandchamp grav 1-2, Coupesarte grav 3-4 et Hermerel grav 5-6.   \r\nGrandchamp  gps 49° 04' 41\" nord, 0° 04' 25\" est\r\nCoupesarte GPS : 49° 4' 51,6\" Nord, 0° 4' 38,28\" Est                           Hermerel  gps49° 22' 06\" Nord, 1° 04' 37\" Ouest","gps":"49° 4' 51,6\" Nord, 0° 4' 38,28\" Est","images":["../image/image_14/14_Grandchamp_Coupesarte_1.jpg","../image/image_14/14_Grandchamp_Coupesarte_2.jpg","../image/image_14/14_Grandchamp_Coupesarte_3.jpg","../image/image_14/14_Grandchamp_Coupesarte_4.jpg","../image/image_14/14_Grandchamp_Coupesarte_5.jpg","../image/image_14/14_Grandchamp_Coupesarte_6.jpg"]},"Consult_chateau_formulaireb731-2":{"id":"Consult_chateau_formulaireb731-2","dept":"14","canton":"Livarot","commune":"Vendeuvre","nom":"Grizy","type":"Château","periode":"XVIII","histoire":"GRIZY,  est un logis construit en pierre et tout en longueur, avec de très nombreuses fenêtres constituées de petits carreaux. Il est encore entouré de ses bâtiments de ferme. L'édifice appartenait à la famille de La Flèche au XVIe siècle. La demeure a été prolongée en 1702, pour Nicolas Lejeune de Grisy, conseiller au Parlement. La partie la plus ancienne, une tour polygonale en pierre, bois et torchis avec un escalier à vis hors-oeuvre, datant du XVIe siècle, le reste date du XVIIIe siècle, date inscrite au-dessus de la porte centrale \"1702\". La propriété appartient toujours à la famille Bertail qui la possède depuis plus d'un siècle.    Éléments protégés MH : les façades et les toitures, l'escalier principal à rampe en fer forgé, les façades et les toitures des communs, la pièce d'eau, la mare, le grand pré en avant du château : inscription par arrêté du 18 novembre 1953.","architecture":"GRIZY, Alexandre de Vendeuvre, descendant d'une des plus vieilles familles de Normandie, issue des comtes de Flandre, entreprend en 1750 la construction d'une maison des champs au goût du jour. Il fait appel au célèbre architecte Jacques François Blondel pour lui édifier sa résidence d'été. La sobriété de l'architecture générale est compensée par l'équilibre et l'harmonie des jeux de moulures et de sculptures. Le château est le prototype d'une demeure de campagne normande aristocratique du XVIIIe siècle. Il vous accueille pour découvrir et admirez la 1ère collection au monde de mobilier miniature. Une collection exceptionnelle présentée dans l'orangerie du château. Plus de 750 chefs d'oeuvre de maîtrise, meubles miniatures, argenterie et ivoires datant du XVIe au XIXe siècle. Le château meublé, du XVIIIe siècle, appartient toujours à la famille de Vendeuvre. Les constructions de fantaisie avec le temple, la cascade, le labyrinthe, le kiosque, vous découvrirez une étonnante grotte incrustée de 200 000 coquillages, surplombée d'un pavillon chinois, et au loin la superbe fontaine des éléphants.  Un colombier reconstruit en 1811 comporte 1 400 boulins. Au bout de l'allée se trouve la glacière en forme de pyramide. Une collection de niches pour chiens d'époque, datant du XVIIe au XIXe siècle.","habitants":"Nicolas Lejeune de Grisy\r\n        \r\n        \r\n        \"","divers":"Château de Grisy GPS : 49° 00' 30\" Nord, 0° 03' 11\" Ouest","gps":"49° 00' 30\" Nord, 0° 03' 11\" Ouest","images":["../image/image_14/14_Grizy_1.jpg","../image/image_14/14_Grizy_2.jpg"]},"Consult_chateau_formulairead1f-2":{"id":"Consult_chateau_formulairead1f-2","dept":"14","canton":"Cabourg","commune":"Ranville","nom":"Guernon_Ranville","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article Guerron-Ranville, Heaume et Mariquet.                                                                                                       GUERNON RANVILLE, le château de Guernon-Ranville est un édifice dont on ignore la date de construction précise mais qui, daprès son style et notamment lharmonie de sa façade, a été édifié au XVIIIe siècle. Son nom provient de la famille qui a acquis le fief de Ranville en 1751 et qui a dès lors ajouté Ranville à son patronyme, donnant ainsi celui de Guernon Ranville. Cette famille était lune des plus anciennes de la noblesse normande. Le château est resté dans la famille des Guernon-Ranville pendant près de deux siècles. Il a été remanié de façon conséquente au XIXe siècle par son illustre propriétaire, le comte et ministre Martial de Guernon Ranville. Au début du XXe siècle, le château appartenait à larrière petite nièce du comte de Guernon Ranville, Yvonne Colmiche, aussi a-t-il également été appelé \"château Colmiche\". Pendant la deuxième guerre mondiale, le château, qui appartenait depuis 1933 à monsieur Jozon, a été réquisitionné par les Allemands pour y abriter des membres de lorganisation Todt.                                                HEAUME ou Hom, construit sous le règne de Louis XV et agrandi sous Napoléon III, est une élégante propriété au milieu dun grand parc traversé par lAiguillon. Dans son parc de 5 hectares se dressent deux gigantesques séquoïas plantés au XIXe siècle au moment de lagrandissement du château. Le 6 juin 1944, le château du Heaume devient la QG du Général Gale qui commandait les 8000 hommes de la VIe aéroportée britannique parachutée sur Ranville.","architecture":"MARIQUET, cet élégant château des XVIIIe et XIXe siècles  La bâtisse fut construite à lépoque du Directoire sur trois étages en briques alternées avec de la pierre. Au cur dun parc de plusieurs hectares, cest à lépoque, une demeure modeste en pierres et briques datant du Directoire. Le château du Mariquet a été acheté vers 1830 par Monsieur Verrier, grand-père de Hortense qui épousa le général comte de Brye. Les deux tourelles qui encadrent la demeure ont été rajoutées vers 1880 par la comtesse de Brye, femme du comte de Brye. Elle y vécut entourée de sa fille Jeanne et de son gendre Louis de Rohan Chabot pendant de longues années. Née en 1832 elle mourut en 1931 presque centenaire. Réquisitionné en 1940 par les nazis, le château est mis à la disposition des Alliés par le comte et la comtesse Louis de Rohan-Chabot dès le matin du 6 juin 1944 et devient le QG de la 5ème brigade. Le château est demeuré dans la famille Rohan-Chabot jusquen 2009. Louis de Rohan Chabot et son fils Gaël furent tous les deux maires de Ranville. Dans le même parc, se trouve une belle maison du XVIIIe siècle donnant sur la rue du général Leclerc. Jusquen 1875 environ elle est complètement indépendante, avec sa ferme entourée dun grand jardin. On y accédait par le beau porche encore visible aujourdhui. Pour lajouter à son domaine, la comtesse de Brye l'acheta, dite pavillon du Général de Brye ou plus tard pavillon Ranvillatte» ou encore pavillon du Mariquet.","habitants":"Famille de Guernon-Ranville                                                    Mariquet;  Famille Rohan-Chabot \r\n        \r\n        \"","divers":"Deux châteaux dans cet article Guerron-Ranville grav-2-3 , Heaume grav-4 et Mariquet grav-1.    Guernon GPS : 49° 13' 55\" Nord, 0° 15' 23\" Ouest","gps":"49° 13' 55\" Nord, 0° 15' 23\" Ouest","images":["../image/image_14/14_Guernon_Ranville_1.jpg","../image/image_14/14_Guernon_Ranville_2.jpg","../image/image_14/14_Guernon_Ranville_3.jpg","../image/image_14/14_Guernon_Ranville_4.jpg"]},"Consult_chateau_formulaire8a76-2":{"id":"Consult_chateau_formulaire8a76-2","dept":"14","canton":"Thury-Harcourt","commune":"Thury-Harcourt,","nom":"Harcourt_Bossy","type":"Château","periode":"XII-XVIII","histoire":"Trois châteaux dans cet article; Harcourt, Bossy et Placy. HARCOURT, à la fin du XIIe siècle, un donjon carré en pierre et une chapelle ont été construits par Robert II d'Harcourt, combattant aux croisades avec Richard Coeur de Lion. L'enceinte flanquée de tours et précédée de fossés a été ajoutée au XIIIe siècle afin de former une vaste basse-cour.La seigneurie de Thury comportait au Moyen Age, un château qui appartenait aux familles Tesson, Crespin, Préaux puis aux Montmorency. Jeanne Tesson apporta la baronne de Thury à  Jean Crespin. Leur petite fille, Blanche Crespin hérita de la baronnie de Thury et épousa Pierre de Préaux. Leur fille, Marguerite de Préaux, se maria en secondes noces, vers 1367, avec Jacques de Bourbon-Préaux, grand bouteiller de France. La descendance issue de ce mariage s'étant éteinte, la baronnie de Thury revint à la Maison de Préaux, à Jeanne de Préaux, épouse de Gauvain de Ferrières. Ils eurent un fils, Jean de Ferrières, dont la fille Françoise de Ferrières, dame de Thury, épousa Ferry, seigneur d'Aumont et eurent une fille, Anne d'Aumont, qui se maria à Claude de Montmorency, seigneur de Fosseux, en 1522.                                             A cinq K.M. à l'Est à Cosny-Halbout le château de  BOSSY , a été construit au XVIIIe siècle (maître d'oeuvre inconnu), et remanié au XIXe siècle, de Plan de symétrique, à un étage carré\r\navec escalier hors-oeuvre  tournant à retours avec jou. Le gros-oeuvre en calcaire ; moellon ; enduit Couverture  à toit à longs pans ; croupe ; noue ; toit en pavillon ; flèche carrée,  couverture, en ardoise et  tuiles plates.","architecture":"HARCOURT, à partir de 1364, la défense du site est renforcée par Jean VI d'Harcourt avec la construction d'un châtelet d'entrée. Durant la guerre de Cent Ans, la place fut conquise par les anglais en 1418 puis reprise par Dunois en 1449 à l'aide de l'artillerie. La forteresse perdit son intérêt militaire tout en servant encore durant les Guerres de Religion au XVIe siècle. Elle fut agrandie au début du XVIIIe siècle par le duc d'Harcourt, Maréchal de France. Cette demeure fut la résidence des gouverneurs de Normandie jusqu'à la Révolution où le château fut ravagé. En 1944, Thury Harcourt est une zone de combats et le château fut incendié par une formation nazie avec tout son mobilier, ses archives, sa bibliothèque aux 15000 volumes et plus de cent cinquante tableaux anciens. Ce qui reste ne donne qu'une faible idée de ce qu'il a été. Dix salons en enfilade aboutissaient à la chapelle qui existe encore. Une longue galerie, supprimée en partie au siècle dernier, dominait la vallée de l'Orne. Il fallait parcourir 450 mètres pour faire le tour de cette demeure. Ce qui reste abritait seulement le vestibule d'entrée. En 1955, pour conserver un souvenir du passé et le témoignage d'une architecture de qualité, le duc d'Harcourt fit consolider les ruines de l'ancien vestibule et restaurer la chapelle. Le parc de 70 hectares qui entoure le château est ouvert au public du printemps jusqu'à l'automne.                                                        A cinq K.M. à l'est, PLACY, situé au lieu-dit la Rue Gournay, est un édifice construit au XVIIIe siècle dont le maître d'oeuvre est inconnu à ce jour. De plan régulier, élévation ordonnancée à un étage carré, avec escalier dans-oeuvre  en  calcaire ; enduit à toit à longs pans ; croupe  en ardoise.","habitants":"Robert II d'Harcourt,                                                            Famille de Montmorency\r\n        \"","divers":"Châteaux d'Harcourt-Bossy et Placy grav-3.","gps":"","images":["../image/image_14/14_Harcourt_Bossy_1.jpg","../image/image_14/14_Harcourt_Bossy_2.jpg","../image/image_14/14_Harcourt_Bossy_3.jpg"]},"Consult_chateau_formulaireb429":{"id":"Consult_chateau_formulaireb429","dept":"14","canton":"Pont-l","commune":"Hermival les Vaux","nom":"Hermival_Vaux","type":"Manoir","periode":"XVI-XVII","histoire":"HERMIVAL, les deux tours carrées en damier de briques roses et pierres ont été construites au XVIe siècle. Elles sont ornées de corniches à mâchicoulis. Au XVIIe siècle, le château est la propriété de la famille du Bosch, Au XVIIIe siècle, une deuxième campagne réalisée par les Doisnel, permit la construction dune façade en pierre de taille en retrait des deux tours. La partie centrale de cette façade dispose dune entrée encadrée de pilastres en bossages, en légère saillie, dune fenêtre sur deux étages surmontée dun fronton triangulaire. La demeure passe aux mains de la famille Le Boctey au XIXe siècle puis appartient à la  communauté des Béatitudes,  au XXIe siècle, le château d'Hermival appartient à la Famile Decaen. Depuis avril 2019 le château est la propriété de la famille Legrand Collin qui a restauré lintégralité du château, de lorangeraie et du parc pour y accueillir désormais des évènements tels mariages et séminaires. Le grand escalier du château dessert aujourdhui cinq chambres et suites.\r\nÉléments protégés MH : les façades du château : inscription par arrêté du 19 janvier 1927. Location de chambres d'hôtes et  des salles pour réception.","architecture":"HERMIVAL, ensuite au XIXe siècle, il est à la famille Le Boctey, puis, de 1865 à 1959, il va dans les mains de la famille Fleuriot. Puis, au XXe siècle, il devint la propriété privée de la communauté des Béatitudes. Ses tours sont ornées de corniches à mâchicoulis. Une seconde campagne, au XVIIIe siècle, permit la construction d'une façade en pierre de taille en retrait des 2 tours. La partie centrale de la façade dispose d'une entrée encadrée de pilastres en bossages (en légère saillie), dune fenêtre sur 2 étages et surmontée dun fronton triangulaire. Ses façades du château sont inscrites partiellement aux M.H. depuis le 19/01/1927.","habitants":"famille du Bosch\r\n        \"","divers":"Châteaux d'Hermival  GPS : 49° 10' 0,3\" Nord, 0° 17' 4,4\" Est","gps":"49° 10' 0,3\" Nord, 0° 17' 4,4\" Est","images":["../image/image_14/14_Hermival_Vaux_1.jpg","../image/image_14/14_Hermival_Vaux_2.jpg","../image/image_14/14_Hermival_Vaux_3.jpg","../image/image_14/14_Hermival_Vaux_4.jpg"]},"Consult_chateau_formulaire622d":{"id":"Consult_chateau_formulaire622d","dept":"14","canton":"Honfleur-Deauville","commune":"Honfleur","nom":"Honfleur","type":"Château","periode":"XV-XVII-XIX","histoire":"Trois châteaux à Honfleur dont Honfleur, Gonnevielle,Preteville et Roncheville et l'hotel de ville.                                                                                                     HONFLEUR, sa construction date du 2e quart du XIXe siècle. A la fin de l'Ancien Régime, les ingénieurs en charge des travaux de restauration de la commune envisagèrent de rebâtir, à l'extrémité Est du vieux bassin, le vieil édifice que l'on nommait « maison de ville » alors fortement dégradé. La mise en oeuvre du projet fut retardé, en raison des évènements de la Révolution. Il faudra attendre 1830 pour que les plans d'un nouvel hôtel de ville, conçus par l'architecte Fontaine, soient entérinés. Les travaux furent achevés, en 1837, sous la direction de l'architecte Hagron. L'Hôtel de Ville de Honfleur constitue un exemple représentatif de l'architecture publique de la monarchie de Juillet. Il s'agit d'une construction massive, avec 2 niveaux d'élévation, d'une grande sobriété. L'escalier suscite un intérêt certain avec sa volée droite à repos et la galerie qui l'entoure soutenue par 8 colonnes d'ordre dorique. L'Hôtel de Ville de Honfleur est la propriété de la commune de Honfleur. Les éléments protégés aux M.H. sont les façades et toitures, le vestibule et la cage d'escalier, la galerie et la salle du Conseil, au 1er étage, avec son décor, depuis le 27/12/1989.                                                                                        GONNEVILLE Le petit château  du XVIIIe siècle a été restauré avec amour par ses propriétaires Anna et Philipp pour ouvrir sous lenseigne LE FLEUR, un refuge parfait pour votre séjour en Normandie. Votre séjour participera à la suite de la rénovation du château, de ses dépendances et son parc.","architecture":"Le Château de PRETEVILLE est un château bâti à Gonneville-sur-Honfleur, au sud de Honfleur aujourd'hui résidence Odalys hôtel                                                        RONCHEVILLE, depuis 1206, jusqu'à l'occupation anglaise pendant la guerre de Cent Ans, le manoir de Roncheville, fut la maison seigneuriale des Bertran, barons de Bricquebecq, vicomtes de Faugernon et de Roncheville, seigneurs de Honfleur. À l'issue de la guerre, Charles VII fait du manoir de Roncheville la résidence des gouverneurs de Honfleur. Robert de Floques de 1450 à 1461, Jean de Montauban de 1461, Louis de Bourbon à 1470 à 1486. Fils bâtard de Charles Ier, duc de Bourbon, Louis de Bourbon, amiral de France, chevalier de l'ordre de Saint-Michel, chargé par Louis XI de relever les fortifications de Honfleur, reconstruit le manoir en
