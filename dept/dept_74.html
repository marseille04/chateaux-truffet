                                                                        En 1543 Louis de Saint-Jeoire, petit-fils de Marguerite  et de pierre vend Alery  à François Joly de la Roche seigneur de la Roche juge , sénateur leur fils aîné de François  Jean-Louis fut capitaine  d'Annecy membre du sénat sa quatrième fille épouse en 1625  Bernard Lucas avocat à la cour des comtes qui hérite d'Alery et de la Roche, qui fit une famille d'officier. En 1699 Alery passe en comté suite à des rachats de diverses seigneurie par Charles-Joseph, son fils Pierre-François Lucas comte d'Alery et de la Roche et du Saint-Empire romain, meurt sans héritier cède ses biens en 1755 à son cousin Joseph-Louis d'Oncieux, qui se fit confisquer les biens à la Révolution mais lui seront restituer  en 1797 pour bien rendu en tant qu'officier.  En 1818 le  vendra à un tanneur d'Aoste Joseph Quétand, passe ensuite à la famille Velluz, puis en 1907 propriété de la famille Aussédat. Dans cette maison forte Louis VIII et Louis XIII et le cardinal de Richelieu en 1630 y logèrent.","architecture":"Aléry: Deux corps de bâtiment en équerre à deux niveaux à angles droits reliés par une tourelle polygonale découronnée pendant la Révolution (escalier).","habitants":"Famille d'Oncieux                                                                          Famille Aussédat\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Alery_1.jpg"]},"Consult_chateau_formulaire6080":{"id":"Consult_chateau_formulaire6080","dept":"74","canton":"Annecy-le-Vieux","commune":"Alex","nom":"Alex","type":"Château","periode":"XV","histoire":"ALEX: Le comte de Genève céda en 1340 aux seigneurs de Clets, seigneurie d'Alex. \r\nAu XVe siècle, par alliance  de Marguerite d'Alex dernière du nom,  le château passa à Pierre d'Arenthon. nacquit dans ce château en 1620, Jean d'Arenthon d'Alex qui deviendra prince-évêque de Genève  en 1661 et construira le séminaire d'Annecy en 1684. Cette famille s'éteint  aux XVIIIe siècle avec Denis d'Arenthon d'Alex président du Sénat de Savoie. Le château fut vendu aux Favier du Noyer qui le revendent en 1773  à François Marie de la Fléchère; Alex passe en comté en 1783.  \r\nA la Révolution le château confisqué vendu comme bien national, il eut plusieurs propriétaires, les Parravex, Laffin, Bardet, Gay, Duret et  le dernier Philippe Gay qui démoli une grande  partie du château en 1884. \r\nEn 1935 Elisa hérite  fille unique de Philippe Gay et cette dernière a épousée Lucien Dedevens. Le château a était habité par cette famille (appelé Château) jusqu'en 1928 dont Yvette Château fille d'Elisa.  \r\nAujourd'hui une fondation de Jean-Marc Salomon y fait des expositions d'art contemporain.","architecture":"Alex: Château  construit au XIIIe siècle remanié au XVe siècle style moyen-âge et renaissance quadrangulaire à trois  étages dont une grande partie fut démolie en 1884 flanqué d'une tour carrée.","habitants":"Famille d'Arenthon d'Alex\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Alex_1.jpg"]},"Consult_chateau_formulaire5957":{"id":"Consult_chateau_formulaire5957","dept":"74","canton":"Evian-les-Bains","commune":"Lugrin","nom":"Allamand","type":"Château","periode":"XIV","histoire":"ALLAMAND: Etait au XIIe siècle a la seigneurie des Allinges, le château fut vendu au XIVe aux de Russin qui le gardèrent deux cents ans, puis en 1561 le vendirent aux Dunant de la Place, et  par alliance passa en 1640 a Philippe de  Lucinge, puis à la famille de Compois toujours par alliance et ce dernier le vend en 1719 aux Bouvier d'Yvoire qui le revendront en 1753 à Jacques Folliet. \r\nEn 1849 monsieur de Constant de Rebecque l'acheta qui le revendit en 1865 au comte de Tardy de Montravel sa fille aîné épousa  le vicomte  Sixte de Brossia qui bâtit sa demeure en 1888 sur les ruines de la ferme du château. \r\nLe château d'Allamand passe aux vicomte de Sallmard de Ressis,  marié à la seconde fille du comte de Montravel. \r\nDans ce château eu lieu la rencontre  entre membres du gouvernement français et membres du gouvernement provisoire algérien dont l'accord fut signé à Evian  le 17 Mars 1962. \r\nLe château sert aujourd'hui de colonie de vacances.","architecture":"Allamand:  Ensemble de bâtiment divers anciens   bâtiments rectangulaires avec tour ronde couronné de mâchicoulis et le nouveau château du XIXe siècle corps logis rectangulaire à deux niveaux flanqués d'un pavillon carré.","habitants":"Famille des seigneurs d'Allinges\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Allamand_1.jpg","../image/image_74/74_Allamand_2.jpg"]},"Consult_chateau_formulairefc23":{"id":"Consult_chateau_formulairefc23","dept":"74","canton":"Thonon-les-Bains","commune":"Allinges","nom":"Allinges","type":"Vestiges","periode":"X-XIII","histoire":"ALLINGES: Sur la commune qui domine la plaine du Léman deux châteaux furent construits  face à face \"château vieux\" au Xe siècle et \"château neuf \" au XIIe siècle, ces deux châteaux furent fortifiés et furent le centre administratif, religieux et militaire de tout le Chablais. \r\nLe Château-Vieux des seigneurs d'Allinges qui furent témoins de confrontations entre  les comtes de Savoie. \r\nPuis par héritage  passa aux comtes de Faucigny, Pierre de Savoie réunit les deux châteaux par son mariage avec Agnés de Faucigny; puis aux Dauphins du Viennois qui le conserveront jusqu'en 1335 et subit les assauts des Genevois. Le Château-vieux fut démantelé en 1700.  François de Salles  y séjourna en hiver 1594.","architecture":"Allinges: Ruines de deux châteaux séparés par un fossé très large. Château-Vieux grand donjon quadrangulaire (18 X 20) du XIIe siècle sa face méridionale seule conservée jusqu'aux créneaux haute de 25 mètres, angle nord pourvu d'une cage d'escalier carrée; enceintes hautes, base de deux tourelles du XIIIe siècle.    Château-Neuf; en deux parties, enceinte de bases commune du XIIe siècle enceinte polygonale étirée avec un donjon carré de 14 m de côté. \r\nCes deux châteaux subirent de gros dégâts en 1291 et 1302 puis rénover surtout Château-Neuf et abandonné au XVIIe siècle.","habitants":"Seigneurs d'Allinges                                                           \r\n Seigneurs de Faucigny\r\n        \"","divers":"Vestiges des vieux chateaux féodaux","gps":"","images":["../image/image_74/74_Allinges_1.jpg","../image/image_74/74_Allinges_2.jpg","../image/image_74/74_Allinges_3.jpg","../image/image_74/74_Allinges_4.jpg","../image/image_74/74_Allinges_5.jpg","../image/image_74/74_Allinges_6.jpg"]},"Consult_chateau_formulaire7b08":{"id":"Consult_chateau_formulaire7b08","dept":"74","canton":"Roches-sur-Foron","commune":"Amancy","nom":"Amancy","type":"Maison forte","periode":"XIV","histoire":"AMANCY: la seigneurie d'Amancy remonte bien avant le XIII.Humbert, Daniel et Perrod d'Amancy passent reconnaissance en faveur du comte de Genève pour des biens féodaux jusqu'en 1397 date à laquelle apparait Henri, vice châtelain de Chaumont, son petit-fils reçoit en 1426 l'investiture du château (Jean d'Amancy conseiller du roi Charles VaIIet duc de Savoie et  en 1588 Jean d'Amancy vend à François de Sales.        \r\nDans la commune plusieurs maisons fortes              \r\nVEGE:  Végé est le berceau de la famille de Végé, Guillaume de Végé écuyer du pape Léon X et chanoine de la cathédrale en 1518 subira beaucoup de tumulte il fut condamné à quitter la ville de la Roche en 1534 et décéda en 1535 Inhumé à la Roche sur Frons.                      VOZERIER: Dépendait des Faucigny; Au XVIe siècle la famille Vozerier s'éteint au profit des aux de Ville seigneur de la Croix.                                    DELAVEZAY: de la seigneurie des Faucigny-Lucinges cette famille s'éteint au XVIIIe siècle.                                                              QUARRE; de la famille de Thoire, puis aux Benevix.","architecture":"Amancy: Maison forte construite au XIVe siècle, corps de logis rectangulaire flanquée de tour carrée à niveau inférieur. \r\nDe Végé: Imposant corps de logis  transformé en ferme. Vozerier ; vestige de la  \"tour de Vozerier\" c'était une bâtisse carrée de 12 mètres de côté avec des murs de 2,40 mètres d'épaisseur utilisé comme carrière de pierres avant d'être rasé en 1989. \r\nLavenay; Corps de logis rectangulaire, flanqué d'une tour ronde.","habitants":"Seigneur d'Amancy\r\n        \"","divers":"Vestiges du Chateau et tour de Vozerier et maison forte de Lavenay et d'Amancy","gps":"","images":["../image/image_74/74_Amancy_1.jpg","../image/image_74/74_Amancy_2.jpg","../image/image_74/74_Amancy_3.jpg","../image/image_74/74_Amancy_4.jpg"]},"Consult_chateau_formulaire5591":{"id":"Consult_chateau_formulaire5591","dept":"74","canton":"Annecy","commune":"Annecy","nom":"Annecy","type":"Château","periode":"XII","histoire":"ANNECY: A l'origine forteresse et capitale,  a appartenu a partir de 1150 a trois  familles princières, les comtes de Genève, les comtes de Savoie et les seigneurs de Faucigny qui y demeurèrent dans le donjon carré qui se dressait au milieu du château,  jusqu'au XIVe siècle maintenant rasé . \r\n A la mort de Clément VII  en 1394, le comté  de Genève fut acquis  en 1401 par la maison de Savoie, il appartenait à Amédée VIII  duc de Savoie en 1416,  donna le comté à son fils Philippe, à la mort de ce dernier, en 1460, Janus, son fils en hérita, à sa mort sans héritier la seigneurie fut de retour à la maison de Savoie.  \r\nEn 1514 Le duc Charles III, avait érigé en duché du genevois en faveur de son frère Philippe époux de Charlotte d'Orléans,  de Jacques de Savoie-Nemours qui avait épousé Anne d'Este petite fille de Louis XII et d'Anne de Bretagne.  \r\nEn 1565, la lignée d'une branche cadette des Savoie prendra le nom de Savoie-Nemours, La seigneurie passa à Louis  de Sales ( frère de Saint-François ) qui reçurent en 1600 Henry IV et en 1630 Louis XIII, rendirent le château sans résistance, puis modifié à des fins militaires. En 1659 sans reprise princier le château passa à l'évêché qui l'abandonnèrent en 1665 repris par l'armée qui le conservèrent jusqu'en 1860 et quittèrent les lieux en 1947, racheté par la ville en 1953, aujourd'hui musée de l'histoire locale.                                   Palais de L'Ile; du XIIe siècle pour servir la maison seigneuriale des seigneurs de L'Ile, fut hôtel administratif d'Annecy du jour de l'installation des comtes de Genève dans cette ville.  En 1325 passa aux Monthouz sur demande  d'Amédée VIII, puis à la femme de Janus,  Héléne de Luxembourg, dans cette famille jusqu'au XVIe siècle, récupéré par les ducs Genevois-Nemours, en firent un palais de Justice, puis transformé en prison, atelier monétaire et hospice de vieux et réhabilité en musée d'histoire d'Annecy.","architecture":"Annecy: .La forteresse, château comtal du XIIe siècle , enceinte de 55 m  par 125 m qui suivent les contours d'un éperon  rocheux, fut en partie détruite par un incendie au début du XVe siècle, le comte de Genève fit construire le château tout en gardant des éléments du XIIe siècle, corps de logis flanqués de tours;  donjon carré du XIIe, dit la \"Tour de la reine\" deux donjons sur le remparts nord, tour Saint-Pierre (1430), la tour Saint-Paul (1383 Le corps de \"logis Nemours\"; fut construit en 1553  et le logis et tour Perrière   carrée) de 1445. L'ensemble qui était une résidence raffinée, un vaste casernement subit de grave dommage lors de la transformation en caserne en 1742  et transformé en musée.                                       Palais de l'Ile; Maison forte appelé aussi \"vieille prison\" de forme de vaisseau  sur les eaux du Thiou depuis le XIIe siècle chapelle et tourelles du XVIe siècle.","habitants":"Les comtes de Genève            \r\nLes ducs de Savoie\r\n        \"","divers":"Château Comtal, vue dela porte d'entrée , le Palais de L'Ile.\r\nChateau devenu prefecture et Maison-Forte","gps":"","images":["../image/image_74/74_Annecy_1.jpg","../image/image_74/74_Annecy_2.jpg","../image/image_74/74_Annecy_3.jpg","../image/image_74/74_Annecy_4.jpg","../image/image_74/74_Annecy_5.jpg","../image/image_74/74_Annecy_6.jpg","../image/image_74/74_Annecy_7.jpg","../image/image_74/74_Annecy_8.jpg"]},"Consult_chateau_formulaire0c99":{"id":"Consult_chateau_formulaire0c99","dept":"74","canton":"Frangy","commune":"Arcine","nom":"Arcine","type":"Château","periode":"XII","histoire":"ARCINE: Au XIIe siècle appartient aux seigneurs d'Arcine, en 1296 , le comte Amédée II l'inféode à François de Lucinges, cette famille le garderont jusqu'en 1398 vendu à François de Verbos, le château garda le nom d'Arcine, par alliance à la famille de Verboz puis  passa  en 1715 à François Collomb et cette  famille de Collomb d'Arcine le garda jusqu'au XIXe siècle. \r\nLe château fut ensuite vendu à monsieur Gustave Burlat et au XXe siècle racheté par monsieur Emile Belime haut commissaire au Niger, toujours dans la famille.","architecture":"Arcine:Il ne subsiste plus rien du château médiéval,  le château qui fut construit en 1628, vaste corps de logis à deux niveaux percé de portes cochères; beau pavillon de la conciergerie sur le bord de l'allée.","habitants":"Famille de Lucinges                                                               \r\n Famille de Verbos\r\n        \"","divers":"Château médiéval","gps":"","images":["../image/image_74/74_Arcine_1.jpg","../image/image_74/74_Arcine_2.jpg","../image/image_74/74_Arcine_3.jpg","../image/image_74/74_Arcine_4.jpg"]},"Consult_chateau_formulairee312":{"id":"Consult_chateau_formulairee312","dept":"74","canton":"Arenthon","commune":"Arenthon","nom":"Arenthon","type":"Château","periode":"XVI","histoire":"ARENTHON: Etait le fief des Faucigny-Lucinges. \r\nAu XVe siècle cette seigneurie prit le nom d'Arenthon-d'Alex suite au mariage de Pierre d'Arenthon avec Marguerite d'Alex, ces descendants garderont le château jusqu'en 1705. \r\nPuis par alliance le château passe à Edouard de Conzié, son fils François de Conzier des Charmettes, ami de Jean Jacques Rousseau à Chambéry, le château fut transmit  à la famille de Gerbaix de Sonnaz dont cette famille le posséderont jusqu'en 1921.","architecture":"Arenthon: Pavillons renaissances construit au XVIe siècle qui à remplacé le château médiéval d'Alex.","habitants":"Famille d'Arenthon-Alex\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Arenthon_1.jpg","../image/image_74/74_Arenthon_2.jpg","../image/image_74/74_Arenthon_3.jpg"]},"Consult_chateau_formulaire60f1":{"id":"Consult_chateau_formulaire60f1","dept":"74","canton":"Crusseilles","commune":"Crusseilles","nom":"Avenières","type":"Château","periode":"XX","histoire":"AVENIERES: Luxueux château du début du XXe siècle bâti par Marie Wallace à 1500 mètres d'altitude sur le Salève, Marie se remarie en 1910 avec le prince Assan Farid Dina, fils ds'un maharadja indien ce dernier fut assassiné en 1928. \r\nLe château fut vendu à une société immobilière  qui le prête à des ursulines polonaises, puis à la croix rouge Suisse, revendu plusieurs fois pour terminé en un luxueux hôtel restaurant.","architecture":"Avenières: Château du XXe siècle  corps de logis à quatre étages avec attique, semi-tours en façade et tour carrée à toit pointu accolée","habitants":"Marie Wallace\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Avenieres_1.jpg","../image/image_74/74_Avenieres_2.jpg","../image/image_74/74_Avenieres_3.jpg"]},"Consult_chateau_formulaire0bf5":{"id":"Consult_chateau_formulaire0bf5","dept":"74","canton":"Brenthonne","commune":"Avully-sous-les-Voirons","nom":"Avully","type":"Château","periode":"XV","histoire":"AVULLY: Au XVe siècle propriété des seigneurs d'Avully, vassaux des sires de Faucigny, comtes de Genève. \r\nPassera en 1499 à la famille de Saint-Michel et racheté au XVIIIe siècle par la famille de Sales, puis transformé en exploitation agricole tombe  à l'abandon et racheté dernièrement par la famille Guyon qui l'on restauré.","architecture":"Avully: Deux corps de logis quadrangulaire à trois niveaux, cour intérieure et une tour au nord en forme d'amande, pont levis, et grosse tour carrée  sur l'entrée et échauguettes en angles, il fut remanié au XVIe et XXe siècle.","habitants":"Seigneurs d'Avully\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Avully_1.jpg","../image/image_74/74_Avully_2.jpg","../image/image_74/74_Avully_3.jpg","../image/image_74/74_Avully_4.jpg"]},"Consult_chateau_formulaired837":{"id":"Consult_chateau_formulaired837","dept":"74","canton":"Annecy-le-Vieux","commune":"Argonay","nom":"Barrioz","type":"Maison forte","periode":"XIV","histoire":"BARRIOZ: Construit par la famille de Monthouz, famille vassale des comtes de Genève, passa en comté en 1700, la lignée des comtes de Barrioz s'éteint en 1869, le château à cette date fut cédé à un neveu Emmanuel Flocard de Mépieu, à la mort de ce dernier passa en héritage à sa nièce la comtesse d'Anières de Sales. Aujourd'hui à la famille Billy.","architecture":"Barrioz: Bien qu'appelé château cette maison forte savoyarde de construction massive à trois niveaux de forme cubique, toit à quatre pans, deux tours rondes encadrent le porche d'entrée.","habitants":"Famille de Monthouz\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Barrioz_1.jpg"]},"Consult_chateau_formulaire828b":{"id":"Consult_chateau_formulaire828b","dept":"74","canton":"Annemasse","commune":"Arthaz-Pont-Notre-Dame","nom":"Baudry","type":"Château","periode":"XVI","histoire":"BAUDRY: Les premiers seigneurs famille d'Arthaz qui firent construire le château reprit par Raymond de Baudry au XVIe siècle. \r\nCette famille gardèrent le château jusqu'à la Révolution, le château passa par alliance en 1864 à Edouard Chardon qui épousa Hélène de Baudry, appartient aujourd'hui à la famille de Vernotte.","architecture":"Baudry: Grosse bâtisse carrée , deux petites tours rondes encadrent une terrasse  sur la façade Nord-Ouest et grosse tour ronde à l'opposé, ne possède pas d'enceinte.","habitants":"Famille de Baudry\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Baudry_1.jpg"]},"Consult_chateau_formulaired327":{"id":"Consult_chateau_formulaired327","dept":"74","canton":"St-Jeoire","commune":"St-Jeoire","nom":"Beauregard_74","type":"Château","periode":"XIII","histoire":"BEAUREGARD: Château datant du XIIIe siècle qui a toujours était   dans la famille de la Fléchére, malgré qu'en 1589 il fut brûlé par les Genevois et de nouveau brûlé  à la Révolution et  servira de caserne; aujourd'hui le comte Roger de la Fléchère en est toujours propriétaire. \r\nDans la commune la maison forte  de CORMAND a connu plusieurs propriétaires dont les de la Faverge a mi-XVIIIe siècle, ensuite aux comtes de la Fléchère qui l'on vendu récemment à une famille polonaise.","architecture":"BEAUREGARD: Ce château domine le village a conservé son donjon du XIIIe siècle accolé a un corps de logis cubique de 14 mètres de côté du XIIIe siècle, l'ensemble entourè d'une enceinte  crénelée cantonnée de tours rondes et tourelles en encorbellerment dont une partie a été  détruite aprés la Révolution. \r\nCORMAND maison forte Implanté à la côte d'Hyot  Bonneville, bâtisse du XIVe siècle  autrefois entouré de fossés, deux ailes et massive tour carrée, vaste toit à quatre pans.","habitants":"Famille de la Fléchére\r\n        \"","divers":"Château de Beauregard","gps":"","images":["../image/image_74/74_Beauregard_1.jpg","../image/image_74/74_Beauregard_2.jpg","../image/image_74/74_Beauregard_3.jpg"]},"Consult_chateau_formulaire2b31":{"id":"Consult_chateau_formulaire2b31","dept":"74","canton":"Douvaine","commune":"Chens-sur-Léman","nom":"Beauregard_Chens","type":"Château","periode":"XIII","histoire":"BEAUREGARD-CHENS:  Cette construction relève des comtes de Genève, domaine inféodé en 1271 aux seigneurs du Villars, puis aux Ballaison, par alliance aux Myonnaz, passa ensuite aux Allinges et aux Budé est acquis en 1670 par Gaspard Costa, conseiller du duc de Savoie; en 1700 transformé en marquisas , en 1805 le marquis de l'époque décida de le remanier et aujourd'hui le marquis Costa de Beauregard en est toujours propriétaire.","architecture":"Beauregard: Château situé au bord du lac Léman comporte une grosse tour-donjon pentagonal dirigé vers l'Est du XII-XIIIe siècle coiffée d'une haute toiture du XVIIe siècle, les bâtiments accolés sont du XVe siècle; remanié en 1805.","habitants":"Famille Costa\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Beauregard_Chens_1.jpg","../image/image_74/74_Beauregard_Chens_2.jpg"]},"Consult_chateau_formulaire97b1":{"id":"Consult_chateau_formulaire97b1","dept":"74","canton":"Faverges","commune":"Doussard","nom":"Beauvivier","type":"Vestiges","periode":"XII","histoire":"BEAUVIVIER: Etait la propriété de la seigneurie des Duingt de Châteauvieux jusqu'en 1530  fut vendu ensuite au duc Philippe de Genevois-Nemours qui ce dernier revendra ses biens à Gaspard-Jodoc Stockalper de Brigue. \r\nLe château est déjà en ruine à cette époque et les Stockalper vendent le fief aux Monthouz et en 1698 les Monthouz cède Beauvivier, Ruange et Châteauvieux au marquis de Sales.","architecture":"Beauvivier: Du château du XIIe siècle Il ne reste qu'une tour en partie détruite.","habitants":"seigneurie des Duingt de Châteauvieux \r\n        \"","divers":"Vestiges du chateau de Beauvivier","gps":"","images":["../image/image_74/74_Beauvivier_1.jpg"]},"Consult_chateau_formulairef3e4":{"id":"Consult_chateau_formulairef3e4","dept":"74","canton":"Reignier","commune":"Reignier","nom":"Bellecombe_74","type":"Vestiges","periode":"XIII","histoire":"BELLECOMBE: Etait la propriété pendant des siècles de la famille de Thoire, issue des sires de Faucigny, passa au XVIe siècle aux Cholay et par alliance retourna aux Thoire, puis passa au marquis d'Allinges Coudrée et depuis le milieu du XVIIIe siècle appartient à Joseph Mareschal de la Valdisère.","architecture":"Bellecombe; Le château fut détruit en 1591 par les protestants français  au service de la république de Genève depuis reste d'une tour ruinée de 25 mètres de haut.","habitants":"Famille de Thoire \r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Bellecombe_1.jpg"]},"Consult_chateau_formulaire1daf":{"id":"Consult_chateau_formulaire1daf","dept":"74","canton":"Cluses","commune":"Magland","nom":"Bellegarde_74","type":"Maison forte","periode":"XII","histoire":"BELLEGARDE: Ce château faisait partie de la seigneurie de Bellegarde (berceau de cette famille) qui figure parmi les plus anciennes lignées féodales de Faucigny. La descendance des Bellegarde s'éteignit au début du XVIIIe siècle.","architecture":"Bellegarde; Cette massive tour carrée est le reste d'un puissant château construit pour surveiller la vallée de L'Arve.","habitants":"Seigneurs de Bellegarde\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Bellegarde_1.jpg","../image/image_74/74_Bellegarde_2.jpg"]},"Consult_chateau_formulairea54b":{"id":"Consult_chateau_formulairea54b","dept":"74","canton":"Samoëns","commune":"Samoëns","nom":"Berouze","type":"Manoir","periode":"XVII","histoire":"BEROUZE; Construit en 1660 par Bernard Ducis notaire et ancien châtelain de Saint-Jeoire, passa à la famille de  Lejeune  par alliance en 1748  à Don Juan Juradoz capitaine espagnol en garnison à Samoëns et toujours par alliance en 1775 le château passa à François-Joseph-Marie Rouge qui hérita en plus d'une fortune considérable de son beau-pére espagnol gouverneur de Cadix. \r\nFrançois Rouge après la perte de son épouse reste au château avec la soeur de celle-ci mademoiselle Lejeune et installe dans ce dernier en 1802 des cours d'enseignements supérieures.","architecture":"Berouze: Massive demeure rectangulaire à deux niveaux.","habitants":"Famille de Bernard Ducis \r\nFamille de Lejeune\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Berouze_1.jpg"]},"Consult_chateau_formulaireb0af":{"id":"Consult_chateau_formulaireb0af","dept":"74","canton":"Evian-les-Bains","commune":"Lugrin","nom":"Blonay","type":"Château","periode":"XVIII","histoire":"BLONAY:  Le château de Blonay appelé aussi Tourronde est lié à l'histoire de la maison forte de la Chapelle-Marin et à celle de la Chapelle St-Etienne. Au XIe siècle les seigneurs de Blonay en étaient propriétaires jusqu'à la Révolution.  En 1755 le baron Claude-Louis de Blonay fait l'acquisition de la maison forte et du domaine  de la chapelle  attenants dont celle de la chapelle de Saint-Etienne.  A la Révolution acquit par  la famille Anthonioz de Thonon, qui  fait construire l'actuel château, maison carrée à un étage à la limite des deux communes.  En 1867 les descendants revendent la propriété à la famille de Blonay. Le baron François de Blonay fait rehaussé la maison d'un étage  et construit un donjon carré attenant; (aspect actuel du château). Après la guerre 14-18, le baron Henri de Blonay lègue son château à la famille de Molayron laquelle cède par la suite au père Rollin qui le transforme en noviciat pour les oblats de Saint-François de Sales qui l'occupèrent jusqu'en 1994 et racheté par la commune de Publier en 1995.                                                                                Villa LUMIERE; Achetée en 1896 par l'industriel Antoine Lumière, abrite actuellement l'hôtel de ville.","architecture":"Blonay: ruines de deux châteaux: Maxilly vestiges du XIIIe et \"Château-Vieux\"  vestiges d'un donjon du XIIIe siècle. Le  château de Blonay  construit en 1535 une maison carrée à un étage en 1794 en deux temps, puis en 1884 restauré et rehaussé d'un autre étage et rajout du donjon.","habitants":"Famille de Blonay     \r\nFamille Lumiere\r\n        \"","divers":"Château de Blonay","gps":"","images":["../image/image_74/74_Blonay_1.jpg","../image/image_74/74_Blonay_2.jpg","../image/image_74/74_Blonay_3.jpg","../image/image_74/74_Blonay_4.jpg"]},"Consult_chateau_formulaire1087":{"id":"Consult_chateau_formulaire1087","dept":"74","canton":"Douvaine","commune":"Balaison","nom":"Boisy","type":"Maison forte","periode":"XIII","histoire":"BOISY: Premiers seigneurs connus, les Pinart au XIIIe siècle qui construisirent la maison forte, par alliance passa au XIVe siècle à la famille de Montfort et par alliance passa à Jean de Allinges qui prit le titre de seigneur de Boisy, cette famille conservera le château jusqu'en 1600 toujours par alliance ce domaine passa à la famille Budé qui le garde jusqu'en 1796, vendu à Madeleine Lullin et revendu ensuite en 1801 à la famille Monachon, puis cédé à Edouard de Maupeou marié à une descendante de Budé, passa à la famille Boigne qui ces derniers le revendent à Albert Turrenttini, toujours dans cette famille.","architecture":"Boisy: Château du XVe siècle corps de logis  rectangulaire a trois niveaux accolé à l'ancien donjon carré, l'ensemble remanié au XXe siècle.","habitants":"Seigneur de Boisy           \r\nfamille Budé\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Boisy_1.jpg"]},"Consult_chateau_formulaire8d16-2":{"id":"Consult_chateau_formulaire8d16-2","dept":"74","canton":"Thorens-Glières","commune":"Villaz","nom":"Bon_Attrait","type":"Château","periode":"XX","histoire":"BON-ATTRAIT:Ce château était en 1346 à la famille de Folliet, passa pour quatre siècles à la famille Menthon-Lornay, au XVIIIe siècle passa par alliance  à la famille Vulliet et fut racheté en 1813 par Joseph  Henry Chappuis  industriel, vendu ensuite à la famille Grasset et en 1893 à Lombard Claude de Villaz, en 1912 racheté par Mlle Marguerite Privat cette dernière décède un an aprés son frère Eugène Privat  hérite et créer la maison de repos qui était le désir de Marguerite; Eugène vend le château en 1949, racheté par le docteur Charles Cattin qui continua dans le sanitaire  jusqu'en 1987 reprit par ses filles  Lenfant et Crépy qui ne cessent d'améliorer le centre médical.","architecture":"Bon-Attrait, corps de logis rectangulaire de quatre niveaux flanqué sur les deux côtés de tours  carrées suite aux améliorations apportées au XXe siècle pour l'agrandissement du centre médical.","habitants":"Famille de Folliet\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Bon_Attrait_1.jpg"]},"Consult_chateau_formulaire77e0":{"id":"Consult_chateau_formulaire77e0","dept":"74","canton":"Bonneville","commune":"Bonneville","nom":"Bonneville","type":"Château","periode":"XIII","histoire":"BONNEVILLE: Pierre II de Savoie fonda Bonneville et lui accorda des franchises ce qui lui valut son nom, la cité devint capitale de la Provence de Faucigny, en 1262 fit construire le fortin pour sa fille Béatrix de Faucigny et en 1290 le château pour son fils Hugues de la Tour du Pin qui se mariera à Marie de Savoie fille du comte Amédée V.  \r\nEn 1355 annexion de Faucigny à la Savoie  Bonne de Bourbon reçoit de son mari le comte Amédée VI le château qui en 1392 sera sérieusement endommagé par un violent incendie. \r\nAu XVI-XVIIe siècle la seigneurie de Faucigny appartient aux Genevois-Nemours et une partie du château servit de prison jusqu'en 1934, puis centre culturel de la ville qui en est propriétaire.","architecture":"Bonneville: Du château  du XIIIe siècle qui se trouvait sur un promontoire à 450 mètres d'altitude sur une enceinte quadrangulaire de 18 m x 85 m; flanquée de tours circulaires en angles, ils  n'en subsistes que deux  tours rondes de 21 et 15 mètres de haut séparées par une courtine de 18 mètres  et d'un bâtiment. l'ensemble restauré au XVIe siècle.","habitants":"Les seigneurs de Faucigny\r\n        \"","divers":"Château féodal de Bonneville","gps":"","images":["../image/image_74/74_Bonneville_1.jpg","../image/image_74/74_Bonneville_2.jpg","../image/image_74/74_Bonneville_3.jpg","../image/image_74/74_Bonneville_4.jpg","../image/image_74/74_Bonneville_5.jpg","../image/image_74/74_Bonneville_6.jpg","../image/image_74/74_Bonneville_7.jpg"]},"Consult_chateau_formulaire5af4":{"id":"Consult_chateau_formulaire5af4","dept":"74","canton":"Reignier","commune":"Fillinges","nom":"Bouge","type":"Maison forte","periode":"XIV","histoire":"BOUGE: au XIVe siècle la maison forte appartient à la famille du Fresnoy, passera ensuite aux de Bellegarde seigneurs et au XVIIIe siècle  aux Gatelet-Rochette. \r\nEn 1961 le docteur Martinet racheta la maison forte.","architecture":"Bouge: Corps de logis à deux niveaux de plan carré, assez imposant.","habitants":"Famille du Fresnoy\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Bouge_1.jpg"]},"Consult_chateau_formulaire17ee":{"id":"Consult_chateau_formulaire17ee","dept":"74","canton":"Douvaine","commune":"Lully","nom":"Buffavent","type":"Maison forte","periode":"XV","histoire":"BUFFAVENT: Les premiers seigneurs les sires de Langin par alliance passa à la famille de Bellegarde qui le conservera jusqu'en 1650, et toujours par alliance rentre dans la famille de Seyssel. \r\nAu XVIIIe siècle Philippine de Seyssel le transmet à son mari Claude de Gerbaix de Sonnaz dont les descendants l'ont conservé jusqu'au XXe siècle . \r\nTransformé aujourd'hui en copropriété.","architecture":"Buffavent; Maison forte dont le corps de logis à deux étages du XVe siècle, donjon carré, encadrée de quatre tours rondes.","habitants":"famille de Langin             \r\nfamille de Bellegarde \r\nfamille de Gerbaix de Sonnaz\r\n        \"","divers":"Maison forte de Buffavent","gps":"","images":["../image/image_74/74_Buffavent_1.jpg","../image/image_74/74_Buffavent_2.jpg","../image/image_74/74_Buffavent_3.jpg"]},"Consult_chateau_formulaire9789":{"id":"Consult_chateau_formulaire9789","dept":"74","canton":"Crusseilles","commune":"Cernex","nom":"Cernex","type":"Maison forte","periode":"XIII","histoire":"CERNEX: Au XIIIe siècle propriété de la famille de Lucinges puis à la famille d'Arlod et à la famille de Viry, au XVIe siècle à la famille  de Montluel qui ces derniers en firent don  en 1580 au duc de Savoie Emmanuel-Philibert.\r\nInféodé l'année suivante à Pierre Mandallaz, cette famille de notaire anoblis qui deviendrons seigneurs de Cernex. Le château sera vendu par la veuve de Mandallaz au prince Thomas de Savoie, troisième fils du duc Charles Emmanuel Ier; mais le prince revend le château  à Lazare Costa, famille qui sera anoblis en 1647  et recevra le titre de comte de Cernex et celui de marquis de Beauregard en 1700. \r\nLe château sera vendu à Louis Brun qui passera par alliance  en 1813 à la famille le Blanc. \r\nPlusieurs changements au XXe siècle a finalement été acquis par la famille Jean Dawint en 1960 pour le remettre en état.","architecture":"Cernex: Maison forte encadrée par deux gros pavillons rectangulaires à quatre niveaux.","habitants":"famille de Lucinges\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Cernex_1.jpg"]},"Consult_chateau_formulairecd25":{"id":"Consult_chateau_formulairecd25","dept":"74","canton":"Frangy","commune":"St-Julien-en-Genevois","nom":"Chaumont","type":"Vestiges","periode":"XI","histoire":"CHAUMONT:Ce château faisait partie au XIe siècle d'un fief qui dépendait des comtes de Genève, Guillaume de Chaumont vassal du comte de Genève, et en 1401 devient la propriété des comtes de Savoie. \r\nEn 1536 la France envahie la Savoie  François Ier y logea, attaqué ensuite par les bernois et les genevois,  il sera démoli en 1630 par Louis XIII.","architecture":"Chaumont: Du château construit sur un promontoire rocheux à 630 m d'altitude au-dessus des gorges du Fornant, il ne reste que des vestiges d'un donjon 9 x 11 m de côtés.","habitants":"Guillaume de Chaumont\r\n        \"","divers":"Vestiges du Câteau de Chaumont","gps":"","images":["../image/image_74/74_Chaumont_1.jpg","../image/image_74/74_Chaumont_2.jpg","../image/image_74/74_Chaumont_3.jpg"]},"Consult_chateau_formulaire4e53":{"id":"Consult_chateau_formulaire4e53","dept":"74","canton":"Rumilly","commune":"Vallières","nom":"Chitry","type":"Château","periode":"XIV","histoire":"CHITRY: Construit au moyen âge par les seigneurs de la Vallières. Passa au XVe siècle aux de Montfalcon passa par alliance à son cousin Baron de Flaxieu  et toujours par alliance en 1610 à Balthazard de Mouxy Tavernay, toujours par alliance passa à Claude-Jérôme Chabod de Saint-Maurice que cette famille conservera jusqu'en 1832 et par héritage passa aux comtes Grenaud de la Tour Saint-Christophe. \r\nAu XXe siècle est utilisé pour colonie de vacances.","architecture":"Chitry: Ce château à perdu son caractère défensif pour devenir une résidence de campagne.","habitants":"Seigneurs de la Vallières\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Chitry_1.jpg"]},"Consult_chateau_formulairee123":{"id":"Consult_chateau_formulairee123","dept":"74","canton":"Annecy","commune":"Choisy","nom":"Choisy","type":"Maison forte","periode":"XVI","histoire":"CHOISY: fief  de la seigneurie de Vulpillière qui passa au XIIIe siècle à la famille de Compey, cette seigneurie passera à nouveau aux comtes de Genève qui le transmet à Jacques  de Dalmaz qui le vendra en 1568 à Louis Reydet qui ce dernier construisit le château, les descendants de ce premier seigneur de la Balme prennent le titre de Reydet de Vulpillières.\r\nDans la commune ;  Rossy: Maison forte du fief des de Reydet qui firent construire cette maison forte en 1559 qui fut la résidence des de Reydet de la Vulpilières du XVIe siècle à la Révolution. \r\nActuellement exploitation agricole.","architecture":"Choisy: Corps de logis rectangulaire flanqué de deux tours rondes dont une arasée, porche d'entrée surélevé d'une tour carrée. \r\nRossy: Beau portail d'entrée avec décors renaissance.","habitants":"Famille de Louis Reydet\r\n        \"","divers":"Château de Choisy \r\nMaison forte de Rossy","gps":"","images":["../image/image_74/74_Choisy_1.jpg","../image/image_74/74_Choisy_2.jpg"]},"Consult_chateau_formulaire5853":{"id":"Consult_chateau_formulaire5853","dept":"74","canton":"Seyssel","commune":"Clermont","nom":"Clermont(74)","type":"Château","periode":"XVI","histoire":"CLERMONT: Le fief appartenait au XIVe siècle à la famille de Regard, en 1401 le comté de Genève qui fait de ces lieux une base militaire est acquis par la maison de Savoie. \r\nGallois de Regard  de Clermont prêtre à 23 ans en 1535 évolue a de haute responsabilité ecclésiastique, évêque de Bagnorea au royaume de Naples, familier à la cour pontificale du Vatican, réside à Naples jusqu'en 1571 et revient s'installer à Clermont en 1568 fit  construire un hôtel à Annecy connu sous le nom de Bagnorea et fait bâtir le château actuel en 1576 pour résidence d'été ; Gallois décède en 1582 ,  le château revient à son neveu les Regard de Vars en 1678 Clermont érigé en comté; grande famille de la noblesse ambassadrice, militaire etc.  resta dans cette famille jusqu'en 1860 année ou s'éteint la comtesse de Clermont, le château fut acquis par le comte Tancréde  de Fortis qui céde en  1921 aux Cottin fermier du domaine et passera ensuite à la famille Gay racheté depuis 1966 par le département.\r\n(François de Sales a reçu la tonsure dans la chapelle).","architecture":"Clermont: Sur le site à 690 m d'altitude le château est construit sur l'emplacement d'un ancien château dont-il ne reste que des débris d'enceinte et un donjon circulaire de 10 mètres de diamètre.\r\n Le château actuel  de 1576 dans un style renaissance italienne, grand corps de bâtiment, cour intérieure   entourée sur les trois côtés par trois étages de galeries à arcades et de balustre.","habitants":"Mgr Gallois de Regard\r\n        \r\n        \"","divers":"Château de Clermont","gps":"","images":["../image/image_74/74_Clermont_1.jpg","../image/image_74/74_Clermont_2.jpg","../image/image_74/74_Clermont_3.jpg","../image/image_74/74_Clermont_4.jpg","../image/image_74/74_Clermont_5.jpg","../image/image_74/74_Clermont_6.jpg","../image/image_74/74_Clermont_7.jpg"]},"Consult_chateau_formulaireedf0":{"id":"Consult_chateau_formulaireedf0","dept":"74","canton":"La Roche-sur-Foron","commune":"St-Pierre-de-Faucigny","nom":"Cohendier","type":"Château","periode":"XIV","histoire":"COHENDIER: D'une famille de notaire qui donna leur nom au château qu'il acquérirent au XIVe siècle. \r\nPassa par alliance en 1565  aux Menthon-Beaumont puis aux Montfort qui le garderont jusqu'en 1684. Racheté à cette date  par Charles de  Rochette qui prend le titre  de Baron de Cohendier par l'achat d'autres châteaux  Sconzier, Araches  etc... il devient l'un des plus gros propriétaires de la région.  En 1766 le château passe par alliance à François Joseph de Viry dont la famille  le possédera jusqu'en 1909. Pendant la première guerre mondiale il fut vendu à un baron autrichien et repris à la fin de la guerre, il a était racheté par la famille Rabourdin puis transformé en maison de repos.","architecture":"Cohendier: Grand corps de logis rectangulaire à quatre niveaux,  flanqué de deux grosses tours rondes et d'une tour octogonal rajoutée au XIVe siècle couronnée de créneaux avec toiture effilé pour les trois.","habitants":"Famille de Cohendier\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Cohendier_1.jpg"]},"Consult_chateau_formulaire5b1e":{"id":"Consult_chateau_formulaire5b1e","dept":"74","canton":"Thonon-les-Bains","commune":"Sciez-sur-Léman","nom":"Coudree","type":"Château","periode":"XV","histoire":"COUDREE: Depuis 1245 les terres furent donnés par l'abbé de Saint-Maurice à la veuve d'Henri d'Allinges, ces terres furent complétés par la forêt de Coudray donné par le comte Pierre de Savoie, dés lors prendra naissance  la branche Allinges-Coudrée et cette seigneurie sera conservée dans cette famille jusqu'en 1840 par la mort du dernier marquis  Prosper-Gaëtan d'Allinges. \r\nDans cette famille tout au long de ces siècles il y eu d'illustres personnages militaires.   \r\nLes biens resteront dans la famille aux cousins germains  et aux comte-duc et à la comtesse Ricci de Saint-Paul qui le transmettra au marquis Alfieri di Sostegno, puis à Cavour qui se désintéressera du château qui sombra en ruines.\r\n En 1858 le marquis vend le château à un financier Genevois Anatole Bartholoni premier député de la Haute-Savoie qui le fit restauré; Au décès de Bertholoni sa veuve le cède à sa belle-soeur dont le fils René Bertholoni  et le transformera  en hôtellerie.","architecture":"Coudree: Ce château avait une enceinte rectangulaire de 34 x 44 m  fortifié, flanquée  de tourelles rondes en angles entourant le donjon carré  de 9,75m de côté, sous l'angle NE de la tour carrée ont été retrouvé les fondations d'un donjon circulaire de 5 m de diamètre, fut complètement démantelé en 1591, le corps de logis subsista,  remanié par deux autres corps de logis à trois niveaux disposés en forme de U.  Le château fut remanié en 1912.","habitants":"Famille d'Allinges-Coudrée \r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Coudree_1.jpg","../image/image_74/74_Coudree_2.jpg","../image/image_74/74_Coudree_3.jpg","../image/image_74/74_Coudree_4.jpg"]},"Consult_chateau_formulaire3ae5":{"id":"Consult_chateau_formulaire3ae5","dept":"74","canton":"Annecy","commune":"Duingt","nom":"Dhere","type":"Château","periode":"XV","histoire":"DHERE: Bertrand Dhéré au XVe siècle président du conseil du Genevois remanie la maison forte en château actuel. Le château passa par alliance en 1532 à la famille de Chevron-Vilette.  \r\nEn 1621 par alliance aux  Valperga qui le conservera jusqu'en 1648, passa à la famille de Sales, puis vendu comme bien national à Jean Berthet, puis racheté en 1839 par le baron Scipion Ruphy avocat au sénat de Savoie par alliance le château passe à Francisque Frèrejean d'une famille  de maîtres de forges lyonnais qui le fit restaurer par les disciples de Viollet-le-Duc, et toujours par alliance au XXe siècle  au baron Dianous de la Perrotine toujours dans cette Famille.","architecture":"Dhere: Corps de Logis de forme carré  à trois niveaux flanqués de deux tours carrées couronnées de mâchicoulis. A était remanié en 1870.","habitants":"Famille Dhéré\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Dhere_1.jpg","../image/image_74/74_Dhere_2.jpg","../image/image_74/74_Dhere_3.jpg"]},"Consult_chateau_formulaire8bdc":{"id":"Consult_chateau_formulaire8bdc","dept":"74","canton":"Seynod","commune":"Duingt","nom":"Duingt","type":"Château","periode":"XII XIII","histoire":"DUINGT: Châteauvieux appelé aussi  \"Durphy\". \r\nEn 1220 premier seigneur connu Raymond de Duingt, en 1296, Radolphe de Duingt vendit une partie du domaine à Amédée II comte de Savoie, mais conserve Châteauvieux,  ( l'autre partie fut cédée par Louise de Duingt, marié au comte de Masimo, Tomaso de Valperga en 1530, à Philippe de Savoie comte du Genevois et premier duc de Nemours); Par héritage, l'ensemble reconstitué échut à Jeanne de Genevois-Nemours épouse du duc de Savoie Charles-Emmanuel II.\r\n En 1673 Châteauvieux est vendu à la famille Stockalper  (industriel), puis revend le château aux Monthoux et revendut aux marquis de Sales qui le rénovèrent et le  gardèrent jusqu'à la Révolution, vendu comme bien national en 1796 à Jean Berthet qui le céda en 1839 au baron  Scipion Ruphy de Menthon de Lornay, la fille de ce dernier  épousa  le comte Henri de la Barge de Certeau qui en sont toujours propriétaire. \r\n Château COMTAL de Duingt; château militaire pour surveiller Châteauvieux et le trafic sur le lac entre l'Italie et Genève, bâtit par les marquis de sales aux XIe siècle, racheté par le comte Amédée II, en 1480 passe à Hélène de Luxembourg et par alliance passe aux Luxembourg Martigues qui le conserveront jusqu'en 1600 et terminera chez le duc Henri de Genevois Nemours.","architecture":"Duingt: Châteauvieux: Sur un promontoire sur la presqu'île qui domine le lac d'Annecy, les parties les plus anciennes remontent au XIIe siècle; corps de logis rectangulaire  imposant flanqué d'une tour carrée en avant-corps, dominé d'un donjon médiévale crénelé que surmonte une tourelle de guet, ce château fut remanié au XVIIIe siècle en une élégante résidence seigneuriale d'été.             Château Comtal; ruiné au XVIII e siècle à servit de carrière de pierres, il n'en reste aujourd'hui que la base  d'un donjon de forme hexagonale.","habitants":"Famille du marquis de Sales\r\nFamille de Duingt\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Duingt_1.jpg","../image/image_74/74_Duingt_2.jpg","../image/image_74/74_Duingt_3.jpg","../image/image_74/74_Duingt_4.jpg","../image/image_74/74_Duingt_5.jpg","../image/image_74/74_Duingt_6.jpg"]},"Consult_chateau_formulairea92a":{"id":"Consult_chateau_formulairea92a","dept":"74","canton":"La Roche-sur-Foron","commune":"La Roche-sur-Foron","nom":"Echelle","type":"Château","periode":"XII","histoire":"ECHELLE: Construit au XIe siècle par les comtes du genevois au XIVe siècle à Amédée II, puis passa  à la famille de Cohendier, passa ensuite aux Benevix qui le revendent en 1679 à Louis de Chissé de Pollinge et par alliance par  leur fille à la famille de Charles Saultier de la Balme qui ces derniers le revendent au Rogés. \r\nEN 1858, jean Georges de Chissé de Pollinge racheta le château.            Au XXe siècle propriété de la comtesse Potocka, dépouillé par les propriétaires suivants, il fut racheté par la commune pour un centre culturel.","architecture":"Echelle: Corps de logis important à trois niveaux flanqués de quatre tours, la tour carrée qui est d'origine a été surélevé avec mâchicoulis et crénelage également pour la tour ronde  cette dernière n'a pas de toiture ainsi que la quatrième.","habitants":"famille de Charles Saultier de la Balme\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Echelle_1.jpg","../image/image_74/74_Echelle_2.jpg"]},"Consult_chateau_formulairef81f":{"id":"Consult_chateau_formulairef81f","dept":"74","canton":"Reignier","commune":"Esery","nom":"Esery","type":"Château","periode":"XII","histoire":"ESERY: Château construit au XIIe siècle par les seigneurs d'Esery, vassaux des comte du genevois passe à la famille d'Allemand qui ce dernier le revend à son cousin Michel d'Allemand de Vozérier. \r\nEn 1591 le château fut brûlé puis dévasté en 1593 par les troupes du baron Conforgien, racheté par la famille du Fresnoy qui le gardèrent jusqu'en 1679, passa en héritage à Charles du Clos et fut acheté en 1825 par la famille Collomb d'Arcine (maréchal de camp dans l'armée du roi de France Charles X; par ses exploits militaires il a reçu le titre de comte d'Esery par le roi Charles Albert en 1842. ); Les enfants du maréchal tous militaires. \r\nAu XXe siècle le château passe  à la famille Constantin de Magny qui le restaure.","architecture":"Esery: Du château un corps de logis subsiste la courtine est deux grosses  tours rondes.","habitants":"Famille Collomb d'Arcine\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Esery_1.jpg"]},"Consult_chateau_formulaire5555":{"id":"Consult_chateau_formulaire5555","dept":"74","canton":"Annemasse","commune":"Etrembières","nom":"Etrembieres","type":"Château","periode":"XIV","histoire":"ETREMBRIERES: Château appelé aussi \"château haut,ou rosey ou l'hôpital\" construit par les seigneurs d'Etrembières  vassaux des comte du genevois; passe en 1320 à la famille de Lompey.  \r\nSuite  a des problèmes de guerillat et vengeance la propriété est confiqué par le duc de Savoie,  restitué en 1526 à Philibert de Lompey et de nouveau confisqué en 1534 est attribué en 1559 à François Prosper de Genève Lullin. \r\nEn 1589 le château  brûlé par les Genevois. \r\nLa dernière descendante sans enfant lègue le château en 1606 à l'hôpital d'Annecy qui en sont toujours propriétaire; Aujourd'hui exploitation agricole.","architecture":"Etrembières: De ce château qui était une forteresse n'est plus aujourd'hui un quadrilatère de 21 x 28 m qui était défendu par quatre tours rondes dans les angles, l'angle Nord-Ouest a été détruit ainsi que la tour  .Le château fut restauré au XVIe siècle.","habitants":"Famille de Lompey\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Etrembieres_1.jpg","../image/image_74/74_Etrembieres_2.jpg"]},"Consult_chateau_formulaire47fa":{"id":"Consult_chateau_formulaire47fa","dept":"74","canton":"Evian","commune":"Evian","nom":"Evian","type":"Palais","periode":"XX","histoire":"EVIAN: Ville thermale qui apporta un développement thérapeutiques, industrielles, commerciales et touristiques; le Casino Théâtre ancien château de la famille de Blonay qui fut donné par Ennemond de Blonay à la station thermale en 1877:                    Villa de la famille Lumière, inventeur du cinéma (1855-1886) Villa somptueuse de style classique inspiré de la renaissance  devenue   hôtel de ville en 1927, grand palais transformé en hôtel,etc.                                  Château de Fonbonne; pendant  le règne d'Amédée V, vers 1303, hors des murs du bourg construction de la Touvière bâtiment coiffé d'un toit à quatre pans fortement inclinés devenu logis noble de style renaissance en 1886 transformé en hôtel.","architecture":"Casino théâtre de 1911 uvre néo-classique réalisé par un élève de Charles Garnier ( maître d'uvre de l'opéra de Paris, Villa lumière, villa somptueuse style classique inspiré de la renaissance.","habitants":"Famille de Blonay\r\n        \"","divers":"Chateau d'Evian (Casino-Theatre)\r\nVilla de la Famille Lumière\r\nMaison forte\r\nChateau de Fontbonne","gps":"","images":["../image/image_74/74_Evian_1.jpg","../image/image_74/74_Evian_2.jpg","../image/image_74/74_Evian_3.jpg","../image/image_74/74_Evian_4.jpg","../image/image_74/74_Evian_5.jpg","../image/image_74/74_Evian_6.jpg","../image/image_74/74_Evian_7.jpg"]},"Consult_chateau_formulaire6347":{"id":"Consult_chateau_formulaire6347","dept":"74","canton":"St-Julien-en-Genevois","commune":"Vulbens","nom":"Faramaz","type":"Château","periode":"XIV","histoire":"VULBENS. FARAMAZ: le premier château appelé le \"Vuache\" par le nom de sa seigneurie il ne reste plus rien de celui-ci, le château construit au XIVe siècle et fut démAntelé par les Bernois et remanié en 1664, il fut la propriété  du marquis de Chaumont  et en 1945 il passe à la famille  de Chaffoy de Courcelles.","architecture":"Faramaz: Corps de logis rectangulaire à trois niveaux flanqué d'une tour donjon carrée à six niveaux.","habitants":"Famille du marquis de Chaumont \r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Faramaz_1.jpg","../image/image_74/74_Faramaz_2.jpg","../image/image_74/74_Faramaz_3.jpg"]},"Consult_chateau_formulaire1fa2":{"id":"Consult_chateau_formulaire1fa2","dept":"74","canton":"Bonneville","commune":"Faucigny","nom":"Faucigny","type":"Vestiges","periode":"XI","histoire":"FAUCIGNY: Berceau des puissants sires de Faucigny qui passa par alliance au comte Gérold de Genève, puis  aux comtes de Savoie par alliance,  en 1234, leur fille Béatrice se marie  à l'âge de sept ans, au dauphin viennois  Guigues VII devenue \"Grande Dauphine\" elle gouvernera le Faucigny et le Dauphiné avec fermeté et fonde la ville de Bonneville en 1283. En 1270 suite à l'attaque Il fut abandonné comme habitation au profit de Châtillon de Cluses.                     En 1349 le Dauphiné et le Faucigny sont donnés au roi de France.\r\nEn 1355 Faucigny fut cédé au comte de Savoie à Amédée VI comte de Savoie, puis passa par alliance aux Genevois-Nemours qui feront du château une prison au XVIe siècle et tombera en ruine au XVIIe siècle en même temps de l'extinction de la dynastie des ducs de Genevois-Nemours. Les restes du château sont vendus  aux religieux Barnabistes en 1699 .\r\n A la Révolution le château servit de carrière de pierres. \r\nEn 1835 l'abbé Vallet curé de Faucigny récupère les lieux  mais le site revient à un avocat Bastian député en 1848 et Madame Guillermin hérite  en 1884, fera érigé la grande croix qui était le voeu de l'abbé Vallet.","architecture":"Faucigny: Ce château dominant la vallée de l'Arve sur un éperon rocheux à 700 mètres d'altitude il fut construit au XIe siècle, vestiges de l'enceinte basse et enceinte haute avec donjon carré roman et un corps de logis terminé par la \"Tour de la reine\", une porte fortifiée y donnait accès entre deux tours carrées.","habitants":"Famille des sires de Faucigny\r\n        \"","divers":"Vestiges du château de Faucigny","gps":"","images":["../image/image_74/74_Faucigny_1.jpg","../image/image_74/74_Faucigny_2.jpg"]},"Consult_chateau_formulaireff24":{"id":"Consult_chateau_formulaireff24","dept":"74","canton":"Faverges","commune":"Faverges","nom":"Faverges(74)","type":"Château","periode":"XIV","histoire":"FAVERGES: Premières mentions en 1112 d'un château des seigneurs de Faverges qui se trouvait plus haut, Amédée V de Savoie le racheta pour montait la garde sur la route reliant Genève à l'Italie,  fait agrandir le château médiéval en 1316, le garda deux cents ans et l'inféoda à la famille de Faverges. Le domaine est érigé en duché par Amédée VIII en 1416; vers 1501 le duc de Savoie vend le château au prince François de Luxembourg. \r\nRacheté ou donné pour service rendu en 1569  à Louis Milliet de Faverges, son petit-fils Claude Emmanuel Milliet, marquis de Faverges  édifia en 1644 le nouveau château, cette famille tiendrat le château jusqu'en 1787 ou la marquise de Faverges veuve émigre en Italie avec ses filles l'une d'elle épouse le comte Léprotti di Fontanello lui apportant le château de Faverges  en dot  et en 1810 il le revend  à un industriel lyonnais Jean pierre Duport, le château passera par alliance à son  gendre Nicolas Blanc qui portera l'usine de filature au château. Nicolas fait visiter en 1834 sa filature au roi Charles Albert sera fait Baron en 1848 et ira siéger au Sénat à Turin. En 1859 son fils vend l'entreprise à la société lyonnaise Gourd, Croiset et Dubost qui l'exploiteront jusqu'en 1902 reprise par la société Stünzi jusqu'en 1914, servit d'hôpital pendant la guerre de 14-18 et logement d'ouvriers en 22-39 et de nouveau hôpital militaire de 39-45. Le château est abandonné, l'usine cesse toute activité en 1976  et en 1980 racheté par la commune qui le transformera en établissement hôtelier.","architecture":"Faverges:Le premier château construit au pied de la dents de Cons sur un promontoire qui surplombe Faverges reste de cet époque le haut donjon circulaire à mâchicoulis du XIIIe siècle. \r\nLe château construit en 1644 vaste construction rectangulaire dont les bâtiments s'ordonnent autour d'une cour flanqué d'une tour carrée à toit pointu.\r\nSur le Crêst de Chambellon, vestiges du château des sires de Faverges cités depuis le début du XIIe siècle.","habitants":"Famille de Louis Milliet de Faverges\r\n        \"","divers":"Chateau de Faverges","gps":"","images":["../image/image_74/74_Faverges_1.jpg","../image/image_74/74_Faverges_2.jpg","../image/image_74/74_Faverges_3.jpg","../image/image_74/74_Faverges_4.jpg","../image/image_74/74_Faverges_5.jpg"]},"Consult_chateau_formulairea871":{"id":"Consult_chateau_formulairea871","dept":"74","canton":"Alby-sur-Chéran","commune":"Cusy","nom":"Fesigny","type":"Château","periode":"XIII","histoire":"FESIGNY: Les premiers seigneurs les sires de Fésigny, vassaux  des comtes de Genève. Au XIIIe siècle aux comtes de Savoie Amédée V de Fésigny  s'étant engagé sur les terres devient vassal du comte de Savoie; au XVe siècle Guy de Fésigny,  était président du conseil ducal à Chambéry, est chargé d'une mission, il doit arrêter Jacques de Montmayeur,  son voisin châtelain; qui a offensé le duc, mais après quelques pourparlés  Montmayeur tranche la tête de Fésigny.","architecture":"Fesigny: Une grande partie du château à disparu, ce qui reste est en partie ruiné, reste d'une tour carrée avec échauguettes en angles et fenêtres à meneaux.","habitants":"Famille des de Fésigny\r\n        \"","divers":"Vestiges du château de Fesigny","gps":"","images":["../image/image_74/74_Fesigny_1.jpg","../image/image_74/74_Fesigny_2.jpg","../image/image_74/74_Fesigny_3.jpg","../image/image_74/74_Fesigny_4.jpg","../image/image_74/74_Fesigny_5.jpg"]},"Consult_chateau_formulaire2533":{"id":"Consult_chateau_formulaire2533","dept":"74","canton":"St-Jeoire-en-Faucigny","commune":"St-Jeoire-en-Faucigny","nom":"Foncet","type":"Château","periode":"XVIII","histoire":"FONCET: Appelé aussi  château de Saint-Jeoire car il a été construit avec les pierres du château de Saint-Jeoire détruit en 1589 par les genevois; château du XVIIIe siècle par la famille de Chabod de Saint-Maurice et qui prend le titre de comte de Saint-Jeoire; Les Chabod vendent le château en 1752  à Jean-Joseph Foncet Avocat, conseillé d'état, surintendant des archives et en 1768 auditeur général des guerres en Savoie fut anoblie devient baron de Montailleur. \r\nLe château terminera dans la famille de Mossuz avant d'appartenir à la commune qui en  font leur mairie.","architecture":"Foncet: Ce château construit au XVIIIe siècle avec les pierres de l'ancien château datant du XIVe siècle détruit par les Genevois. \r\nle bâtiment actuel à un seul étage avec fronton triangulaire flanqué d'une tour carrée.","habitants":"Famille de Chabod\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Foncet_1.jpg"]},"Consult_chateau_formulaire0703":{"id":"Consult_chateau_formulaire0703","dept":"74","canton":"Sallanches","commune":"Sallanches","nom":"Frasse","type":"Maison forte","periode":"XVII","histoire":"FRASSE:Ce château du  début XVII à appartenu au marquis de la Serraz; maintenant les surs de Saint Joseph en ont fait une école.","architecture":"Frasse:  Grand bâtiment, corps de logis à trois niveaux flanqué d'une tourelle octogonale.","habitants":"marquis de la Serraz\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Frasse_1.jpg"]},"Consult_chateau_formulaire8aee":{"id":"Consult_chateau_formulaire8aee","dept":"74","canton":"Annemasse","commune":"Vernaz","nom":"Gaillard(74)","type":"Maison forte","periode":"XIII","histoire":"GAILLARD: Bourg fortifié  il fut édifié par les comtes de Genève  au XIIIe siècle,  il fut racheté par le duc de Savoie Amédée VIII Ce château sera détruit en 1602.\r\n Aujourd'hui il ne reste qu'une tour appelé la \"tour de Naz\" et un simple bâtiment utilisé par la mairie et le parc transformé en roseraie.","architecture":"Gaillard:il ne reste qu'une tour ronde.","habitants":"duc de Savoie\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Gaillard_1.jpg"]},"Consult_chateau_formulaire189d":{"id":"Consult_chateau_formulaire189d","dept":"74","canton":"Faverges","commune":"Giez","nom":"Gy_Giez","type":"Château","periode":"XV","histoire":"GY: Le fief fut donné par Amédée VIII à Pierre II de Chevron-Vilette seigneur de Giez suite à une alliance en 1225 de Béatrice de Giez avec Humbert de Chevron-Vilette, qui cette famille s'installera au château en 1418. \r\nLes descendants sont toujours propriétaires, dont-ils ont transformé la propriété en Golf de Giez.","architecture":"Gy:  Maison forte: agrandi en 1430 en imposante bâtisse flanquée au levant d'une tour ronde.","habitants":"Famille de Chevron-Vilette\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Gy_Giez_1.jpg","../image/image_74/74_Gy_Giez_2.jpg"]},"Consult_chateau_formulaireb082":{"id":"Consult_chateau_formulaireb082","dept":"74","canton":"Evian-les-Bains","commune":"Larringes","nom":"Larringes","type":"Château","periode":"XIII","histoire":"LARRINGES: Au XIIIe siècle fief des seigneurs de Larringes, passa aux mains des  comtes de Savoie en 1300 qui le cédèrent en 1334 à Guillaume de Châtillon, ces derniers reconstruisirent le château et le passa à Jeanette de Neuvecelle, puis par alliance de cette dernière avec Jean Tornier, ils vendirent le château aux d'Allinges en 1439 qui le conserveront jusqu'à l'extinction de leur lignée en 1840,  puis passa à la famille de Franlieu, l'héritier en 1858 est le comte Alfieri di Sostegno qui vend le château à des cultivateurs, en mauvais état et repris par la famille Stoutz qui l'on rénové et l'utilise à des fins industriels.","architecture":"Larringes:  Reconstruit au XIII sur les bases d'un château du Xe siècle, imposant quadrilatère de murs crénelés de vingt-trois mètres de large sur trente cinq mètres de long.\r\nTrois corps de logis autour d'une cour; l'angle S.E est occupé par un donjon qui défend la porte d'entrée.","habitants":"Famille Stoutz\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Larringes_1.jpg","../image/image_74/74_Larringes_2.jpg"]},"Consult_chateau_formulairea533":{"id":"Consult_chateau_formulairea533","dept":"74","canton":"Faverges","commune":"Lathuile","nom":"Lathuile","type":"Château","periode":"XIII","histoire":"LATHUILE; Au XIIe siècle, seigneurie des Duingt de Châteauvieux, puis au XIIIe siècle aux Richard et par alliance passe aux Sionnaz seigneur de Vallières. \r\nEn 1547 Melchior de Sionnaz épouse Bonnaventure de Chevron-Vilette, veuve de Philippe de Dheré et le château de Lathuile et de Boisy avec le titre de seigneur de Boisy fut apporté  à François de Sales seigneur de Novel par le mariage de leur fille Françoise  de trente ans de moins;, mariage consommé en 1566 l'enfant qui naîtra en 1567 sera le futur Saint-François de Sales; ce dernier prendra le titre de seigneur de Villagoret, marié à Françoise Suchet  François devenant prêtre, céde le château au duc de Savoie  ce qui fit rentré le château d'une polémique entre François et sa famille, le château revient à la famille de Sales est y restera  jusqu'à la Révolution.   François de Sales sera évêque de Genève de 1645 à 1660.","architecture":"Lathuile; de ce château il ne reste qu'un corps de bâtiment  flanqué d'une tour.","habitants":"Famille de Sales\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Lathuile_1.jpg"]},"Consult_chateau_formulaire2148":{"id":"Consult_chateau_formulaire2148","dept":"74","canton":"Rumilly","commune":"Boussy","nom":"Lupigny","type":"Maison forte","periode":"XV","histoire":"LUPIGNY: pas d'informations historiques Transformé en hôtel restaurant .","architecture":"Lupigny: du château du XVe siècle il ne reste qu'un corps de logis en équerre à trois niveaux.","habitants":"Monsieur Routex\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Lupigny_1.jpg","../image/image_74/74_Lupigny_2.jpg","../image/image_74/74_Lupigny_3.jpg","../image/image_74/74_Lupigny_4.jpg"]},"Consult_chateau_formulaire011c":{"id":"Consult_chateau_formulaire011c","dept":"74","canton":"Reignier","commune":"Reignier","nom":"Magny","type":"Maison forte","periode":"XV","histoire":"MAGNY: Au XVIe siècle propriété de la famille Constantin; Pierre Constantin en 1580 remplit la charge de châtelain de Credoz, la famille est anoblie en 1622. Pierre deviendra secrétaire du maréchal d'Estrées en 1726 et bibliothécaire du roi Auguste III surnommé le\" Diable Boiteux\", il meurt à Strasbourg  en 1764. Le château appartient toujours à la famille de Constantin de Magny.","architecture":"Magny:  Château remanié au cours des siècles, corps de logis à deux niveaux  flanqué d'une tour du XVe siècle.","habitants":"Famille Constantin\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Magny_1.jpg"]},"Consult_chateau_formulairefb41":{"id":"Consult_chateau_formulairefb41","dept":"74","canton":"Thonon-les-Bains","commune":"Thonon-les-Bains","nom":"Marclaz","type":"Château","periode":"XVI","histoire":"MARCLAZ: Dépendait avant le XVe siècle aux seigneurs de Chamoisy, de Marclaz et aux de Ravais  et par alliance passa en 1515 à Vidomne de Chaumont formant la branche de Vidomne de Charmoisy (Charles Vidomne de Charmoisy, évoque le souvenir de sa belle-fille \"Philothée\" amie de Dieu, de Saint-François de Salles). Le château passa par alliance en 1659 à Victor-Amédée de Maréchal de la Val-d'isère, Josephe de Seyssel la Charniaz, héritière apporte Marclaz a son mari M.Carron (chevalier). qui laissera le château de Marclaz à l'abandon, fera construire une grande habitation qui passera à madame de May, puis à madame de Ville et acquit par le baron de  Chanteau pour sa fille marié au comte de Foras. Aujourd'hui propriété de Madame Baudier.","architecture":"Marclaz:  château composé d'un corps de logis rectangulaire de style gothique flamboyant,  la grande maison superbement restaurée.","habitants":"famille de Vidomne de Chaumont\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Marclaz_1.jpg","../image/image_74/74_Marclaz_2.jpg","../image/image_74/74_Marclaz_3.jpg"]},"Consult_chateau_formulaired22d":{"id":"Consult_chateau_formulaired22d","dept":"74","canton":"Thonon-les-Bains","commune":"Sciez-sur-Léman","nom":"Marignan","type":"Maison forte","periode":"XV","histoire":"MARIGNAN: Fief des seigneurs de Révorée, cette maison forte fut achetée en 1258 par l'abbaye de Filly et passa en 1324 à Jean de Neuvecelle est en 1536, cette maison forte revient au Genevois Baudichon de Maisonneuve et revendu par les héritiers à Bernard d'Allinges et par alliance la maison-forte ainsi que les châteaux  de Boissy à Ballaison, de Beauregard à Chérens à Jean Budé. \r\nEn 1747 acquis par Jean Charmot, passa ensuite aux Turrettini.\r\n Aujourd'hui abrite une exploitation viticole.","architecture":"Marignan: maison forte appelé tour de Marignan est une maison à trois étages flanqué d'une tour ronde du XVe siècle.","habitants":"Famille de Jean de Neuvecelle\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Marignan_1.jpg"]},"Consult_chateau_formulaire00d1":{"id":"Consult_chateau_formulaire00d1","dept":"74","canton":"Frangy","commune":"Marlioz","nom":"Marlioz(74)","type":"Château","periode":"XV","histoire":"MARLIOZ: Propriété des comtes de Genève comme vassaux les seigneurs de Marlioz, fut inféodé  à Valère de Confignon jusqu'à la fin du XIVe siècle passe ensuite aux Viry, branche cadette  de la maison de Sallenoves,qui possède également un château, les deux  furent cédé en 1563 à Pierre de Montluel la veuve de ce dernier les donnera en 1579 au duc de Savoie, qui Emmanuel-Philibert l'inféoda à Simon Marnier sire de Moissy; par alliance passeront par le mariage de sa nièce  à Gaspard de Livron en 1651 qui rénoveront les châteaux, toujours par alliance passeront à François Malivers et ensuite leur fille l'apporte à Amédée Gaspard de Pingon qui hérite de deux châteaux Marlioz et Sallenôve qui passeront tous deux à sa mort en 1823  au comte Eugène de la Prunarède son beau frère, à sa mort en 1850 les deux châteaux sont achetés par l'abbé Edouard Scott ou Schurch, puis vendu aux enchères en 1873 à Jean Doudens, puis par la mairie pour en faire des colonies de vacances et habitations.","architecture":"Marlioz: Construit sur la vallée des Usses; grosse bâtisse carrée, encadrée par quatre échauguettes deux pavillons carrés limitant la terrasse.","habitants":"Famille de Marlioz\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Marlioz_1.jpg","../image/image_74/74_Marlioz_2.jpg","../image/image_74/74_Marlioz_3.jpg"]},"Consult_chateau_formulaire3eee":{"id":"Consult_chateau_formulaire3eee","dept":"74","canton":"Menthon-St-Bernard","commune":"Menthon-St-Bernard","nom":"Menthon","type":"Château","periode":"XIV","histoire":"MENTHON: Légende rattache la famille de Menthon Saint-Bernard de Mont-Joux, Bernard de Menthon patron des alpinistes à vocation religieuse qui serait né en 923  fit porté son nom aux cols où son implantés les hospices du Grand et du Petit Saint-Bernard. \r\n La première seigneurie de Menthon  fut mentionnée au XIIe siècle, resta dans cette famille jusqu'au XVIIIe siècle, passa par alliance à la famille  Veuillet de la Saulnière, marquis  d'Yenne et de Chevelu. \r\nEn 1809 le château passe à François Ruphy ( député) dont la mère est une Menthon-Lornay.  En 1820 le comte Baltazard de Menthon rachète le château ;  François de Menthon ministre du général de Gaulle. Le château toujours dans la descendance.","architecture":"Menthon: Le château de Menthon fut construit du XIIe au XIVe siècle sur les restes d'un site romain-médiéval sur le rocher à 600 m d'altitude. \r\nDifférents corps de logis sont appuyés sur le rempart autour d'une minuscule cour intérieure; au N.E donjon dit\"Tour des armes\" quadrilatère irrégulier de 8 m de côté flanqué d'une tourelle, au S.O une autre tour de 9 x 12 domine l'entrée, des remaniements ont été apporté au XIV-XVIIIe siècle  et des travaux de restauration au XIXe siècle.","habitants":"Famille de Menthon\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Menthon_1.jpg","../image/image_74/74_Menthon_2.jpg","../image/image_74/74_Menthon_3.jpg","../image/image_74/74_Menthon_4.jpg","../image/image_74/74_Menthon_5.jpg"]},"Consult_chateau_formulaire1beb-2":{"id":"Consult_chateau_formulaire1beb-2","dept":"74","canton":"Seyssel","commune":"Menthonnex-sous-Clermont","nom":"Mionnaz","type":"Maison forte","periode":"XIV","histoire":"MIONNAZ:  Que possédait la  famille  de Mionnaz du XIIIe siècle au XVIe siècle, passa ensuite à la famille de Montfort et ensuite à la famille de Chabod de Saint-Maurice au XVIIe siècle, qui dans cette famille Thomas-François Chabod, marquis de Bourg Saint-Maurice, ambassadeur de Savoie, puis lieutenant général des armées, ministre d'état et gouverneur de Savoie. cette famille n'a jamais habité Mionnaz.","architecture":"Mionnaz: Corps de logis rectangulaire accolé d'une tour ronde en façade, cour entourée de mur et de tours en angles.","habitants":"Famille de Mionnaz\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Mionnaz_1.jpg","../image/image_74/74_Mionnaz_2.jpg"]},"Consult_chateau_formulaireb0df":{"id":"Consult_chateau_formulaireb0df","dept":"74","canton":"Reignier","commune":"Mornex","nom":"Monnetier","type":"Château","periode":"XIX","histoire":"MONNETIER: En limite du Grand Salève, il y avait un ermitage dédié à Saint-Didier (ou Saint  Dizier évêque du Ve siècle). Le manoir érigé par François Prosper de Genève-Lullin en 1567 avait inscrit pour devise \"Nasci, pati, mori\", mais il fut brûlé par les Bernois  en 1589 commandait par le capitaine Guiguet de Nîmes . Ruiné pendant trois siècles, il fut reconstruit. Château des comtes de Genève, vendu par Guillaume  seigneur de Gex au comte Amédée de Genève, il fut inféodé au XVIe siècle par Genève Lullin et passa au  Marquis de Graneri; Le bâtiment actuel construit en 1802 par Henri-Albert Gosse pharmacien genevois  et transformé en 1855 en hôtel de style pseudo médiéval qui existe encore.","architecture":"Monnetier; Sur le\"Mont Gosse\";Il ne reste plus rien du château féodal sinon des vestiges, le château dominait la vallée, en dehors de quelques pans de murs, il reste un pavillon rectangulaire  construit en 1802 flanqué de deux tours carrées\" monnetier\": de ce château du XVIIe siècle, possède un corps de logis rectangulaire flanqué en façade de deux tours positionné en oblique une carrée à toit pointu l'autre plus féodal  à quatre côtés irréguliers à trois niveaux crénelé et relié à une tourelle carrée sur l'arrière du bâtiment central.","habitants":"Famille d'Henri-Albert Gosse \r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Monnetier_1.jpg","../image/image_74/74_Monnetier_2.jpg","../image/image_74/74_Monnetier_3.jpg"]},"Consult_chateau_formulaireddd1":{"id":"Consult_chateau_formulaireddd1","dept":"74","canton":"Pringy","commune":"Pringy","nom":"Monthouz","type":"Château","periode":"XV","histoire":"MONTHOUZ;  Humbert de Thoire-Villars comte de Genève vend le château en 1398 à Petremand seigneur de Monthouz; érigé en baronnie en 1613 et passe par alliance  en 1675 au Monthouz du Barrioz et toujours par alliance de leur fille qui transmet le château à Charles-François Angot de Bonnières, marquis de Cruseilles; au XVIIIe siècle toujours par alliance le château passe à la famille de Livet qui le garderont jusqu'au XXe siècle et passera par héritage à Louis marchand de Chillaz toujours dans cette famille.","architecture":"Monthouz: Grosse bâtisse quadrangulaire à trois niveaux flanqué sur la façade sud d'une grosse tour ronde au levant et d'une grosse tour carrée au couchant ; Château a été restauré au XIXe siècle.","habitants":"famille de Monthouz du Barrioz\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Monthouz_1.jpg"]},"Consult_chateau_formulaire0330":{"id":"Consult_chateau_formulaire0330","dept":"74","canton":"Alby-sur-Chéran","commune":"Alby-sur-Chéran","nom":"Montpon","type":"Maison forte","periode":"XV","histoire":"MONTPON: La première famille connue en 1215 la famille de Vilette, passa en 1363 à la famille Richard; François  secrétaire ducal en 1499 qui construisit la nouvelle maison forte; et obtient le titre de seigneur , par alliance la demeure passe à la famille de La Faverge qui la gardera jusqu'au XVIIIe siècle. Puis Montpon fut cédé à un cousin le sénateur de Cormand Joseph-Marie de la Faverge et en 1801 il devient la propriété par lègue de Louise de Faverge-Cormand épouse de Joseph-François de Tholliaz capitaine d'infanterie qui devient propriétaire du château.","architecture":"Montpon: Cette maison forte sur le Mont-Nagier qui fut construite au XVe siècle  à trois niveaux flanquée d'une tour carrée, transformée au XVIIIe par une aile basse, agrémenté à l'étage d'une galerie et au XIXe siècle en château, plus une tourelle ronde et d'une chapelle.","habitants":"Famille de Vilette\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Montpon_1.jpg","../image/image_74/74_Montpon_2.jpg","../image/image_74/74_Montpon_3.jpg","../image/image_74/74_Montpon_4.jpg"]},"Consult_chateau_formulairedb02":{"id":"Consult_chateau_formulairedb02","dept":"74","canton":"Annecy","commune":"Lovagny","nom":"Montrottier","type":"Château","periode":"XIII-XV","histoire":"MONTROTTIER: La famille Grésy furent les premiers seigneurs avant le XIIIe siècle qui le donnèrent au duc de Savoie Amédée VIII en 1425, puis revendu  à Pierre de Menthon-Beaumont conseiller d'Amédée VIII, ces derniers firent construire le donjon et cette famille gardera le château jusqu'à la Révolution, le château vendu comme bien national fut  acquit par Benedict Dufour horloger, promoteur. En 1839 revendu au baron Jules de Rochette, la baronne de la Rochette le revendit  en 1876 suite aux dépenses de rénovations, l'acquéreur maître des forges Victor Frèrejean ancien président de la chambre de commerce de Lyon, le passa ensuite à la famille Marès qui hérita suite au décès de Marie Louise Marès, veuve de Georges Frèrejean. Léon Marès meurt en 1916 sans postérité légua le château à l'Académie Florimontane qui en son toujours propriétaire.","architecture":"Montrottier: La construction du château sur un mamelon de 450 m d'altitude  remonte au XIIIe siècle, enceinte polygonale entourant un donjon cylindrique haut de 36,50 m du XIIIe siècle à gardé ses mâchicoulis et ses créneaux,  à droite la tour des religieuses, l'entrée néo-gothique et les galeries néo-renaissance du XIXe siècle. Le château fut remanié au XV et XIXe siècle.","habitants":"Famille de Menthon\r\n        \"","divers":"Château de Montrottier","gps":"","images":["../image/image_74/74_Montrottier_1.jpg","../image/image_74/74_Montrottier_2.jpg","../image/image_74/74_Montrottier_3.jpg","../image/image_74/74_Montrottier_4.jpg","../image/image_74/74_Montrottier_5.jpg","../image/image_74/74_Montrottier_6.jpg"]},"Consult_chateau_formulaire4767":{"id":"Consult_chateau_formulaire4767","dept":"74","canton":"Annecy","commune":"Annecy-le-Vieux","nom":"Novel","type":"Château","periode":"XII","histoire":"NOVEL; Au XIIe siècle appartient aux comtes de Genève, ils y résidèrent jusqu'en 1219, puis s'installèrent au château d'Annecy.\r\nAu XIVe siècle, la famille qui habité prit le nom de Novel au XVe siècle passa à la famille de Renguins et à la famille de Chenex par alliance au marquis de Sade en 1512, en 1556 fut la propriété d'Amédée Viollon; cette famille l'apporte en dot au début du XVIIe siècle aux Visitandines pour une exploitation agricole, elles le garderont jusqu'à la Révolution Française.\r\n Vendu comme bien national, il restera dans le domaine agricole jusqu'en 1960 est racheté par la famille Gay puis en 1972 la commune d'Annecy le racheta pour le restaurer.","architecture":"Novel: De plan quadrangulaire, avec une tour ronde dans son angle sud-ouest, il était entouré d'un mur d'enceinte avec fossé, que l'on franchissait par un pont-levis. Les bâtiments dans leur état actuel, semblent dater du XVe siècle. \r\nAu XIXe siècle, on a relié la tour du pigeonnier avec celle de la maison forte, ce qui lui confère son aspect actuel. \r\nLa ferme accolée au pigeonnier, a été remplacée par une remise. Dans la cour, il a été érigé en l'an XI de la République (1803) un grand bâtiment agricole.","habitants":"Famille de Novel\r\n        \"","divers":"Château de Novel à Annecy le Vieux","gps":"","images":["../image/image_74/74_Novel_1.jpg"]},"Consult_chateau_formulaire6ea0":{"id":"Consult_chateau_formulaire6ea0","dept":"74","canton":"Frangy","commune":"Minzier","nom":"Novery","type":"Château","periode":"XIV","histoire":"NOVERY: propriété de la famille de Novery jusqu'à la fin du XIIIe siècle, confisqué par le comte de Genève et en 1289 Amédée IIl cède à Gautier de Confignon qui possédait déjà le château de  Marlioz, puis acquit au XIVe siècle par  la famille de Monthouz et par alliance à la famille Vautier; de nouveau par alliance en 1415 au vicomte de Chaumont de Charmoisy et toujours par alliance au XVIII siècle passa au marquis de Milliet de Challes ce dernier reçut Mandrin. En 1777 à la mort du marquis le château passa à sa soeur Catherine-Françoise veuve du marquis Marc-Antoine Costa de Beauregard, puis acquit au XIXe siècle  par une société immobilière et ensuite acheté par monsieur Jacquet, à Monsieur Hausermann et Love puis en 1977 à Monsieur Mangnin avocat de Genève.","architecture":"Novery:  Bâtisse imposante rectangulaire avec un pavillon saillant à quatre niveaux accolée d'une tour ronde.","habitants":"Famille Novery\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Novery_1.jpg","../image/image_74/74_Novery_2.jpg"]},"Consult_chateau_formulaire31c1":{"id":"Consult_chateau_formulaire31c1","dept":"74","canton":"Annecy","commune":"Balmont","nom":"Orlye","type":"Maison forte","periode":"XVI","histoire":"ORLYE: En 1366, Amédée d'Orlyé part pour l'Orient avec le comte Amédée V, cette famille possédèrent cette maison forte jusqu'au XVIe siècle, ainsi que le château d'Allèves, une maison forte à Viuz la Chiessaz et une autre à Albens.","architecture":"Orlyé: Maison forte situé dans le centre du village de Balmont, d'un étage avec dans un angle une tour ronde.","habitants":"Famille d'Orlyé\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Orlye_1.jpg","../image/image_74/74_Orlye_2.jpg"]},"Consult_chateau_formulairefa41":{"id":"Consult_chateau_formulairefa41","dept":"74","canton":"Seyssel","commune":"Desingy","nom":"Pelly","type":"Château","periode":"XV","histoire":"PELLY; Les premiers seigneurs furent la Famille de Pelly vassale des comtes de Genève qui gardèrent cette seigneurie jusqu'à la Révolution et resta dans cette famille jusqu'au XIXe siècle malgré le massacre de Joseph de Pelly en 1793 par les Jacobins. \r\nLe château fut repris en 1964 par M. Cornfeld qui la restauré.","architecture":"Pelly: Corps de logis à trois niveaux flanqué de cinq tours rondes dont une appelé donjon et deux autres encadrent un châtelet du XVe siècle, dénaturé par sa transformation.","habitants":"Famille de Pelly\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Pelly_Desingy_1.jpg","../image/image_74/74_Pelly_Desingy_2.jpg","../image/image_74/74_Pelly_Desingy_3.jpg"]},"Consult_chateau_formulairea476":{"id":"Consult_chateau_formulairea476","dept":"74","canton":"Alby-sur-Chéran","commune":"Mûres","nom":"Pierre_Charve","type":"Château","periode":"XIII","histoire":"PIERRE-CHARVE: Au  XIIIe siècle à la famille Paradin seigneur de Pierre-Charve, au XVe siècle  ac
