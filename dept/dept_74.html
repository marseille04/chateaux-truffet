quit par la famille  de la Rochette, puis par alliance passe aux Montfalcon de Flaxieu. Le château fut vendu en 1558, plusieurs propriétaires se succèdent et se trouve chez les de la Roche ensuite chez Philibert Simond en 1788 à la Révolution, Philibert qui faisait parti de la convention fut Guillotiné, sa soeur, religieuse au couvent de la visitation de Rumilly hérite et fait don à l'hôpital de Rumilly qui le revend aux enchères à Monsieur Genoud  dont les héritiers les familles Fressinet et Terry ont céder le château  à une association.","architecture":"Pierre-Charve: Construit au XIIIe siècle  pour la surveillance d'un passage du Chéran, possède une tour rectangulaire rabaissée au siècle dernier, accolée à un corps de logis rectangulaire.","habitants":"Famille de Montfalcon\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Pierre_Charve_1.jpg"]},"Consult_chateau_formulaireec42":{"id":"Consult_chateau_formulaireec42","dept":"74","canton":"Rumilly","commune":"Marcellaz-Albannais","nom":"Pieuillet","type":"Château","periode":"XVIII","histoire":"PIEUILLET: La famille Juge s'installe au XIVe siècle  au XVe siècle  Benoit Juge secrétaire du duc de savoie  et ses fréres procureurs au conseil d'état sont anoblis, en 1650 Philiberte Juge, veuve d'Amblard de Vidomne de Novery fonde le collége  de Rumilly. \r\nEn 1797 Auguste Juge de Pieuillet (magistrat) cette famille gardera le château jusqu'en 1863. \r\nLe château au XXe siècle est utilisé pour des colonies de Vacances.","architecture":"Pieuillet: Ce château de construction récente est classique ,corps de logis rectangulaire à trois niveaux flanqué de deux tours carrées opposées à toits pointus.","habitants":"famille d'Auguste-Juge de Pieuillet\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Pieuillet_1.jpg"]},"Consult_chateau_formulaire6e0c-2":{"id":"Consult_chateau_formulaire6e0c-2","dept":"74","canton":"Reignier","commune":"Esserts-Salève","nom":"Pollinge","type":"Maison forte","periode":"XIV-XVIII","histoire":"POLLINGE: seigneurie construite par les sires de Faucigny qui en confient la garde à la famille de Pollinge jusqu' à la fin du XIVe siècle  passa par alliance dans la famille  de Chissé  jusqu'en 1846. Il fut brûlé mais reconstruit par Mgr de Granier , évêque d'Annecy et Genève.  Il sera vendu  à Constantin de Magny qui le revend  en 1865 au prince de Lucinge-Cystria. Passa ensuite à la famille Chevallier, puis à la famille Achard qui le fait restaurer, toujours dans cette famille.","architecture":"Pollinge: Du château construit au XIVe siècle il fut incendié  en 1591, remis en état, reconstruit en 1746 puis lors de sa rénovation en 1977 il s'écroula.   Subsiste une imposante maison forte, Haut corps de logis quadrangulaire flanqué d'une tour ronde et le portail  d'entré encadré par deux tours rondes.","habitants":"Famille de Pollinge \r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Pollinge_1.jpg"]},"Consult_chateau_formulaireca9f":{"id":"Consult_chateau_formulaireca9f","dept":"74","canton":"Pringy","commune":"Pringy","nom":"Premery","type":"Château","periode":"XV","histoire":"PREMERY; Au XVe siècle seigneurie des Monthouz sous la domination des comtes de Savoie qui le détienne jusqu'en 1578 puis par alliance passa aux Menthon-Lornay et en 1618 vendu à René Favre de la Valbonne devient Baron d'Aiguebelette seigneur de Valbonne, sénateur de Haute Savoie. \r\nLe château a la mort des derniers Favre revient à une nièce qui l'apportera à son mari Claude-Gabriel de la Place et par alliance en 1790 passera  à Joseph Duffour, toujours par alliance passe aux de la Grange dont les descendants vendront le château au commandeur Lachenal mais fut racheté au milieu du XIXe siècle  par le marquis Frédéric de la Grange qui le gardera plus d'un siècle, suite à un incendie en  1967, endommagé il fut racheté et remit en état par ses nouveaux propriétaires.","architecture":"Premery: Construit au XIVe siècle sur une terrasse pour la surveillance de la vallée, château remanié  en 1623 prenant la forme actuelle, et malgré son incendie en 1967 a reprit son allure d'époque.","habitants":"Famille Favre\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Premery_1.jpg"]},"Consult_chateau_formulaire7413":{"id":"Consult_chateau_formulaire7413","dept":"74","canton":"Seynod","commune":"Seynod","nom":"Périaz","type":"Manoir","periode":"XVI","histoire":"PERIAZ: La première famille connu au XVIe siècle est la famille  Pelard par alliance passa au XVIe siècle au de Regard puis aux de Regard-Villeneuve qui le possédait à la Révolution, le château fut vendu comme bien national, plusieurs propriétaires se succédèrent dont le docteur François Terier et en 1874 fut transformé en ferme par la famille Antonin Jacquet.","architecture":"Periaz: Corps de logis rectangulaire flanqué au extrémités de tours carrées.","habitants":"Famille de Regard\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Periaz_1.jpg"]},"Consult_chateau_formulaired876":{"id":"Consult_chateau_formulaired876","dept":"74","canton":"Thonon-les-Bains","commune":"Thonon-les-Bains","nom":"Ripaille","type":"Château","periode":"XIV","histoire":"RIPAILLE; Au départ simple rendez-vous de chasse construit pour Amédée V comte de Savoie fut transformé  en 1375 comme résidence comtal par la comtesse  Bonne de Savoie de Bourbon épouse d'Amédée VI surnommé \"le comte Vert\", en 1409 Amédée VIII y fit élever face au château un prieuré et  en 1434 Amédée VIII qui fonda l'ordre des chevaliers de Saint-Maurice deviendra prieur fut utilisé comme couvent de Chartreux, puis transformé en hôpital en 1536 et malheureusement le château est partiellement incendié en 1589 par les invasions Bernoises, il fut relevé en 1601 et en 1627 redonné aux Chartreux il devient le siège de l'ordre de l'Annonçiade créé par Saint-François de Sales, à la Révolution le château et le prieuré sont vendu comme bien national, acquit en 1809 par le général Dupas  à sa mort en 1823 vendu par ses descendants en 1892 à Frédéric Engel-Gros industriel. \r\nEn 1976 Madame Harold Necker descendante des Engel-Gros Crée la fondation de Ripaille pour promouvoir  un centre d'étude.","architecture":"Ripaille: Résidence princière, deux corps de bâtiment situés face à face du château construit en 1434 sur les vestiges de l'ancien édifice, le château se compose de sept corps de logis et de sept tours à l'origine  correspondant à sept ermitages destinés à sept chevaliers dont le duc Amédée VIII retiré en solitude. Le château se caractérise par ses quatre hautes tours encore couronnées de mâchicoulis.","habitants":"Les comtes de Savoie\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Ripaille_1.jpg","../image/image_74/74_Ripaille_2.jpg","../image/image_74/74_Ripaille_3.jpg","../image/image_74/74_Ripaille_4.jpg","../image/image_74/74_Ripaille_5.jpg","../image/image_74/74_Ripaille_6.jpg","../image/image_74/74_Ripaille_7.jpg","../image/image_74/74_Ripaille_8.jpg"]},"Consult_chateau_formulaire30c3":{"id":"Consult_chateau_formulaire30c3","dept":"74","canton":"Bonneville","commune":"La Roche-sur-Foron","nom":"Roche(74)","type":"Vestiges","periode":"XII","histoire":"ROCHE: Tour ruinée de la Roche ;. Vers l'an mille appartenait au royaume de Bourgogne, passa ensuite a l'empereur germanique Conrad II. Ancien château des comtes de Genève du XIe siècle dont les seigneurs de Saconnex qui le détenaient le passèrent aux de la Roche , puis aux de Compey, aux Cohendier, aux de Sales et aux Viry. \r\nReviendra aux comtes de Genève ou  le comte Amédée III s'y installe suite à un incendie au château d'Annecy en 1320 acquit définitivement en 1411 mais sera incendié l'année suivante.\r\n Sous la maison de Savoie le fief sera inféodé l'évêque  de Lausanne Guillaume Challant, à plusieurs personnes  jusqu'en 1609, le château étant en ruine depuis longtemps dont les pierres servirent a bâtir le couvent des capucins Le nom de marquis de la Roche perdura jusqu'en 1850 par le neveu  du comte de Joseph de Gerbaix de Sonnaz \" Charles-Albert de Gerbaix de Sonnaz\".","architecture":"Roche:  Une première enceinte de remparts entoure le sommet de la colline et comprennent le château de Saix et plus tard le château de l'Echelle, et le château Comtal sur la partie Sud;  vestige du château de la Roche.A part la tour il ne reste plus rien du château comtal . Ruiné dés le XVe siècle, la tour servit de carrière de pierres pour construire couvent des capucins et fut vendue comme biens national à la Révolution; acheté en 1834 par Georges de Chissé de Pollinge, aujourd'hui propriété de la ville de la Roche.","habitants":"Comtes de Genéve \r\nCharles-Albert de Gerbaix de Sonnaz.\r\n        \"","divers":"Vestiges du Château de la Roche et nouveau château de la Roche","gps":"","images":["../image/image_74/74_Roche_1.jpg","../image/image_74/74_Roche_2.jpg","../image/image_74/74_Roche_3.jpg","../image/image_74/74_Roche_4.jpg"]},"Consult_chateau_formulairebf5e-2":{"id":"Consult_chateau_formulairebf5e-2","dept":"74","canton":"Douvaine","commune":"Perrignier","nom":"Rochette(74)","type":"Vestiges","periode":"XIII","histoire":"ROCHETTE; Construit par le seigneur de Cervens  cofondateur de la chartreuse de vallon, d'Aulps et des monastères d'Abondance. Gérold de Cervens donna naissance de la lignée des Cervens du Vernay en 1250. Le château passa par alliance en 1743 aux d'Allinges et restera dans cette famille jusqu'en 1840 passa ensuite au marquis Alfiéri des Sostegno qui mit en vente les ruines acquise par la famille Dénarié.","architecture":"Rochette:  Sur un promontoire du Vernay entre Annemasse et Thonon, ruines du château construit au XIIIe siècle, ruiné en 1590,  vestiges d'une enceinte polygonale flanquée au N. d'un donjon cylindrique, au S. de deux tours rondes aux angles.","habitants":"Famille de Gérold de Cervens\r\n        \"","divers":"Vestiges du château de la Rochette","gps":"","images":["../image/image_74/74_Rochette_1.jpg","../image/image_74/74_Rochette_2.jpg"]},"Consult_chateau_formulaire2f04":{"id":"Consult_chateau_formulaire2f04","dept":"74","canton":"Sallanches","commune":"Sallanches","nom":"Rubins","type":"Maison forte","periode":"XIV","histoire":"RUBINS: Construit par la famille  de Rubins passa au XVIIe siècle à la famille de Loche, au XVIIIe siècle à la famille de Chassey qui le revende en 1754 au chapitre de la collégiale de Sallanches et depuis 1978 appartient à la commune qui fait abriter les richesses du centre de la nature montagnarde.","architecture":"Rubins: Corps de logis carrée à trois niveaux flanqué d'une tour carrée du XVe siècle.","habitants":"Famille de Loche\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Rubins_1.jpg","../image/image_74/74_Rubins_2.jpg","../image/image_74/74_Rubins_3.jpg"]},"Consult_chateau_formulaire4b2a":{"id":"Consult_chateau_formulaire4b2a","dept":"74","canton":"St-Pierre-de-Faucigny","commune":"Rumilly-sous-Cornillon","nom":"Rumilly","type":"Maison forte","periode":"XIII","histoire":"RUMILLY: Fief des comtes de Genève, le comté ayant été annexé à la Savoie en 1400, cependant le château continua a appartenir à Marguerite de Joinville, veuve du comte Pierre de Genève remariée à Frédéric de Lorraine , comte de Vaudemont. \r\nLes comte de Savoie acquiert le château en 1411 l'inféode et le cède à Claude du Saix, puis passa en 1452 à Jean d'Amancy et cette famille le gardera  jusqu'en 1518 puis Philippe de Savoie le vend à Pierre de la Forest, capitaine du château de Chambéry, conseillé et ambassadeur du roi. \r\nEn 1733 le château est acheté par Jean Pierre Muffat fut nommé comte par ses bravoures auprès du prince de Savoie et en 1807 un des descendants revend le château aux Planchamp de Cluses déjà propriétaire du château de Chuet et par alliance le château passa au colonel Jean-François Collomb d'Arcine qui à son décès en 1881 Eugenie sa veuve légua le château à son neveu le vicomte Louis Riverieux de Chambost, en 1909 cette famille vend le château  à la famille d'Ennemont qui par alliance passa en 1912 à Boris de Gravilow officier impérial russe, la descendance  en est toujours propriétaire.","architecture":"Rumilly:  Ce château conçut à l'origine pour la surveillance de la vallée de l'Arve et de la vallée de Borne, il a remplacé le château de Cornillon plus ancien bâti plus haut dans la montagne. Corps de logis à deux niveaux accolé à une grosse tour rectangulaire.","habitants":"Famille de Pierre de la Forest\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Rumilly_1.jpg","../image/image_74/74_Rumilly_2.jpg","../image/image_74/74_Rumilly_3.jpg"]},"Consult_chateau_formulairee3c2":{"id":"Consult_chateau_formulairee3c2","dept":"74","canton":"Annecy","commune":"Sallenoves","nom":"Sallenoves","type":"Château","periode":"XVI","histoire":"SALLENOVES: Les premiers seigneurs de Sallenôve famille de Viry étaient originaires  du château de la Motte-sur-Vincy dans le district de Rolle qui conservèrent le château jusqu'en 1584, par confiscation  des biens de Charles de Sallenôve; un héritier, Pierre de Montluel  sans enfant légua en 1579 au duc de Savoie Emmanuel-Philibert qui l'inféode en  1584 à Simon de Marmier sire de Moissy qui possédait déjà Marlioz. Période où il y eu au château des rencontres en secret de Charles de Gontaut duc de Biron pour complot contre Henri IV . \r\nPar alliance le château de Sallenôve et Marlioz passa au de Livron en 1651 et de nouveau par alliance passa à François Malivers, puis à Amédée de Pingon qui hérite des deux châteaux en 1773, incarcéré à la Révolution il lègue ses biens  au comte Eugène de la Prunarède son beau frère, Exproprié en 1850 l'abbé Edouard Scott du Pas de Calais récupère les  châteaux, vendus aux enchères sont achetés par Jean Daudens de Frangy et Sallenôve passa à Monsieur Emile Schurch qui le restaure en 1930 toujours dans la famille.","architecture":"Sallenoves: Ce château construit sur  un éperon, fut remanié en 1634 gardera l'aspect d'aujourd'hui; vaste enceinte avec un grand  donjon carré logeable et un logis flanqué d'une tour. \r\nLe noyau le plus ancien  est un grand donjon dit \"tour de César\" du XIIe siècle, de 9 x 12 m, ruiné depuis  la Révolution servit de carrière pour la construction de l'église de Marlioz. remanié  au XVIe siècle avec entrée renaissance  est accolée une grosse tour carrée, petite cour à l'intérieure.","habitants":"famille de Charles de Sallenôve\r\n        \"","divers":"Vestiges de l'ancienne partie et chateau reconstruit","gps":"","images":["../image/image_74/74_Sallenoves_1.jpg","../image/image_74/74_Sallenoves_2.jpg","../image/image_74/74_Sallenoves_3.jpg"]},"Consult_chateau_formulairedbea":{"id":"Consult_chateau_formulairedbea","dept":"74","canton":"Evian","commune":"Evian","nom":"Sapiniere","type":"Manoir","periode":"XIX","histoire":"SAPINIERE: Le baron Jonas Vitta riche homme d'affaires piémontais (banques et commerce de Soieries) fit construire cette demeure en 1892, par l'architecte Jean Camille Formigé, cet architecte inspiré de la Renaissance italienne. \r\nLe baron Vitta  décéda en 1892,  son fils Joseph la fera achever; Joseph décéda en 1942 sa sur hérita mais ayant perdu son fils unique en 1946,  fit de la Sapinière un centre Jean Foa, Fanny Foa héritière et fille cadette du baron Vitta l'offrit en 1947 à l'Adapt (ligue pour l'adaptation du diminué physique au travail).","architecture":"Sapinière: Résidence d'agréments style italien flanquée sur l'arrière d'un clocher typique campanile italien.","habitants":"Famille du baron Jonas Vitta\r\n        \"","divers":"Chateau et Campanile","gps":"","images":["../image/image_74/74_Sapiniere_1.jpg","../image/image_74/74_Sapiniere_2.jpg"]},"Consult_chateau_formulairea918":{"id":"Consult_chateau_formulairea918","dept":"74","canton":"Arbusigny","commune":"Chapelle-Rambaud","nom":"Sougey","type":"Maison forte","periode":"XVI","histoire":"SOUGEY: Construit par la famille Domen en 1559 et le conservèrent jusqu'en 1687 passa par alliance à François Collomb famille anoblie en 1611 les descendants prirent le nom d'Arcine  en épousant une Verboz héritière.  Resta dans la famille de Collomb d'Arcine jusqu'en 1870 ,malgré les problèmes de la Révolution Française.","architecture":"Sougey: Cette maison forte construite en 1559 de forme carré était flanqué en angles de tours carrées dont deux seulement restent.","habitants":"Famille Domen\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Sougey_1.jpg"]},"Consult_chateau_formulaireb3cb":{"id":"Consult_chateau_formulaireb3cb","dept":"74","canton":"Bonneville","commune":"St-Sixt","nom":"St_Sixt","type":"Château","periode":"XIV","histoire":"SAINT-SIXT: Construit au XIVe siècle par les Saint-Sixt à la mort du dernier de cette lignée en 1784 le château revient par alliance à Henri de Sauvage et fut cédé  en 1872 par manque de postérité a son neveu George de Chissé de Pollinge qui le revend à Léon Maréchal Avocat général à la cour de Chambéry, et depuis 1930 appartient à la famille Anthonioz, toujours dans cette famille.","architecture":"Saint-Sixt: Château construit au XIVe siècle ; grand corps de logis à trois niveaux  rénové au XVIIIe siècle, possède deux tours  dont une carrée à hautes toitures, l'autre de plan en équerre qui enveloppe l'un des angles du corps de logis.","habitants":"Famille de Saint-Sixt\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_St_Sixt_1.jpg"]},"Consult_chateau_formulairec8d5-2":{"id":"Consult_chateau_formulairec8d5-2","dept":"74","canton":"Annemasse","commune":"Gaillard","nom":"Terreaux","type":"Château","periode":"XV","histoire":"TERREAUX: Ce château était occupé lors de l'invasion bernoise en 1536 fut récupéré par Emmanuel Philibert, il servit de dépôt de munitions  lors de l'attaque des troupes savoyardes  en 1602 et également de refuge  pour les blessés.","architecture":"Terreaux: Corps de logis en équerre à trois niveaux.","habitants":"Emmanuel Philibert\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Terreaux_1.jpg"]},"Consult_chateau_formulaire8755-3":{"id":"Consult_chateau_formulaire8755-3","dept":"74","canton":"Annemasse","commune":"Thairy","nom":"Thairy","type":"Maison forte","periode":"XV","histoire":"THAIRY:Au XIVe siècle aux seigneurs de Ternier et aux comtes de Genève, qui fut racheté par les comtes de Savoie,  inféodée aux frères Claude et Henri Philippe  capitaine général  au syndic de Genève, démantelé puis relevé par Nicolas de Heu seigneur de Mandeurre et de la Salle  acheta la seigneurie de Saconnex dont faisait partie Thairy, cette famille conserva Thairy jusqu'au XVIIIe siècle, passa à la famille Lacombe  et au XIXe siècle à la famille de Boymond qui la transforme en ferme et les descendants la revende  à Monsieur Aubert qui redonnera vie à cette maison forte.","architecture":"Thairy;  Maison forte du XVe siècle, qui fut démantelée  en 1590 puis reconstruite et en mauvais état en 1975 remise en état à cette époque ; corps de logis  rectangulaire flanquée dans l'angle Sud-Est d'une grosse tour ronde et d'une tourelle à l'opposée.","habitants":"Famille de Nicolas de Heu\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Thairy_1.jpg"]},"Consult_chateau_formulairee3e5":{"id":"Consult_chateau_formulairee3e5","dept":"74","canton":"Douvaine","commune":"Ballaison","nom":"Thenieres","type":"Château","periode":"XV","histoire":"THENIERES; la seigneurie de Ballaison possédait le fief depuis le XIe siècle passera ensuite aux comtes de Genève  remis en gage à Pierre de Savoie  mais sera de nouveau récupéré par le comte de Genève en 1327. \r\nEn 1401 il est acheté par le comte Amédée VIII de Savoie; comme la plupart des châteaux de Savoie pillé et ruiné par les genevois en 1591. \r\nIl reviendra à la famille des Allinges-Coudrée avant de devenir aux Ballaison-Thénières. \r\nPuis passa au comte de Boigne qui fit construire le nouveau château  qui ce dernier fut acquis  par le Sivom du Bas-Chablais à vocations publics et humanitaires.","architecture":"Thenières: Château construit sur les ruines de l'ancien château  de style féodal à tours  rondes crénelées et donjon également crénelées.","habitants":"Famille Ballaison-Thénières\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Thenieres_1.jpg","../image/image_74/74_Thenieres_2.jpg"]},"Consult_chateau_formulaireae51":{"id":"Consult_chateau_formulaireae51","dept":"74","canton":"Chaumont","commune":"St-Jean-de-Tholliaz","nom":"Thiollaz","type":"Maison forte","periode":"XVI","histoire":"THIOLLIAZ: Berceau de la Famille de Tholliaz que tenait en fief les comtes de Genève, en 1752 Claude François de Tholliaz évêque d'Annecy, et certaines autres personnes furent militaires. \r\nLa maison forte toujours dans cette famille.","architecture":"Tholliaz: Maison forte construite en 1589 incendié et reconstruite au XVIe siècle, puis saccagé à la Révolution et remis en état au XIXe siècle.","habitants":"Famille de Tholliaz\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Tholliaz_1.jpg"]},"Consult_chateau_formulaireec58":{"id":"Consult_chateau_formulaireec58","dept":"74","canton":"Thonon-les-Bains","commune":"Thonon-les-Bains","nom":"Thonon","type":"Manoir","periode":"XVII","histoire":"THONON: Capitale du Chablais, les descendants de Humbert aux Blanches-Mains furent comtes puis ducs choisirent cette ville comme résidence secondaire.  RIVES-Montjoux; fief de Philippe Ier qui fit construire le bourg sous Thonon et la maison forte en 1283 qui sera transformé en château afin de défendre Thonon.\r\n Ce château sera acheté par le seigneur de Greyssier en 1405 passera ensuite a la famille de Révorée, puis sera céder  au monastère du Grand Saint-Bernard  mais le château sera incendié lors de l'invasion  franco-Genevoise en 1591.                    \r\nMURCY: Manoir du XIXe siècle qui a appartenu  longtemps à la famille de Brotty d'Antioche.                                                    SONNAZ; Château de la famille de Sonnaz, agrandi et embelli aux XVe  et XVIe siècle fut le château des ducs de Savoie, théâtre en 1462 de l'assassinat du favori de la duchesse Anne, fut partiellement détruit en 1616 par un incendie.  \r\nLa maison de Sonnaz représente une des parties  les mieux conservées de l'édifice.  \r\nPropriété de la ville. Ce château a reçu à plusieurs reprises les princes savoyards tel que: Victor amédée, Victor Emmanuel et Charles Félix.","architecture":"Rives-Montjoux; maison forte construite en 1283 qui sera transformé en château afin de défendre Thonon. Incendié en 1591. Corps de logis rectangulaire flanqué de deux grosses tours carrées.                           Sonnaz; Corps de logis rectangulaire à trois niveaux flanquée d'une tour carrée.","habitants":"Rives: seigneur de Greyssier                                                    Murcy:famille de Brotty d'Antioche.                                    \r\nSonnaz: Victor amédée\r\n        \"","divers":"Château de Rives \r\nChâteau de Murcy\r\nChâteau de Sonnaz","gps":"","images":["../image/image_74/74_Thonon_1.jpg","../image/image_74/74_Thonon_2.jpg","../image/image_74/74_Thonon_3.jpg","../image/image_74/74_Thonon_4.jpg","../image/image_74/74_Thonon_5.jpg","../image/image_74/74_Thonon_6.jpg","../image/image_74/74_Thonon_7.jpg","../image/image_74/74_Thonon_8.jpg"]},"Consult_chateau_formulaire392d":{"id":"Consult_chateau_formulaire392d","dept":"74","canton":"Thorens-Glières","commune":"Thorens-Glières","nom":"Thorens_Glieres","type":"Château","periode":"XIV","histoire":"THORENS: Forteresse féodal; appelé château de Sales, au XIe siècle propriété des comtes de Genève, offerte aux seigneurs  de Compey en 1060, vassaux des comtes jusqu'au XVe siècle, suite à des abus de la seigneurie et entre voisin le duc de Savoie confisqua le château en 1479 et l'offrit à Hélène de Luxembourg épouse de Janus de Savoie qui cette dernière revendit le château en 1559 aux seigneurs de Sales vassaux des de Compey. ( Saint-François de Sales naquit dans ce château le 21 Août 1567), le frère de Saint-François, Louis de Sales, gouverneur d'Annecy négocia avec la duchesse de Luxembourg qui avait entre temps racheté le château à le reprendre et le releva  qui fut en parti détruit en 1629 sur ordre de Louis XIII car il était devenu un repaire de brigands. \r\nIl appartient toujours à la descendance de la famille de Roussy de Sales.","architecture":"Thorens:  Construit sur les ruines d'un château fort du XIe siècle pour surveiller la route de Genève à Annecy et pour la protection de la Roche sur Foron, reconstruit en 1629 a gardé des tours du XIe siècle donjon cylindrique du XIIIe siècle tour carré du XVe siècle, fut considérablement remanié au XIXe siècle.","habitants":"Famille de sales\r\n        \"","divers":"Château de Thorens","gps":"","images":["../image/image_74/74_Thorens_Glieres_1.jpg","../image/image_74/74_Thorens_Glieres_2.jpg","../image/image_74/74_Thorens_Glieres_3.jpg","../image/image_74/74_Thorens_Glieres_4.jpg","../image/image_74/74_Thorens_Glieres_5.jpg","../image/image_74/74_Thorens_Glieres_6.jpg"]},"Consult_chateau_formulaireb979":{"id":"Consult_chateau_formulaireb979","dept":"74","canton":"Thonon-les-Bains","commune":"Thonon-les-Bains","nom":"Thuysset","type":"Château","periode":"XV","histoire":"THUYSSET: Les seigneurs qui construisirent cette maison forte son les d'Allinges en 1480, Passa aux Thorens et en 1617 Jeanne Françoise  de Thorens le légue à Aymé de la Fléchère, à sa mort son  épouse de Aymée de Prez en hérite, elle se remarie avec le sénateur Louis Marin de Loisinge qui devient propriétaire du château et passera par alliance aux de Foras  (famille de militaire).\r\n Aujourd'hui dans une famille Anglaise.","architecture":"Thuysset:  Maison forte construite en 1480 d'un haut corps de logis carré à trois niveaux accolé sur partie opposée d'une tour ronde et d'une tour carrée.","habitants":"Famille de Foras\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Thuysset_1.jpg","../image/image_74/74_Thuysset_2.jpg"]},"Consult_chateau_formulaire1735":{"id":"Consult_chateau_formulaire1735","dept":"74","canton":"Evian-les-Bains","commune":"Lugrin","nom":"Tourronde","type":"Château","periode":"XII","histoire":"TOURRONDE: Au XIIIe siècle seigneurie des Blonay, le château fut brûlé par les Bernois en 1536 et reconstruit en partie en 1539, toujours dans la famille au XVIIe siècle cette dernière se partage en deux, une branche Vaudoise et une branche Savoyarde, vassale du duc de Savoie. \r\nEn 1742 Louis de Blonay nommé vice-roi de Sardaigne, sous la restauration, le baron de Blonay est  ministre plénipotentiaire et Ennemond de Blonnay en 1887 aménage en casino le château de la famille à Evian  et le donne à la station thermale. \r\nLe château fut vendu en 1884 à la mort du Baron au baron de Saint-Yon et au neveu de celui-ci le comte de Kersaint qui apportèrent des modifications au château, Racheté en 1892 par William de Blonay baron et racheté en 1921 par la duchesse de Vendôme, marié à un arrière petit-fils de Louis Philippe, Henriette de Belgique est la soeur du roi Albert Ier, la duchesse y vivra jusqu'en 1948. Aujourd'hui transformé en copropriété.","architecture":"Tourronde; Château du XIIIe siècle, les murs du parc baignaient dans les eaux du lac, aujourd'hui séparé par la route. Suite a un incendie en 1536 le corps de logis fut reconstruit en 1539; une grosse tour carrée est surélevée par l'adjonction de mâchicoulis supportant un crénelage. accolée d'une tour carrée . \r\nLe château fut remanié en 1925 qui à changer l'aspect féodal, mais a gardé son gros donjon du XIIIe siècle, transformant le crénelage en chemin de ronde et une toiture adaptée à la région.","habitants":"Famille de Blonay                           \r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Tourronde_1.jpg"]},"Consult_chateau_formulairee827":{"id":"Consult_chateau_formulairee827","dept":"74","canton":"Bonneville","commune":"Ayze","nom":"Tours_Mons","type":"Château","periode":"XIV","histoire":"TOURS: MONS: Château construit au XIIIe siècle, appartenait au seigneur de Mons, bien que ce château était une résidence de plaisance  il ne reste qu'une tour (donjon roman). Ce château de la famille des de Montvuagnard fut remplacé par une bâtisse carrée encadrée de quatre tourelles, en 1570 elle le cède à la famille de Rochette, ces deux famille se l'échangeront plusieurs fois jusqu'en 1865.","architecture":"Tours:Construite en 1290, XIIIe siècle ; XIVe siècle, appartenait au seigneur de Mons. Les vestiges se composent d'une tour quadrangulaire (1290), au coin d'une cour rectangulaire. Les angles du grand côté sont flanqués de tours rondes (XIVe siècle). L'entrée de la tour se trouvait à six mètres du sol.\r\nl'adjonction d'une cour correspond à la surélévation de la tour, et l'ensemble prend un caractère résidentiel. La cour comprenait des dépendances (granges, chenevier, four, cuvage). \r\nLe site a d'abord été édifié pour une fonction de guet, évoluant ensuite vers un habitat de plaisance. \r\nCes vestiges médiévaux sont les plus anciens et les mieux conservés de la Semine.\r\n Château des Tours; bâtisse carrée encadrée de quatre tourelles identiques ; le château des Montvuagnard longue bâtisse flanquée d'une grosse tour carrée et d'une plus petite.","habitants":"Famille  de Montvuagnard\r\n        \"","divers":"Vrstiges du Château de Tours-Mons","gps":"","images":["../image/image_74/74_Tour_Mons_1.jpg"]},"Consult_chateau_formulaire1506":{"id":"Consult_chateau_formulaire1506","dept":"74","canton":"Douvaine","commune":"Douvaine","nom":"Troches","type":"Château","periode":"XIII","histoire":"TROCHES:La maison forte au XIIIe siècle était le berceau de la famille de Troches passa en 1368 à la famille de Ternier, après le rachat du comté de Genève par Amédée VIII de Savoie en 1401 les Ternier cède le château à la famille Girard de Nernier, puis racheté par la maison de Savoie  le garderont jusqu'en 1427 et l'inféode à la famille de Chignin, changera plusieurs fois de propriétaire pour terminer en 1619 à Claude Jérôme Chabod baron de Saint-Jeoire qui ce dernier le revendra à Antoine Passerat qui est baron de Torches et par alliance le château passera en héritage en 1854 au marquis de Tredicini di Baffalora toujours dans la famille.","architecture":"Troches: Maison forte, corps de logis carré à trois niveaux, retour en équerre pour le rez-de-chaussée flanqué de tour rondes en angles.","habitants":"famille de Troches\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Troches_1.jpg","../image/image_74/74_Troches_2.jpg"]},"Consult_chateau_formulaire2384":{"id":"Consult_chateau_formulaire2384","dept":"74","canton":"Seyssel","commune":"Clarafond","nom":"Verboz","type":"Maison forte","periode":"XV","histoire":"VERBOZ: Berceau de la famille de Verboz, vassale des comtes de Genève passa aux Baillans au XVe siècle qui le gardèrent jusqu'au XVIIe siècle et par alliance  passa aux Varax de Châtel qui le conservèrent jusqu'à la Révolution. Aujourd'hui exploitation agricole.","architecture":"Verboz: Construction imposante avec tour carrée une partie fut démolie en 1966.","habitants":"Famille de Verboz\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Verboz_1.jpg","../image/image_74/74_Verboz_2.jpg"]},"Consult_chateau_formulairee681":{"id":"Consult_chateau_formulairee681","dept":"74","canton":"Le Biot","commune":"Vernaz","nom":"Vernaz","type":"Château","periode":"XIX","histoire":"VERNAZ : Château construit en 1865, il abrita deux peintres, le portraitiste Fimin Massot ( 1766-  1849) il fit plusieurs fois le portrait de Mme Staël ainsi que d'autre tel que Benjamin Constant et  Abbraham Constantin qui demeurait avec lui.","architecture":"Vernaz: Corps de logis rectangulaire à deux niveaux du XIXe siècle.","habitants":"Fimin Massot\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Vernaz_1.jpg"]},"Consult_chateau_formulaire0297":{"id":"Consult_chateau_formulaire0297","dept":"74","canton":"Douvaine","commune":"Viegy-Foncenex","nom":"Viegy","type":"Château","periode":"XV","histoire":"VIEGY: Fut la propriété  du général  Jaillet de Saint-Cergues commandant de la dernière brigade de Savoie sous Napoléon III et député d'Alberville, puis en 1861 à l'amiral de Saint-Bon plusieurs fois ministre de la marine du royaume du Piémont-Sardaigne toujours dans la descendance par Monsieur de Tilière.","architecture":"Viegy: Construction du XVIIIe siècle: corps de logis rectangulaire à trois niveaux avec attique flanqués de quatre tours carrées en angles.","habitants":"Général  Jaillet de Saint- Cergues \r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Viegy_1.jpg"]},"Consult_chateau_formulaire8c72":{"id":"Consult_chateau_formulaire8c72","dept":"74","canton":"Bonneville","commune":"Contamine-sur-Arve","nom":"Villy","type":"Château","periode":"XV","histoire":"VILLY: Domaine de la famille de Charmoisy ou décéda Mme de Charmoisy, née Louise Châtel, cousine de Saint  François de Sales en 1645. \r\nAujourd'hui appartient à la commune de Contamine sur Arve.","architecture":"Villy: Château dont la tour carrée datent du XIe siècle  surmontait de mâchicoulis.","habitants":"famille de charmoisy\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Villy_1.jpg","../image/image_74/74_Villy_2.jpg","../image/image_74/74_Villy_3.jpg"]},"Consult_chateau_formulaire3f12":{"id":"Consult_chateau_formulaire3f12","dept":"74","canton":"Reignier","commune":"Reignier","nom":"Villy_Reignier","type":"Château","periode":"Château","histoire":"Villy-Reignier: Fief des Vidomne de Chaumont vasseaux des Thoire au XIVe siècle, prirent l'appellation de Charmoisy qui le garderont jusqu'en 1787 fut acheté à cette date par la famille Burnier-Fontanel qui le garderont jusqu'au XXe siècle, transformé en exploitation agricole incendié en 1979.","architecture":"Villy-Reynier; Construction du XVIIe siècle, grosse bâtisse carrée à trois niveaux, deux tours rectangulaires arrondies en angles de façade, et trois arcades supportent la  terrasse en façade également.","habitants":"Famille Burnier-Fontanel\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Villy_Reignier_1.jpg","../image/image_74/74_Villy_Reignier_2.jpg"]},"Consult_chateau_formulaire9238":{"id":"Consult_chateau_formulaire9238","dept":"74","canton":"St-Julien-en-Genevois","commune":"Viry","nom":"Viry_Moulinsard","type":"Château","periode":"XV","histoire":"VIRY: Etait la propriété de la famille de Viry, sans descendance repris par Pierre de Rougemont. En 1213 propriété de Hugues de Sallenôves; Guillaume de Sallenôves, fils de Hugues  s'octroi le titre de comte de Viry, baron de la Perrière, baron de Cohendier, seigneur d'Ogny,  d'Archamps et de Sauterans, cette famille gardera le château jusqu'à la Révolution.","architecture":"Viry: Quadrilatère à deux niveaux plus attique, pavillons saillant sur les côtés.","habitants":"famille de Viry\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Viry_Moulinsard_1.jpg"]},"Consult_chateau_formulaireea35":{"id":"Consult_chateau_formulaireea35","dept":"74","canton":"Bonneville","commune":"Scientrier","nom":"Viviers(74)","type":"Maison forte","periode":"XVI","histoire":"VIVIER: à l'origine une maison forte de la famille de Thoire qui fut remplacé par le château actuel au XVIe siècle par Humbert de Thoire cette famille le conservera jusqu'en 1762; le château passa ensuite aux Duingt-Mareschal de la Valdisère, puis au marquis d'Allinges Coudrée et passera en héritage au marquis Alfieri di Sostegno. \r\nAu XIXe siècle passe à la famille de l'avocat Demole avant d'arriver à la famille Roussel.","architecture":"Vivier: Grosse construction carrée à trois niveaux flanqué d'une tour ronde.","habitants":"Famille de Thoire\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Viviers_1.jpg"]},"Consult_chateau_formulaire3bcb":{"id":"Consult_chateau_formulaire3bcb","dept":"74","canton":"Douvaine","commune":"Yvoire","nom":"Yvoire","type":"Château","periode":"XIII","histoire":"YVOIRE: Acquit  par la maison de Savoie les comtes  le passa aux sires de Compey qui le conservèrent jusqu'en 1306.       Puis Amédée V en prit possession puis l'inféode en 1366 à la famille de Miolans et par alliance passa aux de Révorée jusqu'en 1478 il fut légué à Jacques de Poypon dont le tuteur le prince évêque de Genève Antoine Champion le vend à Georges d'Antioche et en 1521 Pierre d'Antioche le lègue à Louis de Viry et en 1528 le passa à François de Saint-Jeoire. \r\nLe château fut prit par les Bernois  et brûlé en 1589 et en 1591. \r\nEn 1594 Claude Forestier  en devient propriétaire en épousant Françoise de Saint-Jeoire vendu en 1627 par leur fils à Philibert Favre seigneur de Félicia de Brécorens, sénateur de Savoie revend le château en 1634 à Antoine Fornier revendu en 1655 à Georges Bouvier baron d'Yvoire titre confirmé en 1772 qui le possède encore aujourd'hui.","architecture":"Yvoire: Ce château construit au XIIIe siècle consolidé au XIVe siècle, puis incendié en 1589 et en 1592 a gardé son allure de forteresse avec un énorme donjon corps de logis 15 m x 26 m à quatre niveaux  accolée d'échauguettes  en angles.","habitants":"Sires de Compey\r\n        \"","divers":"","gps":"","images":["../image/image_74/74_Yvoire_1.jpg","../image/image_74/74_Yvoire_2.jpg","../image/image_74/74_Yvoire_3.jpg","../image/image_74/74_Yvoire_4.jpg","../image/image_74/74_Yvoire_5.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','74 — Haute-Savoie'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
